<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>폼과 유효성 검사 — React Hook Form — Chapter VI-1-2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter VI-1-2 — 폼과 유효성 검사: React Hook Form -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        id: 'usestate-pain',
        title: 'Step 1 — useState 폼 관리의 고통',
        desc: '필드마다 useState + onChange를 반복해야 합니다. 필드 3개만으로도 코드가 길어지는데, 실무에서 필드가 10~20개라면 관리가 불가능해집니다.',
        code: 'function SignupForm() {\n  const [name, setName] = useState("");\n  const [email, setEmail] = useState("");\n  const [password, setPassword] = useState("");\n\n  const handleNameChange = (e) => setName(e.target.value);\n  const handleEmailChange = (e) => setEmail(e.target.value);\n  const handlePasswordChange = (e) => setPassword(e.target.value);\n\n  const handleSubmit = (e) => {\n    e.preventDefault();\n    // 유효성 검사도 직접...\n    if (!name) alert("이름을 입력하세요");\n    if (!email.includes("@")) alert("이메일 형식 오류");\n    if (password.length < 8) alert("비밀번호 8자 이상");\n    // 제출 로직...\n  };\n\n  return (\n    <form onSubmit={handleSubmit}>\n      <input value={name} onChange={handleNameChange} />\n      <input value={email} onChange={handleEmailChange} />\n      <input value={password} onChange={handlePasswordChange} />\n      <button type="submit">가입</button>\n    </form>\n  );\n}',
        visual: 'pain',
      },
      {
        id: 'react-hook-form',
        title: 'Step 2 — React Hook Form',
        desc: 'useForm → register → handleSubmit 세 단계로 폼을 관리합니다. 각 필드에 register("필드명")만 연결하면 상태 관리가 자동화됩니다. 코드량이 절반 이하로 줄어듭니다.',
        code: '// React Hook Form 방식\nimport { useForm } from "react-hook-form";\n\nfunction SignupForm() {\n  // 1. useForm으로 폼 인스턴스 생성\n  const { register, handleSubmit } = useForm();\n\n  // 2. handleSubmit이 자동으로 e.preventDefault() 처리\n  const onSubmit = (data) => {\n    console.log(data); // { name, email, password }\n  };\n\n  return (\n    <form onSubmit={handleSubmit(onSubmit)}>\n      {/* 3. register로 필드 등록 — 끝! */}\n      <input {...register("name")} />\n      <input {...register("email")} />\n      <input {...register("password")} />\n      <button type="submit">가입</button>\n    </form>\n  );\n}',
        visual: 'comparison',
      },
      {
        id: 'zod-validation',
        title: 'Step 3 — Zod 유효성 검사',
        desc: 'Zod 스키마로 유효성 규칙을 선언적으로 정의하고, @hookform/resolvers로 React Hook Form과 연동합니다. 타입 추론까지 자동으로 제공됩니다.',
        code: '// Zod 스키마 정의\nimport { z } from "zod";\nimport { zodResolver } from "@hookform/resolvers/zod";\n\nconst schema = z.object({\n  name: z.string().min(1, "이름은 필수입니다"),\n  email: z.string().email("올바른 이메일을 입력하세요"),\n  password: z.string().min(8, "8자 이상 입력하세요"),\n});\n\n// React Hook Form에 연동\nfunction SignupForm() {\n  const { register, handleSubmit, formState: { errors } } =\n    useForm({\n      resolver: zodResolver(schema),\n    });\n\n  const onSubmit = (data) => {\n    // data는 자동으로 타입 추론됨!\n    console.log(data);\n  };\n\n  return <form onSubmit={handleSubmit(onSubmit)}>...</form>;\n}',
        visual: 'zod',
      },
      {
        id: 'error-messages',
        title: 'Step 4 — 에러 메시지 표시',
        desc: 'formState.errors 객체에서 각 필드의 에러 메시지를 꺼내 사용자에게 보여줍니다. 인라인, 토스트, 요약 등 다양한 패턴으로 표시할 수 있습니다.',
        code: 'function SignupForm() {\n  const { register, handleSubmit, formState: { errors } } =\n    useForm({ resolver: zodResolver(schema) });\n\n  return (\n    <form onSubmit={handleSubmit(onSubmit)}>\n      <div>\n        <input {...register("name")} />\n        {/* 인라인 에러 메시지 */}\n        {errors.name && (\n          <p className="text-red-500 text-sm">\n            {errors.name.message}\n          </p>\n        )}\n      </div>\n\n      <div>\n        <input {...register("email")} />\n        {errors.email && (\n          <p className="text-red-500 text-sm">\n            {errors.email.message}\n          </p>\n        )}\n      </div>\n\n      <div>\n        <input {...register("password")} />\n        {errors.password && (\n          <p className="text-red-500 text-sm">\n            {errors.password.message}\n          </p>\n        )}\n      </div>\n\n      <button type="submit">가입</button>\n    </form>\n  );\n}',
        visual: 'error-patterns',
      },
      {
        id: 'interactive-demo',
        title: 'Step 5 — 인터랙티브 폼 데모',
        desc: '실제 동작하는 폼입니다. 값을 입력하고 제출해보세요. 빈 값 체크, 이메일 형식 검증, 비밀번호 길이 검증이 실시간으로 동작합니다.',
        code: null,
        visual: 'demo',
      },
    ];

    function PainVisual() {
      const fields = [
        { state: 'name', handler: 'handleNameChange', lines: 2 },
        { state: 'email', handler: 'handleEmailChange', lines: 2 },
        { state: 'password', handler: 'handlePasswordChange', lines: 2 },
      ];
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">필드당 코드량</div>
          <div className="space-y-2">
            {fields.map((f) => (
              <div key={f.state} className="flex items-center gap-2">
                <div className="bg-red-50 border border-red-200 rounded-lg px-3 py-2 flex-1">
                  <div className="text-[10px] font-bold text-red-600">useState("{f.state}")</div>
                  <div className="text-[9px] text-red-500">+ {f.handler}</div>
                </div>
                <div className="text-[10px] text-slate-400">{f.lines}줄</div>
              </div>
            ))}
          </div>
          <div className="mt-3 bg-red-100 border border-red-300 rounded-lg p-3 text-center">
            <div className="text-xs font-bold text-red-700">필드 3개 = 코드 18줄</div>
            <div className="text-[10px] text-red-600 mt-1">필드 10개면 코드가 60줄... 유효성 검사까지 하면 100줄+</div>
          </div>
        </div>
      );
    }

    function ComparisonVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">코드량 비교</div>
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-red-50 border-2 border-red-200 rounded-xl p-3">
              <div className="text-xs font-bold text-red-700 mb-2">useState 방식</div>
              <div className="space-y-1">
                {['useState x3', 'onChange x3', 'handleSubmit', '유효성 검사', '에러 상태 관리'].map((item) => (
                  <div key={item} className="bg-red-100 rounded px-2 py-0.5 text-[10px] text-red-700">{item}</div>
                ))}
              </div>
              <div className="mt-2 text-center text-sm font-bold text-red-600">~35줄</div>
            </div>
            <div className="bg-emerald-50 border-2 border-emerald-200 rounded-xl p-3">
              <div className="text-xs font-bold text-emerald-700 mb-2">RHF 방식</div>
              <div className="space-y-1">
                {['useForm()', 'register x3', 'handleSubmit'].map((item) => (
                  <div key={item} className="bg-emerald-100 rounded px-2 py-0.5 text-[10px] text-emerald-700">{item}</div>
                ))}
              </div>
              <div className="mt-2 text-center text-sm font-bold text-emerald-600">~12줄</div>
            </div>
          </div>
          <div className="mt-3 text-center text-[10px] text-slate-500 font-bold">코드량 65% 감소 + 리렌더링 최적화까지!</div>
        </div>
      );
    }

    function ZodVisual() {
      const rules = [
        { field: 'name', rule: 'z.string().min(1)', desc: '빈 문자열 불가' },
        { field: 'email', rule: 'z.string().email()', desc: '이메일 형식 체크' },
        { field: 'password', rule: 'z.string().min(8)', desc: '최소 8자' },
      ];
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Zod 스키마 → 자동 검증</div>
          <div className="space-y-2">
            {rules.map((r) => (
              <div key={r.field} className="bg-violet-50 border border-violet-200 rounded-lg px-3 py-2">
                <div className="flex items-center justify-between">
                  <span className="text-[10px] font-bold text-violet-700">{r.field}</span>
                  <span className="text-[9px] text-violet-500 font-mono">{r.rule}</span>
                </div>
                <div className="text-[9px] text-violet-600 mt-0.5">{r.desc}</div>
              </div>
            ))}
          </div>
          <div className="mt-3 bg-violet-100 border border-violet-300 rounded-lg p-3">
            <div className="text-[10px] text-violet-700 font-bold text-center">zodResolver(schema)로 RHF에 연결 → 타입 추론 자동!</div>
          </div>
        </div>
      );
    }

    function ErrorPatternsVisual() {
      const patterns = [
        { name: '인라인', desc: '필드 바로 아래에 에러 표시', pros: '직관적, 어디가 틀렸는지 바로 확인', wrapper: 'bg-rose-50 border border-rose-200 rounded-lg px-3 py-2', title: 'text-[10px] font-bold text-rose-700', sub: 'text-[9px] text-rose-500', body: 'text-[9px] text-rose-600' },
        { name: '토스트', desc: '화면 상단/하단에 알림 팝업', pros: '폼 레이아웃 변경 없이 알림', wrapper: 'bg-amber-50 border border-amber-200 rounded-lg px-3 py-2', title: 'text-[10px] font-bold text-amber-700', sub: 'text-[9px] text-amber-500', body: 'text-[9px] text-amber-600' },
        { name: '요약', desc: '폼 상단에 에러 목록 모아서 표시', pros: '한눈에 전체 에러 파악 가능', wrapper: 'bg-sky-50 border border-sky-200 rounded-lg px-3 py-2', title: 'text-[10px] font-bold text-sky-700', sub: 'text-[9px] text-sky-500', body: 'text-[9px] text-sky-600' },
      ];
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">에러 표시 패턴</div>
          <div className="space-y-2">
            {patterns.map((p) => (
              <div key={p.name} className={p.wrapper}>
                <div className="flex items-center justify-between mb-1">
                  <span className={p.title}>{p.name}</span>
                  <span className={p.sub}>{p.desc}</span>
                </div>
                <div className={p.body}>{p.pros}</div>
              </div>
            ))}
          </div>
          <div className="mt-3 bg-slate-100 border border-slate-200 rounded-lg p-2 text-center text-[10px] text-slate-600">
            실무에서는 <b>인라인</b> 패턴을 가장 많이 사용합니다
          </div>
        </div>
      );
    }

    function DemoVisual() {
      const [form, setForm] = useState({ name: '', email: '', password: '' });
      const [errors, setErrors] = useState({});
      const [submitted, setSubmitted] = useState(false);
      const [success, setSuccess] = useState(false);

      const validate = () => {
        const newErrors = {};
        if (!form.name.trim()) newErrors.name = '이름은 필수입니다';
        if (!form.email.trim()) {
          newErrors.email = '이메일은 필수입니다';
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) {
          newErrors.email = '올바른 이메일 형식이 아닙니다';
        }
        if (!form.password) {
          newErrors.password = '비밀번호는 필수입니다';
        } else if (form.password.length < 8) {
          newErrors.password = '8자 이상 입력하세요';
        }
        return newErrors;
      };

      const handleChange = (field, value) => {
        setForm((prev) => ({ ...prev, [field]: value }));
        if (submitted) {
          const newErrors = validate();
          setErrors(newErrors);
        }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        setSubmitted(true);
        const newErrors = validate();
        setErrors(newErrors);
        if (Object.keys(newErrors).length === 0) {
          setSuccess(true);
        } else {
          setSuccess(false);
        }
      };

      const handleReset = () => {
        setForm({ name: '', email: '', password: '' });
        setErrors({});
        setSubmitted(false);
        setSuccess(false);
      };

      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">미니 폼 데모</div>
          {success ? (
            <div className="text-center py-6">
              <div className="text-4xl mb-2">&#10003;</div>
              <div className="text-sm font-bold text-emerald-700 mb-1">제출 성공!</div>
              <div className="text-[10px] text-slate-500 mb-3">
                이름: {form.name} / 이메일: {form.email}
              </div>
              <button onClick={handleReset} className="px-3 py-1.5 bg-slate-100 border border-slate-300 rounded-lg text-[10px] font-bold text-slate-600 hover:bg-slate-200 transition">
                다시 시도
              </button>
            </div>
          ) : (
            <form onSubmit={handleSubmit} className="space-y-3">
              <div>
                <label className="text-[10px] font-bold text-slate-600 block mb-1">이름</label>
                <input
                  type="text"
                  value={form.name}
                  onChange={(e) => handleChange('name', e.target.value)}
                  className={`w-full px-3 py-2 border rounded-lg text-sm outline-none transition ${errors.name ? 'border-red-400 bg-red-50' : 'border-slate-200 focus:border-rose-400'}`}
                  placeholder="홍길동"
                />
                {errors.name && <p className="text-[10px] text-red-500 mt-1">{errors.name}</p>}
              </div>
              <div>
                <label className="text-[10px] font-bold text-slate-600 block mb-1">이메일</label>
                <input
                  type="text"
                  value={form.email}
                  onChange={(e) => handleChange('email', e.target.value)}
                  className={`w-full px-3 py-2 border rounded-lg text-sm outline-none transition ${errors.email ? 'border-red-400 bg-red-50' : 'border-slate-200 focus:border-rose-400'}`}
                  placeholder="example@email.com"
                />
                {errors.email && <p className="text-[10px] text-red-500 mt-1">{errors.email}</p>}
              </div>
              <div>
                <label className="text-[10px] font-bold text-slate-600 block mb-1">비밀번호</label>
                <input
                  type="password"
                  value={form.password}
                  onChange={(e) => handleChange('password', e.target.value)}
                  className={`w-full px-3 py-2 border rounded-lg text-sm outline-none transition ${errors.password ? 'border-red-400 bg-red-50' : 'border-slate-200 focus:border-rose-400'}`}
                  placeholder="8자 이상"
                />
                {errors.password && <p className="text-[10px] text-red-500 mt-1">{errors.password}</p>}
              </div>
              <button type="submit" className="w-full py-2 bg-rose-500 hover:bg-rose-600 text-white font-bold text-sm rounded-lg transition">
                제출
              </button>
            </form>
          )}
        </div>
      );
    }

    function CodePanel({ code }) {
      if (!code) return null;
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5"><div className="w-3 h-3 rounded-full bg-red-500"></div><div className="w-3 h-3 rounded-full bg-yellow-500"></div><div className="w-3 h-3 rounded-full bg-emerald-500"></div></div>
            <span className="text-[10px] text-slate-500 ml-2">SignupForm.tsx</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => { setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; }); };
      const nextRef = useRef(next); nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const VISUAL_MAP = {
        'pain': PainVisual,
        'comparison': ComparisonVisual,
        'zod': ZodVisual,
        'error-patterns': ErrorPatternsVisual,
        'demo': DemoVisual,
      };
      const VisualComponent = VISUAL_MAP[step.visual];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">VI</div>
                <h1 className="text-2xl font-bold text-slate-800">폼과 유효성 검사 — React Hook Form</h1>
              </div>
              <p className="text-slate-600 text-sm">useState 폼 관리의 한계를 이해하고 <b>React Hook Form + Zod</b>로 선언적 폼 검증을 시각화합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter VI-1-2 | ★★★ | 선수 지식 VI-1-1 | 2026-04-21</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-rose-500' : 'bg-slate-200'}`} aria-label={`Step ${i + 1}`} />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {VisualComponent && <VisualComponent />}
              </div>
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-rose-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }} disabled={idx === 0} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="이전 단계">&#8592; 이전</button>
              <button onClick={() => { if (isEnd) { setIdx(0); } setIsPlaying(p => !p); }} className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-rose-500 hover:bg-rose-600 text-white'}`} aria-label={isPlaying ? '정지' : '자동 실행'}>{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }} disabled={isEnd} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="다음 단계">다음 &#8594;</button>
            </div>
            <footer className="text-center text-xs text-slate-400 pb-4">React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21</footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
