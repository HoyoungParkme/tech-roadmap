          if (v.length < 8) return '8자 이상 입력하세요';

    // ─────────────────────────────────────────────────────
    // ManualPanel — Step 1 시각화: useState 카드 폭증

    const cap = (s) => s[0].toUpperCase() + s.slice(1);

    function ManualPanel() {

        <div className="space-y-2">
          <div className="bg-rose-50 border border-rose-200 rounded-lg p-2.5">

            <div className="space-y-1.5">

                  <span className="text-[11px] font-mono text-slate-800 flex-1">{`const [${f.name}, set${cap(f.name)}] = useState('');`}</span>

          <div className="bg-amber-50 border border-amber-200 rounded-lg p-2.5">

            <div className="space-y-1.5">

                  <span className="text-[11px] font-mono text-slate-800 flex-1">{`handle${cap(f.name)}Change = (e) => set${cap(f.name)}(e.target.value)`}</span>

          <div className="bg-slate-50 border border-slate-200 rounded-lg p-2.5">

            <pre className="text-[11px] font-mono text-slate-700 leading-snug m-0 whitespace-pre">{`if (!name)              errors.name = '필수';
if (!email.includes('@')) errors.email = '형식';
if (password.length < 8)  errors.password = '8자';`}</pre>

    // ─────────────────────────────────────────────────────
    // SchemaPanel — Step 3 시각화: zod 규칙 카드
    // ─────────────────────────────────────────────────────
    function SchemaPanel() {

    function IntegratedPanel() {

          <div className="grid grid-cols-3 gap-2 mt-2">

              <div className="text-[10px] text-slate-700 leading-tight">schema 정의</div>

          <div className="bg-white border-2 border-slate-300 rounded-lg p-3 mt-2">

            <div className="space-y-1">

    }

    // ─────────────────────────────────────────────────────
    // LiveFormPanel — Step 5 시각화: 진짜 폼 + 실시간 ✓/✗
    //   useState 로 RHF + zod 동작을 시뮬레이션 (외부 라이브러리 없이)
    // ─────────────────────────────────────────────────────
    function LiveFormPanel() {
      const [values, setValues] = useState({ name: '', email: '', password: '' });
      const [touched, setTouched] = useState({});
      const [submitted, setSubmitted] = useState(false);
      const [submitState, setSubmitState] = useState('idle'); // idle | submitting | success

      // ── zod 흉내: 매 렌더마다 검증 ──
      const errors = useMemo(() => {
        const e = {};
        for (const f of FIELD_DEFS) { const m = f.validate(values[f.name]); if (m) e[f.name] = m; }
        return e;
      }, [values]);

      const isValid = Object.keys(errors).length === 0;

      const handleChange = (name, v) => { setValues((p) => ({ ...p, [name]: v })); setTouched((p) => ({ ...p, [name]: true })); };

      const handleSubmit = (e) => {
        e.preventDefault();
        setSubmitted(true);
        setTouched({ name: true, email: true, password: true });
        if (!isValid) return;
        setSubmitState('submitting');
        setTimeout(() => setSubmitState('success'), 600);
      };

      const handleReset = () => { setValues({ name: '', email: '', password: '' }); setTouched({}); setSubmitted(false); setSubmitState('idle'); };

      if (submitState === 'success') {
        return (
          <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-5 text-center">
            <div className="text-3xl mb-1">✓</div>
            <div className="text-sm font-bold text-emerald-700 mb-1">제출 성공</div>
            <div className="text-[11px] text-emerald-700 font-mono mb-3">onSubmit(data) — handleSubmit 통과</div>
            <pre className="text-[10px] font-mono text-slate-700 bg-white border border-emerald-200 rounded p-2 text-left whitespace-pre-wrap m-0 mb-3">{JSON.stringify(values, null, 2)}</pre>
            <button onClick={handleReset} className="px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-[11px] font-bold hover:bg-indigo-700">다시 시도</button>
          </div>
        );
      }

      return (
        <form onSubmit={handleSubmit} className="space-y-2.5">
          {FIELD_DEFS.map((f) => {
            const v = values[f.name];
            const showError = (touched[f.name] || submitted) && errors[f.name];
            const showOk = touched[f.name] && !errors[f.name] && v.length > 0;
            const inputClass = `w-full px-3 py-2 border-2 rounded-lg text-sm outline-none transition font-mono ${
              showError ? 'border-rose-400 bg-rose-50' : showOk ? 'border-emerald-400 bg-emerald-50' : 'border-slate-300 bg-white focus:border-indigo-400'
            }`;
            const statusClass = `text-[10px] font-bold ${showOk ? 'text-emerald-600' : showError ? 'text-rose-600' : 'text-slate-400'}`;
            return (
              <div key={f.name}>
                <div className="flex items-center justify-between mb-0.5">
                  <label className="text-[10px] font-bold text-slate-700">{f.label}</label>
                  <span className={statusClass}>{showOk ? '✓ 통과' : showError ? '✗ 실패' : '— 대기'}</span>
                </div>
                <input type={f.type} value={v} onChange={(e) => handleChange(f.name, e.target.value)} placeholder={f.placeholder} className={inputClass} />
                <div className="flex items-center justify-between mt-0.5">
                  <span className="text-[9px] font-mono text-slate-400">{f.rule}</span>
                  {showError && <span className="text-[10px] text-rose-600 font-medium">{errors[f.name]}</span>}
                </div>
              </div>
            );
          })}

          <div className="bg-slate-50 border border-slate-200 rounded-lg p-2 flex items-center justify-between text-[10px]">
            <span className="font-mono text-slate-500">formState.isValid:</span>
            <span className={`font-bold font-mono ${isValid ? 'text-emerald-600' : 'text-rose-600'}`}>{String(isValid)}</span>
          </div>

          <button type="submit" disabled={submitState === 'submitting'} className="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 disabled:opacity-50 transition">
            {submitState === 'submitting' ? '제출 중…' : '가입 (handleSubmit)'}
          </button>
          <div className="text-center text-[9px] text-slate-400 font-mono">handleSubmit(onSubmit) — 검증 통과해야만 onSubmit 호출</div>
        </form>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체 컨테이너

    function LiveDataPane({ step }) {
      const renderPanel = () => {
        switch (step.liveMode) {
          case 'manual':     return <ManualPanel />;
          case 'register':   return <RegisterPanel />;

        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-2">
            <h2 className="text-sm font-bold text-slate-700">📝 {step.liveBadge}</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>
          <p className="text-[11px] text-slate-500 mb-3">{step.liveSubtitle}</p>

          {renderPanel()}

          {/* 핵심 포인트 박스 */}
          <div className="mt-3 bg-indigo-50 border-l-4 border-indigo-400 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-indigo-600 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-indigo-900 leading-snug">{step.keyPoint}</p>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            {[
              ['bg-rose-400', 'useState (수동)'],
              ['bg-indigo-400', 'RHF (register)'],
              ['bg-violet-400', 'zod (schema)'],
              ['bg-emerald-400', 'OK / 통과'],

          </div>

      );

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   상단: 5개 파일명 탭 (activeTab 만 강조)
    //   본문: 라인 번호 + 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ tabs, activeTab, stepIdx, total }) {
      const code = tabs[activeTab];
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일명 탭 */}
          <div className="bg-[#21252b] border-b border-slate-700">
            <div className="px-4 py-2 flex items-center gap-2">
              <div className="flex gap-1.5">
                <span className="w-3 h-3 rounded-full bg-red-500"></span>
                <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span className="w-3 h-3 rounded-full bg-green-500"></span>
              </div>
              <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
            </div>
            <div className="flex overflow-x-auto border-t border-slate-700/50">
              {tabs.map((t, i) => (
                <div key={t.filename} className={`px-3 py-1.5 text-[11px] font-mono border-r border-slate-700/60 whitespace-nowrap transition ${
                  i === activeTab ? 'bg-[#282c34] text-indigo-300 border-b-2 border-b-indigo-400' : 'bg-[#21252b] text-slate-500'
                }`}>
                  {t.filename}
                </div>
              ))}
            </div>
          </div>

          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div key={i} className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-indigo-500/15 border-l-2 border-indigo-400' : ''}`}>
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">{i + 1}</span>
                      <span className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1" dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }} />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => setStepIdx((i) => {
        if (i >= STEPS.length - 1) { setIsPlaying(false); return i; }
        return i + 1;
      });
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };
      const handleReset = () => { setStepIdx(0); setIsPlaying(false); };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="./index.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; 목차로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter VI-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. 폼과 데이터 &gt; Chapter 1. 입력 처리</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VI-1-2. 폼과 유효성 검사 — React Hook Form + zod</h1>
                  <p className="text-sm text-slate-500 mt-0.5">useState 폭증에서 시작해 RHF + zod 한 줄 통합까지</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer tabs={CODE_TABS} activeTab={step.activeTab} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-indigo-50 border-2 border-indigo-300 rounded-xl p-3 text-sm text-indigo-900">
                💡 정리: <strong>useForm + register</strong> 로 폼 상태를 자동화하고, <strong>zod schema</strong> 로 검증 규칙을 한 곳에 모은 뒤, <strong>zodResolver</strong> 한 줄로 둘을 묶는다. <strong>handleSubmit</strong> 은 통과한 data 만 onSubmit 으로 넘겨, 비즈니스 로직은 깨끗한 데이터만 다룬다. 다음(VI-1-3)에서는 controlled vs uncontrolled 패턴을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-indigo-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 transition">처음</button>
              <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 transition">&larr; 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition min-w-[100px]">
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 transition">다음 &rarr;</button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['useForm', 'register', 'handleSubmit', 'zod', 'z.object', 'zodResolver', 'formState', 'errors'].map((kw) => (
                <span key={kw} className="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-xs font-medium border border-indigo-200">{kw}</span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-06-01-state-management.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; VI-1-1 상태 관리</a>
              <a href="./chapter-06-03-controlled-uncontrolled.html" className="text-indigo-700 hover:text-indigo-900 font-medium">VI-1-3 controlled vs uncontrolled &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
