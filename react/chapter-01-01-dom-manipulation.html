<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaScript가 DOM을 직접 다루면 — Chapter I-1-2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    Chapter I-1-2 — JavaScript가 DOM을 직접 다루면 어떤 일이 생기나
    ─────────────────────────────────────────────────────────────
    학습 목표: document.getElementById로 DOM을 바꾸는 방식의 불편함을 말할 수 있다.
    비유: 큰 종이 지도에 연필로 계속 덮어 쓰는 것 → 어디가 최신인지 모름
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =========================================================
    // 1. 시뮬레이션 시나리오 — 여러 스크립트가 DOM을 직접 건드림
    // =========================================================
    const STEPS = [
      {
        title: 'Step 1 — 초기 DOM 상태',
        desc: '쇼핑몰 장바구니 페이지가 있습니다. 상품 수량, 총 가격, 알림 배지가 각각 DOM 요소로 존재합니다.',
        code: '<!-- 초기 HTML -->\n<span id="count">0</span>개\n<span id="price">₩0</span>\n<span id="badge">0</span>',
        dom: { count: 0, price: '₩0', badge: 0, conflict: false, history: [] },
        problem: null,
      },
      {
        title: 'Step 2 — 스크립트 A: 수량 변경',
        desc: '첫 번째 스크립트가 "상품 추가" 버튼 클릭을 처리합니다. getElementById로 count 요소를 직접 찾아 텍스트를 바꿉니다.',
        code: '// script-a.js\nconst btn = document.getElementById("add-btn");\nbtn.onclick = function() {\n  const el = document.getElementById("count");\n  el.innerText = 1;  // 직접 DOM 수정\n};',
        dom: { count: 1, price: '₩0', badge: 0, conflict: false, history: ['A: count → 1'] },
        problem: null,
      },
      {
        title: 'Step 3 — 스크립트 B: 가격 계산',
        desc: '두 번째 스크립트가 가격을 계산합니다. 그런데 count DOM 요소를 직접 읽어서 계산하므로, 스크립트 A가 이미 DOM을 바꿨는지에 의존합니다.',
        code: '// script-b.js\nfunction updatePrice() {\n  const count = document.getElementById("count");\n  const price = document.getElementById("price");\n  // count의 현재 텍스트를 읽어서 계산\n  price.innerText = "₩" + (parseInt(count.innerText) * 15000);\n}',
        dom: { count: 1, price: '₩15000', badge: 0, conflict: false, history: ['A: count → 1', 'B: price → ₩15000'] },
        problem: null,
      },
      {
        title: 'Step 4 — 스크립트 C: 배지 업데이트',
        desc: '세 번째 스크립트가 헤더의 장바구니 배지를 업데이트합니다. 이것도 count DOM 요소를 직접 읽습니다.',
        code: '// script-c.js\nfunction updateBadge() {\n  const count = document.getElementById("count");\n  const badge = document.getElementById("badge");\n  badge.innerText = count.innerText;\n}',
        dom: { count: 1, price: '₩15000', badge: 1, conflict: false, history: ['A: count → 1', 'B: price → ₩15000', 'C: badge → 1'] },
        problem: null,
      },
      {
        title: 'Step 5 — 문제 발생! 실행 순서 꼬임',
        desc: '사용자가 빠르게 2번 클릭합니다. 스크립트 A가 count를 2로 바꿨지만, 스크립트 B의 이벤트 핸들러가 아직 이전 값(1)을 읽은 상태에서 계산합니다. 가격이 "₩15000"인데 실제로는 2개 = ₩30000이어야 합니다!',
        code: '// 빠른 더블 클릭 시나리오:\n// 1. A: count = 2  (DOM 직접 수정)\n// 2. B: price = 1 * 15000  (이전 값 읽음!)\n//    → 가격이 ₩15000, 하지만 실제는 2개\n// 3. C: badge = 2  (최신 값 읽음)\n//\n// 결과: count=2, price=₩15000, badge=2\n//        → 가격만 틀림! 화면 불일치!',
        dom: { count: 2, price: '₩15000', badge: 2, conflict: true, history: ['A: count → 2', 'B: price → ₩15000 (오류!)', 'C: badge → 2'] },
        problem: '화면 불일치: count=2, badge=2인데 가격은 ₩15000 (₩30000이어야 함)',
      },
      {
        title: 'Step 6 — 근본 원인: "진실의 원천"이 없다',
        desc: '각 스크립트가 DOM을 "진실의 원천(Single Source of Truth)"으로 사용합니다. DOM은 여러 곳에서 동시에 바뀔 수 있어서 "지금 DOM에 있는 값이 최신인지" 보장할 수 없습니다. 이것이 React가 해결하려는 핵심 문제입니다.',
        code: '// 문제의 근원:\n// - 데이터(state)가 DOM에 분산되어 있음\n// - 누가 언제 바꿨는지 추적 불가\n// - 실행 순서에 따라 결과가 달라짐\n//\n// React의 해법:\n// - 데이터를 state로 한 곳에 모음\n// - state가 바뀌면 UI를 자동으로 다시 그림\n// - DOM을 직접 건드리지 않음',
        dom: { count: 2, price: '₩15000', badge: 2, conflict: true, history: ['상태 불일치 — 직접 DOM 조작의 한계'] },
        problem: 'React는 이 문제를 "state → UI 자동 반영"으로 해결합니다',
      },
    ];

    // =========================================================
    // 2. DOM 시뮬레이션 화면
    // =========================================================
    function DomSimulation({ dom }) {
      return (
        <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
          <div className="text-xs text-slate-400 uppercase tracking-wider mb-3 font-bold">DOM 상태 (시뮬레이션)</div>

          {/* 장바구니 UI 시뮬레이션 */}
          <div className={`bg-white rounded-lg p-4 space-y-3 transition-all duration-300 ${dom.conflict ? 'ring-2 ring-red-400' : ''}`}>
            {/* 헤더 바 */}
            <div className="flex justify-between items-center bg-slate-100 rounded-lg px-3 py-2">
              <span className="text-sm font-bold text-slate-700">쇼핑몰</span>
              <div className="relative">
                <span className="text-sm">🛒</span>
                <span className={`absolute -top-1 -right-2 text-[10px] px-1.5 rounded-full font-bold ${
                  dom.conflict ? 'bg-red-500 text-white' : 'bg-sky-500 text-white'
                }`}>{dom.badge}</span>
              </div>
            </div>

            {/* 수량 */}
            <div className="flex justify-between items-center">
              <span className="text-sm text-slate-600">상품 수량</span>
              <span className="font-bold text-lg text-slate-800" id="sim-count">{dom.count}개</span>
            </div>

            {/* 가격 */}
            <div className="flex justify-between items-center">
              <span className="text-sm text-slate-600">총 가격</span>
              <span className={`font-bold text-lg ${dom.conflict ? 'text-red-600 line-through' : 'text-slate-800'}`}>
                {dom.price}
              </span>
              {dom.conflict && (
                <span className="text-sm font-bold text-red-600 ml-2">← 틀림!</span>
              )}
            </div>
          </div>

          {/* 변경 기록 */}
          <div className="mt-3 space-y-1">
            <div className="text-[10px] text-slate-400 font-bold">변경 기록</div>
            {dom.history.map((entry, idx) => (
              <div key={entry} className={`text-[11px] font-mono ${
                entry.includes('오류') ? 'text-red-400' : 'text-slate-300'
              }`}>
                {idx + 1}. {entry}
              </div>
            ))}
            {dom.history.length === 0 && <div className="text-[11px] text-slate-500">아직 변경 없음</div>}
          </div>

          {/* 문제 경고 */}
          {dom.conflict && (
            <div className="mt-2 bg-red-900/50 border border-red-700 rounded-lg p-2 text-xs text-red-300">
              화면 불일치 발생! 여러 스크립트가 DOM을 직접 수정해 데이터가 꼬였습니다.
            </div>
          )}
        </div>
      );
    }

    // =========================================================
    // 3. 메인 앱
    // =========================================================
    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); }
      };

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3500);
        } else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">I</div>
                <h1 className="text-2xl font-bold text-slate-800">JavaScript가 DOM을 직접 다루면?</h1>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                <code>document.getElementById</code>로 DOM을 직접 바꾸는 방식이 왜 문제가 되는지,
                <b> 여러 스크립트가 같은 DOM을 건드릴 때 벌어지는 일</b>을 시뮬레이션합니다.
              </p>
              <p className="mt-2 text-[11px] text-slate-400 italic">
                Chapter I-1-2 | 난이도 ★☆☆ | 선수 지식 I-1-1 | 2026-04-20
              </p>
            </header>

            <div className={`${stepData.problem ? 'bg-red-600' : 'bg-amber-600'} text-white p-5 rounded-xl shadow-sm min-h-[90px] transition-colors duration-300`}>
              <div className="text-xs font-bold text-amber-200 mb-1 uppercase tracking-wider">{stepData.title}</div>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
              {stepData.problem && (
                <p className="mt-2 text-sm font-bold text-red-100 bg-red-700/50 px-3 py-1 rounded">{stepData.problem}</p>
              )}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5 items-stretch">
              <div className="flex flex-col space-y-4">
                <DomSimulation dom={stepData.dom} />

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-3">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전" onClick={handlePrev} disabled={currentStepIdx === 0}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button onClick={togglePlay}
                      className="flex items-center px-4 py-2 rounded bg-amber-600 hover:bg-amber-700 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying ? '정지' : '자동 실행'}
                    </button>
                    <button aria-label="다음" onClick={() => { handleNext(); setIsPlaying(false); }} disabled={isEnd}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                    Step {currentStepIdx + 1} / {STEPS.length}
                  </div>
                </div>
              </div>

              <div className="relative min-h-[420px] lg:min-h-0 rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-slate-900 flex flex-col">
                  <div className="flex items-center gap-2 px-4 py-2 bg-slate-800 border-b border-slate-700">
                    <div className="flex gap-1.5">
                      <div className="w-3 h-3 rounded-full bg-red-500 opacity-70"></div>
                      <div className="w-3 h-3 rounded-full bg-yellow-400 opacity-70"></div>
                      <div className="w-3 h-3 rounded-full bg-emerald-500 opacity-70"></div>
                    </div>
                    <span className="text-xs text-slate-400 font-mono ml-2">
                      {currentStepIdx === 0 ? 'index.html' : currentStepIdx <= 4 ? `script-${['a','a','b','c','a'][currentStepIdx]}.js` : '해결 방향'}
                    </span>
                  </div>
                  <div className="p-4 overflow-y-auto flex-1 text-sm font-mono text-slate-300 leading-relaxed">
                    <pre className="whitespace-pre-wrap">{stepData.code}</pre>
                  </div>
                </div>
              </div>
            </div>

            <div className="bg-white border border-slate-200 rounded-xl p-4 text-xs text-slate-500 space-y-1">
              <div className="font-bold text-slate-700 mb-2">기술 참고</div>
              <div><b>명령형 프로그래밍(Imperative)</b>: "어떻게 바꿀지" 하나하나 지시하는 방식. DOM 직접 조작이 대표적이다.</div>
              <div><b>Single Source of Truth</b>: 데이터가 한 곳에만 존재하는 원칙. DOM에 데이터를 분산시키면 불일치가 발생한다.</div>
              <div><b>jQuery 시대</b>: 2006~2015년경 jQuery가 DOM 조작을 편리하게 만들었지만, 앱이 복잡해지면 같은 문제가 생겼다.</div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
