    // ─────────────────────────────────────────────────────

    // ─────────────────────────────────────────────────────
    // JsxListBox — map() 결과로 만들어진 JSX <li> 리스트 시각화

    // ─────────────────────────────────────────────────────
    const MODE_BADGE = {
      none:  { bg: 'bg-amber-100',   text: 'text-amber-800',   label: 'key 미지정' },
      id:    { bg: 'bg-emerald-100', text: 'text-emerald-800', label: 'key=id (안전)' },
      index: { bg: 'bg-rose-100',    text: 'text-rose-800',    label: 'key=index (위험)' },
      empty: { bg: 'bg-slate-200',   text: 'text-slate-700',   label: 'empty placeholder' },
      chain: { bg: 'bg-indigo-100',  text: 'text-indigo-800',  label: 'filter+sort+map' },
    };
    function JsxListBox({ list, keyMode }) {
      const badge = MODE_BADGE[keyMode] || MODE_BADGE.none;
      const styleFor = (item) => {
        if (item.good)     return ['border-emerald-300 bg-emerald-50', 'text-emerald-700 bg-emerald-100'];
        if (item.warn)     return ['border-amber-300 bg-amber-50',     'text-amber-700 bg-amber-100'];
        if (item.mismatch) return ['border-rose-300 bg-rose-50',       'text-rose-700 bg-rose-100'];
        if (item.empty)    return ['border-slate-300 bg-slate-100',    'text-slate-500 bg-white'];
        return ['border-slate-200 bg-slate-50', 'text-slate-600 bg-slate-100'];
      };
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 overflow-hidden">
          <div className="bg-emerald-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-emerald-700 flex items-center justify-between">

          <div className="p-2.5 space-y-1">
            <div className="text-[10px] font-mono text-slate-400">&lt;ul&gt;</div>
            {list.map((item) => {
              const [border, keyColor] = styleFor(item);
              return (
                <div key={item.id + item.key} className={`ml-3 flex items-center gap-2 border-2 rounded px-2 py-1 ${border}`}>
                  <span className="text-[10px] font-mono text-slate-400">&lt;li</span>
                  <span className={`text-[9px] font-mono font-bold px-1.5 py-0.5 rounded ${keyColor}`}>key={item.key}</span>
                  {item.wasKey && <span className="text-[9px] font-mono text-rose-500 line-through">was:{item.wasKey}</span>}

                  <span className="text-[11px] text-slate-700 flex-1">{item.label}</span>
                  <span className="text-[10px] font-mono text-slate-400">&lt;/li&gt;</span>
                </div>

    // ─────────────────────────────────────────────────────
    // DiffBox — reconciler 가 어떤 DOM 노드를 재사용/오인 매칭하는가
    // ─────────────────────────────────────────────────────
    const DIFF_STYLE = {
      reuse:  { bg: 'bg-emerald-50', text: 'text-emerald-700', border: 'border-emerald-300', label: '✅ 재사용' },
      wrong:  { bg: 'bg-rose-50',    text: 'text-rose-700',    border: 'border-rose-300',    label: '❌ 잘못 매칭' },

    function DiffBox({ diff }) {

      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">

    // ─────────────────────────────────────────────────────
    // PipelineBox — filter → sort → map 체이닝 단계 시각화
    // ─────────────────────────────────────────────────────
    function PipelineBox({ pipeline }) {
      if (!pipeline || pipeline.length === 0) return null;
      return (
        <div className="bg-white rounded-lg border-2 border-indigo-200 overflow-hidden">
          <div className="bg-indigo-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-indigo-700">함수형 파이프라인 단계</div>

    // ─────────────────────────────────────────────────────

    function FlowArrow({ label }) {

    // ─────────────────────────────────────────────────────

    //   ↓ map()

    //   ↓ render
    //   하단 : 렌더링된 <ul>/<li> 리스트
    //   부가 : DiffBox (key 비교) 또는 PipelineBox (체이닝)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📋 배열 → map() → JSX 리스트 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-1">
            {/* 1) 입력 — 원본 / 변환 코드 비교 */}
            <div className="grid grid-cols-2 gap-2">

              <CodeCard label={step.codeRightLabel} code={step.codeRight} accent="out" />

            <FlowArrow label="map() 변환" />

            {/* 2) 중간 — 원본 데이터 배열 */}
            <DataArrayBox data={step.data} />

            {step.pipeline && (
              <>
                <FlowArrow label="filter → sort" />
                <PipelineBox pipeline={step.pipeline} />

            )}

            <FlowArrow label="React 렌더" />

            {/* 3) 출력 — JSX 리스트 */}
            <JsxListBox list={step.list} keyMode={step.keyMode} />

            {/* 4) reconciler diff (key 비교용) */}
            {step.diff && (
              <>
                <FlowArrow label="reconciler 매칭" />
                <DiffBox diff={step.diff} />

          {/* 경고 박스 */}
          {step.warning && (
            <div className="mt-3 bg-rose-50 border-l-4 border-rose-400 px-3 py-2 rounded-r">
              <div className="text-[9px] font-bold text-rose-600 uppercase tracking-wider mb-0.5">주의</div>

    // ─────────────────────────────────────────────────────

    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;

      return (

            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}

                  const highlighted = code.highlight && code.highlight.includes(i + 1);

            <span>{code.lines.length} lines</span>

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="./index.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; 목차로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter III-B-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">B2</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III-B. React 컴포넌트 심화 &gt; Chapter 2. 리스트 렌더링</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-B-2. 리스트 렌더링 — 배열 → JSX</h1>
                  <p className="text-sm text-slate-500 mt-0.5">map() / key / index 함정 / 빈 리스트 / sort·filter 체이닝</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-indigo-50 border-2 border-indigo-300 rounded-xl p-3 text-sm text-indigo-900">
                💡 정리: 리스트 렌더링은 <strong>map()</strong> 한 줄로 시작해서, <strong>key=고유 ID</strong>로 안정성을 잡고, <strong>빈 상태 처리</strong>와 <strong>filter/sort 체이닝</strong>으로 마무리한다. 다음(III-B-3)에서는 이벤트 핸들러를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-indigo-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition min-w-[100px]">
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['map()', 'key', 'index 함정', 'reconciler', 'empty state', 'filter()', 'sort()', 'useMemo'].map((kw) => (
                <span key={kw} className="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-xs font-medium border border-indigo-200">{kw}</span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-03b-01-conditional-rendering.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; III-B-1 조건부 렌더링</a>
              <a href="./chapter-03b-03-event-handler.html" className="text-indigo-700 hover:text-indigo-900 font-medium">III-B-3 이벤트 핸들러 &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
