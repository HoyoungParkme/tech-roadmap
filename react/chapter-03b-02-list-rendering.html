<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리스트 렌더링 — 배열을 화면에 그리기 — Chapter III-B-2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter III-B-2 — 리스트 렌더링: 배열을 화면에 그리기 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =========================================================
    // 1. STEPS 정의 — 리스트 렌더링 핵심 5단계
    // =========================================================
    const STEPS = [
      {
        id: 'step-map-concept',
        title: 'Step 1 — map()이란?',
        desc: 'map()은 배열의 각 항목을 변환하여 새 배열을 만드는 메서드입니다. React에서는 데이터 배열을 JSX 요소 배열로 변환하는 데 핵심적으로 사용됩니다.',
        code: '// JavaScript의 map()\nconst numbers = [1, 2, 3];\nconst doubled = numbers.map(n => n * 2);\n// [2, 4, 6]\n\n// React에서의 map()\nconst fruits = ["사과", "바나나", "포도"];\nreturn (\n  <ul>\n    {fruits.map(fruit => (\n      <li key={fruit}>{fruit}</li>\n    ))}\n  </ul>\n);',
        mode: 'concept',
      },
      {
        id: 'step-basic-list',
        title: 'Step 2 — 기본 리스트 렌더링',
        desc: '배열.map()으로 각 항목을 JSX로 변환합니다. 각 항목에는 반드시 고유한 key prop을 지정해야 합니다. key는 데이터의 고유 ID를 사용하는 것이 가장 좋습니다.',
        code: 'const users = [\n  { id: "u1", name: "김철수" },\n  { id: "u2", name: "이영희" },\n  { id: "u3", name: "박민수" },\n];\n\nreturn (\n  <ul>\n    {users.map(user => (\n      <li key={user.id}>\n        {user.name}\n      </li>\n    ))}\n  </ul>\n);',
        mode: 'basic-list',
      },
      {
        id: 'step-key-role',
        title: 'Step 3 — key prop의 역할',
        desc: 'key는 React가 어떤 항목이 추가/삭제/이동되었는지 추적하는 데 사용됩니다. 올바른 key가 없으면 React는 불필요하게 DOM을 다시 만들어 성능이 저하됩니다.',
        code: '// ✅ 좋은 key: 고유한 데이터 ID\n{users.map(user => (\n  <li key={user.id}>{user.name}</li>\n))}\n\n// ❌ 나쁜 key: 배열 인덱스\n{users.map((user, index) => (\n  <li key={index}>{user.name}</li>\n))}\n// → 항목 추가/삭제/정렬 시 문제 발생\n\n// ❌ 최악의 key: Math.random()\n// → 매 렌더링마다 key가 바뀜',
        mode: 'key-demo',
      },
      {
        id: 'step-filter',
        title: 'Step 4 — filter()와 조합',
        desc: 'filter()로 배열을 먼저 걸러낸 뒤 map()으로 렌더링하면, 특정 조건의 항목만 표시할 수 있습니다. 체이닝으로 깔끔하게 작성할 수 있습니다.',
        code: 'const todos = [\n  { id: "t1", text: "React 학습", done: true },\n  { id: "t2", text: "map 이해", done: false },\n  { id: "t3", text: "key 학습", done: false },\n];\n\n// filter + map 체이닝\nconst activeTodos = todos\n  .filter(todo => !todo.done)\n  .map(todo => (\n    <li key={todo.id}>{todo.text}</li>\n  ));',
        mode: 'filter-demo',
      },
      {
        id: 'step-todo-app',
        title: 'Step 5 — 인터랙티브 Todo 리스트',
        desc: '직접 할 일을 추가하고, 완료 체크하고, 필터링해 보세요. map, filter, key가 실제 앱에서 어떻게 사용되는지 체험할 수 있습니다.',
        code: 'function TodoApp() {\n  const [todos, setTodos] = useState([]);\n  const [filter, setFilter] = useState("all");\n\n  const filtered = todos.filter(t =>\n    filter === "all" ? true\n    : filter === "active" ? !t.done\n    : t.done\n  );\n\n  return filtered.map(todo => (\n    <TodoItem key={todo.id} todo={todo} />\n  ));\n}',
        mode: 'todo-app',
      },
    ];

    // =========================================================
    // 2. 시각화 컴포넌트들
    // =========================================================

    // --- map 개념 다이어그램 ---
    function MapConceptDiagram() {
      const SOURCE_DATA = [
        { id: 'fruit-apple', name: '사과', emoji: '&#127822;' },
        { id: 'fruit-banana', name: '바나나', emoji: '&#127820;' },
        { id: 'fruit-grape', name: '포도', emoji: '&#127815;' },
      ];

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-4 uppercase tracking-wider">배열 → map() → UI 변환</div>
          <div className="flex items-center gap-3 justify-center">
            {/* 배열 */}
            <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-center">
              <div className="text-[10px] font-bold text-amber-600 mb-2">데이터 배열</div>
              {SOURCE_DATA.map(item => (
                <div key={item.id} className="text-xs text-amber-700 font-mono py-0.5">"{item.name}"</div>
              ))}
            </div>

            {/* 화살표 */}
            <div className="text-center">
              <div className="text-slate-400 text-lg font-bold">&rarr;</div>
              <div className="text-[10px] text-slate-400 font-bold">.map()</div>
            </div>

            {/* JSX 결과 */}
            <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-center">
              <div className="text-[10px] font-bold text-emerald-600 mb-2">JSX 요소</div>
              {SOURCE_DATA.map(item => (
                <div key={item.id} className="text-xs text-emerald-700 py-0.5">
                  <span dangerouslySetInnerHTML={{__html: item.emoji}} /> {item.name}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // --- 기본 리스트 데모 ---
    function BasicListDemo() {
      const USERS = [
        { id: 'user-1', name: '김철수', role: '개발자' },
        { id: 'user-2', name: '이영희', role: '디자이너' },
        { id: 'user-3', name: '박민수', role: '기획자' },
      ];

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">렌더링 결과</div>
          <div className="space-y-2">
            {USERS.map(user => (
              <div key={user.id} className="flex items-center gap-3 bg-slate-50 rounded-lg p-3 border border-slate-200">
                <div className="w-8 h-8 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-700 text-xs font-bold">
                  {user.name[0]}
                </div>
                <div>
                  <div className="text-sm font-bold text-slate-700">{user.name}</div>
                  <div className="text-[10px] text-slate-500">{user.role}</div>
                </div>
                <div className="ml-auto text-[10px] font-mono text-slate-400 bg-slate-100 px-2 py-1 rounded">key="{user.id}"</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // --- Key 역할 비교 데모 ---
    function KeyDemo() {
      const [items, setItems] = useState([
        { id: 'k1', text: '항목 A' },
        { id: 'k2', text: '항목 B' },
        { id: 'k3', text: '항목 C' },
      ]);
      const [nextId, setNextId] = useState(4);
      const [highlight, setHighlight] = useState(null);

      const addToFront = () => {
        const newItem = { id: `k${nextId}`, text: `항목 ${String.fromCharCode(64 + nextId)}` };
        setItems([newItem, ...items]);
        setNextId(prev => prev + 1);
        setHighlight(newItem.id);
        setTimeout(() => setHighlight(null), 1500);
      };

      const removeFirst = () => {
        if (items.length > 1) {
          setItems(items.slice(1));
        }
      };

      const HIGHLIGHT_ON = 'bg-emerald-100 border-emerald-400';
      const HIGHLIGHT_OFF = 'bg-slate-50 border-slate-200';

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">key가 있는 경우 vs 없는 경우</div>
          <div className="flex gap-2 mb-4">
            <button onClick={addToFront}
              className="px-3 py-1.5 bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-bold rounded-lg transition">
              + 맨 앞에 추가
            </button>
            <button onClick={removeFirst}
              className="px-3 py-1.5 bg-red-500 hover:bg-red-600 text-white text-xs font-bold rounded-lg transition">
              - 첫 번째 삭제
            </button>
          </div>

          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="text-[10px] font-bold text-emerald-600 mb-2">key={'{item.id}'} (올바른 key)</div>
              <div className="space-y-1">
                {items.map(item => (
                  <div key={item.id}
                    className={`text-xs font-mono px-3 py-2 rounded-lg border-2 transition-all duration-300 ${item.id === highlight ? HIGHLIGHT_ON : HIGHLIGHT_OFF}`}>
                    {item.text} <span className="text-slate-400">({item.id})</span>
                  </div>
                ))}
              </div>
              <div className="text-[10px] text-emerald-600 mt-2">React가 정확히 추적 가능</div>
            </div>
            <div>
              <div className="text-[10px] font-bold text-red-600 mb-2">key={'{index}'} (나쁜 key)</div>
              <div className="space-y-1">
                {items.map((item, i) => (
                  <div key={`idx-${i}`}
                    className="text-xs font-mono px-3 py-2 rounded-lg border-2 bg-red-50 border-red-200">
                    {item.text} <span className="text-red-400">(index: {i})</span>
                  </div>
                ))}
              </div>
              <div className="text-[10px] text-red-600 mt-2">인덱스가 밀려서 전부 재렌더링</div>
            </div>
          </div>
        </div>
      );
    }

    // --- Filter 데모 ---
    function FilterDemo() {
      const [filter, setFilter] = useState('all');
      const TODOS = [
        { id: 'ft-1', text: 'React 학습', done: true },
        { id: 'ft-2', text: 'map() 이해', done: false },
        { id: 'ft-3', text: 'key 학습', done: false },
        { id: 'ft-4', text: 'JSX 작성', done: true },
      ];

      const filtered = TODOS.filter(todo =>
        filter === 'all' ? true
        : filter === 'active' ? !todo.done
        : todo.done
      );

      const FILTER_CLASSES = {
        all: 'bg-slate-600 text-white',
        active: 'bg-amber-500 text-white',
        done: 'bg-emerald-500 text-white',
      };

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">filter() + map() 체이닝</div>
          <div className="flex gap-2 mb-4">
            {['all', 'active', 'done'].map(f => (
              <button key={f} onClick={() => setFilter(f)}
                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${filter === f ? FILTER_CLASSES[f] : 'bg-slate-100 text-slate-500'}`}>
                {f === 'all' ? '전체' : f === 'active' ? '미완료' : '완료'}
              </button>
            ))}
          </div>
          <div className="space-y-2">
            {filtered.map(todo => (
              <div key={todo.id}
                className={`flex items-center gap-2 text-sm px-3 py-2 rounded-lg border ${todo.done ? 'bg-emerald-50 border-emerald-200 text-emerald-700 line-through' : 'bg-white border-slate-200 text-slate-700'}`}>
                <span>{todo.done ? '✓' : '○'}</span>
                <span>{todo.text}</span>
                <span className="ml-auto text-[10px] font-mono text-slate-400">key="{todo.id}"</span>
              </div>
            ))}
            {filtered.length === 0 && (
              <div className="text-sm text-slate-400 text-center py-4">해당 항목 없음</div>
            )}
          </div>
          <div className="mt-3 text-[10px] text-slate-500">
            .filter({filter === 'all' ? '전체' : filter === 'active' ? '!todo.done' : 'todo.done'}).map() → {filtered.length}건 렌더링
          </div>
        </div>
      );
    }

    // --- 인터랙티브 Todo App ---
    function TodoApp() {
      const [todos, setTodos] = useState([
        { id: 'todo-1', text: 'React 기초 학습', done: true },
        { id: 'todo-2', text: 'map으로 리스트 렌더링', done: false },
        { id: 'todo-3', text: 'key prop 이해하기', done: false },
      ]);
      const [input, setInput] = useState('');
      const [filter, setFilter] = useState('all');
      const [nextNum, setNextNum] = useState(4);

      const addTodo = () => {
        if (!input.trim()) return;
        const newTodo = { id: `todo-${nextNum}`, text: input.trim(), done: false };
        setTodos(prev => [...prev, newTodo]);
        setNextNum(prev => prev + 1);
        setInput('');
      };

      const toggleTodo = (id) => {
        setTodos(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));
      };

      const deleteTodo = (id) => {
        setTodos(prev => prev.filter(t => t.id !== id));
      };

      const filtered = todos.filter(t =>
        filter === 'all' ? true
        : filter === 'active' ? !t.done
        : t.done
      );

      const FILTER_CLASSES = {
        all: 'bg-slate-600 text-white',
        active: 'bg-amber-500 text-white',
        done: 'bg-emerald-500 text-white',
      };

      return (
        <div className="space-y-4">
          <div className="bg-white rounded-xl p-5 border border-slate-200">
            <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Mini Todo App</div>

            {/* 입력 */}
            <div className="flex gap-2 mb-4">
              <input value={input} onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addTodo()}
                placeholder="할 일을 입력하세요..."
                className="flex-1 px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400" />
              <button onClick={addTodo}
                className="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-lg text-sm transition">
                추가
              </button>
            </div>

            {/* 필터 */}
            <div className="flex gap-2 mb-4">
              {['all', 'active', 'done'].map(f => (
                <button key={f} onClick={() => setFilter(f)}
                  className={`px-3 py-1 rounded-lg text-xs font-bold transition ${filter === f ? FILTER_CLASSES[f] : 'bg-slate-100 text-slate-500'}`}>
                  {f === 'all' ? `전체 (${todos.length})` : f === 'active' ? `미완료 (${todos.filter(t => !t.done).length})` : `완료 (${todos.filter(t => t.done).length})`}
                </button>
              ))}
            </div>

            {/* 리스트 */}
            <div className="space-y-2">
              {filtered.map(todo => (
                <div key={todo.id}
                  className={`flex items-center gap-3 px-3 py-2 rounded-lg border transition ${todo.done ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-200'}`}>
                  <button onClick={() => toggleTodo(todo.id)}
                    className={`w-5 h-5 rounded-full border-2 flex items-center justify-center text-[10px] transition ${todo.done ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300 hover:border-emerald-400'}`}>
                    {todo.done && '✓'}
                  </button>
                  <span className={`text-sm flex-1 ${todo.done ? 'line-through text-slate-400' : 'text-slate-700'}`}>{todo.text}</span>
                  <span className="text-[10px] font-mono text-slate-400">{todo.id}</span>
                  <button onClick={() => deleteTodo(todo.id)}
                    className="text-red-400 hover:text-red-600 text-xs font-bold transition">
                    ✕
                  </button>
                </div>
              ))}
              {filtered.length === 0 && (
                <div className="text-sm text-slate-400 text-center py-6">할 일이 없습니다</div>
              )}
            </div>
          </div>

          <div className="bg-slate-900 rounded-xl p-3 border border-slate-700">
            <div className="text-[10px] text-slate-400 font-bold uppercase mb-1">현재 상태</div>
            <div className="text-xs font-mono text-slate-300">
              todos: [{todos.map(t => `{'{'}id:"${t.id}", done:${t.done}{'}'}`).join(', ')}]
            </div>
          </div>
        </div>
      );
    }

    // =========================================================
    // 3. 코드 패널
    // =========================================================
    function CodePanel({ code }) {
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-emerald-500"></div>
            </div>
            <span className="text-[10px] text-slate-500 ml-2">ListRendering.jsx</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    // =========================================================
    // 4. 메인 App
    // =========================================================
    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => {
        setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      };
      const nextRef = useRef(next);
      nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-emerald-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-500 text-white flex items-center justify-center rounded-full font-bold text-sm select-none">III-B</div>
                <h1 className="text-2xl font-bold text-slate-800">리스트 렌더링 — 배열을 화면에 그리기</h1>
              </div>
              <p className="text-slate-600 text-sm">map()으로 배열을 UI로 변환하고, <b>key prop</b>과 <b>filter()</b>를 활용하는 법을 학습합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter III-B-2 | ★★☆ | 선수 지식 III-B-1 | 2026-04-21</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-emerald-500' : 'bg-slate-200'}`}
                  aria-label={`Step ${i + 1}`}
                />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {step.mode === 'concept' && <MapConceptDiagram />}
                {step.mode === 'basic-list' && <BasicListDemo />}
                {step.mode === 'key-demo' && <KeyDemo />}
                {step.mode === 'filter-demo' && <FilterDemo />}
                {step.mode === 'todo-app' && <TodoApp />}
              </div>

              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-emerald-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>

                <div className="mt-4 bg-emerald-50 border border-emerald-200 rounded-lg p-3">
                  <div className="text-[10px] text-emerald-600 font-bold uppercase mb-1">핵심 포인트</div>
                  <p className="text-xs text-emerald-700">
                    {idx === 0 && 'map()은 원본 배열을 바꾸지 않고 새 배열을 반환합니다. React에서 데이터→UI 변환의 핵심 도구입니다.'}
                    {idx === 1 && 'key는 각 항목의 "신분증"입니다. 데이터의 고유 ID(DB id 등)를 사용하는 것이 가장 안전합니다.'}
                    {idx === 2 && 'key가 안정적이어야 React가 최소한의 DOM 업데이트만 수행합니다. index key는 항목 순서가 바뀔 때 버그를 유발합니다.'}
                    {idx === 3 && 'filter()로 먼저 걸러내고 map()으로 변환하는 패턴은 React에서 매우 자주 쓰입니다.'}
                    {idx === 4 && '추가(spread), 삭제(filter), 수정(map)으로 불변하게 배열 state를 업데이트하는 것이 React의 핵심 패턴입니다.'}
                  </p>
                </div>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }}
                disabled={idx === 0}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="이전 단계"
              >&larr; 이전</button>
              <button onClick={() => { if (isEnd) setIdx(0); setIsPlaying(p => !p); }}
                className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${
                  isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-emerald-500 hover:bg-emerald-600 text-white'
                }`}
                aria-label={isPlaying ? '정지' : '자동 실행'}
              >{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }}
                disabled={isEnd}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="다음 단계"
              >다음 &rarr;</button>
            </div>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
