<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>외부 상태 라이브러리 — Zustand / Redux Toolkit — Chapter V-1-2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter V-1-2 — 외부 상태 라이브러리: Zustand vs Redux Toolkit -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1 — Context의 한계',
        desc: 'Context API는 "드물게 바뀌는 전역 값"에 적합합니다. 하지만 자주 바뀌는 값(장바구니, 알림 등)에 쓰면 Provider 아래 모든 컴포넌트가 리렌더링됩니다. 외부 상태 라이브러리는 이 문제를 해결합니다.',
        code: '// Context의 문제 — Provider value가 바뀌면\n// 아래 모든 컴포넌트가 리렌더링!\n<CartContext.Provider value={cart}>\n  <Header />     ← 리렌더링 (cart 안 씀)\n  <ProductList /> ← 리렌더링 (cart 안 씀)\n  <CartButton />  ← 리렌더링 (cart 사용)\n</CartContext.Provider>\n\n// 외부 라이브러리 → 구독한 컴포넌트만 리렌더링',
        visual: 'problem',
      },
      {
        title: 'Step 2 — Zustand: 심플한 스토어',
        desc: 'Zustand는 "전역 상태를 가진 커스텀 Hook" 수준입니다. create() 한 번으로 스토어를 만들고, 컴포넌트에서 Hook처럼 씁니다. Provider도 필요 없습니다.',
        code: 'import { create } from "zustand";\n\n// 1. 스토어 만들기 (3줄!)\nconst useCartStore = create((set) => ({\n  items: [],\n  addItem: (item) => set((state) => ({\n    items: [...state.items, item],\n  })),\n  clearCart: () => set({ items: [] }),\n}));\n\n// 2. 컴포넌트에서 사용\nfunction CartButton() {\n  const items = useCartStore((s) => s.items);\n  return <span>🛒 {items.length}</span>;\n}',
        visual: 'zustand',
      },
      {
        title: 'Step 3 — Redux Toolkit: 구조화된 상태',
        desc: 'Redux Toolkit(RTK)은 Redux의 공식 권장 도구입니다. Slice(상태+액션 묶음) → Store(중앙 저장소) → Dispatch(액션 발행) 구조로, 대규모 팀에서 상태 흐름을 추적하기 좋습니다.',
        code: 'import { createSlice, configureStore } from "@reduxjs/toolkit";\n\n// 1. Slice 만들기\nconst cartSlice = createSlice({\n  name: "cart",\n  initialState: { items: [] },\n  reducers: {\n    addItem: (state, action) => {\n      state.items.push(action.payload); // Immer 덕분에 직접 수정 가능!\n    },\n    clearCart: (state) => {\n      state.items = [];\n    },\n  },\n});\n\n// 2. Store 구성\nconst store = configureStore({\n  reducer: { cart: cartSlice.reducer },\n});\n\n// 3. 컴포넌트에서 사용\nconst items = useSelector((s) => s.cart.items);\nconst dispatch = useDispatch();\ndispatch(addItem({ id: 1, name: "React 책" }));',
        visual: 'redux',
      },
      {
        title: 'Step 4 — 코드량 비교',
        desc: '같은 "장바구니" 기능을 Zustand와 RTK로 구현했을 때 코드량 차이입니다. Zustand는 10줄, RTK는 25줄 정도. 하지만 RTK는 DevTools, 미들웨어, 타임트래블 디버깅 같은 강력한 도구를 제공합니다.',
        code: null,
        visual: 'compare',
      },
      {
        title: 'Step 5 — 선택 기준',
        desc: '프로젝트 상황에 따라 최적의 도구가 다릅니다. 팀 규모, 상태 복잡도, 디버깅 요구사항을 기준으로 선택합니다.',
        code: null,
        visual: 'decision',
      },
    ];

    function ProblemVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Context vs 외부 라이브러리</div>
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-red-50 border border-red-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-red-600 mb-2">Context — 전체 리렌더링</div>
              <div className="space-y-1">
                {['Header', 'ProductList', 'CartButton'].map((n) => (
                  <div key={n} className="bg-red-100 rounded px-2 py-1 text-[10px] text-red-700 font-mono flex items-center gap-1">
                    <span className="text-red-400">🔄</span> {n}
                  </div>
                ))}
              </div>
            </div>
            <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-emerald-600 mb-2">Zustand/RTK — 선택적 리렌더링</div>
              <div className="space-y-1">
                {[{ n: 'Header', active: false }, { n: 'ProductList', active: false }, { n: 'CartButton', active: true }].map((c) => (
                  <div key={c.n} className={`rounded px-2 py-1 text-[10px] font-mono flex items-center gap-1 ${c.active ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-400'}`}>
                    {c.active ? <span>🔄</span> : <span>⏸</span>} {c.n}
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ZustandVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Zustand 구조</div>
          <div className="flex flex-col items-center gap-2">
            <div className="bg-amber-100 border-2 border-amber-300 rounded-xl px-4 py-2 text-center">
              <div className="text-xs font-bold text-amber-700">create() → useStore</div>
              <div className="text-[10px] text-amber-600">스토어 = Hook</div>
            </div>
            <div className="text-amber-400">↓</div>
            <div className="flex gap-3">
              {['컴포넌트 A', '컴포넌트 B', '컴포넌트 C'].map((name) => (
                <div key={name} className="bg-amber-50 border border-amber-200 rounded-lg px-3 py-1.5 text-[10px] font-bold text-amber-700">{name}</div>
              ))}
            </div>
            <div className="text-[10px] text-slate-500 mt-1">Provider 없이 어디서든 useStore() 호출</div>
          </div>
        </div>
      );
    }

    function ReduxVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Redux Toolkit 흐름</div>
          <div className="flex items-center gap-2 text-xs justify-center flex-wrap">
            {[
              { label: 'UI', sub: 'dispatch()', color: 'bg-sky-50 border-sky-200' },
              { label: 'Action', sub: 'addItem()', color: 'bg-violet-50 border-violet-200' },
              { label: 'Reducer', sub: 'slice 처리', color: 'bg-amber-50 border-amber-200' },
              { label: 'Store', sub: '상태 저장', color: 'bg-emerald-50 border-emerald-200' },
              { label: 'UI', sub: 'useSelector', color: 'bg-sky-50 border-sky-200' },
            ].map((item, i, arr) => (
              <React.Fragment key={`${item.label}-${i}`}>
                <div className={`${item.color} border rounded-lg px-3 py-2 text-center`}>
                  <div className="font-bold text-slate-700">{item.label}</div>
                  <div className="text-[9px] text-slate-500">{item.sub}</div>
                </div>
                {i < arr.length - 1 && <span className="text-slate-300">→</span>}
              </React.Fragment>
            ))}
          </div>
          <div className="mt-2 text-[10px] text-slate-500 text-center">단방향 데이터 흐름: UI → Action → Reducer → Store → UI</div>
        </div>
      );
    }

    function CompareVisual() {
      const data = [
        { category: '설치', zustand: 'npm i zustand (8KB)', rtk: 'npm i @reduxjs/toolkit react-redux (40KB)' },
        { category: '스토어 생성', zustand: 'create() 1줄', rtk: 'createSlice + configureStore' },
        { category: '컴포넌트 연결', zustand: 'useStore() Hook', rtk: 'Provider + useSelector + useDispatch' },
        { category: 'DevTools', zustand: '미들웨어 추가 필요', rtk: '내장 지원' },
        { category: '학습 곡선', zustand: '낮음', rtk: '중간' },
        { category: '번들 크기', zustand: '~1KB', rtk: '~11KB' },
      ];
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200 overflow-x-auto">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Zustand vs Redux Toolkit</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="border-b">
                <th className="text-left py-1.5 text-slate-600 pr-3">항목</th>
                <th className="text-left py-1.5 text-amber-600">Zustand</th>
                <th className="text-left py-1.5 text-violet-600">Redux Toolkit</th>
              </tr>
            </thead>
            <tbody>
              {data.map((row) => (
                <tr key={row.category} className="border-b border-slate-100">
                  <td className="py-1.5 font-bold text-slate-700 pr-3">{row.category}</td>
                  <td className="py-1.5 text-slate-600">{row.zustand}</td>
                  <td className="py-1.5 text-slate-600">{row.rtk}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function DecisionVisual() {
      const [teamSize, setTeamSize] = useState(null);
      const scenarios = [
        { label: '1~3명 소규모', recommendation: 'Zustand', reason: '설정 최소, 빠른 시작. Provider 불필요.', team: 'small', badgeClass: 'bg-amber-100 text-amber-700' },
        { label: '3~10명 중규모', recommendation: 'Zustand or RTK', reason: '상태 복잡도에 따라 판단. DevTools 필요하면 RTK.', team: 'medium', badgeClass: 'bg-slate-100 text-slate-600' },
        { label: '10명+ 대규모', recommendation: 'Redux Toolkit', reason: '엄격한 패턴, DevTools, 미들웨어. 팀 규약 통일에 유리.', team: 'large', badgeClass: 'bg-violet-100 text-violet-700' },
      ];
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">팀 규모별 추천</div>
          <div className="space-y-2">
            {scenarios.map((s) => (
              <button key={s.team} onClick={() => setTeamSize(s.team)}
                className={`w-full text-left p-3 rounded-xl border-2 transition ${
                  teamSize === s.team ? 'border-indigo-400 bg-indigo-50 shadow-md' : 'border-slate-200 bg-white hover:border-slate-300'
                }`}>
                <div className="flex items-center justify-between">
                  <span className="text-sm font-bold text-slate-800">{s.label}</span>
                  <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${s.badgeClass}`}>{s.recommendation}</span>
                </div>
                {teamSize === s.team && <p className="text-xs text-slate-600 mt-1">{s.reason}</p>}
              </button>
            ))}
          </div>
        </div>
      );
    }

    function CodePanel({ code }) {
      if (!code) return null;
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5"><div className="w-3 h-3 rounded-full bg-red-500"></div><div className="w-3 h-3 rounded-full bg-yellow-500"></div><div className="w-3 h-3 rounded-full bg-emerald-500"></div></div>
            <span className="text-[10px] text-slate-500 ml-2">store.js</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => { setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; }); };
      const nextRef = useRef(next); nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const VISUAL_MAP = { problem: ProblemVisual, zustand: ZustandVisual, redux: ReduxVisual, compare: CompareVisual, decision: DecisionVisual };
      const VisualComponent = VISUAL_MAP[step.visual];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-indigo-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">V</div>
                <h1 className="text-2xl font-bold text-slate-800">외부 상태 라이브러리 — Zustand / Redux Toolkit</h1>
              </div>
              <p className="text-slate-600 text-sm"><b>Zustand</b>와 <b>Redux Toolkit</b>의 차이를 코드와 구조로 비교합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter V-1-2 | ★★★ | 선수 지식 V-1-1 | 2026-04-21</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.title} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-indigo-500' : 'bg-slate-200'}`} aria-label={`Step ${i + 1}`} />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {VisualComponent && <VisualComponent />}
              </div>
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-indigo-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }} disabled={idx === 0} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="이전 단계">← 이전</button>
              <button onClick={() => { if (isEnd) { setIdx(0); } setIsPlaying(p => !p); }} className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-indigo-500 hover:bg-indigo-600 text-white'}`} aria-label={isPlaying ? '정지' : '자동 실행'}>{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }} disabled={isEnd} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="다음 단계">다음 →</button>
            </div>
            <footer className="text-center text-xs text-slate-400 pb-4">React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21</footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
