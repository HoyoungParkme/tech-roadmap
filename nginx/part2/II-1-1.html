<body>

  <!-- II-1-1 proxy_pass — 리버스 프록시의 기본 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 백엔드 FastAPI 가 8000 포트에서 동작',
        desc: '리버스 프록시 시나리오. uvicorn 으로 FastAPI 가 localhost:8000 에서 실행 중이다. 외부에서는 직접 8000 으로 못 들어오게 막고, Nginx 가 80/443 을 받아서 안쪽 8000 으로 전달한다.',
        clientPath: '/',
        backendPath: '—',
        backend: 'http://localhost:8000',
        verdict: '백엔드 준비',
        verdictTone: 'good',
        keyPoint: '왜 Nginx 를 앞에 둘까? TLS 종단, 정적 가속, 로드 밸런싱, 보안, 로그 일원화 — 한 번에 다 해결.',
        code: {
          lang: 'python',
          filename: 'app/main.py',
          lines: [
            '"""FastAPI 백엔드 — 단순 데모"""',

            '',
            'app = FastAPI(title="demo-api")',

            '@app.get("/users/{user_id}")',

            '@app.get("/health")',
            'def health():',
            '    return {"status": "ok"}',
            '',
            '# 실행',
            '#  $ uvicorn app.main:app --host 127.0.0.1 --port 8000',
            '',
            '# 외부 노출 금지',
            '#  • --host 0.0.0.0 으로 띄우지 말고',
            '#  • 127.0.0.1 또는 docker 내부 네트워크만',
            '#  • 외부는 무조건 Nginx 통해서만 접근',
            '',
            '# 왜 Nginx 를 앞에 두는가',

            '#  3. 로드 밸런싱 (uvicorn 여러 개)',
            '#  4. rate limiting / 보안 헤더',
            '#  5. 캐싱 (proxy_cache)',
            '#  6. gzip 압축',
            '#  7. 로그 일원화',
          ],
          highlight: [4, 6, 7, 8, 10, 11, 12, 14, 15, 16, 19, 22, 23, 24, 27, 28, 29, 30, 31, 32, 33],
        },
      },
      {
        title: 'Step 2. location /api/ { proxy_pass ... }',
        desc: '가장 기본형. /api/ 로 들어온 요청을 백엔드로 그대로 전달. proxy_pass 가 핵심. 백엔드는 자기가 80/443 뒤에 있는지 모른다 — 그냥 평소처럼 응답.',
        clientPath: '/api/users/42',
        backendPath: '/users/42',
        backend: 'http://localhost:8000',
        verdict: '프록시 동작',
        verdictTone: 'good',
        keyPoint: 'proxy_pass 뒤 URL 에 path 가 있고 location 이 / 로 끝나면 path 가 replace 된다 (Step 3 참조).',
        code: {
          lang: 'nginx',
          filename: 'conf.d/api.conf',
          lines: [
            '# 가장 단순한 리버스 프록시',
            '',
            'server {',
            '    listen 80;',
            '    server_name api.example.com;',
            '',
            '    location /api/ {',
            '        proxy_pass http://localhost:8000/;',
            '    }',
            '}',
            '',
            '# 동작',
            '#  • 클라이언트: GET http://api.example.com/api/users/42',
            '#  • Nginx 가 받음 → /api/ 매칭 → 백엔드로 전달',
            '#  • 백엔드 입장: GET http://127.0.0.1:8000/users/42',
            '#  •   (앞의 /api/ 가 잘려나가고 / 로 치환됨)',
            '',
            '# 응답 흐름',
            '#  • 백엔드가 JSON 응답',
            '#  • Nginx 가 그대로 클라이언트에 전달',
            '#  • 헤더에 Server: nginx 가 추가됨',
            '',
            '# 단순화한 형태 — upstream 안 쓰고 직접',
            'location / {',
            '    proxy_pass http://127.0.0.1:8000;',
            '}',
            '',
            '# Docker 환경에서는 컨테이너 이름이 호스트',
            'location / {',
            '    proxy_pass http://app:8000;',

          ],
          highlight: [3, 4, 5, 7, 8, 9, 12, 13, 14, 15, 16, 18, 19, 20, 21, 24, 25, 26, 29, 30, 31],
        },
      },
      {
        title: 'Step 3. trailing slash — 가장 큰 함정',
        desc: 'proxy_pass 의 URL 에 path 가 있으면 location 의 prefix 를 잘라낸다. 없으면 클라이언트 URI 를 그대로 이어붙인다. 이 한 글자 차이가 404 의 원인.',
        clientPath: '/api/users/42',
        backendPath: 'depends on slash',
        backend: 'http://app:8000',
        verdict: '슬래시 주의',
        verdictTone: 'warn',
        keyPoint: 'proxy_pass http://app:8000;  (path 없음) → /api/users/42 그대로. proxy_pass http://app:8000/;  (/) → /users/42 로 치환.',
        code: {
          lang: 'nginx',
          filename: 'trailing-slash.conf',
          lines: [
            '# proxy_pass 의 trailing slash 4가지 케이스',
            '',
            '# location /api/  &  요청 GET /api/users/42',
            '',
            '# ── 케이스 ① path 있고 slash ──',
            'location /api/ {',
            '    proxy_pass http://app:8000/;',
            '}',
            '# → 백엔드 GET /users/42         ← /api/ 가 / 로 치환',
            '',
            '# ── 케이스 ② path 없음 ───────',
            'location /api/ {',
            '    proxy_pass http://app:8000;',
            '}',
            '# → 백엔드 GET /api/users/42      ← prefix 그대로 유지',
            '',
            '# ── 케이스 ③ path 있고 더 깊은 경로 ──',
            'location /api/ {',
            '    proxy_pass http://app:8000/v1/;',
            '}',
            '# → 백엔드 GET /v1/users/42',
            '',
            '# ── 케이스 ④ regex location ───',
            'location ~ ^/api/(.*)$ {',
            '    proxy_pass http://app:8000/$1;',
            '}',
            '# → 캡처 그룹으로 명시',
            '',
            '# 자주 하는 실수',
            '#  • /api/ 로 location, proxy_pass 에 / 안 붙임',
            '#    → 백엔드가 /api/* 로 받음 → 라우팅 안 맞아 404',
            '#  • FastAPI 의 root_path 를 안 맞춤',
            '#    → docs (Swagger UI) 가 깨짐',
            '',
            '# FastAPI 와 짝맞추기',
            'location /api/ {',
            '    proxy_pass http://app:8000/;',
            '}',
            '# app = FastAPI(root_path="/api")  ← Swagger 도 OK',
          ],
          highlight: [5, 6, 7, 8, 9, 11, 12, 13, 14, 15, 17, 18, 19, 20, 21, 23, 24, 25, 26, 27, 29, 30, 31, 32, 33, 35, 36, 37, 38, 39, 40],
        },
      },
      {
        title: 'Step 4. upstream 블록 — 깔끔한 추상화',
        desc: '직접 IP/포트를 적는 대신 upstream 으로 묶으면 (a) 가독성 (b) 로드 밸런싱 (c) keep-alive 같은 최적화가 가능해진다. 환경 분리도 쉽다.',
        clientPath: '/api/users/42',
        backendPath: '/users/42',
        backend: 'upstream backend',
        verdict: 'upstream 추상',
        verdictTone: 'good',
        keyPoint: 'upstream { server app1; server app2; } 로 두면 다음 챕터의 로드 밸런싱이 자연스럽게 이어진다.',
        code: {
          lang: 'nginx',
          filename: 'upstream.conf',
          lines: [
            '# upstream — 백엔드 풀 정의',
            '',
            'upstream backend {',
            '    server app1:8000;',
            '    server app2:8000;',
            '    keepalive 32;            # 백엔드 연결 풀 크기',
            '}',
            '',
            'server {',
            '    listen 80;',
            '    server_name api.example.com;',
            '',
            '    location /api/ {',
            '        proxy_pass http://backend/;',
            '        proxy_http_version 1.1;',
            '        proxy_set_header Connection "";   # keepalive 작동',
            '    }',
            '}',
            '',
            '# 장점',
            '#  ✓ 백엔드가 늘어나도 server { } 안은 그대로',
            '#  ✓ 로드 밸런싱 알고리즘 한 줄로 변경',
            '#  ✓ keepalive 로 매번 새 TCP handshake 안 함',
            '#  ✓ 환경별로 upstream 만 바꿔서 dev/stg/prod 동일 conf',
            '',
            '# 환경 분리 예제',
            '# include /etc/nginx/upstreams/${ENV}.conf;',
            '#   upstreams/dev.conf  → server localhost:8000;',
            '#   upstreams/prod.conf → server app1:8000; server app2:8000;',
            '',
            '# 단일 백엔드도 upstream 권장',
            'upstream single_backend {',
            '    server 127.0.0.1:8000;',
            '    keepalive 16;',
            '}',
            '# 미래의 로드 밸런싱 확장을 미리 준비',
          ],
          highlight: [3, 4, 5, 6, 7, 9, 10, 11, 13, 14, 15, 16, 17, 20, 21, 22, 23, 24, 31, 32, 33, 34, 35],
        },
      },
      {
        title: 'Step 5. proxy_redirect off + 기본 헤더',
        desc: '백엔드가 절대 URL 로 Location 헤더를 보낼 때 (3xx 리디렉트) 내부 주소가 새어나갈 수 있다. proxy_redirect 로 통제. 그리고 Host / X-Real-IP / X-Forwarded-* 헤더는 다음 챕터에서 다룬다.',
        clientPath: '/api/users',
        backendPath: '/users',
        backend: 'upstream backend',
        verdict: '리디렉트 제어',
        verdictTone: 'good',
        summary: {
          title: 'proxy_pass 기본 5가지',
          rows: [
            { metric: 'proxy_pass', before: '백엔드로 전달', after: 'http://backend/', delta: '필수' },
            { metric: 'trailing /', before: '있음: replace', after: '없음: 그대로', delta: '주의' },
            { metric: 'upstream', before: '백엔드 추상화', after: 'keepalive + LB', delta: '권장' },
            { metric: 'proxy_redirect', before: 'Location 헤더 변환', after: 'off 또는 default', delta: '보안' },
            { metric: '헤더 (다음)', before: 'X-Real-IP/Forwarded-*', after: 'set_header', delta: '다음 챕터' },
          ],
        },
        keyPoint: 'proxy_pass 한 줄로 시작 → upstream 추상화 → 헤더 추가 → 타임아웃 튜닝 순으로 발전한다.',
        code: {
          lang: 'nginx',
          filename: 'full-proxy.conf',
          lines: [
            '# 종합 — 실전 리버스 프록시 conf',
            '',
            'upstream backend {',
            '    server app:8000;',
            '    keepalive 32;',
            '}',
            '',
            'server {',
            '    listen 80;',
            '    server_name api.example.com;',

            '    location /api/ {',
            '        proxy_pass http://backend/;',
            '',
            '        # ── 리디렉트 제어 ────────────',
            '        proxy_redirect off;',
            '        # 의미: 백엔드가 Location: http://127.0.0.1:8000/x 를',
            '        # 응답해도 클라이언트한테 그대로 노출 안 함',
            '',
            '        # ── 기본 헤더 (다음 챕터 상세) ─',
            '        proxy_set_header Host              $host;',
            '        proxy_set_header X-Real-IP         $remote_addr;',
            '        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;',
            '        proxy_set_header X-Forwarded-Proto $scheme;',
            '',
            '        # ── keepalive ───────────',
            '        proxy_http_version 1.1;',
            '        proxy_set_header Connection "";',
            '',
            '        # ── 타임아웃 (다음 챕터 상세) ─',
            '        proxy_connect_timeout 5s;',
            '        proxy_send_timeout    60s;',
            '        proxy_read_timeout    60s;',
            '    }',
            '',
            '    location /health {',
            '        access_log off;',
            '        proxy_pass http://backend/health;',
            '    }',
            '}',
          ],
          highlight: [3, 4, 5, 6, 8, 9, 10, 12, 13, 16, 17, 18, 21, 22, 23, 24, 27, 28, 31, 32, 33, 36, 37, 38, 39],
        },
      },
    ];

    const TONE = {
      good:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800' },
      warn:   { bg: 'bg-amber-50',    border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-200 text-amber-800' },
      danger: { bg: 'bg-rose-50',     border: 'border-rose-400',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800' },
    };

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-green-400 bg-white p-3">
          <div className="text-sm font-bold text-green-800 mb-2">📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-green-700 border-b border-green-200">
                <th className="py-1 pr-2">지시자</th><th className="py-1 pr-2">A</th><th className="py-1 pr-2">B</th><th className="py-1">비고</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-green-100">
                  <td className="py-1 pr-2 font-mono font-bold text-green-900">{r.metric}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono">{r.before}</td>
                  <td className="py-1 pr-2 text-green-800 font-mono">{r.after}</td>
                  <td className="py-1 text-green-900 font-bold">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.warn;
      return (
        <div className="rounded-xl border border-green-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-green-900">리버스 프록시 흐름</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <div className="rounded-lg bg-green-50 border border-green-200 p-3 text-xs font-mono">
            <div className="flex flex-col gap-2">
              <div className="px-3 py-2 rounded bg-white border border-green-300">
                <div className="text-green-700 text-[10px]">클라이언트 요청</div>
                <div className="text-green-900 font-bold">GET {state.clientPath}</div>
              </div>
              <div className="text-center text-green-500">↓ Nginx :80</div>
              <div className="px-3 py-2 rounded bg-green-700 text-white">
                <div className="text-green-200 text-[10px]">proxy_pass → {state.backend}</div>
                <div className="font-bold">GET {state.backendPath}</div>
              </div>
              <div className="text-center text-green-500">↓ FastAPI :8000</div>
              <div className="px-3 py-2 rounded bg-emerald-600 text-white">
                <div className="text-emerald-100 text-[10px]">응답 JSON</div>
                <div className="font-bold">{'{ "id": 42 }'}</div>
              </div>
            </div>
          </div>

          <div className="mt-3 rounded-lg bg-white border border-green-200 p-3">
            <div className="text-xs text-green-700 mb-1 font-bold">구조</div>
            <div className="text-[11px] text-green-800 font-mono leading-relaxed">
              [Client] → [Nginx :80/:443] → [upstream backend] → [FastAPI uvicorn :8000]
            </div>
            <div className="text-[10px] text-green-600 mt-1">백엔드는 localhost 만 바인딩, 외부 직접 노출 금지</div>
          </div>

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-green-900 bg-green-100 border border-green-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-zinc-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-zinc-800 border-b border-zinc-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-zinc-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-zinc-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-green-500/25 border-l-2 border-green-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-zinc-800 border-t border-zinc-700 flex items-center justify-between text-[10px] text-zinc-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-green-50 to-emerald-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-green-700 text-white font-bold">N</span>
              <div>
                <h1 className="text-2xl font-bold text-green-900">Chapter II-1-1. proxy_pass</h1>
                <p className="text-sm text-green-800/80">Nginx 80 → FastAPI 8000 리버스 프록시 기본</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-green-800 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-green-700' : 'bg-green-200'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-green-700 text-white px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-green-50/90 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded border border-green-300 bg-white text-green-800 hover:bg-green-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded border border-green-300 bg-white text-green-800 hover:bg-green-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-green-900 text-white' : 'bg-green-700 text-white hover:bg-green-800'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded border border-green-300 bg-white text-green-800 hover:bg-green-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-green-700 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-green-400 bg-white px-4 py-3 text-sm text-green-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                proxy_pass 한 줄이 리버스 프록시의 전부. trailing slash 한 글자가 path 치환 여부를 결정. 백엔드는 upstream 으로 묶고 keepalive + 헤더 + 타임아웃을 점진적으로 추가한다.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['proxy_pass', 'upstream', 'trailing-slash', 'keepalive', 'FastAPI'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-green-100 text-green-800 border border-green-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-green-800">
              <a href="../part1/I-2-2.html" className="underline hover:no-underline">← I-2-2 정적 파일 서빙</a>
              <a href="./II-1-2.html" className="underline hover:no-underline">다음: II-1-2 proxy 헤더 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
