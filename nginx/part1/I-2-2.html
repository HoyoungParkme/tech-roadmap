<!DOCTYPE html>

<body>
  <div id="root"></div>

  <!-- I-2-2 정적 파일 서빙: root vs alias / index / try_files / MIME / autoindex -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. root vs alias — 헷갈리는 두 지시자',
        desc: 'root 는 location 경로를 그대로 이어붙인다. alias 는 location 경로를 잘라내고 alias 경로로 치환한다. 이 차이가 운영 사고의 단골이다.',
        request: '/img/cat.jpg',
        resolved: '/var/www/img/cat.jpg',
        directive: 'root',
        verdict: 'root 매핑',
        verdictTone: 'good',
        keyPoint: 'root → 디렉토리 prefix 추가. alias → location 부분을 치환. 슬래시(/) 끝 처리에 주의.',
        code: {
          lang: 'nginx',
          filename: 'root-vs-alias.conf',
          lines: [
            '# root 와 alias 차이 — 예제로 보자',
            '',
            'server {',
            '    # ── ① root ──────────────────',
            '    # 요청: GET /img/cat.jpg',
            '    # 디스크: /var/www + /img/cat.jpg = /var/www/img/cat.jpg',
            '    location /img/ {',
            '        root /var/www;',
            '    }',
            '',
            '    # ── ② alias ─────────────────',
            '    # 요청: GET /img/cat.jpg',
            '    # 디스크: /data/photos + cat.jpg = /data/photos/cat.jpg',
            '    location /img/ {',
            '        alias /data/photos/;',
            '    }',
            '',
            '    # 핵심 차이',
            '    #  • root  → location prefix 를 그대로 디렉토리에 이어붙임',
            '    #  • alias → location prefix 를 잘라내고 alias 로 치환',
            '',
            '    # ── 자주 하는 실수 ────────',
            '    # alias 는 trailing slash 가 location 과 일치해야 함',
            '    location /img/ { alias /data/photos; }    # ❌',
            '    location /img/ { alias /data/photos/; }   # ✅',
            '',
            '    # regex location 에서는 alias 못 씀 → root 만 가능',
            '}',
            '',
            '# 언제 root, 언제 alias?',
            '#  • URL 경로와 디스크 구조가 일치 → root (단순)',
            '#  • URL 과 디스크 경로가 다름 → alias',
          ],
          highlight: [4, 5, 6, 7, 8, 9, 11, 12, 13, 14, 15, 16, 18, 19, 20, 22, 23, 24, 25, 26, 28],
        },
      },
      {
        title: 'Step 2. index 지시자 — 디렉토리 → 기본 파일',
        desc: '/about/ 처럼 슬래시로 끝나는 요청이 들어오면 어떤 파일을 보여줄지 결정. index index.html index.htm 처럼 여러 후보를 순서대로 시도한다.',
        request: '/about/',
        resolved: '/var/www/about/index.html',
        directive: 'index',
        verdict: 'index.html',
        verdictTone: 'good',
        keyPoint: '디렉토리 요청 → index 후보 순서대로 시도 → 없으면 try_files 또는 autoindex 또는 404.',
        code: {
          lang: 'nginx',
          filename: 'index-directive.conf',
          lines: [
            '# index — 디렉토리 요청의 기본 파일',
            '',
            'server {',
            '    listen 80;',
            '    root /var/www/html;',
            '    index index.html index.htm default.html;',
            '',
            '    # 요청 흐름',
            '    #  GET /         → /var/www/html/index.html ?',
            '    #                → 없으면 /var/www/html/index.htm ?',
            '    #                → 없으면 /var/www/html/default.html ?',
            '    #                → 다 없으면 다음 단계로',
            '',
            '    #  GET /docs/    → /var/www/html/docs/index.html',
            '',
            '    location / {',
            '        # try_files 와 함께 쓰면 더 안전',
            '        try_files $uri $uri/ /index.html;',
            '    }',
            '}',
            '',
            '# SPA 패턴 (React/Vue)',
            '#  • index 는 index.html 만',
            '#  • try_files $uri $uri/ /index.html;',
            '#  → 어떤 경로든 결국 index.html 로 떨어져서 client routing 작동',
            '',
            '# 다국어 사이트 패턴',
            '#  • root 다르게 / location /ko/ /en/ 분리',
            '',
            '# Tip',
            '#  • index 는 http / server / location 어디든 정의 가능',
            '#  • 안쪽 컨텍스트가 바깥쪽을 override',
          ],
          highlight: [3, 4, 5, 6, 8, 9, 10, 11, 12, 14, 16, 17, 18, 19, 23, 24, 25, 26],
        },
      },
      {
        title: 'Step 3. try_files — 순차적 fallback',
        desc: 'try_files 는 파일/디렉토리 후보를 순서대로 시도하다가 없으면 마지막 인자로 폴백한다. SPA 라우팅의 표준 패턴이고 PHP 사이트의 wp-pretty-url 도 이걸로 처리한다.',
        request: '/products/123',
        resolved: 'fallback → /index.html',
        directive: 'try_files',
        verdict: 'fallback',
        verdictTone: 'good',
        keyPoint: 'try_files $uri $uri/ /index.html — 파일 → 디렉토리 → 마지막은 index.html 라우팅.',
        code: {
          lang: 'nginx',
          filename: 'try-files.conf',
          lines: [
            '# try_files — 파일 존재 여부에 따른 fallback',
            '',
            '# 문법',
            '# try_files 파일1 파일2 ... 마지막인자;',
            '# • 파일1, 파일2 를 순서대로 디스크에서 찾아봄',
            '# • 발견 → 그 파일 서빙',
            '# • 다 없으면 마지막 인자',
            '#   · = 코드     (예: =404)',
            '#   · 경로/URI  (재요청. internal redirect)',
            '',
            '# ── 패턴 ① SPA ──────────────',
            'location / {',
            '    try_files $uri $uri/ /index.html;',
            '}',
            '#  • /products/123 → /products/123 파일 없음',
            '#                  → /products/123/ 디렉토리 없음',
            '#                  → /index.html  ← React Router 가 처리',
            '',
            '# ── 패턴 ② 정적 + API ──────',
            'location / {',
            '    try_files $uri $uri/ @backend;',
            '}',
            'location @backend {',
            '    proxy_pass http://app:8000;',
            '}',
            '#  • 정적 파일 있으면 즉시 서빙',
            '#  • 없으면 백엔드로 프록시',
            '',
            '# ── 패턴 ③ 404 명시 ────────',
            'location /static/ {',
            '    try_files $uri =404;',
            '}',
            '#  • 정적 파일이 없으면 즉시 404 (백엔드 안 거침)',
            '',
            '# ── 패턴 ④ WordPress ───────',
            'location / {',
            '    try_files $uri $uri/ /index.php?$args;',
            '}',
          ],
          highlight: [3, 4, 5, 6, 7, 8, 9, 12, 13, 14, 15, 16, 17, 20, 21, 22, 23, 24, 25, 26, 27, 30, 31, 32, 33, 36, 37, 38, 39],
        },
      },
      {
        title: 'Step 4. MIME types — Content-Type 헤더',
        desc: '브라우저는 Content-Type 헤더로 파일 종류를 안다. .css 가 text/plain 으로 가면 적용 안 됨. /etc/nginx/mime.types 에 확장자별 매핑이 들어 있고 default_type 으로 미지정 폴백.',
        request: '/style.css',
        resolved: 'Content-Type: text/css',
        directive: 'mime.types',
        verdict: 'MIME 일치',

        keyPoint: 'http 블록에서 include /etc/nginx/mime.types + default_type. .js → application/javascript 필수.',

          lang: 'nginx',
          filename: 'mime-types.conf',
          lines: [
            '# MIME types — 확장자 → Content-Type',
            '',
            'http {',
            '    include /etc/nginx/mime.types;',
            '    default_type application/octet-stream;   # 매칭 안 되는 것은 binary',
            '}',
            '',
            '# mime.types 일부',
            '# text/html                              html htm shtml;',
            '# text/css                               css;',
            '# text/javascript                        js;       (구버전)',
            '# application/javascript                 js;',
            '# application/json                       json;',
            '# image/png                              png;',
            '# image/jpeg                             jpeg jpg;',

            '# application/pdf                        pdf;',
            '# application/wasm                       wasm;',
            '',
            '# 잘못된 MIME 의 결과',
            '#  • .css → text/plain  → CSS 적용 안 됨',
            '#  • .js  → text/plain  → 모듈 import 차단 (strict)',
            '#  • .wasm → octet-stream → WebAssembly 로드 실패',
            '',
            '# 추가 매핑 (예: .vtt 자막)',
            'types {',
            '    text/vtt vtt;',
            '    application/manifest+json webmanifest;',
            '}',
            '',
            '# charset',
            'charset utf-8;',
            'charset_types text/html text/css application/javascript application/json;',
            '#  → Content-Type: text/html; charset=utf-8',
            '',
            '# 보안 헤더로 MIME sniffing 차단',
            'add_header X-Content-Type-Options nosniff always;',
          ],
          highlight: [3, 4, 5, 6, 8, 9, 10, 11, 12, 13, 14, 15, 22, 23, 24, 25, 27, 28, 29, 30, 31, 33, 34, 35, 38, 39],
        },
      },
      {
        title: 'Step 5. autoindex — 디렉토리 리스팅',
        desc: '디렉토리에 index 파일이 없으면 보통 403. autoindex on 을 켜면 파일 목록 페이지를 자동 생성한다. 사내 자료실, FTP-like 사이트에 유용. 단, 운영 트래픽 노출 면에서 위험 — 의도된 곳에만.',
        request: '/files/',
        resolved: '<ul> 파일 목록 HTML </ul>',
        directive: 'autoindex',
        verdict: '디렉토리 리스팅',
        verdictTone: 'warn',
        summary: {
          title: '정적 파일 서빙 핵심 5가지',

            { metric: 'MIME', before: 'Content-Type 매핑', after: 'include mime.types', delta: '필수' },

        },
        keyPoint: 'autoindex 는 의도한 디렉토리에만. /files/ 같은 공유 영역 외 location 에는 절대 켜지 말 것.',
        code: {
          lang: 'nginx',

          lines: [

            '',

            '# →  [{"name":"doc1.pdf","type":"file","size":1234567,"mtime":"..."}, ...]',
            '',
            '# 보안 주의',
            '#  ❌ root / 에 autoindex on  → conf, .git, .env 노출',
            '#  ❌ 운영 트래픽 영역에 켜기',
            '#  ✅ 의도한 공유 디렉토리만, 그것도 인증 뒤에',
            '',
            '# 인증 결합',
            'location /files/ {',
            '    autoindex on;',
            '    auth_basic "Restricted";',
            '    auth_basic_user_file /etc/nginx/.htpasswd;',
            '}',
          ],
          highlight: [3, 4, 5, 6, 8, 9, 10, 11, 12, 13, 16, 17, 18, 19, 22, 23, 24, 25, 26, 27, 28, 30, 31, 32, 34, 35, 36, 37, 39, 40, 41, 42, 43],
        },
      },
    ];

    const TONE = {
      good:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800' },
      warn:   { bg: 'bg-amber-50',    border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-200 text-amber-800' },
      danger: { bg: 'bg-rose-50',     border: 'border-rose-400',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800' },
    };

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-green-400 bg-white p-3">
          <div className="text-sm font-bold text-green-800 mb-2">📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-green-700 border-b border-green-200">
                <th className="py-1 pr-2">지시자</th><th className="py-1 pr-2">역할</th><th className="py-1 pr-2">예시</th><th className="py-1">분류</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-green-100">
                  <td className="py-1 pr-2 font-mono font-bold text-green-900">{r.metric}</td>
                  <td className="py-1 pr-2 text-emerald-700">{r.before}</td>
                  <td className="py-1 pr-2 text-green-800 font-mono">{r.after}</td>
                  <td className="py-1 text-green-900 font-bold">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.warn;
      return (
        <div className="rounded-xl border border-green-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-green-900">요청 → 디스크 경로 해석</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <div className="rounded-lg bg-green-50 border border-green-200 p-3">
            <div className="text-[10px] text-green-700 mb-1 font-mono">활성 지시자: {state.directive}</div>
            <div className="flex flex-col gap-2 text-xs font-mono">
              <div className="px-3 py-2 rounded bg-white border border-green-300">
                <div className="text-green-700 text-[10px]">요청 URL</div>
                <div className="text-green-900 font-bold">{state.request}</div>
              </div>
              <div className="text-center text-green-500">↓</div>
              <div className="px-3 py-2 rounded bg-green-700 text-white">
                <div className="text-green-200 text-[10px]">{state.directive} 매칭</div>
                <div className="font-bold">{state.resolved}</div>
              </div>
            </div>
          </div>

          <div className="mt-3 rounded-lg bg-white border border-green-200 p-3">
            <div className="text-xs text-green-700 mb-2 font-bold">지시자 비교</div>
            <table className="w-full text-[11px] font-mono">
              <tbody>
                <tr className="border-b border-green-100">
                  <td className="py-1 pr-2 text-green-800">root</td>
                  <td className="py-1 text-green-700">prefix 추가</td>
                </tr>
                <tr className="border-b border-green-100">
                  <td className="py-1 pr-2 text-green-800">alias</td>
                  <td className="py-1 text-green-700">경로 치환</td>
                </tr>
                <tr className="border-b border-green-100">
                  <td className="py-1 pr-2 text-green-800">index</td>
                  <td className="py-1 text-green-700">디렉토리 기본 파일</td>
                </tr>
                <tr className="border-b border-green-100">
                  <td className="py-1 pr-2 text-green-800">try_files</td>
                  <td className="py-1 text-green-700">순차 fallback</td>
                </tr>
                <tr>
                  <td className="py-1 pr-2 text-green-800">autoindex</td>
                  <td className="py-1 text-green-700">디렉토리 리스팅</td>
                </tr>
              </tbody>
            </table>
          </div>

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-green-900 bg-green-100 border border-green-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-zinc-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-zinc-800 border-b border-zinc-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-zinc-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-zinc-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-green-500/25 border-l-2 border-green-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-zinc-800 border-t border-zinc-700 flex items-center justify-between text-[10px] text-zinc-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-green-50 to-emerald-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-green-700 text-white font-bold">N</span>
              <div>
                <h1 className="text-2xl font-bold text-green-900">Chapter I-2-2. 정적 파일 서빙</h1>
                <p className="text-sm text-green-800/80">root / alias / index / try_files / MIME / autoindex</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-green-800 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-green-700' : 'bg-green-200'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-green-700 text-white px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-green-50/90 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} className="px-3 py-1.5 text-xs rounded border border-green-300 bg-white text-green-800 hover:bg-green-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-green-300 bg-white text-green-800 hover:bg-green-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-green-900 text-white' : 'bg-green-700 text-white hover:bg-green-800'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-green-300 bg-white text-green-800 hover:bg-green-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-green-700 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-green-400 bg-white px-4 py-3 text-sm text-green-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                root 는 이어붙이고, alias 는 치환. index 로 디렉토리 기본 파일, try_files 로 SPA fallback. MIME 매핑은 mime.types 자동 include. autoindex 는 의도한 곳만.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['root', 'alias', 'index', 'try_files', 'mime', 'autoindex', 'SPA'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-green-100 text-green-800 border border-green-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-green-800">
              <a href="./I-2-1.html" className="underline hover:no-underline">← I-2-1 nginx.conf 구조</a>
              <a href="../part2/II-1-1.html" className="underline hover:no-underline">다음: II-1-1 proxy_pass →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
