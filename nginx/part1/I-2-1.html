<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nginx 학습 — I-2-1. nginx.conf 구조</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🟢</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    Nginx Chapter I-2-1 — nginx.conf 구조
    학습 목표: main / events / http / server / location 블록의 계층 구조를 익힌다.
    패턴: fastapi v1 — 좌(LiveDataPane: 블록 트리) / 우(CodeViewer)
    색상: green
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 최상위 (main) — user / worker_processes',
        desc: '파일 전체 가장 바깥쪽이 main 컨텍스트. 어떤 OS 사용자로 worker 를 돌릴지, worker 프로세스를 몇 개 띄울지 같은 글로벌 설정이 들어간다. 운영체제 차원의 권한과 리소스 한도가 여기서 정해진다.',
        level: 'main',
        depth: 0,
        verdict: '최상위',
        verdictTone: 'good',
        keyPoint: 'worker_processes auto 면 CPU 코어 수만큼 자동 지정. 거의 항상 이게 정답.',
        code: {
          lang: 'nginx',
          filename: 'nginx.conf · main',
          lines: [
            '# main 컨텍스트 — 파일 최상위',
            '# /etc/nginx/nginx.conf',
            '',
            'user www-data;                # worker 프로세스 OS 사용자',
            'worker_processes auto;        # CPU 코어 수 만큼',
            'worker_rlimit_nofile 65535;   # 프로세스당 열 수 있는 FD 수',
            'pid /run/nginx.pid;           # PID 파일 위치',
            '',
            'error_log /var/log/nginx/error.log warn;',
            '',
            '# 모듈 로드 (dynamic module)',
            'load_module modules/ngx_http_brotli_filter_module.so;',
            'load_module modules/ngx_http_brotli_static_module.so;',
            '',
            '# 이 아래로 events {}, http {} 가 이어진다',
            '',
            '# 주요 main 지시자',
            '#  • user           : worker 실행 OS 계정 (보안)',
            '#  • worker_processes : 코어 활용',
            '#  • error_log      : 모든 컨텍스트에서 사용 가능',
            '#  • pid            : process management',
            '#  • load_module    : .so 동적 모듈',
            '',
            '# Tip',
            '# - master 는 root 로 떠야 80/443 바인딩 가능',
            '# - worker 만 www-data 같은 비특권 사용자로 내려감',
          ],
          highlight: [4, 5, 6, 7, 9, 12, 13, 17, 18, 19, 20, 21, 22, 25, 26],
        },
      },
      {
        title: 'Step 2. events { } — 연결 처리 설정',
        desc: 'events 블록은 worker 1개가 어떻게 동시 연결을 처리할지를 정한다. epoll (Linux) / kqueue (BSD) 같은 I/O 멀티플렉싱 방식, worker_connections 로 worker 당 최대 연결 수 등.',
        level: 'events',
        depth: 1,
        verdict: 'I/O 모델',
        verdictTone: 'good',
        keyPoint: '전체 동시 연결 한도 = worker_processes × worker_connections. 8 × 4096 = 32,768.',
        code: {
          lang: 'nginx',
          filename: 'nginx.conf · events',
          lines: [
            '# events 컨텍스트',
            '',
            'events {',
            '    use epoll;                  # Linux 2.6+ 기본. 명시 안 해도 자동',
            '    worker_connections 4096;    # worker 당 최대 동시 연결',
            '    multi_accept on;            # 한 번에 여러 새 연결 accept()',
            '    accept_mutex off;           # 최신 커널은 off 가 빠름 (SO_REUSEPORT 활용)',
            '}',
            '',
            '# I/O 멀티플렉서 옵션',
            '#  • epoll       (Linux 2.6+) ← 거의 항상 이것',
            '#  • kqueue      (FreeBSD, macOS)',
            '#  • select/poll (오래된 시스템 fallback)',
            '',
            '# worker_connections 의 의미',
            '#  • TCP 연결 1개 = FD 1개',
            '#  • client ↔ nginx 연결 + nginx ↔ upstream 연결 모두 카운트',
            '#  • 즉 리버스 프록시면 사용자 N명에 FD 2N개 필요',
            '',
            '# 동시 처리 상한 계산',
            '#  worker_processes 8 × worker_connections 4096 = 32,768',
            '#  하지만 worker_rlimit_nofile 이 이보다 커야 함',
            '',
            '# multi_accept on',
            '#  • epoll 이 깨어났을 때 새 연결을 한 번에 다 처리',
            '#  • 대량 신규 연결이 몰릴 때 유리',
          ],
          highlight: [3, 4, 5, 6, 7, 8, 10, 11, 12, 13, 15, 16, 17, 18, 20, 21, 22, 24, 25, 26],
        },
      },
      {
        title: 'Step 3. http { } — HTTP 전역 설정',
        desc: 'http 블록은 HTTP 프로토콜에 관한 모든 글로벌 설정을 담는다. mime types, gzip, log_format, keepalive, sendfile, 그리고 이 안에 여러 server 블록(virtual host)이 들어간다.',
        level: 'http',
        depth: 1,
        verdict: 'HTTP 글로벌',
        verdictTone: 'good',
        keyPoint: 'http 안에서 정의한 설정은 안쪽 server / location 에서 override 하지 않는 한 그대로 상속된다.',
        code: {
          lang: 'nginx',
          filename: 'nginx.conf · http',
          lines: [
            '# http 컨텍스트',
            '',
            'http {',
            '    include /etc/nginx/mime.types;',
            '    default_type application/octet-stream;',
            '',
            '    # 로그 형식',
            '    log_format main \'$remote_addr - $remote_user [$time_local] "$request" \'',
            '                    \'$status $body_bytes_sent "$http_referer" \'',
            '                    \'"$http_user_agent"\';',
            '    access_log /var/log/nginx/access.log main;',
            '',
            '    # 성능',
            '    sendfile on;                # 커널의 zero-copy',
            '    tcp_nopush on;              # 패킷 합쳐 보내기 (sendfile 과 짝)',
            '    tcp_nodelay on;             # 작은 패킷도 즉시 전송 (keepalive 시)',
            '    keepalive_timeout 65;       # 유휴 연결 유지 시간',
            '    types_hash_max_size 2048;',
            '    server_tokens off;          # Server 헤더에서 버전 숨김',
            '',
            '    # 압축',
            '    gzip on;',
            '    gzip_types text/plain text/css application/javascript application/json;',
            '',
            '    # upstream (다음 챕터에서 자세히)',
            '    upstream backend {',
            '        server app1:8000;',
            '        server app2:8000;',
            '    }',
            '',
            '    # 추가 server 들은 conf.d 에서 include',
            '    include /etc/nginx/conf.d/*.conf;',
            '    include /etc/nginx/sites-enabled/*;',
            '}',
          ],
          highlight: [3, 4, 5, 7, 8, 9, 10, 11, 13, 14, 15, 16, 17, 18, 19, 21, 22, 23, 25, 26, 27, 28, 29, 31, 32, 33, 34],
        },
      },
      {
        title: 'Step 4. server { } — virtual host',
        desc: 'server 블록 하나가 하나의 가상 호스트. listen 으로 듣는 포트, server_name 으로 도메인을 매칭한다. 한 Nginx 가 example.com, api.example.com, admin.example.com 을 각각 다른 server 블록으로 받을 수 있다.',
        level: 'server',
        depth: 2,
        verdict: 'virtual host',
        verdictTone: 'good',
        keyPoint: 'Host 헤더 → server_name 매칭. 일치하는 server 가 없으면 default_server 또는 listen 매칭의 첫 server.',
        code: {
          lang: 'nginx',
          filename: 'conf.d/api.example.com.conf',
          lines: [
            '# server 컨텍스트 — virtual host',
            '# http {} 안에 여러 server {} 가 들어간다',
            '',
            'server {',
            '    listen 80 default_server;       # 80 포트, 매칭 안 되는 요청의 fallback',
            '    listen [::]:80 default_server;  # IPv6',
            '    server_name _;                  # 모든 호스트 매칭',
            '    return 444;                     # 잘못된 Host 는 그냥 끊음',
            '}',
            '',
            'server {',
            '    listen 443 ssl http2;',
            '    server_name api.example.com;',
            '',
            '    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;',
            '    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;',
            '',
            '    # 이 안에 여러 location {} 이 들어간다',
            '    location /v1/ {',
            '        proxy_pass http://backend;',
            '    }',
            '    location /health {',
            '        return 200 "ok";',
            '    }',
            '}',
            '',
            'server {',
            '    listen 80;',
            '    server_name www.example.com example.com;',
            '    return 301 https://example.com$request_uri;   # http→https 리디렉트',
            '}',
            '',
            '# 매칭 우선순위',
            '# 1) exact server_name 일치',
            '# 2) 시작 와일드카드 *.example.com',
            '# 3) 끝 와일드카드 mail.*',
            '# 4) 정규식 ~^api\\d+\\.example',
            '# 5) default_server',
          ],
          highlight: [4, 5, 6, 7, 8, 9, 11, 12, 13, 15, 16, 19, 20, 21, 22, 23, 24, 27, 28, 29, 30, 31, 34, 35, 36, 37, 38, 39],
        },
      },
      {
        title: 'Step 5. location { } — 경로 매칭의 핵심',
        desc: 'server 안에 있는 location 블록은 URL 경로별 동작을 정한다. /static/ 은 정적 파일, /api/ 는 백엔드 프록시, /ws/ 는 WebSocket. modifier (=, ^~, ~, ~*) 가 매칭 우선순위를 결정한다.',
        level: 'location',
        depth: 3,
        verdict: '경로 라우팅',
        verdictTone: 'good',
        summary: {
          title: 'location modifier 우선순위',
          rows: [
            { metric: '=', before: 'exact match', after: '최우선', delta: '1순위' },
            { metric: '^~', before: 'prefix 우선', after: '정규식보다 먼저', delta: '2순위' },
            { metric: '~', before: 'regex (대소문자 구분)', after: '순서대로 평가', delta: '3순위' },
            { metric: '~*', before: 'regex (대소문자 무시)', after: '순서대로 평가', delta: '3순위' },
            { metric: '(없음)', before: 'prefix match', after: '가장 긴 것 선택', delta: '4순위' },
          ],
        },
        keyPoint: '정적 파일은 prefix, 정확한 경로는 =, 패턴은 ~* 를 쓴다. 우선순위와 가장 긴 매칭을 기억하자.',
        code: {
          lang: 'nginx',
          filename: 'conf.d/locations.conf',
          lines: [
            '# location 매칭 예제',
            '',
            'server {',
            '    listen 80;',
            '    server_name example.com;',
            '    root /var/www/html;',
            '',
            '    # ① exact match — favicon 같은 단일 파일',
            '    location = /favicon.ico {',
            '        log_not_found off;',
            '        access_log off;',
            '    }',
            '',
            '    # ② ^~ — prefix 가 정규식보다 우선',
            '    location ^~ /static/ {',
            '        expires 1y;',
            '        add_header Cache-Control "public, immutable";',
            '    }',
            '',
            '    # ③ ~* — regex, 대소문자 무시',
            '    location ~* \\.(jpg|jpeg|png|gif|webp)$ {',
            '        expires 30d;',
            '    }',
            '',
            '    # ④ prefix match — 가장 긴 것 우선',
            '    location /api/ {',
            '        proxy_pass http://backend;',
            '    }',
            '',
            '    # ⑤ 더 구체적인 prefix → 위 /api/ 보다 우선',
            '    location /api/internal/ {',
            '        deny all;',
            '    }',
            '',
            '    # ⑥ fallback — SPA',
            '    location / {',
            '        try_files $uri $uri/ /index.html;',
            '    }',
            '}',
            '',
            '# 매칭 흐름 (요청: GET /api/v1/users)',
            '#  1) = /favicon.ico ? 아니오',
            '#  2) ^~ 중에 매칭? 아니오',
            '#  3) /api/internal/ 더 긴 prefix? 아니오',
            '#  4) /api/ 매칭 → proxy_pass',
          ],
          highlight: [9, 10, 11, 15, 16, 17, 18, 21, 22, 23, 26, 27, 28, 31, 32, 33, 36, 37, 38, 39, 42, 43, 44, 45, 46],
        },
      },
    ];

    const TONE = {
      good:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800' },
      warn:   { bg: 'bg-amber-50',    border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-200 text-amber-800' },
      danger: { bg: 'bg-rose-50',     border: 'border-rose-400',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800' },
    };

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-green-400 bg-white p-3">
          <div className="text-sm font-bold text-green-800 mb-2">📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-green-700 border-b border-green-200">
                <th className="py-1 pr-2">기호</th><th className="py-1 pr-2">의미</th><th className="py-1 pr-2">동작</th><th className="py-1">순위</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-green-100">
                  <td className="py-1 pr-2 font-mono font-bold text-green-900">{r.metric}</td>
                  <td className="py-1 pr-2 text-emerald-700">{r.before}</td>
                  <td className="py-1 pr-2 text-green-800">{r.after}</td>
                  <td className="py-1 text-green-900 font-bold">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function BlockTree({ activeLevel }) {
      const blocks = [
        { name: 'main', label: 'user / worker_processes', depth: 0, key: 'main' },
        { name: 'events', label: 'epoll / worker_connections', depth: 1, key: 'events' },
        { name: 'http', label: 'mime / gzip / log / upstream', depth: 1, key: 'http' },
        { name: '  server', label: 'listen 80 / server_name', depth: 2, key: 'server' },
        { name: '    location', label: 'path → root / proxy_pass', depth: 3, key: 'location' },
      ];
      return (
        <div className="rounded-lg bg-green-50 border border-green-200 p-3 font-mono text-xs">
          {blocks.map((b, i) => {
            const active = b.key === activeLevel;
            return (
              <div key={i} className={`flex items-center gap-2 py-0.5 ${active ? 'bg-green-200 text-green-900 font-bold rounded px-1 -mx-1' : 'text-green-800'}`} style={{paddingLeft: `${b.depth * 12}px`}}>
                <span className="text-green-600">{active ? '▶' : ' '}</span>
                <span>{b.name.trim()} {'{'}</span>
                <span className="text-green-600/80 text-[10px]">{b.label}</span>
              </div>
            );
          })}
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.warn;
      return (
        <div className="rounded-xl border border-green-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-green-900">nginx.conf 블록 트리</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <BlockTree activeLevel={state.level} />

          <div className="mt-3 rounded-lg bg-white border border-green-200 p-3">
            <div className="text-xs text-green-700 mb-1">현재 컨텍스트</div>
            <div className="text-lg font-mono font-bold text-green-900">{state.level} {'{ ... }'}</div>
            <div className="text-[10px] text-green-700/80 mt-1">depth: {state.depth} · {state.depth === 0 ? '최상위' : `중첩 ${state.depth}단계`}</div>
          </div>

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-green-900 bg-green-100 border border-green-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-zinc-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-zinc-800 border-b border-zinc-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-zinc-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-zinc-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-green-500/25 border-l-2 border-green-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-zinc-800 border-t border-zinc-700 flex items-center justify-between text-[10px] text-zinc-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-green-50 to-emerald-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-green-700 text-white font-bold">N</span>
              <div>
                <h1 className="text-2xl font-bold text-green-900">Chapter I-2-1. nginx.conf 구조</h1>
                <p className="text-sm text-green-800/80">main → events → http → server → location</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-green-800 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-green-700' : 'bg-green-200'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-green-700 text-white px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-green-50/90 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded border border-green-300 bg-white text-green-800 hover:bg-green-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded border border-green-300 bg-white text-green-800 hover:bg-green-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-green-900 text-white' : 'bg-green-700 text-white hover:bg-green-800'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded border border-green-300 bg-white text-green-800 hover:bg-green-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-green-700 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-green-400 bg-white px-4 py-3 text-sm text-green-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                main(전역) → events(I/O) → http(HTTP 전역) → server(가상호스트) → location(경로). 안쪽 블록은 바깥쪽 설정을 상속/오버라이드한다. location 매칭은 = ^~ ~ ~* 우선순위와 "가장 긴 prefix" 룰이 핵심.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['main', 'events', 'http', 'server', 'location', 'context'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-green-100 text-green-800 border border-green-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-green-800">
              <a href="./I-1-2.html" className="underline hover:no-underline">← I-1-2 설치 + 첫 페이지</a>
              <a href="./I-2-2.html" className="underline hover:no-underline">다음: I-2-2 정적 파일 서빙 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
