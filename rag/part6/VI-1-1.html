              어떻게 보완하는지 5단계 의사결정 트리로 이해한다.
    핵심 비유: 시험 중 자기 검토하는 모범생 — Retrieve? IsRel? IsSup? IsUse?
    패턴: fastapi v1 — 좌(LiveDataPane: 입력 → 의사결정 트리 + 결과 비교)
                       우(VSCode CodeViewer: 5 파일 탭)

  -->

      // ─── Step 4 ─────────────────────────────────────────

            { claim: '5년 근속 시 +3일',    supported: 'Fully',    source: 'D3 인사규정 3장 - 리프레시' },

      // ─── Step 5 ─────────────────────────────────────────
      {
        title: 'Step 5. 결과 — 불필요한 검색 ↓, 정확도 ↑',
        desc: '4개의 reflection token 으로 Self-RAG 는 일반 RAG 대비 검색 호출 ~30% 감소(검색 불필요 질문 자동 회피), 환각 ~40% 감소(IsSup 으로 무근거 주장 차단), 답변 정확도 향상을 달성한다. 추가 비용은 reflection token 생성용 LLM 호출 1~3회. 의료·법률·금융처럼 신뢰성이 중요한 도메인에 적합하다.',
        mode: 'self',
        nodes: {
          retrieve:  { state: 'done', token: '[Retrieve]=Yes',   decision: '완료' },

          issup:     { state: 'done', token: '[IsSup]=Fully',    decision: '완료' },

            { name: '환각률',           naive: '15%',    self: '~9%',   delta: '-40%',    good: true },
            { name: '답변 정확도',      naive: '72%',    self: '85%',   delta: '+18%',    good: true },
            { name: 'LLM 호출 비용',    naive: '1x',     self: '1.3x',  delta: '+30%',    good: false },

          ],
          fitFor: ['의료 진단 보조', '법률 자문', '금융 컴플라이언스', 'B2B 고신뢰 문서 QA'],
        },

      },
    ];

    // ─────────────────────────────────────────────────────
    // 5 개 코드 탭 — Step 별로 활성 탭이 바뀜
    //   filename / lang / lines / highlight
    // ─────────────────────────────────────────────────────
    const CODE_TABS = [
      {
        filename: 'naive-rag.py',
        lang: 'python',
        lines: [
          '# Step 1. 일반 RAG — 무조건 검색 (Self-RAG 와 비교용)',
          'from langchain_openai import ChatOpenAI, OpenAIEmbeddings',
          'from langchain_community.vectorstores import FAISS',
          'llm = ChatOpenAI(model="gpt-4o-mini")',
          'vs  = FAISS.load_local("./policy_index", OpenAIEmbeddings())',
          '',
          'def naive_rag(question: str) -> str:',
          '    """질문이 무엇이든 무조건 top-k 검색 후 그대로 LLM 에 투입."""',
          '    docs = vs.similarity_search(question, k=4)         # ① 항상 검색',
          '    context = "\\n\\n".join(d.page_content for d in docs) # ② 통째로 투입',
          '    prompt = f"문서:\\n{context}\\n\\n질문: {question}"  # ③ 검증 없음',
          '    return llm.invoke(prompt).content',
          '',
          '# 호출 예 ──────────────────────────────',
          'naive_rag("우리 회사 연차는?")',
          '#  → "연차는 15일이고 출장비는 월말 정산입니다."',
          '#     (관련 없는 D2 출장비 문서까지 답에 섞임 — 환각 위험)',
          '',
          'naive_rag("1+1 은 얼마야?")',
          '#  → 사내 문서 검색이 일어남 (불필요한 비용·지연)',
          '',
          '# ⚠ 한계 정리',
          '#  1) 모든 질문에 검색 → 비용·지연 낭비',
          '#  2) 무관 문서가 컨텍스트 오염',
          '#  3) 답변 사후 검증 없음 → 환각',
        ],
        highlight: [7, 8, 9, 10, 11, 12, 15, 16, 17, 19, 20, 23, 24, 25],
      },
      {
        filename: 'self-rag-retrieve.py',
        lang: 'python',
        lines: [
          '# Step 2. Self-RAG — [Retrieve] token 으로 검색 필요성 판단',
          'from langchain_openai import ChatOpenAI',
          'llm = ChatOpenAI(model="gpt-4o-mini", temperature=0)',
          '',
          'RETRIEVE_PROMPT = """다음 질문에 외부 문서 검색이 필요한가?',
          '셋 중 하나로만 답: Yes(사실확인 필요) / No(일반지식) / Continue(실시간 tool)',
          '질문: {question}\\n답:"""',
          '',
          'def decide_retrieve(question: str) -> str:',
          '    """[Retrieve] reflection token 생성 — Yes / No / Continue."""',
          '    out = llm.invoke(RETRIEVE_PROMPT.format(question=question)).content',
          '    return out.strip().split()[0]',
          '',
          'def self_rag_step1(question: str):',
          '    token = decide_retrieve(question)',
          '    print(f"[Retrieve]={token}  ← {question}")',
          '    if token == "Yes":',
          '        return run_retrieval_then_generate(question)   # → Step 3',
          '    elif token == "No":',
          '        return llm.invoke(question).content            # 즉답',
          '    else:  # Continue',
          '        return call_external_tool(question)            # web/api',
          '',
          '# 시연 ───────────────────────────────',
          'self_rag_step1("우리 회사 연차는?")  # → [Retrieve]=Yes → 검색',
          'self_rag_step1("1+1 은 얼마야?")     # → [Retrieve]=No  → 즉답',
          'self_rag_step1("오늘 서울 날씨?")    # → [Retrieve]=Continue → web tool',
          '',
          '# 💡 효과: 검색 호출 ~30% 감소, 무관 컨텍스트 오염 사전 차단',
        ],
        highlight: [5, 6, 7, 9, 10, 11, 12, 14, 15, 16, 17, 18, 19, 20, 21, 22, 25, 26, 27],
      },
      {
        filename: 'is-rel.py',
        lang: 'python',
        lines: [
          '# Step 3. [IsRel] 토큰 — 검색된 각 문서의 관련성을 LLM 이 평가',
          'from typing import List',
          'from langchain.schema import Document',
          'from langchain_openai import ChatOpenAI',
          'llm = ChatOpenAI(model="gpt-4o-mini", temperature=0)',
          '',
          'ISREL_PROMPT = """다음 문서가 질문에 답하는 데 관련 있는가?',
          '둘 중 하나로만 답: Relevant / Irrelevant',
          '질문: {question}\\n문서: {doc}\\n답:"""',
          '',
          'def is_relevant(question: str, doc: Document) -> bool:',
          '    """문서 1 건에 대해 [IsRel] 토큰 생성."""',
          '    prompt = ISREL_PROMPT.format(question=question, doc=doc.page_content)',
          '    return llm.invoke(prompt).content.strip().startswith("Relevant")',
          '',
          'def filter_relevant(question: str, docs: List[Document]) -> List[Document]:',
          '    """top-k 검색 결과를 Self-RAG 식으로 필터링."""',
          '    kept = []',
          '    for d in docs:',
          '        verdict = "Relevant   keep" if is_relevant(question, d) else "Irrelevant drop"',
          '        print(f"  [IsRel]={verdict}  ← {d.metadata[\'title\']}")',
          '        if verdict.startswith("Relevant"): kept.append(d)',
          '    return kept',
          '',
          '# 시연 ────────────────────────────────',
          'docs = vs.similarity_search("우리 회사 연차는?", k=4)',
          'kept = filter_relevant("우리 회사 연차는?", docs)',
          '#  [IsRel]=Relevant   keep  ← 인사규정 3장 - 연차',
          '#  [IsRel]=Irrelevant drop  ← 경비처리 가이드',
          '#  [IsRel]=Relevant   keep  ← 인사규정 3장 - 리프레시',
          '#  [IsRel]=Irrelevant drop  ← 근무시간 규정',
          '',
          '# 4 건 → 2 건 — 무관 문서를 컨텍스트에서 제거',
          '# 💡 효과: 컨텍스트가 깨끗해져 환각 ↓, 토큰 비용도 절감',
        ],
        highlight: [7, 8, 9, 11, 12, 13, 14, 16, 17, 18, 19, 20, 21, 22, 23, 26, 27, 28, 29, 30, 31, 33, 34],

        lines: [
          '# Step 4. [IsSup] 지지도 + [IsUse] 유용성 — 답변 자기 검증',
          'from langchain_openai import ChatOpenAI',
          'llm = ChatOpenAI(model="gpt-4o-mini", temperature=0)',
          '',
          'ISSUP_PROMPT = """답변의 각 주장이 문서에 의해 뒷받침되는가?',
          '셋 중 하나로 답: Fully Supported / Partially / No Support',
          '문서:\\n{context}\\n답변: {answer}\\n판정:"""',
          '',
          'ISUSE_PROMPT = """답변이 질문을 얼마나 해결하는가? 1~5 점',
          '(5=완전 / 3=부분 / 1=회피)',
          '질문: {question}\\n답변: {answer}\\n점수:"""',
          '',
          'def critique(question, context, answer):',
          '    """[IsSup], [IsUse] 두 토큰을 동시 생성."""',
          '    issup = llm.invoke(ISSUP_PROMPT.format(',
          '        context=context, answer=answer)).content.strip()',
          '    isuse = int(llm.invoke(ISUSE_PROMPT.format(',
          '        question=question, answer=answer)).content.strip())',
          '    return issup, isuse',
          '',
          'def self_rag_finalize(question, context, answer):',
          '    issup, isuse = critique(question, context, answer)',
          '    print(f"[IsSup]={issup}   [IsUse]={isuse}/5")',
          '    # 통과 기준: Fully Supported + IsUse >= 4',

        ],
        highlight: [5, 6, 7, 9, 10, 11, 13, 14, 15, 16, 17, 18, 19, 21, 22, 23, 24, 25, 26, 27, 30, 31, 32, 33, 34, 35],
      },
      {
        filename: 'result.md',

        lines: [

          '| [IsSup]    | 답변 생성 후  | 주장의 문서 지지도 검증   | Fully / Partially / No |',

          '- 의료 진단 보조 — 환각 1 건도 위험',
          '- 법률 자문 — 근거 조문 명시 필수',
          '- 금융 컴플라이언스 — 규정 준수 검증',
          '- B2B 고신뢰 문서 QA — 답변 신뢰도가 곧 제품 가치',
          '',
          '## 부적합 도메인',
          '- 캐주얼 챗봇 — 비용·지연 손해가 큼',
          '- 대량 트래픽 검색 서비스 — 토큰 비용 폭증',
          '',
          '## 다음 단계',
          '- VI-1-2 **CRAG** : 검색 신뢰도 낮으면 web fallback',
          '- VI-2-x       : Multi-hop / Agentic RAG 로 확장',
        ],
        highlight: [3, 4, 5, 6, 7, 8, 9, 11, 12, 13, 14, 15, 16, 17, 18, 20, 21, 22, 24, 25, 26, 27, 28, 30, 31, 32, 34, 35, 36],
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 위: 의사결정 트리 — Self-RAG 5 노드 흐름
    //   nodes 의 state 에 따라 색상/펄스/체크 표시
    //   - idle     : 회색 점선 (사용 안함)
    //   - pending  : 옅은 회색 (대기)
    //   - active   : rose 펄스 (현재 활성)
    //   - done     : rose 채움 + ✓
    //   - rejected : 빨강 점선
    // ─────────────────────────────────────────────────────
    function NodeBox({ name, label, state, token, decision }) {
      let cls = 'bg-slate-50 border-slate-200 text-slate-400';
      let badge = null;
      let pulse = '';
      if (state === 'pending') {
        cls = 'bg-slate-50 border-slate-300 text-slate-500';
        badge = <span className="text-[8px] bg-slate-300 text-slate-600 px-1 rounded font-bold">PENDING</span>;
      } else if (state === 'active') {
        cls = 'bg-rose-100 border-rose-500 text-rose-900 border-2';
        pulse = 'animate-pulse';
        badge = <span className="text-[8px] bg-rose-600 text-white px-1 rounded font-bold animate-pulse">ACTIVE</span>;
      } else if (state === 'done') {
        cls = 'bg-rose-600 border-rose-700 text-white';
        badge = <span className="text-[8px] bg-white text-rose-700 px-1 rounded font-bold">✓ DONE</span>;
      } else if (state === 'rejected') {
        cls = 'bg-red-50 border-red-300 text-red-700 border-dashed';
        badge = <span className="text-[8px] bg-red-500 text-white px-1 rounded font-bold">SKIP</span>;
      } else {
        badge = <span className="text-[8px] bg-slate-200 text-slate-400 px-1 rounded font-bold">IDLE</span>;
      }
      return (
        <div className={`rounded-lg border p-2 ${cls} ${pulse} transition-all duration-500`}>
          <div className="flex items-center justify-between mb-0.5">
            <span className="text-[10px] font-bold uppercase tracking-wider">{name}</span>
            {badge}
          </div>
          <div className="text-[11px] font-bold leading-tight">{label}</div>
          {token && (
            <div className={`text-[9px] font-mono mt-0.5 px-1 py-0.5 rounded inline-block ${state === 'done' ? 'bg-white/20' : 'bg-rose-200/60 text-rose-800'}`}>
              {token}
            </div>
          )}
          <div className={`text-[9px] mt-0.5 ${state === 'done' ? 'text-rose-100' : ''}`}>{decision}</div>
        </div>
      );
    }

    const Arrow = () => <div className="text-center text-rose-400 text-[10px] font-mono my-1">↓</div>;

    function DecisionTree({ step }) {
      const n = step.nodes;
      const isNaive = step.mode === 'naive';
      const genCls = n.generate.state === 'done' ? 'bg-rose-600 border-rose-700 text-white'
                  : n.generate.state === 'active' ? 'bg-rose-100 border-rose-500 border-2 text-rose-900 animate-pulse'
                  : 'bg-slate-50 border-slate-300 text-slate-500';
      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🎓</span>
              <span className="text-[11px] font-bold text-rose-800">Self-RAG 의사결정 트리</span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${isNaive ? 'bg-slate-200 text-slate-600' : 'bg-rose-100 text-rose-700'}`}>
              {isNaive ? 'naive RAG' : 'Self-RAG'}
            </span>
          </div>
          <div className="bg-blue-50 border border-blue-300 rounded p-2 mb-2">
            <div className="text-[9px] font-bold text-blue-700 uppercase tracking-wider">user input</div>
            <div className="text-[11px] text-blue-900 font-mono">"{QUESTION}"</div>
          </div>
          <Arrow />
          <NodeBox name="① [Retrieve]" label="검색 필요?" state={n.retrieve.state} token={n.retrieve.token} decision={n.retrieve.decision} />
          <Arrow />
          <NodeBox name="② [IsRel]" label="문서 관련성" state={n.isrel.state} token={n.isrel.token} decision={n.isrel.decision} />
          <Arrow />
          <div className={`rounded-lg border p-2 ${genCls} transition-all duration-500`}>
            <div className="flex items-center justify-between mb-0.5">
              <span className="text-[10px] font-bold uppercase tracking-wider">③ generate</span>
              {n.generate.state === 'done' && <span className="text-[8px] bg-white text-rose-700 px-1 rounded font-bold">✓ DONE</span>}
              {n.generate.state === 'pending' && <span className="text-[8px] bg-slate-300 text-slate-600 px-1 rounded font-bold">PENDING</span>}
            </div>
            <div className="text-[11px] font-bold leading-tight">{n.generate.label}</div>
            <div className={`text-[9px] mt-0.5 ${n.generate.state === 'done' ? 'text-rose-100' : ''}`}>{n.generate.note}</div>
          </div>
          <Arrow />
          <NodeBox name="④ [IsSup]" label="답변 지지도" state={n.issup.state} token={n.issup.token} decision={n.issup.decision} />
          <Arrow />
          <NodeBox name="⑤ [IsUse]" label="유용성 점수" state={n.isuse.state} token={n.isuse.token} decision={n.isuse.decision} />
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: 결과 박스 — step.result.kind 별로 다른 시각화
    //   - naive          : 무관 문서까지 답에 섞임 경고
    //   - retrieveDecision: 3 가지 질문 예 + Yes/No/Continue 분기
    //   - isrelEval      : 4 문서 카드 keep/drop
    //   - issupIsuse     : 답변 + 주장별 ✓ + IsUse 점수
    //   - compare        : 일반 RAG vs Self-RAG 비교 표 + 적합 도메인
    // ─────────────────────────────────────────────────────
    function ResultBox({ result }) {
      if (result.kind === 'naive') {
        return (
          <div className="bg-red-50 border-2 border-red-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">⚠️</span>
              <span className="text-[11px] font-bold text-red-700">naive RAG 결과</span>
            </div>
            <div className="bg-white rounded border border-red-200 p-2 mb-2">
              <div className="text-[9px] font-bold text-red-700 mb-1 uppercase tracking-wider">검색된 문서</div>
              <div className="text-[10px] font-mono text-slate-700">
                top-{result.retrievedCount} 모두 컨텍스트에 투입 (그 중 무관 {result.irrelevantCount} 건)
              </div>
            </div>
            <div className="bg-white rounded border-2 border-red-400 p-2">
              <div className="text-[9px] font-bold text-red-700 mb-1 uppercase tracking-wider">생성된 답변</div>
              <div className="text-[10px] text-red-900 font-medium leading-snug">"{result.answer}"</div>
            </div>
            <div className="text-[10px] text-red-700 mt-2 font-bold">🚨 {result.issue}</div>
          </div>
        );
      }

      if (result.kind === 'retrieveDecision') {
        const colorOf = (t) => t === 'Yes' ? 'rose' : t === 'No' ? 'emerald' : 'amber';
        return (
          <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">🤔</span>
              <span className="text-[11px] font-bold text-rose-800">[Retrieve] 토큰 — 질문별 분기 예시</span>
            </div>
            <div className="space-y-1.5">
              {result.examples.map((ex, i) => {
                const c = colorOf(ex.token);
                return (
                  <div key={i} className={`bg-white rounded border-2 border-${c}-300 p-2`}>
                    <div className="flex items-center gap-1.5 mb-1">
                      <span className={`text-[9px] bg-${c}-600 text-white px-1.5 py-0.5 rounded font-mono font-bold`}>
                        [Retrieve]={ex.token}
                      </span>
                      <span className="text-[10px] text-slate-700 font-mono">"{ex.q}"</span>
                    </div>
                    <div className="text-[9px] text-slate-600 ml-1">
                      {ex.reason} · <span className={`text-${c}-700 font-bold`}>{ex.next}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      if (result.kind === 'isrelEval') {
        return (
          <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">🔍</span>
                <span className="text-[11px] font-bold text-rose-800">[IsRel] 평가 결과</span>
              </div>
              <span className="text-[9px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">{result.keptCount}/{result.docs.length} keep</span>
            </div>
            <div className="space-y-1">
              {result.docs.map((d) => (
                <div key={d.id} className={`flex items-start gap-1.5 p-1.5 rounded border-2 ${d.relevant ? 'bg-white border-rose-400' : 'bg-slate-50 border-slate-300 opacity-60'}`}>
                  <span className="text-base mt-0">{d.relevant ? '✅' : '❌'}</span>
                  <div className="flex-1 min-w-0">
                    <div className="text-[10px] font-bold text-slate-800 truncate">[{d.id}] {d.title}</div>
                    <div className="text-[9px] text-slate-500 truncate font-mono">{d.snippet}</div>
                  </div>
                  <span className={`text-[8px] px-1 py-0.5 rounded font-mono font-bold flex-shrink-0 ${d.relevant ? 'bg-rose-600 text-white' : 'bg-slate-400 text-white'}`}>{d.relevant ? 'Relevant' : 'Irrelevant'}</span>
                </div>
              ))}
            </div>
            <div className="text-[9px] text-rose-700 mt-2 font-bold">✓ 무관 {result.droppedCount}건 drop → 컨텍스트가 깨끗해진 채로 답변 생성</div>
          </div>
        );
      }

      if (result.kind === 'issupIsuse') {
        return (
          <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">📋</span>
              <span className="text-[11px] font-bold text-rose-800">[IsSup] + [IsUse] 자기 검증</span>
            </div>
            <div className="bg-white rounded border border-rose-300 p-2 mb-2">
              <div className="text-[9px] font-bold text-rose-700 mb-1 uppercase tracking-wider">생성된 답변</div>
              <div className="text-[10px] text-slate-800 font-medium leading-snug">"{result.answer}"</div>
            </div>
            <div className="bg-white rounded border-2 border-rose-400 p-2 mb-2">
              <div className="text-[9px] font-bold text-rose-700 mb-1 uppercase tracking-wider">[IsSup] 주장별 지지도</div>
              <div className="space-y-1">
                {result.issupChecks.map((c, i) => (
                  <div key={i} className="flex items-start gap-1.5 text-[9px]">
                    <span className="text-sm">✅</span>
                    <div className="flex-1">
                      <div className="text-slate-800 font-medium">"{c.claim}"</div>
                      <div className="text-rose-600 font-mono mt-0.5">← {c.source} · <span className="bg-rose-600 text-white px-1 rounded font-bold">{c.supported}</span></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div className="bg-white rounded border-2 border-amber-400 p-2">
              <div className="flex items-center justify-between">
                <div className="text-[9px] font-bold text-amber-700 uppercase tracking-wider">[IsUse] 유용성</div>
                <div className="flex items-center gap-1">
                  {[1, 2, 3, 4, 5].map((s) => (
                    <span key={s} className={`text-sm ${s <= result.isuseScore ? 'text-amber-500' : 'text-slate-300'}`}>★</span>

                  <span className="text-[10px] font-mono font-bold text-amber-700 ml-1">{result.isuseScore}/5</span>
                </div>
              </div>
              <div className="text-[9px] text-slate-600 mt-0.5">{result.isuseReason}</div>
            </div>
          </div>
        );
      }

      if (result.kind === 'compare') {
        return (
          <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">📊</span>
              <span className="text-[11px] font-bold text-rose-800">naive RAG vs Self-RAG</span>
            </div>
            <div className="bg-white rounded border border-rose-200 p-2 mb-2">
              <table className="w-full text-[10px]">
                <thead>
                  <tr className="border-b border-slate-200">
                    <th className="text-left p-1 text-slate-500 font-bold">지표</th>
                    <th className="text-center p-1 text-slate-500">naive</th>
                    <th className="text-center p-1 text-rose-700">Self-RAG</th>
                    <th className="text-right p-1 text-slate-500">Δ</th>
                  </tr>
                </thead>
                <tbody>
                  {result.metrics.map((m, i) => (
                    <tr key={i} className="border-b border-slate-100">
                      <td className="p-1 font-medium text-slate-700">{m.name}</td>
                      <td className="p-1 text-center text-slate-500 font-mono">{m.naive}</td>
                      <td className="p-1 text-center text-rose-700 font-mono font-bold">{m.self}</td>
                      <td className={`p-1 text-right font-mono font-bold ${m.good ? 'text-emerald-600' : 'text-amber-600'}`}>{m.delta}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="bg-white rounded border-2 border-rose-400 p-2">
              <div className="text-[9px] font-bold text-rose-700 mb-1 uppercase tracking-wider">적합 도메인</div>
              <div className="flex flex-wrap gap-1">
                {result.fitFor.map((f) => (
                  <span key={f} className="text-[9px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-medium">{f}</span>
                ))}
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 의사결정 트리 / 하단: 결과 박스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🎓 Self-RAG — Reflection Token 의사결정</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <DecisionTree step={step} />
            <ResultBox result={step.result} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-600"></span>done
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-300"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-300"></span>pending
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-red-400"></span>naive issue
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — 5 파일 탭 지원
    //   activeTab : 현재 step 의 codeTab 파일명
    //   탭을 클릭해 다른 파일도 미리보기 가능
    // ─────────────────────────────────────────────────────
    function CodeViewer({ stepIdx, total, activeTab }) {
      const [selectedTab, setSelectedTab] = useState(activeTab);
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);
      useEffect(() => { setSelectedTab(activeTab); }, [activeTab]);
      const code = CODE_TABS.find((t) => t.filename === selectedTab) || CODE_TABS[0];
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          setRenderedLines(codeRef.current.innerHTML.split('\n'));
        }
      }, [code]);
      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-3 py-2 flex items-center gap-2 border-b border-slate-700 overflow-x-auto">
            <div className="flex gap-1.5 flex-shrink-0">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <div className="flex gap-1 ml-2 flex-shrink-0">
              {CODE_TABS.map((tab) => {
                const isActive = tab.filename === selectedTab;
                const isStepActive = tab.filename === activeTab;
                return (
                  <button key={tab.filename} onClick={() => setSelectedTab(tab.filename)}
                    className={`text-[10px] px-2 py-1 rounded font-mono whitespace-nowrap transition ${
                      isActive ? 'bg-[#282c34] text-rose-300 border-t-2 border-rose-400' : 'text-slate-400 hover:bg-slate-700/50'
                    } ${isStepActive && !isActive ? 'ring-1 ring-rose-500/40' : ''}`}>
                    {tab.filename}
                  </button>
                );
              })}
            </div>
          </div>
          <pre className="hidden"><code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code></pre>
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0"><code className="block">
              {(renderedLines || code.lines).map((lineHtml, i) => {
                const hl = code.highlight && code.highlight.includes(i + 1);
                return (
                  <div key={i} className={`flex hover:bg-slate-800/50 ${hl ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''}`}>
                    <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">{i + 1}</span>
                    <span className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1" dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }} />
                  </div>
                );
              })}
            </code></pre>
          </div>
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.lang}</span>
            <span>Step {stepIdx + 1} / {total} · active: <span className="text-rose-400">{activeTab}</span></span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VI-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. Advanced RAG 패턴 &gt; Chapter 1. 자기 교정 RAG</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VI-1-1. Self-RAG — 검색 필요성 자체 판단 + 자기 평가</h1>
                  <p className="text-sm text-slate-500 mt-0.5">시험 중 자기 검토하는 모범생 — [Retrieve] · [IsRel] · [IsSup] · [IsUse]</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer stepIdx={stepIdx} total={STEPS.length} activeTab={step.codeTab} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: Self-RAG = <strong>[Retrieve]</strong>(검색 판단) + <strong>[IsRel]</strong>(관련성) + <strong>[IsSup]</strong>(지지도) + <strong>[IsUse]</strong>(유용성). 비용 +30% 대신 환각 -40% / 정확도 +18%. 다음(VI-1-2)에서는 검색 신뢰도가 낮을 때 web fallback 하는 <strong>CRAG</strong> 를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Self-RAG', 'Reflection Token', '[Retrieve]', '[IsRel]', '[IsSup]', '[IsUse]', '자기 평가'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../part5/V-2-2.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; V-2-2 (Part V)</a>
              <a href="./VI-1-2.html" className="text-rose-700 hover:text-rose-900 font-medium">VI-1-2 CRAG &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
