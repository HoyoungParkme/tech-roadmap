<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — VI-1-1. Self-RAG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "Self-RAG란?",
        desc: "시험 중 자기 검토하는 모범생을 떠올려 보세요. 답을 쓰기 전에 '교과서를 봐야 하나?', '이 페이지가 맞나?', '내 답이 맞나?' — 3단계로 스스로를 점검합니다. Self-RAG는 LLM이 스스로 검색 여부를 판단하고 답변 품질을 검증하는 고급 패턴입니다.",
        phase: "intro",
        nodes: []
      },
      {
        title: "1단계: Retrieve 판단",
        desc: "LLM이 먼저 '이 질문에 외부 문서가 필요한가?'를 판단합니다. 이미 알고 있는 간단한 질문이면 바로 답변하고, 사실 확인이 필요하면 검색을 수행합니다. — [Retrieve] 토큰을 생성합니다.",
        phase: "retrieve",
        decision: "교과서를 봐야 할까?",
        yesLabel: "검색 필요 → 문서 검색",
        noLabel: "검색 불필요 → 바로 답변",
        example: { question: "우리 회사 연차 정책은?", token: "[Retrieve] = Yes", reason: "사내 규정은 LLM이 모르는 정보 → 검색 필요" }
      },
      {
        title: "2단계: Relevance 평가",
        desc: "검색된 각 문서에 대해 '이 문서가 질문과 관련 있는가?'를 평가합니다. 관련 없는 문서는 버리고, 관련 있는 문서만 남깁니다. — [ISREL] 토큰을 생성합니다.",
        phase: "relevance",
        decision: "이 페이지가 관련 있나?",
        docs: [
          { title: "인사규정 3장 - 휴가", relevant: true, reason: "연차 정책 직접 관련" },
          { title: "경비 처리 가이드", relevant: false, reason: "질문과 무관" },
          { title: "인사규정 1장 - 근무시간", relevant: false, reason: "근무시간은 연차와 다름" }
        ]
      },
      {
        title: "3단계: Support 검증",
        desc: "관련 문서를 바탕으로 답변을 생성한 뒤, '내 답변이 문서 내용에 충실한가?'를 자체 검증합니다. 문서에 없는 내용을 지어내지 않았는지 확인합니다. — [ISSUP] 토큰을 생성합니다.",
        phase: "support",
        decision: "내 답이 충실한가?",
        answer: "연차는 1년 이상 근속 시 15일 + 리프레시 휴가 3일입니다.",
        checks: [
          { claim: "1년 이상 근속 시 15일", supported: true, source: "인사규정 3장 2절" },
          { claim: "리프레시 휴가 3일", supported: true, source: "인사규정 3장 4절" }
        ]
      },
      {
        title: "전체 흐름 — 의사결정 트리",
        desc: "Self-RAG는 3단계 자기 성찰 루프를 통해 답변 품질을 보장합니다. 기존 RAG가 '무조건 검색'하는 것과 달리, 필요할 때만 검색하고 결과를 엄격히 검증합니다.",
        phase: "tree",
        nodes: []
      },
      {
        title: "기존 RAG vs Self-RAG 비교",
        desc: "기존 RAG: 모든 질문에 검색 → 답변 (품질 보장 없음). Self-RAG: 검색 필요성 판단 → 관련성 필터링 → 충실성 검증. 불필요한 검색을 줄이고, 답변의 신뢰도를 높입니다.",
        phase: "compare",
        comparison: [
          { aspect: "검색 시점", basic: "항상 검색", self: "필요할 때만 검색" },
          { aspect: "문서 필터링", basic: "유사도 기준만", self: "관련성 자체 평가" },
          { aspect: "답변 검증", basic: "없음", self: "충실성 자체 검증" },
          { aspect: "효율성", basic: "낮음 (불필요한 검색)", self: "높음 (선택적 검색)" },
          { aspect: "신뢰도", basic: "보통", self: "높음 (자기 검증)" }
        ]
      }
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderVisualization = () => {
        if (s.phase === 'intro') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">Self-RAG 핵심 개념</div>
              <div className="flex flex-col items-center gap-4">
                <div className="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center text-3xl border-2 border-amber-300">🎓</div>
                <div className="text-center text-sm text-slate-600 font-medium">시험 중 자기 검토하는 모범생</div>
                <div className="w-full space-y-3 mt-2">
                  {["교과서를 봐야 할까? (Retrieve)", "이 페이지가 관련 있나? (Relevance)", "내 답이 충실한가? (Support)"].map((q, i) => (
                    <div key={i} className="flex items-center gap-3 p-3 bg-amber-50 rounded-lg border border-amber-200">
                      <div className="w-7 h-7 bg-amber-600 text-white rounded-full flex items-center justify-center text-xs font-bold">{i + 1}</div>
                      <span className="text-sm font-medium text-amber-800">{q}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'retrieve') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">1단계: Retrieve 판단</div>
              <div className="flex flex-col items-center gap-3">
                <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 w-full text-sm text-blue-800 font-mono text-center">"{s.example.question}"</div>
                <div className="text-lg">↓</div>
                <div className="bg-amber-100 border-2 border-amber-400 rounded-xl p-4 w-full text-center">
                  <div className="text-sm font-bold text-amber-800 mb-1">🤔 {s.decision}</div>
                  <div className="text-xs text-amber-600 font-mono">{s.example.token}</div>
                </div>
                <div className="grid grid-cols-2 gap-3 w-full mt-1">
                  <div className="bg-green-50 border border-green-300 rounded-lg p-3 text-center">
                    <div className="text-xs font-bold text-green-700">Yes ✓</div>
                    <div className="text-xs text-green-600 mt-1">{s.yesLabel}</div>
                  </div>
                  <div className="bg-slate-50 border border-slate-300 rounded-lg p-3 text-center opacity-50">
                    <div className="text-xs font-bold text-slate-500">No</div>
                    <div className="text-xs text-slate-400 mt-1">{s.noLabel}</div>
                  </div>
                </div>
                <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 w-full text-xs text-amber-700 mt-1">
                  <b>판단 이유:</b> {s.example.reason}
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'relevance') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">2단계: Relevance 평가 [ISREL]</div>
              <div className="flex flex-col items-center gap-3">
                <div className="bg-amber-100 border-2 border-amber-400 rounded-xl p-3 w-full text-center">
                  <div className="text-sm font-bold text-amber-800">🔍 {s.decision}</div>
                </div>
                <div className="text-lg">↓</div>
                <div className="w-full space-y-2">
                  {s.docs.map((doc, i) => (
                    <div key={i} className={`flex items-center gap-3 p-3 rounded-lg border-2 transition-all ${doc.relevant ? 'bg-green-50 border-green-300' : 'bg-red-50 border-red-200 opacity-60'}`}>
                      <span className="text-lg">{doc.relevant ? '✅' : '❌'}</span>
                      <div className="flex-1">
                        <div className="text-sm font-bold">{doc.title}</div>
                        <div className="text-xs text-slate-500 mt-0.5">{doc.reason}</div>
                      </div>
                      <span className={`text-xs font-mono px-2 py-1 rounded ${doc.relevant ? 'bg-green-200 text-green-800' : 'bg-red-200 text-red-800'}`}>
                        {doc.relevant ? 'Relevant' : 'Not Relevant'}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'support') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">3단계: Support 검증 [ISSUP]</div>
              <div className="flex flex-col gap-3">
                <div className="bg-amber-100 border-2 border-amber-400 rounded-xl p-3 text-center">
                  <div className="text-sm font-bold text-amber-800">📋 {s.decision}</div>
                </div>
                <div className="bg-blue-50 border border-blue-200 rounded-lg p-3">
                  <div className="text-xs font-bold text-blue-600 mb-1">생성된 답변</div>
                  <div className="text-sm text-blue-800 font-mono">{s.answer}</div>
                </div>
                <div className="text-center text-sm font-bold text-slate-400">↓ 문장별 검증 ↓</div>
                <div className="space-y-2">
                  {s.checks.map((c, i) => (
                    <div key={i} className="flex items-start gap-3 p-3 bg-green-50 rounded-lg border border-green-200">
                      <span className="text-lg mt-0.5">✅</span>
                      <div className="flex-1">
                        <div className="text-sm font-medium text-green-800">"{c.claim}"</div>
                        <div className="text-xs text-green-600 mt-1">출처: {c.source} — <span className="font-bold">{c.supported ? 'Fully Supported' : 'Not Supported'}</span></div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'tree') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">Self-RAG 전체 의사결정 트리</div>
              <div className="flex flex-col items-center gap-2 text-sm">
                <div className="bg-blue-100 border border-blue-300 rounded-lg px-4 py-2 font-bold text-blue-800">질문 입력</div>
                <div>↓</div>
                <div className="bg-amber-200 border-2 border-amber-500 rounded-xl px-4 py-2 font-bold text-amber-900">① 검색 필요? [Retrieve]</div>
                <div className="grid grid-cols-2 gap-8 w-full">
                  <div className="flex flex-col items-center gap-2">
                    <div className="text-xs text-green-600 font-bold">Yes ↓</div>
                    <div className="bg-green-100 border border-green-300 rounded-lg px-3 py-1.5 text-xs text-green-800 font-bold">문서 검색</div>
                    <div>↓</div>
                    <div className="bg-amber-200 border-2 border-amber-500 rounded-xl px-3 py-1.5 text-xs font-bold text-amber-900">② 관련 있나? [ISREL]</div>
                    <div>↓</div>
                    <div className="bg-green-100 border border-green-300 rounded-lg px-3 py-1.5 text-xs text-green-800 font-bold">답변 생성</div>
                    <div>↓</div>
                    <div className="bg-amber-200 border-2 border-amber-500 rounded-xl px-3 py-1.5 text-xs font-bold text-amber-900">③ 충실한가? [ISSUP]</div>
                    <div>↓</div>
                    <div className="bg-emerald-200 border border-emerald-400 rounded-lg px-3 py-1.5 text-xs text-emerald-800 font-bold">검증된 답변 출력</div>
                  </div>
                  <div className="flex flex-col items-center gap-2">
                    <div className="text-xs text-slate-400 font-bold">No ↓</div>
                    <div className="bg-slate-100 border border-slate-300 rounded-lg px-3 py-1.5 text-xs text-slate-600 font-bold">LLM 직접 답변</div>
                  </div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'compare') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">기존 RAG vs Self-RAG</div>
              <table className="w-full text-xs">
                <thead>
                  <tr className="border-b border-slate-200">
                    <th className="text-left p-2 text-slate-500">항목</th>
                    <th className="text-center p-2 text-slate-500">기존 RAG</th>
                    <th className="text-center p-2 text-amber-600">Self-RAG</th>
                  </tr>
                </thead>
                <tbody>
                  {s.comparison.map((row, i) => (
                    <tr key={i} className="border-b border-slate-100">
                      <td className="p-2 font-bold text-slate-700">{row.aspect}</td>
                      <td className="p-2 text-center text-slate-500">{row.basic}</td>
                      <td className="p-2 text-center text-amber-700 font-medium">{row.self}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
        }
        return null;
      };

      const renderRightPanel = () => {
        if (s.phase === 'intro') {
          return (
            <div className="space-y-4">
              <div className="p-4 rounded-lg bg-amber-50 border border-amber-200">
                <div className="font-bold text-sm text-amber-800 mb-2">Self-RAG의 핵심 아이디어</div>
                <div className="text-xs text-amber-700 space-y-1">
                  <div>• LLM 스스로가 <b>검색 필요성</b>을 판단</div>
                  <div>• 검색 결과의 <b>관련성</b>을 자체 평가</div>
                  <div>• 생성된 답변의 <b>충실성</b>을 자체 검증</div>
                  <div>• 특수 <b>리플렉션 토큰</b>을 사용</div>
                </div>
              </div>
              <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                <div className="font-bold text-sm text-slate-700 mb-2">리플렉션 토큰</div>
                <div className="text-xs text-slate-600 space-y-2">
                  <div className="flex items-center gap-2"><code className="bg-amber-100 px-1.5 py-0.5 rounded text-amber-800">[Retrieve]</code> 검색 여부 판단</div>
                  <div className="flex items-center gap-2"><code className="bg-amber-100 px-1.5 py-0.5 rounded text-amber-800">[ISREL]</code> 문서 관련성 평가</div>
                  <div className="flex items-center gap-2"><code className="bg-amber-100 px-1.5 py-0.5 rounded text-amber-800">[ISSUP]</code> 답변 충실성 검증</div>
                  <div className="flex items-center gap-2"><code className="bg-amber-100 px-1.5 py-0.5 rounded text-amber-800">[ISUSE]</code> 전체 유용성 평가</div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'tree') {
          return (
            <div className="space-y-4">
              <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{`# Self-RAG 핵심 로직 (의사코드)

def self_rag(query):
    # 1단계: 검색 필요성 판단
    retrieve_token = llm.generate(
        f"[Retrieve] {query}"
    )

    if retrieve_token == "Yes":
        # 문서 검색
        docs = retriever.search(query)

        # 2단계: 관련성 평가
        relevant_docs = []
        for doc in docs:
            isrel = llm.generate(
                f"[ISREL] {query} | {doc}"
            )
            if isrel == "Relevant":
                relevant_docs.append(doc)

        # 답변 생성
        answer = llm.generate(
            query, context=relevant_docs
        )

        # 3단계: 충실성 검증
        issup = llm.generate(
            f"[ISSUP] {answer} | {relevant_docs}"
        )

        if issup == "Fully Supported":
            return answer
        else:
            return regenerate(query)
    else:
        return llm.generate(query)`}</pre>
            </div>
          );
        }
        if (s.phase === 'compare') {
          return (
            <div className="space-y-4">
              <div className="p-4 rounded-lg bg-amber-50 border border-amber-200">
                <div className="font-bold text-sm text-amber-800 mb-2">Self-RAG 논문 (2023)</div>
                <div className="text-xs text-amber-700 space-y-1">
                  <div>• Asai et al., "Self-RAG: Learning to Retrieve, Generate, and Critique"</div>
                  <div>• 리플렉션 토큰을 학습시켜 LLM이 스스로 판단</div>
                  <div>• 기존 RAG 대비 사실 정확도 크게 향상</div>
                </div>
              </div>
              <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                <div className="font-bold text-sm text-slate-700 mb-2">적용 시 고려사항</div>
                <div className="text-xs text-slate-600 space-y-1">
                  <div>• 추가 학습 필요 (리플렉션 토큰 생성 능력)</div>
                  <div>• 추론 비용 증가 (자기 검증 단계)</div>
                  <div>• 높은 정확도가 필요한 도메인에 적합</div>
                  <div>• 의료, 법률, 금융 등 신뢰성 중시 분야</div>
                </div>
              </div>
            </div>
          );
        }
        return (
          <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
            <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">상세 설명</div>
            <div className="space-y-3">
              <div className="p-3 bg-amber-50 rounded-lg border border-amber-200 text-xs text-amber-800">
                <b>핵심:</b> Self-RAG의 각 단계에서 LLM이 특수 토큰을 생성하여 스스로 판단합니다. 이 자기 성찰 능력이 일반 RAG와의 가장 큰 차이입니다.
              </div>
              <div className="p-3 bg-slate-50 rounded-lg border border-slate-200 text-xs text-slate-600">
                <b>비유:</b> 모범생은 답을 쓰기 전에 "이 문제는 교과서를 찾아봐야 하나?", "맞는 페이지인가?", "내 답이 근거가 있나?"를 자문합니다. Self-RAG도 마찬가지입니다.
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-amber-700 hover:text-amber-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. Advanced RAG 패턴 &gt; Chapter 1. 자기 교정 RAG</div>
                  <h1 className="text-2xl font-bold text-slate-800">VI-1-1. Self-RAG — 자기 성찰하는 RAG</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>시험 중 자기 검토하는 모범생</b>을 떠올려 보세요. 답을 쓰기 전에 스스로 "교과서를 봐야 하나?", "이 내용이 맞나?", "내 답이 충실한가?"를 3단계로 점검합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-amber-700 border-amber-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">Self-RAG 파이프라인</h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="space-y-4">{renderVisualization()}</div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">{renderRightPanel()}</div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Self-RAG', 'Reflection Token', 'Retrieve', 'ISREL', 'ISSUP', '자기 성찰'].map(kw => (
                <span key={kw} className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-sm font-medium border border-amber-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-amber-600 hover:bg-amber-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="../part5/V-2-2.html" className="text-amber-600 hover:text-amber-800 font-medium">&larr; Part V</a>
              <a href="./VI-1-2.html" className="text-amber-600 hover:text-amber-800 font-medium">VI-1-2. CRAG &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
