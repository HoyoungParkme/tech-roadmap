<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — VI-2-1. Agentic RAG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TOOLS = [
      { name: 'Vector DB', icon: '🗄️', color: 'bg-purple-50 border-purple-300 text-purple-800', desc: '사내 문서 검색' },
      { name: 'API', icon: '🔌', color: 'bg-blue-50 border-blue-300 text-blue-800', desc: '외부 API 호출' },
      { name: 'Web', icon: '🌐', color: 'bg-green-50 border-green-300 text-green-800', desc: '웹 검색' },
      { name: 'Code', icon: '💻', color: 'bg-orange-50 border-orange-300 text-orange-800', desc: '코드 실행' },
    ];

    const STEPS = [
      {
        title: "Agentic RAG란?",
        desc: "탐정 사무소를 떠올려 보세요. 탐정은 사건을 분석하고, 필요한 도구(전화, 인터넷, 현장 조사, 포렌식)를 자유롭게 골라 사용합니다. Agentic RAG는 LLM이 Agent로서 여러 도구를 자율적으로 선택·활용하는 패턴입니다.",
        phase: "intro"
      },
      {
        title: "1단계: 질문 분석 (Thought)",
        desc: "Agent가 질문을 분석합니다. '이 질문에 답하려면 어떤 정보가 필요하고, 어떤 도구를 사용해야 하는가?'를 추론합니다. — ReAct 패턴의 Thought 단계입니다.",
        phase: "thought",
        query: "우리 회사 매출을 분석해서 다음 달 예측을 해줘",
        thoughts: [
          "1. 사내 매출 데이터 필요 → Vector DB 또는 API",
          "2. 업계 트렌드 필요 → 웹 검색",
          "3. 수치 계산 필요 → 코드 실행",
          "4. 결과 종합 → 최종 답변"
        ]
      },
      {
        title: "2단계: 도구 선택 & 실행 (Action)",
        desc: "분석 결과에 따라 적절한 도구를 선택하고 실행합니다. Vector DB에서 매출 데이터를 검색하고, 웹에서 업계 트렌드를 수집합니다. — ReAct 패턴의 Action 단계입니다.",
        phase: "action",
        activeTool: 0,
        actions: [
          { tool: "Vector DB", action: "search('2024 분기별 매출 보고서')", result: "Q1: 120억, Q2: 135억, Q3: 142억, Q4: 155억" },
          { tool: "Web", action: "search('2025 IT 산업 매출 전망')", result: "IDC 보고서: IT 서비스 시장 8.2% 성장 예상" }
        ]
      },
      {
        title: "3단계: 결과 평가 (Observation)",
        desc: "실행 결과를 평가합니다. '충분한 정보를 모았는가? 추가 도구 사용이 필요한가?' 를 판단합니다. 정보가 부족하면 다시 Action 단계로 돌아갑니다. — ReAct 패턴의 Observation 단계입니다.",
        phase: "observation",
        evaluation: [
          { item: "사내 매출 데이터", status: "확보", ok: true },
          { item: "업계 트렌드", status: "확보", ok: true },
          { item: "예측 계산", status: "미완료 → 코드 실행 필요", ok: false }
        ]
      },
      {
        title: "4단계: 반복 루프 & 코드 실행",
        desc: "평가 결과 예측 계산이 필요하므로, 코드 실행 도구를 추가로 사용합니다. Agent는 이렇게 'Thought → Action → Observation' 루프를 반복하며 점진적으로 답변을 완성합니다.",
        phase: "loop",
        codeAction: {
          tool: "Code Interpreter",
          code: "import numpy as np\ndata = [120, 135, 142, 155]\ntrend = np.polyfit(range(4), data, 1)\nnext_q = np.polyval(trend, 4)\nprint(f'Q1 2025 예측: {next_q:.0f}억')",
          result: "Q1 2025 예측: 167억"
        }
      },
      {
        title: "Agent 루프 전체 다이어그램",
        desc: "Agentic RAG의 핵심은 '자율적 도구 활용'입니다. Agent가 ReAct(Thought → Action → Observation) 패턴으로 루프를 돌며, 필요한 도구를 자유롭게 선택하고, 충분한 정보가 모이면 최종 답변을 생성합니다.",
        phase: "diagram"
      }
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderVisualization = () => {
        if (s.phase === 'intro') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">Agentic RAG 핵심 개념</div>
              <div className="flex flex-col items-center gap-4">
                <div className="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center text-3xl border-2 border-amber-300">🕵️</div>
                <div className="text-center text-sm text-slate-600 font-medium">탐정 사무소 — 여러 도구를 자유롭게 활용</div>
                <div className="grid grid-cols-2 gap-3 w-full mt-2">
                  {TOOLS.map((tool, i) => (
                    <div key={i} className={`flex items-center gap-2 p-3 rounded-lg border-2 ${tool.color}`}>
                      <span className="text-2xl">{tool.icon}</span>
                      <div>
                        <div className="font-bold text-xs">{tool.name}</div>
                        <div className="text-xs opacity-75">{tool.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'thought') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">Thought — 질문 분석</div>
              <div className="flex flex-col gap-3">
                <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-sm text-blue-800 font-mono text-center">"{s.query}"</div>
                <div className="text-center text-lg">↓ Agent 사고 과정</div>
                <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-4">
                  <div className="text-xs font-bold text-amber-700 mb-2">🤔 Thought</div>
                  <div className="space-y-2">
                    {s.thoughts.map((t, i) => (
                      <div key={i} className="flex items-start gap-2 text-xs text-amber-800">
                        <span className="text-amber-500 mt-0.5">→</span>
                        <span>{t}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'action') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">Action — 도구 실행</div>
              <div className="flex flex-col gap-3">
                {s.actions.map((act, i) => (
                  <div key={i} className="bg-slate-50 border border-slate-200 rounded-lg p-3">
                    <div className="flex items-center gap-2 mb-2">
                      <span className="text-lg">{TOOLS.find(t => t.name === act.tool)?.icon || '🔧'}</span>
                      <span className="text-xs font-bold text-slate-700">{act.tool}</span>
                    </div>
                    <div className="bg-white rounded border p-2 mb-2">
                      <div className="text-xs font-mono text-blue-700">{act.action}</div>
                    </div>
                    <div className="bg-green-50 rounded border border-green-200 p-2">
                      <div className="text-xs text-green-700"><b>Result:</b> {act.result}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }
        if (s.phase === 'observation') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">Observation — 결과 평가</div>
              <div className="flex flex-col gap-3">
                <div className="space-y-2">
                  {s.evaluation.map((ev, i) => (
                    <div key={i} className={`flex items-center justify-between p-3 rounded-lg border ${ev.ok ? 'bg-green-50 border-green-200' : 'bg-yellow-50 border-yellow-200'}`}>
                      <div className="flex items-center gap-2">
                        <span className="text-lg">{ev.ok ? '✅' : '⚠️'}</span>
                        <span className="text-sm font-medium">{ev.item}</span>
                      </div>
                      <span className={`text-xs font-bold ${ev.ok ? 'text-green-700' : 'text-yellow-700'}`}>{ev.status}</span>
                    </div>
                  ))}
                </div>
                <div className="bg-amber-100 border-2 border-amber-400 rounded-xl p-3 text-center">
                  <div className="text-sm font-bold text-amber-800">🔄 정보 부족 → 루프 계속</div>
                  <div className="text-xs text-amber-600 mt-1">코드 실행 도구를 추가 사용합니다</div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'loop') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">추가 Action — 코드 실행</div>
              <div className="flex flex-col gap-3">
                <div className="flex items-center gap-2 mb-1">
                  <span className="text-lg">💻</span>
                  <span className="text-xs font-bold text-slate-700">{s.codeAction.tool}</span>
                </div>
                <pre className="text-xs bg-slate-900 text-green-400 p-3 rounded-lg overflow-x-auto whitespace-pre-wrap font-mono">{s.codeAction.code}</pre>
                <div className="text-center text-lg">↓</div>
                <div className="bg-green-50 border border-green-200 rounded-lg p-3">
                  <div className="text-sm font-bold text-green-700">📊 {s.codeAction.result}</div>
                </div>
                <div className="text-center text-lg">↓ 모든 정보 확보</div>
                <div className="bg-emerald-100 border border-emerald-300 rounded-lg p-3 text-center">
                  <div className="text-sm font-bold text-emerald-800">✅ 최종 답변 생성</div>
                  <div className="text-xs text-emerald-600 mt-1">매출 데이터 + 업계 트렌드 + 예측 계산 = 종합 보고서</div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'diagram') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">Agentic RAG 전체 루프</div>
              <div className="flex flex-col items-center gap-2 text-sm">
                <div className="bg-blue-100 border border-blue-300 rounded-lg px-4 py-2 font-bold text-blue-800">질문 입력</div>
                <div>↓</div>
                <div className="border-2 border-amber-400 rounded-xl p-4 w-full bg-amber-50">
                  <div className="text-center text-xs font-bold text-amber-700 mb-3">ReAct 루프</div>
                  <div className="flex flex-col items-center gap-2">
                    <div className="bg-yellow-200 border border-yellow-400 rounded-lg px-4 py-2 font-bold text-yellow-800 text-xs w-48 text-center">🤔 Thought (분석)</div>
                    <div>↓</div>
                    <div className="bg-blue-200 border border-blue-400 rounded-lg px-4 py-2 font-bold text-blue-800 text-xs w-48 text-center">⚡ Action (도구 실행)</div>
                    <div className="grid grid-cols-4 gap-1 w-full">
                      {TOOLS.map((t, i) => (
                        <div key={i} className="text-center text-xs p-1 bg-white rounded border">
                          <div>{t.icon}</div>
                          <div className="text-[10px]">{t.name}</div>
                        </div>
                      ))}
                    </div>
                    <div>↓</div>
                    <div className="bg-green-200 border border-green-400 rounded-lg px-4 py-2 font-bold text-green-800 text-xs w-48 text-center">👁 Observation (평가)</div>
                    <div className="text-xs text-slate-500">충분하면 ↓ / 부족하면 ↑ 반복</div>
                  </div>
                </div>
                <div>↓ 충분한 정보 확보</div>
                <div className="bg-emerald-200 border border-emerald-400 rounded-lg px-4 py-2 font-bold text-emerald-800">최종 답변</div>
              </div>
            </div>
          );
        }
        return null;
      };

      const renderRightPanel = () => {
        if (s.phase === 'intro') {
          return (
            <div className="space-y-4">
              <div className="p-4 rounded-lg bg-amber-50 border border-amber-200">
                <div className="font-bold text-sm text-amber-800 mb-2">Agentic RAG의 핵심</div>
                <div className="text-xs text-amber-700 space-y-1">
                  <div>• LLM이 <b>Agent</b>로서 자율적으로 행동</div>
                  <div>• 여러 <b>도구</b>를 상황에 맞게 선택</div>
                  <div>• <b>ReAct</b> 패턴으로 추론과 행동을 반복</div>
                  <div>• 복잡한 질문에 단계적으로 접근</div>
                </div>
              </div>
              <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                <div className="font-bold text-sm text-slate-700 mb-2">기존 RAG vs Agentic RAG</div>
                <div className="text-xs text-slate-600 space-y-1">
                  <div>• <b>기존 RAG:</b> 검색 → 답변 (단방향)</div>
                  <div>• <b>Agentic RAG:</b> 분석 → 도구 선택 → 실행 → 평가 → 반복 (다단계 루프)</div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'diagram') {
          return (
            <div className="space-y-4">
              <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{`# Agentic RAG (LangGraph 예시)

from langgraph.graph import StateGraph

def agent_node(state):
    """Agent가 다음 행동을 결정"""
    response = llm.invoke(
        messages=state["messages"],
        tools=[
            vector_search,
            web_search,
            api_call,
            code_interpreter,
        ]
    )
    return {"messages": [response]}

def tool_node(state):
    """선택된 도구를 실행"""
    tool_calls = state["messages"][-1].tool_calls
    results = []
    for call in tool_calls:
        result = call.execute()
        results.append(result)
    return {"messages": results}

# 그래프 구성
graph = StateGraph()
graph.add_node("agent", agent_node)
graph.add_node("tools", tool_node)
graph.add_edge("agent", "tools")
graph.add_edge("tools", "agent")  # 루프`}</pre>
            </div>
          );
        }
        return (
          <div className="space-y-4">
            <div className="p-4 rounded-lg bg-amber-50 border border-amber-200">
              <div className="font-bold text-sm text-amber-800 mb-2">ReAct 패턴</div>
              <div className="text-xs text-amber-700 space-y-2">
                <div className="flex items-center gap-2"><span className="bg-yellow-200 px-1.5 py-0.5 rounded text-yellow-800 font-bold">Thought</span> 상황 분석, 다음 행동 결정</div>
                <div className="flex items-center gap-2"><span className="bg-blue-200 px-1.5 py-0.5 rounded text-blue-800 font-bold">Action</span> 도구 선택 및 실행</div>
                <div className="flex items-center gap-2"><span className="bg-green-200 px-1.5 py-0.5 rounded text-green-800 font-bold">Observation</span> 결과 확인 및 평가</div>
              </div>
            </div>
            <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
              <div className="font-bold text-sm text-slate-700 mb-2">탐정 비유</div>
              <div className="text-xs text-slate-600">
                {s.phase === 'thought' && "탐정이 사건 개요를 읽고 '어떤 단서가 필요하고, 어떤 조사를 해야 하는지' 계획을 세우는 단계입니다."}
                {s.phase === 'action' && "탐정이 계획에 따라 증거를 수집합니다. CCTV 확인, 목격자 면담, 포렌식 의뢰 등 필요한 도구를 사용합니다."}
                {s.phase === 'observation' && "수집한 증거를 분석합니다. 결정적 증거가 부족하면 추가 조사를 지시합니다."}
                {s.phase === 'loop' && "추가 조사 결과가 나왔습니다. 이제 모든 증거가 모였으므로 최종 보고서를 작성합니다."}
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-amber-700 hover:text-amber-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. Advanced RAG 패턴 &gt; Chapter 2. Agentic & Adaptive</div>
                  <h1 className="text-2xl font-bold text-slate-800">VI-2-1. Agentic RAG — Agent가 주도하는 RAG</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>탐정 사무소</b>를 떠올려 보세요. 탐정은 사건 분석 후 전화, 인터넷, 현장 조사, 포렌식 등 필요한 도구를 <b>자유롭게 골라 사용</b>합니다. Agentic RAG도 LLM이 도구를 자율적으로 활용합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-amber-700 border-amber-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">Agentic RAG 파이프라인</h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="space-y-4">{renderVisualization()}</div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">{renderRightPanel()}</div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Agentic RAG', 'ReAct', 'Tool Use', 'Agent Loop', 'LangGraph', '자율적 추론'].map(kw => (
                <span key={kw} className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-sm font-medium border border-amber-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-amber-600 hover:bg-amber-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./VI-1-2.html" className="text-amber-600 hover:text-amber-800 font-medium">&larr; VI-1-2. CRAG</a>
              <a href="./VI-2-2.html" className="text-amber-600 hover:text-amber-800 font-medium">VI-2-2. Adaptive RAG &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
