        finalAnswer: '아이폰 16 프로의 한국 출고가는 1,550,000원이고, 환율 1,400원 기준으로 약 $1,106.7 입니다.',
        finalIsFail: false,
        code: {
          lang: 'python',
          filename: 'react-trace.py',
          lines: [
            '# Step 5. ReAct cycle 전체 trace — Agent 의 실제 출력 로그',
            '#         AgentExecutor(verbose=True) 가 그대로 출력하는 형식',
            '',
            'executor = AgentExecutor(',
            '    agent=agent,',
            '    tools=[search_docs, calculator, fx_rate],',
            '    verbose=True,           # trace 표시',
            '    return_intermediate_steps=True,  # cycle 들 모두 반환',
            ')',
            '',
            'result = executor.invoke({',
            '    "input": "아이폰 16 프로 한국 출고가와 1400원 환율 달러 가격은?"',
            '})',
            '',
            '# stdout (verbose):',
            '#',
            '# > Entering new AgentExecutor chain...',
            '#',
            '# Thought: 출고가 정보가 필요. search_docs 호출.',
            '# Action: search_docs',
            '# Action Input: 아이폰 16 프로 한국 출고가',
            '# Observation: 한국 출고가 1,550,000원',
            '#',
            '# Thought: 환율은 외부 API.',
            '# Action: fx_rate',
            '# Action Input: KRW->USD',
            '# Observation: 0.000714',
            '#',
            '# Thought: 곱셈은 calculator.',
            '# Action: calculator',
            '# Action Input: 1550000 * 0.000714',
            '# Observation: 1106.7',
            '#',
            '# Thought: 정보 충분 — 최종 답변 생성.',
            '# Final Answer: 한국 1,550,000원 / 약 $1,106.7',
            '#',
            '# > Finished chain.',
            '',
            'for step, obs in result["intermediate_steps"]:',
            '    print(step.tool, "→", obs)',
            '#  search_docs → 한국 출고가 1,550,000원',
            '#  fx_rate     → 0.000714',
            '#  calculator  → 1106.7',
            '',
            '# 🎯 Agentic RAG 핵심: 자율 선택 + 재호출 + 도구 결합 + trace 누적',
          ],
          highlight: [1, 2, 4, 5, 6, 7, 8, 11, 12, 13, 16, 19, 20, 21, 22, 24, 25, 26, 27, 29, 30, 31, 32, 34, 35, 38, 39, 40, 41, 42, 45, 46, 47, 48, 49],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // Agent 박스 — 좌측 상단
    //   현재 step 의 mode 에 따라 라벨/배지가 바뀐다
    // ─────────────────────────────────────────────────────
    function AgentBox({ mode, question }) {
      const modeLabel = {
        'static':      { txt: 'Static RAG',       cls: 'bg-slate-500 text-white',   icon: '📄' },
        'agentic':     { txt: 'Agent (1 tool)',   cls: 'bg-rose-600 text-white',    icon: '🤖' },
        'multi-call':  { txt: 'Agent · re-call',  cls: 'bg-rose-700 text-white',    icon: '🔁' },
        'multi-tool':  { txt: 'Agent · 3 tools',  cls: 'bg-rose-800 text-white',    icon: '🧰' },
        'react-trace': { txt: 'Agent · trace',    cls: 'bg-rose-900 text-white',    icon: '🧭' },
      }[mode];

      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🕵️</span>
              <span className="text-[11px] font-bold text-rose-800">Agent</span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${modeLabel.cls}`}>
              {modeLabel.icon} {modeLabel.txt}
            </span>
          </div>
          <div className="bg-rose-50 rounded border border-rose-200 p-2">
            <div className="text-[9px] font-bold text-rose-700 uppercase tracking-wider mb-0.5">user question</div>
            <div className="text-[10px] text-rose-900 leading-snug">"{question}"</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Tools 박스 — 좌측 중단
    //   activeTools 에 포함된 도구는 활성, 나머지는 회색 처리
    // ─────────────────────────────────────────────────────
    function ToolsBox({ activeTools, mode }) {
      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🧰</span>
              <span className="text-[11px] font-bold text-rose-800">Tools 등록 현황</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">
              {activeTools.length}/{TOOLS.length} active
            </span>
          </div>
          <div className="grid grid-cols-3 gap-1.5">
            {TOOLS.map((tool) => {
              const active = activeTools.includes(tool.id);
              return (
                <div
                  key={tool.id}
                  className={`p-1.5 rounded border-2 transition-all duration-300 ${
                    active
                      ? 'bg-rose-50 border-rose-400 shadow-sm'
                      : 'bg-slate-50 border-slate-200 opacity-40'
                  }`}
                >
                  <div className="text-center">
                    <div className="text-lg mb-0.5">{tool.icon}</div>
                    <div className={`text-[10px] font-bold ${active ? 'text-rose-800' : 'text-slate-500'}`}>
                      {tool.name}
                    </div>
                    <div className={`text-[8px] mt-0.5 ${active ? 'text-rose-600' : 'text-slate-400'}`}>
                      {tool.desc}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          {mode === 'static' && (
            <div className="text-[9px] text-slate-500 mt-1.5 italic">
              ※ 정적 RAG: 도구 개념 없이 retriever 를 직접 호출
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Cycle 한 개 — Thought / Action / Observation 박스
    //   isNew  : 이번 step 에 새로 추가된 cycle (강조)
    //   isFinal: 최종 답변 생성 cycle (action/observation 없음)
    // ─────────────────────────────────────────────────────
    function CycleCard({ cycle, idx, isStaticMode }) {
      const tool = cycle.action ? TOOLS.find((t) => t.id === cycle.action.tool) : null;
      const newRing = cycle.isNew ? 'ring-2 ring-rose-400 ring-offset-1' : '';

      if (cycle.isFinal) {
        return (
          <div className={`bg-emerald-50 border-2 border-emerald-300 rounded-lg p-2 ${newRing} transition-all duration-500`}>
            <div className="flex items-center gap-1.5 mb-1">
              <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                cycle #{idx + 1} · FINAL
              </span>
              {cycle.isNew && (
                <span className="text-[8px] bg-rose-600 text-white px-1 rounded font-bold animate-pulse">NEW</span>
              )}
            </div>
            <div className="bg-white rounded border border-emerald-200 p-1.5">
              <div className="text-[9px] font-bold text-emerald-700 mb-0.5">🤔 Thought</div>
              <div className="text-[10px] text-emerald-900 italic leading-snug">"{cycle.thought}"</div>
            </div>
            <div className="text-center text-[10px] text-emerald-600 my-1">↓ 정보 충분 → 답변 생성</div>
          </div>
        );
      }

      return (
        <div
          className={`bg-white border-2 rounded-lg p-2 ${
            cycle.isNew ? 'border-rose-400 shadow-md' : 'border-slate-200'
          } ${newRing} transition-all duration-500`}
        >
          <div className="flex items-center gap-1.5 mb-1.5">
            <span className="text-[9px] bg-slate-700 text-white px-1.5 py-0.5 rounded font-mono font-bold">
              cycle #{idx + 1}
            </span>
            {cycle.isNew && (
              <span className="text-[8px] bg-rose-600 text-white px-1 rounded font-bold animate-pulse">NEW</span>
            )}
            {isStaticMode && (
              <span className="text-[8px] bg-slate-400 text-white px-1 rounded font-bold">no-thought</span>
            )}
          </div>

          {/* Thought */}
          {cycle.thought && (
            <div className="bg-amber-50 rounded border border-amber-200 p-1.5 mb-1">
              <div className="text-[9px] font-bold text-amber-700 mb-0.5">🤔 Thought</div>
              <div className="text-[10px] text-amber-900 italic leading-snug">"{cycle.thought}"</div>
            </div>
          )}

          {/* Action */}
          {cycle.action && (
            <div className="bg-blue-50 rounded border border-blue-200 p-1.5 mb-1">
              <div className="flex items-center gap-1 mb-0.5">
                <span className="text-[9px] font-bold text-blue-700">⚡ Action</span>
                {tool && (
                  <span className="text-[9px] bg-blue-600 text-white px-1 rounded font-mono">
                    {tool.icon} {tool.name}
                  </span>
                )}
              </div>
              <div className="text-[10px] text-blue-900 font-mono leading-snug">
                {tool ? `${tool.id}("${cycle.action.query}")` : cycle.action.query}
              </div>
            </div>
          )}

          {/* Observation */}
          {cycle.observation && (
            <div className="bg-green-50 rounded border border-green-200 p-1.5">
              <div className="text-[9px] font-bold text-green-700 mb-0.5">👁 Observation</div>
              <div className="text-[10px] text-green-900 font-mono leading-snug">{cycle.observation}</div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // ReAct Trace — Cycle 들을 누적해서 보여주는 박스
    // ─────────────────────────────────────────────────────
    function ReactTraceBox({ cycles, mode, finalAnswer, finalIsFail }) {
      const isStaticMode = mode === 'static';
      return (
        <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🧭</span>
              <span className="text-[11px] font-bold text-rose-800">ReAct Cycle 누적</span>
            </div>
            <span className="text-[9px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
              {cycles.length} cycle{cycles.length > 1 ? 's' : ''}
            </span>
          </div>

          <div className="space-y-1.5 max-h-64 overflow-y-auto pr-1">
            {cycles.map((c, i) => (
              <CycleCard key={i} cycle={c} idx={i} isStaticMode={isStaticMode} />
            ))}
          </div>

          {/* 최종 답변 */}
          {finalAnswer && (
            <div
              className={`mt-2 p-2 rounded border-2 ${
                finalIsFail
                  ? 'bg-yellow-50 border-yellow-300'
                  : 'bg-emerald-50 border-emerald-400'
              }`}
            >
              <div
                className={`text-[9px] font-bold uppercase tracking-wider mb-0.5 ${
                  finalIsFail ? 'text-yellow-700' : 'text-emerald-700'
                }`}
              >
                {finalIsFail ? '⚠ 부분 답변 (도구 부족)' : '✅ Final Answer'}
              </div>
              <div className={`text-[10px] leading-snug ${finalIsFail ? 'text-yellow-900' : 'text-emerald-900 font-medium'}`}>
                {finalAnswer}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: AgentBox / 중단: ToolsBox / 하단: ReactTraceBox
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🕵️ Agentic RAG — ReAct Cycle 시뮬레이터</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <AgentBox mode={step.mode} question={step.question} />
            <ToolsBox activeTools={step.tools} mode={step.mode} />
            <ReactTraceBox
              cycles={step.cycles}
              mode={step.mode}
              finalAnswer={step.finalAnswer}
              finalIsFail={step.finalIsFail}
            />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>Thought
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-blue-500"></span>Action
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-green-500"></span>Observation
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>NEW cycle
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>Final
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VI-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. Advanced RAG 패턴 &gt; Chapter 2. Agentic &amp; Adaptive</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VI-2-1. Agentic RAG — Agent가 검색 도구를 ReAct로 활용</h1>
                  <p className="text-sm text-slate-500 mt-0.5">탐정 사무소의 단서 추적 — 정적 RAG → Agent → 다중 호출 → 도구 결합 → ReAct trace</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: <strong>정적 RAG</strong> 는 한 번 검색 → 끝, <strong>Agentic RAG</strong> 는 ReAct cycle 로 도구를 자율 활용한다. 단서 부족하면 <strong>다시 호출</strong>, 다른 종류의 정보가 필요하면 <strong>다른 도구</strong>로 갈아탄다. 다음(VI-2-2)에서는 질문 난이도에 따라 RAG 전략을 바꾸는 Adaptive RAG 를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Agentic RAG', 'ReAct', 'Tool Use', 'AgentExecutor', 'multi-call', 'multi-tool', 'trace'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
