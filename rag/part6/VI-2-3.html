            '| 트리플 추출 LLM   | -        | +0.8M     |',
            '| 커뮤니티 요약 LLM | -        | +0.2M     |',
            '| **총 빌드 비용**  | **$10**  | **$18**   |',
            '',
            '## 🔍 질의 단계 (1회당)',
            '',
            '| 항목                | 청크 RAG | Graph RAG |',
            '|---------------------|----------|-----------|',
            '| 회수 컨텍스트 토큰  | 3,200    | **2,400** |',
            '| 응답 latency        | 1.8s     | 1.5s      |',
            '| 단일 엔티티 정확도  | 82%      | 85%       |',
            '| **다중 hop 정확도** | 46%      | **79%**   |',
            '',
            '## 💡 결론',
            '- **빌드 비용 +80%** — 한 번이면 끝',
            '- **질의 비용 25% 저렴** — 관련 노드만 회수',
            '- **다중 hop 정확도 +33%p** — Graph 의 결정적 장점',
            '',
            '## 🎯 도메인별 추천',
            '| 도메인         | 추천      | 이유                       |',
            '|----------------|-----------|----------------------------|',
            '| FAQ · 매뉴얼   | 청크 RAG  | 관계 질의 적음, 갱신 잦음  |',
            '| 학술 논문 검색 | 청크 RAG  | 의미 유사도 충분           |',
            '| 법률 · 판례    | Graph RAG | 인용·참조 다중 hop 필수    |',
            '| 의료 케이스    | Graph RAG | 약물·증상·환자 관계 추적   |',
            '| 기업 KMS·CRM   | Graph RAG | 조직·프로젝트·고객 관계망  |',
            '',
            '## 🚧 한계',
            '- 갱신 시 트리플 재추출 비용 (스트리밍 불리)',
            '- 트리플 추출 품질이 답변 품질을 좌우 — schema 중요',
            '- 너무 sparse 한 도메인은 그래프 효익 적음',
          ],
          highlight: [3, 5, 6, 7, 8, 9, 12, 14, 15, 16, 17, 18, 19, 21, 22, 23, 24, 26, 27, 28, 31, 32, 33],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 그래프 시각화 — 노드/엣지 SVG
    //   activeNodes / activeEdges 를 받아 강조 색상(rose) 적용
    //   path 가 주어지면 traverse 순서대로 번호 뱃지 표시
    // ─────────────────────────────────────────────────────
    function GraphView({ activeNodes = [], activeEdges = [], path = null }) {
      const typeColor = {
        person:  { fill: '#fda4af', stroke: '#e11d48', dim: '#fff1f2' },
        project: { fill: '#a78bfa', stroke: '#7c3aed', dim: '#f5f3ff' },
        org:     { fill: '#60a5fa', stroke: '#2563eb', dim: '#eff6ff' },
      };
      const NODE_W = 84, NODE_H = 44;
      const pathNodeOrder = path ? path.map((p) => p.node) : null;

      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-2">
          <div className="flex items-center justify-between mb-1.5 px-1">
            <span className="text-[11px] font-bold text-rose-700">🕸 Knowledge Graph (회사 인물 관계망)</span>
            <span className="text-[9px] text-slate-500 font-mono">
              {NODES.length} nodes · {EDGES.length} edges
            </span>
          </div>
          <svg viewBox="0 0 480 320" className="w-full h-auto">
            {/* 엣지 */}
            {EDGES.map((e, i) => {
              const from = NODES.find((n) => n.id === e.from);
              const to = NODES.find((n) => n.id === e.to);
              const isActive = activeEdges.includes(i);
              const x1 = from.x + NODE_W / 2, y1 = from.y + NODE_H / 2;
              const x2 = to.x + NODE_W / 2,   y2 = to.y + NODE_H / 2;
              const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
              return (
                <g key={i} style={{ transition: 'all 0.5s' }}>
                  <line x1={x1} y1={y1} x2={x2} y2={y2}
                    stroke={isActive ? '#e11d48' : '#cbd5e1'}
                    strokeWidth={isActive ? 2.5 : 1.2} />
                  <rect x={mx - 18} y={my - 8} width="36" height="14" rx="3"
                    fill={isActive ? '#fff1f2' : '#f8fafc'}
                    stroke={isActive ? '#e11d48' : '#cbd5e1'} strokeWidth="0.8" />
                  <text x={mx} y={my + 2} textAnchor="middle" fontSize="9"
                    fill={isActive ? '#9f1239' : '#94a3b8'}
                    fontWeight={isActive ? 'bold' : 'normal'}>{e.label}</text>
                </g>
              );
            })}
            {/* 노드 */}
            {NODES.map((n, i) => {
              const isActive = activeNodes.includes(n.id);
              const c = typeColor[n.type];
              const orderIdx = pathNodeOrder ? pathNodeOrder.indexOf(n.id) : -1;
              return (
                <g key={i} style={{ transition: 'all 0.5s' }}>
                  <rect x={n.x} y={n.y} width={NODE_W} height={NODE_H} rx="10"
                    fill={isActive ? c.fill : c.dim}
                    stroke={isActive ? c.stroke : '#cbd5e1'}
                    strokeWidth={isActive ? 2.5 : 1.2} />
                  <text x={n.x + NODE_W / 2} y={n.y + 18} textAnchor="middle" fontSize="11"
                    fill={isActive ? '#0f172a' : '#475569'} fontWeight="bold">{n.label}</text>
                  <text x={n.x + NODE_W / 2} y={n.y + 32} textAnchor="middle" fontSize="9"
                    fill={isActive ? '#334155' : '#94a3b8'}>{n.sub}</text>
                  {orderIdx >= 0 && (
                    <g>
                      <circle cx={n.x + NODE_W - 8} cy={n.y + 8} r="9"
                        fill="#e11d48" stroke="#fff" strokeWidth="1.5" />
                      <text x={n.x + NODE_W - 8} y={n.y + 11} textAnchor="middle"
                        fontSize="10" fill="#fff" fontWeight="bold">{orderIdx + 1}</text>
                    </g>
                  )}
                </g>
              );
            })}
          </svg>
          <div className="flex flex-wrap gap-2 text-[9px] mt-1.5 px-1 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-400"></span>person
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-violet-400"></span>project
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-blue-400"></span>org
            </span>
            <span className="ml-auto font-mono">
              active: {activeNodes.length}/{NODES.length} · edge: {activeEdges.length}/{EDGES.length}
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 단계별 보조 패널 — mode 에 따라 다른 컴포넌트 렌더
    // ─────────────────────────────────────────────────────
    function StepDetail({ step }) {
      const m = step.mode;

      if (m === 'chunk') {
        return (
          <div className="bg-rose-50 border-2 border-rose-200 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <span className="text-[11px] font-bold text-rose-700">📄 청크 RAG 회수 결과</span>
              <span className="text-[9px] bg-rose-200 text-rose-800 px-1.5 py-0.5 rounded font-mono">
                k=3 · score
              </span>
            </div>
            <div className="space-y-1.5 mb-2">
              {step.chunks.map((c) => (
                <div key={c.id} className="bg-white border border-rose-200 rounded p-1.5">
                  <div className="flex items-center gap-1.5 mb-0.5">
                    <span className="bg-rose-600 text-white text-[9px] font-mono font-bold px-1 rounded">
                      #{c.id}
                    </span>
                    <span className="text-[9px] text-rose-600 font-mono">score {c.score.toFixed(2)}</span>
                    <span className="ml-auto text-[8px] text-slate-500 font-mono">
                      covers: {c.covers.join(', ')}
                    </span>
                  </div>
                  <div className="text-[10px] text-slate-700 leading-snug">{c.text}</div>
                </div>
              ))}
            </div>
            <div className="bg-red-100 border border-red-300 rounded p-2 text-[10px] text-red-800 leading-snug">
              <span className="font-bold">❌ 관계 단절: </span>{step.missing}
            </div>
          </div>
        );
      }

      if (m === 'build') {
        return (
          <div className="bg-rose-50 border-2 border-rose-200 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <span className="text-[11px] font-bold text-rose-700">⚙ LLM 트리플 추출</span>
              <span className="text-[9px] bg-rose-200 text-rose-800 px-1.5 py-0.5 rounded font-mono">
                {step.triples.length} triples
              </span>
            </div>
            <div className="space-y-1">
              {step.triples.map((t, i) => {
                const sName = NODES.find((n) => n.id === t.s)?.label;
                const oName = NODES.find((n) => n.id === t.o)?.label;
                return (
                  <div key={i} className="flex items-center gap-1 text-[10px] font-mono bg-white border border-rose-200 rounded px-1.5 py-1">
                    <span className="bg-rose-200 text-rose-900 px-1.5 py-0.5 rounded font-bold">
                      {sName}
                    </span>
                    <span className="text-rose-600">─[{t.p}]─▶</span>
                    <span className="bg-rose-200 text-rose-900 px-1.5 py-0.5 rounded font-bold">
                      {oName}
                    </span>
                  </div>
                );
              })}
            </div>
            <div className="text-[9px] text-rose-700 mt-2 italic">
              ✓ 청크에 흩어져 있던 관계 정보가 명시적 엣지로 응집됨
            </div>
          </div>
        );
      }

      if (m === 'traverse') {
        return (
          <div className="bg-rose-50 border-2 border-rose-200 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <span className="text-[11px] font-bold text-rose-700">🔎 다중 hop traverse</span>
              <span className="text-[9px] bg-rose-200 text-rose-800 px-1.5 py-0.5 rounded font-mono">
                {step.path.length - 1}-hop
              </span>
            </div>
            <pre className="bg-white border border-rose-200 rounded p-2 text-[9.5px] text-rose-900 font-mono leading-snug whitespace-pre-wrap mb-2">
{step.cypher}
            </pre>
            <div className="bg-white rounded border border-rose-300 p-2 mb-2">
              <div className="text-[9px] font-bold text-rose-700 uppercase mb-1 tracking-wider">traverse path</div>
              <div className="flex flex-wrap items-center gap-1">
                {step.path.map((p, i) => (
                  <React.Fragment key={i}>
                    {i > 0 && (
                      <span className="text-[9px] text-rose-500 font-mono">─[{p.edge}]─▶</span>
                    )}
                    <span className="bg-rose-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded flex items-center gap-1">
                      <span className="bg-white text-rose-700 w-3.5 h-3.5 rounded-full text-[9px] flex items-center justify-center">
                        {i + 1}
                      </span>
                      {p.label}
                    </span>
                  </React.Fragment>
                ))}
              </div>
            </div>
            <div className="bg-emerald-100 border border-emerald-300 rounded p-2 text-[10px] text-emerald-900">
              <span className="font-bold">✓ 답변: </span>{step.answer}
            </div>
          </div>
        );
      }

      if (m === 'local-global') {
        return (
          <div className="space-y-2">
            {/* Local */}
            <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-2.5">
              <div className="flex items-center justify-between mb-1.5">
                <span className="text-[11px] font-bold text-rose-800">⚡ {step.local.name}</span>
                <span className="text-[9px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                  {step.local.time} · {step.local.tokens} tok
                </span>
              </div>
              <div className="bg-white rounded border border-rose-200 p-1.5 mb-1">
                <div className="text-[9px] font-mono text-rose-900">{step.local.query}</div>
                <div className="text-[8.5px] text-rose-600 mt-0.5">scope: {step.local.scope}</div>
              </div>
              <div className="text-[9px] text-rose-700 font-mono">
                touched: {step.local.nodes.length} nodes / {step.local.edges.length} edges
              </div>
            </div>
            {/* Global */}
            <div className="bg-purple-50 border-2 border-purple-300 rounded-lg p-2.5">
              <div className="flex items-center justify-between mb-1.5">
                <span className="text-[11px] font-bold text-purple-800">🌐 {step.global.name}</span>
                <span className="text-[9px] bg-purple-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                  {step.global.time} · {step.global.tokens} tok
                </span>
              </div>
              <div className="bg-white rounded border border-purple-200 p-1.5 mb-1.5">
                <div className="text-[9px] font-mono text-purple-900">{step.global.query}</div>
                <div className="text-[8.5px] text-purple-600 mt-0.5">scope: {step.global.scope}</div>
              </div>
              <div className="space-y-1">
                {step.global.communities.map((c) => (
                  <div key={c.id} className="bg-white border border-purple-200 rounded px-1.5 py-1 text-[9px]">
                    <div className="flex items-center gap-1">
                      <span className="bg-purple-600 text-white font-mono font-bold px-1 rounded text-[8.5px]">
                        {c.id}
                      </span>
                      <span className="font-bold text-purple-900">{c.name}</span>
                      <span className="text-purple-500 font-mono ml-auto">
                        ({c.members.length})
                      </span>
                    </div>
                    <div className="text-purple-700 italic mt-0.5">"{c.summary}"</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="text-[9.5px] text-slate-600 italic text-center">
              ⚖ Local = 빠르고 정확 / Global = 느리지만 큰 그림
            </div>
          </div>
        );
      }

      if (m === 'cost') {
        const kindBg = {
          low:  'bg-emerald-100 text-emerald-800 border-emerald-300',
          mid:  'bg-amber-100 text-amber-800 border-amber-300',
          high: 'bg-rose-100 text-rose-800 border-rose-300',
        };
        return (
          <div className="bg-rose-50 border-2 border-rose-200 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <span className="text-[11px] font-bold text-rose-700">💰 청크 RAG vs Graph RAG 비용·정확도</span>
              <span className="text-[9px] bg-rose-200 text-rose-800 px-1.5 py-0.5 rounded font-mono">
                실측 기준
              </span>
            </div>
            <div className="bg-white rounded border border-rose-200 overflow-hidden">
              <table className="w-full text-[9.5px]">
                <thead className="bg-rose-100 text-rose-800">
                  <tr>
                    <th className="text-left px-2 py-1 font-bold">지표</th>
                    <th className="px-2 py-1 font-bold">청크 RAG</th>
                    <th className="px-2 py-1 font-bold">Graph RAG</th>
                  </tr>
                </thead>
                <tbody>
                  {step.compare.map((row, i) => (
                    <tr key={i} className="border-t border-rose-100">
                      <td className="px-2 py-1 text-slate-700 font-medium">{row.metric}</td>
                      <td className="px-2 py-1 text-center">
                        <span className={`inline-block px-1.5 py-0.5 rounded border ${kindBg[row.chunk.kind]} font-mono text-[9px]`}>
                          {row.chunk.v}
                        </span>
                      </td>
                      <td className="px-2 py-1 text-center">
                        <span className={`inline-block px-1.5 py-0.5 rounded border ${kindBg[row.graph.kind]} font-mono text-[9px]`}>
                          {row.graph.v}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="text-[9px] text-rose-700 mt-2 italic leading-snug">
              💡 다중 hop 정확도 +33%p — 그래프의 결정적 강점. 단, 빌드 비용 +80%·갱신 부담 있어 도메인 선택이 중요.
            </div>
          </div>
        );
      }

      return null;
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 그래프 시각화 / 하단: 단계별 보조 패널
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🕸 청크 RAG vs Graph RAG — 회사 인물 관계망</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>
          <div className="space-y-3">
            <GraphView
              activeNodes={step.activeNodes}
              activeEdges={step.activeEdges}
              path={step.mode === 'traverse' ? step.path : null}
            />
            <StepDetail step={step} />
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VI-2-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. Advanced RAG &gt; Chapter 2. Agentic & Adaptive</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VI-2-3. Graph RAG — 지식 그래프 기반 RAG (Microsoft 연구)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">청크 RAG가 끊은 관계를 그래프로 잇는다 — 다중 hop 추론 / Local·Global 쿼리</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: 관계가 핵심인 도메인(법률·의료·KMS)에선 <strong>Graph RAG</strong>가 다중 hop 정확도 +33%p로 청크 RAG를 압도한다. 단, 빌드 비용·갱신 부담을 감안해 <strong>Local 쿼리</strong>(빠름)와 <strong>Global 쿼리</strong>(요약)를 상황별로 선택한다. 다음(Part VII)은 평가 & 운영.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Graph RAG', 'Knowledge Graph', 'Triple', 'Multi-hop', 'Cypher', 'Neo4j', 'Local Query', 'Global Query', 'Community Detection'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./VI-2-2.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; VI-2-2 Adaptive RAG</a>
              <a href="../part7/VII-1-1.html" className="text-rose-700 hover:text-rose-900 font-medium">Part VII 평가 & 운영 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
