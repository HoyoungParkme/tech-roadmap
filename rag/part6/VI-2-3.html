<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — VI-2-3. Graph RAG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const GRAPH_NODES = [
      { id: 'alice', label: '김영수', type: 'person', x: 50, y: 30 },
      { id: 'bob', label: '이민지', type: 'person', x: 200, y: 30 },
      { id: 'charlie', label: '박준호', type: 'person', x: 125, y: 130 },
      { id: 'proj', label: 'RAG 프로젝트', type: 'project', x: 300, y: 130 },
      { id: 'dept', label: 'AI 팀', type: 'org', x: 50, y: 200 },
    ];

    const GRAPH_EDGES = [
      { from: 'alice', to: 'bob', label: '상사' },
      { from: 'alice', to: 'dept', label: '소속' },
      { from: 'bob', to: 'charlie', label: '멘토' },
      { from: 'charlie', to: 'proj', label: '참여' },
      { from: 'bob', to: 'proj', label: '리드' },
      { from: 'dept', to: 'proj', label: '주관' },
    ];

    const STEPS = [
      {
        title: "Graph RAG란?",
        desc: "인물 관계도를 떠올려 보세요. '김영수의 부하 직원이 참여하는 프로젝트는?'이라는 질문에 답하려면, 단순히 비슷한 문서를 찾는 것(벡터 검색)이 아니라 관계를 추적해야 합니다. Graph RAG는 지식 그래프를 활용하여 관계 기반 질의에 답합니다.",
        phase: "intro"
      },
      {
        title: "벡터 검색의 한계",
        desc: "벡터 검색은 '의미적으로 비슷한' 문서를 찾습니다. '김영수'를 검색하면 김영수가 언급된 문서를 찾지만, '김영수의 상사는 누구인가?' 같은 관계 추적 질문에는 한계가 있습니다. 관계는 문서 속에 분산되어 있기 때문입니다.",
        phase: "vector_limit",
        query: "김영수의 부하가 참여하는 프로젝트는?",
        vectorResult: [
          { doc: "김영수 인사 정보 — AI 팀 소속 매니저", relevant: false },
          { doc: "이민지 프로필 — 시니어 엔지니어", relevant: false },
          { doc: "RAG 프로젝트 계획서", relevant: false }
        ]
      },
      {
        title: "Knowledge Graph 구축",
        desc: "Knowledge Graph는 Entity(개체) → Relationship(관계) → Entity(개체)의 트리플(Triple) 구조로 지식을 저장합니다. '김영수 → 상사 → 이민지', '이민지 → 리드 → RAG 프로젝트'처럼 관계를 명시적으로 표현합니다.",
        phase: "build_graph",
        triples: [
          { subject: "김영수", predicate: "상사", object: "이민지" },
          { subject: "이민지", predicate: "멘토", object: "박준호" },
          { subject: "이민지", predicate: "리드", object: "RAG 프로젝트" },
          { subject: "박준호", predicate: "참여", object: "RAG 프로젝트" },
          { subject: "김영수", predicate: "소속", object: "AI 팀" },
        ]
      },
      {
        title: "그래프 검색 — 관계 추적",
        desc: "그래프에서 관계를 추적하여 답을 찾습니다. '김영수의 부하 → 이민지, 이민지가 참여하는 프로젝트 → RAG 프로젝트'. 벡터 검색으로는 불가능한 multi-hop 추론이 가능합니다.",
        phase: "graph_search",
        path: ["김영수", "→ 상사 →", "이민지", "→ 리드 →", "RAG 프로젝트"],
        answer: "김영수의 부하인 이민지가 리드하는 프로젝트는 'RAG 프로젝트'입니다."
      },
      {
        title: "하이브리드: 벡터 + 그래프",
        desc: "실전에서는 벡터 검색(의미 유사도)과 그래프 검색(관계 추적)을 결합합니다. 벡터 검색으로 관련 문서를 넓게 찾고, 그래프 검색으로 관계를 정밀하게 추적합니다. 두 결과를 결합하여 더 완전한 답변을 생성합니다.",
        phase: "hybrid"
      },
      {
        title: "Graph RAG 전체 아키텍처",
        desc: "Graph RAG는 (1) 텍스트에서 엔티티/관계 추출 → (2) Knowledge Graph 구축 → (3) 벡터 + 그래프 하이브리드 검색 → (4) LLM 답변 생성으로 동작합니다. 관계 중심 질문에 특히 강력합니다.",
        phase: "architecture"
      }
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderGraph = (highlight) => {
        const typeColors = { person: '#f59e0b', project: '#8b5cf6', org: '#3b82f6' };
        return (
          <svg viewBox="0 0 380 260" className="w-full h-auto">
            {GRAPH_EDGES.map((edge, i) => {
              const from = GRAPH_NODES.find(n => n.id === edge.from);
              const to = GRAPH_NODES.find(n => n.id === edge.to);
              const isHighlight = highlight && highlight.includes(edge.from) && highlight.includes(edge.to);
              return (
                <g key={i}>
                  <line x1={from.x + 30} y1={from.y + 15} x2={to.x + 30} y2={to.y + 15} stroke={isHighlight ? '#f59e0b' : '#cbd5e1'} strokeWidth={isHighlight ? 3 : 1.5} />
                  <text x={(from.x + to.x) / 2 + 30} y={(from.y + to.y) / 2 + 10} textAnchor="middle" fontSize="9" fill={isHighlight ? '#92400e' : '#94a3b8'} fontWeight={isHighlight ? 'bold' : 'normal'}>{edge.label}</text>
                </g>
              );
            })}
            {GRAPH_NODES.map((node, i) => {
              const isHighlight = highlight && highlight.includes(node.id);
              return (
                <g key={i}>
                  <rect x={node.x} y={node.y} width="60" height="30" rx="8" fill={isHighlight ? typeColors[node.type] : '#f1f5f9'} stroke={typeColors[node.type]} strokeWidth={isHighlight ? 3 : 1.5} />
                  <text x={node.x + 30} y={node.y + 19} textAnchor="middle" fontSize="10" fill={isHighlight ? '#fff' : '#334155'} fontWeight="bold">{node.label}</text>
                </g>
              );
            })}
          </svg>
        );
      };

      const renderVisualization = () => {
        if (s.phase === 'intro') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">Graph RAG 핵심 개념</div>
              <div className="flex flex-col items-center gap-3">
                <div className="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center text-3xl border-2 border-amber-300">🕸️</div>
                <div className="text-center text-sm text-slate-600 font-medium mb-2">인물 관계도 — 관계를 추적하여 답을 찾기</div>
                {renderGraph(null)}
              </div>
            </div>
          );
        }
        if (s.phase === 'vector_limit') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-red-600 uppercase tracking-wider mb-4">벡터 검색의 한계</div>
              <div className="flex flex-col gap-3">
                <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-sm text-blue-800 font-mono text-center">"{s.query}"</div>
                <div className="text-center text-lg">↓ 벡터 검색</div>
                <div className="space-y-2">
                  {s.vectorResult.map((r, i) => (
                    <div key={i} className="flex items-center gap-2 p-2 bg-red-50 rounded-lg border border-red-200">
                      <span className="text-sm">❌</span>
                      <span className="text-xs text-red-700">{r.doc}</span>
                    </div>
                  ))}
                </div>
                <div className="bg-red-100 border border-red-300 rounded-lg p-3 text-xs text-red-800 text-center">
                  <b>문제:</b> 개별 문서는 찾지만, "부하가 참여하는" 이라는 관계 추적이 불가능
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'build_graph') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">Knowledge Graph 트리플</div>
              <div className="space-y-2 mb-4">
                {s.triples.map((t, i) => (
                  <div key={i} className="flex items-center gap-2 p-2 bg-amber-50 rounded-lg border border-amber-200 text-xs">
                    <span className="bg-amber-200 px-2 py-0.5 rounded font-bold text-amber-800">{t.subject}</span>
                    <span className="text-amber-600 font-mono">→ {t.predicate} →</span>
                    <span className="bg-amber-200 px-2 py-0.5 rounded font-bold text-amber-800">{t.object}</span>
                  </div>
                ))}
              </div>
              {renderGraph(null)}
            </div>
          );
        }
        if (s.phase === 'graph_search') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">그래프 관계 추적</div>
              <div className="mb-4">
                {renderGraph(['alice', 'bob', 'proj'])}
              </div>
              <div className="flex flex-wrap items-center justify-center gap-1 p-3 bg-amber-50 rounded-lg border border-amber-200">
                {s.path.map((p, i) => (
                  <span key={i} className={`text-xs px-2 py-1 rounded ${i % 2 === 0 ? 'bg-amber-200 font-bold text-amber-800' : 'text-amber-600 font-mono'}`}>{p}</span>
                ))}
              </div>
              <div className="mt-3 bg-green-50 border border-green-200 rounded-lg p-3 text-xs text-green-800">
                <b>답변:</b> {s.answer}
              </div>
            </div>
          );
        }
        if (s.phase === 'hybrid') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">하이브리드 검색</div>
              <div className="flex flex-col items-center gap-3">
                <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 w-full text-center text-sm text-blue-800 font-mono">"질문 입력"</div>
                <div className="grid grid-cols-2 gap-3 w-full">
                  <div className="flex flex-col items-center gap-2">
                    <div className="text-xs">↓</div>
                    <div className="bg-purple-100 border-2 border-purple-300 rounded-lg p-3 w-full text-center">
                      <div className="text-sm font-bold text-purple-800">🔍 벡터 검색</div>
                      <div className="text-xs text-purple-600 mt-1">의미적으로 유사한 문서</div>
                    </div>
                  </div>
                  <div className="flex flex-col items-center gap-2">
                    <div className="text-xs">↓</div>
                    <div className="bg-amber-100 border-2 border-amber-300 rounded-lg p-3 w-full text-center">
                      <div className="text-sm font-bold text-amber-800">🕸️ 그래프 검색</div>
                      <div className="text-xs text-amber-600 mt-1">관계 추적, multi-hop</div>
                    </div>
                  </div>
                </div>
                <div className="text-lg">↓ 결합</div>
                <div className="bg-emerald-100 border border-emerald-300 rounded-lg p-3 w-full text-center">
                  <div className="text-sm font-bold text-emerald-800">종합 컨텍스트</div>
                  <div className="text-xs text-emerald-600 mt-1">유사 문서 + 관계 정보 → LLM 답변 생성</div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'architecture') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">Graph RAG 전체 아키텍처</div>
              <div className="flex flex-col items-center gap-2 text-sm">
                <div className="bg-slate-100 border border-slate-300 rounded-lg px-4 py-2 font-bold text-slate-700 w-full text-center">원본 문서</div>
                <div>↓ 엔티티/관계 추출</div>
                <div className="grid grid-cols-2 gap-3 w-full">
                  <div className="bg-purple-100 border border-purple-300 rounded-lg px-3 py-2 text-xs font-bold text-purple-800 text-center">벡터 인덱스</div>
                  <div className="bg-amber-100 border border-amber-300 rounded-lg px-3 py-2 text-xs font-bold text-amber-800 text-center">Knowledge Graph</div>
                </div>
                <div className="bg-blue-100 border border-blue-300 rounded-lg px-4 py-2 font-bold text-blue-800 w-full text-center text-xs">질문 입력</div>
                <div className="grid grid-cols-2 gap-3 w-full">
                  <div className="text-center text-xs text-purple-600 font-bold">벡터 검색 ↓</div>
                  <div className="text-center text-xs text-amber-600 font-bold">그래프 쿼리 ↓</div>
                </div>
                <div className="bg-emerald-100 border border-emerald-300 rounded-lg px-4 py-2 font-bold text-emerald-800 w-full text-center text-xs">결과 결합 → LLM 답변 생성</div>
              </div>
            </div>
          );
        }
        return null;
      };

      const renderRightPanel = () => {
        if (s.phase === 'intro') {
          return (
            <div className="space-y-4">
              <div className="p-4 rounded-lg bg-amber-50 border border-amber-200">
                <div className="font-bold text-sm text-amber-800 mb-2">Graph RAG의 핵심</div>
                <div className="text-xs text-amber-700 space-y-1">
                  <div>• <b>Knowledge Graph</b>로 관계를 명시적으로 표현</div>
                  <div>• <b>multi-hop 추론</b>으로 관계 체인 추적</div>
                  <div>• 벡터 검색 + 그래프 검색 <b>하이브리드</b></div>
                  <div>• 관계 중심 질문에 강력</div>
                </div>
              </div>
              <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                <div className="font-bold text-sm text-slate-700 mb-2">언제 Graph RAG가 필요한가?</div>
                <div className="text-xs text-slate-600 space-y-1">
                  <div>• "A의 상사는 누구?" — 관계 추적</div>
                  <div>• "이 프로젝트에 관련된 모든 팀은?" — 다단계 연결</div>
                  <div>• "A와 B의 공통점은?" — 관계 비교</div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'architecture') {
          return (
            <div className="space-y-4">
              <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{`# Graph RAG 핵심 로직 (의사코드)

from neo4j import GraphDatabase
from langchain.vectorstores import Chroma

# 1. Knowledge Graph 구축
def extract_triples(text):
    """LLM으로 텍스트에서 트리플 추출"""
    triples = llm.extract(
        text,
        schema=["subject", "predicate", "object"]
    )
    # → [("김영수", "상사", "이민지"), ...]
    return triples

# 2. 하이브리드 검색
def hybrid_search(query):
    # 벡터 검색
    vector_results = vectorstore.similarity_search(
        query, k=5
    )

    # 그래프 검색 (Cypher 쿼리)
    graph_results = neo4j.run(
        "MATCH (a)-[r]->(b) "
        "WHERE a.name CONTAINS $query "
        "RETURN a, r, b",
        query=query
    )

    return vector_results + graph_results`}</pre>
            </div>
          );
        }
        return (
          <div className="space-y-4">
            <div className="p-4 rounded-lg bg-amber-50 border border-amber-200">
              <div className="font-bold text-sm text-amber-800 mb-2">{s.title}</div>
              <div className="text-xs text-amber-700">
                {s.phase === 'vector_limit' && "벡터 검색은 '의미적 유사도' 기반입니다. '비슷한 내용'은 잘 찾지만, '누구의 상사', '어떤 팀이 주관' 같은 관계를 추적하는 것은 별개의 문제입니다."}
                {s.phase === 'build_graph' && "Knowledge Graph는 (Subject, Predicate, Object) 트리플로 관계를 저장합니다. Neo4j, Amazon Neptune 등의 그래프 DB가 주로 사용됩니다."}
                {s.phase === 'graph_search' && "그래프 검색은 노드 간 경로를 추적합니다. Cypher 같은 그래프 쿼리 언어로 multi-hop 질의가 가능합니다."}
                {s.phase === 'hybrid' && "실전에서는 벡터 검색과 그래프 검색을 결합합니다. 벡터로 넓게 찾고, 그래프로 정밀하게 관계를 추적합니다."}
              </div>
            </div>
            <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
              <div className="font-bold text-sm text-slate-700 mb-2">벡터 vs 그래프</div>
              <div className="text-xs text-slate-600 space-y-2">
                <div className="flex items-center justify-between">
                  <span>🔍 벡터 검색</span>
                  <span className="text-xs">"비슷한 사람" 찾기</span>
                </div>
                <div className="flex items-center justify-between">
                  <span>🕸️ 그래프 검색</span>
                  <span className="text-xs">"상사는 누구?" 관계 추적</span>
                </div>
                <div className="flex items-center justify-between font-bold text-amber-700">
                  <span>🔗 하이브리드</span>
                  <span className="text-xs">둘 다 활용 → 최적의 답변</span>
                </div>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-amber-700 hover:text-amber-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. Advanced RAG 패턴 &gt; Chapter 2. Agentic & Adaptive</div>
                  <h1 className="text-2xl font-bold text-slate-800">VI-2-3. Graph RAG — 관계 기반 RAG</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>인물 관계도</b>를 떠올려 보세요. "김영수의 부하가 참여하는 프로젝트는?" — 이 질문에 답하려면 <b>관계를 추적</b>해야 합니다. 벡터 검색만으로는 부족합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-amber-700 border-amber-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">Graph RAG 파이프라인</h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="space-y-4">{renderVisualization()}</div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">{renderRightPanel()}</div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Graph RAG', 'Knowledge Graph', 'Triple', 'Multi-hop', 'Neo4j', '하이브리드 검색'].map(kw => (
                <span key={kw} className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-sm font-medium border border-amber-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-amber-600 hover:bg-amber-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./VI-2-2.html" className="text-amber-600 hover:text-amber-800 font-medium">&larr; VI-2-2. Adaptive RAG</a>
              <a href="../part7/VII-1-1.html" className="text-amber-600 hover:text-amber-800 font-medium">Part VII. 평가 & 운영 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
