<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — VI-1-2. CRAG (Corrective RAG)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "CRAG란?",
        desc: "의사의 진단 과정을 떠올려 보세요. 검사 결과를 보고 '확실하다' → 바로 치료, '애매하다' → 추가 검사, '아니다' → 다른 검사 방법 시도. CRAG는 검색 결과의 품질을 평가하고, 부정확하면 교정 조치를 취하는 패턴입니다.",
        phase: "intro"
      },
      {
        title: "1단계: 검색 실행 & 품질 평가",
        desc: "사용자 질문에 대해 먼저 일반적인 검색을 수행합니다. 그 다음, 경량 평가 모델(Retrieval Evaluator)이 검색 결과의 품질을 '정확 / 모호 / 부정확' 세 등급으로 분류합니다.",
        phase: "evaluate",
        query: "대한민국의 최신 AI 규제법은?",
        docs: [
          { title: "AI 기본법 초안 (2024)", score: 0.82 },
          { title: "개인정보보호법 AI 조항", score: 0.65 },
          { title: "미국 AI 행정명령 분석", score: 0.41 }
        ]
      },
      {
        title: "경로 A: 정확함 (Correct)",
        desc: "평가 결과 '정확'이면 검색 결과를 그대로 사용합니다. 단, 불필요한 부분을 제거하는 Knowledge Refinement를 적용하여 핵심 정보만 남깁니다. — 의사가 검사 결과에 확신이 있으면 바로 치료를 시작하는 것과 같습니다.",
        phase: "correct",
        action: "Knowledge Refinement → 핵심 정보 추출",
        result: "내부 문서에서 정확한 답변 생성"
      },
      {
        title: "경로 B: 모호함 (Ambiguous)",
        desc: "평가 결과 '모호'하면, 내부 검색 결과에서 핵심을 추출하면서 동시에 웹 검색도 수행합니다. 두 소스를 결합하여 더 완전한 답변을 만듭니다. — 의사가 애매한 결과에 추가 검사를 지시하는 것과 같습니다.",
        phase: "ambiguous",
        action: "내부 정보 추출 + 웹 검색 보완",
        result: "두 소스를 결합한 보완된 답변"
      },
      {
        title: "경로 C: 부정확 (Incorrect)",
        desc: "평가 결과 '부정확'이면, 내부 검색 결과를 완전히 버리고 웹 검색으로 전환합니다. 웹 검색 결과를 기반으로 새로운 답변을 생성합니다. — 의사가 기존 진단을 폐기하고 완전히 다른 검사 방법을 시도하는 것과 같습니다.",
        phase: "incorrect",
        action: "내부 결과 폐기 → 웹 검색 전환",
        result: "웹 검색 기반 새 답변"
      },
      {
        title: "CRAG 전체 흐름도",
        desc: "CRAG의 핵심은 '검색 결과를 맹목적으로 신뢰하지 않는 것'입니다. 결과 품질에 따라 3가지 경로로 분기하여, 항상 최선의 답변을 생성합니다. 폴백(Fallback) 메커니즘이 핵심입니다.",
        phase: "flowchart"
      }
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderVisualization = () => {
        if (s.phase === 'intro') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">CRAG 핵심 개념</div>
              <div className="flex flex-col items-center gap-4">
                <div className="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center text-3xl border-2 border-amber-300">🩺</div>
                <div className="text-center text-sm text-slate-600 font-medium">의사의 진단 과정 — 확신도에 따른 분기</div>
                <div className="w-full space-y-3 mt-2">
                  <div className="flex items-center gap-3 p-3 bg-green-50 rounded-lg border border-green-200">
                    <div className="w-7 h-7 bg-green-600 text-white rounded-full flex items-center justify-center text-xs font-bold">A</div>
                    <span className="text-sm font-medium text-green-800">정확함 → 바로 답변 (Knowledge Refinement)</span>
                  </div>
                  <div className="flex items-center gap-3 p-3 bg-yellow-50 rounded-lg border border-yellow-200">
                    <div className="w-7 h-7 bg-yellow-600 text-white rounded-full flex items-center justify-center text-xs font-bold">B</div>
                    <span className="text-sm font-medium text-yellow-800">모호함 → 추가 정보 보완 (내부 + 웹)</span>
                  </div>
                  <div className="flex items-center gap-3 p-3 bg-red-50 rounded-lg border border-red-200">
                    <div className="w-7 h-7 bg-red-600 text-white rounded-full flex items-center justify-center text-xs font-bold">C</div>
                    <span className="text-sm font-medium text-red-800">부정확 → 웹 검색 전환 (Fallback)</span>
                  </div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'evaluate') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">검색 & 품질 평가</div>
              <div className="flex flex-col gap-3">
                <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-sm text-blue-800 font-mono text-center">"{s.query}"</div>
                <div className="text-center text-lg">↓ 검색 실행</div>
                <div className="space-y-2">
                  {s.docs.map((doc, i) => (
                    <div key={i} className={`flex items-center justify-between p-3 rounded-lg border ${doc.score > 0.7 ? 'bg-green-50 border-green-200' : doc.score > 0.5 ? 'bg-yellow-50 border-yellow-200' : 'bg-red-50 border-red-200'}`}>
                      <span className="text-sm font-medium">{doc.title}</span>
                      <span className={`text-xs font-mono px-2 py-1 rounded ${doc.score > 0.7 ? 'bg-green-200 text-green-800' : doc.score > 0.5 ? 'bg-yellow-200 text-yellow-800' : 'bg-red-200 text-red-800'}`}>
                        {doc.score.toFixed(2)}
                      </span>
                    </div>
                  ))}
                </div>
                <div className="text-center text-lg">↓ Retrieval Evaluator</div>
                <div className="grid grid-cols-3 gap-2">
                  <div className="bg-green-100 border-2 border-green-400 rounded-lg p-2 text-center text-xs font-bold text-green-800">정확 ✓</div>
                  <div className="bg-yellow-100 border-2 border-yellow-400 rounded-lg p-2 text-center text-xs font-bold text-yellow-800">모호 ?</div>
                  <div className="bg-red-100 border-2 border-red-400 rounded-lg p-2 text-center text-xs font-bold text-red-800">부정확 ✗</div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'correct') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-green-600 uppercase tracking-wider mb-4">경로 A: 정확함 (Correct)</div>
              <div className="flex flex-col items-center gap-3">
                <div className="w-full bg-green-100 border-2 border-green-400 rounded-xl p-4 text-center">
                  <div className="text-sm font-bold text-green-800">✅ 평가: 정확함</div>
                </div>
                <div className="text-lg">↓</div>
                <div className="w-full bg-green-50 border border-green-200 rounded-lg p-4">
                  <div className="text-xs font-bold text-green-700 mb-2">Knowledge Refinement</div>
                  <div className="space-y-2">
                    <div className="flex items-center gap-2">
                      <div className="w-full bg-white rounded border p-2 text-xs">
                        <span className="bg-green-200 px-1 rounded">AI 기본법 초안 (2024)</span> — 핵심 조항 추출
                      </div>
                    </div>
                    <div className="flex items-center gap-2">
                      <div className="w-full bg-white rounded border p-2 text-xs">
                        <span className="bg-green-200 px-1 rounded">개인정보보호법 AI 조항</span> — 관련 내용만 선별
                      </div>
                    </div>
                    <div className="flex items-center gap-2">
                      <div className="w-full bg-white rounded border p-2 text-xs line-through text-slate-400">
                        미국 AI 행정명령 분석 — 제외 (관련도 낮음)
                      </div>
                    </div>
                  </div>
                </div>
                <div className="text-lg">↓</div>
                <div className="w-full bg-emerald-100 border border-emerald-300 rounded-lg p-3 text-center text-sm font-bold text-emerald-800">
                  정제된 내부 문서로 정확한 답변 생성
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'ambiguous') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-yellow-600 uppercase tracking-wider mb-4">경로 B: 모호함 (Ambiguous)</div>
              <div className="flex flex-col items-center gap-3">
                <div className="w-full bg-yellow-100 border-2 border-yellow-400 rounded-xl p-4 text-center">
                  <div className="text-sm font-bold text-yellow-800">⚠️ 평가: 모호함</div>
                </div>
                <div className="grid grid-cols-2 gap-4 w-full">
                  <div className="flex flex-col items-center gap-2">
                    <div className="text-sm">↓</div>
                    <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 w-full text-center">
                      <div className="text-xs font-bold text-amber-700">내부 검색 결과</div>
                      <div className="text-xs text-amber-600 mt-1">핵심 정보 추출</div>
                    </div>
                  </div>
                  <div className="flex flex-col items-center gap-2">
                    <div className="text-sm">↓</div>
                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 w-full text-center">
                      <div className="text-xs font-bold text-blue-700">웹 검색</div>
                      <div className="text-xs text-blue-600 mt-1">보완 정보 수집</div>
                    </div>
                  </div>
                </div>
                <div className="text-lg">↓ 결합</div>
                <div className="w-full bg-emerald-100 border border-emerald-300 rounded-lg p-3 text-center text-sm font-bold text-emerald-800">
                  두 소스를 결합한 보완된 답변 생성
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'incorrect') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-red-600 uppercase tracking-wider mb-4">경로 C: 부정확 (Incorrect)</div>
              <div className="flex flex-col items-center gap-3">
                <div className="w-full bg-red-100 border-2 border-red-400 rounded-xl p-4 text-center">
                  <div className="text-sm font-bold text-red-800">❌ 평가: 부정확</div>
                </div>
                <div className="text-lg">↓</div>
                <div className="w-full bg-red-50 border border-red-200 rounded-lg p-3">
                  <div className="text-xs text-red-600 text-center line-through">내부 검색 결과 전부 폐기</div>
                </div>
                <div className="text-lg">↓ Fallback</div>
                <div className="w-full bg-blue-100 border-2 border-blue-400 rounded-lg p-4 text-center">
                  <div className="text-sm font-bold text-blue-800">🌐 웹 검색 전환</div>
                  <div className="text-xs text-blue-600 mt-1">검색 쿼리 재작성 → 웹 검색 → 결과 수집</div>
                </div>
                <div className="text-lg">↓</div>
                <div className="w-full bg-emerald-100 border border-emerald-300 rounded-lg p-3 text-center text-sm font-bold text-emerald-800">
                  웹 검색 기반 새 답변 생성
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'flowchart') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">CRAG 전체 흐름도</div>
              <div className="flex flex-col items-center gap-2 text-sm">
                <div className="bg-blue-100 border border-blue-300 rounded-lg px-4 py-2 font-bold text-blue-800">질문 입력</div>
                <div>↓</div>
                <div className="bg-slate-100 border border-slate-300 rounded-lg px-4 py-2 font-bold text-slate-700">문서 검색 (Retriever)</div>
                <div>↓</div>
                <div className="bg-amber-200 border-2 border-amber-500 rounded-xl px-4 py-2 font-bold text-amber-900">Retrieval Evaluator</div>
                <div className="grid grid-cols-3 gap-3 w-full mt-1">
                  <div className="flex flex-col items-center gap-1">
                    <div className="text-xs text-green-600 font-bold">정확 ↓</div>
                    <div className="bg-green-100 border border-green-300 rounded-lg px-2 py-1.5 text-xs text-green-800 font-bold text-center">Knowledge Refinement</div>
                    <div>↓</div>
                    <div className="bg-emerald-200 border border-emerald-400 rounded-lg px-2 py-1 text-xs text-emerald-800 font-bold">답변</div>
                  </div>
                  <div className="flex flex-col items-center gap-1">
                    <div className="text-xs text-yellow-600 font-bold">모호 ↓</div>
                    <div className="bg-yellow-100 border border-yellow-300 rounded-lg px-2 py-1.5 text-xs text-yellow-800 font-bold text-center">내부 + 웹 결합</div>
                    <div>↓</div>
                    <div className="bg-emerald-200 border border-emerald-400 rounded-lg px-2 py-1 text-xs text-emerald-800 font-bold">답변</div>
                  </div>
                  <div className="flex flex-col items-center gap-1">
                    <div className="text-xs text-red-600 font-bold">부정확 ↓</div>
                    <div className="bg-red-100 border border-red-300 rounded-lg px-2 py-1.5 text-xs text-red-800 font-bold text-center">웹 검색 전환</div>
                    <div>↓</div>
                    <div className="bg-emerald-200 border border-emerald-400 rounded-lg px-2 py-1 text-xs text-emerald-800 font-bold">답변</div>
                  </div>
                </div>
              </div>
            </div>
          );
        }
        return null;
      };

      const renderRightPanel = () => {
        if (s.phase === 'intro') {
          return (
            <div className="space-y-4">
              <div className="p-4 rounded-lg bg-amber-50 border border-amber-200">
                <div className="font-bold text-sm text-amber-800 mb-2">CRAG (Corrective RAG)란?</div>
                <div className="text-xs text-amber-700 space-y-1">
                  <div>• 검색 결과의 품질을 <b>3단계로 평가</b></div>
                  <div>• 품질에 따라 <b>다른 전략</b> 적용</div>
                  <div>• 부정확한 결과에 대한 <b>폴백 메커니즘</b></div>
                  <div>• 기존 RAG의 "검색 결과 맹신" 문제 해결</div>
                </div>
              </div>
              <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                <div className="font-bold text-sm text-slate-700 mb-2">기존 RAG의 문제</div>
                <div className="text-xs text-slate-600 space-y-1">
                  <div>• 검색 결과가 부정확해도 그대로 사용</div>
                  <div>• 노이즈가 있는 문서도 컨텍스트에 포함</div>
                  <div>• 결과적으로 답변 품질 저하</div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'flowchart') {
          return (
            <div className="space-y-4">
              <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{`# CRAG 핵심 로직 (의사코드)

def corrective_rag(query):
    # 1. 검색 실행
    docs = retriever.search(query)

    # 2. 품질 평가
    quality = evaluator.assess(query, docs)

    if quality == "Correct":
        # 경로 A: 핵심만 추출
        refined = knowledge_refine(docs)
        return llm.generate(query, refined)

    elif quality == "Ambiguous":
        # 경로 B: 내부 + 웹 결합
        refined = knowledge_refine(docs)
        web_results = web_search(query)
        combined = refined + web_results
        return llm.generate(query, combined)

    else:  # Incorrect
        # 경로 C: 웹 검색 전환
        rewritten = rewrite_query(query)
        web_results = web_search(rewritten)
        return llm.generate(query, web_results)`}</pre>
              <div className="p-3 bg-amber-50 rounded-lg border border-amber-200 text-xs text-amber-800">
                <b>핵심:</b> Knowledge Refinement는 문서를 문장 단위로 분해 → 관련 없는 문장 제거 → 핵심만 재조합하는 과정입니다.
              </div>
            </div>
          );
        }
        return (
          <div className="space-y-4">
            <div className="p-4 rounded-lg bg-amber-50 border border-amber-200">
              <div className="font-bold text-sm text-amber-800 mb-2">{s.title}</div>
              <div className="text-xs text-amber-700 space-y-1">
                <div>• <b>동작:</b> {s.action || '검색 결과 품질 평가'}</div>
                <div>• <b>결과:</b> {s.result || '3단계 분류'}</div>
              </div>
            </div>
            <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
              <div className="font-bold text-sm text-slate-700 mb-2">의사 비유</div>
              <div className="text-xs text-slate-600">
                {s.phase === 'evaluate' && "의사가 환자의 검사 결과지를 받아 '확진 / 추가 검사 필요 / 재검사 필요'로 분류하는 것과 같습니다."}
                {s.phase === 'correct' && "검사 결과에 확신이 있으면 바로 치료를 시작합니다. 불필요한 수치는 무시하고 핵심 결과만 참고합니다."}
                {s.phase === 'ambiguous' && "결과가 애매하면 기존 검사 결과를 참고하되, 추가 검사(CT, MRI 등)를 지시합니다."}
                {s.phase === 'incorrect' && "기존 검사가 완전히 잘못된 것으로 판단되면, 다른 검사 방법으로 처음부터 다시 시작합니다."}
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-amber-700 hover:text-amber-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. Advanced RAG 패턴 &gt; Chapter 1. 자기 교정 RAG</div>
                  <h1 className="text-2xl font-bold text-slate-800">VI-1-2. CRAG — 교정 검색 증강 생성</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>의사의 진단 과정</b>을 떠올려 보세요. 검사 결과가 확실하면 바로 치료, 애매하면 추가 검사, 틀리면 다른 검사 방법을 시도합니다. CRAG도 검색 결과 품질에 따라 교정합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-amber-700 border-amber-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">CRAG 파이프라인</h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="space-y-4">{renderVisualization()}</div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">{renderRightPanel()}</div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['CRAG', 'Corrective RAG', 'Retrieval Evaluator', 'Knowledge Refinement', 'Fallback', '웹 검색 전환'].map(kw => (
                <span key={kw} className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-sm font-medium border border-amber-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-amber-600 hover:bg-amber-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./VI-1-1.html" className="text-amber-600 hover:text-amber-800 font-medium">&larr; VI-1-1. Self-RAG</a>
              <a href="./VI-2-1.html" className="text-amber-600 hover:text-amber-800 font-medium">VI-2-1. Agentic RAG &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
