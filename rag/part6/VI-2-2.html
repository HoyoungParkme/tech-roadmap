  <!--
    VI-2-2. Adaptive RAG — 질문 복잡도에 따라 검색 전략을 자동 선택
    학습 목표: 분류기 → 분기 → 적절한 RAG 모드 흐름을 5단계로 이해.
    핵심 비유: 응급실 트리아지 — 환자(=질문) 중증도에 따라 처치(=RAG 모드) 선택.
    패턴: fastapi v1 — 좌(LiveDataPane: 분류기 + 분기 + 비용/시간 비교) / 우(VSCode CodeViewer)
    색상: rose
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 4가지 질문 시나리오 — 복잡도가 다른 4개 질문
    //   각 질문마다 어떤 모드로 라우팅되는지를 시각화
    // ─────────────────────────────────────────────────────
    const QUERIES = [
      { id: 'q1', text: '파이썬에서 리스트 정렬 방법은?',     complexity: 'simple',     icon: '💬', label: '단순' },
      { id: 'q2', text: '우리 회사 휴가 정책은?',              complexity: 'single',     icon: '📋', label: '단일 hop' },

      { id: 'q4', text: '경쟁사 대비 작년 점유율 변화는?',     complexity: 'multi',      icon: '🔬', label: '다중 hop' },
    ];

    // ─────────────────────────────────────────────────────
    // 4가지 RAG 모드 정의 — 분기 박스에 표시
    // ─────────────────────────────────────────────────────
    const MODES = [
      { key: 'simple', label: 'LLM 직접',    icon: '⚡', desc: '검색 없이 LLM만',       cost: 1, latency: 0.4, color: 'green' },
      { key: 'single', label: '단일 hop',    icon: '📋', desc: '일반 RAG (1회 검색)',   cost: 3, latency: 1.2, color: 'blue'  },
      { key: 'multi',  label: '다중 hop',    icon: '🔬', desc: 'Multi-Query / 분해',    cost: 8, latency: 3.5, color: 'purple'},
    ];

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의
    //   phase    : 현재 단계 식별자
    //   activeQ  : 현재 강조된 질문 id
    //   activeMode: 현재 활성 모드 key
    //   classifier : 분류기 박스 상태 — 'idle' | 'thinking' | 'decided'

    //   showSavings: 비용 절감 효과 강조
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. 단순 질문 — 검색 없이 LLM 직접',
        desc: '질문이 LLM의 사전학습으로 충분히 답할 수 있는 일반 상식이라면, 굳이 벡터 검색을 거칠 필요가 없다. "파이썬 리스트 정렬?" → LLM 단독 호출로 0.4초, 토큰 비용도 최소. 이게 Adaptive RAG의 첫 번째 분기다.',
        phase: 'simple',
        activeQ: 'q1',
        activeMode: 'simple',
        classifier: { state: 'decided', verdict: 'simple', reason: '일반 프로그래밍 지식 — 사내 문서 불필요' },
        showCost: false,
        showSavings: false,
        code: {
          lang: 'python',
          filename: 'simple.py',
          lines: [
            '# Step 1. 단순 질문 — 검색 없이 LLM 직접 호출',
            'from langchain_openai import ChatOpenAI',
            '',
            'llm = ChatOpenAI(model="gpt-4o-mini")',
            '',
            'def answer_simple(query: str) -> str:',
            '    """사전학습 지식만으로 충분한 질문은',
            '    벡터 검색 없이 LLM에 바로 위임한다."""',
            '    return llm.invoke(query).content',
            '',
            '# 사용 예',
            'answer_simple("파이썬에서 리스트 정렬 방법은?")',
            '#  → "sorted() 또는 list.sort()를 사용합니다 ..."',
            '#     (검색 0회, latency ~0.4s, cost 1x)',
            '',
            '# ─── 왜 검색을 안 하나? ───',
            '#   ▸ 일반 프로그래밍 지식 = LLM 사전학습에 포함',
            '#   ▸ 사내 문서를 검색해도 어차피 답이 없다',
            '#   ▸ 검색 1회 = 임베딩 + 벡터 조회 = 추가 비용',
            '#   ▸ 결과적으로 비용/지연이 80% 절감',
            '',
            '# ⚠ 단점: 환각 가능성 — 사실관계 질문엔 부적합',
            '#   "우리 회사 휴가 정책은?" 같은 질문은 다음 단계로',
          ],
          highlight: [1, 3, 5, 6, 7, 8, 11, 12, 13, 14, 15],
        },
      },
      {
        title: 'Step 2. 단일 hop 질문 — 일반 RAG',
        desc: '사실 확인이나 사내 문서 조회가 필요한 질문은 한 번의 벡터 검색으로 충분하다. "휴가 정책?"에 대해 사내 정책 문서 top-3을 가져와 prompt에 넣고 답한다. 단순 질문 대비 latency 1.2초, 비용 3배 — 그래도 정확한 사실 답변을 얻는다.',
        phase: 'single',
        activeQ: 'q2',
        activeMode: 'single',
        classifier: { state: 'decided', verdict: 'single', reason: '사내 정책 문서 조회 — 1회 검색이면 충분' },
        showCost: false,
        showSavings: false,
        code: {
          lang: 'python',
          filename: 'single-hop.py',
          lines: [
            '# Step 2. 단일 hop — 일반 RAG (Retrieve → Generate)',
            'from langchain_openai import ChatOpenAI, OpenAIEmbeddings',
            'from langchain_community.vectorstores import FAISS',
            '',
            'embeddings = OpenAIEmbeddings(model="text-embedding-3-small")',
            'vectorstore = FAISS.load_local("policy_db", embeddings)',
            'retriever = vectorstore.as_retriever(search_kwargs={"k": 3})',
            'llm = ChatOpenAI(model="gpt-4o-mini")',
            '',
            'def answer_single_hop(query: str) -> str:',
            '    """1회 벡터 검색으로 충분한 사실 확인 질문."""',
            '    # 1) 관련 문서 top-3 회수',
            '    docs = retriever.invoke(query)',
            '    context = "\\n\\n".join(d.page_content for d in docs)',
            '',
            '    # 2) prompt 에 context 주입 후 LLM 호출',
            '    prompt = f"""문맥:\\n{context}\\n\\n질문: {query}"""',
            '    return llm.invoke(prompt).content',
            '',
            '# 사용 예',
            'answer_single_hop("우리 회사 휴가 정책은?")',
            '#  → "연차 15일, 병가 10일 ... (사내 정책 문서 출처)"',
            '#     (검색 1회, latency ~1.2s, cost 3x)',
            '',
            '# ─── 언제 충분한가? ───',
            '#   ▸ 단일 문서/단일 사실로 답이 나오는 질문',
            '#   ▸ "X의 정의는?", "Y 정책은?", "Z 절차는?" 류',
            '#   ▸ 추론·비교·집계가 필요 없는 사실 확인',
          ],
          highlight: [1, 4, 5, 6, 7, 9, 10, 12, 13, 16, 17, 20, 21, 22, 23],
        },
      },
      {
        title: 'Step 3. 다중 hop 질문 — Multi-Query / Decomposition',
        desc: '"3분기 매출 하락 원인 분석"은 1회 검색으로는 답이 안 나온다. 매출 데이터 + 경쟁사 동향 + 마케팅 캠페인 + 외부 경제 지표 등 여러 sub-query로 분해(decompose)해서 각각 검색하고, 결과를 종합해 추론한다. 가장 강력하지만 cost 8배·latency 3.5초 — 비용이 비싸다.',
        phase: 'multi',
        activeQ: 'q3',
        activeMode: 'multi',
        classifier: { state: 'decided', verdict: 'multi', reason: '인과 분석 질문 — 다중 sub-query 분해 필요' },
        showCost: false,
        showSavings: false,
        code: {
          lang: 'python',
          filename: 'multi-hop.py',
          lines: [
            '# Step 3. 다중 hop — Multi-Query / Decomposition',
            'from langchain_openai import ChatOpenAI',
            'from langchain.retrievers.multi_query import MultiQueryRetriever',
            '',
            'llm = ChatOpenAI(model="gpt-4o-mini")',
            '',
            'def answer_multi_hop(query: str) -> str:',
            '    """질문을 sub-query 로 분해 후 각각 검색·종합."""',
            '    # 1) 분해: 1개 질문 → N개 sub-query',
            '    sub_queries = decompose(query, llm)',
            '    #   [ "3분기 매출 수치는?",',
            '    #     "경쟁사 3분기 동향은?",',
            '    #     "3분기 마케팅 캠페인은?",',
            '    #     "3분기 거시경제 지표는?" ]',
            '',
            '    # 2) 각 sub-query 별로 검색 — N회 retrieve',
            '    all_docs = []',
            '    for sq in sub_queries:',
            '        docs = retriever.invoke(sq)',
            '        all_docs.extend(docs)',
            '',
            '    # 3) Chain-of-Thought 로 종합 추론',
            '    return llm.invoke(',
            '        f"문맥:\\n{format_docs(all_docs)}\\n"',
            '        f"질문: {query}\\n"',
            '        f"단계별로 추론하시오 (CoT):"',
            '    ).content',
            '',
            '# 사용 예',
            'answer_multi_hop("3분기 매출 하락 원인을 분석해줘")',
            '#  → "1) 매출 -12% ... 2) 경쟁사 신제품 ... 3) 광고비 -30%"',
            '#     (검색 4회, latency ~3.5s, cost 8x)',
            '',
            '# ⚠ 비용이 가장 비쌈 — 분류기로 꼭 필요한 질문에만 사용',
          ],
          highlight: [1, 2, 6, 7, 9, 10, 16, 17, 18, 19, 22, 23, 24, 25, 26, 31, 32, 33],
        },
      },
      {
        title: 'Step 4. 분류기 (Router) — 어떤 모드로 보낼까?',
        desc: '핵심은 "들어온 질문을 어느 모드로 보낼지"를 결정하는 분류기다. 두 가지 구현이 있다. (a) LLM zero/few-shot 분류 — 빠른 프로토타입에 적합, (b) 학습된 model — 트래픽이 많으면 fine-tuned classifier가 비용 효율적. 두 방식 모두 simple/single/multi 라벨을 예측한다.',
        phase: 'classifier',
        activeQ: null,
        activeMode: null,
        classifier: { state: 'thinking', verdict: null, reason: 'LLM/모델이 질문 복잡도를 판정 중...' },
        showCost: false,
        showSavings: false,
        code: {
          lang: 'python',
          filename: 'classifier.py',
          lines: [
            '# Step 4. Query Router — LLM 분류기 또는 학습 모델',
            'from langchain_openai import ChatOpenAI',
            'from typing import Literal',
            '',
            'Mode = Literal["simple", "single", "multi"]',
            '',
            '# ─── 방식 A: LLM zero-shot 분류 (간단·유연·빠른 시작) ───',
            'CLASSIFIER_PROMPT = """다음 질문의 복잡도를 분류하시오.',
            '',
            '- "simple": 일반 상식, LLM 사전학습으로 답 가능',
            '- "single": 사실 확인, 1회 검색으로 답 가능',
            '- "multi" : 비교·분석·인과, 다중 검색 + 추론 필요',
            '',
            '질문: {query}',
            '복잡도 (한 단어):"""',
            '',
            'def classify_with_llm(query: str) -> Mode:',
            '    """LLM 으로 질문 복잡도를 판정."""',
            '    llm = ChatOpenAI(model="gpt-4o-mini", temperature=0)',
            '    label = llm.invoke(',
            '        CLASSIFIER_PROMPT.format(query=query)',
            '    ).content.strip().lower()',
            '    return label if label in ("simple", "single", "multi") else "single"',
            '',
            '# ─── 방식 B: 학습된 분류 모델 (대규모 트래픽에 적합) ───',
            'from transformers import pipeline',
            '',
            'clf = pipeline("text-classification", model="./router-model")',
            '',
            'def classify_with_model(query: str) -> Mode:',
            '    """fine-tuned BERT 등 가벼운 분류기로 라우팅."""',
            '    result = clf(query)[0]',
            '    return result["label"]   # "simple" | "single" | "multi"',
            '',
            '# ─── Adaptive RAG 메인 라우터 ───',
            'def adaptive_rag(query: str) -> str:',
            '    mode = classify_with_llm(query)   # 또는 classify_with_model',
            '    if mode == "simple":',
            '        return answer_simple(query)',
            '    if mode == "single":',
            '        return answer_single_hop(query)',
            '    return answer_multi_hop(query)',
          ],
          highlight: [1, 4, 6, 16, 17, 18, 19, 20, 21, 22, 24, 25, 27, 29, 30, 31, 32, 35, 36, 37, 38, 39, 40, 41],
        },
      },
      {
        title: 'Step 5. 비용 절감 — 단순 질문에 검색 안 함',
        desc: 'Adaptive RAG의 진짜 가치는 비용/지연 절감이다. 모든 질문에 multi-hop을 쓰면 평균 cost 8x. Adaptive하면 simple(1x) 30% + single(3x) 50% + multi(8x) 20% = 평균 ~3.5x. 단순 질문에 검색을 생략하는 것만으로도 전체 비용·지연을 절반 가까이 줄인다.',
        phase: 'savings',
        activeQ: null,
        activeMode: null,
        classifier: { state: 'idle', verdict: null, reason: null },
        showCost: true,
        showSavings: true,
        code: {
          lang: 'python',
          filename: 'cost.py',
          lines: [
            '# Step 5. 비용 절감 효과 측정 — 단순 질문 검색 생략',
            '',
            '# 가정: 트래픽 분포',
            '#   simple : 30%   (cost 1x, latency 0.4s)',
            '#   single : 50%   (cost 3x, latency 1.2s)',
            '#   multi  : 20%   (cost 8x, latency 3.5s)',
            '',
            'TRAFFIC = {"simple": 0.30, "single": 0.50, "multi": 0.20}',
            'COSTS   = {"simple": 1.0,  "single": 3.0,  "multi": 8.0}',
            'LATENCY = {"simple": 0.4,  "single": 1.2,  "multi": 3.5}',
            '',
            'def avg_cost(strategy: str) -> float:',
            '    """전략별 평균 비용 (가중평균)."""',
            '    if strategy == "always_multi":',
            '        # 모든 질문에 multi-hop',
            '        return COSTS["multi"]',
            '    if strategy == "always_single":',
            '        # 모든 질문에 single-hop',
            '        return COSTS["single"]',
            '    if strategy == "adaptive":',
            '        # Adaptive — 분류기로 적절한 모드 선택',
            '        return sum(TRAFFIC[k] * COSTS[k] for k in TRAFFIC)',
            '',
            '# 비교',
            'print(avg_cost("always_multi"))    # 8.00x',
            'print(avg_cost("always_single"))   # 3.00x',
            'print(avg_cost("adaptive"))        # 3.40x',
            '',
            '# ─── 실제 효과 ───',
            '#   ▸ vs always_multi : 비용 -57%, latency -65%',
            '#   ▸ vs always_single: 단순 질문에서만 -67% 절감',
            '#   ▸ multi 가 필요한 20% 질문엔 정확도 유지',
            '',
            '# ⚠ 분류기 비용 자체도 고려',
            '#   ▸ LLM 분류기 = 짧은 prompt 1회 (≈ cost 0.3x)',
            '#   ▸ 학습 모델  = 거의 무료 (≈ cost 0.01x)',
            '#   ▸ 그래도 multi-hop 1회 절약이 분류 30회보다 이득',
            '',
            '# ✨ 결론: Adaptive RAG = 정확도 유지 + 비용 절반',
          ],
          highlight: [2, 3, 4, 5, 6, 8, 9, 10, 12, 13, 18, 19, 20, 21, 22, 25, 26, 27, 30, 31, 32, 33, 41],

    // ─────────────────────────────────────────────────────
    // 좌측 위: 분류기 → 분기 다이어그램
    //   상단: Query 박스 (현재 강조된 질문)
    //   중간: Classifier 박스 (idle / thinking / decided)
    //   하단: 3개 모드 박스 (simple / single / multi) — 활성 모드만 점등
    // ─────────────────────────────────────────────────────
    function RouterDiagram({ step }) {
      const activeQuery = step.activeQ ? QUERIES.find((q) => q.id === step.activeQ) : null;
      const verdict = step.classifier?.verdict;

      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🚦</span>
              <span className="text-[11px] font-bold text-rose-800">Adaptive Router — 질문 → 모드</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">
              {step.phase}
            </span>
          </div>

          {/* 입력 질문 풀 */}
          <div className="bg-slate-50 rounded border border-slate-200 p-2 mb-2">
            <div className="text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1">queries</div>
            <div className="space-y-1">
              {QUERIES.map((q) => {
                const isActive = activeQuery && activeQuery.id === q.id;
                return (
                  <div
                    key={q.id}
                    className={`flex items-center gap-1.5 px-1.5 py-0.5 rounded text-[10px] font-mono transition-all ${
                      isActive
                        ? 'bg-rose-600 text-white ring-2 ring-rose-300 font-bold'
                        : activeQuery
                        ? 'bg-white text-slate-400 opacity-50'
                        : 'bg-white text-slate-700'
                    }`}
                  >
                    <span>{q.icon}</span>
                    <span className="flex-1 truncate">{q.text}</span>
                    <span className={`text-[8px] px-1 rounded font-bold ${isActive ? 'bg-white text-rose-700' : 'bg-slate-200 text-slate-600'}`}>
                      {q.label}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* 화살표 */}
          <div className="text-center text-rose-400 text-xs mb-1">↓</div>

          {/* 분류기 박스 */}
          <div
            className={`rounded-lg border-2 p-2 mb-2 transition-all ${
              step.classifier?.state === 'thinking'
                ? 'bg-amber-50 border-amber-400 animate-pulse'
                : step.classifier?.state === 'decided'
                ? 'bg-rose-50 border-rose-400'
                : 'bg-slate-50 border-slate-300'
            }`}
          >
            <div className="flex items-center justify-between mb-1">
              <div className="flex items-center gap-1.5">
                <span className="text-base">🧠</span>
                <span className="text-[11px] font-bold text-rose-800">Query Classifier</span>
              </div>
              <span className="text-[9px] bg-white border border-rose-300 text-rose-700 px-1.5 py-0.5 rounded font-mono">
                {step.classifier?.state || 'idle'}
              </span>
            </div>
            {step.classifier?.reason && (
              <div className="text-[9px] text-slate-700 italic leading-tight">"{step.classifier.reason}"</div>
            )}
            {verdict && (
              <div className="mt-1 text-[10px] font-mono">
                <span className="text-slate-500">verdict: </span>
                <span className="bg-rose-600 text-white px-1.5 py-0.5 rounded font-bold">{verdict}</span>
              </div>
            )}
          </div>

          {/* 화살표 */}
          <div className="text-center text-rose-400 text-xs mb-1">↓ route ↓</div>

          {/* 3개 모드 박스 */}
          <div className="grid grid-cols-3 gap-1.5">
            {MODES.map((m) => {
              const isActive = step.activeMode === m.key;
              const colorMap = {
                green: isActive
                  ? 'bg-green-500 text-white border-green-600 ring-2 ring-green-300'
                  : 'bg-green-50 text-green-700 border-green-200',
                blue: isActive
                  ? 'bg-blue-500 text-white border-blue-600 ring-2 ring-blue-300'
                  : 'bg-blue-50 text-blue-700 border-blue-200',
                purple: isActive
                  ? 'bg-purple-500 text-white border-purple-600 ring-2 ring-purple-300'
                  : 'bg-purple-50 text-purple-700 border-purple-200',
              };
              return (
                <div
                  key={m.key}
                  className={`rounded-lg border-2 p-1.5 text-center transition-all ${colorMap[m.color]} ${
                    isActive ? 'scale-105 shadow-md' : ''
                  }`}
                >
                  <div className="text-base">{m.icon}</div>
                  <div className="text-[10px] font-bold leading-tight">{m.label}</div>
                  <div className={`text-[8px] mt-0.5 ${isActive ? 'text-white opacity-90' : 'opacity-75'}`}>
                    {m.desc}
                  </div>
                  {isActive && (
                    <div className="text-[8px] mt-1 bg-white/30 rounded px-1 py-0.5 font-mono font-bold">
                      ACTIVE
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: 비용/지연 비교 박스
    //   - showCost=false 일 땐: 현재 활성 모드의 cost/latency 단순 카드
    //   - showCost=true  일 땐: 3 전략 비교 막대 (always_multi / always_single / adaptive)
    // ─────────────────────────────────────────────────────
    function CostBox({ step }) {
      if (step.showSavings) {
        // Step 5 — 3 전략 막대 비교
        const strategies = [
          { key: 'always_multi',  label: '항상 multi-hop', cost: 8.0, latency: 3.5, color: 'bg-purple-500', txt: 'text-purple-800' },
          { key: 'always_single', label: '항상 single-hop', cost: 3.0, latency: 1.2, color: 'bg-blue-500',   txt: 'text-blue-800'   },
          { key: 'adaptive',      label: 'Adaptive (분류)', cost: 3.4, latency: 1.4, color: 'bg-rose-500',   txt: 'text-rose-800'   },
        ];
        const maxCost = 8.0;
        const maxLat = 3.5;

        return (
          <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">💰</span>
                <span className="text-[11px] font-bold text-rose-800">3 전략 평균 비용·지연 비교</span>
              </div>
              <span className="text-[9px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                weighted avg
              </span>
            </div>
            <div className="bg-white rounded border border-rose-200 p-2 space-y-2">
              {strategies.map((s) => (
                <div key={s.key}>
                  <div className="flex items-center justify-between text-[10px] mb-0.5">
                    <span className={`font-bold ${s.txt}`}>{s.label}</span>
                    <span className="font-mono text-slate-600">{s.cost.toFixed(1)}x · {s.latency.toFixed(1)}s</span>
                  </div>
                  <div className="flex gap-1">
                    <div className="flex-1 bg-slate-100 rounded h-3 overflow-hidden relative">
                      <div
                        className={`${s.color} h-full transition-all duration-700`}
                        style={{ width: `${(s.cost / maxCost) * 100}%` }}
                      />
                      <span className="absolute inset-0 flex items-center justify-end pr-1 text-[8px] font-bold text-slate-700 font-mono">
                        cost
                      </span>
                    </div>
                    <div className="flex-1 bg-slate-100 rounded h-3 overflow-hidden relative">
                      <div
                        className={`${s.color} h-full opacity-60 transition-all duration-700`}
                        style={{ width: `${(s.latency / maxLat) * 100}%` }}
                      />
                      <span className="absolute inset-0 flex items-center justify-end pr-1 text-[8px] font-bold text-slate-700 font-mono">
                        latency
                      </span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div className="mt-2 grid grid-cols-2 gap-1.5 text-[9px]">
              <div className="bg-white rounded border border-emerald-200 p-1.5">
                <div className="font-bold text-emerald-700">vs always_multi</div>
                <div className="text-emerald-600 font-mono">cost -57% · lat -60%</div>
              </div>
              <div className="bg-white rounded border border-amber-200 p-1.5">
                <div className="font-bold text-amber-700">vs always_single</div>
                <div className="text-amber-600 font-mono">단순 질문 -67%</div>
              </div>
            </div>
          </div>
        );
      }

      // Step 1~4 — 현재 활성 모드의 cost/latency
      const mode = step.activeMode ? MODES.find((m) => m.key === step.activeMode) : null;

      if (!mode) {
        return (
          <div className="bg-slate-50 border-2 border-dashed border-slate-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">⏳</span>
              <span className="text-[11px] font-bold text-slate-700">분류기 판정 대기 중...</span>
            </div>
            <div className="bg-white rounded border border-slate-200 p-2 text-center">
              <div className="text-[10px] text-slate-500 font-mono italic">
                질문 복잡도 분석 → 적절한 모드 선택
              </div>
              <div className="text-[9px] text-slate-400 mt-1">
                LLM zero-shot 분류 또는 학습된 모델 사용
              </div>
              <div className="grid grid-cols-3 gap-1.5 mt-2">
                {MODES.map((m) => (
                  <div key={m.key} className="border border-slate-200 rounded p-1 text-[9px]">
                    <div className="font-bold text-slate-600">{m.label}</div>
                    <div className="font-mono text-slate-500">{m.cost}x · {m.latency}s</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      const colorMap = {
        green:  { bg: 'bg-green-50',  border: 'border-green-300',  text: 'text-green-800',  bar: 'bg-green-500'  },
        blue:   { bg: 'bg-blue-50',   border: 'border-blue-300',   text: 'text-blue-800',   bar: 'bg-blue-500'   },
        purple: { bg: 'bg-purple-50', border: 'border-purple-300', text: 'text-purple-800', bar: 'bg-purple-500' },
      };
      const c = colorMap[mode.color];
      const maxCost = 8.0;
      const maxLat = 3.5;

      return (
        <div className={`${c.bg} border-2 ${c.border} rounded-lg p-3`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">{mode.icon}</span>
              <span className={`text-[11px] font-bold ${c.text}`}>활성 모드: {mode.label}</span>
            </div>
            <span className={`text-[9px] ${c.bar} text-white px-1.5 py-0.5 rounded font-mono font-bold`}>
              {mode.desc}
            </span>
          </div>

          <div className="bg-white rounded border border-slate-200 p-2 space-y-2">
            <div>
              <div className="flex items-center justify-between text-[10px] mb-0.5">
                <span className={`font-bold ${c.text}`}>💵 상대 비용</span>
                <span className="font-mono text-slate-600">{mode.cost.toFixed(1)}x</span>
              </div>
              <div className="bg-slate-100 rounded h-2.5 overflow-hidden">
                <div className={`${c.bar} h-full transition-all duration-700`} style={{ width: `${(mode.cost / maxCost) * 100}%` }} />
              </div>
            </div>
            <div>
              <div className="flex items-center justify-between text-[10px] mb-0.5">
                <span className={`font-bold ${c.text}`}>⏱ 응답 지연</span>
                <span className="font-mono text-slate-600">{mode.latency.toFixed(1)}s</span>
              </div>
              <div className="bg-slate-100 rounded h-2.5 overflow-hidden">
                <div className={`${c.bar} h-full opacity-70 transition-all duration-700`} style={{ width: `${(mode.latency / maxLat) * 100}%` }} />
              </div>
            </div>
          </div>

          <div className="mt-2 grid grid-cols-3 gap-1 text-[9px]">
            {MODES.map((m) => {
              const isActive = m.key === mode.key;
              return (
                <div
                  key={m.key}
                  className={`rounded p-1 text-center font-mono ${
                    isActive ? `${c.bar} text-white font-bold` : 'bg-white border border-slate-200 text-slate-500'
                  }`}
                >
                  <div>{m.label}</div>
                  <div>{m.cost}x · {m.latency}s</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: Router 다이어그램 / 하단: Cost 비교 박스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🚦 Adaptive RAG — 분류기 + 분기</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <RouterDiagram step={step} />
            <CostBox step={step} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-green-500"></span>simple (LLM)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-blue-500"></span>single hop
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-purple-500"></span>multi hop
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-rose-500"></span>adaptive
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VI-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. Advanced RAG 패턴 &gt; Chapter 2. Agentic & Adaptive</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VI-2-2. Adaptive RAG — 질문 복잡도에 따라 검색 전략 자동 선택</h1>
                  <p className="text-sm text-slate-500 mt-0.5">분류기 → 분기 → simple / single-hop / multi-hop · 비용 절반 + 정확도 유지</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: <strong>simple</strong>(검색 X) + <strong>single-hop</strong>(1회 검색) + <strong>multi-hop</strong>(분해+추론)을 분류기로 라우팅하면 평균 비용 ~3.5x로 always_multi(8x) 대비 <strong>57% 절감</strong>. 다음(VI-2-3)에서는 Graph RAG를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Adaptive RAG', 'Query Router', '복잡도 분류', 'Multi-Query', 'Decomposition', '비용 절감'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./VI-2-1.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; VI-2-1 Agentic RAG</a>
              <a href="./VI-2-3.html" className="text-rose-700 hover:text-rose-900 font-medium">VI-2-3 Graph RAG &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
