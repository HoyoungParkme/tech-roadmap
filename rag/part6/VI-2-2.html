<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — VI-2-2. Adaptive RAG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ROUTES = [
      { label: '간단한 질문', icon: '💬', color: 'bg-green-50 border-green-300 text-green-800', target: 'LLM 직접 답변', example: '"파이썬에서 리스트 정렬하는 법은?"' },
      { label: '사실 확인', icon: '📋', color: 'bg-blue-50 border-blue-300 text-blue-800', target: '기본 RAG', example: '"우리 회사 휴가 정책은?"' },
      { label: '복잡한 분석', icon: '🔬', color: 'bg-purple-50 border-purple-300 text-purple-800', target: '고급 RAG (Multi-step)', example: '"3분기 매출 하락 원인을 분석해줘"' },
      { label: '최신 정보', icon: '📡', color: 'bg-orange-50 border-orange-300 text-orange-800', target: '웹 검색', example: '"오늘 주요 IT 뉴스는?"' },
    ];

    const STEPS = [
      {
        title: "Adaptive RAG란?",
        desc: "병원 응급실의 트리아지(중증도 분류)를 떠올려 보세요. 가벼운 감기 환자에게 MRI를 찍지 않고, 심각한 외상 환자에게 해열제만 주지 않습니다. Adaptive RAG는 질문의 복잡도에 따라 최적의 파이프라인을 선택합니다.",
        phase: "intro"
      },
      {
        title: "1단계: 쿼리 분류 (Router)",
        desc: "들어온 질문을 분석하여 유형을 분류합니다. 간단한 질문 / 사실 확인 / 복잡한 분석 / 최신 정보 — 각각 다른 파이프라인으로 라우팅됩니다. 이것이 Query Router의 역할입니다.",
        phase: "router",
        activeRoute: -1
      },
      {
        title: "경로별 처리 — 간단한 질문 & 사실 확인",
        desc: "간단한 질문은 LLM이 직접 답변합니다 — 불필요한 검색을 생략하여 비용과 지연을 줄입니다. 사실 확인이 필요한 질문은 기본 RAG 파이프라인(검색 → 답변)을 사용합니다.",
        phase: "simple",
        activeRoutes: [0, 1]
      },
      {
        title: "경로별 처리 — 복잡한 분석 & 최신 정보",
        desc: "복잡한 분석 질문은 고급 RAG(Multi-step, Chain-of-Thought)를 사용합니다. 최신 정보 질문은 내부 DB를 건너뛰고 바로 웹 검색으로 라우팅됩니다.",
        phase: "complex",
        activeRoutes: [2, 3]
      },
      {
        title: "Adaptive RAG 전체 라우터 다이어그램",
        desc: "핵심은 '모든 질문에 같은 파이프라인은 비효율적'이라는 것입니다. 질문 복잡도에 맞는 최적의 경로를 선택하여 비용, 지연, 품질을 동시에 최적화합니다. 간단한 질문에 과한 파이프라인 = 비용 낭비, 복잡한 질문에 단순 파이프라인 = 품질 저하.",
        phase: "diagram"
      }
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderVisualization = () => {
        if (s.phase === 'intro') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">Adaptive RAG 핵심 개념</div>
              <div className="flex flex-col items-center gap-4">
                <div className="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center text-3xl border-2 border-amber-300">🏥</div>
                <div className="text-center text-sm text-slate-600 font-medium">응급실 트리아지 — 중증도에 따른 최적 치료</div>
                <div className="w-full space-y-2 mt-2">
                  {ROUTES.map((r, i) => (
                    <div key={i} className={`flex items-center justify-between p-3 rounded-lg border-2 ${r.color}`}>
                      <div className="flex items-center gap-2">
                        <span className="text-xl">{r.icon}</span>
                        <span className="font-bold text-sm">{r.label}</span>
                      </div>
                      <span className="text-xs font-mono opacity-75">→ {r.target}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'router') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">Query Router</div>
              <div className="flex flex-col items-center gap-3">
                <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 w-full text-sm text-blue-800 font-mono text-center">"질문 입력"</div>
                <div className="text-lg">↓</div>
                <div className="bg-amber-200 border-2 border-amber-500 rounded-xl p-4 w-full text-center">
                  <div className="text-sm font-bold text-amber-900">🔀 Query Router</div>
                  <div className="text-xs text-amber-700 mt-1">질문 유형 분류 & 최적 경로 선택</div>
                </div>
                <div className="grid grid-cols-2 gap-2 w-full mt-1">
                  {ROUTES.map((r, i) => (
                    <div key={i} className={`p-2 rounded-lg border text-center ${r.color}`}>
                      <div className="text-lg">{r.icon}</div>
                      <div className="text-xs font-bold">{r.label}</div>
                      <div className="text-[10px] opacity-75">→ {r.target}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'simple') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">간단한 질문 & 사실 확인</div>
              <div className="space-y-4">
                {s.activeRoutes.map(idx => {
                  const r = ROUTES[idx];
                  return (
                    <div key={idx} className={`p-4 rounded-xl border-2 ${r.color}`}>
                      <div className="flex items-center gap-2 mb-2">
                        <span className="text-xl">{r.icon}</span>
                        <span className="font-bold text-sm">{r.label}</span>
                      </div>
                      <div className="text-xs mb-2 opacity-75 font-mono">{r.example}</div>
                      <div className="flex items-center gap-2">
                        <span className="text-xs">→</span>
                        <div className={`text-xs font-bold px-2 py-1 rounded ${idx === 0 ? 'bg-green-200 text-green-800' : 'bg-blue-200 text-blue-800'}`}>
                          {r.target}
                        </div>
                      </div>
                      <div className="mt-2 text-xs opacity-75">
                        {idx === 0 ? '검색 없이 LLM이 직접 답변 → 비용 절감, 빠른 응답' : '벡터 검색 → 관련 문서 → 답변 생성'}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        }
        if (s.phase === 'complex') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">복잡한 분석 & 최신 정보</div>
              <div className="space-y-4">
                {s.activeRoutes.map(idx => {
                  const r = ROUTES[idx];
                  return (
                    <div key={idx} className={`p-4 rounded-xl border-2 ${r.color}`}>
                      <div className="flex items-center gap-2 mb-2">
                        <span className="text-xl">{r.icon}</span>
                        <span className="font-bold text-sm">{r.label}</span>
                      </div>
                      <div className="text-xs mb-2 opacity-75 font-mono">{r.example}</div>
                      <div className="flex items-center gap-2">
                        <span className="text-xs">→</span>
                        <div className={`text-xs font-bold px-2 py-1 rounded ${idx === 2 ? 'bg-purple-200 text-purple-800' : 'bg-orange-200 text-orange-800'}`}>
                          {r.target}
                        </div>
                      </div>
                      <div className="mt-2 text-xs opacity-75">
                        {idx === 2 ? '다단계 검색 + 추론 체인 → 깊이 있는 분석' : '내부 DB 스킵 → 웹 검색 → 최신 결과'}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        }
        if (s.phase === 'diagram') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4">Adaptive RAG 전체 흐름</div>
              <div className="flex flex-col items-center gap-2 text-sm">
                <div className="bg-blue-100 border border-blue-300 rounded-lg px-4 py-2 font-bold text-blue-800">질문 입력</div>
                <div>↓</div>
                <div className="bg-amber-200 border-2 border-amber-500 rounded-xl px-4 py-2 font-bold text-amber-900 w-full text-center">🔀 Query Router (복잡도 분류)</div>
                <div className="grid grid-cols-2 gap-3 w-full mt-1">
                  {ROUTES.map((r, i) => (
                    <div key={i} className="flex flex-col items-center gap-1">
                      <div className={`text-xs font-bold ${['text-green-600','text-blue-600','text-purple-600','text-orange-600'][i]}`}>{r.label} ↓</div>
                      <div className={`border rounded-lg px-2 py-1.5 text-xs font-bold text-center w-full ${r.color}`}>{r.target}</div>
                      <div>↓</div>
                      <div className="bg-emerald-200 border border-emerald-400 rounded-lg px-2 py-1 text-xs text-emerald-800 font-bold">답변</div>
                    </div>
                  ))}
                </div>
                <div className="mt-3 p-3 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-800 w-full text-center">
                  <b>핵심:</b> 각 경로의 비용과 지연이 다름 — 간단(저비용, 빠름) ↔ 복잡(고비용, 느림)
                </div>
              </div>
            </div>
          );
        }
        return null;
      };

      const renderRightPanel = () => {
        if (s.phase === 'intro') {
          return (
            <div className="space-y-4">
              <div className="p-4 rounded-lg bg-amber-50 border border-amber-200">
                <div className="font-bold text-sm text-amber-800 mb-2">왜 Adaptive인가?</div>
                <div className="text-xs text-amber-700 space-y-1">
                  <div>• 모든 질문에 같은 파이프라인은 <b>비효율적</b></div>
                  <div>• 간단한 질문에 고급 RAG = <b>비용 낭비</b></div>
                  <div>• 복잡한 질문에 단순 RAG = <b>품질 저하</b></div>
                  <div>• 질문 유형에 맞게 <b>동적으로 적응</b></div>
                </div>
              </div>
              <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                <div className="font-bold text-sm text-slate-700 mb-2">트리아지 비유</div>
                <div className="text-xs text-slate-600 space-y-1">
                  <div>• 🟢 <b>경증:</b> 감기 → 처방전만 (LLM 직접)</div>
                  <div>• 🟡 <b>중등:</b> 골절 → X-ray + 깁스 (기본 RAG)</div>
                  <div>• 🔴 <b>중증:</b> 외상 → 수술 + ICU (고급 RAG)</div>
                  <div>• 🟠 <b>특수:</b> 전문 케이스 → 전원 (웹 검색)</div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'diagram') {
          return (
            <div className="space-y-4">
              <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{`# Adaptive RAG Router (의사코드)

def adaptive_rag(query):
    # 쿼리 복잡도 분류
    route = query_router.classify(query)
    # → "simple" | "factual" | "complex" | "realtime"

    if route == "simple":
        # 검색 불필요 — LLM 직접 답변
        return llm.generate(query)

    elif route == "factual":
        # 기본 RAG
        docs = retriever.search(query)
        return llm.generate(query, context=docs)

    elif route == "complex":
        # 고급 RAG — 다단계 추론
        sub_queries = decompose(query)
        all_docs = []
        for sq in sub_queries:
            docs = retriever.search(sq)
            all_docs.extend(docs)
        return llm.generate(
            query, context=all_docs, cot=True
        )

    elif route == "realtime":
        # 웹 검색
        results = web_search(query)
        return llm.generate(query, context=results)`}</pre>
            </div>
          );
        }
        return (
          <div className="space-y-4">
            <div className="p-4 rounded-lg bg-amber-50 border border-amber-200">
              <div className="font-bold text-sm text-amber-800 mb-2">경로별 특징</div>
              <div className="text-xs text-amber-700">
                {s.phase === 'router' && "Query Router는 LLM 기반 분류기 또는 규칙 기반 분류기로 구현합니다. 질문의 의도, 복잡도, 시의성을 분석하여 최적 경로를 결정합니다."}
                {s.phase === 'simple' && "간단한 질문은 검색 없이 빠르게 처리하고, 사실 확인은 기본 RAG로 정확하게 처리합니다. 효율성과 정확성의 균형을 맞춥니다."}
                {s.phase === 'complex' && "복잡한 분석은 질문 분해 + 다단계 검색 + 추론 체인으로 처리하고, 최신 정보는 웹 검색으로 처리합니다."}
              </div>
            </div>
            <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
              <div className="font-bold text-sm text-slate-700 mb-2">비용 vs 품질 트레이드오프</div>
              <div className="text-xs text-slate-600 space-y-2">
                <div className="flex items-center justify-between">
                  <span>💬 LLM 직접</span>
                  <div className="flex gap-1">
                    <span className="bg-green-200 text-green-800 px-1 rounded text-[10px]">저비용</span>
                    <span className="bg-green-200 text-green-800 px-1 rounded text-[10px]">빠름</span>
                  </div>
                </div>
                <div className="flex items-center justify-between">
                  <span>📋 기본 RAG</span>
                  <div className="flex gap-1">
                    <span className="bg-yellow-200 text-yellow-800 px-1 rounded text-[10px]">중비용</span>
                    <span className="bg-yellow-200 text-yellow-800 px-1 rounded text-[10px]">보통</span>
                  </div>
                </div>
                <div className="flex items-center justify-between">
                  <span>🔬 고급 RAG</span>
                  <div className="flex gap-1">
                    <span className="bg-red-200 text-red-800 px-1 rounded text-[10px]">고비용</span>
                    <span className="bg-red-200 text-red-800 px-1 rounded text-[10px]">느림</span>
                  </div>
                </div>
                <div className="flex items-center justify-between">
                  <span>📡 웹 검색</span>
                  <div className="flex gap-1">
                    <span className="bg-orange-200 text-orange-800 px-1 rounded text-[10px]">중비용</span>
                    <span className="bg-orange-200 text-orange-800 px-1 rounded text-[10px]">가변</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-amber-700 hover:text-amber-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. Advanced RAG 패턴 &gt; Chapter 2. Agentic & Adaptive</div>
                  <h1 className="text-2xl font-bold text-slate-800">VI-2-2. Adaptive RAG — 적응형 RAG</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>병원 응급실 트리아지</b>를 떠올려 보세요. 가벼운 감기 환자에게 MRI를 찍지 않듯, 간단한 질문에 고급 RAG를 사용하는 것은 비효율입니다. 질문 복잡도에 맞게 <b>최적의 파이프라인</b>을 선택합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-amber-700 border-amber-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">Adaptive RAG 파이프라인</h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="space-y-4">{renderVisualization()}</div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">{renderRightPanel()}</div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Adaptive RAG', 'Query Router', '복잡도 분류', '비용 최적화', 'Multi-step RAG'].map(kw => (
                <span key={kw} className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-sm font-medium border border-amber-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-amber-600 hover:bg-amber-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./VI-2-1.html" className="text-amber-600 hover:text-amber-800 font-medium">&larr; VI-2-1. Agentic RAG</a>
              <a href="./VI-2-3.html" className="text-amber-600 hover:text-amber-800 font-medium">VI-2-3. Graph RAG &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
