    //   activeTurn에 해당하는 turn은 rose 강조 / 그 외는 옅은 회색
    //   failMode='no-rewrite' 일 때 active turn의 docs는 빨간 경고로
    // ─────────────────────────────────────────────────────
    function ConversationTurns({ turns, activeTurn, showRewrite, showDocs, showAi, failMode }) {
      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">💬</span>
              <span className="text-[11px] font-bold text-rose-800">대화 turn 누적</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">
              turn {turns.length}
            </span>
          </div>

          <div className="space-y-2">
            {turns.map((t) => {
              const isActive = t.n === activeTurn;
              const showRewriteHere = isActive && showRewrite;
              const showDocsHere = (isActive && showDocs) || (!isActive);
              const showAiHere = (isActive && showAi) || (!isActive);
              const isFail = isActive && failMode === 'no-rewrite';

              return (
                <div
                  key={t.n}
                  className={`rounded-lg border-2 transition-all duration-500 ${
                    isActive ? 'border-rose-400 shadow-md bg-rose-50/40' : 'border-slate-200 bg-slate-50/60'
                  }`}
                >
                  {/* turn 헤더 */}
                  <div className="flex items-center gap-1.5 px-2 py-1 border-b border-slate-200 bg-white/70 rounded-t-lg">
                    <span className={`text-[9px] font-mono font-bold w-6 text-center rounded ${isActive ? 'bg-rose-600 text-white' : 'bg-slate-200 text-slate-600'}`}>
                      #{t.n}
                    </span>
                    <span className="text-[9px] text-slate-500 font-mono uppercase tracking-wider">turn</span>
                    {isActive && (
                      <span className="ml-auto text-[8px] bg-rose-600 text-white px-1 rounded font-bold animate-pulse">ACTIVE</span>
                    )}
                  </div>

                  {/* User 질문 */}
                  <div className="flex items-start gap-1.5 p-2">
                    <span className="w-5 h-5 bg-blue-200 text-blue-700 rounded-full flex items-center justify-center text-[9px] font-bold shrink-0">U</span>
                    <div className="text-[10px] text-blue-900 leading-snug font-medium">{t.user}</div>
                  </div>

                  {/* Standalone 재구성 (showRewrite=true 이고 active 일 때) */}
                  {showRewriteHere && (
                    <div className="mx-2 mb-2 p-2 rounded border-2 border-dashed border-rose-400 bg-rose-50">
                      <div className="flex items-center gap-1 mb-1">
                        <span className="text-[8px] bg-rose-600 text-white px-1 py-0.5 rounded font-bold uppercase">condense</span>
                        <span className="text-[8px] text-rose-700 font-medium">{t.rewriteNote}</span>
                      </div>
                      <div className="text-[10px] text-rose-900 font-mono bg-white rounded px-1.5 py-1 border border-rose-200">
                        ↳ {t.standalone}
                      </div>
                    </div>
                  )}

                  {/* 검색 docs */}
                  {showDocsHere && (
                    <div className={`mx-2 mb-2 p-2 rounded border ${isFail ? 'border-red-400 bg-red-50' : 'border-emerald-300 bg-emerald-50'}`}>
                      <div className="flex items-center gap-1 mb-1">
                        <span className={`text-[8px] px-1 py-0.5 rounded font-bold uppercase text-white ${isFail ? 'bg-red-600' : 'bg-emerald-600'}`}>
                          {isFail ? '❌ retrieve (실패)' : '🔍 retrieve'}
                        </span>
                        <span className={`text-[8px] font-medium ${isFail ? 'text-red-700' : 'text-emerald-700'}`}>
                          {isFail ? '"그것" 그대로 검색 → 무관 문서' : `top-${t.docs.length}`}
                        </span>
                      </div>
                      <div className="space-y-0.5">
                        {isFail ? (
                          <>
                            <div className="text-[9px] font-mono leading-tight text-red-800 bg-white px-1.5 py-0.5 rounded border border-red-200">
                              <span className="font-bold">[0.42]</span> misc-091: "그것은 다양한 문맥에서 사용되며…"
                            </div>
                            <div className="text-[9px] font-mono leading-tight text-red-800 bg-white px-1.5 py-0.5 rounded border border-red-200">
                              <span className="font-bold">[0.39]</span> misc-118: "예시는 상황에 따라 달라질 수 있다…"
                            </div>
                            <div className="text-[8px] text-red-700 italic mt-1">→ 데코레이터 키워드 누락 → 답변 환각</div>
                          </>
                        ) : (
                          t.docs.map((d) => (
                            <div key={d.id} className="text-[9px] font-mono leading-tight text-emerald-900 bg-white px-1.5 py-0.5 rounded border border-emerald-200">
                              <span className="font-bold text-emerald-700">[{d.score.toFixed(2)}]</span>{' '}
                              <span className="text-slate-500">{d.id}:</span> {d.text}
                            </div>
                          ))
                        )}
                      </div>
                    </div>
                  )}

                  {/* AI 답변 */}
                  {showAiHere && !isFail && (
                    <div className="flex items-start gap-1.5 p-2 bg-white rounded-b-lg border-t border-slate-200">
                      <span className="w-5 h-5 bg-emerald-200 text-emerald-700 rounded-full flex items-center justify-center text-[9px] font-bold shrink-0">AI</span>
                      <div className="text-[10px] text-slate-700 leading-snug">{t.ai}</div>
                    </div>
                  )}

                  {/* 실패 케이스 — 환각 답 */}
                  {showAiHere && isFail && (
                    <div className="flex items-start gap-1.5 p-2 bg-red-50 rounded-b-lg border-t border-red-300">
                      <span className="w-5 h-5 bg-red-200 text-red-700 rounded-full flex items-center justify-center text-[9px] font-bold shrink-0">AI</span>
                      <div className="text-[10px] text-red-800 leading-snug italic">
                        ⚠ "그것"이 무엇을 가리키는지 알 수 없어 정확히 답변하기 어렵습니다… (환각)
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: Multi-turn 사이클 다이어그램
    //   condense → retrieve → answer → memory append 의 4 박스
    //   현재 step phase에 따라 활성 박스가 달라짐
    // ─────────────────────────────────────────────────────
    function CycleDiagram({ phase }) {
      const stages = [
        { key: 'condense', label: 'Condense', sub: 'history+Q → standalone', icon: '✏️' },
        { key: 'retrieve', label: 'Retrieve', sub: 'standalone → docs', icon: '🔍' },
        { key: 'answer', label: 'Answer', sub: 'docs+history+Q → A', icon: '💡' },
        { key: 'memory', label: 'Memory', sub: '(Q, A) → history', icon: '📒' },
      ];
      // phase별 활성 stage
      const activeMap = {
        'turn1': ['retrieve', 'answer'],
        'turn2-fail': ['retrieve'],
        'turn2-rephrase': ['condense'],
        'turn2-retrieve': ['retrieve', 'answer'],
        'accumulate': ['condense', 'retrieve', 'answer', 'memory'],
      };
      const active = activeMap[phase] || [];

      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">🔁</span>
            <span className="text-[11px] font-bold text-slate-700">Multi-turn RAG 사이클</span>
          </div>
          <div className="grid grid-cols-4 gap-1.5">
            {stages.map((s, i) => {
              const isActive = active.includes(s.key);
              return (
                <div key={s.key} className="flex flex-col items-center">
                  <div
                    className={`w-full rounded border-2 p-1.5 text-center transition-all duration-500 ${
                      isActive
                        ? 'bg-rose-100 border-rose-500 shadow-md scale-105'
                        : 'bg-slate-50 border-slate-200 opacity-50'
                    }`}
                  >
                    <div className="text-base">{s.icon}</div>
                    <div className={`text-[10px] font-bold ${isActive ? 'text-rose-700' : 'text-slate-500'}`}>
                      {s.label}
                    </div>
                    <div className={`text-[8px] font-mono leading-tight mt-0.5 ${isActive ? 'text-rose-600' : 'text-slate-400'}`}>
                      {s.sub}
                    </div>
                  </div>
                  {i < stages.length - 1 && (
                    <span className={`text-[10px] -mt-3 ${isActive && active.includes(stages[i + 1].key) ? 'text-rose-500' : 'text-slate-300'}`}>
                      →
                    </span>
                  )}
                </div>
              );
            })}
          </div>
          <div className="text-[9px] text-slate-500 mt-2 leading-snug">
            ConversationalRetrievalChain 이 4 단계를 자동 묶음. 핵심은 <span className="font-bold text-rose-700">Condense</span> 단계 — 후속 질문을 self-contained 로 풀어쓰는 것.
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 대화 turn 누적 / 하단: 사이클 다이어그램
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const turns = FULL_TURNS.slice(0, step.visibleTurns);
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">💬 사내 챗봇 — Multi-turn 대화 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <ConversationTurns
              turns={turns}
              activeTurn={step.activeTurn}
              showRewrite={step.showRewrite}
              showDocs={step.showDocs}
              showAi={step.showAi}
              failMode={step.failMode}
            />
            <CycleDiagram phase={step.phase} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-blue-400"></span>user
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>condense (재구성)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>retrieve (성공)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-red-500"></span>retrieve (실패)
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-emerald-200 border border-emerald-400"></span>AI
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Generation &amp; 프롬프트 &gt; Chapter 2. 고급 생성 패턴</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-2-1. Multi-turn RAG — 대화 이력과 검색 결합</h1>
                  <p className="text-sm text-slate-500 mt-0.5">"그것의 다른 예시는?" — 후속 질문을 standalone question으로 풀어쓰는 5단계</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: Multi-turn RAG = <strong>Condense</strong>(history+Q → standalone) + <strong>Retrieve</strong>(standalone → docs) + <strong>Answer</strong>(docs+history+Q → A) + <strong>Memory</strong>((Q,A) append). 다음(V-2-2)에서는 토큰 단위로 답을 흘려보내는 Streaming UX를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Multi-turn RAG', 'Standalone Question', 'Condense', 'Query Rephrase', 'ConversationalRetrievalChain', 'chat_history'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./V-1-3.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; V-1-3 Citation &amp; 출처 표시</a>
              <a href="./V-2-2.html" className="text-rose-700 hover:text-rose-900 font-medium">V-2-2 Streaming &amp; UX &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
