<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — V-2-1. Multi-turn RAG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CONVERSATION = [
      {
        user: "우리 회사 휴가 정책 알려줘",
        rewritten: null,
        context: "인사규정 3장: 연차 15일, 리프레시 3일, 생일 휴가 1일...",
        answer: "연차 15일, 리프레시 3일, 생일 휴가 1일이 제공됩니다.",
      },
      {
        user: "그럼 신청 방법은?",
        rewritten: "휴가 신청 방법은?",
        context: "인사규정 4장: HR 시스템에서 3일 전 신청, 팀장 승인 필요...",
        answer: "HR 시스템에서 최소 3일 전에 신청하고, 팀장 승인이 필요합니다.",
      },
      {
        user: "해외에서도 되나?",
        rewritten: "해외에서 휴가를 신청할 수 있는가?",
        context: "인사규정 4장 부칙: 해외 체류 시 VPN 접속 후 HR 시스템 이용 가능...",
        answer: "해외에서도 VPN 접속 후 HR 시스템으로 신청 가능합니다.",
      },
    ];

    const STEPS = [
      {
        desc: "Multi-turn RAG는 단골 손님과의 대화입니다. \"그럼\", \"거기서\", \"그것\"처럼 이전 대화를 참조하는 질문을 처리합니다. 핵심은 대명사를 원래 의미로 풀어쓰는 '쿼리 재작성'입니다.",
        phase: 'intro',
        activeConv: -1,
      },
      {
        desc: "1번째 대화: \"우리 회사 휴가 정책 알려줘\" — 첫 질문은 그대로 검색합니다. 맥락이 없으니 재작성이 필요 없습니다.",
        phase: 'turn1',
        activeConv: 0,
      },
      {
        desc: "2번째 대화: \"그럼 신청 방법은?\" — '그럼'이 뭘 가리키는지 LLM이 모릅니다. 대화 이력을 보고 \"휴가 신청 방법은?\"으로 재작성합니다.",
        phase: 'turn2',
        activeConv: 1,
        code: '# 쿼리 재작성 (Conversation-aware)\nprompt = """대화 이력을 참고하여, 후속 질문을 독립적인 질문으로 재작성하세요.\n\n대화 이력:\nUser: 우리 회사 휴가 정책 알려줘\nAI: 연차 15일, 리프레시 3일...\n\n후속 질문: 그럼 신청 방법은?\n\n재작성된 질문:"""\n\n# → "휴가 신청 방법은?"',
      },
      {
        desc: "3번째 대화: \"해외에서도 되나?\" — '해외에서도'와 '되나'가 이전 맥락에 의존합니다. \"해외에서 휴가를 신청할 수 있는가?\"로 재작성 후 검색합니다.",
        phase: 'turn3',
        activeConv: 2,
      },
      {
        desc: "쿼리 재작성의 핵심 — (1) 대명사 해소: '그것' → 구체적 명사 (2) 생략 복원: '되나?' → 전체 질문 (3) 맥락 보존: 대화 주제 유지. 이 과정 없이는 RAG가 엉뚱한 문서를 검색합니다.",
        phase: 'rewrite_detail',
        activeConv: -1,
      },
      {
        desc: "구현 전략 — (1) ConversationBufferMemory로 대화 이력 유지 (2) 매 턴마다 LLM으로 쿼리 재작성 (3) 재작성된 쿼리로 검색. 이력 길이가 길면 요약(ConversationSummaryMemory)을 사용합니다.",
        phase: 'implementation',
        activeConv: -1,
        code: 'from langchain.memory import ConversationBufferMemory\nfrom langchain.chains import ConversationalRetrievalChain\n\nmemory = ConversationBufferMemory(\n    memory_key="chat_history",\n    return_messages=True\n)\n\nchain = ConversationalRetrievalChain.from_llm(\n    llm=llm,\n    retriever=vectorstore.as_retriever(),\n    memory=memory,\n    # 내부적으로 쿼리 재작성 수행\n)',
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const visibleConvs = s.activeConv >= 0 ? CONVERSATION.slice(0, s.activeConv + 1) : CONVERSATION;

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-rose-700 hover:text-rose-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Generation & 프롬프트 &gt; Chapter 2. 고급 생성 패턴</div>
                  <h1 className="text-2xl font-bold text-slate-800">V-2-1. Multi-turn RAG — 대화 이어가기</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>단골 손님과의 대화</b> — "그럼 신청 방법은?"에서 '그럼'이 가리키는 것을 이해합니다. 핵심은 <b>쿼리 재작성</b>입니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-rose-700 border-rose-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">Multi-turn RAG 대화 흐름</h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-rose-600 uppercase tracking-wider mb-3">대화 흐름</div>
                <div className="space-y-3">
                  {(s.phase === 'intro' || s.phase === 'rewrite_detail' || s.phase === 'implementation' ? CONVERSATION : visibleConvs).map((conv, i) => {
                    const isActive = i === s.activeConv;
                    const showRewrite = conv.rewritten && (isActive || s.phase === 'rewrite_detail');
                    return (
                      <div key={i} className={`rounded-lg border transition-all duration-500 ${isActive ? 'border-rose-300 shadow-md' : 'border-slate-100'}`}>
                        {/* User message */}
                        <div className="flex items-start gap-2 p-3 bg-blue-50 rounded-t-lg">
                          <span className="w-6 h-6 bg-blue-200 text-blue-700 rounded-full flex items-center justify-center text-[10px] font-bold shrink-0">U</span>
                          <div className="text-xs text-blue-800">{conv.user}</div>
                        </div>
                        {/* Rewritten query */}
                        {showRewrite && (
                          <div className="flex items-center gap-2 px-3 py-2 bg-rose-50 border-y border-rose-200">
                            <span className="text-[10px] font-bold text-rose-600 uppercase">재작성</span>
                            <span className="text-xs text-rose-800 font-mono">{conv.rewritten}</span>
                          </div>
                        )}
                        {/* AI answer */}
                        <div className="flex items-start gap-2 p-3 bg-slate-50 rounded-b-lg">
                          <span className="w-6 h-6 bg-emerald-200 text-emerald-700 rounded-full flex items-center justify-center text-[10px] font-bold shrink-0">AI</span>
                          <div className="text-xs text-slate-700">{conv.answer}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {s.phase === 'rewrite_detail' && (
                  <div className="mt-4 p-3 rounded-lg bg-rose-50 border border-rose-200">
                    <div className="text-xs font-bold text-rose-700 mb-2">쿼리 재작성 규칙</div>
                    <div className="space-y-1 text-[10px] text-rose-600">
                      <div>1. 대명사 해소: "그것" → "연차 휴가"</div>
                      <div>2. 생략 복원: "되나?" → "신청할 수 있는가?"</div>
                      <div>3. 맥락 보존: 대화 주제 유지</div>
                    </div>
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.code ? (
                  <>
                    <div className="text-xs font-bold text-rose-600 uppercase tracking-wider mb-3">코드</div>
                    <pre className="bg-slate-900 text-green-300 p-4 rounded-lg text-xs leading-relaxed overflow-x-auto whitespace-pre-wrap">{s.code}</pre>
                  </>
                ) : (
                  <div className="space-y-4">
                    <div className="text-xs font-bold text-rose-600 uppercase tracking-wider mb-3">Multi-turn RAG 핵심</div>
                    {s.activeConv >= 0 && (
                      <div className="p-3 rounded-lg bg-blue-50 border border-blue-200">
                        <div className="text-[10px] font-bold text-blue-600 uppercase mb-1">검색에 사용된 쿼리</div>
                        <div className="text-xs text-blue-800 font-mono">
                          {CONVERSATION[s.activeConv].rewritten || CONVERSATION[s.activeConv].user}
                        </div>
                      </div>
                    )}
                    {s.activeConv >= 0 && (
                      <div className="p-3 rounded-lg bg-emerald-50 border border-emerald-200">
                        <div className="text-[10px] font-bold text-emerald-600 uppercase mb-1">검색된 문서</div>
                        <div className="text-xs text-emerald-700">{CONVERSATION[s.activeConv].context}</div>
                      </div>
                    )}
                    <div className="p-4 rounded-lg bg-rose-50 border border-rose-200">
                      <div className="font-bold text-sm text-rose-800 mb-2">Multi-turn에서 주의할 점</div>
                      <ul className="text-xs text-rose-700 space-y-1">
                        <li>- 대화가 길어지면 메모리 관리 필요</li>
                        <li>- 주제 전환 감지 (새 주제면 이력 리셋)</li>
                        <li>- 재작성 품질이 검색 품질을 결정</li>
                      </ul>
                    </div>
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">메모리 전략</div>
                      <div className="space-y-1 text-xs text-slate-600">
                        <div>BufferMemory: 최근 N턴 유지 (단순)</div>
                        <div>SummaryMemory: 대화 요약 (긴 대화)</div>
                        <div>WindowMemory: 슬라이딩 윈도우 (절충)</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Multi-turn', 'Query Rewriting', 'Conversation Memory', 'Coreference Resolution', 'Chat History'].map(kw => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-sm font-medium border border-rose-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-rose-600 hover:bg-rose-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./V-1-3.html" className="text-rose-600 hover:text-rose-800 font-medium">&larr; V-1-3. Citation & 출처 표시</a>
              <a href="./V-2-2.html" className="text-rose-600 hover:text-rose-800 font-medium">V-2-2. Streaming & UX &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
