<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — V-1-2. RAG 프롬프트 설계</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const RULES = [
      { id: 'grounded', label: '자료 기반만 답변', desc: '제공된 참고 자료에 있는 정보만 사용하여 답변하세요.', enabled: true },
      { id: 'admit', label: '모르면 "없다"', desc: '참고 자료에 답이 없으면 "제공된 자료에 해당 정보가 없습니다"라고 답하세요.', enabled: true },
      { id: 'cite', label: '출처 표시', desc: '답변 시 사용한 참고 자료의 출처를 [문서명]으로 표기하세요.', enabled: true },
    ];

    const ANSWERS = {
      '000': { quality: 'bad', text: '일반적으로 연차 휴가는 15일입니다. 회사마다 다르지만 대부분 비슷합니다.', problem: '할루시네이션 + 자료 미참조 + 출처 없음' },
      '100': { quality: 'mid', text: '인사규정에 따르면 연차 15일 + 리프레시 3일입니다.', problem: '자료 기반이지만 출처 미표기, 모를 때 대처 없음' },
      '110': { quality: 'mid', text: '인사규정에 따르면 연차 15일 + 리프레시 3일입니다. 세부 신청 절차는 제공된 자료에 없습니다.', problem: '출처가 아직 없음' },
      '111': { quality: 'good', text: '인사규정에 따르면 연차 15일 + 리프레시 3일입니다 [인사규정 3장 2절]. 세부 신청 절차는 제공된 자료에 해당 정보가 없습니다.', problem: '모든 규칙 적용!' },
      '010': { quality: 'bad', text: '제공된 자료에 해당 정보가 없습니다.', problem: '자료에 있는데도 못 찾음 (과도한 보수)' },
      '001': { quality: 'bad', text: '연차는 보통 15일쯤 됩니다 [없는 문서]. 리프레시 휴가는 5일입니다 [추측].', problem: '거짓 출처, 잘못된 정보' },
      '011': { quality: 'mid', text: '제공된 자료에 해당 정보가 없습니다.', problem: '있는 정보도 못 찾는 문제' },
      '101': { quality: 'mid', text: '인사규정에 따르면 연차 15일 + 리프레시 3일입니다 [인사규정 3장 2절].', problem: '모를 때 대처가 없어서 할루시네이션 위험' },
    };

    const STEPS = [
      {
        desc: "RAG 프롬프트는 오픈북 시험의 답안 작성 규칙입니다. 규칙 없이는 LLM이 자료를 무시하고 아는 대로 답합니다. 3대 규칙을 하나씩 켜보며 답변 품질 변화를 확인합니다.",
        phase: 'intro',
        rules: [false, false, false],
      },
      {
        desc: "규칙 없음 — 모든 규칙이 꺼진 상태. LLM은 자기가 아는 일반론으로 답합니다. 우리 회사만의 특별 규정(리프레시 3일)을 모르고, 출처도 없습니다.",
        phase: 'no_rules',
        rules: [false, false, false],
      },
      {
        desc: "규칙 1: 자료 기반만 답변 — 이 규칙 하나만으로도 답변이 크게 개선됩니다. 하지만 자료에 없는 내용을 물으면 여전히 지어낼 수 있고, 출처가 없습니다.",
        phase: 'rule1',
        rules: [true, false, false],
      },
      {
        desc: "규칙 1+2: 모르면 인정 — \"제공된 자료에 없습니다\"라고 솔직하게 답합니다. 할루시네이션 방지의 핵심 규칙입니다. 하지만 아직 어디서 가져온 정보인지 모릅니다.",
        phase: 'rule12',
        rules: [true, true, false],
      },
      {
        desc: "규칙 1+2+3: 출처 표시 — 모든 규칙이 켜진 최적 상태. 답변에 [인사규정 3장 2절] 같은 출처가 표시되어 신뢰도가 높아지고, 검증이 가능해집니다.",
        phase: 'all_rules',
        rules: [true, true, true],
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const answerKey = s.rules.map(r => r ? '1' : '0').join('');
      const answer = ANSWERS[answerKey];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-rose-700 hover:text-rose-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Generation & 프롬프트 &gt; Chapter 1. 프롬프트 전략</div>
                  <h1 className="text-2xl font-bold text-slate-800">V-1-2. RAG 프롬프트 설계 — 답안 작성 규칙</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>오픈북 시험 답안 작성 규칙</b>. 3대 규칙: (1) 자료 기반만 (2) 모르면 인정 (3) 출처 표시. 규칙을 켜고 끄며 품질 변화를 확인합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-rose-700 border-rose-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">RAG 프롬프트 3대 규칙</h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="space-y-4">
                {/* 규칙 토글 */}
                <div className="bg-white rounded-xl border border-slate-200 p-4">
                  <div className="text-xs font-bold text-rose-600 uppercase tracking-wider mb-3">프롬프트 규칙 빌더</div>
                  <div className="space-y-2">
                    {RULES.map((rule, i) => (
                      <div key={rule.id} className={`flex items-center gap-3 p-3 rounded-lg border-2 transition-all duration-500 ${
                        s.rules[i] ? 'bg-rose-50 border-rose-300 shadow' : 'bg-slate-50 border-slate-100'
                      }`}>
                        <div className={`w-10 h-6 rounded-full transition-all duration-300 flex items-center ${
                          s.rules[i] ? 'bg-rose-500 justify-end' : 'bg-slate-300 justify-start'
                        }`}>
                          <div className="w-5 h-5 bg-white rounded-full shadow mx-0.5" />
                        </div>
                        <div className="flex-1">
                          <div className="text-xs font-bold text-slate-700">{rule.label}</div>
                          <div className="text-[10px] text-slate-500">{rule.desc}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* 생성된 프롬프트 */}
                <div className="bg-white rounded-xl border border-slate-200 p-4">
                  <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">생성된 프롬프트</div>
                  <pre className="bg-slate-900 text-green-300 p-3 rounded-lg text-[10px] leading-relaxed whitespace-pre-wrap">{
`당신은 사내 Q&A 도우미입니다.
${s.rules[0] ? '\n[규칙 1] 제공된 참고 자료의 정보만 사용하세요.' : ''}${s.rules[1] ? '\n[규칙 2] 자료에 없으면 "해당 정보가 없습니다"라고 답하세요.' : ''}${s.rules[2] ? '\n[규칙 3] 답변에 출처를 [문서명]으로 표기하세요.' : ''}

[참고 자료]
- 인사규정 3장 2절: 연차 15일, 리프레시 3일...

[질문] 우리 회사 연차 휴가 정책을 알려줘`
                  }</pre>
                </div>
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-rose-600 uppercase tracking-wider mb-3">답변 결과</div>
                <div className="mb-3 p-2 rounded bg-blue-50 border border-blue-200">
                  <div className="text-[10px] font-bold text-blue-600">질문</div>
                  <div className="text-xs text-blue-800">우리 회사 연차 휴가 정책을 알려줘</div>
                </div>
                <div className={`p-4 rounded-lg border-2 mb-3 ${
                  answer.quality === 'good' ? 'bg-emerald-50 border-emerald-300' :
                  answer.quality === 'mid' ? 'bg-amber-50 border-amber-300' :
                  'bg-red-50 border-red-300'
                }`}>
                  <div className="flex items-center gap-2 mb-2">
                    <span className={`text-xs font-bold px-2 py-0.5 rounded ${
                      answer.quality === 'good' ? 'bg-emerald-200 text-emerald-800' :
                      answer.quality === 'mid' ? 'bg-amber-200 text-amber-800' :
                      'bg-red-200 text-red-800'
                    }`}>
                      {answer.quality === 'good' ? 'GOOD' : answer.quality === 'mid' ? 'OK' : 'BAD'}
                    </span>
                  </div>
                  <div className="text-sm text-slate-700 leading-relaxed">{answer.text}</div>
                </div>
                <div className={`p-2 rounded text-xs ${
                  answer.quality === 'good' ? 'bg-emerald-50 text-emerald-700' :
                  answer.quality === 'mid' ? 'bg-amber-50 text-amber-700' :
                  'bg-red-50 text-red-700'
                }`}>
                  {answer.problem}
                </div>

                {s.phase === 'all_rules' && (
                  <div className="mt-4 p-3 rounded-lg bg-rose-50 border border-rose-200">
                    <div className="text-xs font-bold text-rose-700 mb-1">프롬프트 템플릿 (실전용)</div>
                    <pre className="text-[10px] text-rose-600 whitespace-pre-wrap">{
`system_prompt = """
당신은 {company}의 Q&A 도우미입니다.

규칙:
1. 아래 참고 자료의 정보만 사용하세요
2. 자료에 없으면 "해당 정보가 없습니다"
3. 답변에 [출처]를 표기하세요

{context}
"""`
                    }</pre>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Prompt Engineering', 'Grounding', 'Citation', 'Hallucination 방지', 'System Prompt'].map(kw => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-sm font-medium border border-rose-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-rose-600 hover:bg-rose-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./V-1-1.html" className="text-rose-600 hover:text-rose-800 font-medium">&larr; V-1-1. Context Stuffing</a>
              <a href="./V-1-3.html" className="text-rose-600 hover:text-rose-800 font-medium">V-1-3. Citation & 출처 표시 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
