<body>
  <div id="root"></div>

  <!--
    V-1-1. Context Stuffing — 검색된 chunk를 prompt context에 주입
    학습 목표: top-k 결과를 prompt에 어떻게 채워넣는지(stuffing)
              5단계로 보면서 토큰 한계 / Lost in the Middle / 우선순위 정렬 /
              Map-Reduce 패턴까지 단계적으로 이해한다.
    핵심 비유: 시험 답안지 작성 — 참고 자료를 어떻게 펼쳐놓는가
    패턴: fastapi v1 — 좌(LiveDataPane: chunk → prompt 박스 → LLM, 토큰 막대) / 우(VSCode CodeViewer)
    색상: rag rose
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 검색된 8개 chunk — 사용자 질문: "연차 휴가 며칠 쓸 수 있나요?"
    //   각 chunk는 score(유사도)와 importance(실제 정답 기여도)를 가진다.
    //   유사도는 높지만 실제 답이 안 들어있는 노이즈도 섞인다 (현실적 RAG).
    // ─────────────────────────────────────────────────────
    const FULL_CHUNKS = [
      { id: 'C1', title: '인사규정 3장 1조 — 연차 일수',  text: '근속 1년 이상 직원은 연 15일 연차 부여',  score: 0.94, importance: 'critical', tokens: 280 },
      { id: 'C2', title: '인사규정 3장 2조 — 연차 사용',  text: '연차는 본인 신청일 기준 7일 전 결재 필수', score: 0.88, importance: 'critical', tokens: 260 },
      { id: 'C3', title: '복리후생 안내 — 휴양 시설',     text: '연차 사용 시 회사 휴양소 예약 가능',      score: 0.81, importance: 'mid',      tokens: 240 },
      { id: 'C4', title: '취업규칙 — 근무 시간',          text: '주 40시간, 시차 출퇴근제 운영',          score: 0.72, importance: 'low',      tokens: 220 },
      { id: 'C5', title: '급여 체계 — 연봉 산정',         text: '연봉은 기본급 + 성과급으로 구성',         score: 0.68, importance: 'low',      tokens: 250 },
      { id: 'C6', title: '인사규정 4장 — 휴직',           text: '병가, 출산휴가, 육아휴직은 별도 신청',    score: 0.65, importance: 'mid',      tokens: 230 },
      { id: 'C7', title: '연차 사용 FAQ — 부서별 한도',   text: '부서장 승인 하 최대 5일 연속 사용 가능',  score: 0.61, importance: 'critical', tokens: 270 },
      { id: 'C8', title: '경조사 휴가 안내',              text: '결혼·상조시 별도 유급 휴가 부여',        score: 0.55, importance: 'low',      tokens: 210 },
    ];

    const TOKEN_LIMIT = 1000; // LLM context window (시각화용 — 실제로는 4k/8k/128k)
    const PROMPT_OVERHEAD = 120; // 시스템 프롬프트 + 질문 등 고정 토큰

    // Lost in the Middle 주목도(attention) U자 곡선 — 5 위치 기준
    const ATTENTION_CURVE = [
      { pos: '시작',  score: 92 },
      { pos: '1/4',  score: 74 },
      { pos: '중간',  score: 38 },
      { pos: '3/4',  score: 60 },
      { pos: '끝',    score: 88 },
    ];

    // ─────────────────────────────────────────────────────
    // STEPS — 5단계 시나리오
    //   각 step은 좌측 LiveDataPane이 읽는 dataState와 우측 코드 탭을 가진다.
    //
    //   phase  : 'naive' | 'overflow' | 'lost' | 'priority' | 'mapreduce'
    //   chunks : 사용된 chunk 배열 (순서 = prompt 주입 순서)
    //            각 chunk에 state 필드 추가 — 'in' | 'overflow' | 'low-attn' | 'high-attn'
    //   prompt : 프롬프트 박스 표시용 메타 (used/total/overflow)
    //   answer : LLM 응답 시뮬레이션 — { text, ok }
    //   showAttention : 우측 lower 영역에 attention 곡선 그릴지
    //   showMapReduce : map-reduce 다이어그램
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Naive Stuffing — top-k chunks를 그대로 주입',
        desc: '가장 단순한 방식. retriever가 뽑은 top-3 chunk를 score 순으로 prompt에 그대로 이어붙인다. 짧은 자료에서는 잘 동작한다 — "연차 며칠?" 질문에 정답 chunk(C1, C2)가 prompt에 들어가니 LLM이 "15일"이라고 정확히 답한다. RAG의 출발점.',
        phase: 'naive',
        chunks: FULL_CHUNKS.slice(0, 3).map((c, i) => ({ ...c, position: i, state: 'in' })),
        prompt: { used: 280 + 260 + 240 + PROMPT_OVERHEAD, total: TOKEN_LIMIT, overflow: 0 },
        answer: { ok: true, text: '근속 1년 이상은 연 15일 연차를 사용할 수 있습니다. 사용일 7일 전 결재가 필요합니다.' },
        showAttention: false,
        showMapReduce: false,
        code: {
          lang: 'python',
          filename: 'naive-stuff.py',
          lines: [
            '# Step 1. Naive Context Stuffing — top-k 그대로 prompt 에 채움',
            'from langchain_openai import ChatOpenAI',
            'from langchain_community.vectorstores import FAISS',
            '',
            'llm = ChatOpenAI(model="gpt-4o-mini")',
            'retriever = vectorstore.as_retriever(search_kwargs={"k": 3})',
            '',
            '# 1) 질의로 top-3 chunk 회수',
            'question = "연차 휴가 며칠 쓸 수 있나요?"',
            'docs = retriever.invoke(question)',
            '#  → [C1 (0.94), C2 (0.88), C3 (0.81)]',
            '',
            '# 2) 단순 join — score 순 그대로',
            'context = "\\n\\n".join(d.page_content for d in docs)',
            '',
            '# 3) prompt 에 그대로 stuffing',
            'prompt = f"""다음 자료를 참고해 답하시오.',
            '',
            '{context}',
            '',
            '질문: {question}',
            '답변:"""',
            '',
            'answer = llm.invoke(prompt).content',
            '#  → "근속 1년 이상은 연 15일..." ✓',
            '',
            '# ✨ 3 chunk × ~250 토큰 + 시스템 = 약 900 tok',
            '#    1k 윈도우 안 — 잘 동작',
            '# ⚠ 다만 chunk 수가 늘면 곧 한계에 부딪힌다 (Step 2)',
          ],
          highlight: [1, 2, 5, 6, 9, 10, 13, 16, 17, 18, 19, 20, 21, 22],
        },
      },
      {
        title: 'Step 2. Token Overflow — 너무 많이 넣으면 폭발',
        desc: '욕심이 나서 top-8 chunk를 모두 prompt에 넣으면? 토큰 합이 LLM 컨텍스트 윈도우(여기 1k)를 넘어 overflow가 발생한다. C7·C8은 잘려나가거나 API 호출 자체가 거부된다. 정답이 들어있던 chunk가 잘리면 답변 품질이 무너진다. RAG 운영의 첫 함정.',
        phase: 'overflow',
        chunks: FULL_CHUNKS.map((c, i) => {
          // 누적 토큰을 계산해 1000 - overhead = 880 을 넘는 시점부터 overflow
          const cum = FULL_CHUNKS.slice(0, i + 1).reduce((s, x) => s + x.tokens, 0);
          return { ...c, position: i, state: cum + PROMPT_OVERHEAD <= TOKEN_LIMIT ? 'in' : 'overflow' };
        }),
        prompt: {
          used: FULL_CHUNKS.reduce((s, c) => s + c.tokens, 0) + PROMPT_OVERHEAD,
          total: TOKEN_LIMIT,
          overflow: FULL_CHUNKS.reduce((s, c) => s + c.tokens, 0) + PROMPT_OVERHEAD - TOKEN_LIMIT,
        },
        answer: {
          ok: false,
          text: 'context_length_exceeded — 입력 토큰이 모델 한계를 초과했습니다. (또는 뒷 chunk 잘림)',
        },
        showAttention: false,
        showMapReduce: false,
        code: {
          lang: 'python',
          filename: 'overflow.py',
          lines: [
            '# Step 2. Token Overflow — k 를 늘리면 윈도우 초과',
            'from langchain_openai import ChatOpenAI',
            '',
            'retriever = vectorstore.as_retriever(',
            '    search_kwargs={"k": 8},   # ← 8개로 늘림',
            ')',
            '',
            'docs = retriever.invoke("연차 휴가 며칠?")',
            '# 8 chunk × 평균 245 토큰 = ~1960 토큰',
            '# + 시스템 프롬프트 120 = 약 2080 토큰',
            '#   ↑ 1k 컨텍스트 윈도우 초과 → 1080 토큰 overflow!',
            '',
            'context = "\\n\\n".join(d.page_content for d in docs)',
            'prompt = f"...{context}..."',
            '',
            'answer = llm.invoke(prompt)',
            '#  ❌ openai.BadRequestError:',
            '#       This model\'s maximum context length is 1000 tokens,',
            '#       however you requested 2080 tokens.',
            '#',
            '#  또는 일부 retriever 가 자동 truncate 하면',
            '#  뒤쪽 chunk(C7, C8)가 통째로 잘려서',
            '#  정답에 필요한 정보가 사라진다.',
            '',
            '# ─── 해결 방향 ───',
            '#  (a) k 를 줄인다 (3~5)',
            '#  (b) chunk 길이를 줄인다 (chunk_size 작게)',
            '#  (c) Compression / Re-ranking (V-1-2)',
            '#  (d) Map-Reduce / Refine 패턴 (Step 5)',
            '',
            '# ⚠ overflow 는 운영 단계에서 가장 흔한 실패 모드',
          ],
          highlight: [1, 4, 5, 7, 8, 9, 10, 14, 16, 17, 18, 19, 22, 23, 25, 26, 27, 28, 29],
        },
      },
      {
        title: 'Step 3. Lost in the Middle — 중간 chunk는 무시된다',
        desc: '토큰을 줄여도 또 다른 함정이 있다. Liu et al. 2023 연구에 따르면 LLM은 prompt의 시작과 끝은 잘 보지만 중간은 놓친다(U자 attention). 5 chunk를 score 순으로 넣었을 때 정답이 들어있는 가운데 chunk(C2)가 가장 무시된다. 답변에서 핵심 정보가 빠지는 결과.',
        phase: 'lost',
        chunks: FULL_CHUNKS.slice(0, 5).map((c, i) => {
          // attention level — i==0 high, i==1 mid, i==2 low (lost), i==3 mid, i==4 high
          const attn = [92, 74, 38, 60, 88][i];
          return {
            ...c,
            position: i,
            state: attn >= 80 ? 'high-attn' : attn >= 55 ? 'mid-attn' : 'low-attn',
            attention: attn,
          };
        }),
        prompt: {
          used: FULL_CHUNKS.slice(0, 5).reduce((s, c) => s + c.tokens, 0) + PROMPT_OVERHEAD,
          total: TOKEN_LIMIT,
          overflow: 0,
        },
        answer: {
          ok: false,
          text: '연차는 회사 정책에 따라 다릅니다. (← 핵심 "15일" 누락 — 가운데 C2/C3가 무시됨)',
        },
        showAttention: true,
        showMapReduce: false,
        code: {
          lang: 'python',
          filename: 'lost-middle.py',
          lines: [
            '# Step 3. Lost in the Middle — 중간에 묻힌 정답',
            '# 참고: Liu et al. 2023 "Lost in the Middle: How LMs Use Long Contexts"',
            '',
            '# 같은 retriever, k=5',
            'docs = retriever.invoke("연차 휴가 며칠?")',
            '#  → [C1, C2, C3, C4, C5]   (score 내림차순)',
            '',
            '# 단순 join — score 순 그대로 stuffing',
            'context = "\\n\\n".join(d.page_content for d in docs)',
            '#  prompt 안 위치별 LLM 주목도(실험치):',
            '#    [위치 1 — 시작]   92% ← C1',
            '#    [위치 2]         74% ← C2',
            '#    [위치 3 — 중간]  38% ← C3  (정답 단서 있음, 무시됨)',
            '#    [위치 4]         60% ← C4',
            '#    [위치 5 — 끝]    88% ← C5',
            '',
            'answer = llm.invoke(prompt).content',
            '#  ❌ "회사 정책에 따라 다릅니다"',
            '#     C2(연 15일) 가 가운데 묻혀서 LLM 이 못 봄',
            '',
            '# ─── 핵심 인사이트 ───',
            '#  토큰이 윈도우 안에 들어가도',
            '#  위치(position)가 답변 품질을 좌우한다.',
            '#  특히 chunk 가 5개 이상이면 가운데가 위험.',
            '',
            '# 해결: 위치를 의도적으로 재배치 (Step 4)',
          ],
          highlight: [1, 2, 5, 8, 9, 10, 11, 12, 13, 14, 17, 18, 19, 22, 23, 24, 26],
        },
      },
      {
        title: 'Step 4. Priority Sort — 핵심을 처음과 끝에',
        desc: 'Lost in the Middle 해법: 중요도가 높은 chunk를 의도적으로 prompt 앞·뒤에 배치한다. C1·C2·C7(critical)을 시작/끝에 놓고, C3·C5(low)를 가운데로 보낸다. 정답이 high-attention 영역에 들어가서 LLM이 정확히 "15일"을 답한다. 같은 chunk, 다른 순서, 다른 결과.',
        phase: 'priority',
        // Reordered: critical 을 0, 4 / mid 를 1, 3 / low 를 가운데(2)
        chunks: (() => {
          // 사용할 5개: C1(crit), C2(crit), C3(mid), C5(low), C7(crit)
          const picked = [FULL_CHUNKS[0], FULL_CHUNKS[1], FULL_CHUNKS[2], FULL_CHUNKS[4], FULL_CHUNKS[6]];
          // priority 정렬: critical → 양 끝, mid → 1, 3, low → 2
          // 결과 순서: C1(crit), C3(mid), C5(low), C2(crit), C7(crit)
          // 더 명확하게: [C1, C2(mid 위치 변경), low, C7, C2 끝] — 시각화 친화적으로
          // 최종: [C1, C3, C5, C2, C7]  (C1 시작, C7 끝, low C5 가운데)
          const order = [
            { ...picked[0], state: 'high-attn', attention: 92 },     // C1 시작
            { ...picked[2], state: 'mid-attn',  attention: 74 },     // C3 mid
            { ...picked[3], state: 'low-attn',  attention: 38 },     // C5 가운데(low importance)
            { ...picked[1], state: 'mid-attn',  attention: 60 },     // C2 critical 이지만 한쪽에 보강
            { ...picked[4], state: 'high-attn', attention: 88 },     // C7 끝 critical
          ];
          return order.map((c, i) => ({ ...c, position: i }));
        })(),
        prompt: {
          used: (FULL_CHUNKS[0].tokens + FULL_CHUNKS[1].tokens + FULL_CHUNKS[2].tokens + FULL_CHUNKS[4].tokens + FULL_CHUNKS[6].tokens) + PROMPT_OVERHEAD,
          total: TOKEN_LIMIT,
          overflow: 0,
        },
        answer: {
          ok: true,
          text: '근속 1년 이상은 연 15일 연차이며, 부서장 승인 하 최대 5일 연속 사용 가능합니다.',
        },
        showAttention: true,
        showMapReduce: false,
        code: {
          lang: 'python',
          filename: 'priority-sort.py',
          lines: [
            '# Step 4. Priority Sort — 중요한 chunk를 양 끝에 배치',
            '# 전략: U자 attention 에 맞춰 critical chunk 를 0, -1 위치로',
            '',
            'docs = retriever.invoke("연차 휴가 며칠?")',
            '# docs = [C1(crit), C2(crit), C3(mid), C5(low), C7(crit)]',
            '#         score 순 그대로면 C2 가 가운데 → 무시됨',
            '',
            '# 1) re-ranker / heuristic 으로 importance 점수 매김',
            'def importance_score(doc):',
            '    # 실무: re-ranker(BGE/Cohere)가 낸 score 또는',
            '    #       LLM-as-judge / metadata 기반 가중치',
            '    return doc.metadata.get("rerank_score", 0)',
            '',
            'ranked = sorted(docs, key=importance_score, reverse=True)',
            '#  → [C1, C2, C7, C3, C5]   (importance 내림차순)',
            '',
            '# 2) U자 배치: 양 끝에 critical, 가운데에 noise',
            'def u_shape_arrange(items):',
            '    head, tail = [], []',
            '    for i, x in enumerate(items):',
            '        (head if i % 2 == 0 else tail).append(x)',
            '    return head + tail[::-1]',
            '',
            'arranged = u_shape_arrange(ranked)',
            '#  → [C1, C7, C5, C3, C2]   (critical = 0, -1 위치)',
            '',
            '# 3) 같은 chunk, 다른 순서로 prompt 구성',
            'context = "\\n\\n".join(d.page_content for d in arranged)',
            '',
            'answer = llm.invoke(prompt).content',
            '#  ✓ "근속 1년 이상은 연 15일, 최대 5일 연속 가능"',
            '#    critical chunk 가 high-attention 위치에 들어와 정답!',
            '',
            '# 💡 이 패턴은 LangChain 의 long_context_reorder 로도 제공',
            '#    from langchain_community.document_transformers',
            '#         import LongContextReorder',
          ],
          highlight: [1, 2, 4, 8, 9, 10, 11, 12, 14, 15, 18, 19, 20, 21, 22, 23, 25, 26, 30, 31, 32],
        },
      },
      {
        title: 'Step 5. Map-Reduce / Refine — 한 prompt에 다 못 넣을 때',
        desc: 'chunk가 50개라면 stuffing은 불가능하다. Map-Reduce는 각 chunk마다 LLM을 1번씩 돌려 부분 답을 만들고(map), 그 부분 답들을 합쳐 최종 답을 만든다(reduce). Refine은 답을 chunk마다 점진적으로 갱신한다. 토큰 한계를 우회하지만 LLM 호출 횟수가 늘어나 비용·지연 ↑.',
        phase: 'mapreduce',
        chunks: FULL_CHUNKS.map((c, i) => ({ ...c, position: i, state: 'mapreduce' })),
        prompt: { used: 0, total: TOKEN_LIMIT, overflow: 0 },
        answer: {
          ok: true,
          text: '연 15일 연차 (1년+ 근속), 7일 전 결재, 부서장 승인 하 최대 5일 연속 사용. — 8 chunk 모두 반영',
        },
        showAttention: false,
        showMapReduce: true,
        code: {
          lang: 'python',
          filename: 'mapreduce.py',
          lines: [
            '# Step 5. Map-Reduce / Refine — 토큰 한계 우회 패턴',
            'from langchain.chains.combine_documents import (',
            '    create_stuff_documents_chain,',
            '    create_map_reduce_documents_chain,  # 개념 — 실제 API는 LCEL',
            ')',
            '',
            '# ─── (A) Map-Reduce ───────────────────────────',
            '# 1) MAP   : 각 chunk 에 대해 부분 답 생성',
            '#            chunk 별로 LLM 1회 호출 (병렬화 가능)',
            '# 2) REDUCE: 부분 답들을 모아 한 번 더 LLM 호출 → 최종 답',
            '',
            'map_prompt = """다음 chunk 만 보고 질문에 부분 답을 작성하시오.',
            '{chunk}',
            '질문: {question}"""',
            '',
            'reduce_prompt = """아래는 여러 부분 답이다.',
            '이를 종합해 최종 답을 작성하시오.',
            '{partial_answers}',
            '질문: {question}"""',
            '',
            '# 2) 8 chunk 각각 map → 8 partial answer',
            'partials = [llm.invoke(map_prompt.format(chunk=c, question=q))',
            '            for c in chunks]',
            '#  → ["연 15일", "7일전 결재", "휴양소 가능", ...,',
            '#     "5일 연속 가능", "경조사 별도"]',
            '',
            '# 3) reduce — partial 들을 한 prompt에 모아 종합',
            'final = llm.invoke(reduce_prompt.format(',
            '    partial_answers="\\n".join(partials),',
            '    question=q,',
            '))',
            '#  ✓ "연 15일 연차, 7일 전 결재, 최대 5일 연속..."',
            '',
            '# ─── (B) Refine ────────────────────────────────',
            '# chunk 를 순회하며 답을 누적적으로 갱신',
            'answer = ""',
            'for c in chunks:',
            '    answer = llm.invoke(f"기존 답: {answer}\\n신규 자료: {c}\\n갱신 답:")',
            '# → 마지막 답이 모든 chunk 를 반영',
            '',
            '# 💰 트레이드오프',
            '#   장점: 토큰 윈도우 무관, chunk 수에 사실상 제한 없음',
            '#   단점: LLM 호출 N+1 회 → 비용·지연 N 배',
            '#   적합: 긴 보고서 요약 / 대량 문서 QA / 법률 검토',
          ],
          highlight: [1, 2, 3, 4, 7, 8, 9, 10, 12, 13, 14, 16, 17, 18, 19, 22, 23, 28, 29, 30, 31, 34, 35, 36, 37, 41, 42, 43],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // ChunkList — 좌측 위 chunk 시각화
    //   각 chunk를 prompt 안 위치 순서대로 표시.
    //   state 별 시각 차이:
    //     'in'         : rose 채움 (정상 주입)
    //     'overflow'   : 빨강 점선 + line-through (잘림)
    //     'high-attn'  : rose-600 굵은 테두리 + 90+ 라벨
    //     'mid-attn'   : rose-300
    //     'low-attn'   : 회색 + 흐림 (Lost in the Middle)
    //     'mapreduce'  : 보라 (개별 LLM 호출 표시)
    // ─────────────────────────────────────────────────────
    function ChunkList({ chunks, phase }) {
      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📦</span>
              <span className="text-[11px] font-bold text-rose-800">검색된 chunks → prompt 주입 순서</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">
              {chunks.length} chunks
            </span>
          </div>
          <div className="space-y-1.5">
            {chunks.map((c) => {
              let frame = 'bg-rose-50 border-rose-300';
              let scoreClass = 'bg-rose-100 text-rose-700';
              let badge = null;
              let extra = null;
              if (c.state === 'overflow') {
                frame = 'bg-red-50 border-red-400 border-dashed opacity-50';
                scoreClass = 'bg-red-200 text-red-800 line-through';
                badge = <span className="text-[8px] bg-red-600 text-white px-1 rounded font-bold">OVERFLOW</span>;
              } else if (c.state === 'high-attn') {
                frame = 'bg-rose-100 border-rose-600 border-2 shadow-sm';
                scoreClass = 'bg-rose-600 text-white';
                badge = <span className="text-[8px] bg-rose-600 text-white px-1 rounded font-bold">HIGH ATTN {c.attention}%</span>;
              } else if (c.state === 'mid-attn') {
                frame = 'bg-rose-50 border-rose-300';
                badge = <span className="text-[8px] bg-rose-400 text-white px-1 rounded font-bold">attn {c.attention}%</span>;
              } else if (c.state === 'low-attn') {
                frame = 'bg-slate-100 border-slate-300 opacity-60';
                scoreClass = 'bg-slate-300 text-slate-600';
                badge = <span className="text-[8px] bg-slate-500 text-white px-1 rounded font-bold animate-pulse">LOST {c.attention}%</span>;
              } else if (c.state === 'mapreduce') {
                frame = 'bg-purple-50 border-purple-300';
                scoreClass = 'bg-purple-200 text-purple-800';
                badge = <span className="text-[8px] bg-purple-600 text-white px-1 rounded font-bold">MAP→llm</span>;
                extra = (
                  <span className="text-[8px] text-purple-700 font-mono ml-1">→ partial</span>
                );
              } else {
                badge = <span className="text-[8px] bg-rose-500 text-white px-1 rounded font-bold">in prompt</span>;
              }
              const impClass =
                c.importance === 'critical' ? 'bg-rose-700 text-white' :
                c.importance === 'mid'      ? 'bg-amber-200 text-amber-800' :
                                              'bg-slate-200 text-slate-600';
              return (
                <div key={c.id + '-' + c.position} className={`flex items-center gap-2 p-1.5 rounded border transition-all duration-500 ${frame}`}>
                  <span className="w-5 h-5 flex items-center justify-center bg-white border border-rose-300 rounded text-[9px] font-bold text-rose-700 flex-shrink-0">
                    {c.position + 1}
                  </span>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-1">
                      <span className="text-[10px] font-bold text-slate-700 truncate">{c.id}: {c.title}</span>
                    </div>
                    <div className="text-[9px] text-slate-500 truncate font-mono">"{c.text}"</div>
                  </div>
                  <span className={`text-[9px] px-1 py-0.5 rounded font-mono font-bold ${scoreClass}`}>
                    {c.score.toFixed(2)}
                  </span>
                  <span className={`text-[8px] px-1 py-0.5 rounded font-bold ${impClass}`}>
                    {c.importance === 'critical' ? '핵심' : c.importance === 'mid' ? '보통' : '낮음'}
                  </span>
                  <span className="text-[8px] text-slate-500 font-mono w-10 text-right">{c.tokens}t</span>
                  <div className="flex-shrink-0">{badge}{extra}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // PromptBox — 토큰 막대 + LLM 응답
    //   토큰 윈도우(1000)를 가로 막대로 표시.
    //   used <= total 이면 rose, overflow 발생하면 빨강 영역 추가.
    // ─────────────────────────────────────────────────────
    function PromptBox({ prompt, answer, phase }) {
      const pct = Math.min(100, (prompt.used / prompt.total) * 100);
      const overflowPct = prompt.overflow > 0 ? Math.min(100, (prompt.overflow / prompt.total) * 100) : 0;
      const isMapReduce = phase === 'mapreduce';

      return (
        <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🪟</span>
              <span className="text-[11px] font-bold text-rose-800">
                {isMapReduce ? 'Map-Reduce: 각 chunk → 부분 LLM 호출' : 'Prompt 토큰 윈도우'}
              </span>
            </div>
            {!isMapReduce && (
              <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
                prompt.overflow > 0 ? 'bg-red-600 text-white' : 'bg-rose-600 text-white'
              }`}>
                {prompt.used} / {prompt.total} tok
              </span>
            )}
          </div>

          {!isMapReduce && (
            <>
              {/* 토큰 막대 */}
              <div className="bg-white rounded border border-rose-200 p-2 mb-2">
                <div className="relative h-6 bg-slate-100 rounded overflow-hidden">
                  <div className={`absolute left-0 top-0 h-full transition-all duration-700 ${
                    prompt.overflow > 0 ? 'bg-rose-400' : 'bg-rose-500'
                  }`} style={{ width: `${pct}%` }} />
                  {prompt.overflow > 0 && (
                    <div className="absolute right-0 top-0 h-full bg-red-600 animate-pulse"
                      style={{ width: `${Math.min(40, overflowPct)}%` }} />
                  )}
                  <div className="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-white drop-shadow">
                    {prompt.overflow > 0
                      ? `OVERFLOW +${prompt.overflow} tok`
                      : `${pct.toFixed(0)}% used`}
                  </div>
                  {/* 한계선 */}
                  <div className="absolute top-0 bottom-0 w-0.5 bg-slate-700" style={{ left: '100%' }} />
                </div>
                <div className="flex justify-between text-[9px] text-slate-500 font-mono mt-0.5">
                  <span>0</span>
                  <span>윈도우 한계 = {prompt.total} tok</span>
                </div>
              </div>
            </>
          )}

          {/* Map-Reduce 다이어그램 */}
          {isMapReduce && (
            <div className="bg-white rounded border border-purple-300 p-2 mb-2">
              <div className="flex items-center justify-between gap-1 text-[9px] font-mono">
                <div className="flex flex-col gap-0.5 flex-1">
                  <div className="text-purple-700 font-bold">map ×8</div>
                  {[...Array(8)].map((_, i) => (
                    <div key={i} className="flex items-center gap-1">
                      <span className="bg-purple-200 text-purple-800 w-5 text-center rounded">C{i + 1}</span>
                      <span className="text-purple-500">→</span>
                      <span className="bg-purple-100 text-purple-700 px-1 rounded">part {i + 1}</span>
                    </div>
                  ))}
                </div>
                <div className="text-purple-500 text-2xl px-1">▶</div>
                <div className="flex flex-col gap-0.5 flex-1">
                  <div className="text-purple-700 font-bold">reduce ×1</div>
                  <div className="bg-purple-50 border border-purple-300 rounded p-1.5 text-[9px] text-purple-900">
                    8 partials<br />→ LLM<br />→ 최종 답
                  </div>
                </div>
              </div>
              <div className="text-[9px] text-purple-700 mt-1.5 font-mono">
                💰 LLM 호출: 8 (map) + 1 (reduce) = <b>9회</b>
              </div>
            </div>
          )}

          {/* LLM 답변 */}
          <div className={`rounded border-2 p-2 ${
            answer.ok ? 'bg-white border-emerald-300' : 'bg-red-50 border-red-300'
          }`}>
            <div className="flex items-center gap-1 mb-1">
              <span className="text-base">{answer.ok ? '🤖' : '⚠️'}</span>
              <span className={`text-[9px] font-bold uppercase tracking-wider ${
                answer.ok ? 'text-emerald-700' : 'text-red-700'
              }`}>
                LLM 응답 {answer.ok ? '✓' : '(실패)'}
              </span>
            </div>
            <div className={`text-[10px] leading-snug ${
              answer.ok ? 'text-slate-800' : 'text-red-800 font-mono'
            }`}>
              {answer.text}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // AttentionGraph — Lost in the Middle U자 곡선
    //   5 위치 막대 그래프 (시작/1/4/중간/3/4/끝)
    // ─────────────────────────────────────────────────────
    function AttentionGraph() {
      const maxH = 80;
      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">📉</span>
            <span className="text-[11px] font-bold text-rose-800">LLM Attention 분포 (Lost in the Middle)</span>
          </div>
          <div className="flex items-end justify-between gap-1 h-24 px-1">
            {ATTENTION_CURVE.map((d, i) => {
              const isMid = d.score < 50;
              const isHigh = d.score >= 80;
              return (
                <div key={i} className="flex flex-col items-center flex-1">
                  <div className={`text-[9px] font-bold mb-0.5 ${
                    isHigh ? 'text-rose-700' : isMid ? 'text-slate-500' : 'text-rose-500'
                  }`}>
                    {d.score}%
                  </div>
                  <div className={`w-full rounded-t transition-all duration-700 ${
                    isHigh ? 'bg-rose-600' : isMid ? 'bg-slate-300' : 'bg-rose-300'
                  }`} style={{ height: `${(d.score / 100) * maxH}px` }} />
                  <div className={`text-[9px] mt-0.5 ${isMid ? 'text-slate-400' : 'text-slate-600'}`}>
                    {d.pos}
                  </div>
                </div>
              );
            })}
          </div>
          <div className="text-[9px] text-slate-500 mt-1 text-center font-mono">
            U자형: 시작·끝은 잘 보지만 가운데는 38%까지 떨어진다
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 통합
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 Context Stuffing 시각화</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <ChunkList chunks={step.chunks} phase={step.phase} />
            <PromptBox prompt={step.prompt} answer={step.answer} phase={step.phase} />
            {step.showAttention && <AttentionGraph />}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>in prompt
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-700"></span>high attention
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-400"></span>lost middle
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-red-500"></span>overflow
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-purple-500"></span>map-reduce
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Generation &amp; 프롬프트 &gt; Chapter 1. 프롬프트 전략</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-1-1. Context Stuffing — 검색 결과를 prompt에 주입</h1>
                  <p className="text-sm text-slate-500 mt-0.5">시험 답안지에 참고 자료 펼쳐놓기 — 단순 join → overflow → Lost-in-Middle → 우선순위 정렬 → Map-Reduce</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: 짧은 답엔 <strong>Naive Stuffing</strong>, 윈도우 한계엔 <strong>Priority Sort</strong>, 대량 문서엔 <strong>Map-Reduce / Refine</strong>. 다음(V-1-2)에서는 RAG 프롬프트 템플릿 설계를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Context Stuffing', 'Token Limit', 'Lost in the Middle', 'Priority Sort', 'Map-Reduce', 'Refine', 'Long Context Reorder'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../part4/IV-2-4.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; IV-2-4 Parent Document Retriever</a>
              <a href="./V-1-2.html" className="text-rose-700 hover:text-rose-900 font-medium">V-1-2 RAG 프롬프트 설계 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
