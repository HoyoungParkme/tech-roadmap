<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — V-1-1. Context Stuffing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const DOCUMENTS = [
      { id: 'D1', title: '인사규정 3장 (연차)', importance: 'high', position: 0 },
      { id: 'D2', title: '복리후생 안내', importance: 'mid', position: 1 },
      { id: 'D3', title: '취업규칙 일부', importance: 'low', position: 2 },
      { id: 'D4', title: '급여 체계 설명', importance: 'low', position: 3 },
      { id: 'D5', title: '인사규정 4장 (휴직)', importance: 'mid', position: 4 },
    ];

    const ATTENTION_DATA = [
      { position: '시작', score: 92 },
      { position: '1/4', score: 75 },
      { position: '중간', score: 45 },
      { position: '3/4', score: 60 },
      { position: '끝', score: 88 },
    ];

    const STEPS = [
      {
        desc: "Context Stuffing은 시험 문제지에 참고 자료를 붙이는 것입니다. 어디에, 어떤 순서로 붙이느냐에 따라 LLM의 답변 품질이 크게 달라집니다.",
        phase: 'intro',
        order: [0, 1, 2, 3, 4],
      },
      {
        desc: "1단계: 검색된 5개 문서를 순서대로 프롬프트에 넣습니다. 기본적으로 유사도 순서(높은 것 먼저)로 배치합니다. 하지만 이 순서가 최적일까요?",
        phase: 'default_order',
        order: [0, 1, 2, 3, 4],
      },
      {
        desc: "2단계: Lost in the Middle 문제 — LLM은 프롬프트의 시작과 끝에 더 주목합니다. 중간에 있는 정보는 놓치기 쉽습니다. 이것이 'Lost in the Middle' 현상입니다.",
        phase: 'attention',
        order: [0, 1, 2, 3, 4],
      },
      {
        desc: "3단계: 최적 배치 전략 — 가장 중요한 문서를 처음과 끝에 배치합니다. 덜 중요한 문서를 중간에 넣습니다. LLM의 주목도 패턴에 맞춰 배치하면 정확도가 향상됩니다.",
        phase: 'optimized',
        order: [0, 4, 2, 3, 1],
      },
      {
        desc: "정리 — (1) 중요한 문서는 처음과 끝에 배치 (2) 문서 수가 많으면 Contextual Compression으로 압축 (3) 청크 크기와 개수의 트레이드오프를 고려합니다.",
        phase: 'summary',
        order: [0, 4, 2, 3, 1],
      },
    ];

    function AttentionGraph() {
      const maxH = 120;
      return (
        <div className="bg-slate-50 rounded-lg border border-slate-200 p-4">
          <div className="text-xs font-bold text-rose-600 uppercase tracking-wider mb-3">LLM 주목도 (Attention) 패턴</div>
          <div className="flex items-end justify-between gap-2 h-32">
            {ATTENTION_DATA.map((d, i) => (
              <div key={i} className="flex flex-col items-center flex-1">
                <div className="text-[10px] font-bold text-rose-700 mb-1">{d.score}%</div>
                <div className="w-full bg-rose-200 rounded-t transition-all duration-700"
                  style={{ height: `${(d.score / 100) * maxH}px` }}>
                  <div className={`w-full h-full rounded-t ${d.score >= 80 ? 'bg-rose-500' : d.score >= 60 ? 'bg-rose-300' : 'bg-rose-200'}`} />
                </div>
                <div className="text-[10px] text-slate-500 mt-1">{d.position}</div>
              </div>
            ))}
          </div>
          <div className="text-center text-[10px] text-slate-400 mt-2">U자형: 시작과 끝에 높은 주목도, 중간이 가장 낮음</div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const orderedDocs = s.order.map(i => DOCUMENTS[i]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-rose-700 hover:text-rose-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Generation & 프롬프트 &gt; Chapter 1. 프롬프트 전략</div>
                  <h1 className="text-2xl font-bold text-slate-800">V-1-1. Context Stuffing — 참고 자료 배치 전략</h1>
                </div>
              </div>
              <p className="text-slate-600">시험 문제지에 <b>참고 자료 붙이기</b>. 어디에 배치하느냐가 중요합니다. LLM은 <b>시작과 끝</b>에 더 주목하고, <b>중간 정보를 놓칩니다</b> (Lost in the Middle).</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-rose-700 border-rose-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">Context Stuffing 전략</h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-rose-600 uppercase tracking-wider mb-3">
                  문서 배치 순서 {s.phase === 'optimized' || s.phase === 'summary' ? '(최적화)' : '(기본)'}
                </div>
                <div className="space-y-2 mb-4">
                  {orderedDocs.map((doc, i) => {
                    const isEdge = i === 0 || i === orderedDocs.length - 1;
                    const isMid = i === 2;
                    return (
                      <div key={doc.id} className={`flex items-center gap-3 p-3 rounded-lg border transition-all duration-500 ${
                        (s.phase === 'optimized' || s.phase === 'summary') && isEdge ? 'bg-rose-50 border-rose-300 shadow' :
                        s.phase === 'attention' && isMid ? 'bg-red-50 border-red-300 opacity-50' :
                        s.phase === 'attention' && isEdge ? 'bg-emerald-50 border-emerald-300' :
                        'bg-slate-50 border-slate-100'
                      }`}>
                        <span className="w-6 h-6 bg-slate-200 text-slate-600 rounded-full flex items-center justify-center text-[10px] font-bold">{i + 1}</span>
                        <span className="text-xs font-medium text-slate-700 flex-1">{doc.id}: {doc.title}</span>
                        <span className={`text-[10px] px-1.5 py-0.5 rounded font-bold ${
                          doc.importance === 'high' ? 'bg-rose-100 text-rose-700' :
                          doc.importance === 'mid' ? 'bg-amber-100 text-amber-700' :
                          'bg-slate-100 text-slate-500'
                        }`}>{doc.importance === 'high' ? '핵심' : doc.importance === 'mid' ? '보통' : '낮음'}</span>
                      </div>
                    );
                  })}
                </div>
                {(s.phase === 'attention' || s.phase === 'optimized' || s.phase === 'summary') && (
                  <AttentionGraph />
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.phase === 'summary' ? (
                  <div className="space-y-4">
                    <div className="text-xs font-bold text-rose-600 uppercase tracking-wider mb-3">Context Stuffing 체크리스트</div>
                    <div className="p-4 rounded-lg bg-rose-50 border border-rose-200">
                      <div className="font-bold text-sm text-rose-800 mb-2">배치 규칙</div>
                      <ul className="text-xs text-rose-700 space-y-1">
                        <li>1. 가장 중요한 문서를 처음과 끝에</li>
                        <li>2. 덜 중요한 문서를 중간에</li>
                        <li>3. 문서가 너무 많으면 압축/필터링</li>
                      </ul>
                    </div>
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">트레이드오프</div>
                      <div className="space-y-2 text-xs text-slate-600">
                        <div className="flex justify-between">
                          <span>문서 많이 넣기</span>
                          <span>정보 풍부 / 노이즈 증가</span>
                        </div>
                        <div className="flex justify-between">
                          <span>문서 적게 넣기</span>
                          <span>집중 가능 / 정보 부족</span>
                        </div>
                        <div className="flex justify-between">
                          <span>보통 3~5개</span>
                          <span className="font-bold text-rose-600">최적</span>
                        </div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div className="text-xs font-bold text-rose-600 uppercase tracking-wider mb-3">Context Stuffing 핵심</div>
                    <div className="p-4 rounded-lg bg-rose-50 border border-rose-200">
                      <div className="font-bold text-sm text-rose-800 mb-2">Lost in the Middle 현상</div>
                      <ul className="text-xs text-rose-700 space-y-1">
                        <li>- LLM은 시작과 끝에 높은 주목도</li>
                        <li>- 중간 문서는 무시될 가능성 높음</li>
                        <li>- 특히 긴 컨텍스트에서 두드러짐</li>
                      </ul>
                    </div>
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">프롬프트 구조</div>
                      <div className="bg-slate-900 text-green-300 p-3 rounded text-[10px] font-mono leading-relaxed">
                        {`[시스템 지시]\n\n[참고 자료 1] ← 높은 주목도\n[참고 자료 2]\n[참고 자료 3] ← 낮은 주목도\n[참고 자료 4]\n[참고 자료 5] ← 높은 주목도\n\n[질문] ← 가장 높은 주목도`}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Context Stuffing', 'Lost in the Middle', '문서 배치', 'Prompt Engineering', 'Attention Pattern'].map(kw => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-sm font-medium border border-rose-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-rose-600 hover:bg-rose-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="../part4/IV-2-4.html" className="text-rose-600 hover:text-rose-800 font-medium">&larr; IV-2-4. Parent Document Retriever</a>
              <a href="./V-1-2.html" className="text-rose-600 hover:text-rose-800 font-medium">V-1-2. RAG 프롬프트 설계 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
