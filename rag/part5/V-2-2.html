<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — V-2-2. Streaming & UX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TIMELINE_SYNC = [
      { label: '검색', duration: 1.2, start: 0, color: 'bg-blue-400' },
      { label: 'LLM 생성', duration: 3.5, start: 1.2, color: 'bg-amber-400' },
      { label: '응답 표시', duration: 0.1, start: 4.7, color: 'bg-emerald-400' },
    ];

    const TIMELINE_STREAM = [
      { label: '검색', duration: 1.2, start: 0, color: 'bg-blue-400' },
      { label: 'LLM 생성 + 실시간 표시', duration: 3.5, start: 1.2, color: 'bg-emerald-400' },
    ];

    const TIMELINE_ASYNC = [
      { label: '검색 시작', duration: 1.2, start: 0, color: 'bg-blue-400' },
      { label: 'Re-ranking (병렬)', duration: 0.8, start: 0.3, color: 'bg-purple-400' },
      { label: 'LLM 생성 + 스트리밍', duration: 2.5, start: 1.2, color: 'bg-emerald-400' },
    ];

    const FULL_ANSWER = "연차 휴가는 1년 이상 근속 시 15일이 부여됩니다. 추가로 리프레시 휴가 3일과 생일 휴가 1일이 별도로 제공됩니다. 신청은 HR 시스템에서 최소 3일 전에 하시면 됩니다.";

    const STEPS = [
      {
        desc: "Streaming & UX는 레스토랑 서빙 방식입니다. 모든 요리가 다 될 때까지 기다릴 것인가(동기), 나오는 대로 바로 서빙할 것인가(스트리밍). 체감 대기 시간이 완전히 다릅니다.",
        phase: 'intro',
      },
      {
        desc: "동기 방식 — 검색(1.2초) → LLM 생성(3.5초) → 한 번에 표시. 사용자는 4.8초간 빈 화면을 봅니다. 답변이 길수록 대기 시간이 길어져서 UX가 나빠집니다.",
        phase: 'sync',
        streamProgress: 0,
      },
      {
        desc: "스트리밍 방식 — 검색(1.2초) 후 LLM이 생성하는 즉시 토큰 단위로 표시합니다. 1.2초 후부터 글자가 나타나기 시작합니다. 체감 대기 시간: 1.2초 (vs 동기 4.8초).",
        phase: 'stream',
        streamProgress: 1,
      },
      {
        desc: "비동기 병렬 — 검색과 Re-ranking을 병렬로 실행하고, 결과가 오는 대로 LLM에 전달합니다. 전체 처리 시간이 더 줄어듭니다. FastAPI + asyncio로 구현합니다.",
        phase: 'async',
        streamProgress: 1,
        code: '# FastAPI Streaming 엔드포인트\nfrom fastapi.responses import StreamingResponse\n\n@app.post("/chat")\nasync def chat(query: str):\n    docs = await retriever.ainvoke(query)\n\n    async def generate():\n        async for chunk in llm.astream(\n            prompt.format(context=docs, question=query)\n        ):\n            yield chunk.content\n\n    return StreamingResponse(\n        generate(),\n        media_type="text/event-stream"\n    )',
      },
      {
        desc: "체감 시간 비교 — 동기: 4.8초 대기 → 한 번에 표시. 스트리밍: 1.2초 대기 → 점진적 표시. 비동기 병렬: 0.8초 대기 → 점진적 표시. 같은 답변인데 UX가 완전히 다릅니다.",
        phase: 'compare',
        streamProgress: 1,
      },
    ];

    function Timeline({ items, label, totalWidth }) {
      const maxEnd = Math.max(...items.map(i => i.start + i.duration));
      const scale = totalWidth / maxEnd;
      return (
        <div className="mb-4">
          <div className="text-[10px] font-bold text-slate-500 uppercase mb-1">{label}</div>
          <div className="relative h-8 bg-slate-100 rounded overflow-hidden">
            {items.map((item, i) => (
              <div key={i} className={`absolute h-full ${item.color} flex items-center justify-center rounded transition-all duration-500`}
                style={{ left: `${(item.start / maxEnd) * 100}%`, width: `${(item.duration / maxEnd) * 100}%` }}>
                <span className="text-[9px] text-white font-bold truncate px-1">{item.label}</span>
              </div>
            ))}
          </div>
          <div className="flex justify-between text-[9px] text-slate-400 mt-0.5">
            <span>0s</span>
            <span>{maxEnd.toFixed(1)}s</span>
          </div>
        </div>
      );
    }

    function StreamingDemo({ progress }) {
      const [displayLen, setDisplayLen] = useState(0);
      const timerRef = useRef(null);

      useEffect(() => {
        if (progress > 0) {
          setDisplayLen(0);
          timerRef.current = setInterval(() => {
            setDisplayLen(prev => {
              if (prev >= FULL_ANSWER.length) {
                clearInterval(timerRef.current);
                return prev;
              }
              return prev + 2;
            });
          }, 60);
        } else {
          setDisplayLen(0);
          clearInterval(timerRef.current);
        }
        return () => clearInterval(timerRef.current);
      }, [progress]);

      return (
        <div className="p-3 rounded-lg bg-white border border-slate-200 min-h-[80px]">
          <div className="text-[10px] font-bold text-rose-600 uppercase mb-1">
            {progress > 0 ? '스트리밍 출력' : '대기 중...'}
          </div>
          <div className="text-xs text-slate-700 leading-relaxed">
            {progress > 0 ? (
              <>
                {FULL_ANSWER.substring(0, displayLen)}
                {displayLen < FULL_ANSWER.length && <span className="animate-pulse text-rose-400">|</span>}
              </>
            ) : (
              <div className="flex items-center gap-2 text-slate-400">
                <div className="w-4 h-4 border-2 border-slate-300 border-t-transparent rounded-full animate-spin" />
                <span>응답을 기다리는 중...</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-rose-700 hover:text-rose-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Generation & 프롬프트 &gt; Chapter 2. 고급 생성 패턴</div>
                  <h1 className="text-2xl font-bold text-slate-800">V-2-2. Streaming & UX — 체감 속도 최적화</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>레스토랑 서빙</b> — 전체 대기 vs 나오는 대로 서빙. 동기(4.8초 대기) vs 스트리밍(1.2초 후 바로 시작). 같은 답변인데 체감이 다릅니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-rose-700 border-rose-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">Streaming 방식 비교</h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-rose-600 uppercase tracking-wider mb-3">타임라인 비교</div>

                <div className={`transition-all duration-500 ${s.phase === 'sync' ? 'ring-2 ring-amber-400 rounded-lg p-2' : 'p-2'}`}>
                  <Timeline items={TIMELINE_SYNC} label="동기 (Sync)" totalWidth={300} />
                  <div className="text-[10px] text-slate-500 mb-3 ml-1">체감 대기: 4.8초 (전체 완료까지 빈 화면)</div>
                </div>

                <div className={`transition-all duration-500 ${s.phase === 'stream' ? 'ring-2 ring-emerald-400 rounded-lg p-2' : 'p-2'}`}>
                  <Timeline items={TIMELINE_STREAM} label="스트리밍 (Stream)" totalWidth={300} />
                  <div className="text-[10px] text-emerald-600 mb-3 ml-1">체감 대기: 1.2초 (검색 후 바로 표시 시작)</div>
                </div>

                <div className={`transition-all duration-500 ${s.phase === 'async' ? 'ring-2 ring-purple-400 rounded-lg p-2' : 'p-2'}`}>
                  <Timeline items={TIMELINE_ASYNC} label="비동기 병렬 (Async)" totalWidth={300} />
                  <div className="text-[10px] text-purple-600 ml-1">체감 대기: 0.8초 (병렬 처리 + 스트리밍)</div>
                </div>

                {s.phase === 'compare' && (
                  <div className="mt-3 p-3 rounded-lg bg-rose-50 border border-rose-200">
                    <div className="text-xs font-bold text-rose-700 mb-2">체감 시간 요약</div>
                    <div className="space-y-1">
                      {[
                        { method: '동기', wait: '4.8초', bar: 'w-full', color: 'bg-amber-400' },
                        { method: '스트리밍', wait: '1.2초', bar: 'w-1/4', color: 'bg-emerald-400' },
                        { method: '비동기 병렬', wait: '0.8초', bar: 'w-1/6', color: 'bg-purple-400' },
                      ].map((m, i) => (
                        <div key={i} className="flex items-center gap-2">
                          <span className="text-[10px] text-slate-600 w-16">{m.method}</span>
                          <div className="flex-1 bg-slate-100 rounded-full h-4 overflow-hidden">
                            <div className={`h-full ${m.color} ${m.bar} rounded-full transition-all duration-700`} />
                          </div>
                          <span className="text-[10px] font-mono text-slate-500 w-10">{m.wait}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.code ? (
                  <>
                    <div className="text-xs font-bold text-rose-600 uppercase tracking-wider mb-3">코드</div>
                    <pre className="bg-slate-900 text-slate-100 p-4 rounded-lg text-xs leading-relaxed overflow-x-auto whitespace-pre-wrap">{s.code}</pre>
                  </>
                ) : (
                  <div className="space-y-4">
                    <div className="text-xs font-bold text-rose-600 uppercase tracking-wider mb-3">실시간 데모</div>
                    <StreamingDemo progress={s.streamProgress || 0} />

                    <div className="p-4 rounded-lg bg-rose-50 border border-rose-200">
                      <div className="font-bold text-sm text-rose-800 mb-2">Streaming 핵심</div>
                      <ul className="text-xs text-rose-700 space-y-1">
                        <li>- SSE (Server-Sent Events) 사용</li>
                        <li>- LLM의 토큰 생성 즉시 전송</li>
                        <li>- 프론트엔드에서 실시간 렌더링</li>
                      </ul>
                    </div>

                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">UX 개선 패턴</div>
                      <ul className="text-xs text-slate-600 space-y-1">
                        <li>- 스켈레톤 UI (검색 중)</li>
                        <li>- 타이핑 애니메이션 (생성 중)</li>
                        <li>- 출처 카드 점진적 표시</li>
                        <li>- 에러 시 재시도 버튼</li>
                      </ul>
                    </div>
                  </div>
                )}

                {s.phase === 'compare' && (
                  <div className="mt-4 bg-slate-900 text-slate-100 p-3 rounded-lg text-[10px] font-mono whitespace-pre-wrap">
{`# 프론트엔드 스트리밍 처리
const response = await fetch("/chat", {
  method: "POST",
  body: JSON.stringify({ query })
});

const reader = response.body.getReader();
const decoder = new TextDecoder();

while (true) {
  const { done, value } = await reader.read();
  if (done) break;
  const text = decoder.decode(value);
  setAnswer(prev => prev + text);  // 실시간 추가
}`}
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Streaming', 'SSE', 'Async', 'UX 최적화', '체감 속도'].map(kw => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-sm font-medium border border-rose-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-rose-600 hover:bg-rose-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./V-2-1.html" className="text-rose-600 hover:text-rose-800 font-medium">&larr; V-2-1. Multi-turn RAG</a>
              <a href="../part6/VI-1-1.html" className="text-rose-600 hover:text-rose-800 font-medium">VI-1-1. 다음 시각화 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
