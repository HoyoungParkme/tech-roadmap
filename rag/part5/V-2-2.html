            '',

            '',

            "  const [state, setState] = useState<UxState>('idle');",

    // 좌측 (1): 답 텍스트 박스 — 토큰 도착 애니메이션
    // batch: 끝에 한 번에 / stream·sse·cite: setInterval 누적 / ux(error): 도중 끊김
    function AnswerBox({ step }) {
      const [shown, setShown] = useState('');
      const [done, setDone] = useState(false);
      const timerRef = useRef(null);

      useEffect(() => {
        clearInterval(timerRef.current);
        setShown('');
        setDone(false);

        if (step.mode === 'batch') {
          // 일괄: 4.8초 대기 후 한 번에
          const t = setTimeout(() => {
            setShown(FULL_ANSWER);
            setDone(true);
          }, 1600); // 시각화는 1.6s 로 단축 (자동재생 3s 안에 완성되도록)
          return () => clearTimeout(t);
        }

        // stream / sse / cite / ux: 토큰 단위
        let i = 0;
        const limit = Math.min(step.tokensShown, TOKENS.length);
        timerRef.current = setInterval(() => {
          if (i >= limit) {
            clearInterval(timerRef.current);
            setDone(i >= TOKENS.length);
            return;
          }
          setShown((prev) => prev + TOKENS[i]);
          i += 1;
        }, 130);

        return () => clearInterval(timerRef.current);
      }, [step]);

      // UX 상태 라벨
      const stateLabel = {
        loading: '응답 대기 중...',
        streaming: '스트리밍 출력',
        error: '오류 — 재시도 필요',
        idle: '완료',
      }[step.uxState] || '대기';

      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">💬</span>
              <span className="text-[11px] font-bold text-rose-800">답 텍스트 박스</span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
              step.uxState === 'error' ? 'bg-red-600 text-white animate-pulse' :
              step.uxState === 'loading' ? 'bg-amber-500 text-white' :
              step.uxState === 'streaming' ? 'bg-rose-600 text-white' :
              'bg-slate-300 text-slate-700'
            }`}>{stateLabel}</span>
          </div>

          {/* 본문 — 빈 박스도 최소 높이 유지 */}
          <div className="bg-slate-50 rounded border border-slate-200 p-3 min-h-[88px] text-[12px] leading-relaxed text-slate-800">
            {step.mode === 'batch' && !done && shown.length === 0 ? (
              <div className="flex items-center gap-2 text-slate-400">
                <div className="w-4 h-4 border-2 border-rose-300 border-t-transparent rounded-full animate-spin" />
                <span className="text-[11px]">LLM 마지막 토큰까지 대기 중... (4.8s)</span>
              </div>
            ) : step.uxState === 'error' && shown.length > 0 ? (
              <>
                <span>{shown}</span>
                <span className="inline-block ml-1 px-1 bg-red-100 text-red-700 text-[9px] font-mono rounded border border-red-300">
                  ✗ {step.errorMsg}
                </span>
              </>
            ) : (
              <>
                <span>{shown}</span>
                {!done && (
                  <span className="inline-block w-[2px] h-3 bg-rose-500 ml-0.5 animate-pulse align-middle" />
                )}
              </>
            )}
          </div>

          {/* 토큰 카운터 */}
          <div className="flex justify-between text-[9px] text-slate-500 mt-1.5 font-mono">
            <span>tokens: {shown ? shown.split(' ').filter(Boolean).length : 0} / {TOKENS.length}</span>
            <span>{step.mode === 'batch' ? 'batch · reveal at end' : 'stream · per-token'}</span>
          </div>
        </div>
      );
    }

    // 좌측 (2): TTFT 게이지 — Time To First Token (ms)
    // batch: 4800ms(빨강) / stream 이후: 300ms(초록)
    function TtftGauge({ ttft, total }) {
      // 최대치 5000ms 기준 비율
      const MAX = 5000;
      const ttftPct = Math.min(100, (ttft / MAX) * 100);
      const totalPct = Math.min(100, (total / MAX) * 100);
      const isFast = ttft <= 1000;

      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">⚡</span>
              <span className="text-[11px] font-bold text-rose-800">TTFT 게이지 (Time To First Token)</span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
              isFast ? 'bg-emerald-600 text-white' : 'bg-red-600 text-white'
            }`}>
              {ttft.toLocaleString()} ms
            </span>
          </div>

          {/* TTFT 막대 */}
          <div className="mb-2">
            <div className="flex justify-between text-[9px] text-slate-500 mb-0.5 font-mono">
              <span>첫 토큰 도착</span>
              <span>{(ttft / 1000).toFixed(2)}s</span>
            </div>
            <div className="h-3 bg-slate-100 rounded-full overflow-hidden border border-slate-200">
              <div
                className={`h-full transition-all duration-700 ${
                  isFast ? 'bg-gradient-to-r from-emerald-400 to-emerald-600' : 'bg-gradient-to-r from-amber-400 to-red-500'
                }`}
                style={{ width: `${ttftPct}%` }}
              />
            </div>
          </div>

          {/* total 막대 (참고) */}
          <div className="mb-2">
            <div className="flex justify-between text-[9px] text-slate-500 mb-0.5 font-mono">
              <span>응답 완료</span>
              <span>{(total / 1000).toFixed(2)}s</span>
            </div>
            <div className="h-2 bg-slate-100 rounded-full overflow-hidden border border-slate-200">
              <div
                className="h-full bg-slate-400 transition-all duration-700"
                style={{ width: `${totalPct}%` }}
              />
            </div>
          </div>

          {/* 판정 */}
          <div className={`text-[10px] font-medium px-2 py-1 rounded mt-1 ${
            isFast
              ? 'bg-emerald-50 text-emerald-700 border border-emerald-200'
              : 'bg-red-50 text-red-700 border border-red-200'
          }`}>
            {isFast
              ? '✓ 0.3s — 사용자가 "이미 답하는 중"으로 인식'
              : '✗ 4.8s — 사용자 인내 한계 초과 ("끊긴 거 아님?")'}
          </div>

          {/* 임계 라인 표 */}
          <div className="mt-2 grid grid-cols-3 gap-1 text-[9px] font-mono">
            <div className="text-emerald-700 text-center bg-emerald-50 rounded py-0.5">≤1s 우수</div>
            <div className="text-amber-700 text-center bg-amber-50 rounded py-0.5">1~3s 보통</div>
            <div className="text-red-700 text-center bg-red-50 rounded py-0.5">≥3s 불량</div>
          </div>
        </div>
      );
    }

    // 좌측 (3): SSE 메시지 흐름 (Step 3 강조)
    // event 색상 — meta 보라 / retrieved 파랑 / token 로즈 / cite 초록 / done 회색
    function SseFlow({ log, active }) {
      const evColor = {
        meta:      'bg-purple-100 text-purple-800 border-purple-300',
        retrieved: 'bg-blue-100 text-blue-800 border-blue-300',
        token:     'bg-rose-100 text-rose-800 border-rose-300',
        cite:      'bg-emerald-100 text-emerald-800 border-emerald-300',
        done:      'bg-slate-200 text-slate-700 border-slate-300',
        error:     'bg-red-100 text-red-800 border-red-300',
      };

      return (
        <div className={`bg-white rounded-lg border-2 p-3 transition-all ${
          active ? 'border-rose-400 ring-2 ring-rose-200' : 'border-slate-200 opacity-70'
        }`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📡</span>
              <span className="text-[11px] font-bold text-rose-800">SSE 메시지 흐름</span>
            </div>
            <span className="text-[9px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
              text/event-stream
            </span>
          </div>

          {!active || log.length === 0 ? (
            <div className="text-[10px] text-slate-400 italic text-center py-4 bg-slate-50 rounded border border-dashed border-slate-200">
              {active ? 'no SSE messages this step' : 'Step 3 에서만 활성 — 단순 chunk stream 외 표준 포맷'}
            </div>
          ) : (
            <div className="bg-slate-900 rounded p-2 max-h-[180px] overflow-y-auto font-mono text-[10px] space-y-1">
              {log.map((m, i) => (
                <div key={i} className="flex items-start gap-1.5">
                  <span className="text-slate-500 w-12 flex-shrink-0">{m.t}ms</span>
                  <span className={`px-1.5 py-0.5 rounded border text-[9px] font-bold w-16 text-center flex-shrink-0 ${evColor[m.event] || 'bg-slate-100'}`}>
                    {m.event}
                  </span>
                  <span className="text-slate-300 break-all leading-tight">{m.data}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // 좌측 (4): 인용 chunk 카드 — Step 4에서 답 끝난 뒤 노출
    function CiteCards({ cites }) {
      if (!cites.visible) {
        return (
          <div className="bg-white rounded-lg border-2 border-dashed border-slate-200 p-3 opacity-60">
            <div className="flex items-center gap-1.5 mb-1">
              <span className="text-base">📚</span>
              <span className="text-[11px] font-bold text-slate-500">인용 카드 (cite event 대기)</span>
            </div>
            <div className="text-[10px] text-slate-400 italic text-center py-2">
              {cites.mode === 'inline-blocked'
                ? '✗ batch — 답이 끝나야 같이 표시 (4.8s 후)'
                : '대기 중 — 본문 stream 종료 후 cite 이벤트로 도착'}
            </div>
          </div>
        );
      }

      return (
        <div className="bg-white rounded-lg border-2 border-emerald-300 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📚</span>
              <span className="text-[11px] font-bold text-emerald-800">cite event — 답 종료 후 별도 표시</span>
            </div>
            <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
              {cites.items.length} chunks
            </span>
          </div>
          <div className="space-y-1.5">
            {cites.items.map((c) => (
              <div key={c.id} className="bg-emerald-50 border border-emerald-200 rounded p-1.5">
                <div className="flex items-center justify-between mb-0.5">
                  <span className="text-[9px] font-mono font-bold text-emerald-700">[{c.id}] {c.src}</span>
                  <span className="text-[9px] bg-emerald-600 text-white px-1 rounded font-mono font-bold">
                    {c.score.toFixed(2)}
                  </span>
                </div>
                <div className="text-[10px] text-emerald-900 leading-tight">"{c.text}"</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // LiveDataPane — 좌측 전체: 답 박스 / TTFT / SSE / 인용
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🍽 레스토랑 서빙 — Streaming &amp; UX</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <AnswerBox step={step} />
            <TtftGauge ttft={step.ttft} total={step.total} />
            <SseFlow log={step.sseLog} active={step.mode === 'sse'} />
            <CiteCards cites={step.cites} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>token
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-purple-500"></span>meta
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-blue-500"></span>retrieved
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>cite
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-red-500"></span>error
            </span>
          </div>
        </div>
      );
    }

    // VSCode CodeViewer — highlight.js
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          codeRef.current.textContent = code.lines.join('\n');
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // App 메인
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Generation &amp; 프롬프트 &gt; Chapter 2. 고급 생성 패턴</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-2-2. Streaming &amp; UX — LLM 답을 한 토큰씩</h1>
                  <p className="text-sm text-slate-500 mt-0.5">레스토랑 서빙 비유 — 일괄 vs Streaming · SSE · 인용 분리 · 4-상태 UX</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: 체감 속도는 <strong>TTFT</strong>가 결정한다 — 일괄 4.8s → Streaming 0.3s. 운영 단계에선 <strong>SSE</strong>로 표준화하고, 인용은 <strong>본문 종료 후 별도 cite event</strong>, UX는 <strong>4-상태(idle/loading/streaming/error)</strong>로 명시 처리. 다음(VI-1-1)에선 운영 RAG 평가·관측을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Streaming', 'TTFT', 'SSE', 'WebSocket', 'astream', 'cite event', 'UX state machine'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./V-2-1.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; V-2-1 Multi-turn RAG</a>
              <a href="../part6/VI-1-1.html" className="text-rose-700 hover:text-rose-900 font-medium">VI-1-1 다음 시각화 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
