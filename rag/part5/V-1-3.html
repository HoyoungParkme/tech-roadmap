      const moodLabel = {
        doubt: '환각인가...?',
        curious: '음, 추적은 되네',
        happy: '출처가 보이네!',
        satisfied: '검증 완료, 신뢰',
      }[userMood] || '';

      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">💬</span>
              <span className="text-[11px] font-bold text-rose-800">RAG 답변 박스</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">
              answer
            </span>
          </div>

          {/* 질문 */}
          <div className="bg-blue-50 border border-blue-200 rounded p-2 mb-2">
            <div className="text-[9px] font-bold text-blue-700 uppercase tracking-wider mb-0.5">Q. 질문</div>
            <div className="text-[11px] text-blue-900 font-medium">우리 회사 연차 휴가 정책을 알려줘</div>
          </div>

          {/* 답변 본문 */}
          <div className="bg-rose-50 border border-rose-200 rounded p-2.5">
            <div className="text-[9px] font-bold text-rose-700 uppercase tracking-wider mb-1">A. 답변</div>
            <div className="text-[12px] text-slate-800 leading-relaxed">
              {answer.tokens.map((t) => {
                if (answer.mode === 'plain') {
                  return <span key={t.id}>{t.text}</span>;
                }
                if (answer.mode === 'inline') {
                  return (
                    <span key={t.id}>
                      {t.text}
                      {t.cite && (
                        <span className="inline-flex items-center mx-0.5 px-1.5 py-0.5 rounded bg-rose-600 text-white text-[10px] font-bold align-middle shadow-sm">
                          [{t.cite}]
                        </span>
                      )}
                    </span>
                  );
                }
                // extract
                return (
                  <span key={t.id}>
                    <span className={t.cite ? 'bg-yellow-200 text-yellow-900 px-0.5 rounded' : ''}>
                      {t.text}
                    </span>
                    {t.cite && (
                      <span className="inline-flex items-center mx-0.5 px-1.5 py-0.5 rounded bg-rose-600 text-white text-[10px] font-bold align-middle shadow-sm relative">
                        [{t.cite}]
                        <span className="absolute -top-3 left-1/2 -translate-x-1/2 text-rose-600 text-[14px] animate-bounce">↓</span>
                      </span>
                    )}
                  </span>
                );
              })}
            </div>
          </div>

          {/* 신뢰도 게이지 + 사용자 표정 */}
          <div className="mt-2 flex items-center gap-2">
            <span className="text-lg" title={moodLabel}>{moodIcon}</span>
            <div className="flex-1">
              <div className="flex justify-between items-center mb-0.5">
                <span className="text-[9px] font-bold text-slate-600 uppercase">사용자 신뢰도</span>
                <span className="text-[9px] font-mono font-bold text-rose-700">{trustLevel}%</span>
              </div>
              <div className="w-full bg-slate-200 rounded-full h-1.5 overflow-hidden">
                <div
                  className="h-1.5 rounded-full transition-all duration-700"
                  style={{
                    width: `${trustLevel}%`,
                    background:
                      trustLevel < 35 ? '#ef4444' :
                      trustLevel < 60 ? '#f59e0b' :
                      trustLevel < 90 ? '#10b981' :
                      '#e11d48',
                  }}
                />
              </div>
            </div>
            <span className="text-[9px] text-slate-500 italic max-w-[80px] leading-tight">{moodLabel}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 가운데: 검색된 chunk 박스 — Step 2부터 ID 등장
    //   chunks.withId       : true 면 [N] 번호 prefix 붙음
    //   chunks.highlightIds : 답변에서 인용된 ID 들 (강조)
    // ─────────────────────────────────────────────────────
    function ChunkBox({ chunks }) {
      return (
        <div className="bg-slate-50 border-2 border-slate-200 rounded-lg p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📦</span>
              <span className="text-[11px] font-bold text-slate-700">retriever → chunks</span>
            </div>
            <span className="text-[9px] bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded font-mono">
              k=3
            </span>
          </div>
          <div className="space-y-1.5">
            {RAW_CHUNKS.map((c, i) => {
              const id = i + 1;
              const isHighlighted = chunks.highlightIds.includes(id);
              return (
                <div
                  key={id}
                  className={`p-2 rounded border transition-all duration-500 ${
                    isHighlighted
                      ? 'bg-yellow-50 border-yellow-400 shadow-sm'
                      : 'bg-white border-slate-200'
                  }`}
                >
                  <div className="flex items-start gap-2">
                    {chunks.withId && (
                      <span
                        className={`shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-mono font-bold ${
                          isHighlighted
                            ? 'bg-rose-600 text-white'
                            : 'bg-slate-200 text-slate-600'
                        }`}
                      >
                        [{id}]
                      </span>
                    )}
                    <div className="flex-1 min-w-0">
                      <div className="text-[10px] text-slate-700 leading-snug">
                        {c.text}
                      </div>
                      {chunks.withId && (
                        <div className="text-[9px] text-slate-400 font-mono mt-0.5">
                          metadata: {c.metadata.doc} · {c.metadata.section} · p.{c.metadata.page}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          {!chunks.withId && (
            <div className="text-[9px] text-slate-500 italic mt-1.5 text-center">
              ⚠ chunk 에 ID 가 없어 추적 불가
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: Citation 카드 그리드 (Step 4~5)
    //   Step 4: 추출됐지만 살짝 회색 (extract 단계 표시)
    //   Step 5: 클릭 가능한 활성 카드
    // ─────────────────────────────────────────────────────
    function CitationCards({ cards, phase }) {
      if (cards.length === 0) {
        return (
          <div className="bg-slate-50 border-2 border-dashed border-slate-300 rounded-lg p-3 text-center">
            <div className="text-[10px] text-slate-500 italic">
              💡 출처 카드 없음 — Step 4 부터 등장
            </div>
          </div>
        );
      }

      const isClickable = phase === 'ui-card';

      return (
        <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🔖</span>
              <span className="text-[11px] font-bold text-rose-800">출처 카드 (citations)</span>
            </div>
            <span className="text-[9px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
              {cards.length} cards
            </span>
          </div>
          <div className="grid grid-cols-3 gap-1.5">
            {cards.map((c) => (
              <div
                key={c.id}
                className={`p-2 rounded border-2 transition-all ${
                  isClickable
                    ? 'bg-white border-rose-300 hover:border-rose-500 hover:shadow-md cursor-pointer'
                    : 'bg-white/70 border-rose-200'
                } ${phase === 'extract' ? 'animate-pulse' : ''}`}
              >
                <div className="flex items-center gap-1 mb-1">
                  <span className="w-4 h-4 bg-rose-600 text-white rounded-full flex items-center justify-center text-[9px] font-bold">
                    {c.id}
                  </span>
                  <span className="text-[10px] font-bold text-rose-800 truncate">{c.doc}</span>
                </div>
                <div className="text-[9px] text-slate-600 mb-0.5">
                  {c.section} · p.{c.page}
                </div>
                <div className="text-[9px] text-slate-500 italic line-clamp-2 leading-tight">
                  {c.snippet.slice(0, 50)}...
                </div>
                <div className="flex items-center justify-between mt-1 pt-1 border-t border-rose-100">
                  <span className="text-[9px] font-mono text-rose-600 font-bold">
                    score {c.score.toFixed(2)}
                  </span>
                  {isClickable && (
                    <span className="text-[9px] text-rose-500 font-medium">→ 원문</span>
                  )}
                </div>
              </div>
            ))}
          </div>
          {phase === 'extract' && (
            <div className="text-[9px] text-rose-700 mt-1.5 text-center font-medium">
              🔍 답변 [N] → metadata 매핑 진행 중...
            </div>
          )}
          {phase === 'ui-card' && (
            <div className="text-[9px] text-rose-700 mt-1.5 text-center font-medium">
              ✓ 카드 클릭 → PDF 원문 위치로 점프 (검증 가능)
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 답변 박스 / 가운데: chunks / 하단: citation 카드
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 인용 시스템 — 답변 + chunks + 출처 카드</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <AnswerBox
              answer={step.answer}
              trustLevel={step.trustLevel}
              userMood={step.userMood}
            />
            <ChunkBox chunks={step.chunks} />
            <CitationCards cards={step.citationCards} phase={step.phase} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-300"></span>plain
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-600"></span>[N] 인용
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-yellow-300"></span>extract 강조
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-rose-300"></span>출처 카드
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Generation &amp; 프롬프트 &gt; Chapter 1. 프롬프트 전략</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-1-3. Citation &amp; 출처 표시 — 어느 문서에서 답을 가져왔는지</h1>
                  <p className="text-sm text-slate-500 mt-0.5">학술 논문 참고문헌 표기 — chunk ID → prompt 지시 → extract → 클릭 가능한 카드</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: <strong>chunk ID</strong>(추적) → <strong>prompt 지시</strong>([N] 표기) → <strong>regex 추출</strong>(metadata 매핑) → <strong>UI 카드</strong>(클릭 가능)의 4 레이어가 RAG 신뢰도의 핵심. 다음(V-2-1)에서는 Multi-turn 대화에서 인용을 어떻게 유지하는지 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Citation', 'chunk-id', 'prompt-cite', 'extract-cite', 'metadata', 'trust'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./V-1-2.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; V-1-2 RAG 프롬프트 설계</a>
              <a href="./V-2-1.html" className="text-rose-700 hover:text-rose-900 font-medium">V-2-1 Multi-turn RAG &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
