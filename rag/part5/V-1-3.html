<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — V-1-3. Citation & 출처 표시</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CITATION_TABS = ['인라인', '각주', '사이드바'];

    const INLINE_ANSWER = {
      parts: [
        { text: '연차 휴가는 1년 이상 근속 시 15일이 부여됩니다', source: '인사규정 3장 2절' },
        { text: '. 추가로 리프레시 휴가 3일', source: '복리후생 안내 p.12' },
        { text: '과 생일 휴가 1일', source: '복리후생 안내 p.15' },
        { text: '이 별도로 제공됩니다.' },
      ],
    };

    const FOOTNOTE_ANSWER = {
      text: '연차 휴가는 1년 이상 근속 시 15일이 부여됩니다[1]. 추가로 리프레시 휴가 3일[2]과 생일 휴가 1일[2]이 별도로 제공됩니다.',
      footnotes: [
        { id: 1, source: '인사규정 3장 2절', detail: '근로기준법 기반 사내 규정' },
        { id: 2, source: '복리후생 안내 p.12-15', detail: '2024년 개정판' },
      ],
    };

    const SIDEBAR_ANSWER = {
      text: '연차 휴가는 1년 이상 근속 시 15일이 부여됩니다. 추가로 리프레시 휴가 3일과 생일 휴가 1일이 별도로 제공됩니다.',
      sources: [
        { title: '인사규정 3장 2절', relevance: 0.95, snippet: '제15조(연차유급휴가) 1년 이상 근속한 직원에게 15일의 연차...' },
        { title: '복리후생 안내', relevance: 0.88, snippet: '리프레시 휴가: 연 3일, 생일 휴가: 1일 (당일 한정)...' },
      ],
    };

    const STEPS = [
      {
        desc: "Citation(출처 표시)은 학술 논문의 참고 문헌 표기와 같습니다. 답변의 각 정보가 어디서 왔는지 명시하여 신뢰도를 높이고, 사용자가 원문을 확인할 수 있게 합니다.",
        phase: 'intro',
        activeTab: null,
      },
      {
        desc: "패턴 1: 인라인 출처 — 답변 문장 바로 뒤에 [출처]를 표기합니다. 가장 직관적이고, 어떤 정보가 어떤 문서에서 왔는지 즉시 확인 가능합니다.",
        phase: 'inline',
        activeTab: 0,
      },
      {
        desc: "패턴 2: 각주 스타일 — 답변에는 번호만 표기하고[1][2], 하단에 참고문헌 목록을 둡니다. 답변이 깔끔하고, 논문/보고서 스타일에 적합합니다.",
        phase: 'footnote',
        activeTab: 1,
      },
      {
        desc: "패턴 3: 사이드바 출처 — 답변 옆에 참고 문서 패널을 따로 두고, 관련도와 원문 미리보기를 제공합니다. 채팅 UI에 적합한 패턴입니다.",
        phase: 'sidebar',
        activeTab: 2,
      },
      {
        desc: "정리 — 인라인은 정밀 추적, 각주는 깔끔한 보고서, 사이드바는 챗봇 UX에 적합합니다. 실무에서는 용도에 따라 선택합니다. 핵심은 출처 검증이 가능해야 한다는 것입니다.",
        phase: 'summary',
        activeTab: null,
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [selectedTab, setSelectedTab] = useState(0);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (s.activeTab !== null) setSelectedTab(s.activeTab);
      }, [step]);

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderCitation = () => {
        if (selectedTab === 0) {
          return (
            <div className="p-4 rounded-lg bg-white border border-slate-200">
              <div className="text-[10px] font-bold text-rose-600 uppercase mb-2">인라인 출처 패턴</div>
              <div className="text-sm text-slate-700 leading-relaxed">
                {INLINE_ANSWER.parts.map((p, i) => (
                  <span key={i}>
                    {p.text}
                    {p.source && (
                      <span className="inline-flex items-center mx-0.5 px-1.5 py-0.5 rounded bg-rose-100 text-rose-700 text-[10px] font-bold cursor-help" title={p.source}>
                        [{p.source}]
                      </span>
                    )}
                  </span>
                ))}
              </div>
            </div>
          );
        }
        if (selectedTab === 1) {
          return (
            <div className="space-y-3">
              <div className="p-4 rounded-lg bg-white border border-slate-200">
                <div className="text-[10px] font-bold text-rose-600 uppercase mb-2">각주 패턴</div>
                <div className="text-sm text-slate-700 leading-relaxed">{FOOTNOTE_ANSWER.text}</div>
              </div>
              <div className="p-3 rounded-lg bg-slate-50 border border-slate-200">
                <div className="text-[10px] font-bold text-slate-500 uppercase mb-2">참고 문헌</div>
                {FOOTNOTE_ANSWER.footnotes.map(fn => (
                  <div key={fn.id} className="flex items-start gap-2 py-1 text-xs text-slate-600">
                    <span className="w-4 h-4 bg-rose-100 text-rose-700 rounded-full flex items-center justify-center text-[10px] font-bold shrink-0">{fn.id}</span>
                    <div>
                      <span className="font-bold">{fn.source}</span>
                      <span className="text-slate-400 ml-1">— {fn.detail}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }
        return (
          <div className="flex gap-3">
            <div className="flex-1 p-4 rounded-lg bg-white border border-slate-200">
              <div className="text-[10px] font-bold text-rose-600 uppercase mb-2">답변</div>
              <div className="text-sm text-slate-700 leading-relaxed">{SIDEBAR_ANSWER.text}</div>
            </div>
            <div className="w-48 space-y-2">
              <div className="text-[10px] font-bold text-slate-500 uppercase">참고 문서</div>
              {SIDEBAR_ANSWER.sources.map((src, i) => (
                <div key={i} className="p-2 rounded-lg bg-rose-50 border border-rose-200">
                  <div className="text-[10px] font-bold text-rose-700">{src.title}</div>
                  <div className="text-[9px] text-slate-500 mt-0.5">관련도: {(src.relevance * 100).toFixed(0)}%</div>
                  <div className="text-[9px] text-slate-400 mt-1 italic">{src.snippet}</div>
                </div>
              ))}
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-rose-700 hover:text-rose-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Generation & 프롬프트 &gt; Chapter 1. 프롬프트 전략</div>
                  <h1 className="text-2xl font-bold text-slate-800">V-1-3. Citation & 출처 표시 — 참고 문헌 표기</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>학술 논문의 참고 문헌 표기</b>처럼. 같은 답변을 인라인/각주/사이드바 3가지 형식으로 표시합니다. 신뢰도와 검증 가능성의 핵심.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-rose-700 border-rose-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">Citation 패턴 비교</h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="flex gap-1 mb-4">
                  {CITATION_TABS.map((tab, i) => (
                    <button key={tab} onClick={() => setSelectedTab(i)}
                      className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${selectedTab === i ? 'bg-rose-600 text-white' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                      {tab}
                    </button>
                  ))}
                </div>
                <div className="mb-3 p-2 rounded bg-blue-50 border border-blue-200">
                  <div className="text-[10px] font-bold text-blue-600">질문</div>
                  <div className="text-xs text-blue-800">우리 회사 연차 휴가 정책을 알려줘</div>
                </div>
                {renderCitation()}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.phase === 'summary' ? (
                  <div className="space-y-3">
                    <div className="text-xs font-bold text-rose-600 uppercase tracking-wider mb-3">패턴 비교 정리</div>
                    {[
                      { name: '인라인', pros: '정확한 출처 추적', cons: '답변이 길어짐', usecase: '법률/의료 문서' },
                      { name: '각주', pros: '깔끔한 답변', cons: '출처 확인 불편', usecase: '보고서/논문' },
                      { name: '사이드바', pros: '원문 미리보기', cons: '구현 복잡', usecase: '챗봇 UI' },
                    ].map((p, i) => (
                      <div key={i} className="p-3 rounded-lg bg-slate-50 border border-slate-100">
                        <div className="font-bold text-sm text-slate-700 mb-1">{p.name}</div>
                        <div className="grid grid-cols-3 gap-2 text-[10px]">
                          <div><span className="text-emerald-600 font-bold">장점:</span> {p.pros}</div>
                          <div><span className="text-red-500 font-bold">단점:</span> {p.cons}</div>
                          <div><span className="text-blue-600 font-bold">적합:</span> {p.usecase}</div>
                        </div>
                      </div>
                    ))}
                    <div className="p-3 rounded-lg bg-rose-50 border border-rose-200">
                      <div className="text-xs font-bold text-rose-700">핵심 원칙</div>
                      <div className="text-xs text-rose-600 mt-1">어떤 패턴이든 "사용자가 원문을 확인할 수 있어야" 합니다</div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div className="text-xs font-bold text-rose-600 uppercase tracking-wider mb-3">Citation 구현 가이드</div>
                    <div className="p-4 rounded-lg bg-rose-50 border border-rose-200">
                      <div className="font-bold text-sm text-rose-800 mb-2">왜 출처가 필요한가?</div>
                      <ul className="text-xs text-rose-700 space-y-1">
                        <li>- 답변의 신뢰도 확보</li>
                        <li>- 할루시네이션 검증 수단</li>
                        <li>- 사용자가 원문 확인 가능</li>
                        <li>- 법적/규제적 요구 사항</li>
                      </ul>
                    </div>
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">구현 팁</div>
                      <ul className="text-xs text-slate-600 space-y-1">
                        <li>- 문서 metadata에 출처 정보 저장</li>
                        <li>- 프롬프트에서 출처 형식을 명시</li>
                        <li>- 후처리로 출처 파싱 & 링크 생성</li>
                      </ul>
                    </div>
                    <div className="bg-slate-900 text-slate-100 p-3 rounded-lg text-[10px] font-mono whitespace-pre-wrap">
{`# 프롬프트에서 출처 형식 지정
prompt = """
답변 시 반드시 출처를 표기하세요.
형식: [문서명, 페이지/섹션]

참고 자료:
{context}
"""`}
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Citation', '출처 표시', '인라인 출처', '각주', '신뢰도'].map(kw => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-sm font-medium border border-rose-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-rose-600 hover:bg-rose-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./V-1-2.html" className="text-rose-600 hover:text-rose-800 font-medium">&larr; V-1-2. RAG 프롬프트 설계</a>
              <a href="./V-2-1.html" className="text-rose-600 hover:text-rose-800 font-medium">V-2-1. Multi-turn RAG &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
