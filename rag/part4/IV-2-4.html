                <span className="text-[11px] font-bold text-slate-700">{PARENT_DOC.title}</span>
              </div>
              <span className={`text-[9px] font-mono ${showParent ? 'text-amber-700' : 'text-slate-400'}`}>
                {PARENT_DOC.tokens} tok
              </span>
            </div>

            {/* Child 트리 */}
            {showChildren && (
              <div className="ml-1 border-l-2 border-dashed border-slate-300 pl-2.5 space-y-1.5">
                {PARENT_DOC.children.map((c) => {
                  const isMatch = c.isMatch;
                  const highlight = searchActive && isMatch;
                  return (
                    <div
                      key={c.id}
                      className={`flex items-center gap-1.5 p-1.5 rounded transition-all duration-500 ${
                        highlight
                          ? 'bg-rose-200 border-2 border-rose-500 shadow scale-[1.02]'
                          : 'bg-slate-50 border border-slate-100'
                      }`}
                    >
                      <span
                        className={`text-[9px] font-bold px-1 py-0.5 rounded font-mono ${
                          highlight ? 'bg-rose-600 text-white' : 'bg-slate-200 text-slate-500'
                        }`}
                      >
                        {c.id}
                      </span>
                      <span className="text-[10px] text-slate-700 flex-1 leading-tight">{c.text}</span>
                      <span
                        className={`text-[9px] font-mono w-10 text-right ${
                          highlight ? 'text-rose-700 font-bold' : 'text-slate-400'
                        }`}
                      >
                        {c.score.toFixed(2)}
                      </span>
                      {highlight && (
                        <span className="text-[8px] bg-emerald-500 text-white px-1 rounded font-bold animate-pulse">
                          HIT
                        </span>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* parent_id 매핑 표시 */}
            {showMapping && (
              <div className="mt-2 pt-2 border-t border-dashed border-amber-300 text-[9px] font-mono text-amber-700">
                <span className="font-bold">↑ metadata["parent_id"] = "P3"</span> ← 모든 child 가 P3 와 연결
              </div>
            )}

            {/* 반환 — Parent 본문 */}
            {returnedTo === 'parent' && (
              <div className="mt-3 p-2.5 rounded-lg bg-amber-100 border-2 border-amber-400">
                <div className="flex items-center justify-between mb-1">
                  <div className="text-[9px] font-bold text-amber-800 uppercase tracking-wider">
                    📤 LLM 으로 반환 (Parent 1000 tok)
                  </div>
                  <span className="text-[8px] bg-amber-600 text-white px-1 rounded font-bold">
                    return
                  </span>
                </div>
                <div className="text-[10px] text-amber-900 leading-relaxed">
                  {PARENT_DOC.fullText}
                </div>
              </div>
            )}
          </div>

          {/* 반환 — Child 만 */}
          {returnedTo === 'child' && (
            <div className="mt-3 p-2.5 rounded-lg bg-blue-50 border-2 border-dashed border-blue-300">
              <div className="flex items-center justify-between mb-1">
                <div className="text-[9px] font-bold text-blue-700 uppercase tracking-wider">
                  📤 LLM 으로 반환 (Child 200 tok 만)
                </div>
                <span className="text-[8px] bg-red-500 text-white px-1 rounded font-bold animate-pulse">
                  context 부족
                </span>
              </div>
              <div className="text-[10px] text-blue-900 leading-tight font-mono">
                "3.2 OAuth2 비밀번호 인증 플로우 (/token 엔드포인트)"
              </div>
              <div className="text-[9px] text-red-600 mt-1.5 leading-snug">
                ⚠ 제목 한 줄뿐 — JWT 구조·만료·RBAC 정보 없음 → LLM 답변 빈약
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래 — 메트릭 / 비교 박스
    //   metric === 'childOnly' | 'parentOnly' | 'smallToBig' 일 때 단일 카드
    //   showCompare 일 때 3 전략 비교 막대 그래프
    // ─────────────────────────────────────────────────────
    function MetricCard({ data }) {
      const colorMap = {
        blue:    { bg: 'bg-blue-50',    border: 'border-blue-300',    text: 'text-blue-800',    bar: 'bg-blue-500' },
        amber:   { bg: 'bg-amber-50',   border: 'border-amber-300',   text: 'text-amber-800',   bar: 'bg-amber-500' },
        emerald: { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-800', bar: 'bg-emerald-500' },
      };
      const c = colorMap[data.color];
      const precPct = Math.round(data.precision * 100);
      const ctxPct  = Math.round(data.context  * 100);

      return (
        <div className={`${c.bg} border-2 ${c.border} rounded-lg p-3`}>
          <div className="flex items-center justify-between mb-2">
            <div className={`text-[11px] font-bold ${c.text}`}>📊 현재 전략 — {data.label}</div>
          </div>
          <div className="space-y-2">
            <div>
              <div className="flex justify-between text-[10px] mb-1">
                <span className={`${c.text} font-medium`}>검색 정밀도 (precision)</span>
                <span className={`${c.text} font-mono font-bold`}>{precPct}%</span>
              </div>
              <div className="w-full bg-white rounded-full h-2.5 border border-slate-200">
                <div
                  className={`${c.bar} h-2.5 rounded-full transition-all duration-700`}
                  style={{ width: `${precPct}%` }}
                />
              </div>
            </div>
            <div>
              <div className="flex justify-between text-[10px] mb-1">
                <span className={`${c.text} font-medium`}>context 풍부도 (richness)</span>
                <span className={`${c.text} font-mono font-bold`}>{ctxPct}%</span>
              </div>
              <div className="w-full bg-white rounded-full h-2.5 border border-slate-200">
                <div
                  className={`${c.bar} h-2.5 rounded-full transition-all duration-700`}
                  style={{ width: `${ctxPct}%` }}
                />
              </div>
            </div>
          </div>
        </div>
      );
    }

    function CompareTable() {
      const rows = [
        { label: 'Child 만',         color: 'blue',    prec: 92, ctx: 25, ans: '❌ 빈약' },
        { label: 'Parent 만',        color: 'amber',   prec: 55, ctx: 95, ans: '⚠ 노이즈' },
        { label: 'small-to-big', color: 'emerald', prec: 92, ctx: 95, ans: '✅ 완전' },
      ];
      const barColor = { blue: 'bg-blue-500', amber: 'bg-amber-500', emerald: 'bg-emerald-500' };

      return (
        <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">🏆</span>
            <span className="text-[11px] font-bold text-emerald-800">세 전략 비교</span>
          </div>
          <div className="space-y-2.5">
            {rows.map((r) => (
              <div key={r.label} className="bg-white rounded p-2 border border-emerald-100">
                <div className="flex items-center justify-between mb-1.5">
                  <span className="text-[10px] font-bold text-slate-700">{r.label}</span>
                  <span className="text-[9px] font-mono text-slate-500">답변 {r.ans}</span>
                </div>
                {/* precision */}
                <div className="flex items-center gap-1.5 mb-1">
                  <span className="text-[9px] text-slate-500 w-16">정밀도</span>
                  <div className="flex-1 bg-slate-100 rounded-full h-2 border border-slate-200">
                    <div
                      className={`${barColor[r.color]} h-2 rounded-full transition-all duration-700`}
                      style={{ width: `${r.prec}%` }}
                    />
                  </div>
                  <span className="text-[9px] font-mono font-bold text-slate-700 w-9 text-right">{r.prec}%</span>
                </div>
                {/* context */}
                <div className="flex items-center gap-1.5">
                  <span className="text-[9px] text-slate-500 w-16">context</span>
                  <div className="flex-1 bg-slate-100 rounded-full h-2 border border-slate-200">
                    <div
                      className={`${barColor[r.color]} h-2 rounded-full transition-all duration-700`}
                      style={{ width: `${r.ctx}%` }}
                    />
                  </div>
                  <span className="text-[9px] font-mono font-bold text-slate-700 w-9 text-right">{r.ctx}%</span>
                </div>
              </div>
            ))}
          </div>
          <div className="text-[9px] text-emerald-700 mt-2 leading-snug">
            ✨ Parent Document Retriever — 청크 크기 trade-off 자체를 회피
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🔍 small-to-big — child로 찾고 parent를 읽기</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <DocTree step={step} />
            {step.showCompare ? (
              <CompareTable />
            ) : step.metric ? (
              <MetricCard data={METRICS[step.metric]} />
            ) : (
              <div className="bg-slate-50 border border-dashed border-slate-300 rounded-lg p-3">
                <div className="text-[11px] font-bold text-slate-600 mb-1">🧩 매핑 구조</div>
                <div className="text-[10px] text-slate-600 leading-relaxed">
                  Child(C1·C2·C3·C4)는 모두 parent_id="P3"를 metadata에 갖는다.
                  VectorStore는 작은 chunk만 임베딩하고, DocStore(InMemoryStore)는 Parent 본문 KV를 보관한다.
                  검색은 VectorStore에서, 본문 fetch는 DocStore에서.
                </div>
              </div>
            )}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>query / hit
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>parent
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-blue-500"></span>child only
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>small-to-big
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-2-4</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Retrieval 고도화 &gt; Chapter 2. 검색 품질 개선</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-2-4. Parent Document Retriever — small-to-big 검색</h1>
                  <p className="text-sm text-slate-500 mt-0.5">작은 chunk 로 정확히 찾고, 큰 chunk 로 풍부하게 답하기</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: <strong>검색용 chunk</strong>와 <strong>전달용 chunk</strong>를 분리해 청크 크기 trade-off 자체를 회피한다. 다음(V-1-1)에서는 회수된 chunk 를 LLM 프롬프트에 어떻게 채워 넣을지(Context Stuffing)를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['ParentDocumentRetriever', 'small-to-big', 'child-splitter', 'parent-splitter', 'DocStore', 'parent_id'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-2-3.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; IV-2-3 Contextual Compression</a>
              <a href="../part5/V-1-1.html" className="text-rose-700 hover:text-rose-900 font-medium">V-1-1 Context Stuffing &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
