<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — IV-2-4. Parent Document Retriever</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PARENT_DOC = {
      id: 'P1',
      title: '3장. FastAPI 인증 시스템',
      children: [
        { id: 'C1', text: '3.1 JWT 토큰의 구조와 원리', isMatch: false },
        { id: 'C2', text: '3.2 OAuth2 비밀번호 인증 플로우', isMatch: true },
        { id: 'C3', text: '3.3 토큰 갱신과 만료 처리', isMatch: false },
        { id: 'C4', text: '3.4 역할 기반 접근 제어 (RBAC)', isMatch: false },
      ],
      fullText: '3장에서는 FastAPI의 인증 시스템을 다룹니다. JWT 토큰 구조, OAuth2 인증 플로우, 토큰 갱신/만료 처리, 역할 기반 접근 제어(RBAC)를 순서대로 설명합니다. 이 장의 모든 내용은 서로 연결되어 있어서 앞부분을 이해해야 뒷부분이 이해됩니다.',
    };

    const STEPS = [
      {
        desc: "Parent Document Retriever는 목차(작은 청크)로 검색하고, 해당 절(큰 청크)을 가져오는 전략입니다. 작은 청크는 검색 정밀도가 높고, 큰 청크는 문맥이 풍부합니다.",
        phase: 'intro',
      },
      {
        desc: "1단계: 문서를 큰 청크(Parent)와 작은 청크(Child)로 이중 분할합니다. Parent는 전체 절(1000토큰), Child는 개별 소절(200토큰). Child에 Parent ID를 기록합니다.",
        phase: 'split',
        code: 'from langchain.text_splitter import RecursiveCharacterTextSplitter\n\nparent_splitter = RecursiveCharacterTextSplitter(chunk_size=1000)\nchild_splitter = RecursiveCharacterTextSplitter(chunk_size=200)\n\n# Parent: 큰 덩어리 → DocStore에 저장\n# Child: 작은 조각 → VectorStore에 저장',
      },
      {
        desc: "2단계: Child 청크로 검색합니다. \"OAuth2 인증 방법\"을 검색하면 작은 청크(C2: OAuth2 비밀번호 인증 플로우)가 정확히 매칭됩니다. 작으니까 정밀도가 높습니다.",
        phase: 'search',
      },
      {
        desc: "3단계: 매칭된 Child의 Parent를 가져옵니다. C2가 속한 P1(3장. FastAPI 인증 시스템) 전체를 LLM에 전달합니다. JWT 구조, 토큰 갱신, RBAC까지 풍부한 문맥을 포함합니다.",
        phase: 'fetch_parent',
        code: 'from langchain.retrievers import ParentDocumentRetriever\nfrom langchain.storage import InMemoryStore\n\nstore = InMemoryStore()  # Parent 저장소\nretriever = ParentDocumentRetriever(\n    vectorstore=vectorstore,   # Child 검색용\n    docstore=store,            # Parent 저장용\n    child_splitter=child_splitter,\n    parent_splitter=parent_splitter,\n)',
      },
      {
        desc: "트레이드오프 정리 — 작은 청크는 검색 정밀도가 높지만 문맥이 부족합니다. 큰 청크는 문맥이 풍부하지만 노이즈가 섞입니다. Parent Document Retriever는 '작은 것으로 찾고, 큰 것을 전달'해서 양쪽 장점을 취합니다.",
        phase: 'tradeoff',
      },
    ];

    function DocDiagram({ phase }) {
      const showChildren = phase !== 'intro';
      const searchChild = phase === 'search' || phase === 'fetch_parent';
      const showParent = phase === 'fetch_parent' || phase === 'tradeoff';

      return (
        <div className="space-y-4">
          {/* Parent Document */}
          <div className={`p-4 rounded-xl border-2 transition-all duration-500 ${showParent ? 'border-orange-400 bg-orange-50 shadow-md' : 'border-slate-200 bg-white'}`}>
            <div className="flex items-center gap-2 mb-3">
              <span className={`text-xs font-bold px-2 py-0.5 rounded ${showParent ? 'bg-orange-200 text-orange-800' : 'bg-slate-100 text-slate-500'}`}>Parent</span>
              <span className="text-sm font-bold text-slate-700">{PARENT_DOC.title}</span>
            </div>

            {showChildren && (
              <div className="space-y-2 ml-4 border-l-2 border-slate-200 pl-3">
                {PARENT_DOC.children.map((child) => (
                  <div key={child.id} className={`flex items-center gap-2 p-2 rounded-lg transition-all duration-500 ${
                    searchChild && child.isMatch ? 'bg-orange-200 border-2 border-orange-500 shadow scale-105' :
                    'bg-slate-50 border border-slate-100'
                  }`}>
                    <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${
                      searchChild && child.isMatch ? 'bg-orange-600 text-white' : 'bg-slate-200 text-slate-500'
                    }`}>Child</span>
                    <span className="text-xs text-slate-700">{child.text}</span>
                    {searchChild && child.isMatch && (
                      <span className="text-[10px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-bold ml-auto">MATCH!</span>
                    )}
                  </div>
                ))}
              </div>
            )}

            {showParent && (
              <div className="mt-3 p-3 rounded-lg bg-orange-100 border border-orange-300">
                <div className="text-[10px] font-bold text-orange-700 uppercase mb-1">LLM에 전달되는 내용 (Parent 전체)</div>
                <div className="text-xs text-orange-800">{PARENT_DOC.fullText}</div>
              </div>
            )}
          </div>

          {/* 트레이드오프 비교 */}
          {phase === 'tradeoff' && (
            <div className="grid grid-cols-2 gap-3">
              <div className="p-3 rounded-lg bg-blue-50 border border-blue-200">
                <div className="text-xs font-bold text-blue-700 mb-1">작은 청크 (검색용)</div>
                <div className="text-[10px] text-blue-600 space-y-0.5">
                  <div>+ 검색 정밀도 높음</div>
                  <div>+ 노이즈 적음</div>
                  <div className="text-red-500">- 문맥 부족</div>
                </div>
              </div>
              <div className="p-3 rounded-lg bg-amber-50 border border-amber-200">
                <div className="text-xs font-bold text-amber-700 mb-1">큰 청크 (전달용)</div>
                <div className="text-[10px] text-amber-600 space-y-0.5">
                  <div>+ 풍부한 문맥</div>
                  <div>+ 연관 정보 포함</div>
                  <div className="text-red-500">- 노이즈 가능</div>
                </div>
              </div>
            </div>
          )}

          {phase === 'intro' && (
            <div className="flex flex-col items-center justify-center h-32 text-slate-400">
              <div className="text-3xl mb-2">Child로 찾고 → Parent를 전달</div>
              <div className="text-sm">검색 정밀도 + 풍부한 문맥</div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Retrieval 고도화 &gt; Chapter 2. 검색 품질 개선</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-2-4. Parent Document Retriever — 목차로 찾고 절을 읽기</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>목차(Child)</b>로 검색하고, 해당 <b>절(Parent)</b>을 가져옵니다. 작은 청크=높은 정밀도, 큰 청크=풍부한 문맥. 둘 다 취합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">Parent Document Retriever 동작</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <DocDiagram phase={s.phase} />
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.code ? (
                  <>
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">코드</div>
                    <pre className="bg-slate-900 text-green-300 p-4 rounded-lg text-xs leading-relaxed overflow-x-auto whitespace-pre-wrap">{s.code}</pre>
                  </>
                ) : (
                  <div className="space-y-4">
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">Parent Document Retriever 핵심</div>
                    <div className="p-4 rounded-lg bg-orange-50 border border-orange-200">
                      <div className="font-bold text-sm text-orange-800 mb-2">핵심 아이디어</div>
                      <ul className="text-xs text-orange-700 space-y-1">
                        <li>- 검색은 작은 청크(Child)로</li>
                        <li>- 전달은 큰 청크(Parent)로</li>
                        <li>- Child에 Parent ID를 기록해서 연결</li>
                      </ul>
                    </div>
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">청크 크기 가이드</div>
                      <div className="space-y-2">
                        <div className="flex justify-between text-xs text-slate-600">
                          <span>Parent (큰 청크)</span>
                          <span className="font-mono">800~2000 토큰</span>
                        </div>
                        <div className="w-full bg-slate-200 rounded-full h-3">
                          <div className="bg-orange-500 h-3 rounded-full" style={{width: '80%'}} />
                        </div>
                        <div className="flex justify-between text-xs text-slate-600">
                          <span>Child (작은 청크)</span>
                          <span className="font-mono">100~400 토큰</span>
                        </div>
                        <div className="w-full bg-slate-200 rounded-full h-3">
                          <div className="bg-blue-500 h-3 rounded-full" style={{width: '25%'}} />
                        </div>
                      </div>
                    </div>
                    <div className="p-4 rounded-lg bg-emerald-50 border border-emerald-200">
                      <div className="font-bold text-sm text-emerald-800 mb-2">언제 사용하나?</div>
                      <ul className="text-xs text-emerald-700 space-y-1">
                        <li>- 긴 문서에서 정밀 검색이 필요할 때</li>
                        <li>- 문맥이 중요한 도메인 (법률, 기술 문서)</li>
                        <li>- 챕터/절 구조가 있는 문서</li>
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Parent Document', 'Child Chunk', 'Multi-level Splitting', 'DocStore', 'Precision + Context'].map(kw => (
                <span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./IV-2-3.html" className="text-orange-600 hover:text-orange-800 font-medium">&larr; IV-2-3. Contextual Compression</a>
              <a href="../part5/V-1-1.html" className="text-orange-600 hover:text-orange-800 font-medium">V-1-1. Context Stuffing &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
