<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — IV-1-2. Sparse Retrieval (BM25)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TERMS = [
      { word: 'the', tf: 15, df: 950, idf: 0.02, tfidf: 0.30, color: 'bg-slate-200' },
      { word: 'machine', tf: 8, df: 120, idf: 0.92, tfidf: 7.36, color: 'bg-amber-200' },
      { word: 'learning', tf: 6, df: 100, idf: 1.00, tfidf: 6.00, color: 'bg-amber-300' },
      { word: 'XGBoost', tf: 3, df: 5, idf: 2.30, tfidf: 6.90, color: 'bg-orange-400' },
      { word: 'hyperparameter', tf: 2, df: 8, idf: 2.10, tfidf: 4.20, color: 'bg-orange-300' },
    ];

    const INVERTED_INDEX = {
      'XGBoost': ['D3', 'D7', 'D12'],
      'hyperparameter': ['D3', 'D5', 'D7', 'D12', 'D15'],
      'machine': ['D1', 'D3', 'D5', 'D7', 'D8', 'D10', 'D12'],
      'learning': ['D1', 'D3', 'D5', 'D7', 'D8', 'D10', 'D12', 'D15'],
    };

    const STEPS = [
      {
        desc: "Sparse Retrieval은 책 뒤의 색인(index)으로 찾는 사서입니다. 단어의 빈도와 희소성을 계산해서 중요도를 매깁니다. \"the\"는 어디에나 있으니 점수가 낮고, \"XGBoost\"는 드물게 나타나니 점수가 높습니다.",
        phase: 'intro',
      },
      {
        desc: "1단계: 역색인(Inverted Index) — 책 뒤의 색인처럼, 각 단어가 어떤 문서에 등장하는지 미리 매핑합니다. 'XGBoost'는 3개 문서에만, 'learning'은 8개 문서에 나타납니다.",
        phase: 'inverted_index',
      },
      {
        desc: "2단계: TF (Term Frequency) — 해당 문서에서 단어가 몇 번 등장하는지. 많이 등장할수록 그 문서가 해당 주제를 다룰 가능성이 높습니다.",
        phase: 'tf',
        code: 'TF(t, d) = 해당 문서에서 단어 t의 등장 횟수\n\n예시 (문서 D3):\n  "the"          → TF = 15  (자주 등장하지만...)\n  "XGBoost"      → TF = 3   (적지만 중요!)',
      },
      {
        desc: "3단계: IDF (Inverse Document Frequency) — 전체 문서에서 얼마나 드문 단어인지. \"the\"는 거의 모든 문서에 있으니 IDF가 낮고, \"XGBoost\"는 5개 문서에만 있으니 IDF가 높습니다.",
        phase: 'idf',
        code: 'IDF(t) = log(전체 문서 수 / 단어 t가 등장한 문서 수)\n\n"the"       → log(1000/950) = 0.02  (흔한 단어)\n"XGBoost"   → log(1000/5)   = 2.30  (희소한 단어)',
      },
      {
        desc: "4단계: BM25 스코어 — TF와 IDF를 결합하되, 문서 길이를 보정합니다. 긴 문서에서 TF가 높은 건 당연하니까요. BM25는 TF-IDF의 실전 업그레이드 버전입니다.",
        phase: 'bm25',
        code: 'BM25(q, d) = sum(\n  IDF(t) * (TF(t,d) * (k1 + 1))\n          / (TF(t,d) + k1 * (1 - b + b * |d|/avgdl))\n)\n\nk1 = 1.5  # TF 포화 파라미터\nb  = 0.75 # 문서 길이 보정\navgdl = 평균 문서 길이',
      },
    ];

    function TFIDFChart({ phase }) {
      const barMaxWidth = 180;
      const maxScore = 7.5;
      return (
        <div className="space-y-3">
          {TERMS.map((t, i) => {
            const showTF = phase === 'tf' || phase === 'idf' || phase === 'bm25';
            const showIDF = phase === 'idf' || phase === 'bm25';
            const showScore = phase === 'bm25';
            const score = showScore ? t.tfidf : showIDF ? t.idf : showTF ? t.tf : 0;
            const maxVal = showScore ? maxScore : showIDF ? 2.5 : 15;
            const width = Math.min((score / maxVal) * barMaxWidth, barMaxWidth);
            return (
              <div key={t.word} className="flex items-center gap-3">
                <div className="w-28 text-right">
                  <span className={`inline-block px-2 py-0.5 rounded text-xs font-mono font-bold ${t.color}`}>{t.word}</span>
                </div>
                <div className="flex-1 flex items-center gap-2">
                  <div className="w-48 bg-slate-100 rounded-full h-5 overflow-hidden">
                    <div className="h-full bg-orange-500 rounded-full transition-all duration-700"
                      style={{ width: phase === 'intro' || phase === 'inverted_index' ? 0 : `${width}px` }} />
                  </div>
                  <span className="text-xs text-slate-600 font-mono w-16">
                    {showScore ? `${t.tfidf}` : showIDF ? `IDF ${t.idf}` : showTF ? `TF ${t.tf}` : ''}
                  </span>
                </div>
              </div>
            );
          })}
          <div className="text-xs text-slate-500 text-center mt-2">
            {phase === 'tf' && '← TF: 문서 내 등장 빈도'}
            {phase === 'idf' && '← IDF: 전체 문서 중 희소성'}
            {phase === 'bm25' && '← BM25 최종 스코어 (TF * IDF + 길이 보정)'}
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Retrieval 고도화 &gt; Chapter 1. 검색 전략</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-1-2. Sparse Retrieval (BM25) — 키워드 기반 검색</h1>
                </div>
              </div>
              <p className="text-slate-600">책 뒤의 <b>색인(index)</b>으로 찾기. 단어의 빈도(TF)와 희소성(IDF)으로 중요도를 계산합니다. "the"는 0.02점, "XGBoost"는 2.30점.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">BM25 스코어링 과정</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.phase === 'inverted_index' ? (
                  <div>
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">역색인 (Inverted Index)</div>
                    <div className="space-y-2">
                      {Object.entries(INVERTED_INDEX).map(([word, docs]) => (
                        <div key={word} className="flex items-start gap-3 p-2 rounded-lg bg-slate-50 border border-slate-100">
                          <span className="font-mono text-xs font-bold text-orange-700 w-28 shrink-0 bg-orange-50 px-2 py-1 rounded">{word}</span>
                          <div className="flex flex-wrap gap-1">
                            {docs.map(d => (
                              <span key={d} className="text-[10px] bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded">{d}</span>
                            ))}
                          </div>
                          <span className="text-[10px] text-slate-400 shrink-0">{docs.length}개</span>
                        </div>
                      ))}
                    </div>
                    <div className="mt-3 text-xs text-slate-500 text-center">단어 → 등장하는 문서 목록</div>
                  </div>
                ) : (
                  <div>
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">
                      {s.phase === 'intro' ? '단어별 중요도' : s.phase === 'tf' ? 'TF (Term Frequency)' : s.phase === 'idf' ? 'IDF (Inverse Document Frequency)' : 'BM25 스코어'}
                    </div>
                    <TFIDFChart phase={s.phase} />
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.code ? (
                  <>
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">코드 / 공식</div>
                    <pre className="bg-slate-900 text-green-300 p-4 rounded-lg text-xs leading-relaxed overflow-x-auto whitespace-pre-wrap">{s.code}</pre>
                  </>
                ) : (
                  <div className="space-y-4">
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">Sparse Retrieval 핵심</div>
                    <div className="p-4 rounded-lg bg-orange-50 border border-orange-200">
                      <div className="font-bold text-sm text-orange-800 mb-2">키워드 기반 검색</div>
                      <ul className="text-xs text-orange-700 space-y-1">
                        <li>- 정확한 단어 매칭으로 검색</li>
                        <li>- 역색인으로 빠른 조회</li>
                        <li>- TF-IDF / BM25로 중요도 계산</li>
                      </ul>
                    </div>
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">장점 vs 한계</div>
                      <div className="grid grid-cols-2 gap-2 text-xs">
                        <div className="text-emerald-700">+ 고유명사/약어에 강함</div>
                        <div className="text-red-600">- 동의어 처리 불가</div>
                        <div className="text-emerald-700">+ 해석 가능 (왜 이 문서?)</div>
                        <div className="text-red-600">- 의미적 유사도 무시</div>
                        <div className="text-emerald-700">+ 학습 불필요</div>
                        <div className="text-red-600">- 타이핑 오류에 취약</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['BM25', 'TF-IDF', 'Inverted Index', 'Sparse Vector', 'Keyword Search'].map(kw => (
                <span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./IV-1-1.html" className="text-orange-600 hover:text-orange-800 font-medium">&larr; IV-1-1. Dense Retrieval</a>
              <a href="./IV-1-3.html" className="text-orange-600 hover:text-orange-800 font-medium">IV-1-3. Hybrid Search &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
