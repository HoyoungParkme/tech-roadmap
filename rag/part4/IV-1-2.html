  <!--
    IV-1-2. Sparse Retrieval (BM25) — 키워드 기반 검색
    학습 목표: TF-IDF에서 BM25로 발전한 키워드 검색의 점수 계산을 단계별로 이해하고
              Dense Retrieval과의 보완 관계를 파악한다.
    핵심 비유: 책 뒤의 색인(index) — 단어 빈도와 희소성으로 중요도 매기기
    패턴: fastapi v1 — 좌(LiveDataPane: 단어 빈도 표 + BM25 점수 시각화) / 우(VSCode CodeViewer)
    색상: rag rose
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 검색 시나리오 — query: "machine learning XGBoost"
    //   문서 D3 안에서 각 query 단어의 점수를 단계별로 계산
    // ─────────────────────────────────────────────────────
    //   word     : query 단어
    //   tf       : D3 문서 안 등장 빈도
    //   df       : 전체 1000개 문서 중 등장 문서 수
    //   idf      : log(N/df) — 희소성
    //   tfidf    : tf * idf — Step 1
    //   bm25     : BM25 공식 결과 — Step 2 (saturation, length norm 적용)
    //   colorBar : 시각화 색상
    // ─────────────────────────────────────────────────────
    const QUERY = 'machine learning XGBoost';

    const TERMS_BASE = [
      { word: 'the',         tf: 15, df: 950, idf: 0.02, tfidf: 0.30, bm25: 0.04, color: 'bg-slate-200',  text: 'text-slate-700' },
      { word: 'machine',     tf: 8,  df: 120, idf: 0.92, tfidf: 7.36, bm25: 2.45, color: 'bg-rose-200',   text: 'text-rose-800' },
      { word: 'learning',    tf: 6,  df: 100, idf: 1.00, tfidf: 6.00, bm25: 2.36, color: 'bg-rose-300',   text: 'text-rose-900' },
      { word: 'XGBoost',     tf: 3,  df: 5,   idf: 2.30, tfidf: 6.90, bm25: 4.18, color: 'bg-rose-500',   text: 'text-white' },
    ];

    // ─────────────────────────────────────────────────────
    // 5 STEPS 시나리오
    // ─────────────────────────────────────────────────────
    //   Step 1: TF-IDF — 단어 빈도 × 역문서빈도
    //   Step 2: BM25 — saturation + length norm
    //   Step 3: 정확 키워드 매칭 강함 — query D3에서 hit
    //   Step 4: 한계 — 동의어/오타 (synonym = "ML", typo = "machne")
    //   Step 5: Dense vs Sparse — 보완 관계 (Hybrid)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. TF-IDF — 단어 빈도 × 역문서 빈도',
        desc: '책 뒤의 색인을 가진 사서를 떠올려라. 단어가 그 문서에 자주 나오면(TF) 관련성이 높고, 모든 책에 다 있는 단어("the")는 변별력이 없다(낮은 IDF). 두 값을 곱한 TF-IDF가 50년대부터 검색의 기본 점수다. "the"는 0.30점인데 "XGBoost"는 6.90점 — 등장 횟수(3회)는 적지만 희소해서 더 중요하다.',
        phase: 'tfidf',
        terms: TERMS_BASE.map(t => ({ ...t, score: t.tfidf, label: `${t.tfidf.toFixed(2)}` })),
        scoreLabel: 'TF·IDF',
        scoreMax: 7.5,
        formula: { name: 'TF-IDF', body: 'score(t,d) = TF(t,d) × IDF(t)\nIDF(t) = log(N / df(t))' },
        compare: null,
        code: {
          lang: 'python',
          filename: 'tf-idf.py',
          lines: [
            '"""TF-IDF 점수 계산 — 가장 고전적인 키워드 검색"""',
            'import math',
            'from collections import Counter',
            '',
            '# 코퍼스: 1000개 문서, query = "machine learning XGBoost"',
            'N = 1000',
            'query = "machine learning XGBoost".split()',
            '',
            '# 문서 D3 안 단어 빈도 (TF)',
            'doc_d3 = Counter({',
            '    "the": 15,',
            '    "machine": 8,',
            '    "learning": 6,',
            '    "XGBoost": 3,',
            '})',
            '',
            '# 단어별 등장 문서 수 (DF) — 색인에서 미리 계산',
            'df = {"the": 950, "machine": 120, "learning": 100, "XGBoost": 5}',
            '',
            'def tf_idf_score(query, doc, df, N):',
            '    """질의 단어 각각의 TF·IDF 합산 — 문서 d 의 점수"""',
            '    score = 0.0',
            '    for term in query:',
            '        tf = doc[term]',
            '        idf = math.log(N / df[term])',
            '        score += tf * idf',
            '    return score',
            '',
            'print(tf_idf_score(query, doc_d3, df, N))',
            '#  → machine: 8 × 0.92 = 7.36',
            '#  → learning: 6 × 1.00 = 6.00',

            '# → 다음 단계: BM25 가 이 두 한계를 동시에 해결',

            { aspect: '대표 라이브러리', sparse: 'Elasticsearch, BM25',  dense: 'FAISS, Pinecone, Qdrant' },
          ],
        },
        code: {
          lang: 'markdown',
          filename: 'compare.md',
          lines: [
            '# Sparse vs Dense vs Hybrid — 실무 선택 가이드',
            '',
            '## TL;DR',
            '',
            '| 상황 | 추천 |',
            '|---|---|',
            '| 코드/로그/에러 검색 | Sparse (BM25) |',
            '| FAQ 챗봇 (자연어) | Dense |',
            '| 일반 RAG (보편) | **Hybrid** |',
            '| 신규 도메인 즉시 시작 | Sparse → 데이터 모이면 Hybrid |',
            '',
            '## Sparse (BM25) — Strength',
            '',
            '- 정확 토큰 매칭 (제품명, 버전, 약어, 코드 식별자)',
            '- 역색인 → 100만 문서도 ms 응답',
            '- 학습 데이터 0건으로 즉시 시작',
            '- 결과 설명 가능 ("XGBoost" 단어가 매칭되어서)',
            '',
            '## Sparse (BM25) — Weakness',
            '',
            '- 동의어 (ML ↔ machine learning) — 0점',
            '- 오타 (machne ↔ machine) — 0점',
            '- 의역 / 자연어 질의 — 약함',
            '- 다국어 cross-lingual — 불가',
            '',
            '## Dense — Strength',
            '',
            '- 의미적 유사도 ("자동차 가격" ≈ "차량 시세")',
            '- 자연어 질의 친화 ("어떻게 올려?" 같은 표현)',
            '- 다국어 (multilingual embedding 시)',
            '- 오타 어느 정도 흡수',
            '',
            '## Hybrid — Best of Both',
            '',
            '```python',
            '# 가중합 방식',
            'final = 0.5 * bm25_score + 0.5 * dense_score',
            '',
            '# RRF 방식 (Elastic 8.9+ 기본 추천)',
            'final = sum(1 / (60 + rank_i) for each retriever)',
            '```',
            '',
            '## 산업 사례',
            '',
            '- **GitHub Code Search**: BM25 (코드 식별자 정확 매칭)',
            '- **Google Search**: Hybrid (BM25 + neural ranking)',
            '- **OpenAI Assistants**: Hybrid (file_search 내부)',
            '- **Notion AI**: Hybrid (Sparse 우선 + Dense rerank)',
            '',
            '## 다음 단계',
            '',
            '→ IV-1-3 에서 Hybrid Search 구현 패턴',
            '→ IV-1-4 에서 RRF / Reranker 모델 적용',
          ],
          highlight: [1, 3, 5, 6, 7, 8, 9, 12, 14, 15, 16, 17, 28, 29, 30, 31, 32, 34, 36, 37, 38, 39, 40, 41, 42, 43, 51, 52, 53],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 위: 단어 빈도 / 점수 막대 표
    //   phase 가 tfidf · bm25 · exact 일 때 단어별 점수 막대 시각화
    //   - 각 row: word | TF / DF / IDF 메타 | 점수 막대 | 점수 값
    // ─────────────────────────────────────────────────────
    function ScoreTable({ terms, scoreLabel, scoreMax, phase }) {
      if (!terms) return null;
      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📊</span>
              <span className="text-[11px] font-bold text-rose-800">단어별 {scoreLabel} 점수 (문서 D3)</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">
              N=1000 docs
            </span>
          </div>

          {/* 헤더 */}
          <div className="flex items-center gap-2 text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1.5 border-b border-slate-200 pb-1">
            <span className="w-20">word</span>
            <span className="w-10 text-right">TF</span>
            <span className="w-10 text-right">DF</span>
            <span className="w-12 text-right">IDF</span>
            <span className="flex-1 text-center">{scoreLabel}</span>
            <span className="w-10 text-right">score</span>
          </div>

          {/* 행 */}
          <div className="space-y-1.5">
            {terms.map((t) => {
              const widthPct = Math.min((t.score / scoreMax) * 100, 100);
              return (
                <div key={t.word} className="flex items-center gap-2 text-[10px] font-mono">
                  <span className={`w-20 px-1.5 py-0.5 rounded font-bold ${t.color} ${t.text} text-center`}>
                    {t.word}
                  </span>
                  <span className="w-10 text-right text-slate-700">{t.tf}</span>
                  <span className="w-10 text-right text-slate-500">{t.df}</span>
                  <span className="w-12 text-right text-rose-600 font-bold">{t.idf.toFixed(2)}</span>
                  <div className="flex-1 bg-slate-100 rounded h-4 overflow-hidden border border-slate-200">
                    <div
                      className="h-full bg-gradient-to-r from-rose-400 to-rose-600 rounded transition-all duration-700 flex items-center justify-end pr-1"
                      style={{ width: `${widthPct}%` }}
                    >
                      {widthPct > 25 && (
                        <span className="text-[9px] text-white font-bold">{t.label}</span>
                      )}
                    </div>
                  </div>
                  <span className="w-10 text-right text-rose-700 font-bold">{t.label}</span>
                </div>
              );
            })}
          </div>

          {/* 인사이트 */}
          <div className="mt-3 pt-2 border-t border-slate-100 text-[9px] text-slate-600 leading-snug">
            {phase === 'tfidf' && (
              <>
                <span className="font-bold text-rose-700">▶ 인사이트:</span> "the"는 TF=15로 가장 많이 등장하지만, IDF=0.02라 점수는 0.30. "XGBoost"는 TF=3뿐이지만 IDF=2.30이라 점수 6.90 — <b>희소성이 빈도를 이긴다</b>.
              </>
            )}
            {phase === 'bm25' && (
              <>
                <span className="font-bold text-rose-700">▶ saturation 효과:</span> "machine"(TF=8) vs "XGBoost"(TF=3) — TF-IDF는 7.36 vs 6.90이었지만 BM25는 2.45 vs 4.18로 역전. TF가 큰 쪽이 분모로 더 깎인다.
              </>
            )}
            {phase === 'exact' && (
              <>
                <span className="font-bold text-rose-700">▶ 정확 매칭의 위력:</span> 토큰만 일치하면 무조건 hit. 임베딩 모델이 학습 못 한 신조어도 BM25는 즉시 검색 가능.
              </>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: 비교 박스 — phase 별로 다른 시각화
    //   - exact_match : query → 4개 문서 hit 표
    //   - synonym_fail: BM25 vs Dense 점수 비교 (실패 케이스)
    //   - compare     : Sparse vs Dense 표
    // ─────────────────────────────────────────────────────
    function CompareBox({ compare, formula }) {
      if (!compare && !formula) return null;

      // ── 공식 박스 (Step 1, 2, 5)
      if (formula && !compare) {
        return (
          <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">📐</span>
              <span className="text-[11px] font-bold text-rose-800">{formula.name} 공식</span>
            </div>
            <pre className="bg-white text-rose-900 p-3 rounded border border-rose-200 text-[10px] font-mono leading-relaxed whitespace-pre overflow-x-auto">{formula.body}</pre>
          </div>
        );
      }

      // ── 정확 매칭 데모
      if (compare.kind === 'exact_match') {
        return (
          <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">🎯</span>
                <span className="text-[11px] font-bold text-rose-800">정확 키워드 매칭 (BM25 hit)</span>
              </div>
              <span className="text-[9px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                top-4
              </span>
            </div>

            {/* 쿼리 */}
            <div className="bg-white rounded border border-rose-200 p-2 mb-2">
              <div className="text-[9px] font-bold text-rose-700 mb-0.5 uppercase tracking-wider">query</div>
              <div className="text-[11px] text-rose-900 font-mono">"{compare.query}"</div>
            </div>

            {/* 문서별 hit */}
            <div className="space-y-1.5">
              {compare.docs.map((d) => {
                const isTop = d.rank === 1;
                return (
                  <div key={d.id} className={`flex items-start gap-2 p-1.5 rounded border ${isTop ? 'bg-rose-100 border-rose-400' : 'bg-white border-slate-200'}`}>
                    <span className={`text-[9px] font-mono font-bold w-7 text-center px-1 py-0.5 rounded ${isTop ? 'bg-rose-600 text-white' : 'bg-slate-200 text-slate-600'}`}>
                      #{d.rank}
                    </span>
                    <span className="text-[9px] font-mono font-bold w-6 text-rose-700">{d.id}</span>
                    <div className="flex-1">
                      <div className="text-[10px] text-slate-700 leading-tight">
                        {d.text.split(' ').map((w, i) => {
                          const hit = d.hits.includes(w);
                          return (
                            <span key={i} className={hit ? 'bg-yellow-300 text-rose-900 font-bold px-0.5 rounded' : ''}>
                              {w}{' '}
                            </span>
                          );
                        })}
                      </div>
                      <div className="text-[8px] text-slate-500 mt-0.5">
                        hit: {d.hits.length > 0 ? d.hits.join(', ') : '(없음)'}
                      </div>
                    </div>
                    <span className={`text-[10px] font-mono font-bold w-12 text-right ${isTop ? 'text-rose-700' : 'text-slate-500'}`}>
                      {d.score.toFixed(2)}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      // ── 실패 케이스 (BM25 0점 vs Dense)
      if (compare.kind === 'synonym_fail') {
        return (
          <div className="bg-red-50 border-2 border-red-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">🚫</span>
              <span className="text-[11px] font-bold text-red-700">BM25 실패 케이스 — Dense는 잡는다</span>
            </div>

            <div className="space-y-1.5">
              {compare.cases.map((c, i) => (
                <div key={i} className="bg-white rounded border border-red-200 p-2">
                  <div className="flex items-center gap-1 mb-1">
                    <span className="text-[8px] bg-red-600 text-white px-1 py-0.5 rounded font-bold">FAIL</span>
                    <span className="text-[9px] text-red-700 italic">{c.reason}</span>
                  </div>
                  <div className="grid grid-cols-2 gap-1.5">
                    <div className="bg-slate-50 rounded p-1.5 border border-slate-200">
                      <div className="text-[8px] font-bold text-slate-500 uppercase mb-0.5">query</div>
                      <div className="text-[10px] font-mono text-slate-800">"{c.query}"</div>
                    </div>
                    <div className="bg-slate-50 rounded p-1.5 border border-slate-200">
                      <div className="text-[8px] font-bold text-slate-500 uppercase mb-0.5">document</div>
                      <div className="text-[10px] font-mono text-slate-800">"{c.doc}"</div>
                    </div>
                  </div>
                  <div className="flex items-center gap-3 mt-1.5 text-[10px] font-mono">
                    <span className="flex-1 flex items-center gap-1">
                      <span className="text-red-700 font-bold">BM25:</span>
                      <span className="bg-red-200 text-red-900 px-1.5 py-0.5 rounded font-bold">{c.bm25.toFixed(2)}</span>
                    </span>
                    <span className="flex-1 flex items-center gap-1">
                      <span className="text-emerald-700 font-bold">Dense:</span>
                      <span className="bg-emerald-200 text-emerald-900 px-1.5 py-0.5 rounded font-bold">{c.dense.toFixed(2)}</span>
                    </span>
                  </div>
                </div>
              ))}
            </div>
            <div className="mt-2 pt-2 border-t border-red-200 text-[9px] text-red-700 leading-snug">
              <span className="font-bold">▶ 결론:</span> BM25는 토큰 매칭이라 동의어·오타·의역에 모두 무력. Dense Retrieval(임베딩)이 보완.
            </div>
          </div>
        );
      }

      // ── Sparse vs Dense 비교 표
      if (compare.kind === 'compare') {
        return (
          <div className="bg-gradient-to-br from-rose-50 to-emerald-50 border-2 border-rose-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">⚖</span>
              <span className="text-[11px] font-bold text-slate-800">Sparse vs Dense — 보완 관계</span>
            </div>

            <div className="bg-white rounded border border-slate-200 overflow-hidden">
              <div className="grid grid-cols-12 text-[9px] font-bold uppercase tracking-wider bg-slate-100 border-b border-slate-200">
                <div className="col-span-4 px-2 py-1 text-slate-600">aspect</div>
                <div className="col-span-4 px-2 py-1 text-rose-700 border-l border-slate-200">Sparse (BM25)</div>
                <div className="col-span-4 px-2 py-1 text-emerald-700 border-l border-slate-200">Dense (Embedding)</div>
              </div>
              {compare.rows.map((r, i) => (
                <div key={i} className={`grid grid-cols-12 text-[9px] ${i % 2 ? 'bg-slate-50' : 'bg-white'} border-b border-slate-100 last:border-b-0`}>
                  <div className="col-span-4 px-2 py-1.5 font-bold text-slate-700">{r.aspect}</div>
                  <div className="col-span-4 px-2 py-1.5 text-rose-800 border-l border-slate-200 font-mono">{r.sparse}</div>
                  <div className="col-span-4 px-2 py-1.5 text-emerald-800 border-l border-slate-200 font-mono">{r.dense}</div>
                </div>
              ))}
            </div>

            <div className="mt-2 bg-gradient-to-r from-rose-100 to-emerald-100 rounded border-2 border-dashed border-purple-400 p-2 text-center">
              <div className="text-[10px] font-bold text-purple-800">
                💡 <span className="text-rose-700">Sparse</span> + <span className="text-emerald-700">Dense</span> = <span className="text-purple-700">Hybrid Search</span> (다음 강 IV-1-3)
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 점수 표 (Step 1, 2, 3) / 하단: 비교 박스 (전 step)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 BM25 스코어링 시뮬레이션</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            {step.terms && (
              <ScoreTable
                terms={step.terms}
                scoreLabel={step.scoreLabel}
                scoreMax={step.scoreMax}
                phase={step.phase}
              />
            )}
            <CompareBox compare={step.compare} formula={step.formula} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>BM25 점수
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-yellow-300"></span>매칭 단어
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-red-500"></span>BM25 fail
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>Dense 점수
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 4 버튼 컨트롤 + 키보드 + 3000ms 자동재생
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Retrieval 고도화 &gt; Chapter 1. 검색 전략</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-1-2. Sparse Retrieval (BM25) — 키워드 기반 검색</h1>
                  <p className="text-sm text-slate-500 mt-0.5">책 뒤의 색인으로 찾기 — TF·IDF → BM25 → Dense 보완</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: <strong>Sparse(BM25)</strong>는 정확 토큰·고유명사·코드에 강하고, <strong>Dense</strong>는 동의어·오타·자연어에 강하다. 둘을 RRF/가중합으로 섞은 <strong>Hybrid</strong>가 산업 표준 — 다음 IV-1-3에서 구현 패턴을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['BM25', 'TF-IDF', 'Inverted Index', 'Sparse Vector', 'Keyword Search', 'Hybrid'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-1-1.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; IV-1-1. Dense Retrieval</a>
              <a href="./IV-1-3.html" className="text-rose-700 hover:text-rose-900 font-medium">IV-1-3. Hybrid Search &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
