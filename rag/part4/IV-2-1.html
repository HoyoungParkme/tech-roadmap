<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — IV-2-1. Re-ranking</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const INITIAL_RESULTS = [
      { id: 'D1', title: 'Python 설치 가이드', biScore: 0.89, crossScore: 0.35, relevance: 'low' },
      { id: 'D2', title: 'FastAPI 성능 최적화', biScore: 0.85, crossScore: 0.92, relevance: 'high' },
      { id: 'D3', title: 'Django vs FastAPI 비교', biScore: 0.82, crossScore: 0.78, relevance: 'mid' },
      { id: 'D4', title: 'FastAPI 비동기 처리 패턴', biScore: 0.80, crossScore: 0.88, relevance: 'high' },
      { id: 'D5', title: 'Flask 마이그레이션', biScore: 0.78, crossScore: 0.25, relevance: 'low' },
    ];

    const RERANKED = [...INITIAL_RESULTS].sort((a, b) => b.crossScore - a.crossScore);

    const STEPS = [
      {
        desc: "Re-ranking은 서류 심사 2단계입니다. 1차(Bi-Encoder)로 빠르게 후보를 추리고, 2차(Cross-Encoder)로 정밀하게 재평가합니다. 1차에서 놓친 보석을 2차에서 발견합니다.",
        phase: 'intro',
      },
      {
        desc: "1단계: Bi-Encoder 검색 (1차 심사) — 쿼리와 문서를 각각 독립적으로 벡터화한 후 유사도 계산. 빠르지만, 쿼리-문서 간 상호작용을 놓칩니다.",
        phase: 'bi_encoder',
        code: '# Bi-Encoder: 빠른 1차 검색 (독립 인코딩)\nquery_vec = model.encode("FastAPI 성능 개선 방법")\ndoc_vecs = [model.encode(doc) for doc in docs]\nscores = cosine_similarity(query_vec, doc_vecs)\ntop_20 = sorted(scores, reverse=True)[:20]',
      },
      {
        desc: "2단계: 1차 결과를 봅니다. D1(Python 설치)이 1위? 단어 유사도는 높지만 실제로 관련성은 낮습니다. D2(성능 최적화)가 더 관련 있는데 2위에 머물러 있습니다.",
        phase: 'initial_rank',
      },
      {
        desc: "3단계: Cross-Encoder 재평가 (2차 면접) — 쿼리와 문서를 한 쌍으로 묶어서 동시에 입력합니다. \"FastAPI 성능 개선\"과 각 문서를 직접 비교하니 관련성을 정밀하게 판단합니다.",
        phase: 'cross_encoder',
        code: '# Cross-Encoder: 정밀 2차 평가 (쌍 입력)\nfrom sentence_transformers import CrossEncoder\nmodel = CrossEncoder("cross-encoder/ms-marco-MiniLM-L-6-v2")\n\npairs = [(query, doc) for doc in top_20_docs]\nscores = model.predict(pairs)\n# D2: 0.92, D4: 0.88, D3: 0.78, D1: 0.35, D5: 0.25',
      },
      {
        desc: "4단계: 순위 변동 확인 — D2(성능 최적화)가 2위→1위로! D4(비동기 처리)도 4위→2위로 올라갑니다. 반면 D1(Python 설치), D5(Flask)는 아래로 내려갑니다.",
        phase: 'reranked',
      },
      {
        desc: "Re-ranking 정리 — Bi-Encoder(빠르고 넓게)로 후보 추출, Cross-Encoder(느리지만 정밀하게)로 재정렬. 실무에서는 Top-20~50을 1차로 뽑고, 그 중 Top-5를 2차로 정밀 평가합니다.",
        phase: 'summary',
      },
    ];

    function RankComparison({ phase }) {
      const showInitial = phase === 'initial_rank' || phase === 'bi_encoder';
      const showReranked = phase === 'reranked' || phase === 'summary';
      const showBoth = phase === 'cross_encoder';

      return (
        <div className="space-y-3">
          {(showInitial || showBoth) && (
            <div>
              <div className="text-xs font-bold text-blue-600 mb-2">1차 순위 (Bi-Encoder)</div>
              <div className="space-y-1.5">
                {INITIAL_RESULTS.map((r, i) => (
                  <div key={r.id} className={`flex items-center gap-2 p-2 rounded text-xs ${r.relevance === 'high' ? 'bg-emerald-50 border border-emerald-200' : r.relevance === 'low' ? 'bg-red-50 border border-red-200' : 'bg-slate-50 border border-slate-100'}`}>
                    <span className="w-5 h-5 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center font-bold text-[10px]">{i + 1}</span>
                    <span className="flex-1 font-medium text-slate-700">{r.title}</span>
                    <span className="font-mono text-slate-500">{r.biScore}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {showReranked && (
            <div>
              <div className="text-xs font-bold text-orange-600 mb-2">2차 순위 (Cross-Encoder)</div>
              <div className="space-y-1.5">
                {RERANKED.map((r, i) => {
                  const oldIdx = INITIAL_RESULTS.findIndex(ir => ir.id === r.id);
                  const diff = oldIdx - i;
                  return (
                    <div key={r.id} className={`flex items-center gap-2 p-2 rounded text-xs ${i < 2 ? 'bg-orange-50 border border-orange-300 shadow-sm' : 'bg-slate-50 border border-slate-100'}`}>
                      <span className="w-5 h-5 bg-orange-100 text-orange-700 rounded-full flex items-center justify-center font-bold text-[10px]">{i + 1}</span>
                      <span className="flex-1 font-medium text-slate-700">{r.title}</span>
                      <span className="font-mono text-orange-600 font-bold">{r.crossScore}</span>
                      <span className={`text-[10px] font-bold ${diff > 0 ? 'text-emerald-600' : diff < 0 ? 'text-red-500' : 'text-slate-400'}`}>
                        {diff > 0 ? `+${diff}` : diff < 0 ? `${diff}` : '='}
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          {phase === 'intro' && (
            <div className="flex flex-col items-center justify-center h-48 text-slate-400">
              <div className="text-4xl mb-3">1차 → 2차</div>
              <div className="text-sm">Bi-Encoder(빠른 선별) → Cross-Encoder(정밀 면접)</div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Retrieval 고도화 &gt; Chapter 2. 검색 품질 개선</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-2-1. Re-ranking — 2차 정밀 면접</h1>
                </div>
              </div>
              <p className="text-slate-600">서류 심사 2단계: <b>1차 Bi-Encoder</b>(빠르게 후보 추림) → <b>2차 Cross-Encoder</b>(쿼리와 문서를 1:1 정밀 면접). 숨은 보석을 찾아냅니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">Re-ranking 과정</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <RankComparison phase={s.phase} />
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.code ? (
                  <>
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">코드</div>
                    <pre className="bg-slate-900 text-green-300 p-4 rounded-lg text-xs leading-relaxed overflow-x-auto whitespace-pre-wrap">{s.code}</pre>
                  </>
                ) : s.phase === 'summary' ? (
                  <div className="space-y-4">
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">Bi-Encoder vs Cross-Encoder</div>
                    <div className="p-4 rounded-lg bg-blue-50 border border-blue-200">
                      <div className="font-bold text-sm text-blue-800 mb-2">Bi-Encoder (1차)</div>
                      <ul className="text-xs text-blue-700 space-y-1">
                        <li>- 쿼리, 문서 독립적으로 인코딩</li>
                        <li>- 빠름 (벡터 미리 계산 가능)</li>
                        <li>- 수만 개 문서도 빠르게 검색</li>
                        <li>- 단점: 상호작용 놓침</li>
                      </ul>
                    </div>
                    <div className="p-4 rounded-lg bg-orange-50 border border-orange-200">
                      <div className="font-bold text-sm text-orange-800 mb-2">Cross-Encoder (2차)</div>
                      <ul className="text-xs text-orange-700 space-y-1">
                        <li>- 쿼리+문서를 한 쌍으로 입력</li>
                        <li>- 느림 (쌍마다 추론 필요)</li>
                        <li>- 소수(20~50개)만 평가</li>
                        <li>- 장점: 정밀한 관련성 판단</li>
                      </ul>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">Re-ranking 핵심 개념</div>
                    <div className="p-4 rounded-lg bg-orange-50 border border-orange-200">
                      <div className="font-bold text-sm text-orange-800 mb-2">왜 Re-ranking이 필요한가?</div>
                      <ul className="text-xs text-orange-700 space-y-1">
                        <li>- 1차 검색은 빠르지만 부정확할 수 있음</li>
                        <li>- 쿼리와 문서의 깊은 관계를 놓침</li>
                        <li>- 2차에서 쿼리-문서를 직접 비교</li>
                      </ul>
                    </div>
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">실무 팁</div>
                      <ul className="text-xs text-slate-600 space-y-1">
                        <li>- 1차에서 Top-20~50 추출</li>
                        <li>- 2차에서 Top-3~5 정밀 선별</li>
                        <li>- Cross-Encoder 모델: ms-marco 계열 추천</li>
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Re-ranking', 'Bi-Encoder', 'Cross-Encoder', 'Two-stage Retrieval', 'ms-marco'].map(kw => (
                <span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./IV-1-3.html" className="text-orange-600 hover:text-orange-800 font-medium">&larr; IV-1-3. Hybrid Search</a>
              <a href="./IV-2-2.html" className="text-orange-600 hover:text-orange-800 font-medium">IV-2-2. Query Transformation &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
