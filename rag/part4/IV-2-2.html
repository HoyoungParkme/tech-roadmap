              세 가지 표준 전략을 한 페이지에서 비교한다.
    핵심 비유: 도서관에서 같은 궁금증을 다르게 묻기 — 답을 먼저 그려보기(HyDE),
              여러 표현으로 묻기(Multi-Query), 한 단계 추상화하기(Step-Back)
    패턴: fastapi v1 — 좌(LiveDataPane: 원 쿼리 → 변형 쿼리 카드 → 결과 union)
                    / 우(VSCode CodeViewer)
    색상: rag rose
  -->

            label: '변형 #1',

        userQuery: ORIGINAL_QUERY,
        queries: [
          {

      {

        desc: '같은 질문 / 같은 코퍼스에서 네 전략의 결과를 모아보면, baseline(원 쿼리) recall@5 = 50% 가 HyDE / Multi-Query / Step-Back 모두 100% 까지 올라간다. 비용·지연·다양성·배경지식 측면에서 trade-off 가 다르므로, 도메인에 맞춰 선택하거나 조합한다.',
        strategy: 'compare',
        userQuery: ORIGINAL_QUERY,
        queries: [],
        compareRows: [
          { name: '원 쿼리만',  recall: 50,  cost: '없음',          latency: '1×',   pros: '가장 싸다',                cons: '어휘 차이에 약함' },
          { name: 'HyDE',       recall: 100, cost: 'LLM 1회',       latency: '+1 LLM', pros: '문서 어휘로 정렬',         cons: '환각이 검색에 섞일 수 있음' },
          { name: 'Multi-Query',recall: 100, cost: 'LLM 1회 + 검색 N회', latency: '+병렬',  pros: '다양성·robust',            cons: '중복 결과·N 튜닝 필요' },
          { name: 'Step-Back',  recall: 100, cost: 'LLM 1회 + 검색 2회', latency: '+1 LLM + 검색', pros: '배경지식 동반',            cons: '단순 FAQ엔 과함' },
        ],
        union: ['D-12', 'D-07', 'D-44', 'D-51', 'D-23'],
        recall: { hit: 2, total: 2, atK: 5 },
        code: {
          lang: 'markdown',
          filename: 'compare.md',
          lines: [
            '# Query Transformation 4 전략 비교 (recall@5 기준)',
            '',
            '같은 질의 / 같은 코퍼스 / 동일 임베딩 모델로 측정.',
            '',
            '| 전략         | recall@5 | 추가 비용              | 강점                  | 약점                  |',
            '|--------------|----------|------------------------|-----------------------|-----------------------|',
            '| 원 쿼리만    |    50%   | 없음                   | 싸고 단순             | 어휘 차이에 약함      |',
            '| HyDE         |   100%   | LLM 1회                | 질문 ↔ 문서 정렬      | LLM 환각 섞일 수 있음 |',
            '| Multi-Query  |   100%   | LLM 1회 + 검색 N회     | 다양성·robust         | 중복 / N 튜닝         |',
            '| Step-Back    |   100%   | LLM 1회 + 검색 2회     | 배경 지식 동반        | 단순 FAQ 엔 과함      |',
            '',
            '## 도메인별 권장 시작점',
            '- 사내 위키 / 매뉴얼 (긴 답변형 문서) → **HyDE**',
            '- 고객 문의 / 어휘 들쭉날쭉한 코퍼스 → **Multi-Query**',
            '- 전문 도메인 / 좁은 질문 + 배경 필요 → **Step-Back**',
            '- 모르겠으면 → **Multi-Query** 부터 (가장 안정적)',
            '',
            '## 조합 패턴',
            '- HyDE + Re-ranker : cross-encoder 재정렬',
            '- Multi-Query + RRF : Reciprocal Rank Fusion',
            '- Step-Back + 원본 : 배경지식 문맥 추가',
            '',
            '## 다음 단계',
            '- IV-2-3: Contextual Compression — 노이즈 제거',
            '- IV-2-4: Hybrid Search — 임베딩 + BM25',
          ],
          highlight: [1, 5, 6, 7, 8, 9, 10, 12, 13, 14, 15, 16, 18, 19, 20, 21],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 위: 사용자 질문 박스
    // ─────────────────────────────────────────────────────
    function UserQueryBox({ query }) {
      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center gap-1.5 mb-1.5">
            <span className="text-base">🙋</span>
            <span className="text-[11px] font-bold text-rose-800">사용자 질문 (사내 위키 검색)</span>
          </div>
          <div className="bg-rose-50 border border-rose-200 rounded p-2">
            <code className="text-xs text-rose-900 font-mono break-words">{query}</code>
          </div>
          <div className="text-[9px] text-slate-500 mt-1.5 italic">
            ↓ 짧은 키워드 질의 — 임베딩 검색이 흔들리는 전형 케이스
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 가운데: 변형 쿼리 카드들 (Step별 다른 갯수)
    // ─────────────────────────────────────────────────────
    function QueryCard({ q, idx }) {
      const tone = q.tone || 'rose';
      const palette = {
        rose:  { bg: 'bg-rose-50',   border: 'border-rose-300',   label: 'text-rose-700',   text: 'text-rose-900' },
        slate: { bg: 'bg-slate-50',  border: 'border-slate-300',  label: 'text-slate-600',  text: 'text-slate-700' },
      }[tone];
      return (
        <div className={`${palette.bg} ${palette.border} ${q.faded ? 'opacity-60' : ''} border rounded p-2`}>
          <div className="flex items-center justify-between mb-1">
            <div className="flex items-center gap-1.5">
              <span className="w-4 h-4 bg-white border border-current rounded-full flex items-center justify-center text-[9px] font-bold">
                {idx + 1}
              </span>
              <span className={`text-[10px] font-bold uppercase tracking-wider ${palette.label}`}>{q.label}</span>
            </div>
            {q.badge && (
              <span className="text-[8px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-bold">
                {q.badge}
              </span>
            )}
          </div>
          <div className={`text-[11px] leading-snug ${palette.text} font-mono break-words`}>"{q.text}"</div>
          {q.hits && q.hits.length > 0 && (
            <div className="mt-1.5 pt-1.5 border-t border-dashed border-current/30">
              <div className="text-[9px] font-bold text-slate-500 uppercase mb-1">↓ similarity_search top-{q.hits.length}</div>
              <div className="flex flex-wrap gap-1">
                {q.hits.map((h, i) => {
                  const tagStyle = {
                    gold:    'bg-emerald-100 text-emerald-800 border-emerald-300 font-bold',
                    related: 'bg-sky-100 text-sky-700 border-sky-200',
                    concept: 'bg-violet-100 text-violet-700 border-violet-200',
                    noise:   'bg-slate-100 text-slate-500 border-slate-200 line-through',
                  }[h.tag];
                  return (
                    <span key={i} className={`text-[9px] font-mono px-1.5 py-0.5 rounded border ${tagStyle}`}>
                      {h.id} · {h.score.toFixed(2)}
                      {h.tag === 'gold' && <span className="ml-1">✓</span>}
                    </span>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: union 결과 + recall 메트릭
    // ─────────────────────────────────────────────────────
    function UnionBox({ union, recall, corpus }) {
      const pct = Math.round((recall.hit / recall.total) * 100);
      const barColor = pct >= 100 ? 'bg-emerald-500' : pct >= 75 ? 'bg-lime-500' : pct >= 50 ? 'bg-amber-500' : 'bg-rose-500';
      return (
        <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📚</span>
              <span className="text-[11px] font-bold text-emerald-800">검색 결과 union (top-5)</span>
            </div>
            <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
              recall@{recall.atK} = {pct}%
            </span>
          </div>
          {/* 정답 비율 막대 */}
          <div className="bg-white rounded border border-emerald-200 p-2 mb-2">
            <div className="flex items-center justify-between text-[9px] text-slate-600 mb-1">
              <span>정답 회수율</span>
              <span className="font-mono font-bold">{recall.hit} / {recall.total} 정답</span>
            </div>
            <div className="w-full h-2.5 bg-slate-200 rounded-full overflow-hidden">
              <div
                className={`h-full ${barColor} transition-all duration-700 ease-out`}
                style={{ width: `${pct}%` }}
              />
            </div>
          </div>
          {/* union 문서 리스트 */}
          <div className="bg-white rounded border border-emerald-200 p-2">
            <div className="text-[9px] font-bold text-emerald-700 mb-1 uppercase tracking-wider">
              union (중복 제거 후)
            </div>
            <div className="space-y-1">
              {union.map((id) => {
                const doc = corpus.find((d) => d.id === id);
                if (!doc) return null;
                const isGold = doc.tag === 'gold';
                return (
                  <div
                    key={id}
                    className={`flex items-center gap-1.5 text-[10px] leading-tight ${
                      isGold ? 'bg-emerald-50 border border-emerald-300' : ''
                    } px-1 py-0.5 rounded`}
                  >
                    <span className={`font-mono font-bold w-12 ${isGold ? 'text-emerald-700' : 'text-slate-500'}`}>
                      {doc.id}
                    </span>
                    <span className={isGold ? 'text-emerald-900 font-medium flex-1' : 'text-slate-700 flex-1'}>
                      {doc.title}
                    </span>
                    {isGold && <span className="text-[9px] text-emerald-700 font-bold">✓ gold</span>}
                  </div>
                );
              })}
            </div>
          </div>
          <div className="text-[9px] text-emerald-700 mt-1.5">
            ✓ 정답 = lsof+kill (D-12), fuser -k (D-07)
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: Compare 단계 전용 — 4 전략 비교 표
    // ─────────────────────────────────────────────────────
    function CompareTable({ rows }) {
      return (
        <div className="bg-white rounded-lg border-2 border-rose-300 p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">📊</span>
            <span className="text-[11px] font-bold text-rose-800">전략별 recall@5 비교</span>
          </div>
          <div className="space-y-1.5">
            {rows.map((r, i) => (
              <div key={i} className="border border-slate-200 rounded p-2">
                <div className="flex items-center justify-between mb-1">
                  <span className="text-[11px] font-bold text-slate-700">{r.name}</span>
                  <span
                    className={`text-[10px] font-mono font-bold px-1.5 py-0.5 rounded ${
                      r.recall >= 100 ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'
                    }`}
                  >
                    recall {r.recall}%
                  </span>
                </div>
                <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden mb-1.5">
                  <div
                    className={`h-full ${r.recall >= 100 ? 'bg-emerald-500' : 'bg-amber-500'} transition-all duration-700`}
                    style={{ width: `${r.recall}%` }}
                  />
                </div>
                <div className="grid grid-cols-2 gap-1 text-[9px]">
                  <div className="text-slate-500">
                    💰 비용: <span className="font-mono text-slate-700">{r.cost}</span>
                  </div>
                  <div className="text-slate-500">
                    ⏱ 지연: <span className="font-mono text-slate-700">{r.latency}</span>
                  </div>
                  <div className="text-emerald-700 col-span-2">✓ {r.pros}</div>
                  <div className="text-rose-700 col-span-2">✗ {r.cons}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 사용자 질문
    //   가운데: 변형 쿼리 카드들 (Step별 갯수 다름)
    //   하단: union + recall 또는 compare 표
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const isCompare = step.strategy === 'compare';
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 도서관 검색 — 쿼리 변환 4 전략</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            {/* 사용자 질문 */}
            <UserQueryBox query={step.userQuery} />

            {/* 화살표 */}
            {step.queries.length > 0 && (
              <div className="flex justify-center">
                <span className="text-rose-400 text-xs font-mono">
                  {step.strategy === 'original' && '↓ 그대로 검색 ↓'}
                  {step.strategy === 'hyde' && '↓ LLM 으로 가상 답변 생성 ↓'}
                  {step.strategy === 'multi-query' && '↓ LLM 으로 변형 N개 생성 ↓'}
                  {step.strategy === 'step-back' && '↓ LLM 으로 추상화 + 원 쿼리 ↓'}
                </span>
              </div>
            )}

            {/* 변형 쿼리 카드들 */}
            {step.queries.length > 0 && (
              <div className="space-y-2">
                {step.queries.map((q, i) => (
                  <QueryCard key={i} q={q} idx={i} />
                ))}
              </div>
            )}

            {/* 또 다른 화살표 */}
            {step.queries.length > 0 && (
              <div className="flex justify-center">
                <span className="text-emerald-500 text-xs font-mono">↓ 결과 union (중복 제거) ↓</span>
              </div>
            )}

            {/* union 또는 compare */}
            {isCompare ? (
              <CompareTable rows={step.compareRows} />
            ) : (
              <UnionBox union={step.union} recall={step.recall} corpus={CORPUS} />
            )}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>gold (정답)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>related
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-violet-500"></span>concept
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-400"></span>noise
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-rose-500"></span>변형 쿼리
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    //   상단: 5개 파일명 탭 (현재 step.code.filename 강조)
    // ─────────────────────────────────────────────────────
    const FILE_TABS = ['original.py', 'hyde.py', 'multi-query.py', 'step-back.py', 'compare.md'];

    function CodeViewer({ code, stepIdx, total, onSelectTab }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일 탭 바 — 5개 파일 */}
          <div className="bg-[#21252b] flex items-center border-b border-slate-700 overflow-x-auto">
            {FILE_TABS.map((name, i) => {
              const active = name === code.filename;
              return (
                <button
                  key={name}
                  onClick={() => onSelectTab && onSelectTab(i)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                    active
                      ? 'bg-[#282c34] text-rose-300 border-t-2 border-t-rose-400'
                      : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800/30'
                  }`}
                >
                  {name}
                </button>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Retrieval 고도화 &gt; Chapter 2. 검색 품질 개선</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-2-2. Query Transformation — HyDE / Multi-Query / Step-Back</h1>
                  <p className="text-sm text-slate-500 mt-0.5">짧은 질문을 LLM 이 변형해서 recall@k 를 끌어올리는 3가지 표준 전략</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                code={step.code}
                stepIdx={stepIdx}
                total={STEPS.length}
                onSelectTab={(i) => { setStepIdx(i); setIsPlaying(false); }}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: 짧은 질문 ↔ 긴 문서 정렬은 <strong>HyDE</strong>, 어휘 다양성은 <strong>Multi-Query</strong>, 배경 지식은 <strong>Step-Back</strong>. 모르겠으면 Multi-Query 로 시작. 다음(IV-2-3)에서는 Contextual Compression 으로 노이즈를 더 줄인다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[110px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['HyDE', 'Multi-Query', 'Step-Back', 'recall@k', 'MultiQueryRetriever', 'Hypothetical Doc'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-2-1.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; IV-2-1 Re-ranking</a>
              <a href="./IV-2-3.html" className="text-rose-700 hover:text-rose-900 font-medium">IV-2-3 Contextual Compression &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
