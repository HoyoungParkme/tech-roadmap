<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — IV-2-2. Query Transformation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TABS = ['HyDE', 'Multi-Query', 'Step-Back'];

    const HYDE_DATA = {
      original: "FastAPI에서 WebSocket 사용법",
      hypothetical: "FastAPI에서 WebSocket을 사용하려면 @app.websocket 데코레이터를 사용합니다. WebSocket 엔드포인트를 정의하고, await websocket.accept()로 연결을 수락한 후, await websocket.receive_text()로 메시지를 수신합니다...",
      results: ['FastAPI WebSocket 공식 문서', 'FastAPI 실시간 통신 가이드', 'WebSocket + 인증 패턴'],
    };

    const MULTI_QUERY_DATA = {
      original: "Python 웹 프레임워크 성능 비교",
      variations: [
        "Python Django Flask FastAPI 속도 벤치마크",
        "Python 웹 프레임워크별 처리량(throughput) 비교",
        "FastAPI vs Django REST 성능 차이",
      ],
      results: [
        ['Django 성능 최적화', 'Flask 벤치마크'],
        ['웹 프레임워크 처리량 테스트', 'Python 서버 부하 테스트'],
        ['FastAPI 성능 분석', 'FastAPI vs Django 비교'],
      ],
    };

    const STEPBACK_DATA = {
      original: "FastAPI에서 OAuth2 + JWT로 인증하는 방법",
      stepback: "웹 API 인증/인가의 일반적인 방법론은?",
      results: ['API 인증 전략 개요', 'OAuth2 흐름 설명', 'JWT 토큰 구조와 원리'],
    };

    const STEPS = [
      {
        desc: "Query Transformation은 도서관에서 질문 방식을 바꿔보는 것입니다. 같은 궁금증도 질문을 바꾸면 더 좋은 문서를 찾을 수 있습니다. 3가지 전략: HyDE, Multi-Query, Step-Back.",
        phase: 'intro',
        activeTab: null,
      },
      {
        desc: "HyDE (Hypothetical Document Embeddings) — 가상 답변을 먼저 생성하고, 그 답변과 유사한 실제 문서를 검색합니다. 질문보다 답변이 문서와 더 비슷하기 때문입니다.",
        phase: 'hyde',
        activeTab: 0,
        code: '# HyDE: 가상 답변 → 유사 문서 검색\nprompt = "다음 질문에 대한 답변을 작성해주세요:\\n{query}"\nhypothetical_doc = llm.invoke(prompt)\n\n# 가상 답변으로 검색 (질문 대신)\nresults = vectorstore.similarity_search(hypothetical_doc)',
      },
      {
        desc: "Multi-Query — 1개 질문을 3개 이상의 변형으로 바꿔서 각각 검색합니다. 다양한 표현으로 더 넓은 범위의 관련 문서를 발견합니다.",
        phase: 'multi_query',
        activeTab: 1,
        code: '# Multi-Query: 1개 → 여러 변형\nprompt = "다음 질문을 3가지 다른 방식으로 표현해주세요:\\n{query}"\nvariations = llm.invoke(prompt)\n\n# 각 변형으로 검색 → 결과 합산\nall_results = []\nfor q in variations:\n    all_results.extend(vectorstore.similarity_search(q))\nunique_results = deduplicate(all_results)',
      },
      {
        desc: "Step-Back Prompting — 구체적인 질문을 추상적으로 바꿉니다. \"FastAPI OAuth2 JWT 인증\"을 \"웹 API 인증 방법론\"으로. 더 넓은 배경 지식을 먼저 확보합니다.",
        phase: 'stepback',
        activeTab: 2,
        code: '# Step-Back: 구체적 → 추상적\nprompt = "다음 질문의 상위 개념 질문을 만들어주세요:\\n{query}"\nstepback_query = llm.invoke(prompt)\n\n# 추상적 질문으로 배경 지식 검색\nbackground = vectorstore.similarity_search(stepback_query)\n# + 원래 질문으로도 검색\nspecific = vectorstore.similarity_search(query)',
      },
      {
        desc: "3가지 전략 비교 — HyDE는 질문-문서 간극이 클 때, Multi-Query는 다양한 관점이 필요할 때, Step-Back은 전문적/구체적 질문일 때 효과적입니다.",
        phase: 'compare',
        activeTab: null,
      },
      {
        desc: "실전 선택 기준 — 대부분 Multi-Query로 시작합니다. 기술 문서 검색에는 HyDE, 전문 도메인에는 Step-Back을 추가합니다. 조합도 가능합니다.",
        phase: 'summary',
        activeTab: null,
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [selectedTab, setSelectedTab] = useState(0);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (s.activeTab !== null) setSelectedTab(s.activeTab);
      }, [step]);

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderTabContent = () => {
        if (selectedTab === 0) {
          return (
            <div className="space-y-3">
              <div className="p-3 rounded-lg bg-blue-50 border border-blue-200">
                <div className="text-[10px] font-bold text-blue-600 uppercase mb-1">원본 질문</div>
                <div className="text-xs text-blue-800 font-mono">{HYDE_DATA.original}</div>
              </div>
              <div className="flex justify-center text-orange-500 text-lg">LLM이 가상 답변 생성</div>
              <div className="p-3 rounded-lg bg-orange-50 border border-orange-200">
                <div className="text-[10px] font-bold text-orange-600 uppercase mb-1">가상 답변 (Hypothetical)</div>
                <div className="text-xs text-orange-800">{HYDE_DATA.hypothetical}</div>
              </div>
              <div className="flex justify-center text-orange-500 text-lg">이 답변으로 유사 문서 검색</div>
              <div className="p-3 rounded-lg bg-emerald-50 border border-emerald-200">
                <div className="text-[10px] font-bold text-emerald-600 uppercase mb-1">검색 결과</div>
                {HYDE_DATA.results.map((r, i) => (
                  <div key={i} className="text-xs text-emerald-700 py-0.5">#{i + 1} {r}</div>
                ))}
              </div>
            </div>
          );
        }
        if (selectedTab === 1) {
          return (
            <div className="space-y-3">
              <div className="p-3 rounded-lg bg-blue-50 border border-blue-200">
                <div className="text-[10px] font-bold text-blue-600 uppercase mb-1">원본 질문</div>
                <div className="text-xs text-blue-800 font-mono">{MULTI_QUERY_DATA.original}</div>
              </div>
              <div className="flex justify-center text-orange-500 text-lg">LLM이 3가지 변형 생성</div>
              {MULTI_QUERY_DATA.variations.map((v, i) => (
                <div key={i} className="p-2 rounded-lg bg-orange-50 border border-orange-200">
                  <div className="flex items-center gap-2">
                    <span className="w-4 h-4 bg-orange-200 text-orange-700 rounded-full flex items-center justify-center text-[10px] font-bold">{i + 1}</span>
                    <span className="text-xs text-orange-800">{v}</span>
                  </div>
                  <div className="ml-6 mt-1 flex gap-1">
                    {MULTI_QUERY_DATA.results[i].map((r, j) => (
                      <span key={j} className="text-[10px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded">{r}</span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          );
        }
        return (
          <div className="space-y-3">
            <div className="p-3 rounded-lg bg-blue-50 border border-blue-200">
              <div className="text-[10px] font-bold text-blue-600 uppercase mb-1">원본 질문 (구체적)</div>
              <div className="text-xs text-blue-800 font-mono">{STEPBACK_DATA.original}</div>
            </div>
            <div className="flex justify-center text-orange-500 text-lg">LLM이 추상화</div>
            <div className="p-3 rounded-lg bg-orange-50 border border-orange-200">
              <div className="text-[10px] font-bold text-orange-600 uppercase mb-1">Step-Back 질문 (추상적)</div>
              <div className="text-xs text-orange-800 font-mono">{STEPBACK_DATA.stepback}</div>
            </div>
            <div className="flex justify-center text-orange-500 text-lg">배경 지식 + 구체적 검색</div>
            <div className="p-3 rounded-lg bg-emerald-50 border border-emerald-200">
              <div className="text-[10px] font-bold text-emerald-600 uppercase mb-1">배경 지식 검색 결과</div>
              {STEPBACK_DATA.results.map((r, i) => (
                <div key={i} className="text-xs text-emerald-700 py-0.5">#{i + 1} {r}</div>
              ))}
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Retrieval 고도화 &gt; Chapter 2. 검색 품질 개선</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-2-2. Query Transformation — 질문 방식 바꾸기</h1>
                </div>
              </div>
              <p className="text-slate-600">도서관에서 <b>질문 방식을 바꿔보기</b>. 같은 궁금증도 표현을 바꾸면 더 좋은 결과를 얻습니다. HyDE / Multi-Query / Step-Back 3가지 전략.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">Query Transformation 전략</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.phase === 'compare' || s.phase === 'summary' ? (
                  <div className="space-y-3">
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-2">3가지 전략 비교</div>
                    {[
                      { name: 'HyDE', when: '질문과 문서 스타일 차이가 클 때', how: '가상 답변 생성 → 유사 문서 검색', icon: '1' },
                      { name: 'Multi-Query', when: '다양한 관점이 필요할 때', how: '1개 질문 → 3개 변형 → 각각 검색', icon: '2' },
                      { name: 'Step-Back', when: '전문적/구체적 질문일 때', how: '구체적 → 추상적 → 배경 지식 확보', icon: '3' },
                    ].map((s, i) => (
                      <div key={i} className="p-3 rounded-lg bg-slate-50 border border-slate-100">
                        <div className="flex items-center gap-2 mb-1">
                          <span className="w-5 h-5 bg-orange-100 text-orange-700 rounded-full flex items-center justify-center font-bold text-[10px]">{s.icon}</span>
                          <span className="font-bold text-sm text-slate-700">{s.name}</span>
                        </div>
                        <div className="text-xs text-slate-600 ml-7">
                          <div><b>언제:</b> {s.when}</div>
                          <div><b>방법:</b> {s.how}</div>
                        </div>
                      </div>
                    ))}
                    {s.phase === 'summary' && (
                      <div className="p-3 rounded-lg bg-orange-50 border border-orange-200 mt-2">
                        <div className="text-xs font-bold text-orange-700">실전 가이드</div>
                        <div className="text-xs text-orange-600 mt-1">Multi-Query로 시작 → 필요 시 HyDE/Step-Back 추가</div>
                      </div>
                    )}
                  </div>
                ) : (
                  <div>
                    <div className="flex gap-1 mb-4">
                      {TABS.map((tab, i) => (
                        <button key={tab} onClick={() => setSelectedTab(i)}
                          className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${selectedTab === i ? 'bg-orange-600 text-white' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                          {tab}
                        </button>
                      ))}
                    </div>
                    {renderTabContent()}
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.code ? (
                  <>
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">코드</div>
                    <pre className="bg-slate-900 text-green-300 p-4 rounded-lg text-xs leading-relaxed overflow-x-auto whitespace-pre-wrap">{s.code}</pre>
                  </>
                ) : (
                  <div className="space-y-4">
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">Query Transformation 핵심</div>
                    <div className="p-4 rounded-lg bg-orange-50 border border-orange-200">
                      <div className="font-bold text-sm text-orange-800 mb-2">왜 질문을 변환하는가?</div>
                      <ul className="text-xs text-orange-700 space-y-1">
                        <li>- 사용자 질문과 문서 스타일이 다름</li>
                        <li>- 한 번의 검색으로 모든 관련 문서를 못 찾음</li>
                        <li>- 구체적 질문에는 배경 지식이 필요함</li>
                      </ul>
                    </div>
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">공통 특징</div>
                      <ul className="text-xs text-slate-600 space-y-1">
                        <li>- LLM을 활용해 쿼리를 변환</li>
                        <li>- 추가 LLM 호출 비용 발생</li>
                        <li>- 검색 품질은 크게 향상</li>
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['HyDE', 'Multi-Query', 'Step-Back', 'Query Rewriting', 'Query Expansion'].map(kw => (
                <span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./IV-2-1.html" className="text-orange-600 hover:text-orange-800 font-medium">&larr; IV-2-1. Re-ranking</a>
              <a href="./IV-2-3.html" className="text-orange-600 hover:text-orange-800 font-medium">IV-2-3. Contextual Compression &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
