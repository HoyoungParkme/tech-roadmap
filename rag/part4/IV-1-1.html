  <!--
    IV-1-1. Dense Retrieval — 벡터 임베딩 기반 의미 검색
    5단계 파이프라인을 2D 벡터 공간에서 직관적으로 이해.
    비유: 책 색인 카드 대신 "주제 좌표 지도"로 책 찾는 사서.
    패턴: fastapi v1 좌(2D 벡터공간 + 메타박스) / 우(VSCode CodeViewer)
    색상: rag rose
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 코퍼스 5개 문서 — 2D 벡터 좌표 (x: 동물성, y: 사물성)
    // 실제 768~1536차원 → 학습용 2D 압축
    const CORPUS = [
      { id: 'D1', text: '강아지가 공원에서 뛰논다',     vec: { x: 0.88, y: 0.30 }, lang: 'ko' },
      { id: 'D2', text: 'A puppy chases the ball',      vec: { x: 0.83, y: 0.40 }, lang: 'en' },
      { id: 'D3', text: '고양이가 창가에 앉아있다',     vec: { x: 0.72, y: 0.25 }, lang: 'ko' },
      { id: 'D4', text: '자동차 엔진 오일을 교체했다', vec: { x: 0.20, y: 0.85 }, lang: 'ko' },
      { id: 'D5', text: '주식 시장이 급락했다',          vec: { x: 0.15, y: 0.70 }, lang: 'ko' },
    ];

    // 쿼리 (사용자 질문) — "강아지"는 D1과 정확히 매칭, D2(puppy)와는 의미 매칭
    const QUERY = { text: '강아지가 뛰어다닌다', vec: { x: 0.86, y: 0.33 } };

    // 코사인 유사도 계산 (2D)
    function cosine(a, b) {
      const dot = a.x * b.x + a.y * b.y;
      const ma = Math.sqrt(a.x * a.x + a.y * a.y);
      const mb = Math.sqrt(b.x * b.x + b.y * b.y);
      return dot / (ma * mb);
    }

    const SCORED = CORPUS.map((d) => ({ ...d, score: cosine(d.vec, QUERY.vec) }));
    const TOPK = [...SCORED].sort((a, b) => b.score - a.score).slice(0, 3);
    const TOPK_IDS = TOPK.map((d) => d.id);

    // 단계별 시뮬레이션 데이터
    // phase: corpus|query|cosine|semantic|limit

    // 좌측 위: 2D 벡터 공간 SVG (코퍼스 5점 + 쿼리★ + 거리선 + top-k 강조)
    function VectorSpace({ step }) {
      // SVG 좌표계: 원점(0,0)을 좌하단에, 1.0을 가까운 우상단으로 매핑
      const W = 420;
      const H = 320;
      const PAD = 40;
      const toX = (v) => PAD + v * (W - PAD * 2);
      const toY = (v) => H - PAD - v * (H - PAD * 2);

      const qx = toX(QUERY.vec.x);
      const qy = toY(QUERY.vec.y);

      return (
        <div className="bg-slate-50 rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🗺️</span>
              <span className="text-[11px] font-bold text-rose-800">2D 벡터 공간 (의미 좌표)</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">
              dim=2 (실제 1536)
            </span>
          </div>

          <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto bg-white rounded border border-slate-200">
            {/* 격자 */}
            {[0.0, 0.25, 0.5, 0.75, 1.0].map((g) => (
              <g key={g}>
                <line x1={toX(g)} y1={PAD} x2={toX(g)} y2={H - PAD}
                      stroke="#e2e8f0" strokeWidth="0.5" strokeDasharray="2 3" />
                <line x1={PAD} y1={toY(g)} x2={W - PAD} y2={toY(g)}
                      stroke="#e2e8f0" strokeWidth="0.5" strokeDasharray="2 3" />
              </g>
            ))}

            {/* 축 */}
            <line x1={PAD} y1={H - PAD} x2={W - PAD} y2={H - PAD} stroke="#94a3b8" strokeWidth="1.2" />
            <line x1={PAD} y1={PAD} x2={PAD} y2={H - PAD} stroke="#94a3b8" strokeWidth="1.2" />

            {/* 축 레이블 */}
            <text x={W - PAD + 4} y={H - PAD + 4} className="fill-slate-500 text-[9px]">animal →</text>
            <text x={PAD - 6} y={PAD - 6} className="fill-slate-500 text-[9px]">↑ object</text>
            <text x={(PAD + W - PAD) / 2} y={H - 8} textAnchor="middle" className="fill-slate-400 text-[9px]">
              x: 동물성 의미축
            </text>

            {/* 거리선 (cosine, semantic 단계) */}
            {step.showLines && step.showCorpus && CORPUS.map((d) => {
              const dx = toX(d.vec.x);
              const dy = toY(d.vec.y);
              const isTop = step.highlightIds.includes(d.id);
              return (
                <line
                  key={`line-${d.id}`}
                  x1={qx} y1={qy} x2={dx} y2={dy}
                  stroke={isTop ? '#e11d48' : '#cbd5e1'}
                  strokeWidth={isTop ? 1.6 : 0.8}
                  strokeDasharray={isTop ? '' : '3 3'}
                  opacity={isTop ? 0.85 : 0.4}
                />
              );
            })}

            {/* 코퍼스 점 */}
            {step.showCorpus && CORPUS.map((d) => {
              const dx = toX(d.vec.x);
              const dy = toY(d.vec.y);
              const isTop = step.highlightIds.includes(d.id);
              return (
                <g key={d.id}>
                  <circle
                    cx={dx} cy={dy}
                    r={isTop ? 9 : 6}
                    className={isTop ? 'fill-rose-500' : 'fill-slate-400'}
                    stroke={isTop ? '#9f1239' : '#64748b'}
                    strokeWidth={isTop ? 2 : 1}
                  />
                  <text x={dx} y={dy + 3} textAnchor="middle"
                        className={`text-[8px] font-bold ${isTop ? 'fill-white' : 'fill-white'}`}>
                    {d.id}
                  </text>
                  <text x={dx + 12} y={dy - 6}
                        className={`text-[9px] ${isTop ? 'fill-rose-700 font-bold' : 'fill-slate-500'}`}>
                    {d.text}
                  </text>
                  {step.phase === 'cosine' && (
                    <text x={dx + 12} y={dy + 6}
                          className={`text-[8px] font-mono ${isTop ? 'fill-rose-600 font-bold' : 'fill-slate-400'}`}>
                      sim={cosine(d.vec, QUERY.vec).toFixed(3)}
                    </text>
                  )}
                </g>
              );
            })}

            {/* 쿼리 별 표시 */}
            {step.showQuery && (
              <g>
                <polygon
                  points={`${qx},${qy - 11} ${qx + 3.5},${qy - 3.5} ${qx + 11},${qy - 2} ${qx + 5},${qy + 4} ${qx + 6.5},${qy + 11} ${qx},${qy + 7} ${qx - 6.5},${qy + 11} ${qx - 5},${qy + 4} ${qx - 11},${qy - 2} ${qx - 3.5},${qy - 3.5}`}
                  fill="#f59e0b" stroke="#b45309" strokeWidth="1.5"
                />
                <text x={qx} y={qy + 26} textAnchor="middle"
                      className="fill-amber-700 text-[10px] font-bold">
                  ★ Q: {QUERY.text}
                </text>
              </g>
            )}

            {/* semantic 단계 — 의미 매칭 화살 표시 */}
            {step.showSemantic && (
              <g>
                {/* D1 ↔ D2 사이 이중 화살 */}
                <line
                  x1={toX(CORPUS[0].vec.x)} y1={toY(CORPUS[0].vec.y)}
                  x2={toX(CORPUS[1].vec.x)} y2={toY(CORPUS[1].vec.y)}
                  stroke="#9f1239" strokeWidth="2.5" strokeDasharray="4 2" opacity="0.7"
                />
                <text x={(toX(CORPUS[0].vec.x) + toX(CORPUS[1].vec.x)) / 2 + 8}
                      y={(toY(CORPUS[0].vec.y) + toY(CORPUS[1].vec.y)) / 2 - 6}
                      className="fill-rose-700 text-[9px] font-bold">
                  강아지 ≈ puppy
                </text>
              </g>
            )}

            {/* limit 단계 — 위험 영역 표시 */}
            {step.showLimit && (
              <g>
                <rect x={toX(0.78) - 8} y={toY(0.50) - 8} width={70} height={70}
                      fill="#fef2f2" stroke="#dc2626" strokeWidth="1.5" strokeDasharray="3 2" opacity="0.5" />
                <text x={toX(0.95)} y={toY(0.65)} textAnchor="middle"
                      className="fill-red-700 text-[9px] font-bold">⚠ 너무 가까움</text>
                <text x={toX(0.95)} y={toY(0.55)} textAnchor="middle"
                      className="fill-red-600 text-[8px]">고유명사 구분 X</text>
              </g>
            )}
          </svg>

          {/* 단계별 부가 설명 */}
          <div className="mt-2 text-[10px] text-slate-600 px-1">
            {step.phase === 'corpus' && '📦 모든 문서가 벡터로 임베딩되어 좌표 위 한 점으로 자리잡았다.'}
            {step.phase === 'query' && '★ 쿼리도 같은 모델로 벡터화 — 동일 좌표계에 안착해야 거리 측정 가능.'}
            {step.phase === 'cosine' && '📐 쿼리 ↔ 모든 문서 거리 계산 → 가까운 순으로 top-k=3 선택.'}
            {step.phase === 'semantic' && '✨ "강아지"와 "puppy"가 같은 영역 — 단어 달라도 의미 유사 매칭!'}
            {step.phase === 'limit' && '⚠ 가까운 점들 사이에서 미세 차이(iPhone 14/15) 구분이 어렵다.'}
          </div>
        </div>
      );
    }

    // 좌측 아래: 메타 박스 — kind별 패널 (corpusVec/queryVec/scores/semantic/limit)
    function MetaBox({ box }) {
      if (box.kind === 'corpusVec') {
        return (
          <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">📚</span>
              <span className="text-[11px] font-bold text-rose-800">Corpus → Vector DB (FAISS)</span>
            </div>
            <div className="bg-white rounded border border-rose-200 p-2 max-h-44 overflow-y-auto">
              <table className="w-full text-[9px] font-mono">
                <thead>
                  <tr className="text-rose-700 border-b border-rose-100">
                    <th className="text-left pr-2 py-0.5">id</th>
                    <th className="text-left pr-2 py-0.5">text</th>
                    <th className="text-left py-0.5">vec (앞 2차원)</th>
                  </tr>
                </thead>
                <tbody>
                  {box.rows.map((r) => (
                    <tr key={r.id} className="border-b border-slate-50">
                      <td className="text-rose-600 font-bold pr-2 py-1">{r.id}</td>
                      <td className="text-slate-700 pr-2 py-1">{r.text}</td>
                      <td className="text-slate-500 py-1">{r.vec}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="text-[9px] text-rose-700 mt-1.5">
              💡 D1·D2가 좌표상 가까운 이유 — 임베딩 모델이 학습 중에 "강아지=puppy" 의미 관계를 캡처함.
            </div>
          </div>
        );
      }

      if (box.kind === 'queryVec') {
        return (
          <div className="bg-amber-50 border-2 border-amber-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">★</span>
                <span className="text-[11px] font-bold text-amber-800">Query Embedding</span>
              </div>
              <span className="text-[9px] bg-amber-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                dim={box.dim}
              </span>
            </div>
            <div className="bg-white rounded border border-amber-200 p-2 mb-2">
              <div className="text-[9px] font-bold text-amber-700 mb-0.5 uppercase tracking-wider">input</div>
              <div className="text-[11px] text-slate-800 font-medium">"{box.query}"</div>
            </div>
            <div className="text-center text-amber-500 text-[10px] font-mono mb-2">
              ↓ {box.model} ↓
            </div>
            <div className="bg-white rounded border border-amber-200 p-2">
              <div className="text-[9px] font-bold text-amber-700 mb-0.5 uppercase tracking-wider">output (vector)</div>
              <div className="text-[10px] text-slate-700 font-mono break-all leading-snug">
                {box.vec}
              </div>
            </div>
            <div className="text-[9px] text-amber-700 mt-1.5">
              ⚠ 코퍼스와 동일한 모델이어야 좌표계가 일치 — 다른 모델 쓰면 검색 깨짐.
            </div>
          </div>
        );
      }

      if (box.kind === 'scores') {
        return (
          <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">📐</span>
                <span className="text-[11px] font-bold text-rose-800">Cosine Similarity Scores</span>
              </div>
              <span className="text-[9px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                top-k={box.k}
              </span>
            </div>
            <div className="bg-white rounded border border-rose-200 p-2">
              <div className="space-y-1">
                {box.rows.map((r) => (
                  <div key={r.id} className={`flex items-center gap-2 px-1.5 py-1 rounded ${r.isTop ? 'bg-rose-50 border border-rose-200' : ''}`}>
                    <span className={`text-[9px] font-mono font-bold w-6 text-center px-1 py-0.5 rounded ${r.isTop ? 'bg-rose-600 text-white' : 'bg-slate-200 text-slate-600'}`}>
                      {r.id}
                    </span>
                    <span className={`flex-1 text-[10px] truncate ${r.isTop ? 'text-rose-900 font-medium' : 'text-slate-500'}`}>
                      {r.text}
                    </span>
                    <span className={`text-[9px] font-mono font-bold w-12 text-right ${r.isTop ? 'text-rose-700' : 'text-slate-400'}`}>
                      {r.score.toFixed(3)}
                    </span>
                    {r.isTop && (
                      <span className="text-[8px] bg-rose-500 text-white px-1 py-0.5 rounded font-bold">
                        TOP
                      </span>
                    )}
                  </div>
                ))}
              </div>
            </div>
            <div className="text-[9px] text-rose-700 mt-1.5">
              ✓ 상위 3건만 LLM 컨텍스트로 전달 — D4·D5는 자연스럽게 탈락.
            </div>
          </div>
        );
      }

      if (box.kind === 'semantic') {
        return (
          <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">✨</span>
              <span className="text-[11px] font-bold text-emerald-800">의미 유사 매칭 (단어 달라도 OK)</span>
            </div>
            <div className="bg-white rounded border border-emerald-200 p-2">
              <div className="space-y-1.5">
                {box.pairs.map((p, i) => (
                  <div key={i} className="flex items-center gap-2 text-[10px]">
                    <span className="bg-rose-500 text-white px-2 py-0.5 rounded font-medium font-mono w-24 text-center">
                      {p.left}
                    </span>
                    <span className="text-emerald-600 font-bold text-base">≈</span>
                    <span className="bg-blue-500 text-white px-2 py-0.5 rounded font-medium font-mono flex-1 text-center">
                      {p.right}
                    </span>
                    <span className="text-emerald-700 font-mono font-bold w-12 text-right">
                      {p.score.toFixed(3)}
                    </span>
                  </div>
                ))}
              </div>
            </div>
            <div className="text-[9px] text-emerald-700 mt-1.5">
              💡 키워드 매칭이라면 0.0 — Dense는 0.8~0.99로 정확히 묶어준다.
            </div>
          </div>
        );
      }

      if (box.kind === 'limit') {
        return (
          <div className="bg-red-50 border-2 border-red-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">⚠</span>
              <span className="text-[11px] font-bold text-red-800">Dense의 한계 사례</span>
            </div>
            <div className="bg-white rounded border border-red-200 p-2">
              <div className="space-y-2">
                {box.cases.map((c, i) => (
                  <div key={i} className="border-l-2 border-red-300 pl-2">
                    <div className="text-[10px] font-mono font-bold text-red-700">{c.q}</div>
                    <div className="text-[9px] text-red-600 mt-0.5">✗ {c.bad}</div>
                    <div className="text-[9px] text-emerald-600">✓ {c.good}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="text-[9px] text-red-700 mt-2 bg-white rounded border border-red-200 p-1.5">
              <span className="font-bold">→ 다음:</span> {box.next}
            </div>
          </div>
        );
      }

      return null;
    }

    // LiveDataPane — 좌측 패널 (상: 벡터공간 / 하: 메타박스)
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🔍 Dense Retrieval — 벡터 공간 시뮬레이션</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <VectorSpace step={step} />
            <MetaBox box={step.metaBox} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded-full bg-rose-500"></span>top-k 매칭
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded-full bg-slate-400"></span>탈락 문서
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded-full bg-amber-500"></span>★ 쿼리
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-red-500"></span>한계 영역
            </span>
          </div>
        </div>
      );
    }

    // VSCode 스타일 CodeViewer — highlight.js
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // App 메인
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Retrieval 고도화 &gt; Chapter 1. 검색 전략</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-1-1. Dense Retrieval — 벡터 임베딩 기반 의미 검색</h1>
                  <p className="text-sm text-slate-500 mt-0.5">"강아지" 질문에 "puppy" 문서를 찾아주는 똑똑한 사서 — 5단계 파이프라인</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: Dense는 의미 검색의 강자지만 고유명사·숫자·코드에 약하다. 다음 <strong>IV-1-2 Sparse(BM25)</strong>로 보완하고, <strong>IV-1-3 Hybrid Search</strong>에서 두 방식을 결합한다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Dense Retrieval', 'Embedding', 'Cosine Similarity', 'Vector DB', 'FAISS', 'Top-K', 'Semantic Search'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../part3/III-2-2.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; III-2-2 이전 시각화</a>
              <a href="./IV-1-2.html" className="text-rose-700 hover:text-rose-900 font-medium">IV-1-2 Sparse Retrieval (BM25) &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
