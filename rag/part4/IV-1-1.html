<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — IV-1-1. Dense Retrieval</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const DOCUMENTS = [
      { id: 'D1', title: '강남 맛집 리스트', vec: [0.82, 0.75], similarity: 0.94 },
      { id: 'D2', title: '점심 런치 메뉴 추천', vec: [0.88, 0.70], similarity: 0.91 },
      { id: 'D3', title: '서울 음식점 가이드', vec: [0.78, 0.65], similarity: 0.85 },
      { id: 'D4', title: '회의실 예약 방법', vec: [0.15, 0.20], similarity: 0.12 },
      { id: 'D5', title: '연차 신청 절차', vec: [0.10, 0.25], similarity: 0.08 },
    ];

    const STEPS = [
      {
        desc: "Dense Retrieval은 의미(뜻)로 문서를 찾는 사서입니다. \"점심 추천\"이라고 물으면, 정확히 '점심'이라는 단어가 없더라도 '맛집', '런치', '음식점' 문서를 찾아줍니다.",
        phase: 'intro',
        highlight: [],
      },
      {
        desc: "1단계: 쿼리를 벡터로 변환합니다. Embedding 모델이 \"점심 추천\"을 숫자 배열(벡터)로 바꿉니다. 이 벡터는 '음식', '식사' 같은 의미를 담고 있습니다.",
        phase: 'embed_query',
        highlight: [],
        code: 'query_vec = embeddings.embed_query("점심 추천")\n# [0.85, 0.72, 0.61, ...] ← 의미를 담은 숫자 배열',
      },
      {
        desc: "2단계: 문서도 미리 벡터로 변환되어 저장되어 있습니다. 각 문서의 의미가 벡터 공간의 한 점으로 표현됩니다.",
        phase: 'show_vectors',
        highlight: [],
        code: 'doc_vecs = [embeddings.embed_document(doc) for doc in docs]\n# 각 문서 → 벡터로 변환 → 벡터 DB에 저장',
      },
      {
        desc: "3단계: 코사인 유사도를 계산합니다. 쿼리 벡터와 각 문서 벡터 사이의 거리(각도)를 측정합니다. 의미가 비슷할수록 유사도가 1에 가깝습니다.",
        phase: 'calculate',
        highlight: ['D1', 'D2', 'D3'],
        code: 'from sklearn.metrics.pairwise import cosine_similarity\nscores = cosine_similarity([query_vec], doc_vecs)\n# D1: 0.94, D2: 0.91, D3: 0.85, D4: 0.12, D5: 0.08',
      },
      {
        desc: "4단계: Top-K 문서를 선택합니다. 유사도가 가장 높은 상위 3개 문서를 반환합니다. '회의실', '연차'는 의미적으로 멀어서 자연스럽게 제외됩니다.",
        phase: 'topk',
        highlight: ['D1', 'D2', 'D3'],
        code: 'results = vectorstore.similarity_search(\n    "점심 추천", k=3\n)\n# → [D1: 강남 맛집, D2: 런치 메뉴, D3: 음식점 가이드]',
      },
    ];

    function VectorSpace({ phase, highlight }) {
      const queryPos = { x: 200, y: 80 };
      const docPositions = [
        { x: 220, y: 120 }, { x: 250, y: 140 }, { x: 180, y: 150 },
        { x: 60, y: 250 }, { x: 80, y: 280 },
      ];

      return (
        <div className="relative w-full h-72 bg-slate-50 rounded-lg border border-slate-200 overflow-hidden">
          <svg width="100%" height="100%" viewBox="0 0 340 310">
            <text x="170" y="20" textAnchor="middle" className="fill-slate-400 text-[10px]">벡터 공간 (의미 유사도)</text>
            {phase !== 'intro' && (
              <>
                <circle cx={queryPos.x} cy={queryPos.y} r="8" className="fill-orange-500" />
                <text x={queryPos.x + 12} y={queryPos.y + 4} className="fill-orange-700 text-[10px] font-bold">Q: 점심 추천</text>
              </>
            )}
            {(phase === 'show_vectors' || phase === 'calculate' || phase === 'topk') && DOCUMENTS.map((doc, i) => {
              const pos = docPositions[i];
              const isHighlighted = highlight.includes(doc.id);
              const isRelevant = i < 3;
              return (
                <g key={doc.id}>
                  {(phase === 'calculate' || phase === 'topk') && isRelevant && (
                    <line x1={queryPos.x} y1={queryPos.y} x2={pos.x} y2={pos.y}
                      stroke={isHighlighted ? '#ea580c' : '#94a3b8'} strokeWidth={isHighlighted ? 2 : 1}
                      strokeDasharray={isHighlighted ? '' : '4'} opacity={isHighlighted ? 0.8 : 0.3} />
                  )}
                  <circle cx={pos.x} cy={pos.y} r="6"
                    className={isHighlighted && phase === 'topk' ? 'fill-orange-500' : isRelevant ? 'fill-emerald-400' : 'fill-slate-300'} />
                  <text x={pos.x + 10} y={pos.y + 4} className={`text-[9px] ${isHighlighted && phase === 'topk' ? 'fill-orange-700 font-bold' : 'fill-slate-500'}`}>
                    {doc.id}: {doc.title}
                  </text>
                  {(phase === 'calculate' || phase === 'topk') && (
                    <text x={pos.x + 10} y={pos.y + 16} className={`text-[8px] ${isRelevant ? 'fill-orange-600' : 'fill-slate-400'}`}>
                      유사도: {doc.similarity}
                    </text>
                  )}
                </g>
              );
            })}
            {phase === 'intro' && (
              <text x="170" y="160" textAnchor="middle" className="fill-slate-400 text-xs">의미 기반 검색의 원리를 알아봅시다</text>
            )}
            {phase === 'embed_query' && (
              <>
                <rect x="60" y="140" width="220" height="40" rx="8" className="fill-orange-50 stroke-orange-300" strokeWidth="1" />
                <text x="170" y="157" textAnchor="middle" className="fill-orange-700 text-[10px]">"점심 추천" → [0.85, 0.72, 0.61, ...]</text>
                <text x="170" y="170" textAnchor="middle" className="fill-orange-500 text-[9px]">Embedding 모델이 의미를 벡터로 변환</text>
              </>
            )}
          </svg>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Retrieval 고도화 &gt; Chapter 1. 검색 전략</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-1-1. Dense Retrieval — 의미 기반 검색</h1>
                </div>
              </div>
              <p className="text-slate-600">의미로 책을 찾는 사서를 상상하세요. <b>"점심 추천"</b>이라고 물으면 '맛집', '런치', '음식점' 문서를 찾아줍니다. 단어가 달라도 뜻이 같으면 찾습니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">Dense Retrieval 동작 원리</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <VectorSpace phase={s.phase} highlight={s.highlight} />
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.code ? (
                  <>
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">코드</div>
                    <pre className="bg-slate-900 text-slate-100 p-4 rounded-lg text-xs leading-relaxed overflow-x-auto whitespace-pre-wrap">{s.code}</pre>
                  </>
                ) : (
                  <div className="space-y-4">
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">Dense Retrieval 핵심</div>
                    <div className="p-4 rounded-lg bg-orange-50 border border-orange-200">
                      <div className="font-bold text-sm text-orange-800 mb-2">의미 기반 검색</div>
                      <ul className="text-xs text-orange-700 space-y-1">
                        <li>- 단어 일치가 아닌 의미 유사도로 검색</li>
                        <li>- Embedding 모델이 텍스트를 벡터로 변환</li>
                        <li>- 코사인 유사도로 가장 가까운 문서 선택</li>
                      </ul>
                    </div>
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">장점 vs 한계</div>
                      <div className="grid grid-cols-2 gap-2 text-xs">
                        <div className="text-emerald-700">+ 동의어/유사어 처리</div>
                        <div className="text-red-600">- 학습 데이터 품질 의존</div>
                        <div className="text-emerald-700">+ 의미적 검색 가능</div>
                        <div className="text-red-600">- 고유명사/약어에 약함</div>
                      </div>
                    </div>
                  </div>
                )}
                {s.phase === 'topk' && (
                  <div className="mt-4 p-3 rounded-lg bg-emerald-50 border border-emerald-200">
                    <span className="text-sm font-bold text-emerald-800">Top-3 결과</span>
                    <div className="mt-2 space-y-1">
                      {DOCUMENTS.slice(0, 3).map(d => (
                        <div key={d.id} className="flex justify-between text-xs text-emerald-700">
                          <span>{d.id}: {d.title}</span>
                          <span className="font-mono">{d.similarity}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Dense Retrieval', 'Embedding', 'Cosine Similarity', 'Vector DB', 'Top-K'].map(kw => (
                <span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="../part3/III-2-2.html" className="text-orange-600 hover:text-orange-800 font-medium">&larr; III-2-2. 이전 시각화</a>
              <a href="./IV-1-2.html" className="text-orange-600 hover:text-orange-800 font-medium">IV-1-2. Sparse Retrieval (BM25) &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
