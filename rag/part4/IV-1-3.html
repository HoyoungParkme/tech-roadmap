  <title>RAG 학습 — IV-1-3. Hybrid Search</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />

</head>
<body>
  <div id="root"></div>

  <!--
    IV-1-3. Hybrid Search — Dense + Sparse 결합으로 recall 극대화
    학습 목표: 의미 검색(Dense)과 키워드 검색(Sparse)이 각각 잡지 못하는 약점을
              어떻게 fusion으로 보완하는지를 5단계로 이해한다.
    핵심 비유: 두 명의 사서가 협력 — 의미 사서 + 키워드 사서 → 합산 위원회
    패턴: fastapi v1 — 좌(LiveDataPane: 두 retriever + fusion 박스) / 우(VSCode CodeViewer)
    색상: rose
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 검색 시나리오 — 사용자 질의: "XGBoost 튜닝"
    //   문서 6개 풀 (D1, D3, D5, D7, D12, D15)
    //   Dense: 의미 임베딩 → 의미적으로 유사한 문서
    //   Sparse: BM25 키워드 → 정확 키워드 일치 문서
    // ─────────────────────────────────────────────────────
    const QUERY = 'XGBoost 튜닝';

    const DENSE_RESULTS = [
      { id: 'D3',  title: '머신러닝 알고리즘 개요',        rank: 1, score: 0.92 },
      { id: 'D7',  title: 'XGBoost 하이퍼파라미터 튜닝',    rank: 2, score: 0.88 },
      { id: 'D1',  title: '딥러닝 기초 가이드',             rank: 3, score: 0.85 },
      { id: 'D5',  title: '데이터 전처리 방법',             rank: 4, score: 0.70 },
    ];

    const SPARSE_RESULTS = [
      { id: 'D7',  title: 'XGBoost 하이퍼파라미터 튜닝',    rank: 1, score: 8.5 },
      { id: 'D12', title: 'XGBoost vs LightGBM 비교',       rank: 2, score: 7.2 },
      { id: 'D3',  title: '머신러닝 알고리즘 개요',         rank: 3, score: 5.1 },
      { id: 'D15', title: 'Gradient Boosting 원리',         rank: 4, score: 3.8 },
    ];

    // RRF 계산 — 1/(k+rank) 방식
    const RRF_K = 60;
    function calcRRF(denseRank, sparseRank) {
      const d = denseRank ? 1 / (RRF_K + denseRank) : 0;
      const s = sparseRank ? 1 / (RRF_K + sparseRank) : 0;
      return { dense: d, sparse: s, total: d + s };
    }

    // weighted sum 계산 — alpha * dense_norm + (1-alpha) * sparse_norm
    // 점수 정규화 (min-max) 후 가중합
    function normalize(arr, key) {
      const values = arr.map((r) => r[key]);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      const map = {};
      arr.forEach((r) => { map[r.id] = (r[key] - min) / range; });
      return map;
    }
    const DENSE_NORM = normalize(DENSE_RESULTS, 'score');
    const SPARSE_NORM = normalize(SPARSE_RESULTS, 'score');

    function calcWeighted(id, alpha) {
      const d = DENSE_NORM[id] ?? 0;
      const s = SPARSE_NORM[id] ?? 0;
      return { dense: d, sparse: s, total: alpha * d + (1 - alpha) * s };
    }

    // 통합 후보 목록 (id → {denseRank, sparseRank})
    const CANDIDATES = (() => {
      const ids = new Set([...DENSE_RESULTS.map((r) => r.id), ...SPARSE_RESULTS.map((r) => r.id)]);
      return Array.from(ids).map((id) => {
        const d = DENSE_RESULTS.find((r) => r.id === id);
        const s = SPARSE_RESULTS.find((r) => r.id === id);
        const title = (d || s).title;
        return {
          id,
          title,
          denseRank: d ? d.rank : null,
          sparseRank: s ? s.rank : null,
          denseScore: d ? d.score : null,
          sparseScore: s ? s.score : null,
        };
      });
    })();

    const RRF_FUSED = CANDIDATES
      .map((c) => ({ ...c, ...calcRRF(c.denseRank, c.sparseRank) }))
      .sort((a, b) => b.total - a.total);

    const ALPHA = 0.5;
    const WEIGHTED_FUSED = CANDIDATES
      .map((c) => ({ ...c, ...calcWeighted(c.id, ALPHA) }))
      .sort((a, b) => b.total - a.total);

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의
    //   fusionMode  : 'dense-only' | 'sparse-only' | 'rrf' | 'weighted' | 'final'
    //   leftActive  : 'dense' | 'sparse' | 'both'
    //   fusionBox   : 가운데 fusion 시각화 데이터
    //   finalList   : 통합 결과 [{ rank, id, title, ... }]
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Dense Retrieval만 — 의미 유사 강함, 고유명사 약함',
        desc: 'Dense는 임베딩으로 의미를 비교한다. "XGBoost 튜닝"을 질의하면 "머신러닝 개요"(D3)나 "딥러닝 가이드"(D1) 같은 의미적 이웃까지 잡지만, 정작 "XGBoost vs LightGBM"(D12)처럼 고유명사가 섞인 문서는 임베딩 거리가 멀어 놓칠 수 있다. recall은 넓지만 precision이 흔들린다.',
        fusionMode: 'dense-only',
        leftActive: 'dense',
        fusionBox: { kind: 'passthrough', from: 'dense' },
        finalList: DENSE_RESULTS.map((r, i) => ({
          rank: i + 1,
          id: r.id,
          title: r.title,
          source: 'dense',
          score: r.score.toFixed(2),
          note: i === 0 ? '의미는 가깝지만 키워드 X' : '',
        })),
        code: {
          lang: 'python',
          filename: 'dense-only.py',
          lines: [
            '# Step 1. Dense Retrieval 단독 — 의미 임베딩 검색',
            'from langchain_openai import OpenAIEmbeddings',
            'from langchain_community.vectorstores import FAISS',
            'embeddings = OpenAIEmbeddings(model="text-embedding-3-small")',
            'vectorstore = FAISS.load_local("indexes/ml_docs", embeddings,',
            '                               allow_dangerous_deserialization=True)',
            '# 의미 검색 — top-4',
            'dense_retriever = vectorstore.as_retriever(search_kwargs={"k": 4})',
            'docs = dense_retriever.invoke("XGBoost 튜닝")',
            '',
            '# 결과 — 의미가 가까운 순',
            '#   #1 D3 "머신러닝 알고리즘 개요" 0.92   #3 D1 "딥러닝 기초" 0.85',
            '#   #2 D7 "XGBoost 튜닝"           0.88   #4 D5 "전처리 방법" 0.70',
            '# ⚠ 한계: "XGBoost vs LightGBM"(D12) 누락 → 고유명사 임베딩 약점',
            '# 다음: Sparse(BM25)로 키워드 정확도를 보완',
          ],
          highlight: [1, 2, 3, 4, 5, 6, 8, 9, 12, 13, 14, 15],
        },
      },
      {
        title: 'Step 2. Sparse Retrieval만 — 정확 키워드 강함, 유의어 약함',
        desc: 'Sparse(BM25)는 토큰 빈도와 IDF로 점수를 매긴다. "XGBoost"가 직접 등장한 문서(D7, D12)를 정확히 1·2위로 올리고, "Gradient Boosting"(D15)처럼 같은 계열 키워드도 잡는다. 하지만 "딥러닝 기초"(D1)나 의미적 이웃은 키워드가 다르면 0점 — recall이 좁다.',
        fusionMode: 'sparse-only',
        leftActive: 'sparse',
        fusionBox: { kind: 'passthrough', from: 'sparse' },
        finalList: SPARSE_RESULTS.map((r, i) => ({
          rank: i + 1,
          id: r.id,
          title: r.title,
          source: 'sparse',
          score: r.score.toFixed(1),
          note: i === 0 ? 'XGBoost 키워드 직격' : '',
        })),
        code: {
          lang: 'python',
          filename: 'sparse-only.py',
          lines: [
            '# Step 2. Sparse Retrieval 단독 — BM25 키워드 검색',
            'from langchain_community.retrievers import BM25Retriever',
            'from langchain.schema import Document',
            '# 동일 문서 6건을 BM25 인덱스로 적재',
            'docs_corpus = [',
            '    Document(page_content="머신러닝 알고리즘 개요...",   metadata={"id": "D3"}),',
            '    Document(page_content="XGBoost 하이퍼파라미터 튜닝...", metadata={"id": "D7"}),',
            '    Document(page_content="딥러닝 기초 가이드...",        metadata={"id": "D1"}),',
            '    Document(page_content="데이터 전처리 방법...",        metadata={"id": "D5"}),',
            '    Document(page_content="XGBoost vs LightGBM 비교...", metadata={"id": "D12"}),',
            '    Document(page_content="Gradient Boosting 원리...",   metadata={"id": "D15"}),',
            ']',
            '# BM25Retriever — TF·IDF 기반 (정확 토큰 일치)',
            'sparse_retriever = BM25Retriever.from_documents(docs_corpus)',
            'sparse_retriever.k = 4',
            'docs = sparse_retriever.invoke("XGBoost 튜닝")',
            '',
            '# 결과 — 키워드 일치 강도 순',
            '#   #1 D7  "XGBoost 튜닝"     8.5   #3 D3  "머신러닝 개요"    5.1',
            '#   #2 D12 "XGBoost vs LGBM"  7.2   #4 D15 "Gradient Boost"  3.8',
            '# ⚠ 한계: "딥러닝 기초"(D1) 누락 → "XGBoost" 토큰 0점',
            '#         동의어/유의어 못 잡음 ("ML 모델 튜닝")',
            '# 결론: Dense·Sparse 둘 다 약점 → 합쳐야 한다',
          ],
          highlight: [1, 2, 3, 5, 6, 7, 8, 9, 10, 11, 12, 14, 15, 16, 19, 20, 22, 23],
        },
      },
      {
        title: 'Step 3. Reciprocal Rank Fusion (RRF) — 순위 기반 합산',
        desc: 'RRF는 두 retriever의 "순위"만 받아 1/(k+rank) 점수로 변환해 합산한다. 점수 스케일이 달라도(0.92 vs 8.5) 순위만 쓰니 정규화 불필요. k=60이 일반값. 양쪽 모두 상위권에 든 D7이 가장 높은 합산 점수를 받고, 한쪽에만 등장하는 D1·D12·D15도 일정 점수를 받아 최종 후보에 살아남는다.',
        fusionMode: 'rrf',
        leftActive: 'both',
        fusionBox: {
          kind: 'rrf',
          k: RRF_K,
          formula: 'score(d) = Σ 1 / (k + rank_i)',
          examples: [
            { id: 'D7',  d: '1/(60+2)=0.0161', s: '1/(60+1)=0.0164', total: 0.0325 },
            { id: 'D3',  d: '1/(60+1)=0.0164', s: '1/(60+3)=0.0159', total: 0.0323 },
            { id: 'D12', d: '—',                s: '1/(60+2)=0.0161', total: 0.0161 },
          ],
        },
        finalList: RRF_FUSED.map((r, i) => ({
          rank: i + 1,
          id: r.id,
          title: r.title,
          source: r.denseRank && r.sparseRank ? 'both' : (r.denseRank ? 'dense' : 'sparse'),
          score: r.total.toFixed(4),
          note: i === 0 ? '양쪽 상위권 = 1위' : '',
        })),
        code: {
          lang: 'python',
          filename: 'rrf.py',
          lines: [
            '# Step 3. Reciprocal Rank Fusion — 순위만 보고 합산',
            'from langchain.retrievers import EnsembleRetriever',
            '',
            '# Dense + Sparse 두 retriever 를 묶는다',
            'ensemble = EnsembleRetriever(',
            '    retrievers=[dense_retriever, sparse_retriever],',
            '    weights=[0.5, 0.5],   # RRF 모드 동률 합산',
            ')',
            '',
            '# 내부 동작은 RRF 공식: score(d) = Σ_i  1 / (k + rank_i(d))',
            '#   k = 60 (기본값, 1·2위 차이를 부드럽게)',
            '#   예) D7  → 1/(60+2) + 1/(60+1) = 0.0325 ★ (양쪽 상위)',
            '#       D3  → 1/(60+1) + 1/(60+3) = 0.0323',
            '#       D12 → 0 + 1/(60+2) = 0.0161 (sparse 단독)',
            '',
            'docs = ensemble.invoke("XGBoost 튜닝")',
            '',
            '# 결과 (RRF 합산 순)',
            '#   #1 D7  0.0325 ← 양쪽 상위 ★    #4 D1  0.0159 ← dense',
            '#   #2 D3  0.0323 ← 양쪽 등장      #5 D5  0.0156 ← dense',
            '#   #3 D12 0.0161 ← sparse 단독    #6 D15 0.0156 ← sparse',
            '',
            '# ✓ 점수 정규화 불필요, 양쪽 추천 문서가 1위',
            '# ⚠ 한쪽에만 강하게 일치한 문서는 다소 묻힐 수 있음',
          ],
          highlight: [1, 2, 4, 5, 6, 7, 8, 10, 11, 12, 13, 14, 16, 18, 19, 20, 21, 23, 24],
        },
      },
      {
        title: 'Step 4. Weighted Sum — 점수 정규화 + 가중치(alpha)',
        desc: 'RRF는 순위만 보지만, weighted sum은 "점수"를 정규화(min-max)해서 alpha로 가중 평균한다. alpha=0.7이면 dense 70%·sparse 30%처럼 도메인에 맞게 튜닝 가능. 의미 검색이 강한 도메인은 alpha를 높이고, 키워드 정확도가 중요한 법률·의료는 낮춘다. RRF 대비 세밀한 조정이 가능하다.',
        fusionMode: 'weighted',
        leftActive: 'both',
        fusionBox: {
          kind: 'weighted',
          alpha: ALPHA,
          formula: 'score(d) = α · dense_norm + (1−α) · sparse_norm',
          examples: WEIGHTED_FUSED.slice(0, 3).map((r) => ({
            id: r.id,
            d: r.dense.toFixed(2),
            s: r.sparse.toFixed(2),
            total: r.total,
          })),
        },
        finalList: WEIGHTED_FUSED.map((r, i) => ({
          rank: i + 1,
          id: r.id,
          title: r.title,
          source: r.denseRank && r.sparseRank ? 'both' : (r.denseRank ? 'dense' : 'sparse'),
          score: r.total.toFixed(3),
          note: i === 0 ? `alpha=${ALPHA} 가중합 1위` : '',
        })),
        code: {
          lang: 'python',
          filename: 'weighted.py',
          lines: [
            '# Step 4. Weighted Sum — 점수 정규화 + alpha 가중치',
            'import numpy as np',
            '# 1) 두 retriever 결과를 받는다',
            'dense_hits  = dense_retriever.invoke("XGBoost 튜닝")',
            'sparse_hits = sparse_retriever.invoke("XGBoost 튜닝")',
            '# 2) 점수 정규화 (min-max → 0~1)',
            'def min_max(s):',
            '    s = np.array(s)',
            '    return (s - s.min()) / (s.max() - s.min() + 1e-9)',
            'dense_norm  = dict(zip([d.metadata["id"] for d in dense_hits],',
            '                       min_max([d.metadata["score"] for d in dense_hits])))',
            'sparse_norm = dict(zip([d.metadata["id"] for d in sparse_hits],',
            '                       min_max([d.metadata["score"] for d in sparse_hits])))',
            '# 3) alpha 가중 합산',
            'ALPHA = 0.5  # 법률→낮게, 추천→높게',
            'all_ids = set(dense_norm) | set(sparse_norm)',
            'fused = {id: ALPHA * dense_norm.get(id, 0)',
            '             + (1 - ALPHA) * sparse_norm.get(id, 0)',
            '         for id in all_ids}',
            'for id, score in sorted(fused.items(), key=lambda x: -x[1]):',
            '    print(f"{id}: {score:.3f}")',
            '',
            '# 결과 (α=0.5): D7=1.000 ★  D3=0.715  D12=0.362  D1=0.321',
            '# 💡 RRF: 점수 무관·무튜닝 / Weighted: alpha 로 도메인 조정',
          ],
          highlight: [1, 2, 4, 5, 7, 8, 9, 10, 11, 12, 13, 15, 16, 17, 18, 19, 20, 21, 23, 24],
        },
      },
      {
        title: 'Step 5. 최종 결과 — 두 방식의 장점 결합 (recall ↑, precision ↑)',
        desc: 'Hybrid Search의 진짜 가치는 recall이 올라간다는 것이다. Dense 단독으로는 D12(XGBoost vs LightGBM)를 놓치고, Sparse 단독으로는 D1(딥러닝 기초)을 놓친다. 합치면 6개 문서 모두 후보에 올라온다. 양쪽이 동시에 추천한 D7·D3가 최상위, 한쪽에만 있던 문서들도 살아남아 LLM이 다양한 컨텍스트로 답변할 수 있다.',
        fusionMode: 'final',
        leftActive: 'both',
        fusionBox: {
          kind: 'final',
          comparison: [
            { metric: 'recall@4',     dense: '4/6 (67%)', sparse: '4/6 (67%)', hybrid: '6/6 (100%)' },
            { metric: 'D12 포함',      dense: '✗ 누락',     sparse: '✓ #2',     hybrid: '✓ 살아남음' },
            { metric: 'D1 포함',       dense: '✓ #3',      sparse: '✗ 누락',    hybrid: '✓ 살아남음' },
            { metric: '#1 정확도',     dense: 'D3 (의미만)', sparse: 'D7 (정확)', hybrid: 'D7 (양쪽)' },
          ],
        },
        finalList: RRF_FUSED.map((r, i) => ({
          rank: i + 1,
          id: r.id,
          title: r.title,
          source: r.denseRank && r.sparseRank ? 'both' : (r.denseRank ? 'dense' : 'sparse'),
          score: r.total.toFixed(4),
          note: i === 0 ? '🏆 양쪽 모두 추천 = 최종 1위' : (r.denseRank && r.sparseRank ? '양쪽 등장' : '한쪽 단독'),
        })),
        code: {
          lang: 'markdown',
          filename: 'result.md',
          lines: [
            '# Hybrid Search 최종 정리',
            '',
            '## 질의: "XGBoost 튜닝" — top-4 검색',
            '',
            '## 세 방식 비교',
            '| 방식        | top-1 | recall | 누락된 문서 |',
            '|------------|-------|--------|-------------|',
            '| Dense only  | D3    | 4/6    | D12, D15    |',
            '| Sparse only | D7    | 4/6    | D1, D5      |',
            '| Hybrid(RRF) | D7    | 6/6    | (없음)      |',
            '',
            '## 최종 통합 순위 (RRF, k=60)',
            '1. **D7**  XGBoost 튜닝          `0.0325` ★ 양쪽',
            '2. **D3**  머신러닝 개요          `0.0323`   양쪽',
            '3. **D12** XGBoost vs LightGBM    `0.0161`   sparse',
            '4. **D1**  딥러닝 기초            `0.0159`   dense',
            '5. **D5**  데이터 전처리          `0.0156`   dense',

            '## 왜 하이브리드인가',
            '- Dense 약점 보완: 고유명사 매칭은 sparse가 잡음',
            '- Sparse 약점 보완: 동의어·의미적 이웃은 dense가 잡음',
            '- recall 극대화: 6개 문서 모두 후보 → 컨텍스트 풍부',
            '- precision 향상: 양쪽 상위인 D7이 자연스럽게 1위',
            '',
            '## 언제 어떤 fusion을 쓸까',
            '- 빠른 PoC, 점수 모름 → RRF (무튜닝, 정규화 X)',
            '- 도메인 튜닝 (법률·의료) → Weighted (alpha 조정 가능)',
            '- 한쪽 retriever 매우 강함 → RRF (순위 기반이 안전)',
            '',
            '## 다음 — IV-2-1 Re-ranking: hybrid top-20 → cross-encoder',
          ],
          highlight: [1, 3, 5, 6, 7, 8, 9, 10, 12, 13, 14, 15, 16, 17, 18, 20, 21, 22, 23, 24, 26, 27, 28, 29, 31],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 상단: Dense / Sparse 두 retriever 결과 박스
    // ─────────────────────────────────────────────────────
    function RetrieverBox({ kind, results, active }) {
      const colors = kind === 'dense'
        ? { bg: 'bg-rose-50', border: 'border-rose-300', label: 'text-rose-700', badge: 'bg-rose-600', activeBg: 'bg-rose-100', icon: '🧠', name: 'Dense (의미 임베딩)' }
        : { bg: 'bg-amber-50', border: 'border-amber-300', label: 'text-amber-700', badge: 'bg-amber-600', activeBg: 'bg-amber-100', icon: '🔠', name: 'Sparse (BM25 키워드)' };
      const opacity = active ? '' : 'opacity-50';

      return (
        <div className={`${colors.bg} border-2 ${colors.border} rounded-lg p-3 ${opacity} transition-all duration-500`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">{colors.icon}</span>
              <span className={`text-[11px] font-bold ${colors.label}`}>{colors.name}</span>
            </div>
            <span className={`text-[9px] ${colors.badge} text-white px-1.5 py-0.5 rounded font-mono font-bold`}>
              top-{results.length}
            </span>
          </div>
          <div className="bg-white rounded border border-slate-200 p-2">
            <div className="space-y-1">
              {results.map((r) => (
                <div
                  key={r.id}
                  className={`flex items-center gap-1.5 p-1 rounded ${active ? colors.activeBg : ''} transition-all duration-300`}
                >
                  <span className={`w-5 h-5 ${colors.badge} text-white rounded-full flex items-center justify-center font-bold text-[10px]`}>
                    {r.rank}
                  </span>
                  <span className="font-mono text-[9px] text-slate-500 w-7">{r.id}</span>
                  <span className="text-[10px] text-slate-700 flex-1 truncate">{r.title}</span>
                  <span className="font-mono text-[9px] text-slate-500">{r.score}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙: Fusion 박스 — kind 별로 다른 시각화
    //   - passthrough : 한쪽만 통과 (Step 1·2)
    //   - rrf         : RRF 공식 + 예시 계산 (Step 3)
    //   - weighted    : alpha 가중합 + 예시 (Step 4)
    //   - final       : Dense vs Sparse vs Hybrid 비교 표 (Step 5)
    // ─────────────────────────────────────────────────────
    function FusionBox({ box }) {
      if (box.kind === 'passthrough') {
        const isDense = box.from === 'dense';
        return (
          <div className={`${isDense ? 'bg-rose-50 border-rose-300' : 'bg-amber-50 border-amber-300'} border-2 border-dashed rounded-lg p-3`}>
            <div className="flex items-center gap-1.5 mb-1">
              <span className="text-base">↓</span>
              <span className={`text-[11px] font-bold ${isDense ? 'text-rose-700' : 'text-amber-700'}`}>
                Fusion: 단독 통과 ({box.from} only)
              </span>
            </div>
            <div className="text-[9px] text-slate-600 leading-snug">
              한쪽 retriever 결과만 그대로 사용. 다른 한쪽의 강점을 잃는다.
            </div>
          </div>
        );
      }

      if (box.kind === 'rrf') {
        return (
          <div className="bg-rose-50 border-2 border-rose-400 rounded-lg p-3 shadow-md">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">⚖️</span>
                <span className="text-[11px] font-bold text-rose-700">RRF — Reciprocal Rank Fusion</span>
              </div>
              <span className="text-[9px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                k={box.k}
              </span>
            </div>
            <div className="bg-white rounded border border-rose-200 p-2 mb-2 font-mono text-[10px] text-rose-800">
              {box.formula}
            </div>
            <div className="bg-white rounded border border-rose-200 p-2">
              <div className="text-[9px] font-bold text-rose-700 mb-1 uppercase tracking-wider">예시 계산</div>
              <div className="space-y-1">
                {box.examples.map((ex) => (
                  <div key={ex.id} className="text-[9px] font-mono leading-snug">
                    <div className="flex items-center gap-1.5">
                      <span className="bg-rose-200 text-rose-800 px-1 rounded font-bold w-7 text-center">{ex.id}</span>
                      <span className="text-slate-600">D: {ex.d}</span>
                      <span className="text-slate-400">+</span>
                      <span className="text-slate-600">S: {ex.s}</span>
                      <span className="text-rose-700 font-bold ml-auto">= {ex.total.toFixed(4)}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div className="text-[9px] text-rose-700 mt-1.5">
              ✓ 정규화 불필요 — 순위만 사용. 양쪽 등장 = 최상위.
            </div>
          </div>
        );
      }

      if (box.kind === 'weighted') {
        return (
          <div className="bg-purple-50 border-2 border-purple-400 rounded-lg p-3 shadow-md">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">🎚️</span>
                <span className="text-[11px] font-bold text-purple-700">Weighted Sum — α 가중치</span>
              </div>
              <span className="text-[9px] bg-purple-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                α={box.alpha}
              </span>
            </div>
            <div className="bg-white rounded border border-purple-200 p-2 mb-2 font-mono text-[10px] text-purple-800">
              {box.formula}
            </div>
            <div className="bg-white rounded border border-purple-200 p-2">
              <div className="text-[9px] font-bold text-purple-700 mb-1 uppercase tracking-wider">정규화 후 가중합 (top 3)</div>
              <div className="space-y-1">
                {box.examples.map((ex) => (
                  <div key={ex.id} className="text-[9px] font-mono leading-snug">
                    <div className="flex items-center gap-1.5">
                      <span className="bg-purple-200 text-purple-800 px-1 rounded font-bold w-7 text-center">{ex.id}</span>
                      <span className="text-slate-600">{box.alpha}·{ex.d}</span>
                      <span className="text-slate-400">+</span>
                      <span className="text-slate-600">{(1 - box.alpha).toFixed(1)}·{ex.s}</span>
                      <span className="text-purple-700 font-bold ml-auto">= {ex.total.toFixed(3)}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div className="text-[9px] text-purple-700 mt-1.5">
              ✓ 도메인별 alpha 튜닝 가능 — 의미 위주는 ↑, 키워드 위주는 ↓
            </div>
          </div>
        );
      }

      if (box.kind === 'final') {
        return (
          <div className="bg-emerald-50 border-2 border-emerald-400 rounded-lg p-3 shadow-md">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">📊</span>
                <span className="text-[11px] font-bold text-emerald-700">Hybrid 최종 비교</span>
              </div>
              <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                recall ↑↑
              </span>
            </div>
            <div className="bg-white rounded border border-emerald-200 p-2 overflow-x-auto">
              <table className="text-[9px] w-full">
                <thead>
                  <tr className="text-emerald-700 font-bold border-b border-emerald-200">
                    <th className="text-left py-0.5 px-1">지표</th>
                    <th className="text-left py-0.5 px-1">Dense</th>
                    <th className="text-left py-0.5 px-1">Sparse</th>
                    <th className="text-left py-0.5 px-1">Hybrid</th>
                  </tr>
                </thead>
                <tbody>
                  {box.comparison.map((row, i) => (
                    <tr key={i} className="border-b border-slate-100">
                      <td className="py-0.5 px-1 font-mono text-slate-600">{row.metric}</td>
                      <td className="py-0.5 px-1 text-rose-700">{row.dense}</td>
                      <td className="py-0.5 px-1 text-amber-700">{row.sparse}</td>
                      <td className="py-0.5 px-1 text-emerald-700 font-bold">{row.hybrid}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="text-[9px] text-emerald-700 mt-1.5">
              ✨ 6개 문서 전부 후보로 — 두 방식의 장점만 결합
            </div>
          </div>
        );
      }

      return null;
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: 통합 결과 박스 — 최종 fusion 순위
    // ─────────────────────────────────────────────────────
    function FinalList({ list, fusionMode }) {
      const modeLabel = {
        'dense-only': 'Dense 단독',
        'sparse-only': 'Sparse 단독',
        'rrf': 'RRF 합산',
        'weighted': 'Weighted Sum',
        'final': 'Hybrid 최종',
      }[fusionMode] || '';

      return (
        <div className="bg-white border-2 border-rose-200 rounded-lg p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🏁</span>
              <span className="text-[11px] font-bold text-rose-800">통합 결과 — {modeLabel}</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">
              {list.length} docs
            </span>
          </div>
          <div className="space-y-1">
            {list.map((r) => {
              const sourceColor = r.source === 'both'
                ? 'bg-emerald-100 text-emerald-700 border-emerald-300'
                : r.source === 'dense'
                ? 'bg-rose-100 text-rose-700 border-rose-300'
                : 'bg-amber-100 text-amber-700 border-amber-300';
              const isTop = r.rank === 1;
              return (
                <div
                  key={r.id}
                  className={`p-1.5 rounded border transition-all duration-500 ${
                    isTop && fusionMode === 'final'
                      ? 'bg-rose-50 border-rose-400 shadow-md scale-[1.02]'
                      : isTop
                      ? 'bg-rose-50 border-rose-300'
                      : 'bg-slate-50 border-slate-100'
                  }`}
                >
                  <div className="flex items-center gap-1.5 mb-0.5">
                    <span className={`w-5 h-5 ${isTop ? 'bg-rose-600' : 'bg-slate-400'} text-white rounded-full flex items-center justify-center font-bold text-[10px]`}>
                      {r.rank}
                    </span>
                    <span className="font-mono text-[9px] text-slate-500 w-7">{r.id}</span>
                    <span className="text-[10px] font-medium text-slate-700 flex-1 truncate">{r.title}</span>
                    <span className={`text-[8px] px-1 py-0.5 rounded border font-mono font-bold ${sourceColor}`}>
                      {r.source === 'both' ? 'D+S' : r.source === 'dense' ? 'D' : 'S'}
                    </span>
                    <span className="font-mono text-[9px] text-slate-600 w-14 text-right">{r.score}</span>
                  </div>
                  {r.note && (
                    <div className="text-[8px] text-rose-600 italic ml-7">{r.note}</div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: Dense / Sparse 두 retriever (가로 분할)
    //   중앙: Fusion 박스 (단계별 변화)
    //   하단: 통합 결과 리스트
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const denseActive = step.leftActive === 'dense' || step.leftActive === 'both';
      const sparseActive = step.leftActive === 'sparse' || step.leftActive === 'both';

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🔍 질의: <span className="font-mono text-rose-700">"{QUERY}"</span></h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 두 retriever (가로 분할) */}
          <div className="grid grid-cols-2 gap-2 mb-2">
            <RetrieverBox kind="dense" results={DENSE_RESULTS} active={denseActive} />
            <RetrieverBox kind="sparse" results={SPARSE_RESULTS} active={sparseActive} />
          </div>

          {/* 가운데 화살표 */}
          <div className="text-center text-rose-400 text-[10px] font-mono my-1">↓ fusion ↓</div>

          {/* Fusion 박스 */}
          <div className="mb-2">
            <FusionBox box={step.fusionBox} />
          </div>

          {/* 가운데 화살표 */}
          <div className="text-center text-rose-400 text-[10px] font-mono my-1">↓ ranked ↓</div>

          {/* 통합 결과 */}
          <FinalList list={step.finalList} fusionMode={step.fusionMode} />

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>Dense (D)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>Sparse (S)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>Both (D+S)
            </span>
            <span className="ml-auto font-mono text-slate-400">k=60 / α=0.5</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Retrieval 고도화 &gt; Chapter 1. 검색 전략</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-1-3. Hybrid Search — Dense + Sparse 결합으로 recall 극대화</h1>
                  <p className="text-sm text-slate-500 mt-0.5">의미 사서 + 키워드 사서 → RRF / Weighted Sum 으로 합산</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: 빠른 PoC는 <strong>RRF</strong>(무튜닝), 도메인 가중치 필요하면 <strong>Weighted Sum</strong>(α 조정). 다음(IV-2-1)에서는 hybrid 결과를 <strong>Re-ranking</strong>(cross-encoder)으로 한번 더 줄세운다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Hybrid Search', 'RRF', 'Weighted Sum', 'Dense + Sparse', 'EnsembleRetriever', 'Rank Fusion'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-1-2.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; IV-1-2 Sparse Retrieval (BM25)</a>
              <a href="./IV-2-1.html" className="text-rose-700 hover:text-rose-900 font-medium">IV-2-1 Re-ranking &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
