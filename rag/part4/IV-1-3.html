<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — IV-1-3. Hybrid Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const DENSE_RESULTS = [
      { id: 'D3', title: '머신러닝 알고리즘 개요', rank: 1, score: 0.92 },
      { id: 'D7', title: 'XGBoost 하이퍼파라미터 튜닝', rank: 2, score: 0.88 },
      { id: 'D1', title: '딥러닝 기초 가이드', rank: 3, score: 0.85 },
      { id: 'D5', title: '데이터 전처리 방법', rank: 4, score: 0.70 },
    ];

    const SPARSE_RESULTS = [
      { id: 'D7', title: 'XGBoost 하이퍼파라미터 튜닝', rank: 1, score: 8.5 },
      { id: 'D12', title: 'XGBoost vs LightGBM 비교', rank: 2, score: 7.2 },
      { id: 'D3', title: '머신러닝 알고리즘 개요', rank: 3, score: 5.1 },
      { id: 'D15', title: 'Gradient Boosting 원리', rank: 4, score: 3.8 },
    ];

    const RRF_K = 60;

    function calcRRF(denseRank, sparseRank) {
      const d = denseRank ? 1 / (RRF_K + denseRank) : 0;
      const s = sparseRank ? 1 / (RRF_K + sparseRank) : 0;
      return { dense: d, sparse: s, total: d + s };
    }

    const HYBRID_RESULTS = [
      { id: 'D7', title: 'XGBoost 하이퍼파라미터 튜닝', denseRank: 2, sparseRank: 1, ...calcRRF(2, 1) },
      { id: 'D3', title: '머신러닝 알고리즘 개요', denseRank: 1, sparseRank: 3, ...calcRRF(1, 3) },
      { id: 'D12', title: 'XGBoost vs LightGBM 비교', denseRank: null, sparseRank: 2, ...calcRRF(null, 2) },
      { id: 'D1', title: '딥러닝 기초 가이드', denseRank: 3, sparseRank: null, ...calcRRF(3, null) },
      { id: 'D5', title: '데이터 전처리 방법', denseRank: 4, sparseRank: null, ...calcRRF(4, null) },
      { id: 'D15', title: 'Gradient Boosting 원리', denseRank: null, sparseRank: 4, ...calcRRF(null, 4) },
    ].sort((a, b) => b.total - a.total);

    const STEPS = [
      {
        desc: "Hybrid Search는 두 명의 사서가 협력하는 것입니다. 의미 사서(Dense)와 키워드 사서(Sparse)가 각각 검색한 결과를 합쳐서 최종 순위를 정합니다.",
        phase: 'intro',
      },
      {
        desc: "1단계: Dense Retrieval (의미 사서) — \"XGBoost 튜닝\"의 의미를 이해해서, '머신러닝', '딥러닝' 같은 의미적으로 관련된 문서도 찾아냅니다.",
        phase: 'dense',
      },
      {
        desc: "2단계: Sparse Retrieval (키워드 사서) — \"XGBoost\"라는 정확한 키워드로 검색합니다. XGBoost가 직접 언급된 문서를 정확하게 찾습니다.",
        phase: 'sparse',
      },
      {
        desc: "3단계: 두 결과를 비교합니다. D7(XGBoost 튜닝)은 양쪽 모두 상위권. D12(XGBoost vs LightGBM)는 키워드에만, D1(딥러닝 기초)은 의미에만 등장합니다.",
        phase: 'compare',
      },
      {
        desc: "4단계: RRF(Reciprocal Rank Fusion)로 합산합니다. 공식: 1/(k+rank). 양쪽 모두 상위권인 문서는 높은 최종 점수를 받습니다. k=60이 일반적입니다.",
        phase: 'rrf',
        code: 'RRF_score(d) = sum( 1 / (k + rank_i) )\n\nk = 60\n\nD7: 1/(60+2) + 1/(60+1) = 0.0161 + 0.0164 = 0.0325\nD3: 1/(60+1) + 1/(60+3) = 0.0164 + 0.0159 = 0.0323',
      },
      {
        desc: "5단계: 최종 결과 — D7(XGBoost 튜닝)이 1위! 양쪽 사서 모두 추천한 문서가 가장 높은 순위를 받습니다. Dense만 쓸 때보다 더 정확하고, Sparse만 쓸 때보다 더 포괄적입니다.",
        phase: 'final',
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Retrieval 고도화 &gt; Chapter 1. 검색 전략</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-1-3. Hybrid Search — 두 사서의 협력</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>의미 사서</b>(Dense)와 <b>키워드 사서</b>(Sparse)의 결과를 RRF로 합산합니다. 양쪽 모두 추천하면 최상위!</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">Hybrid Search 과정</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="space-y-4">
                {/* Dense 결과 */}
                <div className={`bg-white rounded-xl border p-4 transition-all duration-500 ${s.phase === 'dense' || s.phase === 'compare' ? 'border-blue-300 shadow-md' : 'border-slate-200'}`}>
                  <div className="text-xs font-bold text-blue-600 uppercase tracking-wider mb-2">Dense Retrieval (의미 검색)</div>
                  <div className="space-y-1.5">
                    {DENSE_RESULTS.map((r, i) => {
                      const inSparse = SPARSE_RESULTS.some(sr => sr.id === r.id);
                      return (
                        <div key={r.id} className={`flex items-center gap-2 p-2 rounded text-xs transition-all duration-300 ${s.phase === 'compare' && inSparse ? 'bg-purple-50 border border-purple-200' : s.phase === 'dense' ? 'bg-blue-50' : 'bg-slate-50'}`}>
                          <span className="w-5 h-5 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center font-bold text-[10px]">{r.rank}</span>
                          <span className="flex-1 font-medium text-slate-700">{r.id}: {r.title}</span>
                          <span className="font-mono text-slate-500">{r.score}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Sparse 결과 */}
                <div className={`bg-white rounded-xl border p-4 transition-all duration-500 ${s.phase === 'sparse' || s.phase === 'compare' ? 'border-amber-300 shadow-md' : 'border-slate-200'}`}>
                  <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-2">Sparse Retrieval (키워드 검색)</div>
                  <div className="space-y-1.5">
                    {SPARSE_RESULTS.map((r, i) => {
                      const inDense = DENSE_RESULTS.some(dr => dr.id === r.id);
                      return (
                        <div key={r.id} className={`flex items-center gap-2 p-2 rounded text-xs transition-all duration-300 ${s.phase === 'compare' && inDense ? 'bg-purple-50 border border-purple-200' : s.phase === 'sparse' ? 'bg-amber-50' : 'bg-slate-50'}`}>
                          <span className="w-5 h-5 bg-amber-100 text-amber-700 rounded-full flex items-center justify-center font-bold text-[10px]">{r.rank}</span>
                          <span className="flex-1 font-medium text-slate-700">{r.id}: {r.title}</span>
                          <span className="font-mono text-slate-500">{r.score}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.code ? (
                  <>
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">RRF 공식</div>
                    <pre className="bg-slate-900 text-slate-100 p-4 rounded-lg text-xs leading-relaxed overflow-x-auto whitespace-pre-wrap">{s.code}</pre>
                  </>
                ) : s.phase === 'final' || s.phase === 'rrf' ? (
                  <div>
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">RRF 합산 결과</div>
                    <div className="space-y-2">
                      {HYBRID_RESULTS.map((r, i) => (
                        <div key={r.id} className={`p-3 rounded-lg border transition-all duration-500 ${i === 0 && s.phase === 'final' ? 'bg-orange-50 border-orange-300 shadow-md scale-105' : 'bg-slate-50 border-slate-100'}`}>
                          <div className="flex items-center justify-between mb-1">
                            <span className="font-bold text-sm text-slate-700">#{i + 1} {r.id}: {r.title}</span>
                            <span className="font-mono text-xs text-orange-600 font-bold">{r.total.toFixed(4)}</span>
                          </div>
                          <div className="flex gap-3 text-[10px] text-slate-500">
                            <span>Dense: {r.denseRank ? `#${r.denseRank} (${r.dense.toFixed(4)})` : '-'}</span>
                            <span>Sparse: {r.sparseRank ? `#${r.sparseRank} (${r.sparse.toFixed(4)})` : '-'}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">Hybrid Search 핵심</div>
                    <div className="p-4 rounded-lg bg-orange-50 border border-orange-200">
                      <div className="font-bold text-sm text-orange-800 mb-2">왜 합치는가?</div>
                      <ul className="text-xs text-orange-700 space-y-1">
                        <li>- Dense: 의미는 잡지만 고유명사 놓침</li>
                        <li>- Sparse: 키워드는 잡지만 유의어 놓침</li>
                        <li>- 합치면 양쪽의 약점을 보완!</li>
                      </ul>
                    </div>
                    <div className="p-4 rounded-lg bg-blue-50 border border-blue-200">
                      <div className="font-bold text-sm text-blue-800 mb-2">RRF (Reciprocal Rank Fusion)</div>
                      <ul className="text-xs text-blue-700 space-y-1">
                        <li>- 각 검색기의 순위를 점수로 변환</li>
                        <li>- 점수를 합산해 최종 순위 결정</li>
                        <li>- 스코어 정규화 불필요 (순위 기반)</li>
                      </ul>
                    </div>
                    {s.phase === 'compare' && (
                      <div className="p-3 rounded-lg bg-purple-50 border border-purple-200">
                        <div className="font-bold text-xs text-purple-800">양쪽 모두 등장하는 문서</div>
                        <div className="text-xs text-purple-600 mt-1">D7, D3 — 이 문서들이 최상위 후보!</div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Hybrid Search', 'RRF', 'Dense + Sparse', 'Rank Fusion', 'Ensemble Retrieval'].map(kw => (
                <span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./IV-1-2.html" className="text-orange-600 hover:text-orange-800 font-medium">&larr; IV-1-2. Sparse Retrieval (BM25)</a>
              <a href="./IV-2-1.html" className="text-orange-600 hover:text-orange-800 font-medium">IV-2-1. Re-ranking &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
