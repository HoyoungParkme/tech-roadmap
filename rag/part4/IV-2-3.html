<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — IV-2-3. Contextual Compression</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const FULL_DOC = [
      { text: "FastAPI는 Python으로 작성된 현대적인 웹 프레임워크입니다.", relevant: false },
      { text: "Starlette를 기반으로 하며, 비동기 처리를 지원합니다.", relevant: false },
      { text: "FastAPI의 성능을 최적화하려면 비동기 엔드포인트를 사용하세요.", relevant: true },
      { text: "async def 키워드로 엔드포인트를 정의하면 I/O 바운드 작업에서 성능이 크게 향상됩니다.", relevant: true },
      { text: "또한 응답 모델을 명시하면 직렬화 속도가 빨라집니다.", relevant: true },
      { text: "FastAPI는 OpenAPI 문서를 자동 생성합니다.", relevant: false },
      { text: "Swagger UI를 통해 API를 테스트할 수 있습니다.", relevant: false },
    ];

    const STEPS = [
      {
        desc: "Contextual Compression은 형광펜 밑줄 긋기입니다. 검색된 문서 전체를 LLM에 넘기는 대신, 질문과 관련된 문장만 추출해서 전달합니다. 노이즈를 줄이고 핵심만 남깁니다.",
        phase: 'intro',
        showHighlight: false,
      },
      {
        desc: "1단계: 검색 결과로 전체 문서가 반환됩니다. 7문장 중 질문(\"성능 최적화\")과 관련된 것은 3문장뿐입니다. 나머지 4문장은 노이즈입니다.",
        phase: 'before',
        showHighlight: false,
      },
      {
        desc: "2단계: Compressor가 질문과 관련된 문장만 추출합니다. LLMChainExtractor는 LLM에게 \"이 문서에서 질문과 관련된 부분만 추출해줘\"라고 요청합니다.",
        phase: 'compressing',
        showHighlight: true,
        code: 'from langchain.retrievers import ContextualCompressionRetriever\nfrom langchain.retrievers.document_compressors import LLMChainExtractor\n\ncompressor = LLMChainExtractor.from_llm(llm)\nretriever = ContextualCompressionRetriever(\n    base_compressor=compressor,\n    base_retriever=vectorstore.as_retriever()\n)',
      },
      {
        desc: "3단계: 압축 결과 — 7문장이 3문장으로 줄었습니다. 토큰 수가 60% 절감되고, LLM이 핵심에 집중할 수 있습니다. 답변 품질도 올라갑니다.",
        phase: 'after',
        showHighlight: true,
      },
      {
        desc: "EmbeddingsFilter는 LLM 호출 없이 임베딩 유사도로 필터링합니다. 빠르고 저렴하지만 정밀도는 LLMChainExtractor보다 낮습니다. 비용과 품질의 트레이드오프입니다.",
        phase: 'filter',
        code: 'from langchain.retrievers.document_compressors import EmbeddingsFilter\n\n# 임베딩 유사도 기반 필터 (LLM 호출 없음)\nfilter = EmbeddingsFilter(\n    embeddings=embeddings,\n    similarity_threshold=0.75  # 유사도 임계값\n)\nretriever = ContextualCompressionRetriever(\n    base_compressor=filter,\n    base_retriever=vectorstore.as_retriever()\n)',
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [showBefore, setShowBefore] = useState(true);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderDoc = () => {
        const isAfter = s.phase === 'after';
        const showHL = s.showHighlight;
        const items = isAfter ? FULL_DOC.filter(d => d.relevant) : FULL_DOC;

        return (
          <div className="space-y-2">
            <div className="flex items-center justify-between mb-2">
              <div className="text-xs font-bold text-orange-600 uppercase tracking-wider">
                {isAfter ? 'After: 압축된 문서 (3문장)' : 'Before: 전체 문서 (7문장)'}
              </div>
              {(s.phase === 'after' || s.phase === 'compressing') && (
                <button onClick={() => setShowBefore(p => !p)} className="text-[10px] px-2 py-1 rounded bg-slate-100 text-slate-600 hover:bg-slate-200">
                  {showBefore ? 'Before 보기' : 'After 보기'}
                </button>
              )}
            </div>
            {(showBefore && (s.phase === 'after' || s.phase === 'compressing') ? FULL_DOC : items).map((line, i) => (
              <div key={i} className={`p-2 rounded text-xs transition-all duration-500 ${
                showHL && line.relevant ? 'bg-orange-100 border-2 border-orange-400 font-medium text-orange-900' :
                showHL && !line.relevant ? 'bg-slate-50 border border-slate-100 text-slate-400 line-through' :
                'bg-slate-50 border border-slate-100 text-slate-700'
              }`}>
                {showHL && line.relevant && <span className="text-orange-500 mr-1">*</span>}
                {line.text}
              </div>
            ))}
            {isAfter && !showBefore && (
              <div className="text-center p-2 bg-emerald-50 border border-emerald-200 rounded-lg">
                <span className="text-xs text-emerald-700 font-bold">7문장 → 3문장 (토큰 60% 절감)</span>
              </div>
            )}
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Retrieval 고도화 &gt; Chapter 2. 검색 품질 개선</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-2-3. Contextual Compression — 형광펜 밑줄</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>형광펜 밑줄</b> 긋기 — 전체 페이지 대신 관련 문장만 추출. 노이즈를 줄이고 LLM이 핵심에 집중하게 합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">Contextual Compression 과정</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="mb-3 p-2 rounded bg-blue-50 border border-blue-200">
                  <div className="text-[10px] font-bold text-blue-600 uppercase">질문</div>
                  <div className="text-xs text-blue-800 font-mono">FastAPI 성능을 최적화하는 방법은?</div>
                </div>
                {renderDoc()}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.code ? (
                  <>
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">코드</div>
                    <pre className="bg-slate-900 text-green-300 p-4 rounded-lg text-xs leading-relaxed overflow-x-auto whitespace-pre-wrap">{s.code}</pre>
                  </>
                ) : (
                  <div className="space-y-4">
                    <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-3">Contextual Compression 핵심</div>
                    <div className="p-4 rounded-lg bg-orange-50 border border-orange-200">
                      <div className="font-bold text-sm text-orange-800 mb-2">왜 압축하는가?</div>
                      <ul className="text-xs text-orange-700 space-y-1">
                        <li>- LLM 컨텍스트 윈도우 절약</li>
                        <li>- 노이즈 제거 → 답변 품질 향상</li>
                        <li>- "Lost in the Middle" 문제 완화</li>
                      </ul>
                    </div>
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">2가지 방법</div>
                      <div className="space-y-2">
                        <div className="p-2 bg-white rounded border border-slate-100">
                          <div className="text-xs font-bold text-blue-700">LLMChainExtractor</div>
                          <div className="text-[10px] text-slate-500">LLM으로 관련 부분 추출. 정밀하지만 느림</div>
                        </div>
                        <div className="p-2 bg-white rounded border border-slate-100">
                          <div className="text-xs font-bold text-amber-700">EmbeddingsFilter</div>
                          <div className="text-[10px] text-slate-500">임베딩 유사도로 필터링. 빠르고 저렴</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {s.phase === 'after' && (
                  <div className="mt-4 space-y-2">
                    <div className="p-3 rounded-lg bg-emerald-50 border border-emerald-200">
                      <div className="text-xs font-bold text-emerald-700 mb-1">압축 효과</div>
                      <div className="grid grid-cols-2 gap-2 text-[10px] text-emerald-600">
                        <div>토큰 수: 180 → 72 (60% 감소)</div>
                        <div>관련성: 43% → 100%</div>
                        <div>LLM 비용: 절감</div>
                        <div>답변 품질: 향상</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Contextual Compression', 'LLMChainExtractor', 'EmbeddingsFilter', 'Token 절약', 'Noise 제거'].map(kw => (
                <span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./IV-2-2.html" className="text-orange-600 hover:text-orange-800 font-medium">&larr; IV-2-2. Query Transformation</a>
              <a href="./IV-2-4.html" className="text-orange-600 hover:text-orange-800 font-medium">IV-2-4. Parent Document Retriever &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
