            '    ]',
            ')',
            '```',
            '',
            '## 핵심 정리',
            '',
            '> Contextual Compression = "검색 후 LLM 직전" 단계에서',
            '> 노이즈를 제거해 토큰을 줄이고 답변 품질을 올리는 패턴',
            '',
            '- 토큰 절감 → 비용 절감 + context window 여유',
            '- 노이즈 제거 → Lost in the Middle 완화 → 품질 ↑',
            '- 다음(IV-2-4): Parent Document Retriever',
          ],
          highlight: [1, 3, 5, 6, 7, 8, 9, 10, 12, 14, 15, 16, 17, 19, 21, 22, 23, 24, 25, 26, 27, 30, 32, 33, 35],
        },
      },
    ];

    // 좌측 상단: 검색 chunk 리스트 — state별 스타일
    const MODE_LABEL = { raw: 'top-k=6 raw', extractor: 'extracted', filter: 'filtered', rerank: 'reranked', result: 'final' };
    function ChunkList({ chunks, mode }) {
      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📄</span>
              <span className="text-[11px] font-bold text-rose-800">검색된 chunk (top-6)</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">{MODE_LABEL[mode] || mode}</span>
          </div>
          <div className="space-y-1.5 max-h-72 overflow-y-auto">
            {chunks.map((c) => {
              let frame = 'bg-white border-rose-200', scoreCls = 'bg-rose-600 text-white';
              let textBlock = <span className="text-[10px] text-slate-700 leading-tight">{c.text}</span>;
              let badge = <span className="text-[8px] bg-rose-500 text-white px-1 rounded font-bold">keep</span>;
              if (c.state === 'drop') {
                frame = 'bg-slate-50 border-slate-200 opacity-50'; scoreCls = 'bg-slate-400 text-white';
                textBlock = <span className="text-[10px] text-slate-400 line-through leading-tight">{c.text}</span>;
                badge = <span className="text-[8px] bg-slate-400 text-white px-1 rounded font-bold">DROP</span>;
              } else if (c.state === 'extract') {
                frame = 'bg-rose-50 border-rose-300';
                textBlock = (
                  <div className="space-y-0.5">
                    <span className="text-[10px] text-slate-400 line-through leading-tight block">{c.text}</span>
                    <span className="text-[10px] text-rose-900 font-medium leading-tight bg-yellow-100 px-1 rounded inline-block border border-yellow-300">✂ {c.extract}</span>
                  </div>
                );
                badge = <span className="text-[8px] bg-rose-600 text-white px-1 rounded font-bold animate-pulse">EXTRACT</span>;
              } else if (c.state === 'rerank-top') {
                frame = 'bg-sky-50 border-sky-400 ring-1 ring-sky-200'; scoreCls = 'bg-sky-600 text-white';
                textBlock = <span className="text-[10px] text-sky-900 leading-tight font-medium">{c.text}</span>;
                badge = <span className="text-[8px] bg-sky-600 text-white px-1 rounded font-bold">RERANK #{c.rerankPos}</span>;
              } else if (c.state === 'rerank-low') {
                frame = 'bg-slate-50 border-slate-200 opacity-60'; scoreCls = 'bg-slate-400 text-white';
                textBlock = <span className="text-[10px] text-slate-500 leading-tight">{c.text}</span>;
                badge = <span className="text-[8px] bg-slate-400 text-white px-1 rounded font-bold">cut #{c.rerankPos}</span>;
              }
              return (
                <div key={c.id} className={`p-1.5 rounded border ${frame} transition-all duration-500`}>
                  <div className="flex items-center gap-1.5 mb-0.5">
                    <span className="text-[9px] font-mono font-bold text-slate-500 w-6">#{c.id}</span>
                    <span className={`text-[8px] font-mono px-1 py-0.5 rounded font-bold ${scoreCls}`}>{c.score.toFixed(2)}</span>
                    {badge}
                    <span className="ml-auto text-[8px] text-slate-400 font-mono">{c.tokens} tok</span>
                  </div>
                  <div className="ml-7">{textBlock}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // 좌측 중간: 압축 박스 — kind별 시각화 (none/extractor/filter/rerank/result)
    function CompressorBox({ comp }) {
      if (comp.kind === 'none') {
        return (
          <div className="bg-slate-50 border-2 border-dashed border-slate-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-1.5">
              <span className="text-base">⏭</span>
              <span className="text-[11px] font-bold text-slate-700">Compressor: 없음</span>
            </div>
            <div className="bg-white rounded border border-slate-200 p-2 text-center">
              <div className="text-[10px] text-slate-600 font-mono">pass-through</div>
              <div className="text-[9px] text-slate-500 mt-0.5">검색 결과 그대로 LLM에 전달</div>
            </div>
          </div>
        );
      }
      if (comp.kind === 'extractor') {
        return (
          <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5"><span className="text-base">✂️</span><span className="text-[11px] font-bold text-rose-800">LLMChainExtractor</span></div>
              <span className="text-[9px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">LLM ×{comp.calls}</span>
            </div>
            <div className="bg-white rounded border border-rose-200 p-2 mb-2 text-[9px] text-rose-700 font-mono">
              for each chunk: <span className="bg-rose-100 px-1 rounded">{comp.model}</span>("관련 부분만 발췌")
            </div>
            <div className="bg-white rounded border border-rose-200 p-2 max-h-32 overflow-y-auto">
              <div className="text-[9px] font-bold text-rose-700 mb-1 uppercase tracking-wider">발췌 결과</div>
              <div className="space-y-1">
                {comp.extracted.map((e) => (
                  <div key={e.id} className="text-[9px] leading-snug border-l-2 border-rose-400 pl-1.5">
                    <div className="flex items-center gap-1">
                      <span className="font-mono font-bold text-rose-700">#{e.id}</span>
                      <span className="text-[8px] text-slate-500 font-mono">{e.origTokens} → {e.newTokens} tok</span>
                    </div>
                    <div className="text-rose-900">"{e.text}"</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="text-[9px] text-rose-700 mt-1.5">✓ chunk 내부까지 가위질 — 정밀도 최고, 비용은 N배</div>
          </div>
        );
      }
      if (comp.kind === 'filter') {
        return (
          <div className="bg-amber-50 border-2 border-amber-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5"><span className="text-base">🪣</span><span className="text-[11px] font-bold text-amber-800">EmbeddingsFilter</span></div>
              <span className="text-[9px] bg-amber-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">LLM ×0</span>
            </div>
            <div className="bg-white rounded border border-amber-200 p-2 mb-2 text-[9px] text-amber-700 font-mono">
              <span className="bg-amber-100 px-1 rounded">{comp.model}</span> · cosine sim ≥ {comp.threshold}
            </div>
            <div className="bg-white rounded border border-amber-200 p-2">
              <div className="grid grid-cols-2 gap-1 text-[9px]">
                <div>
                  <div className="font-bold text-amber-700 mb-0.5 uppercase tracking-wider">✓ kept ({comp.kept.length})</div>
                  {comp.kept.map((c) => (<div key={c.id} className="font-mono text-emerald-700 leading-tight">#{c.id} ({c.score.toFixed(2)})</div>))}
                </div>
                <div>
                  <div className="font-bold text-slate-500 mb-0.5 uppercase tracking-wider">✗ dropped ({comp.dropped.length})</div>
                  {comp.dropped.map((c) => (<div key={c.id} className="font-mono text-slate-400 leading-tight line-through">#{c.id} ({c.score.toFixed(2)})</div>))}
                </div>
              </div>
            </div>
            <div className="text-[9px] text-amber-700 mt-1.5">✓ LLM 호출 0 — 빠르고 거의 무료, chunk 내부 노이즈는 못 거름</div>
          </div>
        );
      }
      if (comp.kind === 'rerank') {
        return (
          <div className="bg-sky-50 border-2 border-sky-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5"><span className="text-base">🔀</span><span className="text-[11px] font-bold text-sky-800">LLMListwiseRerank</span></div>
              <span className="text-[9px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">LLM ×{comp.calls}</span>
            </div>
            <div className="bg-white rounded border border-sky-200 p-2 mb-2 text-[9px] text-sky-700 font-mono">
              <span className="bg-sky-100 px-1 rounded">{comp.model}</span> · top_n={comp.topN} · 단일 호출 재정렬
            </div>
            <div className="bg-white rounded border border-sky-200 p-2 max-h-32 overflow-y-auto">
              <div className="text-[9px] font-bold text-sky-700 mb-1 uppercase tracking-wider">재정렬 결과</div>
              <div className="space-y-0.5">
                {comp.ranking.map((r) => {
                  const isTop = r.verdict === 'top';
                  return (
                    <div key={r.rank} className={`flex items-center gap-1.5 text-[9px] font-mono leading-tight ${isTop ? 'text-sky-900' : 'text-slate-400 line-through'}`}>
                      <span className={`px-1 rounded font-bold w-5 text-center ${isTop ? 'bg-sky-600 text-white' : 'bg-slate-300 text-slate-600'}`}>{r.rank}</span>
                      <span className="text-slate-500">#{r.id}</span>
                      <span className={`text-[8px] px-1 rounded ${isTop ? 'bg-sky-100 text-sky-700' : 'bg-slate-100 text-slate-400'}`}>s={r.score.toFixed(2)}</span>
                      <span className="flex-1 truncate">{r.snippet}</span>
                    </div>
                  );
                })}
              </div>
            </div>
            <div className="text-[9px] text-sky-700 mt-1.5">✓ LLM 1번으로 의미적 순서 보정 — 1차 검색 score 한계 보완</div>
          </div>
        );
      }
      if (comp.kind === 'result') {
        const colorClasses = {
          slate: 'bg-slate-100 border-slate-300 text-slate-800',
          amber: 'bg-amber-100 border-amber-300 text-amber-900',
          sky:   'bg-sky-100 border-sky-300 text-sky-900',
          rose:  'bg-rose-100 border-rose-400 text-rose-900',
        };
        return (
          <div className="bg-white border-2 border-rose-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2"><span className="text-base">🏆</span><span className="text-[11px] font-bold text-rose-800">4 방식 비교</span></div>
            <div className="space-y-1.5">
              {comp.comparison.map((row, i) => (
                <div key={i} className={`p-1.5 rounded border-2 ${colorClasses[row.color]}`}>
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-[10px] font-bold">{row.name}</span>
                    <span className="text-[9px] font-mono">{row.tokens} tok · LLM ×{row.calls}</span>
                  </div>
                  <div className="grid grid-cols-2 gap-2 text-[9px] font-mono">
                    <div className="flex items-center gap-1"><span className="opacity-70">절감</span><span className="font-bold">{row.savedPct}%</span></div>
                    <div className="flex items-center gap-1"><span className="opacity-70">정확도</span><span className="font-bold">{row.accuracy}</span></div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }
      return null;
    }

    // 좌측 하단: 토큰 막대 (before/after, max=258 기준 비율)
    function TokenBar({ bar }) {
      const max = TOTAL_TOKENS;
      const beforeW = (bar.before / max) * 100;
      const afterW  = (bar.after  / max) * 100;
      const savedColor = bar.savedPct >= 70 ? 'bg-rose-600' :
                          bar.savedPct >= 40 ? 'bg-amber-500' :
                          'bg-slate-400';
      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📊</span>
              <span className="text-[11px] font-bold text-rose-800">prompt 토큰 (max 258)</span>
            </div>
            <span className="text-[9px] text-slate-500 font-mono">절감 {bar.savedPct}%</span>
          </div>

          <div className="space-y-1.5">
            <div>
              <div className="flex items-center justify-between mb-0.5">
                <span className="text-[9px] font-mono font-bold text-slate-500">BEFORE</span>
                <span className="text-[9px] font-mono text-slate-600">{bar.before} tok</span>
              </div>
              <div className="bg-slate-100 rounded h-4 overflow-hidden">
                <div
                  className="bg-slate-500 h-full transition-all duration-700 flex items-center justify-end pr-1"
                  style={{ width: `${beforeW}%` }}
                >
                  <span className="text-[8px] font-mono text-white font-bold">{bar.before}</span>
                </div>
              </div>
            </div>

            <div>
              <div className="flex items-center justify-between mb-0.5">
                <span className="text-[9px] font-mono font-bold text-rose-700">AFTER</span>
                <span className="text-[9px] font-mono text-rose-700 font-bold">{bar.after} tok</span>
              </div>
              <div className="bg-slate-100 rounded h-4 overflow-hidden">
                <div
                  className={`${savedColor} h-full transition-all duration-700 flex items-center justify-end pr-1`}
                  style={{ width: `${afterW}%` }}
                >
                  <span className="text-[8px] font-mono text-white font-bold">{bar.after}</span>
                </div>
              </div>
            </div>
          </div>

          {bar.savedPct > 0 && (
            <div className="text-center mt-2 text-[10px] font-bold text-rose-700">
              ↓ {bar.before - bar.after} tok 절감 ({bar.savedPct}%)
            </div>
          )}
        </div>
      );
    }

    // LiveDataPane — 좌측 패널 (chunk 리스트 / 압축 박스 / 토큰 막대)
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🔍 질의: "FastAPI 성능 최적화 방법은?"</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <ChunkList chunks={step.chunks} mode={step.mode} />
            <CompressorBox comp={step.compressor} />
            <TokenBar bar={step.tokenBar} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>keep
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-yellow-300 border border-yellow-500"></span>extract
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>rerank top
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-400"></span>drop / cut
            </span>
          </div>
        </div>
      );
    }

    // VSCode 스타일 CodeViewer — highlight.js
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // App 메인
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-2-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Retrieval 고도화 &gt; Chapter 2. 검색 품질 개선</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-2-3. Contextual Compression — 검색 결과 압축</h1>
                  <p className="text-sm text-slate-500 mt-0.5">검색된 chunk를 그대로 LLM에 보내지 말자 — 토큰 70% 절감 + 정확도 유지</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: 비용 빡세면 <strong>EmbeddingsFilter</strong>, score 보정 필요하면 <strong>LLMListwiseRerank</strong>, 정확도 최우선이면 <strong>LLMChainExtractor</strong>. 셋을 직렬로 묶은 <strong>DocumentCompressorPipeline</strong>이 실무 권장. 다음(IV-2-4)은 작은 chunk로 검색하고 큰 parent를 반환하는 Parent Document Retriever.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['ContextualCompression', 'LLMChainExtractor', 'EmbeddingsFilter', 'LLMListwiseRerank', 'DocumentCompressorPipeline', 'token 절감'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-2-2.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; IV-2-2 Query Transformation</a>
              <a href="./IV-2-4.html" className="text-rose-700 hover:text-rose-900 font-medium">IV-2-4 Parent Document Retriever &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
