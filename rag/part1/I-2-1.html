<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — I-2-1. Naive vs Advanced vs Modular RAG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const GENERATIONS = [
      {
        id: 'naive', label: 'Naive RAG', icon: '🍳', subtitle: '레시피 그대로 따라하기',
        color: { bg: 'bg-blue-50', border: 'border-blue-300', text: 'text-blue-800', badge: 'bg-blue-600' },
        pipeline: [
          { label: '질문', icon: '❓' },
          { label: '검색', icon: '🔍' },
          { label: '생성', icon: '🤖' },
          { label: '답변', icon: '💬' },
        ],
        pros: ['구현이 간단', '빠른 프로토타이핑'],
        cons: ['검색 품질 낮음', '노이즈 포함', '답변 불안정'],
      },
      {
        id: 'advanced', label: 'Advanced RAG', icon: '👨‍🍳', subtitle: '프로 셰프의 요리',
        color: { bg: 'bg-purple-50', border: 'border-purple-300', text: 'text-purple-800', badge: 'bg-purple-600' },
        pipeline: [
          { label: '질문', icon: '❓' },
          { label: 'Pre-Retrieval', icon: '🔄', extra: '쿼리 변환' },
          { label: '검색', icon: '🔍' },
          { label: 'Post-Retrieval', icon: '📊', extra: 'Re-ranking' },
          { label: '생성', icon: '🤖' },
          { label: '답변', icon: '💬' },
        ],
        pros: ['검색 품질 대폭 향상', '노이즈 제거', '안정적 답변'],
        cons: ['구현 복잡도 증가', '지연 시간 증가'],
      },
      {
        id: 'modular', label: 'Modular RAG', icon: '🧪', subtitle: '분자요리 — 모듈 자유 조합',
        color: { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-600' },
        pipeline: [
          { label: '라우터', icon: '🔀', extra: '쿼리 분류' },
          { label: '검색 A', icon: '🔍', extra: 'Vector DB' },
          { label: '검색 B', icon: '🌐', extra: '웹 검색' },
          { label: '평가', icon: '✅', extra: '품질 판단' },
          { label: '교정', icon: '🔧', extra: '필요시 재검색' },
          { label: '생성', icon: '🤖' },
        ],
        pros: ['상황별 최적 파이프라인', '자가 교정', '확장성 극대화'],
        cons: ['설계 난이도 높음', '운영 복잡도'],
      },
    ];

    const STEPS = [
      { desc: "RAG도 진화합니다. 요리의 발전처럼 — 레시피 따라하기(Naive) → 프로 셰프(Advanced) → 분자요리(Modular). 각 세대의 특징과 한계를 비교합니다.", activeGen: -1 },
      { desc: "[1세대] Naive RAG — 가장 단순한 형태. 질문 → 검색 → 생성 → 답변. 구현은 쉽지만, 검색 품질이 낮고 노이즈가 포함된 채 LLM에 전달됩니다.", activeGen: 0 },
      { desc: "Naive RAG의 문제: \"파이썬 비동기\"를 검색하면 관련 없는 \"파이썬 설치\" 문서도 섞여옵니다. LLM은 노이즈까지 참고해서 부정확한 답변을 생성합니다.", activeGen: 0 },
      { desc: "[2세대] Advanced RAG — Pre-retrieval(쿼리 변환, HyDE)과 Post-retrieval(Re-ranking, 압축)을 추가합니다. 검색 전에 질문을 최적화하고, 검색 후에 결과를 정제합니다.", activeGen: 1 },
      { desc: "Advanced RAG의 효과: 같은 질문이라도 쿼리를 변환해서 검색 범위를 넓히고, Re-ranking으로 관련성 높은 문서만 선별합니다. 답변 품질이 크게 향상됩니다.", activeGen: 1 },
      { desc: "[3세대] Modular RAG — 각 모듈을 레고 블록처럼 자유롭게 조합합니다. 라우터가 쿼리를 분류하고, 상황에 맞는 파이프라인을 선택합니다. Self-RAG, CRAG가 여기에 속합니다.", activeGen: 2 },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-emerald-700 hover:text-emerald-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. RAG 기초 &gt; Chapter 2. RAG의 발전</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-2-1. Naive vs Advanced vs Modular RAG</h1>
                </div>
              </div>
              <p className="text-slate-600">요리의 진화처럼 — <b>레시피 따라하기</b>(Naive) → <b>프로 셰프</b>(Advanced) → <b>분자요리</b>(Modular).</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-emerald-700 border-emerald-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">3세대 RAG 비교</h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
              {GENERATIONS.map((gen, i) => {
                const isActive = s.activeGen === i;
                const isPast = s.activeGen > i;
                return (
                  <div key={gen.id} className={`rounded-xl border-2 p-4 transition-all duration-500 ${isActive ? gen.color.bg + ' ' + gen.color.border + ' scale-105 shadow-lg' : isPast ? gen.color.bg + ' ' + gen.color.border + ' opacity-60' : 'bg-white border-slate-100 opacity-40'}`}>
                    <div className="flex items-center gap-2 mb-3">
                      <span className="text-2xl">{gen.icon}</span>
                      <div>
                        <div className={`font-bold text-sm ${isActive || isPast ? gen.color.text : 'text-slate-600'}`}>{gen.label}</div>
                        <div className="text-[10px] text-slate-500">{gen.subtitle}</div>
                      </div>
                    </div>

                    <div className="space-y-1 mb-3">
                      {gen.pipeline.map((p, j) => (
                        <div key={j} className={`flex items-center gap-2 p-1.5 rounded-lg text-xs ${isActive ? gen.color.bg : 'bg-slate-50'}`}>
                          <span>{p.icon}</span>
                          <span className="font-medium">{p.label}</span>
                          {p.extra && <span className="text-[10px] opacity-60">({p.extra})</span>}
                        </div>
                      ))}
                    </div>

                    {(isActive || isPast) && (
                      <div className="space-y-2 text-[11px]">
                        <div>
                          <span className="font-bold text-emerald-600">장점: </span>
                          {gen.pros.join(', ')}
                        </div>
                        <div>
                          <span className="font-bold text-red-500">한계: </span>
                          {gen.cons.join(', ')}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            <div className="flex flex-wrap gap-2">
              {['Naive RAG', 'Advanced RAG', 'Modular RAG', 'Pre-retrieval', 'Post-retrieval'].map(kw => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-sm font-medium border border-emerald-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-emerald-600 hover:bg-emerald-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./I-1-3.html" className="text-emerald-600 hover:text-emerald-800 font-medium">&larr; I-1-3. RAG 파이프라인 전체 흐름</a>
              <a href="./I-2-2.html" className="text-emerald-600 hover:text-emerald-800 font-medium">I-2-2. RAG vs Fine-tuning &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
