    //   - active 카드는 scale-105 + ring 으로 강조
    // ─────────────────────────────────────────────────────
    function LimitCardsGrid({ cardStatus, activeId, isRag }) {
      return (
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2.5">
          {LIMIT_CARDS.map((card) => {
            const status = cardStatus[card.id] || 'idle';
            const isActive = card.id === activeId;
            let frame = 'bg-white border-slate-200 text-slate-400';
            let iconClass = 'opacity-40 grayscale';
            let labelClass = 'text-slate-500';
            let shortClass = 'text-slate-400';
            let badge = null;
            if (status === 'limit') {
              frame = 'bg-rose-50 border-rose-300 text-rose-900';
              iconClass = '';
              labelClass = 'text-rose-800';
              shortClass = 'text-rose-700';
              badge = (
                <span className="text-[8px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-bold uppercase tracking-wider">
                  Limit
                </span>
              );
            } else if (status === 'fixed') {
              frame = 'bg-emerald-50 border-emerald-400 text-emerald-900';
              iconClass = '';
              labelClass = 'text-emerald-800';
              shortClass = 'text-emerald-700';
              badge = (
                <span className="text-[8px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-bold uppercase tracking-wider animate-pulse">
                  Fixed
                </span>
              );
            }
            const ring = isActive ? 'ring-2 ring-rose-400 scale-[1.02] shadow-md' : '';
            return (
              <div
                key={card.id}
                className={`p-3 rounded-lg border-2 transition-all duration-500 ${frame} ${ring}`}
              >
                <div className="flex items-start justify-between mb-1.5">
                  <span className={`text-2xl ${iconClass} transition-all`}>{card.icon}</span>
                  {badge}
                </div>
                <div className={`text-[11px] font-bold leading-tight mb-0.5 ${labelClass}`}>
                  {card.label}
                </div>
                <div className={`text-[10px] leading-snug ${shortClass}`}>{card.short}</div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: Q&A 박스 (Step 1~4) 또는 종합 매핑 표 (Step 5)
    //   - showQA = card.id : 해당 카드의 Q + LLM 답
    //   - isRag = true     : 모든 카드의 Q + RAG 답을 표로 나란히
    // ─────────────────────────────────────────────────────
    function QAPanel({ showQA, isRag }) {
      if (isRag) {
        return (
          <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">✨</span>
                <span className="text-[11px] font-bold text-emerald-800">
                  RAG 적용 — 4 한계 동시 해결
                </span>
              </div>
              <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                4 / 4 fixed
              </span>
            </div>
            <div className="bg-white rounded border border-emerald-200 p-2 max-h-72 overflow-y-auto">
              <div className="space-y-2">
                {LIMIT_CARDS.map((card) => (
                  <div key={card.id} className="border-b border-emerald-100 last:border-0 pb-1.5 last:pb-0">
                    <div className="flex items-center gap-1 mb-1">
                      <span className="text-sm">{card.icon}</span>
                      <span className="text-[10px] font-bold text-emerald-800">{card.label}</span>
                    </div>
                    <div className="ml-5 space-y-0.5">
                      <div className="text-[9px] text-slate-600 font-mono leading-snug">
                        Q: {card.question}
                      </div>
                      <div className="text-[9px] text-emerald-700 font-mono leading-snug">
                        A (RAG): {card.ragAnswer}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div className="text-[9px] text-emerald-700 mt-1.5 leading-snug">
              ✓ 출처 기반 답변 → 환각 차단 / 실시간 검색 → cutoff·정적 해결 / 사내 DB → 도메인 해결
            </div>
          </div>
        );
      }

      const card = LIMIT_CARDS.find((c) => c.id === showQA);
      if (!card) {
        return (
          <div className="bg-slate-50 border-2 border-dashed border-slate-200 rounded-lg p-3 text-center">
            <div className="text-[10px] text-slate-400">대기 중…</div>
          </div>
        );
      }

      return (
        <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">{card.icon}</span>
              <span className="text-[11px] font-bold text-rose-800">{card.label}</span>
            </div>
            <span className="text-[9px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-mono font-bold uppercase">
              실패 사례
            </span>
          </div>

          {/* 질문 */}
          <div className="bg-white rounded border border-rose-200 p-2 mb-1.5">
            <div className="text-[9px] font-bold text-rose-700 mb-0.5 uppercase tracking-wider">
              Q. 사용자 질문
            </div>
            <div className="text-[10px] text-slate-800 font-mono leading-snug">
              "{card.question}"
            </div>
          </div>

          {/* 화살표 */}
          <div className="text-center text-rose-500 text-[10px] font-mono mb-1">↓ LLM 단독 호출 ↓</div>

          {/* LLM 답변 (실패) */}
          <div className="bg-white rounded border-2 border-rose-400 p-2">
            <div className="flex items-center gap-1 mb-1">
              <span className="text-[9px] font-bold text-rose-700 uppercase tracking-wider">
                A. LLM 답변
              </span>
              <span className="text-[8px] bg-rose-600 text-white px-1 rounded font-bold animate-pulse">
                FAIL
              </span>
            </div>
            <div className="text-[10px] text-rose-900 font-mono leading-snug">
              {card.llmAnswer}
            </div>
          </div>

          <div className="text-[9px] text-rose-700 mt-1.5 leading-snug">
            ✗ 한계가 그대로 노출 — 다음 단계의 다른 한계도 마저 보고, Step 5에서 RAG로 해결
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 4 한계 카드 그리드 / 하단: Q&A 또는 매핑 표
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 LLM의 4가지 한계</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <LimitCardsGrid
              cardStatus={step.cardStatus}
              activeId={step.activeId}
              isRag={step.isRag}
            />
            <QAPanel showQA={step.showQA} isRag={step.isRag} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-300"></span>idle
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>limit (한계 노출)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>fixed (RAG 해결)
            </span>
            <span className="ml-auto font-mono text-rose-600">rag · rose</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 11.9.0 + atom-one-dark
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">
              {code.lang}
            </span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>
              {code.lines.join('\n')}
            </code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>
              Step {stepIdx + 1} / {total}
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 4버튼 + 키보드 + 3000ms 자동재생
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') {
            e.preventDefault();
            nextRef.current();
          }
          if (e.key === 'ArrowLeft') {
            e.preventDefault();
            prevRef.current();
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a
                href="../index.html"
                className="text-rose-700 hover:text-rose-900 font-medium"
              >
                &larr; 허브로
              </a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">
                curriculum I-1-1
              </span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">
                  I
                </div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">
                    Part I. RAG 기초 &gt; Chapter 1. RAG의 필요성
                  </div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">
                    I-1-1. LLM의 한계 — 지식 단절, 환각, 도메인 지식 부족
                  </h1>
                  <p className="text-sm text-slate-500 mt-0.5">
                    단일 LLM의 4가지 구조적 한계 → RAG가 해결하는 매핑
                  </p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                code={step.code}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: <strong>지식 단절</strong>·<strong>도메인 지식 부족</strong>·
                <strong>환각</strong>·<strong>정적</strong> — 4 한계가 모두 RAG의
                "외부 검색 + prompt 첨부"로 한 번에 해결된다. 다음(I-1-2)에서 RAG의
                전체 파이프라인을 본다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying
                  ? '⏸ 정지'
                  : stepIdx >= STEPS.length - 1
                  ? '↻ 다시보기'
                  : '▶ 자동재생'}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {[
                'Knowledge Cutoff',
                'Hallucination',
                'Private Data',
                'Static Weights',
                'RAG',
                'Grounding',
              ].map((kw) => (
                <span
                  key={kw}
                  className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200"
                >
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a
                href="../index.html"
                className="text-rose-700 hover:text-rose-900 font-medium"
              >
                &larr; 허브로
              </a>
              <a
                href="./I-1-2.html"
                className="text-rose-700 hover:text-rose-900 font-medium"
              >
                I-1-2. RAG란 무엇인가 &rarr;
              </a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
