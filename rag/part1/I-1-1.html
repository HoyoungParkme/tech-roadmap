<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — I-1-1. LLM의 한계</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SCENARIOS = [
      { icon: '🤥', label: '할루시네이션', color: 'bg-red-50 border-red-300 text-red-800' },
      { icon: '📅', label: '지식 컷오프', color: 'bg-amber-50 border-amber-300 text-amber-800' },
      { icon: '🔒', label: '비공개 데이터', color: 'bg-purple-50 border-purple-300 text-purple-800' },
    ];

    const STEPS = [
      {
        desc: "LLM에게 질문합니다. \"양자 컴퓨팅의 최신 발전은?\" — LLM은 자신 있게 대답하지만, 일부 내용을 지어냅니다. 이것이 할루시네이션입니다.",
        activeScenario: 0,
        question: "양자 컴퓨팅의 최신 발전 상황을 알려줘",
        answer: "2024년 3월, Google은 '슈퍼노바' 칩으로 1만 큐비트를 달성했습니다...",
        verdict: { ok: false, reason: "'슈퍼노바' 칩은 실제로 존재하지 않습니다. LLM이 그럴듯하게 지어낸 정보입니다." }
      },
      {
        desc: "LLM의 학습 데이터에는 마감 시점이 있습니다. 그 이후의 정보는 아예 모릅니다. \"어제 발표된 신제품\"을 물으면 답할 수 없습니다.",
        activeScenario: 1,
        question: "2026년 3월에 출시된 iPhone SE 5의 스펙을 알려줘",
        answer: "죄송합니다. 저의 학습 데이터는 2025년 4월까지입니다. 해당 제품에 대한 정보가 없습니다.",
        verdict: { ok: false, reason: "지식 컷오프 이후의 정보. LLM은 학습 시점 이후의 세상을 모릅니다." }
      },
      {
        desc: "회사 내부 인사 규정, 고객 데이터, 사내 위키 — LLM은 이런 비공개 데이터를 학습한 적이 없으므로 답할 수 없습니다.",
        activeScenario: 2,
        question: "우리 회사의 연차 휴가 정책을 알려줘",
        answer: "일반적으로 한국 근로기준법에 따르면 1년 이상 근속 시 15일의 연차가...",
        verdict: { ok: false, reason: "일반론만 답합니다. 우리 회사만의 특별 규정(리프레시 휴가, 생일 휴가 등)은 모릅니다." }
      },
      {
        desc: "세 가지 한계를 종합합니다. LLM은 (1) 모르는 걸 지어내고, (2) 최신 정보를 모르고, (3) 비공개 데이터에 접근할 수 없습니다.",
        activeScenario: -1,
        question: null,
        answer: null,
        verdict: null,
        summary: [
          { icon: '🤥', label: '할루시네이션', desc: '모르는 걸 자신 있게 지어냄' },
          { icon: '📅', label: '지식 컷오프', desc: '학습 이후 정보를 알 수 없음' },
          { icon: '🔒', label: '비공개 데이터', desc: '사내 문서에 접근 불가' },
        ]
      },
      {
        desc: "해결책은? 외부 문서를 검색해서 LLM에 전달하는 것 — 이것이 RAG(Retrieval Augmented Generation)입니다. 다음 시각화에서 자세히 알아봅니다.",
        activeScenario: -1,
        question: "우리 회사의 연차 휴가 정책을 알려줘",
        answer: "인사규정 3장에 따르면, 1년 이상 근속 시 연차 15일 + 리프레시 휴가 3일 + 생일 휴가 1일이 부여됩니다. [출처: 인사규정 v2.3, 3장 2절]",
        verdict: { ok: true, reason: "RAG로 사내 문서를 검색해서 전달하면, 정확한 답변이 가능합니다!" },
        isRag: true
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-emerald-700 hover:text-emerald-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. RAG 기초 &gt; Chapter 1. RAG의 필요성</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-1-1. LLM의 한계 — 할루시네이션과 지식 컷오프</h1>
                </div>
              </div>
              <p className="text-slate-600">시험을 보는 학생을 상상해보세요. <b>모르는 문제에 자신 있게 틀린 답</b>을 쓰고, <b>시험 범위 밖</b> 문제는 답하지 못하고, <b>다른 학교 기출</b>은 본 적도 없습니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-emerald-700 border-emerald-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">LLM의 세 가지 한계</h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="space-y-4">
                {s.activeScenario >= 0 ? (
                  <div className="space-y-3">
                    {SCENARIOS.map((sc, i) => (
                      <div key={i} className={`flex items-center gap-3 p-4 rounded-xl border-2 transition-all duration-500 ${i === s.activeScenario ? sc.color + ' scale-105 shadow-md' : 'bg-white border-slate-100 opacity-40'}`}>
                        <div className="text-3xl">{sc.icon}</div>
                        <div className="font-bold text-sm">{sc.label}</div>
                      </div>
                    ))}
                  </div>
                ) : s.summary ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">LLM 한계 종합</div>
                    <div className="space-y-4">
                      {s.summary.map((item, i) => (
                        <div key={i} className="flex items-start gap-3 p-3 bg-red-50 rounded-lg border border-red-200">
                          <div className="text-2xl">{item.icon}</div>
                          <div>
                            <div className="font-bold text-sm text-red-800">{item.label}</div>
                            <div className="text-xs text-red-600 mt-0.5">{item.desc}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="flex items-center gap-2 mb-3">
                      <span className="text-2xl">{s.isRag ? '🔍' : '🤖'}</span>
                      <span className="text-xs font-bold text-emerald-600 uppercase">{s.isRag ? 'RAG 적용 후' : 'LLM 단독'}</span>
                    </div>
                    <div className="text-sm text-slate-600">다음 단계에서 RAG의 동작 원리를 알아봅니다.</div>
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.question ? (
                  <>
                    <div className="mb-4">
                      <div className="text-xs font-medium text-slate-500 mb-1">질문</div>
                      <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-sm text-blue-800 font-mono">{s.question}</div>
                    </div>
                    <div className="mb-4">
                      <div className="flex items-center gap-2 mb-1">
                        <span className={s.isRag ? 'text-emerald-500' : 'text-slate-400'}>↓</span>
                        <div className={`text-xs font-medium ${s.isRag ? 'text-emerald-600' : 'text-slate-500'}`}>{s.isRag ? 'RAG 답변' : 'LLM 답변'}</div>
                      </div>
                      <pre className={`rounded-lg p-3 text-sm whitespace-pre-wrap font-mono border ${s.isRag ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-slate-50 border-slate-200 text-slate-700'}`}>{s.answer}</pre>
                    </div>
                    {s.verdict && (
                      <div className={`p-3 rounded-lg border text-sm ${s.verdict.ok ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'}`}>
                        <span className="font-bold">{s.verdict.ok ? '✅ 정확!' : '❌ 문제 발견'}</span>
                        <span className="ml-2">{s.verdict.reason}</span>
                      </div>
                    )}
                  </>
                ) : (
                  <div className="flex items-center justify-center h-full text-slate-400 text-sm">
                    종합 정리 — 왼쪽 패널을 확인하세요
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['할루시네이션', '지식 컷오프', '비공개 데이터', 'Grounding'].map(kw => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-sm font-medium border border-emerald-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-emerald-600 hover:bg-emerald-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-end text-sm text-slate-500">
              <a href="./I-1-2.html" className="text-emerald-600 hover:text-emerald-800 font-medium">I-1-2. RAG란 무엇인가 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
