    //   ragOff=true 면 Retriever/KB/Context 우회 표시
    // ─────────────────────────────────────────────────────
    function PipelineDiagram({ pipeline }) {
      const isActive = (id) => pipeline.activeNodes.includes(id);
      const edgeActive = (id) => pipeline.activeEdges.includes(id);
      const ragOff = pipeline.ragOff;

      // Tailwind JIT 안전을 위해 명시적 클래스 사용
      const nodeClassExplicit = (id, palette) => {
        const active = isActive(id);
        const off = 'bg-slate-50 border-slate-200 text-slate-400';
        const on = {
          rose:    'bg-rose-100 border-rose-500 text-rose-900 shadow-sm ring-2 ring-rose-300',
          blue:    'bg-blue-100 border-blue-500 text-blue-900 shadow-sm ring-2 ring-blue-300',
          amber:   'bg-amber-100 border-amber-500 text-amber-900 shadow-sm ring-2 ring-amber-300',
          violet:  'bg-violet-100 border-violet-500 text-violet-900 shadow-sm ring-2 ring-violet-300',
          emerald: 'bg-emerald-100 border-emerald-500 text-emerald-900 shadow-sm ring-2 ring-emerald-300',
          slate:   'bg-slate-200 border-slate-500 text-slate-900 shadow-sm ring-2 ring-slate-300',
        };
        return active ? on[palette] : off;
      };

      const arrow = (id) => edgeActive(id) ? 'text-rose-500 font-bold' : 'text-slate-300';

      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🔗</span>
              <span className="text-[11px] font-bold text-rose-800">RAG Pipeline — 데이터 흐름</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">
              {ragOff ? 'rag=OFF' : 'rag=ON'}
            </span>
          </div>

          {/* 다이어그램 그리드 — 5행 구성 (Question → Retriever↔KB → Context → LLM → Answer) */}
          <div className="bg-slate-50 rounded p-2 space-y-2">
            {/* 1행: Question */}
            <div className="flex justify-center">
              <div className={`px-3 py-1.5 rounded-lg border-2 text-[10px] font-bold transition-all duration-500 ${nodeClassExplicit('question', 'slate')}`}>
                <div className="text-[8px] uppercase tracking-wider opacity-70">User</div>
                <div>📝 Question</div>
              </div>
            </div>
            {/* 1→2 화살표 */}
            <div className="flex justify-center gap-12">
              <div className={`text-base ${arrow('q-retriever')}`}>↓</div>
              {!ragOff && <div className={`text-base ${arrow('q-context')}`}>↘</div>}
              {ragOff && <div className={`text-base ${arrow('q-llm')}`}>↓</div>}
            </div>
            {/* 2행: Retriever ↔ KB */}
            <div className="grid grid-cols-3 gap-2 items-center">
              <div className={`px-2 py-1.5 rounded-lg border-2 text-[10px] font-bold text-center transition-all duration-500 ${nodeClassExplicit('retriever', 'blue')}`}>
                <div className="text-[8px] uppercase tracking-wider opacity-70">Service</div>
                <div>🔍 Retriever</div>
              </div>
              <div className="flex flex-col items-center gap-0.5">
                <div className={`text-[11px] ${arrow('retriever-kb')}`}>→ embed</div>
                <div className={`text-[11px] ${arrow('kb-retriever')}`}>← top-k docs</div>
              </div>
              <div className={`px-2 py-1.5 rounded-lg border-2 text-[10px] font-bold text-center transition-all duration-500 ${nodeClassExplicit('kb', 'amber')}`}>
                <div className="text-[8px] uppercase tracking-wider opacity-70">Storage</div>
                <div>📚 KB (vector)</div>
              </div>
            </div>
            {/* 2→3 화살표 + 3행: Context */}
            {!ragOff && (
              <div className="flex justify-start pl-12">
                <div className={`text-base ${arrow('retriever-context')}`}>↓</div>
              </div>
            )}
            {!ragOff && (
              <div className="flex justify-center">
                <div className={`px-3 py-1.5 rounded-lg border-2 text-[10px] font-bold transition-all duration-500 ${nodeClassExplicit('context', 'violet')}`}>
                  <div className="text-[8px] uppercase tracking-wider opacity-70">Prompt</div>
                  <div>📎 Augmented Context</div>
                </div>
              </div>
            )}

            {/* 3→4 화살표 */}
            <div className="flex justify-center">
              <div className={`text-base ${arrow(ragOff ? 'q-llm' : 'context-llm')}`}>↓</div>
            </div>
            {/* 4행: LLM */}
            <div className="flex justify-center">
              <div className={`px-3 py-1.5 rounded-lg border-2 text-[10px] font-bold transition-all duration-500 ${nodeClassExplicit('llm', 'rose')}`}>
                <div className="text-[8px] uppercase tracking-wider opacity-70">Model</div>
                <div>🤖 LLM</div>
              </div>
            </div>
            {/* 4→5 화살표 */}
            <div className="flex justify-center">
              <div className={`text-base ${arrow('llm-a')}`}>↓</div>
            </div>
            {/* 5행: Answer */}
            <div className="flex justify-center">
              <div className={`px-3 py-1.5 rounded-lg border-2 text-[10px] font-bold transition-all duration-500 ${nodeClassExplicit('answer', 'emerald')}`}>
                <div className="text-[8px] uppercase tracking-wider opacity-70">Output</div>
                <div>✅ Answer {pipeline.celebrate ? '+ Citations' : ''}</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Detail 박스 — 단계별로 어떤 데이터가 흐르는지 디테일 표시
    //   질문 / 검색 결과 / context / 답변 / 출처 를 단계에 맞게 보여줌
    // ─────────────────────────────────────────────────────
    function DetailPanel({ step }) {
      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3 space-y-2.5">
          {/* 질문 */}
          <div>
            <div className="text-[9px] font-bold text-slate-500 mb-1 uppercase tracking-wider">📝 question</div>
            <div className="bg-slate-50 border border-slate-200 rounded px-2 py-1 text-[11px] text-slate-800 font-mono">{step.question}</div>
          </div>
          {/* Retriever 상태 (Step 2~5) */}
          {step.retriever && (
            <div>
              <div className="text-[9px] font-bold text-blue-600 mb-1 uppercase tracking-wider">🔍 retriever</div>
              <div className="bg-blue-50 border border-blue-200 rounded px-2 py-1 text-[10px] text-blue-800 font-mono flex items-center justify-between">
                <span>query: <b>"{step.retriever.query}"</b></span>
                <span className="bg-blue-200 text-blue-800 px-1.5 py-0.5 rounded text-[9px]">top-k={step.retriever.topK} · {step.retriever.status}</span>
              </div>
            </div>
          )}
          {/* KB 결과 (Step 2~5) */}
          {step.kb && (
            <div>
              <div className="flex items-center justify-between mb-1">
                <div className="text-[9px] font-bold text-amber-600 uppercase tracking-wider">📚 kb · retrieved docs</div>
                <span className="text-[9px] text-slate-500 font-mono">{step.kb.totalDocs.toLocaleString()} docs</span>
              </div>
              <div className="space-y-1">
                {step.kb.retrieved.map((d, i) => {
                  const isUsed = d.used !== false;
                  const cssBox = isUsed
                    ? 'bg-amber-50 border-amber-300'
                    : 'bg-slate-50 border-slate-200 opacity-50 line-through';
                  return (
                    <div key={i} className={`border rounded px-2 py-1 text-[10px] ${cssBox}`}>
                      <div className="flex items-center justify-between">
                        <span className="font-bold text-amber-900">{d.title}</span>
                        <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono ${
                          d.score >= 0.85 ? 'bg-emerald-200 text-emerald-800' :
                          d.score >= 0.7 ? 'bg-amber-200 text-amber-800' :
                          'bg-slate-200 text-slate-600'
                        }`}>
                          {d.score.toFixed(2)}
                        </span>
                      </div>
                      <div className="text-amber-700 mt-0.5 text-[9px]">{d.snippet}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Augmented Context (Step 3~5) */}
          {step.context && (
            <div>
              <div className="flex items-center justify-between mb-1">
                <div className="text-[9px] font-bold text-violet-600 uppercase tracking-wider">📎 augmented prompt</div>
                <span className="text-[9px] bg-violet-200 text-violet-800 px-1.5 py-0.5 rounded font-mono">{step.context.tokens} tok</span>
              </div>
              <div className="bg-violet-50 border-2 border-dashed border-violet-300 rounded px-2 py-1.5 text-[10px] font-mono text-violet-900 leading-snug whitespace-pre-wrap">
                <div className="text-violet-700 mb-1">{step.context.systemPrompt}</div>
                <div className="text-violet-900 italic">{step.context.docs.join('\n')}</div>
              </div>
            </div>
          )}

          {/* Answer (Step 1, 4~5) */}
          {step.answer && (
            <div>
              <div className="flex items-center justify-between mb-1">
                <div className={`text-[9px] font-bold uppercase tracking-wider ${
                  step.accuracy >= 90 ? 'text-emerald-600' : 'text-red-600'
                }`}>
                  {step.accuracy >= 90 ? '✅ answer' : '⚠ answer (hallucination?)'}
                </div>
                {step.accuracy != null && (
                  <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono ${
                    step.accuracy >= 90 ? 'bg-emerald-200 text-emerald-800' : 'bg-red-200 text-red-800'
                  }`}>
                    {step.accuracyLabel} {step.accuracy}%
                  </span>
                )}
              </div>
              <div className={`border rounded px-2 py-1 text-[11px] leading-relaxed ${
                step.accuracy >= 90
                  ? 'bg-emerald-50 border-emerald-300 text-emerald-900'
                  : 'bg-red-50 border-red-300 text-red-900'
              }`}>
                {step.answer}
              </div>
              {/* 정확도 게이지 */}
              {step.accuracy != null && (
                <div className="flex items-center gap-2 mt-1.5">
                  <div className="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                    <div
                      className={`h-full transition-all duration-700 ${
                        step.accuracy >= 90 ? 'bg-emerald-500' : 'bg-red-400'
                      }`}
                      style={{ width: step.accuracy + '%' }}
                    />
                  </div>
                  <span className="text-[9px] font-mono text-slate-500 w-8 text-right">{step.accuracy}%</span>
                </div>
              )}
            </div>
          )}

          {/* Citations (Step 5) */}
          {step.citations && (
            <div>
              <div className="text-[9px] font-bold text-emerald-600 mb-1 uppercase tracking-wider">📌 citations · 출처</div>
              <div className="space-y-0.5">
                {step.citations.map((c) => (
                  <div key={c.id} className="bg-emerald-50 border border-emerald-300 rounded px-2 py-1 text-[10px] flex items-center gap-2">
                    <span className="bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold w-5 text-center">
                      [{c.id}]
                    </span>
                    <div className="flex-1">
                      <div className="font-bold text-emerald-900">{c.title}</div>
                      <div className="text-[9px] text-emerald-700 font-mono">{c.source}</div>
                    </div>
                    <span className="text-[9px] bg-emerald-200 text-emerald-800 px-1 py-0.5 rounded font-mono">
                      {c.score.toFixed(2)}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: Pipeline 다이어그램 / 하단: Detail 박스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🔍 RAG 5-step Pipeline</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <PipelineDiagram pipeline={step.pipeline} />
            <DetailPanel step={step} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-500"></span>question
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-blue-500"></span>retriever
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>kb
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-violet-500"></span>context
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>llm
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>answer
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    //   파일명 탭(query.py / retrieve.py / augment.py / generate.py / cite.py)
    //   라인 번호 + 강조 라인(rose accent)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      // 모든 단계의 파일명 탭(현재 단계만 active)
      const allFiles = STEPS.map((s) => s.code.filename);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="ml-2 text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일명 탭 — 현재 active 만 강조 */}
          <div className="bg-[#21252b] px-2 py-0 flex items-end gap-0 border-b border-slate-700 overflow-x-auto">
            {allFiles.map((fn, i) => {
              const isActive = i === stepIdx;
              return (
                <div
                  key={fn}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition-all ${
                    isActive
                      ? 'bg-[#282c34] text-rose-300 border-t-2 border-t-rose-400 -mb-px'
                      : 'bg-[#21252b] text-slate-500 hover:text-slate-400'
                  }`}
                >
                  {fn}
                </div>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더 — 라인 번호 + 강조 라인(rose) */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. RAG 기초 &gt; Chapter 1. RAG의 필요성</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">I-1-2. RAG란 무엇인가 — Retrieval + Augmented + Generation</h1>
                  <p className="text-sm text-slate-500 mt-0.5">클로즈드 북 → 오픈북 — 5단계 파이프라인으로 환각을 잡는다</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: <strong>R</strong>etrieval(검색) + <strong>A</strong>ugmented(보강) + <strong>G</strong>eneration(생성). 외부 KB로 환각을 줄이고, 출처로 추적성을 확보한다. 다음(I-1-3)에서는 RAG 파이프라인 전체 단계(인덱싱·청크·임베딩·평가)를 펼쳐본다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['RAG', 'Retrieval', 'Augmented', 'Generation', 'Citation', '오픈북 시험'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-1-1.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; I-1-1. LLM의 한계</a>
              <a href="./I-1-3.html" className="text-rose-700 hover:text-rose-900 font-medium">I-1-3. RAG 파이프라인 전체 흐름 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
