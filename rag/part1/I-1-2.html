<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — I-1-2. RAG란 무엇인가</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "클로즈드 북 시험 — LLM이 자기 기억만으로 답합니다. 모르는 건 지어내고, 최신 정보는 답할 수 없습니다.",
        mode: 'closed',
        question: "우리 회사의 2026년 연봉 인상률은?",
        llmThought: "학습 데이터에 없는 정보... 하지만 답해야 하니까...",
        answer: "일반적으로 한국 기업의 평균 연봉 인상률은 3~5% 수준입니다.",
        accuracy: 20,
      },
      {
        desc: "오픈북 시험으로 바꿉니다! RAG = Retrieval(검색) + Augmented(보강된) + Generation(생성). 외부 문서를 참고할 수 있게 합니다.",
        mode: 'transition',
        question: "우리 회사의 2026년 연봉 인상률은?",
        llmThought: null,
        answer: null,
        accuracy: null,
      },
      {
        desc: "[1단계 Retrieval] 질문과 관련된 문서를 검색합니다. 사내 인사규정, 공지사항에서 관련 내용을 찾아옵니다.",
        mode: 'open',
        phase: 'retrieval',
        question: "우리 회사의 2026년 연봉 인상률은?",
        docs: [
          { title: '2026년 보상 정책 공지', snippet: '...전 직원 대상 기본 인상률 4.5%...', score: 0.95 },
          { title: '인사규정 제12조', snippet: '...성과 등급에 따라 추가 인상 0~3%...', score: 0.87 },
          { title: '2025년 경영 실적 보고', snippet: '...매출 전년 대비 23% 성장...', score: 0.72 },
        ],
      },
      {
        desc: "[2단계 Augmented] 검색된 문서를 LLM의 프롬프트에 추가합니다. \"아래 참고 자료를 기반으로 답변하세요\"라는 지시와 함께.",
        mode: 'open',
        phase: 'augmented',
        prompt: `[시스템] 아래 참고 자료를 기반으로 답변하세요. 자료에 없으면 "정보가 없습니다"라고 답하세요.

[참고 자료]
1. 2026년 보상 정책 공지: 전 직원 대상 기본 인상률 4.5%
2. 인사규정 제12조: 성과 등급에 따라 추가 인상 0~3%

[질문] 우리 회사의 2026년 연봉 인상률은?`,
      },
      {
        desc: "[3단계 Generation] LLM이 참고 자료를 기반으로 정확한 답변을 생성합니다. 출처도 함께 표시됩니다.",
        mode: 'open',
        phase: 'generation',
        question: "우리 회사의 2026년 연봉 인상률은?",
        answer: "2026년 기본 연봉 인상률은 4.5%이며, 성과 등급에 따라 추가 0~3%가 적용됩니다.\n\n[출처: 2026년 보상 정책 공지, 인사규정 제12조]",
        accuracy: 98,
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-emerald-700 hover:text-emerald-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. RAG 기초 &gt; Chapter 1. RAG의 필요성</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-1-2. RAG란 무엇인가 — 검색 + 생성</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>클로즈드 북 시험</b>(LLM 단독)을 <b>오픈북 시험</b>(RAG)으로 바꾸는 것입니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-emerald-700 border-emerald-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">클로즈드 북 → 오픈북</h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                {s.mode === 'closed' && (
                  <div className="bg-white rounded-xl border-2 border-red-200 p-5 space-y-4">
                    <div className="flex items-center gap-2 text-red-600 font-bold text-sm"><span className="text-xl">📕</span> 클로즈드 북 시험</div>
                    <div className="bg-red-50 rounded-lg p-3 text-sm text-red-700 italic">{s.llmThought}</div>
                    <div className="flex items-center gap-2">
                      <span className="text-xs font-bold text-slate-500">정확도</span>
                      <div className="flex-1 bg-slate-100 rounded-full h-3"><div className="bg-red-400 h-3 rounded-full transition-all" style={{width: s.accuracy + '%'}}></div></div>
                      <span className="text-xs font-bold text-red-600">{s.accuracy}%</span>
                    </div>
                  </div>
                )}
                {s.mode === 'transition' && (
                  <div className="bg-white rounded-xl border-2 border-emerald-200 p-5 space-y-4">
                    <div className="text-center py-6">
                      <div className="text-5xl mb-4">📕 → 📖</div>
                      <div className="text-lg font-bold text-emerald-700">클로즈드 북 → 오픈북</div>
                      <div className="text-sm text-slate-600 mt-2">
                        <span className="font-bold text-emerald-600">R</span>etrieval (검색) +
                        <span className="font-bold text-emerald-600"> A</span>ugmented (보강) +
                        <span className="font-bold text-emerald-600"> G</span>eneration (생성)
                      </div>
                    </div>
                  </div>
                )}
                {s.mode === 'open' && s.phase === 'retrieval' && (
                  <div className="bg-white rounded-xl border-2 border-blue-200 p-5 space-y-3">
                    <div className="flex items-center gap-2 text-blue-600 font-bold text-sm"><span className="text-xl">🔍</span> 1단계: Retrieval (검색)</div>
                    {s.docs.map((doc, i) => (
                      <div key={i} className="bg-blue-50 rounded-lg p-3 border border-blue-100">
                        <div className="flex items-center justify-between mb-1">
                          <span className="text-xs font-bold text-blue-800">{doc.title}</span>
                          <span className="text-[10px] bg-blue-200 text-blue-800 px-2 py-0.5 rounded-full">유사도: {doc.score}</span>
                        </div>
                        <div className="text-xs text-blue-700">{doc.snippet}</div>
                      </div>
                    ))}
                  </div>
                )}
                {s.mode === 'open' && s.phase === 'augmented' && (
                  <div className="bg-white rounded-xl border-2 border-amber-200 p-5">
                    <div className="flex items-center gap-2 text-amber-600 font-bold text-sm mb-3"><span className="text-xl">📎</span> 2단계: Augmented (보강)</div>
                    <pre className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-xs text-amber-800 whitespace-pre-wrap font-mono leading-relaxed">{s.prompt}</pre>
                  </div>
                )}
                {s.mode === 'open' && s.phase === 'generation' && (
                  <div className="bg-white rounded-xl border-2 border-emerald-200 p-5 space-y-4">
                    <div className="flex items-center gap-2 text-emerald-600 font-bold text-sm"><span className="text-xl">📖</span> 오픈북 시험</div>
                    <div className="flex items-center gap-2">
                      <span className="text-xs font-bold text-slate-500">정확도</span>
                      <div className="flex-1 bg-slate-100 rounded-full h-3"><div className="bg-emerald-500 h-3 rounded-full transition-all" style={{width: s.accuracy + '%'}}></div></div>
                      <span className="text-xs font-bold text-emerald-600">{s.accuracy}%</span>
                    </div>
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-emerald-600 uppercase tracking-wider mb-4">데이터 흐름</div>
                {s.question && (
                  <div className="mb-4">
                    <div className="text-xs font-medium text-slate-500 mb-1">질문</div>
                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-sm text-blue-800 font-mono">{s.question}</div>
                  </div>
                )}
                {s.answer && (
                  <div>
                    <div className="flex items-center gap-2 mb-1">
                      <span className={s.accuracy >= 90 ? 'text-emerald-500' : 'text-red-400'}>↓</span>
                      <div className={`text-xs font-medium ${s.accuracy >= 90 ? 'text-emerald-600' : 'text-red-500'}`}>답변</div>
                    </div>
                    <pre className={`rounded-lg p-3 text-sm whitespace-pre-wrap font-mono border ${s.accuracy >= 90 ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-slate-50 border-slate-200 text-slate-700'}`}>{s.answer}</pre>
                  </div>
                )}
                {s.mode === 'transition' && (
                  <div className="flex items-center justify-center h-40">
                    <div className="text-center text-slate-400">
                      <div className="text-3xl mb-2">🔄</div>
                      <div className="text-sm">시험 방식을 전환하는 중...</div>
                    </div>
                  </div>
                )}
                {s.mode === 'open' && s.phase === 'augmented' && (
                  <div className="text-center text-slate-400 text-sm mt-8">프롬프트에 참고 자료를 삽입합니다</div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['RAG', 'Retrieval', 'Augmented', 'Generation', '오픈북 시험'].map(kw => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-sm font-medium border border-emerald-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-emerald-600 hover:bg-emerald-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./I-1-1.html" className="text-emerald-600 hover:text-emerald-800 font-medium">&larr; I-1-1. LLM의 한계</a>
              <a href="./I-1-3.html" className="text-emerald-600 hover:text-emerald-800 font-medium">I-1-3. RAG 파이프라인 전체 흐름 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
