    //   rag    : RAG 박스만 강조 (KB → LLM 화살표)
    //   cycle  : 갱신 주기 비교 — 1분 vs 1주
    //   domain : 톤 vs 사실 — 두 박스에 라벨
    //   hybrid : 결합 다이어그램 — LoRA + RAG + LLM
    // ─────────────────────────────────────────────────────
    function CompareDiagram({ step }) {
      const d = step.diagram;

      const FtBox = ({ active }) => (
        <div className={`rounded-lg p-3 border-2 transition-all duration-500 ${
          active
            ? 'bg-purple-100 border-purple-500 shadow-md scale-105'
            : 'bg-purple-50 border-purple-200 opacity-60'
        }`}>
          <div className="flex items-center gap-1.5 mb-1.5">
            <span className="text-base">🧠</span>
            <span className="text-[11px] font-bold text-purple-800">Fine-tuning</span>
          </div>
          <div className="text-[10px] text-purple-700 leading-tight">
            가중치 자체를 도메인<br/>데이터로 재학습
          </div>
          <div className="mt-2 flex gap-0.5">
            {[1,2,3,4,5,6,7,8].map(i => (
              <div key={i} className={`flex-1 h-1.5 rounded-sm ${
                active ? 'bg-purple-500 animate-pulse' : 'bg-purple-300'
              }`} />
            ))}
          </div>
          <div className="text-[8px] text-purple-600 mt-0.5 font-mono">model.weights[~7B params]</div>
        </div>
      );

      const RagBox = ({ active }) => (
        <div className={`rounded-lg p-3 border-2 transition-all duration-500 ${
          active
            ? 'bg-rose-100 border-rose-500 shadow-md scale-105'
            : 'bg-rose-50 border-rose-200 opacity-60'
        }`}>
          <div className="flex items-center gap-1.5 mb-1.5">
            <span className="text-base">📚</span>
            <span className="text-[11px] font-bold text-rose-800">RAG</span>
          </div>
          <div className="text-[10px] text-rose-700 leading-tight">
            가중치 그대로 + 외부<br/>KB에서 검색해 prompt
          </div>
          <div className="mt-2 flex gap-0.5">
            <div className={`px-1 rounded text-[8px] font-mono font-bold ${
              active ? 'bg-rose-500 text-white' : 'bg-rose-200 text-rose-700'
            }`}>📄</div>
            <div className={`px-1 rounded text-[8px] font-mono font-bold ${
              active ? 'bg-rose-500 text-white' : 'bg-rose-200 text-rose-700'
            }`}>📄</div>
            <div className={`px-1 rounded text-[8px] font-mono font-bold ${
              active ? 'bg-rose-500 text-white' : 'bg-rose-200 text-rose-700'
            }`}>📄</div>
            <div className="text-[8px] text-rose-600 ml-1 self-center">vector DB</div>
          </div>
          <div className="text-[8px] text-rose-600 mt-0.5 font-mono">embedding · top-k retrieval</div>
        </div>
      );

      // 1) ft / rag / domain — 좌우 두 박스 비교
      if (d === 'ft' || d === 'rag' || d === 'domain') {
        return (
          <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">⚖</span>
              <span className="text-[11px] font-bold text-rose-800">
                {d === 'ft'     ? '두 방식 — 이번 단계 Fine-tuning' :
                 d === 'rag'    ? '두 방식 — 이번 단계 RAG' :
                                  '두 방식 — 도메인 적응'}
              </span>
            </div>
            <div className="grid grid-cols-2 gap-2">
              <FtBox active={d === 'ft' || d === 'domain'} />
              <RagBox active={d === 'rag' || d === 'domain'} />
            </div>
            {d === 'domain' && (
              <div className="mt-2 grid grid-cols-2 gap-2 text-[9px] text-center">
                <div className="bg-purple-50 border border-purple-200 rounded p-1.5">
                  <div className="font-bold text-purple-700">FT 강점</div>
                  <div className="text-purple-600">톤·스타일·용어</div>
                </div>
                <div className="bg-rose-50 border border-rose-200 rounded p-1.5">
                  <div className="font-bold text-rose-700">RAG 강점</div>
                  <div className="text-rose-600">최신 사실·출처</div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // 2) cycle — 갱신 주기 비교 (타임라인)
      if (d === 'cycle') {
        return (
          <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">🔄</span>
              <span className="text-[11px] font-bold text-rose-800">데이터 갱신 사이클</span>
            </div>
            <div className="space-y-2">
              {/* RAG 타임라인 */}
              <div className="bg-rose-50 border border-rose-300 rounded p-2">
                <div className="flex items-center justify-between mb-1">
                  <span className="text-[10px] font-bold text-rose-800">📚 RAG</span>
                  <span className="text-[9px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-mono">≈ 1분</span>
                </div>
                <div className="flex items-center gap-0.5 text-[8px] font-mono text-rose-700">
                  <div className="bg-rose-500 text-white px-1 rounded">📄 upload</div>
                  <span>→</span>
                  <div className="bg-rose-500 text-white px-1 rounded">embed</div>
                  <span>→</span>
                  <div className="bg-rose-500 text-white px-1 rounded">upsert</div>
                  <span>→</span>
                  <div className="bg-rose-700 text-white px-1 rounded font-bold animate-pulse">✓ live</div>
                </div>
                <div className="text-[8px] text-rose-600 mt-1">비용: 수 원 / 다운타임: 0</div>
              </div>

              {/* Fine-tuning 타임라인 */}
              <div className="bg-purple-50 border border-purple-300 rounded p-2 opacity-80">
                <div className="flex items-center justify-between mb-1">
                  <span className="text-[10px] font-bold text-purple-800">🧠 Fine-tuning</span>
                  <span className="text-[9px] bg-purple-600 text-white px-1.5 py-0.5 rounded font-mono">≈ 1주</span>
                </div>
                <div className="flex items-center gap-0.5 text-[8px] font-mono text-purple-700 flex-wrap">
                  <div className="bg-purple-400 text-white px-1 rounded">D1: 통보</div>
                  <span>→</span>
                  <div className="bg-purple-400 text-white px-1 rounded">D2-3: 데이터</div>
                  <span>→</span>
                  <div className="bg-purple-500 text-white px-1 rounded">D4: GPU 학습</div>
                  <span>→</span>
                  <div className="bg-purple-500 text-white px-1 rounded">D5: 평가</div>
                  <span>→</span>
                  <div className="bg-purple-700 text-white px-1 rounded font-bold">D6: 배포</div>
                </div>
                <div className="text-[8px] text-purple-600 mt-1">비용: 수십~수백만원 / 다운타임: 분</div>
              </div>
            </div>
          </div>
        );
      }

      // 3) hybrid — 결합 다이어그램
      if (d === 'hybrid') {
        return (
          <div className="bg-white rounded-lg border-2 border-rose-300 p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">✨</span>
              <span className="text-[11px] font-bold text-rose-800">Hybrid — RAG + Fine-tuning</span>
            </div>
            <div className="space-y-2">
              {/* 입력 */}
              <div className="bg-slate-100 rounded p-1.5 text-center">
                <span className="text-[10px] font-mono text-slate-700">"환불 절차 알려주세요"</span>
              </div>
              <div className="text-center text-rose-500 text-[10px] font-mono">↓</div>

              {/* 두 갈래 — 톤(LoRA) + 사실(RAG) */}
              <div className="grid grid-cols-2 gap-2">
                <div className="bg-purple-100 border-2 border-purple-400 rounded p-2">
                  <div className="text-[10px] font-bold text-purple-800 mb-1">🧠 LoRA FT</div>
                  <div className="text-[9px] text-purple-700 leading-tight">
                    회사 정중체<br/>도메인 용어
                  </div>
                  <div className="text-[8px] text-purple-600 mt-1 font-mono">분기 1회 학습</div>
                </div>
                <div className="bg-rose-100 border-2 border-rose-400 rounded p-2">
                  <div className="text-[10px] font-bold text-rose-800 mb-1">📚 RAG</div>
                  <div className="text-[9px] text-rose-700 leading-tight">
                    최신 정책 PDF<br/>출처 추적
                  </div>
                  <div className="text-[8px] text-rose-600 mt-1 font-mono">매일 ingestion</div>
                </div>
              </div>

              <div className="text-center text-rose-500 text-[10px] font-mono">↓ 결합 ↓</div>

              {/* 출력 */}
              <div className="bg-gradient-to-r from-purple-100 to-rose-100 border-2 border-rose-500 rounded p-2 shadow">
                <div className="text-[9px] font-bold text-slate-700 mb-1">✓ 응답 (톤 + 사실 + 출처)</div>
                <div className="text-[10px] text-slate-800 leading-tight">
                  "안녕하세요, 고객님. 저희 ㈜다포커스의 환불 절차는…
                  2026-04-01부터 신선식품은 24시간 내 환불만 가능합니다."
                </div>
                <div className="text-[8px] text-rose-600 mt-1 font-mono">출처: 환불정책_v3.2.pdf</div>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: 비용·속도·정확도 막대 차트 (3축)
    //   step.ft / step.rag 의 0~5 점수를 막대로 그림
    // ─────────────────────────────────────────────────────
    function MetricBars({ step }) {
      const metrics = [
        { key: 'cost',     label: '비용',           ftHint: 'GPU $$$',     ragHint: '검색 인프라만' },
        { key: 'speed',    label: '갱신 속도',      ftHint: '수 일',        ragHint: '분 단위' },
        { key: 'accuracy', label: step.diagram === 'domain' ? '강점 영역 정확도' : '도메인 정확도',
                             ftHint: 'FT는 스타일',  ragHint: 'RAG는 사실' },
      ];
      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">📊</span>
            <span className="text-[11px] font-bold text-slate-700">비용 · 속도 · 정확도</span>
          </div>
          <div className="space-y-2">
            {metrics.map((m) => (
              <div key={m.key}>
                <div className="text-[9px] font-bold text-slate-600 mb-0.5">{m.label}</div>
                <div className="space-y-1">
                  {/* FT 막대 */}
                  <div className="flex items-center gap-1.5">
                    <span className="text-[9px] font-mono text-purple-700 w-8">FT</span>
                    <div className="flex-1 bg-slate-100 rounded-full h-3 overflow-hidden">
                      <div
                        className="bg-purple-500 h-full transition-all duration-700 flex items-center justify-end pr-1"
                        style={{ width: `${step.ft[m.key] * 20}%` }}
                      >
                        <span className="text-[8px] text-white font-bold">{step.ft[m.key]}</span>
                      </div>
                    </div>
                    <span className="text-[8px] text-slate-500 w-20 leading-tight">{m.ftHint}</span>
                  </div>
                  {/* RAG 막대 */}
                  <div className="flex items-center gap-1.5">
                    <span className="text-[9px] font-mono text-rose-700 w-8">RAG</span>
                    <div className="flex-1 bg-slate-100 rounded-full h-3 overflow-hidden">
                      <div
                        className="bg-rose-500 h-full transition-all duration-700 flex items-center justify-end pr-1"
                        style={{ width: `${step.rag[m.key] * 20}%` }}
                      >
                        <span className="text-[8px] text-white font-bold">{step.rag[m.key]}</span>
                      </div>
                    </div>
                    <span className="text-[8px] text-slate-500 w-20 leading-tight">{m.ragHint}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
          <div className="text-[8px] text-slate-400 mt-2 font-mono">scale: 0 (낮음) ~ 5 (높음)</div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 비교 다이어그램 / 하단: 막대 차트
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">⚖ RAG vs Fine-tuning 비교</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <CompareDiagram step={step} />
            <MetricBars step={step} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-purple-500"></span>Fine-tuning
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>RAG
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-gradient-to-r from-purple-500 to-rose-500"></span>Hybrid
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 파일명 탭
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      // 파일 탭 — 5개 step의 파일명을 모두 보여주고 현재 step만 활성화
      const FILES = STEPS.map((s) => s.code.filename);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭들 */}
          <div className="bg-[#21252b] border-b border-slate-700">
            <div className="px-4 py-2 flex items-center gap-2 border-b border-slate-700/50">
              <div className="flex gap-1.5">
                <span className="w-3 h-3 rounded-full bg-red-500"></span>
                <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span className="w-3 h-3 rounded-full bg-green-500"></span>
              </div>
              <span className="text-[10px] text-slate-500 ml-2 font-mono uppercase">EXPLORER</span>
              <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
            </div>
            <div className="flex overflow-x-auto">
              {FILES.map((fn, i) => {
                const active = i === stepIdx;
                return (
                  <div
                    key={fn}
                    className={`px-3 py-1.5 text-[10px] font-mono border-r border-slate-700/50 whitespace-nowrap ${
                      active
                        ? 'bg-[#282c34] text-rose-300 border-t-2 border-t-rose-400'
                        : 'bg-[#21252b] text-slate-500 border-t-2 border-t-transparent'
                    }`}
                  >
                    {fn}
                  </div>
                );
              })}
            </div>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. RAG 기초 &gt; Chapter 2. RAG의 발전</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">I-2-2. RAG vs Fine-tuning — 외부 지식 vs 모델 학습</h1>
                  <p className="text-sm text-slate-500 mt-0.5">연수원에서 머리에 주입(FT) vs 매뉴얼 책장 옆에 두기(RAG)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: <strong>RAG로 사실</strong>(매일 갱신·출처 추적) + <strong>Fine-tuning으로 톤·스타일</strong>(분기 1회 LoRA). 둘은 경쟁이 아니라 보완. 다음(Part II)에서는 RAG 데이터 준비 — 청크 분할·임베딩 — 으로 들어간다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Fine-tuning', 'RAG', 'LoRA', 'vector DB', 'hybrid', '갱신 사이클', '도메인 적응'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-2-1.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; I-2-1 Naive vs Advanced vs Modular RAG</a>
              <span className="text-slate-400">Part II. 데이터 준비 &rarr;</span>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
