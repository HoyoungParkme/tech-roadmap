<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — I-2-2. RAG vs Fine-tuning</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CRITERIA = [
      { label: '데이터 변경 빈도', rag: { score: 5, desc: '매뉴얼만 갱신하면 됨' }, ft: { score: 1, desc: '변경마다 재학습 필요' } },
      { label: '비용', rag: { score: 4, desc: '검색 인프라 비용만' }, ft: { score: 2, desc: 'GPU 학습 비용 높음' } },
      { label: '실시간 업데이트', rag: { score: 5, desc: '문서 추가 즉시 반영' }, ft: { score: 1, desc: '재학습 주기 필요' } },
      { label: '도메인 스타일 적응', rag: { score: 2, desc: '프롬프트로 제한적 적응' }, ft: { score: 5, desc: '톤, 스타일 완전 학습' } },
      { label: '환각 제어', rag: { score: 4, desc: '출처 기반 답변으로 통제' }, ft: { score: 3, desc: '학습 데이터 품질에 의존' } },
      { label: '구현 난이도', rag: { score: 3, desc: '파이프라인 설계 필요' }, ft: { score: 2, desc: '데이터 준비 + 학습 파이프라인' } },
    ];

    const SCENARIOS = [
      { question: '사내 문서 Q&A 챗봇', answer: 'RAG', reason: '문서가 자주 갱신되고, 출처 추적이 중요하고, 최신 정보 반영이 필요' },
      { question: '법률 상담 AI (법률 용어 스타일)', answer: 'Fine-tuning + RAG', reason: '법률 용어/스타일은 Fine-tuning, 최신 판례 검색은 RAG로 하이브리드' },
      { question: '고객 이메일 자동 응답', answer: 'Fine-tuning', reason: '회사 고유의 말투/톤이 중요하고, 데이터가 안정적' },
    ];

    const STEPS = [
      { desc: "RAG와 Fine-tuning — 언제 무엇을 선택해야 할까? 직원 교육에 비유합니다. Fine-tuning은 연수원에서 새 지식을 머릿속에 넣는 것, RAG는 매뉴얼 책장을 옆에 두는 것입니다.", activeCriteria: -1, showScenario: false },
      { desc: "[비교 1] 데이터 변경 빈도 — 인사 규정이 바뀌면? RAG는 문서만 교체하면 끝. Fine-tuning은 전체 재학습이 필요합니다. 자주 바뀌는 데이터에는 RAG가 압도적입니다.", activeCriteria: 0, showScenario: false },
      { desc: "[비교 2] 비용과 실시간성 — RAG는 검색 인프라 비용만. Fine-tuning은 GPU 학습 비용이 높습니다. 문서를 추가하면 RAG는 즉시 반영, Fine-tuning은 재학습 주기를 기다려야 합니다.", activeCriteria: 1, showScenario: false },
      { desc: "[비교 3] 도메인 스타일 — \"법률 용어로 답변해줘\", \"반말로 친근하게 답해줘\" 같은 스타일 적응은 Fine-tuning이 월등합니다. RAG는 프롬프트로 제한적 제어만 가능합니다.", activeCriteria: 3, showScenario: false },
      { desc: "[비교 4] 환각 제어 — RAG는 출처 기반이라 \"이 문서에 없으면 모른다고 답해\"가 가능합니다. Fine-tuning은 학습 데이터 품질에 의존하므로 통제가 어렵습니다.", activeCriteria: 4, showScenario: false },
      { desc: "[실전 판단] 실무에서는 RAG와 Fine-tuning을 배타적으로 선택하지 않습니다. 하이브리드가 최적인 경우가 많습니다. 상황별 판단 기준을 확인해봅시다.", activeCriteria: -1, showScenario: true },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-emerald-700 hover:text-emerald-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. RAG 기초 &gt; Chapter 2. RAG의 발전</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-2-2. RAG vs Fine-tuning — 언제 무엇을 선택하나</h1>
                </div>
              </div>
              <p className="text-slate-600">Fine-tuning은 <b>연수원</b>(비싸고, 시간 걸리지만 깊이 학습). RAG는 <b>매뉴얼 책장</b>(저렴하고, 즉시 갱신 가능).</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-emerald-700 border-emerald-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">RAG vs Fine-tuning 의사결정</h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                {!s.showScenario ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-3">
                    <div className="grid grid-cols-3 gap-2 text-xs font-bold text-center mb-2">
                      <div className="text-slate-500">기준</div>
                      <div className="text-emerald-600">RAG</div>
                      <div className="text-purple-600">Fine-tuning</div>
                    </div>
                    {CRITERIA.map((c, i) => {
                      const isActive = s.activeCriteria === i;
                      return (
                        <div key={i} className={`grid grid-cols-3 gap-2 p-2 rounded-lg transition-all duration-500 ${isActive ? 'bg-emerald-50 border border-emerald-200 scale-105 shadow' : 'bg-slate-50 opacity-60'}`}>
                          <div className="text-xs font-bold text-slate-700 flex items-center">{c.label}</div>
                          <div className="text-center">
                            <div className="flex justify-center gap-0.5 mb-0.5">
                              {Array.from({length: 5}, (_, j) => (
                                <div key={j} className={`w-3 h-3 rounded-full ${j < c.rag.score ? 'bg-emerald-500' : 'bg-slate-200'}`} />
                              ))}
                            </div>
                            {isActive && <div className="text-[10px] text-emerald-600">{c.rag.desc}</div>}
                          </div>
                          <div className="text-center">
                            <div className="flex justify-center gap-0.5 mb-0.5">
                              {Array.from({length: 5}, (_, j) => (
                                <div key={j} className={`w-3 h-3 rounded-full ${j < c.ft.score ? 'bg-purple-500' : 'bg-slate-200'}`} />
                              ))}
                            </div>
                            {isActive && <div className="text-[10px] text-purple-600">{c.ft.desc}</div>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">실전 시나리오 판단</div>
                    {SCENARIOS.map((sc, i) => (
                      <div key={i} className="p-3 rounded-lg border border-slate-100 bg-slate-50">
                        <div className="flex items-center justify-between mb-1">
                          <span className="text-sm font-bold text-slate-700">{sc.question}</span>
                          <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold ${sc.answer === 'RAG' ? 'bg-emerald-100 text-emerald-700' : sc.answer === 'Fine-tuning' ? 'bg-purple-100 text-purple-700' : 'bg-amber-100 text-amber-700'}`}>{sc.answer}</span>
                        </div>
                        <div className="text-xs text-slate-600">{sc.reason}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-emerald-600 uppercase tracking-wider mb-4">핵심 판단 기준</div>
                {!s.showScenario ? (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-emerald-50 border border-emerald-200">
                      <div className="font-bold text-sm text-emerald-800 mb-2">RAG를 선택할 때</div>
                      <ul className="text-xs text-emerald-700 space-y-1">
                        <li>- 데이터가 자주 변경됨</li>
                        <li>- 출처 추적이 중요함</li>
                        <li>- 실시간 업데이트 필요</li>
                        <li>- 비용 제한이 있음</li>
                      </ul>
                    </div>
                    <div className="p-4 rounded-lg bg-purple-50 border border-purple-200">
                      <div className="font-bold text-sm text-purple-800 mb-2">Fine-tuning을 선택할 때</div>
                      <ul className="text-xs text-purple-700 space-y-1">
                        <li>- 특정 스타일/톤이 중요함</li>
                        <li>- 데이터가 안정적(변경 적음)</li>
                        <li>- 도메인 전문 용어 학습 필요</li>
                        <li>- 추론 속도가 중요함</li>
                      </ul>
                    </div>
                    <div className="p-4 rounded-lg bg-amber-50 border border-amber-200">
                      <div className="font-bold text-sm text-amber-800 mb-2">하이브리드 (둘 다)</div>
                      <ul className="text-xs text-amber-700 space-y-1">
                        <li>- Fine-tuning으로 스타일 학습</li>
                        <li>- RAG로 최신 지식 보강</li>
                        <li>- 실무에서 가장 많은 케이스</li>
                      </ul>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-3">
                    <div className="text-sm text-slate-600 leading-relaxed">
                      <p className="mb-3">실무에서의 핵심 질문:</p>
                      <div className="space-y-2">
                        <div className="p-3 bg-slate-50 rounded-lg border">
                          <div className="text-xs font-bold text-slate-700">Q. 데이터가 자주 바뀌나?</div>
                          <div className="text-xs text-slate-500 mt-1">예 → RAG 필수</div>
                        </div>
                        <div className="p-3 bg-slate-50 rounded-lg border">
                          <div className="text-xs font-bold text-slate-700">Q. 특정 말투/스타일이 필요한가?</div>
                          <div className="text-xs text-slate-500 mt-1">예 → Fine-tuning 고려</div>
                        </div>
                        <div className="p-3 bg-slate-50 rounded-lg border">
                          <div className="text-xs font-bold text-slate-700">Q. 출처 표시가 필요한가?</div>
                          <div className="text-xs text-slate-500 mt-1">예 → RAG 필수</div>
                        </div>
                        <div className="p-3 bg-slate-50 rounded-lg border">
                          <div className="text-xs font-bold text-slate-700">Q. 예산이 제한적인가?</div>
                          <div className="text-xs text-slate-500 mt-1">예 → RAG 우선</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Fine-tuning', 'RAG', '비용', '업데이트 주기', '하이브리드'].map(kw => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-sm font-medium border border-emerald-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-emerald-600 hover:bg-emerald-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./I-2-1.html" className="text-emerald-600 hover:text-emerald-800 font-medium">&larr; I-2-1. Naive vs Advanced vs Modular RAG</a>
              <span className="text-slate-400">Part II. 데이터 준비 →</span>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
