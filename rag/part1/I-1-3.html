<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — I-1-3. RAG 파이프라인 전체 흐름</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PIPELINE = [
      { id: 'load', icon: '📄', label: '문서 로딩', desc: 'PDF, 웹, DB에서 문서를 불러옴', color: 'bg-blue-50 border-blue-300 text-blue-800', phase: 'indexing' },
      { id: 'chunk', icon: '✂️', label: '청킹', desc: '문서를 적절한 크기로 분할', color: 'bg-cyan-50 border-cyan-300 text-cyan-800', phase: 'indexing' },
      { id: 'embed', icon: '🔢', label: '임베딩', desc: '텍스트를 벡터(숫자)로 변환', color: 'bg-purple-50 border-purple-300 text-purple-800', phase: 'indexing' },
      { id: 'store', icon: '💾', label: '저장', desc: '벡터를 Vector Store에 저장', color: 'bg-indigo-50 border-indigo-300 text-indigo-800', phase: 'indexing' },
      { id: 'query', icon: '❓', label: '질문 입력', desc: '사용자가 질문을 입력', color: 'bg-amber-50 border-amber-300 text-amber-800', phase: 'retrieval' },
      { id: 'search', icon: '🔍', label: '검색', desc: '질문과 유사한 문서를 검색', color: 'bg-orange-50 border-orange-300 text-orange-800', phase: 'retrieval' },
      { id: 'prompt', icon: '📎', label: '프롬프트 구성', desc: '검색 결과 + 질문을 결합', color: 'bg-rose-50 border-rose-300 text-rose-800', phase: 'generation' },
      { id: 'generate', icon: '🤖', label: 'LLM 생성', desc: '참고 자료 기반 답변 생성', color: 'bg-emerald-50 border-emerald-300 text-emerald-800', phase: 'generation' },
    ];

    const PHASES = [
      { id: 'indexing', label: 'Indexing (색인)', color: 'bg-blue-600', range: [0, 3] },
      { id: 'retrieval', label: 'Retrieval (검색)', color: 'bg-orange-600', range: [4, 5] },
      { id: 'generation', label: 'Generation (생성)', color: 'bg-emerald-600', range: [6, 7] },
    ];

    const STEPS = [
      { desc: "RAG 파이프라인은 크게 3단계로 나뉩니다. 도서관 시스템처럼 — (1) 책을 분류하고 카탈로그를 만들고(Indexing), (2) 요청에 맞는 책을 찾고(Retrieval), (3) 참고해서 보고서를 쓴다(Generation).", active: -1, data: null },
      { desc: "[Indexing 1/4] 다양한 소스(PDF, 웹, DB)에서 문서를 불러옵니다. 우체국에서 우편물을 수거하는 것처럼, 형태가 다른 문서를 하나의 표준 형식으로 통합합니다.", active: 0, data: { input: '인사규정.pdf (42페이지)', output: 'Document(page_content="제1조 목적...", metadata={source: "인사규정.pdf", page: 1})' } },
      { desc: "[Indexing 2/4] 긴 문서를 적절한 크기(chunk)로 분할합니다. 피자를 먹기 좋은 크기로 자르는 것처럼, 검색하기 좋은 단위로 나눕니다.", active: 1, data: { input: '42페이지 전체 문서', output: '청크 1: "제1조 목적: 본 규정은..."\n청크 2: "제2조 적용 범위: ..."\n...\n청크 128: "부칙 제3조: ..."' } },
      { desc: "[Indexing 3/4] 텍스트 청크를 벡터(숫자 배열)로 변환합니다. 컴퓨터가 \"이 두 텍스트가 비슷한가?\"를 판단할 수 있는 형태로 바꿉니다.", active: 2, data: { input: '"제3조 연차 휴가: 1년 이상 근속 시 15일..."', output: '[0.023, -0.156, 0.892, ..., 0.041]\n(1536차원 벡터)' } },
      { desc: "[Indexing 4/4] 벡터를 Vector Store에 저장합니다. 도서관의 서가에 책을 꽂는 것처럼, 나중에 빠르게 찾을 수 있도록 인덱싱합니다.", active: 3, data: { input: '128개 벡터 + 메타데이터', output: 'Vector Store에 저장 완료\n(Chroma, FAISS, pgvector 등)' } },
      { desc: "[Retrieval 1/2] 사용자가 질문을 입력합니다. 이 질문도 벡터로 변환되어 저장된 벡터들과 비교됩니다.", active: 4, data: { input: '사용자: "연차 휴가가 몇 일이야?"', output: '질문 벡터: [0.019, -0.142, 0.901, ..., 0.038]' } },
      { desc: "[Retrieval 2/2] 질문 벡터와 가장 유사한 문서 벡터를 찾습니다. 도서관 사서가 관련 책을 찾아주는 것처럼, 상위 k개의 가장 관련 있는 청크를 반환합니다.", active: 5, data: { input: '질문 벡터 vs 128개 저장된 벡터', output: 'Top 3:\n1. "제3조 연차 휴가: 15일..." (유사도: 0.94)\n2. "제4조 특별 휴가: ..." (유사도: 0.82)\n3. "부칙: 2026년 추가 규정..." (유사도: 0.76)' } },
      { desc: "[Generation 1/2] 검색된 문서와 질문을 하나의 프롬프트로 결합합니다. \"아래 참고 자료를 기반으로 답변하세요\"라는 지시를 추가합니다.", active: 6, data: { input: '질문 + 검색 결과 3개', output: '[시스템] 참고 자료 기반으로 답변하세요.\n[참고] 제3조: 1년 이상 근속 시 15일...\n[질문] 연차 휴가가 몇 일이야?' } },
      { desc: "[Generation 2/2] LLM이 참고 자료를 기반으로 정확한 답변을 생성합니다. 이것이 RAG 파이프라인의 전체 흐름입니다!", active: 7, data: { input: '보강된 프롬프트', output: '"1년 이상 근속 시 기본 연차는 15일입니다.\n성과 등급 A 이상은 추가 3일이 부여됩니다.\n[출처: 인사규정 제3조, 부칙 2026]"' } },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-emerald-700 hover:text-emerald-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. RAG 기초 &gt; Chapter 1. RAG의 필요성</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-1-3. RAG 파이프라인 전체 흐름</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>도서관 시스템</b>을 상상하세요. 책을 분류하고(Indexing) → 요청에 맞는 책을 찾고(Retrieval) → 참고해서 보고서를 쓴다(Generation).</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-emerald-700 border-emerald-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">Indexing → Retrieval → Generation</h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="space-y-2">
                {PHASES.map(phase => (
                  <div key={phase.id} className="mb-3">
                    <div className="flex items-center gap-2 mb-2">
                      <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold ${phase.color}`}>
                        {phase.id === 'indexing' ? 'I' : phase.id === 'retrieval' ? 'R' : 'G'}
                      </span>
                      <span className="text-xs font-bold text-slate-600">{phase.label}</span>
                    </div>
                    <div className="ml-3 border-l-2 border-slate-100 pl-3 space-y-2">
                      {PIPELINE.filter(p => p.phase === phase.id).map((mod, i) => {
                        const globalIdx = PIPELINE.indexOf(mod);
                        const isActive = s.active === globalIdx;
                        const isPast = s.active > globalIdx;
                        return (
                          <div key={mod.id} className={`flex items-center gap-3 p-3 rounded-xl border-2 transition-all duration-500 ${isActive ? mod.color + ' scale-105 shadow-md' : isPast ? mod.color.replace('border-', 'border-').replace('bg-', 'bg-') + ' opacity-70' : 'bg-white border-slate-100 opacity-40'}`}>
                            <div className="text-2xl">{mod.icon}</div>
                            <div className="flex-1">
                              <div className="font-bold text-xs">{mod.label}</div>
                              <div className="text-[11px] mt-0.5 opacity-80">{mod.desc}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-emerald-600 uppercase tracking-wider mb-4">데이터 흐름</div>
                {s.data ? (
                  <>
                    <div className="mb-4">
                      <div className="text-xs font-medium text-slate-500 mb-1">입력</div>
                      <pre className="bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm text-slate-700 whitespace-pre-wrap font-mono">{s.data.input}</pre>
                    </div>
                    <div>
                      <div className="flex items-center gap-2 mb-1">
                        <span className="text-emerald-500">↓</span>
                        <div className="text-xs font-medium text-emerald-600">{PIPELINE[s.active]?.label} 결과</div>
                      </div>
                      <pre className="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-sm text-emerald-800 whitespace-pre-wrap font-mono">{s.data.output}</pre>
                    </div>
                  </>
                ) : (
                  <div className="flex items-center justify-center h-60">
                    <div className="text-center">
                      <div className="text-4xl mb-3">📚</div>
                      <div className="text-sm text-slate-500">3단계 파이프라인 개요</div>
                      <div className="flex gap-3 mt-4">
                        {PHASES.map(p => (
                          <div key={p.id} className="text-center">
                            <div className={`w-10 h-10 rounded-lg text-white text-xs flex items-center justify-center font-bold mx-auto mb-1 ${p.color}`}>{p.id[0].toUpperCase()}</div>
                            <div className="text-[10px] text-slate-500">{p.label.split(' ')[0]}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Indexing', 'Retrieval', 'Generation', '파이프라인', '3단계'].map(kw => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-sm font-medium border border-emerald-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-emerald-600 hover:bg-emerald-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./I-1-2.html" className="text-emerald-600 hover:text-emerald-800 font-medium">&larr; I-1-2. RAG란 무엇인가</a>
              <a href="./I-2-1.html" className="text-emerald-600 hover:text-emerald-800 font-medium">I-2-1. Naive vs Advanced vs Modular RAG &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
