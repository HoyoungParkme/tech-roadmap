<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — VII-1-2. 평가 지표 심화</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const EXAMPLE = {
      question: "우리 회사의 연차 휴가 정책을 알려줘",
      answer: "1년 이상 근속 시 연차 15일이 부여됩니다. 리프레시 휴가 3일이 추가 제공됩니다. 생일 휴가 1일도 있습니다.",
      contexts: [
        "인사규정 3장 2절: 1년 이상 근속한 직원에게는 연차 15일이 부여된다.",
        "인사규정 3장 4절: 리프레시 휴가 3일이 추가 부여된다.",
        "인사규정 1장: 근무시간은 오전 9시부터 오후 6시까지이다.",
        "복지규정 2장: 생일 당일 특별 휴가 1일을 부여한다."
      ],
      groundTruth: "연차 15일, 리프레시 휴가 3일, 생일 휴가 1일"
    };

    const STEPS = [
      {
        title: "평가 지표 심화 학습",
        desc: "시험 채점 기준을 떠올려 보세요. 같은 답안도 채점 기준에 따라 점수가 달라집니다. RAGAS의 각 지표가 구체적으로 어떻게 계산되는지, 예시 쿼리/답변을 통해 단계별로 살펴봅니다.",
        phase: "intro"
      },
      {
        title: "Faithfulness — 출처 충실도",
        desc: "답변의 각 문장(주장)이 검색된 문서에 근거하는지 하나씩 체크합니다. 3개 주장 모두 출처에 있으므로 Faithfulness = 3/3 = 1.0. 만약 출처에 없는 내용을 지어냈다면 점수가 낮아집니다.",
        phase: "faithfulness",
        claims: [
          { text: "1년 이상 근속 시 연차 15일", source: "인사규정 3장 2절", supported: true },
          { text: "리프레시 휴가 3일 추가", source: "인사규정 3장 4절", supported: true },
          { text: "생일 휴가 1일", source: "복지규정 2장", supported: true }
        ],
        score: "3/3 = 1.0"
      },
      {
        title: "Answer Relevancy — 답변 적절성",
        desc: "답변으로부터 역으로 질문을 생성하고, 원래 질문과의 유사도를 측정합니다. 답변이 질문에 적절히 답했다면 역생성 질문이 원래 질문과 비슷할 것입니다.",
        phase: "answer_relevancy",
        reverseQuestions: [
          { generated: "회사의 휴가 일수는 몇 일인가요?", similarity: 0.92 },
          { generated: "연차 정책에 대해 알려주세요", similarity: 0.95 },
          { generated: "리프레시 휴가란 무엇인가요?", similarity: 0.78 }
        ],
        score: "(0.92 + 0.95 + 0.78) / 3 = 0.88"
      },
      {
        title: "Context Precision — 검색 정밀도",
        desc: "검색된 문서 중 실제로 관련 있는 문서의 비율과 순위를 평가합니다. 관련 문서가 상위에 있을수록 높은 점수를 받습니다. 4개 문서 중 3개가 관련 있고, 관련 문서가 상위에 위치하므로 높은 점수입니다.",
        phase: "context_precision",
        rankedDocs: [
          { title: "인사규정 3장 2절 (연차)", rank: 1, relevant: true },
          { title: "인사규정 3장 4절 (리프레시)", rank: 2, relevant: true },
          { title: "인사규정 1장 (근무시간)", rank: 3, relevant: false },
          { title: "복지규정 2장 (생일 휴가)", rank: 4, relevant: true }
        ],
        score: "0.83"
      },
      {
        title: "Context Recall — 검색 재현율",
        desc: "정답(Ground Truth)에 포함된 정보가 검색 결과에 얼마나 포함되어 있는지 측정합니다. 정답의 모든 내용이 검색 결과에 있으므로 Recall = 1.0입니다.",
        phase: "context_recall",
        groundTruthItems: [
          { item: "연차 15일", found: true, inDoc: "인사규정 3장 2절" },
          { item: "리프레시 휴가 3일", found: true, inDoc: "인사규정 3장 4절" },
          { item: "생일 휴가 1일", found: true, inDoc: "복지규정 2장" }
        ],
        score: "3/3 = 1.0"
      },
      {
        title: "종합 점수 카드",
        desc: "모든 지표를 종합한 점수 카드입니다. 이 예시에서는 모든 지표가 높게 나왔지만, 실전에서는 특정 지표가 낮을 수 있습니다. 낮은 지표를 보고 개선 포인트를 파악하는 것이 핵심입니다.",
        phase: "scorecard",
        scores: [
          { name: "Faithfulness", score: 1.0, desc: "모든 주장이 출처에 근거", grade: "A+" },
          { name: "Answer Relevancy", score: 0.88, desc: "답변이 질문에 적절히 응답", grade: "A" },
          { name: "Context Precision", score: 0.83, desc: "관련 문서가 상위에 위치", grade: "B+" },
          { name: "Context Recall", score: 1.0, desc: "필요한 정보 모두 검색됨", grade: "A+" }
        ]
      }
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderVisualization = () => {
        if (s.phase === 'intro') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">예시 데이터</div>
              <div className="space-y-3">
                <div className="bg-blue-50 border border-blue-200 rounded-lg p-3">
                  <div className="text-xs font-bold text-blue-600 mb-1">질문</div>
                  <div className="text-sm text-blue-800 font-mono">{EXAMPLE.question}</div>
                </div>
                <div className="bg-green-50 border border-green-200 rounded-lg p-3">
                  <div className="text-xs font-bold text-green-600 mb-1">RAG 답변</div>
                  <div className="text-sm text-green-800 font-mono">{EXAMPLE.answer}</div>
                </div>
                <div className="bg-slate-50 border border-slate-200 rounded-lg p-3">
                  <div className="text-xs font-bold text-slate-500 mb-2">검색된 문서 ({EXAMPLE.contexts.length}개)</div>
                  {EXAMPLE.contexts.map((ctx, i) => (
                    <div key={i} className="text-xs text-slate-600 py-1 border-b border-slate-100 last:border-0">{i + 1}. {ctx}</div>
                  ))}
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'faithfulness') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-600 uppercase tracking-wider mb-4">Faithfulness 계산 과정</div>
              <div className="flex flex-col gap-3">
                <div className="bg-blue-50 border border-blue-200 rounded-lg p-2 text-xs text-blue-700 text-center">답변을 주장(claim) 단위로 분해</div>
                <div className="space-y-2">
                  {s.claims.map((c, i) => (
                    <div key={i} className="flex items-start gap-2 p-3 bg-green-50 rounded-lg border border-green-200">
                      <span className="text-lg mt-0.5">✅</span>
                      <div className="flex-1">
                        <div className="text-sm font-medium text-green-800">"{c.text}"</div>
                        <div className="text-xs text-green-600 mt-1">근거: {c.source}</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="bg-slate-100 border border-slate-300 rounded-lg p-3 text-center">
                  <div className="text-xs text-slate-500 mb-1">Faithfulness Score</div>
                  <div className="text-xl font-bold text-slate-800">{s.score}</div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'answer_relevancy') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-600 uppercase tracking-wider mb-4">Answer Relevancy 계산 과정</div>
              <div className="flex flex-col gap-3">
                <div className="bg-green-50 border border-green-200 rounded-lg p-2 text-xs text-green-700 text-center">답변으로부터 질문을 역생성</div>
                <div className="space-y-2">
                  {s.reverseQuestions.map((rq, i) => (
                    <div key={i} className="flex items-center justify-between p-3 bg-slate-50 rounded-lg border border-slate-200">
                      <div className="flex-1">
                        <div className="text-xs text-slate-500 mb-0.5">역생성 질문 #{i + 1}</div>
                        <div className="text-sm font-mono text-slate-700">"{rq.generated}"</div>
                      </div>
                      <div className={`text-xs font-bold px-2 py-1 rounded ${rq.similarity >= 0.9 ? 'bg-green-200 text-green-800' : 'bg-yellow-200 text-yellow-800'}`}>
                        {rq.similarity}
                      </div>
                    </div>
                  ))}
                </div>
                <div className="bg-blue-50 border border-blue-200 rounded-lg p-2 text-xs text-blue-700 text-center">
                  원래 질문: "{EXAMPLE.question}" 과의 유사도 평균
                </div>
                <div className="bg-slate-100 border border-slate-300 rounded-lg p-3 text-center">
                  <div className="text-xs text-slate-500 mb-1">Answer Relevancy Score</div>
                  <div className="text-xl font-bold text-slate-800">{s.score}</div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'context_precision') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-600 uppercase tracking-wider mb-4">Context Precision 계산 과정</div>
              <div className="flex flex-col gap-3">
                <div className="bg-blue-50 border border-blue-200 rounded-lg p-2 text-xs text-blue-700 text-center">검색 결과의 순위별 관련성 평가</div>
                <div className="space-y-2">
                  {s.rankedDocs.map((doc, i) => (
                    <div key={i} className={`flex items-center gap-3 p-3 rounded-lg border ${doc.relevant ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                      <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${doc.relevant ? 'bg-green-200 text-green-800' : 'bg-red-200 text-red-800'}`}>
                        #{doc.rank}
                      </div>
                      <div className="flex-1">
                        <div className="text-sm font-medium">{doc.title}</div>
                      </div>
                      <span className={`text-xs font-bold ${doc.relevant ? 'text-green-700' : 'text-red-700'}`}>
                        {doc.relevant ? 'Relevant' : 'Not Relevant'}
                      </span>
                    </div>
                  ))}
                </div>
                <div className="bg-slate-100 border border-slate-300 rounded-lg p-3 text-center">
                  <div className="text-xs text-slate-500 mb-1">Context Precision Score</div>
                  <div className="text-xl font-bold text-slate-800">{s.score}</div>
                  <div className="text-xs text-slate-400 mt-1">관련 문서가 상위에 있을수록 가중치 높음</div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'context_recall') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-600 uppercase tracking-wider mb-4">Context Recall 계산 과정</div>
              <div className="flex flex-col gap-3">
                <div className="bg-purple-50 border border-purple-200 rounded-lg p-2 text-xs text-purple-700 text-center">
                  정답(Ground Truth): "{EXAMPLE.groundTruth}"
                </div>
                <div className="text-center text-sm text-slate-400">↓ 정답의 각 항목이 검색 결과에 있는지 확인</div>
                <div className="space-y-2">
                  {s.groundTruthItems.map((item, i) => (
                    <div key={i} className="flex items-center gap-3 p-3 bg-green-50 rounded-lg border border-green-200">
                      <span className="text-lg">✅</span>
                      <div className="flex-1">
                        <div className="text-sm font-bold text-green-800">"{item.item}"</div>
                        <div className="text-xs text-green-600 mt-0.5">발견 위치: {item.inDoc}</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="bg-slate-100 border border-slate-300 rounded-lg p-3 text-center">
                  <div className="text-xs text-slate-500 mb-1">Context Recall Score</div>
                  <div className="text-xl font-bold text-slate-800">{s.score}</div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'scorecard') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-600 uppercase tracking-wider mb-4">종합 점수 카드</div>
              <div className="space-y-3">
                {s.scores.map((sc, i) => (
                  <div key={i} className="flex items-center gap-3 p-4 bg-slate-50 rounded-xl border border-slate-200">
                    <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-lg font-bold ${sc.score >= 0.9 ? 'bg-green-200 text-green-800' : sc.score >= 0.8 ? 'bg-blue-200 text-blue-800' : 'bg-yellow-200 text-yellow-800'}`}>
                      {sc.grade}
                    </div>
                    <div className="flex-1">
                      <div className="font-bold text-sm text-slate-800">{sc.name}</div>
                      <div className="text-xs text-slate-500 mt-0.5">{sc.desc}</div>
                    </div>
                    <div className="text-right">
                      <div className="text-xl font-bold text-slate-800">{sc.score.toFixed(2)}</div>
                      <div className="w-16 h-2 bg-slate-200 rounded-full mt-1">
                        <div className="h-2 rounded-full bg-slate-600" style={{width: `${sc.score * 100}%`}}></div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="mt-4 p-3 bg-slate-100 border border-slate-300 rounded-lg text-center">
                <div className="text-xs text-slate-500 mb-1">종합 평균</div>
                <div className="text-2xl font-bold text-slate-800">
                  {(s.scores.reduce((acc, sc) => acc + sc.score, 0) / s.scores.length).toFixed(2)}
                </div>
              </div>
            </div>
          );
        }
        return null;
      };

      const renderRightPanel = () => {
        if (s.phase === 'intro') {
          return (
            <div className="space-y-4">
              <div className="p-4 rounded-lg bg-slate-100 border border-slate-200">
                <div className="font-bold text-sm text-slate-700 mb-2">채점 기준 4가지</div>
                <div className="text-xs text-slate-600 space-y-2">
                  <div className="flex items-center gap-2"><span className="bg-green-200 px-1.5 py-0.5 rounded text-green-800 font-bold text-[10px]">F</span> <b>Faithfulness</b> — 출처에 충실한가?</div>
                  <div className="flex items-center gap-2"><span className="bg-blue-200 px-1.5 py-0.5 rounded text-blue-800 font-bold text-[10px]">AR</span> <b>Answer Relevancy</b> — 질문에 적절한가?</div>
                  <div className="flex items-center gap-2"><span className="bg-purple-200 px-1.5 py-0.5 rounded text-purple-800 font-bold text-[10px]">CP</span> <b>Context Precision</b> — 관련 문서 비율</div>
                  <div className="flex items-center gap-2"><span className="bg-orange-200 px-1.5 py-0.5 rounded text-orange-800 font-bold text-[10px]">CR</span> <b>Context Recall</b> — 필요 정보 포함율</div>
                </div>
              </div>
              <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                <div className="font-bold text-sm text-slate-700 mb-2">이 시각화에서 배우는 것</div>
                <div className="text-xs text-slate-600 space-y-1">
                  <div>• 각 지표의 <b>구체적 계산 과정</b></div>
                  <div>• 동일 예시로 4개 지표를 <b>단계별 비교</b></div>
                  <div>• 최종 <b>점수 카드</b> 해석 방법</div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'scorecard') {
          return (
            <div className="space-y-4">
              <div className="p-4 rounded-lg bg-slate-100 border border-slate-200">
                <div className="font-bold text-sm text-slate-700 mb-2">점수가 낮을 때 개선 방법</div>
                <div className="text-xs text-slate-600 space-y-2">
                  <div><b>Faithfulness ↓</b> → 프롬프트에 "출처에 근거하여 답변" 지시 강화</div>
                  <div><b>Answer Relevancy ↓</b> → 프롬프트에 "질문에 직접 답하라" 지시 강화</div>
                  <div><b>Context Precision ↓</b> → 리랭커 도입, 검색 파라미터 조정</div>
                  <div><b>Context Recall ↓</b> → 청킹 전략 개선, 임베딩 모델 변경</div>
                </div>
              </div>
              <div className="p-3 bg-slate-50 rounded-lg border border-slate-200 text-xs text-slate-600">
                <b>실전 팁:</b> 정기적으로 평가 세트를 돌려서 점수 변화를 추적하세요. 모델 변경, 프롬프트 수정 후 반드시 재평가합니다.
              </div>
            </div>
          );
        }
        return (
          <div className="space-y-4">
            <div className="p-4 rounded-lg bg-slate-100 border border-slate-200">
              <div className="font-bold text-sm text-slate-700 mb-2">{s.title} 상세</div>
              <div className="text-xs text-slate-600">
                {s.phase === 'faithfulness' && (
                  <div className="space-y-2">
                    <div><b>측정 대상:</b> 답변이 출처에 충실한가?</div>
                    <div><b>계산 방법:</b></div>
                    <div className="ml-2">1. 답변을 개별 주장(claim)으로 분해</div>
                    <div className="ml-2">2. 각 주장이 검색된 문서에 근거하는지 확인</div>
                    <div className="ml-2">3. 근거 있는 주장 수 / 전체 주장 수</div>
                    <div className="mt-2 p-2 bg-green-50 rounded border border-green-200 text-green-700">
                      <b>높은 점수 = 할루시네이션이 적다</b>
                    </div>
                  </div>
                )}
                {s.phase === 'answer_relevancy' && (
                  <div className="space-y-2">
                    <div><b>측정 대상:</b> 답변이 질문에 적절한가?</div>
                    <div><b>계산 방법:</b></div>
                    <div className="ml-2">1. 답변으로부터 역으로 질문을 N개 생성</div>
                    <div className="ml-2">2. 역생성 질문과 원래 질문의 유사도 계산</div>
                    <div className="ml-2">3. 유사도 평균</div>
                    <div className="mt-2 p-2 bg-blue-50 rounded border border-blue-200 text-blue-700">
                      <b>높은 점수 = 질문에 정확히 답한다</b>
                    </div>
                  </div>
                )}
                {s.phase === 'context_precision' && (
                  <div className="space-y-2">
                    <div><b>측정 대상:</b> 검색 결과의 정밀도</div>
                    <div><b>계산 방법:</b></div>
                    <div className="ml-2">1. 각 검색 문서가 관련 있는지 평가</div>
                    <div className="ml-2">2. 상위에 관련 문서가 있을수록 가중치 높음</div>
                    <div className="ml-2">3. 가중 평균 계산 (Precision@K 기반)</div>
                    <div className="mt-2 p-2 bg-purple-50 rounded border border-purple-200 text-purple-700">
                      <b>높은 점수 = 노이즈가 적다</b>
                    </div>
                  </div>
                )}
                {s.phase === 'context_recall' && (
                  <div className="space-y-2">
                    <div><b>측정 대상:</b> 필요한 정보의 포함 여부</div>
                    <div><b>계산 방법:</b></div>
                    <div className="ml-2">1. Ground Truth를 문장 단위로 분해</div>
                    <div className="ml-2">2. 각 문장이 검색 결과에 포함되어 있는지 확인</div>
                    <div className="ml-2">3. 포함된 문장 수 / 전체 문장 수</div>
                    <div className="mt-2 p-2 bg-orange-50 rounded border border-orange-200 text-orange-700">
                      <b>높은 점수 = 정보 누락이 적다</b>
                    </div>
                    <div className="mt-1 text-[10px] text-slate-400">* 이 지표만 Ground Truth가 필요</div>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-slate-700 hover:text-slate-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-slate-600 text-white flex items-center justify-center rounded-full font-bold text-xs">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. 평가 & 운영 &gt; Chapter 1. RAG 평가</div>
                  <h1 className="text-2xl font-bold text-slate-800">VII-1-2. 평가 지표 심화</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>시험 채점 기준</b>을 떠올려 보세요. 같은 답안도 채점 기준에 따라 점수가 달라집니다. 예시 쿼리/답변을 통해 각 지표의 <b>구체적 계산 과정</b>을 살펴봅니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-slate-600 border-slate-700 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-slate-300">평가 지표 심화</h3>
                <span className="text-xs text-slate-300">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="space-y-4">{renderVisualization()}</div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">{renderRightPanel()}</div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Faithfulness', 'Answer Relevancy', 'Context Precision', 'Context Recall', '점수 카드'].map(kw => (
                <span key={kw} className="bg-slate-100 text-slate-700 px-3 py-1 rounded-full text-sm font-medium border border-slate-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-slate-600 hover:bg-slate-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./VII-1-1.html" className="text-slate-600 hover:text-slate-800 font-medium">&larr; VII-1-1. RAGAS 프레임워크</a>
              <a href="./VII-2-1.html" className="text-slate-600 hover:text-slate-800 font-medium">VII-2-1. 프로덕션 RAG &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
