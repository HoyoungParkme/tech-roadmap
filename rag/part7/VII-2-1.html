                <div
                  key={axis.key}
                  className={`rounded-lg border-2 p-3 transition-all duration-500 ${style.card} ${isFocus ? 'ring-2 ring-rose-300 ring-offset-1' : ''}`}
                >
                  <div className="flex items-center justify-between mb-1.5">
                    <div className="flex items-center gap-1.5">
                      <span className="text-base" aria-hidden="true">{axis.emoji}</span>
                      <span className={`text-xs font-bold ${style.title}`}>{axis.name}</span>
                    </div>
                    <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${style.badge}`}>
                      {style.badgeText}
                    </span>
                  </div>
                  <div className={`text-[10px] mb-2 ${style.sub}`}>{axis.sub}</div>

                  {/* 12 항목 작은 도트 시각화 */}
                  <div className="flex flex-wrap gap-1 mb-2">
                    {axis.items.map((_, i) => (
                      <span
                        key={i}
                        className={`w-2 h-2 rounded-sm transition-colors duration-500 ${style.bar}`}
                        aria-hidden="true"
                      />
                    ))}
                  </div>

                  {/* 항목 텍스트 (compact) */}
                  <ul className="space-y-0.5 max-h-32 overflow-y-auto pr-1">
                    {axis.items.map((it, i) => (
                      <li key={i} className={`text-[10px] flex items-start gap-1 ${style.item}`}>
                        <span className={style.check}>{state === 'done' ? '✓' : '○'}</span>
                        <span className="flex-1">{it}</span>
                      </li>
                    ))}
                  </ul>
                </div>
              );
            })}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-300"></span>대기</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-rose-500"></span>완료 (12/12)</span>
            <span className="ml-auto font-mono">12 항목 × 4축 = 48</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    //   파일명을 탭처럼 보여주고, hljs 토큰화 후 라인별 강조
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      // 4 파일 탭 — 현재 step 의 filename 만 active
      const TABS = [
        'data-quality.yaml',
        'retrieval-quality.yaml',
        'generation-quality.yaml',
        'ops.md',
      ];

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] flex items-center border-b border-slate-700">
            <div className="flex gap-1.5 px-4 py-2.5 border-r border-slate-700">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <div className="flex flex-1 overflow-x-auto">
              {TABS.map((t) => {
                const active = t === code.filename;
                return (
                  <span
                    key={t}
                    className={`text-[11px] font-mono px-3 py-2.5 border-r border-slate-700 whitespace-nowrap ${
                      active
                        ? 'bg-[#282c34] text-rose-300 border-t-2 border-t-rose-400'
                        : 'text-slate-500'
                    }`}
                  >
                    {t}
                  </span>
                );
              })}
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase px-3">{code.lang}</span>
          </div>

          {/* hljs 토큰화 hidden */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 */}
          <div className="overflow-auto max-h-[30rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-rose-500/10 border-l-2 border-rose-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];
      const isEnd = stepIdx >= STEPS.length - 1;

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      // 자동재생 3000ms
      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VII-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. 평가 &amp; 운영 &gt; Chapter 2. 프로덕션 운영</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VII-2-1. 프로덕션 RAG 운영 체크리스트</h1>
                  <p className="text-sm text-slate-500 mt-0.5">RAG 출항 점검표 — Data / Retrieval / Generation / Ops · 12 × 4 = 48 항목</p>
                </div>
              </div>
              <p className="text-sm text-slate-600 mt-2">
                <b>공장 출항 점검표</b>를 떠올려 보세요. PoC와 24시간 운영은 차원이 다릅니다.
                4축 손가락으로 짚으며 <b>12 항목씩 누적 ✓</b> 하면, RAG가 실서비스로 출항할 준비가 끝납니다.
              </p>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                axisStates={step.axisStates}
                progress={step.progress}
                focus={step.focus}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 축하 배지 */}
            {isEnd && (
              <div className="bg-gradient-to-r from-rose-50 via-pink-50 to-rose-50 border-2 border-rose-300 rounded-xl p-4 text-sm text-rose-900 shadow-sm">
                <div className="flex items-center gap-3">
                  <span className="text-3xl">🎉</span>
                  <div>
                    <div className="font-bold text-base">rag 35/35 fastapi 패턴 100% 통일 마무리</div>
                    <div className="text-xs text-rose-700 mt-1">
                      Part I~VII 35개 자료 모두 fastapi 인터랙티브 패턴으로 통일 완료. 프로덕션 RAG 출항 준비 완료.
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[110px]"
              >
                {isPlaying ? '⏸ 정지' : (isEnd ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={isEnd}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 */}
            <div className="flex flex-wrap gap-2">
              {['프로덕션 RAG', '데이터 품질', 'Hybrid 검색', 'Reranker', 'Citation', 'RAGAS', '시맨틱 캐시', 'p95 SLO', 'PII 차단', 'Prompt Injection'].map(kw => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">{kw}</span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./VII-1-2.html" className="text-slate-500 hover:text-slate-700">&larr; VII-1-2. 평가 지표 심화</a>
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">🎉 학습 완료! 허브로 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
