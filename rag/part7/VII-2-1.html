<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — VII-2-1. 프로덕션 RAG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "프로덕션 RAG란?",
        desc: "공장 운영 시스템을 떠올려 보세요. 시제품(PoC)을 만드는 것과 24시간 돌아가는 공장을 운영하는 것은 전혀 다른 문제입니다. 프로덕션 RAG는 실제 서비스 환경에서 RAG를 안정적으로 운영하기 위한 디버깅, 모니터링, 배포 전략을 다룹니다.",
        phase: "intro"
      },
      {
        title: "1. 디버깅 — 파이프라인 추적",
        desc: "RAG 시스템에서 문제가 발생하면 '어느 단계에서 문제인가?'를 파악해야 합니다. 검색이 잘못되었는가? 리랭킹에서 좋은 문서를 버렸는가? 프롬프트가 부적절한가? LLM이 할루시네이션을 만들었는가? — 단계별 추적이 핵심입니다.",
        phase: "debug",
        pipeline: [
          { stage: "Query", status: "ok", detail: "사용자 입력: '연차 정책'" },
          { stage: "Retriever", status: "warning", detail: "5개 문서 검색 — 관련도 혼재" },
          { stage: "Reranker", status: "error", detail: "관련 문서 1개를 잘못 제외" },
          { stage: "Prompt", status: "ok", detail: "컨텍스트 + 질문 조합" },
          { stage: "LLM", status: "ok", detail: "답변 생성 완료" },
          { stage: "Output", status: "warning", detail: "일부 정보 누락된 답변" }
        ]
      },
      {
        title: "2. 모니터링 — 실시간 대시보드",
        desc: "프로덕션에서는 실시간으로 시스템 상태를 모니터링해야 합니다. 검색 지연(Latency), 답변 품질(RAGAS 점수), API 비용, 에러율 — 이 지표들을 대시보드로 시각화하여 이상 징후를 빠르게 감지합니다.",
        phase: "monitor",
        metrics: [
          { name: "평균 응답 시간", value: "1.8s", trend: "stable", target: "< 3s" },
          { name: "Faithfulness (주간)", value: "0.87", trend: "up", target: "> 0.85" },
          { name: "일일 API 비용", value: "$42.3", trend: "down", target: "< $50" },
          { name: "에러율 (24h)", value: "0.3%", trend: "stable", target: "< 1%" },
          { name: "일일 쿼리 수", value: "2,847", trend: "up", target: "-" },
          { name: "캐시 적중률", value: "34%", trend: "up", target: "> 30%" }
        ]
      },
      {
        title: "3. 캐싱 전략",
        desc: "동일하거나 유사한 질문이 반복되면 매번 검색 + LLM 호출을 하는 것은 비효율적입니다. 시맨틱 캐시(의미적으로 유사한 질문의 결과를 재사용)를 적용하면 비용과 지연을 크게 줄일 수 있습니다.",
        phase: "caching",
        examples: [
          { query: "연차 몇 일?", cached: false, time: "2.1s", cost: "$0.015" },
          { query: "연차 휴가 일수 알려줘", cached: true, time: "0.05s", cost: "$0.000" },
          { query: "남은 연차 확인", cached: false, time: "1.9s", cost: "$0.014" },
          { query: "올해 연차 며칠 남았어?", cached: true, time: "0.04s", cost: "$0.000" }
        ]
      },
      {
        title: "4. A/B 테스트 & 재인덱싱",
        desc: "프로덕션에서 개선 사항을 적용할 때는 A/B 테스트로 검증합니다. 새 임베딩 모델, 다른 청킹 전략, 프롬프트 변경 — 트래픽의 일부에만 적용하여 기존 대비 성능을 비교합니다. 문서가 업데이트되면 재인덱싱도 필요합니다.",
        phase: "ab_test",
        variants: [
          { name: "Control (기존)", model: "text-embedding-3-small", chunk: "500자", faithfulness: 0.85, latency: "1.8s", traffic: "70%" },
          { name: "Variant A (신규)", model: "text-embedding-3-large", chunk: "1000자", faithfulness: 0.91, latency: "2.2s", traffic: "30%" }
        ]
      },
      {
        title: "프로덕션 RAG 전체 아키텍처",
        desc: "프로덕션 RAG는 단순히 RAG 파이프라인뿐 아니라, 캐싱 레이어, 모니터링 시스템, 로깅/추적, A/B 테스트 인프라, 재인덱싱 파이프라인까지 포함합니다. PoC에서 프로덕션으로 가는 여정은 파이프라인 자체보다 운영 인프라 구축이 더 큰 과제입니다.",
        phase: "architecture"
      }
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderVisualization = () => {
        if (s.phase === 'intro') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">프로덕션 RAG 핵심 요소</div>
              <div className="flex flex-col items-center gap-4">
                <div className="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-3xl border-2 border-slate-300">🏭</div>
                <div className="text-center text-sm text-slate-600 font-medium">공장 운영 시스템 — PoC와는 다른 차원</div>
                <div className="w-full space-y-2 mt-2">
                  {[
                    { icon: '🔍', label: '디버깅', desc: '파이프라인 단계별 추적' },
                    { icon: '📊', label: '모니터링', desc: '실시간 성능·비용 대시보드' },
                    { icon: '⚡', label: '캐싱', desc: '유사 질문 결과 재사용' },
                    { icon: '🧪', label: 'A/B 테스트', desc: '개선 사항 검증' },
                    { icon: '🔄', label: '재인덱싱', desc: '문서 업데이트 반영' },
                  ].map((item, i) => (
                    <div key={i} className="flex items-center gap-3 p-3 bg-slate-50 rounded-lg border border-slate-200">
                      <span className="text-xl">{item.icon}</span>
                      <div>
                        <div className="font-bold text-xs text-slate-700">{item.label}</div>
                        <div className="text-xs text-slate-500">{item.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'debug') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-600 uppercase tracking-wider mb-4">파이프라인 추적 (Trace)</div>
              <div className="space-y-1">
                {s.pipeline.map((p, i) => {
                  const statusColors = { ok: 'bg-green-100 border-green-300 text-green-800', warning: 'bg-yellow-100 border-yellow-300 text-yellow-800', error: 'bg-red-100 border-red-300 text-red-800' };
                  const statusIcons = { ok: '✅', warning: '⚠️', error: '❌' };
                  return (
                    <div key={i}>
                      <div className={`flex items-center gap-3 p-3 rounded-lg border ${statusColors[p.status]}`}>
                        <span className="text-lg">{statusIcons[p.status]}</span>
                        <div className="flex-1">
                          <div className="font-bold text-xs">{p.stage}</div>
                          <div className="text-xs opacity-75 mt-0.5">{p.detail}</div>
                        </div>
                      </div>
                      {i < s.pipeline.length - 1 && <div className="text-center text-slate-300 text-sm py-0.5">↓</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        }
        if (s.phase === 'monitor') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-600 uppercase tracking-wider mb-4">모니터링 대시보드 (목업)</div>
              <div className="grid grid-cols-2 gap-3">
                {s.metrics.map((m, i) => {
                  const trendIcons = { up: '↑', down: '↓', stable: '→' };
                  const trendColors = { up: 'text-green-600', down: 'text-blue-600', stable: 'text-slate-400' };
                  return (
                    <div key={i} className="bg-slate-50 border border-slate-200 rounded-lg p-3">
                      <div className="text-[10px] text-slate-500 uppercase font-bold">{m.name}</div>
                      <div className="flex items-baseline gap-2 mt-1">
                        <span className="text-lg font-bold text-slate-800">{m.value}</span>
                        <span className={`text-xs font-bold ${trendColors[m.trend]}`}>{trendIcons[m.trend]}</span>
                      </div>
                      <div className="text-[10px] text-slate-400 mt-1">목표: {m.target}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        }
        if (s.phase === 'caching') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-600 uppercase tracking-wider mb-4">시맨틱 캐시 동작 예시</div>
              <div className="space-y-2">
                {s.examples.map((ex, i) => (
                  <div key={i} className={`flex items-center justify-between p-3 rounded-lg border ${ex.cached ? 'bg-green-50 border-green-200' : 'bg-slate-50 border-slate-200'}`}>
                    <div className="flex-1">
                      <div className="text-sm font-mono text-slate-700">"{ex.query}"</div>
                      <div className="flex gap-2 mt-1">
                        <span className={`text-[10px] px-1.5 py-0.5 rounded font-bold ${ex.cached ? 'bg-green-200 text-green-800' : 'bg-slate-200 text-slate-600'}`}>
                          {ex.cached ? 'CACHE HIT' : 'MISS'}
                        </span>
                        <span className="text-[10px] text-slate-400">{ex.time}</span>
                        <span className="text-[10px] text-slate-400">{ex.cost}</span>
                      </div>
                    </div>
                    <span className="text-lg">{ex.cached ? '⚡' : '🔍'}</span>
                  </div>
                ))}
              </div>
              <div className="mt-3 p-3 bg-green-50 border border-green-200 rounded-lg text-xs text-green-700">
                <b>효과:</b> "연차 몇 일?"과 "연차 휴가 일수 알려줘"는 의미적으로 같은 질문 → 캐시 적중 → 응답 시간 97% 단축, 비용 0
              </div>
            </div>
          );
        }
        if (s.phase === 'ab_test') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-600 uppercase tracking-wider mb-4">A/B 테스트</div>
              <div className="space-y-3">
                {s.variants.map((v, i) => (
                  <div key={i} className={`p-4 rounded-xl border-2 ${i === 0 ? 'bg-slate-50 border-slate-300' : 'bg-blue-50 border-blue-300'}`}>
                    <div className="flex items-center justify-between mb-2">
                      <span className="font-bold text-sm">{v.name}</span>
                      <span className={`text-xs font-bold px-2 py-0.5 rounded ${i === 0 ? 'bg-slate-200 text-slate-700' : 'bg-blue-200 text-blue-700'}`}>{v.traffic}</span>
                    </div>
                    <div className="grid grid-cols-2 gap-2 text-xs">
                      <div><span className="text-slate-500">모델:</span> <span className="font-mono">{v.model}</span></div>
                      <div><span className="text-slate-500">청크:</span> {v.chunk}</div>
                      <div><span className="text-slate-500">Faithfulness:</span> <span className={`font-bold ${v.faithfulness > 0.88 ? 'text-green-700' : 'text-slate-700'}`}>{v.faithfulness}</span></div>
                      <div><span className="text-slate-500">Latency:</span> {v.latency}</div>
                    </div>
                  </div>
                ))}
                <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg text-xs text-blue-700">
                  <b>결과:</b> Variant A는 Faithfulness가 7% 높지만 Latency가 22% 증가. 정확도가 중요한 도메인이면 Variant A 채택.
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'architecture') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-600 uppercase tracking-wider mb-4">프로덕션 RAG 전체 아키텍처</div>
              <div className="flex flex-col items-center gap-2 text-xs">
                <div className="bg-blue-100 border border-blue-300 rounded-lg px-4 py-2 font-bold text-blue-800 w-full text-center">사용자 요청</div>
                <div>↓</div>
                <div className="bg-green-100 border border-green-300 rounded-lg px-4 py-2 font-bold text-green-800 w-full text-center">⚡ 시맨틱 캐시 (HIT → 바로 응답)</div>
                <div>↓ MISS</div>
                <div className="border-2 border-slate-400 rounded-xl p-3 w-full bg-slate-50">
                  <div className="text-center font-bold text-slate-700 mb-2">RAG 파이프라인</div>
                  <div className="flex gap-1 justify-center flex-wrap">
                    {['Query', 'Retriever', 'Reranker', 'Prompt', 'LLM'].map(s => (
                      <div key={s} className="bg-white border border-slate-200 rounded px-2 py-1 text-[10px] font-bold">{s}</div>
                    ))}
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-2 w-full mt-1">
                  <div className="bg-yellow-100 border border-yellow-300 rounded-lg px-3 py-2 font-bold text-yellow-800 text-center">📊 모니터링</div>
                  <div className="bg-purple-100 border border-purple-300 rounded-lg px-3 py-2 font-bold text-purple-800 text-center">📝 로깅/추적</div>
                </div>
                <div className="grid grid-cols-2 gap-2 w-full">
                  <div className="bg-orange-100 border border-orange-300 rounded-lg px-3 py-2 font-bold text-orange-800 text-center">🧪 A/B 테스트</div>
                  <div className="bg-cyan-100 border border-cyan-300 rounded-lg px-3 py-2 font-bold text-cyan-800 text-center">🔄 재인덱싱</div>
                </div>
                <div>↓</div>
                <div className="bg-emerald-100 border border-emerald-300 rounded-lg px-4 py-2 font-bold text-emerald-800 w-full text-center">응답 + 캐시 저장</div>
              </div>
            </div>
          );
        }
        return null;
      };

      const renderRightPanel = () => {
        if (s.phase === 'intro') {
          return (
            <div className="space-y-4">
              <div className="p-4 rounded-lg bg-slate-100 border border-slate-200">
                <div className="font-bold text-sm text-slate-700 mb-2">PoC vs 프로덕션</div>
                <div className="text-xs text-slate-600 space-y-2">
                  <div className="flex items-center justify-between">
                    <span>🔬 PoC</span>
                    <span>"동작한다" 증명</span>
                  </div>
                  <div className="flex items-center justify-between font-bold text-slate-800">
                    <span>🏭 프로덕션</span>
                    <span>"안정적으로 운영된다" 보장</span>
                  </div>
                </div>
              </div>
              <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                <div className="font-bold text-sm text-slate-700 mb-2">프로덕션 필수 요소</div>
                <div className="text-xs text-slate-600 space-y-1">
                  <div>• <b>관측 가능성:</b> 문제 발생 시 원인 파악</div>
                  <div>• <b>성능 최적화:</b> 지연, 비용 관리</div>
                  <div>• <b>점진적 개선:</b> A/B 테스트로 검증</div>
                  <div>• <b>데이터 관리:</b> 재인덱싱, 버전 관리</div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'architecture') {
          return (
            <div className="space-y-4">
              <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{`# 프로덕션 RAG 운영 체크리스트

## 디버깅
- [ ] 파이프라인 단계별 로깅
- [ ] 요청 ID 기반 추적 (trace_id)
- [ ] 검색 결과 + 프롬프트 저장

## 모니터링
- [ ] 응답 시간 (P50, P95, P99)
- [ ] 에러율 / 타임아웃
- [ ] RAGAS 점수 (주간 샘플링)
- [ ] API 비용 추적

## 최적화
- [ ] 시맨틱 캐시 (Redis + 임베딩)
- [ ] 비동기 처리 / 스트리밍
- [ ] 임베딩 배치 처리

## 배포
- [ ] A/B 테스트 인프라
- [ ] 롤백 전략
- [ ] 재인덱싱 파이프라인 (증분)
- [ ] 문서 버전 관리`}</pre>
            </div>
          );
        }
        return (
          <div className="space-y-4">
            <div className="p-4 rounded-lg bg-slate-100 border border-slate-200">
              <div className="font-bold text-sm text-slate-700 mb-2">{s.title}</div>
              <div className="text-xs text-slate-600">
                {s.phase === 'debug' && (
                  <div className="space-y-2">
                    <div>파이프라인 추적의 핵심은 <b>각 단계의 입출력을 기록</b>하는 것입니다.</div>
                    <div className="mt-2 space-y-1">
                      <div>• <b>LangSmith:</b> LangChain 공식 추적 도구</div>
                      <div>• <b>Phoenix:</b> Arize AI의 오픈소스 추적 도구</div>
                      <div>• <b>Langfuse:</b> 오픈소스 LLM 관측 도구</div>
                    </div>
                    <div className="mt-2 p-2 bg-slate-50 rounded border border-slate-300 text-slate-600">
                      <b>팁:</b> 요청마다 고유 trace_id를 부여하면 문제 추적이 쉬워집니다.
                    </div>
                  </div>
                )}
                {s.phase === 'monitor' && (
                  <div className="space-y-2">
                    <div><b>핵심 지표 (KPI):</b></div>
                    <div className="ml-2 space-y-1">
                      <div>• <b>P95 Latency:</b> 95%의 요청이 이 시간 내 완료</div>
                      <div>• <b>Faithfulness:</b> 주간 샘플링으로 추적</div>
                      <div>• <b>비용/쿼리:</b> API 호출 비용 효율</div>
                      <div>• <b>에러율:</b> 타임아웃, 빈 응답 비율</div>
                    </div>
                    <div className="mt-2 p-2 bg-slate-50 rounded border border-slate-300">
                      <b>알림:</b> 지표가 임계값을 넘으면 Slack/Email 알림
                    </div>
                  </div>
                )}
                {s.phase === 'caching' && (
                  <div className="space-y-2">
                    <div><b>시맨틱 캐시 구현:</b></div>
                    <div className="ml-2 space-y-1">
                      <div>1. 쿼리를 임베딩으로 변환</div>
                      <div>2. 기존 캐시에서 유사 쿼리 검색</div>
                      <div>3. 유사도 {'>'} 0.95이면 캐시 적중</div>
                      <div>4. 적중 시 저장된 답변 반환</div>
                    </div>
                    <div className="mt-2 p-2 bg-green-50 rounded border border-green-200 text-green-700">
                      <b>효과:</b> 비용 30~40% 절감, 응답 시간 대폭 단축
                    </div>
                  </div>
                )}
                {s.phase === 'ab_test' && (
                  <div className="space-y-2">
                    <div><b>A/B 테스트 대상:</b></div>
                    <div className="ml-2 space-y-1">
                      <div>• 임베딩 모델 변경</div>
                      <div>• 청킹 전략 (크기, 오버랩)</div>
                      <div>• 리랭커 모델</div>
                      <div>• 프롬프트 템플릿</div>
                      <div>• LLM 모델 (GPT-4o vs Claude)</div>
                    </div>
                    <div className="mt-2 p-2 bg-slate-50 rounded border border-slate-300">
                      <b>재인덱싱:</b> 증분(새 문서만) vs 전체 재빌드. 증분이 효율적이지만, 임베딩 모델 변경 시 전체 재빌드 필요.
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-slate-700 hover:text-slate-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-slate-600 text-white flex items-center justify-center rounded-full font-bold text-xs">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. 평가 & 운영 &gt; Chapter 2. 프로덕션 운영</div>
                  <h1 className="text-2xl font-bold text-slate-800">VII-2-1. 프로덕션 RAG — 운영과 최적화</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>공장 운영 시스템</b>을 떠올려 보세요. 시제품(PoC) 만들기와 24시간 공장 운영은 완전히 다릅니다. <b>디버깅, 모니터링, 캐싱, A/B 테스트</b> — 프로덕션 RAG의 핵심 운영 전략을 다룹니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-slate-600 border-slate-700 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-slate-300">프로덕션 RAG</h3>
                <span className="text-xs text-slate-300">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="space-y-4">{renderVisualization()}</div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">{renderRightPanel()}</div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['프로덕션 RAG', '모니터링', '시맨틱 캐시', 'A/B 테스트', '재인덱싱', 'LangSmith'].map(kw => (
                <span key={kw} className="bg-slate-100 text-slate-700 px-3 py-1 rounded-full text-sm font-medium border border-slate-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-slate-600 hover:bg-slate-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./VII-1-2.html" className="text-slate-600 hover:text-slate-800 font-medium">&larr; VII-1-2. 평가 지표 심화</a>
              <a href="../index.html" className="text-emerald-600 hover:text-emerald-800 font-medium">🎉 학습 완료! 허브로 돌아가기 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
