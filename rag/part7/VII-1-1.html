      return (

            </div>
            {overall !== undefined && (
              <span className="text-[10px] bg-rose-600 text-white px-2 py-0.5 rounded font-mono font-bold">
                overall {overall.toFixed(2)}
              </span>
            )}
          </div>

          <div className="space-y-3">
            {METRICS.map((m) => {
              const score = scores[m.key];
              const pct = (score / max) * 100;
              const isActive = highlight === m.key;
              const isInactive = highlight && highlight !== m.key;

              const barBg = isActive
                ? 'bg-gradient-to-r from-rose-500 to-rose-600 ring-2 ring-rose-400 ring-offset-1'
                : isInactive
                ? 'bg-rose-200'
                : 'bg-gradient-to-r from-rose-400 to-rose-500';
              const labelColor = isActive ? 'text-rose-900 font-extrabold'
                                : isInactive ? 'text-slate-400'
                                : 'text-rose-700 font-bold';
              const scoreColor = isActive ? 'bg-rose-600 text-white'
                                : isInactive ? 'bg-slate-200 text-slate-500'
                                : 'bg-rose-100 text-rose-800';

              return (
                <div key={m.key} className={`transition-all duration-500 ${isInactive ? 'opacity-60' : ''}`}>
                  <div className="flex items-center justify-between mb-1">
                    <div className="flex items-center gap-1.5">
                      <span className="text-sm">{m.icon}</span>
                      <span className={`text-[11px] ${labelColor}`}>{m.name}</span>
                      {isActive && (
                        <span className="text-[8px] bg-rose-600 text-white px-1 py-0.5 rounded font-bold animate-pulse">
                          ACTIVE
                        </span>
                      )}
                    </div>
                    <span className={`text-[10px] px-1.5 py-0.5 rounded font-mono font-bold ${scoreColor}`}>
                      {score.toFixed(2)}
                    </span>
                  </div>
                  <div className="text-[9px] text-slate-500 mb-1 ml-5">{m.desc}</div>
                  <div className="h-5 bg-slate-100 rounded-full overflow-hidden relative">
                    <div
                      className={`h-full ${barBg} transition-all duration-700 ease-out flex items-center justify-end pr-2`}
                      style={{ width: `${pct}%` }}
                    >
                      {pct > 25 && (
                        <span className="text-[9px] text-white font-mono font-bold">
                          {(pct).toFixed(0)}%
                        </span>
                      )}
                    </div>
                    {/* 0.7 임계치 라인 */}
                    <div className="absolute top-0 bottom-0 border-r-2 border-dashed border-slate-400" style={{ left: '70%' }}></div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* 임계치 범례 */}
          <div className="flex items-center justify-end gap-3 mt-3 pt-2 border-t border-slate-100 text-[9px] text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded-full bg-rose-500"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="border-l-2 border-dashed border-slate-400 h-3"></span>0.7 임계치
            </span>
          </div>
        </div>
      );
    }

    // 좌측 아래: 디테일 박스 — step 별 다른 시각화 (claim/retrieved/gt/regen/종합)
    // 공통 ✓/✗ 칩
    const Mark = ({ ok }) => (
      <span className={`w-4 h-4 rounded-full flex items-center justify-center text-[9px] font-bold text-white flex-shrink-0 ${ok ? 'bg-emerald-500' : 'bg-red-500'}`}>
        {ok ? '✓' : '✗'}
      </span>
    );
    // 공통 헤더
    const DBHeader = ({ icon, title }) => (
      <div className="flex items-center gap-1.5 mb-2">
        <span className="text-base">{icon}</span>
        <span className="text-[11px] font-bold text-rose-800">{title}</span>
      </div>
    );
    // 공통 푸터 (식 + 결과)
    const DBFooter = ({ formula, result }) => (
      <div className="bg-rose-100 rounded p-1.5 text-[9px] font-mono text-rose-800">
        <div><b>식:</b> {formula}</div>
        <div><b>결과:</b> {result}</div>
      </div>
    );

    function DetailBox({ detail, stepIdx }) {
      // Step 5 — 종합 진단
      if (detail.summary) {
        const styleByStatus = {
          good: { bg: 'bg-emerald-50 border-emerald-200', color: 'text-emerald-700', badge: '✓ good' },
          warn: { bg: 'bg-amber-50 border-amber-300',     color: 'text-amber-700',   badge: '⚠ warn' },
          bad:  { bg: 'bg-red-50 border-red-200',         color: 'text-red-700',     badge: '✗ bad'  },
        };
        return (
          <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">🏁</span>
                <span className="text-[11px] font-bold text-rose-800">RAGAS 종합 진단</span>
              </div>
              <span className="text-[10px] bg-rose-700 text-white px-2 py-0.5 rounded font-mono font-bold">
                overall {detail.overall.toFixed(2)}
              </span>
            </div>
            <div className="space-y-1.5">
              {detail.breakdown.map((b) => {
                const m = METRICS.find((x) => x.key === b.key);
                const st = styleByStatus[b.status];
                return (
                  <div key={b.key} className={`flex items-center gap-2 p-1.5 rounded border ${st.bg}`}>
                    <span className="text-sm">{m.icon}</span>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-1.5">
                        <span className="text-[10px] font-bold text-slate-700">{m.name}</span>
                        <span className={`text-[9px] font-mono font-bold ${st.color}`}>{b.score.toFixed(2)}</span>
                        <span className={`text-[8px] font-bold ${st.color}`}>{st.badge}</span>
                      </div>
                      <div className="text-[9px] text-slate-600 leading-tight">{b.hint}</div>
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="mt-2 pt-2 border-t border-rose-200">
              <div className="text-[9px] font-bold text-rose-700 uppercase tracking-wider mb-0.5">최종 진단</div>
              <div className="text-[10px] text-rose-900 font-medium">{detail.verdict}</div>
            </div>
          </div>
        );
      }

      // Step 1~4 공통 래퍼
      const meta = [
        { icon: '📖', title: 'Faithfulness 산식 분해' },
        { icon: '🎯', title: 'Context Precision 산식 분해' },
        { icon: '📡', title: 'Context Recall 산식 분해' },
        { icon: '💡', title: 'Answer Relevance 산식 분해' },
      ][stepIdx];

      return (
        <div className="bg-white border-2 border-rose-300 rounded-lg p-3">
          <DBHeader icon={meta.icon} title={meta.title} />

          {/* Step 1: Q + A + CTX */}
          {stepIdx === 0 && (
            <div className="bg-rose-50 rounded border border-rose-200 p-2 mb-2 space-y-1">
              <div className="text-[9px] font-bold text-rose-700">Q</div>
              <div className="text-[10px] text-slate-800 font-mono">{detail.q}</div>
              <div className="text-[9px] font-bold text-rose-700 mt-1">A</div>
              <div className="text-[10px] text-slate-800 font-mono">{detail.a}</div>
              <div className="text-[9px] font-bold text-rose-700 mt-1">CTX</div>
              <div className="text-[10px] text-slate-700 font-mono italic">{detail.ctx}</div>
            </div>
          )}

          {/* Step 2: Q only */}
          {stepIdx === 1 && (
            <div className="bg-rose-50 rounded border border-rose-200 p-2 mb-2">
              <div className="text-[9px] font-bold text-rose-700 mb-0.5">Q</div>
              <div className="text-[10px] text-slate-800 font-mono">{detail.q}</div>
            </div>
          )}

          {/* Step 3: Q + GT */}
          {stepIdx === 2 && (
            <div className="bg-rose-50 rounded border border-rose-200 p-2 mb-2">
              <div className="text-[9px] font-bold text-rose-700 mb-0.5">Q</div>
              <div className="text-[10px] text-slate-800 font-mono">{detail.q}</div>
              <div className="text-[9px] font-bold text-rose-700 mt-1 mb-0.5">GROUND_TRUTH</div>
              <div className="text-[10px] text-slate-700 italic">{detail.gt}</div>
            </div>
          )}

          {/* Step 4: Q + A + 화살표 */}
          {stepIdx === 3 && (
            <>
              <div className="bg-rose-50 rounded border border-rose-200 p-2 mb-2">
                <div className="text-[9px] font-bold text-rose-700 mb-0.5">Q (원본)</div>
                <div className="text-[10px] text-slate-800 font-mono">{detail.q}</div>
                <div className="text-[9px] font-bold text-rose-700 mt-1 mb-0.5">A</div>
                <div className="text-[10px] text-slate-700">{detail.a}</div>
              </div>
              <div className="text-center text-rose-500 text-[10px] font-mono mb-1">
                ↓ LLM 으로 답변 → 역생성 질문 N개 ↓
              </div>
            </>
          )}

          {/* 본문 — 단계별 리스트 */}
          <div className="bg-white rounded border border-slate-200 p-2 mb-2">
            <div className="text-[9px] font-bold text-slate-600 uppercase tracking-wider mb-1">
              {stepIdx === 0 && 'claim 분해 + context 일치 검사'}
              {stepIdx === 1 && 'retrieved top-3 (관련 표시)'}
              {stepIdx === 2 && '정답 claim 분해 + context 커버리지'}
              {stepIdx === 3 && '역생성 질문 + 코사인 유사도'}
            </div>
            <div className="space-y-1">
              {stepIdx === 0 && detail.claims.map((c, i) => (
                <div key={i} className={`flex items-center gap-1.5 text-[10px] p-1 rounded ${c.ok ? 'bg-emerald-50' : 'bg-red-50'}`}>
                  <Mark ok={c.ok} />
                  <span className="text-slate-700">{c.text}</span>
                </div>
              ))}
              {stepIdx === 1 && detail.retrieved.map((r) => (
                <div key={r.rank} className={`flex items-center gap-1.5 text-[10px] p-1 rounded ${r.relevant ? 'bg-emerald-50' : 'bg-red-50'}`}>
                  <span className="w-5 h-5 rounded bg-slate-700 text-white flex items-center justify-center text-[9px] font-bold flex-shrink-0">#{r.rank}</span>
                  <Mark ok={r.relevant} />
                  <span className="text-slate-700 flex-1 text-[9px]">{r.text}</span>
                </div>
              ))}
              {stepIdx === 2 && detail.gtClaims.map((c, i) => (
                <div key={i} className={`flex items-center gap-1.5 text-[10px] p-1 rounded ${c.covered ? 'bg-emerald-50' : 'bg-red-50'}`}>
                  <Mark ok={c.covered} />
                  <span className="text-slate-700">{c.text}</span>
                  {!c.covered && (
                    <span className="text-[8px] bg-red-500 text-white px-1 rounded font-bold ml-auto">MISSING</span>
                  )}
                </div>
              ))}
              {stepIdx === 3 && detail.regen.map((r, i) => (
                <div key={i} className="flex items-center gap-1.5 text-[10px] p-1 rounded bg-rose-50">
                  <span className="bg-rose-600 text-white px-1.5 py-0.5 rounded font-mono font-bold w-12 text-center text-[9px] flex-shrink-0">
                    {r.sim.toFixed(2)}
                  </span>
                  <span className="text-slate-700 flex-1 text-[9px]">{r.text}</span>
                </div>
              ))}
            </div>
          </div>

          <DBFooter formula={detail.formula} result={detail.result} />
        </div>
      );
    }

    // LiveDataPane — 좌측 패널 (막대 그래프 + 디테일 박스)
    function LiveDataPane({ step, stepIdx }) {
      const overall = step.detail.summary
        ? step.detail.overall
        : (step.scores.faithfulness + step.scores.precision + step.scores.recall + step.scores.relevance) / 4;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📈 RAGAS 4 지표 시각화</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <MetricsBarChart
              scores={step.scores}
              highlight={step.highlight}
              overall={stepIdx === STEPS.length - 1 ? overall : undefined}
            />
            <DetailBox detail={step.detail} stepIdx={stepIdx} />
          </div>
        </div>
      );
    }

    // CodeViewer — 5 파일 탭 + highlight.js + 라인 번호 (탭 클릭 가능)
    function CodeViewer({ activeTab, setActiveTab, stepIdx, total }) {
      const file = FILES[activeTab];
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${file.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [activeTab]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="ml-2 text-[10px] text-slate-500 font-mono uppercase tracking-wider">VSCode</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono">{file.lang}</span>
          </div>

          {/* 파일 탭 — 클릭 가능 */}
          <div className="bg-[#21252b] flex border-b border-slate-700 overflow-x-auto">
            {FILES.map((f, i) => {
              const active = i === activeTab;
              return (
                <button
                  key={f.filename}
                  onClick={() => setActiveTab(i)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap transition border-r border-slate-700 ${
                    active
                      ? 'bg-[#282c34] text-rose-300 border-t-2 border-t-rose-400'
                      : 'bg-[#21252b] text-slate-500 hover:text-slate-300'
                  }`}
                >
                  {f.filename}
                </button>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${file.lang}`}>{file.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || file.lines).map((lineHtml, i) => {
                  const highlighted = file.highlight && file.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{file.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // App 메인
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [manualTab, setManualTab] = useState(null);  // 사용자가 탭 클릭 시 잠금
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];
      // 사용자가 탭을 직접 클릭하면 그 탭 우선, 아니면 step 의 activeTab 따라감
      const activeTab = manualTab !== null ? manualTab : step.activeTab;

      const handleNext = () => {
        setManualTab(null);
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => {
        setManualTab(null);
        setStepIdx((i) => Math.max(0, i - 1));
      };
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        setManualTab(null);
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setManualTab(null);
        setStepIdx(0);
        setIsPlaying(false);
      };

      const handleTabClick = (i) => {
        setManualTab(i);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VII-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. 평가 &amp; 운영 &gt; Chapter 1. RAG 평가</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VII-1-1. RAGAS 평가 프레임워크</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Faithfulness · Context Precision · Recall · Answer Relevance — 4 지표 자동 측정</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer
                activeTab={activeTab}
                setActiveTab={handleTabClick}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: <strong>Faithfulness</strong>(할루시네이션) + <strong>Precision</strong>(노이즈) + <strong>Recall</strong>(누락) + <strong>Relevance</strong>(동문서답) — 어느 지표가 낮은지에 따라 retriever / generator / 데이터 중 어디를 고쳐야 할지 결정된다. 다음(VII-1-2)에서는 이 지표들의 심화 응용을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['RAGAS', 'Faithfulness', 'Context Precision', 'Context Recall', 'Answer Relevance', 'LLM-as-judge'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>
