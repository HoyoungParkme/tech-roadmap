<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — VII-1-1. RAGAS 평가 프레임워크</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const METRICS = {
      retrieval: [
        { name: 'Context Relevancy', desc: '검색된 문서가 질문과 얼마나 관련 있는가?', icon: '🎯', formula: '관련 문장 수 / 전체 문장 수' },
        { name: 'Context Recall', desc: '정답에 필요한 정보가 검색 결과에 포함되었는가?', icon: '📡', formula: '검색에 포함된 정답 문장 / 전체 정답 문장' },
      ],
      generation: [
        { name: 'Faithfulness', desc: '답변이 검색된 문서의 내용에 충실한가?', icon: '📖', formula: '출처에 근거한 주장 수 / 전체 주장 수' },
        { name: 'Answer Relevancy', desc: '답변이 질문에 적절히 답하고 있는가?', icon: '💡', formula: '답변에서 역생성한 질문의 유사도 평균' },
      ]
    };

    const STEPS = [
      {
        title: "RAGAS란?",
        desc: "레스토랑 평가를 떠올려 보세요. 재료의 신선도(검색 품질) + 요리 실력(생성 품질) + 종합 만족도 — RAGAS는 RAG 시스템을 이렇게 체계적으로 평가하는 프레임워크입니다. 검색이 잘 되었는가? 답변이 정확한가? 를 정량적으로 측정합니다.",
        phase: "intro"
      },
      {
        title: "축 1: 검색 품질 (Retrieval)",
        desc: "재료의 품질을 평가합니다. Context Relevancy — 검색된 문서가 질문과 관련 있는가? Context Recall — 필요한 정보가 모두 검색되었는가? 아무리 요리 실력이 좋아도 재료가 나쁘면 맛이 없습니다.",
        phase: "retrieval"
      },
      {
        title: "축 2: 생성 품질 (Generation)",
        desc: "요리 실력을 평가합니다. Faithfulness — 답변이 출처에 충실한가? (지어내지 않았는가?) Answer Relevancy — 답변이 질문에 적절히 답하는가? 좋은 재료도 요리를 잘못하면 의미 없습니다.",
        phase: "generation"
      },
      {
        title: "3축 평가 다이어그램",
        desc: "RAGAS는 검색 품질 + 생성 품질을 종합하여 End-to-End 평가를 수행합니다. 각 지표는 0~1 사이의 점수로 표현되며, 레이더 차트로 시각화하면 시스템의 강점과 약점을 한눈에 파악할 수 있습니다.",
        phase: "radar",
        scores: {
          contextRelevancy: 0.82,
          contextRecall: 0.75,
          faithfulness: 0.91,
          answerRelevancy: 0.88
        }
      },
      {
        title: "예시: 점수 해석",
        desc: "각 지표의 점수를 해석합니다. Context Relevancy 0.82 = 검색된 문서의 82%가 관련 있음. Faithfulness 0.91 = 답변의 91%가 출처에 근거. 어떤 지표가 낮은지에 따라 개선 방향이 달라집니다.",
        phase: "interpret",
        scenarios: [
          { case: "검색 좋음 + 생성 좋음", scores: [0.9, 0.85, 0.92, 0.88], verdict: "이상적 — 시스템 정상 동작" },
          { case: "검색 나쁨 + 생성 좋음", scores: [0.4, 0.35, 0.90, 0.85], verdict: "검색 개선 필요 — Retriever 튜닝" },
          { case: "검색 좋음 + 생성 나쁨", scores: [0.88, 0.82, 0.3, 0.45], verdict: "생성 개선 필요 — 프롬프트/모델 튜닝" }
        ]
      },
      {
        title: "RAGAS 실행하기",
        desc: "RAGAS는 Python 라이브러리로 제공됩니다. 질문, 답변, 검색된 문서, 정답(Ground Truth)을 입력하면 각 지표를 자동으로 계산합니다. LLM을 사용하여 평가하므로 별도의 라벨링 없이 사용 가능합니다.",
        phase: "code"
      }
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderVisualization = () => {
        if (s.phase === 'intro') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">RAGAS 핵심 개념</div>
              <div className="flex flex-col items-center gap-4">
                <div className="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-3xl border-2 border-slate-300">🍽️</div>
                <div className="text-center text-sm text-slate-600 font-medium">레스토랑 평가 — 재료 + 요리 + 종합</div>
                <div className="w-full grid grid-cols-3 gap-3 mt-2">
                  <div className="p-3 bg-blue-50 rounded-lg border border-blue-200 text-center">
                    <div className="text-2xl mb-1">🥬</div>
                    <div className="text-xs font-bold text-blue-800">재료 품질</div>
                    <div className="text-[10px] text-blue-600">검색 품질</div>
                  </div>
                  <div className="p-3 bg-orange-50 rounded-lg border border-orange-200 text-center">
                    <div className="text-2xl mb-1">👨‍🍳</div>
                    <div className="text-xs font-bold text-orange-800">요리 실력</div>
                    <div className="text-[10px] text-orange-600">생성 품질</div>
                  </div>
                  <div className="p-3 bg-green-50 rounded-lg border border-green-200 text-center">
                    <div className="text-2xl mb-1">⭐</div>
                    <div className="text-xs font-bold text-green-800">종합 만족</div>
                    <div className="text-[10px] text-green-600">End-to-End</div>
                  </div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'retrieval') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-blue-600 uppercase tracking-wider mb-4">검색 품질 지표</div>
              <div className="space-y-4">
                {METRICS.retrieval.map((m, i) => (
                  <div key={i} className="p-4 bg-blue-50 rounded-xl border border-blue-200">
                    <div className="flex items-center gap-2 mb-2">
                      <span className="text-xl">{m.icon}</span>
                      <span className="font-bold text-sm text-blue-800">{m.name}</span>
                    </div>
                    <div className="text-xs text-blue-700 mb-2">{m.desc}</div>
                    <div className="bg-white rounded border border-blue-100 p-2 text-xs font-mono text-blue-600">
                      = {m.formula}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }
        if (s.phase === 'generation') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-orange-600 uppercase tracking-wider mb-4">생성 품질 지표</div>
              <div className="space-y-4">
                {METRICS.generation.map((m, i) => (
                  <div key={i} className="p-4 bg-orange-50 rounded-xl border border-orange-200">
                    <div className="flex items-center gap-2 mb-2">
                      <span className="text-xl">{m.icon}</span>
                      <span className="font-bold text-sm text-orange-800">{m.name}</span>
                    </div>
                    <div className="text-xs text-orange-700 mb-2">{m.desc}</div>
                    <div className="bg-white rounded border border-orange-100 p-2 text-xs font-mono text-orange-600">
                      = {m.formula}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }
        if (s.phase === 'radar') {
          const sc = s.scores;
          const labels = ['Context Relevancy', 'Context Recall', 'Faithfulness', 'Answer Relevancy'];
          const values = [sc.contextRelevancy, sc.contextRecall, sc.faithfulness, sc.answerRelevancy];
          const cx = 150, cy = 130, r = 90;
          const angles = labels.map((_, i) => (Math.PI * 2 * i) / labels.length - Math.PI / 2);
          const points = values.map((v, i) => ({
            x: cx + Math.cos(angles[i]) * r * v,
            y: cy + Math.sin(angles[i]) * r * v
          }));
          const polygon = points.map(p => `${p.x},${p.y}`).join(' ');
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-600 uppercase tracking-wider mb-4">RAGAS 레이더 차트</div>
              <svg viewBox="0 0 300 260" className="w-full h-auto">
                {[0.25, 0.5, 0.75, 1].map(scale => (
                  <polygon key={scale} points={angles.map(a => `${cx + Math.cos(a) * r * scale},${cy + Math.sin(a) * r * scale}`).join(' ')} fill="none" stroke="#e2e8f0" strokeWidth="1" />
                ))}
                {angles.map((a, i) => (
                  <g key={i}>
                    <line x1={cx} y1={cy} x2={cx + Math.cos(a) * r} y2={cy + Math.sin(a) * r} stroke="#e2e8f0" strokeWidth="1" />
                    <text x={cx + Math.cos(a) * (r + 20)} y={cy + Math.sin(a) * (r + 20)} textAnchor="middle" fontSize="9" fill="#64748b" fontWeight="bold">{labels[i]}</text>
                    <text x={cx + Math.cos(a) * (r + 8)} y={cy + Math.sin(a) * (r + 8)} textAnchor="middle" fontSize="8" fill="#94a3b8">{values[i]}</text>
                  </g>
                ))}
                <polygon points={polygon} fill="rgba(100,116,139,0.2)" stroke="#475569" strokeWidth="2" />
                {points.map((p, i) => (
                  <circle key={i} cx={p.x} cy={p.y} r="4" fill="#475569" />
                ))}
              </svg>
            </div>
          );
        }
        if (s.phase === 'interpret') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-600 uppercase tracking-wider mb-4">시나리오별 점수 해석</div>
              <div className="space-y-3">
                {s.scenarios.map((sc, i) => (
                  <div key={i} className={`p-3 rounded-lg border ${i === 0 ? 'bg-green-50 border-green-200' : i === 1 ? 'bg-blue-50 border-blue-200' : 'bg-orange-50 border-orange-200'}`}>
                    <div className="font-bold text-xs mb-2">{sc.case}</div>
                    <div className="flex gap-1 mb-2">
                      {['CR', 'CRc', 'F', 'AR'].map((label, j) => (
                        <div key={j} className="flex-1 text-center">
                          <div className="text-[10px] text-slate-500">{label}</div>
                          <div className={`text-xs font-bold ${sc.scores[j] >= 0.7 ? 'text-green-700' : 'text-red-700'}`}>{sc.scores[j]}</div>
                        </div>
                      ))}
                    </div>
                    <div className={`text-xs font-medium ${i === 0 ? 'text-green-700' : i === 1 ? 'text-blue-700' : 'text-orange-700'}`}>{sc.verdict}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        }
        if (s.phase === 'code') {
          return (
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="text-xs font-bold text-slate-600 uppercase tracking-wider mb-4">RAGAS 코드 예시</div>
              <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{`from ragas import evaluate
from ragas.metrics import (
    context_relevancy,
    context_recall,
    faithfulness,
    answer_relevancy,
)
from datasets import Dataset

# 평가 데이터 준비
eval_data = {
    "question": [
        "우리 회사 연차 정책은?"
    ],
    "answer": [
        "1년 이상 근속 시 15일입니다."
    ],
    "contexts": [[
        "인사규정 3장: 1년 이상 근속 시 "
        "연차 15일 + 리프레시 3일 부여"
    ]],
    "ground_truth": [
        "연차 15일 + 리프레시 3일"
    ],
}

dataset = Dataset.from_dict(eval_data)

# 평가 실행
result = evaluate(
    dataset,
    metrics=[
        context_relevancy,
        context_recall,
        faithfulness,
        answer_relevancy,
    ],
)

print(result)
# {
#   'context_relevancy': 0.82,
#   'context_recall': 0.75,
#   'faithfulness': 0.91,
#   'answer_relevancy': 0.88
# }`}</pre>
            </div>
          );
        }
        return null;
      };

      const renderRightPanel = () => {
        if (s.phase === 'intro') {
          return (
            <div className="space-y-4">
              <div className="p-4 rounded-lg bg-slate-100 border border-slate-200">
                <div className="font-bold text-sm text-slate-700 mb-2">RAGAS란?</div>
                <div className="text-xs text-slate-600 space-y-1">
                  <div>• <b>R</b>etrieval <b>A</b>ugmented <b>G</b>eneration <b>A</b>ssessment</div>
                  <div>• RAG 시스템을 <b>정량적으로 평가</b>하는 프레임워크</div>
                  <div>• LLM 기반 평가 — 별도 라벨링 불필요</div>
                  <div>• 검색 품질 + 생성 품질을 분리 평가</div>
                </div>
              </div>
              <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                <div className="font-bold text-sm text-slate-700 mb-2">왜 평가가 중요한가?</div>
                <div className="text-xs text-slate-600 space-y-1">
                  <div>• "잘 되는 것 같다"는 주관적 판단은 위험</div>
                  <div>• 검색 문제인지 생성 문제인지 구분 필요</div>
                  <div>• 개선 전후 비교를 위한 정량 지표 필수</div>
                </div>
              </div>
            </div>
          );
        }
        if (s.phase === 'code') {
          return (
            <div className="space-y-4">
              <div className="p-4 rounded-lg bg-slate-100 border border-slate-200">
                <div className="font-bold text-sm text-slate-700 mb-2">RAGAS 입력 데이터</div>
                <div className="text-xs text-slate-600 space-y-2">
                  <div className="flex items-center gap-2"><code className="bg-slate-200 px-1.5 py-0.5 rounded text-slate-700">question</code> 사용자 질문</div>
                  <div className="flex items-center gap-2"><code className="bg-slate-200 px-1.5 py-0.5 rounded text-slate-700">answer</code> RAG 시스템의 답변</div>
                  <div className="flex items-center gap-2"><code className="bg-slate-200 px-1.5 py-0.5 rounded text-slate-700">contexts</code> 검색된 문서들</div>
                  <div className="flex items-center gap-2"><code className="bg-slate-200 px-1.5 py-0.5 rounded text-slate-700">ground_truth</code> 정답 (선택)</div>
                </div>
              </div>
              <div className="p-3 bg-slate-50 rounded-lg border border-slate-200 text-xs text-slate-600">
                <b>참고:</b> ground_truth 없이도 faithfulness와 answer_relevancy는 측정 가능합니다. Context Recall만 ground_truth가 필요합니다.
              </div>
            </div>
          );
        }
        return (
          <div className="space-y-4">
            <div className="p-4 rounded-lg bg-slate-100 border border-slate-200">
              <div className="font-bold text-sm text-slate-700 mb-2">지표 요약</div>
              <div className="text-xs text-slate-600 space-y-2">
                {s.phase === 'retrieval' && (
                  <>
                    <div><b>Context Relevancy</b> = 검색 정밀도. 높을수록 노이즈가 적음.</div>
                    <div><b>Context Recall</b> = 검색 재현율. 높을수록 누락이 적음.</div>
                    <div className="mt-2 p-2 bg-blue-50 rounded border border-blue-200 text-blue-700">
                      <b>비유:</b> 재료(검색 결과)가 신선하고(Relevancy) 모든 재료가 다 있는지(Recall) 확인
                    </div>
                  </>
                )}
                {s.phase === 'generation' && (
                  <>
                    <div><b>Faithfulness</b> = 답변이 출처에 근거. 높을수록 할루시네이션이 적음.</div>
                    <div><b>Answer Relevancy</b> = 답변이 질문에 적절. 높을수록 정확한 답변.</div>
                    <div className="mt-2 p-2 bg-orange-50 rounded border border-orange-200 text-orange-700">
                      <b>비유:</b> 요리(답변)가 레시피(출처)대로 만들어졌는지(Faithfulness), 주문(질문)에 맞는지(Relevancy) 확인
                    </div>
                  </>
                )}
                {s.phase === 'radar' && (
                  <>
                    <div>레이더 차트에서 모든 축이 바깥쪽일수록 좋은 시스템.</div>
                    <div>특정 축이 안쪽으로 들어가면 해당 영역에 문제가 있음.</div>
                    <div className="mt-2 p-2 bg-slate-50 rounded border border-slate-300">
                      <b>목표:</b> 모든 지표 0.8 이상 유지
                    </div>
                  </>
                )}
                {s.phase === 'interpret' && (
                  <>
                    <div><b>CR</b> = Context Relevancy, <b>CRc</b> = Context Recall</div>
                    <div><b>F</b> = Faithfulness, <b>AR</b> = Answer Relevancy</div>
                    <div className="mt-2 p-2 bg-slate-50 rounded border border-slate-300">
                      <b>핵심:</b> 낮은 지표를 보고 개선 방향을 결정. 검색 문제인가? 생성 문제인가?
                    </div>
                  </>
                )}
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-slate-700 hover:text-slate-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-slate-600 text-white flex items-center justify-center rounded-full font-bold text-xs">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. 평가 & 운영 &gt; Chapter 1. RAG 평가</div>
                  <h1 className="text-2xl font-bold text-slate-800">VII-1-1. RAGAS 평가 프레임워크</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>레스토랑 평가</b>를 떠올려 보세요. 재료의 신선도(검색 품질) + 요리 실력(생성 품질) + 종합 만족도 — RAGAS는 RAG 시스템을 이렇게 <b>체계적으로 평가</b>합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-slate-600 border-slate-700 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-slate-300">RAGAS 평가 프레임워크</h3>
                <span className="text-xs text-slate-300">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="space-y-4">{renderVisualization()}</div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">{renderRightPanel()}</div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['RAGAS', 'Faithfulness', 'Answer Relevancy', 'Context Relevancy', 'Context Recall'].map(kw => (
                <span key={kw} className="bg-slate-100 text-slate-700 px-3 py-1 rounded-full text-sm font-medium border border-slate-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-slate-600 hover:bg-slate-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="../part6/VI-2-3.html" className="text-slate-600 hover:text-slate-800 font-medium">&larr; Part VI</a>
              <a href="./VII-1-2.html" className="text-slate-600 hover:text-slate-800 font-medium">VII-1-2. 평가 지표 심화 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
