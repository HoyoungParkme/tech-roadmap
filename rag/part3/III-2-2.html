        <div className={`bg-white rounded-lg border-2 ${active ? 'border-rose-400 shadow-md' : 'border-slate-200'} p-3 transition-all`}>

            <div className="flex items-center gap-1.5">

              <span className="text-[11px] font-bold text-rose-800">IVF — Voronoi 클러스터</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">nlist=4 · nprobe={nprobe || 2}</span>
          </div>
          <div className="relative w-full h-[200px] bg-slate-50 rounded-lg border border-slate-200 overflow-hidden" style={{opacity}}>
            {IVF_CLUSTERS.map((cl, i) => {
              const isFocus = active && cl.id === focusCluster;
              const isNeighbor = active && nprobe >= 2 && cl.id === 'A';

                <React.Fragment key={i}>
                  <div className="absolute rounded-full border-2" style={{
                    left: `${cl.cx}%`, top: `${cl.cy}%`,
                    width: '34%', height: '34%',
                    transform: 'translate(-50%, -50%)',
                    borderColor: cl.color,
                    borderStyle: isFocus ? 'solid' : (isNeighbor ? 'dashed' : 'dotted'),
                    backgroundColor: isFocus ? cl.color + '30' : (isNeighbor ? cl.color + '15' : cl.color + '08'),
                    boxShadow: isFocus ? `0 0 12px ${cl.color}` : 'none',
                  }}></div>

                    left: `${cl.cx}%`, top: `${cl.cy - 16}%`,
                    transform: 'translateX(-50%)', color: cl.color,
                  }}>
                    Cluster {cl.id}
                  </div>
                  {/* centroid */}
                  <div className="absolute" style={{
                    left: `${cl.cx}%`, top: `${cl.cy}%`,
                    transform: 'translate(-50%, -50%)',
                  }}>
                    <div className="w-2.5 h-2.5 border-2 border-white" style={{backgroundColor: cl.color, transform: 'rotate(45deg)'}}></div>

                  {cl.points.map((p, j) => (
                    <div key={j} className="absolute w-2 h-2 rounded-full" style={{
                      left: `${p.x}%`, top: `${p.y}%`,
                      backgroundColor: cl.color,
                      transform: 'translate(-50%, -50%)',
                      opacity: isFocus ? 1 : (isNeighbor ? 0.7 : 0.4),
                    }}></div>
                  ))}
                </React.Fragment>
              );
            })}
            {/* Query point */}
            {active && (
              <div className="absolute z-10" style={{left: '48%', top: '58%', transform: 'translate(-50%, -50%)'}}>
                <div className="w-4 h-4 bg-red-500 rounded-full border-2 border-white shadow-lg animate-pulse"></div>
                <div className="absolute -top-5 left-1/2 -translate-x-1/2 text-[9px] font-bold text-red-600 bg-white px-1.5 py-0.5 rounded shadow whitespace-nowrap border border-red-200">
                  Query
                </div>
              </div>
            )}
          </div>
          <div className="mt-1.5 text-[10px] text-slate-600">
            {active
              ? <>Query → 가장 가까운 <b style={{color:'#f43f5e'}}>Cluster C</b> + 인접 <b style={{color:'#3b82f6'}}>A</b> 만 검색 (nprobe=2)</>
              : <span className="text-slate-400 italic">대기 중 — Step 1 활성화</span>}
          </div>
        </div>
      );
    }

    // HNSW 다이어그램 — 3 layer 그래프
    function HnswDiagram({ active, searchPath }) {
      const opacity = active ? 1 : 0.35;
      const path = active ? (searchPath || []) : [];
      return (
        <div className={`bg-white rounded-lg border-2 ${active ? 'border-rose-400 shadow-md' : 'border-slate-200'} p-3 transition-all`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🏗️</span>
              <span className="text-[11px] font-bold text-rose-800">HNSW — 다층 그래프</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">M=32 · ef=64</span>
          </div>
          <div className="space-y-1.5" style={{opacity}}>
            {HNSW_LAYERS.map((layer, li) => {
              const isBottom = li === HNSW_LAYERS.length - 1;
              return (
                <div key={li} className={`relative h-[60px] bg-slate-50 rounded border ${isBottom && active ? 'border-rose-300 ring-1 ring-rose-200' : 'border-slate-200'} overflow-hidden`}>
                  <div className="absolute left-1.5 top-1 text-[9px] font-bold text-slate-400 z-10">{layer.name}</div>
                  <svg className="absolute inset-0 w-full h-full pointer-events-none">
                    {layer.edges.map(([from, to], ei) => {
                      const f = layer.nodes.find(n => n.id === from);
                      const t = layer.nodes.find(n => n.id === to);
                      if (!f || !t) return null;
                      return <line key={ei} x1={`${f.x}%`} y1={`${f.y}%`} x2={`${t.x}%`} y2={`${t.y}%`} stroke="#cbd5e1" strokeWidth="1.5"/>;
                    })}
                  </svg>
                  {layer.nodes.map((node, ni) => {
                    const isOnPath = active && path.includes(node.id);
                    return (
                      <div key={ni} className="absolute" style={{left: `${node.x}%`, top: `${node.y}%`, transform: 'translate(-50%, -50%)'}}>
                        <div className={`rounded-full border-2 ${
                          isOnPath
                            ? 'w-3.5 h-3.5 bg-rose-500 border-white ring-2 ring-rose-300 shadow-md'
                            : 'w-2.5 h-2.5 bg-slate-400 border-slate-300'
                        }`}></div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
          <div className="mt-1.5 text-[10px] text-slate-600">
            {active
              ? <>L2 entry → 점프 → L1 → 점프 → <b className="text-rose-600">L0 정밀 탐색</b> · <span className="font-mono">O(log N)</span></>
              : <span className="text-slate-400 italic">대기 중 — Step 2 활성화</span>}
          </div>
        </div>
      );
    }

    // PQ 다이어그램 — 1536d → 8 × 192d → 8 byte 코드
    function PqDiagram({ active, pqDim }) {
      const opacity = active ? 1 : 0.35;
      const codes = (active && pqDim) ? pqDim.codes : [0,0,0,0,0,0,0,0];
      return (
        <div className={`bg-white rounded-lg border-2 ${active ? 'border-rose-400 shadow-md' : 'border-slate-200'} p-3 transition-all`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🗜️</span>
              <span className="text-[11px] font-bold text-rose-800">PQ — 벡터 압축</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">m=8 · nbits=8</span>
          </div>
          <div style={{opacity}}>
            {/* 원본 */}
            <div className="mb-2">
              <div className="text-[9px] text-slate-600 mb-1 font-bold">원본 1536d (192d × 8)</div>
              <div className="flex gap-0.5">
                {Array.from({length: 8}, (_, i) => (
                  <div key={i} className="flex-1 h-5 bg-amber-200 rounded border border-amber-300 flex items-center justify-center text-[8px] text-amber-800 font-bold">
                    192d
                  </div>
                ))}
              </div>
            </div>
            {/* 화살표 */}
            <div className="text-center text-amber-600 text-[10px] font-mono mb-1">
              ↓ K-means 코드북 lookup (256 centroids/sub) ↓
            </div>
            {/* 코드 */}
            <div className="mb-2">
              <div className="text-[9px] text-slate-600 mb-1 font-bold">압축 8 byte</div>
              <div className="flex gap-0.5">
                {codes.map((c, i) => (
                  <div key={i} className="flex-1 h-5 bg-rose-200 rounded border border-rose-300 flex items-center justify-center text-[8px] text-rose-800 font-bold">
                    {active ? c : '·'}
                  </div>
                ))}
              </div>
            </div>
            {/* 메모리 비교 */}
            {active && (
              <div className="mt-2 p-2 bg-rose-50 rounded border border-rose-200">
                <div className="grid grid-cols-2 gap-1 text-[10px]">
                  <div className="text-slate-700">원본: <b>6,144 B</b></div>
                  <div className="text-slate-700">PQ:   <b className="text-rose-700">8 B</b></div>
                  <div className="col-span-2 text-center font-bold text-rose-600 mt-0.5">
                    768× 압축 (1M 벡터: 6GB → 8MB)
                  </div>
                </div>
              </div>
            )}
          </div>
          <div className="mt-1.5 text-[10px] text-slate-600">
            {active
              ? <>1536d float → 8 byte 인덱스 (각 byte = 256 코드북 중 하나)</>
              : <span className="text-slate-400 italic">대기 중 — Step 3 활성화</span>}
          </div>
        </div>
      );
    }

    // 결합 다이어그램 — Step 4
    function CombinedDiagram({ active }) {
      if (!active) return null;
      return (
        <div className="bg-gradient-to-br from-rose-50 to-white rounded-lg border-2 border-rose-400 p-3 shadow-md">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🧩</span>
              <span className="text-[11px] font-bold text-rose-800">결합 인덱스 — 두 패턴</span>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-2">
            {/* IVF + PQ */}
            <div className="bg-white rounded border border-rose-200 p-2">
              <div className="text-[10px] font-bold text-rose-700 mb-1.5">① IVF + PQ (대규모 표준)</div>
              <div className="flex items-center gap-1 text-[9px] mb-1">
                <span className="px-1.5 py-0.5 bg-blue-100 text-blue-700 rounded font-mono font-bold">IVF</span>
                <span className="text-slate-400">→</span>
                <span className="text-slate-600">구역 좁힘</span>
              </div>
              <div className="flex items-center gap-1 text-[9px] mb-1">
                <span className="px-1.5 py-0.5 bg-rose-100 text-rose-700 rounded font-mono font-bold">PQ</span>
                <span className="text-slate-400">→</span>
                <span className="text-slate-600">압축 거리</span>
              </div>
              <div className="text-[9px] text-slate-500 mt-1.5 pt-1.5 border-t border-rose-100">
                Facebook 1B 벡터 운영. <b>FAISS 표준</b>.
              </div>
            </div>
            {/* HNSW + PQ */}
            <div className="bg-white rounded border border-rose-200 p-2">
              <div className="text-[10px] font-bold text-rose-700 mb-1.5">② HNSW + PQ (최신 트렌드)</div>
              <div className="flex items-center gap-1 text-[9px] mb-1">
                <span className="px-1.5 py-0.5 bg-emerald-100 text-emerald-700 rounded font-mono font-bold">HNSW</span>
                <span className="text-slate-400">→</span>
                <span className="text-slate-600">그래프 점프</span>
              </div>
              <div className="flex items-center gap-1 text-[9px] mb-1">
                <span className="px-1.5 py-0.5 bg-rose-100 text-rose-700 rounded font-mono font-bold">PQ</span>
                <span className="text-slate-400">→</span>
                <span className="text-slate-600">메모리 절감</span>
              </div>
              <div className="text-[9px] text-slate-500 mt-1.5 pt-1.5 border-t border-rose-100">
                Milvus / Vespa 채택. HNSW 약점 보완.
              </div>
            </div>
          </div>
          <div className="mt-2 p-2 bg-rose-100 rounded text-[10px] text-rose-800">
            💡 결합 시 <b>rerank</b> 권장: PQ로 top-50 후보 → 원본 거리로 top-5 재정렬
          </div>
        </div>
      );
    }

    // 비교 매트릭스 — Step 5
    function ComparisonMatrix({ active }) {
      if (!active) return null;
      const cols = [
        { key: 'ivf',    label: 'IVF',     color: 'bg-blue-500'     },
        { key: 'hnsw',   label: 'HNSW',    color: 'bg-emerald-500'  },
        { key: 'pq',     label: 'PQ',      color: 'bg-amber-500'    },
        { key: 'ivfPq',  label: 'IVF+PQ',  color: 'bg-purple-500'   },
        { key: 'hnswPq', label: 'HNSW+PQ', color: 'bg-rose-500'     },
      ];
      return (
        <div className="bg-white rounded-lg border-2 border-rose-400 p-3 shadow-md">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📊</span>
              <span className="text-[11px] font-bold text-rose-800">5×5 비교 매트릭스</span>
            </div>
            <span className="text-[9px] text-slate-500 font-mono">★ 5점 척도</span>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-[10px]">
              <thead>
                <tr className="border-b border-slate-200">
                  <th className="text-left py-1 px-1 font-bold text-slate-600">기준</th>
                  {cols.map((c) => (
                    <th key={c.key} className="py-1 px-1 font-bold text-center">
                      <span className={`inline-block px-1.5 py-0.5 rounded text-white text-[9px] ${c.color}`}>
                        {c.label}
                      </span>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {COMPARISON.map((row, ri) => (
                  <tr key={ri} className="border-b border-slate-100 hover:bg-rose-50">
                    <td className="py-1.5 px-1 font-bold text-slate-700">{row.criteria}</td>
                    {cols.map((c) => (
                      <td key={c.key} className="py-1.5 px-1">
                        <div className="flex justify-center gap-0.5">
                          {Array.from({length: 5}, (_, j) => (
                            <div key={j} className={`w-1.5 h-3 rounded-sm ${j < row[c.key] ? c.color : 'bg-slate-200'}`}></div>
                          ))}
                        </div>
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="mt-2 p-2 bg-rose-50 rounded border border-rose-200 text-[10px] text-rose-800 leading-relaxed">
            <div><b>결정 가이드:</b></div>
            <div>• 정확도 1순위 → <b>HNSW</b> (Chroma 기본)</div>
            <div>• 메모리 1순위 → <b>PQ</b> 또는 <b>IVF+PQ</b></div>
            <div>• 1M+ 대규모 → <b>IVF+PQ</b> (FAISS 표준)</div>
            <div>• 모르겠다 → <b>HNSW</b>로 시작 → 필요시 튜닝</div>
          </div>
        </div>
      );
    }

    // LiveDataPane — 좌측 전체 (3 다이어그램 + 결합/비교)
    function LiveDataPane({ step }) {
      const a = step.activeStrategy;
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🔍 ANN 인덱싱 — 3 알고리즘</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* Step 1·2·3: 3 다이어그램 (활성 step만 강조) */}
          {(a === 0 || a === 1 || a === 2) && (
            <div className="space-y-2">
              <IvfDiagram active={a === 0} focusCluster={step.focusCluster} nprobe={step.nprobe} />
              <HnswDiagram active={a === 1} searchPath={step.searchPath} />
              <PqDiagram active={a === 2} pqDim={step.pqDim} />
            </div>
          )}

          {/* Step 4: 결합 */}
          {a === 3 && (
            <div className="space-y-2">
              <CombinedDiagram active={true} />
              <div className="grid grid-cols-3 gap-1.5 opacity-50">
                <IvfDiagram active={false} />
                <HnswDiagram active={false} />
                <PqDiagram active={false} />
              </div>
            </div>
          )}

          {/* Step 5: 비교 매트릭스 */}
          {a === 4 && (
            <ComparisonMatrix active={true} />
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-blue-500"></span>IVF
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>HNSW
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>PQ
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>active
            </span>
            <span className="ml-auto font-mono">Step {STEPS.findIndex(s => s === step) + 1}/{STEPS.length}</span>
          </div>
        </div>
      );
    }

    // VSCode 스타일 CodeViewer — highlight.js + 5 파일 탭
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      // 모든 step의 파일명 — 탭 표시용
      const tabs = STEPS.map((s, i) => ({ filename: s.code.filename, idx: i }));

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 바 */}
          <div className="bg-[#21252b] px-3 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5 mr-2">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <div className="flex gap-0.5 overflow-x-auto">
              {tabs.map((tab) => (
                <div
                  key={tab.idx}
                  className={`text-[10px] font-mono px-2 py-1 rounded-t border-b-2 whitespace-nowrap ${
                    tab.idx === stepIdx
                      ? 'bg-[#282c34] text-rose-300 border-rose-400'
                      : 'bg-transparent text-slate-500 border-transparent'
                  }`}
                >
                  {tab.filename}
                </div>
              ))}
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[42rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // App 메인
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Embedding &amp; Vector Store &gt; Chapter 2. Vector Store</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-2-2. 인덱싱 전략 — IVF / HNSW / PQ</h1>
                  <p className="text-sm text-slate-500 mt-0.5">맛집 찾기 3가지 전략 — 구역(IVF) · 층별(HNSW) · 압축(PQ) + 결합 + 비교</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: <strong>HNSW</strong>는 정확도, <strong>PQ</strong>는 메모리, <strong>IVF+PQ</strong>는 대규모. 다음(Part IV)에서는 검색 단계 — Retriever 패턴과 Reranking을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['IVF', 'HNSW', 'PQ', 'IVF+PQ', 'HNSW+PQ', 'FAISS', 'Chroma', 'Milvus', 'nprobe', 'efSearch'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-2-1.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; III-2-1 Vector Store ANN</a>
              <a href="../part4/IV-1-1.html" className="text-rose-700 hover:text-rose-900 font-medium">Part IV. 검색 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
