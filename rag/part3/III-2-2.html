<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — III-2-2. 인덱싱 전략 IVF/HNSW/PQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STRATEGIES = [
      {
        name: 'IVF',
        fullName: 'Inverted File Index',
        icon: '\uD83D\uDDFA\uFE0F',
        analogy: '\uB9DB\uC9D1 \uCC3E\uAE30: \uAD6C\uC5ED\uBCC4 \uD0D0\uC0C9',
        desc: '\uBCA1\uD130 \uACF5\uAC04\uC744 K\uAC1C \uAD6C\uC5ED(Voronoi)\uC73C\uB85C \uBD84\uD560\uD558\uACE0, \uCFFC\uB9AC\uC640 \uAC19\uC740 \uAD6C\uC5ED + \uC778\uC811 \uAD6C\uC5ED\uB9CC \uAC80\uC0C9',
        color: 'blue'
      },
      {
        name: 'HNSW',
        fullName: 'Hierarchical Navigable Small World',
        icon: '\uD83C\uDFD7\uFE0F',
        analogy: '\uB9DB\uC9D1 \uCC3E\uAE30: \uCE35\uBCC4 \uB124\uBE44\uAC8C\uC774\uC158',
        desc: '\uC5EC\uB7EC \uCE35\uC758 \uADF8\uB798\uD504\uB97C \uB9CC\uB4E4\uACE0, \uC704\uCE35(\uB300\uB7B5)\uC5D0\uC11C \uD558\uCE35(\uC815\uBC00)\uC73C\uB85C \uB0B4\uB824\uAC00\uBA70 \uD0D0\uC0C9',
        color: 'green'
      },
      {
        name: 'PQ',
        fullName: 'Product Quantization',
        icon: '\uD83D\uDDDC\uFE0F',
        analogy: '\uB9DB\uC9D1 \uCC3E\uAE30: \uC555\uCD95 \uBE44\uAD50',
        desc: '\uACE0\uCC28\uC6D0 \uBCA1\uD130\uB97C \uC11C\uBE0C\uBCA1\uD130\uB85C \uBD84\uD560\uD558\uACE0, \uAC01 \uC11C\uBE0C\uBCA1\uD130\uB97C \uCF54\uB4DC\uBD81(\uB300\uD45C\uAC12)\uC73C\uB85C \uC555\uCD95',
        color: 'amber'
      },
    ];

    const IVF_CLUSTERS = [
      { id: 'A', cx: 25, cy: 30, points: [{x:20,y:25},{x:30,y:28},{x:22,y:35},{x:28,y:32}], color: '#3b82f6' },
      { id: 'B', cx: 70, cy: 25, points: [{x:65,y:20},{x:75,y:28},{x:68,y:30},{x:72,y:22}], color: '#8b5cf6' },
      { id: 'C', cx: 50, cy: 65, points: [{x:45,y:60},{x:55,y:68},{x:48,y:70},{x:52,y:62}], color: '#f59e0b' },
      { id: 'D', cx: 20, cy: 75, points: [{x:15,y:72},{x:25,y:78},{x:18,y:80},{x:22,y:74}], color: '#ef4444' },
    ];

    const HNSW_LAYERS = [
      { name: 'Layer 2 (Top)', nodes: [{id:'a',x:20,y:50},{id:'b',x:50,y:30},{id:'c',x:80,y:50}], edges: [['a','b'],['b','c']] },
      { name: 'Layer 1', nodes: [{id:'a',x:15,y:50},{id:'b',x:35,y:25},{id:'d',x:55,y:45},{id:'c',x:75,y:30},{id:'e',x:85,y:55}], edges: [['a','b'],['b','d'],['d','c'],['c','e'],['a','d']] },
      { name: 'Layer 0 (Bottom)', nodes: [{id:'a',x:10,y:50},{id:'b',x:25,y:20},{id:'f',x:30,y:55},{id:'d',x:45,y:40},{id:'g',x:55,y:65},{id:'c',x:65,y:25},{id:'h',x:75,y:50},{id:'e',x:90,y:55}], edges: [['a','b'],['a','f'],['b','d'],['f','d'],['d','g'],['d','c'],['c','h'],['h','e'],['g','h']] },
    ];

    const COMPARISON = [
      { criteria: '\uAC80\uC0C9 \uC18D\uB3C4', ivf: 4, hnsw: 5, pq: 3 },
      { criteria: '\uBA54\uBAA8\uB9AC', ivf: 4, hnsw: 2, pq: 5 },
      { criteria: '\uC815\uD655\uB3C4', ivf: 3, hnsw: 5, pq: 2 },
      { criteria: '\uC778\uB371\uC2A4 \uC18D\uB3C4', ivf: 3, hnsw: 2, pq: 4 },
      { criteria: '\uD655\uC7A5\uC131', ivf: 4, hnsw: 3, pq: 5 },
    ];

    const STEPS = [
      {
        desc: "맛집 찾기 3가지 전략을 비유로 봅시다. IVF는 '강남구에서만 찾기'(구역 분할), HNSW는 '서울→강남→역삼동→골목'(층별 좁히기), PQ는 '메뉴 키워드로 빠르게 비교'(압축).",
        activeStrategy: -1, showDetail: false, showComparison: false, showCode: false
      },
      {
        desc: "[IVF] 벡터 공간을 K개 구역으로 분할합니다. 쿼리가 들어오면 가장 가까운 구역 + 인접 구역(nprobe)만 검색합니다. 전체의 일부만 검색하므로 빠릅니다.",
        activeStrategy: 0, showDetail: true, showComparison: false, showCode: true
      },
      {
        desc: "[HNSW] 여러 층의 그래프를 만듭니다. 위층(노드 적음)에서 대략적 위치를 찾고, 아래층(노드 많음)에서 정확한 이웃을 찾습니다. 현재 가장 널리 사용되는 알고리즘입니다.",
        activeStrategy: 1, showDetail: true, showComparison: false, showCode: true
      },
      {
        desc: "[PQ] 1536차원 벡터를 8개의 192차원 서브벡터로 나눕니다. 각 서브벡터를 256개 대표값(코드북) 중 하나로 압축합니다. 메모리를 97% 절감하면서 근사 거리 계산이 가능합니다.",
        activeStrategy: 2, showDetail: true, showComparison: false, showCode: true
      },
      {
        desc: "세 전략은 조합 가능합니다. 실무에서는 IVF+PQ(대규모), HNSW(중규모, 기본값)가 주로 사용됩니다. Chroma/Pinecone은 HNSW, FAISS는 IVF+PQ가 기본입니다.",
        activeStrategy: -1, showDetail: false, showComparison: true, showCode: false
      },
      {
        desc: "선택 가이드: 데이터 < 100만 → HNSW(Chroma), 데이터 > 100만 → IVF+PQ(FAISS), 메모리 제한 → PQ 필수, 최고 정확도 → HNSW. 대부분의 경우 기본 설정으로 충분합니다.",
        activeStrategy: -1, showDetail: false, showComparison: false, showCode: true
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-purple-700 hover:text-purple-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Embedding & Vector Store &gt; Chapter 2. Vector Store</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-2-2. 인덱싱 전략 — IVF / HNSW / PQ</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>맛집 찾기 3가지 전략</b> — IVF는 <b>구역별 탐색</b>(강남구에서만), HNSW는 <b>층별 네비게이션</b>(서울→강남→역삼), PQ는 <b>압축 비교</b>(키워드로 빠르게).</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-purple-700 border-purple-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">ANN 인덱싱 알고리즘</h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="space-y-4">
                {s.showDetail && s.activeStrategy === 0 ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">IVF: 구역 분할 탐색</div>
                    <div className="relative w-full h-[250px] bg-slate-50 rounded-lg border overflow-hidden">
                      {/* IVF 클러스터 영역 */}
                      {IVF_CLUSTERS.map((cl, i) => (
                        <React.Fragment key={i}>
                          <div className="absolute rounded-full border-2 border-dashed" style={{
                            left: `${cl.cx}%`, top: `${cl.cy}%`,
                            width: '30%', height: '30%',
                            transform: 'translate(-50%, -50%)',
                            borderColor: cl.color,
                            backgroundColor: cl.color + '10'
                          }}></div>
                          <div className="absolute text-[10px] font-bold" style={{left: `${cl.cx}%`, top: `${cl.cy - 12}%`, transform: 'translateX(-50%)', color: cl.color}}>
                            Cluster {cl.id}
                          </div>
                          {cl.points.map((p, j) => (
                            <div key={j} className="absolute w-2.5 h-2.5 rounded-full" style={{
                              left: `${p.x}%`, top: `${p.y}%`,
                              backgroundColor: cl.color,
                              transform: 'translate(-50%, -50%)'
                            }}></div>
                          ))}
                        </React.Fragment>
                      ))}
                      {/* 쿼리 포인트 (C 클러스터 근처) */}
                      <div className="absolute z-10" style={{left: '48%', top: '58%', transform: 'translate(-50%, -50%)'}}>
                        <div className="w-4 h-4 bg-red-500 rounded-full border-2 border-white shadow-lg animate-pulse"></div>
                        <div className="absolute -top-4 left-1/2 -translate-x-1/2 text-[10px] font-bold text-red-600 bg-white px-1 rounded shadow whitespace-nowrap">Query</div>
                      </div>
                    </div>
                    <div className="mt-2 text-xs text-slate-500">
                      Query → Cluster C (가장 가까운 구역) + Cluster A (인접 구역, nprobe=2) 만 검색
                    </div>
                  </div>
                ) : s.showDetail && s.activeStrategy === 1 ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">HNSW: 층별 그래프 탐색</div>
                    <div className="space-y-3">
                      {HNSW_LAYERS.map((layer, li) => (
                        <div key={li} className={`relative h-[70px] bg-slate-50 rounded-lg border overflow-hidden ${li === 2 ? 'border-green-300' : ''}`}>
                          <div className="absolute left-1 top-1 text-[9px] font-bold text-slate-400">{layer.name}</div>
                          <svg className="absolute inset-0 w-full h-full">
                            {layer.edges.map(([from, to], ei) => {
                              const fromNode = layer.nodes.find(n => n.id === from);
                              const toNode = layer.nodes.find(n => n.id === to);
                              return <line key={ei} x1={`${fromNode.x}%`} y1={`${fromNode.y}%`} x2={`${toNode.x}%`} y2={`${toNode.y}%`} stroke="#94a3b8" strokeWidth="1.5"/>;
                            })}
                          </svg>
                          {layer.nodes.map((node, ni) => (
                            <div key={ni} className="absolute" style={{left: `${node.x}%`, top: `${node.y}%`, transform: 'translate(-50%, -50%)'}}>
                              <div className={`w-3 h-3 rounded-full border ${li === 2 && (node.id === 'g' || node.id === 'h') ? 'bg-green-500 border-green-600' : 'bg-purple-400 border-purple-500'}`}></div>
                            </div>
                          ))}
                        </div>
                      ))}
                    </div>
                    <div className="mt-2 text-xs text-slate-500">
                      Top 층에서 시작 → 가장 가까운 이웃을 따라 → 아래 층으로 내려감 → 최종 결과
                    </div>
                  </div>
                ) : s.showDetail && s.activeStrategy === 2 ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">PQ: 벡터 압축</div>
                    <div className="space-y-4">
                      <div>
                        <div className="text-xs font-bold text-slate-600 mb-2">원본 벡터 (1536차원)</div>
                        <div className="flex gap-0.5">
                          {Array.from({length: 8}, (_, i) => (
                            <div key={i} className="flex-1 h-6 bg-amber-200 rounded border border-amber-300 flex items-center justify-center text-[8px] text-amber-700 font-bold">
                              192d
                            </div>
                          ))}
                        </div>
                        <div className="text-[10px] text-slate-400 mt-1">8개의 서브벡터로 분할</div>
                      </div>
                      <div className="text-center text-lg text-amber-400">↓ 코드북 매칭</div>
                      <div>
                        <div className="text-xs font-bold text-slate-600 mb-2">압축된 코드 (8바이트)</div>
                        <div className="flex gap-0.5">
                          {[42, 156, 7, 203, 91, 18, 245, 63].map((code, i) => (
                            <div key={i} className="flex-1 h-6 bg-green-200 rounded border border-green-300 flex items-center justify-center text-[8px] text-green-700 font-bold">
                              {code}
                            </div>
                          ))}
                        </div>
                        <div className="text-[10px] text-slate-400 mt-1">각 서브벡터 → 256개 대표값 중 인덱스(1바이트)</div>
                      </div>
                      <div className="p-3 bg-amber-50 rounded-lg border border-amber-200">
                        <div className="grid grid-cols-2 gap-2 text-xs text-amber-800">
                          <div>원본: 1536 x 4B = <b>6,144B</b></div>
                          <div>압축: <b>8B</b></div>
                          <div className="col-span-2 text-center font-bold text-amber-600">압축률: 768배 (메모리 99.87% 절감)</div>
                        </div>
                      </div>
                    </div>
                  </div>
                ) : s.showComparison ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">알고리즘 비교</div>
                    <div className="space-y-2">
                      <div className="grid grid-cols-4 gap-2 text-xs font-bold text-center p-2 bg-slate-100 rounded">
                        <div>기준</div>
                        <div className="text-blue-600">IVF</div>
                        <div className="text-green-600">HNSW</div>
                        <div className="text-amber-600">PQ</div>
                      </div>
                      {COMPARISON.map((c, i) => (
                        <div key={i} className="grid grid-cols-4 gap-2 text-xs text-center p-2 border rounded">
                          <div className="font-bold text-left">{c.criteria}</div>
                          <div className="flex justify-center gap-0.5">{Array.from({length:5},(_,j)=><div key={j} className={`w-2 h-2 rounded-full ${j<c.ivf?'bg-blue-500':'bg-slate-200'}`}/>)}</div>
                          <div className="flex justify-center gap-0.5">{Array.from({length:5},(_,j)=><div key={j} className={`w-2 h-2 rounded-full ${j<c.hnsw?'bg-green-500':'bg-slate-200'}`}/>)}</div>
                          <div className="flex justify-center gap-0.5">{Array.from({length:5},(_,j)=><div key={j} className={`w-2 h-2 rounded-full ${j<c.pq?'bg-amber-500':'bg-slate-200'}`}/>)}</div>
                        </div>
                      ))}
                    </div>
                    <div className="mt-3 p-3 bg-purple-50 rounded-lg border border-purple-200 text-xs text-purple-800">
                      <b>조합:</b> IVF + PQ = 대규모 데이터에 최적. HNSW = 중소규모에 최적.
                    </div>
                  </div>
                ) : (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">
                      {step === 0 ? '3가지 전략 개요' : '선택 가이드'}
                    </div>
                    {step === 0 ? (
                      <div className="space-y-3">
                        {STRATEGIES.map((st, i) => (
                          <div key={i} className={`flex items-start gap-3 p-3 rounded-lg border bg-${st.color}-50 border-${st.color}-200`}>
                            <span className="text-2xl mt-0.5">{st.icon}</span>
                            <div>
                              <div className="font-bold text-sm">{st.name} <span className="font-normal text-xs text-slate-500">({st.fullName})</span></div>
                              <div className="text-xs text-slate-600 mt-0.5">{st.analogy}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="space-y-3">
                        <div className="p-3 bg-green-50 rounded-lg border border-green-200">
                          <div className="font-bold text-sm text-green-800">데이터 {'<'} 100만 건</div>
                          <div className="text-xs text-green-700 mt-1">→ <b>HNSW</b> (Chroma, Qdrant 기본)</div>
                          <div className="text-[10px] text-green-600 mt-0.5">메모리 여유 있고, 최고 정확도 필요</div>
                        </div>
                        <div className="p-3 bg-blue-50 rounded-lg border border-blue-200">
                          <div className="font-bold text-sm text-blue-800">데이터 {'>'} 100만 건</div>
                          <div className="text-xs text-blue-700 mt-1">→ <b>IVF + PQ</b> (FAISS 기본)</div>
                          <div className="text-[10px] text-blue-600 mt-0.5">메모리 효율 중요, 대규모 데이터</div>
                        </div>
                        <div className="p-3 bg-amber-50 rounded-lg border border-amber-200">
                          <div className="font-bold text-sm text-amber-800">메모리 극도로 제한</div>
                          <div className="text-xs text-amber-700 mt-1">→ <b>PQ</b> 단독 또는 OPQ</div>
                          <div className="text-[10px] text-amber-600 mt-0.5">정확도를 일부 포기하고 메모리 극단 절감</div>
                        </div>
                        <div className="p-3 bg-purple-50 rounded-lg border border-purple-200">
                          <div className="font-bold text-sm text-purple-800">관리형 서비스</div>
                          <div className="text-xs text-purple-700 mt-1">→ <b>Pinecone, Weaviate</b> (자동 최적화)</div>
                          <div className="text-[10px] text-purple-600 mt-0.5">인덱싱 전략을 직접 선택할 필요 없음</div>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-purple-600 uppercase tracking-wider mb-4">
                  {s.showCode ? '코드 예시' : '상세 설명'}
                </div>
                {s.showCode && s.activeStrategy === 0 ? (
                  <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{`import faiss
import numpy as np

dim = 1536
n_vectors = 1_000_000

# IVF 인덱스 생성
nlist = 100  # 100개 구역으로 분할
quantizer = faiss.IndexFlatL2(dim)
index = faiss.IndexIVFFlat(
    quantizer, dim, nlist
)

# 학습 (클러스터 중심 계산)
vectors = np.random.rand(n_vectors, dim)
                         .astype('float32')
index.train(vectors)
index.add(vectors)

# 검색
index.nprobe = 10  # 10개 구역만 검색
query = np.random.rand(1, dim).astype('float32')
distances, indices = index.search(query, k=5)

# nprobe=1: 빠르지만 부정확
# nprobe=10: 적절한 균형 (기본)
# nprobe=100: 느리지만 KNN에 근접`}</pre>
                ) : s.showCode && s.activeStrategy === 1 ? (
                  <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{`import faiss
import numpy as np

dim = 1536
n_vectors = 1_000_000

# HNSW 인덱스 생성
M = 32        # 각 노드의 연결 수
index = faiss.IndexHNSWFlat(dim, M)
index.hnsw.efConstruction = 200  # 인덱싱 품질
index.hnsw.efSearch = 64         # 검색 품질

# 데이터 추가 (별도 학습 불필요!)
vectors = np.random.rand(n_vectors, dim)
                         .astype('float32')
index.add(vectors)

# 검색
query = np.random.rand(1, dim).astype('float32')
distances, indices = index.search(query, k=5)

# HNSW 장점: train() 불필요, 높은 정확도
# HNSW 단점: 메모리 사용량이 큼

# Chroma, Qdrant 등이 내부적으로 HNSW 사용`}</pre>
                ) : s.showCode && s.activeStrategy === 2 ? (
                  <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{`import faiss
import numpy as np

dim = 1536
n_vectors = 1_000_000

# IVF + PQ 조합 (대규모 데이터 권장)
nlist = 100    # IVF 구역 수
m = 8          # PQ 서브벡터 수
nbits = 8      # 각 서브벡터 코드북 비트

quantizer = faiss.IndexFlatL2(dim)
index = faiss.IndexIVFPQ(
    quantizer, dim, nlist, m, nbits
)

vectors = np.random.rand(n_vectors, dim)
                         .astype('float32')
index.train(vectors)
index.add(vectors)

# 메모리 비교:
# IndexFlatL2: 6GB (원본)
# IndexIVFPQ:  8MB (768배 압축!)

# 검색
index.nprobe = 10
query = np.random.rand(1, dim).astype('float32')
distances, indices = index.search(query, k=5)`}</pre>
                ) : s.showCode && step === 5 ? (
                  <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{`# 실무에서는 Vector Store가 알아서 선택!

# 1. Chroma (내부: HNSW)
from langchain_community.vectorstores import Chroma
vectorstore = Chroma.from_documents(
    documents=chunks,
    embedding=embeddings
)
# → 인덱싱 전략을 신경 쓸 필요 없음

# 2. FAISS (내부: IVF+PQ 선택 가능)
from langchain_community.vectorstores import FAISS
vectorstore = FAISS.from_documents(
    documents=chunks,
    embedding=embeddings
)

# 3. Pinecone (자동 최적화)
from langchain_pinecone import PineconeVectorStore
vectorstore = PineconeVectorStore.from_documents(
    documents=chunks,
    embedding=embeddings,
    index_name="my-index"
)

# 결론: 대부분의 경우 기본 설정으로 충분
# 성능 이슈가 생기면 그때 튜닝`}</pre>
                ) : s.showComparison ? (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-purple-50 border border-purple-200">
                      <div className="font-bold text-sm text-purple-800 mb-2">조합 전략</div>
                      <div className="text-xs text-purple-700 space-y-2">
                        <div className="p-2 bg-white rounded border">
                          <b>IVF + Flat</b>: 구역 분할 + 정확 검색. 중간 규모.
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>IVF + PQ</b>: 구역 분할 + 압축. 대규모 필수.
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>HNSW + PQ</b>: 그래프 탐색 + 압축. 최신 트렌드.
                        </div>
                      </div>
                    </div>
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">Vector Store별 기본값</div>
                      <div className="text-xs text-slate-600 space-y-1">
                        <div className="flex justify-between p-1"><span>Chroma</span><span className="font-bold text-green-600">HNSW</span></div>
                        <div className="flex justify-between p-1"><span>FAISS</span><span className="font-bold text-blue-600">IVF / HNSW</span></div>
                        <div className="flex justify-between p-1"><span>Pinecone</span><span className="font-bold text-purple-600">자동 최적화</span></div>
                        <div className="flex justify-between p-1"><span>Qdrant</span><span className="font-bold text-green-600">HNSW</span></div>
                        <div className="flex justify-between p-1"><span>Milvus</span><span className="font-bold text-blue-600">IVF + PQ</span></div>
                      </div>
                    </div>
                  </div>
                ) : step === 0 ? (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-purple-50 border border-purple-200">
                      <div className="font-bold text-sm text-purple-800 mb-2">맛집 찾기 비유</div>
                      <div className="text-xs text-purple-700 space-y-2">
                        <div className="p-2 bg-white rounded border">
                          <b>IVF:</b> "강남구에서만 찾자" → 서울 전체를 구역으로 나누고, 해당 구역만 탐색
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>HNSW:</b> "서울→강남→역삼→골목" → 넓은 범위에서 좁은 범위로 층별 이동
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>PQ:</b> "한식/매운맛/가성비" → 키워드 3개로 빠르게 비교 (상세 메뉴 대신)
                        </div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">{STRATEGIES[s.activeStrategy].name} 핵심 파라미터</div>
                      {s.activeStrategy === 0 ? (
                        <div className="text-xs text-slate-600 space-y-2">
                          <div className="p-2 bg-white rounded border"><code className="bg-blue-100 px-1 rounded">nlist</code>: 구역 수 (보통 sqrt(n))</div>
                          <div className="p-2 bg-white rounded border"><code className="bg-blue-100 px-1 rounded">nprobe</code>: 검색할 구역 수 (정확도/속도 트레이드오프)</div>
                        </div>
                      ) : s.activeStrategy === 1 ? (
                        <div className="text-xs text-slate-600 space-y-2">
                          <div className="p-2 bg-white rounded border"><code className="bg-green-100 px-1 rounded">M</code>: 노드당 연결 수 (16~64, 클수록 정확)</div>
                          <div className="p-2 bg-white rounded border"><code className="bg-green-100 px-1 rounded">efConstruction</code>: 인덱싱 품질 (100~200)</div>
                          <div className="p-2 bg-white rounded border"><code className="bg-green-100 px-1 rounded">efSearch</code>: 검색 품질 (32~128)</div>
                        </div>
                      ) : (
                        <div className="text-xs text-slate-600 space-y-2">
                          <div className="p-2 bg-white rounded border"><code className="bg-amber-100 px-1 rounded">m</code>: 서브벡터 수 (4~64, 클수록 정확)</div>
                          <div className="p-2 bg-white rounded border"><code className="bg-amber-100 px-1 rounded">nbits</code>: 코드북 비트 수 (보통 8)</div>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['IVF', 'HNSW', 'PQ', 'FAISS', 'Chroma'].map(kw => (
                <span key={kw} className="bg-purple-50 text-purple-700 px-3 py-1 rounded-full text-sm font-medium border border-purple-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-purple-600 hover:bg-purple-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./III-2-1.html" className="text-purple-600 hover:text-purple-800 font-medium">&larr; III-2-1. Vector Store ANN 검색</a>
              <a href="../part4/IV-1-1.html" className="text-purple-600 hover:text-purple-800 font-medium">Part IV. 검색 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
