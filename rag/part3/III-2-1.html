<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — III-2-1. Vector Store ANN 검색</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const POINTS = Array.from({length: 30}, (_, i) => ({
      id: i,
      x: 15 + Math.random() * 70,
      y: 15 + Math.random() * 70,
    }));
    const QUERY = { x: 50, y: 50 };

    const sortedByDist = [...POINTS].map(p => ({
      ...p,
      dist: Math.sqrt((p.x - QUERY.x)**2 + (p.y - QUERY.y)**2)
    })).sort((a, b) => a.dist - b.dist);

    const TOP_K = sortedByDist.slice(0, 3).map(p => p.id);
    const ANN_RESULTS = sortedByDist.slice(0, 4).filter((_, i) => i !== 2).map(p => p.id);

    const BENCHMARKS = [
      { size: '1,000', knn: '0.5ms', ann: '0.3ms', ratio: '1.7x' },
      { size: '100,000', knn: '50ms', ann: '0.8ms', ratio: '62x' },
      { size: '1,000,000', knn: '500ms', ann: '1.2ms', ratio: '416x' },
      { size: '100,000,000', knn: '50sec', ann: '2ms', ratio: '25,000x' },
    ];

    const STEPS = [
      {
        desc: "Vector Store는 도서관과 같습니다. 벡터(책)를 저장하고, 질문 벡터(찾는 주제)와 가장 비슷한 벡터를 검색합니다. 문제는 — 100만 권의 책을 전부 확인할 수 없다는 것입니다.",
        showKNN: false, showANN: false, showBenchmark: false, showCode: false, knnProgress: 0
      },
      {
        desc: "[KNN: 전수 조사] K-Nearest Neighbors는 모든 벡터를 하나하나 비교합니다. 100% 정확하지만, 100만 개면 100만 번 계산해야 합니다. 도서관의 모든 책장을 전부 뒤지는 것과 같습니다.",
        showKNN: true, showANN: false, showBenchmark: false, showCode: true, knnProgress: 100
      },
      {
        desc: "[ANN: 근사 탐색] Approximate Nearest Neighbors는 '대략 이 근처'를 먼저 찾고, 그 범위 안에서만 정확히 검색합니다. 95~99% 정확도로 1000배 이상 빠릅니다.",
        showKNN: false, showANN: true, showBenchmark: false, showCode: true, knnProgress: 0
      },
      {
        desc: "성능 비교: 100만 벡터에서 KNN은 500ms, ANN은 1.2ms — 416배 차이. 1억 벡터에서는 25,000배 차이. 실제 서비스에서 KNN은 사실상 사용 불가능합니다.",
        showKNN: false, showANN: false, showBenchmark: true, showCode: false, knnProgress: 0
      },
      {
        desc: "핵심: 실무에서는 ANN만 사용합니다. 정확도 1~5%를 포기하고 수천 배 빠른 검색을 얻는 것이 합리적입니다. 다음 시각화에서 ANN의 구체적인 알고리즘(IVF, HNSW, PQ)을 알아봅니다.",
        showKNN: false, showANN: false, showBenchmark: false, showCode: true, knnProgress: 0
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-purple-700 hover:text-purple-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Embedding & Vector Store &gt; Chapter 2. Vector Store</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-2-1. Vector Store — ANN 검색</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>도서관에서 책 찾기</b>를 떠올려 보세요. 모든 책장을 전부 뒤지기(KNN) vs 사서에게 "3번 코너에 있을 거예요"라고 안내받기(ANN). 어느 쪽이 빠를까요?</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-purple-700 border-purple-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">KNN vs ANN</h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="space-y-4">
                {(s.showKNN || s.showANN || step === 0) ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                      {s.showKNN ? 'KNN: 전수 조사' : s.showANN ? 'ANN: 근사 탐색' : '벡터 공간'}
                    </div>
                    <div className="relative w-full h-[280px] bg-slate-50 rounded-lg border overflow-hidden">
                      {/* 쿼리 포인트 */}
                      <div className="absolute z-10" style={{left: `${QUERY.x}%`, top: `${QUERY.y}%`, transform: 'translate(-50%, -50%)'}}>
                        <div className="w-5 h-5 bg-red-500 rounded-full border-2 border-white shadow-lg animate-pulse"></div>
                        <div className="absolute -top-4 left-1/2 -translate-x-1/2 text-[10px] font-bold text-red-600 whitespace-nowrap bg-white px-1 rounded shadow">Query</div>
                      </div>
                      {/* ANN 검색 범위 */}
                      {s.showANN && (
                        <div className="absolute border-2 border-dashed border-purple-400 rounded-full bg-purple-50/30" style={{
                          left: `${QUERY.x}%`, top: `${QUERY.y}%`,
                          width: '35%', height: '35%',
                          transform: 'translate(-50%, -50%)'
                        }}></div>
                      )}
                      {/* 데이터 포인트 */}
                      {POINTS.map((p, i) => {
                        const isTop = TOP_K.includes(p.id);
                        const isANN = ANN_RESULTS.includes(p.id);
                        const isChecked = s.showKNN;
                        const isInScope = s.showANN && Math.sqrt((p.x - QUERY.x)**2 + (p.y - QUERY.y)**2) < 17.5;
                        return (
                          <div key={i} className="absolute transition-all duration-300" style={{left: `${p.x}%`, top: `${p.y}%`, transform: 'translate(-50%, -50%)'}}>
                            <div className={`w-3 h-3 rounded-full border transition-all ${
                              s.showKNN && isTop ? 'bg-green-500 border-green-600 scale-150 shadow-lg' :
                              s.showANN && isANN ? 'bg-green-500 border-green-600 scale-150 shadow-lg' :
                              s.showANN && isInScope ? 'bg-purple-300 border-purple-400' :
                              isChecked ? 'bg-amber-300 border-amber-400' :
                              'bg-slate-300 border-slate-400'
                            }`}></div>
                          </div>
                        );
                      })}
                    </div>
                    <div className="mt-2 flex gap-3 text-[10px] text-slate-500">
                      <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-red-500"></div> 쿼리</div>
                      {s.showKNN && <>
                        <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-amber-300"></div> 검사됨 (전체)</div>
                        <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-green-500"></div> Top-3 결과</div>
                      </>}
                      {s.showANN && <>
                        <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-purple-300"></div> 검색 범위</div>
                        <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-green-500"></div> ANN 결과</div>
                      </>}
                    </div>
                  </div>
                ) : s.showBenchmark ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">성능 벤치마크</div>
                    <div className="space-y-2">
                      <div className="grid grid-cols-4 gap-2 text-xs font-bold text-center p-2 bg-slate-100 rounded">
                        <div>데이터 크기</div>
                        <div className="text-red-600">KNN</div>
                        <div className="text-green-600">ANN</div>
                        <div>속도 차이</div>
                      </div>
                      {BENCHMARKS.map((b, i) => (
                        <div key={i} className="grid grid-cols-4 gap-2 text-xs text-center p-2 border rounded">
                          <div className="font-bold">{b.size}</div>
                          <div className="text-red-600">{b.knn}</div>
                          <div className="text-green-600">{b.ann}</div>
                          <div className="font-bold text-purple-600">{b.ratio}</div>
                        </div>
                      ))}
                    </div>
                    <div className="mt-3 space-y-2">
                      <div className="text-xs font-bold text-slate-500">속도 차이 시각화 (100만 벡터)</div>
                      <div className="space-y-1">
                        <div className="flex items-center gap-2">
                          <span className="text-xs w-10 text-red-600 font-bold">KNN</span>
                          <div className="flex-1 bg-red-100 rounded-full h-5">
                            <div className="bg-red-500 rounded-full h-5 flex items-center justify-end pr-2 text-[10px] text-white font-bold" style={{width: '100%'}}>500ms</div>
                          </div>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-xs w-10 text-green-600 font-bold">ANN</span>
                          <div className="flex-1 bg-green-100 rounded-full h-5">
                            <div className="bg-green-500 rounded-full h-5 flex items-center justify-end pr-2 text-[10px] text-white font-bold" style={{width: '0.24%', minWidth: '50px'}}>1.2ms</div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">핵심 정리</div>
                    <div className="space-y-3">
                      <div className="p-3 bg-red-50 rounded-lg border border-red-200">
                        <div className="flex items-center gap-2 mb-1">
                          <span className="text-sm font-bold text-red-700">KNN (Brute Force)</span>
                        </div>
                        <div className="text-xs text-red-600 space-y-0.5">
                          <div>+ 100% 정확 (Exact)</div>
                          <div>- O(n) 시간 복잡도</div>
                          <div>- 실서비스에서 사용 불가</div>
                        </div>
                      </div>
                      <div className="p-3 bg-green-50 rounded-lg border border-green-200">
                        <div className="flex items-center gap-2 mb-1">
                          <span className="text-sm font-bold text-green-700">ANN (Approximate)</span>
                        </div>
                        <div className="text-xs text-green-600 space-y-0.5">
                          <div>+ O(log n) ~ O(1) 시간 복잡도</div>
                          <div>+ 실서비스 필수</div>
                          <div>- 95~99% 정확도 (근사)</div>
                        </div>
                      </div>
                      <div className="p-3 bg-purple-50 rounded-lg border border-purple-200 text-xs text-purple-800">
                        <b>트레이드오프:</b> 정확도 1~5%를 포기하고 속도를 수천~수만 배 얻는 것이 ANN의 핵심입니다.
                      </div>
                    </div>
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-purple-600 uppercase tracking-wider mb-4">
                  {s.showCode ? '코드 예시' : '상세 설명'}
                </div>
                {s.showCode && step === 1 ? (
                  <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{`import numpy as np

def knn_search(query, vectors, k=3):
    """KNN: 모든 벡터와 비교 (Brute Force)"""
    distances = []
    for i, vec in enumerate(vectors):
        # 모든 벡터와 거리 계산
        dist = np.linalg.norm(query - vec)
        distances.append((i, dist))

    # 거리순 정렬
    distances.sort(key=lambda x: x[1])

    # 상위 k개 반환
    return distances[:k]

# 100만 벡터에서 검색
vectors = np.random.rand(1_000_000, 1536)
query = np.random.rand(1536)

results = knn_search(query, vectors, k=3)
# 모든 벡터를 전부 비교 → 느림!
# 시간: ~500ms`}</pre>
                ) : s.showCode && step === 2 ? (
                  <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{`from langchain_community.vectorstores import Chroma
from langchain_openai import OpenAIEmbeddings

# ANN 기반 Vector Store 사용
embeddings = OpenAIEmbeddings()
vectorstore = Chroma.from_documents(
    documents=chunks,
    embedding=embeddings
)

# ANN 검색 (내부적으로 근사 탐색)
results = vectorstore.similarity_search(
    query="연차 휴가 정책",
    k=3
)

# Chroma는 내부적으로 HNSW 알고리즘 사용
# → 100만 벡터에서도 ~1ms 검색

# 정확도: ~99% (KNN과 거의 동일)
# 속도: 416배 빠름`}</pre>
                ) : s.showCode && step === 4 ? (
                  <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{`# 주요 Vector Store 비교

# 1. Chroma — 가장 쉬운 시작
from langchain_community.vectorstores import Chroma
vectorstore = Chroma.from_documents(
    documents=chunks,
    embedding=embeddings,
    persist_directory="./chroma_db"
)

# 2. FAISS — 대규모 데이터에 강함
from langchain_community.vectorstores import FAISS
vectorstore = FAISS.from_documents(
    documents=chunks,
    embedding=embeddings
)

# 3. Pinecone — 관리형 서비스
from langchain_pinecone import PineconeVectorStore
vectorstore = PineconeVectorStore.from_documents(
    documents=chunks,
    embedding=embeddings,
    index_name="my-index"
)

# 모두 내부적으로 ANN 알고리즘 사용`}</pre>
                ) : s.showBenchmark ? (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-purple-50 border border-purple-200">
                      <div className="font-bold text-sm text-purple-800 mb-2">ANN이 빠른 이유</div>
                      <div className="text-xs text-purple-700 space-y-2">
                        <div className="p-2 bg-white rounded border">
                          <b>1. 공간 분할:</b> 벡터 공간을 구역으로 나눠서, 해당 구역만 검색
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>2. 그래프 탐색:</b> 가까운 이웃을 따라가면서 최근접 탐색
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>3. 벡터 압축:</b> 원본을 압축해서 메모리 내 비교
                        </div>
                      </div>
                    </div>
                    <div className="p-3 bg-amber-50 rounded-lg border border-amber-200 text-xs text-amber-800">
                      <b>Recall@10:</b> ANN이 찾은 Top-10 중 실제 Top-10에 속하는 비율. 보통 95~99% 수준.
                    </div>
                  </div>
                ) : step === 0 ? (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-purple-50 border border-purple-200">
                      <div className="font-bold text-sm text-purple-800 mb-2">Vector Store란?</div>
                      <div className="text-xs text-purple-700 space-y-1">
                        <div>• 벡터(Embedding)를 효율적으로 저장하고 검색하는 DB</div>
                        <div>• 일반 DB의 WHERE, JOIN 대신 '유사도 검색' 제공</div>
                        <div>• 핵심 연산: "이 벡터와 가장 비슷한 k개를 찾아라"</div>
                      </div>
                    </div>
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">검색 방식 2가지</div>
                      <div className="text-xs text-slate-600 space-y-2">
                        <div className="p-2 bg-red-50 rounded border border-red-200">
                          <b>KNN</b>: 전수 조사 — 정확하지만 느림
                        </div>
                        <div className="p-2 bg-green-50 rounded border border-green-200">
                          <b>ANN</b>: 근사 탐색 — 약간 부정확하지만 매우 빠름
                        </div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-purple-50 border border-purple-200">
                      <div className="font-bold text-sm text-purple-800 mb-2">주요 ANN 알고리즘</div>
                      <div className="text-xs text-purple-700 space-y-2">
                        <div className="p-2 bg-white rounded border">
                          <b>IVF</b> (Inverted File): 구역 분할 후 해당 구역만 검색
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>HNSW</b> (Hierarchical NSW): 층별 그래프 탐색
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>PQ</b> (Product Quantization): 벡터 압축 후 비교
                        </div>
                      </div>
                    </div>
                    <div className="p-3 bg-green-50 rounded border border-green-200 text-xs text-green-800">
                      다음 시각화(III-2-2)에서 각 알고리즘의 동작 원리를 자세히 알아봅니다.
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Vector Store', 'KNN', 'ANN', 'Approximate', 'Recall'].map(kw => (
                <span key={kw} className="bg-purple-50 text-purple-700 px-3 py-1 rounded-full text-sm font-medium border border-purple-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-purple-600 hover:bg-purple-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./III-1-3.html" className="text-purple-600 hover:text-purple-800 font-medium">&larr; III-1-3. 유사도 측정</a>
              <a href="./III-2-2.html" className="text-purple-600 hover:text-purple-800 font-medium">III-2-2. 인덱싱 전략 IVF/HNSW/PQ &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
