  <!--
    III-2-1. Vector Store — ANN 검색 (Approximate Nearest Neighbor)
    학습 목표: Brute force(KNN) 한계를 이해하고, ANN의 정확도-속도 trade-off,
              recall@k 측정 방식, HNSW/IVF 알고리즘 예고까지 5단계로 학습.
    핵심 비유: 도서관 100만 권에서 책 찾기 — 모든 책장 뒤지기 vs 사서 추천 코너만
    패턴: fastapi v1 — 좌(LiveDataPane: 벡터 공간 + 시간/recall 막대) / 우(VSCode CodeViewer)
    색상: rag rose
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 벡터 공간 데이터 — 시드 고정으로 매번 같은 좌표 사용
    //   Query는 정중앙 (50, 50)
    //   POINTS 24개를 고정 좌표로 배치 (랜덤 X — 재현성 보장)
    // ─────────────────────────────────────────────────────
    const POINTS = [
      { id: 0,  x: 18, y: 22 }, { id: 1,  x: 35, y: 18 },
      { id: 2,  x: 52, y: 14 }, { id: 3,  x: 70, y: 20 },
      { id: 4,  x: 84, y: 28 }, { id: 5,  x: 22, y: 38 },
      { id: 6,  x: 40, y: 42 }, { id: 7,  x: 58, y: 44 }, // 7번 = top-1 후보 (정답)
      { id: 8,  x: 44, y: 56 }, // 8번 = top-2 후보 (정답)
      { id: 9,  x: 62, y: 58 }, // 9번 = top-3 후보 (정답)
      { id: 10, x: 28, y: 60 }, { id: 11, x: 78, y: 50 },
      { id: 12, x: 16, y: 72 }, { id: 13, x: 38, y: 78 },
      { id: 14, x: 56, y: 80 }, { id: 15, x: 76, y: 76 },
      { id: 16, x: 88, y: 62 }, { id: 17, x: 12, y: 50 },
      { id: 18, x: 90, y: 42 }, { id: 19, x: 24, y: 12 },
      { id: 20, x: 68, y: 10 }, { id: 21, x: 86, y: 14 },
      { id: 22, x: 14, y: 88 }, { id: 23, x: 82, y: 90 },
    ];
    const QUERY = { x: 50, y: 50 };

    // 거리 계산 — Euclidean
    const dist = (p) => Math.sqrt((p.x - QUERY.x) ** 2 + (p.y - QUERY.y) ** 2);
    const SORTED = [...POINTS].map((p) => ({ ...p, d: dist(p) })).sort((a, b) => a.d - b.d);

    // 정답 top-3 (KNN — 정확)
    const TRUE_TOP3 = SORTED.slice(0, 3).map((p) => p.id); // [7, 8, 9]
    // ANN top-3 — 8번을 놓치고 11번을 잘못 회수 (recall 2/3 = 67%)
    const ANN_TOP3 = [TRUE_TOP3[0], TRUE_TOP3[2], 11];      // [7, 9, 11]

    // recall@3 계산
    const recallAt3 = (predicted, truth) => {
      const hit = predicted.filter((id) => truth.includes(id)).length;
      return hit / truth.length;
    };

    // 벤치마크 데이터 (시간 단위 ms)
    const BENCH = [
      { size: '1K',    bf: 0.5,    ann: 0.3,  ratio: '1.7x'    },
      { size: '100K',  bf: 50,     ann: 0.8,  ratio: '62x'     },
      { size: '1M',    bf: 500,    ann: 1.2,  ratio: '416x'    },
      { size: '100M',  bf: 50000,  ann: 2,    ratio: '25,000x' },
    ];

    // ─────────────────────────────────────────────────────
    // 5단계 STEPS — dataState로 좌측 시각화 변화 제어
    //   mode  : 'brute' | 'ann' | 'tradeoff' | 'recall' | 'algo'
    //   scan  : Brute force 단계에서 "검사된" 포인트 ID 배열 (전체)
    //   probe : ANN 단계에서 "후보 셀에 들어온" 포인트 ID 배열 (좁은 영역)
    //   resultIds : 최종 회수된 top-k 포인트 ID 배열
    //   timeMs : 검색 소요 시간 (ms) — 막대 폭 계산용
    //   recall : 0~1 (recall@3)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Brute Force — 모든 벡터 전수 비교',
        desc: '가장 정직한 방법. 쿼리 벡터와 저장된 벡터 24개를 하나씩 거리 계산해서 가장 가까운 3개를 뽑는다. 100% 정확하지만 100만 벡터면 100만 번 거리 연산 — O(n) 그대로다. 도서관에서 모든 책장을 펼쳐보는 것과 같다.',
        mode: 'brute',
        dataState: {
          scanIds: POINTS.map((p) => p.id),       // 전체 스캔
          probeIds: [],
          resultIds: TRUE_TOP3,                   // 정답 top-3
          showRange: false,
          timeMs: 500,                            // 1M 기준
          recall: 1.0,                            // 100%
          method: 'Brute Force (KNN)',
          methodColor: 'amber',
        },
        code: {
          lang: 'python',
          filename: 'brute-force.py',
          lines: [
            '# Step 1. Brute Force — 모든 벡터와 거리 비교 (정확 100%)',
            'import numpy as np',
            '',
            'def brute_force_search(query, vectors, k=3):',
            '    """KNN 정공법 — n번 거리 계산 후 정렬"""',
            '    distances = []',
            '    for i, vec in enumerate(vectors):',
            '        # 모든 벡터와 L2 거리 계산',
            '        d = np.linalg.norm(query - vec)',
            '        distances.append((i, d))',
            '',
            '    # 거리순 정렬 → 상위 k개 반환',
            '    distances.sort(key=lambda x: x[1])',
            '    return distances[:k]',
            '',
            '',
            '# 100만 벡터에서 검색',
            'vectors = np.random.rand(1_000_000, 1536)',
            'query   = np.random.rand(1536)',
            'results = brute_force_search(query, vectors, k=3)',
            '#  ✓ 정확도 100% — 진짜 최근접 3개 반환',
            '#  ✗ 1M × 1536차원 → 약 500ms (단일 쿼리)',
            '#  ✗ QPS 100이면 GPU 1대로도 감당 불가',
            '',
            '# ─── 결론: 작은 데이터(<10K)에만 쓸 만함 ───',
            '# 다음 단계 → ANN으로 후보군 좁히기',
          ],
          highlight: [4, 6, 7, 8, 9, 10, 12, 13, 14, 18, 19, 20],
        },
      },
      {
        title: 'Step 2. ANN — 인덱스로 후보군 좁히기',
        desc: 'Approximate Nearest Neighbor는 미리 만들어둔 인덱스로 "이 근처에 있을 것 같은" 후보 셀만 검색한다. 전체 24개 중 5개만 비교 — 100배 빠르다. 단, 셀 경계에 걸친 진짜 정답을 놓칠 수 있다(이번 예시는 8번을 놓침). 사서가 "3번 코너부터 보세요"라고 안내하는 셈이다.',
        mode: 'ann',
        dataState: {
          scanIds: [],
          probeIds: SORTED.slice(0, 5).map((p) => p.id), // 가까운 5개만 probe
          resultIds: ANN_TOP3,                            // 8번을 놓치고 11번을 잡음
          showRange: true,
          timeMs: 1.2,
          recall: recallAt3(ANN_TOP3, TRUE_TOP3),         // 2/3 = 0.67
          method: 'ANN (Approximate)',
          methodColor: 'rose',
        },
        code: {
          lang: 'python',
          filename: 'ann.py',
          lines: [
            '# Step 2. ANN — 인덱스로 후보 셀만 검색 (속도 ↑, 정확도 약간 ↓)',
            'from langchain_community.vectorstores import Chroma',
            'from langchain_openai import OpenAIEmbeddings',
            '',
            '# 1) 임베딩 모델 + ANN Vector Store (내부적으로 HNSW)',
            'embeddings  = OpenAIEmbeddings(model="text-embedding-3-small")',
            'vectorstore = Chroma.from_documents(',
            '    documents=chunks,',

            ')',
            '',
            '# 2) 검색 — 내부에서 ANN 알고리즘으로 후보 좁힘',
            'results = vectorstore.similarity_search(query="연차 휴가 정책", k=3)',
            '',
            '# ─── ANN 동작 핵심 ───',
            '#  ① 인덱스 빌드 시 벡터를 "셀/그래프"로 분할',
            '#  ② 쿼리 시 가까운 셀만 골라 brute force',
            '#  ③ 24개 중 5개만 비교 → 100배 빠름',
            '',
            '#  ⚠ 단점: 셀 경계에 걸친 진짜 정답은 놓칠 수 있음',
            '#         이번 예시 정답 [7,8,9] 중 8번 miss',
            '#         ANN 결과 [7,9,11] → recall@3 = 2/3 = 67%',
            '',
            '# ─── 그래도 ANN을 쓰는 이유 ───',
            '#  실제 임베딩 + 좋은 알고리즘이면 95~99% recall 유지',
            '#  속도는 수백~수만 배 빠름 → trade-off 가치 있음',
          ],
          highlight: [2, 3, 6, 7, 8, 9, 10, 13, 16, 17, 18, 19, 21, 22, 23],
        },
      },
      {
        title: 'Step 3. 정확도 vs 속도 Trade-off',
        desc: '데이터 크기별 시간 비교. 1K에서는 둘 다 1ms 미만이라 차이가 작지만, 1M에서 416배, 1억이면 25,000배 차이가 난다. Brute force의 50초는 사용자 1명도 응대 못 하는 시간이다. 정확도 1~5%를 양보하고 속도를 4자리수 얻는 것 — 이게 RAG/Vector DB의 기본값이다.',
        mode: 'tradeoff',
        dataState: {
          scanIds: [],
          probeIds: [],
          resultIds: [],
          showRange: false,
          timeMs: 0,
          recall: 0,
          method: 'Trade-off Analysis',
          methodColor: 'slate',
        },
        code: {
          lang: 'markdown',
          filename: 'tradeoff.md',
          lines: [
            '# Brute Force vs ANN — 데이터 크기별 비교',
            '',
            '| 벡터 수      | Brute Force        | ANN     | 속도 차이 |',
            '|-------------|--------------------|---------|----------|',
            '| 1,000       | 0.5 ms             | 0.3 ms  | 1.7x     |',
            '| 100,000     | 50 ms              | 0.8 ms  | 62x      |',
            '| 1,000,000   | 500 ms             | 1.2 ms  | 416x     |',
            '| 100,000,000 | 50,000 ms (50초!)  | 2 ms    | 25,000x  |',
            '',
            '## 핵심 통찰',
            '- 데이터가 작을수록 차이가 작다 — **10K 미만은 Brute force도 OK**',
            '- 100만 벡터부터는 ANN이 사실상 유일한 선택',
            '- 1억 벡터에서 50초는 SLA 초과 — **서비스 자체가 불가능**',
            '',
            '## Trade-off 매트릭스',
            '',
            '| 항목          | Brute Force | ANN              |',
            '|--------------|-------------|------------------|',
            '| 정확도(recall)| 100%        | 95~99%           |',
            '| 시간 복잡도   | O(n)        | O(log n) ~ O(1)  |',
            '| 인덱스 빌드   | 불필요       | 필요 (수~수십초) |',
            '| 메모리        | 원본만       | 원본 + 인덱스    |',
            '| 적합 케이스   | < 10K 벡터   | 100K+ 프로덕션   |',
            '',
            '## 실무 결론',
            '',
            '> "정확도 1~5%를 양보하고 속도를 1000배 이상 얻는다."',
            '> — Chroma · FAISS · Pinecone · Weaviate의 기본값',
            '',
            '단, **얼마나 양보했는지는 측정해야 한다** — 다음: recall@k',
          ],
          highlight: [3, 4, 5, 6, 7, 8, 11, 12, 13, 17, 18, 19, 20, 21, 22, 27, 28],
        },
      },
      {
        title: 'Step 4. recall@k — 얼마나 정확한지 측정',
        desc: 'ANN이 "충분히 정확한지" 검증하는 표준 지표. recall@k = (ANN top-k가 진짜 top-k와 겹치는 개수) / k. 이번 예시는 정답 [7,8,9] 중 ANN이 [7,9,11]을 회수해 recall@3 = 2/3 = 67%. 실제로는 인덱스 파라미터(efSearch 등)를 튜닝해 95% 이상으로 맞춘다.',
        mode: 'recall',
        dataState: {
          scanIds: [],
          probeIds: [],
          resultIds: ANN_TOP3,
          showRange: false,
          timeMs: 1.2,
          recall: recallAt3(ANN_TOP3, TRUE_TOP3),
          method: 'recall@k Measurement',
          methodColor: 'rose',
          truth: TRUE_TOP3,
          predicted: ANN_TOP3,
        },
        code: {
          lang: 'python',
          filename: 'recall.py',
          lines: [
            '# Step 4. recall@k — ANN 정확도 측정의 표준 지표',
            'import numpy as np',
            '',
            'def recall_at_k(predicted_ids, truth_ids, k):',
            '    """ANN이 회수한 top-k 중 진짜 정답에 속한 비율 (0.0 ~ 1.0)"""',
            '    truth_set = set(truth_ids[:k])',
            '    hit = sum(1 for pid in predicted_ids[:k] if pid in truth_set)',
            '    return hit / k',
            '',
            '# ─── 이번 시각화 예시 ───',
            'truth     = [7, 8, 9]      # 진짜 최근접 3개 (Brute force)',
            'predicted = [7, 9, 11]     # ANN 결과 (8번 miss, 11번 잘못)',
            '',
            'r = recall_at_k(predicted, truth, k=3)',
            '#  → hit = {7, 9} = 2개',
            '#  → recall@3 = 2 / 3 ≈ 0.67  (67%)',
            '',
            '# ─── 실무 평가 루프 ───',

            '',
            'recalls = []',
            'for q, truth in zip(queries, truth_db):',
            '    pred = vectorstore.similarity_search(q, k=10)',

            '',
            'print(f"평균 recall@10 = {np.mean(recalls):.3f}")',

            '#    recall ↓ 허용 → 더 적게 봐도 됨 (속도 ↑↑)',
          ],

        },
      },
      {

        mode: 'algo',

          showRange: false,

        },
        code: {
          lang: 'markdown',

          lines: [
            '# 다음 자료(III-2-2) 예고 — ANN 알고리즘 3대장',
            '',
            '## 1. HNSW (Hierarchical Navigable Small World)',
            '- **아이디어**: 그래프를 층층이(skip list 처럼) 쌓는다',
            '- **검색**: 최상층(노드 적음)에서 큰 점프 → 하위층 세밀하게',

            '',
            '> 다음 시각화에서 HNSW의 층 구조를 직접 그려가며 이해한다.',

    // ─────────────────────────────────────────────────────
    // 좌측 위: 벡터 공간 시각화
    //   - mode='brute'  : 모든 점이 amber로 검사됨 + top-3 green
    //   - mode='ann'    : 후보 셀(rose 점선 원) + 그 안 점만 비교 + 결과 green
    //   - mode='tradeoff' : 시각화 숨김 (벤치마크가 메인)
    //   - mode='recall' : 정답 vs 예측 비교 (truth/predicted 라벨)
    //   - mode='algo'   : 3 알고리즘 카드
    // ─────────────────────────────────────────────────────
    function VectorSpace({ state }) {
      const { mode, scanIds, probeIds, resultIds, showRange, truth, predicted } = state;

      if (mode === 'tradeoff') {
        return (
          <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">📊</span>
                <span className="text-[11px] font-bold text-rose-800">데이터 크기별 검색 시간</span>
              </div>
              <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">log scale</span>
            </div>
            <div className="space-y-2">
              {BENCH.map((b) => {
                // 로그 스케일 — 50000ms를 100%로
                const bfPct = Math.max(2, Math.log10(b.bf * 1000) * 16);
                const annPct = Math.max(1, Math.log10(b.ann * 1000) * 16);
                return (
                  <div key={b.size} className="bg-slate-50 rounded p-2 border border-slate-200">
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-[10px] font-bold text-slate-700">{b.size} 벡터</span>
                      <span className="text-[9px] font-mono bg-rose-600 text-white px-1.5 py-0.5 rounded font-bold">
                        {b.ratio} 차이
                      </span>
                    </div>
                    <div className="space-y-1">
                      <div className="flex items-center gap-1.5">
                        <span className="text-[9px] w-7 text-amber-700 font-bold font-mono">BF</span>
                        <div className="flex-1 bg-amber-100 rounded h-3 relative overflow-hidden">
                          <div
                            className="bg-amber-500 h-3 rounded flex items-center justify-end pr-1 text-[8px] text-white font-bold transition-all duration-700"
                            style={{ width: `${Math.min(100, bfPct)}%` }}
                          >
                            {b.bf >= 1000 ? `${b.bf / 1000}s` : `${b.bf}ms`}
                          </div>
                        </div>
                      </div>
                      <div className="flex items-center gap-1.5">
                        <span className="text-[9px] w-7 text-rose-700 font-bold font-mono">ANN</span>
                        <div className="flex-1 bg-rose-100 rounded h-3 relative overflow-hidden">
                          <div
                            className="bg-rose-500 h-3 rounded flex items-center justify-end pr-1 text-[8px] text-white font-bold transition-all duration-700"
                            style={{ width: `${Math.max(8, annPct)}%`, minWidth: '40px' }}
                          >
                            {b.ann}ms
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="text-[9px] text-rose-700 mt-2 italic text-center">
              ⚠ 1억 벡터: BF는 50초 — 사용자 응대 불가 / ANN은 2ms — 즉시
            </div>
          </div>
        );
      }

      if (mode === 'algo') {
        const algos = [
          { name: 'HNSW', desc: '계층 그래프 탐색', metric: 'O(log n)', tone: 'rose' },
          { name: 'IVF',  desc: 'voronoi 셀 분할', metric: 'O(√n)',  tone: 'amber' },
          { name: 'PQ',   desc: '벡터 압축 비교',  metric: '메모리 1/32', tone: 'sky' },
        ];
        const toneMap = {
          rose:  'bg-rose-50 border-rose-300 text-rose-800',
          amber: 'bg-amber-50 border-amber-300 text-amber-800',
          sky:   'bg-sky-50 border-sky-300 text-sky-800',
        };
        return (
          <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">🧭</span>
                <span className="text-[11px] font-bold text-rose-800">ANN 알고리즘 3대장</span>
              </div>
              <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">III-2-2 예고</span>
            </div>
            <div className="space-y-2">
              {algos.map((a) => (
                <div key={a.name} className={`rounded border-2 p-2.5 ${toneMap[a.tone]}`}>
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-sm font-bold">{a.name}</span>
                    <span className="text-[9px] bg-white px-1.5 py-0.5 rounded font-mono border border-current">
                      {a.metric}
                    </span>
                  </div>
                  <div className="text-[10px] leading-snug">{a.desc}</div>
                </div>
              ))}
            </div>
            <div className="mt-3 p-2 bg-slate-50 rounded border border-slate-200 text-[9px] text-slate-600">
              💡 다음 자료에서 HNSW 층 그래프, IVF 셀 분할, PQ 압축을 직접 그려가며 학습합니다.
            </div>
          </div>
        );
      }

      // brute / ann / recall — 벡터 공간 그리기
      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📍</span>
              <span className="text-[11px] font-bold text-rose-800">벡터 공간 (24개 점, 쿼리=중앙)</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">
              {mode === 'brute' ? 'mode=BF' : mode === 'ann' ? 'mode=ANN' : 'mode=eval'}
            </span>
          </div>
          <div className="relative w-full h-[280px] bg-slate-50 rounded-lg border-2 border-slate-200 overflow-hidden">
            {/* ANN 후보 셀 — 점선 원 */}
            {showRange && (
              <div
                className="absolute border-2 border-dashed border-rose-400 rounded-full bg-rose-50/40 transition-all duration-500"
                style={{
                  left: `${QUERY.x}%`,
                  top: `${QUERY.y}%`,
                  width: '36%',
                  height: '36%',
                  transform: 'translate(-50%, -50%)',
                }}
              >
                <div className="absolute -top-4 left-1/2 -translate-x-1/2 text-[8px] font-bold text-rose-600 bg-white px-1 rounded shadow whitespace-nowrap">
                  candidate cell
                </div>
              </div>
            )}

            {/* 데이터 포인트 */}
            {POINTS.map((p) => {
              const isScan = scanIds.includes(p.id);
              const isProbe = probeIds.includes(p.id);
              const isResult = resultIds.includes(p.id);
              const isTruth = mode === 'recall' && truth && truth.includes(p.id);
              const isPred = mode === 'recall' && predicted && predicted.includes(p.id);
              const isHit = isTruth && isPred;       // 정답 + 예측 = 맞춤
              const isMiss = isTruth && !isPred;     // 정답인데 못 잡음
              const isFalse = !isTruth && isPred;    // 정답 아닌데 잡음

              let cls = 'bg-slate-300 border-slate-400';
              let scale = 'scale-100';
              if (mode === 'recall') {
                if (isHit) { cls = 'bg-green-500 border-green-700 ring-2 ring-green-300'; scale = 'scale-150'; }
                else if (isMiss) { cls = 'bg-red-500 border-red-700 ring-2 ring-red-300 animate-pulse'; scale = 'scale-150'; }
                else if (isFalse) { cls = 'bg-orange-400 border-orange-600 ring-1 ring-orange-300'; scale = 'scale-125'; }
              } else if (isResult) {
                cls = 'bg-green-500 border-green-700 ring-2 ring-green-300'; scale = 'scale-150';
              } else if (isProbe) {
                cls = 'bg-rose-300 border-rose-500'; scale = 'scale-110';
              } else if (isScan) {
                cls = 'bg-amber-300 border-amber-500'; scale = 'scale-100';
              }

              return (
                <div
                  key={p.id}
                  className="absolute transition-all duration-500"
                  style={{ left: `${p.x}%`, top: `${p.y}%`, transform: 'translate(-50%, -50%)' }}
                >
                  <div className={`w-3 h-3 rounded-full border-2 ${cls} ${scale} transition-all duration-500`}></div>
                </div>
              );
            })}

            {/* 쿼리 — 가장 위에 */}
            <div
              className="absolute z-10"
              style={{ left: `${QUERY.x}%`, top: `${QUERY.y}%`, transform: 'translate(-50%, -50%)' }}
            >
              <div className="w-5 h-5 bg-red-500 rounded-full border-2 border-white shadow-lg animate-pulse"></div>
              <div className="absolute -top-5 left-1/2 -translate-x-1/2 text-[9px] font-bold text-red-600 bg-white px-1 rounded shadow whitespace-nowrap">
                Query
              </div>
            </div>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-2 text-slate-600">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-red-500 border border-white"></span>쿼리
            </span>
            {mode === 'brute' && (
              <>
                <span className="flex items-center gap-1">
                  <span className="w-2.5 h-2.5 rounded-full bg-amber-300 border border-amber-500"></span>전수 검사 (24개)
                </span>
                <span className="flex items-center gap-1">
                  <span className="w-2.5 h-2.5 rounded-full bg-green-500 border border-green-700"></span>top-3 결과
                </span>
              </>
            )}
            {mode === 'ann' && (
              <>
                <span className="flex items-center gap-1">
                  <span className="w-2.5 h-2.5 rounded-full bg-rose-300 border border-rose-500"></span>후보 셀(5개)
                </span>
                <span className="flex items-center gap-1">
                  <span className="w-2.5 h-2.5 rounded-full bg-green-500 border border-green-700"></span>ANN 결과
                </span>
              </>
            )}
            {mode === 'recall' && (
              <>
                <span className="flex items-center gap-1">
                  <span className="w-2.5 h-2.5 rounded-full bg-green-500 border border-green-700"></span>hit (정답 ∩ 예측)
                </span>
                <span className="flex items-center gap-1">
                  <span className="w-2.5 h-2.5 rounded-full bg-red-500 border border-red-700"></span>miss (놓친 정답)
                </span>
                <span className="flex items-center gap-1">
                  <span className="w-2.5 h-2.5 rounded-full bg-orange-400 border border-orange-600"></span>false (오답 회수)
                </span>
              </>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: 시간 / recall 막대
    //   - timeMs : 검색 소요 시간 (ms) — log scale 막대
    //   - recall : 0~1 — 100% 막대
    //   tradeoff·algo 모드에서는 숨김
    // ─────────────────────────────────────────────────────
    function MetricBars({ state }) {
      const { mode, timeMs, recall, method, methodColor } = state;
      if (mode === 'tradeoff' || mode === 'algo') return null;

      const timePct = Math.min(100, Math.max(3, Math.log10(timeMs * 1000 + 1) * 18));
      const recallPct = recall * 100;

      const colorMap = {
        amber: { bar: 'bg-amber-500', bg: 'bg-amber-100', text: 'text-amber-800', border: 'border-amber-300' },
        rose:  { bar: 'bg-rose-500',  bg: 'bg-rose-100',  text: 'text-rose-800',  border: 'border-rose-300' },
        slate: { bar: 'bg-slate-500', bg: 'bg-slate-100', text: 'text-slate-800', border: 'border-slate-300' },
      };
      const c = colorMap[methodColor] || colorMap.rose;

      const recallColor = recall >= 0.95 ? 'bg-green-500'
                       : recall >= 0.7 ? 'bg-amber-500'
                       : 'bg-red-500';

      return (
        <div className={`rounded-lg border-2 ${c.border} p-3 ${c.bg}`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">⏱</span>
              <span className={`text-[11px] font-bold ${c.text}`}>측정 결과 — {method}</span>
            </div>
          </div>

          {/* 시간 막대 (1M 벡터 기준) */}
          <div className="bg-white rounded p-2 mb-2 border border-slate-200">
            <div className="flex items-center justify-between mb-1">
              <span className="text-[10px] font-bold text-slate-700">검색 시간 (1M 벡터 기준)</span>
              <span className={`text-[10px] font-mono font-bold ${c.text}`}>
                {timeMs >= 1000 ? `${(timeMs / 1000).toFixed(1)}s` : `${timeMs}ms`}
              </span>
            </div>
            <div className="h-4 bg-slate-100 rounded overflow-hidden relative">
              <div
                className={`h-4 ${c.bar} rounded transition-all duration-700 flex items-center justify-end pr-2 text-[9px] text-white font-bold`}
                style={{ width: `${timePct}%` }}
              >
                {timePct > 25 && (timeMs >= 1000 ? `${(timeMs / 1000).toFixed(1)}s` : `${timeMs}ms`)}
              </div>
            </div>
            <div className="text-[8px] text-slate-500 mt-0.5 font-mono">log scale · 0.1ms ~ 1s</div>
          </div>

          {/* recall 막대 */}
          <div className="bg-white rounded p-2 border border-slate-200">
            <div className="flex items-center justify-between mb-1">
              <span className="text-[10px] font-bold text-slate-700">recall@3 (정확도)</span>
              <span className="text-[10px] font-mono font-bold text-slate-700">
                {(recall * 100).toFixed(0)}%
              </span>
            </div>
            <div className="h-4 bg-slate-100 rounded overflow-hidden relative">
              <div
                className={`h-4 ${recallColor} rounded transition-all duration-700 flex items-center justify-end pr-2 text-[9px] text-white font-bold`}
                style={{ width: `${recallPct}%` }}
              >
                {recallPct > 15 && `${recallPct.toFixed(0)}%`}
              </div>
              {/* 95% 목표선 */}
              <div
                className="absolute top-0 bottom-0 border-l-2 border-dashed border-slate-600"
                style={{ left: '95%' }}
              >
                <div className="absolute -top-3 -left-3 text-[8px] text-slate-600 font-mono">95%</div>
              </div>
            </div>
            <div className="text-[8px] text-slate-500 mt-0.5 font-mono">
              {recall >= 0.95 ? '✓ 프로덕션 OK' : recall >= 0.7 ? '⚠ 튜닝 필요' : '✗ 인덱스 재구성 필요'}
            </div>
          </div>

          {/* recall 모드 — 정답/예측 ID 비교 */}
          {mode === 'recall' && state.truth && state.predicted && (
            <div className="bg-white rounded p-2 mt-2 border border-slate-200">
              <div className="text-[9px] font-bold text-slate-700 mb-1 uppercase tracking-wider">계산 과정</div>
              <div className="space-y-0.5 font-mono text-[10px]">
                <div className="text-slate-700">
                  truth     = <span className="text-green-700 font-bold">[{state.truth.join(', ')}]</span>
                </div>
                <div className="text-slate-700">
                  predicted = <span className="text-rose-700 font-bold">[{state.predicted.join(', ')}]</span>
                </div>
                <div className="text-slate-700">
                  hit       = <span className="text-green-700 font-bold">{'{'}{state.predicted.filter((id) => state.truth.includes(id)).join(', ')}{'}'}</span>
                  <span className="text-slate-500"> = {state.predicted.filter((id) => state.truth.includes(id)).length}개</span>
                </div>
                <div className="text-slate-700 border-t border-slate-200 pt-0.5 mt-0.5">
                  recall@3  = {state.predicted.filter((id) => state.truth.includes(id)).length} / 3 =
                  <span className="text-rose-700 font-bold"> {(recall * 100).toFixed(0)}%</span>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: VectorSpace / 하단: MetricBars
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📍 Vector Search Live — Brute Force vs ANN</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <VectorSpace state={step.dataState} />
            <MetricBars state={step.dataState} />
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 11.9.0 + atom-one-dark
    //   라인 번호 + 강조 라인(rose tint)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일명 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0"><code className="block">
              {(renderedLines || code.lines).map((lineHtml, i) => {
                const hi = code.highlight && code.highlight.includes(i + 1);
                return (
                  <div key={i} className={`flex hover:bg-slate-800/50 ${hi ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''}`}>
                    <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">{i + 1}</span>
                    <span className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1" dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }} />
                  </div>
                );
              })}
            </code></pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 4 버튼 + 키보드 + 3000ms 자동재생
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Embedding & Vector Store &gt; Chapter 2. Vector Store</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-2-1. Vector Store — ANN 검색 (Approximate Nearest Neighbor)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">도서관 100만 권 — 모든 책장 뒤지기 vs 사서가 안내한 코너만</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: <strong>Brute Force</strong>는 정확하지만 느리다(<10K 한정). <strong>ANN</strong>은 95~99% 정확도로 1000배 이상 빠름. <strong>recall@k</strong>로 정확도를 측정하고 인덱스 파라미터(efSearch/nprobe)로 튜닝한다. 다음(III-2-2)에서 <strong>HNSW · IVF · PQ</strong> 알고리즘 동작 원리를 본다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]">
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Vector Store', 'Brute Force', 'ANN', 'recall@k', 'HNSW', 'IVF', 'trade-off'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-1-3.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; III-1-3 유사도 측정</a>
              <a href="./III-2-2.html" className="text-rose-700 hover:text-rose-900 font-medium">III-2-2 HNSW · IVF · PQ &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
