<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — III-1-3. 유사도 측정</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const METHODS = [
      {
        name: 'Cosine Similarity',
        icon: '\uD83D\uDCD0',
        formula: 'cos(\u03B8) = (A \u00B7 B) / (||A|| \u00D7 ||B||)',
        desc: '\uBC29\uD5A5\uC774 \uC5BC\uB9C8\uB098 \uAC19\uC740\uAC00? (0~1)',
        value: 0.87,
        range: '0 (무관) ~ 1 (동일)',
        when: 'RAG 기본값. 문서 길이가 달라도 공정하게 비교',
        analogy: '\uB450 \uD654\uC0B4\uD45C\uAC00 \uAC19\uC740 \uBC29\uD5A5\uC744 \uAC00\uB9AC\uD0A4\uB294\uC9C0',
        color: 'purple'
      },
      {
        name: 'Euclidean Distance',
        icon: '\uD83D\uDCCF',
        formula: 'd = \u221A\u2211(Ai - Bi)\u00B2',
        desc: '\uC9C1\uC120 \uAC70\uB9AC\uAC00 \uC5BC\uB9C8\uB098 \uAC00\uAE4C\uC6B4\uAC00?',
        value: 0.34,
        range: '0 (동일) ~ \u221E (멀리)',
        when: '\uD074\uB7EC\uC2A4\uD130\uB9C1, \uBCA1\uD130 \uACF5\uAC04\uC5D0\uC11C \uC2E4\uC81C \uAC70\uB9AC \uD544\uC694 \uC2DC',
        analogy: '\uC9C0\uB3C4\uC5D0\uC11C \uB450 \uC810 \uC0AC\uC774\uC758 \uC9C1\uC120 \uAC70\uB9AC',
        color: 'blue'
      },
      {
        name: 'Dot Product',
        icon: '\u26A1',
        formula: 'A \u00B7 B = \u2211(Ai \u00D7 Bi)',
        desc: '\uBC29\uD5A5 + \uD06C\uAE30 \uBAA8\uB450 \uACE0\uB824',
        value: 12.5,
        range: '-\u221E ~ +\u221E',
        when: '\uC815\uADDC\uD654\uB41C \uBCA1\uD130\uC5D0\uC11C Cosine\uACFC \uB3D9\uC77C. \uACC4\uC0B0 \uAC00\uC7A5 \uBE60\uB984',
        analogy: '\uB450 \uD798\uC774 \uAC19\uC740 \uBC29\uD5A5\uC73C\uB85C \uC5BC\uB9C8\uB098 \uAC15\uD558\uAC8C \uBC00\uC5B4\uB0B4\uB294\uAC00',
        color: 'amber'
      },
    ];

    const VECTOR_A = { label: '\uBB38\uC11C A', values: [0.8, 0.6], desc: '"\uC5F0\uCC28 \uD734\uAC00 \uC815\uCC45\uC740..."' };
    const VECTOR_B = { label: '\uBB38\uC11C B', values: [0.3, 0.9], desc: '"\uAE09\uC5EC \uC9C0\uAE09\uC77C\uC740..."' };

    const STEPS = [
      {
        desc: "\"비슷한가?\"를 판단하는 3가지 방법이 있습니다. 방향만 보는 Cosine, 거리를 재는 Euclidean, 방향+크기를 보는 Dot Product — 각각 다른 관점에서 유사도를 측정합니다.",
        activeMethod: -1, showVectors: true, showCode: false
      },
      {
        desc: "[Cosine] 두 벡터의 '방향'만 비교합니다. 문서가 길든 짧든 방향이 같으면 유사합니다. RAG에서 가장 널리 사용됩니다. 문서 길이에 영향 받지 않는 것이 최대 장점입니다.",
        activeMethod: 0, showVectors: true, showCode: true
      },
      {
        desc: "[Euclidean] 두 벡터 사이의 '직선 거리'를 측정합니다. 지도에서 두 도시 사이 거리를 재는 것과 같습니다. 값이 작을수록 유사합니다. 클러스터링에서 많이 사용됩니다.",
        activeMethod: 1, showVectors: true, showCode: true
      },
      {
        desc: "[Dot Product] 방향과 크기를 모두 고려합니다. 벡터가 정규화(길이 1)되어 있으면 Cosine과 동일한 결과입니다. 계산이 가장 빠른 장점이 있습니다.",
        activeMethod: 2, showVectors: true, showCode: true
      },
      {
        desc: "실무 결론: 대부분의 RAG 파이프라인에서는 Cosine Similarity를 기본으로 사용합니다. 대부분의 Embedding 모델이 정규화된 벡터를 출력하므로, Dot Product도 동일한 결과를 냅니다.",
        activeMethod: -1, showVectors: false, showCode: false
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const scale = 120;
      const cx = 150, cy = 150;

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-purple-700 hover:text-purple-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Embedding & Vector Store &gt; Chapter 1. Embedding</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-1-3. 유사도 측정</h1>
                </div>
              </div>
              <p className="text-slate-600">"<b>비슷한가?</b>"를 판단하는 3가지 기준 — 방향이 같은가(Cosine), 거리가 가까운가(Euclidean), 힘이 같은 쪽인가(Dot Product).</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-purple-700 border-purple-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">3가지 유사도 측정법</h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="space-y-4">
                {s.showVectors ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">벡터 시각화 (2D)</div>
                    <div className="flex justify-center">
                      <svg width="300" height="300" viewBox="0 0 300 300" className="bg-slate-50 rounded-lg border">
                        {/* 격자 */}
                        <line x1="0" y1={cy} x2="300" y2={cy} stroke="#e2e8f0" strokeWidth="1"/>
                        <line x1={cx} y1="0" x2={cx} y2="300" stroke="#e2e8f0" strokeWidth="1"/>
                        {/* 벡터 A */}
                        <line x1={cx} y1={cy} x2={cx + VECTOR_A.values[0]*scale} y2={cy - VECTOR_A.values[1]*scale} stroke="#8b5cf6" strokeWidth="3" markerEnd="url(#arrowA)"/>
                        <defs>
                          <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                            <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
                          </marker>
                          <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
                          </marker>
                        </defs>
                        <text x={cx + VECTOR_A.values[0]*scale + 5} y={cy - VECTOR_A.values[1]*scale - 5} fontSize="12" fill="#8b5cf6" fontWeight="bold">A</text>
                        {/* 벡터 B */}
                        <line x1={cx} y1={cy} x2={cx + VECTOR_B.values[0]*scale} y2={cy - VECTOR_B.values[1]*scale} stroke="#f59e0b" strokeWidth="3" markerEnd="url(#arrowB)"/>
                        <text x={cx + VECTOR_B.values[0]*scale + 5} y={cy - VECTOR_B.values[1]*scale - 5} fontSize="12" fill="#f59e0b" fontWeight="bold">B</text>
                        {/* 각도 표시 (Cosine일 때) */}
                        {s.activeMethod === 0 && (
                          <path d={`M ${cx + 30} ${cy} A 30 30 0 0 1 ${cx + 30 * VECTOR_A.values[0]/Math.sqrt(VECTOR_A.values[0]**2+VECTOR_A.values[1]**2)} ${cy - 30 * VECTOR_A.values[1]/Math.sqrt(VECTOR_A.values[0]**2+VECTOR_A.values[1]**2)}`} fill="none" stroke="#8b5cf6" strokeWidth="2" strokeDasharray="4"/>
                        )}
                        {/* 거리 표시 (Euclidean일 때) */}
                        {s.activeMethod === 1 && (
                          <line x1={cx + VECTOR_A.values[0]*scale} y1={cy - VECTOR_A.values[1]*scale} x2={cx + VECTOR_B.values[0]*scale} y2={cy - VECTOR_B.values[1]*scale} stroke="#3b82f6" strokeWidth="2" strokeDasharray="6"/>
                        )}
                        <text x="5" y="15" fontSize="10" fill="#94a3b8">A = [{VECTOR_A.values.join(', ')}]</text>
                        <text x="5" y="30" fontSize="10" fill="#94a3b8">B = [{VECTOR_B.values.join(', ')}]</text>
                      </svg>
                    </div>
                    {s.activeMethod >= 0 && (
                      <div className="mt-3 grid grid-cols-3 gap-2 text-center">
                        {METHODS.map((m, i) => (
                          <div key={i} className={`p-2 rounded border text-xs transition-all ${i === s.activeMethod ? `bg-${m.color}-50 border-${m.color}-300 font-bold` : 'bg-slate-50 border-slate-100 opacity-50'}`}>
                            <div className="font-bold">{m.name.split(' ')[0]}</div>
                            <div>{i === 0 ? '0.87' : i === 1 ? '0.34' : '12.5'}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">종합 비교</div>
                    <div className="space-y-3">
                      {METHODS.map((m, i) => (
                        <div key={i} className="p-3 rounded-lg border border-slate-100 bg-slate-50">
                          <div className="flex items-center gap-2 mb-2">
                            <span className="text-lg">{m.icon}</span>
                            <span className="font-bold text-sm">{m.name}</span>
                          </div>
                          <div className="grid grid-cols-2 gap-2 text-xs">
                            <div><b>범위:</b> {m.range}</div>
                            <div><b>비유:</b> {m.analogy}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                    <div className="mt-4 p-3 bg-purple-50 rounded-lg border border-purple-200 text-xs text-purple-800">
                      <b>결론:</b> RAG에서는 Cosine Similarity가 기본 선택입니다. 정규화된 벡터에서는 Dot Product = Cosine이므로 성능 최적화가 가능합니다.
                    </div>
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-purple-600 uppercase tracking-wider mb-4">
                  {s.showCode ? '코드 예시' : '상세 설명'}
                </div>
                {s.showCode ? (
                  <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{
                    s.activeMethod === 0 ?
`import numpy as np

def cosine_similarity(a, b):
    """코사인 유사도: 방향만 비교"""
    dot = np.dot(a, b)
    norm_a = np.linalg.norm(a)
    norm_b = np.linalg.norm(b)
    return dot / (norm_a * norm_b)

a = np.array([0.8, 0.6])  # 문서 A
b = np.array([0.3, 0.9])  # 문서 B

sim = cosine_similarity(a, b)
print(f"Cosine: {sim:.4f}")  # 0.87

# 특징: 0~1 범위 (1에 가까울수록 유사)
# 문서 길이(벡터 크기)에 무관
# RAG 기본 유사도 측정법` :
                    s.activeMethod === 1 ?
`import numpy as np

def euclidean_distance(a, b):
    """유클리드 거리: 직선 거리 측정"""
    return np.linalg.norm(a - b)

a = np.array([0.8, 0.6])
b = np.array([0.3, 0.9])

dist = euclidean_distance(a, b)
print(f"Euclidean: {dist:.4f}")  # 0.58

# 특징: 0~무한대 (0에 가까울수록 유사)
# 벡터 크기(문서 길이)에 영향 받음
# 주로 클러스터링에서 사용

# 유사도로 변환하려면:
similarity = 1 / (1 + dist)
print(f"Similarity: {similarity:.4f}")` :
`import numpy as np

def dot_product(a, b):
    """내적: 방향 + 크기 모두 고려"""
    return np.dot(a, b)

a = np.array([0.8, 0.6])
b = np.array([0.3, 0.9])

dp = dot_product(a, b)
print(f"Dot Product: {dp:.2f}")  # 0.78

# 정규화하면 Cosine과 동일!
a_norm = a / np.linalg.norm(a)
b_norm = b / np.linalg.norm(b)
dp_norm = dot_product(a_norm, b_norm)
print(f"Normalized: {dp_norm:.4f}")  # 0.87

# 특징: 계산이 가장 빠름
# 정규화된 벡터에서 = Cosine`
                  }</pre>
                ) : s.activeMethod >= 0 ? (
                  <div className="space-y-4">
                    <div className={`p-4 rounded-lg bg-${METHODS[s.activeMethod].color}-50 border border-${METHODS[s.activeMethod].color}-200`}>
                      <div className="flex items-center gap-2 mb-2">
                        <span className="text-xl">{METHODS[s.activeMethod].icon}</span>
                        <span className="font-bold text-sm">{METHODS[s.activeMethod].name}</span>
                      </div>
                      <div className="text-xs space-y-2 text-slate-700">
                        <div className="p-2 bg-white rounded border">
                          <b>수식:</b> <code className="font-mono">{METHODS[s.activeMethod].formula}</code>
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>범위:</b> {METHODS[s.activeMethod].range}
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>비유:</b> {METHODS[s.activeMethod].analogy}
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>사용 시점:</b> {METHODS[s.activeMethod].when}
                        </div>
                      </div>
                    </div>
                  </div>
                ) : step === 0 ? (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-purple-50 border border-purple-200">
                      <div className="font-bold text-sm text-purple-800 mb-2">3가지 관점</div>
                      <div className="space-y-2 text-xs text-purple-700">
                        <div className="p-2 bg-white rounded border flex items-center gap-2">
                          <span className="text-lg">{METHODS[0].icon}</span>
                          <div><b>Cosine:</b> 방향이 같은가?</div>
                        </div>
                        <div className="p-2 bg-white rounded border flex items-center gap-2">
                          <span className="text-lg">{METHODS[1].icon}</span>
                          <div><b>Euclidean:</b> 거리가 가까운가?</div>
                        </div>
                        <div className="p-2 bg-white rounded border flex items-center gap-2">
                          <span className="text-lg">{METHODS[2].icon}</span>
                          <div><b>Dot Product:</b> 방향+크기가 얼마나 일치하는가?</div>
                        </div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-green-50 border border-green-200">
                      <div className="font-bold text-sm text-green-800 mb-2">실무 가이드</div>
                      <div className="text-xs text-green-700 space-y-2">
                        <div className="p-2 bg-white rounded border">
                          <b>RAG 검색 (기본)</b>
                          <div className="text-slate-500 mt-0.5">→ Cosine Similarity</div>
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>성능 최적화 (정규화된 벡터)</b>
                          <div className="text-slate-500 mt-0.5">→ Dot Product (Cosine과 동일, 더 빠름)</div>
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>문서 클러스터링</b>
                          <div className="text-slate-500 mt-0.5">→ Euclidean Distance</div>
                        </div>
                      </div>
                    </div>
                    <div className="p-3 bg-amber-50 rounded-lg border border-amber-200 text-xs text-amber-800">
                      <b>팁:</b> 대부분의 Vector Store(Chroma, Pinecone 등)는 유사도 측정법을 설정할 수 있습니다. 기본값은 Cosine입니다.
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Cosine Similarity', 'Euclidean Distance', 'Dot Product', '\uC815\uADDC\uD654', '\uBCA1\uD130 \uAC80\uC0C9'].map(kw => (
                <span key={kw} className="bg-purple-50 text-purple-700 px-3 py-1 rounded-full text-sm font-medium border border-purple-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-purple-600 hover:bg-purple-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./III-1-2.html" className="text-purple-600 hover:text-purple-800 font-medium">&larr; III-1-2. Embedding 모델 비교</a>
              <a href="./III-2-1.html" className="text-purple-600 hover:text-purple-800 font-medium">III-2-1. Vector Store ANN 검색 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
