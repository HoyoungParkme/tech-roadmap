  <!--
    III-1-3. 유사도 측정 — Cosine / L2 / Inner Product
    학습 목표: 벡터 공간에서 "비슷하다"를 정의하는 3가지 metric을
              5단계로 비교하고, 언제 무엇을 써야 하는지 결정 기준을 익힌다.
    핵심 비유: 두 문서 벡터를 2D 평면 화살표로 시각화 — 각도/거리/투영
    패턴: fastapi v1 — 좌(LiveDataPane: 2D 벡터 + metric 결과) / 우(VSCode CodeViewer)
    색상: rag rose
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 두 문서 벡터 (2D 시각화용)
    //   문서 A: "연차 휴가 정책은..."
    //   문서 B: "급여 지급일은..."
    //   같은 방향이지만 길이가 다른 비교용 벡터 C도 사용
    // ─────────────────────────────────────────────────────
    const VEC_A = { x: 0.8, y: 0.6, label: 'A', desc: '"연차 휴가 정책..."', color: '#e11d48' };  // rose-600
    const VEC_B = { x: 0.3, y: 0.9, label: 'B', desc: '"급여 지급일..."',   color: '#f59e0b' };  // amber-500

    // 미리 계산한 metric 결과 (실제 수치)
    //   ||A|| = sqrt(0.64+0.36) = 1.0
    //   ||B|| = sqrt(0.09+0.81) = sqrt(0.9) ≈ 0.949
    //   A·B = 0.8*0.3 + 0.6*0.9 = 0.24 + 0.54 = 0.78
    //   cos = 0.78 / (1.0 * 0.949) ≈ 0.822
    //   L2  = sqrt((0.8-0.3)^2 + (0.6-0.9)^2) = sqrt(0.25+0.09) = sqrt(0.34) ≈ 0.583
    const METRICS = {
      cosine: 0.822,
      l2: 0.583,
      dot: 0.780,
      cosineAC: 1.0,    // A 와 A·2 (방향 같음)
      dotAC: 1.560,     // A · A·2 = 0.8*1.6 + 0.6*1.2 = 1.28+0.72 = 2.0... 다시: 0.8*1.6=1.28 + 0.6*1.2=0.72 → 2.0
      // (계산 다시: 1.28 + 0.72 = 2.0)
    };
    METRICS.dotAC = 2.0;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터
    //   metric  : 'cosine' | 'l2' | 'dot' | 'normalized' | 'choice'
    //   showB   : 비교 벡터 (false면 C 사용 또는 숨김)
    //   overlay : SVG 위에 그릴 추가 시각 요소
    //   result  : 우측 카드에 표시할 metric 결과
    //   verdict : 한 줄 결론
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Cosine Similarity — 각도 (방향만, 크기 무관)',

        overlay: 'angle',
        result: {
          headline: 'cos(θ) = 0.822',
          rangeLine: '범위: -1 ~ +1  ·  값이 클수록 유사',
          formula: 'cos(θ) = (A · B) / (‖A‖ × ‖B‖)',
          steps: [
            { k: 'A · B (내적)',      v: '0.8·0.3 + 0.6·0.9 = 0.78' },
            { k: '‖A‖',                v: '√(0.64+0.36) = 1.000' },
            { k: '‖B‖',                v: '√(0.09+0.81) ≈ 0.949' },
            { k: 'cos(θ)',             v: '0.78 / (1.000 × 0.949) ≈ 0.822' },
          ],
        },
        verdict: '✓ 두 문서 방향이 비교적 유사 (각도 약 35°)',
        code: {
          lang: 'python',
          filename: 'cosine.py',
          lines: [
            '# Step 1. Cosine Similarity — 각도(방향) 비교',
            'import numpy as np',
            '',
            'def cosine_similarity(a: np.ndarray, b: np.ndarray) -> float:',
            '    """두 벡터의 코사인 유사도를 계산.',
            '',
            '    Args:',
            '        a, b: 같은 차원의 1D numpy 배열',
            '    Returns:',
            '        -1 ~ 1 범위의 float (1=동일 방향, 0=직교, -1=반대)',
            '    """',
            '    dot = np.dot(a, b)',
            '    norm_a = np.linalg.norm(a)',
            '    norm_b = np.linalg.norm(b)',
            '    return float(dot / (norm_a * norm_b))',
            '',
            '',
            '# 예: 두 문서 임베딩 (2D로 단순화)',
            'a = np.array([0.8, 0.6])   # "연차 휴가 정책..."',
            'b = np.array([0.3, 0.9])   # "급여 지급일..."',
            '',
            'sim = cosine_similarity(a, b)',

            '',
            '# ─── 핵심 ───',
            '#  • 각도(방향)만 본다 — 벡터 크기에 영향 없음',
            '#  • 문서 길이가 다르더라도 공정하게 비교 가능',
            '#  • RAG 검색에서 가장 널리 쓰이는 기본값',
            '',
            '# 직관: 두 화살표가 같은 방향을 가리키면 1,',

            '',
            '    Args:',

        overlay: 'project',
        result: {
          headline: 'A · B = 0.780',
          rangeLine: '범위: -∞ ~ +∞  ·  값이 클수록 유사',

            { k: 'Aₓ × Bₓ',      v: '0.8 × 0.3 = 0.24' },

            '',
            '```python',
            '# Chroma',
            'collection = client.create_collection(',
            '    name="docs",',
            '    metadata={"hnsw:space": "cosine"},   # l2 / ip 도 가능',
            ')',
            '',
            '# pgvector',
            '# CREATE INDEX ON docs USING hnsw (embedding vector_cosine_ops);',
            '# vector_l2_ops / vector_ip_ops 도 선택 가능',
            '```',
            '',
            '## 한 줄 요약',
            '',
            '> 잘 모르겠으면 **cosine**.',
            '> 속도 최적화가 필요하면 **정규화 + dot(ip)**.',
            '> 클러스터링이면 **L2**.',
          ],
          highlight: [3, 4, 5, 6, 19, 20, 21, 22, 41, 42, 43],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 위: 2D 벡터 공간 SVG
    //   - 항상 두 벡터(A, B)를 그린다
    //   - step.metric 별로 overlay 변경:
    //     · cosine     : 각도 호 + θ 라벨
    //     · l2         : A 끝점 → B 끝점 점선 거리선 + d 라벨
    //     · dot        : A 위로 B 투영 (수선의 발) + 비교용 A·2 벡터
    //     · normalized : 단위원 + â / b̂ 표시
    //     · choice     : 결정 트리 표 (벡터 X)
    // ─────────────────────────────────────────────────────
    function VectorSpace({ overlay }) {
      const W = 320, H = 320;
      const cx = 60, cy = H - 60;     // 원점 (좌하단)
      const scale = 200;              // 1.0 → 200px

      const ax = cx + VEC_A.x * scale, ay = cy - VEC_A.y * scale;
      const bx = cx + VEC_B.x * scale, by = cy - VEC_B.y * scale;
      const a2x = cx + VEC_C.x * scale * 0.7, a2y = cy - VEC_C.y * scale * 0.7;

      // 단위벡터 끝점 (정규화 시각화용)
      const normA = Math.hypot(VEC_A.x, VEC_A.y);
      const normB = Math.hypot(VEC_B.x, VEC_B.y);
      const ahx = cx + (VEC_A.x / normA) * scale;
      const ahy = cy - (VEC_A.y / normA) * scale;
      const bhx = cx + (VEC_B.x / normB) * scale;
      const bhy = cy - (VEC_B.y / normB) * scale;

      // 각도 호 (Cosine)
      const arcR = 38;
      const angleA = Math.atan2(VEC_A.y, VEC_A.x);
      const angleB = Math.atan2(VEC_B.y, VEC_B.x);
      const arcStartX = cx + arcR * Math.cos(angleA);
      const arcStartY = cy - arcR * Math.sin(angleA);
      const arcEndX = cx + arcR * Math.cos(angleB);
      const arcEndY = cy - arcR * Math.sin(angleB);

      // B 를 A 위로 투영 (Dot Product 시각화)
      const dotAB = VEC_A.x * VEC_B.x + VEC_A.y * VEC_B.y;
      const projLen = dotAB / (VEC_A.x * VEC_A.x + VEC_A.y * VEC_A.y);
      const projX = cx + (VEC_A.x * projLen) * scale;
      const projY = cy - (VEC_A.y * projLen) * scale;

      const showVectors = overlay !== 'none';

      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📐</span>
              <span className="text-[11px] font-bold text-rose-800">2D 벡터 공간 — A vs B</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">
              {overlay === 'angle'      ? 'angle θ' :
               overlay === 'line'       ? 'L2 distance' :
               overlay === 'project'    ? 'A onto B' :
               overlay === 'unitcircle' ? 'unit circle' :
               'choice'}
            </span>
          </div>

          {showVectors ? (
            <div className="flex justify-center">
              <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} className="bg-slate-50 rounded border border-slate-200">
                <defs>
                  <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill={VEC_A.color}/>
                  </marker>
                  <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill={VEC_B.color}/>
                  </marker>
                  <marker id="arrA2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185"/>
                  </marker>
                </defs>

                {/* 격자 */}
                {[0.5, 1.0, 1.5].map((t) => (
                  <g key={t}>
                    <line x1={cx + t * scale} y1={20} x2={cx + t * scale} y2={H - 20} stroke="#e2e8f0" strokeWidth="0.5" strokeDasharray="2 3"/>
                    <line x1={20} y1={cy - t * scale} x2={W - 20} y2={cy - t * scale} stroke="#e2e8f0" strokeWidth="0.5" strokeDasharray="2 3"/>
                  </g>
                ))}

                {/* 축 */}
                <line x1={20}   y1={cy} x2={W - 20} y2={cy} stroke="#94a3b8" strokeWidth="1"/>
                <line x1={cx}   y1={20} x2={cx}   y2={H - 20} stroke="#94a3b8" strokeWidth="1"/>
                <text x={W - 30} y={cy + 14} fontSize="9" fill="#64748b" fontFamily="monospace">x</text>
                <text x={cx - 14} y={28}     fontSize="9" fill="#64748b" fontFamily="monospace">y</text>

                {/* 단위원 (Step 4) */}
                {overlay === 'unitcircle' && (
                  <>
                    <circle cx={cx} cy={cy} r={scale} fill="none" stroke="#a78bfa" strokeWidth="1.2" strokeDasharray="4 3"/>
                    <text x={cx + scale + 4} y={cy - 4} fontSize="9" fill="#7c3aed" fontFamily="monospace">‖v‖=1</text>
                  </>
                )}

                {/* 비교용 A·2 (Step 3 — dot product의 크기 영향 시각화) */}
                {overlay === 'project' && (
                  <>
                    <line x1={cx} y1={cy} x2={a2x} y2={a2y} stroke="#fb7185" strokeWidth="2" strokeDasharray="6 4" markerEnd="url(#arrA2)" opacity="0.7"/>
                    <text x={a2x + 4} y={a2y - 4} fontSize="10" fill="#fb7185" fontWeight="bold">A·2</text>
                  </>
                )}

                {/* 정규화 후 단위 화살표 (Step 4) */}
                {overlay === 'unitcircle' && (
                  <>
                    <line x1={cx} y1={cy} x2={ahx} y2={ahy} stroke="#fb7185" strokeWidth="2" strokeDasharray="3 2" opacity="0.85"/>
                    <line x1={cx} y1={cy} x2={bhx} y2={bhy} stroke="#fbbf24" strokeWidth="2" strokeDasharray="3 2" opacity="0.85"/>
                    <circle cx={ahx} cy={ahy} r="3" fill="#fb7185"/>
                    <circle cx={bhx} cy={bhy} r="3" fill="#fbbf24"/>
                    <text x={ahx + 6} y={ahy + 4} fontSize="9" fill="#fb7185" fontWeight="bold">â</text>
                    <text x={bhx + 6} y={bhy + 10} fontSize="9" fill="#d97706" fontWeight="bold">b̂</text>
                  </>
                )}

                {/* 본 벡터 A */}
                <line x1={cx} y1={cy} x2={ax} y2={ay} stroke={VEC_A.color} strokeWidth="3" markerEnd="url(#arrA)"/>
                <text x={ax + 6} y={ay - 4} fontSize="13" fill={VEC_A.color} fontWeight="bold">A</text>

                {/* 본 벡터 B */}
                <line x1={cx} y1={cy} x2={bx} y2={by} stroke={VEC_B.color} strokeWidth="3" markerEnd="url(#arrB)"/>
                <text x={bx + 6} y={by - 4} fontSize="13" fill={VEC_B.color} fontWeight="bold">B</text>

                {/* 각도 호 (Step 1) */}
                {overlay === 'angle' && (
                  <>
                    <path
                      d={`M ${arcStartX} ${arcStartY} A ${arcR} ${arcR} 0 0 0 ${arcEndX} ${arcEndY}`}
                      fill="none"
                      stroke="#e11d48"
                      strokeWidth="2"
                    />
                    <text x={cx + 26} y={cy - 26} fontSize="12" fill="#e11d48" fontWeight="bold">θ</text>
                    <text x={cx + 60} y={cy - 12} fontSize="9" fill="#e11d48" fontFamily="monospace">≈ 35°</text>
                  </>
                )}

                {/* L2 거리선 (Step 2) */}
                {overlay === 'line' && (
                  <>
                    <line x1={ax} y1={ay} x2={bx} y2={by} stroke="#3b82f6" strokeWidth="2.5" strokeDasharray="6 4"/>
                    <circle cx={ax} cy={ay} r="4" fill="#3b82f6"/>
                    <circle cx={bx} cy={by} r="4" fill="#3b82f6"/>
                    <text x={(ax + bx) / 2 + 6} y={(ay + by) / 2 - 4} fontSize="11" fill="#1d4ed8" fontWeight="bold">d ≈ 0.583</text>
                  </>
                )}

                {/* 투영선 (Step 3 — A 위로 B 투영) */}
                {overlay === 'project' && (
                  <>
                    <line x1={bx} y1={by} x2={projX} y2={projY} stroke="#0ea5e9" strokeWidth="1.5" strokeDasharray="4 3"/>
                    <circle cx={projX} cy={projY} r="4" fill="#0ea5e9"/>
                    <text x={projX + 6} y={projY - 4} fontSize="9" fill="#0369a1" fontWeight="bold">B의 A 투영</text>
                    <text x={cx + 6} y={cy - 6} fontSize="9" fill="#64748b" fontFamily="monospace">A·B = ‖A‖·(B의 A투영)</text>
                  </>
                )}

                {/* 좌표 라벨 */}
                <text x={W - 86} y={H - 8} fontSize="9" fill={VEC_A.color} fontFamily="monospace">A=[{VEC_A.x},{VEC_A.y}]</text>
                <text x={W - 86} y={H - 24} fontSize="9" fill={VEC_B.color} fontFamily="monospace">B=[{VEC_B.x},{VEC_B.y}]</text>
              </svg>
            </div>
          ) : (
            <DecisionTree />
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 5: 결정 트리 (벡터 시각화 대신)
    // ─────────────────────────────────────────────────────
    function DecisionTree() {
      const rows = [
        { q: '임베딩 모델이 정규화돼 있나?', y: 'cosine ≡ dot — 가장 빠르게 같은 답', n: '↓ 다음 질문' },
        { q: 'L2 metric 으로 학습된 모델인가?', y: 'L2 사용 (모델 카드 확인)', n: '↓ 다음 질문' },
        { q: '의미 검색(RAG)인가?', y: 'cosine (기본값)', n: '↓ 다음 질문' },
        { q: '크기를 신호로 보고 싶나? (추천)', y: 'raw dot product', n: 'L2 (클러스터링 등)' },
      ];
      return (
        <div className="bg-rose-50 rounded border-2 border-rose-200 p-3 space-y-2">
          <div className="text-[10px] font-bold text-rose-800 text-center mb-1">
            🌳 결정 트리 — 어떤 metric을 쓸까?
          </div>
          {rows.map((r, i) => (
            <div key={i} className="bg-white rounded border border-rose-200 p-2">
              <div className="text-[10px] font-bold text-slate-700 mb-1">{i + 1}. {r.q}</div>
              <div className="grid grid-cols-2 gap-1.5 text-[9px]">
                <div className="bg-emerald-50 border border-emerald-200 rounded px-1.5 py-1">
                  <span className="font-bold text-emerald-700">YES </span>
                  <span className="text-emerald-900">{r.y}</span>
                </div>
                <div className="bg-slate-50 border border-slate-200 rounded px-1.5 py-1 text-slate-600 font-mono">
                  {r.n}
                </div>
              </div>
            </div>
          ))}
          <div className="text-[9px] text-rose-700 text-center pt-1 border-t border-rose-200">
            ✨ 헷갈리면 <b>cosine</b>. 속도 필요하면 <b>정규화 + dot</b>.
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: metric 결과 카드
    //   step.result 를 표 형태로 표시
    // ─────────────────────────────────────────────────────
    function MetricResult({ result, verdict, metric }) {
      const tone =
        metric === 'cosine'     ? { bg: 'bg-rose-50',   border: 'border-rose-300',   text: 'text-rose-800',   chip: 'bg-rose-600' } :
        metric === 'l2'         ? { bg: 'bg-blue-50',   border: 'border-blue-300',   text: 'text-blue-800',   chip: 'bg-blue-600' } :
        metric === 'dot'        ? { bg: 'bg-amber-50',  border: 'border-amber-300',  text: 'text-amber-800',  chip: 'bg-amber-600' } :
        metric === 'normalized' ? { bg: 'bg-violet-50', border: 'border-violet-300', text: 'text-violet-800', chip: 'bg-violet-600' } :
                                  { bg: 'bg-emerald-50',border: 'border-emerald-300',text: 'text-emerald-800',chip: 'bg-emerald-600' };

      return (
        <div className={`${tone.bg} border-2 ${tone.border} rounded-lg p-3`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📊</span>
              <span className={`text-[11px] font-bold ${tone.text}`}>{result.headline}</span>
            </div>
            <span className={`text-[9px] ${tone.chip} text-white px-1.5 py-0.5 rounded font-mono font-bold uppercase`}>
              {metric}
            </span>
          </div>

          <div className="bg-white rounded border border-slate-200 p-2 mb-2">
            <div className="text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1">Formula</div>
            <div className="text-[11px] font-mono text-slate-800">{result.formula}</div>
            <div className="text-[9px] text-slate-500 mt-1">{result.rangeLine}</div>
          </div>

          <div className="bg-white rounded border border-slate-200 p-2 mb-2">
            <div className="text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1">Step-by-step</div>
            <div className="space-y-1">
              {result.steps.map((s, i) => (
                <div key={i} className="flex items-baseline gap-2 text-[10px] font-mono">
                  <span className="text-slate-500 w-28 flex-shrink-0 truncate">{s.k}</span>
                  <span className="text-slate-900 font-bold flex-1">{s.v}</span>
                </div>
              ))}
            </div>
          </div>

          <div className={`text-[10px] ${tone.text} font-medium leading-snug`}>
            {verdict}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📐 유사도 metric — 3종 비교</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <VectorSpace overlay={step.overlay} />
            <MetricResult result={step.result} verdict={step.verdict} metric={step.metric} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded" style={{ background: VEC_A.color }}></span>vector A
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded" style={{ background: VEC_B.color }}></span>vector B
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-600"></span>cosine
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-blue-500"></span>L2
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>dot
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-violet-500"></span>normalized
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Embedding &amp; Vector Store &gt; Chapter 1. Embedding</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-1-3. 유사도 측정 — Cosine / L2 / Inner Product</h1>
                  <p className="text-sm text-slate-500 mt-0.5">"비슷하다"를 정의하는 3가지 metric — 각도 / 거리 / 크기·방향</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: <strong>cosine</strong>은 방향, <strong>L2</strong>는 거리, <strong>dot</strong>은 방향+크기. 정규화된 임베딩(OpenAI 등)에서는 dot ≡ cosine이 되어 가장 빠르게 같은 답을 얻는다. 다음(III-2-1)에서는 이 metric으로 ANN 검색을 빠르게 만드는 방법을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Cosine Similarity', 'L2 Distance', 'Inner Product', 'Normalization', 'unit vector', 'metric consistency'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-1-2.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; III-1-2 Embedding 모델 비교</a>
              <a href="./III-2-1.html" className="text-rose-700 hover:text-rose-900 font-medium">III-2-1 Vector Store ANN 검색 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
