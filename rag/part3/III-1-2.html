<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — III-1-2. Embedding 모델 비교</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const MODELS = [
      {
        name: 'OpenAI text-embedding-3-small',
        provider: 'OpenAI',
        dims: 1536,
        cost: '$0.02/1M tokens',
        multilang: 4,
        performance: 4,
        costScore: 4,
        selfHost: false,
        pros: ['API 간편', '안정적 성능', '합리적 비용'],
        cons: ['API 의존', '데이터 외부 전송'],
        color: 'bg-green-50 border-green-300'
      },
      {
        name: 'OpenAI text-embedding-3-large',
        provider: 'OpenAI',
        dims: 3072,
        cost: '$0.13/1M tokens',
        multilang: 5,
        performance: 5,
        costScore: 2,
        selfHost: false,
        pros: ['최고 성능', '다국어 우수', '차원 조절 가능'],
        cons: ['비용 높음', 'API 의존'],
        color: 'bg-blue-50 border-blue-300'
      },
      {
        name: 'Cohere embed-v3',
        provider: 'Cohere',
        dims: 1024,
        cost: '$0.10/1M tokens',
        multilang: 5,
        performance: 4,
        costScore: 3,
        selfHost: false,
        pros: ['검색 특화', '다국어 강점', 'int8 압축 지원'],
        cons: ['비용 중간', 'OpenAI보다 생태계 작음'],
        color: 'bg-purple-50 border-purple-300'
      },
      {
        name: 'BGE-M3 (BAAI)',
        provider: 'BAAI',
        dims: 1024,
        cost: '무료 (셀프호스팅)',
        multilang: 5,
        performance: 4,
        costScore: 5,
        selfHost: true,
        pros: ['무료', '셀프호스팅', '다국어 최강', '데이터 보안'],
        cons: ['GPU 인프라 필요', '운영 부담'],
        color: 'bg-amber-50 border-amber-300'
      },
    ];

    const RADAR_AXES = [
      { key: 'performance', label: '성능' },
      { key: 'costScore', label: '비용효율' },
      { key: 'multilang', label: '다국어' },
    ];

    const STEPS = [
      {
        desc: "Embedding 모델 선택은 카메라 렌즈 선택과 같습니다. 광각 렌즈(범용), 망원 렌즈(고성능), 매크로 렌즈(특화) — 목적에 맞는 선택이 중요합니다.",
        activeModel: -1, showRadar: false, showCode: false
      },
      {
        desc: "[OpenAI] text-embedding-3-small/large — API 기반으로 가장 쉽게 시작할 수 있습니다. small은 비용 효율적, large는 최고 성능. 대부분의 프로젝트에서 첫 선택지입니다.",
        activeModel: 0, showRadar: false, showCode: true
      },
      {
        desc: "[Cohere] embed-v3 — 검색에 특화된 모델입니다. 'search_query'와 'search_document' 타입을 구분해서 비대칭 검색에 강합니다. 다국어 성능도 우수합니다.",
        activeModel: 2, showRadar: false, showCode: true
      },
      {
        desc: "[BGE-M3] BAAI에서 만든 오픈소스 모델입니다. 셀프호스팅이 가능해서 데이터가 외부로 나가지 않습니다. 100개 이상 언어 지원. GPU가 있다면 비용 0원.",
        activeModel: 3, showRadar: false, showCode: true
      },
      {
        desc: "모델 선택 가이드: 빠르게 시작 → OpenAI small, 최고 품질 → OpenAI large, 데이터 보안 필수 → BGE-M3 셀프호스팅, 검색 특화 → Cohere embed-v3.",
        activeModel: -1, showRadar: true, showCode: false
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const radarSize = 120;
      const radarCenter = radarSize;
      const radarRadius = radarSize - 20;

      function getRadarPoint(axisIndex, value, totalAxes) {
        const angle = (Math.PI * 2 * axisIndex) / totalAxes - Math.PI / 2;
        const r = (value / 5) * radarRadius;
        return { x: radarCenter + r * Math.cos(angle), y: radarCenter + r * Math.sin(angle) };
      }

      const radarColors = ['#22c55e', '#3b82f6', '#a855f7', '#f59e0b'];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-purple-700 hover:text-purple-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Embedding & Vector Store &gt; Chapter 1. Embedding</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-1-2. Embedding 모델 비교</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>카메라 렌즈 선택</b>처럼, 목적에 맞는 Embedding 모델을 골라야 합니다. 성능, 비용, 다국어 지원, API/셀프호스팅 — 4가지 기준으로 비교합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-purple-700 border-purple-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">모델 비교</h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="space-y-4">
                {s.showRadar ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">성능/비용/다국어 비교</div>
                    <div className="flex justify-center">
                      <svg width={radarCenter * 2} height={radarCenter * 2} viewBox={`0 0 ${radarCenter * 2} ${radarCenter * 2}`}>
                        {[1,2,3,4,5].map(level => {
                          const points = RADAR_AXES.map((_, i) => getRadarPoint(i, level, RADAR_AXES.length));
                          return <polygon key={level} points={points.map(p => `${p.x},${p.y}`).join(' ')} fill="none" stroke="#e2e8f0" strokeWidth="1" />;
                        })}
                        {RADAR_AXES.map((axis, i) => {
                          const end = getRadarPoint(i, 5, RADAR_AXES.length);
                          const labelPos = getRadarPoint(i, 6, RADAR_AXES.length);
                          return (
                            <g key={i}>
                              <line x1={radarCenter} y1={radarCenter} x2={end.x} y2={end.y} stroke="#cbd5e1" strokeWidth="1" />
                              <text x={labelPos.x} y={labelPos.y} textAnchor="middle" dominantBaseline="middle" fontSize="11" fill="#64748b" fontWeight="bold">{axis.label}</text>
                            </g>
                          );
                        })}
                        {MODELS.map((model, mi) => {
                          const points = RADAR_AXES.map((axis, i) => getRadarPoint(i, model[axis.key], RADAR_AXES.length));
                          return (
                            <polygon key={mi} points={points.map(p => `${p.x},${p.y}`).join(' ')} fill={radarColors[mi]} fillOpacity="0.15" stroke={radarColors[mi]} strokeWidth="2" />
                          );
                        })}
                      </svg>
                    </div>
                    <div className="flex flex-wrap gap-2 justify-center mt-2">
                      {MODELS.map((m, i) => (
                        <div key={i} className="flex items-center gap-1 text-[10px]">
                          <div className="w-3 h-3 rounded-full" style={{backgroundColor: radarColors[i]}}></div>
                          <span className="text-slate-600">{m.provider}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">모델 목록</div>
                    <div className="space-y-2">
                      {MODELS.map((m, i) => {
                        const isActive = s.activeModel === i || s.activeModel === -1;
                        return (
                          <div key={i} className={`p-3 rounded-lg border-2 transition-all duration-500 ${isActive ? m.color + (s.activeModel === i ? ' scale-105 shadow-md' : '') : 'bg-slate-50 border-slate-100 opacity-30'}`}>
                            <div className="flex items-center justify-between mb-1">
                              <span className="font-bold text-sm">{m.name}</span>
                              <span className="text-[10px] bg-slate-200 px-1.5 py-0.5 rounded text-slate-600">{m.dims}d</span>
                            </div>
                            <div className="flex items-center gap-2 text-[10px]">
                              <span className="text-slate-500">{m.cost}</span>
                              <span>{m.selfHost ? '\uD83C\uDFE0 셀프호스팅' : '\u2601\uFE0F API'}</span>
                            </div>
                            {s.activeModel === i && (
                              <div className="mt-2 grid grid-cols-2 gap-2 text-xs">
                                <div>
                                  <div className="font-bold text-green-700 mb-1">장점</div>
                                  {m.pros.map((p, j) => <div key={j} className="text-green-600">+ {p}</div>)}
                                </div>
                                <div>
                                  <div className="font-bold text-red-700 mb-1">단점</div>
                                  {m.cons.map((c, j) => <div key={j} className="text-red-600">- {c}</div>)}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-purple-600 uppercase tracking-wider mb-4">
                  {s.showCode ? '코드 예시' : '선택 가이드'}
                </div>
                {s.showCode ? (
                  <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{
                    s.activeModel === 0 ?
`from langchain_openai import OpenAIEmbeddings

# OpenAI text-embedding-3-small
embeddings = OpenAIEmbeddings(
    model="text-embedding-3-small"
)

# 텍스트 → 1536차원 벡터
vector = embeddings.embed_query(
    "연차 휴가 정책을 알려주세요"
)
print(len(vector))  # 1536

# 차원 축소도 가능 (비용 절감)
embeddings_small = OpenAIEmbeddings(
    model="text-embedding-3-small",
    dimensions=512  # 1536 → 512로 축소
)` :
                    s.activeModel === 2 ?
`from langchain_cohere import CohereEmbeddings

# Cohere embed-v3
embeddings = CohereEmbeddings(
    model="embed-multilingual-v3.0"
)

# 검색 쿼리용
query_vec = embeddings.embed_query(
    "연차 휴가 정책"
)

# 문서 인덱싱용
doc_vecs = embeddings.embed_documents([
    "1년 이상 근속 시 15일 연차 부여",
    "급여는 매월 25일 지급"
])

# Cohere는 query/document 타입을 구분해서
# 비대칭 검색에 강합니다` :
`from langchain_community.embeddings import (
    HuggingFaceBgeEmbeddings
)

# BGE-M3 셀프호스팅
embeddings = HuggingFaceBgeEmbeddings(
    model_name="BAAI/bge-m3",
    model_kwargs={"device": "cuda"},
    encode_kwargs={
        "normalize_embeddings": True
    }
)

# 외부 API 호출 없이 로컬에서 처리
vector = embeddings.embed_query(
    "연차 휴가 정책을 알려주세요"
)
print(len(vector))  # 1024

# 장점: 무료, 데이터 외부 전송 없음
# 단점: GPU 필요 (최소 8GB VRAM)`
                  }</pre>
                ) : s.showRadar ? (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-purple-50 border border-purple-200">
                      <div className="font-bold text-sm text-purple-800 mb-3">상황별 추천</div>
                      <div className="space-y-2 text-xs text-purple-700">
                        <div className="p-2 bg-white rounded border">
                          <b>빠르게 프로토타입</b>
                          <div className="text-slate-500 mt-0.5">→ OpenAI small (API 키만 있으면 됨)</div>
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>프로덕션 최고 품질</b>
                          <div className="text-slate-500 mt-0.5">→ OpenAI large 또는 Cohere v3</div>
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>데이터 보안 필수 (금융/의료)</b>
                          <div className="text-slate-500 mt-0.5">→ BGE-M3 셀프호스팅</div>
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>다국어 검색</b>
                          <div className="text-slate-500 mt-0.5">→ BGE-M3 또는 Cohere v3</div>
                        </div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-3">비교 테이블</div>
                      <div className="overflow-x-auto">
                        <table className="w-full text-xs">
                          <thead>
                            <tr className="border-b">
                              <th className="text-left p-1 text-slate-500">기준</th>
                              {MODELS.map((m, i) => <th key={i} className="text-center p-1 text-slate-500">{m.provider}</th>)}
                            </tr>
                          </thead>
                          <tbody>
                            <tr className="border-b">
                              <td className="p-1 font-bold">차원</td>
                              {MODELS.map((m, i) => <td key={i} className="text-center p-1">{m.dims}</td>)}
                            </tr>
                            <tr className="border-b">
                              <td className="p-1 font-bold">성능</td>
                              {MODELS.map((m, i) => <td key={i} className="text-center p-1">{'*'.repeat(m.performance)}</td>)}
                            </tr>
                            <tr className="border-b">
                              <td className="p-1 font-bold">다국어</td>
                              {MODELS.map((m, i) => <td key={i} className="text-center p-1">{'*'.repeat(m.multilang)}</td>)}
                            </tr>
                            <tr>
                              <td className="p-1 font-bold">호스팅</td>
                              {MODELS.map((m, i) => <td key={i} className="text-center p-1">{m.selfHost ? '\uD83C\uDFE0' : '\u2601\uFE0F'}</td>)}
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    </div>
                    <div className="p-3 bg-amber-50 rounded-lg border border-amber-200 text-xs text-amber-800">
                      <b>주의:</b> Embedding 모델을 바꾸면 모든 벡터를 재생성해야 합니다. 초기 선택이 중요합니다.
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['OpenAI', 'Cohere', 'BGE-M3', '\uB2E4\uAD6D\uC5B4', '\uC140\uD504\uD638\uC2A4\uD305'].map(kw => (
                <span key={kw} className="bg-purple-50 text-purple-700 px-3 py-1 rounded-full text-sm font-medium border border-purple-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-purple-600 hover:bg-purple-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./III-1-1.html" className="text-purple-600 hover:text-purple-800 font-medium">&larr; III-1-1. Embedding이란</a>
              <a href="./III-1-3.html" className="text-purple-600 hover:text-purple-800 font-medium">III-1-3. 유사도 측정 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
