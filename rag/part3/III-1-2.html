                    <div className="flex items-center gap-1.5">
                      <span className="text-xs">{m.hostingIcon}</span>
                      <span className={`text-[11px] font-bold ${isActive ? 'text-rose-900' : 'text-slate-700'}`}>
                        {m.name}
                      </span>
                    </div>
                    <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
                      isActive ? 'bg-rose-600 text-white' : 'bg-slate-200 text-slate-600'
                    }`}>
                      {m.dims}d
                    </span>
                  </div>

                  {/* 메타 4 칸 — 제공자 / MTEB / 비용 / 속도 */}
                  <div className="grid grid-cols-4 gap-1 text-[9px] mb-1">
                    <div className="bg-white border border-slate-200 rounded px-1 py-0.5 text-center">
                      <div className="text-slate-400 uppercase tracking-wider text-[8px]">provider</div>
                      <div className="font-bold text-slate-700">{m.provider}</div>
                    </div>
                    <div className="bg-white border border-slate-200 rounded px-1 py-0.5 text-center">
                      <div className="text-slate-400 uppercase tracking-wider text-[8px]">MTEB</div>
                      <div className="font-bold text-rose-700 font-mono">{m.mteb}</div>
                    </div>
                    <div className="bg-white border border-slate-200 rounded px-1 py-0.5 text-center">
                      <div className="text-slate-400 uppercase tracking-wider text-[8px]">cost</div>
                      <div className="font-bold text-slate-700 font-mono">{m.costPerM === 0 ? '$0' : `$${m.costPerM}`}</div>
                    </div>
                    <div className="bg-white border border-slate-200 rounded px-1 py-0.5 text-center">
                      <div className="text-slate-400 uppercase tracking-wider text-[8px]">speed</div>
                      <div className="font-bold text-slate-700 font-mono">{m.speedLabel}</div>
                    </div>
                  </div>

                  {/* 활성 카드만 한 줄 tagline + 장단점 */}
                  {isActive && (
                    <>
                      <div className="text-[10px] italic text-rose-700 mb-1.5">"{m.tagline}"</div>
                      <div className="grid grid-cols-2 gap-1.5 text-[9px]">
                        <div className="bg-white border border-emerald-200 rounded p-1">
                          <div className="font-bold text-emerald-700 mb-0.5 uppercase tracking-wider text-[8px]">장점</div>
                          {m.pros.map((p, i) => (
                            <div key={i} className="text-emerald-700 leading-tight">+ {p}</div>
                          ))}
                        </div>
                        <div className="bg-white border border-red-200 rounded p-1">
                          <div className="font-bold text-red-700 mb-0.5 uppercase tracking-wider text-[8px]">단점</div>
                          {m.cons.map((c, i) => (
                            <div key={i} className="text-red-700 leading-tight">- {c}</div>
                          ))}
                        </div>
                      </div>
                    </>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: MTEB 벤치마크 막대 차트
    //   showCompare === true 일 때 4 모델 모두 동시 막대로 표시
    //   그 외 단계에서는 활성 모델만 강조
    // ─────────────────────────────────────────────────────
    function MtebChart({ activeKey, showCompare }) {
      const max = 70;  // MTEB 0~70 스케일
      return (
        <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📊</span>
              <span className="text-[11px] font-bold text-rose-800">MTEB 벤치마크 — 56 task 평균</span>
            </div>
            <span className="text-[9px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
              {showCompare ? '전체 비교' : 'live ranking'}
            </span>
          </div>

          <div className="bg-white rounded border border-rose-200 p-2 space-y-1.5">
            {MODELS.map((m) => {
              const isActive = activeKey === m.key;
              const isDimmed = !showCompare && activeKey !== null && !isActive;
              const pct = (m.mteb / max) * 100;

              let barClass = 'bg-slate-300';
              if (showCompare) {
                // 전체 비교: 모델별 색상 다르게
                barClass =
                  m.key === 'openai' ? 'bg-emerald-500' :
                  m.key === 'bge' ? 'bg-amber-500' :
                  m.key === 'e5' ? 'bg-rose-500' :
                  'bg-blue-500';
              } else if (isActive) {
                barClass = 'bg-rose-500';
              } else if (isDimmed) {
                barClass = 'bg-slate-200';
              }

              return (
                <div key={m.key} className={`flex items-center gap-2 text-[9px] ${isDimmed ? 'opacity-50' : ''}`}>
                  <div className="w-24 truncate font-mono text-slate-600">{m.provider}</div>
                  <div className="flex-1 bg-slate-100 rounded h-4 relative overflow-hidden">
                    <div
                      className={`h-full ${barClass} transition-all duration-700 flex items-center justify-end px-1.5`}
                      style={{ width: `${pct}%` }}
                    >
                      <span className="text-white text-[9px] font-bold font-mono">{m.mteb}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {showCompare && (
            <div className="mt-2 grid grid-cols-2 gap-1 text-[9px]">
              <div className="bg-white border border-rose-200 rounded p-1.5">
                <div className="font-bold text-rose-700 mb-0.5">🏆 1위 — E5-mistral 66.6</div>
                <div className="text-slate-600 leading-tight">4096d, 100+ 언어. 단 240ms 느림</div>
              </div>
              <div className="bg-white border border-rose-200 rounded p-1.5">
                <div className="font-bold text-rose-700 mb-0.5">💰 가성비 — OpenAI small 62.3</div>
                <div className="text-slate-600 leading-tight">$0.02 / 35ms 빠름. 첫 선택지</div>
              </div>
            </div>
          )}

          <div className="text-[9px] text-rose-700 mt-1.5 leading-tight">
            * MTEB = Massive Text Embedding Benchmark. 분류·검색·STS 등 56개 task 평균
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널
    //   상단: 4 모델 카드 / 하단: MTEB 막대
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📷 Embedding 모델 비교 — 4종</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <ModelCards activeKey={step.activeKey} />
            <MtebChart activeKey={step.activeKey} showCompare={step.showCompare} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>OpenAI
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>BGE
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>E5-mistral
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-blue-500"></span>Cohere
            </span>
            <span className="flex items-center gap-1 ml-auto">☁️ API · 🏠 self-host</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    //   - 윈도우 dot + 파일명 탭
    //   - 라인 번호 + 강조 라인 (rose-500/15)
    //   - 푸터: 라인 수 + Step 진행도
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    //   - stepIdx / isPlaying 상태
    //   - 자동재생 3000ms + 키보드 ←/→ + 4 버튼
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Embedding &amp; Vector Store &gt; Chapter 1. Embedding</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-1-2. Embedding 모델 비교 — OpenAI / BGE / E5 / Cohere</h1>
                  <p className="text-sm text-slate-500 mt-0.5">카메라 렌즈 4종 — 차원 · MTEB · 비용 · 속도 4축으로 고른다</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: 빠른 시작은 <strong>OpenAI small</strong>, 최고 정확도는 <strong>E5-mistral</strong>, 데이터 보안은 <strong>BGE</strong>, 검색 품질은 <strong>Cohere</strong>. 모델 변경 시 모든 벡터 재생성 필요 — 초기 선택이 중요하다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['OpenAI', 'BGE', 'E5-mistral', 'Cohere', 'MTEB', '셀프호스팅', '다국어'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-1-1.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; III-1-1. Embedding이란</a>
              <a href="./III-1-3.html" className="text-rose-700 hover:text-rose-900 font-medium">III-1-3. 유사도 측정 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
