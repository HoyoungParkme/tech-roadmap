            {/* 평행사변형 화살표 (Step 1) */}
            {showArrow && (
              <svg className="absolute inset-0 w-full h-full pointer-events-none" preserveAspectRatio="none" viewBox="0 0 100 100">
                <defs>
                  <marker id="arrow-rose" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#e11d48" /></marker>
                </defs>
                <line x1={WORD_DB.king.x} y1={WORD_DB.king.y} x2={WORD_DB.queen.x} y2={WORD_DB.queen.y} stroke="#e11d48" strokeWidth="0.5" strokeDasharray="1.5,1" markerEnd="url(#arrow-rose)" opacity="0.7" />
                <line x1={WORD_DB.man.x} y1={WORD_DB.man.y} x2={WORD_DB.woman.x} y2={WORD_DB.woman.y} stroke="#2563eb" strokeWidth="0.5" strokeDasharray="1.5,1" markerEnd="url(#arrow-rose)" opacity="0.7" />
                <line x1={WORD_DB.king.x} y1={WORD_DB.king.y} x2={WORD_DB.man.x} y2={WORD_DB.man.y} stroke="#94a3b8" strokeWidth="0.3" strokeDasharray="0.8,0.8" />
                <line x1={WORD_DB.queen.x} y1={WORD_DB.queen.y} x2={WORD_DB.woman.x} y2={WORD_DB.woman.y} stroke="#94a3b8" strokeWidth="0.3" strokeDasharray="0.8,0.8" />
              </svg>
            )}

            {/* 단어 점 + 라벨 */}
            {Object.entries(WORD_DB).map(([key, w]) => {
              const isActive = activeWords.includes(key);
              const isHl = highlight.includes(key);
              return (
                <div key={key} className="absolute transition-all duration-700"
                     style={{ left: `${w.x}%`, top: `${w.y}%`, transform: 'translate(-50%, -50%)', opacity: isActive ? 1 : 0.18 }}>
                  <div className="flex flex-col items-center">
                    <div className={`rounded-full shadow-md border-2 border-white ${isHl ? 'animate-pulse' : ''}`}
                         style={{ backgroundColor: w.color, width: isHl ? '14px' : '10px', height: isHl ? '14px' : '10px' }}></div>
                    <span className="text-[10px] font-bold mt-0.5 bg-white/80 px-1 rounded" style={{ color: w.color }}>{w.text}</span>
                  </div>
                </div>
              );
            })}

            {/* 범례 */}
            <div className="absolute top-1.5 right-1.5 bg-white/90 rounded p-1.5 border border-slate-200 space-y-0.5">
              <div className="text-[8px] font-bold text-slate-600 uppercase tracking-wider mb-0.5">cluster</div>
              <div className="flex items-center gap-1 text-[9px]"><div className="w-2 h-2 rounded-full" style={{background: '#e11d48'}}></div><span>왕족</span></div>
              <div className="flex items-center gap-1 text-[9px]"><div className="w-2 h-2 rounded-full" style={{background: '#2563eb'}}></div><span>일반인</span></div>
              <div className="flex items-center gap-1 text-[9px]"><div className="w-2 h-2 rounded-full" style={{background: '#f59e0b'}}></div><span>동물</span></div>
              <div className="flex items-center gap-1 text-[9px]"><div className="w-2 h-2 rounded-full" style={{background: '#16a34a'}}></div><span>과일</span></div>
            </div>
          </div>

          {info && (
            <div className="mt-2 p-2 bg-rose-50 rounded border border-rose-200 text-[10px] text-rose-800 leading-snug">
              <span className="font-bold">▶</span> {info}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 시각화 2) 텍스트 → 1536차원 벡터 변환 박스
    //   Step 2 (문장) / Step 3 (차원) 공통
    //   variant: 'sentence' | 'dim'
    // ─────────────────────────────────────────────────────
    function VectorBox({ variant, info }) {
      const samples = variant === 'sentence' ? [
        { text: '연차 휴가는 며칠인가요?', dims: 1536, vec: '[0.012, -0.034, 0.071, -0.018, 0.045, ...]', tag: 'query' },
        { text: '연차는 입사 1년 후 15일 부여됩니다.', dims: 1536, vec: '[0.018, -0.029, 0.066, -0.021, 0.041, ...]', tag: 'doc-1 (정답)' },
        { text: '오늘 점심은 김치찌개였다.', dims: 1536, vec: '[-0.082, 0.117, -0.005, 0.043, -0.198, ...]', tag: 'doc-2 (무관)' },
      ] : [
        { text: '연차 정책', dims: 384,  vec: '[0.21, -0.41, ...]', tag: 'BGE-small  ·  가벼움' },
        { text: '연차 정책', dims: 768,  vec: '[0.18, -0.39, 0.04, ...]', tag: 'BGE-base  ·  균형' },
        { text: '연차 정책', dims: 1536, vec: '[0.21, -0.39, 0.07, -0.02, ...]', tag: 'OpenAI 3-small  ·  표준' },
        { text: '연차 정책', dims: 3072, vec: '[0.21, -0.39, 0.07, -0.02, 0.11, ...]', tag: 'OpenAI 3-large  ·  정밀' },
      ];

      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">{variant === 'sentence' ? '📝' : '📐'}</span>
              <span className="text-[11px] font-bold text-rose-800">
                {variant === 'sentence' ? '문장 → 1536차원 벡터' : '모델별 차원 비교'}
              </span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">
              {variant === 'sentence' ? 'embed_query' : 'dim ↑'}
            </span>
          </div>

          <div className="space-y-2">
            {samples.map((s, i) => {
              const isPrimary = variant === 'sentence' ? i === 0 : s.dims === 1536;
              return (
                <div
                  key={i}
                  className={`rounded-lg border p-2 transition-all ${
                    isPrimary ? 'bg-rose-50 border-rose-300 shadow-sm' : 'bg-slate-50 border-slate-200'
                  }`}
                >
                  <div className="flex items-center justify-between mb-1">
                    <span className={`text-[10px] font-bold ${isPrimary ? 'text-rose-700' : 'text-slate-600'}`}>
                      "{s.text}"
                    </span>
                    <span className={`text-[9px] font-mono px-1.5 py-0.5 rounded ${
                      isPrimary ? 'bg-rose-600 text-white' : 'bg-slate-300 text-slate-700'
                    }`}>
                      {s.dims}d · {s.tag}
                    </span>
                  </div>
                  <div className="text-[9px] font-mono text-slate-600 bg-white px-1.5 py-1 rounded border border-slate-100 truncate">
                    {s.vec}
                  </div>

                  {/* 차원을 막대로 시각화 (dim 모드) */}
                  {variant === 'dim' && (
                    <div className="mt-1.5 flex items-center gap-1.5">
                      <div className="flex-1 bg-slate-200 rounded-full h-1.5 overflow-hidden">
                        <div
                          className="h-full bg-gradient-to-r from-rose-400 to-rose-600 transition-all duration-700"
                          style={{ width: `${(s.dims / 3072) * 100}%` }}
                        ></div>
                      </div>
                      <span className="text-[8px] text-slate-500 font-mono w-12 text-right">{s.dims}d</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {variant === 'sentence' && (
            <div className="mt-2 p-2 bg-amber-50 rounded border border-amber-200 text-[10px] text-amber-800 leading-snug">
              <span className="font-bold">cosine sim:</span> q ↔ doc-1 = <b>0.78</b> (높음) · q ↔ doc-2 = <b>0.11</b> (낮음)
            </div>
          )}
          {variant === 'dim' && (
            <div className="mt-2 p-2 bg-amber-50 rounded border border-amber-200 text-[10px] text-amber-800 leading-snug">
              <span className="font-bold">trade-off:</span> 차원 ×4 → 저장/검색 비용도 ×4. PoC 는 1536d 가 표준.
            </div>
          )}

          {info && (
            <div className="mt-2 p-2 bg-rose-50 rounded border border-rose-200 text-[10px] text-rose-800 leading-snug">
              <span className="font-bold">▶</span> {info}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 시각화 3) 정규화 — 같은 방향 다른 길이 두 벡터 → 단위벡터
    // ─────────────────────────────────────────────────────
    function NormalizeBox({ info }) {
      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📏</span>
              <span className="text-[11px] font-bold text-rose-800">unit norm 정규화 (cosine vs L2)</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">
              ‖v‖ = 1
            </span>
          </div>

          {/* 좌: 정규화 전 / 우: 정규화 후 */}
          <div className="grid grid-cols-2 gap-2">
            {[
              { title: '정규화 전 (raw)', kind: 'raw', cos: '1.00', l2: '5.00', alert: 'L2=5 ≠ 0 ❌', l2Class: 'bg-red-50 border-red-200 text-red-700', alertClass: 'text-red-600' },
              { title: '정규화 후 (unit)', kind: 'norm', cos: '1.00', l2: '0.00', alert: '둘 다 일치 ✓', l2Class: 'bg-emerald-50 border-emerald-200 text-emerald-800', alertClass: 'text-emerald-700' },
            ].map((side) => {
              const vA = NORM_VECTORS.vA[side.kind];
              const vB = NORM_VECTORS.vB[side.kind];
              return (
                <div key={side.kind} className="bg-slate-50 rounded-lg border border-slate-200 p-2">
                  <div className="text-[10px] font-bold text-slate-700 mb-1.5 text-center">{side.title}</div>
                  <div className="relative w-full h-[140px] bg-white rounded border border-slate-200">
                    <div className="absolute left-3 top-0 w-px h-full bg-slate-300"></div>
                    <div className="absolute bottom-3 left-0 w-full h-px bg-slate-300"></div>
                    <div className="absolute left-1 bottom-1 text-[8px] text-slate-400 font-mono">0</div>
                    <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none" viewBox="0 0 100 100">
                      <defs>
                        <marker id={`arr-${side.kind}-A`} viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0L10 5L0 10z" fill={NORM_VECTORS.vA.color} /></marker>
                        <marker id={`arr-${side.kind}-B`} viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0L10 5L0 10z" fill={NORM_VECTORS.vB.color} /></marker>
                      </defs>
                      {side.kind === 'norm' && <circle cx="3" cy="97" r="60" fill="none" stroke="#fbbf24" strokeWidth="0.4" strokeDasharray="1.5,1" />}
                      <line x1="3" y1="97" x2={3 + vA.x} y2={97 - vA.y} stroke={NORM_VECTORS.vA.color} strokeWidth="1.2" markerEnd={`url(#arr-${side.kind}-A)`} />
                      <line x1="3" y1="97" x2={3 + vB.x} y2={97 - vB.y} stroke={NORM_VECTORS.vB.color} strokeWidth="1.2" markerEnd={`url(#arr-${side.kind}-B)`} strokeDasharray={side.kind === 'raw' ? '0' : '1.5,1'} />
                    </svg>
                    <div className="absolute top-1 right-1 space-y-0.5">
                      <div className="text-[8px] font-mono px-1 rounded text-white" style={{background: NORM_VECTORS.vA.color}}>doc-A</div>
                      <div className="text-[8px] font-mono px-1 rounded text-white" style={{background: NORM_VECTORS.vB.color}}>doc-B</div>
                    </div>
                  </div>
                  <div className="mt-1.5 grid grid-cols-2 gap-1 text-[9px] font-mono">
                    <div className="bg-emerald-50 border border-emerald-200 rounded px-1 py-0.5 text-center text-emerald-800">cos {side.cos}</div>
                    <div className={`border rounded px-1 py-0.5 text-center ${side.l2Class}`}>L2 {side.l2}</div>
                  </div>
                  <div className={`mt-1 text-[9px] text-center font-bold ${side.alertClass}`}>{side.alert}</div>
                </div>
              );
            })}
          </div>

          <div className="mt-2 p-2 bg-amber-50 rounded border border-amber-200 text-[10px] text-amber-800 leading-snug">
            <span className="font-bold">팁:</span> OpenAI text-embedding-3 는 이미 unit-norm. BGE/E5 는
            <code className="bg-amber-100 px-1 rounded mx-0.5">normalize_embeddings=True</code> 로.
          </div>

          {info && (
            <div className="mt-2 p-2 bg-rose-50 rounded border border-rose-200 text-[10px] text-rose-800 leading-snug">
              <span className="font-bold">▶</span> {info}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 시각화 4) 응용 카드 (Step 5)
    //   4 카드 + 화살표로 RAG 위치 표시
    // ─────────────────────────────────────────────────────
    function ApplicationsBox({ info }) {
      const colorMap = {
        rose:   { bg: 'bg-rose-50',   border: 'border-rose-300',   text: 'text-rose-800',   badge: 'bg-rose-600'   },
        orange: { bg: 'bg-orange-50', border: 'border-orange-300', text: 'text-orange-800', badge: 'bg-orange-500' },
        amber:  { bg: 'bg-amber-50',  border: 'border-amber-300',  text: 'text-amber-800',  badge: 'bg-amber-500'  },
        pink:   { bg: 'bg-pink-50',   border: 'border-pink-300',   text: 'text-pink-800',   badge: 'bg-pink-500'   },
      };

      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🚀</span>
              <span className="text-[11px] font-bold text-rose-800">Embedding 1개 → 응용 4가지</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">
              4 use-cases
            </span>
          </div>

          <div className="grid grid-cols-2 gap-2 mb-2">
            {APP_CARDS.map((card, i) => {
              const c = colorMap[card.color];
              const isRag = i === 0;
              return (
                <div
                  key={i}
                  className={`rounded-lg border-2 p-2 ${c.bg} ${c.border} ${isRag ? 'ring-2 ring-rose-400 ring-offset-1' : ''}`}
                >
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-lg">{card.icon}</span>
                    {isRag && (
                      <span className={`text-[8px] ${c.badge} text-white px-1 py-0.5 rounded font-bold animate-pulse`}>
                        RAG
                      </span>
                    )}
                  </div>
                  <div className={`text-[11px] font-bold ${c.text} mb-0.5`}>{card.title}</div>
                  <div className="text-[9px] text-slate-600 leading-snug">{card.desc}</div>
                </div>
              );
            })}
          </div>

          {/* RAG 파이프라인 미니 다이어그램 */}
          <div className="bg-gradient-to-br from-rose-50 to-amber-50 rounded-lg border border-rose-200 p-2">
            <div className="text-[10px] font-bold text-rose-800 mb-1.5 text-center">
              📖 이 자료의 위치 — RAG 의 임베딩 단계
            </div>
            <div className="flex items-center justify-between gap-1 text-[9px] font-mono">
              <div className="flex-1 text-center bg-white border border-slate-200 rounded px-1 py-1">
                <div className="text-slate-500">PDF</div>
                <div className="text-slate-700 font-bold">chunk</div>
              </div>
              <span className="text-rose-500 font-bold">→</span>
              <div className="flex-1 text-center bg-rose-600 border border-rose-700 rounded px-1 py-1 text-white shadow-md">
                <div className="text-rose-100">embed</div>
                <div className="font-bold">⭐ here</div>
              </div>
              <span className="text-rose-500 font-bold">→</span>
              <div className="flex-1 text-center bg-white border border-slate-200 rounded px-1 py-1">
                <div className="text-slate-500">Vector</div>
                <div className="text-slate-700 font-bold">DB</div>
              </div>
              <span className="text-rose-500 font-bold">→</span>
              <div className="flex-1 text-center bg-white border border-slate-200 rounded px-1 py-1">
                <div className="text-slate-500">top-k</div>
                <div className="text-slate-700 font-bold">LLM</div>
              </div>
            </div>
          </div>

          {info && (
            <div className="mt-2 p-2 bg-rose-50 rounded border border-rose-200 text-[10px] text-rose-800 leading-snug">
              <span className="font-bold">▶</span> {info}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   step.left 값에 따라 4 시각화 중 하나를 렌더
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step, stepIdx }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🌹 Embedding 시각화 — 단어/문장 → 좌표</h2>
            <span className="text-[10px] text-slate-400 font-mono">live · step {stepIdx + 1}</span>
          </div>

          {step.left === 'wordmap' && (
            <WordMap
              activeWords={step.activeWords}
              highlight={step.highlight}
              showArrow={true}
              info={step.info}
            />
          )}
          {step.left === 'vector' && (
            <VectorBox
              variant={stepIdx === 1 ? 'sentence' : 'dim'}
              info={step.info}
            />
          )}
          {step.left === 'normalize' && <NormalizeBox info={step.info} />}
          {step.left === 'applications' && <ApplicationsBox info={step.info} />}

          {/* 진행 dot */}
          <div className="flex items-center justify-center gap-1.5 mt-3 pt-2 border-t border-slate-100">
            {STEPS.map((_, i) => (
              <div
                key={i}
                className={`h-1.5 rounded-full transition-all duration-500 ${
                  i === stepIdx ? 'w-6 bg-rose-600' : i < stepIdx ? 'w-1.5 bg-rose-300' : 'w-1.5 bg-slate-200'
                }`}
              ></div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    //   파일명 탭 + 라인번호 + 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            {/* 5 파일명 탭 — 현재 파일 강조 */}
            <div className="flex items-center gap-1 ml-2 overflow-x-auto">
              {STEPS.map((s, i) => (
                <span
                  key={i}
                  className={`text-[10px] font-mono px-2 py-0.5 rounded whitespace-nowrap ${
                    i === stepIdx
                      ? 'bg-[#282c34] text-rose-300 border-t-2 border-rose-500'
                      : 'text-slate-500'
                  }`}
                >
                  {s.code.filename}
                </span>
              ))}
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);
      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Embedding &amp; Vector Store &gt; Chapter 1. Embedding</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-1-1. Embedding이란 — 텍스트 → 고차원 벡터</h1>
                  <p className="text-sm text-slate-500 mt-0.5">지도의 좌표 시스템 — 의미가 비슷한 텍스트는 좌표도 가깝다</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: <strong>단어→좌표</strong> · <strong>문장→1536d</strong> · <strong>차원 trade-off</strong> · <strong>cosine 정규화</strong> · <strong>4가지 응용</strong>. 다음(III-1-2)에서는 OpenAI/BGE/E5/KURE 모델을 직접 비교한다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로"
                      className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계"
                      className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                      className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]">
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계"
                      className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Embedding', '벡터', '의미 공간', 'Word2Vec', 'cosine', 'L2', '1536d', 'text-embedding-3'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../part2/II-2-2.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; II-2-2 청크 분할</a>
              <a href="./III-1-2.html" className="text-rose-700 hover:text-rose-900 font-medium">III-1-2 Embedding 모델 비교 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
