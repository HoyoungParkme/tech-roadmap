<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — III-1-1. Embedding이란</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const WORDS = [
      { text: '\uC655', x: 70, y: 30, color: '#3b82f6' },
      { text: '\uC5EC\uC655', x: 80, y: 45, color: '#ec4899' },
      { text: '\uB0A8\uC790', x: 30, y: 25, color: '#3b82f6' },
      { text: '\uC5EC\uC790', x: 40, y: 40, color: '#ec4899' },
      { text: '\uACE0\uC591\uC774', x: 75, y: 80, color: '#f59e0b' },
      { text: '\uAC15\uC544\uC9C0', x: 55, y: 75, color: '#f59e0b' },
      { text: '\uC0AC\uACFC', x: 20, y: 75, color: '#22c55e' },
      { text: '\uBC14\uB098\uB098', x: 15, y: 85, color: '#22c55e' },
    ];

    const VECTOR_EXAMPLE = {
      text: '\uC655',
      vector: [0.23, -0.45, 0.12, 0.89, -0.33, 0.67, 0.11, -0.78],
      dims: 1536,
    };

    const ARITHMETIC = {
      king: { label: '\uC655', vec: '[0.23, -0.45, ...]' },
      man: { label: '\uB0A8\uC790', vec: '[0.11, -0.30, ...]' },
      woman: { label: '\uC5EC\uC790', vec: '[0.15, -0.28, ...]' },
      queen: { label: '\uC5EC\uC655', vec: '[0.27, -0.43, ...]' },
    };

    const STEPS = [
      {
        desc: "Embedding은 지도의 좌표 시스템과 같습니다. '서울'을 (37.5, 127.0)으로, '부산'을 (35.1, 129.0)으로 표현하듯, 텍스트도 숫자 좌표(벡터)로 변환합니다. 가까운 좌표 = 비슷한 의미.",
        showMap: true, showVector: false, showArithmetic: false, showCode: false
      },
      {
        desc: "Embedding 모델은 텍스트를 고차원 벡터로 변환합니다. 예를 들어 '왕'이라는 단어는 1536개의 숫자 배열로 변환됩니다. 사람 눈에는 의미 없는 숫자지만, 수학적으로 의미 관계를 담고 있습니다.",
        showMap: false, showVector: true, showArithmetic: false, showCode: true
      },
      {
        desc: "2D 의미 공간을 봅시다. '왕'과 '여왕'은 가깝고(왕족), '고양이'와 '강아지'도 가깝습니다(동물). '사과'와 '바나나'도 가깝죠(과일). 의미가 비슷할수록 좌표가 가까워집니다.",
        showMap: true, showVector: false, showArithmetic: false, showCode: false
      },
      {
        desc: "놀라운 성질: 벡터 연산으로 의미 관계를 표현할 수 있습니다. '왕 - 남자 + 여자 = 여왕' — 이 수식이 실제로 성립합니다! Embedding이 의미를 수학적으로 포착한다는 증거입니다.",
        showMap: false, showVector: false, showArithmetic: true, showCode: false
      },
      {
        desc: "RAG에서 Embedding의 역할: 질문과 문서를 같은 벡터 공간에 배치합니다. 질문 벡터에 가장 가까운 문서 벡터를 찾으면 — 그것이 '검색'입니다. 다음 단계에서 구체적인 모델을 비교합니다.",
        showMap: true, showVector: false, showArithmetic: false, showCode: true
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-purple-700 hover:text-purple-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Embedding & Vector Store &gt; Chapter 1. Embedding</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-1-1. Embedding이란</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>지도의 좌표 시스템</b>을 떠올려 보세요. 도시를 위도/경도 좌표로 표현하듯, 텍스트를 <b>숫자 벡터</b>로 변환합니다. 의미가 비슷한 텍스트는 좌표도 가깝습니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-purple-700 border-purple-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">텍스트 → 벡터 변환</h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="space-y-4">
                {s.showMap ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">2D 의미 공간</div>
                    <div className="relative w-full h-[300px] bg-slate-50 rounded-lg border border-slate-200 overflow-hidden">
                      <div className="absolute left-0 top-0 w-full h-full">
                        <div className="absolute left-2 top-1/2 text-[10px] text-slate-400 -rotate-90 origin-left" style={{transform: 'rotate(-90deg) translateX(-50%)'}}>의미 축 2</div>
                        <div className="absolute bottom-1 left-1/2 transform -translate-x-1/2 text-[10px] text-slate-400">의미 축 1</div>
                      </div>
                      {step === 4 && (
                        <div className="absolute" style={{left: '45%', top: '50%'}}>
                          <div className="relative">
                            <div className="w-4 h-4 bg-red-500 rounded-full animate-pulse border-2 border-white shadow"></div>
                            <div className="absolute -top-5 left-1/2 transform -translate-x-1/2 text-[10px] font-bold text-red-600 whitespace-nowrap bg-white px-1 rounded">질문</div>
                          </div>
                        </div>
                      )}
                      {WORDS.map((w, i) => (
                        <div key={i} className="absolute transition-all duration-700" style={{left: `${w.x}%`, top: `${w.y}%`, transform: 'translate(-50%, -50%)'}}>
                          <div className="flex flex-col items-center">
                            <div className="w-3 h-3 rounded-full shadow-sm" style={{backgroundColor: w.color}}></div>
                            <span className="text-xs font-bold mt-0.5" style={{color: w.color}}>{w.text}</span>
                          </div>
                        </div>
                      ))}
                      <div className="absolute top-2 right-2 space-y-1">
                        <div className="flex items-center gap-1 text-[10px]"><div className="w-2 h-2 rounded-full bg-blue-500"></div><span className="text-slate-500">사람(왕족)</span></div>
                        <div className="flex items-center gap-1 text-[10px]"><div className="w-2 h-2 rounded-full bg-pink-500"></div><span className="text-slate-500">사람(여성)</span></div>
                        <div className="flex items-center gap-1 text-[10px]"><div className="w-2 h-2 rounded-full bg-amber-500"></div><span className="text-slate-500">동물</span></div>
                        <div className="flex items-center gap-1 text-[10px]"><div className="w-2 h-2 rounded-full bg-green-500"></div><span className="text-slate-500">과일</span></div>
                      </div>
                    </div>
                    {step === 4 && (
                      <div className="mt-2 p-2 bg-purple-50 rounded border border-purple-200 text-xs text-purple-700">
                        빨간 점(질문)에서 가장 가까운 문서 벡터를 찾는 것이 바로 <b>벡터 검색</b>입니다.
                      </div>
                    )}
                  </div>
                ) : s.showVector ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">벡터 변환 과정</div>
                    <div className="space-y-4">
                      <div className="p-4 bg-purple-50 rounded-lg border border-purple-200 text-center">
                        <div className="text-3xl font-bold text-purple-800 mb-1">"{VECTOR_EXAMPLE.text}"</div>
                        <div className="text-xs text-purple-500">입력 텍스트</div>
                      </div>
                      <div className="text-center text-2xl text-purple-400">↓ Embedding Model</div>
                      <div className="p-4 bg-slate-50 rounded-lg border">
                        <div className="text-xs font-bold text-slate-500 mb-2">{VECTOR_EXAMPLE.dims}차원 벡터</div>
                        <div className="font-mono text-xs text-slate-600 break-all">
                          [{VECTOR_EXAMPLE.vector.join(', ')}, ... <span className="text-slate-400">({VECTOR_EXAMPLE.dims - VECTOR_EXAMPLE.vector.length}개 더)</span>]
                        </div>
                      </div>
                      <div className="p-3 bg-amber-50 rounded-lg border border-amber-200 text-xs text-amber-800">
                        <b>핵심:</b> 사람이 보기엔 의미 없는 숫자 배열이지만, 이 벡터에 '왕'의 의미적 특성이 수학적으로 인코딩되어 있습니다.
                      </div>
                    </div>
                  </div>
                ) : s.showArithmetic ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">벡터 연산</div>
                    <div className="space-y-4">
                      <div className="text-center p-4 bg-purple-50 rounded-lg border border-purple-200">
                        <div className="text-xl font-bold text-purple-800">
                          {ARITHMETIC.king.label} - {ARITHMETIC.man.label} + {ARITHMETIC.woman.label} = {ARITHMETIC.queen.label}
                        </div>
                        <div className="text-xs text-purple-500 mt-1">벡터 연산으로 의미 관계 표현</div>
                      </div>
                      <div className="space-y-2">
                        {Object.entries(ARITHMETIC).map(([key, val]) => (
                          <div key={key} className="flex items-center gap-3 p-2 bg-slate-50 rounded border">
                            <span className="font-bold text-sm w-12 text-center">{val.label}</span>
                            <span className="text-xs font-mono text-slate-500 flex-1">{val.vec}</span>
                          </div>
                        ))}
                      </div>
                      <div className="p-3 bg-green-50 rounded-lg border border-green-200 text-xs text-green-800">
                        <b>해석:</b> '왕'에서 '남성' 방향을 빼고 '여성' 방향을 더하면 → '여왕' 근처의 벡터가 됩니다. Embedding이 성별/직위 같은 의미 관계를 기하학적으로 포착합니다.
                      </div>
                    </div>
                  </div>
                ) : null}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-purple-600 uppercase tracking-wider mb-4">
                  {s.showCode ? '코드 예시' : '핵심 개념'}
                </div>
                {s.showCode ? (
                  <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{
                    step === 1 ?
`from langchain_openai import OpenAIEmbeddings

# Embedding 모델 초기화
embeddings = OpenAIEmbeddings(
    model="text-embedding-3-small"
)

# 단일 텍스트 Embedding
vector = embeddings.embed_query("왕")
print(len(vector))    # 1536
print(vector[:5])
# [0.23, -0.45, 0.12, 0.89, -0.33]

# 여러 텍스트 Embedding
texts = ["왕", "여왕", "고양이"]
vectors = embeddings.embed_documents(texts)
print(len(vectors))   # 3
print(len(vectors[0])) # 1536` :
`# RAG에서의 Embedding 활용
from langchain_openai import OpenAIEmbeddings
from langchain_community.vectorstores import Chroma

embeddings = OpenAIEmbeddings()

# 1. 문서를 벡터로 변환 (인덱싱)
vectorstore = Chroma.from_documents(
    documents=chunks,       # 전처리된 청크들
    embedding=embeddings    # Embedding 모델
)

# 2. 질문을 벡터로 변환 + 유사 문서 검색
query = "연차 휴가 정책이 어떻게 되나요?"
results = vectorstore.similarity_search(
    query=query, k=3
)
# → 질문 벡터와 가장 가까운 3개 문서 반환`
                  }</pre>
                ) : s.showArithmetic ? (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-purple-50 border border-purple-200">
                      <div className="font-bold text-sm text-purple-800 mb-2">Word2Vec에서 시작된 발견</div>
                      <div className="text-xs text-purple-700 space-y-2">
                        <div>2013년 Google의 Word2Vec 논문에서 처음 발견된 현상입니다.</div>
                        <div className="mt-2 space-y-1">
                          <div>Paris - France + Italy = Rome</div>
                          <div>big - bigger = small - smaller</div>
                          <div>왕 - 남자 + 여자 = 여왕</div>
                        </div>
                      </div>
                    </div>
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">현대 Embedding 모델</div>
                      <div className="text-xs text-slate-600 space-y-1">
                        <div>• Word2Vec: 단어 수준 (2013)</div>
                        <div>• BERT: 문맥 고려 (2018)</div>
                        <div>• text-embedding-3: 문장/문단 수준 (2024)</div>
                        <div className="mt-1 font-bold">→ RAG에서는 문장/문단 수준 Embedding 사용</div>
                      </div>
                    </div>
                  </div>
                ) : step === 0 ? (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-purple-50 border border-purple-200">
                      <div className="font-bold text-sm text-purple-800 mb-2">Embedding = 의미의 좌표화</div>
                      <div className="text-xs text-purple-700 space-y-2">
                        <div className="p-2 bg-white rounded border">
                          <b>지도 좌표:</b> "서울" → (37.5, 127.0)
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>Embedding:</b> "왕" → [0.23, -0.45, ..., 0.67]
                        </div>
                      </div>
                    </div>
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">왜 벡터로 변환하나?</div>
                      <div className="text-xs text-slate-600 space-y-1">
                        <div>• 컴퓨터는 텍스트를 직접 비교할 수 없음</div>
                        <div>• 숫자(벡터)로 변환하면 수학적 비교 가능</div>
                        <div>• 벡터 거리 = 의미적 유사도</div>
                        <div className="mt-1 font-bold">→ "비슷한 의미 = 가까운 좌표"</div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-purple-50 border border-purple-200">
                      <div className="font-bold text-sm text-purple-800 mb-2">의미 그룹</div>
                      <div className="text-xs text-purple-700 space-y-2">
                        <div className="flex items-center gap-2 p-2 bg-white rounded border">
                          <div className="w-3 h-3 rounded-full bg-blue-500"></div>
                          <span><b>왕, 남자</b> — 사람/남성 클러스터</span>
                        </div>
                        <div className="flex items-center gap-2 p-2 bg-white rounded border">
                          <div className="w-3 h-3 rounded-full bg-pink-500"></div>
                          <span><b>여왕, 여자</b> — 사람/여성 클러스터</span>
                        </div>
                        <div className="flex items-center gap-2 p-2 bg-white rounded border">
                          <div className="w-3 h-3 rounded-full bg-amber-500"></div>
                          <span><b>고양이, 강아지</b> — 동물 클러스터</span>
                        </div>
                        <div className="flex items-center gap-2 p-2 bg-white rounded border">
                          <div className="w-3 h-3 rounded-full bg-green-500"></div>
                          <span><b>사과, 바나나</b> — 과일 클러스터</span>
                        </div>
                      </div>
                    </div>
                    <div className="p-3 bg-amber-50 rounded border border-amber-200 text-xs text-amber-800">
                      <b>실제:</b> 이 그림은 1536차원을 2D로 축소한 것입니다. 실제로는 훨씬 더 복잡한 의미 관계가 인코딩됩니다.
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Embedding', '\uBCA1\uD130', '\uC758\uBBF8 \uACF5\uAC04', 'Word2Vec', 'text-embedding-3'].map(kw => (
                <span key={kw} className="bg-purple-50 text-purple-700 px-3 py-1 rounded-full text-sm font-medium border border-purple-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-purple-600 hover:bg-purple-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>
