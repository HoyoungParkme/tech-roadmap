<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — II-1-1. Document Loading</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SOURCES = [
      { type: 'PDF', icon: '\uD83D\uDCC4', color: 'bg-red-50 border-red-300 text-red-800', raw: 'Binary PDF stream\n%PDF-1.4 ...\nendobj xref ...', loaded: { page_content: '제1장 인사규정\\n1.1 근무시간은 오전 9시부터...', metadata: { source: 'hr_policy.pdf', page: 0, total_pages: 42 } } },
      { type: 'Web', icon: '\uD83C\uDF10', color: 'bg-green-50 border-green-300 text-green-800', raw: '<html>\\n<head><title>블로그</title></head>\\n<body><div class="content">\\n  RAG는 검색 증강 생성...\\n</div></body></html>', loaded: { page_content: 'RAG는 검색 증강 생성(Retrieval Augmented Generation)의\\n약자로...', metadata: { source: 'https://blog.example.com/rag', title: 'RAG 입문' } } },
      { type: 'DB', icon: '\uD83D\uDDC4\uFE0F', color: 'bg-blue-50 border-blue-300 text-blue-800', raw: 'SELECT id, title, content\\nFROM documents\\nWHERE category = "tech"\\nLIMIT 100;', loaded: { page_content: 'PostgreSQL 17의 새로운 기능:\\n1. 증분 백업 지원\\n2. JSON 테이블 함수...', metadata: { source: 'internal_db', table: 'documents', row_id: 42 } } },
    ];

    const STEPS = [
      {
        desc: "Document Loading은 우체국 집배원과 같습니다. 다양한 형태의 우편물(PDF, 웹페이지, DB)을 받아서 모두 동일한 '표준 양식'(Document 객체)으로 정리합니다.",
        activeSource: -1, showPipeline: false, showCode: false, showUnified: false
      },
      {
        desc: "PDF 로더 — PyPDFLoader가 바이너리 PDF를 읽어서 페이지별로 텍스트를 추출합니다. 페이지 번호, 파일명 같은 메타데이터도 자동으로 함께 저장됩니다.",
        activeSource: 0, showPipeline: true, showCode: false, showUnified: false
      },
      {
        desc: "웹 크롤러 — WebBaseLoader가 HTML에서 불필요한 태그를 제거하고 본문 텍스트만 깔끔하게 추출합니다. URL과 제목이 메타데이터로 저장됩니다.",
        activeSource: 1, showPipeline: true, showCode: false, showUnified: false
      },
      {
        desc: "DB 커넥터 — SQLDatabaseLoader가 SQL 쿼리 결과를 Document 객체로 변환합니다. 테이블명, row_id 등이 메타데이터로 저장됩니다.",
        activeSource: 2, showPipeline: true, showCode: false, showUnified: false
      },
      {
        desc: "핵심 포인트: 어떤 소스에서 왔든 결과는 동일한 Document 객체입니다. page_content(텍스트) + metadata(출처 정보) — 이 통일된 구조 덕분에 이후 파이프라인이 소스를 신경 쓰지 않아도 됩니다.",
        activeSource: -1, showPipeline: false, showCode: true, showUnified: true
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-blue-700 hover:text-blue-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 데이터 준비 &gt; Chapter 1. 문서 수집과 전처리</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-1-1. Document Loading</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>우체국 집배원</b>을 떠올려 보세요. 편지, 택배, 등기 — 형태는 다르지만 모두 <b>표준 양식</b>으로 정리해서 배달합니다. Document Loader도 마찬가지입니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-blue-700 border-blue-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">Document Loading 파이프라인</h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="space-y-4">
                {s.activeSource >= 0 ? (
                  <div className="space-y-3">
                    {SOURCES.map((src, i) => (
                      <div key={i} className={`p-4 rounded-xl border-2 transition-all duration-500 ${i === s.activeSource ? src.color + ' scale-105 shadow-md' : 'bg-white border-slate-100 opacity-40'}`}>
                        <div className="flex items-center gap-3 mb-2">
                          <span className="text-2xl">{src.icon}</span>
                          <span className="font-bold text-sm">{src.type} Loader</span>
                        </div>
                        {i === s.activeSource && s.showPipeline && (
                          <div className="mt-3 space-y-2">
                            <div className="text-xs font-bold text-slate-500 uppercase">Raw Input</div>
                            <pre className="text-xs bg-white/80 p-2 rounded border overflow-x-auto whitespace-pre-wrap font-mono">{src.raw}</pre>
                            <div className="text-center text-lg">↓</div>
                            <div className="text-xs font-bold text-slate-500 uppercase">Document 객체</div>
                            <pre className="text-xs bg-white/80 p-2 rounded border overflow-x-auto whitespace-pre-wrap font-mono">{JSON.stringify(src.loaded, null, 2)}</pre>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                ) : s.showUnified ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">통합 Document 구조</div>
                    <div className="space-y-3">
                      {SOURCES.map((src, i) => (
                        <div key={i} className="flex items-center gap-3 p-3 bg-blue-50 rounded-lg border border-blue-200">
                          <span className="text-xl">{src.icon}</span>
                          <div className="flex-1">
                            <div className="font-bold text-sm text-blue-800">{src.type}</div>
                            <div className="text-xs text-blue-600">→ Document(page_content, metadata)</div>
                          </div>
                          <span className="text-green-600 font-bold text-sm">✓</span>
                        </div>
                      ))}
                    </div>
                    <div className="mt-4 p-3 bg-blue-100 rounded-lg border border-blue-200 text-xs text-blue-800">
                      <b>핵심:</b> 모든 소스가 동일한 Document 객체로 통합되므로, 이후 Chunking/Embedding 단계는 원본 소스를 신경 쓸 필요가 없습니다.
                    </div>
                  </div>
                ) : (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">소스별 로더</div>
                    <div className="space-y-3">
                      {SOURCES.map((src, i) => (
                        <div key={i} className={`flex items-center gap-3 p-4 rounded-xl border-2 ${src.color}`}>
                          <span className="text-3xl">{src.icon}</span>
                          <div>
                            <div className="font-bold text-sm">{src.type} Loader</div>
                            <div className="text-xs mt-0.5 opacity-75">다양한 {src.type} 형태 → Document 객체</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-blue-600 uppercase tracking-wider mb-4">코드 예시</div>
                {s.showCode ? (
                  <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{`from langchain_community.document_loaders import (
    PyPDFLoader,
    WebBaseLoader,
    SQLDatabaseLoader
)

# PDF 로딩
pdf_loader = PyPDFLoader("hr_policy.pdf")
pdf_docs = pdf_loader.load()

# 웹페이지 로딩
web_loader = WebBaseLoader("https://blog.example.com/rag")
web_docs = web_loader.load()

# DB 로딩
db_loader = SQLDatabaseLoader(
    query="SELECT content FROM docs",
    db=database
)
db_docs = db_loader.load()

# 모두 동일한 Document 구조!
for doc in pdf_docs + web_docs + db_docs:
    print(type(doc))
    # <class 'langchain.schema.Document'>
    print(doc.page_content[:50])
    print(doc.metadata)`}</pre>
                ) : s.activeSource >= 0 ? (
                  <div className="space-y-4">
                    <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{
                      s.activeSource === 0 ?
`from langchain_community.document_loaders import PyPDFLoader

loader = PyPDFLoader("hr_policy.pdf")
docs = loader.load()

# docs[0].page_content → "제1장 인사규정..."
# docs[0].metadata → {
#   "source": "hr_policy.pdf",
#   "page": 0,
#   "total_pages": 42
# }` :
                      s.activeSource === 1 ?
`from langchain_community.document_loaders import WebBaseLoader

loader = WebBaseLoader(
    "https://blog.example.com/rag"
)
docs = loader.load()

# docs[0].page_content → "RAG는 검색 증강..."
# docs[0].metadata → {
#   "source": "https://blog.example.com/rag",
#   "title": "RAG 입문"
# }` :
`from langchain_community.document_loaders import (
    SQLDatabaseLoader
)
from langchain_community.utilities import SQLDatabase

db = SQLDatabase.from_uri("postgresql://...")
loader = SQLDatabaseLoader(
    query="SELECT content FROM documents",
    db=db
)
docs = loader.load()

# docs[0].page_content → "PostgreSQL 17의..."
# docs[0].metadata → {
#   "source": "internal_db",
#   "table": "documents"
# }`
                    }</pre>
                    <div className="p-3 bg-blue-50 rounded-lg border border-blue-200 text-xs text-blue-800">
                      <b>Document 객체 구조:</b> page_content (텍스트 내용) + metadata (출처, 페이지 등의 부가 정보)
                    </div>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-blue-50 border border-blue-200">
                      <div className="font-bold text-sm text-blue-800 mb-2">Document 객체란?</div>
                      <div className="text-xs text-blue-700 space-y-1">
                        <div>• <code className="bg-blue-100 px-1 rounded">page_content</code>: 실제 텍스트 내용</div>
                        <div>• <code className="bg-blue-100 px-1 rounded">metadata</code>: 출처, 페이지, 날짜 등 부가 정보</div>
                      </div>
                    </div>
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">왜 통일된 구조가 중요한가?</div>
                      <div className="text-xs text-slate-600 space-y-1">
                        <div>• 이후 단계(Chunking, Embedding)가 소스를 신경 쓸 필요 없음</div>
                        <div>• 여러 소스의 문서를 하나의 파이프라인으로 처리 가능</div>
                        <div>• 새 소스 추가 시 Loader만 바꾸면 됨</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Document Loader', 'page_content', 'metadata', 'PyPDFLoader', 'WebBaseLoader'].map(kw => (
                <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-blue-600 hover:bg-blue-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="../part1/I-2-2.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; Part I. RAG 기초</a>
              <a href="./II-1-2.html" className="text-blue-600 hover:text-blue-800 font-medium">II-1-2. 전처리 파이프라인 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
