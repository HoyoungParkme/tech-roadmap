<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — II-1-2. 전처리 파이프라인</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PIPELINE_STAGES = [
      { label: '노이즈 제거', icon: '\uD83E\uDDF9', desc: '헤더, 푸터, 광고, 네비게이션 등 불필요한 요소 제거' },
      { label: '정규화', icon: '\uD83D\uDD27', desc: '유니코드 통일, 공백 정리, 특수문자 처리' },
      { label: '중복 제거', icon: '\uD83D\uDD91\uFE0F', desc: '동일/유사 문서 감지 및 제거' },
      { label: '필터링', icon: '\uD83D\uDD0D', desc: '최소 길이 미달, 의미 없는 문서 제외' },
    ];

    const BEFORE_TEXT = `===== 헤더: 주식회사 ABC =====
Navigation: Home | About | Contact
Copyright 2024 ABC Corp.

제1장   인사규정

1.1 근무시간은　오전 9시부터 오후 6시까지로 한다．
단，플렉스타임 적용 부서는 예외로 한다．

[광고] 신입사원 모집중! 지금 바로 지원하세요!

1.2 연차 휴가는 다음과 같다:
  - 1년 미만: 월 1일
  - 1년 이상～3년 미만:  15일
  - 3년 이상: 15일 + 근속년수×1일

===== 푸터: Copyright 2024 =====
Navigation: Home | About | Contact`;

    const AFTER_TEXT = `제1장 인사규정

1.1 근무시간은 오전 9시부터 오후 6시까지로 한다.
단, 플렉스타임 적용 부서는 예외로 한다.

1.2 연차 휴가는 다음과 같다:

  - 1년 이상~3년 미만: 15일

    const STEPS = [
      {
        desc: "전처리는 음식 재료 손질과 같습니다. 아무리 좋은 재료도 씻고, 껍질 벗기고, 상한 부분을 잘라내야 요리할 수 있습니다. 문서도 마찬가지 — 로딩된 원본에는 노이즈가 가득합니다.",
        activeStage: -1, showBefore: true, showAfter: false, showCode: false
      },
      {
        desc: "[1단계] 노이즈 제거 — 헤더, 푸터, 네비게이션, 광고 같은 '껍질'을 벗겨냅니다. 이 요소들은 검색 품질을 크게 떨어뜨리는 주범입니다.",
        activeStage: 0, showBefore: true, showAfter: false, showCode: true
      },
      {
        desc: "[2단계] 정규화 — 전각 문자를 반각으로, 불규칙한 공백을 정리하고, 유니코드를 통일합니다. '오전 9시'와 '오전　9시'가 같은 텍스트임을 보장합니다.",
        activeStage: 1, showBefore: false, showAfter: false, showCode: true
      },
      {
        desc: "[3단계] 중복 제거 — 동일한 내용이 여러 소스에서 로딩될 수 있습니다. 해시 기반 또는 유사도 기반으로 중복을 감지하고 제거합니다.",
        activeStage: 2, showBefore: false, showAfter: false, showCode: true
      },
      {
        desc: "Before / After를 비교해봅시다. 왼쪽의 노이즈 가득한 원본이 오른쪽처럼 깔끔하게 정제됩니다. 이렇게 정제된 텍스트가 다음 Chunking 단계로 넘어갑니다.",
        activeStage: -1, showBefore: true, showAfter: true, showCode: false
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-blue-700 hover:text-blue-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 데이터 준비 &gt; Chapter 1. 문서 수집과 전처리</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-1-2. 전처리 파이프라인</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>음식 재료 손질</b>을 떠올려 보세요. 씻기 → 껍질 벗기기 → 상한 부분 제거 → 손질 완료. 문서 전처리도 같은 단계를 거칩니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-blue-700 border-blue-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">전처리 4단계</h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="space-y-4">
                {s.showBefore && s.showAfter ? (
                  <div className="space-y-4">
                    <div className="bg-white rounded-xl border border-red-200 p-4">
                      <div className="text-xs font-bold text-red-600 uppercase tracking-wider mb-2">Before (원본)</div>
                      <pre className="text-xs bg-red-50 p-3 rounded-lg border border-red-100 overflow-x-auto whitespace-pre-wrap font-mono text-red-800 max-h-[250px] overflow-y-auto">{BEFORE_TEXT}</pre>
                    </div>
                    <div className="text-center text-2xl">↓</div>
                    <div className="bg-white rounded-xl border border-green-200 p-4">
                      <div className="text-xs font-bold text-green-600 uppercase tracking-wider mb-2">After (정제)</div>
                      <pre className="text-xs bg-green-50 p-3 rounded-lg border border-green-100 overflow-x-auto whitespace-pre-wrap font-mono text-green-800">{AFTER_TEXT}</pre>
                    </div>
                  </div>
                ) : s.showBefore ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">원본 문서 (노이즈 포함)</div>
                    <pre className="text-xs bg-red-50 p-3 rounded-lg border border-red-100 overflow-x-auto whitespace-pre-wrap font-mono text-red-800">{BEFORE_TEXT}</pre>
                    <div className="mt-3 flex flex-wrap gap-1">
                      <span className="text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full">헤더/푸터</span>
                      <span className="text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full">네비게이션</span>
                      <span className="text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full">광고</span>
                      <span className="text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full">전각문자</span>
                      <span className="text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full">불규칙 공백</span>
                    </div>
                  </div>
                ) : (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">전처리 파이프라인</div>
                    <div className="space-y-3">
                      {PIPELINE_STAGES.map((stage, i) => (
                        <div key={i} className={`flex items-start gap-3 p-3 rounded-lg border transition-all duration-500 ${i === s.activeStage ? 'bg-blue-50 border-blue-300 scale-105 shadow-md' : 'bg-slate-50 border-slate-100 opacity-50'}`}>
                          <span className="text-xl mt-0.5">{stage.icon}</span>
                          <div>
                            <div className="font-bold text-sm">{i + 1}. {stage.label}</div>
                            <div className="text-xs text-slate-600 mt-0.5">{stage.desc}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-blue-600 uppercase tracking-wider mb-4">
                  {s.showCode ? '코드 예시' : '상세 설명'}
                </div>
                {s.showCode ? (
                  <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{
                    s.activeStage === 0 ?
`import re

def remove_noise(text: str) -> str:
    """헤더, 푸터, 광고 등 노이즈 제거"""
    # 헤더/푸터 패턴 제거
    text = re.sub(
        r'={3,}.*?={3,}', '', text
    )
    # 네비게이션 제거
    text = re.sub(
        r'Navigation:.*?\\n', '', text
    )
    # 광고 제거
    text = re.sub(
        r'\\[광고\\].*?\\n', '', text
    )
    # Copyright 제거
    text = re.sub(
        r'Copyright.*?\\n', '', text
    )
    return text.strip()` :
                    s.activeStage === 1 ?
`import unicodedata

def normalize_text(text: str) -> str:
    """유니코드 정규화 + 공백 정리"""
    # 유니코드 NFKC 정규화
    # (전각 → 반각, 호환 문자 통일)
    text = unicodedata.normalize('NFKC', text)

    # 연속 공백을 하나로
    text = re.sub(r'[ \\t]+', ' ', text)

    # 연속 빈 줄을 하나로
    text = re.sub(r'\\n{3,}', '\\n\\n', text)

    return text.strip()

# "오전　9시" → "오전 9시"
# "한다．"   → "한다."` :
                    s.activeStage === 2 ?
`import hashlib

def deduplicate(docs: list) -> list:
    """해시 기반 중복 문서 제거"""
    seen = set()
    unique = []

    for doc in docs:
        # 문서 내용의 해시 생성
        doc_hash = hashlib.md5(
            doc.page_content.encode()
        ).hexdigest()

        if doc_hash not in seen:
            seen.add(doc_hash)
            unique.append(doc)

    removed = len(docs) - len(unique)
    print(f"중복 제거: {removed}건")
    return unique

# 100건 → 87건 (13건 중복 제거)` :
`def full_pipeline(docs: list) -> list:
    """전처리 전체 파이프라인"""
    result = []
    for doc in docs:
        text = doc.page_content

        # 1. 노이즈 제거
        text = remove_noise(text)
        # 2. 정규화
        text = normalize_text(text)
        # 3. 필터링 (최소 길이)
        if len(text) < 50:
            continue

        doc.page_content = text
        result.append(doc)

    # 4. 중복 제거
    result = deduplicate(result)
    return result`
                  }</pre>
                ) : s.showBefore && s.showAfter ? (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-blue-50 border border-blue-200">
                      <div className="font-bold text-sm text-blue-800 mb-2">정제 결과 요약</div>
                      <div className="space-y-2 text-xs text-blue-700">
                        <div className="flex justify-between p-2 bg-white rounded border"><span>원본 길이</span><span className="font-bold">423자</span></div>
                        <div className="flex justify-between p-2 bg-white rounded border"><span>정제 후 길이</span><span className="font-bold text-green-600">198자</span></div>
                        <div className="flex justify-between p-2 bg-white rounded border"><span>노이즈 비율</span><span className="font-bold text-red-600">53%</span></div>
                      </div>
                    </div>
                    <div className="p-4 rounded-lg bg-amber-50 border border-amber-200">
                      <div className="font-bold text-sm text-amber-800 mb-2">주의사항</div>
                      <div className="text-xs text-amber-700 space-y-1">
                        <div>• 과도한 전처리로 중요 정보를 잃지 않도록 주의</div>
                        <div>• 도메인별 특수 패턴 고려 필요</div>
                        <div>• 전처리 전/후 샘플링 검증 필수</div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-blue-50 border border-blue-200">
                      <div className="font-bold text-sm text-blue-800 mb-2">왜 전처리가 중요한가?</div>
                      <div className="text-xs text-blue-700 space-y-1">
                        <div>• <b>Garbage In, Garbage Out</b> — 더러운 데이터로는 좋은 검색 불가</div>
                        <div>• 노이즈가 Embedding 품질을 심각하게 저하</div>
                        <div>• 헤더/푸터가 반복되면 청크마다 동일 내용이 포함됨</div>
                      </div>
                    </div>
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-2">실무 체크리스트</div>
                      <div className="text-xs text-slate-600 space-y-1">
                        <div>1. 원본 문서를 눈으로 확인했는가?</div>
                        <div>2. 반복되는 패턴(헤더/푸터)을 식별했는가?</div>
                        <div>3. 전처리 후 의미가 손실되지 않는가?</div>
                        <div>4. 전처리 결과를 샘플링 검증했는가?</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['전처리', '노이즈 제거', '정규화', '중복 제거', 'NFKC'].map(kw => (
                <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-blue-600 hover:bg-blue-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./II-1-1.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; II-1-1. Document Loading</a>
              <a href="./II-1-3.html" className="text-blue-600 hover:text-blue-800 font-medium">II-1-3. 메타데이터 보존과 활용 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
