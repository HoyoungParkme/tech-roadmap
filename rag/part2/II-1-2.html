            '',
            'def clean(text: str) -> str:',
            '    """헤더·푸터·광고 정규식 컷 + NFKC 정규화."""',
            '    # 1) HTML 태그가 있으면 BeautifulSoup 으로 텍스트만',
            '    if "<" in text and ">" in text:',
            '        text = BeautifulSoup(text, "html.parser").get_text()',
            '',
            '    # 2) 잡음 라인 정규식으로 제거',
            '    for pat in NOISE_PATTERNS:',
            '        text = re.sub(pat, "", text, flags=re.MULTILINE)',
            '',
            '    # 3) NFKC — 전각 공백·전각 마침표 → 반각',
            '    #    "오전　9시" → "오전 9시"  /  "한다．" → "한다."',

            '',
            '    # 4) 연속 공백·빈 줄 압축',
            '    text = re.sub(r"[ \\t]+", " ", text)',
            '    text = re.sub(r"\\n{3,}", "\\n\\n", text)',
            '    return text.strip()',

            '# ✓ 전각 → 반각 통일 (검색 일치율 ↑)',
            '# 효과: 423B → 312B (잡음 26%↓)',
          ],
          highlight: [2, 3, 4, 6, 7, 8, 9, 10, 13, 17, 20, 21, 25, 28, 29],
        },
      },
      {
        title: 'Step 3. Dedupe — 중복 페이지 제거 (hash)',

          { n: 10, text: '[image: scan_p4.png]', state: 'pending', label: 'image?' },
        ],

        stats: { rawBytes: 423, cleanedBytes: 286, noiseRatio: 32, dupes: 1, ocr: 0 },
        code: {
          lang: 'python',
          filename: 'dedupe.py',
          lines: [
            '# Step 3. Dedupe — 본문 해시 기반 중복 제거 (O(N))',
            'import hashlib',
            'from typing import Iterable',
            'from langchain_core.documents import Document',
            '',
            'def _content_hash(text: str) -> str:',
            '    """공백 정규화 후 MD5 16바이트 해시."""',
            '    normalized = " ".join(text.split())',
            '    return hashlib.md5(normalized.encode("utf-8")).hexdigest()',
            '',
            'def dedupe(docs: Iterable[Document]) -> list[Document]:',
            '    """완전 일치 중복만 제거. 유사 중복은 다음 단계."""',
            '    seen: set[str] = set()',
            '    unique: list[Document] = []',
            '    for doc in docs:',
            '        h = _content_hash(doc.page_content)',
            '        if h in seen:',
            '            continue              # 중복 → skip',
            '        seen.add(h)',
            '        unique.append(doc)',
            '',

            '    print(f"중복 제거: {removed}건")',
            '    return unique',

            '# Step 4. OCR — 이미지/스캔 PDF에서 텍스트 추출',
            'import pytesseract',

            'from pathlib import Path',
            'from langchain_core.documents import Document',
            '',
            'def ocr_image(path: str | Path, lang: str = "kor+eng") -> str:',
            '    """이미지 1장 → 텍스트.',
            '    Args:',
            '        path: 이미지 또는 스캔 PDF 페이지 경로',
            '        lang: tesseract 언어 코드 (한글+영어 혼용 권장)',
            '    Returns:',
            '        OCR 인식 결과 텍스트 (실패 시 빈 문자열)',
            '    """',
            '    img = Image.open(path)',
            '    return pytesseract.image_to_string(img, lang=lang).strip()',
            '',
            'def ocr_inline(doc: Document) -> Document:',
            '    """본문의 [image: …] placeholder 를 실제 OCR 텍스트로 치환."""',

            'MIN_LEN = 50  # 50자 미만 청크 후보는 의미 없음 → 폐기',
            '',
            'def preprocess(docs: Iterable[Document]) -> list[Document]:',
            '    """원본 문서 묶음 → 깨끗한 문서 묶음.',
            '',
            '    Pipeline:',
            '        1) clean       — HTML/잡음 정규식 컷 + NFKC',
            '        2) ocr_inline  — [image: …] → 실제 텍스트',
            '        3) length 필터 — 너무 짧으면 제거',
            '        4) dedupe      — content hash 로 중복 컷',
            '    """',
            '    cleaned: list[Document] = []',
            '    for doc in docs:',
            '        # 1·2) 본문 정제 + OCR',
            '        doc.page_content = clean(doc.page_content)',
            '        doc = ocr_inline(doc)',
            '',
            '        # 3) 길이 필터',
            '        if len(doc.page_content) < MIN_LEN:',
            '            continue',
            '        cleaned.append(doc)',
            '',
            '    # 4) 중복 제거 — 마지막에 한 번에',
            '    return dedupe(cleaned)',
            '',
            '# 본 예시 결과:',
            '#   원본 423B  → 정제 348B  (잡음 18%↓)',
            '#   중복 1건 제거 / OCR 2건 복원',
            '#   ⇒ 다음 단계 Chunking 으로 안전하게 전달',
            '',
            '# 🚀 운영 팁:',
            '#   - clean 정규식은 도메인별로 추가 (사내 도구·메타 태그)',
            '#   - dedupe 는 정확 중복만 — 의미 중복은 청킹 후 검증',
            '#   - OCR 실패 케이스는 metadata 에 플래그 → 모니터링',
          ],
          highlight: [2, 3, 5, 6, 7, 11, 14, 15, 16, 17, 18, 19, 21, 23, 24, 25, 27, 32],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 위: Raw 박스 — 원본 라인을 색·취소선으로 표시
    //   state:
    //     'raw'      : 정상 (slate)
    //     'removed'  : 제거됨 (line-through, 회색)
    //     'ocred'    : OCR 처리됨 (rose 강조 + 화살표)
    //   highlightKind 가 일치하면 살짝 ring 효과
    // ─────────────────────────────────────────────────────
    function RawPane({ lines, highlightKind }) {
      return (
        <div className="bg-white rounded-lg border-2 border-rose-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📄</span>
              <span className="text-[11px] font-bold text-rose-800">raw text (원본)</span>
            </div>
            <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-mono">
              {lines.length} lines
            </span>
          </div>
          <div className="bg-rose-50/40 rounded border border-rose-100 p-2 max-h-72 overflow-y-auto">
            <div className="space-y-0.5 font-mono text-[10px] leading-snug">
              {lines.map((l) => {
                const isRemoved = l.state === 'removed';
                const isOcred = l.state === 'ocred';
                const focus = highlightKind && l.kind === highlightKind;
                let cls = 'text-slate-700';
                if (isRemoved) cls = 'text-slate-400 line-through';
                if (l.kind === 'noise' && !isRemoved) cls = 'text-slate-700';
                if (l.kind === 'dupe' && !isRemoved) cls = 'text-amber-700';
                if (l.kind === 'image' && !isRemoved && !isOcred) cls = 'text-purple-700';
                if (isOcred) cls = 'text-emerald-700 font-semibold';
                let badge = null;
                if (l.kind === 'noise') {
                  badge = <span className={`text-[8px] px-1 rounded font-bold ${isRemoved ? 'bg-slate-300 text-slate-500' : 'bg-rose-200 text-rose-800'}`}>noise</span>;
                } else if (l.kind === 'dupe') {
                  badge = <span className={`text-[8px] px-1 rounded font-bold ${isRemoved ? 'bg-slate-300 text-slate-500' : 'bg-amber-300 text-amber-800'}`}>dupe</span>;
                } else if (l.kind === 'image') {
                  badge = <span className={`text-[8px] px-1 rounded font-bold ${isOcred ? 'bg-emerald-500 text-white' : 'bg-purple-300 text-purple-800'}`}>{isOcred ? 'OCR ✓' : 'image'}</span>;
                }
                return (
                  <div key={l.n} className={`flex items-start gap-1.5 px-1 py-0.5 rounded transition-all duration-500 ${focus ? 'bg-rose-200/50 ring-1 ring-rose-300' : ''}`}>
                    <span className="select-none text-slate-400 w-5 text-right flex-shrink-0">{l.n}</span>
                    <span className="w-12 flex-shrink-0">{badge}</span>
                    <span className={`flex-1 whitespace-pre-wrap break-all ${cls}`}>
                      {isOcred && l.ocr ? (
                        <>
                          <span className="line-through text-slate-400">{l.raw}</span>
                          <span className="text-emerald-600 mx-1">→</span>
                          <span>{l.ocr}</span>
                        </>
                      ) : l.raw}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: Cleaned 박스 — 정제된 라인이 단계별로 채워짐
    //   state:
    //     'new'      : 이번 단계에서 새로 들어옴 (rose ring + animate)
    //     'kept'     : 유지 (rose 채움)
    //     'pending'  : 아직 미해결 (점선 회색 — 다음 단계가 처리)
    // ─────────────────────────────────────────────────────
    function CleanedPane({ lines, stats }) {
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">✨</span>
              <span className="text-[11px] font-bold text-emerald-800">cleaned text (정제)</span>
            </div>
            <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">
              {lines.length} lines · {stats.cleanedBytes}B
            </span>
          </div>
          <div className="bg-emerald-50/40 rounded border border-emerald-100 p-2 min-h-[10rem] max-h-72 overflow-y-auto">
            {lines.length === 0 ? (
              <div className="text-center text-[10px] text-slate-400 italic py-10">
                (아직 비어있음 — 정제 시작 전)
              </div>
            ) : (
              <div className="space-y-0.5 font-mono text-[10px] leading-snug">
                {lines.map((l) => {
                  let frame = 'border border-emerald-200 bg-white';
                  let textCls = 'text-emerald-900';
                  if (l.state === 'new') {
                    frame = 'border border-emerald-400 bg-emerald-100 ring-2 ring-emerald-300';
                    textCls = 'text-emerald-900 font-semibold';
                  } else if (l.state === 'pending') {
                    frame = 'border border-dashed border-slate-300 bg-slate-50';
                    textCls = 'text-slate-400 italic';
                  }
                  return (
                    <div key={l.n} className={`flex items-start gap-1.5 px-1.5 py-1 rounded transition-all duration-500 ${frame}`}>
                      <span className="select-none text-slate-400 w-5 text-right flex-shrink-0">{l.n}</span>
                      {l.label && (
                        <span className={`text-[8px] px-1 rounded font-bold flex-shrink-0 ${l.state === 'new' ? 'bg-emerald-500 text-white animate-pulse' : 'bg-slate-300 text-slate-500'}`}>
                          {l.label}
                        </span>
                      )}
                      <span className={`flex-1 whitespace-pre-wrap break-all ${textCls}`}>{l.text}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          {/* 통계 패널 */}
          <div className="grid grid-cols-3 gap-1.5 mt-2 text-[9px] font-mono">
            <div className="bg-rose-50 border border-rose-200 rounded px-1.5 py-1 text-center">
              <div className="text-rose-500 uppercase tracking-wider text-[8px]">raw</div>
              <div className="text-rose-700 font-bold">{stats.rawBytes} B</div>
            </div>
            <div className="bg-emerald-50 border border-emerald-200 rounded px-1.5 py-1 text-center">
              <div className="text-emerald-500 uppercase tracking-wider text-[8px]">cleaned</div>
              <div className="text-emerald-700 font-bold">{stats.cleanedBytes} B</div>
            </div>
            <div className="bg-slate-50 border border-slate-200 rounded px-1.5 py-1 text-center">
              <div className="text-slate-500 uppercase tracking-wider text-[8px]">noise</div>
              <div className="text-slate-700 font-bold">
                {stats.noiseRatio === null ? '—' : `${stats.noiseRatio}%`}
              </div>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-1.5 mt-1.5 text-[9px] font-mono">
            <div className="bg-amber-50 border border-amber-200 rounded px-1.5 py-1 text-center">
              <div className="text-amber-500 uppercase tracking-wider text-[8px]">dupes removed</div>
              <div className="text-amber-700 font-bold">{stats.dupes}</div>
            </div>
            <div className="bg-purple-50 border border-purple-200 rounded px-1.5 py-1 text-center">
              <div className="text-purple-500 uppercase tracking-wider text-[8px]">ocr recovered</div>
              <div className="text-purple-700 font-bold">{stats.ocr}</div>
            </div>
          </div>
          {stats.final && (
            <div className="mt-2 text-[10px] text-emerald-700 bg-emerald-50 border border-emerald-200 rounded px-2 py-1.5 font-medium">
              ✓ 다음 단계 Chunking 으로 안전 전달 가능
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: Raw 박스 / 하단: Cleaned 박스 + 통계
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📑 raw → cleaned 변환</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <RawPane lines={step.leftLines} highlightKind={step.highlightKind} />
            <CleanedPane lines={step.rightLines} stats={step.stats} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-300"></span>noise
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-300"></span>dupe
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-purple-300"></span>image (OCR)
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>cleaned
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 라인 번호
    //   파일명 탭(raw.py, clean.py, dedupe.py, ocr.py, pipeline.py)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      // 5개 파일 탭 — 현재 step의 filename이 active
      const tabs = ['raw.py', 'clean.py', 'dedupe.py', 'ocr.py', 'pipeline.py'];

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 (5개) */}
          <div className="bg-[#21252b] px-3 pt-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5 mb-1">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <div className="flex items-end gap-0.5 ml-2 overflow-x-auto">
              {tabs.map((t) => {
                const active = t === code.filename;
                return (
                  <span
                    key={t}
                    className={`px-2.5 py-1 text-[10px] font-mono rounded-t-md whitespace-nowrap transition ${
                      active
                        ? 'bg-[#282c34] text-rose-300 border-t border-l border-r border-slate-700 font-bold'
                        : 'text-slate-500 hover:text-slate-300'
                    }`}
                  >
                    {t}
                  </span>
                );
              })}
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase pb-1">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[42rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-rose-500/15 border-l-2 border-rose-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 4 버튼 + 키보드 + 3000ms 자동재생
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 데이터 준비 &gt; Chapter 1. 문서 수집과 전처리</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-1-2. 전처리 파이프라인 — clean / normalize / dedupe / OCR</h1>
                  <p className="text-sm text-slate-500 mt-0.5">음식 재료 손질 — 잡음 제거 → 정규화 → 중복 컷 → OCR 복원</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 text-sm text-rose-900">
                💡 정리: <strong>clean</strong>(잡음 컷) → <strong>NFKC</strong>(전각 통일) → <strong>dedupe</strong>(중복 제거) → <strong>OCR</strong>(이미지 복원). 이 4단계만 거쳐도 검색 품질이 눈에 띄게 올라간다. 다음(II-1-3)에서는 메타데이터 보존과 활용을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-rose-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-rose-600 text-white hover:bg-rose-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['전처리', 'clean', 'NFKC', 'dedupe (hash)', 'OCR', 'tesseract', 'pipeline'].map((kw) => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-xs font-medium border border-rose-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-1-1.html" className="text-rose-700 hover:text-rose-900 font-medium">&larr; II-1-1. Document Loading</a>
              <a href="./II-1-3.html" className="text-rose-700 hover:text-rose-900 font-medium">II-1-3. 메타데이터 보존과 활용 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
