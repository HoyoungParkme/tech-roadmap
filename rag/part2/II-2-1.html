<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — II-2-1. Chunking 전략 비교</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SAMPLE_TEXT = `제1장 인사규정

1.1 근무시간
근무시간은 오전 9시부터 오후 6시까지로 한다. 점심시간은 12시부터 1시까지이다.

1.2 연차 휴가
1년 이상 근속한 직원에게 15일의 연차가 부여된다. 3년 이상 근속 시 근속년수당 1일이 추가된다.

제2장 급여

2.1 급여 지급
급여는 매월 25일에 지급한다. 25일이 주말인 경우 직전 영업일에 지급한다.`;

    const COLORS = ['bg-blue-100 border-blue-300', 'bg-green-100 border-green-300', 'bg-amber-100 border-amber-300', 'bg-purple-100 border-purple-300', 'bg-red-100 border-red-300', 'bg-cyan-100 border-cyan-300'];

    const FIXED_CHUNKS = [
      '제1장 인사규정\n\n1.1 근무시간\n근무시간은 오전 9시부터 오후 6시까지로 한다. 점심시간은',
      ' 12시부터 1시까지이다.\n\n1.2 연차 휴가\n1년 이상 근속한 직원에게 15일의 연차가 부여된다. 3',
      '년 이상 근속 시 근속년수당 1일이 추가된다.\n\n제2장 급여\n\n2.1 급여 지급\n급여는 매월 25일',
      '에 지급한다. 25일이 주말인 경우 직전 영업일에 지급한다.',
    ];

    const RECURSIVE_CHUNKS = [
      '제1장 인사규정\n\n1.1 근무시간\n근무시간은 오전 9시부터 오후 6시까지로 한다. 점심시간은 12시부터 1시까지이다.',
      '1.2 연차 휴가\n1년 이상 근속한 직원에게 15일의 연차가 부여된다. 3년 이상 근속 시 근속년수당 1일이 추가된다.',
      '제2장 급여\n\n2.1 급여 지급\n급여는 매월 25일에 지급한다. 25일이 주말인 경우 직전 영업일에 지급한다.',
    ];

    const SEMANTIC_CHUNKS = [
      '제1장 인사규정\n\n1.1 근무시간\n근무시간은 오전 9시부터 오후 6시까지로 한다. 점심시간은 12시부터 1시까지이다.',
      '1.2 연차 휴가\n1년 이상 근속한 직원에게 15일의 연차가 부여된다. 3년 이상 근속 시 근속년수당 1일이 추가된다.',
      '제2장 급여\n\n2.1 급여 지급\n급여는 매월 25일에 지급한다. 25일이 주말인 경우 직전 영업일에 지급한다.',
    ];

    const STRATEGIES = [
      { name: 'Fixed Size', icon: '\uD83D\uDCCF', desc: '자로 정확히 자르기', chunks: FIXED_CHUNKS, verdict: '단어/문장 중간이 잘릴 수 있음', quality: 2 },
      { name: 'Recursive', icon: '\u2702\uFE0F', desc: '문단 → 문장 → 단어 경계 우선', chunks: RECURSIVE_CHUNKS, verdict: '의미 단위를 최대한 보존', quality: 4 },
      { name: 'Semantic', icon: '\uD83E\uDDE0', desc: '의미 변화 지점에서 자르기', chunks: SEMANTIC_CHUNKS, verdict: '가장 정확하지만 비용이 높음', quality: 5 },
    ];

    const STEPS = [
      {
        desc: "피자 자르기를 비유로 봅시다. Fixed는 자로 정확히 등분(문맥 무시), Recursive는 토핑 경계를 따라 자르기, Semantic은 맛 조합을 감지해서 자르기입니다.",
        activeStrategy: -1, showComparison: false, showCode: false
      },
      {
        desc: "[Fixed Size] 정해진 글자 수(예: 80자)로 기계적으로 자릅니다. 구현이 가장 간단하지만, '3년 이상 근속'이 '3'과 '년 이상 근속'으로 쪼개질 수 있습니다.",
        activeStrategy: 0, showComparison: false, showCode: true
      },
      {
        desc: "[Recursive] 문단(\\n\\n) → 문장(.) → 단어( ) 순서로 분할 지점을 찾습니다. '자연스러운 경계'에서 잘라서 Fixed보다 의미가 잘 보존됩니다. 실무에서 가장 많이 사용됩니다.",
        activeStrategy: 1, showComparison: false, showCode: true
      },
      {
        desc: "[Semantic] Embedding 유사도가 급격히 변하는 지점에서 자릅니다. '인사규정'에서 '급여' 이야기로 바뀌는 순간을 감지합니다. 가장 정확하지만, Embedding 계산 비용이 추가됩니다.",
        activeStrategy: 2, showComparison: false, showCode: true
      },
      {
        desc: "세 전략을 같은 텍스트에 적용한 결과를 비교합니다. Fixed는 4조각(단어 잘림), Recursive는 3조각(문단 보존), Semantic도 3조각(의미 보존)입니다.",
        activeStrategy: -1, showComparison: true, showCode: false
      },
      {
        desc: "실무 추천: Recursive가 가성비 최고입니다. 구현이 간단하면서 의미 보존도 좋습니다. Semantic은 정확도가 중요한 특수한 경우에만 사용합니다.",
        activeStrategy: -1, showComparison: false, showCode: false
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-blue-700 hover:text-blue-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 데이터 준비 &gt; Chapter 2. Chunking</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-2-1. Chunking 전략 비교</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>피자 자르기</b>를 떠올려 보세요. Fixed는 <b>자로 정확히</b> 등분, Recursive는 <b>토핑 경계</b>를 따라, Semantic은 <b>맛 조합</b>을 감지해서 자릅니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-blue-700 border-blue-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">Chunking 3가지 전략</h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="space-y-4">
                {s.activeStrategy >= 0 ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="flex items-center gap-2 mb-3">
                      <span className="text-xl">{STRATEGIES[s.activeStrategy].icon}</span>
                      <span className="font-bold text-sm">{STRATEGIES[s.activeStrategy].name}</span>
                      <span className="text-xs text-slate-500">— {STRATEGIES[s.activeStrategy].desc}</span>
                    </div>
                    <div className="space-y-2">
                      {STRATEGIES[s.activeStrategy].chunks.map((chunk, i) => (
                        <div key={i} className={`p-2 rounded-lg border text-xs font-mono whitespace-pre-wrap ${COLORS[i]}`}>
                          <div className="text-[10px] font-bold text-slate-500 mb-1">Chunk {i + 1} ({chunk.length}자)</div>
                          {chunk}
                        </div>
                      ))}
                    </div>
                    <div className={`mt-3 p-2 rounded-lg text-xs font-medium ${STRATEGIES[s.activeStrategy].quality >= 4 ? 'bg-green-50 text-green-700 border border-green-200' : STRATEGIES[s.activeStrategy].quality >= 3 ? 'bg-amber-50 text-amber-700 border border-amber-200' : 'bg-red-50 text-red-700 border border-red-200'}`}>
                      {STRATEGIES[s.activeStrategy].verdict}
                    </div>
                  </div>
                ) : s.showComparison ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">전략별 비교</div>
                    <div className="space-y-4">
                      {STRATEGIES.map((st, i) => (
                        <div key={i} className="p-3 rounded-lg border border-slate-100 bg-slate-50">
                          <div className="flex items-center justify-between mb-2">
                            <div className="flex items-center gap-2">
                              <span>{st.icon}</span>
                              <span className="font-bold text-sm">{st.name}</span>
                            </div>
                            <div className="flex gap-0.5">
                              {Array.from({length: 5}, (_, j) => (
                                <div key={j} className={`w-3 h-3 rounded-full ${j < st.quality ? 'bg-blue-500' : 'bg-slate-200'}`} />
                              ))}
                            </div>
                          </div>
                          <div className="text-xs text-slate-600">
                            <span className="font-bold">{st.chunks.length}조각</span> — {st.verdict}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">
                      {step === 5 ? '실무 추천' : '3가지 전략'}
                    </div>
                    {step === 5 ? (
                      <div className="space-y-3">
                        <div className="p-4 bg-green-50 rounded-lg border border-green-200">
                          <div className="flex items-center gap-2 mb-2">
                            <span className="text-green-600 font-bold text-lg">1위</span>
                            <span className="font-bold text-sm">RecursiveCharacterTextSplitter</span>
                          </div>
                          <div className="text-xs text-green-700">가성비 최고. 대부분의 실무 프로젝트에 적합합니다.</div>
                        </div>
                        <div className="p-4 bg-blue-50 rounded-lg border border-blue-200">
                          <div className="flex items-center gap-2 mb-2">
                            <span className="text-blue-600 font-bold text-lg">2위</span>
                            <span className="font-bold text-sm">SemanticChunker</span>
                          </div>
                          <div className="text-xs text-blue-700">정확도가 매우 중요할 때. 추가 비용 감수 필요.</div>
                        </div>
                        <div className="p-4 bg-slate-50 rounded-lg border border-slate-200">
                          <div className="flex items-center gap-2 mb-2">
                            <span className="text-slate-500 font-bold text-lg">3위</span>
                            <span className="font-bold text-sm">CharacterTextSplitter</span>
                          </div>
                          <div className="text-xs text-slate-600">프로토타이핑/테스트 용도. 프로덕션 비추천.</div>
                        </div>
                      </div>
                    ) : (
                      <div className="space-y-3">
                        {STRATEGIES.map((st, i) => (
                          <div key={i} className="flex items-center gap-3 p-3 rounded-lg border border-slate-100 bg-slate-50">
                            <span className="text-2xl">{st.icon}</span>
                            <div>
                              <div className="font-bold text-sm">{st.name}</div>
                              <div className="text-xs text-slate-500">{st.desc}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-blue-600 uppercase tracking-wider mb-4">
                  {s.showCode ? '코드 예시' : '원본 텍스트'}
                </div>
                {s.showCode ? (
                  <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{
                    s.activeStrategy === 0 ?
`from langchain.text_splitter import (
    CharacterTextSplitter
)

# Fixed Size — 글자 수로 기계적 분할
splitter = CharacterTextSplitter(
    separator="",       # 구분자 없이
    chunk_size=80,      # 80자씩
    chunk_overlap=0     # 겹침 없음
)

chunks = splitter.split_text(text)
# 결과: 4조각
# "...15일의 연차가 부여된다. 3"  ← 문장 중간 잘림!
# "년 이상 근속 시..."           ← 단어 잘림!` :
                    s.activeStrategy === 1 ?
`from langchain.text_splitter import (
    RecursiveCharacterTextSplitter
)

# Recursive — 자연 경계 우선 분할
splitter = RecursiveCharacterTextSplitter(
    separators=["\\n\\n", "\\n", ". ", " "],
    chunk_size=150,
    chunk_overlap=20
)

chunks = splitter.split_text(text)
# 결과: 3조각
# 1. "제1장 인사규정...1시까지이다."
# 2. "1.2 연차 휴가...추가된다."
# 3. "제2장 급여...지급한다."
# → 문단/문장 경계에서 깔끔하게 분할!` :
`from langchain_experimental.text_splitter import (
    SemanticChunker
)
from langchain_openai import OpenAIEmbeddings

# Semantic — 의미 변화 감지 분할
splitter = SemanticChunker(
    embeddings=OpenAIEmbeddings(),
    breakpoint_threshold_type="percentile"
)

chunks = splitter.split_text(text)
# 결과: 3조각
# 의미가 바뀌는 지점(인사→급여)에서 자동 분할
# 가장 정확하지만 Embedding 호출 비용 발생`
                  }</pre>
                ) : s.showComparison ? (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-slate-50 border">
                      <div className="font-bold text-sm text-slate-700 mb-2">원본 텍스트 ({SAMPLE_TEXT.length}자)</div>
                      <pre className="text-xs whitespace-pre-wrap font-mono text-slate-600 max-h-[150px] overflow-y-auto">{SAMPLE_TEXT}</pre>
                    </div>
                    <div className="grid grid-cols-3 gap-2 text-center text-xs">
                      <div className="p-2 bg-red-50 rounded border border-red-200">
                        <div className="font-bold text-red-700">Fixed</div>
                        <div className="text-red-600">4조각</div>
                        <div className="text-[10px] text-red-500">단어 잘림 발생</div>
                      </div>
                      <div className="p-2 bg-green-50 rounded border border-green-200">
                        <div className="font-bold text-green-700">Recursive</div>
                        <div className="text-green-600">3조각</div>
                        <div className="text-[10px] text-green-500">문단 보존</div>
                      </div>
                      <div className="p-2 bg-purple-50 rounded border border-purple-200">
                        <div className="font-bold text-purple-700">Semantic</div>
                        <div className="text-purple-600">3조각</div>
                        <div className="text-[10px] text-purple-500">의미 보존</div>
                      </div>
                    </div>
                  </div>
                ) : step === 5 ? (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-blue-50 border border-blue-200">
                      <div className="font-bold text-sm text-blue-800 mb-2">선택 가이드</div>
                      <div className="text-xs text-blue-700 space-y-2">
                        <div className="p-2 bg-white rounded border">
                          <b>Q. 빨리 프로토타이핑하고 싶다</b>
                          <div className="text-slate-500 mt-0.5">→ RecursiveCharacterTextSplitter</div>
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>Q. 법률/의료 등 정확도가 최우선</b>
                          <div className="text-slate-500 mt-0.5">→ SemanticChunker</div>
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>Q. 코드를 분할하고 싶다</b>
                          <div className="text-slate-500 mt-0.5">→ Language-specific Splitter</div>
                        </div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-600">{SAMPLE_TEXT}</pre>
                    <div className="p-3 bg-blue-50 rounded-lg border border-blue-200 text-xs text-blue-800">
                      이 텍스트를 3가지 전략으로 나눠봅니다. 다음 단계에서 각 전략의 결과를 비교합니다.
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Chunking', 'Fixed Size', 'Recursive', 'Semantic', 'TextSplitter'].map(kw => (
                <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-blue-600 hover:bg-blue-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
