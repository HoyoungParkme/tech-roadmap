<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — II-1-3. 메타데이터 보존과 활용</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ALL_DOCS = [
      { id: 1, title: 'PostgreSQL 17 신기능', content: 'PostgreSQL 17은 증분 백업, JSON 테이블 함수를 지원합니다.', metadata: { source: 'tech_blog.pdf', date: '2025-01-15', category: 'database', page_number: 3 } },
      { id: 2, title: 'React 19 업데이트', content: 'React 19에서는 서버 컴포넌트가 기본 지원됩니다.', metadata: { source: 'frontend_guide.pdf', date: '2025-03-20', category: 'frontend', page_number: 12 } },
      { id: 3, title: '인사규정 개정', content: '2024년 하반기 인사규정이 개정되었습니다.', metadata: { source: 'hr_policy.pdf', date: '2024-07-01', category: 'hr', page_number: 1 } },
      { id: 4, title: 'K8s 배포 가이드', content: 'Kubernetes 환경에서의 블루-그린 배포 전략입니다.', metadata: { source: 'devops_manual.pdf', date: '2025-02-10', category: 'devops', page_number: 8 } },
      { id: 5, title: 'Python 비동기 처리', content: 'asyncio를 활용한 비동기 프로그래밍 패턴을 설명합니다.', metadata: { source: 'python_cookbook.pdf', date: '2024-11-05', category: 'backend', page_number: 45 } },
      { id: 6, title: '연봉 테이블 2025', content: '2025년 직급별 연봉 테이블이 확정되었습니다.', metadata: { source: 'hr_salary.pdf', date: '2025-01-02', category: 'hr', page_number: 1 } },
    ];

    const STEPS = [
      {
        desc: "메타데이터는 도서관의 카탈로그 카드와 같습니다. 책 내용 자체가 아니라, '저자', '출판년도', '분류번호' 같은 부가 정보입니다. 이 정보가 있어야 원하는 책을 빠르게 찾을 수 있죠.",
        filterOn: false, activeFilter: null, showCode: false
      },
      {
        desc: "Document 객체에는 4가지 핵심 메타데이터가 있습니다: source(출처 파일), date(작성일), category(분류), page_number(페이지). 이 정보는 검색 시 강력한 필터가 됩니다.",
        filterOn: false, activeFilter: null, showCode: false
      },
      {
        desc: "[필터 OFF] 필터 없이 검색하면 모든 문서가 후보입니다. '인사 관련' 질문을 해도 DB, 프론트엔드, DevOps 문서까지 섞여서 나옵니다.",
        filterOn: false, activeFilter: null, showCode: true
      },
      {
        desc: "[필터 ON — category='hr'] 메타데이터 필터를 적용하면? category가 'hr'인 문서만 검색 대상이 됩니다. 6개 중 2개만 검색하므로 정확도가 높아지고 속도도 빨라집니다.",
        filterOn: true, activeFilter: { key: 'category', value: 'hr' }, showCode: true
      },
      {
        desc: "핵심: 메타데이터는 '보너스'가 아니라 '필수'입니다. 로딩 단계에서 메타데이터를 잘 보존해두면, 검색 단계에서 필터링/정렬/출처 추적이 가능해집니다.",
        filterOn: true, activeFilter: { key: 'date', value: '2025' }, showCode: false
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const filteredDocs = s.activeFilter
        ? ALL_DOCS.filter(d => {
            if (s.activeFilter.key === 'date') return d.metadata.date.startsWith(s.activeFilter.value);
            return d.metadata[s.activeFilter.key] === s.activeFilter.value;
          })
        : ALL_DOCS;

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-blue-700 hover:text-blue-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 데이터 준비 &gt; Chapter 1. 문서 수집과 전처리</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-1-3. 메타데이터 보존과 활용</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>도서관 카탈로그 카드</b>를 떠올려 보세요. 책 내용(page_content)만으로는 원하는 책을 빠르게 찾기 어렵습니다. <b>저자, 분류, 출판년도</b>(metadata)가 있어야 정확한 검색이 가능합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-blue-700 border-blue-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">메타데이터 필터링</h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl border border-slate-200 p-5">
                <div className="flex items-center justify-between mb-4">
                  <div className="text-xs font-bold text-slate-500 uppercase tracking-wider">문서 목록</div>
                  {s.activeFilter && (
                    <span className="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded-full font-bold">
                      필터: {s.activeFilter.key} = "{s.activeFilter.value}"
                    </span>
                  )}
                </div>
                <div className="space-y-2">
                  {ALL_DOCS.map((doc, i) => {
                    const isMatch = !s.activeFilter || filteredDocs.includes(doc);
                    return (
                      <div key={i} className={`p-3 rounded-lg border transition-all duration-500 ${isMatch ? 'bg-blue-50 border-blue-200 shadow-sm' : 'bg-slate-50 border-slate-100 opacity-30'}`}>
                        <div className="flex items-center justify-between mb-1">
                          <span className="text-sm font-bold text-slate-700">{doc.title}</span>
                          {isMatch && <span className="text-green-500 text-xs font-bold">MATCH</span>}
                        </div>
                        <div className="flex flex-wrap gap-1 mt-1">
                          {Object.entries(doc.metadata).map(([k, v]) => (
                            <span key={k} className={`text-[10px] px-1.5 py-0.5 rounded ${s.activeFilter && s.activeFilter.key === k ? 'bg-blue-200 text-blue-800 font-bold' : 'bg-slate-100 text-slate-500'}`}>
                              {k}: {v}
                            </span>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div className="mt-3 text-xs text-slate-500 text-center">
                  {s.activeFilter ? `${filteredDocs.length}/${ALL_DOCS.length}건 매칭` : `전체 ${ALL_DOCS.length}건`}
                </div>
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-blue-600 uppercase tracking-wider mb-4">
                  {s.showCode ? '코드 예시' : '메타데이터 구조'}
                </div>
                {s.showCode ? (
                  <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{
                    s.filterOn ?
`# 메타데이터 필터 적용 검색
from langchain_community.vectorstores import Chroma

vectorstore = Chroma(
    embedding_function=embeddings,
    collection_name="company_docs"
)

# category가 'hr'인 문서만 검색
results = vectorstore.similarity_search(
    query="연차 휴가 정책",
    k=3,
    filter={"category": "hr"}  # 메타데이터 필터!
)

# 필터 없이: 6건 중 검색 → 부정확
# 필터 적용: 2건 중 검색 → 정확!
for doc in results:
    print(doc.page_content)
    print(doc.metadata["source"])
    print(doc.metadata["page_number"])` :
`# 메타데이터 없이 검색 (비추천)
results = vectorstore.similarity_search(
    query="연차 휴가 정책",
    k=3
    # 필터 없음 — 모든 문서에서 검색
)

# 결과:
# 1. "인사규정 개정" (hr) ← 관련
# 2. "K8s 배포 가이드" (devops) ← 무관!
# 3. "연봉 테이블" (hr) ← 관련

# 검색 대상이 넓어서 무관한 문서가 섞임`
                  }</pre>
                ) : step === 4 ? (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-blue-50 border border-blue-200">
                      <div className="font-bold text-sm text-blue-800 mb-2">메타데이터 활용 사례</div>
                      <div className="text-xs text-blue-700 space-y-2">
                        <div className="p-2 bg-white rounded border"><b>필터링:</b> category="hr"로 인사 문서만 검색</div>
                        <div className="p-2 bg-white rounded border"><b>정렬:</b> date 기준으로 최신 문서 우선</div>
                        <div className="p-2 bg-white rounded border"><b>출처 추적:</b> source, page_number로 원문 위치 표시</div>
                        <div className="p-2 bg-white rounded border"><b>접근 제어:</b> department 메타데이터로 권한별 검색</div>
                      </div>
                    </div>
                    <div className="p-4 rounded-lg bg-amber-50 border border-amber-200">
                      <div className="font-bold text-sm text-amber-800 mb-2">Best Practice</div>
                      <div className="text-xs text-amber-700 space-y-1">
                        <div>• 로딩 시점에서 메타데이터를 최대한 보존</div>
                        <div>• 필요하면 커스텀 메타데이터 추가</div>
                        <div>• Chunking 시 메타데이터가 유지되는지 확인</div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                      <div className="font-bold text-sm text-slate-700 mb-3">핵심 메타데이터 4가지</div>
                      <div className="space-y-2">
                        {[
                          { key: 'source', desc: '원본 파일 경로/URL', example: 'hr_policy.pdf' },
                          { key: 'date', desc: '작성/수정 날짜', example: '2025-01-15' },
                          { key: 'category', desc: '문서 분류', example: 'hr, devops, frontend' },
                          { key: 'page_number', desc: '페이지 번호', example: '3' },
                        ].map((m, i) => (
                          <div key={i} className="flex items-center gap-2 p-2 bg-white rounded border">
                            <code className="text-xs bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-bold">{m.key}</code>
                            <div className="flex-1 text-xs text-slate-600">{m.desc}</div>
                            <span className="text-[10px] text-slate-400">{m.example}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div className="p-4 rounded-lg bg-blue-50 border border-blue-200">
                      <div className="font-bold text-sm text-blue-800 mb-2">카탈로그 비유</div>
                      <div className="text-xs text-blue-700 space-y-1">
                        <div>• <b>page_content</b> = 책의 본문 내용</div>
                        <div>• <b>metadata</b> = 카탈로그 카드 (저자, 분류, 위치)</div>
                        <div>→ 본문만으로는 검색 한계, 카탈로그가 있어야 정확한 검색</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['metadata', 'source', 'category', '필터링', '출처 추적'].map(kw => (
                <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-blue-600 hover:bg-blue-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./II-1-2.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; II-1-2. 전처리 파이프라인</a>
              <a href="./II-2-1.html" className="text-blue-600 hover:text-blue-800 font-medium">II-2-1. Chunking 전략 비교 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
