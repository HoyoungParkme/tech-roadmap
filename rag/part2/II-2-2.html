<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 학습 — II-2-2. Chunk Size와 Overlap</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SIZE_CONFIGS = [
      {
        label: '너무 큼 (2000자)',
        size: 2000, overlap: 0,
        pros: ['문맥 충분히 포함', '청크 수가 적음'],
        cons: ['관련 없는 내용이 섞임', 'Embedding 품질 저하', 'LLM 토큰 낭비'],
        score: 2, color: 'red'
      },
      {
        label: '적절함 (500~1000자)',
        size: 700, overlap: 100,
        pros: ['의미 단위 적절히 보존', '검색 정확도 높음', 'LLM 컨텍스트 효율적'],
        cons: ['도메인에 따라 조정 필요'],
        score: 5, color: 'green'
      },
      {
        label: '너무 작음 (100자)',
        size: 100, overlap: 0,
        pros: ['검색 해상도 높음'],
        cons: ['문맥 손실 심각', '청크 수 폭증', '검색 노이즈 증가'],
        score: 1, color: 'red'
      },
    ];

    const OVERLAP_EXAMPLE = {
      withoutOverlap: [
        '1.1 근무시간은 오전 9시부터 오후 6시까지이다. 플렉스타임',
        '적용 부서는 코어타임(10시~4시) 내에서 자율 출퇴근한다.',
      ],
      withOverlap: [
        '1.1 근무시간은 오전 9시부터 오후 6시까지이다. 플렉스타임',
        '오후 6시까지이다. 플렉스타임 적용 부서는 코어타임(10시~4시) 내에서 자율 출퇴근한다.',
      ],
    };

    const STEPS = [
      {
        desc: "Chunk Size는 퍼즐 조각 크기와 같습니다. 너무 크면 관련 없는 부분이 섞이고, 너무 작으면 문맥이 사라집니다. Overlap은 조각의 가장자리를 겹치게 해서 끊김을 방지합니다.",
        activeSize: -1, showOverlap: false, showCode: false
      },
      {
        desc: "[너무 큰 청크: 2000자] 한 청크에 너무 많은 내용이 담깁니다. '근무시간' 질문에 '급여', '복리후생' 내용까지 포함된 청크가 반환됩니다. Embedding 벡터도 모호해집니다.",
        activeSize: 0, showOverlap: false, showCode: false
      },
      {
        desc: "[적절한 청크: 500~1000자] 하나의 의미 단위(한 섹션, 한 문단)를 담기에 딱 좋은 크기입니다. 검색 정확도와 문맥 보존의 균형이 잡힙니다. 실무 권장 범위입니다.",
        activeSize: 1, showOverlap: false, showCode: true
      },
      {
        desc: "[Overlap 효과] Overlap이 없으면 '플렉스타임 적용 부서'가 잘려서 문맥이 끊깁니다. 10~20% Overlap을 주면 경계 부분의 문맥이 보존됩니다.",
        activeSize: -1, showOverlap: true, showCode: true
      },
      {
        desc: "정리: chunk_size=500~1000자, chunk_overlap=10~20%가 실무 황금 비율입니다. 단, 도메인에 따라 실험으로 최적값을 찾아야 합니다. 법률 문서는 크게, FAQ는 작게.",
        activeSize: -1, showOverlap: false, showCode: false
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-blue-700 hover:text-blue-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 데이터 준비 &gt; Chapter 2. Chunking</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-2-2. Chunk Size와 Overlap</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>퍼즐 조각 크기</b>를 떠올려 보세요. 너무 크면 세밀한 그림이 안 보이고, 너무 작으면 전체 그림을 알 수 없습니다. <b>적절한 크기 + 겹침(Overlap)</b>이 핵심입니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-blue-700 border-blue-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">Size & Overlap 튜닝</h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="space-y-4">
                {s.activeSize >= 0 ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">Chunk Size 비교</div>
                    <div className="space-y-3">
                      {SIZE_CONFIGS.map((cfg, i) => {
                        const isActive = i === s.activeSize;
                        return (
                          <div key={i} className={`p-3 rounded-lg border transition-all duration-500 ${isActive ? (cfg.color === 'green' ? 'bg-green-50 border-green-300 scale-105 shadow-md' : 'bg-red-50 border-red-300 scale-105 shadow-md') : 'bg-slate-50 border-slate-100 opacity-40'}`}>
                            <div className="flex items-center justify-between mb-1">
                              <span className="font-bold text-sm">{cfg.label}</span>
                              <div className="flex gap-0.5">
                                {Array.from({length: 5}, (_, j) => (
                                  <div key={j} className={`w-2.5 h-2.5 rounded-full ${j < cfg.score ? (cfg.color === 'green' ? 'bg-green-500' : 'bg-red-400') : 'bg-slate-200'}`} />
                                ))}
                              </div>
                            </div>
                            {isActive && (
                              <div className="mt-2 grid grid-cols-2 gap-2 text-xs">
                                <div>
                                  <div className="font-bold text-green-700 mb-1">장점</div>
                                  {cfg.pros.map((p, j) => <div key={j} className="text-green-600">+ {p}</div>)}
                                </div>
                                <div>
                                  <div className="font-bold text-red-700 mb-1">단점</div>
                                  {cfg.cons.map((c, j) => <div key={j} className="text-red-600">- {c}</div>)}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ) : s.showOverlap ? (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">Overlap 비교</div>
                    <div className="space-y-4">
                      <div>
                        <div className="text-xs font-bold text-red-600 mb-2">Overlap 없음 (0%)</div>
                        <div className="space-y-1">
                          {OVERLAP_EXAMPLE.withoutOverlap.map((chunk, i) => (
                            <div key={i} className="p-2 rounded border bg-red-50 border-red-200 text-xs font-mono">
                              <span className="text-[10px] text-red-400 font-bold">Chunk {i + 1}: </span>{chunk}
                            </div>
                          ))}
                        </div>
                        <div className="text-xs text-red-600 mt-1 font-medium">→ "플렉스타임 적용 부서"가 두 청크로 잘림!</div>
                      </div>
                      <div className="text-center text-slate-300">vs</div>
                      <div>
                        <div className="text-xs font-bold text-green-600 mb-2">Overlap 있음 (20%)</div>
                        <div className="space-y-1">
                          {OVERLAP_EXAMPLE.withOverlap.map((chunk, i) => (
                            <div key={i} className="p-2 rounded border bg-green-50 border-green-200 text-xs font-mono">
                              <span className="text-[10px] text-green-400 font-bold">Chunk {i + 1}: </span>
                              {i === 1 ? (
                                <><span className="bg-yellow-200 rounded px-0.5">오후 6시까지이다. 플렉스타임</span> 적용 부서는 코어타임(10시~4시) 내에서 자율 출퇴근한다.</>
                              ) : chunk}
                            </div>
                          ))}
                        </div>
                        <div className="text-xs text-green-600 mt-1 font-medium">→ 겹침 부분(노란색)으로 문맥 연결 유지!</div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">
                      {step === 0 ? '크기별 시각화' : '실무 권장값'}
                    </div>
                    {step === 0 ? (
                      <div className="space-y-4">
                        <div>
                          <div className="text-xs font-bold text-slate-600 mb-2">2000자 청크</div>
                          <div className="flex gap-1">
                            <div className="flex-1 h-8 bg-red-200 rounded border border-red-300 flex items-center justify-center text-[10px] text-red-700 font-bold">Chunk 1 (2000자)</div>
                          </div>
                        </div>
                        <div>
                          <div className="text-xs font-bold text-slate-600 mb-2">700자 청크</div>
                          <div className="flex gap-1">
                            <div className="flex-1 h-8 bg-green-200 rounded border border-green-300 flex items-center justify-center text-[10px] text-green-700 font-bold">C1</div>
                            <div className="flex-1 h-8 bg-green-200 rounded border border-green-300 flex items-center justify-center text-[10px] text-green-700 font-bold">C2</div>
                            <div className="flex-1 h-8 bg-green-200 rounded border border-green-300 flex items-center justify-center text-[10px] text-green-700 font-bold">C3</div>
                          </div>
                        </div>
                        <div>
                          <div className="text-xs font-bold text-slate-600 mb-2">100자 청크</div>
                          <div className="flex gap-1 flex-wrap">
                            {Array.from({length: 10}, (_, i) => (
                              <div key={i} className="w-8 h-8 bg-amber-200 rounded border border-amber-300 flex items-center justify-center text-[8px] text-amber-700 font-bold">{i+1}</div>
                            ))}
                          </div>
                        </div>
                      </div>
                    ) : (
                      <div className="space-y-4">
                        <div className="p-4 rounded-lg bg-green-50 border border-green-200">
                          <div className="font-bold text-sm text-green-800 mb-2">황금 비율</div>
                          <div className="grid grid-cols-2 gap-3 text-xs text-green-700">
                            <div className="p-2 bg-white rounded border text-center">
                              <div className="font-bold text-lg text-green-600">500~1000</div>
                              <div>chunk_size (자)</div>
                            </div>
                            <div className="p-2 bg-white rounded border text-center">
                              <div className="font-bold text-lg text-green-600">10~20%</div>
                              <div>chunk_overlap</div>
                            </div>
                          </div>
                        </div>
                        <div className="p-4 rounded-lg bg-blue-50 border border-blue-200">
                          <div className="font-bold text-sm text-blue-800 mb-2">도메인별 가이드</div>
                          <div className="text-xs text-blue-700 space-y-1">
                            <div className="flex justify-between p-1"><span>법률/계약서</span><span className="font-bold">1000~1500자</span></div>
                            <div className="flex justify-between p-1"><span>기술 문서</span><span className="font-bold">500~800자</span></div>
                            <div className="flex justify-between p-1"><span>FAQ/Q&A</span><span className="font-bold">200~400자</span></div>
                            <div className="flex justify-between p-1"><span>채팅 로그</span><span className="font-bold">300~500자</span></div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-blue-600 uppercase tracking-wider mb-4">
                  {s.showCode ? '코드 예시' : '핵심 개념'}
                </div>
                {s.showCode ? (
                  <pre className="text-xs bg-slate-50 p-4 rounded-lg border overflow-x-auto whitespace-pre-wrap font-mono text-slate-700">{
                    s.showOverlap ?
`from langchain.text_splitter import (
    RecursiveCharacterTextSplitter
)

# Overlap 없는 경우
splitter_no_overlap = RecursiveCharacterTextSplitter(
    chunk_size=500,
    chunk_overlap=0     # 겹침 없음
)

# Overlap 있는 경우 (권장)
splitter_with_overlap = RecursiveCharacterTextSplitter(
    chunk_size=500,
    chunk_overlap=100   # 100자 겹침 (20%)
)

# 비교
chunks_no = splitter_no_overlap.split_text(text)
chunks_yes = splitter_with_overlap.split_text(text)

# chunks_no:  경계에서 문맥 끊김 발생
# chunks_yes: 겹침으로 문맥 연결 유지
print(f"Overlap 없음: {len(chunks_no)}조각")
print(f"Overlap 있음: {len(chunks_yes)}조각")` :
`from langchain.text_splitter import (
    RecursiveCharacterTextSplitter
)

# 권장 설정 (일반적인 기술 문서)
splitter = RecursiveCharacterTextSplitter(
    chunk_size=700,       # 500~1000자 권장
    chunk_overlap=100,    # 10~20% 권장
    length_function=len,  # 글자 수 기준
    separators=[
        "\\n\\n",  # 문단
        "\\n",    # 줄바꿈
        ". ",    # 문장
        " ",     # 단어
        ""       # 글자
    ]
)

chunks = splitter.split_documents(docs)

# 결과 확인
for i, chunk in enumerate(chunks):
    print(f"Chunk {i}: {len(chunk.page_content)}자")
    print(chunk.page_content[:50], "...")
    print(chunk.metadata)`
                  }</pre>
                ) : step === 0 ? (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-blue-50 border border-blue-200">
                      <div className="font-bold text-sm text-blue-800 mb-2">두 가지 핵심 파라미터</div>
                      <div className="space-y-3 text-xs text-blue-700">
                        <div className="p-3 bg-white rounded border">
                          <code className="bg-blue-100 px-1 rounded font-bold">chunk_size</code>
                          <div className="mt-1">각 청크의 최대 길이. 의미 단위와 검색 정확도의 균형을 결정합니다.</div>
                        </div>
                        <div className="p-3 bg-white rounded border">
                          <code className="bg-blue-100 px-1 rounded font-bold">chunk_overlap</code>
                          <div className="mt-1">인접 청크 간 겹치는 길이. 경계에서의 문맥 손실을 방지합니다.</div>
                        </div>
                      </div>
                    </div>
                    <div className="p-4 rounded-lg bg-amber-50 border border-amber-200">
                      <div className="font-bold text-sm text-amber-800 mb-2">트레이드오프</div>
                      <div className="text-xs text-amber-700">
                        <div>큰 청크 → 문맥 풍부 / 검색 부정확</div>
                        <div>작은 청크 → 검색 정확 / 문맥 부족</div>
                        <div className="mt-1 font-bold">→ 정답은 없고, 도메인에 맞는 실험이 필요</div>
                      </div>
                    </div>
                  </div>
                ) : s.activeSize === 0 ? (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-red-50 border border-red-200">
                      <div className="font-bold text-sm text-red-800 mb-2">큰 청크의 문제</div>
                      <div className="text-xs text-red-700 space-y-2">
                        <div className="p-2 bg-white rounded border">
                          <b>질문:</b> "근무시간이 어떻게 되나요?"
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>반환된 청크 (2000자):</b>
                          <div className="mt-1 text-slate-500">"근무시간은 오전 9시... <span className="text-red-500 font-bold">+ 연차 휴가 + 급여 + 복리후생</span>..."</div>
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>문제:</b> LLM에 불필요한 내용이 너무 많이 전달됨 → 토큰 낭비 + 답변 품질 저하
                        </div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div className="p-4 rounded-lg bg-green-50 border border-green-200">
                      <div className="font-bold text-sm text-green-800 mb-2">실험 방법</div>
                      <div className="text-xs text-green-700 space-y-2">
                        <div className="p-2 bg-white rounded border">
                          <b>1단계:</b> 500자로 시작
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>2단계:</b> 테스트 질문 10개로 검색 품질 평가
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>3단계:</b> 크기 조절 (300, 500, 700, 1000) 비교
                        </div>
                        <div className="p-2 bg-white rounded border">
                          <b>4단계:</b> Overlap 비율 조절 (0%, 10%, 20%) 비교
                        </div>
                      </div>
                    </div>
                    <div className="p-3 bg-amber-50 rounded-lg border border-amber-200 text-xs text-amber-800">
                      <b>팁:</b> chunk_size를 바꾸면 기존 벡터를 모두 재생성해야 합니다. 처음에 신중하게 결정하세요.
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['chunk_size', 'chunk_overlap', '500~1000자', '10~20%', '트레이드오프'].map(kw => (
                <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-blue-600 hover:bg-blue-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./II-2-1.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; II-2-1. Chunking 전략 비교</a>
              <a href="../part3/III-1-1.html" className="text-blue-600 hover:text-blue-800 font-medium">Part III. Embedding & Vector Store &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
