name: regression

# 모든 시각화 HTML 파일이 fastapi 패턴을 갖췄는지 자동 점검
# - highlight.js 11.9.0 CDN 포함 여부
# - LiveDataPane / CodeViewer 명명 적용
# - data-presets="env,react" Babel 선언
# - 3000ms autoplay
# - 4 controls (처음/이전/재생/다음)
# - 키보드 ArrowLeft/ArrowRight

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pattern-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 시각화 카운트
        run: |
          echo "=== 20 자료 시각화 카운트 ==="
          for d in fastapi github docker mlops observability data-engineering cloud-infra kubernetes graphrag vector-db ai-agent langchain rag gcp postgres react springboot terraform kafka redis; do
            if [ -d "$d" ]; then
              p=$(ls $d/part*/*.html 2>/dev/null | wc -l)
              v=$(ls $d/visualizations/*.html 2>/dev/null | grep -v "index.html" | wc -l)
              ch=$(ls $d/chapter-*.html 2>/dev/null | wc -l)
              chs=$(ls $d/chapters/*.html 2>/dev/null | wc -l)
              flow=$(ls $d/cloud-run-flow.html 2>/dev/null | wc -l)
              total=$((p + v + ch + chs + flow))
              echo "  $d: $total"
            fi
          done

      - name: 패턴 일관성 검사
        run: |
          FAIL=0
          TOTAL=0
          for f in $(find fastapi github/visualizations docker/visualizations mlops observability data-engineering cloud-infra kubernetes graphrag vector-db ai-agent langchain rag postgres react springboot/chapters terraform kafka redis -name "*.html" 2>/dev/null | grep -v "index.html\|curriculum-viewer\|learn/\|project-viewer\|viewer.html"); do
            TOTAL=$((TOTAL + 1))
            HLJ=$(grep -c "atom-one-dark" "$f" || true)
            PAT=$(grep -c "LiveDataPane\|CodeViewer" "$f" || true)
            if [ "$HLJ" -lt 1 ] || [ "$PAT" -lt 3 ]; then
              echo "MISS: $f (hl=$HLJ pat=$PAT)"
              FAIL=$((FAIL + 1))
            fi
          done
          echo "=== 결과: $((TOTAL - FAIL)) / $TOTAL 통과 ==="
          if [ $FAIL -gt 0 ]; then
            echo "패턴 불일치 $FAIL 건"
            exit 1
          fi

      - name: gcp/cloud-run-flow 별도 점검
        run: |
          F="gcp/cloud-run-flow.html"
          HLJ=$(grep -c "atom-one-dark" "$F")
          PAT=$(grep -c "LiveDataPane\|CodeViewer" "$F")
          if [ "$HLJ" -lt 1 ] || [ "$PAT" -lt 3 ]; then
            echo "FAIL gcp/cloud-run-flow"
            exit 1
          fi
          echo "OK gcp/cloud-run-flow"
