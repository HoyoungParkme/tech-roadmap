<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker мқён„°лһҷнӢ°лёҢ н•ҷмҠө вҖ” HTML+Nginx м •м Ғ мӮ¬мқҙнҠё Dockerнҷ”</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>рҹ“ҡ</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-bounce { animation: bounce 1s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 В· к°ҖмһҘ лӢЁмҲңн•ң Dockerнҷ” вҖ” Dockerfile 3мӨ„",
        desc: "м •м Ғ мӮ¬мқҙнҠёмқҳ Dockerнҷ”лҠ” FROM(м–ҙл–Ө м„ңлІ„лҘј м“ём§Җ) + COPY nginx.conf(м„ңлІ„ м„Өм •) + COPY dist/(нҢҢмқј м „лӢ¬) 3мӨ„мқҙл©ҙ лҒқлӮңлӢӨ. nginx:alpine мқҙлҜём§Җ кё°л°ҳмңјлЎң мөңмў… мқҙлҜём§Җ нҒ¬кё°лҠ” ~30MBм—җ л¶Ҳкіјн•ҳлӢӨ.",
        phase: "three_lines",
      },
      {
        title: "STEP 2 В· nginx.conf вҖ” SPA лқјмҡ°нҢ… м„Өм •",
        desc: "React, Vue к°ҷмқҖ SPAм—җм„ң /about, /profile кІҪлЎңлЎң м§Ғм ‘ м ‘к·јн•ҳл©ҙ Nginxк°Җ нҢҢмқјмқ„ м°ҫм§Җ лӘ»н•ҳкі  404лҘј л°ҳнҷҳн•ңлӢӨ. try_files $uri $uri/ /index.htmlлЎң лӘЁл“  мҡ”мІӯмқ„ index.htmlлЎң ліҙлӮҙ SPA лқјмҡ°н„°к°Җ мІҳлҰ¬н•ҳкІҢ н•ңлӢӨ.",
        phase: "nginx_conf",
      },
      {
        title: "STEP 3 В· try_files мһ‘лҸҷ мӣҗлҰ¬",
        desc: "лёҢлқјмҡ°м Җк°Җ /aboutмқ„ мҡ”мІӯн•ҳл©ҙ: (1) /about нҢҢмқј нҷ•мқё вҶ’ м—ҶмқҢ, (2) /about/ л””л үнҶ лҰ¬ нҷ•мқё вҶ’ м—ҶмқҢ, (3) /index.html л°ҳнҷҳ! лёҢлқјмҡ°м Җк°Җ index.htmlмқ„ л°ӣмңјл©ҙ React/Vue лқјмҡ°н„°к°Җ /about кІҪлЎңлҘј мІҳлҰ¬н•ңлӢӨ.",
        phase: "try_files",
      },
      {
        title: "STEP 4 В· м •м Ғ м—җм…Ӣ мәҗмӢң м„Өм •",
        desc: "JS/CSS/мқҙлҜём§Җм—җ Cache-Control: public, immutableкіј expires 1yлҘј м„Өм •н•ңлӢӨ. Vite/webpackмқҖ л№Ңл“ңл§ҲлӢӨ нҢҢмқјлӘ…м—җ н•ҙмӢңлҘј л¶ҷмқҙлҜҖлЎң(app.abc123.js) м•Ҳм „н•ҳкІҢ мһҘкё° мәҗмӢңлҘј м Ғмҡ©н•  мҲҳ мһҲлӢӨ.",
        phase: "cache",
      },
      {
        title: "STEP 5 В· л№Ңл“ң л°Ҹ мӢӨн–ү",
        desc: "npm run buildлЎң dist/ нҸҙлҚ”лҘј мғқм„ұн•ҳкі , docker buildлЎң мқҙлҜём§ҖлҘј л§Ңл“Өкі , -p 8080:80мңјлЎң мӢӨн–үн•ңлӢӨ. nginx:alpine кё°л°ҳмқҙлқј мқҙлҜём§Җ нҒ¬кё°к°Җ ~30MBлЎң л§Өмҡ° мһ‘кі  л№Ңл“ңлҸ„ л№ лҘҙлӢӨ.",
        phase: "build_run",
      },
      {
        title: "STEP 6 В· 4мў… н”„лЎңм қнҠё Dockerнҷ” л№„көҗ",
        desc: "Spring Boot(~250MB, 2мҠӨн…Ңмқҙм§Җ), Node.js(~150MB, 1мҠӨн…Ңмқҙм§Җ), Next.js(~150MB, 3мҠӨн…Ңмқҙм§Җ), HTML+Nginx(~30MB, 1мҠӨн…Ңмқҙм§Җ). м •м Ғ мӮ¬мқҙнҠёк°Җ к°ҖмһҘ лӢЁмҲңн•ҳкі  к°ҖліҚлӢӨ.",
        phase: "compare",
      },
    ];

    function ThreeLines() {
      const lines = [
        { text: "FROM nginx:alpine", desc: "Nginx мӣ№ м„ңлІ„ мқҙлҜём§Җ", icon: "рҹ–ҘпёҸ" },
        { text: "COPY nginx.conf /etc/nginx/conf.d/default.conf", desc: "м„ңлІ„ м„Өм • нҢҢмқј", icon: "вҡҷпёҸ" },
        { text: "COPY dist/ /usr/share/nginx/html/", desc: "м •м Ғ нҢҢмқј ліөмӮ¬", icon: "рҹ“Ғ" },
      ];
      return (
        <div className="bg-white rounded-xl border-2 border-emerald-300 p-6 anim-fade">
          <h4 className="text-center font-bold text-emerald-800 mb-4">Dockerfile вҖ” лӢЁ 3мӨ„!</h4>
          <div className="space-y-4">
            {lines.map((l, i) => (
              <div key={i} className="flex items-center gap-4 anim-slide" style={{animationDelay:`${i*0.2}s`}}>
                <span className="text-3xl">{l.icon}</span>
                <div className="flex-1">
                  <div className="bg-gray-900 rounded-lg px-4 py-2 font-mono text-sm text-green-300">{l.text}</div>
                  <p className="text-xs text-slate-500 mt-1 ml-1">{l.desc}</p>
                </div>
              </div>
            ))}
          </div>
          <div className="mt-4 text-center">
            <span className="bg-emerald-100 text-emerald-700 px-4 py-2 rounded-full text-sm font-bold">мөңмў… мқҙлҜём§Җ: ~30MB</span>
          </div>
        </div>
      );
    }

    function NginxConf() {
      const lines = [
        { text: "server {", hl: false },
        { text: "    listen       80;", hl: false },
        { text: "    server_name  localhost;", hl: false },
        { text: "", hl: false },
        { text: "    root   /usr/share/nginx/html;", hl: false },
        { text: "    index  index.html;", hl: false },
        { text: "", hl: false },
        { text: "    # SPA лқјмҡ°нҢ…: нҢҢмқјмқҙ м—Ҷмңјл©ҙ index.htmlлЎң нҸҙл°ұ", hl: false },
        { text: "    location / {", hl: true },
        { text: "        try_files $uri $uri/ /index.html;", hl: true },
        { text: "    }", hl: true },
        { text: "", hl: false },
        { text: "    # м •м Ғ м—җм…Ӣ мәҗмӢң м„Өм •", hl: false },
        { text: '    location ~* \\.(js|css|png|jpg)$ {', hl: false },
        { text: "        expires 1y;", hl: false },
        { text: "    }", hl: false },
        { text: "}", hl: false },
      ];
      return (
        <div className="bg-gray-900 rounded-xl p-5 font-mono text-sm anim-fade">
          <div className="flex items-center gap-2 mb-3">
            <div className="w-3 h-3 rounded-full bg-red-500"></div>
            <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div className="w-3 h-3 rounded-full bg-green-500"></div>
            <span className="text-gray-400 text-xs ml-2">nginx.conf</span>
          </div>
          {lines.map((l, i) => (
            <div key={i} className={`px-2 py-0.5 rounded ${l.hl ? 'bg-blue-900/50 text-blue-300' : 'text-gray-400'}`}>{l.text || '\u00A0'}</div>
          ))}
        </div>
      );
    }

    function TryFilesFlow() {
      const steps = [
        { req: "/about мҡ”мІӯ", check: "$uri вҶ’ /about нҢҢмқј", result: "м—ҶмқҢ вқҢ", color: "red" },
        { req: "", check: "$uri/ вҶ’ /about/ л””л үнҶ лҰ¬", result: "м—ҶмқҢ вқҢ", color: "red" },
        { req: "", check: "/index.html вҶ’ л°ҳнҷҳ!", result: "м„ұкіө вң…", color: "green" },
      ];
      return (
        <div className="bg-white rounded-xl border-2 border-blue-200 p-6 anim-fade">
          <h4 className="font-bold text-blue-800 mb-4 text-center">try_files $uri $uri/ /index.html мһ‘лҸҷ нқҗлҰ„</h4>
          <div className="flex items-center justify-center mb-4">
            <span className="bg-blue-100 text-blue-700 px-4 py-2 rounded-full font-mono text-sm anim-bounce">GET /about</span>
          </div>
          <div className="space-y-3">
            {steps.map((s, i) => (
              <div key={i} className={`flex items-center gap-3 p-3 rounded-lg border anim-slide ${
                s.color === 'green' ? 'bg-green-50 border-green-300' : 'bg-red-50 border-red-300'
              }`} style={{animationDelay:`${i*0.2}s`}}>
                <span className="text-lg font-bold text-slate-400 w-6">{i + 1}</span>
                <div className="flex-1 font-mono text-sm">{s.check}</div>
                <span className={`text-sm font-bold ${s.color === 'green' ? 'text-green-600' : 'text-red-600'}`}>{s.result}</span>
              </div>
            ))}
          </div>
          <div className="mt-4 bg-blue-50 border border-blue-200 rounded-lg p-3 text-center text-sm text-blue-700">
            лёҢлқјмҡ°м Җк°Җ index.htmlмқ„ л°ӣмңјл©ҙ React/Vue лқјмҡ°н„°к°Җ /about кІҪлЎңлҘј мІҳлҰ¬!
          </div>
        </div>
      );
    }

    function CacheView() {
      const items = [
        { file: "app.abc123.js", cache: "1л…„ мәҗмӢң", safe: true, reason: "н•ҙмӢңк°Җ нҸ¬н•Ёлҗҳм–ҙ нҢҢмқј ліҖкІҪ мӢң мғҲ URL мғқм„ұ" },
        { file: "style.def456.css", cache: "1л…„ мәҗмӢң", safe: true, reason: "н•ҙмӢңк°Җ нҸ¬н•Ёлҗҳм–ҙ м•Ҳм „н•ҳкІҢ мһҘкё° мәҗмӢң" },
        { file: "index.html", cache: "мәҗмӢң м•Ҳ н•Ё", safe: true, reason: "н•ӯмғҒ мөңмӢ  HTMLмқ„ к°Җм ёмҷҖм•ј мғҲ JS/CSS м°ёмЎ°" },
      ];
      return (
        <div className="space-y-3 anim-fade">
          {items.map((item, i) => (
            <div key={i} className={`rounded-xl border-2 p-4 anim-slide ${
              item.cache === "мәҗмӢң м•Ҳ н•Ё" ? 'border-amber-300 bg-amber-50' : 'border-emerald-300 bg-emerald-50'
            }`} style={{animationDelay:`${i*0.15}s`}}>
              <div className="flex items-center justify-between mb-2">
                <code className="font-mono text-sm font-bold">{item.file}</code>
                <span className={`text-xs px-2 py-1 rounded-full font-bold ${
                  item.cache === "мәҗмӢң м•Ҳ н•Ё" ? 'bg-amber-200 text-amber-700' : 'bg-emerald-200 text-emerald-700'
                }`}>{item.cache}</span>
              </div>
              <p className="text-xs text-slate-600">{item.reason}</p>
            </div>
          ))}
        </div>
      );
    }

    function BuildRun() {
      const commands = [
        { cmd: "npm run build", desc: "dist/ нҸҙлҚ” мғқм„ұ", icon: "рҹ”Ё" },
        { cmd: "docker build -t staticapp:latest .", desc: "мқҙлҜём§Җ л№Ңл“ң (~30MB)", icon: "рҹ“Ұ" },
        { cmd: "docker run -d -p 8080:80 staticapp:latest", desc: "м»Ён…Ңмқҙл„Ҳ мӢӨн–ү", icon: "рҹҡҖ" },
        { cmd: "curl http://localhost:8080", desc: "лҸҷмһ‘ нҷ•мқё", icon: "вң…" },
      ];
      return (
        <div className="bg-gray-900 rounded-xl p-5 anim-fade">
          <div className="flex items-center gap-2 mb-4">
            <div className="w-3 h-3 rounded-full bg-red-500"></div>
            <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div className="w-3 h-3 rounded-full bg-green-500"></div>
            <span className="text-gray-400 text-xs ml-2">Terminal</span>
          </div>
          <div className="space-y-3">
            {commands.map((c, i) => (
              <div key={i} className="anim-slide" style={{animationDelay:`${i*0.2}s`}}>
                <div className="flex items-center gap-3">
                  <span className="text-xl">{c.icon}</span>
                  <code className="text-green-400 font-mono text-sm">$ {c.cmd}</code>
                </div>
                <p className="text-gray-500 text-xs ml-10">{c.desc}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function CompareTable() {
      const projects = [
        { name: "Spring Boot", size: "~250MB", stages: 2, runtime: "JVM", icon: "вҳ•", pitfall: "JDK мқҙлҜём§Җ к·ёлҢҖлЎң мӮ¬мҡ©" },
        { name: "Node.js", size: "~150MB", stages: 1, runtime: "Node.js", icon: "рҹ’ҡ", pitfall: "node_modules .dockerignore лҲ„лқҪ" },
        { name: "Next.js", size: "~150MB", stages: 3, runtime: "Node.js", icon: "в–І", pitfall: "static/public ліөмӮ¬ лҲ„лқҪ" },
        { name: "HTML+Nginx", size: "~30MB", stages: 1, runtime: "Nginx", icon: "рҹҢҗ", pitfall: "SPA try_files лҲ„лқҪ", best: true },
      ];
      return (
        <div className="space-y-3 anim-fade">
          {projects.map((p, i) => (
            <div key={i} className={`rounded-xl border-2 p-4 flex items-center gap-4 anim-slide ${
              p.best ? 'border-emerald-400 bg-emerald-50 shadow-lg' : 'border-slate-200 bg-white'
            }`} style={{animationDelay:`${i*0.12}s`}}>
              <span className="text-3xl">{p.icon}</span>
              <div className="flex-1">
                <div className="font-bold">{p.name}</div>
                <div className="text-xs text-slate-500">{p.stages}мҠӨн…Ңмқҙм§Җ | {p.runtime}</div>
              </div>
              <div className="text-right">
                <div className="font-bold text-lg">{p.size}</div>
                <div className="text-xs text-red-500">н•Ём •: {p.pitfall}</div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const renderVisual = () => {
        switch(data.phase) {
          case "three_lines": return <ThreeLines />;
          case "nginx_conf": return <NginxConf />;
          case "try_files": return <TryFilesFlow />;
          case "cache": return <CacheView />;
          case "build_run": return <BuildRun />;
          case "compare": return <CompareTable />;
          default: return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VIII-1-12: HTML+Nginx м •м Ғ мӮ¬мқҙнҠё Dockerнҷ”</h1>
              </div>
              <p className="text-slate-500 text-sm">к°ҖмһҘ лӢЁмҲңн•ң Dockerнҷ” мҳҲм ң. Dockerfile 3мӨ„, nginx.conf м„Өм •, SPA лқјмҡ°нҢ…к№Ңм§Җ лӢЁкі„лі„лЎң мӢңл®¬л Ҳмқҙм…ҳн•©лӢҲлӢӨ.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "compare" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "try_files" ? "bg-amber-600 border-amber-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            <div key={`visual-${step}`}>{renderVisual()}</div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">вҶҗ мқҙм „</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? 'вҸё м •м§Җ' : 'в–¶ мһҗлҸҷ мӢӨн–ү'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">лӢӨмқҢ вҶ’</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
