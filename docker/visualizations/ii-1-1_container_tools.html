<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — Docker vs Podman vs LXC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes flowDown { from{opacity:0;transform:translateY(-10px);} to{opacity:1;transform:translateY(0);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-flow { animation: flowDown 0.4s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TOOLS = {
      docker: { name: "Docker", icon: "🐳", year: "2013", maker: "Docker Inc.", color: "blue" },
      podman: { name: "Podman", icon: "🦭", year: "2018", maker: "Red Hat", color: "purple" },
      lxc:    { name: "LXC",    icon: "🐧", year: "2008", maker: "Linux 커뮤니티", color: "orange" },
    };

    const COMPARE_ROWS = [
      { label: "데몬(백그라운드)", docker: "필요 (dockerd)", podman: "없음", lxc: "없음" },
      { label: "루트 권한", docker: "기본 필요", podman: "불필요 (rootless)", lxc: "기본 필요" },
      { label: "CLI 명령어", docker: "docker run ...", podman: "podman run ...", lxc: "lxc-start ..." },
      { label: "OCI 호환", docker: "✓", podman: "✓", lxc: "✗ (자체 형식)" },
      { label: "실무 사용률", docker: "높음 (1위)", podman: "증가 중", lxc: "낮음 (레거시)" },
      { label: "학습 난이도", docker: "보통", podman: "보통 (Docker와 동일)", lxc: "높음" },
    ];

    const STEPS = [
      {
        title: "STEP 1 · 컨테이너 도구 3종",
        desc: "Docker만 컨테이너 도구가 아니다. 자동차에 현대·기아·BMW가 있듯, 컨테이너에도 Docker·Podman·LXC가 있다. 운전 면허(컨테이너 개념) 하나면 어느 도구든 다룰 수 있다.",
        phase: "intro",
      },
      {
        title: "STEP 2 · Docker 아키텍처 — 데몬 기반",
        desc: "Docker는 항상 켜져 있는 데몬(dockerd)이 핵심이다. CLI가 데몬에 요청을 보내고, 데몬이 containerd를 통해 컨테이너를 만든다. 데몬은 루트 권한으로 실행되므로, 보안에 민감한 환경에서는 주의가 필요하다.",
        phase: "docker",
      },
      {
        title: "STEP 3 · Podman 아키텍처 — 데몬 없음",
        desc: "Podman은 데몬이 없다(daemonless). CLI가 직접 컨테이너를 실행한다. 루트 권한 없이도 동작한다(rootless). 보안이 엄격한 기업에서 선호한다. 명령어는 Docker와 거의 동일하다.",
        phase: "podman",
      },
      {
        title: "STEP 4 · LXC — Docker의 선조",
        desc: "LXC(Linux Containers)는 2008년에 나온 저수준 컨테이너 기술이다. Docker 자체가 초기에 LXC를 기반으로 만들어졌다. 지금은 직접 쓰는 경우가 드물지만, 컨테이너 역사의 출발점이다.",
        phase: "lxc",
      },
      {
        title: "STEP 5 · 명령어 호환성",
        desc: "Docker와 Podman은 명령어가 거의 같다. 'docker run -d nginx'를 'podman run -d nginx'로 바꾸면 그대로 동작한다. 전환 비용이 거의 없다.",
        phase: "compat",
      },
      {
        title: "STEP 6 · 실무 선택 가이드",
        desc: "대부분의 팀에서는 Docker를 사용한다. 생태계가 가장 크고 자료가 많다. 보안이 최우선인 환경이라면 Podman을 고려한다. LXC는 특수한 경우가 아니면 선택할 필요 없다.",
        phase: "guide",
      },
    ];

    /* -- 아키텍처 다이어그램 -- */
    function ArchDiagram({ tool }) {
      const configs = {
        docker: {
          steps: [
            { label: "사용자", icon: "👤", bg: "bg-slate-100 border-slate-300" },
            { label: "Docker CLI", icon: "⌨️", bg: "bg-blue-100 border-blue-300" },
            { label: "dockerd (데몬)", icon: "⚙️", bg: "bg-blue-200 border-blue-400", highlight: true, note: "루트 권한" },
            { label: "containerd", icon: "📦", bg: "bg-blue-100 border-blue-300" },
            { label: "컨테이너", icon: "🐳", bg: "bg-emerald-100 border-emerald-300" },
          ],
          color: "blue",
        },
        podman: {
          steps: [
            { label: "사용자", icon: "👤", bg: "bg-slate-100 border-slate-300" },
            { label: "Podman CLI", icon: "⌨️", bg: "bg-purple-100 border-purple-300" },
            { label: "컨테이너", icon: "🦭", bg: "bg-emerald-100 border-emerald-300" },
          ],
          color: "purple",
          note: "데몬 없음 · rootless",
        },
        lxc: {
          steps: [
            { label: "사용자", icon: "👤", bg: "bg-slate-100 border-slate-300" },
            { label: "lxc-* CLI", icon: "⌨️", bg: "bg-orange-100 border-orange-300" },
            { label: "Linux 커널 (cgroups + namespaces)", icon: "🐧", bg: "bg-orange-200 border-orange-400", highlight: true },
            { label: "컨테이너", icon: "📦", bg: "bg-emerald-100 border-emerald-300" },
          ],
          color: "orange",
        },
      };
      const cfg = configs[tool];
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 anim-fade">
          <h4 className="font-bold text-sm text-slate-700 mb-3">
            {TOOLS[tool].icon} {TOOLS[tool].name} 아키텍처
          </h4>
          <div className="flex flex-col items-center gap-1">
            {cfg.steps.map((s, i) => (
              <React.Fragment key={i}>
                <div className={`w-full max-w-xs rounded-lg border-2 px-4 py-2 text-center anim-flow ${s.bg}`} style={{animationDelay:`${i*0.15}s`}}>
                  <span className="mr-2">{s.icon}</span>
                  <span className="text-sm font-medium">{s.label}</span>
                  {s.highlight && <span className="ml-2 text-xs bg-yellow-200 text-yellow-800 px-2 py-0.5 rounded-full">{s.note || "핵심"}</span>}
                </div>
                {i < cfg.steps.length - 1 && (
                  <div className="text-slate-400 text-sm anim-flow" style={{animationDelay:`${i*0.15+0.08}s`}}>▼</div>
                )}
              </React.Fragment>
            ))}
          </div>
          {cfg.note && (
            <div className={`mt-3 text-center text-xs font-bold text-${cfg.color}-600 bg-${cfg.color}-50 rounded-lg py-1`}>
              {cfg.note}
            </div>
          )}
        </div>
      );
    }

    /* -- 비교 테이블 -- */
    function CompareTable() {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 overflow-x-auto anim-fade">
          <h4 className="font-bold text-sm text-slate-700 mb-3">📊 3종 비교표</h4>
          <table className="w-full text-xs">
            <thead>
              <tr className="border-b border-slate-200">
                <th className="text-left py-2 px-2 text-slate-500">항목</th>
                <th className="py-2 px-2 text-blue-600">🐳 Docker</th>
                <th className="py-2 px-2 text-purple-600">🦭 Podman</th>
                <th className="py-2 px-2 text-orange-600">🐧 LXC</th>
              </tr>
            </thead>
            <tbody>
              {COMPARE_ROWS.map((row, i) => (
                <tr key={i} className="border-b border-slate-100 anim-slide" style={{animationDelay:`${i*0.08}s`}}>
                  <td className="py-2 px-2 font-medium text-slate-700">{row.label}</td>
                  <td className="py-2 px-2 text-center text-slate-600">{row.docker}</td>
                  <td className="py-2 px-2 text-center text-slate-600">{row.podman}</td>
                  <td className="py-2 px-2 text-center text-slate-600">{row.lxc}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    /* -- 명령어 호환 -- */
    function CmdCompat() {
      const cmds = [
        { label: "컨테이너 실행", docker: "docker run -d nginx", podman: "podman run -d nginx" },
        { label: "이미지 목록", docker: "docker images", podman: "podman images" },
        { label: "실행 중 확인", docker: "docker ps", podman: "podman ps" },
        { label: "이미지 빌드", docker: "docker build -t app .", podman: "podman build -t app ." },
      ];
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 anim-fade">
          <h4 className="font-bold text-sm text-slate-700 mb-3">🔄 Docker ↔ Podman 명령어 비교</h4>
          <div className="space-y-2">
            {cmds.map((c, i) => (
              <div key={i} className="grid grid-cols-3 gap-2 items-center anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                <div className="text-xs text-slate-500 font-medium">{c.label}</div>
                <code className="bg-blue-50 text-blue-700 px-2 py-1 rounded text-[10px] text-center">{c.docker}</code>
                <code className="bg-purple-50 text-purple-700 px-2 py-1 rounded text-[10px] text-center">{c.podman}</code>
              </div>
            ))}
          </div>
          <div className="mt-3 bg-emerald-50 border border-emerald-200 rounded-lg p-2 text-center">
            <span className="text-xs text-emerald-700 font-bold">docker → podman 으로 바꾸면 그대로 동작 ✓</span>
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const phaseColor = data.phase === "guide" ? "bg-emerald-600 border-emerald-700" :
                          data.phase === "docker" ? "bg-blue-600 border-blue-700" :
                          data.phase === "podman" ? "bg-purple-600 border-purple-700" :
                          data.phase === "lxc" ? "bg-orange-600 border-orange-700" :
                          "bg-slate-600 border-slate-700";

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter II-1-1: Docker, Podman, LXC — 뭐가 다른가</h1>
              </div>
              <p className="text-slate-500 text-sm">컨테이너 도구 3종의 아키텍처와 특징을 비교합니다</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade text-white ${phaseColor}`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 인트로: 3종 카드 */}
            {data.phase === "intro" && (
              <div className="grid grid-cols-3 gap-4">
                {Object.entries(TOOLS).map(([key, tool], i) => (
                  <div key={key} className={`bg-white rounded-xl border-2 border-${tool.color}-300 p-4 text-center anim-slide`} style={{animationDelay:`${i*0.15}s`}}>
                    <div className="text-4xl mb-2">{tool.icon}</div>
                    <div className="font-bold text-lg">{tool.name}</div>
                    <div className="text-xs text-slate-500 mt-1">{tool.year} · {tool.maker}</div>
                  </div>
                ))}
              </div>
            )}

            {data.phase === "docker" && <ArchDiagram tool="docker" />}
            {data.phase === "podman" && <ArchDiagram tool="podman" />}
            {data.phase === "lxc" && <ArchDiagram tool="lxc" />}
            {data.phase === "compat" && <CmdCompat />}

            {data.phase === "guide" && (
              <div className="space-y-4">
                <CompareTable />
                <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-5 text-center anim-fade">
                  <h3 className="text-lg font-bold text-emerald-800 mb-3">실무 선택 가이드</h3>
                  <div className="flex flex-wrap justify-center gap-3">
                    {[
                      { label: "대부분의 팀 → Docker", color: "bg-blue-200 text-blue-800" },
                      { label: "보안 중시 → Podman", color: "bg-purple-200 text-purple-800" },
                      { label: "특수 환경 → LXC", color: "bg-orange-200 text-orange-800" },
                    ].map((item, i) => (
                      <span key={i} className={`px-4 py-2 rounded-full text-sm font-medium anim-slide ${item.color}`} style={{animationDelay:`${i*0.1}s`}}>
                        {item.label}
                      </span>
                    ))}
                  </div>
                </div>
              </div>
            )}

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
