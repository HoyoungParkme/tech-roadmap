          podman:     { bg: 'bg-violet-500',  text: 'text-white',     ring: 'ring-violet-300' },
        };
        return map[tool] || { bg: 'bg-slate-200', text: 'text-slate-700', ring: '' };
      };

      const isFocused = (node) => {
        if (focus === 'all') return true;
        if (node.kind === 'actor' || node.kind === 'kernel') return true;
        if (focus === 'docker' && (node.tool === 'docker')) return true;
        if (focus === 'docker' && (node.id === 'containerd' || node.id === 'runc')) return true; // Docker 는 풀스택
        if (focus === 'containerd' && (node.tool === 'containerd' || node.id === 'runc')) return true;
        if (focus === 'runc' && node.tool === 'runc') return true;
        if (focus === 'podman' && (node.tool === 'podman' || node.id === 'runc')) return true;
        return false;
      };

      const isPrimary = (node) => {
        if (focus === 'all') return false;
        if (focus === 'docker' && node.id === 'docker') return true;
        if (focus === 'docker' && node.id === 'dockerd') return true;
        if (focus === 'containerd' && node.id === 'containerd') return true;
        if (focus === 'runc' && node.id === 'runc') return true;
        if (focus === 'podman' && node.id === 'podman') return true;
        return false;
      };

      return (
        <div className="bg-white rounded-lg border-2 border-sky-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🧱</span>
              <span className="text-[11px] font-bold text-sky-800">컨테이너 도구 스택 (4 레이어)</span>
            </div>
            <span className="text-[9px] bg-sky-100 text-sky-700 px-1.5 py-0.5 rounded font-mono">
              focus: {focus}
            </span>
          </div>

          <div className="flex flex-col items-center gap-1">
            {NODES.map((n, i) => {
              const focused = isFocused(n);
              const primary = isPrimary(n);
              let cls = '';

              if (n.kind === 'actor') {
                cls = 'bg-slate-100 text-slate-700 border-slate-300';
              } else if (n.kind === 'kernel') {
                cls = 'bg-slate-700 text-white border-slate-800';
              } else {
                const c = colorOf(n.tool);
                if (primary) {
                  cls = `${c.bg} ${c.text} border-transparent ring-4 ${c.ring} shadow-md scale-[1.03]`;
                } else if (focused) {
                  cls = `${c.bg} ${c.text} border-transparent opacity-90`;
                } else {
                  cls = 'bg-slate-100 text-slate-400 border-slate-200 opacity-60';
                }
              }

              // dockerd / podman 은 같은 줄에 나란히 — 단 podman 자리는 별도 줄로 본다
              return (
                <React.Fragment key={n.id}>
                  <div
                    className={`w-full max-w-[20rem] rounded-lg border-2 px-3 py-1.5 text-center text-[11px] font-medium transition-all duration-500 ${cls}`}
                  >
                    {n.label}
                    {n.sub && (
                      <span className="block text-[9px] opacity-80 mt-0.5">{n.sub}</span>
                    )}
                    {primary && (
                      <span className="ml-1.5 inline-block bg-white/90 text-slate-800 text-[8px] font-bold px-1.5 py-0.5 rounded-full">
                        FOCUS
                      </span>
                    )}
                  </div>
                  {i < NODES.length - 1 && (
                    <div className="text-slate-400 text-[10px] leading-none">▼</div>
                  )}
                </React.Fragment>
              );
            })}
          </div>

          {/* 4 도구 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500 justify-center">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>Docker
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-cyan-500"></span>containerd
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-indigo-500"></span>runc
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-violet-500"></span>Podman
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: 도구 카드 (focus 도구 강조) 또는 비교 표
    // ─────────────────────────────────────────────────────
    function FocusCard({ tool }) {
      const t = TOOLS[tool];
      const styleMap = {
        docker:     { border: 'border-sky-300',    bg: 'bg-sky-50',    title: 'text-sky-800',    badge: 'bg-sky-600' },
        containerd: { border: 'border-cyan-300',   bg: 'bg-cyan-50',   title: 'text-cyan-800',   badge: 'bg-cyan-600' },
        runc:       { border: 'border-indigo-300', bg: 'bg-indigo-50', title: 'text-indigo-800', badge: 'bg-indigo-600' },
        podman:     { border: 'border-violet-300', bg: 'bg-violet-50', title: 'text-violet-800', badge: 'bg-violet-600' },
      };
      const s = styleMap[tool];

      // 도구별 핵심 포인트 3개
      const pointsMap = {
        docker: [
          '풀스택 — CLI + 데몬 + 런타임 + 빌더 한 묶음',
          'dockerd 항상 실행 (루트 권한)',
          '입문·개발 PC 표준 — 자료가 가장 많다',
        ],
        containerd: [
          '컨테이너 lifecycle 관리 전담',
          'CNCF 졸업 · k8s 1.24+ 표준 런타임',
          'CLI: ctr (저수준) / nerdctl (Docker 호환)',
        ],
        runc: [
          'OCI 런타임 레퍼런스 구현',
          'Linux namespace + cgroup 직접 호출',
          '컨테이너 1개 생성만 — 이미지·네트워크 없음',
        ],
        podman: [
          'daemonless — 항상 떠있는 데몬 없음',
          'rootless — 일반 유저로 컨테이너 실행',
          '명령어 docker 와 100% 호환',
        ],
      };
      const points = pointsMap[tool];

      return (
        <div className={`rounded-lg border-2 ${s.border} ${s.bg} p-3`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-2">
              <span className="text-2xl">{t.icon}</span>
              <div>
                <div className={`text-sm font-bold ${s.title}`}>{t.name}</div>
                <div className="text-[9px] text-slate-500">{t.role}</div>
              </div>
            </div>
            <span className={`text-[9px] ${s.badge} text-white px-2 py-0.5 rounded font-mono font-bold uppercase`}>
              {t.tag}
            </span>
          </div>

          <ul className="space-y-1">
            {points.map((p, i) => (
              <li key={i} className={`text-[10px] ${s.title} flex items-start gap-1.5 leading-snug`}>
                <span className="font-bold mt-0.5">▸</span>
                <span>{p}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function CompareTable() {
      return (
        <div className="rounded-lg border-2 border-sky-300 bg-sky-50 p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">📊</span>
            <span className="text-[11px] font-bold text-sky-800">4 도구 비교표</span>
          </div>
          <div className="bg-white rounded border border-sky-200 overflow-x-auto">
            <table className="w-full text-[10px]">
              <thead>
                <tr className="border-b-2 border-sky-200 bg-sky-50">
                  <th className="text-left py-1.5 px-2 text-slate-600 font-bold">항목</th>
                  <th className="py-1.5 px-1 text-sky-700 font-bold">🐳 Docker</th>
                  <th className="py-1.5 px-1 text-cyan-700 font-bold">⚙️ containerd</th>
                  <th className="py-1.5 px-1 text-indigo-700 font-bold">🔩 runc</th>
                  <th className="py-1.5 px-1 text-violet-700 font-bold">🦭 Podman</th>
                </tr>
              </thead>
              <tbody>
                {COMPARE_ROWS.map((row, i) => (
                  <tr key={i} className="border-b border-slate-100 last:border-b-0">
                    <td className="py-1.5 px-2 font-medium text-slate-700 whitespace-nowrap">{row.label}</td>
                    <td className="py-1.5 px-1 text-center text-slate-600">{row.docker}</td>
                    <td className="py-1.5 px-1 text-center text-slate-600">{row.containerd}</td>
                    <td className="py-1.5 px-1 text-center text-slate-600">{row.runc}</td>
                    <td className="py-1.5 px-1 text-center text-slate-600">{row.podman}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="text-[9px] text-sky-700 mt-1.5 leading-snug">
            ✓ 4 도구는 경쟁이 아니라 레이어 관계 — 입문은 Docker · k8s 는 containerd · 보안은 Podman · 디버깅은 runc
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 4-레이어 스택 다이어그램
    //   하단: 도구 카드 또는 비교표 (showCompare)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🐳 컨테이너 도구 4종 — 스택 관계</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <StackDiagram focus={step.focus} />
            {step.showCompare ? <CompareTable /> : <FocusCard tool={step.focus} />}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="./index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 컨테이너 생태계 &gt; Chapter 1. 도구 비교</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-1-1. 컨테이너 도구들 — Docker / containerd / runc / Podman</h1>
                  <p className="text-sm text-slate-500 mt-0.5">스택 관계로 이해하기 — 풀스택(Docker) · 런타임(containerd) · 저수준(runc) · 대안(Podman)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: 입문은 <strong>Docker</strong>, k8s 운영은 <strong>containerd</strong>, 디버깅·보안 검증은 <strong>runc</strong>, rootless 보안은 <strong>Podman</strong>. 다음(II-1-2)에서는 OCI 표준이 어떻게 도구 사이 호환을 만들어내는지 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Docker', 'containerd', 'runc', 'Podman', 'OCI', 'daemonless', 'rootless'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./i-1-4_docker_benefits.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; I-1-4 Docker 도입 효과</a>
              <a href="./ii-1-2_oci_standard.html" className="text-sky-700 hover:text-sky-900 font-medium">II-1-2 OCI 표준 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
