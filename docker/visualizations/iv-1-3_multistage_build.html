<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — 멀티 스테이지 빌드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes shrink { from{width:100%;} to{width:var(--target-width);} }
    @keyframes growBar { from{width:0%;} to{width:100%;} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── STEPS ── */
    const STEPS = [
      {
        title: "STEP 1 · 단일 스테이지 빌드의 문제",
        desc: "python:3.11 풀 이미지(약 900MB)에 앱 코드와 패키지를 설치한다. gcc, make 같은 빌드 도구가 전부 포함되어 최종 이미지가 1GB를 넘는다. 실행 시에는 이 도구들이 전혀 필요 없다.",
        phase: "single_problem",
      },
      {
        title: "STEP 2 · 멀티 스테이지 아이디어",
        desc: "이사할 때 공구함(망치, 드라이버)을 새집에 전부 가져가지 않는 것과 같다. 가구를 조립하고 나면 완성된 가구만 옮긴다. 빌드 도구는 빌드 스테이지에만 두고, 실행 스테이지에는 결과물만 복사한다.",
        phase: "idea",
      },
      {
        title: "STEP 3 · 빌드 스테이지 (Stage 1: builder)",
        desc: "FROM python:3.11 AS builder — 풀 이미지에서 pip install --prefix=/install로 패키지를 설치한다. gcc가 필요한 컴파일이 이 단계에서 수행된다. 설치된 패키지는 /install 디렉토리에 모인다.",
        phase: "builder",
      },
      {
        title: "STEP 4 · 실행 스테이지 (Stage 2: runner)",
        desc: "FROM python:3.11-slim — 경량 이미지에서 시작한다. COPY --from=builder /install /usr/local 로 빌드 스테이지에서 패키지만 가져온다. gcc, make, 헤더 파일은 복사하지 않는다.",
        phase: "runner",
      },
      {
        title: "STEP 5 · 이미지 크기 비교",
        desc: "같은 앱인데 단일 스테이지는 1.01GB, 멀티 스테이지는 178MB다. 5배 이상 차이가 난다. 레지스트리 저장 비용, 컨테이너 시작 시간, 네트워크 전송 시간 모두 줄어든다.",
        phase: "compare",
      },
      {
        title: "STEP 6 · 멀티 스테이지 빌드 핵심 정리",
        desc: "하나의 Dockerfile에 FROM을 여러 번 쓴다. AS로 스테이지에 이름을 붙이고, COPY --from=으로 필요한 파일만 가져온다. 프로덕션 이미지의 표준 패턴이다.",
        phase: "summary",
      },
    ];

    /* ── 빌드 레이어 데이터 ── */
    const SINGLE_LAYERS = [
      { label: "Base OS (Debian)", size: 120, color: "bg-slate-400" },
      { label: "Python 3.11 런타임", size: 150, color: "bg-blue-400" },
      { label: "gcc, make, 헤더 파일", size: 350, color: "bg-red-400" },
      { label: "pip 패키지 (컴파일 포함)", size: 280, color: "bg-orange-400" },
      { label: "앱 소스 코드", size: 10, color: "bg-emerald-400" },
    ];

    const MULTI_LAYERS = [
      { label: "Base OS (Debian slim)", size: 60, color: "bg-slate-400" },
      { label: "Python 3.11-slim 런타임", size: 80, color: "bg-blue-400" },
      { label: "pip 패키지 (결과만)", size: 30, color: "bg-emerald-400" },
      { label: "앱 소스 코드", size: 8, color: "bg-emerald-500" },
    ];

    /* ── 레이어 스택 컴포넌트 ── */
    function LayerStack({ layers, title, totalLabel, highlight, icon }) {
      const total = layers.reduce((s, l) => s + l.size, 0);
      const maxSize = 400;
      return (
        <div className={`rounded-xl border-2 p-4 transition-all duration-500 ${highlight ? "border-blue-400 bg-white shadow-lg" : "border-slate-200 bg-slate-50 opacity-60"}`}>
          <div className="text-center mb-3">
            <span className="text-3xl">{icon}</span>
            <div className="font-bold text-sm mt-1">{title}</div>
            <div className="text-xs text-slate-500">{totalLabel}</div>
          </div>
          <div className="space-y-1.5">
            {layers.map((layer, i) => (
              <div key={i} className="anim-slide" style={{ animationDelay: `${i * 0.1}s` }}>
                <div className="flex items-center gap-2">
                  <div className={`h-6 rounded ${layer.color} transition-all duration-700`}
                    style={{ width: `${Math.max((layer.size / maxSize) * 100, 8)}%`, minWidth: "30px" }} />
                  <span className="text-xs text-slate-600 whitespace-nowrap">{layer.label}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ── Dockerfile 코드 블록 ── */
    function DockerfileBlock({ lines, highlightLines, title }) {
      return (
        <div className="bg-slate-900 rounded-xl p-4 font-mono text-sm overflow-x-auto">
          <div className="text-slate-400 text-xs mb-2">{title}</div>
          {lines.map((line, i) => (
            <div key={i} className={`px-2 py-0.5 rounded ${highlightLines.includes(i) ? "bg-yellow-900/50 text-yellow-300" : "text-slate-300"}`}>
              {line}
            </div>
          ))}
        </div>
      );
    }

    /* ── 메인 앱 ── */
    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const singleDockerfile = [
        "FROM python:3.11",
        "",
        "WORKDIR /app",
        "COPY requirements.txt .",
        "RUN pip install --no-cache-dir -r requirements.txt",
        "COPY app/ .",
        'CMD ["uvicorn", "main:app", "--host", "0.0.0.0"]',
      ];

      const multiDockerfile = [
        "# --- Stage 1: 빌드 ---",
        "FROM python:3.11 AS builder",
        "",
        "WORKDIR /build",
        "COPY requirements.txt .",
        "RUN pip install --prefix=/install -r requirements.txt",
        "",
        "# --- Stage 2: 실행 ---",
        "FROM python:3.11-slim",
        "",
        "WORKDIR /app",
        "COPY --from=builder /install /usr/local",
        "COPY app/ .",
        'CMD ["uvicorn", "main:app", "--host", "0.0.0.0"]',
      ];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter IV-1-3: 멀티 스테이지 빌드</h1>
              </div>
              <p className="text-slate-500 text-sm">빌드 도구를 최종 이미지에서 제거해 이미지 크기를 1GB에서 178MB로 줄이는 과정을 시뮬레이션합니다.</p>
            </header>

            {/* 현재 단계 설명 */}
            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "single_problem" ? "bg-red-600 border-red-700 text-white" :
              data.phase === "summary" ? "bg-emerald-600 border-emerald-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 시각화 영역 */}
            {data.phase === "single_problem" && (
              <div key="single" className="anim-fade">
                <LayerStack layers={SINGLE_LAYERS} title="단일 스테이지 이미지" totalLabel="총 ~1.01GB" highlight={true} icon="📦" />
                <div className="bg-red-50 border border-red-200 rounded-xl p-4 text-center mt-4">
                  <span className="text-red-600 font-bold">gcc, make, 헤더 파일이 최종 이미지에 포함됨 — 실행 시 불필요!</span>
                </div>
              </div>
            )}

            {data.phase === "idea" && (
              <div key="idea" className="grid grid-cols-1 md:grid-cols-3 gap-4 anim-fade">
                <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-5 text-center">
                  <div className="text-4xl mb-2">🔨</div>
                  <div className="font-bold text-amber-800">빌드 스테이지</div>
                  <div className="text-sm text-amber-600 mt-2">gcc, make로 컴파일<br/>pip install로 패키지 설치<br/>결과물을 /install에 모음</div>
                </div>
                <div className="flex items-center justify-center">
                  <div className="text-4xl">→</div>
                  <div className="text-xs text-slate-500 ml-1">필요한 파일만<br/>복사</div>
                </div>
                <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-5 text-center">
                  <div className="text-4xl mb-2">🚀</div>
                  <div className="font-bold text-emerald-800">실행 스테이지</div>
                  <div className="text-sm text-emerald-600 mt-2">slim 이미지 기반<br/>패키지 결과물만 복사<br/>앱 코드 복사</div>
                </div>
              </div>
            )}

            {data.phase === "builder" && (
              <div key="builder" className="space-y-4 anim-fade">
                <DockerfileBlock
                  title="Dockerfile — Stage 1: builder"
                  lines={multiDockerfile.slice(0, 6)}
                  highlightLines={[1, 5]}
                />
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className="bg-amber-50 border border-amber-200 rounded-xl p-4">
                    <div className="font-bold text-amber-800 mb-2">FROM python:3.11 AS builder</div>
                    <p className="text-sm text-amber-700">풀 이미지에서 시작. AS builder로 스테이지에 이름을 붙인다.</p>
                  </div>
                  <div className="bg-amber-50 border border-amber-200 rounded-xl p-4">
                    <div className="font-bold text-amber-800 mb-2">pip install --prefix=/install</div>
                    <p className="text-sm text-amber-700">패키지를 /install 디렉토리에 모아 설치. 다음 스테이지로 한 번에 복사하기 편하다.</p>
                  </div>
                </div>
              </div>
            )}

            {data.phase === "runner" && (
              <div key="runner" className="space-y-4 anim-fade">
                <DockerfileBlock
                  title="Dockerfile — Stage 2: runner"
                  lines={multiDockerfile.slice(7)}
                  highlightLines={[1, 4]}
                />
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4">
                    <div className="font-bold text-emerald-800 mb-2">FROM python:3.11-slim</div>
                    <p className="text-sm text-emerald-700">경량 이미지로 시작. gcc, make가 없어 수백 MB 절약.</p>
                  </div>
                  <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4">
                    <div className="font-bold text-emerald-800 mb-2">COPY --from=builder /install /usr/local</div>
                    <p className="text-sm text-emerald-700">builder 스테이지에서 설치된 패키지만 복사. 빌드 도구는 남기지 않는다.</p>
                  </div>
                </div>
              </div>
            )}

            {data.phase === "compare" && (
              <div key="compare" className="space-y-4 anim-fade">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div>
                    <div className="text-center mb-3 font-bold text-slate-700">단일 스테이지</div>
                    <div className="bg-white rounded-xl border-2 border-red-300 p-4">
                      <div className="relative h-8 bg-slate-100 rounded-full overflow-hidden mb-2">
                        <div className="absolute inset-y-0 left-0 bg-red-400 rounded-full" style={{ width: "100%" }}>
                          <span className="absolute inset-0 flex items-center justify-center text-xs font-bold text-white">1.01 GB</span>
                        </div>
                      </div>
                      {SINGLE_LAYERS.map((l, i) => (
                        <div key={i} className="flex items-center gap-2 text-xs py-0.5">
                          <div className={`w-3 h-3 rounded ${l.color}`} />
                          <span className="text-slate-600">{l.label}</span>
                          <span className="ml-auto font-mono text-slate-400">{l.size}MB</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div>
                    <div className="text-center mb-3 font-bold text-slate-700">멀티 스테이지</div>
                    <div className="bg-white rounded-xl border-2 border-emerald-300 p-4">
                      <div className="relative h-8 bg-slate-100 rounded-full overflow-hidden mb-2">
                        <div className="absolute inset-y-0 left-0 bg-emerald-400 rounded-full transition-all duration-1000" style={{ width: "17.6%" }}>
                          <span className="absolute inset-0 flex items-center justify-center text-xs font-bold text-white whitespace-nowrap">178 MB</span>
                        </div>
                      </div>
                      {MULTI_LAYERS.map((l, i) => (
                        <div key={i} className="flex items-center gap-2 text-xs py-0.5">
                          <div className={`w-3 h-3 rounded ${l.color}`} />
                          <span className="text-slate-600">{l.label}</span>
                          <span className="ml-auto font-mono text-slate-400">{l.size}MB</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4 text-center">
                  <span className="text-emerald-700 font-bold text-lg">약 5.7배 크기 절감! (1.01GB → 178MB)</span>
                </div>
              </div>
            )}

            {data.phase === "summary" && (
              <div key="summary" className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6 anim-fade">
                <div className="text-center">
                  <div className="text-4xl mb-3">🎯</div>
                  <h3 className="text-xl font-bold text-emerald-800 mb-4">멀티 스테이지 빌드 핵심 문법</h3>
                  <div className="flex flex-wrap justify-center gap-2">
                    {["FROM ... AS builder", "pip install --prefix=/install", "FROM python:3.11-slim", "COPY --from=builder", "docker build --target"].map((item, i) => (
                      <span key={i} className="bg-emerald-200 text-emerald-800 px-3 py-1.5 rounded-full text-sm font-medium anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                        {item}
                      </span>
                    ))}
                  </div>
                  <p className="text-emerald-700 mt-4 text-sm">하나의 Dockerfile, 여러 FROM — 빌드 도구는 빌드 스테이지에만, 실행 파일만 최종 이미지에</p>
                </div>
              </div>
            )}

            {/* 프로그레스 + 컨트롤 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
