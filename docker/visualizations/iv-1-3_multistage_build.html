              <div>
                <div className={`text-[11px] font-bold ${active ? `text-${color}-800` : 'text-slate-500'}`}>{title}</div>
                <div className="text-[9px] text-slate-500 font-mono">{subtitle}</div>
              </div>
            </div>
            {badge && (
              <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
                active ? `bg-${color}-600 text-white` : 'bg-slate-300 text-slate-600'
              }`}>{badge}</span>
            )}
          </div>

          {/* 레이어 스택 */}
          <div className="bg-white rounded border border-slate-200 p-1.5 space-y-1">
            {layers.map((layer) => {
              const widthPct = Math.max((layer.size / maxBar) * 100, 6);
              const removed = removedIds && removedIds.includes(layer.id);
              return (
                <div key={layer.id} className="flex items-center gap-1.5">
                  <div
                    className={`h-4 rounded ${layer.color} transition-all duration-700 relative ${
                      removed ? 'opacity-40' : ''
                    }`}
                    style={{ width: `${widthPct}%`, minWidth: '24px' }}
                  >
                    {removed && (
                      <div className="absolute inset-0 flex items-center justify-center">
                        <span className="text-[8px] font-bold text-rose-700 bg-white/80 px-1 rounded">REMOVED</span>
                      </div>
                    )}
                  </div>
                  <span className={`text-[9px] whitespace-nowrap ${
                    removed ? 'text-slate-400 line-through' : 'text-slate-700'
                  }`}>
                    {layer.label}
                  </span>
                  <span className="ml-auto text-[9px] font-mono text-slate-400">{layer.size}MB</span>
                </div>
              );
            })}
          </div>

          {/* 총 사이즈 */}
          <div className="mt-2 flex items-center justify-between">
            <span className="text-[9px] text-slate-500 font-mono">total</span>
            <span className={`text-sm font-mono font-bold ${active ? `text-${color}-700` : 'text-slate-400'}`}>
              {total >= 1000 ? `${(total / 1000).toFixed(2)} GB` : `${total} MB`}
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 상단: 단일 vs 멀티 박스 (Step 1~4)
    // ─────────────────────────────────────────────────────
    function CompareBoxes({ step }) {
      // Step 3에서 builder 안에 남는 레이어를 단일 이미지에서 'REMOVED'로 표시
      const removedFromSingle = step.copyArrow ? ['gcc', 'devlib', 'pip'] : [];

      return (
        <div className="grid grid-cols-2 gap-2">
          <ImageBox
            title="단일 스테이지"
            subtitle="single-stage.Dockerfile"
            layers={SINGLE_LAYERS}
            total={SINGLE_TOTAL}
            color="rose"
            active={step.showSingle}
            badge="1.20 GB"
            removedIds={[]}
          />
          {step.showMulti ? (
            <div className="space-y-2">
              {/* builder 스테이지 (작업장) */}
              <div className={`rounded-lg border-2 border-dashed p-2 transition-all duration-500 ${
                step.builderActive ? 'border-amber-400 bg-amber-50' : 'border-slate-200 bg-slate-50 opacity-50'
              }`}>
                <div className="flex items-center justify-between mb-1">
                  <div className="flex items-center gap-1">
                    <span className="text-sm">🔨</span>
                    <span className={`text-[10px] font-bold ${step.builderActive ? 'text-amber-800' : 'text-slate-400'}`}>
                      Stage 1 · builder (작업장)
                    </span>
                  </div>
                  <span className="text-[8px] text-slate-500 font-mono">FROM python:3.11</span>
                </div>
                <div className="flex flex-wrap gap-1">
                  {['gcc', 'make', 'libpq-dev', 'pip cache', '/install/'].map((t) => (
                    <span key={t} className={`text-[8px] px-1.5 py-0.5 rounded font-mono ${
                      step.builderActive ? 'bg-amber-200 text-amber-900' : 'bg-slate-200 text-slate-400'
                    }`}>{t}</span>
                  ))}
                </div>
                {step.copyArrow && (
                  <div className="text-center mt-1 text-[9px] text-amber-700 font-mono font-bold animate-pulse">
                    ↓ COPY --from=builder /install ↓
                  </div>
                )}
              </div>

              {/* runtime 최종 이미지 */}
              <ImageBox
                title="멀티 스테이지 (runtime)"
                subtitle="multi-stage.Dockerfile"
                layers={MULTI_LAYERS}
                total={MULTI_TOTAL}
                color="sky"
                active={step.runtimeActive}
                badge="80 MB"
              />
            </div>
          ) : (
            <div className="rounded-lg border-2 border-dashed border-slate-200 bg-slate-50 p-3 flex items-center justify-center opacity-50">
              <div className="text-center">
                <div className="text-2xl mb-1">📦</div>
                <div className="text-[10px] text-slate-400">멀티 스테이지<br/>아직 도입 전</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙: 크기 비교 막대 (Step 4+)
    // ─────────────────────────────────────────────────────
    function SizeBar({ showDistroless }) {
      const items = [
        { label: '단일 스테이지',       size: SINGLE_TOTAL,  color: 'bg-rose-400',    text: 'text-rose-700' },
        { label: '멀티 스테이지',       size: MULTI_TOTAL,   color: 'bg-sky-500',     text: 'text-sky-700' },
      ];
      if (showDistroless) {
        items.push({ label: 'distroless',         size: DISTRO_TOTAL,  color: 'bg-emerald-500', text: 'text-emerald-700' });
      }
      const max = SINGLE_TOTAL;

      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📊</span>
              <span className="text-[11px] font-bold text-slate-700">이미지 크기 비교</span>
            </div>
            <span className="text-[9px] text-slate-400 font-mono">단위: MB</span>
          </div>
          <div className="space-y-2">
            {items.map((it) => {
              const widthPct = (it.size / max) * 100;
              return (
                <div key={it.label}>
                  <div className="flex items-center justify-between text-[10px] mb-0.5">
                    <span className="text-slate-600 font-medium">{it.label}</span>
                    <span className={`font-mono font-bold ${it.text}`}>
                      {it.size >= 1000 ? `${(it.size / 1000).toFixed(2)} GB` : `${it.size} MB`}
                    </span>
                  </div>
                  <div className="h-3 bg-slate-100 rounded-full overflow-hidden">
                    <div
                      className={`h-full ${it.color} transition-all duration-1000 rounded-full`}
                      style={{ width: `${Math.max(widthPct, 1.5)}%` }}
                    />
                  </div>
                </div>
              );
            })}
          </div>
          {showDistroless && (
            <div className="mt-2 bg-emerald-50 border border-emerald-300 rounded px-2 py-1 text-[9px] text-emerald-800 font-mono">
              <span className="font-bold">배율:</span> 1.20 GB → 80 MB (15×) → 32 MB (37×)
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: distroless 박스 (Step 5)
    // ─────────────────────────────────────────────────────
    function DistrolessBox() {
      return (
        <div className="rounded-lg border-2 border-emerald-400 bg-gradient-to-br from-emerald-50 to-sky-50 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🛡️</span>
              <span className="text-[11px] font-bold text-emerald-800">distroless — 32 MB</span>
            </div>
            <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
              minimal
            </span>
          </div>
          <div className="bg-white rounded border border-emerald-200 p-1.5 space-y-1">
            {DISTROLESS_LAYERS.map((layer) => {
              const widthPct = Math.max((layer.size / SINGLE_TOTAL) * 100, 4);
              return (
                <div key={layer.id} className="flex items-center gap-1.5">
                  <div className={`h-4 rounded ${layer.color}`} style={{ width: `${widthPct}%`, minWidth: '20px' }} />
                  <span className="text-[9px] text-slate-700 whitespace-nowrap">{layer.label}</span>
                  <span className="ml-auto text-[9px] font-mono text-slate-400">{layer.size}MB</span>
                </div>
              );
            })}
          </div>
          <div className="mt-2 grid grid-cols-2 gap-1 text-[9px]">
            <div className="bg-white border border-emerald-200 rounded px-1.5 py-1">
              <span className="font-bold text-emerald-800">+ 장점</span>
              <div className="text-emerald-700 font-mono leading-tight">셸 없음 · CVE 최소</div>
            </div>
            <div className="bg-white border border-rose-200 rounded px-1.5 py-1">
              <span className="font-bold text-rose-800">- 단점</span>
              <div className="text-rose-700 font-mono leading-tight">exec 진입 불가</div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🏗️ 단일 vs 멀티 스테이지 빌드</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <CompareBoxes step={step} />

            {step.showSizeBar && <SizeBar showDistroless={step.showDistroless} />}

            {step.showDistroless && <DistrolessBox />}

            {step.conclusion && (
              <div className="rounded-lg border-2 border-sky-400 bg-sky-50 p-2.5">
                <div className="flex items-center gap-1.5 mb-1.5">
                  <span className="text-base">🎯</span>
                  <span className="text-[11px] font-bold text-sky-900">멀티 스테이지 빌드 핵심 정리</span>
                </div>
                <div className="grid grid-cols-2 gap-1.5 text-[9px]">
                  <div className="bg-white rounded border border-sky-200 p-1.5">
                    <div className="font-bold text-sky-800">FROM ... AS name</div>
                    <div className="text-slate-600 font-mono">스테이지 이름 부여</div>
                  </div>
                  <div className="bg-white rounded border border-sky-200 p-1.5">
                    <div className="font-bold text-sky-800">COPY --from=name</div>
                    <div className="text-slate-600 font-mono">결과물만 추출</div>
                  </div>
                  <div className="bg-white rounded border border-sky-200 p-1.5">
                    <div className="font-bold text-sky-800">--target name</div>
                    <div className="text-slate-600 font-mono">CI 빌드 단계 캐시</div>
                  </div>
                  <div className="bg-white rounded border border-sky-200 p-1.5">
                    <div className="font-bold text-sky-800">slim/distroless</div>
                    <div className="text-slate-600 font-mono">베이스 이미지 최소화</div>
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-400"></span>빌드 도구 (불필요)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>런타임 (필수)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>최종 결과물
            </span>
            <span className="ml-auto font-mono">phase: {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. 이미지 최적화 &gt; Chapter 1. 빌드 전략</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-1-3. 멀티 스테이지 빌드 — 빌드/런타임 분리</h1>
                  <p className="text-sm text-slate-500 mt-0.5">FROM ... AS builder + COPY --from=builder 로 1.2GB → 80MB → 32MB</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>FROM ... AS builder</strong> 로 빌드 단계를 분리하고 <strong>COPY --from=builder</strong> 로 결과물만 가져와라. 베이스 이미지를 <strong>slim/distroless</strong> 로 더 줄이면 1.2GB → 32MB까지 가능하다. 다음(IV-1-4)에서는 빌드 캐시와 .dockerignore 로 빌드 시간까지 잡는다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['multi-stage', 'FROM AS builder', 'COPY --from', 'python:3.11-slim', 'distroless', '--target', 'image size', 'attack surface'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./iv-1-2_layer_caching.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; IV-1-2 레이어 캐싱</a>
              <a href="./iv-1-4_dockerignore.html" className="text-sky-700 hover:text-sky-900 font-medium">IV-1-4 .dockerignore &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
