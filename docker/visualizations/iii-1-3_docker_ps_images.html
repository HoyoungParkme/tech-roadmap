<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — docker ps / docker images</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-shake { animation: shake 0.4s ease-in-out; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── 가상 데이터 ── */
    const ALL_CONTAINERS = [
      { id: "a3b7c9d1f2e4", image: "nginx", command: '"/docker-entrypoint..."', created: "2분 전", status: "Up 2 minutes", ports: "0.0.0.0:8080->80/tcp", names: "my-nginx", running: true },
      { id: "b4c8e2f1a3d5", image: "hello-world", command: '"/hello"', created: "5분 전", status: "Exited (0) 5분 전", ports: "", names: "eager_darwin", running: false },
      { id: "c5d9f3g2b4e6", image: "ubuntu", command: '"bash"', created: "8분 전", status: "Exited (0) 7분 전", ports: "", names: "sad_turing", running: false },
    ];

    const ALL_IMAGES = [
      { repository: "nginx", tag: "latest", imageId: "a6bd71f48f68", created: "2주 전", size: "187MB" },
      { repository: "ubuntu", tag: "latest", imageId: "3565a89d9e81", created: "4주 전", size: "77.9MB" },
      { repository: "hello-world", tag: "latest", imageId: "d2c94e258dcb", created: "14개월 전", size: "13.3kB" },
    ];

    const DISK_USAGE = [
      { type: "Images", total: 4, active: 2, size: "1.2GB", reclaimable: "800MB (67%)" },
      { type: "Containers", total: 6, active: 1, size: "0B", reclaimable: "0B" },
      { type: "Local Volumes", total: 2, active: 1, size: "245MB", reclaimable: "120MB (49%)" },
      { type: "Build Cache", total: 8, active: 0, size: "180MB", reclaimable: "180MB (100%)" },
    ];

    /* ── STEPS ── */
    const STEPS = [
      {
        title: "STEP 1 · docker ps — 실행 중인 컨테이너 확인",
        desc: "'docker ps'는 Docker의 작업관리자다. 현재 실행 중인 컨테이너만 보여준다. nginx 웹 서버를 백그라운드로 실행한 상태에서 확인해보자.",
        phase: "ps",
        showContainers: ALL_CONTAINERS.filter(c => c.running),
        showImages: [],
        showDisk: false,
        terminalCmd: "docker ps",
        highlight: "running",
      },
      {
        title: "STEP 2 · docker ps -a — 종료된 것도 보기",
        desc: "'docker ps -a'는 종료된 컨테이너까지 모두 보여준다. hello-world와 ubuntu 컨테이너가 Exited 상태로 남아있다. STATUS 컬럼에서 'Exited (0)'은 정상 종료를 의미한다.",
        phase: "ps_all",
        showContainers: ALL_CONTAINERS,
        showImages: [],
        showDisk: false,
        terminalCmd: "docker ps -a",
        highlight: "all",
      },
      {
        title: "STEP 3 · docker images — 로컬 이미지 목록",
        desc: "'docker images'는 로컬에 저장된 이미지 목록을 보여준다. hello-world가 13.3kB밖에 안 되는 반면, nginx는 187MB다. Docker 이미지가 반드시 클 필요는 없다는 것을 알 수 있다.",
        phase: "images",
        showContainers: [],
        showImages: ALL_IMAGES,
        showDisk: false,
        terminalCmd: "docker images",
        highlight: "images",
      },
      {
        title: "STEP 4 · docker system df — 디스크 사용량",
        desc: "정리 전에 Docker가 얼마나 디스크를 차지하는지 확인한다. RECLAIMABLE 컬럼은 정리 시 회수 가능한 용량이다. Build Cache가 100% 회수 가능하다면 바로 정리해도 문제없다.",
        phase: "disk",
        showContainers: [],
        showImages: [],
        showDisk: true,
        terminalCmd: "docker system df",
        highlight: "disk",
      },
      {
        title: "STEP 5 · 정리 명령 — rm, rmi, prune",
        desc: "docker rm은 컨테이너 삭제, docker rmi는 이미지 삭제다. 'docker system prune'은 사용하지 않는 컨테이너·이미지·네트워크를 한 번에 정리한다. 실행 중인 컨테이너와 사용 중인 이미지는 삭제되지 않는다.",
        phase: "cleanup",
        showContainers: [],
        showImages: [],
        showDisk: false,
        terminalCmd: "docker system prune",
        highlight: "cleanup",
      },
      {
        title: "STEP 6 · 정리 완료! 깔끔한 상태",
        desc: "정리 후 docker ps -a와 docker images를 다시 확인하면 사용하지 않는 리소스가 제거되었다. 디스크 공간이 회수되었고, 실행 중인 nginx 컨테이너만 남아있다.",
        phase: "clean",
        showContainers: ALL_CONTAINERS.filter(c => c.running),
        showImages: [ALL_IMAGES[0]],
        showDisk: false,
        terminalCmd: "docker ps -a && docker images",
        highlight: "clean",
      },
    ];

    /* ── 가상 테이블 ── */
    function DataTable({ columns, rows, step, colorFn }) {
      return (
        <div className="overflow-x-auto">
          <table className="w-full text-xs font-mono">
            <thead>
              <tr className="border-b border-slate-300">
                {columns.map(col => (
                  <th key={col.key} className="text-left py-2 px-2 text-slate-500 font-bold uppercase tracking-wider">{col.label}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map((row, i) => (
                <tr key={`${step}-${i}`} className={`border-b border-slate-100 anim-slide ${colorFn ? colorFn(row) : ""}`} style={{ animationDelay: `${i * 0.12}s`, opacity: 0 }}>
                  {columns.map(col => (
                    <td key={col.key} className="py-2 px-2 text-slate-700">{row[col.key]}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    /* ── 정리 명령 카드 ── */
    function CleanupCards({ step }) {
      const cmds = [
        { cmd: "docker rm <이름>", desc: "특정 컨테이너 삭제", icon: "🗑️", note: "실행 중이면 -f 필요" },
        { cmd: "docker rmi <이미지>", desc: "특정 이미지 삭제", icon: "🗑️", note: "사용 중이면 삭제 불가" },
        { cmd: "docker system prune", desc: "미사용 리소스 일괄 정리", icon: "🧹", note: "컨테이너+이미지+네트워크" },
        { cmd: "docker system prune -a --volumes", desc: "공격적 정리 (볼륨 포함)", icon: "⚠️", note: "주의: 데이터 손실 가능" },
      ];
      return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          {cmds.map((c, i) => (
            <div key={i} className="bg-white rounded-xl border border-slate-200 p-4 anim-slide" style={{ animationDelay: `${i * 0.1}s`, opacity: 0 }}>
              <div className="flex items-start gap-3">
                <span className="text-2xl">{c.icon}</span>
                <div>
                  <div className="font-mono text-sm font-bold text-slate-800">{c.cmd}</div>
                  <div className="text-xs text-slate-500 mt-1">{c.desc}</div>
                  <div className="text-xs text-amber-600 mt-1">{c.note}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    /* ── 메인 앱 ── */
    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const containerCols = [
        { key: "id", label: "Container ID" },
        { key: "image", label: "Image" },
        { key: "created", label: "Created" },
        { key: "status", label: "Status" },
        { key: "ports", label: "Ports" },
        { key: "names", label: "Names" },
      ];
      const imageCols = [
        { key: "repository", label: "Repository" },
        { key: "tag", label: "Tag" },
        { key: "imageId", label: "Image ID" },
        { key: "created", label: "Created" },
        { key: "size", label: "Size" },
      ];
      const diskCols = [
        { key: "type", label: "Type" },
        { key: "total", label: "Total" },
        { key: "active", label: "Active" },
        { key: "size", label: "Size" },
        { key: "reclaimable", label: "Reclaimable" },
      ];

      const bgColor =
        data.phase === "clean" ? "bg-emerald-600 border-emerald-700 text-white" :
        data.phase === "cleanup" ? "bg-amber-600 border-amber-700 text-white" :
        data.phase === "disk" ? "bg-purple-600 border-purple-700 text-white" :
        "bg-blue-600 border-blue-700 text-white";

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter III-1-3: docker ps / docker images — 상태 확인</h1>
              </div>
              <p className="text-slate-500 text-sm">가상 터미널에서 docker ps, docker images, docker system df 명령어를 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${bgColor}`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 터미널 헤더 */}
            <div key={`term-${step}`} className="bg-gray-900 rounded-xl p-4 font-mono text-sm anim-fade">
              <div className="flex gap-1.5 mb-3">
                <div className="w-3 h-3 rounded-full bg-red-500"></div>
                <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div className="w-3 h-3 rounded-full bg-green-500"></div>
              </div>
              <div className="text-gray-300 mb-3">
                <span className="text-green-400">$ </span>
                <span className="text-white">{data.terminalCmd}</span>
              </div>
            </div>

            {/* 컨테이너 테이블 */}
            {data.showContainers.length > 0 && (
              <div key={`ct-${step}`} className="bg-white rounded-xl border border-slate-200 p-4 anim-fade">
                <h4 className="text-sm font-bold text-slate-600 mb-3">
                  {data.phase === "ps" ? "📋 실행 중인 컨테이너" : "📋 전체 컨테이너 (종료 포함)"}
                </h4>
                <DataTable
                  columns={containerCols}
                  rows={data.showContainers}
                  step={step}
                  colorFn={(row) => row.running ? "bg-emerald-50" : "bg-red-50"}
                />
                {data.phase === "ps_all" && (
                  <div className="mt-3 flex gap-3 text-xs">
                    <span className="bg-emerald-100 text-emerald-700 px-2 py-1 rounded">🟢 Up = 실행 중</span>
                    <span className="bg-red-100 text-red-700 px-2 py-1 rounded">🔴 Exited = 종료됨</span>
                  </div>
                )}
              </div>
            )}

            {/* 이미지 테이블 */}
            {data.showImages.length > 0 && (
              <div key={`img-${step}`} className="bg-white rounded-xl border border-slate-200 p-4 anim-fade">
                <h4 className="text-sm font-bold text-slate-600 mb-3">📦 로컬 이미지 목록</h4>
                <DataTable columns={imageCols} rows={data.showImages} step={step} />
              </div>
            )}

            {/* 디스크 사용량 */}
            {data.showDisk && (
              <div key={`disk-${step}`} className="bg-white rounded-xl border border-slate-200 p-4 anim-fade">
                <h4 className="text-sm font-bold text-slate-600 mb-3">💾 Docker 디스크 사용량</h4>
                <DataTable columns={diskCols} rows={DISK_USAGE} step={step}
                  colorFn={(row) => row.reclaimable.includes("100%") ? "bg-amber-50" : ""} />
                <div className="mt-3 text-xs text-amber-600">
                  ⚡ Build Cache 100% 회수 가능 — 정리해도 문제없음
                </div>
              </div>
            )}

            {/* 정리 명령 카드 */}
            {data.phase === "cleanup" && <CleanupCards step={step} />}

            {/* 정리 완료 */}
            {data.phase === "clean" && (
              <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6 anim-fade text-center">
                <div className="text-4xl mb-3">🧹</div>
                <h3 className="text-xl font-bold text-emerald-800 mb-2">정리 완료!</h3>
                <div className="flex flex-wrap justify-center gap-2 mt-3">
                  {["종료된 컨테이너 삭제 ✓", "미사용 이미지 삭제 ✓", "빌드 캐시 정리 ✓", "디스크 800MB 회수 ✓"].map((item, i) => (
                    <span key={i} className="bg-emerald-200 text-emerald-800 px-3 py-1.5 rounded-full text-sm font-medium anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                      {item}
                    </span>
                  ))}
                </div>
              </div>
            )}

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
