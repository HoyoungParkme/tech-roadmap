<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 학습 — III-1-3. docker ps / images / rm / rmi</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🐳</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    III-1-3. docker ps / images / rm / rmi — 컨테이너·이미지 상태 확인과 정리
    학습 목표: 실행 중·종료된 컨테이너를 구분하고, 이미지 목록을 보고,
              불필요한 컨테이너/이미지를 안전하게 삭제할 수 있다.
    패턴: fastapi v1 — 좌(LiveDataPane: 컨테이너 표 + 이미지 표) / 우(VSCode CodeViewer 탭)
    색상: docker sky
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 초기 데이터셋
    //   3개 컨테이너 (1개 실행 중, 2개 종료됨)
    //   3개 이미지 (각 컨테이너의 베이스)
    //   step에 따라 표시 행이 줄어들거나, 강조되거나, 삭제 표시(diff)된다
    // ─────────────────────────────────────────────────────
    const ALL_CONTAINERS = [
      {
        id: 'a3b7c9d1f2e4',
        image: 'nginx',
        command: '"/docker-entrypoint…"',
        created: '2분 전',
        status: 'Up 2 minutes',
        ports: '0.0.0.0:8080->80/tcp',
        names: 'web',
        running: true,
      },
      {
        id: 'b4c8e2f1a3d5',
        image: 'hello-world',
        command: '"/hello"',
        created: '5분 전',
        status: 'Exited (0) 5분 전',
        ports: '',
        names: 'eager_darwin',
        running: false,
      },
      {
        id: 'c5d9f3a2b4e6',
        image: 'ubuntu',
        command: '"bash"',
        created: '8분 전',
        status: 'Exited (0) 7분 전',
        ports: '',
        names: 'sad_turing',
        running: false,
      },
    ];

    const ALL_IMAGES = [
      {
        repository: 'nginx',
        tag: 'latest',
        imageId: 'a6bd71f48f68',
        created: '2주 전',
        size: '187MB',
        inUse: true,  // 실행 중인 web 컨테이너가 사용 중
      },
      {
        repository: 'ubuntu',
        tag: 'latest',
        imageId: '3565a89d9e81',
        created: '4주 전',
        size: '77.9MB',
        inUse: false,
      },
      {
        repository: 'hello-world',
        tag: 'latest',
        imageId: 'd2c94e258dcb',
        created: '14개월 전',
        size: '13.3kB',
        inUse: false,
      },
    ];

    // 컨테이너 행 상태별 표시
    //   visible : 정상 (테두리 없음)
    //   highlight : Step 1·2 강조
    //   stopped : Step 2 종료된 행 강조 (빨강)
    //   removed : Step 4 삭제된 행 (회색 line-through)
    //   gone : Step 5에서 이미 사라진 상태 (행 미표시)
    // 이미지 행도 동일하지만 in_use / removed 추가

    // ─────────────────────────────────────────────────────
    // STEPS 5단계
    //   각 step은 좌측 표 상태 + 우측 코드 탭 활성 파일을 결정
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. docker ps — 실행 중 컨테이너만 보기',
        desc: '"docker ps"는 작업관리자 같은 명령이다. 지금 이 순간 살아 있는 컨테이너만 한 줄씩 보여준다. 종료된 컨테이너(hello-world, ubuntu)는 목록에서 빠진다. STATUS의 "Up 2 minutes"는 실행 시간이고, PORTS의 "0.0.0.0:8080->80/tcp"는 호스트 8080 포트가 컨테이너 80 포트로 포워딩 중임을 뜻한다.',
        activeTab: 'ps.sh',
        containers: ALL_CONTAINERS.map((c) => ({
          ...c,
          state: c.running ? 'highlight' : 'gone',
        })),
        images: ALL_IMAGES.map((img) => ({ ...img, state: 'hidden' })),
        showImages: false,
        terminal: '$ docker ps',
        terminalOutput: 'CONTAINER ID  IMAGE  ...  STATUS         PORTS                  NAMES\na3b7c9d1f2e4  nginx  ...  Up 2 minutes   0.0.0.0:8080->80/tcp   web',
      },
      {
        title: 'Step 2. docker ps -a — 종료된 컨테이너까지 모두',
        desc: '"-a" 플래그는 "all"이다. 종료된 컨테이너도 디스크에는 그대로 남아 있고, "docker ps -a"가 그 흔적까지 보여준다. STATUS "Exited (0)"의 0은 정상 종료를 뜻하는 종료코드다. 종료된 컨테이너는 자원을 먹지는 않지만 디스크와 이름을 점유하기 때문에, 더 이상 안 쓰면 "docker rm"으로 청소해 줘야 한다.',
        activeTab: 'ps-a.sh',
        containers: ALL_CONTAINERS.map((c) => ({
          ...c,
          state: c.running ? 'highlight' : 'stopped',
        })),
        images: ALL_IMAGES.map((img) => ({ ...img, state: 'hidden' })),
        showImages: false,
        terminal: '$ docker ps -a',
        terminalOutput: '실행 중 1개 + 종료 2개 = 총 3개의 컨테이너가 보인다',
      },
      {
        title: 'Step 3. docker images — 로컬 이미지 목록',
        desc: '컨테이너의 "원본 빵틀"이 이미지다. "docker images"는 호스트에 캐시된 이미지를 한 줄씩 보여준다. SIZE를 보면 hello-world는 13.3kB, ubuntu는 77.9MB, nginx는 187MB로 천차만별이다. IMAGE ID는 SHA-256 해시의 앞 12자다. 같은 이미지를 여러 컨테이너가 공유하기 때문에, 이미지가 곧 컨테이너 개수만큼 디스크를 먹는 건 아니다.',
        activeTab: 'images.sh',
        containers: ALL_CONTAINERS.map((c) => ({ ...c, state: 'hidden' })),
        images: ALL_IMAGES.map((img) => ({ ...img, state: img.inUse ? 'in_use' : 'visible' })),
        showImages: true,
        terminal: '$ docker images',
        terminalOutput: 'REPOSITORY    TAG     IMAGE ID      SIZE\nnginx         latest  a6bd71f48f68  187MB    (사용 중)\nubuntu        latest  3565a89d9e81  77.9MB\nhello-world   latest  d2c94e258dcb  13.3kB',
      },
      {
        title: 'Step 4. docker rm <id> — 종료된 컨테이너 삭제',
        desc: '"docker rm"으로 종료된 컨테이너의 흔적을 지운다. ID 앞부분만(예: b4c8 / c5d9) 입력해도 충분히 식별된다. 두 개를 한꺼번에 넘기면 동시에 삭제된다. 실행 중인 컨테이너는 보호 차원에서 그냥 "rm"으로 지워지지 않는다 — 강제로 지우려면 "-f" 플래그가 필요하다. 표에서 hello-world와 ubuntu 행이 line-through로 잘려나간다.',
        activeTab: 'rm.sh',
        containers: ALL_CONTAINERS.map((c) => ({
          ...c,
          state: c.running ? 'highlight' : 'removed',
        })),
        images: ALL_IMAGES.map((img) => ({ ...img, state: img.inUse ? 'in_use' : 'visible' })),
        showImages: true,
        terminal: '$ docker rm b4c8 c5d9',
        terminalOutput: 'b4c8\nc5d9\n→ 종료된 컨테이너 2개가 깔끔하게 제거됨',
      },
      {
        title: 'Step 5. docker rmi <id> — 안 쓰는 이미지 삭제',
        desc: '컨테이너를 다 정리한 뒤에는 더 이상 참조되지 않는 이미지를 "docker rmi"로 지운다. ubuntu(77.9MB)와 hello-world(13.3kB)는 사용하는 컨테이너가 없으므로 안전하게 삭제된다. nginx는 실행 중인 web 컨테이너가 사용 중이라 보호된다 — 강제로 지우려면 "-f"가 필요하지만, 컨테이너가 깨질 수 있으니 보통은 컨테이너를 먼저 멈춘다.',
        activeTab: 'rmi.sh',
        containers: ALL_CONTAINERS.map((c) => ({
          ...c,
          state: c.running ? 'highlight' : 'gone',
        })),
        images: ALL_IMAGES.map((img) => ({
          ...img,
          state: img.inUse ? 'in_use' : 'removed',
        })),
        showImages: true,
        terminal: '$ docker rmi ubuntu hello-world',
        terminalOutput: 'Untagged: ubuntu:latest\nDeleted: 3565a89d9e81 …\nUntagged: hello-world:latest\nDeleted: d2c94e258dcb …\n→ 91MB 회수 (nginx는 사용 중이라 보존)',
      },
    ];

    // ─────────────────────────────────────────────────────
    // 우측 코드 탭 — 5개 .sh 파일
    //   탭 클릭 가능, step.activeTab과 동기화
    // ─────────────────────────────────────────────────────
    const SHELL_FILES = [
      {
        name: 'ps.sh',
        lang: 'bash',
        lines: [
          '#!/usr/bin/env bash',
          '# ps.sh — 실행 중인 컨테이너 한눈에 보기',
          '',
          '# 1) 가장 단순한 형태 — 실행 중 컨테이너만',
          'docker ps',
          '',
          '# 2) 컬럼이 너무 많아서 잘려 보일 때 → 좌측 슬림 출력',
          'docker ps --format "table {{.ID}}\\t{{.Image}}\\t{{.Status}}\\t{{.Names}}"',
          '',
          '# 3) ID만 추출 (스크립트 자동화용)',
          'docker ps -q',
          '#  → 한 줄에 컨테이너 ID 하나씩',
          '',
          '# 4) 특정 이미지로 띄운 것만',
          'docker ps --filter "ancestor=nginx"',
          '',
          '# 5) 정지된 것은 보이지 않음 — 그건 ps -a 의 영역',
        ],
        highlight: [4, 5, 8, 11, 12, 15],
      },
      {
        name: 'ps-a.sh',
        lang: 'bash',
        lines: [
          '#!/usr/bin/env bash',
          '# ps-a.sh — 종료된 컨테이너까지 모두 확인',
          '',
          '# 1) -a = --all',
          'docker ps -a',
          '',
          '# 2) Exited 컨테이너만 따로',
          'docker ps -a --filter "status=exited"',
          '',
          '# 3) 종료코드별 필터 (0 = 정상)',
          'docker ps -a --filter "exited=0"   # 정상 종료된 것',
          'docker ps -a --filter "exited=1"   # 비정상 종료된 것',
          '',
          '# 4) 최근 N개 (시간순)',
          'docker ps -a -n 5      # 최근 5개',
          'docker ps -a -l        # 가장 최근 1개',
          '',
          '# 5) 종료된 컨테이너 ID만 추출 → rm 으로 파이프',
          'docker ps -aq --filter "status=exited"',
          '#  → 다음 단계 정리(rm)에서 그대로 인자로 사용 가능',
        ],
        highlight: [4, 5, 8, 11, 12, 15, 16, 19, 20],
      },
      {
        name: 'images.sh',
        lang: 'bash',
        lines: [
          '#!/usr/bin/env bash',
          '# images.sh — 로컬 이미지 캐시 점검',
          '',
          '# 1) 기본 — REPOSITORY · TAG · IMAGE ID · CREATED · SIZE',
          'docker images',
          '',
          '# 2) 동일 명령 (긴 형태)',
          'docker image ls',
          '',
          '# 3) 사이즈 큰 순으로 정렬해 보기',
          'docker images --format "table {{.Repository}}:{{.Tag}}\\t{{.Size}}"',
          '',
          '# 4) <none>:<none> dangling 이미지만 — 빌드 중간 산출물',
          'docker images -f "dangling=true"',
          '#  → 정리 0순위. rmi 또는 image prune 으로 제거',
          '',
          '# 5) 특정 repository 만',
          'docker images nginx',
          '',
          '# 6) ID 만 추출',
          'docker images -q',
        ],
        highlight: [4, 5, 8, 11, 12, 15, 16, 19, 20, 23],
      },
      {
        name: 'rm.sh',
        lang: 'bash',
        lines: [
          '#!/usr/bin/env bash',
          '# rm.sh — 컨테이너 삭제',
          '',
          '# 1) 단일 — ID 앞부분만 입력해도 인식',
          'docker rm b4c8',
          '',
          '# 2) 여러 개 동시 (공백 구분)',
          'docker rm b4c8 c5d9',
          '',
          '# 3) 이름으로도 가능',
          'docker rm eager_darwin sad_turing',
          '',
          '# 4) 실행 중 컨테이너는 기본적으로 보호됨',
          'docker rm web',
          '#  → Error: container is running',
          '',
          '# 5) 강제 삭제 (실행 중이라도)',
          'docker rm -f web',
          '#  → 내부적으로 SIGKILL → rm',
          '',
          '# 6) 종료된 컨테이너 일괄 정리 (가장 자주 쓰는 패턴)',
          'docker rm $(docker ps -aq --filter "status=exited")',
          '',
          '# 7) 대안 — 한 줄짜리 prune',
          'docker container prune -f',
          '#  → 종료된 컨테이너만 골라서 다 지움',
        ],
        highlight: [4, 5, 8, 11, 14, 18, 19, 22, 23, 26, 27],
      },
      {
        name: 'rmi.sh',
        lang: 'bash',
        lines: [
          '#!/usr/bin/env bash',
          '# rmi.sh — 이미지 삭제',
          '',
          '# 1) repository:tag 로 삭제',
          'docker rmi ubuntu:latest',
          '',
          '# 2) 여러 개 (tag 생략 시 :latest)',
          'docker rmi ubuntu hello-world',
          '',
          '# 3) IMAGE ID 로도 가능 (앞 12자)',
          'docker rmi 3565a89d9e81',
          '',
          '# 4) 실행 중인 컨테이너가 사용 중이면 보호됨',
          'docker rmi nginx',
          '#  → Error: image is being used by running container',
          '',
          '# 5) 강제 삭제 (-f) — 컨테이너가 깨질 수 있으므로 주의',
          'docker rmi -f nginx',
          '',
          '# 6) dangling 이미지(<none>) 만 한번에',
          'docker image prune',
          '',
          '# 7) 사용되지 않는 이미지 모두 (a = all unused)',
          'docker image prune -a',
          '#  → 컨테이너에 연결되지 않은 이미지 전부 삭제',
          '',
          '# 8) 디스크가 부족할 때 — 가장 공격적인 한 줄',
          'docker system prune -a --volumes',
          '#  ⚠ 데이터 손실 가능. 진짜 필요할 때만.',
        ],
        highlight: [4, 5, 8, 11, 14, 18, 21, 24, 25, 28, 29],
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 위: 컨테이너 표
    // ─────────────────────────────────────────────────────
    function ContainerTable({ containers, activeTab }) {
      const visible = containers.filter((c) => c.state !== 'hidden' && c.state !== 'gone');

      return (
        <div className="bg-white rounded-lg border-2 border-sky-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📦</span>
              <span className="text-[12px] font-bold text-sky-800">컨테이너 목록</span>
            </div>
            <span className="text-[10px] bg-sky-100 text-sky-700 px-1.5 py-0.5 rounded font-mono">
              {visible.length} row{visible.length !== 1 ? 's' : ''}
            </span>
          </div>

          {visible.length === 0 ? (
            <div className="text-center text-[11px] text-slate-400 py-4 italic">
              (이 단계에서는 컨테이너 표를 표시하지 않음)
            </div>
          ) : (
            <div className="overflow-x-auto">
              <table className="w-full text-[10px] font-mono">
                <thead>
                  <tr className="border-b border-sky-200 text-sky-700">
                    <th className="text-left py-1 px-1 font-bold uppercase tracking-wider">ID</th>
                    <th className="text-left py-1 px-1 font-bold uppercase tracking-wider">Image</th>
                    <th className="text-left py-1 px-1 font-bold uppercase tracking-wider">Status</th>
                    <th className="text-left py-1 px-1 font-bold uppercase tracking-wider">Ports</th>
                    <th className="text-left py-1 px-1 font-bold uppercase tracking-wider">Names</th>
                  </tr>
                </thead>
                <tbody>
                  {visible.map((c) => {
                    let rowClass = 'border-b border-slate-100';
                    let badge = null;
                    if (c.state === 'highlight') {
                      rowClass += ' bg-emerald-50';
                      badge = <span className="text-[8px] bg-emerald-600 text-white px-1 rounded font-bold">UP</span>;
                    } else if (c.state === 'stopped') {
                      rowClass += ' bg-red-50';
                      badge = <span className="text-[8px] bg-red-500 text-white px-1 rounded font-bold">EXITED</span>;
                    } else if (c.state === 'removed') {
                      rowClass += ' bg-slate-100 opacity-50';
                      badge = <span className="text-[8px] bg-slate-500 text-white px-1 rounded font-bold animate-pulse">REMOVED</span>;
                    }
                    const lineThrough = c.state === 'removed' ? 'line-through' : '';
                    return (
                      <tr key={c.id} className={`${rowClass} transition-all duration-500`}>
                        <td className={`py-1 px-1 text-slate-700 ${lineThrough}`}>
                          <div className="flex items-center gap-1">
                            <span>{c.id.slice(0, 8)}</span>
                            {badge}
                          </div>
                        </td>
                        <td className={`py-1 px-1 text-slate-700 ${lineThrough}`}>{c.image}</td>
                        <td className={`py-1 px-1 ${lineThrough} ${c.running ? 'text-emerald-700 font-medium' : 'text-red-700'}`}>
                          {c.status}
                        </td>
                        <td className={`py-1 px-1 text-slate-600 ${lineThrough}`}>{c.ports || '—'}</td>
                        <td className={`py-1 px-1 text-slate-700 font-medium ${lineThrough}`}>{c.names}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: 이미지 표
    // ─────────────────────────────────────────────────────
    function ImageTable({ images }) {
      const visible = images.filter((img) => img.state !== 'hidden');

      return (
        <div className="bg-white rounded-lg border-2 border-sky-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🧱</span>
              <span className="text-[12px] font-bold text-sky-800">로컬 이미지 캐시</span>
            </div>
            <span className="text-[10px] bg-sky-100 text-sky-700 px-1.5 py-0.5 rounded font-mono">
              {visible.length} image{visible.length !== 1 ? 's' : ''}
            </span>
          </div>

          {visible.length === 0 ? (
            <div className="text-center text-[11px] text-slate-400 py-4 italic">
              (이 단계에서는 이미지 표를 표시하지 않음 — 우측 코드 참고)
            </div>
          ) : (
            <div className="overflow-x-auto">
              <table className="w-full text-[10px] font-mono">
                <thead>
                  <tr className="border-b border-sky-200 text-sky-700">
                    <th className="text-left py-1 px-1 font-bold uppercase tracking-wider">Repository</th>
                    <th className="text-left py-1 px-1 font-bold uppercase tracking-wider">Tag</th>
                    <th className="text-left py-1 px-1 font-bold uppercase tracking-wider">Image ID</th>
                    <th className="text-left py-1 px-1 font-bold uppercase tracking-wider">Created</th>
                    <th className="text-right py-1 px-1 font-bold uppercase tracking-wider">Size</th>
                  </tr>
                </thead>
                <tbody>
                  {visible.map((img) => {
                    let rowClass = 'border-b border-slate-100';
                    let badge = null;
                    if (img.state === 'in_use') {
                      rowClass += ' bg-emerald-50';
                      badge = <span className="text-[8px] bg-emerald-600 text-white px-1 rounded font-bold">IN USE</span>;
                    } else if (img.state === 'removed') {
                      rowClass += ' bg-slate-100 opacity-50';
                      badge = <span className="text-[8px] bg-slate-500 text-white px-1 rounded font-bold animate-pulse">REMOVED</span>;
                    }
                    const lineThrough = img.state === 'removed' ? 'line-through' : '';
                    return (
                      <tr key={img.imageId} className={`${rowClass} transition-all duration-500`}>
                        <td className={`py-1 px-1 text-slate-700 font-medium ${lineThrough}`}>
                          <div className="flex items-center gap-1">
                            <span>{img.repository}</span>
                            {badge}
                          </div>
                        </td>
                        <td className={`py-1 px-1 text-slate-700 ${lineThrough}`}>{img.tag}</td>
                        <td className={`py-1 px-1 text-slate-600 ${lineThrough}`}>{img.imageId}</td>
                        <td className={`py-1 px-1 text-slate-600 ${lineThrough}`}>{img.created}</td>
                        <td className={`py-1 px-1 text-right text-slate-700 font-medium ${lineThrough}`}>{img.size}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 패널 = 컨테이너 표 + 이미지 표 + 터미널
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🐳 Docker 호스트 상태</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <ContainerTable containers={step.containers} activeTab={step.activeTab} />
            <ImageTable images={step.images} />

            {/* 터미널 출력 */}
            <div className="bg-slate-900 rounded-lg p-3 font-mono text-[11px] border border-slate-700">
              <div className="flex items-center gap-1.5 mb-2">
                <span className="w-2 h-2 rounded-full bg-red-500"></span>
                <span className="w-2 h-2 rounded-full bg-yellow-500"></span>
                <span className="w-2 h-2 rounded-full bg-green-500"></span>
                <span className="text-[9px] text-slate-400 ml-1">terminal</span>
              </div>
              <div className="text-emerald-400">{step.terminal}</div>
              <div className="text-slate-300 whitespace-pre-wrap mt-1 text-[10px] leading-relaxed">
                {step.terminalOutput}
              </div>
            </div>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>UP / IN USE
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-red-500"></span>EXITED
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-500"></span>REMOVED
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — 5개 파일 탭 + highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeTab, setActiveTab, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      const file = SHELL_FILES.find((f) => f.name === activeTab) || SHELL_FILES[0];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${file.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [file]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 5개 파일 탭 */}
          <div className="bg-[#21252b] px-3 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5 mr-2">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <div className="flex gap-1 overflow-x-auto">
              {SHELL_FILES.map((f) => {
                const isActive = f.name === activeTab;
                return (
                  <button
                    key={f.name}
                    onClick={() => setActiveTab(f.name)}
                    className={`px-2.5 py-1 text-[11px] font-mono rounded-t border-b-2 transition whitespace-nowrap ${
                      isActive
                        ? 'bg-[#282c34] text-sky-300 border-sky-400'
                        : 'text-slate-400 border-transparent hover:text-slate-200'
                    }`}
                  >
                    {f.name}
                  </button>
                );
              })}
            </div>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${file.lang}`}>{file.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || file.lines).map((lineHtml, i) => {
                  const highlighted = file.highlight && file.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : 'border-l-2 border-transparent'
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{file.lines.length} lines · {file.lang}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [activeTab, setActiveTab] = useState(STEPS[0].activeTab);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      // step 변경 시 활성 탭도 동기화 (사용자가 수동으로 다른 탭을 누르지 않은 한)
      useEffect(() => {
        setActiveTab(step.activeTab);
      }, [stepIdx]);

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 컨테이너 운영 &gt; Chapter 1. 기본 명령</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-1-3. docker ps / images / rm / rmi — 상태 확인과 정리</h1>
                  <p className="text-sm text-slate-500 mt-0.5">실행 중·종료된 컨테이너 구분, 로컬 이미지 점검, 안전한 삭제 5단계</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                activeTab={activeTab}
                setActiveTab={setActiveTab}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>ps</strong> = 살아있는 것, <strong>ps -a</strong> = 다 보기, <strong>images</strong> = 이미지 캐시, <strong>rm</strong> = 컨테이너 청소, <strong>rmi</strong> = 이미지 청소. 더 빠른 한 줄: <code className="bg-white px-1 rounded">docker system prune -a</code>.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['docker ps', 'docker ps -a', 'docker images', 'docker rm', 'docker rmi', 'docker system prune'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
