    패턴: fastapi v1 — 좌(LiveDataPane: EC2 박스 + Docker + 외부 트래픽) / 우(VSCode CodeViewer)

  -->

        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${

            <div className="flex items-center gap-2">

              <div>
                <div className={`text-[11px] font-bold ${trafficOn ? 'text-sky-800' : 'text-slate-500'}`}>
                  외부 사용자 / 인터넷
                </div>
                <div className={`text-[9px] font-mono ${trafficOn ? 'text-sky-700' : 'text-slate-400'}`}>
                  {trafficOn ? `GET http://${target}/` : '아직 막혀 있음'}
                </div>
              </div>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
              trafficOn ? 'bg-sky-600 text-white' : 'bg-slate-300 text-slate-600'
            }`}>
              {trafficOn ? 'reachable' : 'blocked'}
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙 (1): Route53 박스
    //   dnsOn 일 때만 sky 강조
    // ─────────────────────────────────────────────────────
    function Route53Box({ dnsOn, ec2Ip }) {
      return (
        <div className={`rounded-lg border-2 p-2.5 transition-all duration-500 ${
          dnsOn ? 'bg-sky-50 border-sky-400 shadow-sm' : 'bg-slate-50 border-dashed border-slate-200 opacity-60'
        }`}>
          <div className="flex items-center gap-2 mb-1">
            <span className="text-base">🗺️</span>
            <span className={`text-[11px] font-bold ${dnsOn ? 'text-sky-800' : 'text-slate-500'}`}>
              Route53 호스팅 영역 (example.com)
            </span>
            {dnsOn && (
              <span className="ml-auto text-[8px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                A record
              </span>
            )}
          </div>
          <div className="bg-white rounded border border-slate-200 px-2 py-1 font-mono text-[9px] leading-snug text-slate-600">
            {dnsOn ? (
              <>
                <span className="text-sky-700 font-bold">myapp.example.com</span>
                <span className="text-slate-400"> &nbsp;A&nbsp; </span>
                <span className="text-slate-700">{ec2Ip}</span>
                <span className="text-slate-400"> &nbsp;TTL=60</span>
              </>
            ) : (
              <span className="text-slate-400">아직 A 레코드 없음 — IP 직접 접속만 가능</span>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙 (2): 보안 그룹 박스
    //   sgPorts 에 들어 있는 포트만 sky / 나머지는 회색
    // ─────────────────────────────────────────────────────
    function SecurityGroupBox({ sgPorts }) {
      const ports = [
        { port: '22',  label: 'SSH',   icon: '🔑' },
        { port: '80',  label: 'HTTP',  icon: '🌐' },
        { port: '443', label: 'HTTPS', icon: '🔒' },
      ];
      const anyOpen = sgPorts.length > 0;
      return (
        <div className={`rounded-lg border-2 p-2.5 transition-all duration-500 ${
          anyOpen ? 'bg-white border-sky-300' : 'bg-slate-50 border-slate-200'
        }`}>
          <div className="flex items-center gap-2 mb-1.5">
            <span className="text-base">🛡️</span>
            <span className="text-[11px] font-bold text-slate-700">보안 그룹 (인바운드)</span>
            <span className="ml-auto text-[8px] font-mono text-slate-500">sg-0abc..890</span>
          </div>
          <div className="grid grid-cols-3 gap-1.5">
            {ports.map(p => {
              const open = sgPorts.includes(p.port);
              return (
                <div
                  key={p.port}
                  className={`rounded border-2 p-1.5 text-center transition-all duration-500 ${
                    open
                      ? 'bg-sky-50 border-sky-400 shadow-sm'
                      : 'bg-slate-50 border-dashed border-slate-200 opacity-60'
                  }`}
                >
                  <div className="text-base leading-none">{p.icon}</div>
                  <div className={`text-[9px] font-bold mt-0.5 ${open ? 'text-sky-800' : 'text-slate-400'}`}>
                    :{p.port}
                  </div>
                  <div className={`text-[8px] font-mono ${open ? 'text-slate-500' : 'text-slate-400'}`}>
                    {p.label}
                  </div>
                  <div className={`text-[8px] mt-0.5 font-mono font-bold ${open ? 'text-emerald-600' : 'text-rose-500'}`}>
                    {open ? 'open' : 'closed'}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: EC2 인스턴스 박스 + 그 안의 Docker / 컨테이너
    //   ec2State        : 'launching' (점선/펄스) / 'running' (sky)
    //   sshConnected    : SSH 화살표 표시
    //   dockerInstalled : Docker 엔진 박스 강조
    //   containerRunning: 컨테이너 박스 sky
    // ─────────────────────────────────────────────────────
    function EC2Box({ ec2State, sshConnected, dockerInstalled, containerRunning, ec2Ip }) {
      const launching = ec2State === 'launching';
      const running   = ec2State === 'running';
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          launching ? 'bg-amber-50 border-amber-300 border-dashed animate-pulse' :
          running   ? 'bg-sky-50 border-sky-400 shadow-md' :
                      'bg-slate-50 border-slate-200'
        }`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-2">
              <span className="text-xl">☁️</span>
              <div>
                <div className={`text-[11px] font-bold ${
                  launching ? 'text-amber-800' : running ? 'text-sky-800' : 'text-slate-500'
                }`}>
                  AWS EC2 — t2.micro · Amazon Linux 2
                </div>
                <div className={`text-[9px] font-mono ${
                  launching ? 'text-amber-700' : running ? 'text-sky-700' : 'text-slate-400'
                }`}>
                  PublicIP: {ec2Ip}
                </div>
              </div>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
              launching ? 'bg-amber-500 text-white' :
              running   ? 'bg-sky-600 text-white' :
                          'bg-slate-300 text-slate-600'
            }`}>
              {launching ? 'pending' : running ? 'running' : 'stopped'}
            </span>
          </div>

          {/* SSH 표시 */}
          <div className={`text-[9px] font-mono mb-2 px-2 py-1 rounded transition-all duration-500 ${
            sshConnected ? 'bg-emerald-100 text-emerald-800 border border-emerald-300' :
                           'bg-slate-100 text-slate-400 border border-dashed border-slate-200'
          }`}>
            {sshConnected ? '🔑 SSH connected — ec2-user@ip-172-31-10-50' : '🔒 SSH not connected'}
          </div>

          {/* Docker 엔진 박스 */}
          <div className={`rounded border-2 p-2 transition-all duration-500 ${
            dockerInstalled ? 'bg-white border-sky-300' : 'bg-slate-50 border-dashed border-slate-200 opacity-60'
          }`}>
            <div className="flex items-center gap-1.5 mb-1.5">
              <span className="text-sm">🐳</span>
              <span className={`text-[10px] font-bold ${dockerInstalled ? 'text-sky-800' : 'text-slate-400'}`}>
                Docker Engine
              </span>
              {dockerInstalled && (
                <span className="ml-auto text-[8px] bg-sky-600 text-white px-1 py-0.5 rounded font-mono font-bold">
                  installed
                </span>
              )}
            </div>

            {/* 컨테이너 박스 */}
            <div className={`rounded border-2 p-2 transition-all duration-500 ${
              containerRunning ? 'bg-sky-50 border-sky-400 shadow-sm' :
              dockerInstalled  ? 'bg-slate-50 border-dashed border-slate-300 opacity-70' :
                                 'bg-slate-50 border-dashed border-slate-200 opacity-50'
            }`}>
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-1.5">
                  <span className="text-base">📦</span>
                  <div>
                    <div className={`text-[10px] font-bold ${containerRunning ? 'text-sky-800' : 'text-slate-400'}`}>
                      myapp container
                    </div>
                    <div className={`text-[8px] font-mono ${containerRunning ? 'text-slate-600' : 'text-slate-400'}`}>
                      myorg/myapp:1.0
                    </div>
                  </div>
                </div>
                {containerRunning && (
                  <div className="text-right">
                    <div className="text-[8px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                      Up ✓
                    </div>
                    <div className="text-[8px] font-mono text-slate-500 mt-0.5">
                      80→8000
                    </div>
                  </div>
                )}
              </div>
              {!containerRunning && (
                <div className="text-[8px] font-mono text-slate-400 mt-1">
                  {dockerInstalled ? 'docker pull/run 대기' : '아직 Docker 없음'}
                </div>
              )}
            </div>
          </div>

          {launching && (
            <div className="mt-2 text-[9px] text-amber-700 font-semibold flex items-center gap-1">
              <span>⏳</span> 인스턴스 부팅 중 (1~2분)…
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 외부 사용자 → DNS → SG → EC2(Docker, 컨테이너)
    //   각 단계별로 위에서 아래로 통로가 점진적으로 열린다
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const arrowActive = step.trafficOn;
      const sshArrowActive = step.sshConnected;
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 외부 사용자 → DNS → SG → EC2 (Docker)</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            <ExternalUserBox
              trafficOn={step.trafficOn}
              dnsOn={step.dnsOn}
              ec2Ip={step.ec2Ip}
            />

            {/* 화살표: 사용자 → Route53 */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                arrowActive ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ DNS 조회
              </div>
            </div>

            <Route53Box dnsOn={step.dnsOn} ec2Ip={step.ec2Ip} />

            {/* 화살표: DNS → SG */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                arrowActive ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ TCP 80 / 443
              </div>
            </div>

            <SecurityGroupBox sgPorts={step.sgPorts} />

            {/* 화살표: SG → EC2 (운영 트래픽) + SSH (관리자 트래픽) */}
            <div className="text-center flex items-center justify-center gap-3">
              <div className={`text-xs font-mono ${
                arrowActive ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ 트래픽
              </div>
              <div className={`text-xs font-mono ${
                sshArrowActive ? 'text-emerald-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ SSH (관리자)
              </div>
            </div>

            <EC2Box
              ec2State={step.ec2State}
              sshConnected={step.sshConnected}
              dockerInstalled={step.dockerInstalled}
              containerRunning={step.containerRunning}
              ec2Ip={step.ec2Ip}
            />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-400"></span>pending
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>SSH/up
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded border border-slate-300 bg-white"></span>idle
            </span>
            <span className="ml-auto font-mono">phase: {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VIII-1-13</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VIII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VIII. Docker 배포 &gt; Chapter 1. AWS EC2</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-1-13. EC2 + Docker — AWS 인스턴스 한 사이클 배포</h1>
                  <p className="text-sm text-slate-500 mt-0.5">EC2 생성 → SSH+Docker 설치 → pull/run → 보안그룹 → 도메인 — 5단계로 끝</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>EC2(서버) → SSH+Docker(런타임) → pull/run(앱) → SG(방화벽) → Route53(도메인)</strong> — 다섯 박스가 한 줄로 이어지면 한 사이클이 닫힌다. 다음에는 ALB/ACM 으로 HTTPS, 그 다음에 ECR/ECS 로 무중단 배포로 넘어간다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['AWS EC2', 'Amazon Linux 2', 'SSH', 'docker pull', 'docker run', 'Security Group', 'Route53', 'A record', 't2.micro', 'PublicIP'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./viii-1-12_dockerhub_push.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; VIII-1-12 Docker Hub push</a>
              <a href="./viii-1-14_ecs_fargate.html" className="text-sky-700 hover:text-sky-900 font-medium">VIII-1-14 ECS / Fargate &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
