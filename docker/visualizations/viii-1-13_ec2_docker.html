<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — EC2 인스턴스 생성과 Docker 설치</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes typing { from{width:0;} to{width:100%;} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · AWS 콘솔에서 EC2 인스턴스 생성",
        desc: "리전(서울 ap-northeast-2) 선택 → EC2 대시보드 → 인스턴스 시작. AMI는 Ubuntu Server 22.04 LTS, 인스턴스 유형은 t2.micro(프리티어 무료)를 선택한다. 12개월간 월 750시간 무료.",
        phase: "create_ec2",
      },
      {
        title: "STEP 2 · 키 페어와 보안 그룹 설정",
        desc: "키 페어(.pem)는 SSH 접속에 필요한 열쇠다. 분실 시 재발급 불가하므로 안전하게 보관한다. 보안 그룹에서 SSH(22), HTTP(80), HTTPS(443) 포트를 허용한다. SSH는 '내 IP'로 제한하는 것이 안전하다.",
        phase: "security",
      },
      {
        title: "STEP 3 · 탄력적 IP 연결 + SSH 접속",
        desc: "EC2는 중지 후 재시작하면 퍼블릭 IP가 바뀐다. 탄력적 IP(Elastic IP)를 연결하면 고정 IP를 사용할 수 있다. ssh -i my-key.pem ubuntu@<IP> 명령으로 서버에 접속한다.",
        phase: "ssh",
      },
      {
        title: "STEP 4 · Docker 설치",
        desc: "공식 설치 스크립트 curl -fsSL https://get.docker.com | sh로 Docker를 설치한다. sudo usermod -aG docker $USER로 현재 사용자를 docker 그룹에 추가하면 sudo 없이 docker 명령을 사용할 수 있다.",
        phase: "install_docker",
      },
      {
        title: "STEP 5 · Docker Compose 설치 및 동작 확인",
        desc: "docker-compose-plugin을 설치하고, docker run --rm hello-world로 Docker가 정상 동작하는지 확인한다. docker --version과 docker compose version으로 버전을 확인한다.",
        phase: "verify",
      },
      {
        title: "STEP 6 · 배포 준비 완료! 비용 관리 주의",
        desc: "EC2 + Docker 환경이 준비되었다. 실습 후 반드시 인스턴스를 중지(Stop)한다. 탄력적 IP는 인스턴스에 연결된 상태만 무료다. 프리티어 기간(12개월) 이후에는 과금에 주의한다.",
        phase: "complete",
      },
    ];

    function EC2CreateView() {
      const settings = [
        { label: "리전", value: "서울 (ap-northeast-2)", icon: "🌏" },
        { label: "AMI", value: "Ubuntu Server 22.04 LTS", icon: "🐧" },
        { label: "인스턴스 유형", value: "t2.micro (vCPU 1, 메모리 1GB)", icon: "💻" },
        { label: "스토리지", value: "EBS 20GB (프리티어 30GB까지 무료)", icon: "💾" },
        { label: "월 비용", value: "$0 (프리티어 12개월)", icon: "💰" },
      ];
      return (
        <div className="bg-white rounded-xl border-2 border-blue-200 p-5 anim-fade">
          <div className="flex items-center gap-3 mb-4">
            <span className="text-3xl">☁️</span>
            <h4 className="font-bold text-blue-800">AWS EC2 인스턴스 설정</h4>
          </div>
          <div className="space-y-3">
            {settings.map((s, i) => (
              <div key={i} className="flex items-center gap-3 p-3 bg-blue-50 rounded-lg anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                <span className="text-2xl">{s.icon}</span>
                <span className="text-sm text-slate-500 w-28">{s.label}</span>
                <span className="text-sm font-bold text-blue-700 flex-1">{s.value}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function SecurityView() {
      const ports = [
        { port: "22", proto: "TCP", source: "내 IP", purpose: "SSH 접속", icon: "🔑", color: "amber" },
        { port: "80", proto: "TCP", source: "0.0.0.0/0", purpose: "HTTP 웹 서비스", icon: "🌐", color: "blue" },
        { port: "443", proto: "TCP", source: "0.0.0.0/0", purpose: "HTTPS 웹 서비스", icon: "🔒", color: "green" },
      ];
      return (
        <div className="space-y-4 anim-fade">
          <div className="bg-white rounded-xl border-2 border-amber-200 p-5">
            <h4 className="font-bold text-amber-800 mb-3 flex items-center gap-2"><span>🔐</span> 키 페어 (.pem 파일)</h4>
            <div className="bg-gray-900 rounded-lg p-3 font-mono text-sm text-green-300">
              <div>$ chmod 400 ~/Downloads/my-key.pem</div>
              <div className="text-gray-500 mt-1"># 권한 설정 — 본인만 읽기 가능</div>
            </div>
            <p className="text-xs text-amber-600 mt-2 font-bold">분실 시 재발급 불가! 안전한 곳에 보관하세요.</p>
          </div>
          <div className="bg-white rounded-xl border-2 border-blue-200 p-5">
            <h4 className="font-bold text-blue-800 mb-3 flex items-center gap-2"><span>🛡️</span> 보안 그룹 (방화벽)</h4>
            <div className="space-y-2">
              {ports.map((p, i) => (
                <div key={i} className={`flex items-center gap-3 p-3 rounded-lg border anim-slide ${
                  p.color === 'amber' ? 'bg-amber-50 border-amber-200' :
                  p.color === 'blue' ? 'bg-blue-50 border-blue-200' : 'bg-green-50 border-green-200'
                }`} style={{animationDelay:`${i*0.15}s`}}>
                  <span className="text-xl">{p.icon}</span>
                  <span className="font-mono font-bold w-12">:{p.port}</span>
                  <span className="text-xs text-slate-500 w-20">{p.source}</span>
                  <span className="text-sm font-medium flex-1">{p.purpose}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function SSHView() {
      return (
        <div className="space-y-4 anim-fade">
          <div className="bg-white rounded-xl border-2 border-purple-200 p-5">
            <h4 className="font-bold text-purple-800 mb-3 flex items-center gap-2"><span>🌐</span> 탄력적 IP</h4>
            <div className="grid grid-cols-2 gap-4">
              <div className="bg-red-50 border border-red-200 rounded-lg p-3 text-center">
                <div className="text-sm font-bold text-red-700">탄력적 IP 없이</div>
                <div className="text-xs text-red-500 mt-1">중지 → 재시작 시 IP 변경</div>
                <div className="font-mono text-xs mt-2 text-red-600">3.35.100.50 → 13.125.xx.xx</div>
              </div>
              <div className="bg-green-50 border border-green-200 rounded-lg p-3 text-center">
                <div className="text-sm font-bold text-green-700">탄력적 IP 연결 시</div>
                <div className="text-xs text-green-500 mt-1">항상 동일한 고정 IP</div>
                <div className="font-mono text-xs mt-2 text-green-600">13.125.100.200 (고정)</div>
              </div>
            </div>
          </div>
          <div className="bg-gray-900 rounded-xl p-5 font-mono text-sm anim-fade">
            <div className="flex items-center gap-2 mb-3">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-green-500"></div>
              <span className="text-gray-400 text-xs ml-2">Terminal</span>
            </div>
            <div className="text-green-300">$ ssh -i ~/Downloads/my-key.pem ubuntu@13.125.100.200</div>
            <div className="text-gray-500 mt-2"># "Are you sure you want to continue connecting?" → yes</div>
            <div className="text-yellow-300 mt-2">ubuntu@ip-172-31-10-50:~$</div>
            <div className="text-gray-500 mt-1"># EC2 서버 접속 완료!</div>
          </div>
        </div>
      );
    }

    function InstallDockerView() {
      const commands = [
        { cmd: "sudo apt-get update", desc: "패키지 목록 업데이트", icon: "📋" },
        { cmd: "curl -fsSL https://get.docker.com | sh", desc: "Docker 공식 스크립트로 설치", icon: "🐳" },
        { cmd: "sudo usermod -aG docker $USER", desc: "docker 그룹에 현재 사용자 추가", icon: "👤" },
        { cmd: "newgrp docker", desc: "그룹 변경 즉시 적용", icon: "🔄" },
      ];
      return (
        <div className="bg-gray-900 rounded-xl p-5 anim-fade">
          <div className="flex items-center gap-2 mb-4">
            <div className="w-3 h-3 rounded-full bg-red-500"></div>
            <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div className="w-3 h-3 rounded-full bg-green-500"></div>
            <span className="text-gray-400 text-xs ml-2">EC2 Terminal</span>
          </div>
          <div className="space-y-4">
            {commands.map((c, i) => (
              <div key={i} className="anim-slide" style={{animationDelay:`${i*0.2}s`}}>
                <div className="flex items-center gap-3">
                  <span className="text-xl">{c.icon}</span>
                  <code className="text-green-400 font-mono text-sm">$ {c.cmd}</code>
                </div>
                <p className="text-gray-500 text-xs ml-10 mt-1">{c.desc}</p>
              </div>
            ))}
          </div>
          <div className="mt-4 bg-amber-900/30 rounded-lg p-3">
            <p className="text-amber-300 text-xs">usermod -aG 없이 docker 명령 실행 시: "permission denied while trying to connect to the Docker daemon socket" 에러 발생</p>
          </div>
        </div>
      );
    }

    function VerifyView() {
      return (
        <div className="space-y-4 anim-fade">
          <div className="bg-gray-900 rounded-xl p-5 font-mono text-sm">
            <div className="flex items-center gap-2 mb-3">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-green-500"></div>
              <span className="text-gray-400 text-xs ml-2">EC2 Terminal</span>
            </div>
            <div className="space-y-2">
              <div className="text-green-300">$ sudo apt-get install -y docker-compose-plugin</div>
              <div className="text-gray-500"># Docker Compose 플러그인 설치</div>
              <div className="text-green-300 mt-3">$ docker --version</div>
              <div className="text-white">Docker version 27.x.x, build xxxxxxx</div>
              <div className="text-green-300 mt-2">$ docker compose version</div>
              <div className="text-white">Docker Compose version v2.x.x</div>
              <div className="text-green-300 mt-3">$ docker run --rm hello-world</div>
              <div className="text-cyan-300 mt-1">Hello from Docker!</div>
              <div className="text-gray-400">This message shows that your installation appears to be working correctly.</div>
            </div>
          </div>
          <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-4 text-center">
            <span className="text-3xl">✅</span>
            <p className="font-bold text-emerald-700 mt-2">Docker + Docker Compose 설치 완료!</p>
          </div>
        </div>
      );
    }

    function CompleteView() {
      const costs = [
        { type: "t2.micro", vcpu: "1", mem: "1GB", cost: "$0", note: "프리티어 12개월" },
        { type: "t3.small", vcpu: "2", mem: "2GB", cost: "~$15/월", note: "소규모 서비스" },
        { type: "t3.medium", vcpu: "2", mem: "4GB", cost: "~$30/월", note: "DB+앱 함께 운영" },
      ];
      return (
        <div className="space-y-4 anim-fade">
          <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6">
            <div className="text-center">
              <div className="text-4xl mb-3">🎉</div>
              <h3 className="text-xl font-bold text-emerald-800 mb-2">EC2 + Docker 배포 환경 준비 완료!</h3>
              <div className="flex flex-wrap justify-center gap-2 mt-4">
                {["Ubuntu 22.04", "Docker 설치", "Docker Compose", "보안 그룹", "탄력적 IP", "SSH 접속"].map((item, i) => (
                  <span key={i} className="bg-emerald-200 text-emerald-800 px-3 py-1.5 rounded-full text-sm font-medium anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                    {item}
                  </span>
                ))}
              </div>
            </div>
          </div>
          <div className="bg-red-50 border-2 border-red-300 rounded-xl p-4">
            <h4 className="font-bold text-red-700 mb-2 flex items-center gap-2"><span>⚠️</span> 비용 주의사항</h4>
            <div className="space-y-2">
              {costs.map((c, i) => (
                <div key={i} className="flex items-center justify-between bg-white rounded-lg p-2 text-sm">
                  <span className="font-mono font-bold">{c.type}</span>
                  <span className="text-slate-500">{c.vcpu} vCPU / {c.mem}</span>
                  <span className={`font-bold ${c.cost === '$0' ? 'text-green-600' : 'text-red-600'}`}>{c.cost}</span>
                </div>
              ))}
            </div>
            <p className="text-xs text-red-600 mt-2 font-bold">실습 후 반드시 인스턴스를 중지(Stop)하세요!</p>
          </div>
        </div>
      );
    }

    function FlowIndicator({ phase }) {
      const flowSteps = [
        { label: "EC2 생성", icon: "☁️", active: true },
        { label: "보안 설정", icon: "🛡️", active: ["security","ssh","install_docker","verify","complete"].includes(phase) },
        { label: "SSH 접속", icon: "🔑", active: ["ssh","install_docker","verify","complete"].includes(phase) },
        { label: "Docker 설치", icon: "🐳", active: ["install_docker","verify","complete"].includes(phase) },
        { label: "확인", icon: "✅", active: ["verify","complete"].includes(phase) },
      ];
      return (
        <div className="flex items-center justify-between bg-white rounded-xl p-4 border border-slate-200">
          {flowSteps.map((s, i) => (
            <React.Fragment key={i}>
              <div className={`flex flex-col items-center transition-all duration-500 ${s.active ? 'opacity-100 scale-105' : 'opacity-30 scale-95'}`}>
                <span className="text-xl mb-1">{s.icon}</span>
                <span className="text-xs font-bold text-center">{s.label}</span>
              </div>
              {i < flowSteps.length - 1 && (
                <div className={`flex-1 h-1 mx-1 rounded transition-all duration-500 ${s.active ? 'bg-blue-400' : 'bg-slate-200'}`}></div>
              )}
            </React.Fragment>
          ))}
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const renderVisual = () => {
        switch(data.phase) {
          case "create_ec2": return <EC2CreateView />;
          case "security": return <SecurityView />;
          case "ssh": return <SSHView />;
          case "install_docker": return <InstallDockerView />;
          case "verify": return <VerifyView />;
          case "complete": return <CompleteView />;
          default: return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VIII-1-13: EC2 인스턴스 생성과 Docker 설치</h1>
              </div>
              <p className="text-slate-500 text-sm">AWS EC2 생성 → SSH 접속 → Docker 설치까지 전체 절차를 단계별로 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "complete" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "security" ? "bg-amber-600 border-amber-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            <FlowIndicator phase={data.phase} />

            <div key={`visual-${step}`}>{renderVisual()}</div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
