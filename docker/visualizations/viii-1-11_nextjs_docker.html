            '',
            '# ─── 정리: 4 단계로 본 이미지 다이어트 ───',
            '#   Step 2 단일 stage             : ~1200 MB',
            '#   Step 3 standalone 추가         : ~ 280 MB',
            '#   Step 4 멀티스테이지 + standalone: ~ 150 MB  ← 운영 권장',
            '#   Step 5 + CDN 분리 (선택)        : ~ 100 MB',
            '',
            '# 다음 자료 →  VIII-1-12 정적 파일 서빙 (Nginx 프론트)',
          ],
          highlight: [3, 4, 5, 7, 8, 9, 11, 12, 13, 15, 16, 17, 18, 19, 38, 39, 40, 41, 42],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 상단: Next.js 빌드 흐름 (소스 → next build → .next/)
    //   buildDone 이면 .next/ 박스가 sky 로 켜진다
    //   standaloneOn 이면 .next/standalone/ 서브박스가 추가 강조
    // ─────────────────────────────────────────────────────
    function BuildFlowBox({ buildDone, standaloneOn }) {
      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">⚙️</span>
            <span className="text-[11px] font-bold text-slate-700">Next.js 빌드 흐름</span>
          </div>
          <div className="grid grid-cols-3 gap-1.5 items-stretch">
            {/* src */}
            <div className="rounded border-2 border-slate-300 bg-slate-50 p-2 text-center">
              <div className="text-base">📂</div>
              <div className="text-[10px] font-bold text-slate-700">src/</div>
              <div className="text-[8px] text-slate-500">React 소스</div>
            </div>
            {/* next build */}
            <div className={`rounded border-2 p-2 text-center transition-all duration-500 ${
              buildDone ? 'bg-sky-100 border-sky-500 shadow-sm' : 'bg-slate-50 border-dashed border-slate-200'
            }`}>
              <div className="text-base">🔨</div>
              <div className={`text-[10px] font-bold ${buildDone ? 'text-sky-800' : 'text-slate-400'}`}>next build</div>
              <div className="text-[8px] text-slate-500">SSR 번들 + static</div>
            </div>
            {/* .next/ */}
            <div className={`rounded border-2 p-2 text-center transition-all duration-500 ${
              buildDone ? 'bg-sky-50 border-sky-400 shadow-sm' : 'bg-slate-50 border-dashed border-slate-200'
            }`}>
              <div className="text-base">📦</div>
              <div className={`text-[10px] font-bold ${buildDone ? 'text-sky-800' : 'text-slate-400'}`}>.next/</div>
              <div className="text-[8px] text-slate-500">빌드 결과</div>
            </div>
          </div>
          <div className="text-center text-[10px] text-slate-400 my-1">↓</div>
          {/* standalone 서브박스 */}
          <div className={`rounded border-2 px-2 py-1.5 transition-all duration-500 ${
            standaloneOn ? 'bg-emerald-50 border-emerald-400 shadow-sm' : 'bg-slate-50 border-dashed border-slate-200 opacity-60'
          }`}>
            <div className="flex items-center gap-1.5 text-[10px]">
              <span>🎒</span>
              <span className={`font-bold ${standaloneOn ? 'text-emerald-800' : 'text-slate-400'}`}>
                .next/standalone/  (output: 'standalone')
              </span>
              {standaloneOn && (
                <span className="ml-auto text-[8px] bg-emerald-600 text-white px-1 py-0.5 rounded font-mono font-bold">
                  packed
                </span>
              )}
            </div>
            <div className={`text-[9px] font-mono ${standaloneOn ? 'text-emerald-700' : 'text-slate-400'} mt-0.5`}>
              {standaloneOn
                ? 'server.js 자동 생성 + 추려진 ~200 deps (~90 MB)'
                : '아직 비활성 (next.config.js 설정 필요)'}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙: 멀티스테이지 시각화 (deps → builder → runner)
    //   stagesOn 에 들어 있는 stage 만 sky 로 활성
    // ─────────────────────────────────────────────────────
    function MultiStageBox({ stagesOn }) {
      const stages = [
        { id: 'deps',    icon: '📋', label: 'deps',    desc: 'npm ci' },
        { id: 'builder', icon: '🔨', label: 'builder', desc: 'next build' },
        { id: 'runner',  icon: '🚀', label: 'runner',  desc: 'node server.js' },
      ];
      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🏗️</span>
              <span className="text-[11px] font-bold text-slate-700">멀티스테이지 빌드</span>
            </div>
            <span className="text-[9px] font-mono text-slate-500">
              {stagesOn.length} / 3 stage
            </span>
          </div>
          <div className="grid grid-cols-3 gap-1.5">
            {stages.map((s, i) => {
              const on = stagesOn.includes(s.id);
              return (
                <div
                  key={s.id}
                  className={`rounded-lg border-2 p-2 text-center transition-all duration-500 ${
                    on
                      ? 'bg-sky-50 border-sky-400 shadow-sm'
                      : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
                  }`}
                >
                  <div className="text-lg">{s.icon}</div>
                  <div className={`text-[10px] font-bold ${on ? 'text-sky-800' : 'text-slate-400'}`}>
                    {i + 1}. {s.label}
                  </div>
                  <div className={`text-[8px] font-mono ${on ? 'text-slate-600' : 'text-slate-400'}`}>
                    {s.desc}
                  </div>
                  {on && (
                    <div className="mt-1 bg-sky-600 text-white text-[8px] px-1 py-0.5 rounded font-mono font-bold">
                      AS {s.label}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div className={`text-[9px] mt-1.5 ${stagesOn.length === 3 ? 'text-sky-700 font-semibold' : 'text-slate-400'}`}>
            {stagesOn.length === 3
              ? '✓ 빌드 도구·소스·풀 deps 는 runner 에 닿지 않는다'
              : stagesOn.length === 1
                ? '단일 stage — 모든 산출물이 한 이미지에 (Step 2)'
                : '아직 미설정'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: 최종 이미지 산출물 + 크기 변화
    //   shippedArtifacts 에 포함된 항목만 emerald, 나머지는 회색
    //   imageSize 를 큰 숫자로 표시 (1200 → 280 → 150 변화)
    // ─────────────────────────────────────────────────────
    function ImageContentsBox({ shippedArtifacts, imageSize }) {
      const sizeColor =
        imageSize <= 200 ? 'text-emerald-600' :
        imageSize <= 400 ? 'text-sky-600' :
        imageSize <= 700 ? 'text-amber-600' : 'text-rose-600';
      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🐳</span>
              <span className="text-[11px] font-bold text-slate-700">최종 이미지 내용물</span>
            </div>
            <div className="flex items-baseline gap-1">
              <span className={`text-xl font-bold font-mono ${sizeColor}`}>
                {imageSize}
              </span>
              <span className="text-[10px] text-slate-500 font-mono">MB</span>
            </div>
          </div>

          <div className="space-y-1">
            {ARTIFACTS.map((a) => {
              const shipped = shippedArtifacts.includes(a.id);
              const required = a.ship; // 운영에 진짜 필요한가
              const bad = shipped && !required; // 들어가면 안 되는데 들어감
              return (
                <div
                  key={a.id}
                  className={`flex items-center gap-2 rounded border-2 px-2 py-1 transition-all duration-500 ${
                    shipped
                      ? (bad
                          ? 'bg-rose-50 border-rose-300'
                          : 'bg-emerald-50 border-emerald-300')
                      : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
                  }`}
                >
                  <span className="text-base">{a.icon}</span>
                  <div className="flex-1 min-w-0">
                    <div className={`text-[10px] font-mono font-bold ${
                      shipped ? (bad ? 'text-rose-800' : 'text-emerald-800') : 'text-slate-400'
                    }`}>
                      {a.label}
                    </div>
                    <div className={`text-[9px] ${shipped ? 'text-slate-600' : 'text-slate-400'} truncate`}>
                      {a.desc}
                    </div>
                  </div>
                  <span className={`text-[9px] font-mono font-bold px-1.5 py-0.5 rounded ${
                    shipped
                      ? (bad ? 'bg-rose-600 text-white' : 'bg-emerald-600 text-white')
                      : 'bg-slate-200 text-slate-500'
                  }`}>
                    {a.size}
                  </span>
                  <span className="text-[10px] w-3">
                    {shipped ? (bad ? '✗' : '✓') : '·'}
                  </span>
                </div>
              );
            })}
          </div>

          {/* 다이어트 진행 바 */}
          <div className="mt-2">
            <div className="flex items-center justify-between text-[9px] text-slate-500 font-mono mb-0.5">
              <span>이미지 다이어트</span>
              <span>1200 MB → {imageSize} MB</span>
            </div>
            <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
              <div
                className={`h-full rounded-full transition-all duration-700 ${
                  imageSize <= 200 ? 'bg-emerald-500' :
                  imageSize <= 400 ? 'bg-sky-500' :
                  imageSize <= 700 ? 'bg-amber-500' : 'bg-rose-500'
                }`}
                style={{ width: `${Math.max(8, (imageSize / 1200) * 100)}%` }}
              />
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 빌드 흐름 (src → next build → .next + standalone)
    //   중앙: 멀티스테이지 (deps / builder / runner)
    //   하단: 최종 이미지 내용물 + 크기 변화
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 next build → standalone → 이미지</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            <BuildFlowBox
              buildDone={step.buildDone}
              standaloneOn={step.standaloneOn}
            />

            {/* 화살표 */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.stagesOn.length > 0 ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ Dockerfile 멀티스테이지로 분리
              </div>
            </div>

            <MultiStageBox stagesOn={step.stagesOn} />

            {/* 화살표 */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.shippedArtifacts.length > 0 ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ runner 스테이지가 만드는 최종 이미지
              </div>
            </div>

            <ImageContentsBox
              shippedArtifacts={step.shippedArtifacts}
              imageSize={step.imageSize}
            />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>active stage
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>운영 필요
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>불필요(낭비)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded border border-slate-300 bg-white"></span>제외됨
            </span>
            <span className="ml-auto font-mono">phase: {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, 강조 라인
    //   상단에 5개 파일 탭 (build.sh / Dockerfile / next.config.js /
    //                       multistage.Dockerfile / static.Dockerfile)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, onJumpTo }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      const TABS = [
        { idx: 0, name: 'build.sh' },
        { idx: 1, name: 'Dockerfile' },
        { idx: 2, name: 'next.config.js' },
        { idx: 3, name: 'multistage.Dockerfile' },
        { idx: 4, name: 'static.Dockerfile' },
      ];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 바 (5개 파일명) */}
          <div className="bg-[#21252b] px-3 pt-2 flex items-center gap-1.5 border-b border-slate-700 overflow-x-auto">
            <div className="flex gap-1.5 mr-2 flex-shrink-0">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            {TABS.map((t) => {
              const active = t.idx === stepIdx;
              return (
                <button
                  key={t.name}
                  onClick={() => onJumpTo(t.idx)}
                  className={`px-2.5 py-1 text-[11px] font-mono rounded-t whitespace-nowrap transition ${
                    active
                      ? 'bg-[#282c34] text-sky-300 border-t border-l border-r border-slate-700'
                      : 'text-slate-500 hover:text-slate-300'
                  }`}
                  title={`Step ${t.idx + 1}`}
                >
                  {t.name}
                </button>
              );
            })}
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase pr-2">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      const handleJumpTo = (idx) => {
        setStepIdx(idx);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VIII-1-11</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VIII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VIII. 실무 패턴 &gt; Chapter 1. 프레임워크별 컨테이너화</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-1-11. Next.js Docker — SSR React 앱 standalone 패킹</h1>
                  <p className="text-sm text-slate-500 mt-0.5">next build → output: 'standalone' → 3-stage Dockerfile → 정적 파일까지, 1.2 GB → 150 MB 다이어트</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                code={step.code}
                stepIdx={stepIdx}
                total={STEPS.length}
                onJumpTo={handleJumpTo}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>output: 'standalone'</strong>(추리기) + <strong>멀티스테이지</strong>(분리) + <strong>static/public 명시 COPY</strong>(누락 방지) — 이 셋이 Next.js 컨테이너화의 핵심 3 축이다. 다음(VIII-1-12)에서는 정적 자산을 Nginx로 빼는 패턴을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Next.js', 'next build', "output: 'standalone'", 'node:20-alpine', 'multi-stage', 'deps/builder/runner', 'COPY --from', '.next/static', 'public/', 'server.js'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./viii-1-10_nodejs_docker.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; VIII-1-10 Node.js Docker</a>
              <a href="./viii-1-12_static_serving.html" className="text-sky-700 hover:text-sky-900 font-medium">VIII-1-12 정적 파일 서빙 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
