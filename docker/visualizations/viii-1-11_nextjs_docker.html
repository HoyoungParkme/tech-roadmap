<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — Next.js Docker화</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes buildProgress { from{width:0%;} to{width:100%;} }
    @keyframes scaleIn { from{opacity:0;transform:scale(0.8);} to{opacity:1;transform:scale(1);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-build { animation: buildProgress 1.5s ease-out forwards; }
    .anim-scale { animation: scaleIn 0.4s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · standalone 출력 모드란?",
        desc: "일반 Next.js 빌드는 node_modules 전체(~1.2GB)가 필요하다. output: 'standalone'을 설정하면 실행에 필요한 파일만 골라서 ~150MB 이미지를 만든다. 캠핑에 필요한 것만 배낭에 담는 것과 같다.",
        phase: "standalone",
      },
      {
        title: "STEP 2 · 1단계: deps — 의존성 설치",
        desc: "node:20-alpine 베이스에서 package.json과 package-lock.json만 복사하고 npm ci로 의존성을 설치한다. 의존성 파일이 바뀌지 않으면 이 레이어를 캐시에서 재사용한다.",
        phase: "deps",
      },
      {
        title: "STEP 3 · 2단계: builder — 앱 빌드",
        desc: "deps 스테이지의 node_modules를 복사하고 소스 코드를 추가한 뒤 npm run build를 실행한다. NEXT_PUBLIC_* 환경변수는 이 시점에 번들에 하드코딩된다.",
        phase: "builder",
      },
      {
        title: "STEP 4 · 3단계: runner — 실행 이미지",
        desc: ".next/standalone, .next/static, public 3가지를 복사한다. standalone이 생성하는 server.js로 실행한다. static과 public을 빠뜨리면 CSS/JS/이미지가 로드되지 않는다.",
        phase: "runner",
      },
      {
        title: "STEP 5 · 환경변수 주입 전략",
        desc: "NEXT_PUBLIC_*는 빌드타임에 --build-arg로 주입(번들에 하드코딩). DATABASE_URL 같은 서버사이드 변수는 docker run -e로 런타임에 주입(이미지 재사용 가능).",
        phase: "env_vars",
      },
      {
        title: "STEP 6 · 완성: 이미지 크기 비교",
        desc: "일반 빌드 ~1.2GB에서 standalone 3-stage로 ~150MB까지 80% 이상 줄었다. deps/builder/runner 3단계 분리로 각 레이어를 독립적으로 캐시하여 재빌드도 빠르다.",
        phase: "complete",
      },
    ];

    function StandaloneCompare() {
      return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 anim-fade">
          <div className="rounded-xl border-2 border-red-300 bg-red-50 p-5">
            <div className="text-center">
              <div className="text-4xl mb-2">📦</div>
              <h4 className="font-bold text-red-700">일반 빌드</h4>
              <div className="text-3xl font-bold text-red-600 mt-2">~1.2GB</div>
            </div>
            <div className="mt-4 space-y-2">
              {[".next/ (빌드 결과)", "node_modules/ 전체", "소스 코드 전체"].map((item, i) => (
                <div key={i} className="bg-red-100 text-red-700 px-3 py-2 rounded-lg text-sm anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                  {item}
                </div>
              ))}
            </div>
          </div>
          <div className="rounded-xl border-2 border-emerald-300 bg-emerald-50 p-5 shadow-lg">
            <div className="text-center">
              <div className="text-4xl mb-2">🎒</div>
              <h4 className="font-bold text-emerald-700">standalone 빌드</h4>
              <div className="text-3xl font-bold text-emerald-600 mt-2">~150MB</div>
            </div>
            <div className="mt-4 space-y-2">
              {[".next/standalone/ (서버 코드만)", ".next/static/ (정적 에셋)", "public/ (공개 파일)"].map((item, i) => (
                <div key={i} className="bg-emerald-100 text-emerald-700 px-3 py-2 rounded-lg text-sm anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                  {item}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function ThreeStageView({ activeStage }) {
      const stages = [
        { name: "deps", icon: "📋", label: "의존성 설치", color: "blue", items: ["COPY package.json", "RUN npm ci"] },
        { name: "builder", icon: "🔨", label: "앱 빌드", color: "purple", items: ["COPY --from=deps node_modules", "COPY . .", "RUN npm run build"] },
        { name: "runner", icon: "🚀", label: "실행 이미지", color: "emerald", items: ["COPY standalone/", "COPY static/", "COPY public/"] },
      ];

      return (
        <div className="space-y-4 anim-fade">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {stages.map((s, i) => {
              const isActive = s.name === activeStage || activeStage === "all";
              const colors = {
                blue: { border: "border-blue-400", bg: "bg-blue-50", text: "text-blue-700", itemBg: "bg-blue-100" },
                purple: { border: "border-purple-400", bg: "bg-purple-50", text: "text-purple-700", itemBg: "bg-purple-100" },
                emerald: { border: "border-emerald-400", bg: "bg-emerald-50", text: "text-emerald-700", itemBg: "bg-emerald-100" },
              }[s.color];

              return (
                <div key={i} className={`rounded-xl border-2 p-4 transition-all duration-500 ${
                  isActive ? `${colors.border} ${colors.bg} shadow-lg scale-[1.02]` : 'border-slate-200 bg-slate-50 opacity-40 scale-95'
                }`}>
                  <div className="text-center mb-3">
                    <span className="text-3xl">{s.icon}</span>
                    <div className={`font-bold text-sm mt-1 ${isActive ? colors.text : 'text-slate-400'}`}>
                      {i + 1}단계: {s.label}
                    </div>
                  </div>
                  <div className="space-y-2">
                    {s.items.map((item, j) => (
                      <div key={j} className={`px-2 py-1.5 rounded text-xs font-mono ${isActive ? `${colors.itemBg} ${colors.text}` : 'bg-slate-100 text-slate-400'}`}>
                        {item}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
          {activeStage !== "all" && (
            <div className="flex items-center justify-center gap-2">
              {stages.map((s, i) => (
                <React.Fragment key={i}>
                  <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${
                    s.name === activeStage ? 'bg-blue-500 text-white anim-pulse' : 'bg-slate-200 text-slate-400'
                  }`}>{i + 1}</div>
                  {i < stages.length - 1 && <div className="w-8 h-0.5 bg-slate-200"></div>}
                </React.Fragment>
              ))}
            </div>
          )}
        </div>
      );
    }

    function EnvVarsView() {
      const vars = [
        { type: "빌드타임", prefix: "NEXT_PUBLIC_*", example: "NEXT_PUBLIC_API_URL", inject: "docker build --build-arg", icon: "🔨", color: "amber", note: "번들에 하드코딩 → 변경 시 재빌드 필요" },
        { type: "서버사이드", prefix: "일반 변수", example: "DATABASE_URL", inject: "docker run -e", icon: "🔧", color: "blue", note: "런타임 주입 → 이미지 재사용 가능" },
      ];
      return (
        <div className="space-y-4 anim-fade">
          {vars.map((v, i) => (
            <div key={i} className={`rounded-xl border-2 p-5 anim-slide ${
              v.color === 'amber' ? 'border-amber-300 bg-amber-50' : 'border-blue-300 bg-blue-50'
            }`} style={{animationDelay:`${i*0.2}s`}}>
              <div className="flex items-center gap-3 mb-3">
                <span className="text-3xl">{v.icon}</span>
                <div>
                  <h4 className={`font-bold ${v.color === 'amber' ? 'text-amber-800' : 'text-blue-800'}`}>{v.type} 변수</h4>
                  <code className="text-xs text-slate-500">{v.example}</code>
                </div>
              </div>
              <div className={`px-3 py-2 rounded-lg text-sm ${v.color === 'amber' ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700'}`}>
                <div className="font-mono text-xs mb-1">{v.inject}</div>
                <div className="font-medium">{v.note}</div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function CompleteView() {
      return (
        <div className="space-y-4 anim-fade">
          <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6">
            <div className="text-center">
              <div className="text-4xl mb-3">🎉</div>
              <h3 className="text-xl font-bold text-emerald-800 mb-2">Next.js 3-Stage 이미지 완성!</h3>
              <div className="flex flex-wrap justify-center gap-2 mt-4">
                {["output: 'standalone'", "deps 스테이지", "builder 스테이지", "runner 스테이지", "~150MB 이미지", "비루트 사용자"].map((item, i) => (
                  <span key={i} className="bg-emerald-200 text-emerald-800 px-3 py-1.5 rounded-full text-sm font-medium anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                    {item}
                  </span>
                ))}
              </div>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div className="bg-red-50 border border-red-200 rounded-xl p-4 text-center">
              <div className="text-3xl mb-2">📦</div>
              <div className="text-2xl font-bold text-red-600">~1.2GB</div>
              <div className="text-xs text-red-500">일반 빌드</div>
            </div>
            <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4 text-center anim-pulse">
              <div className="text-3xl mb-2">🚀</div>
              <div className="text-2xl font-bold text-emerald-600">~150MB</div>
              <div className="text-xs text-emerald-500">standalone 빌드 (87% 절감)</div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const renderVisual = () => {
        switch(data.phase) {
          case "standalone": return <StandaloneCompare />;
          case "deps": return <ThreeStageView activeStage="deps" />;
          case "builder": return <ThreeStageView activeStage="builder" />;
          case "runner": return <ThreeStageView activeStage="runner" />;
          case "env_vars": return <EnvVarsView />;
          case "complete": return <CompleteView />;
          default: return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VIII-1-11: Next.js 앱 Docker화</h1>
              </div>
              <p className="text-slate-500 text-sm">standalone 빌드와 3-stage Dockerfile로 최적화된 Next.js 이미지를 만드는 과정을 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "complete" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "env_vars" ? "bg-amber-600 border-amber-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            <div key={`visual-${step}`}>{renderVisual()}</div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
