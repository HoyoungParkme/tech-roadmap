  <!--
    VIII-1-10. Node.js (Express) Docker화 — 5단계
    학습 목표: package.json 작성부터 캐시 최적화 / production 모드 / Mongo 연동
              compose 까지 Node.js 앱을 Docker로 만드는 실무 흐름을 5단계로 본다.
    핵심 비유: 식당 주방 셋업 — 재료 목록(package.json) → 조리 매뉴얼(Dockerfile)
              → 미리 손질해 놓는 밑작업(layer cache) → 영업용 장비만(production)
              → 옆가게 식자재 창고와 연결(MongoDB compose)
    패턴: fastapi v1 — 좌(LiveDataPane: 빌드 단계 + layer caching 비교) / 우(VSCode CodeViewer 다중 탭)
    색상: docker sky
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    //   icon : 이모지
    //   title: 단계명

    // ─────────────────────────────────────────────────────
    const BUILD_STAGES = [
      { id: 'pkg',     icon: '📋', title: 'package.json',         sub: '의존성 선언' },

      { id: 'install', icon: '⬇️', title: 'RUN npm ci',            sub: '재현성 있는 설치' },

      { id: 'expose',  icon: '🌐', title: 'EXPOSE 3000',          sub: 'HTTP 포트' },
      { id: 'cmd',     icon: '▶️', title: 'CMD ["node", ...]',    sub: '컨테이너 시작 명령' },

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 — LiveDataPane이 읽는 dataState

    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. package.json + npm install — 의존성 선언',
        desc: 'Node.js 앱의 출발점은 package.json이다. Express · 미들웨어 등 런타임 의존성을 dependencies에, nodemon 등 개발 도구는 devDependencies에 적는다. npm install 한 번이면 node_modules와 package-lock.json이 만들어지고, 이 lock 파일이 팀원/CI/Docker에서 같은 버전을 재현하는 핵심이 된다.',
        activeStages: ['pkg'],
        cacheCompare: 'none',
        prodMode: false,
        mongoOn: false,
        imageSize: 0,
        codeKey: 'package.json',
      },
      {
        title: 'Step 2. Dockerfile 작성 — FROM node:20-alpine',
        desc: '가장 단순한 형태의 Dockerfile부터 시작한다. node:20-alpine은 약 130MB로 데비안 기반(~1GB) 대비 87% 작다. WORKDIR로 작업 디렉터리를 정하고, COPY로 모든 파일을 한 번에 가져와 npm install 후 CMD로 앱을 띄운다. 동작은 하지만 캐시 측면에서는 개선 여지가 크다.',
        activeStages: ['pkg', 'base', 'workdir', 'copySrc', 'install', 'expose', 'cmd'],
        cacheCompare: 'naive',
        prodMode: false,
        mongoOn: false,
        imageSize: 320,
        codeKey: 'Dockerfile',
      },
      {
        title: 'Step 3. package*.json만 먼저 COPY — 레이어 캐싱 최적화',
        desc: 'COPY 순서를 바꾸는 것만으로 빌드 속도가 극적으로 빨라진다. package*.json을 먼저 복사하고 npm ci를 실행한 뒤, 그 다음 소스 코드를 복사한다. 의존성 파일은 잘 안 바뀌므로 npm ci 레이어가 캐시에서 그대로 재사용되고, 매일 바꾸는 src/만 다시 복사된다. 빌드 90초 → 5초.',
        activeStages: ['pkg', 'base', 'workdir', 'copyPkg', 'install', 'copySrc', 'expose', 'cmd'],

        activeStages: ['pkg', 'base', 'workdir', 'copyPkg', 'install', 'copySrc', 'expose', 'cmd'],

    // ─────────────────────────────────────────────────────

    // ─────────────────────────────────────────────────────
    const CODES = {

          '//   $ npm install',

          '//',
          '// ─── 핵심 ───',
          '//   • dependencies    : 운영에 꼭 필요한 패키지',

      'Dockerfile': {

        highlight: [4, 5, 7, 8, 10, 11, 13, 14, 16, 17, 19, 20],
      },
      'cache-optimized.Dockerfile': {

          'EXPOSE 3000',
          'CMD ["node", "src/index.js"]',
          '',
          '# ─── 캐시 효과 비교 ───',

        ],
        highlight: [7, 8, 9, 10, 12, 13, 14, 16, 17, 18, 23, 24, 25, 26, 27],
      },
      'production.Dockerfile': {
        lang: 'dockerfile',
        filename: 'production.Dockerfile',
        lines: [
          '# Step 4. production 모드 — devDependencies 제외 + 비루트 사용자',
          '#   운영 이미지를 가볍고 안전하게 (320MB → 175MB)',
          '',
          'FROM node:20-alpine',
          '',
          '# 1) 환경 변수로 production 선언',
          '#    Express 가 view 캐시 모드로 동작하고 npm 이 dev 의존성을 건너뛴다',
          'ENV NODE_ENV=production',
          '',
          'WORKDIR /app',
          '',
          '# 2) 의존성 파일만 먼저 복사 (캐시 최적화 유지)',
          'COPY package*.json ./',
          '',
          '# ★ 핵심) --omit=dev — dependencies 만 설치',
          '#    nodemon, jest 같은 devDependencies 는 운영에 불필요',
          '#    구버전 옵션: --production',
          'RUN npm ci --omit=dev',
          '',
          '# 3) 소스 복사 + 소유권을 비루트 user 로',
          '#    node:alpine 이미지에는 이미 uid=1000 인 node 사용자가 있다',
          'COPY --chown=node:node . .',
          '',
          '# 4) 비루트 사용자로 전환 — 보안 강화',
          'USER node',
          '',
          'EXPOSE 3000',
          '',
          '# 5) shell 형식 대신 exec 형식 — PID 1 = node, 시그널이 그대로 전달',
          'CMD ["node", "src/index.js"]',
          '',
          '# ─── 결과 ───',
          '#   • 이미지 크기   : 320MB → 175MB (-45%)',
          '#   • 취약점 노출  : root → node user (uid=1000)',
          '#   • 빌드 캐시    : src/ 변경 시 npm ci 레이어 재사용',
          '#   • 시그널 전달  : docker stop → SIGTERM → graceful shutdown',
          '',
          '# ─── 빌드 / 실행 ───',
          '#   $ docker build -t express-app:prod -f production.Dockerfile .',

          '    ports:',
          '      - "3000:3000"',
          '    environment:',
          '      NODE_ENV: production',
          '      # ★ 서비스 이름 "mongo" 가 곧 DNS 호스트명',
          '      MONGO_URL: mongodb://mongo:27017/appdb',
          '    depends_on:',
          '      - mongo',

          '',
          '  # ─── MongoDB ───',

          '      - mongo_data:/data/db',
          '    restart: unless-stopped',
          '',
          'volumes:',

          '',

          '#   $ docker compose up -d',
          '#     → Network myapp_default       Created',
          '#     → Volume  myapp_mongo_data    Created',

          '#     → Container myapp-app-1       Started',
          '#',

          '#     → [{"_id":"...","name":"Alice"}]   ✓',
          '',

          '#   $ docker compose down       # 컨테이너 + 네트워크 정리 (볼륨 보존)',

    // ─────────────────────────────────────────────────────
    // 좌측 상단: Node.js 빌드 단계 시각화
    //   BUILD_STAGES 를 세로로 쭉 나열, activeStages 에 들어간 id 만 sky 강조
    //   prodMode 일 때 install 단계 라벨이 "npm ci --omit=dev" 로 바뀜
    //   imageSize 가 0 이상이면 하단에 결과 이미지 박스 표시
    // ─────────────────────────────────────────────────────
    function BuildStagesBox({ activeStages, prodMode, imageSize }) {
      const isActive = (id) => activeStages.includes(id);
      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🐳</span>
              <span className="text-[11px] font-bold text-slate-700">Node.js 빌드 단계</span>
            </div>
            <span className="text-[9px] font-mono text-slate-400">
              {activeStages.length}/{BUILD_STAGES.length} 활성
            </span>
          </div>

          <div className="space-y-1">
            {BUILD_STAGES.map((s, i) => {
              const on = isActive(s.id);
              let title = s.title;
              if (s.id === 'install' && prodMode) title = 'RUN npm ci --omit=dev';
              return (
                <div
                  key={s.id}
                  className={`rounded border-2 px-2 py-1.5 transition-all duration-500 flex items-center gap-2 ${
                    on
                      ? 'bg-sky-50 border-sky-400 shadow-sm'
                      : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
                  }`}
                >
                  <span className={`w-5 h-5 rounded-full text-[9px] font-bold flex items-center justify-center flex-shrink-0 ${
                    on ? 'bg-sky-600 text-white' : 'bg-slate-200 text-slate-400'
                  }`}>
                    {i + 1}
                  </span>
                  <span className="text-sm">{s.icon}</span>
                  <div className="flex-1 min-w-0">
                    <div className={`text-[10px] font-mono font-bold leading-tight truncate ${
                      on ? 'text-sky-800' : 'text-slate-400'
                    }`}>
                      {title}
                    </div>
                    <div className={`text-[9px] leading-tight truncate ${
                      on ? 'text-slate-500' : 'text-slate-400'
                    }`}>
                      {s.sub}
                    </div>
                  </div>
                  {on && (
                    <span className="text-[8px] bg-sky-600 text-white px-1 py-0.5 rounded font-mono font-bold flex-shrink-0">
                      ✓
                    </span>
                  )}
                </div>
              );
            })}
          </div>

          {/* 결과 이미지 박스 */}
          {imageSize > 0 && (
            <div className={`mt-2 rounded border-2 px-2 py-1.5 transition-all duration-500 ${
              prodMode
                ? 'bg-emerald-50 border-emerald-400'
                : 'bg-amber-50 border-amber-300'
            }`}>
              <div className="flex items-center gap-1.5 text-[10px]">
                <span>📦</span>
                <span className={`font-bold ${prodMode ? 'text-emerald-800' : 'text-amber-800'}`}>
                  express-app:{prodMode ? 'prod' : '1.0'}
                </span>
                <span className={`ml-auto text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
                  prodMode ? 'bg-emerald-600 text-white' : 'bg-amber-600 text-white'
                }`}>
                  ~{imageSize}MB
                </span>
              </div>
              <div className={`text-[9px] font-mono mt-0.5 ${prodMode ? 'text-emerald-700' : 'text-amber-700'}`}>
                {prodMode ? '✓ production · USER node · 가벼운 이미지' : 'devDependencies 포함 · root · 무거움'}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙: layer caching 비교 (Step 2 / 3)
    //   mode === 'none'      → 안내 문구만
    //   mode === 'naive'     → COPY . . 한 줄, 매번 90초
    //   mode === 'optimized' → COPY package*.json + RUN npm ci 분리, 5초
    // ─────────────────────────────────────────────────────
    function CacheCompare({ mode }) {
      if (mode === 'none') {
        return (
          <div className="rounded-lg border-2 border-dashed border-slate-200 bg-slate-50 p-3 text-center">
            <div className="text-[11px] text-slate-500">
              🔧 Step 2 부터 Dockerfile 빌드 + 레이어 캐싱 비교가 여기에 표시됩니다
            </div>
          </div>
        );
      }
      const naive = [
        { label: 'FROM node:20-alpine',     cached: true,  d: 0 },
        { label: 'WORKDIR /app',             cached: true,  d: 0.1 },
        { label: 'COPY . .',                 cached: false, d: 0.2 },
        { label: 'RUN npm install (90초)',  cached: false, d: 0.3 },
        { label: 'EXPOSE 3000',              cached: false, d: 0.4 },
        { label: 'CMD ["node", ...]',        cached: false, d: 0.5 },
      ];
      const optimized = [
        { label: 'FROM node:20-alpine',     cached: true,  d: 0 },
        { label: 'WORKDIR /app',             cached: true,  d: 0.1 },
        { label: 'COPY package*.json ./',   cached: true,  d: 0.2 },
        { label: 'RUN npm ci (캐시 재사용)', cached: true,  d: 0.3 },
        { label: 'COPY . . (5초)',           cached: false, d: 0.4 },
        { label: 'CMD ["node", ...]',        cached: false, d: 0.5 },
      ];
      const showOpt = mode === 'optimized';
      const layers = showOpt ? optimized : naive;
      const cachedCount = layers.filter((l) => l.cached).length;
      const total = layers.length;

      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          showOpt ? 'border-emerald-300 bg-emerald-50' : 'border-amber-300 bg-amber-50'
        }`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">{showOpt ? '⚡' : '🐢'}</span>
              <span className={`text-[11px] font-bold ${showOpt ? 'text-emerald-800' : 'text-amber-800'}`}>
                {showOpt ? 'optimized: src/ 한 줄 변경 빌드' : 'naive: src/ 한 줄 변경 빌드'}
              </span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
              showOpt ? 'bg-emerald-600 text-white' : 'bg-amber-600 text-white'
            }`}>
              {showOpt ? '5초' : '90초'}
            </span>
          </div>

          <div className="space-y-1">
            {layers.map((l, i) => (
              <div
                key={i}
                className={`flex items-center gap-1.5 px-2 py-1 rounded text-[9px] font-mono border transition-all duration-300 ${
                  l.cached
                    ? 'bg-emerald-100 border-emerald-300 text-emerald-800'
                    : 'bg-rose-100 border-rose-300 text-rose-800'
                }`}
                style={{ animationDelay: `${l.d}s` }}
              >
                <span className={`text-[9px] px-1 py-0.5 rounded font-bold flex-shrink-0 ${
                  l.cached ? 'bg-emerald-600 text-white' : 'bg-rose-600 text-white'
                }`}>
                  {l.cached ? 'CACHED' : 'REBUILD'}
                </span>
                <span className="flex-1 truncate">{l.label}</span>
              </div>
            ))}
          </div>

          <div className="flex items-center gap-2 mt-2 text-[9px]">
            <span className={`font-bold ${showOpt ? 'text-emerald-700' : 'text-amber-700'}`}>
              캐시 적중: {cachedCount}/{total}
            </span>
            <div className="flex-1 h-1.5 bg-white rounded overflow-hidden border border-slate-200">
              <div
                className={`h-full transition-all duration-700 ${
                  showOpt ? 'bg-emerald-500' : 'bg-amber-500'
                }`}
                style={{ width: `${(cachedCount / total) * 100}%` }}
              />
            </div>
            <span className="font-mono text-slate-500">{Math.round((cachedCount / total) * 100)}%</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: MongoDB 연동 박스 — Step 5에서만 활성화
    // ─────────────────────────────────────────────────────
    function MongoBox({ mongoOn }) {
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          mongoOn ? 'bg-sky-50 border-sky-400 shadow-md' : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
        }`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🔗</span>
              <span className={`text-[11px] font-bold ${mongoOn ? 'text-sky-800' : 'text-slate-400'}`}>
                docker compose — app + mongo
              </span>
            </div>
            {mongoOn && (
              <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold animate-pulse">
                up ✓
              </span>
            )}
          </div>

          <div className="grid grid-cols-2 gap-2">
            <div className={`rounded-lg border-2 p-2 text-center transition-all duration-500 ${
              mongoOn ? 'bg-white border-sky-400' : 'bg-slate-50 border-dashed border-slate-200'
            }`}>
              <div className="text-lg">🌐</div>
              <div className={`text-[10px] font-bold ${mongoOn ? 'text-sky-800' : 'text-slate-400'}`}>app</div>
              <div className={`text-[8px] font-mono ${mongoOn ? 'text-slate-500' : 'text-slate-400'} leading-tight`}>
                express-app:prod
              </div>
              <div className={`text-[8px] ${mongoOn ? 'text-slate-500' : 'text-slate-400'} leading-tight`}>
                :3000
              </div>
            </div>
            <div className={`rounded-lg border-2 p-2 text-center transition-all duration-500 ${
              mongoOn ? 'bg-white border-emerald-400' : 'bg-slate-50 border-dashed border-slate-200'
            }`}>
              <div className="text-lg">🍃</div>
              <div className={`text-[10px] font-bold ${mongoOn ? 'text-emerald-800' : 'text-slate-400'}`}>mongo</div>
              <div className={`text-[8px] font-mono ${mongoOn ? 'text-slate-500' : 'text-slate-400'} leading-tight`}>
                mongo:7
              </div>
              <div className={`text-[8px] ${mongoOn ? 'text-slate-500' : 'text-slate-400'} leading-tight`}>
                :27017
              </div>
            </div>
          </div>

          <div className={`mt-2 text-[9px] font-mono px-2 py-1 rounded border ${
            mongoOn ? 'bg-white border-slate-200 text-slate-700' : 'bg-slate-100 border-slate-200 text-slate-400'
          }`}>
            <span className="text-sky-600 font-bold">app</span>
            <span className="text-slate-400"> → </span>
            <span>mongodb://</span>
            <span className="text-emerald-600 font-bold">mongo</span>
            <span>:27017/appdb</span>
          </div>

          <div className={`mt-1 text-[9px] ${mongoOn ? 'text-sky-700 font-semibold' : 'text-slate-400'}`}>
            {mongoOn ? '✓ 같은 네트워크 · 서비스 이름이 DNS · named volume 으로 데이터 영속' : 'compose.yml 작성 후 활성'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 빌드 단계 (1~8)
    //   중앙: layer caching 비교
    //   하단: MongoDB 연동
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 Node.js Docker 빌드 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            <BuildStagesBox
              activeStages={step.activeStages}
              prodMode={step.prodMode}
              imageSize={step.imageSize}
            />

            <CacheCompare mode={step.cacheCompare} />

            <MongoBox mongoOn={step.mongoOn} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded border border-slate-300 bg-white"></span>idle
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>cached
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>rebuild
            </span>
            <span className="ml-auto font-mono">step: {step.codeKey}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화 + 파일 탭
    //   tabs 배열을 받아 활성 탭 클릭으로 다른 파일도 미리보기 가능
    //   현재 active 파일은 step.codeKey 가 결정
    // ─────────────────────────────────────────────────────
    const TAB_ORDER = [
      'package.json',
      'Dockerfile',
      'cache-optimized.Dockerfile',
      'production.Dockerfile',
      'compose.yml',
    ];

    function CodeViewer({ activeKey, setActiveKey, stepIdx, total }) {
      const code = CODES[activeKey];
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 바 */}
          <div className="bg-[#21252b] px-3 pt-2 flex items-end gap-0 border-b border-slate-700 overflow-x-auto">
            <div className="flex gap-1.5 mr-3 mb-2">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            {TAB_ORDER.map((key) => {
              const active = key === activeKey;
              return (
                <button
                  key={key}
                  onClick={() => setActiveKey(key)}
                  className={`px-3 py-1.5 text-[10px] font-mono whitespace-nowrap rounded-t border-t border-l border-r transition ${
                    active
                      ? 'bg-[#282c34] text-sky-300 border-slate-600'
                      : 'bg-[#1a1d23] text-slate-500 hover:text-slate-300 border-transparent'
                  }`}
                >
                  {key}
                </button>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.lang}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    //   step 변화 시 우측 코드 탭도 자동으로 step.codeKey 로 동기화
    //   사용자가 탭을 직접 클릭하면 그 탭이 우선 (다음 step 이동 전까지 유지)
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [activeKey, setActiveKey] = useState(STEPS[0].codeKey);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      // step 이 바뀌면 우측 코드도 해당 단계 파일로 동기화
      useEffect(() => {
        setActiveKey(step.codeKey);
      }, [stepIdx]);

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VIII-1-10</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">N</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VIII. 언어별 컨테이너화 &gt; Chapter 1. Node.js</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-1-10. Node.js (Express) 앱 Docker화</h1>
                  <p className="text-sm text-slate-500 mt-0.5">package.json → Dockerfile → 캐시 최적화 → production → compose with MongoDB</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                activeKey={activeKey}
                setActiveKey={setActiveKey}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>node:20-alpine</strong> + <strong>package*.json 먼저 COPY</strong>(캐싱) + <strong>--omit=dev</strong>(production) + <strong>USER node</strong>(보안) + <strong>compose</strong>(MongoDB와 묶기) — 이 5가지가 Node.js Docker화의 핵심이다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['node:20-alpine', 'package.json', 'npm ci', 'layer cache', 'COPY package*.json', '--omit=dev', 'USER node', 'compose', 'MongoDB'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./viii-1-9_python_docker.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; VIII-1-9 Python Docker</a>
              <a href="./viii-1-11_nextjs_docker.html" className="text-sky-700 hover:text-sky-900 font-medium">VIII-1-11 Next.js Docker &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
