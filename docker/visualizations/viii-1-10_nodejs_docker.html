<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — Node.js Docker화</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }
    @keyframes buildProgress { from{width:0%;} to{width:100%;} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-shake { animation: shake 0.4s ease-in-out; }
    .anim-build { animation: buildProgress 1.5s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · 베이스 이미지 선택: node:20-alpine",
        desc: "Alpine Linux 기반 Node.js 이미지는 ~130MB로 데비안 기반(~1GB) 대비 87% 작다. 크기가 작아 빌드, 푸시, 풀 속도가 빠르고 보안 취약점 노출 면적이 좁다.",
        phase: "base_image",
      },
      {
        title: "STEP 2 · 의존성 캐시 최적화: package.json 먼저 복사",
        desc: "package.json과 package-lock.json을 먼저 복사하고 npm ci를 실행한다. 소스 코드보다 의존성 파일의 변경 빈도가 낮으므로, 소스만 변경 시 npm ci 레이어를 캐시에서 재사용한다.",
        phase: "cache_optimize",
      },
      {
        title: "STEP 3 · npm ci vs npm install",
        desc: "npm ci는 package-lock.json을 정확히 따라 설치하고, node_modules를 삭제 후 새로 설치한다. npm install은 lock 파일을 갱신할 수 있어 재현성이 낮다. Docker 빌드에는 npm ci가 적합하다.",
        phase: "npm_ci",
      },
      {
        title: "STEP 4 · .dockerignore — 반드시 설정해야 하는 이유",
        desc: ".dockerignore가 없으면 COPY 명령이 node_modules(수백 MB)를 빌드 컨텍스트에 포함시킨다. 호스트의 node_modules가 컨테이너 것을 덮어써서 플랫폼 불일치 문제를 일으킨다.",
        phase: "dockerignore",
      },
      {
        title: "STEP 5 · 비루트 사용자와 소유권 설정",
        desc: "node:alpine 이미지에는 이미 uid=1000인 node 사용자가 포함되어 있다. chown -R node:node /app으로 소유권을 변경하고 USER node로 전환하여 보안을 강화한다.",
        phase: "user_security",
      },
      {
        title: "STEP 6 · 완성: 최적화된 Node.js Docker 이미지",
        desc: "캐시 최적화 + .dockerignore + --omit=dev + 비루트 사용자까지 적용된 프로덕션 이미지가 완성되었다. 개발 환경에서는 바인드 마운트 + node --watch로 핫 리로드를 구성한다.",
        phase: "complete",
      },
    ];

    function ImageCompare() {
      const images = [
        { name: "node:20", size: "~1GB", percent: 100, color: "bg-red-400", desc: "데비안 기반, 개발 도구 포함" },
        { name: "node:20-slim", size: "~250MB", percent: 25, color: "bg-yellow-400", desc: "데비안 기반, 불필요 패키지 제거" },
        { name: "node:20-alpine", size: "~130MB", percent: 13, color: "bg-emerald-400", desc: "Alpine Linux, 최소 설치", best: true },
      ];
      return (
        <div className="space-y-3 anim-fade">
          {images.map((img, i) => (
            <div key={i} className={`rounded-xl border-2 p-4 ${img.best ? 'border-emerald-400 bg-emerald-50 shadow-lg' : 'border-slate-200 bg-white'}`}>
              <div className="flex items-center justify-between mb-2">
                <div className="flex items-center gap-2">
                  <span className="font-mono font-bold text-sm">{img.name}</span>
                  {img.best && <span className="bg-emerald-500 text-white text-xs px-2 py-0.5 rounded-full">추천</span>}
                </div>
                <span className="font-bold text-sm">{img.size}</span>
              </div>
              <div className="w-full bg-gray-200 rounded-full h-3 mb-1">
                <div className={`h-3 rounded-full anim-build ${img.color}`} style={{width:`${img.percent}%`}}></div>
              </div>
              <p className="text-xs text-slate-500">{img.desc}</p>
            </div>
          ))}
        </div>
      );
    }

    function CacheFlow() {
      const layers = [
        { text: "COPY package.json package-lock.json ./", cached: true, icon: "📋" },
        { text: "RUN npm ci --omit=dev", cached: true, icon: "📦" },
        { text: "COPY src/ src/", cached: false, icon: "💻" },
      ];
      return (
        <div className="bg-white rounded-xl border-2 border-blue-200 p-5 anim-fade">
          <h4 className="font-bold text-blue-800 mb-4 text-center">레이어 캐시 전략</h4>
          <div className="space-y-3">
            {layers.map((l, i) => (
              <div key={i} className="anim-slide" style={{animationDelay:`${i*0.15}s`}}>
                <div className={`flex items-center gap-3 p-3 rounded-lg border ${l.cached ? 'bg-green-50 border-green-300' : 'bg-orange-50 border-orange-300'}`}>
                  <span className="text-2xl">{l.icon}</span>
                  <div className="flex-1">
                    <code className="text-xs font-mono">{l.text}</code>
                  </div>
                  <span className={`text-xs font-bold px-2 py-1 rounded ${l.cached ? 'bg-green-200 text-green-800' : 'bg-orange-200 text-orange-800'}`}>
                    {l.cached ? '캐시 재사용' : '매번 실행'}
                  </span>
                </div>
                {i < layers.length - 1 && <div className="text-center text-slate-300 text-lg">↓</div>}
              </div>
            ))}
          </div>
          <p className="text-xs text-slate-500 mt-3 text-center">소스 코드만 변경되면 의존성 설치 레이어는 캐시에서 재사용!</p>
        </div>
      );
    }

    function NpmCompare() {
      const rows = [
        { field: "기준 파일", install: "package.json", ci: "package-lock.json" },
        { field: "node_modules 처리", install: "기존 것 재사용", ci: "삭제 후 새로 설치" },
        { field: "lock 파일 수정", install: "가능 (위험!)", ci: "불가 (안전)" },
        { field: "재현성", install: "낮음", ci: "높음" },
        { field: "Docker 적합성", install: "낮음", ci: "높음" },
      ];
      return (
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden anim-fade">
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-slate-100">
                <th className="p-3 text-left text-slate-600">항목</th>
                <th className="p-3 text-center text-red-600">npm install</th>
                <th className="p-3 text-center text-emerald-600">npm ci</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => (
                <tr key={i} className="border-t border-slate-100 anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                  <td className="p-3 font-medium text-slate-700">{r.field}</td>
                  <td className="p-3 text-center text-red-600">{r.install}</td>
                  <td className="p-3 text-center text-emerald-600 font-bold">{r.ci}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function DockerignoreView() {
      const included = ["node_modules/  (~500MB)", ".git/", ".env", "npm-debug.log", "coverage/"];
      return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 anim-fade">
          <div className="rounded-xl border-2 border-red-300 bg-red-50 p-5">
            <h4 className="font-bold text-red-700 mb-3 text-center">.dockerignore 없을 때</h4>
            <div className="space-y-2">
              {included.map((item, i) => (
                <div key={i} className="bg-red-100 text-red-700 px-3 py-2 rounded-lg text-sm flex items-center gap-2 anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                  <span>❌</span> <span>{item}</span>
                </div>
              ))}
            </div>
            <p className="text-xs text-red-600 mt-3 text-center font-bold">빌드 컨텍스트에 불필요한 파일 포함!</p>
          </div>
          <div className="rounded-xl border-2 border-emerald-300 bg-emerald-50 p-5">
            <h4 className="font-bold text-emerald-700 mb-3 text-center">.dockerignore 있을 때</h4>
            <div className="bg-gray-900 rounded-lg p-4 font-mono text-xs text-green-400 space-y-1">
              <div># .dockerignore</div>
              <div>node_modules</div>
              <div>npm-debug.log</div>
              <div>.git</div>
              <div>.env</div>
              <div>coverage/</div>
            </div>
            <p className="text-xs text-emerald-600 mt-3 text-center font-bold">필요한 파일만 깔끔하게 전송!</p>
          </div>
        </div>
      );
    }

    function DockerfileView() {
      const lines = [
        "FROM node:20-alpine",
        "WORKDIR /app",
        "COPY package.json package-lock.json ./",
        "RUN npm ci --omit=dev",
        "COPY src/ src/",
        "RUN chown -R node:node /app",
        "USER node",
        "EXPOSE 3000",
        'CMD ["node", "src/index.js"]',
      ];
      return (
        <div className="bg-gray-900 rounded-xl p-5 font-mono text-sm anim-fade">
          <div className="flex items-center gap-2 mb-3">
            <div className="w-3 h-3 rounded-full bg-red-500"></div>
            <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div className="w-3 h-3 rounded-full bg-green-500"></div>
            <span className="text-gray-400 text-xs ml-2">Dockerfile</span>
          </div>
          {lines.map((l, i) => (
            <div key={i} className={`px-2 py-1 rounded anim-slide ${
              ["USER node", "RUN chown -R node:node /app"].includes(l) ? 'bg-amber-900/50 text-amber-300' : 'text-green-300'
            }`} style={{animationDelay:`${i*0.08}s`}}>{l}</div>
          ))}
        </div>
      );
    }

    function CompleteView() {
      return (
        <div className="space-y-4 anim-fade">
          <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6">
            <div className="text-center">
              <div className="text-4xl mb-3">🎉</div>
              <h3 className="text-xl font-bold text-emerald-800 mb-2">최적화된 Node.js 이미지 완성!</h3>
              <div className="flex flex-wrap justify-center gap-2 mt-4">
                {["node:20-alpine", "npm ci --omit=dev", ".dockerignore", "캐시 최적화", "USER node", "~150MB"].map((item, i) => (
                  <span key={i} className="bg-emerald-200 text-emerald-800 px-3 py-1.5 rounded-full text-sm font-medium anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                    {item}
                  </span>
                ))}
              </div>
            </div>
          </div>
          <div className="bg-blue-50 border border-blue-200 rounded-xl p-4">
            <h4 className="font-bold text-blue-800 mb-2">개발 환경: 바인드 마운트 + 핫 리로드</h4>
            <div className="bg-gray-900 rounded-lg p-3 font-mono text-xs text-blue-300">
              <div>volumes:</div>
              <div>  - ./src:/app/src        # 코드 변경 즉시 반영</div>
              <div>  - /app/node_modules     # 컨테이너 것 보호</div>
              <div>command: node --watch src/index.js</div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const renderVisual = () => {
        switch(data.phase) {
          case "base_image": return <ImageCompare />;
          case "cache_optimize": return <CacheFlow />;
          case "npm_ci": return <NpmCompare />;
          case "dockerignore": return <DockerignoreView />;
          case "user_security": return <DockerfileView />;
          case "complete": return <CompleteView />;
          default: return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VIII-1-10: Node.js (Express) 앱 Docker화</h1>
              </div>
              <p className="text-slate-500 text-sm">npm install 최적화, .dockerignore, node_modules 처리 등 Node.js Docker화의 핵심을 단계별로 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "complete" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "dockerignore" ? "bg-red-600 border-red-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            <div key={`visual-${step}`}>{renderVisual()}</div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
