<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — 로컬 개발 vs 프로덕션</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-shake { animation: shake 0.4s ease-in-out; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const DEV_FEATURES = [
      { key: "volume", label: "바인드 마운트", dev: "./api:/app (코드 변경 즉시 반영)", prod: "없음 (이미지에 코드 포함)", icon: "📂" },
      { key: "port", label: "포트 노출", dev: "8000, 5678 (디버거), 5432 (DB)", prod: "80만 (Nginx)", icon: "🔌" },
      { key: "log", label: "로그 레벨", dev: "debug (상세 로그)", prod: "warning (필수 로그만)", icon: "📝" },
      { key: "build", label: "빌드 방식", dev: "target: dev (개발 스테이지)", prod: "image: registry/app:1.2.3 (고정 태그)", icon: "🔨" },
      { key: "restart", label: "재시작 정책", dev: "없음", prod: "restart: always", icon: "🔄" },
      { key: "resource", label: "리소스 제한", dev: "없음 (자유롭게 사용)", prod: "cpus: 1.0, memory: 512m", icon: "📊" },
    ];

    const STEPS = [
      {
        title: "STEP 1 · 왜 환경을 나눠야 하는가",
        desc: "하나의 compose.yml로 개발과 프로덕션을 모두 커버하려고 하면 파일이 조건 분기와 주석으로 가득 찬다. 디버그 포트를 프로덕션에 열어두거나, 바인드 마운트 경로가 서버에 없어 실패하는 실수가 생긴다.",
        phase: "problem",
        highlightKeys: [],
      },
      {
        title: "STEP 2 · 3파일 분리 패턴",
        desc: "compose.yml(공통) + compose.override.yml(개발) + compose.prod.yml(프로덕션)으로 나눈다. override는 docker compose up 시 자동 적용되고, prod는 -f 플래그로 명시 적용한다.",
        phase: "split",
        highlightKeys: [],
      },
      {
        title: "STEP 3 · 개발 환경 — 바인드 마운트 & 디버거",
        desc: "compose.override.yml에 바인드 마운트(./api:/app)를 넣으면 코드를 수정할 때 컨테이너를 재시작하지 않아도 즉시 반영된다. 디버거 포트(5678)도 개발에서만 연다.",
        phase: "dev",
        highlightKeys: ["volume", "port"],
      },
      {
        title: "STEP 4 · 프로덕션 환경 — 이미지 고정 & 리소스 제한",
        desc: "compose.prod.yml에서는 빌드 대신 레지스트리의 고정 태그 이미지를 사용한다. restart: always로 장애 시 자동 복구하고, 리소스 제한으로 다른 서비스에 영향을 주지 않게 한다.",
        phase: "prod",
        highlightKeys: ["build", "restart", "resource"],
      },
      {
        title: "STEP 5 · 오버라이드 규칙",
        desc: "키가 겹치면 override 파일이 이긴다. 배열(ports, volumes)은 합산되고, 단일 값(image, restart)은 덮어쓴다. docker compose config로 합쳐진 결과를 미리 확인할 수 있다.",
        phase: "rules",
        highlightKeys: ["volume", "port", "log", "build", "restart", "resource"],
      },
      {
        title: "STEP 6 · 실행 명령 비교",
        desc: "개발: docker compose up (자동으로 override 합쳐짐). 프로덕션: docker compose -f compose.yml -f compose.prod.yml up -d (명시 적용). CI에서는 반드시 -f로 파일을 명시하자.",
        phase: "commands",
        highlightKeys: [],
      },
    ];

    function CompareRow({ feature, showDev, showProd, highlight }) {
      return (
        <div className={`grid grid-cols-12 gap-2 px-3 py-2.5 rounded-lg transition-all duration-300 ${
          highlight ? "bg-blue-50 border border-blue-200" : "bg-slate-50 border border-transparent"
        }`}>
          <div className="col-span-3 flex items-center gap-2 text-sm">
            <span>{feature.icon}</span>
            <span className="font-medium text-slate-700">{feature.label}</span>
          </div>
          <div className={`col-span-4 text-xs px-2 py-1 rounded transition-all duration-300 ${
            showDev ? "bg-amber-100 text-amber-800 font-medium border border-amber-200" : "bg-slate-100 text-slate-400"
          }`}>
            {showDev && "🔧 "}{feature.dev}
          </div>
          <div className={`col-span-5 text-xs px-2 py-1 rounded transition-all duration-300 ${
            showProd ? "bg-emerald-100 text-emerald-800 font-medium border border-emerald-200" : "bg-slate-100 text-slate-400"
          }`}>
            {showProd && "🏭 "}{feature.prod}
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4500);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const showDev = ["dev", "rules", "commands"].includes(data.phase);
      const showProd = ["prod", "rules", "commands"].includes(data.phase);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VI-1-4: 로컬 개발 vs 프로덕션 Compose 분리</h1>
              </div>
              <p className="text-slate-500 text-sm">개발/프로덕션 compose 파일의 차이를 시각적으로 비교합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "commands" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "problem" ? "bg-red-600 border-red-700 text-white" :
              data.phase === "prod" ? "bg-indigo-600 border-indigo-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 3파일 구성도 */}
            {data.phase === "split" && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4 anim-fade">
                {[
                  { file: "compose.yml", desc: "공통 기반", color: "slate", items: ["서비스 정의", "네트워크", "볼륨 이름", "healthcheck"] },
                  { file: "compose.override.yml", desc: "개발 전용 (자동 적용)", color: "amber", items: ["바인드 마운트", "디버그 포트", "LOG_LEVEL=debug", "RELOAD=true"] },
                  { file: "compose.prod.yml", desc: "프로덕션 전용 (명시 적용)", color: "emerald", items: ["이미지 태그 고정", "restart: always", "리소스 제한", "LOG_LEVEL=warning"] },
                ].map((f, i) => (
                  <div key={i} className={`rounded-xl border-2 border-${f.color}-300 bg-${f.color}-50 p-4 anim-slide`} style={{animationDelay: `${i * 0.15}s`}}>
                    <div className={`font-bold text-${f.color}-700 text-sm mb-1`}>{f.file}</div>
                    <div className={`text-xs text-${f.color}-600 mb-3`}>{f.desc}</div>
                    <div className="space-y-1">
                      {f.items.map((item, j) => (
                        <div key={j} className={`text-xs bg-white rounded px-2 py-1 text-${f.color}-700`}>{item}</div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* 비교 테이블 */}
            {["dev", "prod", "rules"].includes(data.phase) && (
              <div key={`compare-${step}`} className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 anim-fade">
                <div className="grid grid-cols-12 gap-2 px-3 py-2 mb-2">
                  <div className="col-span-3 text-xs font-bold text-slate-500">항목</div>
                  <div className="col-span-4 text-xs font-bold text-amber-600">🔧 개발 (override)</div>
                  <div className="col-span-5 text-xs font-bold text-emerald-600">🏭 프로덕션 (prod)</div>
                </div>
                <div className="space-y-1">
                  {DEV_FEATURES.map((f) => (
                    <CompareRow key={f.key} feature={f}
                      showDev={showDev} showProd={showProd}
                      highlight={data.highlightKeys.includes(f.key)} />
                  ))}
                </div>
              </div>
            )}

            {/* 실행 명령 비교 */}
            {data.phase === "commands" && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 anim-fade">
                <div className="rounded-xl border-2 border-amber-300 bg-amber-50 p-4">
                  <div className="font-bold text-amber-700 text-sm mb-2">🔧 개발 환경</div>
                  <div className="bg-slate-800 rounded-lg p-3 text-sm font-mono">
                    <div className="text-slate-500"># override 자동 합쳐짐</div>
                    <div className="text-green-400">docker compose up</div>
                  </div>
                  <div className="text-xs text-amber-600 mt-2">compose.yml + compose.override.yml</div>
                </div>
                <div className="rounded-xl border-2 border-emerald-300 bg-emerald-50 p-4">
                  <div className="font-bold text-emerald-700 text-sm mb-2">🏭 프로덕션 환경</div>
                  <div className="bg-slate-800 rounded-lg p-3 text-sm font-mono">
                    <div className="text-slate-500"># -f로 명시 선택</div>
                    <div className="text-green-400">docker compose -f compose.yml \</div>
                    <div className="text-green-400">  -f compose.prod.yml up -d</div>
                  </div>
                  <div className="text-xs text-emerald-600 mt-2">compose.yml + compose.prod.yml</div>
                </div>
              </div>
            )}

            {/* 프로그레스 + 컨트롤 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
