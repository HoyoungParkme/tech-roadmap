            <div className="flex items-center gap-1.5">
              <span className="text-base">🌍</span>
              <span className="text-[11px] font-bold text-slate-700">배포 환경 (3 곳)</span>
            </div>
            {allActive && (
              <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold animate-pulse">
                all identical ✓
              </span>
            )}
          </div>
          <div className="grid grid-cols-3 gap-1.5">
            {ENVIRONMENTS.map((env) => {
              const active = envsActive.includes(env.id);
              return (
                <div
                  key={env.id}
                  className={`rounded-lg border-2 p-2 text-center transition-all duration-500 ${
                    active
                      ? 'bg-sky-50 border-sky-400 shadow-sm'
                      : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
                  }`}
                >
                  <div className="text-lg mb-0.5">{env.icon}</div>
                  <div className={`text-[10px] font-bold ${active ? 'text-sky-800' : 'text-slate-400'}`}>
                    {env.label}
                  </div>
                  <div className={`text-[8px] ${active ? 'text-slate-500' : 'text-slate-400'} leading-tight`}>
                    {env.desc}
                  </div>
                  {active && (
                    <div className="mt-1 bg-sky-600 text-white text-[8px] px-1 py-0.5 rounded font-mono font-bold">
                      myapp:1.0 ✓
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* 동일성 강조 라인 */}
          {allActive && (
            <div className="mt-2 bg-emerald-50 border border-emerald-300 rounded px-2 py-1.5 text-[9px] text-emerald-800 leading-tight">
              <span className="font-bold">동일성 보증:</span> 세 환경 모두 같은 sha256 다이제스트
              <br />
              <span className="text-emerald-700 font-mono">→ 컨테이너 안 OS·런타임·의존성·코드 100% 일치</span>
            </div>
          )}

          {/* 새 팀원 합류 표시 */}
          {newDevJoined && (
            <div className="mt-2 bg-sky-100 border-2 border-sky-400 rounded px-2 py-1.5 flex items-center gap-2 animate-pulse">
              <span className="text-base">🎓</span>
              <div className="flex-1">
                <div className="text-[10px] font-bold text-sky-900">신입 김OO 합류</div>
                <div className="text-[9px] text-sky-700 font-mono">docker pull → run · 1분 만에 dev 환경 동작 ✓</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 결과 박스 (Step 5에서만 등장)
    //   "내 컴에선 됐는데" 종결 메시지
    // ─────────────────────────────────────────────────────
    function ConclusionBox() {
      const items = [
        { icon: '🚫', label: '"내 컴에선 됐는데" 종결', detail: '환경 차이 버그 = 0' },
        { icon: '⚡', label: '온보딩 3일 → 1분',         detail: 'docker pull + run 끝' },
        { icon: '🔁', label: 'dev = staging = prod',   detail: '같은 다이제스트' },
        { icon: '🛡️', label: 'sha256 무결성 검증',      detail: '이미지 변조 차단' },
      ];
      return (
        <div className="rounded-lg border-2 border-emerald-400 bg-gradient-to-br from-emerald-50 to-sky-50 p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">🎯</span>
            <span className="text-[11px] font-bold text-emerald-800">환경 일관성이 가져온 4가지 변화</span>
          </div>
          <div className="grid grid-cols-2 gap-1.5">
            {items.map((it) => (
              <div key={it.label} className="bg-white rounded border border-emerald-200 p-1.5">
                <div className="flex items-center gap-1">
                  <span className="text-sm">{it.icon}</span>
                  <span className="text-[10px] font-bold text-emerald-900">{it.label}</span>
                </div>
                <div className="text-[9px] text-emerald-700 font-mono mt-0.5 ml-5">{it.detail}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: Dockerfile / 중앙: Image / 하단: Multi-env
    //   화살표로 흐름 표현 (recipe → build → multi-env)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📦 Dockerfile → Image → 다중 환경</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            <DockerfileBox lit={step.dockerfileLit} />

            {/* 화살표: build */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.imageBuilt ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ docker build -t myapp:1.0 .
              </div>
            </div>

            <ImageBox built={step.imageBuilt} />

            {/* 화살표: pull/run */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.envsActive.length > 0 ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ docker pull · docker run
              </div>
            </div>

            <EnvBox envsActive={step.envsActive} newDevJoined={step.newDevJoined} />

            {step.conclusion && <ConclusionBox />}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded border border-slate-300 bg-white"></span>idle
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>identical (다이제스트 일치)
            </span>
            <span className="ml-auto font-mono">phase: {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생, 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. Docker 입문 &gt; Chapter 1. 기초</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">I-1-3. 환경 일관성 — 이미지로 동일 환경 보장</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Dockerfile → Image → dev/staging/prod 동시 실행 — "내 컴에선 됐는데" 종결</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: 환경을 <strong>코드(Dockerfile)</strong>로 박제 → <strong>이미지(불변)</strong>로 굳히기 → <strong>어디서든 동일</strong> 실행. 다음(I-1-4)에서는 Docker가 가져온 4가지 변화를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Dockerfile', 'docker build', 'image', 'sha256', 'docker pull', 'environment consistency', 'reproducibility', 'onboarding'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./i-1-2_vm_vs_container.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; I-1-2 VM vs 컨테이너</a>
              <a href="./i-1-4_docker_benefits.html" className="text-sky-700 hover:text-sky-900 font-medium">I-1-4 Docker 이점 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
