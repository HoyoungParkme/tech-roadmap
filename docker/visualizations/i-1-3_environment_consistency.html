<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — 환경 일관성</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes packIn { from{opacity:0;transform:scale(0.5);} to{opacity:1;transform:scale(1);} }
    @keyframes arrowMove { 0%{opacity:0;transform:translateX(-10px);} 50%{opacity:1;} 100%{opacity:0;transform:translateX(10px);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-pack { animation: packIn 0.4s ease-out forwards; }
    .anim-arrow { animation: arrowMove 1.2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* -- 이미지에 포함되는 재료 -- */
    const INGREDIENTS = [
      { label: "Ubuntu 22.04", icon: "🐧", color: "bg-orange-100 border-orange-300 text-orange-800" },
      { label: "Python 3.11", icon: "🐍", color: "bg-yellow-100 border-yellow-300 text-yellow-800" },
      { label: "Flask 2.3.0", icon: "📦", color: "bg-blue-100 border-blue-300 text-blue-800" },
      { label: "libpq", icon: "⚙️", color: "bg-purple-100 border-purple-300 text-purple-800" },
      { label: "app.py", icon: "📄", color: "bg-green-100 border-green-300 text-green-800" },
      { label: ".env 설정", icon: "🔑", color: "bg-pink-100 border-pink-300 text-pink-800" },
    ];

    /* -- 서버 목록 -- */
    const SERVERS = [
      { label: "CI 서버", icon: "🔄", desc: "자동 테스트" },
      { label: "스테이징", icon: "🧪", desc: "최종 확인" },
      { label: "운영 서버", icon: "🌐", desc: "실제 서비스" },
    ];

    /* -- STEPS -- */
    const STEPS = [
      {
        title: "STEP 1 · 재료 준비 — 코드와 의존성",
        desc: "개발자가 앱을 만들었다. Python, Flask, 시스템 라이브러리, 설정 파일 — 앱 실행에 필요한 재료가 흩어져 있다. 냉동식품 공장에서 재료를 모으는 단계다.",
        phase: "ingredients",
        visibleIngredients: 6,
        imageBuilt: false,
        pushed: false,
        serversActive: false,
      },
      {
        title: "STEP 2 · 냉동 포장 — docker build",
        desc: "Dockerfile 레시피대로 모든 재료를 하나의 이미지에 담는다. docker build 명령 한 줄이면 된다. 이 순간부터 이미지는 '불변 스냅샷'이 된다. 누가 열어도 내용물이 같다.",
        phase: "build",
        visibleIngredients: 6,
        imageBuilt: true,
        pushed: false,
        serversActive: false,
      },
      {
        title: "STEP 3 · 창고에 배송 — docker push",
        desc: "완성된 이미지를 Docker Hub(중앙 창고)에 올린다. 마트 물류 센터에 냉동식품을 입고하는 것과 같다. 이제 누구든 이 이미지를 내려받을 수 있다.",
        phase: "push",
        visibleIngredients: 6,
        imageBuilt: true,
        pushed: true,
        serversActive: false,
      },
      {
        title: "STEP 4 · 어디서든 같은 맛 — docker pull & run",
        desc: "CI 서버, 스테이징 서버, 운영 서버가 모두 같은 이미지를 내려받아 실행한다. 전자레인지만 있으면(Docker만 설치되어 있으면) 어디서든 동일한 결과가 나온다.",
        phase: "deploy",
        visibleIngredients: 6,
        imageBuilt: true,
        pushed: true,
        serversActive: true,
      },
      {
        title: "STEP 5 · 핵심 정리: 환경 일관성",
        desc: "Docker 이미지 = 코드 + 런타임 + 라이브러리 + 설정을 통째로 얼린 냉동식품. 어떤 서버에서 실행해도 동일한 환경이 보장된다. 이것이 '환경 일관성(Environment Consistency)'이다.",
        phase: "summary",
        visibleIngredients: 6,
        imageBuilt: true,
        pushed: true,
        serversActive: true,
      },
    ];

    /* -- 재료 카드 -- */
    function IngredientCard({ item, index, packed }) {
      return (
        <div className={`flex items-center gap-2 px-3 py-2 rounded-lg border text-sm font-medium transition-all duration-500 ${item.color} ${packed ? "scale-90 opacity-70" : "anim-slide"}`}
          style={{ animationDelay: `${index * 0.1}s` }}>
          <span>{item.icon}</span>
          <span>{item.label}</span>
        </div>
      );
    }

    /* -- Docker 이미지 박스 -- */
    function ImageBox({ built, children }) {
      if (!built) return null;
      return (
        <div className="border-2 border-blue-500 bg-blue-50 rounded-xl p-4 anim-pack">
          <div className="text-center mb-2">
            <span className="text-2xl">📦</span>
            <span className="ml-2 font-bold text-blue-800 text-sm">myapp:1.0 이미지</span>
          </div>
          <div className="grid grid-cols-2 gap-1.5">
            {INGREDIENTS.map((item, i) => (
              <div key={i} className={`flex items-center gap-1 px-2 py-1 rounded text-xs border ${item.color}`}>
                <span>{item.icon}</span><span>{item.label}</span>
              </div>
            ))}
          </div>
          {children}
        </div>
      );
    }

    /* -- 서버 카드 -- */
    function ServerCard({ server, active, index }) {
      return (
        <div className={`rounded-xl border-2 p-3 text-center transition-all duration-500 ${
          active ? "border-emerald-400 bg-emerald-50 shadow-md scale-105 anim-fade" : "border-slate-200 bg-slate-50 opacity-40"
        }`} style={active ? { animationDelay: `${index * 0.2}s` } : {}}>
          <div className="text-2xl mb-1">{server.icon}</div>
          <div className="font-bold text-sm">{server.label}</div>
          <div className="text-xs text-slate-500">{server.desc}</div>
          {active && (
            <div className="mt-2 bg-emerald-200 text-emerald-800 text-xs px-2 py-1 rounded-full font-medium">
              myapp:1.0 실행 중 ✓
            </div>
          )}
        </div>
      );
    }

    /* -- 메인 앱 -- */
    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const phaseColor = data.phase === "summary" ? "bg-emerald-600 border-emerald-700" :
                          data.phase === "build" ? "bg-indigo-600 border-indigo-700" :
                          "bg-blue-600 border-blue-700";

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter I-1-3: 환경 일관성이란 무엇인가</h1>
              </div>
              <p className="text-slate-500 text-sm">냉동식품 비유로 이해하는 Docker 이미지와 환경 일관성</p>
            </header>

            {/* 현재 단계 설명 */}
            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade text-white ${phaseColor}`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 시각화 영역 */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

              {/* 왼쪽: 재료 + 이미지 빌드 */}
              <div className="bg-white rounded-xl border border-slate-200 p-4 space-y-3">
                <h4 className="font-bold text-slate-700 text-sm flex items-center gap-2">
                  <span>🧑‍🍳</span> {data.imageBuilt ? "Docker 이미지 (냉동 완료)" : "재료 목록 (아직 흩어진 상태)"}
                </h4>

                {!data.imageBuilt ? (
                  <div className="space-y-2">
                    {INGREDIENTS.slice(0, data.visibleIngredients).map((item, i) => (
                      <IngredientCard key={i} item={item} index={i} packed={false} />
                    ))}
                  </div>
                ) : (
                  <ImageBox built={true}>
                    {data.phase === "build" && (
                      <div className="mt-2 text-center">
                        <code className="bg-slate-800 text-green-400 px-3 py-1 rounded text-xs">docker build -t myapp:1.0 .</code>
                      </div>
                    )}
                  </ImageBox>
                )}
              </div>

              {/* 오른쪽: Hub + 서버 배포 */}
              <div className="bg-white rounded-xl border border-slate-200 p-4 space-y-3">
                <h4 className="font-bold text-slate-700 text-sm flex items-center gap-2">
                  <span>☁️</span> 배포 흐름
                </h4>

                {/* Docker Hub */}
                <div className={`rounded-lg border-2 p-3 text-center transition-all duration-500 ${
                  data.pushed ? "border-blue-400 bg-blue-50 shadow-md" : "border-slate-200 bg-slate-50 opacity-40"
                }`}>
                  <span className="text-2xl">🏪</span>
                  <div className="font-bold text-sm mt-1">Docker Hub</div>
                  {data.pushed && (
                    <div className="mt-1 text-xs text-blue-600 font-medium anim-fade">
                      myapp:1.0 저장됨 ✓
                    </div>
                  )}
                  {data.phase === "push" && (
                    <div className="mt-1">
                      <code className="bg-slate-800 text-green-400 px-2 py-0.5 rounded text-xs">docker push myapp:1.0</code>
                    </div>
                  )}
                </div>

                {/* 화살표 */}
                {data.pushed && (
                  <div className="text-center text-blue-400 text-lg anim-arrow">▼ docker pull</div>
                )}

                {/* 서버 카드들 */}
                <div className="grid grid-cols-3 gap-2">
                  {SERVERS.map((s, i) => (
                    <ServerCard key={i} server={s} active={data.serversActive} index={i} />
                  ))}
                </div>
              </div>
            </div>

            {/* 요약 패널 */}
            {data.phase === "summary" && (
              <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6 anim-fade">
                <div className="text-center">
                  <div className="text-4xl mb-3">🧊</div>
                  <h3 className="text-xl font-bold text-emerald-800 mb-2">환경 일관성 = 냉동식품 원리</h3>
                  <div className="flex flex-wrap justify-center gap-3 mt-4">
                    {["불변 스냅샷", "재현 가능", "어디서든 동일", "환경 드리프트 방지"].map((item, i) => (
                      <span key={i} className="bg-emerald-200 text-emerald-800 px-4 py-2 rounded-full text-sm font-medium anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                        {item}
                      </span>
                    ))}
                  </div>
                  <p className="text-emerald-700 mt-4 text-sm">이미지를 한 번 만들면, 어떤 서버에서 실행해도 결과가 같다</p>
                </div>
              </div>
            )}

            {/* 프로그레스 + 컨트롤 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
