            'docker stats redis-demo --no-stream',
            '#  CONTAINER    CPU %   MEM USAGE / LIMIT     NET I/O',
            '#  redis-demo   0.42%   1.4MiB / 7.7GiB       2.1MB / 1.8MB',
            '',
            '# ─── 5) 슬로우 쿼리 — 100ms 이상 ───',
            'docker exec redis-demo redis-cli -a mypassword SLOWLOG GET 10',
            '',
            '# ─── 다음 단계 ───',
            '#  • Prometheus + redis_exporter 로 자동 수집 (관측성)',
            '#  • compose 로 redis + 앱 묶기 → V-1-3 참조',
          ],
          highlight: [3, 4, 9, 12, 13, 14, 15, 18, 19, 20, 21, 22, 27, 28, 29, 30, 32, 33, 34, 35, 36, 37, 38, 41, 42],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 상단: Redis 박스 — 컨테이너 + 옵션 뱃지
    //   redisLit  : sky 강조
    //   aofOn     : --appendonly yes 뱃지 + volume 라인
    //   authOn    : --requirepass 뱃지 + lock 아이콘
    // ─────────────────────────────────────────────────────
    function RedisBox({ redisLit, aofOn, authOn }) {
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          redisLit ? 'bg-sky-50 border-sky-400 shadow-md' : 'bg-slate-50 border-slate-200'
        }`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🔴</span>
              <span className={`text-[11px] font-bold ${redisLit ? 'text-sky-800' : 'text-slate-500'}`}>
                Redis 7 컨테이너
              </span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
              redisLit ? 'bg-sky-600 text-white' : 'bg-slate-300 text-slate-600'
            }`}>
              :6379
            </span>
          </div>

          {/* 핵심 정보 박스 */}
          <div className="bg-white rounded border border-slate-200 p-2 font-mono text-[10px] leading-snug text-slate-700 space-y-0.5">
            <div><span className="text-slate-500">image</span> <span className="text-sky-700 font-bold">redis:7-alpine</span> <span className="text-slate-400">(~30MB)</span></div>
            <div><span className="text-slate-500">port</span>  <span className="text-slate-700">6379 → 6379</span></div>
            <div><span className="text-slate-500">store</span> <span className="text-slate-700">in-memory KV (&lt;1ms)</span></div>
          </div>

          {/* 옵션 뱃지 */}
          <div className="flex flex-wrap gap-1.5 mt-2">
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold border ${
              aofOn
                ? 'bg-emerald-100 text-emerald-800 border-emerald-300'
                : 'bg-slate-100 text-slate-400 border-slate-200 line-through'
            }`}>
              {aofOn ? '✓' : '✗'} --appendonly yes
            </span>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold border ${
              authOn
                ? 'bg-amber-100 text-amber-800 border-amber-300'
                : 'bg-slate-100 text-slate-400 border-slate-200 line-through'
            }`}>
              {authOn ? '🔒' : '🔓'} --requirepass
            </span>
          </div>

          {/* 영속화 라인 */}
          <div className={`mt-2 rounded border-2 px-2 py-1.5 transition-all duration-500 ${
            aofOn
              ? 'bg-emerald-50 border-emerald-300'
              : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
          }`}>
            <div className="flex items-center gap-1.5 text-[10px]">
              <span>💾</span>
              <span className={`font-bold ${aofOn ? 'text-emerald-800' : 'text-slate-400'}`}>
                Volume: redis_data → /data
              </span>
              {aofOn && (
                <span className="ml-auto text-[8px] bg-emerald-600 text-white px-1 py-0.5 rounded font-mono font-bold">
                  AOF
                </span>
              )}
            </div>
            <div className={`text-[9px] font-mono ${aofOn ? 'text-emerald-700' : 'text-slate-400'} mt-0.5`}>
              {aofOn ? 'appendonly.aof — 모든 쓰기 명령 누적' : '영속화 없음 (재시작 시 데이터 증발)'}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙: 클라이언트 명령 시뮬 — redis-cli / shell 라인
    //   kind: 'shell' | 'cli' | 'output' | 'output-ok' | 'output-err' | 'output-stream'
    // ─────────────────────────────────────────────────────
    function ClientSim({ commands, authState, monitorOn }) {
      const colorOf = (kind) => {
        switch (kind) {
          case 'shell':         return 'text-slate-300';
          case 'cli':           return 'text-cyan-300';
          case 'output':        return 'text-slate-300';
          case 'output-ok':     return 'text-emerald-300';
          case 'output-err':    return 'text-rose-300';
          case 'output-stream': return 'text-amber-200';
          default:              return 'text-slate-300';
        }
      };
      const promptColorOf = (kind) =>
        kind === 'cli' ? 'text-cyan-400' : 'text-slate-500';

      return (
        <div className="rounded-lg border-2 border-slate-200 bg-slate-900 p-2.5">
          <div className="flex items-center gap-1.5 mb-1.5">
            <span className="w-2 h-2 rounded-full bg-red-500"></span>
            <span className="w-2 h-2 rounded-full bg-yellow-500"></span>
            <span className="w-2 h-2 rounded-full bg-green-500"></span>
            <span className="text-[10px] text-slate-400 ml-1 font-mono">
              {monitorOn ? 'redis-cli MONITOR (live)' : 'client'}
            </span>
            {authState === 'ok' && (
              <span className="ml-auto text-[8px] bg-amber-500 text-white px-1 py-0.5 rounded font-mono font-bold">
                authed
              </span>
            )}
          </div>

          <div className="font-mono text-[10px] leading-relaxed space-y-0.5">
            {commands.map((c, i) => (
              <div key={i} className={`flex gap-1.5 ${c.kind === 'output-stream' ? 'animate-pulse' : ''}`}>
                {c.prompt && (
                  <span className={`shrink-0 ${promptColorOf(c.kind)}`}>{c.prompt}</span>
                )}
                <span className={`${colorOf(c.kind)} ${c.prompt ? '' : 'pl-3'}`}>
                  {c.cmd}
                </span>
              </div>
            ))}
            {monitorOn && (
              <div className="flex gap-1.5">
                <span className="text-amber-400">▌</span>
                <span className="text-amber-200 italic">streaming...</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: KV 표 — 현재 Redis 안 키-값 상태
    //   비어있으면 "empty" 메시지
    //   monitor 단계에서는 metrics(INFO 일부)도 같이 표시
    // ─────────────────────────────────────────────────────
    function KvTable({ rows, metrics }) {
      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🗂️</span>
              <span className="text-[11px] font-bold text-slate-700">KV Store (in-memory)</span>
            </div>
            <span className="text-[9px] bg-sky-100 text-sky-700 px-1.5 py-0.5 rounded font-mono font-bold border border-sky-200">
              {rows.length} keys
            </span>
          </div>

          {rows.length === 0 ? (
            <div className="text-center py-3 text-[10px] text-slate-400 italic">
              아직 키가 없음 — SET 명령으로 채워보자
            </div>
          ) : (
            <table className="w-full text-[10px] font-mono">
              <thead>
                <tr className="text-slate-500 border-b border-slate-200">
                  <th className="text-left py-1 pl-1 font-semibold">key</th>
                  <th className="text-left py-1 font-semibold">value</th>
                  <th className="text-right py-1 pr-1 font-semibold">TTL</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r, i) => (
                  <tr key={i} className="border-b border-slate-100 last:border-0">
                    <td className="py-1 pl-1 text-sky-700 font-bold">{r.key}</td>
                    <td className="py-1 text-slate-700">{r.value}</td>
                    <td className="py-1 pr-1 text-right text-amber-700">{r.ttl}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}

          {metrics && (
            <div className="mt-2 pt-2 border-t border-slate-100 grid grid-cols-2 gap-1 text-[9px] font-mono">
              <div className="bg-slate-50 rounded px-1.5 py-1">
                <div className="text-slate-500">used_memory</div>
                <div className="text-slate-800 font-bold">{metrics.used_memory}</div>
              </div>
              <div className="bg-slate-50 rounded px-1.5 py-1">
                <div className="text-slate-500">clients</div>
                <div className="text-slate-800 font-bold">{metrics.connected_clients}</div>
              </div>
              <div className="bg-slate-50 rounded px-1.5 py-1">
                <div className="text-slate-500">ops/sec</div>
                <div className="text-emerald-700 font-bold">{metrics.ops_per_sec.toLocaleString()}</div>
              </div>
              <div className="bg-slate-50 rounded px-1.5 py-1">
                <div className="text-slate-500">uptime</div>
                <div className="text-slate-800 font-bold">{metrics.uptime}</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: Redis 박스 (옵션 뱃지 + volume)
    //   중앙: 클라이언트 명령 시뮬레이션 (터미널)
    //   하단: KV 표 + INFO 지표 (monitor 단계만)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 Redis 컨테이너 → CLI → KV</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            <RedisBox
              redisLit={step.redisLit}
              aofOn={step.aofOn}
              authOn={step.authOn}
            />

            {/* 화살표 */}
            <div className="text-center">
              <div className="inline-block text-xs font-mono text-sky-600 font-bold">
                ↓ redis-cli / docker exec
              </div>
            </div>

            <ClientSim
              commands={step.cliCommands}
              authState={step.authState}
              monitorOn={step.monitorOn}
            />

            {/* 화살표 */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.kvTable.length > 0 || step.metrics ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ in-memory state
              </div>
            </div>

            <KvTable rows={step.kvTable} metrics={step.metrics} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>persisted
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>auth/TTL
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>error
            </span>
            <span className="ml-auto font-mono">phase: {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, sky 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 ←/→
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VIII-1-6</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VIII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VIII. Docker 실전 &gt; Chapter 1. 서비스별 패턴</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-1-6. Redis Docker — 캐시/세션의 표준 운영 패턴</h1>
                  <p className="text-sm text-slate-500 mt-0.5">redis:7 기본 실행 → AOF 영속화 → 비밀번호 → CLI SET/GET → INFO/MONITOR 5단계</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: Redis 운영의 4점 — <strong>영속화</strong>(--appendonly + volume) · <strong>인증</strong>(--requirepass) · <strong>TTL</strong>(SET ... EX) · <strong>관측</strong>(INFO/MONITOR + docker stats). 다음 단계는 compose 로 redis + 앱을 한 장에 묶어 띄우기다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['redis:7', 'docker run', '6379', 'AOF', 'appendonly', 'requirepass', 'redis-cli', 'SET', 'GET', 'EXPIRE', 'TTL', 'INFO', 'MONITOR'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./viii-1-5_postgres_docker.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; VIII-1-5 Postgres Docker</a>
              <a href="./viii-1-7_mongodb_docker.html" className="text-sky-700 hover:text-sky-900 font-medium">VIII-1-7 MongoDB Docker &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
