<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — Redis를 Docker로 실행하기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes flash { 0%,100%{background-color:rgba(239,68,68,0.1);} 50%{background-color:rgba(239,68,68,0.3);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-flash { animation: flash 1s ease-in-out 2; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const REDIS_COMMANDS = [
      { cmd: "SET", args: 'username "홍길동"', result: "OK", desc: "값 저장" },
      { cmd: "GET", args: "username", result: '"홍길동"', desc: "값 조회" },
      { cmd: "DEL", args: "username", result: "(integer) 1", desc: "키 삭제" },
      { cmd: "SETEX", args: 'session 300 "abc123"', result: "OK", desc: "저장 + 만료 설정" },
      { cmd: "TTL", args: "session", result: "(integer) 298", desc: "남은 만료 시간" },
      { cmd: "KEYS", args: "*", result: '1) "session"', desc: "키 목록 조회" },
    ];

    const SCENARIOS = [
      { icon: "🔐", name: "세션 스토어", desc: "로그인 세션 정보 저장", ttl: "1800초 (30분)", example: "SET session:user:42 '{...}' EX 1800" },
      { icon: "⚡", name: "API 캐시", desc: "자주 조회되는 데이터 캐싱", ttl: "300초 (5분)", example: "SET cache:products '[...]' EX 300" },
      { icon: "🛡️", name: "속도 제한", desc: "API 요청 횟수 제한", ttl: "60초 (1분)", example: "INCR rate:ip:192.168.1.1" },
    ];

    const STEPS = [
      {
        title: "STEP 1 · Redis 컨테이너 실행",
        desc: "Redis는 메모리 기반 키-값 저장소다. 환경변수 없이도 바로 실행할 수 있다. redis:7-alpine은 30MB 수준의 경량 이미지로, 시작이 빠르고 보안 취약점 노출이 적다.",
        phase: "run",
        command: "docker run -d --name redis-demo -p 6379:6379 redis:7-alpine",
      },
      {
        title: "STEP 2 · redis-cli 기본 명령",
        desc: "docker exec로 redis-cli에 접속한다. SET/GET/DEL로 값을 저장·조회·삭제한다. EXPIRE/TTL로 만료 시간을 설정하고 확인한다. SETEX는 저장과 만료를 동시에 처리한다.",
        phase: "cli",
        command: "docker exec -it redis-demo redis-cli",
      },
      {
        title: "STEP 3 · 패스워드 설정",
        desc: "Redis는 기본적으로 인증 없이 접속 가능하다. --requirepass 옵션으로 비밀번호를 설정한다. 인증 없이 접속하면 NOAUTH 에러가 발생한다.",
        phase: "auth",
        command: "docker run -d --name redis-demo -p 6379:6379 redis:7-alpine redis-server --requirepass mypassword",
      },
      {
        title: "STEP 4 · AOF 영속화 + 볼륨",
        desc: "Redis는 메모리 기반이므로 재시작하면 데이터가 사라진다. --appendonly yes로 AOF 영속화를 활성화하고, /data 경로를 볼륨에 연결하면 재시작 후에도 데이터를 복구할 수 있다.",
        phase: "persist",
        command: "docker run -d --name redis-demo -p 6379:6379 -v redis_data:/data redis:7-alpine redis-server --requirepass mypassword --appendonly yes",
      },
      {
        title: "STEP 5 · Redis 활용 시나리오",
        desc: "Redis는 세션 스토어(로그인 유지), API 캐시(응답 속도 향상), 속도 제한(Rate Limiting)에 주로 사용한다. 각 시나리오에서 TTL(만료 시간)을 적절히 설정하는 것이 핵심이다.",
        phase: "scenarios",
        command: "",
      },
      {
        title: "STEP 6 · 핵심 설정 정리",
        desc: "이미지: redis:7-alpine / 포트: 6379 / 인증: --requirepass / 영속화: --appendonly yes / 데이터 경로: /data. 프로덕션에서는 인증과 영속화를 반드시 설정한다.",
        phase: "summary",
        command: "",
      },
    ];

    function RedisVisual({ phase }) {
      if (phase === "run") {
        return (
          <div className="flex flex-col md:flex-row items-center justify-center gap-6 anim-fade">
            <div className="bg-blue-100 border-2 border-blue-400 rounded-xl p-4 text-center">
              <div className="text-3xl mb-2">🖥️</div>
              <div className="font-bold text-blue-800">호스트</div>
              <div className="text-xs text-blue-500">포트 6379</div>
            </div>
            <div className="text-2xl text-blue-400">→</div>
            <div className="bg-red-50 border-2 border-red-400 rounded-xl p-5 anim-pulse">
              <div className="text-center mb-3">
                <div className="text-3xl">🔴</div>
                <div className="font-bold text-red-800">Redis 7 컨테이너</div>
                <div className="text-xs text-red-500">redis:7-alpine (~30MB)</div>
              </div>
              <div className="bg-red-100 rounded-lg p-2 text-center">
                <div className="text-xs text-red-600">메모리 기반 키-값 저장소</div>
                <div className="text-xs text-red-500 mt-1">⚡ 초고속 읽기/쓰기</div>
              </div>
            </div>
          </div>
        );
      }

      if (phase === "cli") {
        return (
          <div className="bg-slate-900 rounded-xl p-4 font-mono text-xs anim-fade">
            <div className="flex items-center gap-2 mb-3">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-green-500"></div>
              <span className="text-slate-500 ml-2">redis-cli</span>
            </div>
            <div className="text-cyan-300 mb-2">127.0.0.1:6379&gt; PING</div>
            <div className="text-green-400 mb-3">PONG</div>
            {REDIS_COMMANDS.map((c, i) => (
              <div key={i} className="mb-2 anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                <div className="flex items-center gap-2">
                  <span className="text-cyan-300">127.0.0.1:6379&gt;</span>
                  <span className="text-yellow-300 font-bold">{c.cmd}</span>
                  <span className="text-white">{c.args}</span>
                  <span className="text-slate-500 ml-auto hidden md:inline">// {c.desc}</span>
                </div>
                <div className="text-green-400 pl-4">{c.result}</div>
              </div>
            ))}
          </div>
        );
      }

      if (phase === "auth") {
        return (
          <div className="space-y-4 anim-fade">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-red-50 border-2 border-red-300 rounded-xl p-4">
                <h4 className="font-bold text-red-800 mb-2">❌ 인증 없이 접속</h4>
                <div className="bg-slate-900 rounded-lg p-3 font-mono text-xs">
                  <div className="text-cyan-300">127.0.0.1:6379&gt; PING</div>
                  <div className="text-red-400">(error) NOAUTH Authentication required.</div>
                </div>
              </div>
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-4">
                <h4 className="font-bold text-emerald-800 mb-2">✅ 인증 후 접속</h4>
                <div className="bg-slate-900 rounded-lg p-3 font-mono text-xs">
                  <div className="text-cyan-300">127.0.0.1:6379&gt; AUTH mypassword</div>
                  <div className="text-green-400">OK</div>
                  <div className="text-cyan-300">127.0.0.1:6379&gt; PING</div>
                  <div className="text-green-400">PONG</div>
                </div>
              </div>
            </div>
            <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-center text-sm text-amber-700">
              💡 접속 시 바로 인증: <code className="bg-amber-100 px-1 rounded">redis-cli -a mypassword</code>
            </div>
          </div>
        );
      }

      if (phase === "persist") {
        return (
          <div className="flex flex-col items-center gap-4 anim-fade">
            <div className="flex items-center gap-6">
              <div className="bg-red-50 border-2 border-red-400 rounded-xl p-4 text-center">
                <div className="text-3xl mb-1">🔴</div>
                <div className="font-bold text-red-800 text-sm">Redis 컨테이너</div>
                <div className="mt-2 space-y-1">
                  <div className="bg-yellow-100 rounded px-2 py-1 text-xs font-mono">--appendonly yes</div>
                  <div className="bg-blue-100 rounded px-2 py-1 text-xs font-mono">--requirepass ****</div>
                </div>
              </div>
              <div className="text-xl text-emerald-500 font-bold">↕</div>
              <div className="bg-emerald-100 border-2 border-emerald-400 rounded-xl p-4 text-center anim-pulse">
                <div className="text-3xl mb-1">💾</div>
                <div className="font-bold text-emerald-800 text-sm">Docker 볼륨</div>
                <div className="text-xs text-emerald-500 mt-1">redis_data → /data</div>
              </div>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 w-full max-w-lg">
              <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-center text-sm">
                <span className="font-bold text-blue-700">AOF</span>
                <p className="text-xs text-blue-500 mt-1">모든 쓰기 명령을 파일에 기록. 복구 정확도 높음</p>
              </div>
              <div className="bg-purple-50 border border-purple-200 rounded-lg p-3 text-center text-sm">
                <span className="font-bold text-purple-700">RDB</span>
                <p className="text-xs text-purple-500 mt-1">주기적 스냅샷 저장. 파일 작고 복구 빠름</p>
              </div>
            </div>
          </div>
        );
      }

      if (phase === "scenarios") {
        return (
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 anim-fade">
            {SCENARIOS.map((sc, i) => (
              <div key={i} className="bg-white border-2 border-red-200 rounded-xl p-4 anim-slide" style={{animationDelay:`${i*0.15}s`}}>
                <div className="text-center mb-3">
                  <div className="text-3xl">{sc.icon}</div>
                  <div className="font-bold text-slate-800">{sc.name}</div>
                  <div className="text-xs text-slate-500">{sc.desc}</div>
                </div>
                <div className="space-y-2">
                  <div className="bg-amber-50 rounded px-2 py-1 text-xs">
                    <span className="font-bold text-amber-700">TTL:</span> <span className="text-amber-600">{sc.ttl}</span>
                  </div>
                  <div className="bg-slate-900 rounded px-2 py-1.5 font-mono text-xs text-green-400 break-all">
                    {sc.example}
                  </div>
                </div>
              </div>
            ))}
          </div>
        );
      }

      if (phase === "summary") {
        return (
          <div className="bg-gradient-to-r from-red-50 to-orange-50 border-2 border-red-300 rounded-xl p-6 anim-fade">
            <h3 className="text-lg font-bold text-red-800 mb-4 text-center">Redis 핵심 설정 요약</h3>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
              {[
                { label: "이미지", value: "redis:7-alpine", icon: "📦" },
                { label: "포트", value: "6379", icon: "🔌" },
                { label: "인증", value: "--requirepass", icon: "🔐" },
                { label: "영속화", value: "--appendonly yes", icon: "💾" },
                { label: "데이터 경로", value: "/data", icon: "📂" },
                { label: "CLI", value: "redis-cli", icon: "⌨️" },
              ].map((item, i) => (
                <div key={i} className="bg-white rounded-lg p-3 border border-red-200 text-center anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                  <div className="text-xl">{item.icon}</div>
                  <div className="text-xs text-slate-500">{item.label}</div>
                  <div className="font-mono text-sm font-bold text-red-700">{item.value}</div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      return null;
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4500);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VIII-1-6: Redis를 Docker로 실행하기</h1>
              </div>
              <p className="text-slate-500 text-sm">Redis 컨테이너 실행, CLI 접속, 인증 설정, AOF 영속화까지 단계별로 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "summary" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "auth" ? "bg-red-600 border-red-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {data.command && (
              <div className="bg-slate-900 rounded-xl p-4 font-mono text-sm anim-fade overflow-x-auto">
                <div className="flex items-center gap-2 mb-2">
                  <div className="w-3 h-3 rounded-full bg-red-500"></div>
                  <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                  <div className="w-3 h-3 rounded-full bg-green-500"></div>
                  <span className="text-slate-500 text-xs ml-2">Terminal</span>
                </div>
                <div className="text-green-400 break-all">
                  <span className="text-slate-500">$ </span>{data.command}
                </div>
              </div>
            )}

            <div className="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
              <RedisVisual phase={data.phase} />
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
