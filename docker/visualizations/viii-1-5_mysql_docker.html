  -->

        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${

              lit ? 'bg-sky-600 text-white' : 'bg-slate-300 text-slate-500'
            }`}>
              {lit ? 'mysql:8' : 'idle'}
            </span>
          </div>

          {/* mysqld 프로세스 + 데이터 경로 */}
          <div className="bg-white rounded border border-slate-200 p-1.5 mb-2">
            <div className="flex items-center justify-between text-[10px] font-mono">
              <span className="font-bold text-slate-700">mysqld</span>
              <span className={`${lit ? 'text-emerald-700 font-bold' : 'text-slate-400'}`}>
                {lit ? 'listen :3306' : '—'}
              </span>
            </div>
            <div className="text-[9px] font-mono text-slate-500 mt-0.5">
              📂 /var/lib/mysql
            </div>
          </div>

          {/* 환경변수 카드들 */}
          <div className="space-y-1">
            {envs.map((key) => {
              const meta = ENV_META[key];
              if (!meta) return null;
              return (
                <div
                  key={key}
                  className={`flex items-center justify-between text-[9px] px-1.5 py-1 rounded border ${
                    meta.required
                      ? 'bg-rose-50 border-rose-300'
                      : 'bg-white border-slate-200'
                  }`}
                >
                  <div className="flex items-center gap-1 font-mono">
                    <span className="font-bold text-slate-700">{key}</span>
                    <span className="text-slate-400">=</span>
                    <span className="text-slate-600">{meta.val}</span>
                  </div>
                  {meta.required && (
                    <span className="text-[8px] bg-rose-600 text-white px-1 py-0.5 rounded font-bold">
                      필수
                    </span>
                  )}
                </div>
              );
            })}
            {envs.length === 0 && (
              <div className="text-[9px] text-slate-400 italic text-center py-1">
                환경변수 없음
              </div>
            )}
          </div>

          {/* initdb 영역 */}
          <div className={`mt-2 rounded border-2 px-2 py-1.5 transition-all duration-500 ${
            initdbOn
              ? (initdbLit ? 'bg-sky-100 border-sky-500 shadow' : 'bg-amber-50 border-amber-300')
              : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
          }`}>
            <div className="flex items-center gap-1 text-[10px]">
              <span>📜</span>
              <span className={`font-bold ${initdbOn ? 'text-amber-800' : 'text-slate-400'}`}>
                /docker-entrypoint-initdb.d/
              </span>
              {initdbOn && (
                <span className="ml-auto text-[8px] bg-amber-600 text-white px-1 py-0.5 rounded font-mono font-bold">
                  auto-run
                </span>
              )}
            </div>
            <div className={`text-[9px] font-mono mt-0.5 ${initdbOn ? 'text-amber-700' : 'text-slate-400'}`}>
              {initdbOn ? '01_init.sql → CREATE TABLE users / orders ...' : '아직 없음'}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: named volume 박스
    //   volumeOn → mysql_data 볼륨 lit
    // ─────────────────────────────────────────────────────
    function VolumeBox({ volumeOn, highlight }) {
      const lit = volumeOn;
      const volumeStrong = highlight === 'volume';
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          lit
            ? (volumeStrong ? 'bg-sky-100 border-sky-500 shadow-md' : 'bg-amber-50 border-amber-400 shadow-sm')
            : 'bg-slate-50 border-dashed border-slate-200 opacity-60'
        }`}>
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">💾</span>
              <span className={`text-[11px] font-bold ${lit ? 'text-amber-800' : 'text-slate-400'}`}>
                Docker named volume
              </span>
            </div>
            {lit && (
              <span className="text-[9px] bg-amber-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                persistent
              </span>
            )}
          </div>
          <div className="bg-white rounded border border-slate-200 p-1.5 font-mono text-[10px]">
            <div className={`font-bold ${lit ? 'text-amber-800' : 'text-slate-400'}`}>
              mysql_data
            </div>
            <div className={`text-[9px] mt-0.5 ${lit ? 'text-slate-600' : 'text-slate-400'}`}>
              → /var/lib/mysql 마운트
            </div>
          </div>
          <div className={`text-[9px] mt-1 ${lit ? 'text-amber-700 font-semibold' : 'text-slate-400'}`}>
            {lit ? '✓ 컨테이너 삭제해도 데이터 보존' : '아직 없음 (rm 시 데이터 소실)'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 호스트 박스 (포트 / 클라이언트)
    //   중앙: MySQL 컨테이너 박스 (mysqld + 환경변수 + initdb)
    //   하단: named volume
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 호스트 → MySQL 컨테이너 → 볼륨</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            <HostBox
              portOn={step.portOn}
              clientOn={step.clientOn}
              highlight={step.highlight}
            />

            {/* 화살표: 포트 매핑 */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.portOn ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↕ {step.portOn ? '-p 3306:3306 (port forwarding)' : '포트 매핑 없음'}
              </div>
            </div>

            <ContainerBox
              container={step.container}
              envs={step.envs}
              initdbOn={step.initdbOn}
              highlight={step.highlight}
            />

            {/* 화살표: 볼륨 마운트 */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.volumeOn ? 'text-amber-600 font-bold' : 'text-slate-300'
              }`}>
                ↕ {step.volumeOn ? '-v mysql_data:/var/lib/mysql' : '볼륨 마운트 없음'}
              </div>
            </div>

            <VolumeBox volumeOn={step.volumeOn} highlight={step.highlight} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>active focus
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>connected
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>persistent
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>required
            </span>
            <span className="ml-auto font-mono">step {STEPS.indexOf(step) + 1} / {STEPS.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — 5개 파일 탭 + highlight.js 토큰화
    //   activeFile : 현재 step 의 권장 파일 (auto-select)
    //   highlight  : 현재 step 의 권장 강조 라인
    //   유저는 탭으로 자유롭게 다른 파일 볼 수도 있음
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeFile, highlight, stepIdx, total }) {
      const [openFile, setOpenFile] = useState(activeFile);
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      // step 이 바뀌면 권장 파일로 자동 전환
      useEffect(() => {
        setOpenFile(activeFile);
      }, [activeFile]);

      const file = FILES[openFile];
      const useHighlight = openFile === activeFile ? highlight : [];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${file.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [openFile]);

      const fileNames = Object.keys(FILES);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 바 */}
          <div className="bg-[#21252b] px-3 py-2 flex items-center gap-1 border-b border-slate-700">
            <div className="flex gap-1.5 mr-2">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <div className="flex gap-0.5 overflow-x-auto">
              {fileNames.map((name) => (
                <button
                  key={name}
                  onClick={() => setOpenFile(name)}
                  className={`px-2.5 py-1 text-[10px] font-mono rounded-t transition whitespace-nowrap ${
                    openFile === name
                      ? 'bg-[#282c34] text-sky-300 border-t-2 border-sky-400'
                      : 'bg-[#1a1d23] text-slate-500 hover:text-slate-300 border-t-2 border-transparent'
                  } ${name === activeFile && openFile !== name ? 'ring-1 ring-amber-400/40' : ''}`}
                >
                  {name}
                </button>
              ))}
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{file.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${file.lang}`}>{file.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || file.lines).map((lineHtml, i) => {
                  const highlighted = useHighlight && useHighlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{file.lines.length} lines · {openFile}</span>
            <span>Step {stepIdx + 1} / {total}{openFile === activeFile ? ' (focused)' : ''}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VIII-1-5</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VIII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VIII. 실전 패턴 &gt; Chapter 1. DB 컨테이너</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-1-5. MySQL Docker — mysql:8 이미지로 DB 띄우기</h1>
                  <p className="text-sm text-slate-500 mt-0.5">docker run · 환경변수 · 포트 · 볼륨 · initdb · 클라이언트 접속까지 5단계</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                activeFile={step.activeFile}
                highlight={step.highlightLines}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>환경변수</strong>(초기 설정) + <strong>-p 포트</strong>(외부 접속) + <strong>-v 볼륨</strong>(데이터 영속) + <strong>initdb</strong>(스키마 박제). 이 네 가지면 MySQL 컨테이너 실전 운영 99%다. 다음(VIII-1-6)에서는 PostgreSQL / Redis 같은 다른 DB로 같은 패턴을 재활용한다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['mysql:8', 'docker run', 'MYSQL_ROOT_PASSWORD', '-p 3306:3306', 'named volume', '/var/lib/mysql', 'initdb.d', 'docker exec'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./viii-1-4_postgres_docker.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; VIII-1-4 Postgres Docker</a>
              <a href="./viii-1-6_redis_docker.html" className="text-sky-700 hover:text-sky-900 font-medium">VIII-1-6 Redis Docker &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
