<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — MySQL을 Docker로 실행하기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes typing { from{width:0;} to{width:100%;} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ENV_VARS = [
      { key: "MYSQL_ROOT_PASSWORD", value: "rootpass", required: true, desc: "root 계정 비밀번호 (필수)" },
      { key: "MYSQL_DATABASE", value: "demo", required: false, desc: "자동 생성할 DB 이름" },
      { key: "MYSQL_USER", value: "appuser", required: false, desc: "일반 사용자 계정" },
      { key: "MYSQL_PASSWORD", value: "apppass", required: false, desc: "일반 사용자 비밀번호" },
    ];

    const STEPS = [
      {
        title: "STEP 1 · MySQL 컨테이너 실행",
        desc: "docker run으로 MySQL 8.0 컨테이너를 실행한다. MYSQL_ROOT_PASSWORD는 필수 환경변수다. 이 값을 생략하면 컨테이너가 즉시 종료된다.",
        phase: "run",
        command: "docker run -d --name mysql-demo -e MYSQL_ROOT_PASSWORD=rootpass -e MYSQL_DATABASE=demo -p 3306:3306 mysql:8.0",
        activeEnvs: ["MYSQL_ROOT_PASSWORD", "MYSQL_DATABASE"],
      },
      {
        title: "STEP 2 · 환경변수 4가지",
        desc: "MySQL 공식 이미지는 4가지 환경변수로 초기 설정을 받는다. ROOT_PASSWORD만 필수이고, DATABASE/USER/PASSWORD는 선택이다. USER+PASSWORD를 설정하면 root 대신 전용 계정이 생성된다.",
        phase: "envvars",
        command: "docker run -d --name mysql-demo -e MYSQL_ROOT_PASSWORD=rootpass -e MYSQL_DATABASE=demo -e MYSQL_USER=appuser -e MYSQL_PASSWORD=apppass -p 3306:3306 mysql:8.0",
        activeEnvs: ["MYSQL_ROOT_PASSWORD", "MYSQL_DATABASE", "MYSQL_USER", "MYSQL_PASSWORD"],
      },
      {
        title: "STEP 3 · 볼륨으로 데이터 영속화",
        desc: "볼륨 없이 컨테이너를 삭제하면 모든 DB 데이터가 사라진다. MySQL의 데이터 경로 /var/lib/mysql을 Docker 볼륨에 연결하면 컨테이너를 삭제해도 데이터가 남는다.",
        phase: "volume",
        command: "docker run -d --name mysql-demo -e MYSQL_ROOT_PASSWORD=rootpass -e MYSQL_DATABASE=demo -p 3306:3306 -v mysql_data:/var/lib/mysql mysql:8.0",
        activeEnvs: ["MYSQL_ROOT_PASSWORD", "MYSQL_DATABASE"],
      },
      {
        title: "STEP 4 · 초기 SQL 자동 실행",
        desc: "/docker-entrypoint-initdb.d/ 경로에 .sql 파일을 마운트하면 컨테이너 첫 실행 시 자동으로 실행된다. 테이블 생성, 초기 데이터 삽입에 활용한다. 볼륨 데이터가 이미 있으면 실행되지 않는다.",
        phase: "initdb",
        command: "docker run -d --name mysql-demo -e MYSQL_ROOT_PASSWORD=rootpass -e MYSQL_DATABASE=demo -p 3306:3306 -v mysql_data:/var/lib/mysql -v ./init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro mysql:8.0",
        activeEnvs: ["MYSQL_ROOT_PASSWORD", "MYSQL_DATABASE"],
      },
      {
        title: "STEP 5 · CLI 접속과 CRUD",
        desc: "docker exec로 컨테이너 내부의 mysql 클라이언트를 실행한다. SHOW DATABASES, USE demo, SELECT, INSERT 등 SQL 명령을 바로 실행할 수 있다.",
        phase: "cli",
        command: "docker exec -it mysql-demo mysql -u root -prootpass",
        activeEnvs: [],
      },
      {
        title: "STEP 6 · 데이터 생존 테스트",
        desc: "볼륨이 실제로 동작하는지 확인한다: 1) 데이터 삽입 → 2) 컨테이너 삭제 → 3) 재생성 → 4) 데이터 확인. docker compose down은 데이터 유지, down -v는 볼륨까지 삭제하므로 주의!",
        phase: "survival",
        command: "",
        activeEnvs: [],
      },
    ];

    function MySQLContainerDiagram({ phase, step }) {
      if (phase === "run" || phase === "envvars") {
        return (
          <div className="flex flex-col md:flex-row items-center justify-center gap-6 anim-fade">
            <div className="bg-blue-100 border-2 border-blue-400 rounded-xl p-4 text-center">
              <div className="text-3xl mb-2">🖥️</div>
              <div className="font-bold text-blue-800">호스트</div>
              <div className="text-xs text-blue-500">포트 3306</div>
            </div>
            <div className="text-2xl text-blue-400">→</div>
            <div className="bg-orange-50 border-2 border-orange-400 rounded-xl p-5 anim-pulse">
              <div className="text-center mb-3">
                <div className="text-3xl">🐬</div>
                <div className="font-bold text-orange-800">MySQL 8.0 컨테이너</div>
              </div>
              <div className="space-y-1.5">
                {ENV_VARS.filter(e => STEPS[step].activeEnvs.includes(e.key)).map((env, i) => (
                  <div key={i} className={`flex items-center gap-2 text-xs px-2 py-1.5 rounded ${
                    env.required ? "bg-red-100 border border-red-300" : "bg-orange-100 border border-orange-200"
                  } anim-slide`} style={{animationDelay:`${i*0.1}s`}}>
                    <span className="font-mono font-bold">{env.key}</span>
                    <span className="text-slate-500">=</span>
                    <span className="font-mono text-slate-700">{env.value}</span>
                    {env.required && <span className="text-red-500 font-bold text-xs">필수</span>}
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      if (phase === "volume") {
        return (
          <div className="flex flex-col items-center gap-4 anim-fade">
            <div className="flex items-center gap-6">
              <div className="bg-orange-50 border-2 border-orange-400 rounded-xl p-4 text-center">
                <div className="text-3xl mb-1">🐬</div>
                <div className="font-bold text-orange-800 text-sm">MySQL 컨테이너</div>
                <div className="text-xs text-orange-500 mt-1">/var/lib/mysql</div>
              </div>
              <div className="text-xl text-emerald-500 font-bold">↕</div>
              <div className="bg-emerald-100 border-2 border-emerald-400 rounded-xl p-4 text-center anim-pulse">
                <div className="text-3xl mb-1">💾</div>
                <div className="font-bold text-emerald-800 text-sm">Docker 볼륨</div>
                <div className="text-xs text-emerald-500 mt-1">mysql_data</div>
              </div>
            </div>
            <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-sm text-center">
              <span className="text-emerald-700">✓ 컨테이너를 삭제해도 볼륨의 데이터는 유지된다</span>
            </div>
          </div>
        );
      }

      if (phase === "initdb") {
        return (
          <div className="flex flex-col items-center gap-4 anim-fade">
            <div className="flex items-center gap-4">
              <div className="bg-blue-100 border-2 border-blue-300 rounded-xl p-3 text-center">
                <div className="text-xl mb-1">📄</div>
                <div className="text-xs font-bold text-blue-800">init.sql</div>
                <div className="text-xs text-blue-500">(호스트)</div>
              </div>
              <div className="text-lg text-blue-400">→</div>
              <div className="bg-orange-50 border-2 border-orange-400 rounded-xl p-3">
                <div className="font-bold text-orange-800 text-sm mb-2 text-center">🐬 MySQL</div>
                <div className="bg-amber-100 rounded px-2 py-1 text-xs font-mono">/docker-entrypoint-initdb.d/</div>
              </div>
            </div>
            <div className="bg-slate-900 rounded-lg p-3 font-mono text-xs text-green-400 max-w-md w-full anim-slide">
              <div className="text-slate-500">-- init.sql</div>
              <div>CREATE TABLE users (</div>
              <div className="pl-4">id INT AUTO_INCREMENT PRIMARY KEY,</div>
              <div className="pl-4">name VARCHAR(100) NOT NULL</div>
              <div>);</div>
              <div className="mt-1">INSERT INTO users (name) VALUES ('홍길동');</div>
            </div>
            <div className="bg-amber-50 border border-amber-200 rounded-lg p-2 text-xs text-amber-700">
              ⚠ 볼륨에 데이터가 이미 있으면 initdb 스크립트가 실행되지 않음
            </div>
          </div>
        );
      }

      if (phase === "cli") {
        return (
          <div className="bg-slate-900 rounded-xl p-4 font-mono text-xs anim-fade">
            <div className="flex items-center gap-2 mb-3">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-green-500"></div>
              <span className="text-slate-500 ml-2">MySQL CLI</span>
            </div>
            {[
              { cmd: "mysql> SHOW DATABASES;", result: "demo, information_schema, mysql, performance_schema" },
              { cmd: "mysql> USE demo;", result: "Database changed" },
              { cmd: "mysql> SELECT * FROM users;", result: "| 1 | 홍길동 | hong@example.com |" },
              { cmd: "mysql> INSERT INTO users (name, email) VALUES ('이영희', 'lee@example.com');", result: "Query OK, 1 row affected" },
            ].map((line, i) => (
              <div key={i} className="mb-2 anim-slide" style={{animationDelay:`${i*0.15}s`}}>
                <div className="text-green-400">{line.cmd}</div>
                <div className="text-slate-400 pl-2">{line.result}</div>
              </div>
            ))}
          </div>
        );
      }

      if (phase === "survival") {
        return (
          <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6 anim-fade">
            <h3 className="text-lg font-bold text-emerald-800 mb-4 text-center">데이터 생존 테스트</h3>
            <div className="flex flex-wrap items-center justify-center gap-3">
              {[
                { step: "1", icon: "📝", label: "데이터 삽입", color: "blue" },
                { step: "2", icon: "🗑️", label: "컨테이너 삭제\n(볼륨 유지)", color: "red" },
                { step: "3", icon: "🔄", label: "컨테이너 재생성", color: "amber" },
                { step: "4", icon: "✅", label: "데이터 확인\n(살아있음!)", color: "emerald" },
              ].map((s, i) => (
                <React.Fragment key={i}>
                  <div className={`bg-white border-2 border-${s.color}-300 rounded-xl p-3 text-center min-w-[90px] anim-slide`} style={{animationDelay:`${i*0.15}s`}}>
                    <div className="text-2xl mb-1">{s.icon}</div>
                    <div className={`text-xs font-bold text-${s.color}-800 whitespace-pre-line`}>{s.label}</div>
                  </div>
                  {i < 3 && <div className="text-slate-400 font-bold">→</div>}
                </React.Fragment>
              ))}
            </div>
            <div className="mt-4 bg-red-50 border border-red-200 rounded-lg p-3 text-center">
              <span className="text-red-600 text-sm font-bold">⚠ docker compose down -v → 볼륨까지 삭제! 모든 DB 데이터 영구 삭제!</span>
            </div>
          </div>
        );
      }

      return null;
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4500);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VIII-1-5: MySQL을 Docker로 실행하기</h1>
              </div>
              <p className="text-slate-500 text-sm">MySQL 컨테이너 실행, 환경변수 설정, 볼륨 영속화, CLI 접속까지 단계별로 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "survival" ? "bg-emerald-600 border-emerald-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 명령어 터미널 */}
            {data.command && (
              <div className="bg-slate-900 rounded-xl p-4 font-mono text-sm anim-fade overflow-x-auto">
                <div className="flex items-center gap-2 mb-2">
                  <div className="w-3 h-3 rounded-full bg-red-500"></div>
                  <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                  <div className="w-3 h-3 rounded-full bg-green-500"></div>
                  <span className="text-slate-500 text-xs ml-2">Terminal</span>
                </div>
                <div className="text-green-400 break-all">
                  <span className="text-slate-500">$ </span>{data.command}
                </div>
              </div>
            )}

            {/* 시각화 */}
            <div className="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
              <MySQLContainerDiagram phase={data.phase} step={step} />
            </div>

            {/* 환경변수 테이블 (STEP 2) */}
            {data.phase === "envvars" && (
              <div className="bg-orange-50 border border-orange-200 rounded-xl p-4 anim-fade">
                <h4 className="font-bold text-orange-800 mb-3">MySQL 핵심 환경변수</h4>
                <div className="space-y-2">
                  {ENV_VARS.map((env, i) => (
                    <div key={i} className={`flex items-center justify-between px-3 py-2 rounded-lg text-sm anim-slide ${
                      env.required ? "bg-red-100 border border-red-200" : "bg-orange-100 border border-orange-200"
                    }`} style={{animationDelay:`${i*0.1}s`}}>
                      <div className="flex items-center gap-2">
                        <code className="font-bold text-orange-800">{env.key}</code>
                        {env.required && <span className="bg-red-500 text-white px-1.5 py-0.5 rounded text-xs">필수</span>}
                      </div>
                      <span className="text-slate-600 text-xs">{env.desc}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
