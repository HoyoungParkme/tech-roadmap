    // 좌측: 로컬 머신 박스
    //   localImage 가 lit 이면 sky 강조
    //   taggedImage 가 있으면 별명도 함께 표시
    // ─────────────────────────────────────────────────────
    function LocalMachineBox({ localImage, taggedImage, highlightStage }) {
      const tagLit = highlightStage === 'tag';
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          localImage.lit ? 'bg-sky-50 border-sky-400 shadow-md' : 'bg-slate-50 border-slate-200'
        }`}>
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">💻</span>
              <span className="text-[11px] font-bold text-sky-800">로컬 머신 (개발 노트북)</span>
            </div>
            <span className="text-[9px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
              build
            </span>
          </div>
          <div className="bg-white rounded border border-slate-200 p-1.5 font-mono text-[9px] space-y-0.5">
            <div className="flex items-center gap-1">
              <span className="text-slate-400">📦</span>
              <span className="text-slate-700 font-bold">{localImage.name}:{localImage.tag}</span>
              <span className="ml-auto text-slate-400">{localImage.size}</span>
            </div>
            {taggedImage && (
              <div className={`flex items-center gap-1 transition-all duration-500 ${
                tagLit ? 'bg-sky-100 px-1 rounded' : ''
              }`}>
                <span className="text-slate-400">🏷️</span>
                <span className={tagLit ? 'text-sky-700 font-bold' : 'text-slate-600'}>
                  {taggedImage.name}:{taggedImage.tag}
                </span>
                <span className="ml-auto text-[8px] text-slate-400">별명 (같은 ID)</span>
              </div>
            )}
          </div>
          <div className="text-[9px] mt-1 text-slate-500">
            {taggedImage ? '✓ tag 추가 — push 목적지 결정됨' : 'docker build 직후 — 이름만 있음'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측: 인증/푸시/풀 진행 막대
    // ─────────────────────────────────────────────────────
    function ProgressBar({ label, percent, color, lit }) {
      return (
        <div className={`rounded border-2 p-1.5 transition-all duration-500 ${
          lit ? `bg-${color}-50 border-${color}-400` : 'bg-slate-50 border-slate-200 opacity-50'
        }`}>
          <div className="flex items-center gap-1.5 text-[10px] mb-1">
            <span className={lit ? `font-bold text-${color}-800` : 'text-slate-400'}>
              {label}
            </span>
            <span className="ml-auto font-mono text-[9px] text-slate-500">{percent}%</span>
          </div>
          <div className="h-1.5 bg-slate-200 rounded-full overflow-hidden">
            <div
              className={`h-full transition-all duration-700 ${lit ? `bg-${color}-500` : 'bg-slate-300'}`}
              style={{ width: `${percent}%` }}
            />
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측: Registry 박스
    //   registryKind === 'hub'      → Docker Hub 외관
    //   registryKind === 'private'  → 사설 registry:2 외관
    //   registryStored 면 이미지 저장 표시
    // ─────────────────────────────────────────────────────
    function RegistryBox({ registryKind, registryStored, highlightStage }) {
      const isPrivate = registryKind === 'private';
      const lit = registryStored || highlightStage === 'self-host';
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          lit
            ? (isPrivate ? 'bg-violet-50 border-violet-400 shadow-md' : 'bg-sky-50 border-sky-400 shadow-md')
            : 'bg-slate-50 border-slate-200 opacity-70'
        }`}>
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">{isPrivate ? '🏢' : '☁️'}</span>
              <span className={`text-[11px] font-bold ${
                lit ? (isPrivate ? 'text-violet-800' : 'text-sky-800') : 'text-slate-500'
              }`}>
                {isPrivate ? 'Private Registry (registry:2)' : 'Docker Hub (docker.io)'}
              </span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
              isPrivate ? 'bg-violet-600 text-white' : 'bg-sky-600 text-white'
            }`}>
              {isPrivate ? 'self-hosted' : 'managed'}
            </span>
          </div>
          <div className={`bg-white rounded border p-1.5 font-mono text-[9px] space-y-0.5 ${
            isPrivate ? 'border-violet-200' : 'border-sky-200'
          }`}>
            <div className="text-slate-400">
              {isPrivate ? 'reg.local:5000/v2/_catalog' : 'hub.docker.com/r/myuser'}
            </div>
            {registryStored ? (
              <>
                <div className="flex items-center gap-1">
                  <span>📦</span>
                  <span className="text-slate-700 font-bold">
                    {isPrivate ? 'reg.local:5000/myapp:1.0' : 'myuser/myapp:1.0'}
                  </span>
                  <span className="ml-auto text-[8px] bg-emerald-600 text-white px-1 py-0.5 rounded font-bold">
                    stored
                  </span>
                </div>
                <div className="text-[8px] text-slate-500">
                  digest: sha256:9f3c...  · 4 layers · 128MB
                </div>
              </>
            ) : (
              <div className="text-slate-400 italic">아직 이미지 없음</div>
            )}
          </div>
          <div className={`text-[9px] mt-1 ${
            lit ? (isPrivate ? 'text-violet-700' : 'text-sky-700') + ' font-semibold' : 'text-slate-400'
          }`}>
            {isPrivate
              ? (registryStored ? '✓ 사내 망 안 — 외부 트래픽 0' : '아직 비어있음')
              : (registryStored ? '✓ 어디서든 pull 가능 (인증된 사용자)' : '아직 비어있음')}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측: 다른 머신 박스
    //   remoteImage 있으면 sky 강조 + 도착 표시
    // ─────────────────────────────────────────────────────
    function RemoteMachineBox({ remoteImage, highlightStage }) {
      const lit = !!remoteImage;
      const pullLit = highlightStage === 'pull';
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          lit ? 'bg-emerald-50 border-emerald-400 shadow-md' : 'bg-slate-50 border-dashed border-slate-300 opacity-70'
        }`}>
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🖥️</span>
              <span className={`text-[11px] font-bold ${lit ? 'text-emerald-800' : 'text-slate-500'}`}>
                다른 머신 (운영 서버 / 동료 노트북)
              </span>
            </div>
            {lit && (
              <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
                pullLit ? 'bg-emerald-600 text-white animate-pulse' : 'bg-emerald-600 text-white'
              }`}>
                pulled ✓
              </span>
            )}
          </div>
          <div className={`bg-white rounded border p-1.5 font-mono text-[9px] space-y-0.5 ${
            lit ? 'border-emerald-200' : 'border-slate-200'
          }`}>
            {remoteImage ? (
              <>
                <div className="flex items-center gap-1">
                  <span>📦</span>
                  <span className="text-slate-700 font-bold">{remoteImage.name}:{remoteImage.tag}</span>
                </div>
                <div className="text-[8px] text-slate-500">
                  같은 digest — 빌드 노트북과 100% 동일
                </div>
                <div className="flex items-center gap-1 pt-0.5">
                  <span>▶</span>
                  <span className="text-emerald-700 font-bold">docker run ... → 동작</span>
                </div>
              </>
            ) : (
              <div className="text-slate-400 italic">아직 이미지 없음 (pull 대기)</div>
            )}
          </div>
          <div className={`text-[9px] mt-1 ${lit ? 'text-emerald-700 font-semibold' : 'text-slate-400'}`}>
            {lit ? '✓ 빌드 환경 / OS 의존 없이 동일 동작' : '아직 도착 전'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — 전체 흐름
    //   로컬 → tag → push → registry → pull → 다른 머신
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const pushLit = step.highlightStage === 'push';
      const pullLit = step.highlightStage === 'pull';
      const loginLit = step.highlightStage === 'login';
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 로컬 → tag → push → registry → pull → 다른 머신</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            {/* 인증 상태 */}
            <div className={`rounded border-2 px-2 py-1.5 transition-all duration-500 ${
              step.loginOn
                ? (loginLit ? 'bg-sky-100 border-sky-500 shadow' : 'bg-emerald-50 border-emerald-300')
                : 'bg-slate-50 border-dashed border-slate-200 opacity-60'
            }`}>
              <div className="flex items-center gap-1.5 text-[10px]">
                <span>🔐</span>
                <span className={`font-bold ${step.loginOn ? (loginLit ? 'text-sky-800' : 'text-emerald-800') : 'text-slate-400'}`}>
                  docker login
                </span>
                <span className="ml-auto text-[9px] font-mono">
                  {step.loginOn
                    ? (loginLit ? '인증 중…' : '✓ ~/.docker/config.json')
                    : '미인증'}
                </span>
              </div>
            </div>

            {/* 로컬 머신 */}
            <LocalMachineBox
              localImage={step.localImage}
              taggedImage={step.taggedImage}
              highlightStage={step.highlightStage}
            />

            {/* 화살표 + push 진행 */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                pushLit || step.pushProgress > 0 ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ docker push (layer 단위 업로드)
              </div>
            </div>
            <ProgressBar
              label="push 진행"
              percent={step.pushProgress}
              color="sky"
              lit={pushLit || step.pushProgress > 0}
            />

            {/* 레지스트리 */}
            <RegistryBox
              registryKind={step.registryKind}
              registryStored={step.registryStored}
              highlightStage={step.highlightStage}
            />

            {/* 화살표 + pull 진행 */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                pullLit || step.pullProgress > 0 ? 'text-emerald-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ docker pull (layer 별 병렬 다운로드)
              </div>
            </div>
            <ProgressBar
              label="pull 진행"
              percent={step.pullProgress}
              color="emerald"
              lit={pullLit || step.pullProgress > 0}
            />

            {/* 다른 머신 */}
            <RemoteMachineBox
              remoteImage={step.remoteImage}
              highlightStage={step.highlightStage}
            />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>로컬/Hub
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-violet-500"></span>private
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>다른 머신
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded border border-slate-300 bg-white"></span>idle
            </span>
            <span className="ml-auto font-mono">phase: {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VII-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. Registry &amp; Image Management &gt; Chapter 1. Registry</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VII-1-1. Registry 활용 — Docker Hub / private registry push-pull</h1>
                  <p className="text-sm text-slate-500 mt-0.5">login → tag → push → 다른 머신에서 pull → 사설 registry:2 호스팅까지 한 번에 정리</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>login</strong>(인증) → <strong>tag</strong>(목적지) → <strong>push</strong>(업로드) → <strong>pull</strong>(다른 머신 수신) — 이 4단계가 컨테이너 배포의 본질이다. 사내라면 <strong>registry:2</strong> 한 줄로 사설 레지스트리도 즉시 가능. 다음(VII-1-2)은 태깅 전략(semver / git-sha / latest 함정).
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['docker login', 'docker tag', 'docker push', 'docker pull', 'Docker Hub', 'ghcr.io', 'registry:2', 'digest', 'PAT', 'private registry'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <a href="./vii-1-2_image_tagging.html" className="text-sky-700 hover:text-sky-900 font-medium">VII-1-2 이미지 태깅 전략 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
