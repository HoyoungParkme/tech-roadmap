<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — 레지스트리 사용</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes moveUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
    @keyframes arrowFlow { 0%{opacity:0.3;} 50%{opacity:1;} 100%{opacity:0.3;} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-up { animation: moveUp 0.5s ease-out forwards; }
    .anim-arrow { animation: arrowFlow 1.5s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · 레지스트리란?",
        desc: "레지스트리는 Docker 이미지를 저장하고 배포하는 원격 저장소다. 클라우드 사진첩처럼 내 노트북에서 빌드한 이미지를 올려두면 어느 서버에서든 내려받아 실행할 수 있다.",
        phase: "intro",
      },
      {
        title: "STEP 2 · login → tag → push → pull 워크플로우",
        desc: "Docker Hub 사용은 네 단계다. 1) docker login으로 인증 → 2) docker tag로 레지스트리 주소 포함 이름 붙이기 → 3) docker push로 업로드 → 4) 어느 서버에서든 docker pull로 내려받기.",
        phase: "workflow",
      },
      {
        title: "STEP 3 · Docker Hub (docker.io)",
        desc: "가장 널리 쓰이는 공개 레지스트리. 무료 계정은 공개 이미지 무제한, 비공개 이미지 1개. 이미지 이름 형식: [사용자명]/[이미지명]:[태그]. 비밀번호 대신 액세스 토큰 사용을 권장한다.",
        phase: "dockerhub",
      },
      {
        title: "STEP 4 · GitHub Container Registry (ghcr.io)",
        desc: "GitHub 저장소/Actions와 통합되어 CI에서 자동 push하기 가장 편하다. 비공개 이미지 무료. --password-stdin으로 토큰이 터미널에 노출되지 않게 한다.",
        phase: "ghcr",
      },
      {
        title: "STEP 5 · AWS ECR / GCP Artifact Registry",
        desc: "클라우드 네이티브 레지스트리. IAM 기반 인증으로 push/pull 권한을 세밀하게 제어한다. ECR 토큰은 12시간 유효하므로 CI에서 빌드 시작 시 항상 재발급한다.",
        phase: "cloud",
      },
      {
        title: "STEP 6 · 보안과 베스트 프랙티스",
        desc: "docker login 정보는 ~/.docker/config.json에 base64로 저장된다(암호화 아님!). CI에서는 환경 변수로만 전달한다. 공개 이미지의 rate limit(6시간에 200회)을 피하려면 자주 쓰는 이미지를 내부 레지스트리에 미러링한다.",
        phase: "security",
      },
    ];

    function RegistryCard({ name, address, features, icon, isActive }) {
      return (
        <div className={`rounded-xl border-2 p-4 transition-all duration-500 ${
          isActive ? "border-blue-400 bg-blue-50 shadow-lg scale-105" : "border-slate-200 bg-slate-50 opacity-60 scale-95"
        }`}>
          <div className="text-center">
            <div className="text-3xl mb-1">{icon}</div>
            <div className="font-bold text-sm text-slate-800">{name}</div>
            <div className="text-xs text-slate-500 font-mono mt-1">{address}</div>
            <div className="mt-3 space-y-1">
              {features.map((f, i) => (
                <div key={i} className="text-xs bg-white rounded px-2 py-1 text-slate-600 border border-slate-200">{f}</div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4500);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VII-1-1: Docker Hub / GitHub Container Registry 사용</h1>
              </div>
              <p className="text-slate-500 text-sm">push/pull 워크플로우와 공개/사설 레지스트리 사용법을 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "security" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "cloud" ? "bg-indigo-600 border-indigo-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            <div key={`vis-${step}`} className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 anim-fade">

              {/* 소개 */}
              {data.phase === "intro" && (
                <div className="flex items-center justify-center gap-4 flex-wrap">
                  <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 text-center">
                    <div className="text-3xl">💻</div>
                    <div className="font-bold text-blue-700 text-sm mt-1">내 노트북</div>
                    <div className="text-xs text-slate-500">docker build</div>
                  </div>
                  <div className="text-3xl text-blue-400 anim-arrow">⬆️</div>
                  <div className="bg-purple-50 border border-purple-200 rounded-xl p-4 text-center anim-pulse">
                    <div className="text-3xl">☁️</div>
                    <div className="font-bold text-purple-700 text-sm mt-1">레지스트리</div>
                    <div className="text-xs text-slate-500">원격 저장소</div>
                  </div>
                  <div className="text-3xl text-blue-400 anim-arrow">⬇️</div>
                  <div className="bg-green-50 border border-green-200 rounded-xl p-4 text-center">
                    <div className="text-3xl">🖥️</div>
                    <div className="font-bold text-green-700 text-sm mt-1">운영 서버</div>
                    <div className="text-xs text-slate-500">docker pull & run</div>
                  </div>
                </div>
              )}

              {/* 워크플로우 */}
              {data.phase === "workflow" && (
                <div className="space-y-3">
                  {[
                    { num: "1", cmd: "docker login", desc: "레지스트리에 인증 (토큰 권장)", icon: "🔑" },
                    { num: "2", cmd: "docker tag myapp:latest myuser/myapp:1.0.0", desc: "레지스트리 주소 포함 태그 붙이기", icon: "🏷️" },
                    { num: "3", cmd: "docker push myuser/myapp:1.0.0", desc: "레이어 단위로 업로드", icon: "⬆️" },
                    { num: "4", cmd: "docker pull myuser/myapp:1.0.0", desc: "어느 서버에서든 내려받기", icon: "⬇️" },
                  ].map((item, i) => (
                    <div key={i} className="flex items-center gap-3 p-3 bg-slate-50 rounded-lg border border-slate-200 anim-slide" style={{animationDelay: `${i * 0.15}s`}}>
                      <div className="w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold text-sm flex-shrink-0">{item.num}</div>
                      <div className="text-xl">{item.icon}</div>
                      <div className="flex-1">
                        <div className="font-mono text-sm text-blue-700 font-medium">{item.cmd}</div>
                        <div className="text-xs text-slate-500">{item.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* Docker Hub */}
              {data.phase === "dockerhub" && (
                <div className="space-y-4">
                  <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 text-center">
                    <div className="text-3xl mb-2">🐳</div>
                    <div className="font-bold text-blue-800 text-lg">Docker Hub</div>
                    <div className="font-mono text-sm text-blue-600 mt-1">docker.io (기본 레지스트리)</div>
                  </div>
                  <div className="bg-slate-800 rounded-lg p-4 font-mono text-sm">
                    <div className="text-slate-500"># 이미지 이름 형식</div>
                    <div className="text-green-400">[사용자명]/[이미지명]:[태그]</div>
                    <div className="text-blue-400 mt-2">myusername/myapp:latest</div>
                    <div className="text-blue-400">myusername/myapp:1.0.0</div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div className="bg-green-50 border border-green-200 rounded-lg p-3 text-xs text-center">
                      <div className="font-bold text-green-700">공개 이미지</div>
                      <div className="text-green-600 mt-1">무제한 무료</div>
                    </div>
                    <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-xs text-center">
                      <div className="font-bold text-yellow-700">비공개 이미지</div>
                      <div className="text-yellow-600 mt-1">무료 계정 1개</div>
                    </div>
                  </div>
                </div>
              )}

              {/* GHCR */}
              {data.phase === "ghcr" && (
                <div className="space-y-4">
                  <div className="bg-purple-50 border border-purple-200 rounded-xl p-4 text-center">
                    <div className="text-3xl mb-2">📦</div>
                    <div className="font-bold text-purple-800 text-lg">GitHub Container Registry</div>
                    <div className="font-mono text-sm text-purple-600 mt-1">ghcr.io</div>
                  </div>
                  <div className="bg-slate-800 rounded-lg p-4 font-mono text-xs">
                    <div className="text-slate-500"># GHCR 로그인</div>
                    <div className="text-green-400">echo $GITHUB_TOKEN | docker login ghcr.io \</div>
                    <div className="text-green-400">  -u myusername --password-stdin</div>
                    <div className="text-slate-500 mt-2"># 태그 & push</div>
                    <div className="text-blue-400">docker tag myapp:latest ghcr.io/myusername/myapp:latest</div>
                    <div className="text-blue-400">docker push ghcr.io/myusername/myapp:latest</div>
                  </div>
                  <div className="bg-purple-50 border border-purple-200 rounded-lg p-3 text-xs text-center">
                    <span className="text-purple-700 font-medium">GitHub Actions의 GITHUB_TOKEN으로 별도 PAT 없이 push 가능</span>
                  </div>
                </div>
              )}

              {/* 클라우드 레지스트리 */}
              {data.phase === "cloud" && (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <RegistryCard name="AWS ECR" address="<계정>.dkr.ecr.<리전>.amazonaws.com"
                    icon="☁️" isActive={true}
                    features={["IAM 기반 인증", "12시간 토큰 유효", "ECS/EKS 연동", "리포지토리별 권한 분리"]} />
                  <RegistryCard name="GCP Artifact Registry" address="<리전>-docker.pkg.dev"
                    icon="🌐" isActive={true}
                    features={["Google Cloud 네이티브", "GKE 연동", "멀티 형식 지원", "VPC Service Controls"]} />
                </div>
              )}

              {/* 보안 */}
              {data.phase === "security" && (
                <div className="space-y-4">
                  {[
                    { icon: "🔑", title: "액세스 토큰 사용", desc: "비밀번호 대신 권한 범위를 지정한 토큰을 사용한다", status: "필수" },
                    { icon: "📂", title: "config.json 보호", desc: "~/.docker/config.json은 base64(암호화 아님). CI에서는 파일 저장 금지", status: "주의" },
                    { icon: "🔄", title: "이미지 미러링", desc: "Docker Hub rate limit(6시간 200회) 방지. 자주 쓰는 이미지를 내부 레지스트리에 복제", status: "권장" },
                    { icon: "🔒", title: "credential helper", desc: "OS 키체인(Mac Keychain, Windows Credential)에 안전하게 저장", status: "권장" },
                  ].map((item, i) => (
                    <div key={i} className="flex items-center gap-3 p-3 rounded-lg border border-emerald-200 bg-emerald-50 anim-slide" style={{animationDelay: `${i * 0.1}s`}}>
                      <div className="text-2xl">{item.icon}</div>
                      <div className="flex-1">
                        <div className="font-bold text-emerald-800 text-sm">{item.title}</div>
                        <div className="text-xs text-emerald-600">{item.desc}</div>
                      </div>
                      <div className={`text-xs px-2 py-1 rounded-full font-medium ${
                        item.status === "필수" ? "bg-red-100 text-red-700" : "bg-blue-100 text-blue-700"
                      }`}>{item.status}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
