<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — VM vs 컨테이너</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
    Chapter I-1-2 — VM vs 컨테이너 비교
    3단계: 하이퍼바이저 계층 → 컨테이너 계층 → 비교 요약
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · 가상머신(VM) 구조",
        desc: "하이퍼바이저가 하드웨어 위에서 Guest OS를 통째로 가상화한다. 각 VM은 독립 OS를 포함하므로 무겁다.",
        phase: "vm",
      },
      {
        title: "STEP 2 · 컨테이너 구조",
        desc: "컨테이너는 호스트 OS 커널을 공유하고, 앱 실행에 필요한 파일만 격리한다. OS를 포함하지 않으므로 가볍다.",
        phase: "container",
      },
      {
        title: "STEP 3 · 비교 요약",
        desc: "VM은 완전 격리가 강점, 컨테이너는 속도·경량이 강점이다. 실무에서는 목적에 따라 선택한다.",
        phase: "compare",
      },
    ];

    const LayerBox = ({ label, color, children, animate }) => (
      <div className={`rounded-lg border-2 p-3 text-center text-sm font-bold transition-all duration-500 ${animate ? 'opacity-100 scale-100' : 'opacity-30 scale-95'} ${color}`}>
        {label}
        {children && <div className="mt-2 space-y-2">{children}</div>}
      </div>
    );

    const AppBox = ({ name, animate }) => (
      <div className={`bg-blue-100 border border-blue-300 rounded px-2 py-1 text-xs font-medium text-blue-800 transition-all duration-300 ${animate ? 'opacity-100' : 'opacity-30'}`}>
        {name}
      </div>
    );

    const StatCard = ({ label, vm, container, highlight }) => (
      <div className={`bg-white rounded-lg border p-4 text-center transition-all duration-500 ${highlight ? 'border-blue-400 shadow-md scale-105' : 'border-slate-200'}`}>
        <div className="text-xs text-slate-500 mb-1">{label}</div>
        <div className="flex justify-center gap-4">
          <div>
            <div className="text-xs text-red-500 mb-0.5">VM</div>
            <div className="text-lg font-bold text-red-700">{vm}</div>
          </div>
          <div className="border-l border-slate-200"></div>
          <div>
            <div className="text-xs text-green-500 mb-0.5">컨테이너</div>
            <div className="text-lg font-bold text-green-700">{container}</div>
          </div>
        </div>
      </div>
    );

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const step = STEPS[currentStep];
      const isEnd = currentStep === STEPS.length - 1;

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep(prev => prev + 1);
        else setIsPlaying(false);
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => { if (currentStep > 0) { setCurrentStep(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStep(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) playRef.current = setInterval(() => handleNextRef.current(), 3000);
        else clearInterval(playRef.current);
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      const vmActive = step.phase === 'vm' || step.phase === 'compare';
      const containerActive = step.phase === 'container' || step.phase === 'compare';

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">

            {/* 헤더 */}
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-2xl font-bold text-slate-800">VM vs 컨테이너 — 무거운 짐차 vs 가벼운 택배 상자</h1>
              </div>
              <p className="text-slate-600">
                <b>가상머신(VM)</b>은 OS 전체를 가상화하고, <b>컨테이너</b>는 커널을 공유하며 앱만 격리한다. 3단계로 차이를 시각적으로 비교합니다.
              </p>
            </header>

            {/* 현재 단계 설명 */}
            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800">
              <h3 className="text-xs font-bold text-blue-200 mb-1 uppercase tracking-wider">{step.title}</h3>
              <p className="text-base font-medium leading-relaxed">{step.desc}</p>
            </div>

            {/* 좌우 비교 레이아웃 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">

              {/* VM 구조 */}
              <div className={`bg-white p-6 rounded-xl shadow-sm border transition-all duration-500 ${vmActive ? 'border-red-300 ring-2 ring-red-100' : 'border-slate-200 opacity-60'}`}>
                <h3 className="text-center font-bold text-red-700 mb-4 text-lg">가상머신 (VM)</h3>
                <div className="space-y-3">
                  <div className="flex gap-2 justify-center">
                    <AppBox name="App A" animate={vmActive} />
                    <AppBox name="App B" animate={vmActive} />
                    <AppBox name="App C" animate={vmActive} />
                  </div>
                  <div className="flex gap-2">
                    <LayerBox label="Guest OS (Ubuntu)" color="border-red-400 bg-red-50 text-red-700" animate={vmActive} />
                    <LayerBox label="Guest OS (CentOS)" color="border-red-400 bg-red-50 text-red-700" animate={vmActive} />
                    <LayerBox label="Guest OS (Debian)" color="border-red-400 bg-red-50 text-red-700" animate={vmActive} />
                  </div>
                  <LayerBox label="Hypervisor (VMware / Hyper-V)" color="border-orange-400 bg-orange-50 text-orange-700" animate={vmActive} />
                  <LayerBox label="Host OS / Hardware" color="border-slate-400 bg-slate-100 text-slate-700" animate={vmActive} />
                </div>
                <div className="mt-3 text-center text-xs text-red-500 font-medium">
                  각 VM이 OS 전체를 포함 → 무겁다
                </div>
              </div>

              {/* 컨테이너 구조 */}
              <div className={`bg-white p-6 rounded-xl shadow-sm border transition-all duration-500 ${containerActive ? 'border-green-300 ring-2 ring-green-100' : 'border-slate-200 opacity-60'}`}>
                <h3 className="text-center font-bold text-green-700 mb-4 text-lg">컨테이너 (Docker)</h3>
                <div className="space-y-3">
                  <div className="flex gap-2 justify-center">
                    <AppBox name="App A" animate={containerActive} />
                    <AppBox name="App B" animate={containerActive} />
                    <AppBox name="App C" animate={containerActive} />
                  </div>
                  <div className="flex gap-2">
                    <LayerBox label="Bins/Libs" color="border-green-400 bg-green-50 text-green-700" animate={containerActive} />
                    <LayerBox label="Bins/Libs" color="border-green-400 bg-green-50 text-green-700" animate={containerActive} />
                    <LayerBox label="Bins/Libs" color="border-green-400 bg-green-50 text-green-700" animate={containerActive} />
                  </div>
                  <LayerBox label="Docker Engine (containerd)" color="border-emerald-400 bg-emerald-50 text-emerald-700" animate={containerActive} />
                  <LayerBox label="Host OS (커널 공유)" color="border-slate-400 bg-slate-100 text-slate-700" animate={containerActive} />
                </div>
                <div className="mt-3 text-center text-xs text-green-500 font-medium">
                  OS 없이 앱 + 라이브러리만 → 가볍다
                </div>
              </div>

            </div>

            {/* 비교 카드 (STEP 3에서 활성화) */}
            {step.phase === 'compare' && (
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 animate-[fadeIn_0.5s_ease-in]">
                <StatCard label="시작 시간" vm="1~3분" container="1~3초" highlight={true} />
                <StatCard label="메모리" vm="512MB~2GB" container="30~100MB" highlight={true} />
                <StatCard label="이미지 크기" vm="수 GB" container="수십~수백 MB" highlight={true} />
                <StatCard label="밀도 (서버당)" vm="~10개" container="수백 개" highlight={true} />
              </div>
            )}

            {/* 컨트롤 바 */}
            <div className="flex items-center justify-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <button onClick={togglePlay} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-medium transition-colors">
                {isPlaying ? '⏸ 일시정지' : isEnd ? '↻ 다시 시작' : '▶ 자동 실행'}
              </button>
              <button onClick={handlePrev} disabled={currentStep === 0} className="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 disabled:opacity-30 transition-colors">
                ← 이전
              </button>
              <button onClick={() => { handleNext(); setIsPlaying(false); }} disabled={isEnd} className="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 disabled:opacity-30 transition-colors">
                다음 →
              </button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStep + 1} / {STEPS.length}
              </div>
            </div>

            {/* 렌즈 박스 */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div className="bg-green-50 border border-green-200 rounded-xl p-5">
                <div className="flex items-center gap-2 mb-3">
                  <span className="bg-green-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">입문</span>
                  <span className="text-green-700 font-bold text-sm">★☆☆</span>
                </div>
                <h4 className="font-bold text-green-800 mb-2 text-sm">이사 비유</h4>
                <ul className="text-sm text-green-900 space-y-2">
                  <li><b>VM:</b> 이사할 때 <b>집 전체</b>(벽·지붕·바닥)를 통째로 옮기는 것. 무겁고 느리지만 완벽하게 분리된다.</li>
                  <li><b>컨테이너:</b> <b>캐리어 하나</b>에 필요한 짐만 넣어서 옮기는 것. 가볍고 빠르다. 건물(커널)은 공유한다.</li>
                  <li><b>핵심:</b> 컨테이너가 가벼운 이유는 OS를 포함하지 않기 때문이다.</li>
                </ul>
              </div>
              <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-5">
                <div className="flex items-center gap-2 mb-3">
                  <span className="bg-yellow-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">주니어</span>
                  <span className="text-yellow-700 font-bold text-sm">★★☆</span>
                </div>
                <h4 className="font-bold text-yellow-800 mb-2 text-sm">직접 비교해보기</h4>
                <ul className="text-sm text-yellow-900 space-y-2">
                  <li><b>시간 비교:</b> VirtualBox에서 Ubuntu VM을 시작하면 1~3분. <code className="bg-yellow-100 px-1 rounded text-xs">docker run -it ubuntu bash</code>는 1~3초.</li>
                  <li><b>메모리:</b> VM은 최소 512MB. 같은 Ubuntu 컨테이너는 30~50MB.</li>
                  <li><b>확인:</b> <code className="bg-yellow-100 px-1 rounded text-xs">docker stats</code>로 실시간 메모리를 확인할 수 있다.</li>
                </ul>
              </div>
              <div className="bg-purple-50 border border-purple-200 rounded-xl p-5">
                <div className="flex items-center gap-2 mb-3">
                  <span className="bg-purple-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">실무자</span>
                  <span className="text-purple-700 font-bold text-sm">★★★</span>
                </div>
                <h4 className="font-bold text-purple-800 mb-2 text-sm">격리 수준과 보안</h4>
                <ul className="text-sm text-purple-900 space-y-2">
                  <li><b>VM 우위:</b> 커널 분리로 컨테이너 탈출(container escape) 위험이 없다. 멀티테넌트 환경에서 유리.</li>
                  <li><b>컨테이너 보완:</b> gVisor, Kata Containers로 격리 수준을 높일 수 있다.</li>
                  <li><b>실무 선택:</b> 빠른 배포 + 밀도 → 컨테이너. 규정상 강한 격리 → VM.</li>
                </ul>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
