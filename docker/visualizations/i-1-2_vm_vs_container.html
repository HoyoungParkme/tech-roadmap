          <div className="flex-1 h-3 bg-slate-100 rounded-full overflow-hidden border border-slate-200">
            <div
              className={`h-full ${color} transition-all duration-700 ease-out`}
              style={{ width: `${pct}%` }}
            />
          </div>
          <span className="text-[10px] font-mono text-slate-700 w-16 text-right">{display}</span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 아키텍처 다이어그램 (베어메탈 / VM / Container 한 카드)
    // ─────────────────────────────────────────────────────
    function ArchDiagram({ archKey, isActive, usage }) {
      const style = ARCH_STYLE[archKey];
      const baseClass = isActive
        ? `border-2 ${style.active} ring-2 ring-sky-100 shadow`
        : 'border border-slate-200 bg-slate-50/40 opacity-60';

      const renderLayers = () => {
        if (archKey === 'bare') {
          return (
            <>
              <div className="rounded bg-blue-100 border border-blue-300 text-[10px] font-bold py-1 text-blue-800">App nginx</div>
              <div className="rounded bg-slate-200 border border-slate-300 text-[10px] font-bold py-1 text-slate-700">OS (Ubuntu)</div>
              <div className="rounded bg-slate-300 border border-slate-400 text-[10px] font-bold py-1 text-slate-800">Hardware</div>
            </>
          );
        }
        if (archKey === 'vm') {
          return (
            <>
              <div className="grid grid-cols-3 gap-1">
                {['App A', 'App B', 'App C'].map((n) => (
                  <div key={n} className="rounded bg-blue-100 border border-blue-300 text-[9px] font-bold py-1 text-blue-800">{n}</div>
                ))}
              </div>
              <div className="grid grid-cols-3 gap-1">
                {['Ubuntu', 'CentOS', 'Debian'].map((n) => (
                  <div key={n} className="rounded bg-sky-100 border border-sky-300 text-[9px] font-bold py-1 text-sky-800">Guest OS · {n}</div>
                ))}
              </div>
              <div className="rounded bg-sky-200 border border-sky-400 text-[10px] font-bold py-1 text-sky-900">Hypervisor (KVM / ESXi)</div>
              <div className="rounded bg-slate-300 border border-slate-400 text-[10px] font-bold py-1 text-slate-800">Host OS / Hardware</div>
            </>
          );
        }
        // container
        return (
          <>
            <div className="grid grid-cols-3 gap-1">
              {['App A', 'App B', 'App C'].map((n) => (
                <div key={n} className="rounded bg-blue-100 border border-blue-300 text-[9px] font-bold py-1 text-blue-800">{n}</div>
              ))}
            </div>
            <div className="grid grid-cols-3 gap-1">
              {['bin/lib', 'bin/lib', 'bin/lib'].map((n, i) => (
                <div key={i} className="rounded bg-cyan-100 border border-cyan-300 text-[9px] font-bold py-1 text-cyan-800">{n}</div>
              ))}
            </div>
            <div className="rounded bg-cyan-200 border border-cyan-400 text-[10px] font-bold py-1 text-cyan-900">Container Runtime (containerd)</div>
            <div className="rounded bg-slate-300 border border-slate-400 text-[10px] font-bold py-1 text-slate-800">Host OS (커널 공유) / Hardware</div>
          </>
        );
      };

      return (
        <div className={`rounded-lg p-3 transition-all duration-500 ${baseClass}`}>
          <div className="flex items-center justify-between mb-2">
            <div className={`text-xs font-bold ${style.text}`}>
              {ARCHS.find((a) => a.key === archKey).emoji} {ARCHS.find((a) => a.key === archKey).name}
            </div>
            <div className="text-[9px] text-slate-500">{ARCHS.find((a) => a.key === archKey).note}</div>
          </div>

          <div className="space-y-1">{renderLayers()}</div>

          {/* 자원 막대 — usage 있을 때만 */}
          {usage && (
            <div className="mt-3 pt-2 border-t border-slate-200 space-y-1">
              {METRICS.map((m) => (
                <ResourceBar
                  key={m.key}
                  label={m.label}
                  unit={m.unit}
                  value={usage[m.key]}
                  maxVal={m.max}
                  color={archKey === 'container' ? 'bg-cyan-500' : archKey === 'vm' ? 'bg-sky-500' : 'bg-slate-500'}
                />
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 (3 아키텍처 다이어그램 + 활성 표시)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ active, usage }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          {/* 헤더 */}
          <div className="flex items-center justify-between mb-3">
            <div className="text-xs font-bold text-slate-700">🐳 3 아키텍처 비교</div>
            <div className="flex gap-1.5 text-[10px] font-mono">
              <span className="px-1.5 py-0.5 rounded bg-slate-100 text-slate-700 font-bold">Bare</span>
              <span className="px-1.5 py-0.5 rounded bg-sky-100 text-sky-700 font-bold">VM</span>
              <span className="px-1.5 py-0.5 rounded bg-cyan-100 text-cyan-700 font-bold">Container</span>
            </div>
          </div>

          <div className="space-y-3">
            <ArchDiagram archKey="bare"      isActive={active.bare}      usage={usage.bare} />
            <ArchDiagram archKey="vm"        isActive={active.vm}        usage={usage.vm} />
            <ArchDiagram archKey="container" isActive={active.container} usage={usage.container} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-sky-500"></span>VM (무거움)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-cyan-500"></span>Container (가벼움)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-slate-500"></span>Bare Metal (단일)
            </span>
          </div>

          {/* 핵심 메커니즘 요약 */}
          <div className="mt-3 pt-3 border-t border-slate-100">
            <div className="text-[10px] font-bold text-slate-700 mb-1.5">⚙️ 격리 메커니즘</div>
            <div className="grid grid-cols-2 gap-2 text-[10px]">
              <div className="rounded bg-sky-50 border border-sky-200 p-2">
                <div className="font-bold text-sky-800">VM</div>
                <div className="text-sky-700 leading-tight mt-0.5">
                  Hypervisor가 가상 CPU/RAM/Disk/NIC를 만들어 Guest OS에 통째로 제공.
                  커널이 분리됨 → escape 위험 없음.
                </div>
              </div>
              <div className="rounded bg-cyan-50 border border-cyan-200 p-2">
                <div className="font-bold text-cyan-800">Container</div>
                <div className="text-cyan-700 leading-tight mt-0.5">
                  Linux namespace(pid/net/mnt/...) + cgroup으로 프로세스를 격리.
                  커널은 호스트 공유 → 가볍지만 약한 격리.
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; Docker 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">D</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. Docker 기초 &gt; Chapter 1. 컨테이너 개념</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VM vs Container</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Hypervisor vs Container Runtime — 무거운 짐차 vs 가벼운 택배 상자</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane active={step.active} usage={step.usage} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 다음(I-1-3)에서는 <strong>Docker 아키텍처</strong> — Client / Daemon / Registry 구조
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; Docker 허브</a>
              <a href="./i-1-3_docker_architecture.html" className="text-sky-700 hover:text-sky-900 font-medium">I-1-3 Docker 아키텍처 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
