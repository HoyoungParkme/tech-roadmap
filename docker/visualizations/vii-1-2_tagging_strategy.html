<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — 이미지 태깅 전략</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · latest 태그의 함정",
        desc: "latest는 '가장 최신'이 아니라 '태그를 안 붙이면 자동으로 붙는 이름'이다. 시간이 지나면 내용이 바뀌어 어떤 버전인지 추적할 수 없다.",
        phase: "latest",
        tags: [
          { name: "myapp:latest", version: "v1.0?", color: "bg-red-100 border-red-300 text-red-700", warning: true },
          { name: "myapp:latest", version: "v2.0?", color: "bg-red-100 border-red-300 text-red-700", warning: true },
        ]
      },
      {
        title: "STEP 2 · semver 태그로 버전 명시",
        desc: "semver(1.2.3)로 태그를 붙이면 어떤 버전인지 명확하다. 메이저.마이너.패치로 변경 범위를 표현한다.",
        phase: "semver",
        tags: [
          { name: "myapp:1.0.0", version: "첫 릴리스", color: "bg-blue-100 border-blue-300 text-blue-700" },
          { name: "myapp:1.1.0", version: "기능 추가", color: "bg-blue-100 border-blue-300 text-blue-700" },
          { name: "myapp:2.0.0", version: "대규모 변경", color: "bg-indigo-100 border-indigo-300 text-indigo-700" },
        ]
      },
      {
        title: "STEP 3 · SHA 태그로 정확한 빌드 추적",
        desc: "Git 커밋 해시(SHA)를 태그로 붙이면 정확히 어느 코드 시점의 빌드인지 추적할 수 있다. CI/CD에서 자동으로 붙인다.",
        phase: "sha",
        tags: [
          { name: "myapp:a1b2c3d", version: "커밋 a1b2c3d", color: "bg-amber-100 border-amber-300 text-amber-700" },
          { name: "myapp:1.1.0", version: "= a1b2c3d", color: "bg-blue-100 border-blue-300 text-blue-700" },
          { name: "myapp:main", version: "브랜치 태그", color: "bg-teal-100 border-teal-300 text-teal-700" },
        ]
      },
      {
        title: "STEP 4 · 롤백 시나리오",
        desc: "v2.0.0에서 장애 발생! semver 태그 덕분에 docker pull myapp:1.1.0으로 즉시 이전 버전으로 롤백할 수 있다.",
        phase: "rollback",
        tags: [
          { name: "myapp:2.0.0", version: "장애 발생!", color: "bg-red-200 border-red-400 text-red-800", warning: true },
          { name: "myapp:1.1.0", version: "← 롤백 대상", color: "bg-green-200 border-green-400 text-green-800", highlight: true },
        ]
      },
    ];

    const TagCard = ({ tag }) => (
      <div className={`rounded-xl border-2 p-4 transition-all duration-500 ${tag.color} ${tag.highlight ? 'ring-4 ring-green-300 scale-105' : ''} ${tag.warning ? 'animate-pulse' : ''}`}>
        <div className="font-mono font-bold text-sm mb-1">{tag.name}</div>
        <div className="text-xs opacity-80">{tag.version}</div>
        {tag.warning && <div className="mt-2 text-xs font-bold">⚠ 위험</div>}
        {tag.highlight && <div className="mt-2 text-xs font-bold">✓ 안전</div>}
      </div>
    );

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const step = STEPS[currentStep];
      const isEnd = currentStep === STEPS.length - 1;

      const handleNext = () => { if (currentStep < STEPS.length - 1) setCurrentStep(p => p + 1); else setIsPlaying(false); };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStep > 0) { setCurrentStep(p => p - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) playRef.current = setInterval(() => handleNextRef.current(), 3500);
        else clearInterval(playRef.current);
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-2xl font-bold">이미지 태깅 전략</h1>
              </div>
              <p className="text-slate-600">
                <b>latest의 함정</b>을 이해하고, <b>semver</b>와 <b>SHA 태그</b>로 안전한 배포와 롤백을 구현하는 과정을 시뮬레이션합니다.
              </p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800">
              <h3 className="text-xs font-bold text-blue-200 mb-1 uppercase tracking-wider">{step.title}</h3>
              <p className="text-base font-medium leading-relaxed">{step.desc}</p>
            </div>

            {/* 레지스트리 시각화 */}
            <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-2 mb-6">
                <div className="w-6 h-6 bg-slate-700 rounded text-white text-xs flex items-center justify-center font-bold">R</div>
                <span className="font-bold text-slate-700">Registry: ghcr.io/myorg/myapp</span>
              </div>

              <div className="flex gap-4 flex-wrap justify-center">
                {step.tags.map((tag, i) => <TagCard key={`${currentStep}-${i}`} tag={tag} />)}
              </div>

              {/* 롤백 흐름 */}
              {step.phase === 'rollback' && (
                <div className="mt-6 bg-green-50 border border-green-200 rounded-lg p-4 max-w-lg mx-auto">
                  <div className="font-bold text-green-800 mb-2 text-sm">롤백 명령</div>
                  <code className="text-xs bg-green-100 px-2 py-1 rounded block font-mono">
                    docker pull myapp:1.1.0 && docker compose up -d
                  </code>
                  <div className="text-xs text-green-700 mt-2">semver 태그가 있으면 이전 안정 버전을 정확히 지정할 수 있다.</div>
                </div>
              )}

              {/* latest 경고 */}
              {step.phase === 'latest' && (
                <div className="mt-6 bg-red-50 border border-red-200 rounded-lg p-4 max-w-lg mx-auto">
                  <div className="font-bold text-red-800 mb-2 text-sm">latest의 문제</div>
                  <div className="text-xs text-red-700">
                    같은 <code className="bg-red-100 px-1 rounded">myapp:latest</code>를 1주 전과 오늘 pull하면 <b>내용이 다를 수 있다</b>. 어떤 버전이 배포됐는지 추적 불가.
                  </div>
                </div>
              )}

              {/* SHA 설명 */}
              {step.phase === 'sha' && (
                <div className="mt-6 bg-amber-50 border border-amber-200 rounded-lg p-4 max-w-lg mx-auto">
                  <div className="font-bold text-amber-800 mb-2 text-sm">CI/CD 자동 태깅</div>
                  <code className="text-xs bg-amber-100 px-2 py-1 rounded block font-mono">
                    docker tag myapp:latest myapp:$(git rev-parse --short HEAD)
                  </code>
                  <div className="text-xs text-amber-700 mt-2">하나의 이미지에 여러 태그를 동시에 붙일 수 있다. semver + SHA + 브랜치명 조합이 표준.</div>
                </div>
              )}
            </div>

            {/* 컨트롤 */}
            <div className="flex items-center justify-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <button onClick={togglePlay} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-medium transition-colors">
                {isPlaying ? '⏸ 일시정지' : isEnd ? '↻ 다시 시작' : '▶ 자동 실행'}
              </button>
              <button onClick={handlePrev} disabled={currentStep === 0} className="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 disabled:opacity-30">← 이전</button>
              <button onClick={() => { handleNext(); setIsPlaying(false); }} disabled={isEnd} className="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 disabled:opacity-30">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStep + 1} / {STEPS.length}</div>
            </div>

            {/* 렌즈 */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div className="bg-green-50 border border-green-200 rounded-xl p-5">
                <div className="flex items-center gap-2 mb-3">
                  <span className="bg-green-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">입문</span>
                  <span className="text-green-700 font-bold text-sm">★☆☆</span>
                </div>
                <h4 className="font-bold text-green-800 mb-2 text-sm">파일명에 날짜 붙이기</h4>
                <ul className="text-sm text-green-900 space-y-2">
                  <li><b>비유:</b> report_최종.docx, report_진짜최종.docx — 나중에 어느 게 진짜인지 모른다. 태그도 마찬가지. <code className="bg-green-100 px-1 rounded text-xs">latest</code>는 "최종"과 같다.</li>
                  <li><b>해결:</b> report_v1.0.docx, report_v1.1.docx처럼 버전을 붙이면 혼동이 없다.</li>
                </ul>
              </div>
              <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-5">
                <div className="flex items-center gap-2 mb-3">
                  <span className="bg-yellow-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">주니어</span>
                  <span className="text-yellow-700 font-bold text-sm">★★☆</span>
                </div>
                <h4 className="font-bold text-yellow-800 mb-2 text-sm">태깅 실습</h4>
                <ul className="text-sm text-yellow-900 space-y-2">
                  <li><code className="bg-yellow-100 px-1 rounded text-xs">docker tag myapp:latest myapp:1.0.0</code> — 기존 이미지에 새 태그 추가</li>
                  <li><b>규칙:</b> 메이저(호환 깨짐).마이너(기능 추가).패치(버그 수정)</li>
                  <li><b>주의:</b> production에서 <code className="bg-yellow-100 px-1 rounded text-xs">:latest</code>는 절대 사용 금지</li>
                </ul>
              </div>
              <div className="bg-purple-50 border border-purple-200 rounded-xl p-5">
                <div className="flex items-center gap-2 mb-3">
                  <span className="bg-purple-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">실무자</span>
                  <span className="text-purple-700 font-bold text-sm">★★★</span>
                </div>
                <h4 className="font-bold text-purple-800 mb-2 text-sm">이미지 불변성과 승격</h4>
                <ul className="text-sm text-purple-900 space-y-2">
                  <li><b>불변성:</b> 한번 push한 태그의 내용을 절대 덮어쓰지 않는 정책. Registry에서 immutable tag를 강제할 수 있다.</li>
                  <li><b>승격 패턴:</b> staging에서 검증된 이미지를 production 레지스트리로 "승격(promote)" — 재빌드 없이 태그만 변경.</li>
                </ul>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
