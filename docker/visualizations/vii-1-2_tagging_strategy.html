            '| 추적성    | ✗        | △        | ✓                       |',
            '| 롤백      | ✗        | △        | ✓                       |',
            '| 재현성    | ✗        | △        | ✓                       |',
            '| 사람 가독 | △        | ✓        | ✓                       |',
            '| 운영 비용 | 낮음     | 낮음     | 낮음 (CI 자동)          |',
            '',
            '## 다음',
            '',
            '- VII-1-3 multi-stage build / VII-1-4 image scanning',
          ],
          highlight: [3, 4, 5, 6, 7, 11, 12, 13, 14, 15, 17, 18, 19, 20, 21, 22, 24, 25, 26, 30, 31, 32, 33, 34, 35, 39, 40, 41, 42, 43, 47, 48, 49, 50, 51, 52],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측: registry 안 image 목록 — tag rows
    //   anti-pattern (latest 중복) → 빨강 강조
    //   semver / sha / combined → sky 계열
    //   immutable → lock 아이콘 + 짙은 sky
    // ─────────────────────────────────────────────────────
    function ImageRow({ image, isAntipattern }) {
      const kindStyle = (() => {
        if (image.bad || isAntipattern) {
          return 'bg-rose-50 border-rose-300';
        }
        switch (image.kind) {
          case 'semver':    return 'bg-sky-50 border-sky-300';
          case 'sha':       return 'bg-amber-50 border-amber-300';
          case 'combined':  return 'bg-sky-50 border-sky-400 ring-1 ring-sky-200';
          case 'immutable': return 'bg-sky-100 border-sky-500';
          case 'mutable':   return 'bg-slate-50 border-slate-300';
          default:          return 'bg-slate-50 border-slate-200';
        }
      })();

      const kindLabel = (() => {
        if (image.bad) return { text: 'anti', cls: 'bg-rose-600 text-white' };
        switch (image.kind) {
          case 'semver':    return { text: 'semver',    cls: 'bg-sky-600 text-white' };
          case 'sha':       return { text: 'git-sha',   cls: 'bg-amber-600 text-white' };
          case 'combined':  return { text: 'combined',  cls: 'bg-sky-700 text-white' };
          case 'immutable': return { text: '🔒 immut.', cls: 'bg-sky-800 text-white' };
          case 'mutable':   return { text: 'mutable',   cls: 'bg-slate-500 text-white' };
          default:          return { text: 'tag',       cls: 'bg-slate-500 text-white' };
        }
      })();

      return (
        <div className={`rounded-lg border-2 px-2.5 py-1.5 transition-all duration-500 ${kindStyle}`}>
          <div className="flex items-center gap-2">
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${kindLabel.cls}`}>
              {kindLabel.text}
            </span>
            <span className={`font-mono text-[11px] font-bold ${image.bad ? 'text-rose-800' : 'text-slate-800'}`}>
              {image.tag}
            </span>
            {image.bad && (
              <span className="text-[9px] text-rose-700 font-bold ml-auto">⚠ 추적 불가</span>
            )}
          </div>
          <div className="flex items-center gap-2 mt-0.5 pl-1">
            <span className="text-[9px] font-mono text-slate-500">{image.digest}</span>
            <span className="text-[9px] text-slate-400">·</span>
            <span className="text-[9px] text-slate-500">{image.pushedAt}</span>
          </div>
          {image.note && (
            <div className={`text-[9px] mt-0.5 pl-1 italic ${image.bad ? 'text-rose-600' : 'text-slate-500'}`}>
              {image.note}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 상단: registry 헤더 + image rows
    //   phase 별로 어떤 종류가 더해졌는지 chip 으로 안내
    // ─────────────────────────────────────────────────────
    function RegistryBox({ step }) {
      const phaseChips = (() => {
        switch (step.phase) {
          case 'latest':    return [{ t: 'latest', cls: 'bg-rose-100 text-rose-700 border-rose-300' }];
          case 'semver':    return [
            { t: 'latest', cls: 'bg-rose-100 text-rose-700 border-rose-300' },
            { t: '+ semver', cls: 'bg-sky-100 text-sky-700 border-sky-300' },
          ];
          case 'sha':       return [
            { t: 'latest', cls: 'bg-rose-100 text-rose-700 border-rose-300' },
            { t: 'semver', cls: 'bg-sky-100 text-sky-700 border-sky-300' },
            { t: '+ git-sha', cls: 'bg-amber-100 text-amber-700 border-amber-300' },
          ];
          case 'combined':  return [
            { t: 'semver', cls: 'bg-sky-100 text-sky-700 border-sky-300' },
            { t: 'git-sha', cls: 'bg-amber-100 text-amber-700 border-amber-300' },
            { t: '+ combined', cls: 'bg-sky-200 text-sky-800 border-sky-400' },
          ];
          case 'immutable': return [
            { t: 'combined', cls: 'bg-sky-100 text-sky-700 border-sky-300' },
            { t: '+ 🔒 immutable lock', cls: 'bg-sky-200 text-sky-900 border-sky-500' },
          ];
          default: return [];
        }
      })();

      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📦</span>
              <span className="text-[11px] font-bold text-slate-700">Registry: ghcr.io/myorg/myapp</span>
            </div>
            <span className="text-[9px] bg-slate-700 text-white px-1.5 py-0.5 rounded font-mono font-bold">
              {step.images.length} tags
            </span>
          </div>

          {/* phase chips */}
          <div className="flex flex-wrap gap-1 mb-2">
            {phaseChips.map((c, i) => (
              <span key={i} className={`text-[9px] font-bold px-1.5 py-0.5 rounded border ${c.cls}`}>
                {c.t}
              </span>
            ))}
          </div>

          {/* image list */}
          <div className="space-y-1.5">
            {step.images.map((img, i) => (
              <ImageRow key={`${step.phase}-${i}`} image={img} />
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: 정책 / 차단 박스 (Step 5 전용)
    // ─────────────────────────────────────────────────────
    function ImmutableRuleBox({ step }) {
      if (!step.ruleOn) return null;
      return (
        <div className="rounded-lg border-2 border-sky-400 bg-sky-50 p-3">
          <div className="flex items-center gap-1.5 mb-1.5">
            <span className="text-base">🔒</span>
            <span className="text-[11px] font-bold text-sky-900">
              Tag Immutability Rule: ON
            </span>
            <span className="ml-auto text-[9px] bg-sky-700 text-white px-1.5 py-0.5 rounded font-mono font-bold">
              v* lock
            </span>
          </div>
          <div className="bg-white rounded border border-sky-200 p-1.5 font-mono text-[9px] leading-snug text-slate-700 space-y-0.5">
            <div><span className="text-sky-700 font-bold">policy:</span> tag matching <span className="text-amber-700">v*</span> cannot be overwritten</div>
            <div><span className="text-sky-700 font-bold">scope:</span> all releases (semver / combined)</div>
            <div><span className="text-sky-700 font-bold">exempt:</span> latest (개발 편의용 mutable)</div>
          </div>

          {step.blockTry && (
            <div className="mt-2 bg-rose-100 border border-rose-300 rounded p-1.5">
              <div className="flex items-center gap-1.5 mb-0.5">
                <span className="text-sm">🚫</span>
                <span className="text-[10px] font-bold text-rose-800">차단된 push 시도</span>
              </div>
              <div className="font-mono text-[9px] text-rose-700 leading-snug">
                <div>$ docker push myapp:v1.2.3</div>
                <div className="text-rose-900 font-bold">
                  ✗ ERROR: tag "v1.2.3" already exists and is immutable.
                </div>
                <div className="text-rose-600 italic">
                  → use a new patch version (e.g. v1.2.4)
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 registry 안 image 목록</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            <RegistryBox step={step} />
            <ImmutableRuleBox step={step} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>anti
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>semver
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>git-sha
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-700"></span>combined
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-900"></span>🔒 immutable
            </span>
            <span className="ml-auto font-mono">phase: {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, sky 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VII-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. Image / Registry &gt; Chapter 1. 태깅</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VII-1-2. 이미지 태깅 전략 — latest / semver / git-sha / immutable</h1>
                  <p className="text-sm text-slate-500 mt-0.5">latest 안티패턴 → semver → git-sha → 결합 tag → immutable 정책으로 신뢰할 수 있는 좌표 만들기</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>latest</strong>는 추적 불가, <strong>semver</strong>는 사람의 좌표, <strong>git-sha</strong>는 commit 의 좌표, <strong>combined</strong>는 둘 다, <strong>immutable</strong>은 그 좌표를 영원히 잠근다. 다음(VII-1-3)은 multi-stage build로 image 자체를 작고 안전하게 만든다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['image tag', 'latest', 'semver', 'git sha', 'combined', 'immutable', 'rollback', 'digest', 'registry'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./vii-1-1_dockerfile_basics.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; VII-1-1 Dockerfile 기본</a>
              <a href="./vii-1-3_multistage_build.html" className="text-sky-700 hover:text-sky-900 font-medium">VII-1-3 multi-stage build &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
