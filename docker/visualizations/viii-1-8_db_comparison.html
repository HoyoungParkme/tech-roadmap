<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — DB 3종 비교와 Compose 조합</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
    @keyframes glow { 0%,100%{box-shadow:0 0 5px rgba(16,185,129,0.3);} 50%{box-shadow:0 0 20px rgba(16,185,129,0.6);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-slide-up { animation: slideUp 0.4s ease-out forwards; }
    .anim-glow { animation: glow 2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const DBS = [
      { id: "mysql", icon: "🐬", name: "MySQL", color: "blue", port: "3306", image: "mysql:8.0", dataPath: "/var/lib/mysql", role: "정형 데이터, 트랜잭션" },
      { id: "redis", icon: "🔴", name: "Redis", color: "red", port: "6379", image: "redis:7-alpine", dataPath: "/data", role: "캐시, 세션, 속도 제한" },
      { id: "mongo", icon: "🍃", name: "MongoDB", color: "green", port: "27017", image: "mongo:7", dataPath: "/data/db", role: "비정형 데이터, 로그" },
    ];

    const STEPS = [
      {
        title: "STEP 1 · 왜 여러 DB를 함께 쓰는가?",
        desc: "하나의 DB로도 모든 데이터를 저장할 수 있지만, 각 DB는 잘하는 영역이 다르다. 사용자 정보는 MySQL에, 세션/캐시는 Redis에, 로그/비정형 데이터는 MongoDB에 저장하는 것이 대표적인 조합이다.",
        phase: "why",
        activeDBs: ["mysql", "redis", "mongo"],
      },
      {
        title: "STEP 2 · 하나의 Compose로 3개 DB 실행",
        desc: "docker-compose.yml 파일 하나에 MySQL, Redis, MongoDB를 모두 정의한다. docker compose up -d 한 줄이면 세 DB가 동시에 시작된다. 각 DB에 볼륨, 헬스체크, 재시작 정책을 설정한다.",
        phase: "compose",
        activeDBs: ["mysql", "redis", "mongo"],
      },
      {
        title: "STEP 3 · 헬스체크 비교",
        desc: "각 DB마다 헬스체크 명령이 다르다. MySQL은 mysqladmin ping, Redis는 redis-cli ping, MongoDB는 mongosh --eval 'db.adminCommand(ping)'. start_period는 MySQL과 MongoDB만 필요하다 (초기화 시간이 길어서).",
        phase: "healthcheck",
        activeDBs: ["mysql", "redis", "mongo"],
      },
      {
        title: "STEP 4 · 선택적 서비스 실행",
        desc: "docker compose up -d mysql redis처럼 서비스 이름을 지정하면 필요한 DB만 실행할 수 있다. 개발 중 필요한 DB만 선택적으로 켜고 끌 때 유용하다.",
        phase: "selective",
        activeDBs: ["mysql", "redis"],
      },
      {
        title: "STEP 5 · 접속 확인 시뮬레이션",
        desc: "세 DB 모두 docker exec로 CLI에 접속하여 동작을 확인한다. MySQL은 mysql 명령, Redis는 redis-cli, MongoDB는 mongosh를 사용한다. healthy 상태가 되면 접속 가능하다.",
        phase: "connect",
        activeDBs: ["mysql", "redis", "mongo"],
      },
      {
        title: "STEP 6 · 실무 데이터 분배 가이드",
        desc: "정형 데이터(사용자, 주문, 결제) → MySQL. 캐시·세션·실시간 데이터 → Redis. 로그·이벤트·비정형 데이터 → MongoDB. Compose로 로컬 환경을 프로덕션과 유사하게 구성할 수 있다.",
        phase: "guide",
        activeDBs: ["mysql", "redis", "mongo"],
      },
    ];

    const HEALTH_CHECKS = [
      { db: "MySQL", cmd: 'mysqladmin ping -h localhost -u root -p***', interval: "10s", startPeriod: "30s", icon: "🐬", color: "blue" },
      { db: "Redis", cmd: 'redis-cli -a *** ping', interval: "10s", startPeriod: "불필요", icon: "🔴", color: "red" },
      { db: "MongoDB", cmd: 'mongosh --eval "db.adminCommand(\'ping\')"', interval: "15s", startPeriod: "30s", icon: "🍃", color: "green" },
    ];

    const DATA_ROLES = [
      { data: "사용자 정보, 주문, 결제", db: "MySQL", icon: "🐬", reason: "관계형 모델, 트랜잭션, JOIN", color: "blue" },
      { data: "로그인 세션", db: "Redis", icon: "🔴", reason: "인메모리 고속, TTL 자동 만료", color: "red" },
      { data: "API 응답 캐시", db: "Redis", icon: "🔴", reason: "초고속 읽기, TTL 설정", color: "red" },
      { data: "API 이벤트 로그", db: "MongoDB", icon: "🍃", reason: "유연한 스키마, 대량 쓰기", color: "green" },
      { data: "사용자 프로필 (비정형)", db: "MongoDB", icon: "🍃", reason: "필드가 다양, 스키마 변경 잦음", color: "green" },
      { data: "속도 제한 카운터", db: "Redis", icon: "🔴", reason: "INCR + TTL 조합", color: "red" },
    ];

    function DBCard({ db, isActive, status }) {
      const colorMap = {
        blue: { bg: "bg-blue-50", border: "border-blue-400", text: "text-blue-800", light: "bg-blue-100" },
        red: { bg: "bg-red-50", border: "border-red-400", text: "text-red-800", light: "bg-red-100" },
        green: { bg: "bg-green-50", border: "border-green-400", text: "text-green-800", light: "bg-green-100" },
      };
      const c = colorMap[db.color];
      return (
        <div className={`rounded-xl border-2 p-4 transition-all duration-500 ${
          isActive ? `${c.border} ${c.bg} shadow-lg scale-[1.02]` : "border-slate-200 bg-slate-50 opacity-40 scale-95"
        }`}>
          <div className="text-center mb-3">
            <span className="text-3xl">{db.icon}</span>
            <div className={`font-bold text-sm mt-1 ${isActive ? c.text : "text-slate-400"}`}>{db.name}</div>
          </div>
          <div className="space-y-1.5 text-xs">
            <div className={`${c.light} rounded px-2 py-1`}>
              <span className="text-slate-500">이미지: </span>
              <span className="font-mono font-bold">{db.image}</span>
            </div>
            <div className={`${c.light} rounded px-2 py-1`}>
              <span className="text-slate-500">포트: </span>
              <span className="font-mono font-bold">{db.port}</span>
            </div>
            <div className={`${c.light} rounded px-2 py-1`}>
              <span className="text-slate-500">데이터: </span>
              <span className="font-mono font-bold">{db.dataPath}</span>
            </div>
            <div className={`${c.light} rounded px-2 py-1`}>
              <span className="text-slate-500">역할: </span>
              <span className="font-bold">{db.role}</span>
            </div>
          </div>
          {status && isActive && (
            <div className={`mt-2 text-center text-xs font-bold ${
              status === "healthy" ? "text-emerald-600" : status === "starting" ? "text-amber-600" : "text-slate-400"
            }`}>
              {status === "healthy" ? "✅ healthy" : status === "starting" ? "⏳ starting..." : "⏹ stopped"}
            </div>
          )}
        </div>
      );
    }

    function ComposeYAML() {
      return (
        <div className="bg-slate-900 rounded-xl p-4 font-mono text-xs overflow-x-auto anim-fade">
          <div className="flex items-center gap-2 mb-3">
            <div className="w-3 h-3 rounded-full bg-red-500"></div>
            <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div className="w-3 h-3 rounded-full bg-green-500"></div>
            <span className="text-slate-500 ml-2">docker-compose.yml</span>
          </div>
          <div className="text-slate-300">
            <div className="text-purple-400">services:</div>
            <div className="pl-2">
              <div className="text-blue-400">mysql:</div>
              <div className="pl-4 text-slate-400">image: <span className="text-green-400">mysql:8.0</span></div>
              <div className="pl-4 text-slate-400">ports: <span className="text-yellow-400">"3306:3306"</span></div>
              <div className="pl-4 text-slate-400">volumes: <span className="text-cyan-400">mysql_data:/var/lib/mysql</span></div>
            </div>
            <div className="pl-2 mt-1">
              <div className="text-red-400">redis:</div>
              <div className="pl-4 text-slate-400">image: <span className="text-green-400">redis:7-alpine</span></div>
              <div className="pl-4 text-slate-400">ports: <span className="text-yellow-400">"6379:6379"</span></div>
              <div className="pl-4 text-slate-400">command: <span className="text-cyan-400">redis-server --requirepass ... --appendonly yes</span></div>
            </div>
            <div className="pl-2 mt-1">
              <div className="text-green-400">mongo:</div>
              <div className="pl-4 text-slate-400">image: <span className="text-green-400">mongo:7</span></div>
              <div className="pl-4 text-slate-400">ports: <span className="text-yellow-400">"27017:27017"</span></div>
              <div className="pl-4 text-slate-400">volumes: <span className="text-cyan-400">mongo_data:/data/db</span></div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 5000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const getStatus = (dbId) => {
        if (!data.activeDBs.includes(dbId)) return "stopped";
        if (data.phase === "connect") return "healthy";
        if (data.phase === "healthcheck") return "starting";
        return null;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VIII-1-8: DB 3종 비교와 Compose 조합</h1>
              </div>
              <p className="text-slate-500 text-sm">MySQL, Redis, MongoDB를 하나의 Compose로 동시 실행하고 비교하는 과정을 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "guide" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "selective" ? "bg-amber-600 border-amber-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* DB 카드 그리드 */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              {DBS.map((db) => (
                <DBCard
                  key={`${db.id}-${step}`}
                  db={db}
                  isActive={data.activeDBs.includes(db.id)}
                  status={getStatus(db.id)}
                />
              ))}
            </div>

            {/* 페이즈별 추가 시각화 */}
            {data.phase === "why" && (
              <div className="bg-gradient-to-r from-blue-50 via-red-50 to-green-50 border border-slate-200 rounded-xl p-5 anim-fade">
                <h4 className="font-bold text-slate-700 mb-3 text-center">각 DB의 강점 영역</h4>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                  {[
                    { icon: "🐬", db: "MySQL", items: ["사용자 정보", "주문 이력", "결제 데이터"], color: "blue" },
                    { icon: "🔴", db: "Redis", items: ["로그인 세션", "API 캐시", "속도 제한"], color: "red" },
                    { icon: "🍃", db: "MongoDB", items: ["이벤트 로그", "비정형 프로필", "API 응답 저장"], color: "green" },
                  ].map((item, i) => (
                    <div key={i} className={`bg-white rounded-lg p-3 border border-${item.color}-200 anim-slide`} style={{animationDelay:`${i*0.15}s`}}>
                      <div className="text-center mb-2">
                        <span className="text-xl">{item.icon}</span>
                        <span className={`font-bold text-${item.color}-700 ml-1`}>{item.db}</span>
                      </div>
                      <div className="space-y-1">
                        {item.items.map((it, j) => (
                          <div key={j} className={`bg-${item.color}-50 rounded px-2 py-1 text-xs text-center text-${item.color}-700`}>{it}</div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {data.phase === "compose" && <ComposeYAML />}

            {data.phase === "healthcheck" && (
              <div className="bg-white rounded-xl border border-slate-200 p-4 anim-fade">
                <h4 className="font-bold text-slate-700 mb-3">헬스체크 설정 비교</h4>
                <div className="space-y-3">
                  {HEALTH_CHECKS.map((hc, i) => (
                    <div key={i} className={`bg-${hc.color}-50 border border-${hc.color}-200 rounded-lg p-3 anim-slide`} style={{animationDelay:`${i*0.15}s`}}>
                      <div className="flex items-center gap-2 mb-2">
                        <span className="text-xl">{hc.icon}</span>
                        <span className={`font-bold text-${hc.color}-800`}>{hc.db}</span>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-2 text-xs">
                        <div><span className="text-slate-500">명령: </span><code className={`text-${hc.color}-600`}>{hc.cmd}</code></div>
                        <div><span className="text-slate-500">interval: </span><span className="font-bold">{hc.interval}</span></div>
                        <div><span className="text-slate-500">start_period: </span><span className="font-bold">{hc.startPeriod}</span></div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {data.phase === "selective" && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-5 anim-fade">
                <h4 className="font-bold text-amber-800 mb-3">선택적 서비스 실행 명령</h4>
                <div className="space-y-2">
                  {[
                    { cmd: "docker compose up -d mysql redis", desc: "MySQL + Redis만 실행" },
                    { cmd: "docker compose up -d mongo", desc: "MongoDB만 추가 실행" },
                    { cmd: "docker compose stop redis", desc: "Redis만 중지 (나머지 유지)" },
                    { cmd: "docker compose restart mysql", desc: "MySQL만 재시작" },
                  ].map((item, i) => (
                    <div key={i} className="bg-white rounded-lg p-3 border border-amber-200 flex items-center gap-3 anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                      <code className="font-mono text-xs text-amber-700 flex-1">{item.cmd}</code>
                      <span className="text-xs text-slate-500">{item.desc}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {data.phase === "connect" && (
              <div className="bg-slate-900 rounded-xl p-4 font-mono text-xs anim-fade">
                <div className="flex items-center gap-2 mb-3">
                  <div className="w-3 h-3 rounded-full bg-red-500"></div>
                  <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                  <div className="w-3 h-3 rounded-full bg-green-500"></div>
                  <span className="text-slate-500 ml-2">접속 확인</span>
                </div>
                {[
                  { cmd: '$ docker exec -it trio-mysql mysql -u root -prootpass -e "SHOW DATABASES;"', result: "demo, information_schema, mysql, ..." },
                  { cmd: '$ docker exec -it trio-redis redis-cli -a redispass ping', result: "PONG" },
                  { cmd: '$ docker exec -it trio-mongo mongosh --quiet -u root -p mongopass --eval "db.adminCommand(\'ping\')"', result: "{ ok: 1 }" },
                ].map((line, i) => (
                  <div key={i} className="mb-3 anim-slide" style={{animationDelay:`${i*0.2}s`}}>
                    <div className="text-green-400 break-all">{line.cmd}</div>
                    <div className="text-yellow-300 pl-2 mt-0.5">{line.result}</div>
                  </div>
                ))}
              </div>
            )}

            {data.phase === "guide" && (
              <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6 anim-fade">
                <h3 className="text-lg font-bold text-emerald-800 mb-4 text-center">실무 데이터 분배 가이드</h3>
                <div className="space-y-2">
                  {DATA_ROLES.map((item, i) => (
                    <div key={i} className={`bg-white rounded-lg p-3 border border-${item.color}-200 flex items-center gap-3 anim-slide`} style={{animationDelay:`${i*0.08}s`}}>
                      <span className="text-xl">{item.icon}</span>
                      <div className="flex-1">
                        <div className="font-bold text-slate-800 text-sm">{item.data}</div>
                        <div className="text-xs text-slate-500">{item.reason}</div>
                      </div>
                      <span className={`bg-${item.color}-100 text-${item.color}-700 px-2 py-1 rounded text-xs font-bold`}>{item.db}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
