<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — exec, cp, attach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes slideDown { from{opacity:0;transform:translateY(-15px);} to{opacity:1;transform:translateY(0);} }
    @keyframes arrowMove { 0%{transform:translateX(0);} 50%{transform:translateX(8px);} 100%{transform:translateX(0);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-arrow { animation: arrowMove 1s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · 컨테이너가 실행 중이다",
        desc: "nginx 컨테이너가 백그라운드(-d)로 실행 중이다. 내부 상태를 확인하거나 파일을 수정해야 할 때, 세 가지 명령을 사용할 수 있다: exec, cp, attach.",
        phase: "intro",
        command: "docker run -d --name web -p 8080:80 nginx:alpine",
        visual: "container_running",
      },
      {
        title: "STEP 2 · docker exec — 새 프로세스 추가",
        desc: "exec는 실행 중인 컨테이너에 새 프로세스를 추가로 실행한다. 메인 프로세스(nginx)와 독립적으로 동작한다. exit로 나와도 컨테이너는 계속 실행된다. SSH 접속과 비슷한 느낌이다.",
        phase: "exec",
        command: "docker exec -it web sh",
        visual: "exec",
      },
      {
        title: "STEP 3 · docker cp — 파일 복사",
        desc: "cp는 호스트와 컨테이너 사이에 파일을 복사한다. 설정 파일을 꺼내거나, 수정한 파일을 넣을 때 사용한다. 단, 컨테이너를 재생성하면 복사한 파일은 사라진다.",
        phase: "cp",
        command: "docker cp web:/etc/nginx/nginx.conf ./nginx.conf",
        visual: "cp",
      },
      {
        title: "STEP 4 · docker attach — 메인 프로세스 연결",
        desc: "attach는 메인 프로세스(PID 1)의 stdin/stdout에 직접 연결한다. Ctrl+C를 누르면 메인 프로세스가 종료되어 컨테이너도 중지된다! 안전하게 빠져나오려면 Ctrl+P → Ctrl+Q를 누른다.",
        phase: "attach",
        command: "docker attach web",
        visual: "attach",
      },
      {
        title: "STEP 5 · exec vs attach 핵심 차이",
        desc: "exec는 새 프로세스를 만들어서 안전하다. exit 해도 컨테이너가 유지된다. attach는 기존 메인 프로세스에 연결하므로 Ctrl+C 실수 시 컨테이너가 중지된다. 대부분의 상황에서 exec를 사용한다.",
        phase: "compare",
        command: "",
        visual: "compare",
      },
      {
        title: "STEP 6 · 실무 가이드",
        desc: "디버깅·설정 확인 → exec를 사용한다. 파일 백업·교체 → cp를 사용한다. 실시간 로그 확인 → docker logs -f를 사용한다(attach 대신). exec로 수정한 내용은 임시일 뿐, 이미지와 Compose를 수정하고 재배포하는 것이 올바른 방법이다.",
        phase: "guide",
        command: "",
        visual: "guide",
      },
    ];

    function ContainerDiagram({ visual, step }) {
      if (visual === "container_running") {
        return (
          <div className="flex items-center justify-center gap-8 anim-fade">
            <div className="bg-blue-100 border-2 border-blue-400 rounded-xl p-6 text-center">
              <div className="text-3xl mb-2">🖥️</div>
              <div className="font-bold text-blue-800">호스트</div>
              <div className="text-xs text-blue-500">내 컴퓨터</div>
            </div>
            <div className="text-2xl text-slate-400 anim-arrow">→</div>
            <div className="bg-emerald-100 border-2 border-emerald-400 rounded-xl p-6 text-center anim-pulse">
              <div className="text-3xl mb-2">📦</div>
              <div className="font-bold text-emerald-800">nginx 컨테이너</div>
              <div className="text-xs text-emerald-500 mt-1">PID 1: nginx (실행 중)</div>
              <div className="mt-2 bg-emerald-200 rounded px-2 py-1 text-xs">포트 8080:80</div>
            </div>
          </div>
        );
      }

      if (visual === "exec") {
        return (
          <div className="flex items-center justify-center gap-6 anim-fade">
            <div className="bg-blue-100 border-2 border-blue-400 rounded-xl p-4 text-center">
              <div className="text-2xl mb-1">🖥️</div>
              <div className="font-bold text-blue-800 text-sm">호스트</div>
            </div>
            <div className="text-xl text-blue-500 font-bold anim-arrow">exec →</div>
            <div className="bg-emerald-100 border-2 border-emerald-400 rounded-xl p-4">
              <div className="font-bold text-emerald-800 text-sm mb-3 text-center">nginx 컨테이너</div>
              <div className="space-y-2">
                <div className="bg-emerald-200 rounded-lg px-3 py-2 text-xs">
                  <span className="font-bold">PID 1:</span> nginx (메인) — 계속 실행 중
                </div>
                <div className="bg-yellow-200 border-2 border-yellow-400 rounded-lg px-3 py-2 text-xs anim-slide">
                  <span className="font-bold">PID 새:</span> sh (exec로 추가) — exit 해도 OK
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (visual === "cp") {
        return (
          <div className="flex items-center justify-center gap-4 anim-fade">
            <div className="bg-blue-100 border-2 border-blue-400 rounded-xl p-4 text-center">
              <div className="text-2xl mb-1">🖥️</div>
              <div className="font-bold text-blue-800 text-sm">호스트</div>
              <div className="mt-2 bg-blue-200 rounded px-2 py-1 text-xs">📄 nginx.conf</div>
            </div>
            <div className="flex flex-col items-center gap-1">
              <div className="text-sm text-green-600 font-bold">← cp (가져오기)</div>
              <div className="text-green-500 text-lg">⇄</div>
              <div className="text-sm text-orange-600 font-bold">cp (넣기) →</div>
            </div>
            <div className="bg-emerald-100 border-2 border-emerald-400 rounded-xl p-4 text-center">
              <div className="text-2xl mb-1">📦</div>
              <div className="font-bold text-emerald-800 text-sm">컨테이너</div>
              <div className="mt-2 bg-emerald-200 rounded px-2 py-1 text-xs">📄 /etc/nginx/nginx.conf</div>
            </div>
          </div>
        );
      }

      if (visual === "attach") {
        return (
          <div className="flex items-center justify-center gap-6 anim-fade">
            <div className="bg-blue-100 border-2 border-blue-400 rounded-xl p-4 text-center">
              <div className="text-2xl mb-1">🖥️</div>
              <div className="font-bold text-blue-800 text-sm">호스트</div>
            </div>
            <div className="text-xl text-red-500 font-bold anim-arrow">attach →</div>
            <div className="bg-red-50 border-2 border-red-400 rounded-xl p-4">
              <div className="font-bold text-red-800 text-sm mb-3 text-center">nginx 컨테이너</div>
              <div className="space-y-2">
                <div className="bg-red-200 border-2 border-red-400 rounded-lg px-3 py-2 text-xs anim-pulse">
                  <span className="font-bold">PID 1:</span> nginx (직접 연결됨!)
                </div>
                <div className="bg-red-100 rounded-lg px-3 py-1.5 text-xs text-red-700">
                  ⚠ Ctrl+C → nginx 종료 → 컨테이너 중지!
                </div>
                <div className="bg-green-100 rounded-lg px-3 py-1.5 text-xs text-green-700">
                  ✓ Ctrl+P → Ctrl+Q → 안전하게 빠져나옴
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (visual === "compare") {
        return (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 anim-fade">
            <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-4">
              <h4 className="font-bold text-emerald-800 mb-3 text-center">docker exec ✅</h4>
              <div className="space-y-2 text-sm">
                <div className="bg-emerald-100 rounded px-3 py-1.5">✓ 새 프로세스 생성</div>
                <div className="bg-emerald-100 rounded px-3 py-1.5">✓ exit 해도 컨테이너 유지</div>
                <div className="bg-emerald-100 rounded px-3 py-1.5">✓ 디버깅, 설정 확인에 적합</div>
                <div className="bg-emerald-100 rounded px-3 py-1.5">✓ 대부분의 상황에 권장</div>
              </div>
            </div>
            <div className="bg-red-50 border-2 border-red-300 rounded-xl p-4">
              <h4 className="font-bold text-red-800 mb-3 text-center">docker attach ⚠</h4>
              <div className="space-y-2 text-sm">
                <div className="bg-red-100 rounded px-3 py-1.5">⚠ 기존 메인 프로세스에 연결</div>
                <div className="bg-red-100 rounded px-3 py-1.5">⚠ Ctrl+C → 컨테이너 중지!</div>
                <div className="bg-red-100 rounded px-3 py-1.5">⚠ 실시간 출력 모니터링용</div>
                <div className="bg-red-100 rounded px-3 py-1.5">⚠ 특수한 경우에만 사용</div>
              </div>
            </div>
          </div>
        );
      }

      if (visual === "guide") {
        return (
          <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6 anim-fade">
            <h3 className="text-lg font-bold text-emerald-800 mb-4 text-center">실무 명령어 선택 가이드</h3>
            <div className="space-y-3">
              {[
                { situation: "컨테이너 내부 탐색/디버깅", cmd: "docker exec -it web sh", icon: "🔍" },
                { situation: "설정 파일 백업", cmd: "docker cp web:/etc/nginx/nginx.conf ./", icon: "📋" },
                { situation: "수정한 파일 주입", cmd: "docker cp index.html web:/usr/share/nginx/html/", icon: "📝" },
                { situation: "실시간 로그 확인", cmd: "docker logs -f web", icon: "📊" },
              ].map((item, i) => (
                <div key={i} className="bg-white rounded-lg p-3 border border-emerald-200 flex items-center gap-3 anim-slide" style={{animationDelay:`${i*0.12}s`}}>
                  <span className="text-2xl">{item.icon}</span>
                  <div className="flex-1">
                    <div className="font-bold text-slate-700 text-sm">{item.situation}</div>
                    <code className="text-xs text-emerald-600">{item.cmd}</code>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      return null;
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VIII-1-2: exec, cp, attach — 실행 중 컨테이너 조작</h1>
              </div>
              <p className="text-slate-500 text-sm">실행 중인 컨테이너에 접속하고, 파일을 주고받고, 메인 프로세스에 연결하는 세 가지 방법을 비교합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "guide" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "attach" ? "bg-red-600 border-red-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 명령어 터미널 */}
            {data.command && (
              <div className="bg-slate-900 rounded-xl p-4 font-mono text-sm anim-fade">
                <div className="flex items-center gap-2 mb-2">
                  <div className="w-3 h-3 rounded-full bg-red-500"></div>
                  <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                  <div className="w-3 h-3 rounded-full bg-green-500"></div>
                  <span className="text-slate-500 text-xs ml-2">Terminal</span>
                </div>
                <div className="text-green-400">
                  <span className="text-slate-500">$ </span>{data.command}
                </div>
              </div>
            )}

            {/* 시각화 영역 */}
            <div className="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
              <ContainerDiagram visual={data.visual} step={step} />
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
