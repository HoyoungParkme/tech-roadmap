    학습 목표: 실행 중인 컨테이너에 들어가고(exec), 파일을 주고받고(cp),
              메인 프로세스에 직접 연결하는(attach) 세 명령을 5단계로 본다.

  -->

            '',
            'docker ps -a | grep app',
            '#  app   Exited (137) 12 seconds ago    ← 137 = OOMKilled',
            '',
            '# ━━━ ② 살아 있으면 exec, 죽었으면 logs ━━━',
            '# 살아 있다면 ↓ 으로 바로 들어간다',
            'docker exec -it app sh',
            'cat /var/log/app/crash.log | tail -100',
            'cat /proc/1/status | grep VmRSS    # 메모리 사용량',
            '',
            '# 죽었으면 logs 로 마지막 출력 확인',
            'docker logs --tail 50 app',
            '#  ... heap exhausted',
            '#  ... OOMKilled signal received',
            '',
            'docker inspect app --format \'{{.State.OOMKilled}}/{{.State.ExitCode}}\'',
            '#  true/137',
            '',
            '# ━━━ ③ docker cp 로 로그·코어 덤프 추출 ━━━',
            '#  cp 는 멈춘 컨테이너에서도 동작한다 (rm 전까지)',
            'docker cp app:/var/log/app/crash.log ./crash.log',
            'docker cp app:/tmp/core.dump        ./core.dump',
            'docker cp app:/etc/app/config.yaml  ./config.yaml',
            '',
            '# 호스트에서 차분히 분석',
            'less ./crash.log',
            'gdb /path/to/binary ./core.dump   # bt 로 스택트레이스',
            '',
            '# ━━━ ④ 원인 파악 후 정식 수정 ━━━',
            '#  ✗ 컨테이너 안에서 직접 수정 → 재시작 시 사라짐',
            '#  ✓ 이미지/Compose 수정 후 재배포 (영구 반영)',
            '#    예) docker-compose.yml: deploy.resources.limits.memory: 1g',
            'docker compose up -d --build app   # 새 이미지로 재배포',
            '',
            '# ─── 핵심 ───',
            '#  exec / cp / attach 는 진단 도구. 영구 변경은 이미지/Compose 로.',
            '#  재발 방지: 메모리 limits / 헬스체크 / restart 정책 점검',
          ],
          highlight: [4, 5, 7, 8, 10, 11, 12, 15, 16, 17, 19, 20, 24, 25, 26, 29, 30, 33, 34, 36, 37, 38],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 상단: 호스트 박스 — Step 3 / 5에서 파일이 등장
    // ─────────────────────────────────────────────────────
    function HostBox({ files }) {
      return (
        <div className="rounded-lg border-2 border-sky-300 bg-sky-50 p-3">
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🖥️</span>
              <span className="text-[11px] font-bold text-sky-800">호스트 (내 컴퓨터)</span>
            </div>
            <span className="text-[9px] px-1.5 py-0.5 rounded font-mono font-bold bg-sky-600 text-white">
              host
            </span>
          </div>
          <div className="bg-white rounded border border-sky-200 p-2 min-h-[40px] flex flex-wrap gap-1.5">
            {files.length === 0 ? (
              <span className="text-[10px] text-slate-400 italic">호스트 파일 없음 (cp 시 등장)</span>
            ) : (
              files.map((f, i) => (
                <div
                  key={i}
                  className={`flex items-center gap-1 px-1.5 py-1 rounded border text-[10px] transition-all duration-500 ${
                    f.lit ? 'bg-sky-100 border-sky-400 text-sky-800' : 'bg-slate-50 border-slate-200 text-slate-500'
                  }`}
                >
                  <span>{f.icon}</span>
                  <span className="font-mono">{f.name}</span>
                  {f.note && (
                    <span className="text-[8px] text-sky-600 font-bold ml-1">({f.note})</span>
                  )}
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙: 다리(bridge) — exec / cp / attach
    //   bridgeLit 에 따라 해당 다리만 강조
    //   cpDirection: 'to-host' / 'to-ctn' / 'both' / null — 화살표 방향
    // ─────────────────────────────────────────────────────
    function BridgeBox({ bridgeLit, cpDirection }) {
      const bridges = [
        {
          id: 'exec',
          icon: '👤',
          label: 'exec',
          sub: '새 프로세스 파견',
          arrow: '→',
          color: 'sky',
        },
        {
          id: 'cp',
          icon: '📦',
          label: 'cp',
          sub: '파일 복사',
          arrow: cpDirection === 'to-host' ? '←' : cpDirection === 'to-ctn' ? '→' : '⇄',
          color: 'amber',
        },
        {
          id: 'attach',
          icon: '🔌',
          label: 'attach',
          sub: 'PID 1 직통',
          arrow: '↔',
          color: 'rose',
        },
      ];
      return (
        <div className="grid grid-cols-3 gap-2">
          {bridges.map((b) => {
            const lit = bridgeLit === b.id;
            const colorMap = {
              sky:   lit ? 'bg-sky-100 border-sky-500 text-sky-800'       : 'bg-slate-50 border-slate-200 text-slate-400',
              amber: lit ? 'bg-amber-100 border-amber-500 text-amber-800' : 'bg-slate-50 border-slate-200 text-slate-400',
              rose:  lit ? 'bg-rose-100 border-rose-500 text-rose-800'    : 'bg-slate-50 border-slate-200 text-slate-400',
            };
            return (
              <div
                key={b.id}
                className={`rounded-lg border-2 p-2 text-center transition-all duration-500 ${
                  colorMap[b.color]
                } ${lit ? 'shadow-md scale-105' : 'opacity-60'}`}
              >
                <div className="text-lg leading-none">{b.icon}</div>
                <div className={`text-[11px] font-bold font-mono mt-0.5`}>
                  docker {b.label}
                </div>
                <div className={`text-base font-bold mt-0.5 ${lit ? '' : 'opacity-50'}`}>{b.arrow}</div>
                <div className={`text-[9px] ${lit ? 'font-semibold' : ''}`}>{b.sub}</div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: 컨테이너 박스
    //   ctnProcs: PID 1 메인 + exec로 추가된 프로세스 표시
    //   ctnFiles: 컨테이너 내부 파일 (cp 대상)
    //   ctnState: 'running' | 'crashed'
    // ─────────────────────────────────────────────────────
    function ContainerBox({ procs, files, state, attachWarn }) {
      const stateColor =
        state === 'crashed' ? 'border-rose-400 bg-rose-50' :
        attachWarn          ? 'border-rose-300 bg-rose-50' :
                              'border-emerald-400 bg-emerald-50';
      const stateBadge =
        state === 'crashed' ? { text: 'CRASHED · Exit 137', cls: 'bg-rose-600 text-white' } :
        attachWarn          ? { text: '⚠ attach 중 — Ctrl+C 위험', cls: 'bg-rose-600 text-white animate-pulse' } :
                              { text: 'RUNNING ✓',     cls: 'bg-emerald-600 text-white' };

      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${stateColor}`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🐳</span>
              <span className="text-[11px] font-bold text-slate-700">컨테이너 (web)</span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${stateBadge.cls}`}>
              {stateBadge.text}
            </span>
          </div>

          {/* 프로세스 목록 */}
          <div className="bg-white rounded border border-slate-200 p-2 mb-2">
            <div className="text-[9px] font-bold text-slate-500 mb-1 font-mono">PID | CMD | KIND</div>
            <div className="space-y-1">
              {procs.map((p) => {
                const isMain = p.kind === 'main';
                const isCrashed = p.state === 'crashed';
                const isAttached = p.state === 'attached';
                const cls = isCrashed
                  ? 'bg-rose-100 border-rose-400 text-rose-800'
                  : isAttached
                    ? 'bg-rose-50 border-rose-300 text-rose-700 animate-pulse'
                    : isMain
                      ? 'bg-emerald-100 border-emerald-400 text-emerald-800'
                      : 'bg-sky-100 border-sky-400 text-sky-800';
                return (
                  <div
                    key={p.pid}
                    className={`flex items-center justify-between px-2 py-1 rounded border text-[10px] font-mono transition-all duration-500 ${cls}`}
                  >
                    <div className="flex items-center gap-2">
                      <span className="font-bold">PID {p.pid}</span>
                      <span>{p.name}</span>
                      {isMain && <span className="text-[8px] opacity-70">(main)</span>}
                      {!isMain && <span className="text-[8px] opacity-70">(exec)</span>}
                    </div>
                    <span className="text-[8px] uppercase font-bold">
                      {isCrashed ? 'killed' : isAttached ? 'attached' : 'running'}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* 컨테이너 내부 파일 */}
          <div className="bg-white rounded border border-slate-200 p-2">
            <div className="text-[9px] font-bold text-slate-500 mb-1 font-mono">FILES</div>
            <div className="flex flex-wrap gap-1.5">
              {files.length === 0 ? (
                <span className="text-[10px] text-slate-400 italic">파일 표시 없음</span>
              ) : (
                files.map((f, i) => (
                  <div
                    key={i}
                    className={`flex items-center gap-1 px-1.5 py-1 rounded border text-[10px] transition-all duration-500 ${
                      f.lit ? 'bg-amber-100 border-amber-400 text-amber-800' : 'bg-slate-50 border-slate-200 text-slate-500'
                    }`}
                  >
                    <span>{f.icon}</span>
                    <span className="font-mono">{f.name}</span>
                    {f.note && (
                      <span className="text-[8px] text-amber-600 font-bold ml-1">({f.note})</span>
                    )}
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 최하단: 셸 입출력 박스 (어떤 명령이 어떤 출력을 내는지 살아있게)
    //   shellLines: [{ prompt, text, kind: 'cmd'|'out'|'note'|'warn'|'ok' }]
    // ─────────────────────────────────────────────────────
    function ShellBox({ lines }) {
      const kindCls = {
        cmd:  'text-emerald-300',
        out:  'text-slate-300',
        note: 'text-sky-300 italic',
        warn: 'text-rose-300 font-bold',
        ok:   'text-emerald-300 font-bold',
      };
      return (
        <div className="rounded-lg border-2 border-slate-700 bg-[#1e1e1e] p-2 font-mono text-[10px]">
          <div className="flex items-center gap-1 mb-1.5 pb-1 border-b border-slate-700">
            <span className="w-2 h-2 rounded-full bg-rose-500"></span>
            <span className="w-2 h-2 rounded-full bg-yellow-500"></span>
            <span className="w-2 h-2 rounded-full bg-emerald-500"></span>
            <span className="text-slate-500 text-[9px] ml-1">terminal — 명령 시뮬</span>
          </div>
          <div className="space-y-0.5 leading-snug">
            {lines.map((l, i) => (
              <div key={i} className="flex gap-1.5">
                {l.prompt && (
                  <span className="text-slate-500 select-none flex-shrink-0">{l.prompt}</span>
                )}
                <span className={kindCls[l.kind] || 'text-slate-300'}>{l.text}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 호스트 박스 (cp 시 파일 등장)
    //   중앙: 3개 다리 — exec / cp / attach 중 active 강조
    //   하단: 컨테이너 박스 (프로세스 + 파일 + 상태)
    //   최하단: 셸 입출력 시뮬
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 호스트 ↔ 컨테이너 상호작용</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            <HostBox files={step.hostFiles} />

            {/* 화살표 */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.bridgeLit ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↕ docker {step.bridgeLit || '...'}
              </div>
            </div>

            <BridgeBox bridgeLit={step.bridgeLit} cpDirection={step.cpDirection} />

            {/* 화살표 */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.bridgeLit ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓
              </div>
            </div>

            <ContainerBox
              procs={step.ctnProcs}
              files={step.ctnFiles}
              state={step.ctnState}
              attachWarn={step.attachWarn}
            />

            {step.shellOpen && <ShellBox lines={step.shellLines} />}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>host / exec
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>main process
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>cp / file
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>attach / crash
            </span>
            <span className="ml-auto font-mono">phase: {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VIII-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VIII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VIII. 컨테이너 운영 &gt; Chapter 1. 실행 중 컨테이너 조작</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-1-2. exec / cp / attach — 실행 중 컨테이너 조작</h1>
                  <p className="text-sm text-slate-500 mt-0.5">호스트 ↔ 컨테이너 사이의 세 다리: 작업자 파견(exec) / 화물선(cp) / 직통 전화(attach)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>exec</strong>(들어가서 보기) + <strong>cp</strong>(파일 추출/주입) + <strong>attach</strong>(PID 1 직통, 위험)는 모두 <em>진단 도구</em>다. 운영 중 임시 진단에는 쓰되, 영구 변경은 반드시 <strong>이미지/Compose 수정 → 재배포</strong>로 한다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['docker exec', '-it', 'docker cp', 'docker attach', 'PID 1', 'SIGINT', 'Ctrl+P Ctrl+Q', 'docker logs -f', 'OOMKilled'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./viii-1-1_lifecycle.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; VIII-1-1 컨테이너 라이프사이클</a>
              <a href="./viii-1-3_logs_inspect.html" className="text-sky-700 hover:text-sky-900 font-medium">VIII-1-3 logs / inspect &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
