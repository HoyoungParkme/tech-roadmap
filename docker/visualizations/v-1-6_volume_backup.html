          highlight: [2, 3, 4, 5, 18, 19, 20, 21, 22, 23, 24, 28, 30, 31, 32, 33, 34, 37, 40, 41, 42, 43, 46, 47, 48, 49, 50, 51, 52],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 1단: Volume 박스 (원본 — loss / read / protected / lost)
    // ─────────────────────────────────────────────────────
    const VOL_STYLE = {
      danger:    { border: 'border-red-400 bg-red-50 shadow-md',           badge: 'bg-red-600',     label: 'AT RISK',    pulse: true,  note: '⚠ rm / down -v / 디스크 손상에 노출', noteClass: 'text-red-700 font-semibold' },
      reading:   { border: 'border-sky-400 bg-sky-50 shadow-md',           badge: 'bg-sky-600',     label: 'read · ro',  pulse: false, note: '→ alpine 컨테이너가 /data 로 read 중', noteClass: 'text-sky-700 font-semibold' },
      protected: { border: 'border-emerald-400 bg-emerald-50 shadow-md',   badge: 'bg-emerald-600', label: 'protected ✓',pulse: false, note: '✓ 매일 자동 백업 + S3 보관', noteClass: 'text-emerald-700 font-semibold' },
      lost:      { border: 'border-dashed border-slate-300 bg-slate-50 opacity-60', badge: 'bg-slate-500', label: 'lost', pulse: false, note: '볼륨 손실 — restore 대기', noteClass: 'text-slate-500' },
      idle:      { border: 'border-slate-200 bg-slate-50',                 badge: '',               label: '',           pulse: false, note: '대기 상태', noteClass: 'text-slate-500' },
    };
    function VolumeBox({ vol }) {
      const lost = vol.label && vol.label.includes('lost');
      const key = vol.danger ? 'danger' : vol.state === 'reading' ? 'reading' : vol.state === 'protected' ? 'protected' : lost ? 'lost' : 'idle';
      const s = VOL_STYLE[key];
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${s.border}`}>
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">{lost ? '💥' : '💾'}</span>
              <span className="text-[11px] font-bold text-slate-700">Docker Volume · {vol.label}</span>
            </div>
            {s.label && (
              <span className={`text-[9px] ${s.badge} text-white px-1.5 py-0.5 rounded font-mono font-bold ${s.pulse ? 'animate-pulse' : ''}`}>
                {s.label}
              </span>
            )}
          </div>
          {vol.files.length > 0 ? (
            <div className="bg-white rounded border border-slate-200 p-1.5 space-y-0.5">
              {vol.files.map((f) => (
                <div key={f.name} className={`text-[9px] font-mono px-1 py-0.5 rounded ${f.lit ? 'bg-sky-100 text-sky-800' : 'text-slate-400'}`}>
                  {f.name}
                </div>
              ))}
            </div>
          ) : (
            <div className="bg-white rounded border border-dashed border-slate-300 p-2 text-center">
              <div className="text-[10px] text-slate-400 italic">volume 데이터 없음 (삭제됨)</div>
            </div>
          )}
          <div className={`text-[9px] mt-1 ${s.noteClass}`}>{s.note}</div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 2단: tar archive 박스 (중간 산출물)
    // ─────────────────────────────────────────────────────
    function TarBox({ tar, building, extracting }) {
      const exists = tar && tar.exists;
      const border = !exists ? 'bg-slate-50 border-dashed border-slate-300 opacity-50'
        : building ? 'bg-amber-50 border-amber-400 shadow-md'
        : extracting ? 'bg-violet-50 border-violet-400 shadow-md'
        : 'bg-sky-50 border-sky-400';
      const badge = building ? { cls: 'bg-amber-500 animate-pulse', text: 'tar czf' }
        : extracting ? { cls: 'bg-violet-600 animate-pulse', text: 'tar xzf' }
        : exists ? { cls: 'bg-sky-600', text: 'stored' } : null;
      const note = building ? '→ /backup 호스트 디렉토리에 쓰는 중...'
        : extracting ? '→ /data 새 볼륨으로 풀어 쓰는 중...'
        : '→ 호스트 디스크에 보관됨';
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${border}`}>
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📦</span>
              <span className={`text-[11px] font-bold ${exists ? 'text-slate-700' : 'text-slate-400'}`}>
                tar archive · backup.tar.gz
              </span>
            </div>
            {badge && (
              <span className={`text-[9px] ${badge.cls} text-white px-1.5 py-0.5 rounded font-mono font-bold`}>{badge.text}</span>
            )}
          </div>
          {exists ? (
            <div className="bg-white rounded border border-slate-200 p-1.5 space-y-1">
              <div className="flex items-center gap-1.5 text-[9px] font-mono text-slate-700">
                <span className="text-slate-400">file</span>
                <span className="text-sky-700 font-bold">pgdata-20260507-0200.tar.gz</span>
              </div>
              <div className="flex items-center gap-3 text-[9px] font-mono">
                <span><span className="text-slate-400">size</span> <span className="text-slate-700 font-bold">{tar.size}</span></span>
                <span><span className="text-slate-400">sha256</span> <span className="text-slate-700 font-bold">{tar.sha}</span></span>
              </div>
              <div className="text-[9px] text-slate-500 font-mono">{note}</div>
            </div>
          ) : (
            <div className="bg-white rounded border border-dashed border-slate-300 p-2 text-center">
              <div className="text-[10px] text-slate-400 italic">아직 백업 파일 없음</div>
              <div className="text-[9px] text-slate-400 font-mono mt-0.5">tar 명령 대기</div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 3단: S3 / 외부 스토리지 박스
    // ─────────────────────────────────────────────────────
    function OffsiteBox({ offsite }) {
      const uploaded = offsite && offsite.uploaded;
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          uploaded ? 'bg-sky-50 border-sky-400 shadow-md' : 'bg-slate-50 border-dashed border-slate-300 opacity-50'
        }`}>
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">☁️</span>
              <span className={`text-[11px] font-bold ${uploaded ? 'text-slate-700' : 'text-slate-400'}`}>
                Offsite · {offsite && offsite.provider ? offsite.provider : 'S3 / GCS / Azure'}
              </span>
            </div>
            {uploaded && (
              <span className="text-[9px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                3-2-1 ✓
              </span>
            )}
          </div>
          {uploaded ? (
            <div className="bg-white rounded border border-sky-200 p-1.5 space-y-1">
              <div className="text-[9px] font-mono text-sky-700 break-all">
                {offsite.key}
              </div>
              <div className="flex items-center gap-3 text-[9px] font-mono">
                <span className="bg-sky-100 text-sky-800 px-1.5 py-0.5 rounded">STANDARD_IA</span>
                <span className="bg-emerald-100 text-emerald-800 px-1.5 py-0.5 rounded">retention 30d</span>
                <span className="text-slate-500">{offsite.count} versions</span>
              </div>
              <div className="text-[9px] text-slate-500 font-mono">
                → 다른 리전 / 계정에 보관 — 서버·DC 단위 장애에도 살아남음
              </div>
            </div>
          ) : (
            <div className="bg-white rounded border border-dashed border-slate-300 p-2 text-center">
              <div className="text-[10px] text-slate-400 italic">아직 업로드되지 않음</div>
              <div className="text-[9px] text-slate-400 font-mono mt-0.5">aws s3 cp 대기</div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 4단: 새 volume (복구 결과)
    // ─────────────────────────────────────────────────────
    function NewVolumeBox({ nv }) {
      const restored = nv && nv.exists && nv.restored;
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${restored ? 'bg-emerald-50 border-emerald-400 shadow-md' : 'bg-slate-50 border-dashed border-slate-300 opacity-50'}`}>
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🔁</span>
              <span className={`text-[11px] font-bold ${restored ? 'text-emerald-800' : 'text-slate-400'}`}>
                Restored Volume · {nv && nv.label ? nv.label : 'pgdata_restored'}
              </span>
            </div>
            {restored && (<span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">recovered ✓</span>)}
          </div>
          {restored && nv.files ? (
            <div className="bg-white rounded border border-emerald-200 p-1.5 space-y-0.5">
              {nv.files.map((f) => (
                <div key={f.name} className="text-[9px] font-mono px-1 py-0.5 rounded bg-emerald-100 text-emerald-800">{f.name}</div>
              ))}
              <div className="text-[9px] text-emerald-700 font-mono mt-1">→ SELECT count(*) FROM users; → 12483 ✓</div>
            </div>
          ) : (
            <div className="bg-white rounded border border-dashed border-slate-300 p-2 text-center">
              <div className="text-[10px] text-slate-400 italic">복구 대기</div>
              <div className="text-[9px] text-slate-400 font-mono mt-0.5">tar xzf 후 마운트</div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 결과 박스 (Step 5에서만 등장)
    // ─────────────────────────────────────────────────────
    function ConclusionBox({ cron }) {
      const items = [
        { icon: '⏰', label: 'cron 매일 02:00', detail: cron && cron.schedule ? cron.schedule : '0 2 * * *' },
        { icon: '☁️', label: 'S3 자동 동기화', detail: 'STANDARD_IA · 30d' },
        { icon: '🔐', label: 'sha256 무결성', detail: '다운로드 후 검증' },
        { icon: '🧪', label: '복원 리허설', detail: '분기 1회 실전 테스트' },
      ];
      return (
        <div className="rounded-lg border-2 border-emerald-400 bg-gradient-to-br from-emerald-50 to-sky-50 p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">🎯</span>
            <span className="text-[11px] font-bold text-emerald-800">백업 시스템의 4축</span>
          </div>
          <div className="grid grid-cols-2 gap-1.5">
            {items.map((it) => (
              <div key={it.label} className="bg-white rounded border border-emerald-200 p-1.5">
                <div className="flex items-center gap-1">
                  <span className="text-sm">{it.icon}</span>
                  <span className="text-[10px] font-bold text-emerald-900">{it.label}</span>
                </div>
                <div className="text-[9px] text-emerald-700 font-mono mt-0.5 ml-5">{it.detail}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — volume → tar → backup 파일 → 복구 흐름
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const phase = step.phase;
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">💾 Volume → tar → Offsite → Restore</h2>
            <span className="text-[10px] text-slate-400 font-mono">live · phase: {phase}</span>
          </div>

          <div className="space-y-2">
            <VolumeBox vol={step.volume} />

            {/* 화살표: tar czf */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.tarFile && step.tarFile.exists ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ docker run --rm -v pgdata:/data:ro · tar czf
              </div>
            </div>

            <TarBox
              tar={step.tarFile}
              building={step.tarFile && step.tarFile.building}
              extracting={step.tarFile && step.tarFile.extracting}
            />

            {/* 화살표: aws s3 cp */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.offsite && step.offsite.uploaded ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ aws s3 cp · 3-2-1 규칙
              </div>
            </div>

            <OffsiteBox offsite={step.offsite} />

            {/* 화살표: tar xzf (복구) */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.newVolume && step.newVolume.restored ? 'text-emerald-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ aws s3 cp · tar xzf · docker volume create
              </div>
            </div>

            <NewVolumeBox nv={step.newVolume} />

            {step.conclusion && <ConclusionBox cron={step.cron} />}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-red-500"></span>at risk
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>protected / restored
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded border border-slate-300 bg-white"></span>idle
            </span>
            <span className="ml-auto font-mono">step {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생, 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-6</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 영속 데이터 &gt; Chapter 1. Volume</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-1-6. Volume 백업 / 복구 — tar로 영속 데이터 보호</h1>
                  <p className="text-sm text-slate-500 mt-0.5">손실 시나리오 → tar 백업 → S3 외부 보관 → 복구 → cron 자동화 5단계</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>volume rm 한 번이면 데이터는 사라진다</strong>. 매일 cron 으로 <strong>tar 백업 + S3 업로드</strong>, 분기마다 <strong>실제 복원 리허설</strong>까지 갖춰야 진짜 백업 시스템이다. 다음(V-1-7)에서는 bind mount 와 volume 의 선택 기준을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['volume', 'tar czf', 'tar xzf', 'docker run --rm', 'alpine', 'aws s3 cp', '3-2-1 rule', 'sha256', 'cron', 'STANDARD_IA', 'restore drill'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./v-1-5_volume_inspect.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; V-1-5 Volume inspect</a>
              <a href="./v-1-7_bind_mount_vs_volume.html" className="text-sky-700 hover:text-sky-900 font-medium">V-1-7 Bind mount vs Volume &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
