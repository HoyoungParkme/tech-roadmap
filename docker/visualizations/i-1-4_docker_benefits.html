<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — Docker가 해결하는 문제</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes strikethrough { from{width:0;} to{width:100%;} }
    @keyframes countUp { from{opacity:0;transform:scale(0.5);} to{opacity:1;transform:scale(1);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-count { animation: countUp 0.3s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* -- 배포 절차 (Docker 이전) -- */
    const OLD_DEPLOY = [
      "SSH 접속", "패키지 설치", "Python 버전 맞추기", "소스 코드 복사",
      "pip install", "설정 파일 수정", "서비스 재시작", "동작 확인"
    ];

    const STEPS = [
      {
        title: "STEP 1 · Docker 이전의 세 가지 고통",
        desc: "환경 불일치, 느린 배포, 버전 충돌 — 개발팀이 매일 겪는 세 가지 문제다. Docker는 이 세 가지를 한 번에 해결한다.",
        phase: "intro",
      },
      {
        title: "STEP 2 · 장점 1: 환경 통일",
        desc: "개발 서버, 테스트 서버, 운영 서버가 모두 같은 Docker 이미지를 실행한다. 환경이 달라서 생기는 버그가 원천 차단된다. 'Works on my machine' 문제가 사라진다.",
        phase: "env",
      },
      {
        title: "STEP 3 · 장점 2: 배포 속도",
        desc: "Docker 이전에는 서버 배포에 8단계가 필요했다. Docker를 쓰면 pull + run 두 줄이면 끝이다. 서버가 10대여도 같은 명령어를 반복하면 된다.",
        phase: "speed",
      },
      {
        title: "STEP 4 · 장점 3: 격리(Isolation)",
        desc: "한 서버에서 Python 3.9 앱과 Python 3.11 앱을 동시에 실행해도 충돌이 없다. 각 컨테이너는 자기만의 독립된 환경을 가진다. 서로 간섭하지 않는다.",
        phase: "isolation",
      },
      {
        title: "STEP 5 · Docker 도입 전 vs 후",
        desc: "Docker는 택배 포장과 같다. 앱(도자기)을 환경(완충재)과 함께 이미지(상자)로 묶으면, 어디로 보내든 안전하게 도착한다. 세 가지 문제가 한 번에 해결된다.",
        phase: "summary",
      },
    ];

    /* -- Before/After 비교 카드 -- */
    function CompareCard({ before, after, icon, label, active }) {
      return (
        <div className={`rounded-xl border-2 p-4 transition-all duration-500 ${active ? "border-blue-400 shadow-md" : "border-slate-200 opacity-40"}`}>
          <div className="text-center mb-3">
            <span className="text-2xl">{icon}</span>
            <div className="font-bold text-sm mt-1">{label}</div>
          </div>
          {active && (
            <div className="space-y-2 anim-fade">
              <div className="bg-red-50 border border-red-200 rounded-lg p-2">
                <div className="text-xs font-bold text-red-500 mb-1">Before</div>
                <div className="text-sm text-red-700">{before}</div>
              </div>
              <div className="text-center text-lg">⬇️</div>
              <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-2">
                <div className="text-xs font-bold text-emerald-500 mb-1">After (Docker)</div>
                <div className="text-sm text-emerald-700">{after}</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* -- 환경 통일 시각화 -- */
    function EnvUnify() {
      const servers = [
        { label: "개발 서버", icon: "💻" },
        { label: "테스트 서버", icon: "🧪" },
        { label: "운영 서버", icon: "🌐" },
      ];
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 anim-fade">
          <h4 className="font-bold text-sm text-slate-700 mb-3">🎯 모든 서버가 동일한 이미지 실행</h4>
          <div className="grid grid-cols-3 gap-3">
            {servers.map((s, i) => (
              <div key={i} className="text-center anim-slide" style={{animationDelay:`${i*0.15}s`}}>
                <div className="text-3xl mb-1">{s.icon}</div>
                <div className="text-xs font-bold text-slate-700">{s.label}</div>
                <div className="mt-2 bg-emerald-100 border border-emerald-300 rounded-lg p-2">
                  <div className="text-xs text-emerald-700 font-mono">myapp:1.0</div>
                  <div className="text-xs text-emerald-600">Python 3.11</div>
                  <div className="text-xs text-emerald-600">Flask 2.3.0</div>
                </div>
                <div className="text-emerald-500 text-sm mt-1 font-bold">✓ 동일</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* -- 배포 속도 시각화 -- */
    function DeploySpeed() {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 anim-fade">
          <h4 className="font-bold text-sm text-slate-700 mb-3">⚡ 배포 절차 비교</h4>
          <div className="grid grid-cols-2 gap-4">
            {/* Before */}
            <div className="space-y-1">
              <div className="text-xs font-bold text-red-500 mb-2">기존 방식 (8단계)</div>
              {OLD_DEPLOY.map((s, i) => (
                <div key={i} className="flex items-center gap-2 text-xs anim-slide" style={{animationDelay:`${i*0.08}s`}}>
                  <span className="w-4 h-4 rounded-full bg-red-100 text-red-500 flex items-center justify-center text-[10px] font-bold">{i+1}</span>
                  <span className="text-slate-600">{s}</span>
                </div>
              ))}
              <div className="mt-2 text-red-500 text-xs font-bold">⏱ 30분~1시간</div>
            </div>
            {/* After */}
            <div className="space-y-1">
              <div className="text-xs font-bold text-emerald-500 mb-2">Docker 방식 (2줄)</div>
              <div className="bg-slate-800 rounded-lg p-3 space-y-1.5 anim-slide">
                <div className="text-green-400 text-xs font-mono">$ docker pull myapp:1.0</div>
                <div className="text-green-400 text-xs font-mono">$ docker run -d myapp:1.0</div>
              </div>
              <div className="mt-2 text-emerald-500 text-xs font-bold">⏱ 30초~2분</div>
              <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-2 mt-2">
                <div className="text-xs text-emerald-700 font-bold text-center">약 30배 빠름 🚀</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* -- 격리 시각화 -- */
    function Isolation() {
      const containers = [
        { app: "결제 서비스", python: "3.9", color: "border-purple-400 bg-purple-50" },
        { app: "사용자 서비스", python: "3.11", color: "border-blue-400 bg-blue-50" },
        { app: "알림 서비스", python: "3.12", color: "border-orange-400 bg-orange-50" },
      ];
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 anim-fade">
          <h4 className="font-bold text-sm text-slate-700 mb-3">🔒 한 서버, 세 컨테이너 — 충돌 없음</h4>
          <div className="bg-slate-100 rounded-xl p-4 border-2 border-slate-300">
            <div className="text-center text-xs text-slate-500 mb-2 font-bold">🖥️ 물리 서버 1대</div>
            <div className="grid grid-cols-3 gap-2">
              {containers.map((c, i) => (
                <div key={i} className={`rounded-lg border-2 p-3 text-center ${c.color} anim-slide`} style={{animationDelay:`${i*0.15}s`}}>
                  <div className="text-xs font-bold text-slate-800 mb-1">{c.app}</div>
                  <div className="text-[10px] bg-white rounded px-2 py-0.5 font-mono">Python {c.python}</div>
                  <div className="text-xs text-slate-500 mt-1">독립 환경</div>
                </div>
              ))}
            </div>
            <div className="text-center mt-3">
              <span className="bg-emerald-200 text-emerald-800 text-xs px-3 py-1 rounded-full font-medium">
                서로 격리됨 — 버전 충돌 없음 ✓
              </span>
            </div>
          </div>
        </div>
      );
    }

    /* -- 메인 앱 -- */
    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const phaseColor = data.phase === "summary" ? "bg-emerald-600 border-emerald-700" :
                          data.phase === "intro" ? "bg-red-600 border-red-700" :
                          "bg-blue-600 border-blue-700";

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter I-1-4: Docker가 해결하는 문제</h1>
              </div>
              <p className="text-slate-500 text-sm">환경 통일, 배포 속도, 격리 — Docker의 3대 장점을 Before/After로 비교합니다</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade text-white ${phaseColor}`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 인트로: 3대 문제 카드 */}
            {data.phase === "intro" && (
              <div className="grid grid-cols-3 gap-4">
                <CompareCard icon="🌍" label="환경 불일치" before="서버마다 다른 환경" after="동일 이미지 실행" active={true} />
                <CompareCard icon="🐢" label="느린 배포" before="8단계 수동 작업" after="2줄 명령어" active={true} />
                <CompareCard icon="💥" label="버전 충돌" before="Python 3.9 vs 3.11" after="컨테이너로 격리" active={true} />
              </div>
            )}

            {/* 장점 1: 환경 통일 */}
            {data.phase === "env" && <EnvUnify />}

            {/* 장점 2: 배포 속도 */}
            {data.phase === "speed" && <DeploySpeed />}

            {/* 장점 3: 격리 */}
            {data.phase === "isolation" && <Isolation />}

            {/* 종합 */}
            {data.phase === "summary" && (
              <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6 anim-fade">
                <div className="text-center">
                  <div className="text-4xl mb-3">📦</div>
                  <h3 className="text-xl font-bold text-emerald-800 mb-4">Docker = 택배 포장 원리</h3>
                  <div className="grid grid-cols-3 gap-4 max-w-lg mx-auto">
                    {[
                      { icon: "🌍", label: "환경 통일", value: "동일 이미지" },
                      { icon: "⚡", label: "빠른 배포", value: "pull + run" },
                      { icon: "🔒", label: "완전 격리", value: "독립 환경" },
                    ].map((item, i) => (
                      <div key={i} className="bg-white rounded-lg p-3 border border-emerald-200 anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                        <div className="text-2xl mb-1">{item.icon}</div>
                        <div className="text-xs font-bold text-emerald-800">{item.label}</div>
                        <div className="text-[10px] text-emerald-600 mt-1">{item.value}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* 프로그레스 + 컨트롤 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
