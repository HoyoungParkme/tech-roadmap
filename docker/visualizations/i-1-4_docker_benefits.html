            '## 실무 적용 우선순위',
            '1. **이식성** — 가장 먼저 체감 (로컬 환경 통일)',
            '2. **생태계** — 두 번째 (postgres, redis 한 줄 실행)',
            '3. **속도**   — CI/CD 도입 시 (빌드·배포 분 → 초)',
            '4. **격리**   — MSA 도입 시 (한 호스트 N 서비스)',
            '',
            '## 다음 학습',
            '- **I-1-5** Docker 아키텍처 (Engine, Image, Container, Registry)',
            '- **I-2-x** docker run / build / compose 실습',
          ],
          highlight: [1, 3, 4, 6, 7, 8, 9, 10, 11, 12, 15, 16, 17, 18, 19, 24, 25, 26, 27, 28],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 4 이점 카드 — 좌측 상단 항상 표시
    //   step.activeKeys 에 포함되면 활성화 (sky), 아니면 회색
    // ─────────────────────────────────────────────────────
    function BenefitCards({ activeKeys }) {
      return (
        <div className="grid grid-cols-2 gap-2">
          {BENEFITS.map((b) => {
            const active = activeKeys.includes(b.key);
            return (
              <div
                key={b.key}
                className={`rounded-lg border-2 p-2.5 transition-all duration-500 ${
                  active
                    ? 'border-sky-500 bg-sky-50 shadow-sm'
                    : 'border-slate-200 bg-slate-50 opacity-50'
                }`}
              >
                <div className="flex items-center gap-2 mb-1">
                  <span className="text-xl">{b.icon}</span>
                  <div className="flex-1">
                    <div className={`text-xs font-bold ${active ? 'text-sky-800' : 'text-slate-500'}`}>
                      {b.label}
                    </div>
                    <div className={`text-[9px] font-mono ${active ? 'text-sky-600' : 'text-slate-400'}`}>
                      {b.short}
                    </div>
                  </div>
                  {active && (
                    <span className="text-[9px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-bold animate-pulse">
                      ON
                    </span>
                  )}
                </div>
                <div className={`text-[10px] leading-snug ${active ? 'text-sky-700' : 'text-slate-400'}`}>
                  {b.tagline}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Detail — 단계별 다른 시각화
    // ─────────────────────────────────────────────────────
    function Detail({ detail }) {
      if (!detail) return null;

      // Step 1. 이식성 — 4 환경에 같은 이미지
      if (detail.kind === 'portability') {
        return (
          <div className="bg-white rounded-lg border-2 border-sky-300 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">🚢</span>
                <span className="text-[11px] font-bold text-sky-800">같은 이미지 → 4 환경 동일 동작</span>
              </div>
              <span className="text-[9px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">{detail.image}</span>
            </div>
            <div className="bg-sky-50 border border-dashed border-sky-300 rounded p-2 mb-2">
              <div className="text-[9px] font-bold text-sky-700 mb-1 uppercase tracking-wider">image stack</div>
              <div className="flex flex-wrap gap-1">
                {detail.stack.map((s) => (
                  <span key={s} className="text-[9px] bg-white text-sky-800 border border-sky-200 px-1.5 py-0.5 rounded font-mono">{s}</span>
                ))}
              </div>
            </div>
            <div className="grid grid-cols-2 gap-1.5">
              {detail.environments.map((e, i) => (
                <div key={i} className="bg-white border border-sky-200 rounded p-2">
                  <div className="flex items-center gap-1.5 mb-1">
                    <span className="text-base">{e.icon}</span>
                    <div className="flex-1">
                      <div className="text-[10px] font-bold text-slate-700 leading-tight">{e.label}</div>
                      <div className="text-[9px] font-mono text-slate-500">{e.os}</div>
                    </div>
                  </div>
                  <div className="text-[9px] text-emerald-600 font-bold">✓ {detail.image} 동일 동작</div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      // Step 2. 격리 — 한 호스트, 4 컨테이너
      if (detail.kind === 'isolation') {
        const colors = ['border-purple-400 bg-purple-50', 'border-blue-400 bg-blue-50', 'border-orange-400 bg-orange-50', 'border-pink-400 bg-pink-50'];
        return (
          <div className="bg-white rounded-lg border-2 border-sky-300 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">🔒</span>
                <span className="text-[11px] font-bold text-sky-800">한 호스트 · 4 컨테이너 격리</span>
              </div>
              <span className="text-[9px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">namespace + cgroups</span>
            </div>
            <div className="bg-slate-100 border-2 border-slate-300 rounded p-2">
              <div className="text-[9px] font-mono text-slate-500 mb-1.5 text-center">🖥️ {detail.host}</div>
              <div className="grid grid-cols-2 gap-1.5">
                {detail.containers.map((c, i) => (
                  <div key={i} className={`border-2 rounded p-1.5 ${colors[i]}`}>
                    <div className="text-[10px] font-bold text-slate-800 mb-0.5">📦 {c.app}</div>
                    <div className="text-[9px] font-mono text-slate-600">py {c.py} · {c.pkg}</div>
                    <div className="flex gap-2 mt-1 text-[9px]">
                      <span className="bg-white px-1 rounded text-slate-700">CPU {c.cpu}</span>
                      <span className="bg-white px-1 rounded text-slate-700">{c.mem}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div className="mt-2 space-y-0.5">
              {detail.notes.map((n, i) => (
                <div key={i} className="text-[9px] text-sky-700 flex items-start gap-1"><span className="text-sky-500">•</span><span>{n}</span></div>
              ))}
            </div>
          </div>
        );
      }

      // Step 3. 생태계 — Docker Hub
      if (detail.kind === 'ecosystem') {
        return (
          <div className="bg-white rounded-lg border-2 border-sky-300 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">🌐</span>
                <span className="text-[11px] font-bold text-sky-800">Docker Hub — 검증된 인프라 한 줄</span>
              </div>
              <span className="text-[9px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">hub.docker.com</span>
            </div>
            <div className="grid grid-cols-3 gap-1.5 mb-2">
              {detail.stats.map((s, i) => (
                <div key={i} className="bg-sky-50 border border-sky-200 rounded p-1.5 text-center">
                  <div className="text-base font-bold text-sky-700 leading-tight">{s.value}</div>
                  <div className="text-[9px] text-sky-600 leading-tight">{s.label}</div>
                </div>
              ))}
            </div>
            <div className="bg-slate-50 border border-slate-200 rounded p-2">
              <div className="text-[9px] font-bold text-slate-600 mb-1.5 uppercase tracking-wider">popular official images</div>
              <div className="space-y-1">
                {detail.popular.map((p) => (
                  <div key={p.name} className="flex items-center gap-2 text-[10px] bg-white border border-slate-200 rounded px-2 py-1">
                    <span className="font-mono font-bold text-sky-700 w-24">{p.name}</span>
                    <span className="text-slate-500 w-12">{p.cat}</span>
                    <span className="font-mono text-slate-700 w-14 text-right">{p.pulls}</span>
                    {p.verified && <span className="text-emerald-600 font-bold ml-auto">✓ Official</span>}
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      // Step 4. 속도 — VM vs Container
      if (detail.kind === 'speed') {
        return (
          <div className="bg-white rounded-lg border-2 border-sky-300 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">⚡</span>
                <span className="text-[11px] font-bold text-sky-800">시작 시간 비교 — VM vs Container</span>
              </div>
              <span className="text-[9px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                ~30x faster
              </span>
            </div>

            {/* VM vs Container 막대 */}
            <div className="space-y-1.5 mb-2">
              {detail.comparison.map((c, i) => {
                const widthPct = Math.min(100, (c.boot / 60) * 100);
                const barColor = c.color === 'red' ? 'bg-red-400' : 'bg-sky-500';
                const labelColor = c.color === 'red' ? 'text-red-700' : 'text-sky-700';
                return (
                  <div key={i}>
                    <div className="flex justify-between text-[10px] mb-0.5">
                      <span className={`font-bold ${labelColor}`}>{c.kind}</span>
                      <span className="font-mono text-slate-600">{c.boot}{c.unit} · {c.size}</span>
                    </div>
                    <div className="bg-slate-100 rounded h-3.5 overflow-hidden border border-slate-200">
                      <div
                        className={`${barColor} h-full transition-all duration-700 flex items-center justify-end pr-2`}
                        style={{ width: `${widthPct}%` }}
                      >
                        <span className="text-[8px] text-white font-mono font-bold">{c.startup}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* 스케일 시나리오 */}
            <div className="bg-sky-50 border border-sky-200 rounded p-2 mb-2">
              <div className="text-[10px] font-bold text-sky-800 mb-1">📈 {detail.scaleScenario.title}</div>
              <div className="grid grid-cols-2 gap-1.5">
                <div className="bg-red-50 border border-red-200 rounded p-1.5">
                  <div className="text-[9px] text-red-600 font-bold">VM</div>
                  <div className="text-base font-bold text-red-700">{detail.scaleScenario.vm.time}</div>
                  <div className="text-[9px] text-red-600">{detail.scaleScenario.vm.note}</div>
                </div>
                <div className="bg-sky-100 border border-sky-300 rounded p-1.5">
                  <div className="text-[9px] text-sky-700 font-bold">Container</div>
                  <div className="text-base font-bold text-sky-800">{detail.scaleScenario.ct.time}</div>
                  <div className="text-[9px] text-sky-700">{detail.scaleScenario.ct.note}</div>
                </div>
              </div>
            </div>

            {/* 레이어 캐시 */}
            <div className="bg-slate-50 border border-slate-200 rounded p-2">
              <div className="text-[9px] font-bold text-slate-600 mb-1 uppercase tracking-wider">image layers (cache 효과)</div>
              <div className="space-y-0.5">
                {detail.layers.map((l, i) => (
                  <div key={i} className="flex items-center gap-1 text-[9px] font-mono">
                    <span className={`w-2 h-2 rounded ${l.cached ? 'bg-emerald-400' : 'bg-amber-400'}`}></span>
                    <span className="flex-1 text-slate-700">{l.name}</span>
                    <span className="text-slate-500 w-16 text-right">{l.size}</span>
                    <span className={`w-12 text-right font-bold ${l.cached ? 'text-emerald-600' : 'text-amber-600'}`}>
                      {l.cached ? '✓ cached' : '⚙ rebuild'}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      // Step 5. 종합 매트릭스
      if (detail.kind === 'matrix') {
        const stars = (n) => '★'.repeat(n) + '☆'.repeat(5 - n);
        const Cell = ({ v, n }) => (
          <div className="col-span-3 px-2 py-1.5 border-l border-sky-100">
            <div className="text-amber-500 leading-none">{stars(v)}</div>
            <div className="text-slate-600 text-[8px] mt-0.5 leading-tight">{n}</div>
          </div>
        );
        return (
          <div className="bg-white rounded-lg border-2 border-sky-400 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">📊</span>
                <span className="text-[11px] font-bold text-sky-800">4 이점 × 3 관점 종합 매트릭스</span>
              </div>
              <span className="text-[9px] bg-gradient-to-r from-sky-500 to-blue-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">summary</span>
            </div>
            <div className="overflow-hidden rounded border border-sky-200">
              <div className="grid grid-cols-12 bg-sky-100 text-[9px] font-bold text-sky-800 uppercase tracking-wider">
                <div className="col-span-3 px-2 py-1.5">이점</div>
                <div className="col-span-3 px-2 py-1.5 border-l border-sky-200">개발자</div>
                <div className="col-span-3 px-2 py-1.5 border-l border-sky-200">운영</div>
                <div className="col-span-3 px-2 py-1.5 border-l border-sky-200">비용</div>
              </div>
              {detail.rows.map((r, i) => (
                <div key={r.key} className={`grid grid-cols-12 text-[9px] ${i % 2 === 0 ? 'bg-white' : 'bg-sky-50'}`}>
                  <div className="col-span-3 px-2 py-1.5 flex items-center gap-1.5">
                    <span className="text-sm">{r.icon}</span>
                    <span className="font-bold text-slate-800">{r.label}</span>
                  </div>
                  <Cell v={r.dev.v}  n={r.dev.n} />
                  <Cell v={r.ops.v}  n={r.ops.n} />
                  <Cell v={r.cost.v} n={r.cost.n} />
                </div>
              ))}
            </div>
            <div className="mt-2 bg-gradient-to-r from-sky-50 to-blue-50 border border-sky-200 rounded p-2">
              <div className="text-[10px] text-sky-900 leading-snug">
                💡 <strong>4가지가 한 묶음</strong>이라 Docker는 표준이 됐다. 각각은 다른 도구도 가능하지만, 동시에 다 되는 건 컨테이너가 처음이었다.
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널
    //   상단: 4 이점 카드 (단계별 활성화)
    //   하단: 단계별 디테일 시각화
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🐳 Docker 4대 이점 — 카드 + 디테일</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <BenefitCards activeKeys={step.activeKeys} />
            <Detail detail={step.detail} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>활성 이점
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-300"></span>대기
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-400"></span>레이어 캐시
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="text-amber-500">★</span>매트릭스 강도
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-4</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. 컨테이너 입문 &gt; Chapter 1. 왜 Docker인가</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">I-1-4. Docker의 4대 이점 — 이식성 · 격리 · 생태계 · 속도</h1>
                  <p className="text-sm text-slate-500 mt-0.5">표준 화물 컨테이너처럼 — 어디서든 / 안전하게 / 풍부하게 / 빠르게</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: 이식성으로 <strong>"내 노트북=운영"</strong>, 격리로 <strong>"안전한 동거"</strong>, 생태계로 <strong>"한 줄 인프라"</strong>, 속도로 <strong>"초 단위 스케일"</strong>. 다음(I-1-5)에서는 Docker Engine·Image·Container·Registry 4 구성요소를 본다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Portability', 'Isolation', 'Ecosystem', 'Speed', 'Docker Hub', 'namespace', 'cgroups', 'image layer cache'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./i-1-3_vm_vs_container.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; I-1-3 VM vs Container</a>
              <a href="./i-1-5_docker_architecture.html" className="text-sky-700 hover:text-sky-900 font-medium">I-1-5 Docker Architecture &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
