<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — 보안</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }
    @keyframes shield { 0%{transform:scale(1);} 50%{transform:scale(1.1);} 100%{transform:scale(1);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-shake { animation: shake 0.4s ease-in-out; }
    .anim-shield { animation: shield 2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · 왜 컨테이너 보안이 중요한가",
        desc: "컨테이너는 커널을 호스트와 공유한다. root로 실행 중인 컨테이너가 탈출(escape)하면 호스트 시스템 전체를 장악할 수 있다. 컨테이너 탈출 취약점은 매년 발견된다.",
        phase: "why",
      },
      {
        title: "STEP 2 · root vs 비루트 실행 비교",
        desc: "기본적으로 컨테이너는 root로 실행된다. docker run --rm ubuntu whoami → 'root'. 비루트 사용자로 전환하면 침입자가 앱 취약점을 이용해도 시스템 전체를 장악할 수 없다.",
        phase: "root_vs_nonroot",
      },
      {
        title: "STEP 3 · Dockerfile에서 USER 전환",
        desc: "addgroup + adduser로 시스템 사용자를 만들고, chown으로 파일 소유권을 변경한 뒤, USER 명령으로 전환한다. USER 이후의 모든 명령은 해당 사용자 권한으로 실행된다.",
        phase: "dockerfile",
      },
      {
        title: "STEP 4 · 이미지 취약점 스캔 (trivy / docker scout)",
        desc: "베이스 이미지에도 알려진 보안 취약점(CVE)이 있다. trivy image myapp:latest로 OS 패키지와 언어 라이브러리의 취약점을 검사한다. CRITICAL/HIGH 등급이 있으면 패키지를 업그레이드한다.",
        phase: "scan",
      },
      {
        title: "STEP 5 · 보안 체크리스트",
        desc: "비루트 사용자, 이미지 스캔, --privileged 금지, 읽기전용 파일시스템, 최소 베이스 이미지(alpine/distroless). 이 다섯 가지를 지키면 대부분의 기본 보안 위협을 막을 수 있다.",
        phase: "checklist",
      },
      {
        title: "STEP 6 · 고급 보안 — distroless & 이미지 서명",
        desc: "distroless 이미지는 셸, 패키지 관리자가 없어 공격 표면이 최소화된다. cosign으로 이미지에 서명하면 신뢰할 수 있는 소스에서 빌드됐는지 검증할 수 있다.",
        phase: "advanced",
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4500);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VII-1-3: 보안 — 비루트 사용자, 이미지 스캔</h1>
              </div>
              <p className="text-slate-500 text-sm">루트 vs 비루트 실행을 비교하고, 취약점 스캔 과정을 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "why" ? "bg-red-600 border-red-700 text-white" :
              data.phase === "advanced" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "scan" ? "bg-indigo-600 border-indigo-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            <div key={`vis-${step}`} className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 anim-fade">

              {/* 왜 중요한가 */}
              {data.phase === "why" && (
                <div className="space-y-4">
                  <div className="flex items-center justify-center gap-4 flex-wrap">
                    <div className="bg-red-50 border-2 border-red-300 rounded-xl p-4 text-center">
                      <div className="text-3xl">🐳</div>
                      <div className="font-bold text-red-700 text-sm mt-1">root 컨테이너</div>
                      <div className="text-xs text-red-500">마스터키로 실행</div>
                    </div>
                    <div className="text-2xl text-red-400 anim-shake">💥</div>
                    <div className="bg-red-100 border-2 border-red-400 rounded-xl p-4 text-center anim-shake">
                      <div className="text-3xl">🖥️</div>
                      <div className="font-bold text-red-800 text-sm mt-1">호스트 시스템</div>
                      <div className="text-xs text-red-600">컨테이너 탈출 시 장악됨</div>
                    </div>
                  </div>
                  <div className="bg-red-50 border border-red-200 rounded-lg p-3 text-center text-sm">
                    <span className="text-red-700 font-medium">컨테이너는 VM보다 격리 수준이 낮다 — 커널을 공유하기 때문</span>
                  </div>
                </div>
              )}

              {/* root vs 비루트 */}
              {data.phase === "root_vs_nonroot" && (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className="rounded-xl border-2 border-red-300 bg-red-50 p-4">
                    <div className="text-center mb-3">
                      <div className="text-3xl">🔓</div>
                      <div className="font-bold text-red-700">root 실행 (기본값)</div>
                    </div>
                    <div className="bg-slate-800 rounded-lg p-3 font-mono text-xs">
                      <div className="text-slate-500">$ docker run --rm ubuntu whoami</div>
                      <div className="text-red-400 font-bold">root</div>
                    </div>
                    <div className="mt-3 space-y-1 text-xs">
                      <div className="bg-red-100 rounded px-2 py-1 text-red-700">모든 파일 읽기/쓰기 가능</div>
                      <div className="bg-red-100 rounded px-2 py-1 text-red-700">시스템 패키지 설치 가능</div>
                      <div className="bg-red-100 rounded px-2 py-1 text-red-700">탈출 시 호스트 장악 가능</div>
                    </div>
                  </div>
                  <div className="rounded-xl border-2 border-green-300 bg-green-50 p-4">
                    <div className="text-center mb-3">
                      <div className="text-3xl anim-shield">🔒</div>
                      <div className="font-bold text-green-700">비루트 실행 (권장)</div>
                    </div>
                    <div className="bg-slate-800 rounded-lg p-3 font-mono text-xs">
                      <div className="text-slate-500">$ docker exec -it myapp whoami</div>
                      <div className="text-green-400 font-bold">appuser</div>
                    </div>
                    <div className="mt-3 space-y-1 text-xs">
                      <div className="bg-green-100 rounded px-2 py-1 text-green-700">/app 디렉터리만 접근 가능</div>
                      <div className="bg-green-100 rounded px-2 py-1 text-green-700">시스템 패키지 설치 불가</div>
                      <div className="bg-green-100 rounded px-2 py-1 text-green-700">탈출해도 권한 제한적</div>
                    </div>
                  </div>
                </div>
              )}

              {/* Dockerfile */}
              {data.phase === "dockerfile" && (
                <div className="space-y-4">
                  <div className="bg-slate-800 rounded-lg p-4 font-mono text-xs overflow-x-auto">
                    <div className="text-blue-300">FROM python:3.12-slim</div>
                    <div className="text-slate-400">WORKDIR /app</div>
                    <div className="text-slate-500 mt-2"># 1. 시스템 사용자 생성</div>
                    <div className="text-yellow-300">RUN addgroup --system appgroup && \</div>
                    <div className="text-yellow-300">    adduser --system --ingroup appgroup --no-create-home appuser</div>
                    <div className="text-slate-500 mt-2"># 2. 의존성 설치 (root로 — 시스템 패키지 필요)</div>
                    <div className="text-slate-400">COPY requirements.txt .</div>
                    <div className="text-slate-400">RUN pip install --no-cache-dir -r requirements.txt</div>
                    <div className="text-slate-500 mt-2"># 3. 소스 복사</div>
                    <div className="text-slate-400">COPY . .</div>
                    <div className="text-slate-500 mt-2"># 4. 파일 소유권 변경</div>
                    <div className="text-yellow-300">RUN chown -R appuser:appgroup /app</div>
                    <div className="text-slate-500 mt-2"># 5. 비루트 사용자 전환</div>
                    <div className="text-green-400 font-bold">USER appuser</div>
                    <div className="text-slate-400 mt-1">CMD ["python", "main.py"]</div>
                  </div>
                  <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-xs text-center">
                    <span className="text-yellow-700 font-medium">USER 명령 이전에 패키지 설치와 chown을 완료해야 한다</span>
                  </div>
                </div>
              )}

              {/* 스캔 */}
              {data.phase === "scan" && (
                <div className="space-y-4">
                  <div className="bg-slate-800 rounded-lg p-4 font-mono text-xs overflow-x-auto">
                    <div className="text-slate-500">$ trivy image --severity CRITICAL,HIGH myapp:latest</div>
                    <div className="text-slate-400 mt-2">myapp:latest (debian 12.0)</div>
                    <div className="text-slate-400">=========================</div>
                    <div className="text-yellow-400">Total: 3 (CRITICAL: 0, HIGH: 1, MEDIUM: 2)</div>
                    <div className="text-slate-400 mt-1">{"┌──────────────┬──────────────────┬──────────┐"}</div>
                    <div className="text-slate-400">{"│   Library    │  Vulnerability   │ Severity │"}</div>
                    <div className="text-slate-400">{"├──────────────┼──────────────────┼──────────┤"}</div>
                    <div className="text-red-400">{"│ libssl3      │ CVE-2024-XXXXX   │ HIGH     │"}</div>
                    <div className="text-yellow-400">{"│ zlib         │ CVE-2024-YYYYY   │ MEDIUM   │"}</div>
                    <div className="text-yellow-400">{"│ curl         │ CVE-2024-ZZZZZ   │ MEDIUM   │"}</div>
                    <div className="text-slate-400">{"└──────────────┴──────────────────┴──────────┘"}</div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div className="bg-indigo-50 border border-indigo-200 rounded-lg p-3 text-xs text-center">
                      <div className="text-lg mb-1">🔍</div>
                      <div className="font-bold text-indigo-700">trivy</div>
                      <div className="text-indigo-600 mt-1">오픈소스, CLI 기반, CI 연동 쉬움</div>
                    </div>
                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-xs text-center">
                      <div className="text-lg mb-1">🐳</div>
                      <div className="font-bold text-blue-700">docker scout</div>
                      <div className="text-blue-600 mt-1">Docker Desktop 내장, 베이스 이미지 추천</div>
                    </div>
                  </div>
                </div>
              )}

              {/* 체크리스트 */}
              {data.phase === "checklist" && (
                <div className="space-y-2">
                  {[
                    { check: "USER appuser로 비루트 사용자 전환", done: true, priority: "필수" },
                    { check: "trivy/docker scout로 이미지 스캔", done: true, priority: "필수" },
                    { check: "--privileged 플래그 사용 금지", done: true, priority: "필수" },
                    { check: "--read-only로 파일시스템 읽기 전용", done: false, priority: "권장" },
                    { check: "alpine 또는 distroless 베이스 이미지 사용", done: false, priority: "권장" },
                    { check: ".trivyignore에 무시 사유와 재검토 일정 기록", done: false, priority: "권장" },
                  ].map((item, i) => (
                    <div key={i} className={`flex items-center gap-3 p-3 rounded-lg border anim-slide ${
                      item.done ? "border-green-200 bg-green-50" : "border-slate-200 bg-slate-50"
                    }`} style={{animationDelay: `${i * 0.1}s`}}>
                      <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${
                        item.done ? "bg-green-500 text-white" : "bg-slate-300 text-white"
                      }`}>
                        {item.done ? "V" : ""}
                      </div>
                      <div className="flex-1 text-sm text-slate-700">{item.check}</div>
                      <div className={`text-xs px-2 py-1 rounded-full font-medium ${
                        item.priority === "필수" ? "bg-red-100 text-red-700" : "bg-blue-100 text-blue-700"
                      }`}>{item.priority}</div>
                    </div>
                  ))}
                </div>
              )}

              {/* 고급 보안 */}
              {data.phase === "advanced" && (
                <div className="space-y-4">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div className="rounded-xl border-2 border-emerald-300 bg-emerald-50 p-4">
                      <div className="text-center mb-3">
                        <div className="text-3xl">📦</div>
                        <div className="font-bold text-emerald-700">distroless 이미지</div>
                      </div>
                      <div className="space-y-1 text-xs">
                        <div className="bg-white rounded px-2 py-1 text-emerald-700">셸(bash) 없음</div>
                        <div className="bg-white rounded px-2 py-1 text-emerald-700">패키지 관리자 없음</div>
                        <div className="bg-white rounded px-2 py-1 text-emerald-700">curl, wget 등 유틸리티 없음</div>
                        <div className="bg-white rounded px-2 py-1 text-emerald-700">런타임만 포함 → 공격 표면 최소화</div>
                      </div>
                      <div className="text-xs text-emerald-600 mt-2 text-center">멀티스테이지 빌드와 함께 사용</div>
                    </div>
                    <div className="rounded-xl border-2 border-blue-300 bg-blue-50 p-4">
                      <div className="text-center mb-3">
                        <div className="text-3xl anim-shield">🔏</div>
                        <div className="font-bold text-blue-700">이미지 서명 (cosign)</div>
                      </div>
                      <div className="space-y-1 text-xs">
                        <div className="bg-white rounded px-2 py-1 text-blue-700">빌드 시 서명 데이터 저장</div>
                        <div className="bg-white rounded px-2 py-1 text-blue-700">배포 시 서명 검증</div>
                        <div className="bg-white rounded px-2 py-1 text-blue-700">K8s admission controller 연동</div>
                        <div className="bg-white rounded px-2 py-1 text-blue-700">서명 없는 이미지 배포 자동 차단</div>
                      </div>
                      <div className="text-xs text-blue-600 mt-2 text-center">공급망 보안 강화</div>
                    </div>
                  </div>
                  <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-center text-sm">
                    <span className="text-emerald-700 font-medium">빌드 타임(이미지 스캔) + 런타임(seccomp, AppArmor) 보안을 함께 적용한다</span>
                  </div>
                </div>
              )}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
