            '#',
            '# ─── 자주 쓰는 cap_add 예 ───',
            '#  • NET_BIND_SERVICE : 80/443 바인드 (web)',
            '#  • NET_RAW          : ping, traceroute (보통 불필요)',
            '#  • CHOWN/FOWNER     : 파일 권한 변경 (대부분 빌드타임에 끝나서 불필요)',
            '#  • SYS_TIME, SYS_ADMIN : 거의 모든 앱에서 불필요 (위험)',
            '',
            '# ─── 검증 ───',
            '# $ docker compose exec web capsh --print',
            '# Current: cap_net_bind_service=eip',
            '# Bounding set =cap_net_bind_service',
            '',
            '# ─── 보안 체크리스트 5종 세트 (요약) ───',
            '#  [v] USER 비루트            (Step 2)',
            '#  [v] Trivy 이미지 스캔      (Step 3)',
            '#  [v] read_only + tmpfs      (Step 4)',
            '#  [v] cap_drop ALL + 최소 add (Step 5)',
            '#  [v] no-new-privileges      (전 단계 공통)',
            '#',
            '# 다음 자료(VII-1-4)에서는 런타임 정책(seccomp, AppArmor) 과',
            '# 시크릿 관리(BuildKit secret, vault) 를 더 깊게 다룬다.',
          ],
          highlight: [9, 10, 11, 13, 14, 15, 18, 19, 20, 21, 47, 48, 49, 50, 51],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 상단: 4개 위협/해결책 카드 그리드
    //   - active 위협(이번 step) 은 빨강 펄스
    //   - 이전에 해결된 위협은 녹색 fix 카드로 변경
    //   - 미진입 위협은 회색 idle
    // ─────────────────────────────────────────────────────
    function ThreatCardGrid({ activeThreatId, fixedThreatIds, showFix }) {
      return (
        <div className="grid grid-cols-2 gap-2">
          {THREATS.map((t) => {
            const isFixed  = fixedThreatIds.includes(t.id) && t.id !== activeThreatId;
            const isActive = t.id === activeThreatId;
            const isFixingNow = isActive && showFix;

            // 1) 이미 해결된 카드 — 녹색 fix
            if (isFixed) {
              return (
                <div key={t.id} className="rounded-lg border-2 border-emerald-300 bg-emerald-50 p-2 transition-all duration-500">
                  <div className="flex items-center gap-1.5 mb-0.5">
                    <span className="text-base">{t.fixIcon}</span>
                    <span className="text-[10px] font-bold text-emerald-800 truncate">{t.title}</span>
                    <span className="ml-auto text-[8px] bg-emerald-600 text-white px-1 py-0.5 rounded font-mono font-bold">FIXED</span>
                  </div>
                  <div className="text-[9px] text-emerald-700 leading-snug">{t.fix}</div>
                </div>
              );
            }

            // 2) 이번 단계에 해결되는 카드 — 위협→해결책 동시 표기
            if (isFixingNow) {
              return (
                <div key={t.id} className="rounded-lg border-2 border-sky-400 bg-sky-50 p-2 transition-all duration-500 shadow-md">
                  <div className="flex items-center gap-1.5 mb-0.5">
                    <span className="text-base">{t.fixIcon}</span>
                    <span className="text-[10px] font-bold text-sky-800 truncate">{t.title}</span>
                    <span className="ml-auto text-[8px] bg-sky-600 text-white px-1 py-0.5 rounded font-mono font-bold">FIXING</span>
                  </div>
                  <div className="text-[9px] text-sky-700 leading-snug">→ {t.fix}</div>
                </div>
              );
            }

            // 3) 이번 단계의 위협 (해결책 적용 전) — 빨강 펄스
            if (isActive) {
              return (
                <div key={t.id} className="rounded-lg border-2 border-rose-400 bg-rose-50 p-2 transition-all duration-500 shadow-md">
                  <div className="flex items-center gap-1.5 mb-0.5">
                    <span className="text-base">{t.icon}</span>
                    <span className="text-[10px] font-bold text-rose-800 truncate">{t.title}</span>
                    <span className="ml-auto text-[8px] bg-rose-600 text-white px-1 py-0.5 rounded font-mono font-bold animate-pulse">RISK</span>
                  </div>
                  <div className="text-[9px] text-rose-700 leading-snug">{t.bad}</div>
                </div>
              );
            }

            // 4) 아직 안 다룬 위협 — 회색 idle
            return (
              <div key={t.id} className="rounded-lg border-2 border-dashed border-slate-200 bg-slate-50 p-2 opacity-60 transition-all duration-500">
                <div className="flex items-center gap-1.5 mb-0.5">
                  <span className="text-base grayscale">{t.icon}</span>
                  <span className="text-[10px] font-bold text-slate-500 truncate">{t.title}</span>
                  <span className="ml-auto text-[8px] bg-slate-300 text-slate-600 px-1 py-0.5 rounded font-mono font-bold">idle</span>
                </div>
                <div className="text-[9px] text-slate-500 leading-snug">{t.bad}</div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙: CVE 카운트 막대 — Trivy 결과 시뮬레이션
    //   심각도별 막대 길이 + 숫자 라벨
    // ─────────────────────────────────────────────────────
    function CveBars({ cveCount }) {
      const { critical, high, medium, low } = cveCount;
      const total = critical + high + medium + low;
      const max = Math.max(10, total); // 막대 정규화 기준
      const rows = [
        { key: 'critical', label: 'CRITICAL', n: critical, bar: 'bg-rose-600',   text: 'text-rose-700'   },
        { key: 'high',     label: 'HIGH',     n: high,     bar: 'bg-orange-500', text: 'text-orange-700' },
        { key: 'medium',   label: 'MEDIUM',   n: medium,   bar: 'bg-amber-400',  text: 'text-amber-700'  },
        { key: 'low',      label: 'LOW',      n: low,      bar: 'bg-sky-400',    text: 'text-sky-700'    },
      ];
      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🔍</span>
              <span className="text-[11px] font-bold text-slate-700">Trivy 스캔 결과 — CVE</span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
              total === 0 ? 'bg-emerald-600 text-white'
              : critical > 0 ? 'bg-rose-600 text-white animate-pulse'
              : high > 0 ? 'bg-orange-500 text-white' : 'bg-amber-400 text-white'
            }`}>
              total {total}
            </span>
          </div>
          <div className="space-y-1">
            {rows.map((r) => {
              const pct = max === 0 ? 0 : Math.round((r.n / max) * 100);
              return (
                <div key={r.key} className="flex items-center gap-2 text-[10px] font-mono">
                  <span className={`w-16 ${r.text} font-bold`}>{r.label}</span>
                  <div className="flex-1 h-3 bg-slate-100 rounded overflow-hidden border border-slate-200">
                    <div
                      className={`${r.bar} h-full transition-all duration-700 ease-out`}
                      style={{ width: `${pct}%` }}
                    ></div>
                  </div>
                  <span className={`w-6 text-right ${r.text} font-bold`}>{r.n}</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: 권한 게이지 + verdict 문구
    //   privilegeBar 100→0 으로 줄어드는 막대 (낮을수록 안전)
    // ─────────────────────────────────────────────────────
    function PrivilegeMeter({ value, verdict }) {
      const safe   = value <= 25;
      const warn   = value > 25 && value <= 60;
      const danger = value > 60;
      const color  = safe ? 'bg-emerald-500' : warn ? 'bg-amber-400' : 'bg-rose-500';
      const label  = safe ? '최소 권한 ✓' : warn ? '개선 중' : '위험';
      const labelBg = safe ? 'bg-emerald-600' : warn ? 'bg-amber-500' : 'bg-rose-600';
      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">⚖️</span>
              <span className="text-[11px] font-bold text-slate-700">컨테이너 권한 수준</span>
            </div>
            <span className={`text-[9px] ${labelBg} text-white px-1.5 py-0.5 rounded font-mono font-bold`}>
              {label} · {value}/100
            </span>
          </div>
          <div className="h-4 bg-slate-100 rounded-full overflow-hidden border border-slate-200">
            <div
              className={`${color} h-full transition-all duration-700 ease-out`}
              style={{ width: `${value}%` }}
            ></div>
          </div>
          <div className="flex justify-between text-[8px] text-slate-400 font-mono mt-1">
            <span>0 (최소)</span>
            <span>50</span>
            <span>100 (root + 모든 cap)</span>
          </div>
          <div className={`text-[10px] mt-2 font-medium leading-snug ${
            danger ? 'text-rose-700' : warn ? 'text-amber-700' : 'text-emerald-700'
          }`}>
            {verdict}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 4 위협 카드 그리드
    //   중앙: CVE 막대
    //   하단: 권한 게이지 + verdict
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🛡️ 보안 위협 → 해결책</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <ThreatCardGrid
              activeThreatId={step.activeThreatId}
              fixedThreatIds={step.fixedThreatIds}
              showFix={step.showFix}
            />

            <CveBars cveCount={step.cveCount} />

            <PrivilegeMeter value={step.privilegeBar} verdict={step.verdict} />
          </div>

          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>위협 active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>해결책 적용 중
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>fixed
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded border border-slate-300 bg-white"></span>idle
            </span>
            <span className="ml-auto font-mono">
              fixed {step.fixedThreatIds.length}/{THREATS.length}
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VII-1-3</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. 운영 &gt; Chapter 1. 보안</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VII-1-3. 보안 — root 사용자 / 이미지 스캔 / 최소 권한</h1>
                  <p className="text-sm text-slate-500 mt-0.5">root 컨테이너의 위험을 USER · Trivy · read-only · cap_drop 4단으로 제거하는 흐름</p>
                </div>
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>USER 비루트</strong> + <strong>Trivy 스캔</strong> + <strong>read_only · tmpfs</strong> + <strong>cap_drop ALL → 최소 add</strong>. 이 4종 세트만으로 컨테이너 권한이 100→12 까지 떨어진다. 다음(VII-1-4)에서는 런타임 정책(seccomp/AppArmor)과 시크릿 관리를 다룬다.
              </div>
            )}

            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            <div className="flex flex-wrap gap-2 justify-center">
              {['USER', 'non-root', 'UID 1000', 'Trivy', 'CVE', 'read_only', 'tmpfs', 'cap_drop ALL', 'NET_BIND_SERVICE', 'no-new-privileges'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./vii-1-2_logging.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; VII-1-2 로깅</a>
              <a href="./vii-1-4_secrets.html" className="text-sky-700 hover:text-sky-900 font-medium">VII-1-4 시크릿 관리 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
