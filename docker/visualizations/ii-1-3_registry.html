  <div id="root"></div>

  <!--
    II-1-3. Registry (Docker Hub / ECR / GCR / Harbor)
    학습 목표: 4가지 Registry의 차이와 push/pull 흐름(auth → manifest → blob)을 이해.
    패턴: fastapi v1 — 좌(Registry 박스 + push/pull 흐름) / 우(VSCode CodeViewer 5탭)
    색상: sky
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // Registry 4종 메타 — 좌측 Registry Wall에 항상 4개가 그려진다.
    //   step에 따라 active 표시만 바뀜.
    // ─────────────────────────────────────────────────────
    const REGISTRIES = [
      {
        id: 'dockerhub',
        name: 'Docker Hub',
        domain: 'docker.io',

        tagline: '공식 · 가장 큰 공개 레지스트리',

      },
      {
        id: 'ecr',
        name: 'AWS ECR',
        domain: '<acct>.dkr.ecr.<region>.amazonaws.com',
        icon: '☁️',
        color: 'orange',
        tagline: 'AWS 통합 (IAM · ECS · EKS)',
        pricing: '저장 $0.10/GB · 인터넷 송신 과금',
      },
      {
        id: 'gcr',
        name: 'GCR / GHCR',
        domain: 'ghcr.io · gcr.io',
        icon: '🐙',
        color: 'green',

        pricing: 'GHCR public 무료 · GCP 종량제',
      },
      {
        id: 'harbor',

        domain: 'harbor.company.local',

        color: 'slate',
        tagline: '사내 자체 호스팅 (CNCF 졸업)',
        pricing: '오픈소스 무료 · 인프라 비용만',
      },
    ];

    // ─────────────────────────────────────────────────────
    // 5단계 STEPS — 단계별 활성 registry · push/pull 흐름 단계
    //   flow: { phase, label, blobs, manifest, authed }
    //     phase: 'idle' | 'auth' | 'manifest' | 'blob-upload' | 'done'
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Docker Hub — 공식 · 무료/유료',
        desc: 'Docker가 직접 운영하는 공개 레지스트리(docker.io). docker pull nginx 처럼 이름만 적으면 자동으로 docker.io/library/nginx 를 가리킨다. public 이미지는 무제한 무료, private repo·팀 협업·취약점 스캔은 유료 플랜($5~$25/월)이다. 진입장벽이 가장 낮아 OSS 배포·학습에 표준이다.',
        active: 'dockerhub',
        flow: null,
        codeKey: 'dockerhub',
      },
      {
        title: 'Step 2. AWS ECR — 클라우드 통합',
        desc: 'AWS Elastic Container Registry. IAM으로 권한 제어, ECS/EKS/Lambda와 native 통합되며 같은 region 내 트래픽은 무료다. 도메인은 계정 ID와 region이 박힌 형태(<acct>.dkr.ecr.ap-northeast-2.amazonaws.com). aws ecr get-login-password 로 12시간짜리 토큰을 받아 docker login 한다.',
        active: 'ecr',
        flow: null,
        codeKey: 'ecr',
      },
      {
        title: 'Step 3. GCR / GitHub Container Registry',
        desc: 'GitHub Container Registry(ghcr.io)는 코드 저장소와 같은 권한 모델(PAT)로 이미지를 관리한다 — public 이미지는 무료. Google Cloud는 gcr.io(legacy)와 Artifact Registry(<region>-docker.pkg.dev) 두 가지를 제공하며 신규 프로젝트는 후자가 권장이다. 각 레지스트리는 도메인만 다를 뿐 push/pull 명령어 형태는 동일하다.',
        active: 'gcr',
        flow: null,
        codeKey: 'gcr',
      },
      {
        title: 'Step 4. 사내 Registry (Harbor) — 자체 호스팅',
        desc: 'Harbor는 CNCF 졸업 프로젝트로 사내망에 직접 띄우는 레지스트리다. RBAC · 취약점 스캔(Trivy) · 이미지 서명(Cosign) · replication을 내장한다. docker-compose.yml 한 번으로 설치되며 https://harbor.company.local 처럼 사내 도메인을 쓴다. 외부 인터넷에 이미지를 노출할 수 없는 금융·공공·제조 환경의 표준 선택지.',
        active: 'harbor',
        flow: null,
        codeKey: 'harbor',
      },
      {
        title: 'Step 5. push 흐름 — auth → manifest → blob upload',
        desc: 'docker push 한 번에는 사실 3 phase가 일어난다. (1) auth: Bearer token 발급 (2) manifest 조회로 이미 있는 layer 확인 (3) 없는 blob(layer + config)만 PUT 으로 업로드 후 manifest 등록. 같은 base image를 쓰면 layer가 재사용되어 두 번째 push는 manifest만 갱신되고 끝난다 — Docker가 빠른 이유.',
        active: 'dockerhub',
        flow: {
          phase: 'blob-upload',
          authed: true,
          manifest: { existing: 2, missing: 3 },
          blobs: [
            { sha: 'a1b2c3d4', size: '78MB', state: 'exists' },
            { sha: 'e5f6a7b8', size: '54MB', state: 'exists' },
            { sha: '9c0d1e2f', size: '12MB', state: 'uploading', pct: 65 },
            { sha: '3a4b5c6d', size: '4MB',  state: 'queued' },
            { sha: '7e8f9012', size: '1MB',  state: 'queued' },
          ],
        },
        codeKey: 'pushpull',
      },
    ];

    // ─────────────────────────────────────────────────────
    // 코드 5탭 — 파일명별 라인 + highlight
    // ─────────────────────────────────────────────────────
    const CODE = {
      dockerhub: {
        lang: 'bash',
        filename: 'dockerhub.sh',
        lines: [
          '#!/usr/bin/env bash',
          '# Docker Hub — 공식 공개 레지스트리 (docker.io)',
          '# 도메인을 생략하면 docker.io 가 기본값으로 적용됨',
          '',
          '# 1) 로그인 — Hub 계정 username/password (또는 PAT)',
          'docker login',
          '#  Username: hoyoung',
          '#  Password: ********    # PAT(Personal Access Token) 권장',
          '',
          '# 2) 공식 이미지 pull — "library/" namespace 자동',
          'docker pull nginx:1.25',
          '#  → 풀네임: docker.io/library/nginx:1.25',
          '',
          '# 3) 내 이미지 push — username/repo:tag 형식',
          'docker tag myapp:dev hoyoung/myapp:1.0',
          'docker push hoyoung/myapp:1.0',
          '',
          '# 4) latest 태그는 가변이라 운영에서는 구체 버전 권장',
          'docker pull python:3.12-slim    # ✓ 권장',
          '# docker pull python:latest     # ✗ 비권장',
          '',
          '# 💰 가격: public repo 무제한 무료',
          '#         private repo · Team · 보안 스캔은 $5~$25/월',
        ],
        highlight: [2, 3, 6, 10, 14, 15, 19],
      },
      ecr: {
        lang: 'bash',
        filename: 'ecr.sh',
        lines: [
          '#!/usr/bin/env bash',
          '# AWS ECR — IAM 기반 사설 레지스트리',
          '',
          'AWS_ACCT=123456789012',
          'AWS_REGION=ap-northeast-2',
          'REPO=myapp',
          'REGISTRY="${AWS_ACCT}.dkr.ecr.${AWS_REGION}.amazonaws.com"',
          '',
          '# 1) 레지스트리 생성 (한 번만)',
          'aws ecr create-repository \\',
          '  --repository-name "$REPO" \\',
          '  --region "$AWS_REGION"',
          '',
          '# 2) 12시간짜리 인증 토큰 발급 → docker login',
          'aws ecr get-login-password --region "$AWS_REGION" \\',
          '  | docker login --username AWS --password-stdin "$REGISTRY"',
          '',
          '# 3) 이미지 태그 후 push',
          'docker tag myapp:1.0 "$REGISTRY/$REPO:1.0"',
          'docker push "$REGISTRY/$REPO:1.0"',
          '',
          '# 4) ECS / EKS 가 같은 IAM Role 로 자동 pull',
          'docker pull "$REGISTRY/$REPO:1.0"',
          '',
          '# 💡 같은 region 트래픽은 무료, 인터넷 송신은 GB당 과금',
          '# 💡 lifecycle policy 로 오래된 태그 자동 삭제 가능',
        ],
        highlight: [3, 4, 5, 6, 14, 15, 18, 19],
      },
      gcr: {
        lang: 'bash',
        filename: 'gcr.sh',
        lines: [
          '#!/usr/bin/env bash',
          '# (A) GitHub Container Registry — ghcr.io',
          '#     code 와 같은 권한 모델(PAT)로 이미지 관리',
          '',
          '# 1) PAT 로 로그인 (scope: write:packages)',
          'echo "$GITHUB_TOKEN" \\',
          '  | docker login ghcr.io -u hoyoung --password-stdin',
          '',
          '# 2) push — owner 는 GitHub username 또는 org',
          'docker tag myapp:1.0 ghcr.io/hoyoung/myapp:1.0',
          'docker push ghcr.io/hoyoung/myapp:1.0',
          '',
          '# 3) public 으로 공개하면 인증 없이 누구나 pull',
          'docker pull ghcr.io/hoyoung/myapp:1.0',
          '',
          '# ────────────────────────────────────────',
          '# (B) Google Artifact Registry — *.pkg.dev',
          '#     (구) gcr.io 는 legacy, 신규는 Artifact Registry 권장',
          '',
          'REGION=asia-northeast3',
          'PROJECT=my-gcp-project',
          'REPO=myapp-repo',
          'REGISTRY="${REGION}-docker.pkg.dev"',
          '',
          '# 1) 인증 (gcloud 가 docker credential helper 등록)',
          'gcloud auth configure-docker "$REGISTRY"',
          '',
          '# 2) push',
          'docker tag myapp:1.0 \\',
          '  "$REGISTRY/$PROJECT/$REPO/myapp:1.0"',
          'docker push "$REGISTRY/$PROJECT/$REPO/myapp:1.0"',
        ],
        highlight: [1, 5, 6, 9, 10, 16, 18, 22, 24, 27, 28, 29],
      },
      harbor: {
        lang: 'yaml',
        filename: 'harbor.yaml',
        lines: [
          '# Harbor — CNCF 졸업 프로젝트, 사내 자체 호스팅 레지스트리',
          '# 설치: docker-compose 한 번 → RBAC + 스캔 + 서명 + replication',
          '',
          'hostname: harbor.company.local       # 사내 도메인',
          'http:',
          '  port: 80',
          'https:',
          '  port: 443',
          '  certificate: /data/cert/harbor.crt',
          '  private_key: /data/cert/harbor.key',
          '',
          'harbor_admin_password: "ChangeMe!"   # 초기 admin 비밀번호',
          '',
          'database:',
          '  password: db-pass',
          '  max_idle_conns: 100',
          '',
          'data_volume: /data                   # 이미지 blob 저장 경로',
          '',
          'trivy:                               # 취약점 스캐너 (내장)',
          '  ignore_unfixed: false',
          '  skip_update: false',
          '',
          'jobservice:',
          '  max_job_workers: 10',
          '',
          'log:',
          '  level: info',
          '',
          '# ── 사용 ──────────────────────────────────────',
          '# docker login harbor.company.local -u admin',
          '# docker tag myapp:1.0 harbor.company.local/team-a/myapp:1.0',
          '# docker push harbor.company.local/team-a/myapp:1.0',
          '#',
          '# ✅ 외부 인터넷 노출 불가능 환경 (금융·공공·제조) 표준',
          '# ✅ Trivy 스캔 + Cosign 서명 + replication 내장',
        ],
        highlight: [1, 2, 4, 5, 8, 9, 12, 18, 20, 30, 31, 32, 33],
      },
      pushpull: {
        lang: 'bash',
        filename: 'push-pull.sh',
        lines: [
          '#!/usr/bin/env bash',
          '# docker push 의 내부 — 사실은 3 phase 다',
          '# Registry HTTP API V2 spec 기준',
          '',
          '# ─── Phase 1. AUTH ────────────────────────────────',
          '# (1) 클라이언트가 push 시도 → 401 + WWW-Authenticate 헤더',
          '# (2) 토큰 서버에서 Bearer token 발급',
          'curl -u "$USER:$PASS" \\',
          '  "https://auth.docker.io/token?service=registry.docker.io&scope=repository:hoyoung/myapp:pull,push"',
          '#  → { "token": "eyJhbGc...", "expires_in": 300 }',
          '',
          '# ─── Phase 2. MANIFEST 조회 ───────────────────────',
          '# 이미 있는 layer 는 다시 보내지 않는다',
          'curl -H "Authorization: Bearer $TOKEN" \\',
          '  "https://registry-1.docker.io/v2/hoyoung/myapp/blobs/sha256:<digest>"',
          '#  → 200 OK   (이미 존재 → skip)',
          '#  → 404      (없음 → 다음 phase 에서 업로드)',
          '',
          '# ─── Phase 3. BLOB UPLOAD (없는 layer 만) ─────────',
          '# (1) 업로드 세션 시작 → Location 헤더에 upload URL',
          'curl -X POST -H "Authorization: Bearer $TOKEN" \\',
          '  "https://registry-1.docker.io/v2/hoyoung/myapp/blobs/uploads/"',
          '',
          '# (2) chunk 단위 PUT (대형 layer 는 chunked)',
          'curl -X PUT \\',
          '  -H "Authorization: Bearer $TOKEN" \\',
          '  -H "Content-Type: application/octet-stream" \\',
          '  --data-binary @layer.tar.gz \\',
          '  "<upload-url>?digest=sha256:<digest>"',
          '',
          '# (3) 마지막에 manifest PUT — 이미지 메타 등록',
          'curl -X PUT \\',
          '  -H "Authorization: Bearer $TOKEN" \\',
          '  -H "Content-Type: application/vnd.docker.distribution.manifest.v2+json" \\',
          '  --data-binary @manifest.json \\',
          '  "https://registry-1.docker.io/v2/hoyoung/myapp/manifests/1.0"',
          '',
          '# 💡 같은 base 이미지면 Phase 3 가 거의 비어 → push 가 빠르다',
          '# 💡 docker pull 은 정확히 역순: manifest GET → blob GET',
        ],
        highlight: [5, 6, 7, 8, 9, 12, 13, 14, 15, 19, 20, 21, 22, 24, 25, 26, 27, 28, 29, 31, 32, 33, 34, 35, 36],
      },
    };

    // ─────────────────────────────────────────────────────
    // 좌측 상단: Registry Wall — 4개 박스
    //   activeId 인 박스만 ring + bold 처리
    // ─────────────────────────────────────────────────────
    function RegistryWall({ activeId }) {
      const colorMap = {
        blue:   { bg: 'bg-blue-50',   border: 'border-blue-300',   text: 'text-blue-800',   ring: 'ring-blue-400'   },
        orange: { bg: 'bg-orange-50', border: 'border-orange-300', text: 'text-orange-800', ring: 'ring-orange-400' },
        green:  { bg: 'bg-green-50',  border: 'border-green-300',  text: 'text-green-800',  ring: 'ring-green-400'  },
        slate:  { bg: 'bg-slate-50',  border: 'border-slate-300',  text: 'text-slate-800',  ring: 'ring-slate-400'  },
      };
      return (
        <div className="bg-white rounded-lg border-2 border-sky-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🏪</span>
              <span className="text-[11px] font-bold text-sky-800">Registry 4종</span>
            </div>
            <span className="text-[9px] bg-sky-100 text-sky-700 px-1.5 py-0.5 rounded font-mono">
              active: {activeId}
            </span>
          </div>
          <div className="grid grid-cols-2 gap-2">
            {REGISTRIES.map((r) => {
              const c = colorMap[r.color];
              const active = r.id === activeId;
              return (
                <div
                  key={r.id}
                  className={`rounded-lg border-2 p-2 transition-all duration-500 ${c.bg} ${c.border} ${
                    active ? `ring-4 ${c.ring} ring-active scale-[1.02]` : 'opacity-60'
                  }`}
                >
                  <div className="flex items-center gap-1.5 mb-1">
                    <span className="text-xl">{r.icon}</span>
                    <div className={`text-[11px] font-bold ${c.text}`}>{r.name}</div>
                  </div>
                  <code className="block text-[8px] text-slate-500 font-mono leading-tight mb-1 truncate">
                    {r.domain}
                  </code>
                  <div className={`text-[9px] ${c.text} leading-tight`}>{r.tagline}</div>
                  <div className="text-[8px] text-slate-500 mt-1 leading-tight">{r.pricing}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단 (Step 1~4): Registry Detail 카드
    //   active 한 registry의 push/pull 한 줄 명령 미리보기
    // ─────────────────────────────────────────────────────
    function RegistryDetail({ activeId }) {
      const r = REGISTRIES.find((x) => x.id === activeId);
      const samples = {
        dockerhub: [
          { dir: 'push', cmd: 'docker push hoyoung/myapp:1.0' },
          { dir: 'pull', cmd: 'docker pull nginx:1.25' },
        ],
        ecr: [
          { dir: 'auth', cmd: 'aws ecr get-login-password | docker login ...' },
          { dir: 'push', cmd: 'docker push 1234.dkr.ecr.ap-northeast-2.amazonaws.com/myapp:1.0' },
        ],
        gcr: [
          { dir: 'push', cmd: 'docker push ghcr.io/hoyoung/myapp:1.0' },
          { dir: 'push', cmd: 'docker push asia-northeast3-docker.pkg.dev/proj/repo/myapp:1.0' },
        ],
        harbor: [
          { dir: 'auth', cmd: 'docker login harbor.company.local -u admin' },
          { dir: 'push', cmd: 'docker push harbor.company.local/team-a/myapp:1.0' },
        ],
      };
      const list = samples[activeId] || [];
      return (
        <div className="bg-white rounded-lg border-2 border-sky-200 p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">{r.icon}</span>
            <span className="text-[11px] font-bold text-sky-800">{r.name} — 사용 예시</span>
          </div>
          <div className="space-y-1.5">
            {list.map((s, i) => (
              <div
                key={i}
                className="flex items-center gap-2 bg-slate-900 rounded px-2 py-1.5"
              >
                <span className={`text-[8px] font-bold px-1.5 py-0.5 rounded ${
                  s.dir === 'push' ? 'bg-sky-600 text-white' :
                  s.dir === 'pull' ? 'bg-emerald-600 text-white' :
                  'bg-amber-600 text-white'
                }`}>
                  {s.dir.toUpperCase()}
                </span>
                <code className="text-[10px] text-green-300 font-mono flex-1 truncate">
                  $ {s.cmd}
                </code>
              </div>
            ))}
          </div>
          <div className="mt-2 text-[9px] text-slate-500 leading-snug">
            <span className="font-bold text-sky-700">핵심:</span> 4가지 모두 명령어 형태는 동일하다 — 도메인만 다를 뿐.
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단 (Step 5): push/pull 흐름 시뮬레이션
    //   3 phase 가 시각화됨: auth → manifest → blob upload
    // ─────────────────────────────────────────────────────
    function PushFlowSim({ flow }) {
      return (
        <div className="bg-white rounded-lg border-2 border-sky-300 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🔄</span>
              <span className="text-[11px] font-bold text-sky-800">docker push 내부 흐름</span>
            </div>
            <span className="text-[9px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
              3 phase
            </span>
          </div>

          {/* Phase 1. AUTH */}
          <div className="bg-amber-50 border border-amber-300 rounded p-2 mb-2">
            <div className="flex items-center justify-between">
              <span className="text-[10px] font-bold text-amber-800">① AUTH</span>
              <span className={`text-[9px] px-1.5 py-0.5 rounded font-bold ${
                flow.authed ? 'bg-emerald-600 text-white' : 'bg-slate-400 text-white'
              }`}>
                {flow.authed ? '✓ Bearer token 발급' : '대기'}
              </span>
            </div>
            <code className="text-[9px] text-amber-700 font-mono block mt-0.5">
              POST /token → eyJhbGc...
            </code>
          </div>

          {/* Phase 2. MANIFEST */}
          <div className="bg-sky-50 border border-sky-300 rounded p-2 mb-2">
            <div className="flex items-center justify-between mb-1">
              <span className="text-[10px] font-bold text-sky-800">② MANIFEST 조회</span>
              <span className="text-[9px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono">
                {flow.manifest.existing} 존재 / {flow.manifest.missing} 누락
              </span>
            </div>
            <div className="flex gap-1">
              {Array.from({ length: flow.manifest.existing + flow.manifest.missing }).map((_, i) => {
                const exists = i < flow.manifest.existing;
                return (
                  <div
                    key={i}
                    className={`flex-1 h-4 rounded text-[8px] font-bold flex items-center justify-center ${
                      exists ? 'bg-emerald-500 text-white' : 'bg-rose-200 text-rose-700'
                    }`}
                  >
                    {exists ? '✓' : '✗'}
                  </div>
                );
              })}
            </div>
            <div className="text-[8px] text-sky-700 mt-1">layer 별로 GET /v2/.../blobs/sha256: 호출</div>
          </div>

          {/* Phase 3. BLOB UPLOAD */}
          <div className="bg-rose-50 border border-rose-300 rounded p-2">
            <div className="flex items-center justify-between mb-1.5">
              <span className="text-[10px] font-bold text-rose-800">③ BLOB UPLOAD (누락분만)</span>
              <span className="text-[9px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-mono">
                PUT /blobs/uploads/
              </span>
            </div>
            <div className="space-y-1">
              {flow.blobs.map((b, i) => {
                const stateColor = {
                  exists:    'bg-emerald-100 text-emerald-700 border-emerald-300',
                  uploading: 'bg-sky-100   text-sky-800     border-sky-400 ring-1 ring-sky-300',
                  queued:    'bg-slate-100 text-slate-500   border-slate-300',
                }[b.state];
                return (
                  <div key={i} className={`flex items-center gap-1.5 px-1.5 py-1 rounded border ${stateColor}`}>
                    <code className="text-[8px] font-mono w-16">{b.sha}</code>
                    <span className="text-[9px] w-12 text-right">{b.size}</span>
                    <div className="flex-1 bg-white rounded h-1.5 overflow-hidden border border-slate-200">
                      <div
                        className={`h-full transition-all duration-500 ${
                          b.state === 'exists'    ? 'bg-emerald-500 w-full' :
                          b.state === 'uploading' ? 'bg-sky-500'             :
                                                    'bg-slate-300 w-0'
                        }`}
                        style={b.state === 'uploading' ? { width: `${b.pct}%` } : {}}
                      />
                    </div>
                    <span className="text-[8px] font-bold w-12 text-right">
                      {b.state === 'exists'    ? 'SKIP' :
                       b.state === 'uploading' ? `${b.pct}%` :
                                                 'queue'}
                    </span>
                  </div>
                );
              })}
            </div>
            <div className="text-[8px] text-rose-700 mt-1.5 leading-snug">
              💡 같은 base image 면 layer가 재사용되어 ② 에서 대부분 ✓ → ③ 거의 빈다 (push 가 빠른 이유)
            </div>
          </div>

          {/* 마무리 manifest PUT */}
          <div className="bg-purple-50 border border-purple-300 rounded p-2 mt-2">
            <div className="flex items-center justify-between">
              <span className="text-[10px] font-bold text-purple-800">④ Manifest PUT (등록)</span>
              <code className="text-[8px] text-purple-700 font-mono">
                PUT /manifests/1.0
              </code>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: Registry Wall (항상)
    //   하단: Step 1~4 → RegistryDetail / Step 5 → PushFlowSim
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📦 Registry 4종 + push/pull 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <RegistryWall activeId={step.active} />
            {step.flow
              ? <PushFlowSim flow={step.flow} />
              : <RegistryDetail activeId={step.active} />}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-blue-500"></span>Docker Hub
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-orange-500"></span>AWS ECR
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-green-500"></span>GHCR/GCR
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-500"></span>Harbor
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-sky-500"></span>active
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 파일명 탭
    //   탭 5개 (현재 step의 파일이 활성)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ codeKey, stepIdx, total, onTab }) {
      const code = CODE[codeKey];
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      const tabs = [
        { key: 'dockerhub', label: 'dockerhub.sh' },
        { key: 'ecr',       label: 'ecr.sh' },
        { key: 'gcr',       label: 'gcr.sh' },
        { key: 'harbor',    label: 'harbor.yaml' },
        { key: 'pushpull',  label: 'push-pull.sh' },
      ];

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일 탭 */}
          <div className="bg-[#21252b] flex items-end border-b border-slate-700 overflow-x-auto">
            {tabs.map((t) => {
              const active = t.key === codeKey;
              return (
                <button
                  key={t.key}
                  onClick={() => onTab && onTab(t.key)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap transition border-r border-slate-700 ${
                    active
                      ? 'bg-[#282c34] text-sky-300 border-t-2 border-t-sky-400'
                      : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800'
                  }`}
                >
                  {t.label}
                </button>
              );
            })}
          </div>

          {/* hljs 토큰화 hidden */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 라인 + 강조 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.filename} · {code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [tabOverride, setTabOverride] = useState(null);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];
      const codeKey = tabOverride || step.codeKey;

      const handleNext = () => {
        setTabOverride(null);
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => {
        setTabOverride(null);
        setStepIdx((i) => Math.max(0, i - 1));
      };
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) {
          setStepIdx(0);
          setTabOverride(null);
        }
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setTabOverride(null);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. Docker 핵심 &gt; Chapter 1. 이미지·컨테이너</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-1-3. Registry — Docker Hub / ECR / GCR / Harbor</h1>
                  <p className="text-sm text-slate-500 mt-0.5">4가지 레지스트리 비교 + push/pull 내부 흐름(auth → manifest → blob)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                codeKey={codeKey}
                stepIdx={stepIdx}
                total={STEPS.length}
                onTab={setTabOverride}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>Hub</strong>(공개·간단) · <strong>ECR</strong>(AWS 통합) · <strong>GHCR/GCR</strong>(코드 가까이) · <strong>Harbor</strong>(사내 자체호스팅). push 한 번엔 <strong>auth → manifest → blob</strong> 3 phase가 일어나고, layer가 재사용되면 거의 즉시 끝난다. 다음(II-1-4)에선 컨테이너 레이어와 storage driver를 본다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Docker Hub', 'AWS ECR', 'GHCR', 'GCR', 'Harbor', 'Bearer token', 'manifest', 'blob layer', 'push/pull'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./ii-1-2_image-vs-container.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; II-1-2 이미지 vs 컨테이너</a>
              <a href="./ii-1-4_layers-storage.html" className="text-sky-700 hover:text-sky-900 font-medium">II-1-4 Layers · Storage &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
