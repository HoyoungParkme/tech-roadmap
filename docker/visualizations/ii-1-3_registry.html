<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — Docker Hub와 레지스트리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes moveUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
    @keyframes arrowRight { 0%{opacity:0;transform:translateX(-8px);} 50%{opacity:1;} 100%{opacity:0;transform:translateX(8px);} }
    @keyframes arrowLeft { 0%{opacity:0;transform:translateX(8px);} 50%{opacity:1;} 100%{opacity:0;transform:translateX(-8px);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-up { animation: moveUp 0.4s ease-out forwards; }
    .anim-arrow-r { animation: arrowRight 1.2s ease-in-out infinite; }
    .anim-arrow-l { animation: arrowLeft 1.2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · 앱스토어 비유",
        desc: "스마트폰에서 앱을 설치할 때 App Store를 쓴다. 거기서 앱을 다운로드하면 폰에 설치된다. 레지스트리(Registry)는 Docker 이미지의 앱스토어다. 이미지를 올리고(push), 내려받고(pull), 검색할 수 있다.",
        phase: "intro",
      },
      {
        title: "STEP 2 · Docker Hub — 가장 큰 레지스트리",
        desc: "Docker Hub(hub.docker.com)는 Docker가 운영하는 공식 레지스트리다. 공식 이미지(nginx, python, postgres)는 Docker가 직접 관리하고 보안 검토를 거친다. 사용자 이미지(username/myapp)는 누구나 올릴 수 있다.",
        phase: "hub",
      },
      {
        title: "STEP 3 · docker pull 명령어 분석",
        desc: "docker pull nginx:1.25 명령어는 세 부분으로 구성된다. 레지스트리 주소(registry.hub.docker.com — 기본값이라 생략), 이미지 이름(nginx), 태그(1.25 — 버전). 태그를 생략하면 자동으로 latest가 사용된다.",
        phase: "pull",
      },
      {
        title: "STEP 4 · 태그 시스템",
        desc: "같은 이미지에도 여러 태그(버전)가 있다. python:3.11은 전체 버전, python:3.11-slim은 경량 버전, python:3.11-alpine은 초경량 버전이다. 실무에서는 latest 대신 구체적인 버전 태그를 사용하는 것이 안전하다.",
        phase: "tags",
      },
      {
        title: "STEP 5 · 사설 레지스트리",
        desc: "회사에서는 보안과 속도를 위해 사설 레지스트리를 운영한다. GitHub Container Registry(ghcr.io), AWS ECR, GCP Artifact Registry 등이 있다. Docker Hub와 사용법은 동일하고 주소만 다르다.",
        phase: "private",
      },
      {
        title: "STEP 6 · push/pull 전체 흐름",
        desc: "개발자가 이미지를 빌드(build)하고, 레지스트리에 올리고(push), 서버가 내려받아(pull) 실행(run)한다. 이 흐름이 Docker 배포의 핵심이다.",
        phase: "flow",
      },
    ];

    /* -- 앱스토어 비유 -- */
    function AppStoreView() {
      return (
        <div className="grid grid-cols-2 gap-4 anim-fade">
          <div className="bg-white rounded-xl border-2 border-blue-300 p-4 text-center">
            <div className="text-4xl mb-2">📱</div>
            <div className="font-bold text-blue-800">App Store</div>
            <div className="mt-3 space-y-1.5">
              {["카카오톡 다운로드", "인스타그램 다운로드", "내 앱 업로드"].map((t, i) => (
                <div key={i} className="bg-blue-50 text-blue-700 text-xs px-3 py-1.5 rounded-lg anim-slide" style={{animationDelay:`${i*0.1}s`}}>{t}</div>
              ))}
            </div>
          </div>
          <div className="bg-white rounded-xl border-2 border-emerald-300 p-4 text-center">
            <div className="text-4xl mb-2">🐳</div>
            <div className="font-bold text-emerald-800">Docker Registry</div>
            <div className="mt-3 space-y-1.5">
              {["docker pull nginx", "docker pull python", "docker push myapp"].map((t, i) => (
                <div key={i} className="bg-emerald-50 text-emerald-700 text-xs px-3 py-1.5 rounded-lg font-mono anim-slide" style={{animationDelay:`${i*0.1+0.3}s`}}>{t}</div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* -- Docker Hub 구조 -- */
    function HubView() {
      const official = [
        { name: "nginx", pulls: "1B+", icon: "🌐" },
        { name: "python", pulls: "1B+", icon: "🐍" },
        { name: "postgres", pulls: "800M+", icon: "🐘" },
        { name: "node", pulls: "1B+", icon: "💚" },
      ];
      const user = [
        { name: "devteam/myapp", pulls: "1.2K", icon: "👤" },
        { name: "company/backend", pulls: "5K", icon: "🏢" },
      ];
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 anim-fade">
          <div className="text-center mb-3">
            <span className="text-3xl">🏪</span>
            <div className="font-bold text-slate-800">Docker Hub (hub.docker.com)</div>
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div>
              <div className="text-xs font-bold text-blue-600 mb-2 flex items-center gap-1">
                <span className="bg-blue-100 px-1.5 py-0.5 rounded text-[10px]">OFFICIAL</span> 공식 이미지
              </div>
              {official.map((img, i) => (
                <div key={i} className="flex items-center justify-between px-3 py-1.5 bg-blue-50 rounded-lg mb-1.5 anim-slide" style={{animationDelay:`${i*0.08}s`}}>
                  <span className="text-sm">{img.icon} {img.name}</span>
                  <span className="text-[10px] text-slate-400">{img.pulls} pulls</span>
                </div>
              ))}
            </div>
            <div>
              <div className="text-xs font-bold text-slate-500 mb-2 flex items-center gap-1">
                <span className="bg-slate-100 px-1.5 py-0.5 rounded text-[10px]">USER</span> 사용자 이미지
              </div>
              {user.map((img, i) => (
                <div key={i} className="flex items-center justify-between px-3 py-1.5 bg-slate-50 rounded-lg mb-1.5 anim-slide" style={{animationDelay:`${i*0.08+0.3}s`}}>
                  <span className="text-sm">{img.icon} {img.name}</span>
                  <span className="text-[10px] text-slate-400">{img.pulls} pulls</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* -- pull 명령어 분석 -- */
    function PullAnalysis() {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 anim-fade">
          <h4 className="font-bold text-sm text-slate-700 mb-4">🔍 docker pull 명령어 해부</h4>
          <div className="bg-slate-800 rounded-xl p-4 mb-4">
            <code className="text-green-400 text-sm">docker pull </code>
            <code className="text-yellow-300 text-sm">registry.hub.docker.com</code>
            <code className="text-slate-400 text-sm"> / </code>
            <code className="text-cyan-300 text-sm">nginx</code>
            <code className="text-slate-400 text-sm"> : </code>
            <code className="text-pink-300 text-sm">1.25</code>
          </div>
          <div className="grid grid-cols-3 gap-3">
            {[
              { part: "레지스트리 주소", value: "registry.hub.docker.com", note: "기본값이라 생략 가능", color: "border-yellow-300 bg-yellow-50 text-yellow-800" },
              { part: "이미지 이름", value: "nginx", note: "공식 이미지는 이름만", color: "border-cyan-300 bg-cyan-50 text-cyan-800" },
              { part: "태그 (버전)", value: "1.25", note: "생략 시 latest", color: "border-pink-300 bg-pink-50 text-pink-800" },
            ].map((item, i) => (
              <div key={i} className={`rounded-lg border-2 p-3 ${item.color} anim-up`} style={{animationDelay:`${i*0.15}s`}}>
                <div className="text-xs font-bold mb-1">{item.part}</div>
                <code className="text-xs font-mono">{item.value}</code>
                <div className="text-[10px] mt-1 opacity-70">{item.note}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* -- 태그 시스템 -- */
    function TagSystem() {
      const tags = [
        { tag: "python:3.11", size: "1.0 GB", desc: "전체 설치 (Debian 기반)", rec: false },
        { tag: "python:3.11-slim", size: "150 MB", desc: "경량 버전 (최소 패키지)", rec: true },
        { tag: "python:3.11-alpine", size: "50 MB", desc: "초경량 (Alpine Linux)", rec: false },
        { tag: "python:latest", size: "1.0 GB", desc: "최신 버전 (변경될 수 있음)", rec: false },
      ];
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 anim-fade">
          <h4 className="font-bold text-sm text-slate-700 mb-3">🏷️ Python 이미지 태그 비교</h4>
          <div className="space-y-2">
            {tags.map((t, i) => (
              <div key={i} className={`flex items-center justify-between px-3 py-2 rounded-lg border anim-slide ${
                t.rec ? "border-emerald-300 bg-emerald-50" : "border-slate-200 bg-slate-50"
              }`} style={{animationDelay:`${i*0.1}s`}}>
                <div className="flex items-center gap-2">
                  <code className="text-xs font-mono font-bold text-slate-800">{t.tag}</code>
                  {t.rec && <span className="text-[10px] bg-emerald-200 text-emerald-800 px-1.5 py-0.5 rounded">추천</span>}
                </div>
                <div className="text-right">
                  <div className="text-xs text-slate-500">{t.size}</div>
                  <div className="text-[10px] text-slate-400">{t.desc}</div>
                </div>
              </div>
            ))}
          </div>
          <div className="mt-3 bg-yellow-50 border border-yellow-200 rounded-lg p-2 text-center">
            <span className="text-xs text-yellow-700 font-medium">⚠ latest는 버전이 바뀔 수 있어 실무에서는 구체적 태그 사용 권장</span>
          </div>
        </div>
      );
    }

    /* -- 사설 레지스트리 -- */
    function PrivateRegistries() {
      const registries = [
        { name: "Docker Hub", domain: "hub.docker.com", icon: "🐳", type: "공개", color: "border-blue-300 bg-blue-50" },
        { name: "GitHub (ghcr.io)", domain: "ghcr.io", icon: "🐙", type: "사설", color: "border-slate-300 bg-slate-50" },
        { name: "AWS ECR", domain: "xxx.dkr.ecr.region.amazonaws.com", icon: "☁️", type: "사설", color: "border-orange-300 bg-orange-50" },
        { name: "GCP Artifact Registry", domain: "region-docker.pkg.dev", icon: "🌐", type: "사설", color: "border-green-300 bg-green-50" },
      ];
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 anim-fade">
          <h4 className="font-bold text-sm text-slate-700 mb-3">🏢 레지스트리 종류</h4>
          <div className="space-y-2">
            {registries.map((r, i) => (
              <div key={i} className={`flex items-center justify-between px-3 py-2 rounded-lg border ${r.color} anim-slide`} style={{animationDelay:`${i*0.1}s`}}>
                <div className="flex items-center gap-2">
                  <span className="text-xl">{r.icon}</span>
                  <div>
                    <div className="text-sm font-medium">{r.name}</div>
                    <code className="text-[10px] text-slate-400">{r.domain}</code>
                  </div>
                </div>
                <span className={`text-[10px] px-2 py-0.5 rounded-full font-medium ${r.type === "공개" ? "bg-blue-200 text-blue-800" : "bg-slate-200 text-slate-700"}`}>
                  {r.type}
                </span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* -- 전체 흐름 -- */
    function FullFlow() {
      const steps = [
        { label: "개발자 PC", icon: "💻", cmd: "docker build", color: "bg-blue-100 border-blue-300" },
        { label: "레지스트리", icon: "🏪", cmd: "docker push", color: "bg-purple-100 border-purple-300" },
        { label: "운영 서버", icon: "🌐", cmd: "docker pull + run", color: "bg-emerald-100 border-emerald-300" },
      ];
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 anim-fade">
          <h4 className="font-bold text-sm text-slate-700 mb-4 text-center">📋 빌드 → 푸시 → 풀 → 실행</h4>
          <div className="flex items-center justify-center gap-2">
            {steps.map((s, i) => (
              <React.Fragment key={i}>
                <div className={`rounded-xl border-2 p-4 text-center ${s.color} anim-up min-w-[120px]`} style={{animationDelay:`${i*0.2}s`}}>
                  <div className="text-3xl mb-1">{s.icon}</div>
                  <div className="text-sm font-bold">{s.label}</div>
                  <code className="text-[10px] text-slate-500 mt-1 block">{s.cmd}</code>
                </div>
                {i < steps.length - 1 && (
                  <div className="text-blue-400 text-lg anim-arrow-r mx-1">→</div>
                )}
              </React.Fragment>
            ))}
          </div>
          <div className="mt-4 bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-center">
            <span className="text-xs text-emerald-700 font-medium">이 흐름이 Docker 배포의 전부다. build → push → pull → run</span>
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter II-1-3: Docker Hub와 레지스트리</h1>
              </div>
              <p className="text-slate-500 text-sm">앱스토어 비유로 이해하는 이미지 저장과 배포</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade text-white bg-blue-600 border-blue-700`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {data.phase === "intro" && <AppStoreView />}
            {data.phase === "hub" && <HubView />}
            {data.phase === "pull" && <PullAnalysis />}
            {data.phase === "tags" && <TagSystem />}
            {data.phase === "private" && <PrivateRegistries />}
            {data.phase === "flow" && <FullFlow />}

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
