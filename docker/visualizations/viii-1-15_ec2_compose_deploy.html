<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — EC2에 Docker Compose로 배포</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes flowArrow { 0%{opacity:0;transform:translateX(-10px);} 50%{opacity:1;} 100%{opacity:0;transform:translateX(10px);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-flow { animation: flowArrow 1.5s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · 파일 전송: scp로 프로젝트 업로드",
        desc: "scp -i my-key.pem -r ./project ubuntu@<IP>:~/app/ 명령으로 로컬 프로젝트를 EC2에 전송한다. .env 파일은 scp로 전송하지 말고, EC2에 직접 접속해서 생성하는 것이 보안상 안전하다.",
        phase: "scp",
      },
      {
        title: "STEP 2 · EC2에서 Docker Compose 실행",
        desc: "EC2에 SSH 접속 → .env 파일 생성 → docker compose up -d로 백그라운드 실행. docker compose ps로 상태를 확인하고 docker compose logs -f로 로그를 모니터링한다.",
        phase: "compose_up",
      },
      {
        title: "STEP 3 · Nginx 리버스 프록시",
        desc: "EC2 보안 그룹에서 열린 80번 포트로 들어오는 요청을 Nginx가 내부 컨테이너(8000번 등)로 전달한다. 브라우저 → 80포트(Nginx) → 8000포트(FastAPI/Express) 흐름이다.",
        phase: "nginx_proxy",
      },
      {
        title: "STEP 4 · HTTPS 설정 — Let's Encrypt + certbot",
        desc: "도메인이 있다면 certbot으로 무료 SSL 인증서를 발급받는다. certbot이 자동으로 Nginx 설정에 SSL을 추가하고 HTTP→HTTPS 리다이렉트를 설정한다. 인증서는 90일마다 자동 갱신된다.",
        phase: "https",
      },
      {
        title: "STEP 5 · 업데이트 배포",
        desc: "코드 수정 → ECR에 새 이미지 푸시 → EC2에서 docker compose pull && docker compose up -d로 업데이트. --no-deps 옵션으로 특정 서비스만 재시작하면 DB 재시작을 방지할 수 있다.",
        phase: "update",
      },
      {
        title: "STEP 6 · 전체 배포 흐름 완성",
        desc: "로컬 개발 → ECR 이미지 푸시 → EC2에서 Compose로 실행 → Nginx 리버스 프록시 → HTTPS 적용. 단일 EC2 + Docker Compose는 가장 간단한 배포 방식이다.",
        phase: "complete",
      },
    ];

    function ScpView() {
      return (
        <div className="space-y-4 anim-fade">
          <div className="bg-gray-900 rounded-xl p-5 font-mono text-sm">
            <div className="flex items-center gap-2 mb-3">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-green-500"></div>
              <span className="text-gray-400 text-xs ml-2">Terminal (로컬)</span>
            </div>
            <div className="space-y-2">
              <div className="text-gray-500"># 디렉토리 전체 전송</div>
              <div className="text-green-300">$ scp -i ~/Downloads/my-key.pem \</div>
              <div className="text-green-300 ml-4">-r ./my-project \</div>
              <div className="text-green-300 ml-4">ubuntu@13.125.100.200:~/app/</div>
            </div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className="bg-blue-50 border border-blue-200 rounded-xl p-4">
              <h4 className="font-bold text-blue-800 mb-2 flex items-center gap-2"><span>💻</span> 로컬 PC</h4>
              <div className="space-y-1 text-sm">
                {["docker-compose.yml", "Dockerfile", "src/", "nginx.conf"].map((f, i) => (
                  <div key={i} className="bg-blue-100 px-3 py-1.5 rounded text-blue-700 anim-slide" style={{animationDelay:`${i*0.1}s`}}>{f}</div>
                ))}
              </div>
            </div>
            <div className="bg-purple-50 border border-purple-200 rounded-xl p-4">
              <h4 className="font-bold text-purple-800 mb-2 flex items-center gap-2"><span>☁️</span> EC2 서버</h4>
              <div className="space-y-1 text-sm">
                {["~/app/docker-compose.yml", "~/app/Dockerfile", "~/app/src/", "~/app/nginx.conf"].map((f, i) => (
                  <div key={i} className="bg-purple-100 px-3 py-1.5 rounded text-purple-700 anim-slide" style={{animationDelay:`${i*0.1+0.3}s`}}>{f}</div>
                ))}
              </div>
            </div>
          </div>
          <div className="bg-red-50 border border-red-200 rounded-xl p-3 text-center text-sm text-red-700">
            <strong>주의:</strong> .env 파일은 scp로 전송하지 말고 EC2에 직접 접속해서 생성하세요!
          </div>
        </div>
      );
    }

    function ComposeUpView() {
      return (
        <div className="bg-gray-900 rounded-xl p-5 font-mono text-sm anim-fade">
          <div className="flex items-center gap-2 mb-3">
            <div className="w-3 h-3 rounded-full bg-red-500"></div>
            <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div className="w-3 h-3 rounded-full bg-green-500"></div>
            <span className="text-gray-400 text-xs ml-2">EC2 Terminal</span>
          </div>
          <div className="space-y-2">
            <div className="text-gray-500"># .env 파일 생성 (직접 입력)</div>
            <div className="text-green-300 anim-slide" style={{animationDelay:'0s'}}>$ cat > .env {'<<'} 'EOF'</div>
            <div className="text-yellow-300 ml-2 anim-slide" style={{animationDelay:'0.1s'}}>POSTGRES_USER=appuser</div>
            <div className="text-yellow-300 ml-2 anim-slide" style={{animationDelay:'0.15s'}}>POSTGRES_PASSWORD=strongpassword123</div>
            <div className="text-yellow-300 ml-2 anim-slide" style={{animationDelay:'0.2s'}}>POSTGRES_DB=appdb</div>
            <div className="text-green-300 anim-slide" style={{animationDelay:'0.25s'}}>EOF</div>
            <div className="mt-4 text-gray-500"># 백그라운드 실행</div>
            <div className="text-green-300 anim-slide" style={{animationDelay:'0.3s'}}>$ docker compose up -d</div>
            <div className="text-white mt-2 anim-slide" style={{animationDelay:'0.5s'}}>
              <div>[+] Running 3/3</div>
              <div className="text-cyan-300"> ✔ Container db      Started</div>
              <div className="text-cyan-300"> ✔ Container api     Started</div>
              <div className="text-cyan-300"> ✔ Container nginx   Started</div>
            </div>
            <div className="mt-4 text-gray-500"># 상태 확인</div>
            <div className="text-green-300 anim-slide" style={{animationDelay:'0.7s'}}>$ docker compose ps</div>
          </div>
        </div>
      );
    }

    function NginxProxyView() {
      const layers = [
        { label: "브라우저", icon: "🌐", port: "", color: "slate" },
        { label: "EC2:80", icon: "☁️", port: ":80", color: "blue" },
        { label: "Nginx", icon: "🔄", port: "리버스 프록시", color: "purple" },
        { label: "FastAPI", icon: "⚡", port: ":8000", color: "green" },
      ];
      return (
        <div className="space-y-4 anim-fade">
          <div className="bg-white rounded-xl border-2 border-blue-200 p-6">
            <h4 className="font-bold text-blue-800 mb-4 text-center">요청 흐름</h4>
            <div className="flex items-center justify-between">
              {layers.map((l, i) => (
                <React.Fragment key={i}>
                  <div className="flex flex-col items-center anim-slide" style={{animationDelay:`${i*0.15}s`}}>
                    <span className="text-3xl mb-1">{l.icon}</span>
                    <span className="text-xs font-bold">{l.label}</span>
                    <span className="text-xs text-slate-500">{l.port}</span>
                  </div>
                  {i < layers.length - 1 && <div className="text-blue-400 font-bold text-xl anim-flow">→</div>}
                </React.Fragment>
              ))}
            </div>
          </div>
          <div className="bg-gray-900 rounded-xl p-5 font-mono text-sm">
            <div className="text-gray-400 mb-2"># 브라우저에서 접속 확인</div>
            <div className="text-green-300">$ curl http://13.125.100.200/</div>
            <div className="text-white mt-1">{"{"}"status": "ok"{"}"}</div>
            <div className="text-green-300 mt-2">$ curl http://13.125.100.200/docs</div>
            <div className="text-white mt-1"># FastAPI Swagger UI 응답</div>
          </div>
        </div>
      );
    }

    function HttpsView() {
      const httpsSteps = [
        { step: "1", text: "certbot 설치", cmd: "sudo snap install --classic certbot", icon: "📦" },
        { step: "2", text: "인증서 발급", cmd: "sudo certbot --nginx -d example.com", icon: "🔒" },
        { step: "3", text: "자동 갱신 테스트", cmd: "sudo certbot renew --dry-run", icon: "🔄" },
      ];
      return (
        <div className="space-y-4 anim-fade">
          <div className="bg-white rounded-xl border-2 border-green-200 p-5">
            <h4 className="font-bold text-green-800 mb-4 flex items-center gap-2"><span>🔒</span> Let's Encrypt + certbot</h4>
            <div className="space-y-3">
              {httpsSteps.map((s, i) => (
                <div key={i} className="flex items-center gap-3 anim-slide" style={{animationDelay:`${i*0.2}s`}}>
                  <span className="w-8 h-8 bg-green-200 rounded-full flex items-center justify-center text-green-700 font-bold text-sm">{s.step}</span>
                  <span className="text-xl">{s.icon}</span>
                  <div className="flex-1">
                    <div className="text-sm font-bold">{s.text}</div>
                    <code className="text-xs text-slate-500">{s.cmd}</code>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div className="bg-green-50 border border-green-200 rounded-xl p-4">
            <h4 className="font-bold text-green-800 mb-2">certbot이 자동으로 처리하는 것:</h4>
            <div className="flex flex-wrap gap-2">
              {["SSL 인증서 발급", "Nginx 설정 자동 수정", "HTTP→HTTPS 리다이렉트", "90일 자동 갱신"].map((item, i) => (
                <span key={i} className="bg-green-200 text-green-800 px-3 py-1.5 rounded-full text-xs font-medium">{item}</span>
              ))}
            </div>
          </div>
          <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-700">
            <strong>사전 조건:</strong> 도메인이 EC2 탄력적 IP를 가리키는 DNS A 레코드가 설정되어 있어야 합니다.
          </div>
        </div>
      );
    }

    function UpdateView() {
      return (
        <div className="space-y-4 anim-fade">
          <div className="bg-gray-900 rounded-xl p-5 font-mono text-sm">
            <div className="flex items-center gap-2 mb-3">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-green-500"></div>
              <span className="text-gray-400 text-xs ml-2">EC2 Terminal</span>
            </div>
            <div className="space-y-3">
              <div>
                <div className="text-gray-500"># 전체 서비스 업데이트</div>
                <div className="text-green-300 anim-slide">$ docker compose pull && docker compose up -d</div>
              </div>
              <div>
                <div className="text-gray-500"># 특정 서비스만 업데이트 (DB 재시작 방지!)</div>
                <div className="text-green-300 anim-slide" style={{animationDelay:'0.2s'}}>$ docker compose pull api</div>
                <div className="text-green-300 anim-slide" style={{animationDelay:'0.3s'}}>$ docker compose up -d --no-deps api</div>
              </div>
              <div>
                <div className="text-gray-500"># 이전 이미지 정리</div>
                <div className="text-green-300 anim-slide" style={{animationDelay:'0.4s'}}>$ docker image prune -f</div>
              </div>
            </div>
          </div>
          <div className="bg-amber-50 border border-amber-200 rounded-xl p-4">
            <h4 className="font-bold text-amber-800 mb-2">--no-deps 옵션의 중요성</h4>
            <div className="grid grid-cols-2 gap-3">
              <div className="bg-red-100 rounded-lg p-3 text-center">
                <div className="text-sm font-bold text-red-700">--no-deps 없이</div>
                <div className="text-xs text-red-600 mt-1">DB 포함 모든 서비스 재시작</div>
                <div className="text-xs text-red-500 mt-1">데이터 날아갈 위험!</div>
              </div>
              <div className="bg-green-100 rounded-lg p-3 text-center">
                <div className="text-sm font-bold text-green-700">--no-deps 사용</div>
                <div className="text-xs text-green-600 mt-1">API 서비스만 재시작</div>
                <div className="text-xs text-green-500 mt-1">DB 안전하게 유지!</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function CompleteView() {
      const flow = [
        { label: "로컬 개발", icon: "💻" },
        { label: "ECR 푸시", icon: "📤" },
        { label: "EC2 배포", icon: "☁️" },
        { label: "Nginx", icon: "🔄" },
        { label: "HTTPS", icon: "🔒" },
      ];
      return (
        <div className="space-y-4 anim-fade">
          <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6">
            <div className="text-center mb-4">
              <div className="text-4xl mb-3">🎉</div>
              <h3 className="text-xl font-bold text-emerald-800">EC2 Docker Compose 배포 완성!</h3>
            </div>
            <div className="flex items-center justify-between">
              {flow.map((f, i) => (
                <React.Fragment key={i}>
                  <div className="flex flex-col items-center anim-slide" style={{animationDelay:`${i*0.15}s`}}>
                    <span className="text-2xl mb-1">{f.icon}</span>
                    <span className="text-xs font-bold">{f.label}</span>
                  </div>
                  {i < flow.length - 1 && <div className="text-emerald-400 font-bold anim-flow">→</div>}
                </React.Fragment>
              ))}
            </div>
          </div>
          <div className="bg-blue-50 border border-blue-200 rounded-xl p-4">
            <h4 className="font-bold text-blue-800 mb-2">핵심 명령어 요약</h4>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs font-mono">
              {[
                "scp -r ./project ubuntu@<IP>:~/app/",
                "docker compose up -d",
                "docker compose logs -f",
                "docker compose pull && docker compose up -d",
              ].map((cmd, i) => (
                <div key={i} className="bg-white rounded-lg px-3 py-2 text-blue-700">{cmd}</div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const renderVisual = () => {
        switch(data.phase) {
          case "scp": return <ScpView />;
          case "compose_up": return <ComposeUpView />;
          case "nginx_proxy": return <NginxProxyView />;
          case "https": return <HttpsView />;
          case "update": return <UpdateView />;
          case "complete": return <CompleteView />;
          default: return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VIII-1-15: EC2에 Docker Compose로 배포하기</h1>
              </div>
              <p className="text-slate-500 text-sm">로컬 → ECR → EC2 배포 전체 흐름을 단계별로 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "complete" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "https" ? "bg-green-600 border-green-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            <div key={`visual-${step}`}>{renderVisual()}</div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
