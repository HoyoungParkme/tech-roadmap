    학습 목표: 로컬에서 만든 docker-compose.yml을 EC2 한 대에 올려
              docker compose up -d 한 줄로 web/db/cache stack을 통째 가동하고,

          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">💻</span>
              <span className={`text-[11px] font-bold ${lit ? 'text-sky-800' : 'text-slate-500'}`}>
                로컬 PC — ./project
              </span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
              lit ? 'bg-sky-600 text-white' : 'bg-slate-300 text-slate-600'
            }`}>
              source
            </span>
          </div>
          <div className="bg-white rounded border border-slate-200 p-1.5 font-mono text-[9px] leading-snug text-slate-700 space-y-0.5">
            <div><span className="text-sky-600">📜</span> docker-compose.yml</div>
            <div><span className="text-rose-600">🔑</span> .env <span className="text-slate-400">(git ignore)</span></div>
            <div><span className="text-emerald-600">📋</span> .env.example</div>
            <div><span className="text-amber-600">⚙️</span> nginx.conf</div>
          </div>
          <div className={`text-[9px] mt-1 ${lit ? 'text-sky-700 font-semibold' : 'text-slate-400'}`}>
            {lit ? '✓ 박제 완료 (git 커밋)' : 'idle'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙: scp 업로드 화살표
    //   uploadActive 시 흐름 애니메이션
    // ─────────────────────────────────────────────────────
    function UploadArrow({ active }) {
      return (
        <div className={`rounded-lg border-2 p-2 transition-all duration-500 ${
          active ? 'bg-sky-100 border-sky-500 shadow-md' : 'bg-slate-50 border-dashed border-slate-200 opacity-60'
        }`}>
          <div className="flex items-center justify-center gap-2">
            <span className="text-base">📦</span>
            <div className="flex-1 text-center">
              <div className={`text-[10px] font-mono font-bold ${active ? 'text-sky-700' : 'text-slate-400'}`}>
                $ scp -i key.pem -r ./project ubuntu@EC2:~/app/
              </div>
              <div className={`text-base font-mono ${active ? 'text-sky-600 animate-pulse' : 'text-slate-300'}`}>
                {active ? '━━━━▶' : '─ ─ ─'}
              </div>
            </div>
            <span className="text-base">☁️</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: EC2 박스 — 도착한 파일 + stack
    //   filesOnEc2: 슬롯에 들어온 파일들
    //   servicesUp: 가동 중인 서비스
    //   overrideOn: prod override 적용 표시
    //   updateFlash: 무중단 업데이트 강조
    // ─────────────────────────────────────────────────────
    function Ec2Box({ lit, files, servicesUp, networkOn, volumeOn, overrideOn, imageVersion, updateFlash, tag }) {
      const allUp = servicesUp.length === SERVICES.length;
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          lit ? 'bg-sky-50 border-sky-400 shadow-md' : 'bg-slate-50 border-slate-200 opacity-80'
        }`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">☁️</span>
              <span className={`text-[11px] font-bold ${lit ? 'text-sky-800' : 'text-slate-500'}`}>
                EC2 — ubuntu@13.125.100.200
              </span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
              lit ? 'bg-sky-600 text-white' : 'bg-slate-300 text-slate-600'
            }`}>
              ~/app
            </span>
          </div>

          {/* 도착한 파일들 */}
          <div className="bg-white rounded border border-slate-200 p-1.5 font-mono text-[9px] leading-snug space-y-0.5 mb-2">
            {files.length === 0 ? (
              <div className="text-slate-400 italic">아직 파일 없음 — scp 대기 중</div>
            ) : (
              files.map((f, i) => {
                const isOverride = f === 'compose.prod.yml';
                const isEnv = f === '.env';
                return (
                  <div key={i} className={`${isOverride ? 'text-sky-700 font-semibold bg-sky-50 px-1 rounded' : 'text-slate-700'}`}>
                    <span className={isEnv ? 'text-rose-600' : isOverride ? 'text-sky-600' : 'text-emerald-600'}>
                      {isEnv ? '🔑' : isOverride ? '🆕' : '📄'}
                    </span>{' '}
                    {f}
                    {isOverride && <span className="text-[8px] text-sky-600 ml-1">(prod override)</span>}
                  </div>
                );
              })
            )}
          </div>

          {/* stack — 컨테이너 3개 */}
          <div className="grid grid-cols-3 gap-1.5">
            {SERVICES.map((svc) => {
              const up = servicesUp.includes(svc.id);
              const isWeb = svc.id === 'web';
              const flash = updateFlash && isWeb;
              return (
                <div
                  key={svc.id}
                  className={`rounded-lg border-2 p-2 text-center transition-all duration-500 ${
                    flash
                      ? 'bg-amber-100 border-amber-500 shadow-md animate-pulse'
                      : up
                        ? 'bg-sky-100 border-sky-500 shadow-sm'
                        : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
                  }`}
                >
                  <div className="text-base mb-0.5">{svc.icon}</div>
                  <div className={`text-[10px] font-bold ${up ? 'text-sky-800' : 'text-slate-400'}`}>
                    {svc.label}
                  </div>
                  <div className={`text-[8px] font-mono ${up ? 'text-slate-600' : 'text-slate-400'} leading-tight`}>
                    {isWeb ? `myapp:${imageVersion}` : svc.image}
                  </div>
                  {up && (
                    <div className={`mt-1 text-white text-[8px] px-1 py-0.5 rounded font-mono font-bold ${
                      flash ? 'bg-amber-600' : 'bg-sky-600'
                    }`}>
                      {flash ? 'Recreated ✓' : 'Up ✓'}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* network + volume */}
          <div className="grid grid-cols-2 gap-1.5 mt-2">
            <div className={`rounded border-2 px-1.5 py-1 transition-all duration-500 ${
              networkOn ? 'bg-emerald-50 border-emerald-300' : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
            }`}>
              <div className="flex items-center gap-1 text-[9px]">
                <span>🔗</span>
                <span className={`font-bold ${networkOn ? 'text-emerald-800' : 'text-slate-400'}`}>app_default</span>
              </div>
            </div>
            <div className={`rounded border-2 px-1.5 py-1 transition-all duration-500 ${
              volumeOn ? 'bg-amber-50 border-amber-300' : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
            }`}>
              <div className="flex items-center gap-1 text-[9px]">
                <span>💾</span>
                <span className={`font-bold ${volumeOn ? 'text-amber-800' : 'text-slate-400'}`}>db_data</span>
              </div>
            </div>
          </div>

          {/* override 배지 */}
          {overrideOn && (
            <div className="mt-2 bg-sky-100 border border-sky-400 rounded px-2 py-1 text-[9px] text-sky-800 font-mono font-semibold flex items-center gap-1.5">
              <span>🧩</span>
              <span>-f docker-compose.yml -f compose.prod.yml</span>
            </div>
          )}

          {/* 업데이트 배지 */}
          {updateFlash && tag && (
            <div className="mt-1.5 bg-amber-100 border border-amber-400 rounded px-2 py-1 text-[9px] text-amber-800 font-mono font-semibold flex items-center gap-1.5">
              <span>🔄</span>
              <span>web: {tag} (db / cache 무재시작)</span>
            </div>
          )}

          {allUp && !updateFlash && (
            <div className="mt-2 bg-emerald-50 border border-emerald-300 rounded px-2 py-1.5 text-[9px] text-emerald-800 leading-tight">
              <span className="font-bold">stack live:</span> 외부 → :8000 (또는 80/443) → web → db/cache
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 로컬 PC
    //   중앙: scp 화살표
    //   하단: EC2 + stack
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 로컬 → EC2 → Compose stack</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            <LocalBox lit={step.localLit} />

            <UploadArrow active={step.uploadActive} />

            <Ec2Box
              lit={step.ec2Lit}
              files={step.filesOnEc2}
              servicesUp={step.servicesUp}
              networkOn={step.networkOn}
              volumeOn={step.volumeOn}
              overrideOn={step.overrideOn}
              imageVersion={step.imageVersion}
              updateFlash={step.updateFlash}
              tag={step.tag}
            />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded border border-slate-300 bg-white"></span>idle
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>network
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>update
            </span>
            <span className="ml-auto font-mono">phase: {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭 + 라인 번호 + 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VIII-1-15</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VIII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VIII. 클라우드 배포 &gt; Chapter 1. 단일 서버</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-1-15. EC2 + Compose 배포 — 전체 stack 한 번에</h1>
                  <p className="text-sm text-slate-500 mt-0.5">로컬 compose 박제 → scp 업로드 → EC2에서 up -d → 환경별 override → 무중단 업데이트</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>compose 한 장 + scp + up -d</strong> 가 단일 EC2 배포의 골격이다. 무중단을 더 본격적으로 원하면 다음(VIII-1-16)에서 ECS Fargate rolling update를 본다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['EC2', 'docker compose', 'scp', '.env', 'compose.prod.yml', 'override', 'up -d', 'pull', '무중단 배포', '--no-deps'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./viii-1-14_ecr_image_push.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; VIII-1-14 ECR 이미지 push</a>
              <a href="./viii-1-16_ecs_fargate.html" className="text-sky-700 hover:text-sky-900 font-medium">VIII-1-16 ECS Fargate &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
