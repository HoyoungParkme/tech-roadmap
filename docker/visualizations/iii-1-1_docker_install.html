<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — Docker 설치</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes typing { from{width:0;} to{width:100%;} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── OS별 설치 데이터 ── */
    const OS_DATA = {
      windows: {
        label: "Windows", icon: "🪟", color: "blue",
        method: "Docker Desktop (.exe)",
        engine: "WSL2 위 Linux VM",
        gui: "제공",
        postSetup: "WSL2 사전 활성화",
        target: "개발용 Windows PC"
      },
      mac: {
        label: "Mac", icon: "🍎", color: "slate",
        method: "Docker Desktop (.dmg)",
        engine: "경량 Linux VM",
        gui: "제공",
        postSetup: "칩 종류 확인 (ARM/Intel)",
        target: "Mac 개발자"
      },
      linux: {
        label: "Linux", icon: "🐧", color: "amber",
        method: "docker-ce (패키지 관리자)",
        engine: "직접 실행 (네이티브)",
        gui: "미제공 (CLI 전용)",
        postSetup: "docker 그룹 권한 추가",
        target: "서버·CI 환경"
      }
    };

    const FIELDS = [
      { key: "method",    label: "설치 방법" },
      { key: "engine",    label: "내부 구조" },
      { key: "gui",       label: "GUI 대시보드" },
      { key: "postSetup", label: "후처리 필요" },
      { key: "target",    label: "추천 대상" },
    ];

    /* ── STEPS ── */
    const STEPS = [
      {
        title: "STEP 1 · Docker를 설치하려면?",
        desc: "Docker 설치는 운영체제마다 방법이 다르다. Windows와 Mac은 Docker Desktop(GUI 포함)을, Linux는 docker-ce(CLI 전용)를 설치한다. 먼저 본인의 운영체제를 확인하자.",
        phase: "intro",
        activeOS: ["windows", "mac", "linux"],
        terminalLines: [],
      },
      {
        title: "STEP 2 · Windows — WSL2 활성화",
        desc: "Windows에서는 Docker Desktop 설치 전에 WSL2를 활성화해야 한다. WSL2는 Windows 위에서 Linux를 실행하는 가벼운 환경이다. PowerShell을 관리자 권한으로 열고 'wsl --install'을 실행한다.",
        phase: "windows_wsl",
        activeOS: ["windows"],
        terminalLines: [
          { prompt: "PS C:\\>", cmd: "wsl --install", type: "input" },
          { text: "설치 중: Windows Subsystem for Linux", type: "output" },
          { text: "설치 중: Ubuntu", type: "output" },
          { text: "요청한 작업이 완료되었습니다. 재시작해 주세요.", type: "success" },
          { prompt: "PS C:\\>", cmd: "wsl --list --verbose", type: "input" },
          { text: "  NAME      STATE    VERSION", type: "output" },
          { text: "  Ubuntu    Running  2", type: "success" },
        ],
      },
      {
        title: "STEP 3 · Docker Desktop 설치 (Windows/Mac)",
        desc: "Docker Desktop은 Docker 엔진 + Docker Compose + GUI 대시보드를 한 번에 설치해준다. 설치 파일을 내려받아 실행하면 끝이다. Mac은 Apple Silicon(M1~M4)인지 Intel인지 확인하고 맞는 버전을 내려받는다.",
        phase: "desktop_install",
        activeOS: ["windows", "mac"],
        terminalLines: [
          { prompt: "$", cmd: "# Docker Desktop Installer 실행...", type: "input" },
          { text: "📦 Docker Desktop 설치 중...", type: "output" },
          { text: "✓ Docker Engine 설치 완료", type: "success" },
          { text: "✓ Docker Compose 설치 완료", type: "success" },
          { text: "✓ GUI 대시보드 설치 완료", type: "success" },
          { text: "🐳 시스템 트레이에 Docker 고래 아이콘이 나타남!", type: "success" },
        ],
      },
      {
        title: "STEP 4 · Linux — docker-ce 설치",
        desc: "Linux에서는 Docker Desktop 대신 docker-ce(Community Edition)를 패키지 관리자로 설치한다. GPG 키 추가 → 저장소 등록 → apt install 순서다. 설치 후에는 현재 사용자를 docker 그룹에 추가해야 sudo 없이 사용 가능하다.",
        phase: "linux_install",
        activeOS: ["linux"],
        terminalLines: [
          { prompt: "$", cmd: "sudo apt-get update", type: "input" },
          { text: "패키지 목록 갱신 중...", type: "output" },
          { prompt: "$", cmd: "sudo apt-get install -y docker-ce docker-ce-cli containerd.io", type: "input" },
          { text: "docker-ce 설치 중...", type: "output" },
          { text: "✓ docker-ce 설치 완료", type: "success" },
          { prompt: "$", cmd: "sudo usermod -aG docker $USER", type: "input" },
          { text: "✓ docker 그룹에 사용자 추가 (재로그인 필요)", type: "success" },
        ],
      },
      {
        title: "STEP 5 · 설치 확인 — docker version",
        desc: "'docker version'을 실행해서 Client와 Server 버전이 모두 출력되면 성공이다. Server 정보가 안 나오면 Docker 데몬이 실행되지 않은 것이다. Docker Desktop을 시작하거나 'systemctl start docker'를 실행한다.",
        phase: "verify",
        activeOS: ["windows", "mac", "linux"],
        terminalLines: [
          { prompt: "$", cmd: "docker version", type: "input" },
          { text: "Client:", type: "output" },
          { text: "  Version:    27.5.1", type: "output" },
          { text: "  API version: 1.47", type: "output" },
          { text: "  OS/Arch:    linux/amd64", type: "output" },
          { text: "", type: "output" },
          { text: "Server:", type: "success" },
          { text: "  Version:    27.5.1", type: "success" },
          { text: "  API version: 1.47", type: "success" },
          { text: "  OS/Arch:    linux/amd64", type: "success" },
        ],
      },
      {
        title: "STEP 6 · 설치 완료! 다음 단계는?",
        desc: "Client와 Server 버전이 모두 출력되었다면 Docker 설치가 완료된 것이다. 이제 'docker run hello-world'로 첫 컨테이너를 실행할 준비가 되었다! Docker Desktop이 트레이에서 실행 중인지 확인하는 습관을 들이자.",
        phase: "done",
        activeOS: ["windows", "mac", "linux"],
        terminalLines: [
          { prompt: "$", cmd: "docker info", type: "input" },
          { text: "Containers: 0", type: "output" },
          { text: "  Running: 0", type: "output" },
          { text: "  Paused: 0", type: "output" },
          { text: "  Stopped: 0", type: "output" },
          { text: "Images: 0", type: "output" },
          { text: "Server Version: 27.5.1", type: "success" },
          { text: "✅ Docker 설치 성공! 이제 사용할 준비 완료.", type: "success" },
        ],
      },
    ];

    /* ── OS 카드 ── */
    function OSCard({ osKey, os, isActive, phase }) {
      const isDone = phase === "done";
      const colorMap = { blue: "border-blue-400 bg-blue-50", slate: "border-slate-400 bg-slate-100", amber: "border-amber-400 bg-amber-50" };
      const activeClass = isDone
        ? "border-emerald-400 bg-emerald-50 shadow-lg"
        : isActive
          ? `${colorMap[os.color]} shadow-lg scale-[1.02]`
          : "border-slate-200 bg-slate-50 opacity-40 scale-95";

      return (
        <div className={`rounded-xl border-2 p-4 transition-all duration-500 ${activeClass}`}>
          <div className="text-center mb-3">
            <span className="text-3xl">{os.icon}</span>
            <div className="font-bold text-sm mt-1">{os.label}</div>
          </div>
          <div className="space-y-2">
            {FIELDS.map(field => (
              <div key={field.key} className={`flex items-center justify-between text-xs px-2 py-1.5 rounded-lg transition-all duration-300 ${
                isDone ? "bg-emerald-100 border border-emerald-300" : isActive ? "bg-white border border-slate-200" : "bg-slate-100 border border-transparent"
              }`}>
                <span className="text-slate-500">{field.label}</span>
                <span className={`font-mono font-bold text-right ${isDone ? "text-emerald-700" : "text-slate-700"}`}>
                  {isDone && "✓ "}{os[field.key]}
                </span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ── 터미널 ── */
    function Terminal({ lines, step }) {
      return (
        <div className="bg-gray-900 rounded-xl p-4 font-mono text-sm overflow-x-auto">
          <div className="flex gap-1.5 mb-3">
            <div className="w-3 h-3 rounded-full bg-red-500"></div>
            <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div className="w-3 h-3 rounded-full bg-green-500"></div>
          </div>
          {lines.map((line, i) => (
            <div key={`${step}-${i}`} className="anim-slide" style={{ animationDelay: `${i * 0.12}s`, opacity: 0 }}>
              {line.type === "input" ? (
                <div className="text-gray-300 mb-1">
                  <span className="text-green-400">{line.prompt} </span>
                  <span className="text-white">{line.cmd}</span>
                </div>
              ) : (
                <div className={`mb-0.5 ${line.type === "success" ? "text-emerald-400" : "text-gray-400"}`}>
                  {line.text}
                </div>
              )}
            </div>
          ))}
        </div>
      );
    }

    /* ── 메인 앱 ── */
    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const bgColor =
        data.phase === "done" ? "bg-emerald-600 border-emerald-700 text-white" :
        data.phase === "linux_install" ? "bg-amber-600 border-amber-700 text-white" :
        "bg-blue-600 border-blue-700 text-white";

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter III-1-1: Docker 설치 (Windows/Mac/Linux)</h1>
              </div>
              <p className="text-slate-500 text-sm">OS별 Docker 설치 과정을 단계별로 시뮬레이션합니다. 설치 후 'docker version'이 정상 출력되면 성공입니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${bgColor}`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              {Object.entries(OS_DATA).map(([key, os]) => (
                <OSCard
                  key={`${key}-${step}`}
                  osKey={key}
                  os={os}
                  isActive={data.activeOS.includes(key)}
                  phase={data.phase}
                />
              ))}
            </div>

            {data.terminalLines.length > 0 && (
              <Terminal lines={data.terminalLines} step={step} />
            )}

            {data.phase === "done" && (
              <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6 anim-fade">
                <div className="text-center">
                  <div className="text-4xl mb-3">🐳</div>
                  <h3 className="text-xl font-bold text-emerald-800 mb-2">Docker 설치 완료!</h3>
                  <div className="flex flex-wrap justify-center gap-2 mt-4">
                    {["docker version ✓", "docker info ✓", "Docker Desktop 실행 중 ✓", "다음: docker run hello-world"].map((item, i) => (
                      <span key={i} className="bg-emerald-200 text-emerald-800 px-3 py-1.5 rounded-full text-sm font-medium anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                        {item}
                      </span>
                    ))}
                  </div>
                </div>
              </div>
            )}

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
