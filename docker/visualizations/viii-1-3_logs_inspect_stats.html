<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker мқён„°лһҷнӢ°лёҢ н•ҷмҠө вҖ” logs, inspect, stats</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>рҹ“ҡ</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    @keyframes scrollUp { from{transform:translateY(0);} to{transform:translateY(-8px);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-blink { animation: blink 1s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 В· м»Ён…Ңмқҙл„Ҳм—җ л¬ём ңк°Җ л°ңмғқн–ҲлӢӨ",
        desc: "postgres м»Ён…Ңмқҙл„Ҳк°Җ мӢӨн–ү мӨ‘мқёлҚ° м• н”ҢлҰ¬мјҖмқҙм…ҳмқҙ DBм—җ м—°кІ°н•ҳм§Җ лӘ»н•ңлӢӨ. м–ҙл””м„ңл¶Җн„° нҷ•мқён•ҙм•ј н• к№Ң? Dockerк°Җ м ңкіөн•ҳлҠ” л””лІ„к№… 3мў… лҸ„кө¬лҘј мҲңм„ңлҢҖлЎң мӮ¬мҡ©н•ңлӢӨ.",
        phase: "problem",
        tool: "none",
      },
      {
        title: "STEP 2 В· docker logs вҖ” л¬ҙмҠЁ мқјмқҙ мһҲм—ҲлӮҳ?",
        desc: "мІ« лІҲм§ёлЎң нҷ•мқён•ҳлҠ” кІғмқҖ лЎңк·ёлӢӨ. docker logsлҠ” м»Ён…Ңмқҙл„Ҳмқҳ stdout/stderr м¶ңл Ҙмқ„ ліҙм—¬мӨҖлӢӨ. --tailлЎң мөңк·ј NмӨ„, -fлЎң мӢӨмӢңк°„ м¶”м Ғ, --sinceлЎң нҠ№м • мӢңк°„ мқҙнӣ„ лЎңк·ёл§Ң ліј мҲҳ мһҲлӢӨ.",
        phase: "logs",
        tool: "logs",
      },
      {
        title: "STEP 3 В· docker inspect вҖ” м„Өм •мқҙ л§һлӮҳ?",
        desc: "лЎңк·ём—җм„ң мӣҗмқёмқ„ м°ҫм§Җ лӘ»н–ҲлӢӨл©ҙ м»Ён…Ңмқҙл„Ҳ м„Өм •мқ„ нҷ•мқён•ңлӢӨ. docker inspectлҠ” IP мЈјмҶҢ, л§ҲмҡҙнҠё кІҪлЎң, нҷҳкІҪліҖмҲҳ, мһ¬мӢңмһ‘ м •мұ… л“ұ лӘЁл“  м„Өм •мқ„ JSONмңјлЎң ліҙм—¬мӨҖлӢӨ. --formatмңјлЎң н•„мҡ”н•ң к°’л§Ң м¶”м¶ңн•ңлӢӨ.",
        phase: "inspect",
        tool: "inspect",
      },
      {
        title: "STEP 4 В· docker stats вҖ” мһҗмӣҗмқҙ л¶ҖмЎұн•ңк°Җ?",
        desc: "м„Өм •лҸ„ м •мғҒмқёлҚ° лҠҗлҰ¬кұ°лӮҳ л¶Ҳм•Ҳм •н•ҳл©ҙ мһҗмӣҗ мӮ¬мҡ©лҹүмқ„ нҷ•мқён•ңлӢӨ. docker statsлҠ” CPU, л©”лӘЁлҰ¬, л„ӨнҠёмӣҢнҒ¬, л””мҠӨнҒ¬ I/OлҘј мӢӨмӢңк°„мңјлЎң ліҙм—¬мӨҖлӢӨ. --no-streamмңјлЎң мҠӨлғ…мғ·л§Ң м°Қмқ„ мҲҳлҸ„ мһҲлӢӨ.",
        phase: "stats",
        tool: "stats",
      },
      {
        title: "STEP 5 В· л””лІ„к№… 3лӢЁкі„ н”ҢлЎңм°ЁнҠё",
        desc: "л¬ём ң л°ңмғқ вҶ’ 1) logsлЎң м—җлҹ¬ нҷ•мқё вҶ’ 2) inspectлЎң м„Өм • нҷ•мқё вҶ’ 3) statsлЎң мһҗмӣҗ нҷ•мқё. мқҙ мҲңм„ңлҢҖлЎң м§„н–үн•ҳл©ҙ лҢҖл¶Җл¶„мқҳ м»Ён…Ңмқҙл„Ҳ л¬ём ңлҘј м§„лӢЁн•  мҲҳ мһҲлӢӨ.",
        phase: "flow",
        tool: "all",
      },
      {
        title: "STEP 6 В· н•өмӢ¬ лӘ…л №м–ҙ м •лҰ¬",
        desc: "logsлҠ” лё”лһҷл°•мҠӨ мҳҒмғҒ(кіјкұ° кё°лЎқ), inspectлҠ” кұҙк°• кІҖм§„ кІ°кіјм„ң(лӮҙл¶Җ м„Өм •), statsлҠ” мӢ¬л°• лӘЁлӢҲн„°(мӢӨмӢңк°„ мғҒнғң)лӢӨ. м„ё лҸ„кө¬лҘј мЎ°н•©н•ҳл©ҙ м»Ён…Ңмқҙл„Ҳмқҳ лӘЁл“  кІғмқ„ нҢҢм•…н•  мҲҳ мһҲлӢӨ.",
        phase: "summary",
        tool: "all",
      },
    ];

    const LOG_LINES = [
      { time: "10:00:01", level: "INFO", msg: "PostgreSQL init process complete" },
      { time: "10:00:02", level: "INFO", msg: "database system is ready to accept connections" },
      { time: "10:15:33", level: "WARN", msg: "connection limit: 100 reached" },
      { time: "10:15:34", level: "ERROR", msg: "too many connections for role 'appuser'" },
      { time: "10:15:35", level: "ERROR", msg: "FATAL: remaining connection slots reserved" },
    ];

    const INSPECT_FIELDS = [
      { key: "IP мЈјмҶҢ", value: "172.17.0.3", cmd: "--format '{{.NetworkSettings.IPAddress}}'" },
      { key: "мғҒнғң", value: "running", cmd: "--format '{{.State.Status}}'" },
      { key: "л§ҲмҡҙнҠё", value: "/var/lib/postgresql/data вҶ’ pgdata", cmd: "--format '{{range .Mounts}}...{{end}}'" },
      { key: "нҷҳкІҪліҖмҲҳ", value: "POSTGRES_PASSWORD=***, POSTGRES_DB=myapp", cmd: "--format '{{range .Config.Env}}...{{end}}'" },
      { key: "мһ¬мӢңмһ‘ м •мұ…", value: "unless-stopped", cmd: "--format '{{.HostConfig.RestartPolicy.Name}}'" },
    ];

    const STATS_DATA = {
      cpu: "12.5%",
      mem: "256MiB / 512MiB",
      memPercent: "50%",
      netIO: "1.2MB / 648KB",
      blockIO: "45MB / 12MB",
    };

    function LogViewer() {
      return (
        <div className="bg-slate-900 rounded-xl p-4 font-mono text-xs anim-fade">
          <div className="flex items-center gap-2 mb-3">
            <div className="w-3 h-3 rounded-full bg-red-500"></div>
            <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div className="w-3 h-3 rounded-full bg-green-500"></div>
            <span className="text-slate-500 ml-2">docker logs --tail 5 db</span>
          </div>
          {LOG_LINES.map((line, i) => (
            <div key={i} className="anim-slide flex gap-2" style={{animationDelay:`${i*0.1}s`}}>
              <span className="text-slate-500">{line.time}</span>
              <span className={`font-bold ${
                line.level === "ERROR" ? "text-red-400" :
                line.level === "WARN" ? "text-yellow-400" : "text-green-400"
              }`}>[{line.level}]</span>
              <span className="text-slate-300">{line.msg}</span>
            </div>
          ))}
          <div className="mt-3 pt-2 border-t border-slate-700">
            <div className="text-slate-500">мЈјмҡ” мҳөм…ҳ:</div>
            <div className="text-cyan-400">--tail 50  |  -f (мӢӨмӢңк°„)  |  --since 1h  |  -t (нғҖмһ„мҠӨнғ¬н”„)</div>
          </div>
        </div>
      );
    }

    function InspectViewer() {
      return (
        <div className="bg-white rounded-xl border-2 border-indigo-200 p-4 anim-fade">
          <h4 className="font-bold text-indigo-800 mb-3 flex items-center gap-2">
            <span className="text-xl">рҹ”Қ</span> docker inspect db
          </h4>
          <div className="space-y-2">
            {INSPECT_FIELDS.map((field, i) => (
              <div key={i} className="flex items-center justify-between bg-indigo-50 rounded-lg px-3 py-2 anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                <div>
                  <span className="font-bold text-indigo-800 text-sm">{field.key}</span>
                  <span className="text-indigo-600 font-mono text-xs ml-2">{field.value}</span>
                </div>
                <code className="text-xs text-slate-400 hidden md:block">{field.cmd}</code>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function StatsViewer() {
      return (
        <div className="bg-white rounded-xl border-2 border-amber-200 p-4 anim-fade">
          <h4 className="font-bold text-amber-800 mb-3 flex items-center gap-2">
            <span className="text-xl">рҹ“Ҡ</span> docker stats --no-stream db
          </h4>
          <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
            {[
              { label: "CPU", value: STATS_DATA.cpu, color: "amber", icon: "вҡЎ" },
              { label: "л©”лӘЁлҰ¬", value: STATS_DATA.mem, color: "red", icon: "рҹ§ " },
              { label: "MEM %", value: STATS_DATA.memPercent, color: "orange", icon: "рҹ“Ҳ" },
              { label: "NET I/O", value: STATS_DATA.netIO, color: "blue", icon: "рҹҢҗ" },
              { label: "BLOCK I/O", value: STATS_DATA.blockIO, color: "green", icon: "рҹ’ҝ" },
            ].map((item, i) => (
              <div key={i} className={`bg-${item.color}-50 border border-${item.color}-200 rounded-lg p-3 text-center anim-slide`} style={{animationDelay:`${i*0.1}s`}}>
                <div className="text-lg">{item.icon}</div>
                <div className="text-xs text-slate-500">{item.label}</div>
                <div className={`font-mono font-bold text-sm text-${item.color}-700`}>{item.value}</div>
              </div>
            ))}
          </div>
          <div className="mt-3 bg-amber-50 rounded-lg p-2 text-xs text-amber-700">
            рҹ’Ў --no-stream: н•ң лІҲл§Ң м¶ңл Ҙ | мҳөм…ҳ м—Ҷмқҙ: мӢӨмӢңк°„ к°ұмӢ  (top лӘ…л №мІҳлҹј)
          </div>
        </div>
      );
    }

    function FlowChart() {
      const steps = [
        { icon: "рҹҡЁ", label: "л¬ём ң л°ңмғқ", color: "red" },
        { icon: "рҹ“Ӣ", label: "1. logs\nм—җлҹ¬ нҷ•мқё", color: "blue" },
        { icon: "рҹ”Қ", label: "2. inspect\nм„Өм • нҷ•мқё", color: "indigo" },
        { icon: "рҹ“Ҡ", label: "3. stats\nмһҗмӣҗ нҷ•мқё", color: "amber" },
        { icon: "вң…", label: "мӣҗмқё нҢҢм•…", color: "emerald" },
      ];
      return (
        <div className="flex items-center justify-center gap-2 md:gap-4 anim-fade flex-wrap">
          {steps.map((s, i) => (
            <React.Fragment key={i}>
              <div className={`bg-${s.color}-100 border-2 border-${s.color}-300 rounded-xl p-3 md:p-4 text-center anim-slide min-w-[80px]`} style={{animationDelay:`${i*0.15}s`}}>
                <div className="text-2xl mb-1">{s.icon}</div>
                <div className={`text-xs font-bold text-${s.color}-800 whitespace-pre-line`}>{s.label}</div>
              </div>
              {i < steps.length - 1 && <div className="text-slate-400 font-bold">вҶ’</div>}
            </React.Fragment>
          ))}
        </div>
      );
    }

    function SummaryCards() {
      const cards = [
        { icon: "рҹ“Ӣ", name: "docker logs", desc: "лё”лһҷл°•мҠӨ мҳҒмғҒ", opts: ["--tail N", "-f", "--since", "-t"], color: "blue" },
        { icon: "рҹ”Қ", name: "docker inspect", desc: "кұҙк°• кІҖм§„ кІ°кіјм„ң", opts: ["--format", "| jq", "мқҙлҜём§Җм—җлҸ„ к°ҖлҠҘ"], color: "indigo" },
        { icon: "рҹ“Ҡ", name: "docker stats", desc: "мӢ¬л°• лӘЁлӢҲн„°", opts: ["--no-stream", "нҠ№м • м»Ён…Ңмқҙл„Ҳ", "м „мІҙ лӘЁлӢҲн„°л§Ғ"], color: "amber" },
      ];
      return (
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 anim-fade">
          {cards.map((c, i) => (
            <div key={i} className={`bg-${c.color}-50 border-2 border-${c.color}-300 rounded-xl p-4 anim-slide`} style={{animationDelay:`${i*0.15}s`}}>
              <div className="text-center mb-3">
                <div className="text-3xl">{c.icon}</div>
                <div className={`font-bold text-${c.color}-800`}>{c.name}</div>
                <div className={`text-xs text-${c.color}-600`}>{c.desc}</div>
              </div>
              <div className="space-y-1">
                {c.opts.map((o, j) => (
                  <div key={j} className={`bg-${c.color}-100 rounded px-2 py-1 text-xs text-${c.color}-700 font-mono`}>{o}</div>
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4500);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VIII-1-3: logs, inspect, stats вҖ” л””лІ„к№… 3мў… лҸ„кө¬</h1>
              </div>
              <p className="text-slate-500 text-sm">м»Ён…Ңмқҙл„Ҳ л¬ём ңлҘј м§„лӢЁн•ҳлҠ” м„ё к°Җм§Җ н•өмӢ¬ лҸ„кө¬лҘј лӢЁкі„лі„лЎң мӢңл®¬л Ҳмқҙм…ҳн•©лӢҲлӢӨ.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "summary" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "problem" ? "bg-red-600 border-red-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* лҸ„кө¬лі„ мӢңк°Ғнҷ” */}
            {data.tool === "logs" && <LogViewer />}
            {data.tool === "inspect" && <InspectViewer />}
            {data.tool === "stats" && <StatsViewer />}
            {data.phase === "flow" && <FlowChart />}
            {data.phase === "summary" && <SummaryCards />}

            {data.phase === "problem" && (
              <div className="bg-red-50 border-2 border-red-200 rounded-xl p-6 text-center anim-fade">
                <div className="text-4xl mb-3">рҹҡЁ</div>
                <h3 className="text-lg font-bold text-red-800">postgres м»Ён…Ңмқҙл„Ҳ вҖ” м—°кІ° л¶Ҳк°Җ!</h3>
                <p className="text-red-600 text-sm mt-2">м–ҙл–Ө лҸ„кө¬лҘј м–ҙл–Ө мҲңм„ңлЎң мӮ¬мҡ©н•ҙм•ј н• к№Ң?</p>
                <div className="flex justify-center gap-4 mt-4">
                  {["рҹ“Ӣ logs", "рҹ”Қ inspect", "рҹ“Ҡ stats"].map((t, i) => (
                    <span key={i} className="bg-red-100 text-red-700 px-3 py-1.5 rounded-full text-sm font-medium">{t}</span>
                  ))}
                </div>
              </div>
            )}

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">вҶҗ мқҙм „</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? 'вҸё м •м§Җ' : 'в–¶ мһҗлҸҷ мӢӨн–ү'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">лӢӨмқҢ вҶ’</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
