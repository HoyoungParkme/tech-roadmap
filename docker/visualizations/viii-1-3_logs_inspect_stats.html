            '',
            '# ─── 정리 ───',
            '#  · logs    = 블랙박스 영상     (과거 사건)',
            '#  · inspect = 건강 검진 결과서  (현재 설정)',
            '#  · stats   = 심박 모니터       (실시간 상태)',
            '#  → 이 셋만 손에 익으면 컨테이너 디버깅 70% 는 끝난다.',
            '#  → 나머지 30% 는 docker exec / docker events / cAdvisor 영역.',
          ],
          highlight: [3, 4, 5, 8, 9, 10, 11, 14, 15, 19, 20, 24, 25, 26],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 상단 — 로그 스트림 박스 (Step 1·2·5 활성)
    //   logsVisible 인덱스 배열로 표시할 라인을 선택
    //   logsFilter 'tail' / 'since' 라벨 표시
    // ─────────────────────────────────────────────────────
    function LogStreamBox({ active, logsVisible, logsFilter }) {
      const lines = logsVisible.map((i) => LOG_STREAM_FULL[i]);
      const headline =
        logsFilter === 'tail'  ? '$ docker logs --tail 50 db' :
        logsFilter === 'since' ? '$ docker logs --since 1h db' :
                                 '$ docker logs -f db';
      return (
        <div className={`rounded-lg border-2 transition-all duration-500 overflow-hidden ${
          active ? 'border-sky-400 shadow-md' : 'border-slate-200 opacity-60'
        }`}>
          <div className={`px-3 py-1.5 flex items-center justify-between border-b ${
            active ? 'bg-sky-100 border-sky-200' : 'bg-slate-100 border-slate-200'
          }`}>
            <div className="flex items-center gap-1.5">
              <span className="text-base">📋</span>
              <span className={`text-[11px] font-bold ${active ? 'text-sky-800' : 'text-slate-500'}`}>
                logs (실시간 스트림)
              </span>
            </div>
            {active && (
              <span className="text-[9px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono font-bold animate-pulse">
                streaming
              </span>
            )}
          </div>
          <div className="bg-slate-900 px-3 py-2 font-mono text-[10px] leading-snug min-h-[120px]">
            <div className="text-sky-300 mb-1">{headline}</div>
            {lines.length === 0 && (
              <div className="text-slate-500 italic">(이 단계에서는 로그 스트림 비활성)</div>
            )}
            {lines.map((line, i) => (
              <div key={i} className="flex gap-2">
                <span className="text-slate-500">{line.time}</span>
                <span className={`font-bold ${
                  line.level === 'ERROR' ? 'text-rose-400' :
                  line.level === 'WARN'  ? 'text-amber-300' :
                                           'text-emerald-300'
                }`}>
                  [{line.level}]
                </span>
                <span className="text-slate-200 truncate">{line.msg}</span>
              </div>
            ))}
            {active && logsFilter === null && (
              <div className="text-slate-500 mt-1">
                <span className="inline-block w-2 h-3 bg-slate-300 align-middle animate-pulse"></span>
                <span className="ml-1">(follow…)</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙 — docker inspect JSON 박스 (Step 3·5 활성)
    //   inspectShown 개수만큼 INSPECT_FIELDS 강조
    // ─────────────────────────────────────────────────────
    function InspectJsonBox({ active, shown }) {
      return (
        <div className={`rounded-lg border-2 transition-all duration-500 overflow-hidden ${
          active ? 'border-sky-400 shadow-md' : 'border-slate-200 opacity-60'
        }`}>
          <div className={`px-3 py-1.5 flex items-center justify-between border-b ${
            active ? 'bg-sky-100 border-sky-200' : 'bg-slate-100 border-slate-200'
          }`}>
            <div className="flex items-center gap-1.5">
              <span className="text-base">🔍</span>
              <span className={`text-[11px] font-bold ${active ? 'text-sky-800' : 'text-slate-500'}`}>
                inspect (메타데이터 JSON)
              </span>
            </div>
            {active && (
              <span className="text-[9px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                snapshot
              </span>
            )}
          </div>
          <div className="bg-white px-3 py-2 font-mono text-[10px] space-y-1">
            <div className="text-slate-500">$ docker inspect db | jq ".[0]"</div>
            <div className="text-slate-700">{'{'}</div>
            {INSPECT_FIELDS.map((field, i) => {
              const lit = active && i < shown;
              return (
                <div
                  key={i}
                  className={`pl-3 rounded transition-all duration-500 ${
                    lit ? 'bg-sky-50 border-l-2 border-sky-400 px-2 py-0.5' : 'opacity-50'
                  }`}
                >
                  <span className={`${lit ? 'text-sky-700 font-bold' : 'text-slate-500'}`}>
                    "{field.path}"
                  </span>
                  <span className="text-slate-400">: </span>
                  <span className={`${lit ? 'text-emerald-700' : 'text-slate-400'}`}>
                    "{field.value}"
                  </span>
                  {lit && i < INSPECT_FIELDS.length - 1 && <span className="text-slate-400">,</span>}
                </div>
              );
            })}
            <div className="text-slate-700">{'}'}</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단 — docker stats 게이지 박스 (Step 4·5 활성)
    //   STATS_METRICS 의 percent 를 막대 폭으로 표시
    //   active 일 때만 색상 입혀짐
    // ─────────────────────────────────────────────────────
    function StatsGaugeBox({ active }) {
      return (
        <div className={`rounded-lg border-2 transition-all duration-500 overflow-hidden ${
          active ? 'border-sky-400 shadow-md' : 'border-slate-200 opacity-60'
        }`}>
          <div className={`px-3 py-1.5 flex items-center justify-between border-b ${
            active ? 'bg-sky-100 border-sky-200' : 'bg-slate-100 border-slate-200'
          }`}>
            <div className="flex items-center gap-1.5">
              <span className="text-base">📊</span>
              <span className={`text-[11px] font-bold ${active ? 'text-sky-800' : 'text-slate-500'}`}>
                stats (실시간 게이지)
              </span>
            </div>
            {active && (
              <span className="text-[9px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono font-bold animate-pulse">
                live 1s
              </span>
            )}
          </div>
          <div className="bg-white px-3 py-2 space-y-1.5">
            <div className="text-[10px] text-slate-500 font-mono mb-1">
              $ docker stats --no-stream db
            </div>
            {STATS_METRICS.map((m, i) => (
              <div key={i} className="flex items-center gap-2">
                <span className="text-sm w-5 text-center">{m.icon}</span>
                <div className="w-20 text-[10px] font-bold text-slate-700">{m.key}</div>
                <div className="flex-1 bg-slate-100 rounded-full h-3 overflow-hidden border border-slate-200">
                  <div
                    className={`h-full transition-all duration-700 rounded-full ${
                      active ? `bg-${m.color}-500` : 'bg-slate-300'
                    }`}
                    style={{ width: active ? `${m.percent}%` : '0%' }}
                  />
                </div>
                <div className={`w-32 text-right text-[10px] font-mono ${
                  active ? 'text-slate-700 font-bold' : 'text-slate-400'
                }`}>
                  {m.value}
                </div>
              </div>
            ))}
            {active && (
              <div className="text-[9px] text-slate-500 mt-1.5 pt-1.5 border-t border-slate-100">
                💡 1초마다 갱신 / Ctrl+C 로 종료 / --no-stream 으로 스냅샷만
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 — 종합 흐름도 박스 (Step 5 전용 강조)
    //   flowStage 까지의 단계가 sky 로 색칠됨
    // ─────────────────────────────────────────────────────
    function FlowBox({ active, flowStage }) {
      const stages = [
        { icon: '🚨', label: '문제 발생' },
        { icon: '📋', label: '① logs' },
        { icon: '🔍', label: '② inspect' },
        { icon: '📊', label: '③ stats' },
        { icon: '✅', label: '원인 확정' },
      ];
      return (
        <div className={`rounded-lg border-2 px-3 py-2 transition-all duration-500 ${
          active ? 'border-sky-400 bg-sky-50' : 'border-dashed border-slate-200 bg-slate-50 opacity-60'
        }`}>
          <div className="flex items-center gap-1.5 mb-1.5">
            <span className="text-base">🧭</span>
            <span className={`text-[11px] font-bold ${active ? 'text-sky-800' : 'text-slate-500'}`}>
              디버깅 3단계 흐름
            </span>
          </div>
          <div className="flex items-center justify-between gap-1">
            {stages.map((s, i) => (
              <React.Fragment key={i}>
                <div
                  className={`flex-1 rounded-md border-2 px-1 py-1 text-center transition-all duration-500 ${
                    active && i <= flowStage
                      ? 'bg-white border-sky-500 shadow-sm'
                      : 'bg-slate-50 border-slate-200 opacity-50'
                  }`}
                >
                  <div className="text-base">{s.icon}</div>
                  <div className={`text-[8px] font-bold leading-tight ${
                    active && i <= flowStage ? 'text-sky-700' : 'text-slate-400'
                  }`}>
                    {s.label}
                  </div>
                </div>
                {i < stages.length - 1 && (
                  <span className={`text-xs ${
                    active && i < flowStage ? 'text-sky-500 font-bold' : 'text-slate-300'
                  }`}>→</span>
                )}
              </React.Fragment>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 로그 스트림 / 중앙: inspect JSON / 하단: stats 게이지
    //   Step 5 에서는 FlowBox 까지 추가로 활성
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const t = step.activeTool;
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 logs / inspect / stats — 관찰 명령</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            <LogStreamBox
              active={t === 'logs-stream' || t === 'logs-filter' || t === 'flow'}
              logsVisible={step.logsVisible}
              logsFilter={step.logsFilter}
            />

            <InspectJsonBox
              active={t === 'inspect' || t === 'flow'}
              shown={step.inspectShown}
            />

            <StatsGaugeBox active={step.statsActive} />

            {t === 'flow' && (
              <FlowBox active={true} flowStage={step.flowStage} />
            )}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded border border-slate-300 bg-white"></span>idle
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>error log
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>warn log
            </span>
            <span className="ml-auto font-mono">tool: {step.activeTool}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VIII-1-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VIII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VIII. Docker 운영 &gt; Chapter 1. 관찰과 디버깅</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-1-3. logs / inspect / stats — 컨테이너 관찰 3종</h1>
                  <p className="text-sm text-slate-500 mt-0.5">실시간 로그 → JSON 메타데이터 → 자원 게이지로 이어지는 디버깅 흐름을 5단계로</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>logs</strong>(블랙박스 영상) + <strong>inspect</strong>(건강 검진서) + <strong>stats</strong>(심박 모니터) — 이 셋만 손에 익으면 컨테이너 디버깅 70%는 끝난다. 다음(VIII-1-4)에서는 docker exec / events 로 더 깊이 들어간다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['docker logs', '-f / --tail / --since', 'docker inspect', '--format', 'jq', 'docker stats', '--no-stream', 'OOMKilled', 'debugging'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./viii-1-2_run_exec_ps.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; VIII-1-2 run / exec / ps</a>
              <a href="./viii-1-4_image_lifecycle.html" className="text-sky-700 hover:text-sky-900 font-medium">VIII-1-4 이미지 라이프사이클 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
