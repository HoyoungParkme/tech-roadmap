<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — logs, inspect, stats</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    @keyframes scrollUp { from{transform:translateY(0);} to{transform:translateY(-8px);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-blink { animation: blink 1s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · 컨테이너에 문제가 발생했다",
        desc: "postgres 컨테이너가 실행 중인데 애플리케이션이 DB에 연결하지 못한다. 어디서부터 확인해야 할까? Docker가 제공하는 디버깅 3종 도구를 순서대로 사용한다.",
        phase: "problem",
        tool: "none",
      },
      {
        title: "STEP 2 · docker logs — 무슨 일이 있었나?",
        desc: "첫 번째로 확인하는 것은 로그다. docker logs는 컨테이너의 stdout/stderr 출력을 보여준다. --tail로 최근 N줄, -f로 실시간 추적, --since로 특정 시간 이후 로그만 볼 수 있다.",
        phase: "logs",
        tool: "logs",
      },
      {
        title: "STEP 3 · docker inspect — 설정이 맞나?",
        desc: "로그에서 원인을 찾지 못했다면 컨테이너 설정을 확인한다. docker inspect는 IP 주소, 마운트 경로, 환경변수, 재시작 정책 등 모든 설정을 JSON으로 보여준다. --format으로 필요한 값만 추출한다.",
        phase: "inspect",
        tool: "inspect",
      },
      {
        title: "STEP 4 · docker stats — 자원이 부족한가?",
        desc: "설정도 정상인데 느리거나 불안정하면 자원 사용량을 확인한다. docker stats는 CPU, 메모리, 네트워크, 디스크 I/O를 실시간으로 보여준다. --no-stream으로 스냅샷만 찍을 수도 있다.",
        phase: "stats",
        tool: "stats",
      },
      {
        title: "STEP 5 · 디버깅 3단계 플로차트",
        desc: "문제 발생 → 1) logs로 에러 확인 → 2) inspect로 설정 확인 → 3) stats로 자원 확인. 이 순서대로 진행하면 대부분의 컨테이너 문제를 진단할 수 있다.",
        phase: "flow",
        tool: "all",
      },
      {
        title: "STEP 6 · 핵심 명령어 정리",
        desc: "logs는 블랙박스 영상(과거 기록), inspect는 건강 검진 결과서(내부 설정), stats는 심박 모니터(실시간 상태)다. 세 도구를 조합하면 컨테이너의 모든 것을 파악할 수 있다.",
        phase: "summary",
        tool: "all",
      },
    ];

    const LOG_LINES = [
      { time: "10:00:01", level: "INFO", msg: "PostgreSQL init process complete" },
      { time: "10:00:02", level: "INFO", msg: "database system is ready to accept connections" },
      { time: "10:15:33", level: "WARN", msg: "connection limit: 100 reached" },
      { time: "10:15:34", level: "ERROR", msg: "too many connections for role 'appuser'" },
      { time: "10:15:35", level: "ERROR", msg: "FATAL: remaining connection slots reserved" },
    ];

    const INSPECT_FIELDS = [
      { key: "IP 주소", value: "172.17.0.3", cmd: "--format '{{.NetworkSettings.IPAddress}}'" },
      { key: "상태", value: "running", cmd: "--format '{{.State.Status}}'" },
      { key: "마운트", value: "/var/lib/postgresql/data → pgdata", cmd: "--format '{{range .Mounts}}...{{end}}'" },
      { key: "환경변수", value: "POSTGRES_PASSWORD=***, POSTGRES_DB=myapp", cmd: "--format '{{range .Config.Env}}...{{end}}'" },
      { key: "재시작 정책", value: "unless-stopped", cmd: "--format '{{.HostConfig.RestartPolicy.Name}}'" },
    ];

    const STATS_DATA = {
      cpu: "12.5%",
      mem: "256MiB / 512MiB",
      memPercent: "50%",
      netIO: "1.2MB / 648KB",
      blockIO: "45MB / 12MB",
    };

    function LogViewer() {
      return (
        <div className="bg-slate-900 rounded-xl p-4 font-mono text-xs anim-fade">
          <div className="flex items-center gap-2 mb-3">
            <div className="w-3 h-3 rounded-full bg-red-500"></div>
            <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div className="w-3 h-3 rounded-full bg-green-500"></div>
            <span className="text-slate-500 ml-2">docker logs --tail 5 db</span>
          </div>
          {LOG_LINES.map((line, i) => (
            <div key={i} className="anim-slide flex gap-2" style={{animationDelay:`${i*0.1}s`}}>
              <span className="text-slate-500">{line.time}</span>
              <span className={`font-bold ${
                line.level === "ERROR" ? "text-red-400" :
                line.level === "WARN" ? "text-yellow-400" : "text-green-400"
              }`}>[{line.level}]</span>
              <span className="text-slate-300">{line.msg}</span>
            </div>
          ))}
          <div className="mt-3 pt-2 border-t border-slate-700">
            <div className="text-slate-500">주요 옵션:</div>
            <div className="text-cyan-400">--tail 50  |  -f (실시간)  |  --since 1h  |  -t (타임스탬프)</div>
          </div>
        </div>
      );
    }

    function InspectViewer() {
      return (
        <div className="bg-white rounded-xl border-2 border-indigo-200 p-4 anim-fade">
          <h4 className="font-bold text-indigo-800 mb-3 flex items-center gap-2">
            <span className="text-xl">🔍</span> docker inspect db
          </h4>
          <div className="space-y-2">
            {INSPECT_FIELDS.map((field, i) => (
              <div key={i} className="flex items-center justify-between bg-indigo-50 rounded-lg px-3 py-2 anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                <div>
                  <span className="font-bold text-indigo-800 text-sm">{field.key}</span>
                  <span className="text-indigo-600 font-mono text-xs ml-2">{field.value}</span>
                </div>
                <code className="text-xs text-slate-400 hidden md:block">{field.cmd}</code>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function StatsViewer() {
      return (
        <div className="bg-white rounded-xl border-2 border-amber-200 p-4 anim-fade">
          <h4 className="font-bold text-amber-800 mb-3 flex items-center gap-2">
            <span className="text-xl">📊</span> docker stats --no-stream db
          </h4>
          <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
            {[
              { label: "CPU", value: STATS_DATA.cpu, color: "amber", icon: "⚡" },
              { label: "메모리", value: STATS_DATA.mem, color: "red", icon: "🧠" },
              { label: "MEM %", value: STATS_DATA.memPercent, color: "orange", icon: "📈" },
              { label: "NET I/O", value: STATS_DATA.netIO, color: "blue", icon: "🌐" },
              { label: "BLOCK I/O", value: STATS_DATA.blockIO, color: "green", icon: "💿" },
            ].map((item, i) => (
              <div key={i} className={`bg-${item.color}-50 border border-${item.color}-200 rounded-lg p-3 text-center anim-slide`} style={{animationDelay:`${i*0.1}s`}}>
                <div className="text-lg">{item.icon}</div>
                <div className="text-xs text-slate-500">{item.label}</div>
                <div className={`font-mono font-bold text-sm text-${item.color}-700`}>{item.value}</div>
              </div>
            ))}
          </div>
          <div className="mt-3 bg-amber-50 rounded-lg p-2 text-xs text-amber-700">
            💡 --no-stream: 한 번만 출력 | 옵션 없이: 실시간 갱신 (top 명령처럼)
          </div>
        </div>
      );
    }

    function FlowChart() {
      const steps = [
        { icon: "🚨", label: "문제 발생", color: "red" },
        { icon: "📋", label: "1. logs\n에러 확인", color: "blue" },
        { icon: "🔍", label: "2. inspect\n설정 확인", color: "indigo" },
        { icon: "📊", label: "3. stats\n자원 확인", color: "amber" },
        { icon: "✅", label: "원인 파악", color: "emerald" },
      ];
      return (
        <div className="flex items-center justify-center gap-2 md:gap-4 anim-fade flex-wrap">
          {steps.map((s, i) => (
            <React.Fragment key={i}>
              <div className={`bg-${s.color}-100 border-2 border-${s.color}-300 rounded-xl p-3 md:p-4 text-center anim-slide min-w-[80px]`} style={{animationDelay:`${i*0.15}s`}}>
                <div className="text-2xl mb-1">{s.icon}</div>
                <div className={`text-xs font-bold text-${s.color}-800 whitespace-pre-line`}>{s.label}</div>
              </div>
              {i < steps.length - 1 && <div className="text-slate-400 font-bold">→</div>}
            </React.Fragment>
          ))}
        </div>
      );
    }

    function SummaryCards() {
      const cards = [
        { icon: "📋", name: "docker logs", desc: "블랙박스 영상", opts: ["--tail N", "-f", "--since", "-t"], color: "blue" },
        { icon: "🔍", name: "docker inspect", desc: "건강 검진 결과서", opts: ["--format", "| jq", "이미지에도 가능"], color: "indigo" },
        { icon: "📊", name: "docker stats", desc: "심박 모니터", opts: ["--no-stream", "특정 컨테이너", "전체 모니터링"], color: "amber" },
      ];
      return (
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 anim-fade">
          {cards.map((c, i) => (
            <div key={i} className={`bg-${c.color}-50 border-2 border-${c.color}-300 rounded-xl p-4 anim-slide`} style={{animationDelay:`${i*0.15}s`}}>
              <div className="text-center mb-3">
                <div className="text-3xl">{c.icon}</div>
                <div className={`font-bold text-${c.color}-800`}>{c.name}</div>
                <div className={`text-xs text-${c.color}-600`}>{c.desc}</div>
              </div>
              <div className="space-y-1">
                {c.opts.map((o, j) => (
                  <div key={j} className={`bg-${c.color}-100 rounded px-2 py-1 text-xs text-${c.color}-700 font-mono`}>{o}</div>
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4500);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VIII-1-3: logs, inspect, stats — 디버깅 3종 도구</h1>
              </div>
              <p className="text-slate-500 text-sm">컨테이너 문제를 진단하는 세 가지 핵심 도구를 단계별로 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "summary" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "problem" ? "bg-red-600 border-red-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 도구별 시각화 */}
            {data.tool === "logs" && <LogViewer />}
            {data.tool === "inspect" && <InspectViewer />}
            {data.tool === "stats" && <StatsViewer />}
            {data.phase === "flow" && <FlowChart />}
            {data.phase === "summary" && <SummaryCards />}

            {data.phase === "problem" && (
              <div className="bg-red-50 border-2 border-red-200 rounded-xl p-6 text-center anim-fade">
                <div className="text-4xl mb-3">🚨</div>
                <h3 className="text-lg font-bold text-red-800">postgres 컨테이너 — 연결 불가!</h3>
                <p className="text-red-600 text-sm mt-2">어떤 도구를 어떤 순서로 사용해야 할까?</p>
                <div className="flex justify-center gap-4 mt-4">
                  {["📋 logs", "🔍 inspect", "📊 stats"].map((t, i) => (
                    <span key={i} className="bg-red-100 text-red-700 px-3 py-1.5 rounded-full text-sm font-medium">{t}</span>
                  ))}
                </div>
              </div>
            )}

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
