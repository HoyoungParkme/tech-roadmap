                      ? 'bg-white border-sky-400 shadow-sm'
                      : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
                  }`}
                >
                  <div className="text-base">{s.icon}</div>
                  <div className={`text-[9px] font-bold ${i <= reached ? 'text-sky-800' : 'text-slate-400'}`}>
                    {s.label}
                  </div>
                  <div className={`text-[8px] ${i <= reached ? 'text-slate-500' : 'text-slate-400'}`}>
                    {s.desc}
                  </div>
                </div>
                {i < stages.length - 1 && (
                  <div className={`col-span-1 text-center text-base font-bold ${
                    i < reached ? 'text-sky-500' : 'text-slate-300'
                  }`}>
                    →
                  </div>
                )}
              </React.Fragment>
            ))}
          </div>
          <div className={`text-[9px] mt-1.5 ${commandLit === 'mvn' ? 'text-sky-700 font-semibold' : 'text-slate-400'}`}>
            {commandLit === 'mvn'
              ? '✓ ./mvnw package — fat jar 생성 (자기 완결, java -jar 로 실행 가능)'
              : 'Step 1 에서 한 번 만들어두면 다음 단계는 이 jar 를 옮겨 담는 일'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙: Docker 단계 — Stage 1 (builder) + Stage 2 (runtime)
    //   stagesActive 에 'build' 가 있으면 builder 박스 lit
    //   stagesActive 에 'run'   이 있으면 runtime 박스 lit
    //   layeredOn 이면 runtime 안에 4 layer 분해 표시
    //   imageLayers 로 최종 이미지 레이어 누적
    // ─────────────────────────────────────────────────────
    function DockerStagesBox({ stagesActive, layeredOn, imageLayers, imageSize }) {
      const buildOn = stagesActive.includes('build');
      const runOn = stagesActive.includes('run');
      const colorMap = {
        slate: 'bg-slate-100 border-slate-300 text-slate-700',
        sky: 'bg-sky-100 border-sky-400 text-sky-800',
        emerald: 'bg-emerald-100 border-emerald-400 text-emerald-800',
        amber: 'bg-amber-100 border-amber-400 text-amber-800',
      };

      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🐳</span>
              <span className="text-[11px] font-bold text-slate-700">Docker 이미지 빌드</span>
            </div>
            {imageSize > 0 && (
              <span className="text-[9px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                {imageSize} MB
              </span>
            )}
          </div>

          <div className="grid grid-cols-2 gap-2">
            {/* Stage 1: builder */}
            <div className={`rounded border-2 p-2 transition-all duration-500 ${
              buildOn ? 'bg-amber-50 border-amber-400 shadow-sm' : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
            }`}>
              <div className="flex items-center justify-between mb-1">
                <span className={`text-[10px] font-bold ${buildOn ? 'text-amber-800' : 'text-slate-400'}`}>
                  Stage 1: builder
                </span>
                {buildOn && (
                  <span className="text-[8px] bg-amber-600 text-white px-1 py-0.5 rounded font-mono font-bold">
                    JDK
                  </span>
                )}
              </div>
              <div className={`text-[9px] font-mono leading-tight ${buildOn ? 'text-amber-700' : 'text-slate-400'}`}>
                <div>FROM eclipse-temurin:17-jdk</div>
                <div>RUN ./mvnw package</div>
                <div>RUN layertools extract</div>
              </div>
              <div className={`text-[8px] mt-1 ${buildOn ? 'text-amber-600' : 'text-slate-400'}`}>
                {buildOn ? '~1.2 GB (빌드 후 폐기)' : '미사용'}
              </div>
            </div>

            {/* Stage 2: runtime */}
            <div className={`rounded border-2 p-2 transition-all duration-500 ${
              runOn ? 'bg-sky-50 border-sky-400 shadow-md' : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
            }`}>
              <div className="flex items-center justify-between mb-1">
                <span className={`text-[10px] font-bold ${runOn ? 'text-sky-800' : 'text-slate-400'}`}>
                  Stage 2: runtime
                </span>
                {runOn && (
                  <span className="text-[8px] bg-sky-600 text-white px-1 py-0.5 rounded font-mono font-bold">
                    JRE
                  </span>
                )}
              </div>
              <div className={`text-[9px] font-mono leading-tight ${runOn ? 'text-sky-700' : 'text-slate-400'}`}>
                <div>FROM ...jre</div>
                <div>USER app</div>
                <div>COPY --from=builder ...</div>
              </div>
              <div className={`text-[8px] mt-1 ${runOn ? 'text-sky-600 font-semibold' : 'text-slate-400'}`}>
                {runOn ? `최종 이미지 ${imageSize} MB` : '미사용'}
              </div>
            </div>
          </div>

          {/* 이미지 레이어 누적 */}
          {imageLayers && imageLayers.length > 0 && (
            <div className="mt-2 rounded border border-slate-200 bg-slate-50 p-2">
              <div className="text-[10px] font-bold text-slate-600 mb-1">
                {layeredOn ? '📚 layered 이미지 레이어' : '📚 이미지 레이어 (단순)'}
              </div>
              <div className="space-y-1">
                {imageLayers.map((layer, i) => (
                  <div key={i} className={`flex items-center justify-between rounded border px-2 py-1 ${colorMap[layer.color] || colorMap.slate}`}>
                    <span className="text-[9px] font-mono truncate flex-1">{layer.label}</span>
                    <span className="text-[9px] font-bold ml-2 flex-shrink-0">{layer.size} MB</span>
                  </div>
                ))}
              </div>
              {layeredOn && (
                <div className="text-[8px] text-emerald-700 mt-1 font-semibold">
                  💡 application 레이어(5 MB) 만 매 커밋 재푸시 — CI 70%↓
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: 컨테이너 가동 (compose 단계)
    //   appUp / dbUp / networkOn 에 따라 sky 강조
    // ─────────────────────────────────────────────────────
    function ContainersBox({ appUp, dbUp, networkOn, commandLit }) {
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          commandLit === 'docker compose' ? 'bg-sky-50 border-sky-400 shadow-md' : 'bg-slate-50 border-slate-200 opacity-70'
        }`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🚀</span>
              <span className={`text-[11px] font-bold ${
                commandLit === 'docker compose' ? 'text-sky-800' : 'text-slate-500'
              }`}>
                docker compose up -d
              </span>
            </div>
            {appUp && dbUp && (
              <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold animate-pulse">
                all up ✓
              </span>
            )}
          </div>

          <div className="grid grid-cols-2 gap-2">
            <div className={`rounded border-2 p-2 text-center transition-all duration-500 ${
              appUp ? 'bg-white border-sky-400 shadow-sm' : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
            }`}>
              <div className="text-lg">☕</div>
              <div className={`text-[10px] font-bold ${appUp ? 'text-sky-800' : 'text-slate-400'}`}>app</div>
              <div className={`text-[8px] font-mono ${appUp ? 'text-slate-500' : 'text-slate-400'}`}>
                demo-app:1.0
              </div>
              <div className={`text-[8px] ${appUp ? 'text-slate-500' : 'text-slate-400'}`}>:8080</div>
              {appUp && (
                <div className="mt-1 bg-sky-600 text-white text-[8px] px-1 py-0.5 rounded font-mono font-bold">
                  Up ✓
                </div>
              )}
            </div>
            <div className={`rounded border-2 p-2 text-center transition-all duration-500 ${
              dbUp ? 'bg-white border-emerald-400 shadow-sm' : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
            }`}>
              <div className="text-lg">🐘</div>
              <div className={`text-[10px] font-bold ${dbUp ? 'text-emerald-800' : 'text-slate-400'}`}>db</div>
              <div className={`text-[8px] font-mono ${dbUp ? 'text-slate-500' : 'text-slate-400'}`}>
                postgres:16
              </div>
              <div className={`text-[8px] ${dbUp ? 'text-slate-500' : 'text-slate-400'}`}>:5432</div>
              {dbUp && (
                <div className="mt-1 bg-emerald-600 text-white text-[8px] px-1 py-0.5 rounded font-mono font-bold">
                  Healthy ✓
                </div>
              )}
            </div>
          </div>

          <div className={`mt-2 rounded border-2 px-2 py-1 transition-all duration-500 ${
            networkOn ? 'bg-emerald-50 border-emerald-300' : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
          }`}>
            <div className="flex items-center gap-1.5 text-[10px]">
              <span>🔗</span>
              <span className={`font-bold ${networkOn ? 'text-emerald-800' : 'text-slate-400'}`}>
                Network: demo_default
              </span>
              {networkOn && (
                <span className="ml-auto text-[8px] bg-emerald-600 text-white px-1 py-0.5 rounded font-mono font-bold">
                  auto
                </span>
              )}
            </div>
            <div className={`text-[9px] font-mono ${networkOn ? 'text-emerald-700' : 'text-slate-400'} mt-0.5`}>
              {networkOn ? 'app → db (jdbc:postgresql://db:5432)' : '아직 없음'}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: Spring Boot 빌드 파이프라인
    //   중앙: Docker 멀티스테이지 + 이미지 레이어
    //   하단: compose 컨테이너 (app + db + network)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 Spring Boot 빌드 → Docker 이미지 → 컨테이너</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            <BuildPipelineBox buildStage={step.buildStage} commandLit={step.commandLit} />

            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.commandLit === 'docker build' || step.commandLit === 'docker compose' ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ docker build / FROM eclipse-temurin
              </div>
            </div>

            <DockerStagesBox
              stagesActive={step.stagesActive}
              layeredOn={step.layeredOn}
              imageLayers={step.imageLayers}
              imageSize={step.imageSize}
            />

            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.commandLit === 'docker compose' ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ docker compose up -d
              </div>
            </div>

            <ContainersBox
              appUp={step.appUp}
              dbUp={step.dbUp}
              networkOn={step.networkOn}
              commandLit={step.commandLit}
            />
          </div>

          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-sky-500"></span>active</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-amber-500"></span>builder</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-emerald-500"></span>cached / db</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded border border-slate-300 bg-white"></span>idle</span>
            <span className="ml-auto font-mono">phase: {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VIII-1-9</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VIII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VIII. 실전 운용 &gt; Chapter 1. 앱 컨테이너화</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-1-9. Spring Boot Docker화 — Java 앱 컨테이너화</h1>
                  <p className="text-sm text-slate-500 mt-0.5">jar 빌드 → Dockerfile → layered 캐시 → 멀티스테이지 → compose + Postgres</p>
                </div>
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>build.sh</strong>(jar) → <strong>Dockerfile</strong>(단순) → <strong>layered</strong>(캐시) → <strong>multistage</strong>(JDK+JRE 분리) → <strong>compose.yml</strong>(앱+DB) — 이 흐름이 Spring Boot Docker화의 표준이다. 다음(VIII-1-10)에서는 Node.js 앱 동일 흐름.
              </div>
            )}

            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            <div className="flex flex-wrap gap-2 justify-center">
              {['Spring Boot', 'fat jar', 'eclipse-temurin', 'layered jar', 'multistage', 'JDK / JRE', 'docker compose', 'PostgreSQL', 'depends_on'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./viii-1-8_db_comparison.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; VIII-1-8 DB 비교</a>
              <a href="./viii-1-10_nodejs_docker.html" className="text-sky-700 hover:text-sky-900 font-medium">VIII-1-10 Node.js Docker화 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
