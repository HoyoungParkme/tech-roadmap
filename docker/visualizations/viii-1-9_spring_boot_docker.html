<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — Spring Boot Docker화</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes buildProgress { from{width:0%;} to{width:100%;} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-build { animation: buildProgress 1.5s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · JDK vs JRE — 왜 분리해야 하는가",
        desc: "JDK(개발 도구 전체)는 ~700MB지만, 실행에 필요한 JRE는 ~190MB다. 컴파일러, 디버거, 프로파일러는 실행 시 불필요하다. 케이크를 굽는 도구와 완성된 케이크를 분리하는 것과 같다.",
        phase: "jdk_vs_jre",
        visual: "compare"
      },
      {
        title: "STEP 2 · 1단계: 빌드 스테이지 (JDK)",
        desc: "eclipse-temurin:21-jdk 이미지에서 Gradle 래퍼와 의존성 파일을 먼저 복사한다. build.gradle이 변경되지 않으면 의존성 다운로드 레이어를 캐시에서 재사용하여 빌드 시간을 크게 줄인다.",
        phase: "build_stage",
        visual: "dockerfile"
      },
      {
        title: "STEP 3 · 소스 코드 복사 후 JAR 빌드",
        desc: "소스 코드를 복사하고 ./gradlew bootJar --no-daemon으로 실행 가능한 JAR 파일을 생성한다. --no-daemon 옵션은 일회성 Docker 빌드에서 불필요한 메모리 사용을 방지한다.",
        phase: "jar_build",
        visual: "dockerfile"
      },
      {
        title: "STEP 4 · 2단계: 실행 스테이지 (JRE Alpine)",
        desc: "eclipse-temurin:21-jre-alpine 경량 이미지에 빌드된 JAR만 복사한다. COPY --from=builder로 빌드 스테이지의 결과물만 가져오고, 소스 코드와 개발 도구는 최종 이미지에 포함되지 않는다.",
        phase: "run_stage",
        visual: "dockerfile"
      },
      {
        title: "STEP 5 · 보안: 비루트 사용자 실행",
        desc: "addgroup/adduser로 비루트 사용자를 생성하고 USER 명령으로 전환한다. 컨테이너가 root로 실행되면 보안 취약점 발생 시 호스트까지 영향을 줄 수 있다. 최소 권한 원칙을 적용한다.",
        phase: "security",
        visual: "dockerfile"
      },
      {
        title: "STEP 6 · 최종 결과: 이미지 크기 비교",
        desc: "JDK 단일 스테이지는 ~800MB, 멀티 스테이지(JDK→JRE)는 ~250MB로 70% 이상 크기가 줄어든다. 이미지가 작을수록 CI/CD 속도가 빨라지고, 레지스트리 비용이 줄고, 보안 공격 표면이 줄어든다.",
        phase: "result",
        visual: "compare"
      },
    ];

    const DOCKERFILE_LINES = {
      build_stage: [
        { text: "FROM eclipse-temurin:21-jdk AS builder", highlight: true },
        { text: "WORKDIR /app", highlight: false },
        { text: "COPY gradlew .", highlight: true },
        { text: "COPY gradle/ gradle/", highlight: true },
        { text: "COPY build.gradle settings.gradle ./", highlight: true },
        { text: "RUN ./gradlew dependencies --no-daemon", highlight: true },
      ],
      jar_build: [
        { text: "# (빌드 스테이지 계속)", highlight: false },
        { text: "COPY src/ src/", highlight: true },
        { text: "RUN ./gradlew bootJar --no-daemon", highlight: true },
      ],
      run_stage: [
        { text: "FROM eclipse-temurin:21-jre-alpine AS runner", highlight: true },
        { text: "WORKDIR /app", highlight: false },
        { text: "COPY --from=builder /app/build/libs/*.jar app.jar", highlight: true },
        { text: "EXPOSE 8080", highlight: false },
        { text: 'ENTRYPOINT ["java", "-jar", "app.jar"]', highlight: true },
      ],
      security: [
        { text: "FROM eclipse-temurin:21-jre-alpine AS runner", highlight: false },
        { text: "RUN addgroup -S appgroup && adduser -S appuser -G appgroup", highlight: true },
        { text: "WORKDIR /app", highlight: false },
        { text: "COPY --from=builder /app/build/libs/*.jar app.jar", highlight: false },
        { text: "RUN chown appuser:appgroup app.jar", highlight: true },
        { text: "USER appuser", highlight: true },
        { text: "EXPOSE 8080", highlight: false },
        { text: 'ENTRYPOINT ["java", "-jar", "app.jar"]', highlight: false },
      ],
    };

    function DockerfileView({ phase }) {
      const lines = DOCKERFILE_LINES[phase] || [];
      return (
        <div className="bg-gray-900 rounded-xl p-5 font-mono text-sm anim-fade">
          <div className="flex items-center gap-2 mb-3">
            <div className="w-3 h-3 rounded-full bg-red-500"></div>
            <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div className="w-3 h-3 rounded-full bg-green-500"></div>
            <span className="text-gray-400 text-xs ml-2">Dockerfile</span>
          </div>
          <div className="space-y-1">
            {lines.map((line, i) => (
              <div key={i} className={`px-2 py-1 rounded anim-slide ${line.highlight ? 'bg-blue-900/50 text-blue-300' : 'text-gray-400'}`}
                   style={{animationDelay: `${i * 0.1}s`}}>
                {line.text}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function CompareView({ phase }) {
      const isResult = phase === "result";
      const items = phase === "jdk_vs_jre" ? [
        { label: "JDK 이미지", size: "~700MB", icon: "🔨", details: ["javac (컴파일러)", "jdb (디버거)", "jvisualvm (프로파일러)", "JRE (실행 환경)"], color: "red" },
        { label: "JRE 이미지", size: "~190MB", icon: "☕", details: ["JRE (실행 환경)만"], color: "green" },
      ] : [
        { label: "JDK 단일 스테이지", size: "~800MB", icon: "📦", percent: 100, color: "red" },
        { label: "JRE 단일 스테이지", size: "~250MB", icon: "📦", percent: 31, color: "yellow" },
        { label: "멀티 스테이지 (JDK→JRE)", size: "~250MB", icon: "🚀", percent: 31, color: "green", best: true },
      ];

      if (phase === "jdk_vs_jre") {
        return (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 anim-fade">
            {items.map((item, i) => (
              <div key={i} className={`rounded-xl border-2 p-5 ${item.color === 'red' ? 'border-red-300 bg-red-50' : 'border-emerald-300 bg-emerald-50'}`}>
                <div className="text-center mb-3">
                  <span className="text-4xl">{item.icon}</span>
                  <div className="font-bold text-lg mt-2">{item.label}</div>
                  <div className={`text-2xl font-bold mt-1 ${item.color === 'red' ? 'text-red-600' : 'text-emerald-600'}`}>{item.size}</div>
                </div>
                <div className="space-y-2 mt-4">
                  {item.details.map((d, j) => (
                    <div key={j} className={`px-3 py-2 rounded-lg text-sm anim-slide ${item.color === 'red' ? 'bg-red-100 text-red-700' : 'bg-emerald-100 text-emerald-700'}`}
                         style={{animationDelay: `${j * 0.1}s`}}>
                      {d}
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        );
      }

      return (
        <div className="space-y-4 anim-fade">
          {items.map((item, i) => (
            <div key={i} className={`rounded-xl border-2 p-4 ${item.best ? 'border-emerald-400 bg-emerald-50 shadow-lg' : 'border-slate-200 bg-white'}`}>
              <div className="flex items-center justify-between mb-2">
                <div className="flex items-center gap-3">
                  <span className="text-2xl">{item.icon}</span>
                  <span className="font-bold">{item.label}</span>
                  {item.best && <span className="bg-emerald-500 text-white text-xs px-2 py-1 rounded-full">추천</span>}
                </div>
                <span className={`text-lg font-bold ${item.color === 'red' ? 'text-red-600' : item.color === 'yellow' ? 'text-yellow-600' : 'text-emerald-600'}`}>{item.size}</span>
              </div>
              <div className="w-full bg-gray-200 rounded-full h-4">
                <div className={`h-4 rounded-full anim-build ${item.color === 'red' ? 'bg-red-400' : item.color === 'yellow' ? 'bg-yellow-400' : 'bg-emerald-400'}`}
                     style={{width: `${item.percent}%`}}></div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function StageFlow({ phase }) {
      const stages = [
        { label: "빌드 스테이지", icon: "🔨", desc: "JDK + Gradle", active: ["build_stage","jar_build","run_stage","security","result"].includes(phase) },
        { label: "JAR 생성", icon: "📦", desc: "bootJar 실행", active: ["jar_build","run_stage","security","result"].includes(phase) },
        { label: "실행 스테이지", icon: "☕", desc: "JRE Alpine", active: ["run_stage","security","result"].includes(phase) },
        { label: "보안 설정", icon: "🔒", desc: "비루트 사용자", active: ["security","result"].includes(phase) },
      ];

      return (
        <div className="flex items-center justify-between bg-white rounded-xl p-4 border border-slate-200">
          {stages.map((s, i) => (
            <React.Fragment key={i}>
              <div className={`flex flex-col items-center transition-all duration-500 ${s.active ? 'opacity-100 scale-105' : 'opacity-30 scale-95'}`}>
                <span className="text-2xl mb-1">{s.icon}</span>
                <span className="text-xs font-bold text-center">{s.label}</span>
                <span className="text-xs text-slate-500">{s.desc}</span>
              </div>
              {i < stages.length - 1 && (
                <div className={`flex-1 h-1 mx-2 rounded transition-all duration-500 ${s.active ? 'bg-blue-400' : 'bg-slate-200'}`}></div>
              )}
            </React.Fragment>
          ))}
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VIII-1-9: Spring Boot 앱 Docker화</h1>
              </div>
              <p className="text-slate-500 text-sm">멀티 스테이지 빌드로 JDK와 JRE를 분리하여 최소 크기의 실행 이미지를 만드는 과정을 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "result" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "security" ? "bg-amber-600 border-amber-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            <StageFlow phase={data.phase} />

            <div key={`visual-${step}`}>
              {data.visual === "dockerfile" ? <DockerfileView phase={data.phase} /> : <CompareView phase={data.phase} />}
            </div>

            {data.phase === "result" && (
              <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6 anim-fade">
                <div className="text-center">
                  <div className="text-4xl mb-3">🚀</div>
                  <h3 className="text-xl font-bold text-emerald-800 mb-2">멀티 스테이지 빌드 완료!</h3>
                  <div className="flex flex-wrap justify-center gap-2 mt-4">
                    {["JDK로 빌드", "JRE로 실행", "JAR만 복사", "비루트 사용자", "~250MB 이미지", ".dockerignore 적용"].map((item, i) => (
                      <span key={i} className="bg-emerald-200 text-emerald-800 px-3 py-1.5 rounded-full text-sm font-medium anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                        {item}
                      </span>
                    ))}
                  </div>
                </div>
              </div>
            )}

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
