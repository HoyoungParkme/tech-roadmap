<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — 3티어 아키텍처</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes flowRight { 0%{left:0;opacity:0;} 20%{opacity:1;} 80%{opacity:1;} 100%{left:100%;opacity:0;} }
    @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-bounce { animation: bounce 1s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · 3티어 구성 소개",
        desc: "실무 웹 서비스는 하나의 컨테이너에 모든 것을 담지 않는다. Nginx(리버스 프록시), FastAPI(앱 서버), PostgreSQL(데이터베이스)을 역할별로 나눠 독립적으로 관리한다.",
        phase: "intro",
        activeServices: [],
        flowFrom: null, flowTo: null,
      },
      {
        title: "STEP 2 · PostgreSQL — 데이터 저장소 시작",
        desc: "가장 먼저 DB 컨테이너가 시작된다. healthcheck가 pg_isready 명령으로 5초마다 연결 가능 상태를 확인한다. 5번 실패하면 unhealthy 판정이다.",
        phase: "db_start",
        activeServices: ["db"],
        flowFrom: null, flowTo: null,
      },
      {
        title: "STEP 3 · FastAPI — 앱 서버 시작",
        desc: "DB가 healthy 상태가 되면 api 컨테이너가 시작된다. depends_on + condition: service_healthy 설정 덕분에 DB가 준비되지 않은 상태에서 연결 시도를 하지 않는다.",
        phase: "api_start",
        activeServices: ["db", "api"],
        flowFrom: "api", flowTo: "db",
      },
      {
        title: "STEP 4 · Nginx — 리버스 프록시 시작",
        desc: "api가 시작되면 Nginx가 시작된다. Nginx는 80포트를 외부에 열고, upstream 설정으로 api:8000에 요청을 전달한다. 외부에서는 80포트 하나만 보인다.",
        phase: "nginx_start",
        activeServices: ["db", "api", "nginx"],
        flowFrom: "nginx", flowTo: "api",
      },
      {
        title: "STEP 5 · 전체 요청 흐름",
        desc: "브라우저가 localhost:80으로 요청을 보내면 Nginx → FastAPI → PostgreSQL 순서로 전달된다. 응답은 역순으로 돌아온다. api와 db는 내부 네트워크에서만 통신하므로 외부에서 직접 접근할 수 없다.",
        phase: "full_flow",
        activeServices: ["db", "api", "nginx"],
        flowFrom: "browser", flowTo: "db",
      },
      {
        title: "STEP 6 · Compose로 한 번에 관리",
        desc: "docker compose up 한 줄이면 세 컨테이너가 올바른 순서로 시작된다. 각 서비스를 독립적으로 스케일하거나 교체할 수 있다. 예를 들어 트래픽이 늘면 api만 추가로 띄울 수 있다.",
        phase: "compose",
        activeServices: ["db", "api", "nginx"],
        flowFrom: null, flowTo: null,
      },
    ];

    function ServiceBox({ name, icon, label, role, port, isActive, isHighlight, phase }) {
      const colors = {
        nginx: { bg: "bg-green-50", border: "border-green-400", text: "text-green-700", activeBg: "bg-green-100" },
        api: { bg: "bg-blue-50", border: "border-blue-400", text: "text-blue-700", activeBg: "bg-blue-100" },
        db: { bg: "bg-purple-50", border: "border-purple-400", text: "text-purple-700", activeBg: "bg-purple-100" },
      };
      const c = colors[name];
      return (
        <div className={`rounded-xl border-2 p-4 transition-all duration-500 ${
          isActive ? `${c.activeBg} ${c.border} shadow-lg scale-105` : "bg-slate-100 border-slate-200 opacity-40 scale-95"
        } ${isHighlight ? "anim-pulse" : ""}`}>
          <div className="text-center">
            <div className="text-3xl mb-1">{icon}</div>
            <div className={`font-bold text-sm ${isActive ? c.text : "text-slate-400"}`}>{label}</div>
            <div className="text-xs text-slate-500 mt-1">{role}</div>
            <div className={`text-xs mt-2 px-2 py-1 rounded-full inline-block ${
              isActive ? `${c.bg} ${c.text} font-medium` : "bg-slate-200 text-slate-400"
            }`}>
              {port}
            </div>
            <div className={`mt-2 text-xs font-medium ${isActive ? "text-emerald-600" : "text-slate-400"}`}>
              {isActive ? "Running" : "Stopped"}
            </div>
          </div>
        </div>
      );
    }

    function FlowArrow({ active, label }) {
      return (
        <div className="flex flex-col items-center justify-center px-2">
          <div className={`text-2xl transition-all duration-300 ${active ? "text-blue-500 anim-bounce" : "text-slate-300"}`}>
            {active ? "→" : "·"}
          </div>
          {label && active && <div className="text-xs text-blue-500 font-medium mt-1">{label}</div>}
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const showBrowser = data.phase === "full_flow";
      const showCompose = data.phase === "compose";

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VI-1-1: FastAPI + PostgreSQL + Nginx 구성</h1>
              </div>
              <p className="text-slate-500 text-sm">3티어 아키텍처의 연결 흐름을 단계별로 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "compose" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "full_flow" ? "bg-indigo-600 border-indigo-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 시각화 영역 */}
            <div key={`vis-${step}`} className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 anim-fade">
              <div className="flex items-center justify-center gap-2 md:gap-4 flex-wrap">
                {showBrowser && (
                  <>
                    <div className="rounded-xl border-2 border-orange-300 bg-orange-50 p-4 text-center">
                      <div className="text-3xl mb-1">🌐</div>
                      <div className="font-bold text-sm text-orange-700">브라우저</div>
                      <div className="text-xs text-slate-500 mt-1">사용자 요청</div>
                      <div className="text-xs mt-2 px-2 py-1 rounded-full bg-orange-100 text-orange-600 font-medium inline-block">
                        localhost:80
                      </div>
                    </div>
                    <FlowArrow active={true} label="HTTP" />
                  </>
                )}

                <ServiceBox name="nginx" icon="🔀" label="Nginx" role="리버스 프록시"
                  port="80:80 (외부 노출)" isActive={data.activeServices.includes("nginx")}
                  isHighlight={data.phase === "nginx_start"} phase={data.phase} />

                <FlowArrow active={data.activeServices.includes("nginx") && data.activeServices.includes("api")}
                  label={data.phase === "full_flow" ? "proxy_pass" : ""} />

                <ServiceBox name="api" icon="⚡" label="FastAPI" role="앱 서버"
                  port="8000 (내부 전용)" isActive={data.activeServices.includes("api")}
                  isHighlight={data.phase === "api_start"} phase={data.phase} />

                <FlowArrow active={data.activeServices.includes("api") && data.activeServices.includes("db")}
                  label={data.phase === "full_flow" ? "SQL 쿼리" : ""} />

                <ServiceBox name="db" icon="🗄️" label="PostgreSQL" role="데이터베이스"
                  port="5432 (내부 전용)" isActive={data.activeServices.includes("db")}
                  isHighlight={data.phase === "db_start"} phase={data.phase} />
              </div>

              {/* 네트워크 정보 */}
              {data.activeServices.length > 0 && (
                <div className="mt-4 flex justify-center">
                  <div className="bg-slate-100 rounded-lg px-4 py-2 text-xs text-slate-600 border border-slate-200">
                    <span className="font-medium">Compose 내부 네트워크:</span> api, db는 expose만 사용 — 외부 접근 불가
                  </div>
                </div>
              )}
            </div>

            {/* Compose 코드 블록 */}
            {showCompose && (
              <div className="bg-slate-800 rounded-xl p-5 text-green-400 font-mono text-sm overflow-x-auto anim-fade">
                <div className="text-slate-500 mb-2"># docker compose up -d</div>
                <div className="text-yellow-300">services:</div>
                <div className="ml-4 text-blue-300">db: <span className="text-slate-400">image: postgres:16-alpine</span></div>
                <div className="ml-4 text-blue-300">api: <span className="text-slate-400">build: ./api, depends_on: db(healthy)</span></div>
                <div className="ml-4 text-blue-300">nginx: <span className="text-slate-400">image: nginx:alpine, ports: 80:80</span></div>
              </div>
            )}

            {/* 프로그레스 + 컨트롤 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
