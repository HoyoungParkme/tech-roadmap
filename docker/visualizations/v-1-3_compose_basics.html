<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — Docker Compose 기초</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-up { animation: slideUp 0.5s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · docker run의 한계",
        desc: "웹 서버, DB, 캐시 3개 컨테이너를 매번 docker run으로 실행하면 네트워크 이름, 볼륨, 환경 변수, 포트를 빠짐없이 기억해야 한다. 한 번이라도 순서나 옵션을 잘못 치면 서비스가 올바르게 뜨지 않는다.",
        phase: "problem",
      },
      {
        title: "STEP 2 · docker-compose.yml 기본 구조",
        desc: "Compose 파일의 최상위 키는 세 가지다: services(실행할 컨테이너), volumes(데이터 저장), networks(네트워크 설정). 이 한 파일에 모든 설정을 선언적으로 적어둔다.",
        phase: "structure",
      },
      {
        title: "STEP 3 · services 블록 상세",
        desc: "컨테이너 하나가 서비스 하나다. image 또는 build로 이미지를 지정하고, ports, volumes, environment, depends_on 등으로 설정한다. 서비스 이름이 DNS 호스트명이 된다.",
        phase: "services",
      },
      {
        title: "STEP 4 · volumes와 networks",
        desc: "volumes 블록에서 named volume을 선언하면 docker compose up 시 자동 생성된다. networks를 생략하면 기본 bridge 네트워크가 자동으로 만들어진다.",
        phase: "volumes_networks",
      },
      {
        title: "STEP 5 · 핵심 명령 5가지",
        desc: "docker compose up -d (시작), down (종료), logs -f (로그), exec (컨테이너 안 명령 실행), ps (상태 확인). 이 다섯 가지면 Compose를 다루는 데 충분하다.",
        phase: "commands",
      },
      {
        title: "STEP 6 · Compose의 가치",
        desc: "팀원이 git clone 후 docker compose up만 치면 동일한 로컬 환경이 실행된다. compose.yml이 버전 관리되므로 '내 환경에서만 된다'는 상황을 막을 수 있다. 레시피 카드처럼 누구든 같은 결과를 재현한다.",
        phase: "summary",
      },
    ];

    /* ── YAML 블록 컴포넌트 ── */
    function YamlBlock({ lines, highlightRanges, title }) {
      return (
        <div className="bg-slate-900 rounded-xl p-4 font-mono text-sm overflow-x-auto">
          {title && <div className="text-slate-400 text-xs mb-2">{title}</div>}
          {lines.map((line, i) => {
            const isHighlight = highlightRanges.some(([start, end]) => i >= start && i <= end);
            return (
              <div key={i} className={`px-2 py-0.5 rounded whitespace-pre ${
                isHighlight ? "bg-yellow-900/50 text-yellow-300" : "text-slate-300"
              }`}>
                {line}
              </div>
            );
          })}
        </div>
      );
    }

    /* ── 메인 앱 ── */
    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const fullYaml = [
        "services:",
        "  web:",
        "    build: .",
        '    ports:',
        '      - "8000:8000"',
        "    volumes:",
        "      - ./app:/app",
        "    environment:",
        "      - APP_ENV=development",
        "    depends_on:",
        "      - db",
        "",
        "  db:",
        '    image: postgres:16-alpine',
        "    env_file: .env",
        "    volumes:",
        "      - pgdata:/var/lib/postgresql/data",
        "",
        "volumes:",
        "  pgdata:",
        "",
        "networks:     # 생략 시 기본 bridge 자동 생성",
      ];

      const commands = [
        { cmd: "docker compose up -d", desc: "백그라운드로 전체 서비스 시작", icon: "▶️" },
        { cmd: "docker compose down", desc: "서비스 종료 및 컨테이너 제거", icon: "⏹️" },
        { cmd: "docker compose logs -f", desc: "서비스 로그 실시간 출력", icon: "📋" },
        { cmd: "docker compose exec db psql -U app", desc: "컨테이너 안에서 명령 실행", icon: "💻" },
        { cmd: "docker compose ps", desc: "서비스 상태·포트 확인", icon: "📊" },
      ];

      const serviceAttrs = [
        { key: "image", desc: "사용할 이미지", example: "postgres:16-alpine" },
        { key: "build", desc: "Dockerfile 위치", example: ". 또는 ./api" },
        { key: "ports", desc: "호스트:컨테이너 포트 매핑", example: '"8000:8000"' },
        { key: "volumes", desc: "마운트 경로 지정", example: "pgdata:/var/lib/..." },
        { key: "environment", desc: "환경 변수 직접 지정", example: "APP_ENV=dev" },
        { key: "depends_on", desc: "서비스 시작 순서 의존성", example: "db" },
      ];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter V-1-3: Docker Compose 기초</h1>
              </div>
              <p className="text-slate-500 text-sm">docker-compose.yml 파일 구조를 시각적으로 분해하고 핵심 명령을 시뮬레이션합니다.</p>
            </header>

            {/* 현재 단계 설명 */}
            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "problem" ? "bg-red-600 border-red-700 text-white" :
              data.phase === "summary" ? "bg-emerald-600 border-emerald-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 시각화 영역 */}
            {data.phase === "problem" && (
              <div key="problem" className="anim-fade space-y-3">
                <div className="bg-slate-900 rounded-xl p-4 font-mono text-sm space-y-2">
                  <div className="text-slate-400"># 매번 이 명령들을 정확히 기억해서 입력해야 한다...</div>
                  <div className="text-red-300">$ docker network create mynet</div>
                  <div className="text-red-300">$ docker run -d --name db --network mynet \</div>
                  <div className="text-red-300 pl-4">-v pgdata:/var/lib/postgresql/data \</div>
                  <div className="text-red-300 pl-4">-e POSTGRES_PASSWORD=secret postgres:16-alpine</div>
                  <div className="text-red-300 mt-1">$ docker run -d --name web --network mynet \</div>
                  <div className="text-red-300 pl-4">-p 8000:8000 -v ./app:/app \</div>
                  <div className="text-red-300 pl-4">-e APP_ENV=development myapp:latest</div>
                </div>
                <div className="bg-red-50 border border-red-200 rounded-xl p-4 text-center">
                  <span className="text-red-600 font-bold">순서, 옵션, 이름을 하나라도 틀리면 서비스가 뜨지 않는다!</span>
                </div>
              </div>
            )}

            {data.phase === "structure" && (
              <div key="structure" className="grid grid-cols-1 md:grid-cols-2 gap-4 anim-fade">
                <YamlBlock lines={fullYaml} highlightRanges={[[0, 0], [18, 19], [21, 21]]} title="docker-compose.yml" />
                <div className="space-y-3">
                  {[
                    { key: "services", range: "1~17행", desc: "실행할 컨테이너 목록. 각 서비스가 하나의 컨테이너.", color: "bg-blue-100 border-blue-300 text-blue-800" },
                    { key: "volumes", range: "19~20행", desc: "named volume 선언. docker compose up 시 자동 생성.", color: "bg-purple-100 border-purple-300 text-purple-800" },
                    { key: "networks", range: "22행", desc: "네트워크 선언. 생략하면 기본 bridge 자동 생성.", color: "bg-emerald-100 border-emerald-300 text-emerald-800" },
                  ].map((item, i) => (
                    <div key={i} className={`rounded-xl border-2 p-4 ${item.color} anim-slide`} style={{ animationDelay: `${i * 0.15}s` }}>
                      <div className="font-bold text-lg">{item.key}:</div>
                      <div className="text-xs opacity-70">{item.range}</div>
                      <div className="text-sm mt-1">{item.desc}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {data.phase === "services" && (
              <div key="services" className="space-y-4 anim-fade">
                <YamlBlock lines={fullYaml.slice(0, 17)} highlightRanges={[[1, 10], [12, 16]]} title="services 블록 상세" />
                <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                  {serviceAttrs.map((attr, i) => (
                    <div key={i} className="bg-white border border-blue-200 rounded-lg p-3 anim-up" style={{ animationDelay: `${i * 0.08}s` }}>
                      <div className="font-mono font-bold text-blue-700 text-sm">{attr.key}</div>
                      <div className="text-xs text-slate-600 mt-1">{attr.desc}</div>
                      <div className="text-xs text-slate-400 font-mono mt-1">{attr.example}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {data.phase === "volumes_networks" && (
              <div key="vn" className="grid grid-cols-1 md:grid-cols-2 gap-4 anim-fade">
                <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-5">
                  <div className="text-center mb-3">
                    <div className="text-3xl">💾</div>
                    <div className="font-bold text-purple-800">volumes</div>
                  </div>
                  <div className="space-y-2 text-sm text-purple-700">
                    <div className="bg-white rounded-lg p-3 border border-purple-200">
                      <div className="font-mono text-xs">pgdata:/var/lib/postgresql/data</div>
                      <div className="text-xs text-purple-500 mt-1">DB 데이터를 named volume에 저장. 컨테이너 삭제 후에도 유지.</div>
                    </div>
                    <div className="bg-white rounded-lg p-3 border border-purple-200">
                      <div className="font-mono text-xs">./app:/app</div>
                      <div className="text-xs text-purple-500 mt-1">bind mount — 호스트 소스 코드를 컨테이너에 직접 연결.</div>
                    </div>
                  </div>
                </div>
                <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-5">
                  <div className="text-center mb-3">
                    <div className="text-3xl">🌐</div>
                    <div className="font-bold text-emerald-800">networks</div>
                  </div>
                  <div className="space-y-2 text-sm text-emerald-700">
                    <div className="bg-white rounded-lg p-3 border border-emerald-200">
                      <div className="font-bold text-xs">생략하면?</div>
                      <div className="text-xs text-emerald-500 mt-1">프로젝트명_default 네트워크가 자동 생성된다.</div>
                    </div>
                    <div className="bg-white rounded-lg p-3 border border-emerald-200">
                      <div className="font-bold text-xs">서비스 이름 = DNS</div>
                      <div className="text-xs text-emerald-500 mt-1">web 서비스에서 postgresql://db:5432/demo 로 접속 가능.</div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {data.phase === "commands" && (
              <div key="commands" className="space-y-2 anim-fade">
                {commands.map((cmd, i) => (
                  <div key={i} className="bg-white border border-slate-200 rounded-xl p-4 flex items-center gap-4 anim-slide" style={{ animationDelay: `${i * 0.1}s` }}>
                    <span className="text-2xl">{cmd.icon}</span>
                    <div className="flex-1">
                      <code className="bg-slate-900 text-emerald-300 px-3 py-1 rounded text-sm font-mono">{cmd.cmd}</code>
                      <p className="text-sm text-slate-600 mt-1">{cmd.desc}</p>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {data.phase === "summary" && (
              <div key="summary" className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6 anim-fade">
                <div className="text-center">
                  <div className="text-4xl mb-3">📋</div>
                  <h3 className="text-xl font-bold text-emerald-800 mb-4">Compose = 레시피 카드</h3>
                  <div className="flex flex-wrap justify-center gap-2 mb-4">
                    {["git clone", "docker compose up -d", "동일한 환경 재현!"].map((item, i) => (
                      <span key={i} className="bg-emerald-200 text-emerald-800 px-3 py-1.5 rounded-full text-sm font-medium anim-slide" style={{animationDelay:`${i*0.15}s`}}>
                        {i > 0 && "→ "}{item}
                      </span>
                    ))}
                  </div>
                  <p className="text-emerald-700 text-sm">compose.yml 하나에 서비스, 볼륨, 네트워크를 선언적으로 정의하면 누구든 같은 환경을 재현한다.</p>
                </div>
              </div>
            )}

            {/* 프로그레스 + 컨트롤 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
