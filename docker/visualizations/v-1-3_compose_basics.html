            <div className="pl-3"><span className="text-slate-500">web:</span> <span className="text-slate-400">image: myapp:1.0</span></div>
            <div className="pl-3"><span className="text-slate-500">db:</span> <span className="text-slate-400">image: postgres:14</span></div>
            <div className="pl-3"><span className="text-slate-500">cache:</span> <span className="text-slate-400">image: redis:7</span></div>
            <div className={highlightSection === 'all' ? 'bg-sky-100 px-1 rounded mt-0.5' : 'mt-0.5'}>
              <span className="text-sky-600 font-bold">networks:</span>
              <span className="text-slate-400"> (생략 → default 자동)</span>
            </div>
            <div className={highlightSection === 'all' ? 'bg-sky-100 px-1 rounded' : ''}>
              <span className="text-sky-600 font-bold">volumes:</span>
            </div>
            <div className="pl-3"><span className="text-slate-500">db_data:</span></div>
          </div>
          <div className={`text-[9px] mt-1 ${lit ? 'text-sky-700 font-semibold' : 'text-slate-400'}`}>
            {lit ? '✓ 한 장으로 박제됨 (git 커밋)' : '아직 작성 전'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙: docker compose 명령 박스
    //   commandLit === 'up'  → 좌측 up 박스 sky 강조
    //   commandLit === 'down'→ 우측 down 박스 amber 강조
    // ─────────────────────────────────────────────────────
    function CommandBox({ commandLit }) {
      return (
        <div className="grid grid-cols-2 gap-2">
          <div className={`rounded-lg border-2 p-2 transition-all duration-500 text-center ${
            commandLit === 'up' ? 'bg-sky-100 border-sky-500 shadow-md' : 'bg-slate-50 border-slate-200 opacity-60'
          }`}>
            <div className="text-[10px] font-mono font-bold text-slate-700">$ docker compose</div>
            <div className={`text-base font-bold font-mono ${commandLit === 'up' ? 'text-sky-700' : 'text-slate-400'}`}>up -d</div>
            <div className="text-[9px] text-slate-500 mt-0.5">전체 시작</div>
          </div>
          <div className={`rounded-lg border-2 p-2 transition-all duration-500 text-center ${
            commandLit === 'down' ? 'bg-amber-100 border-amber-500 shadow-md' : 'bg-slate-50 border-slate-200 opacity-60'
          }`}>
            <div className="text-[10px] font-mono font-bold text-slate-700">$ docker compose</div>
            <div className={`text-base font-bold font-mono ${commandLit === 'down' ? 'text-amber-700' : 'text-slate-400'}`}>down</div>
            <div className="text-[9px] text-slate-500 mt-0.5">전체 정리</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: 컨테이너들 시각화
    //   servicesUp 에 있는 서비스만 active (sky)
    //   networkOn → 자동 생성된 myapp_default 라인
    //   volumeOn  → db_data named volume 박스
    // ─────────────────────────────────────────────────────
    function ServicesBox({ servicesUp, networkOn, volumeOn, highlightSection }) {
      const allUp = servicesUp.length === SERVICES.length;
      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🐳</span>
              <span className="text-[11px] font-bold text-slate-700">컨테이너 (services 블록)</span>
            </div>
            {allUp && (
              <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold animate-pulse">
                all up ✓
              </span>
            )}
          </div>

          {/* 컨테이너 3개 */}
          <div className="grid grid-cols-3 gap-1.5">
            {SERVICES.map((svc) => {
              const up = servicesUp.includes(svc.id);
              return (
                <div
                  key={svc.id}
                  className={`rounded-lg border-2 p-2 text-center transition-all duration-500 ${
                    up
                      ? 'bg-sky-50 border-sky-400 shadow-sm'
                      : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
                  }`}
                >
                  <div className="text-lg mb-0.5">{svc.icon}</div>
                  <div className={`text-[10px] font-bold ${up ? 'text-sky-800' : 'text-slate-400'}`}>
                    {svc.label}
                  </div>
                  <div className={`text-[8px] font-mono ${up ? 'text-slate-500' : 'text-slate-400'} leading-tight`}>
                    {svc.image}
                  </div>
                  <div className={`text-[8px] ${up ? 'text-slate-500' : 'text-slate-400'} leading-tight`}>
                    :{svc.port}
                  </div>
                  {up && (
                    <div className="mt-1 bg-sky-600 text-white text-[8px] px-1 py-0.5 rounded font-mono font-bold">
                      Up ✓
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* 자동 생성 네트워크 */}
          <div className={`mt-2 rounded border-2 px-2 py-1.5 transition-all duration-500 ${
            networkOn
              ? (highlightSection === 'all' ? 'bg-sky-50 border-sky-400' : 'bg-emerald-50 border-emerald-300')
              : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
          }`}>
            <div className="flex items-center gap-1.5 text-[10px]">
              <span>🔗</span>
              <span className={`font-bold ${networkOn ? 'text-emerald-800' : 'text-slate-400'}`}>
                Network: myapp_default
              </span>
              {networkOn && (
                <span className="ml-auto text-[8px] bg-emerald-600 text-white px-1 py-0.5 rounded font-mono font-bold">
                  auto
                </span>
              )}
            </div>
            <div className={`text-[9px] font-mono ${networkOn ? 'text-emerald-700' : 'text-slate-400'} mt-0.5`}>
              {networkOn ? 'web ↔ db ↔ cache (서비스 이름이 DNS)' : '아직 없음'}
            </div>
          </div>

          {/* named volume */}
          <div className={`mt-1.5 rounded border-2 px-2 py-1.5 transition-all duration-500 ${
            volumeOn
              ? (highlightSection === 'all' ? 'bg-sky-50 border-sky-400' : 'bg-amber-50 border-amber-300')
              : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
          }`}>
            <div className="flex items-center gap-1.5 text-[10px]">
              <span>💾</span>
              <span className={`font-bold ${volumeOn ? 'text-amber-800' : 'text-slate-400'}`}>
                Volume: myapp_db_data
              </span>
              {volumeOn && (
                <span className="ml-auto text-[8px] bg-amber-600 text-white px-1 py-0.5 rounded font-mono font-bold">
                  persistent
                </span>
              )}
            </div>
            <div className={`text-[9px] font-mono ${volumeOn ? 'text-amber-700' : 'text-slate-400'} mt-0.5`}>
              {volumeOn ? 'db:/var/lib/postgresql/data → 영속 저장' : '아직 없음'}
            </div>
          </div>

          {allUp && (
            <div className="mt-2 bg-emerald-50 border border-emerald-300 rounded px-2 py-1.5 text-[9px] text-emerald-800 leading-tight">
              <span className="font-bold">한 줄의 위력:</span> docker compose up -d 한 줄에 네트워크 + 볼륨 + 컨테이너 3개 동시 가동
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: docker-compose.yml 박스
    //   중앙: up / down 명령 박스 (active 상태만 강조)
    //   하단: 컨테이너 3개 + network + volume
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 compose.yml → 명령 → 컨테이너</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            <ComposeFileBox
              lit={step.composeLit}
              manualPain={step.manualPain}
              highlightSection={step.highlightSection}
            />

            {/* 화살표: 명령 */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.commandLit ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ docker compose ...
              </div>
            </div>

            <CommandBox commandLit={step.commandLit} />

            {/* 화살표: 컨테이너 */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.servicesUp.length > 0 ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ 컨테이너 가동 / 정리
              </div>
            </div>

            <ServicesBox
              servicesUp={step.servicesUp}
              networkOn={step.networkOn}
              volumeOn={step.volumeOn}
              highlightSection={step.highlightSection}
            />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded border border-slate-300 bg-white"></span>idle
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>network
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>volume
            </span>
            <span className="ml-auto font-mono">phase: {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Docker Compose &gt; Chapter 1. 기본</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-1-3. Docker Compose 기본 — docker-compose.yml 한 장</h1>
                  <p className="text-sm text-slate-500 mt-0.5">흩어진 docker run 6개 → compose 파일 한 장 → up/down 한 줄로 통째 운용</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>services</strong>(컨테이너) + <strong>volumes</strong>(데이터) + <strong>networks</strong>(통신) — 이 3 섹션이 전부다. 다음(V-1-4)에서는 다중 컨테이너 의존성을 더 깊게 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['docker compose', 'compose.yml', 'services', 'volumes', 'networks', 'up -d', 'down', 'depends_on', 'declarative'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./v-1-2_volumes_vs_bindmount.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; V-1-2 Volume vs BindMount</a>
              <a href="./v-1-4_compose_multicontainer.html" className="text-sky-700 hover:text-sky-900 font-medium">V-1-4 다중 컨테이너 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
