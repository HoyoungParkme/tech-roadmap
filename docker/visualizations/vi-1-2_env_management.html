            '    file: ./secrets/db_password.txt   # 호스트 파일 (개발)',
            '  stripe_api_key:',
            '    file: ./secrets/stripe_api_key.txt',
            '  # 운영(Swarm) 에서는 external: true 로 외부 secret store 사용',
            '  # api_key:',
            '  #   external: true',
            '',
            'volumes:',
            '  db_data:',
            '',
            '# ━━━ 앱 코드에서 읽기 (파일에서 read) ━━━',
            '# import os',
            '# def read_secret(name):',
            '#     path = os.environ.get(f"{name.upper()}_FILE")',
            '#     return open(path).read().strip() if path else os.environ[name]',
            '#',
            '# DB_PASSWORD = read_secret("DB_PASSWORD")',
            '',
            '# ─── 컨테이너 안에서 ───',
            '#  /run/secrets/db_password         (tmpfs, 0400, root)',
            '#  /run/secrets/stripe_api_key',
            '#  → env 에는 _FILE 경로만, 실제 값은 파일',
            '',
            '# ─── 왜 더 안전한가 ───',
            '#  ✓ tmpfs 마운트 → 디스크에 안 써짐',
            '#  ✓ env 덤프, ps -ef, /proc/[pid]/environ 에 안 보임',
            '#  ✓ docker history 에 흔적 없음',
            '#  ✓ Swarm/K8s 의 external secret store(Vault, AWS) 연동 표준',
            '',
            '# ─── 단계 정리 ───',
            '#  Step 1 소스 코드  ← 절대 금지',
            '#  Step 2 ARG/ENV    ← 비밀 X (빌드 설정용)',
            '#  Step 3 -e 주입    ← 로컬 개발 임시',
            '#  Step 4 .env 파일  ← 90% 실무 표준',
            '#  Step 5 secrets    ← 진짜 critical 한 비밀',
          ],
          highlight: [10, 11, 12, 13, 14, 22, 23, 24, 29, 30, 31, 32, 33, 49, 50, 51, 56, 57, 58, 59, 60, 61, 62, 63, 64, 65],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 보안 레벨에 따른 색상 — 1(빨강 위험) ~ 5(초록 안전)
    // ─────────────────────────────────────────────────────
    const LEVEL_COLORS = {
      1: { bg: 'bg-rose-50',    border: 'border-rose-400',    text: 'text-rose-800',    badge: 'bg-rose-600',    label: '매우 위험' },
      2: { bg: 'bg-orange-50',  border: 'border-orange-400',  text: 'text-orange-800',  badge: 'bg-orange-600',  label: '위험' },
      3: { bg: 'bg-amber-50',   border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-600',   label: '주의' },
      4: { bg: 'bg-sky-50',     border: 'border-sky-400',     text: 'text-sky-800',     badge: 'bg-sky-600',     label: '실무 표준' },
      5: { bg: 'bg-emerald-50', border: 'border-emerald-400', text: 'text-emerald-800', badge: 'bg-emerald-600', label: '안전' },
    };

    // ─────────────────────────────────────────────────────
    // 좌측 상단: 보안 레벨 게이지
    //   현재 단계의 securityLevel(1~5)에 맞춰 색상과 라벨 변화
    // ─────────────────────────────────────────────────────
    function SecurityGauge({ level }) {
      const c = LEVEL_COLORS[level];
      return (
        <div className={`rounded-lg border-2 ${c.border} ${c.bg} p-3 transition-all duration-500`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🛡️</span>
              <span className={`text-[11px] font-bold ${c.text}`}>보안 레벨</span>
            </div>
            <span className={`text-[10px] px-2 py-0.5 rounded font-mono font-bold text-white ${c.badge}`}>
              Level {level} / 5 · {c.label}
            </span>
          </div>
          <div className="flex gap-1">
            {[1, 2, 3, 4, 5].map((n) => {
              const active = n <= level;
              const cc = LEVEL_COLORS[n];
              return (
                <div
                  key={n}
                  className={`flex-1 h-3 rounded transition-all duration-500 ${
                    active ? cc.badge : 'bg-slate-200'
                  }`}
                  title={`Level ${n} — ${cc.label}`}
                />
              );
            })}
          </div>
          <div className="flex gap-1 mt-1 text-[8px] font-mono text-slate-500 text-center">
            <div className="flex-1">위험</div>
            <div className="flex-1">위험</div>
            <div className="flex-1">주의</div>
            <div className="flex-1">표준</div>
            <div className="flex-1">안전</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙: 비밀이 어디에 있는지 — location 5개 박스
    //   현재 단계의 secretAt 위치만 강조 (자물쇠 아이콘 표시)
    //   inImageLayer / gitExposed 면 해당 박스에 위험 배지
    // ─────────────────────────────────────────────────────
    function SecretLocationMap({ step }) {
      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🔍</span>
              <span className="text-[11px] font-bold text-slate-700">비밀번호 / API 키가 지금 어디에 있나?</span>
            </div>
            <span className="text-[9px] text-slate-400 font-mono">step {STEPS.findIndex(s => s.secretAt === step.secretAt) + 1}</span>
          </div>

          <div className="grid grid-cols-5 gap-1.5">
            {LOCATIONS.map((loc, i) => {
              const here = step.secretAt === loc.id;
              const level = i + 1;
              const c = LEVEL_COLORS[level];
              return (
                <div
                  key={loc.id}
                  className={`rounded-lg border-2 p-2 text-center transition-all duration-500 ${
                    here
                      ? `${c.bg} ${c.border} shadow-md`
                      : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
                  }`}
                >
                  <div className="text-lg mb-0.5 relative">
                    {loc.icon}
                    {here && (
                      <span className="absolute -top-1 -right-1 text-xs animate-pulse">🔑</span>
                    )}
                  </div>
                  <div className={`text-[9px] font-bold ${here ? c.text : 'text-slate-400'} leading-tight`}>
                    {loc.label}
                  </div>
                  <div className={`text-[8px] ${here ? 'text-slate-600' : 'text-slate-400'} leading-tight`}>
                    {loc.sub}
                  </div>
                  {here && (
                    <div className={`mt-1 text-white text-[8px] px-1 py-0.5 rounded font-mono font-bold ${c.badge}`}>
                      여기 ✓
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* 위험 배지 — 현재 단계의 risks 표시 */}
          {step.risks.length > 0 && (
            <div className="mt-2 flex flex-wrap gap-1">
              {step.risks.map((r, i) => (
                <span
                  key={i}
                  className="text-[9px] bg-rose-100 text-rose-800 border border-rose-300 px-1.5 py-0.5 rounded font-medium"
                >
                  ⚠ {r}
                </span>
              ))}
            </div>
          )}
          {step.risks.length === 0 && (
            <div className="mt-2 text-[10px] bg-emerald-50 border border-emerald-300 rounded px-2 py-1 text-emerald-800 font-medium text-center">
              ✓ 알려진 노출 경로 없음
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: Git 저장소 + Docker 이미지 + 컨테이너
    //   Git 저장소 → 이미지 빌드 → 컨테이너 실행 흐름에서
    //   각 단계마다 "비밀이 어디로 새는가" 시각화
    // ─────────────────────────────────────────────────────
    function FlowBox({ step }) {
      const { gitExposed, inImageLayer, secretAt, containerEnv, highlightLeak } = step;

      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🌊</span>
              <span className="text-[11px] font-bold text-slate-700">Git → 이미지 → 컨테이너 — 비밀이 새는 곳</span>
            </div>
          </div>

          <div className="grid grid-cols-3 gap-2">
            {/* Git 저장소 */}
            <div className={`rounded-lg border-2 p-2 transition-all duration-500 ${
              gitExposed
                ? 'bg-rose-50 border-rose-400'
                : 'bg-slate-50 border-slate-200'
            }`}>
              <div className="text-center text-base mb-0.5">📦</div>
              <div className={`text-[10px] font-bold text-center ${gitExposed ? 'text-rose-800' : 'text-slate-600'}`}>
                Git 저장소
              </div>
              <div className={`text-[8px] text-center font-mono mt-0.5 ${gitExposed ? 'text-rose-700' : 'text-slate-400'}`}>
                {gitExposed ? '🔑 비밀 노출!' : '✓ 비밀 없음'}
              </div>
            </div>

            {/* Docker 이미지 */}
            <div className={`rounded-lg border-2 p-2 transition-all duration-500 ${
              inImageLayer
                ? 'bg-orange-50 border-orange-400'
                : 'bg-slate-50 border-slate-200'
            }`}>
              <div className="text-center text-base mb-0.5">🐋</div>
              <div className={`text-[10px] font-bold text-center ${inImageLayer ? 'text-orange-800' : 'text-slate-600'}`}>
                Docker 이미지
              </div>
              <div className={`text-[8px] text-center font-mono mt-0.5 ${inImageLayer ? 'text-orange-700' : 'text-slate-400'}`}>
                {inImageLayer ? '🔑 레이어에 박힘!' : '✓ 비밀 분리됨'}
              </div>
            </div>

            {/* 컨테이너 */}
            <div className={`rounded-lg border-2 p-2 transition-all duration-500 ${
              secretAt === 'secrets'
                ? 'bg-emerald-50 border-emerald-400'
                : 'bg-sky-50 border-sky-300'
            }`}>
              <div className="text-center text-base mb-0.5">📦</div>
              <div className={`text-[10px] font-bold text-center ${
                secretAt === 'secrets' ? 'text-emerald-800' : 'text-sky-800'
              }`}>
                실행 컨테이너
              </div>
              <div className={`text-[8px] text-center font-mono mt-0.5 ${
                secretAt === 'secrets' ? 'text-emerald-700' : 'text-sky-700'
              }`}>
                {secretAt === 'secrets' ? '🔐 /run/secrets/' : '🔑 환경변수'}
              </div>
            </div>
          </div>

          {/* 화살표 */}
          <div className="flex items-center justify-center gap-1 mt-1.5 text-[10px] font-mono text-slate-500">
            <span className={highlightLeak && gitExposed ? 'text-rose-600 font-bold' : ''}>commit</span>
            <span>→</span>
            <span className={highlightLeak && inImageLayer ? 'text-orange-600 font-bold' : ''}>build</span>
            <span>→</span>
            <span>run</span>
          </div>

          {/* 컨테이너 안 환경변수 미리보기 */}
          <div className="mt-2 bg-slate-900 rounded p-2 font-mono text-[9px] leading-snug">
            <div className="text-slate-500 mb-0.5">$ docker exec {step.secretAt === 'secrets' ? 'web' : 'web'} env</div>
            {containerEnv.map((e, i) => {
              const isSecret = /PASSWORD|API_KEY|SECRET/i.test(e) && !/_FILE/i.test(e);
              return (
                <div
                  key={i}
                  className={isSecret ? 'text-rose-300' : 'text-emerald-300'}
                >
                  {isSecret ? '⚠ ' : '  '}
                  {e}
                </div>
              );
            })}
            {step.secretAt === 'secrets' && (
              <>
                <div className="text-slate-500 mt-1">$ ls /run/secrets/</div>
                <div className="text-amber-300">  db_password    stripe_api_key</div>
                <div className="text-slate-500">  (tmpfs · 0400 · root)</div>
              </>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 보안 레벨 게이지
    //   중앙: 비밀 위치 5개 박스 (한 곳만 active)
    //   하단: Git → 이미지 → 컨테이너 흐름 + env 덤프
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🔐 비밀 위치 추적</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2.5">
            <SecurityGauge level={step.securityLevel} />
            <SecretLocationMap step={step} />
            <FlowBox step={step} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>위험
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-orange-500"></span>이미지 노출
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>주의
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>표준
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>안전
            </span>
            <span className="ml-auto font-mono">level: {step.securityLevel}/5</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, 강조 라인 (sky)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VI-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. Docker 운영 &gt; Chapter 1. 환경 분리</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VI-1-2. 환경변수 관리 — .env / secrets / build args</h1>
                  <p className="text-sm text-slate-500 mt-0.5">비밀번호 · API 키가 어디에 박혀 있는지 5단계로 추적 — 하드코딩 → ARG/ENV → -e → .env → secrets</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: 일반 변수는 <strong>.env + env_file</strong> 로 관리하고, 진짜 critical 한 비밀(DB 비번, 결제 키)은 <strong>secrets</strong> 로 격리한다. 운영 단계에서는 외부 secret store(Vault, AWS Secrets Manager) 와 연동.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['hardcode', 'ARG', 'ENV', 'docker run -e', '.env', 'env_file', 'secrets', 'tmpfs', '.gitignore', 'Vault'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./vi-1-1_three_tier_app.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; VI-1-1 3-tier app</a>
              <a href="./vi-1-3_healthcheck_timing.html" className="text-sky-700 hover:text-sky-900 font-medium">VI-1-3 healthcheck &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
