<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — 환경변수와 .env 관리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-shake { animation: shake 0.4s ease-in-out; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · 위험한 방식 — 하드코딩",
        desc: "docker-compose.yml에 비밀번호를 직접 쓰면 Git에 올라가는 순간 보안 사고가 난다. GitHub에 올리면 봇이 수 분 안에 긁어간다.",
        phase: "hardcode",
        method: "hardcode",
      },
      {
        title: "STEP 2 · environment: 블록 (YAML 직접 기입)",
        desc: "environment: 블록에 KEY: VALUE 형태로 값을 직접 쓴다. 민감하지 않은 값(포트, 타임존 등)에 적합하다. 비밀번호는 여전히 YAML에 노출된다.",
        phase: "environment",
        method: "environment",
      },
      {
        title: "STEP 3 · .env 파일 + ${변수명} 치환",
        desc: ".env 파일에 민감한 값을 넣고 docker-compose.yml에서는 ${변수명}으로 참조한다. YAML에는 자리표시자만 남고 실제 값은 .env에 있다.",
        phase: "dotenv_sub",
        method: "dotenv_sub",
      },
      {
        title: "STEP 4 · env_file: 옵션 (파일 통째로 주입)",
        desc: "env_file: .env로 파일 전체를 컨테이너 환경변수로 주입한다. 변수를 하나씩 나열하지 않아도 된다. .env의 모든 KEY=VALUE가 컨테이너 안에서 바로 사용 가능하다.",
        phase: "env_file",
        method: "env_file",
      },
      {
        title: "STEP 5 · .gitignore + .env.example 패턴",
        desc: ".env는 .gitignore에 추가해 Git에서 제외한다. 대신 .env.example에 자리표시자를 넣어 Git에 포함한다. 팀원은 cp .env.example .env 후 실제 값을 채운다.",
        phase: "gitignore",
        method: "gitignore",
      },
      {
        title: "STEP 6 · 프로덕션 시크릿 관리",
        desc: "프로덕션에서는 .env 파일 대신 Docker Secrets, AWS Secrets Manager, HashiCorp Vault 같은 전용 도구를 사용한다. 시크릿 자동 교체와 접근 감사가 가능하다.",
        phase: "production",
        method: "production",
      },
    ];

    function CodeBlock({ title, code, highlight, danger }) {
      return (
        <div className={`rounded-lg overflow-hidden border ${danger ? "border-red-300" : "border-slate-300"}`}>
          <div className={`px-3 py-1.5 text-xs font-medium ${danger ? "bg-red-100 text-red-700" : "bg-slate-200 text-slate-600"}`}>{title}</div>
          <pre className="bg-slate-800 text-sm p-3 overflow-x-auto">
            {code.map((line, i) => (
              <div key={i} className={`${highlight && highlight.includes(i) ? (danger ? "text-red-400 font-bold" : "text-green-400 font-bold") : "text-slate-300"}`}>
                {line}
              </div>
            ))}
          </pre>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4500);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const renderVisualization = () => {
        switch (data.method) {
          case "hardcode":
            return (
              <div className="space-y-4 anim-fade">
                <CodeBlock title="docker-compose.yml (위험!)" danger={true} code={[
                  "services:",
                  "  db:",
                  "    image: postgres:16-alpine",
                  "    environment:",
                  '      POSTGRES_PASSWORD: "my_super_secret_123"  # 위험!',
                  '      POSTGRES_USER: "admin"',
                ]} highlight={[4, 5]} />
                <div className="bg-red-50 border border-red-200 rounded-lg p-3 text-center anim-shake">
                  <span className="text-red-600 font-bold">비밀번호가 Git 이력에 영원히 남는다</span>
                </div>
              </div>
            );
          case "environment":
            return (
              <div className="space-y-4 anim-fade">
                <CodeBlock title="docker-compose.yml (environment: 블록)" code={[
                  "services:",
                  "  api:",
                  "    build: ./api",
                  "    environment:",
                  "      - TZ=Asia/Seoul          # 민감하지 않음",
                  "      - LOG_LEVEL=debug         # 민감하지 않음",
                  '      - DB_PASS=secret123       # 민감함 - 여전히 노출!',
                ]} highlight={[4, 5, 6]} />
                <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-center">
                  <span className="text-yellow-700 font-medium">민감하지 않은 값에만 적합. 비밀번호는 분리해야 한다.</span>
                </div>
              </div>
            );
          case "dotenv_sub":
            return (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 anim-fade">
                <CodeBlock title=".env (Git에서 제외)" code={[
                  "POSTGRES_USER=app",
                  "POSTGRES_PASSWORD=secret_change_me",
                  "POSTGRES_DB=demo",
                ]} highlight={[0, 1, 2]} />
                <CodeBlock title="docker-compose.yml (자리표시자만)" code={[
                  "services:",
                  "  db:",
                  "    image: postgres:16-alpine",
                  "    environment:",
                  "      POSTGRES_USER: ${POSTGRES_USER}",
                  "      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}",
                ]} highlight={[4, 5]} />
                <div className="md:col-span-2 bg-blue-50 border border-blue-200 rounded-lg p-3 text-center">
                  <span className="text-blue-700 font-medium">docker compose config 으로 치환 결과를 미리 확인 가능</span>
                </div>
              </div>
            );
          case "env_file":
            return (
              <div className="space-y-4 anim-fade">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <CodeBlock title=".env (KEY=VALUE 전체)" code={[
                    "POSTGRES_USER=app",
                    "POSTGRES_PASSWORD=secret_change_me",
                    "POSTGRES_DB=demo",
                    "DATABASE_URL=postgresql://app:secret@db:5432/demo",
                  ]} highlight={[0, 1, 2, 3]} />
                  <CodeBlock title="docker-compose.yml (env_file:)" code={[
                    "services:",
                    "  db:",
                    "    image: postgres:16-alpine",
                    "    env_file: .env       # 파일 통째로 주입",
                    "  api:",
                    "    build: ./api",
                    "    env_file: .env       # 같은 .env 재사용",
                  ]} highlight={[3, 6]} />
                </div>
                <div className="flex justify-center gap-4">
                  <div className="bg-indigo-50 border border-indigo-200 rounded-lg p-3 text-center flex-1">
                    <div className="text-xs text-indigo-500 mb-1">env_file:</div>
                    <div className="text-sm text-indigo-700 font-medium">컨테이너 내부 환경변수로 주입</div>
                  </div>
                  <div className="bg-teal-50 border border-teal-200 rounded-lg p-3 text-center flex-1">
                    <div className="text-xs text-teal-500 mb-1">${"${변수명}"} 치환</div>
                    <div className="text-sm text-teal-700 font-medium">YAML 내부에서 값을 교체</div>
                  </div>
                </div>
              </div>
            );
          case "gitignore":
            return (
              <div className="space-y-4 anim-fade">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="rounded-lg border border-red-200 bg-red-50 p-4 text-center">
                    <div className="text-2xl mb-2">🚫</div>
                    <div className="font-bold text-red-700 text-sm">.env</div>
                    <div className="text-xs text-red-500 mt-1">Git에서 제외</div>
                    <div className="text-xs text-slate-500 mt-2">실제 비밀번호 포함</div>
                  </div>
                  <div className="rounded-lg border border-green-200 bg-green-50 p-4 text-center">
                    <div className="text-2xl mb-2">✅</div>
                    <div className="font-bold text-green-700 text-sm">.env.example</div>
                    <div className="text-xs text-green-500 mt-1">Git에 포함</div>
                    <div className="text-xs text-slate-500 mt-2">자리표시자만 포함</div>
                  </div>
                  <div className="rounded-lg border border-slate-200 bg-slate-50 p-4 text-center">
                    <div className="text-2xl mb-2">📄</div>
                    <div className="font-bold text-slate-700 text-sm">.gitignore</div>
                    <div className="text-xs text-slate-500 mt-1">추적 제외 규칙</div>
                    <div className="text-xs text-slate-500 mt-2">.env / *.env / !.env.example</div>
                  </div>
                </div>
                <CodeBlock title=".gitignore" code={[
                  ".env",
                  "*.env",
                  "!.env.example    # .env.example은 Git에 포함",
                ]} highlight={[0, 1, 2]} />
              </div>
            );
          case "production":
            return (
              <div className="space-y-4 anim-fade">
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                  {[
                    { name: "Docker Secrets", env: "Docker Swarm", icon: "🔒", desc: "파일로 마운트, 메모리에만 저장" },
                    { name: "AWS Secrets Manager", env: "AWS", icon: "☁️", desc: "IAM 권한 제어, 자동 교체" },
                    { name: "HashiCorp Vault", env: "멀티 클라우드", icon: "🏦", desc: "동적 시크릿, 감사 로그" },
                    { name: "K8s Secrets", env: "Kubernetes", icon: "☸️", desc: "네이티브 지원, etcd 암호화" },
                  ].map((tool, i) => (
                    <div key={i} className="rounded-lg border border-emerald-200 bg-emerald-50 p-3 text-center anim-slide" style={{animationDelay: `${i * 0.1}s`}}>
                      <div className="text-2xl mb-1">{tool.icon}</div>
                      <div className="font-bold text-emerald-800 text-xs">{tool.name}</div>
                      <div className="text-xs text-emerald-600 mt-1">{tool.env}</div>
                      <div className="text-xs text-slate-500 mt-1">{tool.desc}</div>
                    </div>
                  ))}
                </div>
                <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-center">
                  <span className="text-emerald-700 font-medium">.env는 로컬 개발용. 프로덕션에서는 전용 시크릿 매니저를 사용한다.</span>
                </div>
              </div>
            );
          default:
            return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VI-1-2: 환경변수와 .env 파일 관리</h1>
              </div>
              <p className="text-slate-500 text-sm">환경변수 주입 방식(하드코딩 → environment → env_file → 프로덕션)을 비교합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "production" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "hardcode" ? "bg-red-600 border-red-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
              {renderVisualization()}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
