<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — Compose 네트워크 직접 정의하기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }
    @keyframes pingPong { 0%{transform:translateX(0);} 50%{transform:translateX(10px);} 100%{transform:translateX(0);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-shake { animation: shake 0.4s ease-in-out; }
    .anim-ping { animation: pingPong 2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · 기본 네트워크의 보안 문제",
        desc: "Compose를 실행하면 모든 서비스가 같은 네트워크에 연결된다. Nginx도 DB에 직접 접근할 수 있는 상태다. 프론트엔드 역할인 Nginx가 DB에 직접 커넥션을 맺을 일은 없어야 한다.",
        phase: "problem",
      },
      {
        title: "STEP 2 · 네트워크 분리 설계",
        desc: "frontend 네트워크(Nginx ↔ API)와 backend 네트워크(API ↔ DB)를 분리한다. API는 두 네트워크 모두에 속해 중간 다리 역할을 한다. Nginx에서 DB로의 직접 통신 경로를 차단한다.",
        phase: "design",
      },
      {
        title: "STEP 3 · networks: 블록 선언 (1단계)",
        desc: "최상위 networks: 블록에서 네트워크 이름을 선언한다. frontend와 backend 두 개를 만든다. driver: bridge는 기본값이므로 생략할 수 있다.",
        phase: "declare",
      },
      {
        title: "STEP 4 · 서비스별 네트워크 연결 (2단계)",
        desc: "각 서비스의 networks: 항목에 연결할 네트워크를 나열한다. nginx는 frontend만, db는 backend만, api는 둘 다. 이것이 프론트/백엔드 분리 패턴의 핵심이다.",
        phase: "assign",
      },
      {
        title: "STEP 5 · 격리 동작 검증",
        desc: "nginx 컨테이너 안에서 ping db를 실행하면 'Name or service not known' 에러가 난다. 같은 네트워크가 아니어서 DNS 해석 자체가 실패한다. api에서 ping db는 성공한다.",
        phase: "verify",
      },
      {
        title: "STEP 6 · 네트워크 분리 정리",
        desc: "사용자 정의 네트워크로 서비스 간 통신을 세밀하게 제어할 수 있다. 보안이 필요한 환경에서는 반드시 네트워크를 분리하고, docker network inspect로 격리를 검증한다.",
        phase: "summary",
      },
    ];

    /* ── 네트워크 다이어그램 ── */
    function NetworkTopology({ phase }) {
      const showFrontend = ["design", "assign", "verify", "summary"].includes(phase);
      const showBackend = ["design", "assign", "verify", "summary"].includes(phase);
      const showBlock = ["verify"].includes(phase);
      const isDefault = phase === "problem";

      return (
        <div className="bg-white rounded-xl border-2 border-slate-200 p-6 anim-fade">
          <div className="text-center text-sm font-bold text-slate-600 mb-4">
            {isDefault ? "기본 네트워크 — 모든 서비스가 같은 네트워크" : "프론트/백엔드 네트워크 분리"}
          </div>

          {/* 외부 */}
          <div className="text-center mb-3">
            <span className="bg-slate-200 text-slate-700 px-3 py-1 rounded-full text-xs font-bold">🌍 외부 (브라우저)</span>
            <div className="text-slate-400 text-lg">↓ :80</div>
          </div>

          {isDefault ? (
            /* 기본 네트워크 */
            <div className="bg-red-50 border-2 border-red-300 rounded-xl p-4">
              <div className="text-xs font-bold text-red-600 text-center mb-3">myapp_default (단일 네트워크)</div>
              <div className="flex justify-center gap-4">
                {[
                  { icon: "🌐", name: "nginx", port: ":80" },
                  { icon: "⚡", name: "api", port: ":8000" },
                  { icon: "🗄️", name: "db", port: ":5432" },
                ].map((svc, i) => (
                  <div key={i} className="bg-white border-2 border-red-300 rounded-lg p-3 text-center shadow-sm">
                    <div className="text-2xl">{svc.icon}</div>
                    <div className="text-xs font-bold mt-1">{svc.name}</div>
                    <div className="text-xs text-slate-400">{svc.port}</div>
                  </div>
                ))}
              </div>
              <div className="text-center mt-3">
                <span className="text-xs text-red-500 font-bold">nginx → db 직접 접근 가능 (위험!)</span>
              </div>
            </div>
          ) : (
            /* 분리된 네트워크 */
            <div className="space-y-3">
              {/* frontend 네트워크 */}
              <div className={`border-2 rounded-xl p-4 transition-all duration-500 ${showFrontend ? "bg-blue-50 border-blue-300" : "bg-slate-50 border-slate-200 opacity-40"}`}>
                <div className="text-xs font-bold text-blue-600 text-center mb-2">frontend 네트워크</div>
                <div className="flex justify-center gap-6 items-center">
                  <div className="bg-white border-2 border-blue-400 rounded-lg p-3 text-center shadow-sm">
                    <div className="text-2xl">🌐</div>
                    <div className="text-xs font-bold mt-1">nginx</div>
                    <div className="text-xs text-blue-500">ports: "80:80"</div>
                  </div>
                  <div className="text-blue-400 font-bold anim-ping">↔</div>
                  <div className="bg-white border-2 border-purple-400 rounded-lg p-3 text-center shadow-sm">
                    <div className="text-2xl">⚡</div>
                    <div className="text-xs font-bold mt-1">api</div>
                    <div className="text-xs text-purple-500">expose: "8000"</div>
                  </div>
                </div>
              </div>

              {/* api가 두 네트워크를 연결 */}
              <div className="text-center text-xs text-purple-600 font-bold">api = 두 네트워크의 다리</div>

              {/* backend 네트워크 */}
              <div className={`border-2 rounded-xl p-4 transition-all duration-500 ${showBackend ? "bg-emerald-50 border-emerald-300" : "bg-slate-50 border-slate-200 opacity-40"}`}>
                <div className="text-xs font-bold text-emerald-600 text-center mb-2">backend 네트워크</div>
                <div className="flex justify-center gap-6 items-center">
                  <div className="bg-white border-2 border-purple-400 rounded-lg p-3 text-center shadow-sm">
                    <div className="text-2xl">⚡</div>
                    <div className="text-xs font-bold mt-1">api</div>
                    <div className="text-xs text-purple-500">두 네트워크 소속</div>
                  </div>
                  <div className="text-emerald-400 font-bold anim-ping">↔</div>
                  <div className="bg-white border-2 border-emerald-400 rounded-lg p-3 text-center shadow-sm">
                    <div className="text-2xl">🗄️</div>
                    <div className="text-xs font-bold mt-1">db</div>
                    <div className="text-xs text-emerald-500">backend만</div>
                  </div>
                </div>
              </div>

              {/* 차단 표시 */}
              {showBlock && (
                <div className="bg-red-50 border border-red-200 rounded-xl p-3 text-center anim-fade">
                  <div className="flex items-center justify-center gap-3">
                    <span className="text-sm">🌐 nginx</span>
                    <span className="text-red-500 font-bold text-lg">✗ → ✗</span>
                    <span className="text-sm">🗄️ db</span>
                  </div>
                  <div className="text-xs text-red-600 mt-1 font-mono">$ docker exec nginx ping db → "Name or service not known"</div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    /* ── 메인 앱 ── */
    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const yamlDeclare = [
        "networks:",
        "  frontend:       # Nginx <-> API 통신용",
        "    driver: bridge",
        "  backend:        # API <-> DB 통신용",
        "    driver: bridge",
      ];

      const yamlAssign = [
        "services:",
        "  nginx:",
        '    image: nginx:alpine',
        '    ports: ["80:80"]',
        "    networks:",
        "      - frontend        # frontend만",
        "",
        "  api:",
        "    build: ./api",
        '    expose: ["8000"]',
        "    networks:",
        "      - frontend        # nginx와 통신",
        "      - backend         # db와 통신",
        "",
        "  db:",
        '    image: postgres:16-alpine',
        "    networks:",
        "      - backend         # backend만",
      ];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter V-1-5: Compose 네트워크 직접 정의하기</h1>
              </div>
              <p className="text-slate-500 text-sm">커스텀 네트워크를 정의하고 서비스를 연결하는 과정 — frontend/backend 네트워크 분리를 시각화합니다.</p>
            </header>

            {/* 현재 단계 설명 */}
            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "problem" ? "bg-red-600 border-red-700 text-white" :
              data.phase === "verify" ? "bg-amber-600 border-amber-700 text-white" :
              data.phase === "summary" ? "bg-emerald-600 border-emerald-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 시각화 영역 */}
            {(data.phase === "problem" || data.phase === "design" || data.phase === "verify") && (
              <NetworkTopology phase={data.phase} />
            )}

            {data.phase === "declare" && (
              <div key="declare" className="grid grid-cols-1 md:grid-cols-2 gap-4 anim-fade">
                <div className="bg-slate-900 rounded-xl p-4 font-mono text-sm">
                  <div className="text-slate-400 text-xs mb-2">1단계: 최상위 networks: 선언</div>
                  {yamlDeclare.map((line, i) => (
                    <div key={i} className={`px-2 py-0.5 rounded ${i === 0 ? "text-yellow-300 bg-yellow-900/30" : "text-slate-300"}`}>{line}</div>
                  ))}
                </div>
                <div className="space-y-3">
                  <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-4 anim-slide">
                    <div className="font-bold text-blue-800">frontend</div>
                    <div className="text-sm text-blue-600">Nginx와 API 사이의 통신을 담당</div>
                  </div>
                  <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-4 anim-slide" style={{ animationDelay: "0.15s" }}>
                    <div className="font-bold text-emerald-800">backend</div>
                    <div className="text-sm text-emerald-600">API와 DB 사이의 통신을 담당</div>
                  </div>
                </div>
              </div>
            )}

            {data.phase === "assign" && (
              <div key="assign" className="grid grid-cols-1 md:grid-cols-2 gap-4 anim-fade">
                <div className="bg-slate-900 rounded-xl p-4 font-mono text-sm overflow-x-auto">
                  <div className="text-slate-400 text-xs mb-2">2단계: 서비스별 networks: 연결</div>
                  {yamlAssign.map((line, i) => {
                    const isHighlight = [4, 5, 10, 11, 12, 16, 17].includes(i);
                    return (
                      <div key={i} className={`px-2 py-0.5 rounded whitespace-pre ${isHighlight ? "bg-yellow-900/50 text-yellow-300" : "text-slate-300"}`}>{line}</div>
                    );
                  })}
                </div>
                <div className="space-y-3">
                  {[
                    { name: "nginx", nets: ["frontend"], color: "bg-blue-100 border-blue-300", text: "text-blue-800" },
                    { name: "api", nets: ["frontend", "backend"], color: "bg-purple-100 border-purple-300", text: "text-purple-800" },
                    { name: "db", nets: ["backend"], color: "bg-emerald-100 border-emerald-300", text: "text-emerald-800" },
                  ].map((svc, i) => (
                    <div key={i} className={`border-2 rounded-xl p-3 ${svc.color} anim-slide`} style={{ animationDelay: `${i * 0.1}s` }}>
                      <div className={`font-bold ${svc.text}`}>{svc.name}</div>
                      <div className="flex gap-2 mt-1">
                        {svc.nets.map(n => (
                          <span key={n} className={`text-xs px-2 py-0.5 rounded-full ${n === "frontend" ? "bg-blue-200 text-blue-700" : "bg-emerald-200 text-emerald-700"}`}>{n}</span>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {data.phase === "summary" && (
              <div key="summary" className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6 anim-fade">
                <div className="text-center">
                  <div className="text-4xl mb-3">🔐</div>
                  <h3 className="text-xl font-bold text-emerald-800 mb-4">네트워크 분리 = 보안의 기본</h3>
                  <div className="flex flex-wrap justify-center gap-2 mb-4">
                    {[
                      "최상위 networks: 선언",
                      "서비스별 networks: 연결",
                      "docker network inspect로 검증",
                    ].map((item, i) => (
                      <span key={i} className="bg-emerald-200 text-emerald-800 px-3 py-1.5 rounded-full text-sm font-medium anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                        {item}
                      </span>
                    ))}
                  </div>
                  <p className="text-emerald-700 text-sm">같은 네트워크 안에서만 DNS 통신이 가능하다. 네트워크를 분리하면 불필요한 접근 경로를 원천 차단한다.</p>
                </div>
              </div>
            )}

            {/* 프로그레스 + 컨트롤 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
