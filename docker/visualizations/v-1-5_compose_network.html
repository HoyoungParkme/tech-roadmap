              (2) service name = DNS 이름
              (3) frontend/backend 네트워크 분리
              (4) 외부 네트워크에 join (networks: external: true)
              (5) k8s NetworkPolicy와 비교 — Compose는 단순, k8s는 정밀

    // ─────────────────────────────────────────────────────
    // ServiceChip — 네트워크 박스 안의 service 노드
    // ─────────────────────────────────────────────────────
    function ServiceChip({ id, dim, multi }) {
      const svc = id === 'shared-logger' ? EXTERNAL_SERVICE : SERVICES.find((s) => s.id === id);
      if (!svc) return null;
      return (
        <div
          className={`flex items-center gap-1.5 rounded-md border px-2 py-1 transition ${
            dim ? 'bg-white border-slate-200 opacity-60' : 'bg-white border-slate-300 shadow-sm'
          }`}
        >
          <span className="text-base leading-none">{svc.icon}</span>
          <div className="leading-tight">
            <div className="text-[10px] font-bold text-slate-700">{svc.label}</div>
            <div className="text-[8px] text-slate-400 font-mono">:{svc.port}</div>
          </div>
          {multi && (
            <span className="ml-1 text-[8px] bg-purple-600 text-white px-1 rounded font-mono font-bold">multi</span>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // NetworkBox — 네트워크 한 개 시각화
    //   tone: sky / emerald / amber
    //   external: true 면 점선 + amber 배지
    // ─────────────────────────────────────────────────────
    function NetworkBox({ net, allNetworks }) {
      const tone = TONE[net.tone] || TONE.sky;
      // 다른 네트워크에도 속한 service = 다리 역할
      const multiServices = new Set();
      net.services.forEach((sid) => {
        const inOthers = allNetworks.some((n) => n.id !== net.id && n.services.includes(sid));
        if (inOthers) multiServices.add(sid);
      });

      return (
        <div
          className={`rounded-lg border-2 ${tone.bg} ${tone.border} p-3 ${
            net.external ? 'border-dashed' : ''
          }`}
        >
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🕸️</span>
              <div>
                <div className={`text-[11px] font-bold ${tone.text}`}>{net.label}</div>
                <div className="text-[9px] text-slate-500 font-mono">{net.sub}</div>
              </div>
            </div>
            <span
              className={`text-[9px] ${tone.pill} text-white px-1.5 py-0.5 rounded font-mono font-bold`}
            >
              {net.external ? 'external' : 'compose'}
            </span>
          </div>
          <div className="flex flex-wrap gap-1.5">
            {net.services.map((sid) => (
              <ServiceChip key={sid} id={sid} multi={multiServices.has(sid)} />
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // DnsLookupBox — Step 2: api → db DNS 해석 시각화
    // ─────────────────────────────────────────────────────
    function DnsLookupBox({ lookup }) {
      if (!lookup) return null;
      return (
        <div className="rounded-lg border-2 border-sky-300 bg-white p-2">
          <div className="text-[10px] font-bold text-sky-800 mb-1.5 flex items-center gap-1.5">
            <span>🔎</span>
            <span>내장 DNS 해석 (127.0.0.11)</span>
          </div>
          <div className="flex items-center gap-2 text-[10px] font-mono">
            <span className="bg-slate-100 px-1.5 py-0.5 rounded">{lookup.from}</span>
            <span className="text-slate-400">→</span>
            <span className="bg-sky-100 text-sky-800 px-1.5 py-0.5 rounded font-bold">
              resolve("{lookup.to}")
            </span>
            <span className="text-slate-400">→</span>
            <span className="bg-emerald-100 text-emerald-800 px-1.5 py-0.5 rounded font-bold">
              {lookup.resolved}
            </span>
          </div>
          <div className="text-[9px] text-slate-500 mt-1 leading-snug">
            service 이름 = host 이름 → 코드는 IP 를 몰라도 됨, 환경 이동에도 무수정.
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // BlockedBox — 차단된 통신 표시 (Step 3, 5)
    // ─────────────────────────────────────────────────────
    function BlockedBox({ blocked }) {
      if (!blocked || blocked.length === 0) return null;
      return (
        <div className="rounded-lg border-2 border-red-300 bg-red-50 p-2">
          <div className="text-[10px] font-bold text-red-700 mb-1.5 flex items-center gap-1.5">
            <span>🚫</span>
            <span>차단되는 통신</span>
          </div>
          <div className="space-y-1">
            {blocked.map((b, i) => (
              <div key={i} className="flex items-center gap-2 text-[10px] font-mono">
                <span className="bg-white border border-red-200 px-1.5 py-0.5 rounded">{b.from}</span>
                <span className="text-red-500 font-bold">✗→✗</span>
                <span className="bg-white border border-red-200 px-1.5 py-0.5 rounded">{b.to}</span>
                <span className="text-red-700 text-[9px]">{b.reason}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // ExternalNoteBox — Step 4: 외부 네트워크 안내
    // ─────────────────────────────────────────────────────
    function ExternalNoteBox() {
      return (
        <div className="rounded-lg border-2 border-amber-300 bg-amber-50 p-2">
          <div className="text-[10px] font-bold text-amber-800 mb-1 flex items-center gap-1.5">
            <span>🔗</span>
            <span>external 네트워크 → 다른 compose 와 공유</span>
          </div>
          <div className="text-[9px] text-amber-800 leading-snug font-mono">
            $ docker network create shared-logging
            <br />
            networks.shared-logging.external: true
          </div>
          <div className="text-[9px] text-amber-700 mt-1 leading-snug">
            compose down 으로도 지워지지 않음 → 공용 로거/브로커 join 표준 패턴.
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // CompareTable — Step 5: Compose vs k8s 요약 카드
    // ─────────────────────────────────────────────────────
    function CompareTable() {
      const rows = [
        { k: '단위',         compose: 'service',           k8s: 'Pod (label selector)' },
        { k: '통신 허용',    compose: '같은 네트워크면 OK', k8s: '명시적 ingress/egress' },
        { k: '포트 제어',    compose: '없음 (전부 허용)',  k8s: '포트별 허용/차단' },
        { k: '멀티 호스트',  compose: 'overlay 별도',       k8s: '클러스터 기본' },
      ];
      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-2">
          <div className="text-[10px] font-bold text-slate-700 mb-1.5 flex items-center gap-1.5">
            <span>⚖️</span>
            <span>Compose 네트워크 vs k8s NetworkPolicy</span>
          </div>
          <div className="grid grid-cols-3 gap-1 text-[9px]">
            <div className="font-bold text-slate-500 px-1.5 py-1">관점</div>
            <div className="font-bold text-sky-700 px-1.5 py-1">Compose</div>
            <div className="font-bold text-fuchsia-700 px-1.5 py-1">k8s</div>
            {rows.map((r) => (
              <React.Fragment key={r.k}>
                <div className="bg-slate-50 px-1.5 py-1 rounded font-mono">{r.k}</div>
                <div className="bg-sky-50 px-1.5 py-1 rounded">{r.compose}</div>
                <div className="bg-fuchsia-50 px-1.5 py-1 rounded">{r.k8s}</div>
              </React.Fragment>
            ))}
          </div>
          <div className="text-[9px] text-slate-600 mt-1.5 leading-snug">
            <span className="font-bold">경계선:</span> 포트별 제어 또는 멀티 노드가 필요해지면 k8s.
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 외부 + 호스트 라벨
    //   중앙: 네트워크 박스들 (1~3개)
    //   하단: DNS / Blocked / External / Compare
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🕸️ Compose Networks 토폴로지</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 외부/호스트 라벨 */}
          <div className="flex items-center justify-between mb-2">
            <span className="text-[10px] bg-slate-200 text-slate-700 px-2 py-0.5 rounded-full font-bold">
              🌍 외부 → 호스트 :80
            </span>
            <span className="text-[10px] text-slate-400 font-mono">phase: {step.phase}</span>
          </div>
          <div className="text-center text-slate-300 text-xs">↓</div>

          {/* 네트워크 박스 */}
          <div className="space-y-2">
            {step.networks.map((net) => (
              <NetworkBox key={net.id} net={net} allNetworks={step.networks} />
            ))}
          </div>

          {/* 부가 정보 박스 */}
          <div className="space-y-2 mt-3">
            <DnsLookupBox lookup={step.dnsLookup} />
            <BlockedBox blocked={step.blocked} />
            {step.externalAttach && <ExternalNoteBox />}
            {step.comparePane && <CompareTable />}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>frontend / default
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>backend
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>external
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-purple-600"></span>multi (다리)
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 ←/→
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-5</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Docker Compose &gt; Chapter 1. 기본기</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-1-5. Compose 네트워크 — default · 분리 · external · k8s 비교</h1>
                  <p className="text-sm text-slate-500 mt-0.5">자동 default → service name DNS → frontend/backend 분리 → external join → NetworkPolicy 비교</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: Compose 네트워크는 <strong>같은 네트워크 = 통신</strong> 단위. 단일 호스트와 소팀 환경엔 충분하다. <strong>포트별 제어</strong> 또는 <strong>멀티 노드</strong>가 필요해지면 k8s NetworkPolicy 로 넘어간다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['default network', 'service name DNS', 'networks: split', 'frontend/backend', 'internal: true', 'external: true', 'NetworkPolicy', 'compose vs k8s'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./v-1-4_compose_multicontainer.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; V-1-4 멀티 컨테이너</a>
              <a href="./v-1-6_volume_backup.html" className="text-sky-700 hover:text-sky-900 font-medium">V-1-6 볼륨 백업 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
