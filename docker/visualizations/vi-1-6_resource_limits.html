              나머지가 굶는다. 칸막이(cgroups)로 각자의 몫을 정해줘야 한다.
    패턴: fastapi v1 — 좌(LiveDataPane: 호스트 게이지 + 컨테이너 막대 + OOM 알람) /
                       우(VSCode CodeViewer)

    // 좌측 상단: 호스트 자원 게이지 — 합산 사용률 (90%+ 빨강)
    function HostGauge({ containers }) {
      const cpuTotal = containers.reduce((s, c) => s + c.cpuPct, 0);
      const memTotal = containers.reduce((s, c) => s + c.memMiB, 0);
      const memPct = (memTotal / HOST.memMiB) * 100;

      const cpuDanger = cpuTotal > 90;
      const memDanger = memPct > 90;

      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🖥️</span>
              <span className="text-[11px] font-bold text-slate-700">
                호스트: CPU {HOST.cpuCores}코어 · RAM {(HOST.memMiB/1024).toFixed(0)}GiB
              </span>
            </div>
            <span className="text-[9px] text-slate-400 font-mono">aggregate</span>
          </div>

          {/* CPU 게이지 */}
          <div className="mb-2">
            <div className="flex justify-between text-[10px] mb-0.5">
              <span className="font-semibold text-slate-600">CPU 사용률</span>
              <span className={`font-mono font-bold ${cpuDanger ? 'text-rose-600' : 'text-slate-600'}`}>
                {cpuTotal.toFixed(0)}%
              </span>
            </div>
            <div className="h-3 bg-slate-100 rounded-full overflow-hidden border border-slate-200">
              <div
                className={`h-full rounded-full transition-all duration-700 ${
                  cpuDanger ? 'bg-rose-500' : cpuTotal > 70 ? 'bg-amber-400' : 'bg-sky-500'
                }`}
                style={{ width: `${Math.min(cpuTotal, 100)}%` }}
              />
            </div>
          </div>

          {/* Memory 게이지 */}
          <div>
            <div className="flex justify-between text-[10px] mb-0.5">
              <span className="font-semibold text-slate-600">Memory 사용량</span>
              <span className={`font-mono font-bold ${memDanger ? 'text-rose-600' : 'text-slate-600'}`}>
                {(memTotal/1024).toFixed(2)} / {(HOST.memMiB/1024).toFixed(0)} GiB
              </span>
            </div>
            <div className="h-3 bg-slate-100 rounded-full overflow-hidden border border-slate-200">
              <div
                className={`h-full rounded-full transition-all duration-700 ${
                  memDanger ? 'bg-rose-500' : memPct > 70 ? 'bg-amber-400' : 'bg-sky-500'
                }`}
                style={{ width: `${Math.min(memPct, 100)}%` }}
              />
            </div>
          </div>

          {memDanger && (
            <div className="mt-2 text-[9px] text-rose-700 font-semibold">
              ⚠ 호스트 RAM 의 90% 초과 — 다른 프로세스가 굶거나 호스트 OOM 위험
            </div>
          )}
        </div>
      );
    }

    // 좌측 중앙: 컨테이너별 CPU/Memory 막대 — limit 라인 + status 색상
    function ContainerBars({ containers }) {
      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3 space-y-2.5">
          <div className="flex items-center gap-1.5 mb-1">
            <span className="text-base">🐳</span>
            <span className="text-[11px] font-bold text-slate-700">컨테이너별 사용량</span>
          </div>

          {containers.map((c) => {
            const oom = c.status === 'oomkilled';
            const starve = c.status === 'starving';

            // CPU 막대 — cpuLimit 은 코어 단위 (호스트 4코어 기준 비율)
            const cpuLimitPctOfHost = c.cpuLimit ? (c.cpuLimit / HOST.cpuCores) * 100 : 100;
            // CPU 막대 길이는 호스트 전체 대비
            const cpuBarPct = Math.min(c.cpuPct, 100);

            // Memory 막대 — memLimit 이 있으면 limit 대비, 없으면 호스트 전체 대비
            const memBarPct = c.memLimit
              ? Math.min((c.memMiB / c.memLimit) * 100, 100)
              : Math.min((c.memMiB / HOST.memMiB) * 100, 100);
            const memOverLimit = c.memLimit && c.memMiB >= c.memLimit;

            const labelColor = oom
              ? 'text-rose-700'
              : starve
              ? 'text-amber-700'
              : 'text-sky-800';

            return (
              <div
                key={c.id}
                className={`rounded border p-2 transition-all duration-500 ${
                  oom
                    ? 'bg-rose-50 border-rose-400 animate-pulse'
                    : starve
                    ? 'bg-amber-50 border-amber-300'
                    : 'bg-sky-50 border-sky-300'
                }`}
              >
                <div className="flex items-center justify-between mb-1">
                  <span className={`text-[11px] font-bold font-mono ${labelColor}`}>{c.label}</span>
                  <span className="text-[9px] text-slate-500 font-mono">
                    {oom ? (
                      <span className="bg-rose-600 text-white px-1.5 py-0.5 rounded font-bold">
                        OOMKilled · Exit 137
                      </span>
                    ) : starve ? (
                      <span className="bg-amber-500 text-white px-1.5 py-0.5 rounded font-bold">
                        starving
                      </span>
                    ) : (
                      <span className="bg-emerald-500 text-white px-1.5 py-0.5 rounded font-bold">
                        running
                      </span>
                    )}
                  </span>
                </div>

                {/* CPU 막대 */}
                <div className="mb-1">
                  <div className="flex justify-between text-[9px] text-slate-600 mb-0.5">
                    <span>CPU</span>
                    <span className="font-mono">
                      {c.cpuPct.toFixed(0)}% / {c.cpuLimit ? `${c.cpuLimit} core (${cpuLimitPctOfHost.toFixed(0)}%)` : '제한 없음'}
                    </span>
                  </div>
                  <div className="relative h-2 bg-slate-100 rounded-full overflow-hidden border border-slate-200">
                    <div
                      className={`h-full transition-all duration-700 ${
                        oom ? 'bg-rose-400' : 'bg-sky-500'
                      }`}
                      style={{ width: `${cpuBarPct}%` }}
                    />
                    {c.cpuLimit && (
                      <div
                        className="absolute top-0 h-full border-r-2 border-rose-500"
                        style={{ left: `${cpuLimitPctOfHost}%` }}
                        title="--cpus limit"
                      />
                    )}
                  </div>
                </div>

                {/* Memory 막대 */}
                <div>
                  <div className="flex justify-between text-[9px] text-slate-600 mb-0.5">
                    <span>RAM</span>
                    <span className={`font-mono ${memOverLimit ? 'text-rose-600 font-bold' : ''}`}>
                      {c.memMiB} MiB / {c.memLimit ? `${c.memLimit} MiB` : '제한 없음'}
                    </span>
                  </div>
                  <div className="relative h-2 bg-slate-100 rounded-full overflow-hidden border border-slate-200">
                    <div
                      className={`h-full transition-all duration-700 ${
                        oom
                          ? 'bg-rose-500'
                          : memOverLimit
                          ? 'bg-rose-400'
                          : memBarPct > 80
                          ? 'bg-amber-400'
                          : 'bg-sky-500'
                      }`}
                      style={{ width: `${memBarPct}%` }}
                    />
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: cgroups v2 박스 (Step 4 강조)
    //   /sys/fs/cgroup/.../cpu.max · memory.max 파일 표시
    // ─────────────────────────────────────────────────────
    function CgroupsBox({ highlight }) {
      return (
        <div
          className={`rounded-lg border-2 p-2.5 transition-all duration-500 ${
            highlight ? 'bg-sky-50 border-sky-400 shadow-md' : 'bg-slate-50 border-slate-200 opacity-70'
          }`}
        >
          <div className="flex items-center gap-1.5 mb-1">
            <span className="text-base">⚙️</span>
            <span className={`text-[11px] font-bold ${highlight ? 'text-sky-800' : 'text-slate-500'}`}>
              cgroups v2 — 커널 자원 제한 메커니즘
            </span>
            {highlight && (
              <span className="ml-auto text-[8px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                kernel
              </span>
            )}
          </div>
          <div className="bg-white rounded border border-slate-200 p-1.5 font-mono text-[9px] leading-snug text-slate-700 space-y-0.5">
            <div className="text-slate-500"># /sys/fs/cgroup/system.slice/docker-...scope/</div>
            <div>
              <span className="text-sky-600 font-bold">cpu.max</span>
              <span className="text-slate-400">      → </span>
              <span className="text-slate-700">100000 100000</span>
              <span className="text-slate-400"> (= 1.0 코어)</span>
            </div>
            <div>
              <span className="text-sky-600 font-bold">memory.max</span>
              <span className="text-slate-400">   → </span>
              <span className="text-slate-700">536870912</span>
              <span className="text-slate-400"> (= 512 MiB)</span>
            </div>
            <div>
              <span className="text-sky-600 font-bold">memory.current</span>
              <span className="text-slate-400"> → </span>
              <span className="text-slate-700">503316480</span>
              <span className="text-slate-400"> (현재 사용)</span>
            </div>
            <div>
              <span className="text-sky-600 font-bold">memory.events</span>
              <span className="text-slate-400">  → </span>
              <span className="text-slate-700">oom_kill 1</span>
              <span className="text-slate-400"> (OOM 발생 횟수)</span>
            </div>
          </div>
          <div className={`text-[9px] mt-1 ${highlight ? 'text-sky-700 font-semibold' : 'text-slate-400'}`}>
            {highlight ? '✓ docker --cpus / --memory 옵션 = 위 파일에 값을 써넣는 것' : 'Docker 는 cgroups 위의 얇은 래퍼'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 맨 하단: docker stats live row (Step 5 강조)
    // ─────────────────────────────────────────────────────
    function StatsLiveBox({ live, containers }) {
      if (!live) return null;
      return (
        <div className="rounded-lg border-2 border-sky-400 bg-[#0f172a] p-2.5 shadow-md">
          <div className="flex items-center gap-1.5 mb-1.5">
            <span className="text-base">📊</span>
            <span className="text-[11px] font-bold text-sky-300 font-mono">$ docker stats --no-stream</span>
            <span className="ml-auto w-2 h-2 rounded-full bg-emerald-400 animate-pulse" />
          </div>
          <div className="font-mono text-[9px] leading-snug">
            <div className="text-slate-400 border-b border-slate-700 pb-0.5 mb-0.5">
              NAME      CPU %   MEM USAGE / LIMIT      MEM %
            </div>
            {containers.map((c) => {
              const memPct = c.memLimit ? ((c.memMiB / c.memLimit) * 100).toFixed(1) : 'n/a';
              return (
                <div key={c.id} className="text-sky-300">
                  {c.label.padEnd(9)} {String(c.cpuPct.toFixed(1) + '%').padEnd(7)}
                  {' '}{String(c.memMiB + 'MiB').padEnd(7)} / {c.memLimit ? c.memLimit + 'MiB' : '7.77GiB'}
                  {'   '}{memPct}%
                </div>
              );
            })}
          </div>
          <div className="text-[8px] text-slate-500 mt-1 font-mono">
            cgroups 의 memory.current / cpu.stat 을 읽어 표시
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 호스트 게이지 (CPU / Memory 합산)
    //   알람: alarmText 가 있으면 빨간 배너
    //   중앙: 컨테이너별 막대
    //   하단: cgroups 박스
    //   맨 하단: stats live row (Step 5 만)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📊 호스트 자원 + 컨테이너 사용량</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2.5">
            <HostGauge containers={step.containers} />

            {/* OOMKill / 위험 알람 배너 */}
            {step.alarmText && (
              <div
                className={`rounded-lg border-2 px-3 py-2 text-[11px] font-semibold leading-snug ${
                  step.phase === 'oom'
                    ? 'bg-rose-50 border-rose-400 text-rose-800 animate-pulse'
                    : 'bg-rose-50 border-rose-300 text-rose-700'
                }`}
              >
                {step.alarmText}
              </div>
            )}

            <ContainerBars containers={step.containers} />

            <CgroupsBox highlight={step.cgroupsHighlight} />

            <StatsLiveBox live={step.statsLive} containers={step.containers} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>running
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-400"></span>starving
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>oomkilled
            </span>
            <span className="flex items-center gap-1">
              <span className="inline-block w-3 border-r-2 border-rose-500 h-2"></span>--limit
            </span>
            <span className="ml-auto font-mono">phase: {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VI-1-6</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. Docker 운영 &gt; Chapter 1. 자원 / 보안</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VI-1-6. 자원 제한 — cpus / memory / OOMKilled</h1>
                  <p className="text-sm text-slate-500 mt-0.5">제한 없으면 한 컨테이너가 호스트 다 먹는다 → --cpus / --memory 로 칸막이 → cgroups + docker stats 로 검증</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>--cpus</strong>(CPU 코어 분량) + <strong>--memory</strong>(RAM 하드 상한) 두 옵션이 핵심. 배경엔 <strong>cgroups v2</strong>, 검증은 <strong>docker stats</strong> + <strong>docker inspect OOMKilled</strong>. 운영의 모든 컨테이너에 반드시 지정한다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
