<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — 리소스 제한</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }
    @keyframes growBar { from{width:0;} to{width:100%;} }
    @keyframes explode { 0%{transform:scale(1);opacity:1;} 50%{transform:scale(1.3);} 100%{transform:scale(0.8);opacity:0.5;} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-shake { animation: shake 0.4s ease-in-out; }
    .anim-explode { animation: explode 0.6s ease-in-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · 제한 없는 컨테이너의 위험",
        desc: "컨테이너는 기본적으로 호스트의 CPU와 메모리를 무제한으로 사용한다. 한 컨테이너가 메모리를 다 써버리면 같은 서버의 다른 컨테이너가 줄줄이 강제 종료된다.",
        phase: "no_limit",
      },
      {
        title: "STEP 2 · 메모리 제한 설정",
        desc: "limits.memory: 512m은 '이 이상 절대 못 쓴다'는 하드 상한. reservations.memory: 256m은 '최소 이만큼은 보장해달라'는 소프트 하한. 두 가지를 함께 설정하면 최소 보장 + 최대 제한이 적용된다.",
        phase: "memory",
      },
      {
        title: "STEP 3 · CPU 제한 설정",
        desc: "limits.cpus: '1.0'은 CPU 코어 1개 분량까지 사용 가능. 2코어 서버에서 cpus: 0.5는 전체 CPU 용량의 25%까지 쓸 수 있다. CPU 값은 반드시 따옴표로 감싼다.",
        phase: "cpu",
      },
      {
        title: "STEP 4 · OOM Killer 시뮬레이션",
        desc: "메모리가 limits를 초과하면 리눅스 커널 OOM Killer가 컨테이너를 강제 종료한다. docker inspect에서 OOMKilled: true, 종료 코드 137(128+9=SIGKILL)로 확인할 수 있다.",
        phase: "oom",
      },
      {
        title: "STEP 5 · docker stats로 모니터링",
        desc: "docker stats 명령으로 실시간 CPU/메모리 사용량을 확인한다. MEM USAGE/LIMIT에서 LIMIT이 설정값과 같으면 제한이 적용된 것. 큰 숫자(호스트 전체 메모리)가 나오면 제한이 없는 것이다.",
        phase: "stats",
      },
      {
        title: "STEP 6 · Compose deploy.resources 설정",
        desc: "Compose에서는 deploy.resources.limits와 reservations 블록으로 선언한다. 이 값은 Kubernetes의 requests/limits와 직접 매핑되므로 K8s 전환 시 그대로 옮겨 쓸 수 있다.",
        phase: "compose",
      },
    ];

    function MemoryBar({ label, used, limit, isOOM, color }) {
      const pct = limit > 0 ? Math.min((used / limit) * 100, 100) : (used / 8192) * 100;
      const overLimit = used > limit && limit > 0;
      return (
        <div className="mb-3">
          <div className="flex justify-between text-xs mb-1">
            <span className="font-medium text-slate-700">{label}</span>
            <span className={overLimit ? "text-red-600 font-bold" : "text-slate-500"}>
              {used}MB {limit > 0 ? `/ ${limit}MB` : "/ 제한 없음"}
            </span>
          </div>
          <div className="h-6 bg-slate-200 rounded-full overflow-hidden relative">
            <div className={`h-full rounded-full transition-all duration-1000 ${
              isOOM ? "bg-red-500 anim-shake" :
              overLimit ? "bg-red-400" :
              pct > 70 ? "bg-yellow-400" : `bg-${color}-400`
            }`} style={{ width: `${Math.min(pct, 100)}%` }} />
            {limit > 0 && (
              <div className="absolute top-0 h-full border-r-2 border-red-600" style={{ left: "100%" }}>
                <span className="absolute -top-5 -right-4 text-xs text-red-600 font-bold">LIMIT</span>
              </div>
            )}
          </div>
          {isOOM && <div className="text-xs text-red-600 font-bold mt-1 anim-shake">OOM Killed! (Exit Code: 137)</div>}
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4500);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VI-1-6: 리소스 제한 (CPU / 메모리 limit)</h1>
              </div>
              <p className="text-slate-500 text-sm">제한 없음 vs 제한 있음을 비교하고, OOM Killer 동작을 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "oom" ? "bg-red-600 border-red-700 text-white" :
              data.phase === "compose" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "no_limit" ? "bg-orange-600 border-orange-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            <div key={`vis-${step}`} className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 anim-fade">

              {/* 제한 없음 시각화 */}
              {data.phase === "no_limit" && (
                <div className="space-y-4">
                  <div className="text-sm font-medium text-slate-600 mb-2">호스트 메모리: 8GB (세 컨테이너 공유)</div>
                  <MemoryBar label="api (메모리 누수 발생)" used={6000} limit={0} color="blue" />
                  <MemoryBar label="db" used={1500} limit={0} color="purple" />
                  <MemoryBar label="nginx" used={500} limit={0} color="green" />
                  <div className="bg-red-50 border border-red-200 rounded-lg p-3 text-center">
                    <span className="text-red-600 font-bold">api가 메모리를 독점 → db, nginx가 메모리 부족으로 죽음</span>
                  </div>
                </div>
              )}

              {/* 메모리 제한 */}
              {data.phase === "memory" && (
                <div className="space-y-4">
                  <div className="text-sm font-medium text-slate-600 mb-2">메모리 제한 적용 후</div>
                  <MemoryBar label="api (limits: 512MB, reservations: 256MB)" used={380} limit={512} color="blue" />
                  <MemoryBar label="db (limits: 1GB, reservations: 512MB)" used={640} limit={1024} color="purple" />
                  <MemoryBar label="nginx (limits: 512MB)" used={45} limit={512} color="green" />
                  <div className="grid grid-cols-2 gap-4 mt-4">
                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-center">
                      <div className="font-bold text-blue-700 text-sm">limits (하드 상한)</div>
                      <div className="text-xs text-blue-600 mt-1">절대 초과 불가. 초과 시 OOM Kill</div>
                    </div>
                    <div className="bg-teal-50 border border-teal-200 rounded-lg p-3 text-center">
                      <div className="font-bold text-teal-700 text-sm">reservations (소프트 하한)</div>
                      <div className="text-xs text-teal-600 mt-1">최소 보장량. 스케줄링 기준</div>
                    </div>
                  </div>
                </div>
              )}

              {/* CPU 제한 */}
              {data.phase === "cpu" && (
                <div className="space-y-4">
                  <div className="text-sm font-medium text-slate-600 mb-2">CPU 제한 (2코어 서버 기준)</div>
                  {[
                    { label: "api (cpus: 1.0)", pct: 50, desc: "코어 1개분 = 전체의 50%" },
                    { label: "db (cpus: 2.0)", pct: 100, desc: "코어 2개분 = 전체의 100%" },
                    { label: "nginx (cpus: 0.25)", pct: 12.5, desc: "코어 0.25개분 = 전체의 12.5%" },
                  ].map((item, i) => (
                    <div key={i} className="mb-3">
                      <div className="flex justify-between text-xs mb-1">
                        <span className="font-medium text-slate-700">{item.label}</span>
                        <span className="text-slate-500">{item.desc}</span>
                      </div>
                      <div className="h-6 bg-slate-200 rounded-full overflow-hidden">
                        <div className="h-full bg-blue-400 rounded-full transition-all duration-1000"
                          style={{ width: `${item.pct}%` }} />
                      </div>
                    </div>
                  ))}
                  <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-center text-xs">
                    <span className="text-yellow-700 font-medium">YAML에서 cpus 값은 반드시 따옴표로 감싼다: cpus: "1.0"</span>
                  </div>
                </div>
              )}

              {/* OOM Killer */}
              {data.phase === "oom" && (
                <div className="space-y-4">
                  <div className="text-sm font-medium text-slate-600 mb-2">OOM Killer 동작 시뮬레이션</div>
                  <MemoryBar label="api (limits: 512MB → 사용량 증가중...)" used={520} limit={512} isOOM={true} color="blue" />

                  <div className="bg-slate-900 rounded-lg p-4 font-mono text-xs space-y-1">
                    <div className="text-slate-500">$ docker inspect api --format '{`{{.State.OOMKilled}}`}'</div>
                    <div className="text-red-400 font-bold">true</div>
                    <div className="text-slate-500 mt-2">$ docker inspect api --format '{`{{.State.ExitCode}}`}'</div>
                    <div className="text-red-400 font-bold">137</div>
                    <div className="text-slate-500 mt-2 text-slate-600"># 137 = 128 + 9 (SIGKILL)</div>
                  </div>

                  <div className="grid grid-cols-3 gap-3 mt-2">
                    {[
                      { label: "한도가 너무 낮음", action: "docker stats로 실제 사용량 확인 후 1.5~2배로 설정" },
                      { label: "메모리 누수", action: "시간 경과에 따른 메모리 증가 패턴 확인" },
                      { label: "트래픽 폭증", action: "한도 상향 또는 replica 수 증가" },
                    ].map((item, i) => (
                      <div key={i} className="bg-red-50 border border-red-200 rounded-lg p-2 text-xs">
                        <div className="font-bold text-red-700">{item.label}</div>
                        <div className="text-red-600 mt-1">{item.action}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* docker stats */}
              {data.phase === "stats" && (
                <div className="space-y-4">
                  <div className="bg-slate-900 rounded-lg p-4 font-mono text-xs overflow-x-auto">
                    <div className="text-slate-500 mb-2">$ docker stats --no-stream</div>
                    <div className="text-slate-400">{"CONTAINER   NAME    CPU %   MEM USAGE / LIMIT     MEM %"}</div>
                    <div className="text-blue-400">{"a1b2c3d4    api     12.3%   210MiB / 512MiB       41.0%"}</div>
                    <div className="text-purple-400">{"b2c3d4e5    db       2.1%   384MiB / 1GiB         37.5%"}</div>
                    <div className="text-green-400">{"c3d4e5f6    nginx    0.1%   8.5MiB / 512MiB        1.7%"}</div>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-green-50 border border-green-200 rounded-lg p-3 text-xs">
                      <div className="font-bold text-green-700">LIMIT이 설정값과 같으면</div>
                      <div className="text-green-600 mt-1">제한이 올바르게 적용된 것 (예: 512MiB)</div>
                    </div>
                    <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-xs">
                      <div className="font-bold text-yellow-700">LIMIT이 호스트 전체 메모리면</div>
                      <div className="text-yellow-600 mt-1">제한 미설정 (예: 7.77GiB)</div>
                    </div>
                  </div>
                </div>
              )}

              {/* Compose 설정 */}
              {data.phase === "compose" && (
                <div className="space-y-4">
                  <div className="bg-slate-800 rounded-lg p-4 text-sm font-mono overflow-x-auto">
                    <div className="text-yellow-300">services:</div>
                    <div className="text-blue-300 ml-2">api:</div>
                    <div className="text-slate-400 ml-4">image: myapp:latest</div>
                    <div className="text-green-400 ml-4">deploy:</div>
                    <div className="text-green-400 ml-6">resources:</div>
                    <div className="text-green-300 ml-8">limits:</div>
                    <div className="text-emerald-400 ml-10">cpus: "1.0"</div>
                    <div className="text-emerald-400 ml-10">memory: 512m</div>
                    <div className="text-blue-300 ml-8">reservations:</div>
                    <div className="text-blue-400 ml-10">cpus: "0.25"</div>
                    <div className="text-blue-400 ml-10">memory: 256m</div>
                  </div>
                  <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-center">
                    <div className="text-emerald-700 font-medium text-sm">Compose reservations = K8s requests</div>
                    <div className="text-emerald-700 font-medium text-sm">Compose limits = K8s limits</div>
                    <div className="text-xs text-emerald-600 mt-1">K8s 전환 시 값을 그대로 옮겨 쓸 수 있다</div>
                  </div>
                </div>
              )}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
