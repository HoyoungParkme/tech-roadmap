<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — 헬스체크 타이밍</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { title: "STEP 1 · DB 컨테이너 시작", desc: "docker compose up 실행. DB(PostgreSQL) 컨테이너가 가장 먼저 시작된다. 아직 쿼리를 받을 준비가 안 됐다.", time: "0s", dbStatus: "starting", checks: [], apiStatus: "waiting" },
      { title: "STEP 2 · 첫 번째 헬스체크 (실패)", desc: "5초 후 첫 헬스체크 실행. pg_isready가 실패 — DB가 아직 초기화 중이다.", time: "5s", dbStatus: "unhealthy", checks: [{ t: "5s", ok: false }], apiStatus: "waiting" },
      { title: "STEP 3 · 두 번째 헬스체크 (실패)", desc: "10초 후 재시도. 여전히 실패. init.sql이 실행 중이다.", time: "10s", dbStatus: "unhealthy", checks: [{ t: "5s", ok: false }, { t: "10s", ok: false }], apiStatus: "waiting" },
      { title: "STEP 4 · 세 번째 헬스체크 (성공!)", desc: "15초 후 재시도. pg_isready 성공! DB 상태가 healthy로 전환된다.", time: "15s", dbStatus: "healthy", checks: [{ t: "5s", ok: false }, { t: "10s", ok: false }, { t: "15s", ok: true }], apiStatus: "starting" },
      { title: "STEP 5 · API 시작 완료", desc: "depends_on condition: service_healthy가 해소. API(FastAPI)가 시작되어 DB에 연결한다.", time: "17s", dbStatus: "healthy", checks: [{ t: "5s", ok: false }, { t: "10s", ok: false }, { t: "15s", ok: true }], apiStatus: "healthy" },
    ];

    const statusConfig = {
      starting: { color: "bg-yellow-400", text: "starting", textColor: "text-yellow-800", bg: "bg-yellow-50" },
      unhealthy: { color: "bg-red-400", text: "unhealthy", textColor: "text-red-800", bg: "bg-red-50" },
      healthy: { color: "bg-green-400", text: "healthy", textColor: "text-green-800", bg: "bg-green-50" },
      waiting: { color: "bg-slate-300", text: "대기 중", textColor: "text-slate-500", bg: "bg-slate-50" },
    };

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const step = STEPS[currentStep];
      const isEnd = currentStep === STEPS.length - 1;

      const handleNext = () => { if (currentStep < STEPS.length - 1) setCurrentStep(p => p + 1); else setIsPlaying(false); };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStep > 0) { setCurrentStep(p => p - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) playRef.current = setInterval(() => handleNextRef.current(), 2500);
        else clearInterval(playRef.current);
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      const dbCfg = statusConfig[step.dbStatus];
      const apiCfg = statusConfig[step.apiStatus];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-2xl font-bold">헬스체크 타이밍 시뮬레이션</h1>
              </div>
              <p className="text-slate-600">
                DB <b>헬스체크</b>가 반복 실행되어 <b>healthy</b> 상태가 되면, <b>depends_on condition: service_healthy</b>가 해소되어 API가 시작됩니다.
              </p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800">
              <h3 className="text-xs font-bold text-blue-200 mb-1 uppercase tracking-wider">{step.title}</h3>
              <p className="text-base font-medium leading-relaxed">{step.desc}</p>
            </div>

            {/* 타임라인 */}
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h3 className="font-bold text-slate-700 mb-4">타임라인</h3>

              {/* DB 행 */}
              <div className="flex items-center gap-4 mb-6">
                <div className={`w-28 text-center rounded-lg border-2 p-3 transition-all duration-500 ${dbCfg.bg} border-current ${dbCfg.textColor}`}>
                  <div className="font-bold text-sm">db</div>
                  <div className={`w-3 h-3 rounded-full mx-auto my-1 ${dbCfg.color} ${step.dbStatus === 'starting' || step.dbStatus === 'unhealthy' ? 'animate-pulse' : ''}`}></div>
                  <div className="text-xs font-medium">{dbCfg.text}</div>
                </div>
                <div className="flex-1">
                  <div className="relative h-10 bg-slate-100 rounded-full overflow-hidden">
                    {/* 진행 바 */}
                    <div className={`absolute inset-y-0 left-0 rounded-full transition-all duration-700 ${step.dbStatus === 'healthy' ? 'bg-green-200' : step.dbStatus === 'unhealthy' ? 'bg-red-100' : 'bg-yellow-100'}`}
                      style={{ width: `${Math.min(100, (parseInt(step.time) / 17) * 100)}%` }}></div>
                    {/* 헬스체크 마커 */}
                    {step.checks.map((c, i) => (
                      <div key={i} className="absolute top-1/2 -translate-y-1/2 transition-all duration-300"
                        style={{ left: `${(parseInt(c.t) / 17) * 100}%` }}>
                        <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center text-xs font-bold ${c.ok ? 'bg-green-400 border-green-600 text-white' : 'bg-red-400 border-red-600 text-white'}`}>
                          {c.ok ? '✓' : '✗'}
                        </div>
                      </div>
                    ))}
                  </div>
                  <div className="flex justify-between text-xs text-slate-400 mt-1 px-1">
                    <span>0s</span><span>5s</span><span>10s</span><span>15s</span><span>17s</span>
                  </div>
                </div>
              </div>

              {/* API 행 */}
              <div className="flex items-center gap-4">
                <div className={`w-28 text-center rounded-lg border-2 p-3 transition-all duration-500 ${apiCfg.bg} border-current ${apiCfg.textColor}`}>
                  <div className="font-bold text-sm">api</div>
                  <div className={`w-3 h-3 rounded-full mx-auto my-1 ${apiCfg.color} ${step.apiStatus === 'starting' ? 'animate-pulse' : ''}`}></div>
                  <div className="text-xs font-medium">{apiCfg.text}</div>
                </div>
                <div className="flex-1">
                  <div className="relative h-10 bg-slate-100 rounded-full overflow-hidden">
                    {step.apiStatus === 'starting' && (
                      <div className="absolute inset-y-0 left-0 bg-yellow-100 rounded-full animate-pulse" style={{ width: '88%' }}></div>
                    )}
                    {step.apiStatus === 'healthy' && (
                      <div className="absolute inset-y-0 left-0 bg-green-200 rounded-full transition-all duration-700" style={{ width: '100%' }}></div>
                    )}
                    {step.apiStatus !== 'waiting' && (
                      <div className="absolute top-1/2 -translate-y-1/2 text-xs font-medium text-slate-600" style={{ left: `${(15 / 17) * 100}%` }}>
                        <span className="bg-white px-1 rounded shadow-sm">시작</span>
                      </div>
                    )}
                  </div>
                  <div className="flex justify-between text-xs text-slate-400 mt-1 px-1">
                    <span>depends_on 대기</span><span></span><span></span><span>해소!</span><span>ready</span>
                  </div>
                </div>
              </div>

              {/* 헬스체크 설정 */}
              <div className="mt-4 bg-slate-50 rounded-lg p-3 text-xs font-mono text-slate-600">
                healthcheck: test: pg_isready | interval: 5s | timeout: 3s | retries: 5
              </div>
            </div>

            {/* 컨트롤 */}
            <div className="flex items-center justify-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <button onClick={togglePlay} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-medium transition-colors">
                {isPlaying ? '⏸ 일시정지' : isEnd ? '↻ 다시 시작' : '▶ 자동 실행'}
              </button>
              <button onClick={handlePrev} disabled={currentStep === 0} className="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 disabled:opacity-30">← 이전</button>
              <button onClick={() => { handleNext(); setIsPlaying(false); }} disabled={isEnd} className="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 disabled:opacity-30">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStep + 1} / {STEPS.length}</div>
            </div>

            {/* 렌즈 */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div className="bg-green-50 border border-green-200 rounded-xl p-5">
                <div className="flex items-center gap-2 mb-3">
                  <span className="bg-green-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">입문</span>
                  <span className="text-green-700 font-bold text-sm">★☆☆</span>
                </div>
                <h4 className="font-bold text-green-800 mb-2 text-sm">병원 진찰 비유</h4>
                <ul className="text-sm text-green-900 space-y-2">
                  <li><b>비유:</b> 환자(DB)가 병원에 도착했다고 바로 수술(쿼리)할 수 없다. 간호사(HEALTHCHECK)가 체온·혈압을 재서 "준비됨(healthy)"을 확인해야 의사(API)가 진료를 시작한다.</li>
                  <li><b>핵심:</b> "시작됨(started)" ≠ "준비됨(healthy)"</li>
                </ul>
              </div>
              <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-5">
                <div className="flex items-center gap-2 mb-3">
                  <span className="bg-yellow-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">주니어</span>
                  <span className="text-yellow-700 font-bold text-sm">★★☆</span>
                </div>
                <h4 className="font-bold text-yellow-800 mb-2 text-sm">상태 확인 명령</h4>
                <ul className="text-sm text-yellow-900 space-y-2">
                  <li><code className="bg-yellow-100 px-1 rounded text-xs">{"docker inspect --format='{{.State.Health.Status}}' db"}</code> — healthy / unhealthy / starting 확인</li>
                  <li><b>함정:</b> condition 없이 depends_on만 쓰면 DB 초기화 중 API가 연결 시도 → <code className="bg-yellow-100 px-1 rounded text-xs">OperationalError</code></li>
                </ul>
              </div>
              <div className="bg-purple-50 border border-purple-200 rounded-xl p-5">
                <div className="flex items-center gap-2 mb-3">
                  <span className="bg-purple-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">실무자</span>
                  <span className="text-purple-700 font-bold text-sm">★★★</span>
                </div>
                <h4 className="font-bold text-purple-800 mb-2 text-sm">K8s Probe 비교</h4>
                <ul className="text-sm text-purple-900 space-y-2">
                  <li><b>livenessProbe:</b> 컨테이너가 살아있는지. 실패 → 재시작.</li>
                  <li><b>readinessProbe:</b> 트래픽을 받을 준비가 됐는지. Compose의 healthcheck와 가장 유사.</li>
                  <li><b>startupProbe:</b> 초기 시작이 느린 앱용. 시작 완료 전까지 다른 프로브 비활성.</li>
                </ul>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
