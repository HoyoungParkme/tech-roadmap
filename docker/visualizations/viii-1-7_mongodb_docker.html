          ) : (
            <div className="mt-1.5 bg-rose-50 border border-rose-200 rounded px-1.5 py-1 text-[9px] text-rose-700">
              ⚠ 인증 환경변수 없음 — 누구나 접속 가능 (학습용)
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙: 호스트 ↔ 컨테이너 ↔ 볼륨 화살표 박스
    //   volumeOn → /data/db 와 named volume(mongo_data) 연결 강조
    // ─────────────────────────────────────────────────────
    function VolumeBox({ on }) {
      return (
        <div className={`rounded-lg border-2 px-3 py-2 transition-all duration-500 ${
          on ? 'bg-sky-50 border-sky-400 shadow-md' : 'bg-slate-50 border-dashed border-slate-200 opacity-60'
        }`}>
          <div className="flex items-center justify-between gap-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">💾</span>
              <span className={`text-[11px] font-bold ${on ? 'text-sky-800' : 'text-slate-500'}`}>
                Volume: mongo_data
              </span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
              on ? 'bg-sky-600 text-white' : 'bg-slate-300 text-slate-500'
            }`}>
              {on ? 'persistent' : 'idle'}
            </span>
          </div>
          <div className={`text-[9px] font-mono mt-1 ${on ? 'text-sky-700' : 'text-slate-400'}`}>
            {on ? 'mongo_data ⇆ /data/db (BSON 파일 영속)' : '아직 마운트 안 됨 — 컨테이너 삭제 시 데이터 휘발'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: demo.users 컬렉션 카드
    //   docsCount 만큼 SAMPLE_DOCS 표시
    //   queryActive → 상단 mongosh 쿼리 hint 박스 강조
    // ─────────────────────────────────────────────────────
    function CollectionBox({ docsCount, queryActive }) {
      const docs = SAMPLE_DOCS.slice(0, docsCount);
      const empty = docsCount === 0;
      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📚</span>
              <span className="text-[11px] font-bold text-slate-700">
                demo.users 컬렉션
              </span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
              empty ? 'bg-slate-200 text-slate-500' : 'bg-sky-600 text-white'
            }`}>
              {docsCount} docs
            </span>
          </div>

          {queryActive && (
            <div className="bg-slate-900 text-emerald-300 rounded px-2 py-1 mb-1.5 font-mono text-[9px] leading-snug">
              <div><span className="text-slate-500">demo&gt; </span>db.users.insertMany([...])</div>
              <div><span className="text-slate-500">demo&gt; </span>db.users.find()</div>
            </div>
          )}

          {empty ? (
            <div className="bg-slate-50 border border-dashed border-slate-200 rounded px-2 py-3 text-center text-[10px] text-slate-400">
              아직 문서 없음 — Step 4 에서 insert
            </div>
          ) : (
            <div className="space-y-1">
              {docs.map((d, i) => (
                <div
                  key={i}
                  className="rounded border border-sky-200 bg-sky-50 px-2 py-1 font-mono text-[9px] leading-snug text-slate-700"
                >
                  <div className="text-sky-700 font-bold">{d._id}</div>
                  <div>
                    <span className="text-slate-500">name: </span>
                    <span className="text-emerald-700">"{d.name}"</span>
                    <span className="text-slate-400">, </span>
                    <span className="text-slate-500">email: </span>
                    <span className="text-emerald-700">"{d.email}"</span>
                  </div>
                  <div className="text-slate-400">
                    {d.age !== undefined && <span><span className="text-slate-500">age: </span>{d.age}, </span>}
                    {d.role !== undefined && <span><span className="text-slate-500">role: </span>"{d.role}", </span>}
                    {d.country !== undefined && <span><span className="text-slate-500">country: </span>"{d.country}", </span>}
                    {d.tags && <span><span className="text-slate-500">tags: </span>[{d.tags.map(t => `"${t}"`).join(',')}]</span>}
                  </div>
                </div>
              ))}
            </div>
          )}

          <div className="mt-1.5 text-[9px] text-slate-500 leading-snug">
            <span className="font-bold text-slate-600">자유 스키마:</span> 문서마다 필드가 달라도 OK (age / role / country / tags 가 섞여 있음)
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 최하단: Replica Set 박스 (Step 5 에서만 등장)
    //   PRIMARY 1 + SECONDARY 2 노드를 가로로 표시하고
    //   화살표로 oplog 복제 방향 시각화
    // ─────────────────────────────────────────────────────
    function ReplicaSetBox({ on }) {
      if (!on) return null;
      return (
        <div className="rounded-lg border-2 border-sky-400 bg-sky-50 p-3 shadow-md">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🔁</span>
              <span className="text-[11px] font-bold text-sky-800">Replica Set: rs0</span>
            </div>
            <span className="text-[9px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono font-bold animate-pulse">
              HA
            </span>
          </div>

          <div className="grid grid-cols-3 gap-1.5">
            {RS_NODES.map((n) => {
              const primary = n.role === 'PRIMARY';
              return (
                <div
                  key={n.id}
                  className={`rounded-lg border-2 p-2 text-center transition-all ${
                    primary
                      ? 'bg-emerald-50 border-emerald-500 shadow-sm'
                      : 'bg-white border-sky-300'
                  }`}
                >
                  <div className="text-lg mb-0.5">🍃</div>
                  <div className={`text-[10px] font-bold ${primary ? 'text-emerald-800' : 'text-sky-800'}`}>
                    {n.label}
                  </div>
                  <div className="text-[8px] font-mono text-slate-500">:{n.port}</div>
                  <div className={`mt-1 text-[8px] px-1 py-0.5 rounded font-mono font-bold ${
                    primary ? 'bg-emerald-600 text-white' : 'bg-sky-500 text-white'
                  }`}>
                    {n.role}
                  </div>
                </div>
              );
            })}
          </div>

          <div className="mt-2 text-[9px] font-mono text-sky-700 text-center">
            ← oplog 복제 → · Primary 장애 시 Secondary 자동 승격
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 컨테이너 박스 (인증 환경변수)
    //   중앙: 볼륨 박스
    //   하단: demo.users 컬렉션 (문서 카드 N개)
    //   최하단: Step 5 에서만 Replica Set
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🍃 컨테이너 → 볼륨 → 컬렉션</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            <ContainerBox on={step.containerOn} authOn={step.authOn} />

            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.volumeOn ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ -v mongo_data:/data/db
              </div>
            </div>

            <VolumeBox on={step.volumeOn} />

            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.docsCount > 0 ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ mongosh insertOne / find
              </div>
            </div>

            <CollectionBox docsCount={step.docsCount} queryActive={step.queryActive} />

            {step.replicaOn && (
              <div className="text-center mt-1">
                <div className="inline-block text-xs font-mono text-sky-600 font-bold">
                  ↓ --replSet rs0 (3 노드)
                </div>
              </div>
            )}

            <ReplicaSetBox on={step.replicaOn} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded border border-slate-300 bg-white"></span>idle
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>primary/auth
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>insecure
            </span>
            <span className="ml-auto font-mono">phase: {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 파일명 탭 — 우측 코드 뷰어 상단에 5개 파일명을 가로로 표시
    //   현재 step.tabKey 와 일치하는 탭만 active (sky)
    //   클릭 시 해당 파일명 step 으로 이동
    // ─────────────────────────────────────────────────────
    const TAB_FILES = ['run.sh', 'auth.sh', 'volume.sh', 'mongosh.sh', 'replicaset.sh'];

    function FileTabs({ activeKey, onPick }) {
      return (
        <div className="bg-[#21252b] flex items-center border-b border-slate-700 overflow-x-auto">
          {TAB_FILES.map((f, i) => {
            const active = activeKey === f;
            return (
              <button
                key={f}
                onClick={() => onPick(i)}
                className={`px-3 py-2 text-[11px] font-mono whitespace-nowrap transition border-r border-slate-700 ${
                  active
                    ? 'bg-[#282c34] text-sky-300 border-t-2 border-t-sky-400'
                    : 'text-slate-500 hover:text-slate-300 hover:bg-[#282c34]/50'
                }`}
              >
                {f}
              </button>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   상단에 파일 탭(5개) + 윈도우 dot 영역
    //   라인 번호, 강조 라인 (sky 좌측 보더)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, onPickTab }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일명 탭 5개 */}
          <FileTabs activeKey={code.filename} onPick={onPickTab} />

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      const handlePickTab = (i) => {
        setStepIdx(i);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VIII-1-7</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">8</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VIII. Docker로 DB 운용 &gt; Chapter 1. NoSQL DB</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-1-7. MongoDB Docker — NoSQL Document DB</h1>
                  <p className="text-sm text-slate-500 mt-0.5">docker run mongo:7 → root 인증 → /data/db 영속화 → mongosh CRUD → Replica Set 까지 5단계</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                code={step.code}
                stepIdx={stepIdx}
                total={STEPS.length}
                onPickTab={handlePickTab}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>mongo:7</strong>(이미지) + <strong>27017</strong>(포트) + <strong>/data/db</strong>(볼륨) + <strong>root 환경변수</strong>(인증) + <strong>--replSet</strong>(HA) — 이 5가지가 MongoDB 컨테이너 운용의 전부다. 다음(VIII-1-8)에서는 PostgreSQL 컨테이너를 같은 패턴으로 본다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['mongo:7', '27017', '/data/db', 'MONGO_INITDB_ROOT_USERNAME', 'mongosh', 'insertOne', 'find', 'replSet', 'NoSQL'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./viii-1-6_redis_docker.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; VIII-1-6 Redis Docker</a>
              <a href="./viii-1-8_postgres_docker.html" className="text-sky-700 hover:text-sky-900 font-medium">VIII-1-8 PostgreSQL Docker &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
