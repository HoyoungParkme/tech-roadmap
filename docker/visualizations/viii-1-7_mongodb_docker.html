<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — MongoDB를 Docker로 실행하기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · MongoDB 컨테이너 실행",
        desc: "MongoDB는 JSON과 유사한 BSON 형식으로 데이터를 저장하는 NoSQL 데이터베이스다. 고정 스키마가 없어서 자유롭게 데이터를 저장할 수 있다. MONGO_INITDB_ROOT_USERNAME과 PASSWORD로 관리자 계정을 설정한다.",
        phase: "run",
        command: "docker run -d --name mongo-demo -e MONGO_INITDB_ROOT_USERNAME=root -e MONGO_INITDB_ROOT_PASSWORD=mongopass -p 27017:27017 mongo:7",
      },
      {
        title: "STEP 2 · RDB vs NoSQL 비교",
        desc: "MySQL(RDB)은 고정된 행과 열로 데이터를 저장한다. MongoDB(NoSQL)는 문서(Document) 단위로 저장하며, 각 문서마다 필드가 달라도 된다. 용어도 다르다: 테이블→컬렉션, 행→문서, 열→필드.",
        phase: "compare",
        command: "",
      },
      {
        title: "STEP 3 · mongosh로 CRUD 실행",
        desc: "MongoDB 7에서는 mongosh 클라이언트를 사용한다. insertOne/insertMany로 문서를 삽입하고, find로 조회하고, updateOne으로 수정하고, deleteOne으로 삭제한다. SQL 대신 JavaScript 문법을 사용한다.",
        phase: "crud",
        command: "docker exec -it mongo-demo mongosh -u root -p mongopass",
      },
      {
        title: "STEP 4 · 볼륨 영속화 + 초기 스크립트",
        desc: "MongoDB의 데이터 경로는 /data/db다. 이 경로를 볼륨에 연결하면 데이터가 영속화된다. /docker-entrypoint-initdb.d/에 .js 파일을 마운트하면 첫 실행 시 자동으로 실행된다.",
        phase: "volume",
        command: "docker run -d --name mongo-demo -e MONGO_INITDB_ROOT_USERNAME=root -e MONGO_INITDB_ROOT_PASSWORD=mongopass -p 27017:27017 -v mongo_data:/data/db mongo:7",
      },
      {
        title: "STEP 5 · 인증과 보안",
        desc: "MONGO_INITDB_ROOT_USERNAME을 설정하지 않으면 인증 없이 접속 가능한 취약한 상태가 된다. 반드시 관리자 계정을 설정하고, 프로덕션에서는 Replica Set과 관리형 서비스(Atlas, DocumentDB)를 고려한다.",
        phase: "auth",
        command: "",
      },
      {
        title: "STEP 6 · DB 3종 비교 미리보기",
        desc: "MySQL(이미지: mysql:8.0, 포트: 3306, 데이터: /var/lib/mysql), Redis(redis:7-alpine, 6379, /data), MongoDB(mongo:7, 27017, /data/db). 세 DB 모두 볼륨 마운트와 환경변수 패턴이 동일하다.",
        phase: "summary",
        command: "",
      },
    ];

    function MongoVisual({ phase }) {
      if (phase === "run") {
        return (
          <div className="flex flex-col md:flex-row items-center justify-center gap-6 anim-fade">
            <div className="bg-blue-100 border-2 border-blue-400 rounded-xl p-4 text-center">
              <div className="text-3xl mb-2">🖥️</div>
              <div className="font-bold text-blue-800">호스트</div>
              <div className="text-xs text-blue-500">포트 27017</div>
            </div>
            <div className="text-2xl text-blue-400">→</div>
            <div className="bg-green-50 border-2 border-green-500 rounded-xl p-5 anim-pulse">
              <div className="text-center mb-3">
                <div className="text-3xl">🍃</div>
                <div className="font-bold text-green-800">MongoDB 7 컨테이너</div>
              </div>
              <div className="space-y-1.5">
                {[
                  { key: "MONGO_INITDB_ROOT_USERNAME", val: "root" },
                  { key: "MONGO_INITDB_ROOT_PASSWORD", val: "mongopass" },
                  { key: "MONGO_INITDB_DATABASE", val: "demo (선택)" },
                ].map((env, i) => (
                  <div key={i} className="bg-green-100 border border-green-200 rounded px-2 py-1 text-xs font-mono anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                    <span className="text-green-800 font-bold">{env.key}</span>
                    <span className="text-slate-500"> = </span>
                    <span className="text-green-600">{env.val}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      if (phase === "compare") {
        return (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 anim-fade">
            <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-4">
              <h4 className="font-bold text-blue-800 mb-3 text-center">🐬 RDB (MySQL)</h4>
              <div className="bg-white rounded-lg p-3 border border-blue-200 mb-2">
                <div className="text-xs text-slate-500 mb-1">users 테이블 (고정 스키마)</div>
                <table className="w-full text-xs">
                  <thead><tr className="bg-blue-100"><th className="px-2 py-1">id</th><th className="px-2 py-1">name</th><th className="px-2 py-1">email</th></tr></thead>
                  <tbody>
                    <tr className="border-t"><td className="px-2 py-1">1</td><td className="px-2 py-1">홍길동</td><td className="px-2 py-1">hong@...</td></tr>
                    <tr className="border-t"><td className="px-2 py-1">2</td><td className="px-2 py-1">김철수</td><td className="px-2 py-1">kim@...</td></tr>
                  </tbody>
                </table>
              </div>
              <div className="space-y-1 text-xs">
                <div className="bg-blue-100 rounded px-2 py-1">데이터베이스 → 테이블 → 행</div>
                <div className="bg-blue-100 rounded px-2 py-1">SQL 쿼리 언어</div>
                <div className="bg-blue-100 rounded px-2 py-1">고정 스키마, JOIN, 트랜잭션</div>
              </div>
            </div>
            <div className="bg-green-50 border-2 border-green-300 rounded-xl p-4">
              <h4 className="font-bold text-green-800 mb-3 text-center">🍃 NoSQL (MongoDB)</h4>
              <div className="bg-white rounded-lg p-3 border border-green-200 mb-2">
                <div className="text-xs text-slate-500 mb-1">users 컬렉션 (유연한 스키마)</div>
                <div className="font-mono text-xs space-y-1">
                  <div className="bg-green-100 rounded p-1">{'{ name: "홍길동", email: "hong@...", age: 30, tags: [...] }'}</div>
                  <div className="bg-green-100 rounded p-1">{'{ name: "김철수", email: "kim@...", role: "manager" }'}</div>
                </div>
              </div>
              <div className="space-y-1 text-xs">
                <div className="bg-green-100 rounded px-2 py-1">데이터베이스 → 컬렉션 → 문서</div>
                <div className="bg-green-100 rounded px-2 py-1">MQL (JavaScript 문법)</div>
                <div className="bg-green-100 rounded px-2 py-1">유연한 스키마, 임베딩/참조</div>
              </div>
            </div>
          </div>
        );
      }

      if (phase === "crud") {
        return (
          <div className="bg-slate-900 rounded-xl p-4 font-mono text-xs anim-fade overflow-x-auto">
            <div className="flex items-center gap-2 mb-3">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-green-500"></div>
              <span className="text-slate-500 ml-2">mongosh</span>
            </div>
            {[
              { cmd: 'demo> db.users.insertOne({ name: "홍길동", email: "hong@example.com", age: 30 })', result: '{ acknowledged: true, insertedId: ObjectId("...") }' },
              { cmd: 'demo> db.users.find({ age: { $gte: 26 } })', result: '[ { _id: ObjectId("..."), name: "홍길동", age: 30, ... } ]' },
              { cmd: 'demo> db.users.updateOne({ name: "홍길동" }, { $set: { age: 31 } })', result: '{ modifiedCount: 1 }' },
              { cmd: 'demo> db.users.deleteOne({ name: "홍길동" })', result: '{ deletedCount: 1 }' },
            ].map((line, i) => (
              <div key={i} className="mb-2 anim-slide" style={{animationDelay:`${i*0.15}s`}}>
                <div className="text-green-400 break-all">{line.cmd}</div>
                <div className="text-slate-400 pl-2">{line.result}</div>
              </div>
            ))}
          </div>
        );
      }

      if (phase === "volume") {
        return (
          <div className="flex flex-col items-center gap-4 anim-fade">
            <div className="flex items-center gap-6">
              <div className="bg-green-50 border-2 border-green-400 rounded-xl p-4 text-center">
                <div className="text-3xl mb-1">🍃</div>
                <div className="font-bold text-green-800 text-sm">MongoDB 컨테이너</div>
                <div className="text-xs text-green-500 mt-1">/data/db</div>
              </div>
              <div className="text-xl text-emerald-500 font-bold">↕</div>
              <div className="bg-emerald-100 border-2 border-emerald-400 rounded-xl p-4 text-center anim-pulse">
                <div className="text-3xl mb-1">💾</div>
                <div className="font-bold text-emerald-800 text-sm">Docker 볼륨</div>
                <div className="text-xs text-emerald-500 mt-1">mongo_data</div>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className="bg-blue-100 border-2 border-blue-300 rounded-xl p-3 text-center">
                <div className="text-xl mb-1">📄</div>
                <div className="text-xs font-bold text-blue-800">init.js</div>
              </div>
              <div className="text-lg text-blue-400">→</div>
              <div className="bg-amber-100 border border-amber-300 rounded-lg px-3 py-2 text-xs font-mono">
                /docker-entrypoint-initdb.d/
              </div>
            </div>
            <div className="bg-amber-50 border border-amber-200 rounded-lg p-2 text-xs text-amber-700">
              ⚠ .js 또는 .sh 파일 지원. 볼륨에 데이터가 있으면 실행되지 않음
            </div>
          </div>
        );
      }

      if (phase === "auth") {
        return (
          <div className="space-y-4 anim-fade">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-red-50 border-2 border-red-300 rounded-xl p-4">
                <h4 className="font-bold text-red-800 mb-2">❌ 인증 미설정 (위험!)</h4>
                <div className="space-y-2 text-sm">
                  <div className="bg-red-100 rounded px-3 py-1.5">환경변수 없이 실행</div>
                  <div className="bg-red-100 rounded px-3 py-1.5">--noauth 모드로 동작</div>
                  <div className="bg-red-100 rounded px-3 py-1.5">누구나 DB에 접근 가능</div>
                </div>
              </div>
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-4">
                <h4 className="font-bold text-emerald-800 mb-2">✅ 인증 설정 (권장)</h4>
                <div className="space-y-2 text-sm">
                  <div className="bg-emerald-100 rounded px-3 py-1.5">MONGO_INITDB_ROOT_USERNAME 설정</div>
                  <div className="bg-emerald-100 rounded px-3 py-1.5">MONGO_INITDB_ROOT_PASSWORD 설정</div>
                  <div className="bg-emerald-100 rounded px-3 py-1.5">mongosh -u root -p 으로 접속</div>
                </div>
              </div>
            </div>
            <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-center text-sm text-blue-700">
              💡 프로덕션: Replica Set (3개 노드) + MongoDB Atlas 또는 AWS DocumentDB 권장
            </div>
          </div>
        );
      }

      if (phase === "summary") {
        return (
          <div className="bg-gradient-to-r from-green-50 to-blue-50 border-2 border-green-300 rounded-xl p-6 anim-fade">
            <h3 className="text-lg font-bold text-green-800 mb-4 text-center">DB 3종 핵심 비교</h3>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="bg-white">
                    <th className="px-3 py-2 text-left text-slate-600">항목</th>
                    <th className="px-3 py-2 text-center text-blue-700">🐬 MySQL</th>
                    <th className="px-3 py-2 text-center text-red-700">🔴 Redis</th>
                    <th className="px-3 py-2 text-center text-green-700">🍃 MongoDB</th>
                  </tr>
                </thead>
                <tbody className="font-mono text-xs">
                  {[
                    { label: "이미지", mysql: "mysql:8.0", redis: "redis:7-alpine", mongo: "mongo:7" },
                    { label: "포트", mysql: "3306", redis: "6379", mongo: "27017" },
                    { label: "데이터 경로", mysql: "/var/lib/mysql", redis: "/data", mongo: "/data/db" },
                    { label: "필수 환경변수", mysql: "ROOT_PASSWORD", redis: "(없음)", mongo: "ROOT_USERNAME+PW" },
                    { label: "CLI", mysql: "mysql", redis: "redis-cli", mongo: "mongosh" },
                    { label: "초기화 경로", mysql: "initdb.d/ (.sql)", redis: "(없음)", mongo: "initdb.d/ (.js)" },
                  ].map((row, i) => (
                    <tr key={i} className="border-t border-slate-200 anim-slide" style={{animationDelay:`${i*0.08}s`}}>
                      <td className="px-3 py-2 font-sans font-bold text-slate-700">{row.label}</td>
                      <td className="px-3 py-2 text-center text-blue-600">{row.mysql}</td>
                      <td className="px-3 py-2 text-center text-red-600">{row.redis}</td>
                      <td className="px-3 py-2 text-center text-green-600">{row.mongo}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      }

      return null;
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4500);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VIII-1-7: MongoDB를 Docker로 실행하기</h1>
              </div>
              <p className="text-slate-500 text-sm">MongoDB 컨테이너 실행, CRUD, 인증 설정, 볼륨 영속화까지 단계별로 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "summary" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "auth" ? "bg-red-600 border-red-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {data.command && (
              <div className="bg-slate-900 rounded-xl p-4 font-mono text-sm anim-fade overflow-x-auto">
                <div className="flex items-center gap-2 mb-2">
                  <div className="w-3 h-3 rounded-full bg-red-500"></div>
                  <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                  <div className="w-3 h-3 rounded-full bg-green-500"></div>
                  <span className="text-slate-500 text-xs ml-2">Terminal</span>
                </div>
                <div className="text-green-400 break-all">
                  <span className="text-slate-500">$ </span>{data.command}
                </div>
              </div>
            )}

            <div className="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
              <MongoVisual phase={data.phase} />
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
