<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — CI/CD 자동화</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes slideDown { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }
    @keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
    @keyframes checkmark { from{opacity:0;transform:scale(0);} to{opacity:1;transform:scale(1);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-down { animation: slideDown 0.5s ease-out forwards; }
    .anim-spin { animation: spin 1s linear infinite; }
    .anim-check { animation: checkmark 0.3s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PIPELINE_STAGES = [
      { id: "push", label: "코드 Push", icon: "📤", desc: "main 브랜치에 merge" },
      { id: "test", label: "테스트", icon: "🧪", desc: "pytest / npm test" },
      { id: "build", label: "이미지 빌드", icon: "🔨", desc: "BuildKit + 캐시" },
      { id: "scan", label: "취약점 스캔", icon: "🔍", desc: "trivy CRITICAL/HIGH" },
      { id: "push_registry", label: "Push", icon: "⬆️", desc: "GHCR/ECR에 저장" },
    ];

    const STEPS = [
      {
        title: "STEP 1 · 왜 CI/CD 자동화가 필요한가",
        desc: "수동 빌드는 세 가지 문제가 있다. 1) 태그를 잘못 붙이거나 push를 빠뜨리는 실수. 2) '내 노트북에서 빌드한 이미지'는 환경마다 다를 수 있음. 3) 배포가 특정 사람에게 의존.",
        phase: "why",
        activeStage: -1,
      },
      {
        title: "STEP 2 · GitHub Actions 파이프라인 흐름",
        desc: "코드 push → 테스트 → 이미지 빌드 → 취약점 스캔 → 레지스트리 push. 앞 단계가 실패하면 뒤 단계는 실행되지 않는다. 취약한 이미지가 레지스트리에 올라가지 못하게 막는다.",
        phase: "pipeline",
        activeStage: -1,
      },
      {
        title: "STEP 3 · 코드 Push → 테스트 실행",
        desc: "main 브랜치에 코드가 push되면 워크플로우가 자동 트리거된다. 먼저 pytest/npm test로 코드 품질을 검증한다. 테스트가 실패하면 빌드 자체가 진행되지 않는다.",
        phase: "test",
        activeStage: 1,
      },
      {
        title: "STEP 4 · BuildKit으로 이미지 빌드 + 캐시",
        desc: "docker/build-push-action이 BuildKit으로 빌드한다. cache-from: type=gha로 이전 빌드 캐시를 불러오고, cache-to: type=gha로 새 캐시를 저장한다. pip install, npm ci 레이어가 캐시되면 빌드 시간이 수 분에서 수십 초로 단축된다.",
        phase: "build",
        activeStage: 2,
      },
      {
        title: "STEP 5 · 취약점 스캔 → 레지스트리 Push",
        desc: "trivy가 빌드된 이미지의 CRITICAL/HIGH 취약점을 검사한다. 취약점이 있으면 워크플로우가 실패하고 push가 중단된다. 통과하면 GHCR/ECR에 이미지가 push된다. PR에서는 빌드만 하고 push는 하지 않는다.",
        phase: "scan_push",
        activeStage: 4,
      },
      {
        title: "STEP 6 · 핵심 GitHub Actions 구성 요소",
        desc: "setup-buildx-action(BuildKit 활성화), login-action(레지스트리 인증), metadata-action(태그 자동 생성), build-push-action(빌드+push). GITHUB_TOKEN은 GitHub이 자동 제공하는 토큰이다.",
        phase: "actions",
        activeStage: -1,
      },
    ];

    function PipelineStage({ stage, index, isActive, isPassed, isFailed }) {
      return (
        <div className={`flex flex-col items-center transition-all duration-500 ${
          isActive ? "scale-110" : isPassed ? "scale-100" : "scale-90 opacity-50"
        }`}>
          <div className={`w-14 h-14 rounded-full flex items-center justify-center text-2xl border-2 transition-all duration-500 ${
            isFailed ? "border-red-400 bg-red-100" :
            isActive ? "border-blue-400 bg-blue-100 anim-pulse" :
            isPassed ? "border-green-400 bg-green-100" :
            "border-slate-300 bg-slate-100"
          }`}>
            {isPassed && !isActive ? <span className="anim-check text-green-600 font-bold">V</span> : stage.icon}
          </div>
          <div className={`text-xs font-medium mt-1 ${
            isActive ? "text-blue-700" : isPassed ? "text-green-700" : "text-slate-400"
          }`}>{stage.label}</div>
          <div className="text-xs text-slate-400 mt-0.5">{stage.desc}</div>
        </div>
      );
    }

    function PipelineArrow({ isPassed }) {
      return (
        <div className={`flex items-center justify-center px-1 mt-[-20px] ${isPassed ? "text-green-400" : "text-slate-300"}`}>
          <span className="text-lg">→</span>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4500);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VII-1-4: CI/CD에서 Docker 빌드 자동화</h1>
              </div>
              <p className="text-slate-500 text-sm">GitHub Actions 파이프라인 흐름(push → build → test → deploy)을 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "actions" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "why" ? "bg-orange-600 border-orange-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 파이프라인 시각화 */}
            {data.phase !== "why" && data.phase !== "actions" && (
              <div key={`pipeline-${step}`} className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 anim-fade">
                <div className="flex items-start justify-center gap-1 flex-wrap">
                  {PIPELINE_STAGES.map((stage, i) => (
                    <React.Fragment key={stage.id}>
                      <PipelineStage stage={stage} index={i}
                        isActive={data.activeStage === i}
                        isPassed={data.activeStage > i}
                        isFailed={false} />
                      {i < PIPELINE_STAGES.length - 1 && (
                        <PipelineArrow isPassed={data.activeStage > i} />
                      )}
                    </React.Fragment>
                  ))}
                </div>
              </div>
            )}

            {/* 왜 필요한가 */}
            {data.phase === "why" && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4 anim-fade">
                {[
                  { icon: "🐛", title: "실수 가능성", desc: "태그를 잘못 붙이거나 push를 빠뜨림", color: "red" },
                  { icon: "🔄", title: "재현성 부족", desc: "내 노트북 빌드 이미지는 환경마다 다름", color: "orange" },
                  { icon: "👤", title: "병목 발생", desc: "배포가 특정 사람에게 의존됨", color: "yellow" },
                ].map((item, i) => (
                  <div key={i} className={`rounded-xl border-2 border-${item.color}-300 bg-${item.color}-50 p-4 text-center anim-slide`} style={{animationDelay: `${i * 0.15}s`}}>
                    <div className="text-3xl mb-2">{item.icon}</div>
                    <div className={`font-bold text-${item.color}-700 text-sm`}>{item.title}</div>
                    <div className={`text-xs text-${item.color}-600 mt-1`}>{item.desc}</div>
                  </div>
                ))}
              </div>
            )}

            {/* 추가 시각화 */}
            <div key={`detail-${step}`} className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 anim-fade">
              {/* 테스트 단계 */}
              {data.phase === "test" && (
                <div className="space-y-3">
                  <div className="text-sm font-medium text-slate-600 mb-2">워크플로우 트리거 조건</div>
                  <div className="bg-slate-800 rounded-lg p-4 font-mono text-xs">
                    <div className="text-yellow-300">on:</div>
                    <div className="text-blue-300 ml-2">push:</div>
                    <div className="text-green-400 ml-4">branches: [main]      # main push 시 실행</div>
                    <div className="text-blue-300 ml-2">pull_request:</div>
                    <div className="text-green-400 ml-4">branches: [main]      # main PR 시 실행 (빌드만, push 안 함)</div>
                  </div>
                  <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-xs text-center">
                    <span className="text-blue-700 font-medium">PR에서는 빌드만 하고 push는 하지 않는다 — 검토 전 코드의 이미지가 올라가면 안 된다</span>
                  </div>
                </div>
              )}

              {/* 빌드 + 캐시 */}
              {data.phase === "build" && (
                <div className="space-y-4">
                  <div className="text-sm font-medium text-slate-600 mb-2">BuildKit 캐시 동작</div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div className="bg-red-50 border border-red-200 rounded-lg p-3">
                      <div className="font-bold text-red-700 text-sm mb-2">캐시 없이 빌드</div>
                      <div className="flex items-center gap-2">
                        <div className="flex-1 bg-red-200 rounded-full h-4 overflow-hidden">
                          <div className="bg-red-500 h-full rounded-full" style={{width: "100%"}} />
                        </div>
                        <span className="text-xs text-red-600 font-medium">5분 30초</span>
                      </div>
                      <div className="text-xs text-red-500 mt-1">모든 레이어를 처음부터 빌드</div>
                    </div>
                    <div className="bg-green-50 border border-green-200 rounded-lg p-3">
                      <div className="font-bold text-green-700 text-sm mb-2">GHA 캐시 사용</div>
                      <div className="flex items-center gap-2">
                        <div className="flex-1 bg-green-200 rounded-full h-4 overflow-hidden">
                          <div className="bg-green-500 h-full rounded-full" style={{width: "25%"}} />
                        </div>
                        <span className="text-xs text-green-600 font-medium">45초</span>
                      </div>
                      <div className="text-xs text-green-500 mt-1">변경된 레이어만 다시 빌드</div>
                    </div>
                  </div>
                  <div className="bg-slate-800 rounded-lg p-4 font-mono text-xs">
                    <div className="text-green-400">cache-from: type=gha         # 이전 캐시 불러옴</div>
                    <div className="text-green-400">cache-to: type=gha,mode=max  # 새 캐시 저장</div>
                    <div className="text-slate-500 mt-1"># 캐시 용량 제한: 리포지토리당 10GB</div>
                  </div>
                </div>
              )}

              {/* 스캔 + push */}
              {data.phase === "scan_push" && (
                <div className="space-y-4">
                  <div className="bg-slate-800 rounded-lg p-4 font-mono text-xs">
                    <div className="text-slate-500"># trivy 스캔을 CI에 추가</div>
                    <div className="text-yellow-300">- name: trivy 이미지 스캔</div>
                    <div className="text-blue-300 ml-2">uses: aquasecurity/trivy-action@master</div>
                    <div className="text-blue-300 ml-2">with:</div>
                    <div className="text-green-400 ml-4">format: table</div>
                    <div className="text-red-400 ml-4">exit-code: 1              # CRITICAL 시 워크플로우 실패</div>
                    <div className="text-green-400 ml-4">severity: CRITICAL,HIGH</div>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-green-50 border border-green-200 rounded-lg p-3 text-center">
                      <div className="text-2xl mb-1">V</div>
                      <div className="text-xs text-green-700 font-medium">스캔 통과 → Push 실행</div>
                    </div>
                    <div className="bg-red-50 border border-red-200 rounded-lg p-3 text-center">
                      <div className="text-2xl mb-1">X</div>
                      <div className="text-xs text-red-700 font-medium">CRITICAL 발견 → Push 차단</div>
                    </div>
                  </div>
                </div>
              )}

              {/* 파이프라인 전체 */}
              {data.phase === "pipeline" && (
                <div className="space-y-3">
                  {[
                    { stage: "테스트", desc: "pytest / npm test 실행", fail: "실패 시 → 빌드 진행 안 함", icon: "🧪" },
                    { stage: "빌드", desc: "BuildKit + GHA 캐시", fail: "실패 시 → 스캔 진행 안 함", icon: "🔨" },
                    { stage: "스캔", desc: "trivy CRITICAL/HIGH 검사", fail: "CRITICAL 발견 시 → push 중단", icon: "🔍" },
                    { stage: "Push", desc: "GHCR/ECR에 이미지 업로드", fail: "main merge 시에만 실행", icon: "⬆️" },
                  ].map((item, i) => (
                    <div key={i} className="flex items-center gap-3 p-3 bg-slate-50 rounded-lg border border-slate-200 anim-down" style={{animationDelay: `${i * 0.15}s`}}>
                      <div className="text-2xl">{item.icon}</div>
                      <div className="flex-1">
                        <div className="font-bold text-slate-800 text-sm">{item.stage}</div>
                        <div className="text-xs text-slate-500">{item.desc}</div>
                      </div>
                      <div className="text-xs text-red-500 bg-red-50 px-2 py-1 rounded">{item.fail}</div>
                      {i < 3 && <span className="text-slate-300">↓</span>}
                    </div>
                  ))}
                </div>
              )}

              {/* Actions 구성 요소 */}
              {data.phase === "actions" && (
                <div className="space-y-3">
                  {[
                    { action: "actions/checkout@v4", desc: "저장소 코드를 워크플로우 실행 환경에 내려받음", icon: "📥" },
                    { action: "docker/setup-buildx-action@v3", desc: "BuildKit 기반 buildx 빌더 활성화", icon: "⚙️" },
                    { action: "docker/login-action@v3", desc: "레지스트리 로그인 (GITHUB_TOKEN 자동 제공)", icon: "🔑" },
                    { action: "docker/metadata-action@v5", desc: "브랜치/태그/SHA에 맞는 이미지 태그 자동 생성", icon: "🏷️" },
                    { action: "docker/build-push-action@v5", desc: "빌드 + push를 한 번에 처리, BuildKit 캐시 연동", icon: "🚀" },
                  ].map((item, i) => (
                    <div key={i} className="flex items-center gap-3 p-3 bg-emerald-50 border border-emerald-200 rounded-lg anim-slide" style={{animationDelay: `${i * 0.1}s`}}>
                      <div className="text-xl">{item.icon}</div>
                      <div className="flex-1">
                        <div className="font-mono text-xs text-emerald-800 font-medium">{item.action}</div>
                        <div className="text-xs text-emerald-600">{item.desc}</div>
                      </div>
                    </div>
                  ))}
                  <div className="bg-emerald-100 border border-emerald-300 rounded-lg p-3 text-xs text-center">
                    <span className="text-emerald-800 font-medium">secrets.GITHUB_TOKEN은 별도 발급 없이 GitHub이 자동 제공. permissions.packages: write 필수.</span>
                  </div>
                </div>
              )}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
