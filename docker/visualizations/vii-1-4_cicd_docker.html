    학습 목표: 사람 손으로 docker build/push 하던 흐름을 GitHub Actions + build-push-action +
              metadata-action 으로 자동화하고, PR마다 빌드 → 테스트 → registry 흐름까지 5단계로 본다.
    핵심 비유: 컨베이어 벨트 — git push 하는 순간 벨트가 돌아 빌드/태깅/푸시까지 알아서 굴러간다
    패턴: fastapi v1 — 좌(LiveDataPane: git push → CI 파이프라인 → registry → 배포) / 우(VSCode CodeViewer)
    색상: docker sky

      return (
        <div className="grid grid-cols-2 gap-2">
          <div className={`rounded-lg border-2 p-2 transition-all duration-500 text-center ${

            <div className="text-base">📤</div>
            <div className={`text-[11px] font-bold ${isPush ? 'text-sky-800' : 'text-slate-400'}`}>git push</div>
            <div className="text-[9px] text-slate-500 mt-0.5 font-mono">on: push (main / tags)</div>
          </div>
          <div className={`rounded-lg border-2 p-2 transition-all duration-500 text-center ${
            isPR ? 'bg-amber-100 border-amber-500 shadow-md' : 'bg-slate-50 border-slate-200 opacity-60'
          }`}>
            <div className="text-base">🔀</div>
            <div className={`text-[11px] font-bold ${isPR ? 'text-amber-800' : 'text-slate-400'}`}>pull request</div>
            <div className="text-[9px] text-slate-500 mt-0.5 font-mono">on: pull_request</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙: CI 파이프라인 — 가로 컨베이어 벨트
    //   activeStages 에 들어 있는 id 까지 sky 점등
    //   마지막 활성 칸은 pulse, 이전은 통과(check)
    // ─────────────────────────────────────────────────────
    function PipelineBox({ activeStages }) {
      const lastActive = activeStages[activeStages.length - 1];
      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🤖</span>
              <span className="text-[11px] font-bold text-slate-700">GitHub Actions Runner</span>
            </div>
            {activeStages.length > 0 && (
              <span className="text-[9px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                running
              </span>
            )}
          </div>
          <div className="flex items-center gap-1">
            {PIPELINE.map((stage, i) => {
              const passed   = activeStages.includes(stage.id);
              const isLast   = stage.id === lastActive;
              return (
                <React.Fragment key={stage.id}>
                  <div className={`flex-1 rounded-md border-2 p-1.5 text-center transition-all duration-500 ${
                    passed
                      ? (isLast ? 'bg-sky-100 border-sky-500 shadow' : 'bg-emerald-50 border-emerald-300')
                      : 'bg-slate-50 border-dashed border-slate-200 opacity-50'
                  }`}>
                    <div className="text-base leading-none">{stage.icon}</div>
                    <div className={`text-[9px] font-bold mt-0.5 ${
                      passed ? (isLast ? 'text-sky-800' : 'text-emerald-700') : 'text-slate-400'
                    }`}>{stage.label}</div>
                    <div className={`text-[8px] ${passed ? 'text-slate-600' : 'text-slate-400'} leading-tight`}>
                      {stage.desc}
                    </div>
                    {passed && !isLast && (
                      <div className="text-[8px] text-emerald-600 font-bold mt-0.5">✓</div>
                    )}
                    {isLast && passed && (
                      <div className="mt-0.5 bg-sky-600 text-white text-[8px] px-1 py-0.5 rounded font-mono font-bold">
                        active
                      </div>
                    )}
                  </div>
                  {i < PIPELINE.length - 1 && (
                    <span className={`text-xs ${
                      activeStages.includes(stage.id) ? 'text-sky-500' : 'text-slate-300'
                    }`}>→</span>
                  )}
                </React.Fragment>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: registry 박스 — 푸시된 이미지 태그 목록
    //   prMode → push 차단 표시 (회색 + 자물쇠)
    //   registryActive → sky 강조
    // ─────────────────────────────────────────────────────
    function RegistryBox({ tags, registryActive, prMode }) {
      const hasTags = tags && tags.length > 0;
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          registryActive
            ? 'bg-sky-50 border-sky-400 shadow-md'
            : prMode
              ? 'bg-amber-50 border-amber-300'
              : 'bg-slate-50 border-slate-200 opacity-70'
        }`}>
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📦</span>
              <span className={`text-[11px] font-bold ${
                registryActive ? 'text-sky-800' : prMode ? 'text-amber-800' : 'text-slate-500'
              }`}>
                ghcr.io/acme/myapp
              </span>
            </div>
            {registryActive && (
              <span className="text-[9px] bg-sky-600 text-white px-1.5 py-0.5 rounded font-mono font-bold animate-pulse">
                pushed ✓
              </span>
            )}
            {prMode && (
              <span className="text-[9px] bg-amber-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                push 차단 🔒
              </span>
            )}
          </div>
          <div className="bg-white rounded border border-slate-200 p-1.5 font-mono text-[9px] leading-snug space-y-0.5 min-h-[80px]">
            {!hasTags && (
              <div className="text-slate-400 italic">아직 푸시된 이미지 없음</div>
            )}
            {hasTags && tags.map((t, i) => (
              <div key={i} className="flex items-center gap-1">
                <span className={prMode ? 'text-slate-400 line-through' : 'text-sky-700 font-semibold'}>
                  {t}
                </span>
                {!prMode && (
                  <span className="ml-auto text-[8px] text-emerald-600 font-bold">✓</span>
                )}
              </div>
            ))}
          </div>
          <div className={`text-[9px] mt-1 ${
            registryActive ? 'text-sky-700 font-semibold' :
            prMode ? 'text-amber-700 font-semibold' :
            'text-slate-400'
          }`}>
            {registryActive && '✓ main / tag 푸시 → 정식 이미지가 등록됨'}
            {prMode && '✗ PR 컨텍스트 — 빌드/테스트만, push 는 main 머지 후'}
            {!registryActive && !prMode && '대기 중'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 트리거 (사람/push/PR)
    //   중앙: CI 파이프라인 (5칸 컨베이어)
    //   하단: registry 와 푸시된 태그 목록
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 git push → CI → registry → 배포</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            <TriggerBox trigger={step.trigger} manualPain={step.manualPain} />

            {/* 화살표: 트리거 → 파이프라인 */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.activeStages.length > 0 ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                ↓ workflow trigger
              </div>
            </div>

            <PipelineBox activeStages={step.activeStages} />

            {/* 화살표: 파이프라인 → registry */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                step.registryActive ? 'text-sky-600 font-bold' :
                step.prMode ? 'text-amber-600 font-bold' :
                'text-slate-300'
              }`}>
                {step.prMode ? '↓ push 차단 (PR 컨텍스트)' : '↓ docker push'}
              </div>
            </div>

            <RegistryBox
              tags={step.tags}
              registryActive={step.registryActive}
              prMode={step.prMode}
            />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>passed
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>PR mode
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>manual risk
            </span>
            <span className="ml-auto font-mono">phase: {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VII-1-4</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. Docker 운영 &gt; Chapter 1. Registry · CI/CD</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VII-1-4. CI/CD with Docker — GitHub Actions로 빌드/푸시 자동화</h1>
                  <p className="text-sm text-slate-500 mt-0.5">손으로 docker build/push → GitHub Actions + build-push-action + metadata-action 으로 컨베이어처럼 자동화</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: 트리거(<strong>on.push / pull_request</strong>) → 빌드(<strong>build-push-action</strong>) → 태그(<strong>metadata-action</strong>) → 푸시 정책(<strong>push: PR이면 false</strong>) — 이 4 가지가 CI/CD with Docker 의 뼈대다. 다음 자료(VII-1-5)에서는 배포(deploy) 흐름까지 이어진다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['GitHub Actions', 'build-push-action', 'metadata-action', 'setup-buildx', 'login-action', 'on: push', 'pull_request', 'GHCR', 'semver tag', 'cache: gha'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./vii-1-3_security.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; VII-1-3 컨테이너 보안</a>
              <a href="./vii-1-5_deployment.html" className="text-sky-700 hover:text-sky-900 font-medium">VII-1-5 배포 전략 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
