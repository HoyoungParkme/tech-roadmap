<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — Compose 다중 컨테이너 연결</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { title: "STEP 1 · docker compose up", desc: "Compose가 docker-compose.yml을 읽고 서비스를 순서대로 시작한다.", db: "starting", api: "idle", nginx: "idle", arrow: null },
      { title: "STEP 2 · DB 시작 + 헬스체크 대기", desc: "PostgreSQL 컨테이너가 시작된다. pg_isready로 헬스체크가 반복 실행된다.", db: "checking", api: "waiting", nginx: "idle", arrow: null },
      { title: "STEP 3 · DB healthy → API 시작", desc: "헬스체크 통과! depends_on condition: service_healthy가 해소되어 API가 시작된다.", db: "healthy", api: "starting", nginx: "waiting", arrow: "db-api" },
      { title: "STEP 4 · API 시작 → Nginx 시작", desc: "FastAPI(uvicorn)가 준비되면 Nginx가 시작된다. 전체 스택이 가동된다.", db: "healthy", api: "healthy", nginx: "starting", arrow: "api-nginx" },
      { title: "STEP 5 · 요청 흐름: 브라우저 → Nginx → API → DB", desc: "외부 요청이 Nginx(80) → API(8000) → DB(5432) 순서로 전달된다. 서비스 이름이 DNS로 동작한다.", db: "healthy", api: "healthy", nginx: "healthy", arrow: "full" },
    ];

    const statusColors = {
      idle: "bg-slate-200 border-slate-300 text-slate-500",
      starting: "bg-yellow-100 border-yellow-400 text-yellow-800 animate-pulse",
      checking: "bg-orange-100 border-orange-400 text-orange-800 animate-pulse",
      waiting: "bg-slate-100 border-slate-300 text-slate-400",
      healthy: "bg-green-100 border-green-400 text-green-800",
    };

    const statusLabels = { idle: "대기", starting: "시작 중", checking: "헬스체크 중", waiting: "의존성 대기", healthy: "정상" };

    const ServiceNode = ({ name, role, port, status, dns }) => (
      <div className={`rounded-xl border-2 p-4 text-center transition-all duration-500 min-w-[140px] ${statusColors[status]}`}>
        <div className="text-lg font-bold">{name}</div>
        <div className="text-xs opacity-70 mb-1">{role}</div>
        <div className="text-xs font-mono bg-white/50 rounded px-2 py-0.5 inline-block">{port}</div>
        <div className="mt-2 text-xs font-medium">{statusLabels[status]}</div>
        {dns && status !== 'idle' && status !== 'waiting' && (
          <div className="mt-1 text-xs font-mono text-blue-600">DNS: {dns}</div>
        )}
      </div>
    );

    const Arrow = ({ active, label }) => (
      <div className={`flex flex-col items-center transition-all duration-300 ${active ? 'opacity-100' : 'opacity-20'}`}>
        <div className={`text-2xl ${active ? 'text-blue-500' : 'text-slate-300'}`}>→</div>
        {label && active && <div className="text-xs text-blue-600 font-medium mt-0.5">{label}</div>}
      </div>
    );

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const step = STEPS[currentStep];
      const isEnd = currentStep === STEPS.length - 1;

      const handleNext = () => { if (currentStep < STEPS.length - 1) setCurrentStep(p => p + 1); else setIsPlaying(false); };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStep > 0) { setCurrentStep(p => p - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) playRef.current = setInterval(() => handleNextRef.current(), 3000);
        else clearInterval(playRef.current);
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      const dbApiActive = step.arrow === 'db-api' || step.arrow === 'full';
      const apiNginxActive = step.arrow === 'api-nginx' || step.arrow === 'full';

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-2xl font-bold">Compose 다중 컨테이너 연결</h1>
              </div>
              <p className="text-slate-600">
                <b>DB → API → Nginx</b> 3개 서비스가 서비스 이름 DNS로 통신하며, <b>depends_on + healthcheck</b>로 시작 순서를 제어하는 과정을 시뮬레이션합니다.
              </p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800">
              <h3 className="text-xs font-bold text-blue-200 mb-1 uppercase tracking-wider">{step.title}</h3>
              <p className="text-base font-medium leading-relaxed">{step.desc}</p>
            </div>

            {/* 서비스 노드 흐름 */}
            <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-center gap-6 flex-wrap">
                {step.arrow === 'full' && (
                  <>
                    <div className="text-center">
                      <div className="bg-slate-700 text-white rounded-lg px-4 py-2 text-sm font-bold">브라우저</div>
                      <div className="text-xs text-slate-500 mt-1">localhost:80</div>
                    </div>
                    <Arrow active={true} label="HTTP" />
                  </>
                )}
                <ServiceNode name="nginx" role="리버스 프록시" port=":80" status={step.nginx} dns="nginx" />
                <Arrow active={apiNginxActive} label="proxy_pass" />
                <ServiceNode name="api" role="앱 서버" port=":8000" status={step.api} dns="api" />
                <Arrow active={dbApiActive} label="psql" />
                <ServiceNode name="db" role="데이터베이스" port=":5432" status={step.db} dns="db" />
              </div>

              {/* 헬스체크 상세 (STEP 2) */}
              {step.db === 'checking' && (
                <div className="mt-6 bg-orange-50 border border-orange-200 rounded-lg p-4 text-sm text-orange-800 max-w-md mx-auto">
                  <div className="font-bold mb-1">헬스체크 실행 중</div>
                  <code className="text-xs bg-orange-100 px-2 py-1 rounded block">pg_isready -U $POSTGRES_USER -d $POSTGRES_DB</code>
                  <div className="mt-2 text-xs">interval: 5s / timeout: 3s / retries: 5</div>
                </div>
              )}

              {/* depends_on 해소 (STEP 3) */}
              {step.arrow === 'db-api' && (
                <div className="mt-6 bg-green-50 border border-green-200 rounded-lg p-4 text-sm text-green-800 max-w-md mx-auto">
                  <div className="font-bold mb-1">depends_on 조건 해소</div>
                  <code className="text-xs bg-green-100 px-2 py-1 rounded block">condition: service_healthy → 통과!</code>
                </div>
              )}
            </div>

            {/* 컨트롤 */}
            <div className="flex items-center justify-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <button onClick={togglePlay} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-medium transition-colors">
                {isPlaying ? '⏸ 일시정지' : isEnd ? '↻ 다시 시작' : '▶ 자동 실행'}
              </button>
              <button onClick={handlePrev} disabled={currentStep === 0} className="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 disabled:opacity-30">← 이전</button>
              <button onClick={() => { handleNext(); setIsPlaying(false); }} disabled={isEnd} className="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 disabled:opacity-30">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStep + 1} / {STEPS.length}</div>
            </div>

            {/* 렌즈 */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div className="bg-green-50 border border-green-200 rounded-xl p-5">
                <div className="flex items-center gap-2 mb-3">
                  <span className="bg-green-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">입문</span>
                  <span className="text-green-700 font-bold text-sm">★☆☆</span>
                </div>
                <h4 className="font-bold text-green-800 mb-2 text-sm">사무실 내선 전화</h4>
                <ul className="text-sm text-green-900 space-y-2">
                  <li><b>비유:</b> 같은 사무실(Compose 네트워크) 안에서는 내선번호(서비스 이름)만 누르면 통화된다. <code className="bg-green-100 px-1 rounded text-xs">db</code>라고 부르면 PostgreSQL에 연결된다.</li>
                  <li><b>순서:</b> 창고(DB)가 먼저 열려야 주방(API)이 일하고, 주방이 준비돼야 접수원(Nginx)이 주문을 받는다.</li>
                </ul>
              </div>
              <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-5">
                <div className="flex items-center gap-2 mb-3">
                  <span className="bg-yellow-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">주니어</span>
                  <span className="text-yellow-700 font-bold text-sm">★★☆</span>
                </div>
                <h4 className="font-bold text-yellow-800 mb-2 text-sm">depends_on 함정</h4>
                <ul className="text-sm text-yellow-900 space-y-2">
                  <li><b>함정:</b> <code className="bg-yellow-100 px-1 rounded text-xs">depends_on: db</code>만 쓰면 DB 컨테이너 "시작"만 보장. 쿼리 준비 완료는 아님. 반드시 <code className="bg-yellow-100 px-1 rounded text-xs">condition: service_healthy</code> 추가.</li>
                  <li><b>디버깅:</b> <code className="bg-yellow-100 px-1 rounded text-xs">docker compose logs -f</code>로 어느 서비스에서 에러가 나는지 확인.</li>
                </ul>
              </div>
              <div className="bg-purple-50 border border-purple-200 rounded-xl p-5">
                <div className="flex items-center gap-2 mb-3">
                  <span className="bg-purple-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">실무자</span>
                  <span className="text-purple-700 font-bold text-sm">★★★</span>
                </div>
                <h4 className="font-bold text-purple-800 mb-2 text-sm">서비스 메시와 K8s</h4>
                <ul className="text-sm text-purple-900 space-y-2">
                  <li><b>K8s:</b> Compose의 서비스 이름 DNS → K8s Service 오브젝트. depends_on → readinessProbe + Init Container.</li>
                  <li><b>서비스 메시:</b> Istio/Linkerd가 sidecar 프록시로 서비스 간 통신을 관리. Compose 수준을 넘어서는 관측성과 보안.</li>
                </ul>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
