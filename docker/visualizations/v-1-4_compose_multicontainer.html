    학습 목표: docker-compose.yml 한 장에 4개 서비스를 적층(stack)하면서
              service 이름 DNS · depends_on · 네트워크 격리가 어떻게 작동하는지 5단계로 본다.
    핵심 비유: 한 사무실 4개 부서 — 내선 번호(service name)만 누르면 바로 통화된다.
    패턴: fastapi v1 — 좌(LiveDataPane: compose stack 누적 + 통신 화살표) / 우(VSCode CodeViewer)
    색상: docker sky
  -->

    // ─────────────────────────────────────────────────────

    // ─────────────────────────────────────────────────────
    // 좌측 service 박스 — 활성 / 강조 상태에 따라 색 변화
    //   active   : compose stack 에 들어있는지 (회색→sky)
    //   highlight: 이번 단계에서 새로 추가된 강조 대상 (sky pulse)
    // ─────────────────────────────────────────────────────
    function ServiceBox({ service, active, highlight }) {
      const baseStyle = active
        ? (highlight
            ? 'bg-sky-100 border-sky-500 shadow-md ring-2 ring-sky-300'
            : 'bg-sky-50 border-sky-400 shadow-sm')
        : 'bg-slate-50 border-dashed border-slate-300 opacity-40';
      return (
        <div className={`rounded-lg border-2 p-2.5 transition-all duration-500 ${baseStyle}`}>
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="text-lg">{service.icon}</span>
              <div>
                <div className={`text-[12px] font-bold ${active ? 'text-sky-900' : 'text-slate-400'}`}>
                  {service.id}
                </div>
                <div className={`text-[9px] leading-tight ${active ? 'text-slate-600' : 'text-slate-400'}`}>
                  {service.role}
                </div>
              </div>
            </div>
            <div className="text-right">
              <div className={`text-[9px] font-mono ${active ? 'text-sky-700' : 'text-slate-400'}`}>
                {service.image}
              </div>
              <div className={`text-[9px] font-mono ${active ? 'text-slate-500' : 'text-slate-300'}`}>
                :{service.port}
              </div>
            </div>
          </div>
          {active && highlight && (
            <div className="mt-1.5 text-[9px] text-sky-700 font-bold">
              + 이번 단계에 추가
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 통신 화살표 SVG — 활성 service 사이 라벨 포함 라인
    //   사용자에게 "service 이름이 곧 DNS" 임을 시각적으로 보여준다
    // ─────────────────────────────────────────────────────
    function ArrowList({ arrows }) {
      if (!arrows || arrows.length === 0) {
        return (
          <div className="text-[10px] text-slate-400 italic text-center py-1">
            아직 service 간 통신 없음 (단일 service)
          </div>
        );
      }
      return (
        <div className="space-y-1">
          {arrows.map((a, i) => (
            <div key={i} className="flex items-center gap-2 bg-sky-50 border border-sky-200 rounded px-2 py-1">
              <span className="text-[10px] font-mono font-bold text-sky-800">{a.from}</span>
              <span className="text-sky-500 text-sm">→</span>
              <span className="text-[10px] font-mono font-bold text-sky-800">{a.to}</span>
              <span className="text-[9px] text-slate-500 font-mono ml-auto truncate">{a.label}</span>
            </div>
          ))}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: compose stack (4개 service 박스 누적)
    //   하단: 통신 화살표 + 단계별 메시지
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const externalExposed = step.active.includes('web');
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📦 docker-compose stack</h2>
            <span className="text-[10px] text-slate-400 font-mono">
              {step.active.length}/{SERVICES.length} services
            </span>
          </div>

          {/* 외부 진입점 */}
          <div className="mb-2 flex items-center justify-center gap-2">
            <div className="text-[10px] bg-slate-700 text-white px-2 py-0.5 rounded font-mono">
              🌍 외부 (host)
            </div>
            <span className="text-slate-400 text-xs">↓</span>
            <div className={`text-[10px] px-2 py-0.5 rounded font-mono font-bold ${
              externalExposed ? 'bg-sky-600 text-white' : 'bg-slate-200 text-slate-400'
            }`}>
              {externalExposed ? ':80 → web' : '아직 외부 노출 없음'}
            </div>
          </div>

          {/* compose 네트워크 박스 — 4개 service stack */}
          <div className="rounded-lg border-2 border-sky-200 bg-sky-50/30 p-2.5">
            <div className="flex items-center justify-between mb-2">
              <span className="text-[10px] font-bold text-sky-800 font-mono">
                🔒 compose network (myapp_default)
              </span>
              <span className="text-[9px] text-slate-500 font-mono">사설 DNS</span>
            </div>
            <div className="space-y-1.5">
              {SERVICES.map((svc) => (
                <ServiceBox
                  key={svc.id}
                  service={svc}
                  active={step.active.includes(svc.id)}
                  highlight={step.highlights.includes(svc.id)}
                />
              ))}
            </div>
          </div>

          {/* 통신 화살표 */}
          <div className="mt-3">
            <div className="text-[10px] font-bold text-slate-600 mb-1 flex items-center gap-1">
              <span>🔗</span>
              <span>service 간 통신 (DNS = service 이름)</span>
            </div>
            <ArrowList arrows={step.arrows} />
          </div>

          {/* 단계 메시지 */}
          <div className="mt-3 bg-sky-700 text-white rounded px-3 py-2 text-[11px] leading-relaxed">
            <span className="font-bold">현재 상태: </span>{step.note}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded ring-2 ring-sky-300 bg-sky-100"></span>이번 단계 추가
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded border border-dashed border-slate-300 bg-white"></span>idle
            </span>
            <span className="ml-auto font-mono">step {step.active.length} svc</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js atom-one-dark
    //   파일명 탭, 윈도우 dot, 라인 번호, 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드(←/→)
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-4</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Docker Compose &gt; Chapter 1. 멀티컨테이너</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-1-4. Compose 멀티컨테이너 — web / api / db / redis</h1>
                  <p className="text-sm text-slate-500 mt-0.5">한 사무실 4개 부서가 내선(service 이름)으로 통화한다 — depends_on · healthcheck · 사설 DNS</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>service 이름 = DNS hostname</strong>, <strong>depends_on + healthcheck = 시작 순서</strong>, <strong>compose up/down 한 줄 = 전체 스택 운영</strong>. 4개 service가 한 사무실 4 부서처럼 내선만으로 통한다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['docker compose', 'services', 'depends_on', 'healthcheck', 'service DNS', 'expose vs ports', 'named volume', 'reverse proxy'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./v-1-3_compose_basics.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; V-1-3 Compose 기본</a>
              <a href="./v-1-5_compose_network.html" className="text-sky-700 hover:text-sky-900 font-medium">V-1-5 Compose 네트워크 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
