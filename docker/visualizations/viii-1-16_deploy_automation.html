<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — 배포 자동화와 운영 체크리스트</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes flowArrow { 0%{opacity:0.3;} 50%{opacity:1;} 100%{opacity:0.3;} }
    @keyframes checkmark { from{opacity:0;transform:scale(0);} to{opacity:1;transform:scale(1);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-flow { animation: flowArrow 2s ease-in-out infinite; }
    .anim-check { animation: checkmark 0.3s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · GitHub Actions CI/CD 파이프라인 개요",
        desc: "main 브랜치에 코드를 푸시하면 자동으로 이미지 빌드 → ECR 푸시 → EC2 배포가 진행된다. GitHub Actions는 '코드가 올라오면 이것을 해줘'라고 시키는 자동화 도우미다.",
        phase: "overview",
      },
      {
        title: "STEP 2 · 워크플로우 단계별 분석",
        desc: "소스 코드 체크아웃 → AWS 자격 증명 설정 → ECR 로그인 → Docker 이미지 빌드 및 푸시 → EC2 SSH 접속하여 배포. 각 단계는 GitHub Actions의 공식 액션을 활용한다.",
        phase: "workflow",
      },
      {
        title: "STEP 3 · GitHub Secrets 설정",
        desc: "AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, EC2_HOST, EC2_KEY 4개의 Secret을 설정한다. Secrets는 암호화된 금고처럼 민감한 값을 안전하게 보관하고, 워크플로우 실행 시에만 꺼내 쓴다.",
        phase: "secrets",
      },
      {
        title: "STEP 4 · 롤백 전략",
        desc: "github.sha를 이미지 태그로 사용하면 어떤 코드로 만든 이미지인지 정확히 추적할 수 있다. 문제 발생 시 이전 SHA 태그의 이미지로 즉시 롤백이 가능하다. latest만 사용하면 롤백이 어렵다.",
        phase: "rollback",
      },
      {
        title: "STEP 5 · 운영 체크리스트",
        desc: "배포 전(보안 확인) → 배포 중(워크플로우 성공 확인) → 배포 후(헬스체크, 로그 확인) → 운영 중(CPU/메모리, 디스크 용량 모니터링). 체계적인 확인으로 장애를 예방한다.",
        phase: "checklist",
      },
      {
        title: "STEP 6 · 비용 관리와 다음 학습 경로",
        desc: "프리티어 한도를 확인하고, 실습 후 EC2 중지/탄력적 IP 해제/ECR 이미지 삭제로 비용을 절감한다. 규모가 커지면 ECS(Fargate), Kubernetes(EKS), Terraform 순서로 학습한다.",
        phase: "complete",
      },
    ];

    function PipelineOverview() {
      const pipeline = [
        { label: "git push", icon: "📝", desc: "main 브랜치", color: "slate" },
        { label: "GitHub Actions", icon: "🤖", desc: "자동 트리거", color: "blue" },
        { label: "이미지 빌드", icon: "🔨", desc: "docker build", color: "purple" },
        { label: "ECR 푸시", icon: "📤", desc: "docker push", color: "amber" },
        { label: "EC2 배포", icon: "🚀", desc: "docker compose up", color: "emerald" },
      ];
      return (
        <div className="bg-white rounded-xl border-2 border-blue-200 p-6 anim-fade">
          <h4 className="font-bold text-blue-800 mb-4 text-center">CI/CD 파이프라인 전체 흐름</h4>
          <div className="flex items-center justify-between">
            {pipeline.map((p, i) => (
              <React.Fragment key={i}>
                <div className="flex flex-col items-center anim-slide" style={{animationDelay:`${i*0.15}s`}}>
                  <span className="text-3xl mb-1">{p.icon}</span>
                  <span className="text-xs font-bold text-center">{p.label}</span>
                  <span className="text-xs text-slate-500">{p.desc}</span>
                </div>
                {i < pipeline.length - 1 && <div className="text-blue-400 font-bold text-lg anim-flow">→</div>}
              </React.Fragment>
            ))}
          </div>
          <div className="mt-4 bg-blue-50 rounded-lg p-3 text-center text-sm text-blue-700">
            main 브랜치에 코드를 푸시하면 <strong>모든 과정이 자동으로 실행!</strong>
          </div>
        </div>
      );
    }

    function WorkflowView() {
      const steps = [
        { name: "소스 코드 체크아웃", action: "actions/checkout@v4", icon: "📋", desc: "GitHub 리포지토리 코드를 다운로드" },
        { name: "AWS 자격 증명 설정", action: "aws-actions/configure-aws-credentials@v4", icon: "🔐", desc: "GitHub Secrets에서 AWS 키를 읽어 설정" },
        { name: "ECR 로그인", action: "aws-actions/amazon-ecr-login@v2", icon: "🔑", desc: "ECR 레지스트리에 docker login" },
        { name: "이미지 빌드 + ECR 푸시", action: "docker build & push", icon: "📦", desc: "github.sha 태그 + latest 태그로 푸시" },
        { name: "EC2 SSH 배포", action: "appleboy/ssh-action@v1", icon: "🚀", desc: "EC2에 접속하여 docker compose up -d" },
      ];
      return (
        <div className="space-y-3 anim-fade">
          {steps.map((s, i) => (
            <div key={i} className="flex items-center gap-4 bg-white rounded-xl border border-slate-200 p-4 anim-slide" style={{animationDelay:`${i*0.12}s`}}>
              <div className="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-xl flex-shrink-0">{s.icon}</div>
              <div className="flex-1">
                <div className="font-bold text-sm">{s.name}</div>
                <div className="text-xs text-slate-500">{s.desc}</div>
              </div>
              <code className="text-xs text-blue-600 bg-blue-50 px-2 py-1 rounded hidden md:block">{s.action}</code>
            </div>
          ))}
        </div>
      );
    }

    function SecretsView() {
      const secrets = [
        { name: "AWS_ACCESS_KEY_ID", value: "AKIAIOSFODNN7EXAMPLE", desc: "IAM 사용자 Access Key ID", icon: "🔑" },
        { name: "AWS_SECRET_ACCESS_KEY", value: "wJalrX...(숨김)", desc: "IAM 사용자 Secret Access Key", icon: "🔐" },
        { name: "EC2_HOST", value: "13.125.100.200", desc: "EC2 탄력적 IP 주소", icon: "🌐" },
        { name: "EC2_KEY", value: "-----BEGIN RSA PRIVATE KEY-----...", desc: ".pem 파일 내용 전체", icon: "📄" },
      ];
      return (
        <div className="space-y-4 anim-fade">
          <div className="bg-white rounded-xl border-2 border-amber-200 p-5">
            <h4 className="font-bold text-amber-800 mb-1">GitHub Settings → Secrets and variables → Actions</h4>
            <p className="text-xs text-amber-600 mb-4">워크플로우에서 ${'{{ secrets.이름 }}'} 형식으로 참조</p>
            <div className="space-y-3">
              {secrets.map((s, i) => (
                <div key={i} className="flex items-center gap-3 p-3 bg-amber-50 rounded-lg anim-slide" style={{animationDelay:`${i*0.12}s`}}>
                  <span className="text-xl">{s.icon}</span>
                  <div className="flex-1">
                    <div className="font-mono font-bold text-sm text-amber-800">{s.name}</div>
                    <div className="text-xs text-amber-600">{s.desc}</div>
                  </div>
                  <code className="text-xs text-slate-400 bg-slate-100 px-2 py-1 rounded hidden md:block">{s.value}</code>
                </div>
              ))}
            </div>
          </div>
          <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-xs text-blue-700">
            <strong>보안:</strong> Secrets는 암호화되어 저장되며, 로그에 출력되지 않습니다. 코드에 직접 쓰면 누구나 볼 수 있으므로 반드시 Secrets를 사용하세요.
          </div>
        </div>
      );
    }

    function RollbackView() {
      return (
        <div className="space-y-4 anim-fade">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className="bg-red-50 border-2 border-red-200 rounded-xl p-5">
              <h4 className="font-bold text-red-700 mb-3">latest 태그만 사용</h4>
              <div className="space-y-2 text-sm">
                <div className="bg-red-100 px-3 py-2 rounded text-red-700">v1 배포 → latest</div>
                <div className="bg-red-100 px-3 py-2 rounded text-red-700">v2 배포 → latest (v1 사라짐!)</div>
                <div className="bg-red-200 px-3 py-2 rounded text-red-800 font-bold">v2에 버그! → 롤백 불가!</div>
              </div>
            </div>
            <div className="bg-green-50 border-2 border-green-200 rounded-xl p-5">
              <h4 className="font-bold text-green-700 mb-3">github.sha 태그 사용</h4>
              <div className="space-y-2 text-sm">
                <div className="bg-green-100 px-3 py-2 rounded text-green-700">v1 → abc1234 (보관)</div>
                <div className="bg-green-100 px-3 py-2 rounded text-green-700">v2 → def5678 (보관)</div>
                <div className="bg-green-200 px-3 py-2 rounded text-green-800 font-bold">v2에 버그! → abc1234로 롤백!</div>
              </div>
            </div>
          </div>
          <div className="bg-gray-900 rounded-xl p-5 font-mono text-sm">
            <div className="text-gray-500"># EC2에서 이전 버전으로 롤백</div>
            <div className="text-green-300 anim-slide">$ PREVIOUS_SHA=abc1234def5678</div>
            <div className="text-green-300 anim-slide" style={{animationDelay:'0.1s'}}>$ docker pull $ECR_URI:$PREVIOUS_SHA</div>
            <div className="text-green-300 anim-slide" style={{animationDelay:'0.2s'}}>$ APP_IMAGE=$ECR_URI:$PREVIOUS_SHA docker compose up -d --no-deps api</div>
            <div className="text-cyan-300 mt-2 anim-slide" style={{animationDelay:'0.4s'}}>✅ 롤백 완료!</div>
          </div>
        </div>
      );
    }

    function ChecklistView() {
      const [checked, setChecked] = useState({});
      const toggle = (key) => setChecked(prev => ({...prev, [key]: !prev[key]}));

      const sections = [
        {
          title: "배포 전", color: "amber", items: [
            { key: "env", text: ".env 파일이 Git에 커밋되지 않았는가", how: "git status, .gitignore 확인" },
            { key: "port", text: "보안 그룹에서 불필요한 포트가 열려 있지 않은가", how: "AWS 콘솔 보안 그룹 확인" },
            { key: "scan", text: "ECR 이미지에 알려진 취약점이 없는가", how: "ECR 이미지 스캔 결과 확인" },
          ]
        },
        {
          title: "배포 후", color: "blue", items: [
            { key: "health", text: "헬스체크 엔드포인트가 200을 반환하는가", how: "curl http://<IP>/health" },
            { key: "logs", text: "로그에 에러가 없는가", how: "docker compose logs -f" },
            { key: "running", text: "컨테이너가 모두 Running 상태인가", how: "docker compose ps" },
          ]
        },
        {
          title: "운영 중", color: "green", items: [
            { key: "cpu", text: "CPU/메모리 사용량이 정상 범위인가", how: "docker stats" },
            { key: "disk", text: "EBS 디스크 용량이 여유 있는가", how: "df -h" },
            { key: "prune", text: "불필요한 이미지가 디스크를 차지하지 않는가", how: "docker system df → docker image prune" },
          ]
        },
      ];

      return (
        <div className="space-y-4 anim-fade">
          {sections.map((section, si) => {
            const colorMap = {
              amber: { border: "border-amber-200", bg: "bg-amber-50", title: "text-amber-800", check: "accent-amber-600" },
              blue: { border: "border-blue-200", bg: "bg-blue-50", title: "text-blue-800", check: "accent-blue-600" },
              green: { border: "border-green-200", bg: "bg-green-50", title: "text-green-800", check: "accent-green-600" },
            }[section.color];

            return (
              <div key={si} className={`rounded-xl border-2 ${colorMap.border} ${colorMap.bg} p-4 anim-slide`} style={{animationDelay:`${si*0.15}s`}}>
                <h4 className={`font-bold ${colorMap.title} mb-3`}>{section.title}</h4>
                <div className="space-y-2">
                  {section.items.map((item, i) => (
                    <label key={i} className="flex items-start gap-3 bg-white rounded-lg p-3 cursor-pointer hover:bg-opacity-80 transition-all">
                      <input type="checkbox" checked={!!checked[item.key]} onChange={() => toggle(item.key)}
                        className={`mt-0.5 w-4 h-4 ${colorMap.check} rounded`} />
                      <div className="flex-1">
                        <div className={`text-sm ${checked[item.key] ? 'line-through text-slate-400' : 'text-slate-700'}`}>{item.text}</div>
                        <div className="text-xs text-slate-400 mt-0.5">{item.how}</div>
                      </div>
                      {checked[item.key] && <span className="text-green-500 anim-check">✓</span>}
                    </label>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function CompleteView() {
      const costs = [
        { resource: "EC2 t2.micro", free: "750시간/월", over: "~$0.013/시간" },
        { resource: "EBS 스토리지", free: "30GB", over: "~$0.1/GB/월" },
        { resource: "ECR 스토리지", free: "500MB/월", over: "~$0.1/GB/월" },
      ];
      const nextSteps = [
        { tech: "AWS ECS (Fargate)", when: "EC2 관리 없이 컨테이너만 운영하고 싶을 때", icon: "☁️" },
        { tech: "Kubernetes (EKS)", when: "수십 개 이상의 컨테이너를 운영할 때", icon: "⚙️" },
        { tech: "Terraform", when: "인프라를 코드로 관리(IaC)하고 싶을 때", icon: "📐" },
      ];
      return (
        <div className="space-y-4 anim-fade">
          <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6 text-center">
            <div className="text-4xl mb-3">🎉</div>
            <h3 className="text-xl font-bold text-emerald-800 mb-2">CI/CD 파이프라인 + 운영 체크리스트 완성!</h3>
            <div className="flex flex-wrap justify-center gap-2 mt-4">
              {["GitHub Actions", "ECR 자동 푸시", "EC2 자동 배포", "롤백 전략", "운영 체크리스트"].map((item, i) => (
                <span key={i} className="bg-emerald-200 text-emerald-800 px-3 py-1.5 rounded-full text-sm font-medium anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                  {item}
                </span>
              ))}
            </div>
          </div>
          <div className="bg-red-50 border border-red-200 rounded-xl p-4">
            <h4 className="font-bold text-red-700 mb-2">실습 종료 후 정리 (비용 방지)</h4>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
              {["EC2 인스턴스 중지", "탄력적 IP 해제", "ECR 이미지 삭제", "스냅샷 삭제"].map((item, i) => (
                <div key={i} className="bg-white rounded-lg p-2 text-center text-xs text-red-700 font-medium">{item}</div>
              ))}
            </div>
          </div>
          <div className="bg-blue-50 border border-blue-200 rounded-xl p-4">
            <h4 className="font-bold text-blue-800 mb-3">다음 학습 경로</h4>
            <div className="space-y-2">
              {nextSteps.map((n, i) => (
                <div key={i} className="flex items-center gap-3 bg-white rounded-lg p-3 anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                  <span className="text-2xl">{n.icon}</span>
                  <div>
                    <div className="font-bold text-sm text-blue-800">{n.tech}</div>
                    <div className="text-xs text-slate-500">{n.when}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const renderVisual = () => {
        switch(data.phase) {
          case "overview": return <PipelineOverview />;
          case "workflow": return <WorkflowView />;
          case "secrets": return <SecretsView />;
          case "rollback": return <RollbackView />;
          case "checklist": return <ChecklistView />;
          case "complete": return <CompleteView />;
          default: return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VIII-1-16: 배포 자동화와 운영 체크리스트</h1>
              </div>
              <p className="text-slate-500 text-sm">GitHub Actions CI/CD 파이프라인 구축과 운영 체크리스트를 단계별로 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "complete" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "rollback" ? "bg-amber-600 border-amber-700 text-white" :
              data.phase === "checklist" ? "bg-purple-600 border-purple-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            <div key={`visual-${step}`}>{renderVisual()}</div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
