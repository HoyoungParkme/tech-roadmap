<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — docker run 핵심 옵션</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-slide-up { animation: slideUp 0.4s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const OPTIONS = [
      { flag: "-d", label: "백그라운드 실행", icon: "🔄", color: "blue", desc: "컨테이너를 데몬 모드로 실행. 터미널이 블로킹되지 않음" },
      { flag: "-it", label: "인터랙티브 터미널", icon: "⌨️", color: "purple", desc: "컨테이너 내부 셸에 접속. -i(stdin 열기) + -t(TTY 할당)" },
      { flag: "-p", label: "포트 매핑", icon: "🔌", color: "green", desc: "호스트:컨테이너 포트 연결. 외부에서 접속 가능하게 함" },
      { flag: "-v", label: "볼륨 마운트", icon: "💾", color: "amber", desc: "데이터 영속화. 컨테이너 삭제 후에도 데이터 유지" },
      { flag: "--name", label: "이름 지정", icon: "🏷️", color: "cyan", desc: "컨테이너 이름 지정. ID 대신 이름으로 관리 가능" },
      { flag: "-e", label: "환경변수 주입", icon: "🔑", color: "rose", desc: "실행 시점에 환경변수 전달. 비밀번호, API 키 등" },
      { flag: "--rm", label: "종료 시 자동 삭제", icon: "🗑️", color: "orange", desc: "컨테이너 종료 시 자동 삭제. 임시 작업에 유용" },
      { flag: "--restart", label: "재시작 정책", icon: "♻️", color: "teal", desc: "종료 시 자동 재시작. always, unless-stopped, on-failure" },
    ];

    const STEPS = [
      {
        title: "STEP 1 · 옵션 없이 실행하면?",
        desc: "docker run nginx:alpine — 포그라운드에서 실행되고, 터미널이 블로킹된다. 포트도 열리지 않아서 브라우저에서 접속할 수 없다. 이것이 옵션의 필요성을 보여주는 출발점이다.",
        phase: "bare",
        activeOptions: [],
        command: "docker run nginx:alpine",
        scenario: "기본 실행",
      },
      {
        title: "STEP 2 · -d -p --name: 웹 서버 실행",
        desc: "-d로 백그라운드 실행, -p로 포트를 열고, --name으로 이름을 지정한다. 가장 기본적인 서버 실행 조합이다. 브라우저에서 localhost:8080으로 접속할 수 있다.",
        phase: "web",
        activeOptions: ["-d", "-p", "--name"],
        command: "docker run -d --name my-nginx -p 8080:80 nginx:alpine",
        scenario: "웹 서버 (기본)",
      },
      {
        title: "STEP 3 · -e -v: DB 서버 실행",
        desc: "-e로 비밀번호를 주입하고, -v로 데이터를 영속화한다. DB 컨테이너의 필수 조합이다. 볼륨이 없으면 컨테이너 삭제 시 모든 데이터가 사라진다.",
        phase: "db",
        activeOptions: ["-d", "-e", "-v", "--name"],
        command: "docker run -d --name db -e POSTGRES_PASSWORD=secret -v pgdata:/var/lib/postgresql/data postgres:16",
        scenario: "DB 서버",
      },
      {
        title: "STEP 4 · --rm -it: 디버깅/탐색",
        desc: "--rm과 -it를 조합하면 컨테이너에 접속해서 탐색한 후, exit로 나오면 자동 삭제된다. 일회성 디버깅에 최적이다.",
        phase: "debug",
        activeOptions: ["--rm", "-it"],
        command: "docker run --rm -it alpine sh",
        scenario: "디버깅/탐색",
      },
      {
        title: "STEP 5 · 프로덕션 조합: --restart 추가",
        desc: "--restart unless-stopped를 추가하면 서버가 재부팅되어도 컨테이너가 자동으로 다시 시작된다. 단, --rm과 --restart는 동시에 사용할 수 없다 (서로 모순).",
        phase: "production",
        activeOptions: ["-d", "--name", "-p", "-v", "-e", "--restart"],
        command: "docker run -d --name web -p 80:80 --restart unless-stopped -v data:/app/data -e APP_ENV=prod myapp:latest",
        scenario: "프로덕션 서버",
      },
      {
        title: "STEP 6 · 시나리오별 옵션 조합 정리",
        desc: "실무에서 자주 쓰는 조합은 정해져 있다. 웹 서버는 -d + -p + --restart, DB는 -d + -e + -v, 디버깅은 --rm + -it. 상황에 맞는 조합을 기억하면 된다.",
        phase: "summary",
        activeOptions: [],
        command: "",
        scenario: "전체 정리",
      },
    ];

    const SCENARIOS = [
      { name: "웹 서버 (프로덕션)", cmd: "docker run -d --name web -p 80:80 --restart unless-stopped nginx:alpine", opts: ["-d", "--name", "-p", "--restart"] },
      { name: "DB 서버 (개발)", cmd: "docker run -d --name db -e POSTGRES_PASSWORD=dev -v pgdata:/var/lib/postgresql/data postgres:16", opts: ["-d", "--name", "-e", "-v"] },
      { name: "컨테이너 내부 탐색", cmd: "docker run --rm -it alpine sh", opts: ["--rm", "-it"] },
      { name: "개발 서버 (핫 리로드)", cmd: "docker run -d --name dev -p 3000:3000 -v $(pwd):/app myapp:dev", opts: ["-d", "--name", "-p", "-v"] },
    ];

    function OptionBadge({ opt, isActive, delay }) {
      const info = OPTIONS.find(o => o.flag === opt);
      if (!info) return null;
      const colors = {
        blue: "bg-blue-100 border-blue-400 text-blue-800",
        purple: "bg-purple-100 border-purple-400 text-purple-800",
        green: "bg-green-100 border-green-400 text-green-800",
        amber: "bg-amber-100 border-amber-400 text-amber-800",
        cyan: "bg-cyan-100 border-cyan-400 text-cyan-800",
        rose: "bg-rose-100 border-rose-400 text-rose-800",
        orange: "bg-orange-100 border-orange-400 text-orange-800",
        teal: "bg-teal-100 border-teal-400 text-teal-800",
      };
      return (
        <div className={`anim-slide-up inline-flex items-center gap-1.5 px-3 py-2 rounded-lg border-2 font-mono text-sm font-bold transition-all duration-300 ${
          isActive ? colors[info.color] + " shadow-md scale-105" : "bg-slate-50 border-slate-200 text-slate-400"
        }`} style={{ animationDelay: `${delay * 0.08}s` }}>
          <span>{info.icon}</span>
          <span>{info.flag}</span>
        </div>
      );
    }

    function TerminalBlock({ command }) {
      if (!command) return null;
      return (
        <div className="bg-slate-900 rounded-xl p-4 font-mono text-sm anim-fade">
          <div className="flex items-center gap-2 mb-2">
            <div className="w-3 h-3 rounded-full bg-red-500"></div>
            <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div className="w-3 h-3 rounded-full bg-green-500"></div>
            <span className="text-slate-500 text-xs ml-2">Terminal</span>
          </div>
          <div className="text-green-400">
            <span className="text-slate-500">$ </span>{command}
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VIII-1-1: docker run 핵심 옵션 총정리</h1>
              </div>
              <p className="text-slate-500 text-sm">docker run의 주요 옵션을 상황에 맞게 조합하는 방법을 단계별로 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "summary" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "bare" ? "bg-red-600 border-red-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 옵션 배지 그리드 */}
            <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
              <h4 className="text-sm font-bold text-slate-600 mb-3">docker run 옵션 패널</h4>
              <div className="flex flex-wrap gap-2">
                {OPTIONS.map((opt, i) => (
                  <OptionBadge key={`${opt.flag}-${step}`} opt={opt.flag} isActive={data.activeOptions.includes(opt.flag)} delay={i} />
                ))}
              </div>
              {data.activeOptions.length > 0 && (
                <div className="mt-4 space-y-2 anim-fade">
                  {data.activeOptions.map(f => {
                    const info = OPTIONS.find(o => o.flag === f);
                    return info ? (
                      <div key={f} className="flex items-center gap-2 text-sm text-slate-600">
                        <span className="font-mono font-bold text-blue-600 w-24">{info.flag}</span>
                        <span>{info.desc}</span>
                      </div>
                    ) : null;
                  })}
                </div>
              )}
            </div>

            {/* 터미널 */}
            {data.command && <TerminalBlock command={data.command} />}

            {/* 시나리오 비교 (마지막 단계) */}
            {data.phase === "summary" && (
              <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6 anim-fade">
                <h3 className="text-lg font-bold text-emerald-800 mb-4 text-center">시나리오별 옵션 조합</h3>
                <div className="space-y-3">
                  {SCENARIOS.map((sc, i) => (
                    <div key={i} className="bg-white rounded-lg p-4 border border-emerald-200 anim-slide" style={{animationDelay:`${i*0.15}s`}}>
                      <div className="font-bold text-slate-800 mb-1">{sc.name}</div>
                      <div className="flex flex-wrap gap-1.5 mb-2">
                        {sc.opts.map(o => {
                          const info = OPTIONS.find(op => op.flag === o);
                          return <span key={o} className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs font-mono font-bold">{o}</span>;
                        })}
                      </div>
                      <code className="text-xs text-slate-500 break-all">{sc.cmd}</code>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* 충돌 경고 */}
            {data.phase === "production" && (
              <div className="bg-red-50 border border-red-200 rounded-xl p-4 text-center anim-fade">
                <span className="text-red-600 font-bold">⚠ --rm과 --restart는 동시 사용 불가!</span>
                <p className="text-red-500 text-sm mt-1">--rm은 "종료 시 삭제", --restart는 "종료 시 재시작" — 서로 모순됨</p>
              </div>
            )}

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
