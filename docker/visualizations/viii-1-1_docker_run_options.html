              각 옵션이 컨테이너에 어떤 효과(분리/포트연결/볼륨/환경변수/생명주기)를
              주는지를 좌측 시각화로 즉시 본다.
    핵심 비유: 가전제품 옵션 — 본체(이미지)는 같아도 옵션 조합으로 용도가 달라진다
    패턴: fastapi v1 — 좌(LiveDataPane: 명령어 박스 + 컨테이너 효과) / 우(VSCode CodeViewer)
    색상: docker sky
  -->

    ];

    // ─────────────────────────────────────────────────────
    // 좌측 상단: docker run 명령어 컬러 토큰 박스
    //   토큰 타입별로 색상을 다르게 칠해서 옵션 구조를 한눈에 본다
    //     cmd  : 흰배경 + 슬레이트
    //     flag : sky (파란색) — -d, -p, --name 등
    //     val  : 앰버 — flag 의 값
    //     img  : 에메랄드 — 이미지명
    //     cont : 보라 — 컨테이너 안에서 실행할 명령(예: sh)
    // ─────────────────────────────────────────────────────
    function CommandBox({ command, phase }) {
      const tokenStyle = (t) => {
        switch (t) {
          case 'cmd':  return 'text-slate-200 font-bold';
          case 'flag': return 'text-sky-300 font-bold';
          case 'val':  return 'text-amber-300';
          case 'img':  return 'text-emerald-300 font-bold';
          case 'cont': return 'text-fuchsia-300';
          default:     return 'text-slate-200';
        }
      };
      const tokenLabel = {
        cmd: 'cmd', flag: 'flag', val: 'value', img: 'image', cont: 'in-cont',
      };
      return (
        <div className="rounded-lg border-2 border-slate-700 bg-slate-900 p-3 shadow-md">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="w-2.5 h-2.5 rounded-full bg-red-500"></span>
              <span className="w-2.5 h-2.5 rounded-full bg-yellow-500"></span>
              <span className="w-2.5 h-2.5 rounded-full bg-green-500"></span>
              <span className="text-[10px] text-slate-400 font-mono ml-1">terminal</span>
            </div>
            <span className="text-[9px] px-1.5 py-0.5 rounded font-mono font-bold bg-sky-700 text-white uppercase">
              {phase}
            </span>
          </div>

          <div className="font-mono text-[12px] leading-6 break-words">
            <span className="text-slate-500 select-none">$ </span>
            {command.map((tok, i) => (
              <span key={i} className={`${tokenStyle(tok.t)} mr-1.5`}>
                {tok.v}
              </span>
            ))}
          </div>

          {/* 범례 — flag/value/image/in-container 컬러 토큰 */}
          <div className="mt-2 pt-2 border-t border-slate-700 flex flex-wrap gap-2 text-[9px] font-mono text-slate-400">
            <span className="text-sky-300 font-bold">■ flag</span>
            <span className="text-amber-300 font-bold">■ value</span>
            <span className="text-emerald-300 font-bold">■ image</span>
            <span className="text-fuchsia-300 font-bold">■ in-container</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙: 호스트 ↔ 컨테이너 효과 박스
    //   detach (Step 1): 터미널 상태(blocked / freed)
    //   port   (Step 2): 호스트 포트 ↔ 컨테이너 포트 화살표
    //   volume (Step 3): 호스트 볼륨 ↔ 컨테이너 경로
    //   env-name-rm (Step 4): 이름 라벨 + env 카드 + --rm 배지
    //   restart (Step 5): crash → restart 사이클 시각화
    // ─────────────────────────────────────────────────────
    function EffectBox({ step }) {
      const {
        phase, image, nameSet, detach, portMap, volumeMap, envVars,
        autoRm, restart, crashOnce,
      } = step;

      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🛠️</span>
              <span className="text-[11px] font-bold text-slate-700">옵션이 컨테이너에 미치는 효과</span>
            </div>
            <span className="text-[9px] px-1.5 py-0.5 rounded font-mono bg-slate-100 text-slate-500">
              host ↔ container
            </span>
          </div>

          {/* 호스트 ─ 컨테이너 그림 */}
          <div className="grid grid-cols-2 gap-2">
            {/* 호스트 */}
            <HostPane
              phase={phase}
              detach={detach}
              portMap={portMap}
              volumeMap={volumeMap}
            />
            {/* 컨테이너 */}
            <ContainerPane
              phase={phase}
              image={image}
              nameSet={nameSet}
              portMap={portMap}
              volumeMap={volumeMap}
              envVars={envVars}
              autoRm={autoRm}
              restart={restart}
              crashOnce={crashOnce}
            />
          </div>

          {/* 단계별 추가 시각화 (재시작 사이클 / --rm 모순 등) */}
          {phase === 'restart' && (
            <div className="mt-2 rounded border border-emerald-300 bg-emerald-50 px-2 py-1.5 text-[10px] leading-tight text-emerald-800">
              <span className="font-bold">♻ 자동 재시작 사이클</span>
              <div className="font-mono text-[9px] mt-1 text-emerald-700">
                running → <span className="text-rose-600 font-bold">crash</span> → docker daemon detect → <span className="text-emerald-700 font-bold">restart</span> → running
              </div>
            </div>
          )}

          {phase === 'env-name-rm' && (
            <div className="mt-2 rounded border border-rose-200 bg-rose-50 px-2 py-1.5 text-[10px] leading-tight text-rose-800">
              <span className="font-bold">⚠ --rm + --restart 동시 사용 불가</span>
              <div className="text-[9px] mt-0.5 text-rose-700">
                "죽으면 지운다" vs "죽으면 살린다" — docker가 거부한다
              </div>
            </div>
          )}
        </div>
      );
    }

    // 호스트 측 — 터미널/포트/볼륨 소스
    function HostPane({ phase, detach, portMap, volumeMap }) {
      return (
        <div className="rounded-lg border-2 border-slate-300 bg-slate-50 p-2">
          <div className="text-[10px] font-bold text-slate-700 mb-1 flex items-center gap-1">
            <span>💻</span><span>Host</span>
          </div>

          {/* 터미널 상태 */}
          <div className={`rounded border px-1.5 py-1 text-[9px] font-mono mb-1 ${
            detach
              ? 'bg-emerald-50 border-emerald-300 text-emerald-800'
              : 'bg-rose-50 border-rose-300 text-rose-800'
          }`}>
            <div className="font-bold">terminal</div>
            <div className="text-[8px] leading-tight">
              {detach ? '✓ free (즉시 복귀)' : '✗ blocked (로그 흐름)'}
            </div>
          </div>

          {/* 포트 */}
          {portMap ? (
            <div className="rounded border-2 border-sky-400 bg-sky-50 px-1.5 py-1 text-[10px] mb-1">
              <div className="font-bold text-sky-800">port :{portMap.host}</div>
              <div className="text-[8px] text-sky-700 font-mono">→ container:{portMap.container}</div>
            </div>
          ) : (
            <div className="rounded border border-dashed border-slate-300 bg-white px-1.5 py-1 text-[9px] text-slate-400 mb-1">
              port: 닫힘 (외부 차단)
            </div>
          )}

          {/* 볼륨 소스 */}
          {volumeMap ? (
            <div className="rounded border-2 border-amber-400 bg-amber-50 px-1.5 py-1 text-[10px]">
              <div className="font-bold text-amber-800">
                {volumeMap.kind === 'named' ? `🗄 ${volumeMap.src}` : `📁 ${volumeMap.src}`}
              </div>
              <div className="text-[8px] text-amber-700 font-mono leading-tight">
                {volumeMap.kind === 'named' ? 'named volume' : 'bind mount'}
              </div>
            </div>
          ) : (
            <div className="rounded border border-dashed border-slate-300 bg-white px-1.5 py-1 text-[9px] text-slate-400">
              volume: 없음 (휘발)
            </div>
          )}
        </div>
      );
    }

    // 컨테이너 측 — 이름/이미지/포트/볼륨/env/생명주기
    function ContainerPane({ phase, image, nameSet, portMap, volumeMap, envVars, autoRm, restart, crashOnce }) {
      return (
        <div className={`rounded-lg border-2 p-2 transition-all duration-500 ${
          phase === 'detach' ? 'border-sky-400 bg-sky-50' : 'border-sky-300 bg-sky-50/60'
        }`}>
          <div className="flex items-center justify-between mb-1">
            <div className="text-[10px] font-bold text-sky-800 flex items-center gap-1">
              <span>🐳</span><span>Container</span>
            </div>
            {autoRm && (
              <span className="text-[8px] bg-orange-600 text-white px-1 rounded font-mono font-bold">
                --rm
              </span>
            )}
            {restart && (
              <span className="text-[8px] bg-emerald-600 text-white px-1 rounded font-mono font-bold">
                ♻ {restart}
              </span>
            )}
          </div>

          {/* 이름 + 이미지 */}
          <div className="rounded bg-white border border-sky-300 px-1.5 py-1 mb-1">
            <div className="text-[9px] font-mono text-sky-700">
              <span className="text-slate-500">name:</span>{' '}
              <span className={`font-bold ${nameSet ? 'text-sky-800' : 'text-slate-400'}`}>
                {nameSet || '(random)'}
              </span>
            </div>
            <div className="text-[9px] font-mono text-emerald-700 leading-tight">
              <span className="text-slate-500">image:</span> <span className="font-bold">{image}</span>
            </div>
          </div>

          {/* 포트 LISTEN */}
          {portMap && (
            <div className="rounded bg-white border border-sky-300 px-1.5 py-1 text-[9px] mb-1">
              <span className="text-slate-500">listen:</span>{' '}
              <span className="font-mono font-bold text-sky-700">:{portMap.container}</span>
              <span className="text-emerald-600 ml-1">✓ reachable</span>
            </div>
          )}

          {/* 볼륨 마운트 */}
          {volumeMap && (
            <div className="rounded bg-white border border-amber-300 px-1.5 py-1 text-[9px] mb-1">
              <span className="text-slate-500">mount:</span>{' '}
              <div className="font-mono text-amber-800 leading-tight break-all">{volumeMap.dst}</div>
              <div className="text-[8px] text-amber-600">↑ {volumeMap.src}</div>
            </div>
          )}

          {/* 환경변수 */}
          {envVars && envVars.length > 0 && (
            <div className="rounded bg-white border border-rose-300 px-1.5 py-1 text-[9px] mb-1">
              <div className="font-bold text-rose-700 mb-0.5">env (-e)</div>
              {envVars.map((e, i) => (
                <div key={i} className="font-mono leading-tight">
                  <span className="text-rose-700">{e.k}</span>
                  <span className="text-slate-500">=</span>
                  <span className="text-slate-700">{e.mask ? '••••••' : e.v}</span>
                </div>
              ))}
            </div>
          )}

          {/* 생명주기 표시 */}
          <div className={`rounded px-1.5 py-1 text-[9px] font-mono font-bold ${
            phase === 'restart' && crashOnce
              ? 'bg-emerald-600 text-white'
              : 'bg-sky-600 text-white'
          }`}>
            STATUS: {phase === 'restart' && crashOnce ? 'Restarting → Up' : 'Up'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 명령어 박스 (옵션이 어떻게 조합되는지 토큰화)
    //   하단: 효과 박스 (host ↔ container)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 docker run 명령어 → 컨테이너 효과</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <CommandBox command={step.command} phase={step.phase} />

            <div className="text-center">
              <span className="text-xs font-mono text-sky-600 font-bold">
                ↓ 컨테이너에 적용
              </span>
            </div>

            <EffectBox step={step} />
          </div>

          {/* 단계별 옵션 요약 칩 */}
          <div className="flex flex-wrap gap-1.5 mt-3 pt-2 border-t border-slate-100">
            <FlagChip flag="-d"        active={step.detach} />
            <FlagChip flag="-p"        active={!!step.portMap} />
            <FlagChip flag="-v"        active={!!step.volumeMap} />
            <FlagChip flag="-e"        active={step.envVars && step.envVars.length > 0} />
            <FlagChip flag="--name"    active={!!step.nameSet} />
            <FlagChip flag="--rm"      active={step.autoRm} />
            <FlagChip flag="--restart" active={!!step.restart} />
          </div>
        </div>
      );
    }

    function FlagChip({ flag, active }) {
      return (
        <span className={`text-[10px] font-mono px-1.5 py-0.5 rounded border transition ${
          active
            ? 'bg-sky-600 text-white border-sky-700 font-bold shadow-sm'
            : 'bg-slate-50 text-slate-400 border-slate-200'
        }`}>
          {flag}
        </span>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭 + 윈도우 dot + 라인 번호 + 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      // 5개 .sh 파일 탭 — 현재 파일을 강조
      const tabs = ['detach.sh', 'port.sh', 'volume.sh', 'env-name-rm.sh', 'restart.sh'];

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 (5개 가로) */}
          <div className="bg-[#21252b] flex items-center gap-0 border-b border-slate-700 overflow-x-auto">
            <div className="flex gap-1.5 px-3 py-2 flex-shrink-0">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <div className="flex flex-1">
              {tabs.map((tab) => {
                const active = tab === code.filename;
                return (
                  <div
                    key={tab}
                    className={`text-[10px] font-mono px-3 py-2 border-r border-slate-700 transition whitespace-nowrap ${
                      active
                        ? 'bg-[#282c34] text-sky-300 font-bold border-t-2 border-t-sky-400'
                        : 'text-slate-500'
                    }`}
                  >
                    {tab}
                  </div>
                );
              })}
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase px-3 py-2 flex-shrink-0">
              {code.lang}
            </span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => setStepIdx((i) => {
        if (i >= STEPS.length - 1) { setIsPlaying(false); return i; }
        return i + 1;
      });
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };
      const handleReset = () => { setStepIdx(0); setIsPlaying(false); };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VIII-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex items-center gap-3">
              <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm flex-shrink-0">D</div>
              <div>
                <div className="text-xs text-slate-500 font-medium">Part VIII. Docker 실전 명령 &gt; Chapter 1. docker run</div>
                <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-1-1. docker run 핵심 옵션 — -d / -p / -v / -e / --name / --rm / --restart</h1>
                <p className="text-sm text-slate-500 mt-0.5">옵션 7개를 5단계로 쌓아 올리며, 각 옵션이 컨테이너에 어떤 효과를 주는지 좌측에서 즉시 본다</p>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: 운영은 <strong>-d --restart unless-stopped --name -p -v -e</strong> 6종 세트가 사실상 표준. 디버깅은 <strong>--rm -it</strong>. <strong>--rm 과 --restart 는 동시 사용 불가</strong>. 다음(VIII-1-2)에서는 docker exec/logs/inspect 운영 명령을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              {(() => {
                const grayBtn = "px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition";
                return (
                  <>
                    <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로" className={grayBtn}>처음</button>
                    <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계" className={grayBtn}>&larr; 이전</button>
                    <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                      className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]">
                      {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
                    </button>
                    <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계" className={grayBtn}>다음 &rarr;</button>
                  </>
                );
              })()}
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['docker run', '-d detach', '-p port', '-v volume', '-e env', '--name', '--rm', '--restart unless-stopped'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 목록</a>
              <a href="./viii-1-2_docker_exec_logs_inspect.html" className="text-sky-700 hover:text-sky-900 font-medium">VIII-1-2 exec / logs / inspect &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
