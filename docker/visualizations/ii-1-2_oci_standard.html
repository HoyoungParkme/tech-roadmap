        code: {

            'ctr run --rm docker.io/me/myapp:1.0 demo',

            '',
            '# ─── 5) cri-o 로 실행 (k8s 전용 경량 런타임) ───',

    // ─────────────────────────────────────────────────────
    // 좌측 위: 3 Spec 박스 (Image / Runtime / Distribution)
    //   activeSpec 값에 따라 해당 박스가 sky 색으로 강조,
    //   step별 보조 데이터(샘플)도 함께 표시한다.
    // ─────────────────────────────────────────────────────
    function SpecBoxes({ step }) {
      const isActive = (key) => step.activeSpec === key || step.activeSpec === 'all';

      const renderImageBody = () => {
        if (step.activeSpec !== 'image') return null;
        return (
          <div className="mt-2 bg-white rounded border border-sky-200 p-2">
            <div className="text-[9px] font-bold text-sky-700 mb-1 uppercase tracking-wider">manifest 구조</div>
            <div className="space-y-1">
              {step.manifestSample.map((m, i) => (
                <div key={i} className="text-[9px] font-mono leading-tight flex items-center gap-1.5">
                  <span className="bg-sky-600 text-white px-1 py-0.5 rounded font-bold w-14 text-center text-[8px]">
                    {m.type}
                  </span>
                  <span className="text-slate-500 w-12 text-right">{m.size}</span>
                  <span className="text-sky-800 flex-1 truncate">{m.desc}</span>
                </div>
              ))}
            </div>
          </div>
        );
      };

      const renderRuntimeBody = () => {
        if (step.activeSpec !== 'runtime') return null;
        return (
          <div className="mt-2 bg-white rounded border border-sky-200 p-2">
            <div className="text-[9px] font-bold text-sky-700 mb-1 uppercase tracking-wider">runtime bundle</div>
            <div className="space-y-1">
              {step.runtimeBundle.map((b, i) => (
                <div key={i} className="text-[9px] leading-tight flex items-start gap-1.5">
                  <span className={`px-1 py-0.5 rounded font-bold text-[8px] w-20 text-center font-mono ${
                    b.kind === 'config' ? 'bg-sky-600 text-white' : 'bg-emerald-500 text-white'
                  }`}>
                    {b.name}
                  </span>
                  <span className="text-slate-700 flex-1">{b.desc}</span>
                </div>
              ))}
            </div>
          </div>
        );
      };

      const renderDistributionBody = () => {
        if (step.activeSpec !== 'distribution') return null;
        return (
          <div className="mt-2 bg-white rounded border border-sky-200 p-2 max-h-44 overflow-y-auto">
            <div className="text-[9px] font-bold text-sky-700 mb-1 uppercase tracking-wider">push 흐름</div>
            <div className="space-y-1">
              {step.registryFlow.map((r, i) => (
                <div key={i} className="text-[9px] font-mono leading-tight flex items-center gap-1">
                  <span className={`px-1 py-0.5 rounded text-white font-bold w-12 text-center text-[8px] ${
                    r.method === 'GET' ? 'bg-emerald-600' :
                    r.method === 'POST' ? 'bg-amber-600' :
                    r.method === 'PATCH' ? 'bg-orange-600' :
                    'bg-sky-700'
                  }`}>{r.method}</span>
                  <span className="text-sky-800 truncate flex-1">{r.path}</span>
                </div>
              ))}
            </div>
          </div>
        );
      };

      const SpecCard = ({ id, icon, label, version, body }) => {
        const active = isActive(id);
        return (
          <div className={`rounded-lg p-3 transition-all duration-500 ${
            active
              ? 'bg-sky-50 border-2 border-sky-400 shadow-md ring-2 ring-sky-200'
              : 'bg-slate-50 border-2 border-slate-200 opacity-60'
          }`}>
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-1.5">
                <span className="text-base">{icon}</span>
                <span className={`text-[11px] font-bold ${active ? 'text-sky-800' : 'text-slate-500'}`}>{label}</span>
              </div>
              <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
                active ? 'bg-sky-600 text-white' : 'bg-slate-300 text-slate-600'
              }`}>
                {version}
              </span>
            </div>
            {active && body}
          </div>
        );
      };

      return (
        <div className="bg-white rounded-lg border-2 border-sky-200 p-3">
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📐</span>
              <span className="text-[11px] font-bold text-sky-800">OCI 3대 Specification</span>
            </div>
            <span className="text-[9px] bg-sky-100 text-sky-700 px-1.5 py-0.5 rounded font-mono">
              opencontainers/...
            </span>
          </div>

          <div className="space-y-2">
            <SpecCard id="image" icon="🖼️" label="Image Specification" version="v1.1.0"
                      body={renderImageBody()} />
            <SpecCard id="runtime" icon="⚙️" label="Runtime Specification" version="v1.1.0"
                      body={renderRuntimeBody()} />
            <SpecCard id="distribution" icon="🌐" label="Distribution Specification" version="v1.1.0"
                      body={renderDistributionBody()} />
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: OCI 호환 도구 카드
    //   step에 따라 단순 나열 → step5에서 한 이미지가 4개 도구로 fan-out 시각화
    // ─────────────────────────────────────────────────────
    function CompatTools({ step }) {
      const tools = [
        { id: 'docker', name: 'Docker', icon: '🐳', role: 'Build + Run', tone: 'sky' },
        { id: 'podman', name: 'Podman', icon: '🦭', role: 'daemonless Run', tone: 'purple' },
        { id: 'containerd', name: 'containerd', icon: '📦', role: 'k8s 노드 표준', tone: 'cyan' },
        { id: 'crio', name: 'cri-o', icon: '☸️', role: 'OpenShift 전용', tone: 'orange' },
      ];

      // step 1~4: 각 도구의 역할만 회색 카드로
      // step 5: 빌드된 이미지가 가운데, 4개 도구로 화살표 분기
      if (!step.toolsActive) {
        return (
          <div className="bg-white rounded-lg border-2 border-sky-100 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">🛠️</span>
                <span className="text-[11px] font-bold text-sky-800">OCI 호환 도구</span>
              </div>
              <span className="text-[9px] bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded font-mono">대기</span>
            </div>
            <div className="grid grid-cols-2 gap-2">
              {tools.map((t) => (
                <div key={t.id} className="bg-slate-50 border border-slate-200 rounded p-2 text-center opacity-70">
                  <div className="text-xl mb-0.5">{t.icon}</div>
                  <div className="text-[10px] font-bold text-slate-700">{t.name}</div>
                  <div className="text-[9px] text-slate-500 leading-tight">{t.role}</div>
                </div>
              ))}
            </div>
            <div className="text-[9px] text-slate-500 mt-2 text-center italic">
              Step 5에서 한 이미지가 4 도구 모두에서 실행되는 모습을 본다
            </div>
          </div>
        );
      }

      const toneMap = {
        sky:    'border-sky-400 bg-sky-50 text-sky-800',
        purple: 'border-purple-400 bg-purple-50 text-purple-800',
        cyan:   'border-cyan-400 bg-cyan-50 text-cyan-800',
        orange: 'border-orange-400 bg-orange-50 text-orange-800',
      };

      return (
        <div className="bg-white rounded-lg border-2 border-sky-300 p-3 shadow-md">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🚀</span>
              <span className="text-[11px] font-bold text-sky-800">한 이미지 → 모든 런타임</span>
            </div>
            <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold animate-pulse">
              compatible
            </span>
          </div>

          {/* 빌드된 이미지 노드 */}
          <div className="bg-sky-100 border-2 border-sky-500 rounded-lg p-2 text-center mb-2">
            <div className="text-[9px] text-sky-700 font-mono mb-0.5">{step.compatibility.built}</div>
            <div className="text-[11px] font-bold text-sky-900">{step.compatibility.image}</div>
            <div className="text-[8px] text-sky-600 mt-0.5 font-mono">manifest + config + 3 layers</div>
          </div>

          {/* 분기 화살표 */}
          <div className="text-center text-sky-500 text-[10px] font-mono mb-2">↓ pull · run ↓</div>

          {/* 4개 런타임 */}
          <div className="grid grid-cols-4 gap-1.5">
            {tools.map((t) => (
              <div key={t.id} className={`rounded-lg border-2 p-2 text-center ${toneMap[t.tone]} shadow-sm`}>
                <div className="text-lg">{t.icon}</div>
                <div className="text-[10px] font-bold mt-0.5">{t.name}</div>
                <div className="text-[8px] opacity-80 leading-tight">{t.role}</div>
                <div className="text-[8px] mt-1 bg-emerald-500 text-white rounded px-1 font-bold">✓ run</div>
              </div>
            ))}
          </div>

          <div className="text-[9px] text-sky-700 mt-2 text-center font-medium">
            ✨ 빌드 도구 ≠ 실행 도구라도 OCI 표준 덕분에 호환 보장
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 1 전용: OCI 도입 타임라인
    // ─────────────────────────────────────────────────────
    function HistoryTimeline({ timeline }) {
      const tone = (k) =>
        k === 'docker' ? 'bg-sky-100 border-sky-400 text-sky-800' :
        k === 'fork'   ? 'bg-amber-100 border-amber-400 text-amber-800' :
        k === 'oci'    ? 'bg-emerald-100 border-emerald-500 text-emerald-900' :
                         'bg-slate-100 border-slate-300 text-slate-700';
      return (
        <div className="bg-white rounded-lg border-2 border-sky-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📅</span>
              <span className="text-[11px] font-bold text-sky-800">OCI 표준 출범 타임라인</span>
            </div>
            <span className="text-[9px] bg-sky-100 text-sky-700 px-1.5 py-0.5 rounded font-mono">2013 → 2020</span>
          </div>
          <div className="space-y-1.5">
            {timeline.map((t, i) => (
              <div key={i} className={`flex items-center gap-2 px-2 py-1.5 rounded border-2 ${tone(t.tone)}`}>
                <span className="font-mono font-bold text-[11px] w-12">{t.year}</span>
                <span className="text-[10px] flex-1 leading-tight">{t.event}</span>
              </div>
            ))}
          </div>
          <div className="text-[9px] text-slate-500 mt-2 text-center italic">
            🔌 USB Type-C 처럼 단자를 통일했다 — 케이블 한 개로 모든 기기를
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 3 Spec 박스 (Step 1에서는 타임라인 노출)
    //   하단: 호환 도구 카드
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📦 OCI 표준 — 3 Spec 동시 시뮬레이션</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            {step.activeSpec === null
              ? <HistoryTimeline timeline={step.timeline} />
              : <SpecBoxes step={step} />
            }
            <CompatTools step={step} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>active spec
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-300"></span>대기
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>호환 OK
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-amber-500"></span>분열기
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    //   파일명 탭: image-spec.json / runtime-spec.json /
    //              distribution-spec.md / compatibility.sh / oci-overview.md
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="./index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 컨테이너 생태계 &gt; Chapter 1. 표준</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-1-2. OCI 표준 — Image / Runtime / Distribution</h1>
                  <p className="text-sm text-slate-500 mt-0.5">한 이미지를 모든 런타임에서 — Docker 독점을 끝낸 3 Spec</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>Image Spec</strong> 으로 형식 통일, <strong>Runtime Spec</strong> 으로 실행 통일, <strong>Distribution Spec</strong> 으로 전송 통일. 결과 — Docker · Podman · containerd · cri-o 어디서든 같은 이미지를 쓴다. 다음(II-1-3)에서는 레지스트리 운영을 깊이 본다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['OCI', 'Image Spec', 'Runtime Spec', 'Distribution Spec', 'manifest', 'runC', 'containerd', 'Podman'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./ii-1-1_container_tools.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; II-1-1 컨테이너 도구</a>
              <a href="./ii-1-3_registry.html" className="text-sky-700 hover:text-sky-900 font-medium">II-1-3 Registry &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
