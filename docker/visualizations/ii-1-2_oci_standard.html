<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — OCI 표준</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes flowDown { from{opacity:0;transform:translateY(-10px);} to{opacity:1;transform:translateY(0);} }
    @keyframes spread { from{opacity:0;transform:scale(0.8);} to{opacity:1;transform:scale(1);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-flow { animation: flowDown 0.4s ease-out forwards; }
    .anim-spread { animation: spread 0.4s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · 충전기 혼란 시대",
        desc: "예전에는 제조사마다 충전 단자가 달랐다. 삼성, LG, 소니 각각 다른 규격. 가방에 충전기를 여러 개 넣어 다녀야 했다. 컨테이너 세계 초기에도 같은 혼란이 있었다.",
        phase: "chaos",
      },
      {
        title: "STEP 2 · USB-C 통일 = OCI 표준",
        desc: "USB Type-C가 나오면서 하나의 케이블로 모든 기기를 충전할 수 있게 되었다. 컨테이너에서는 2015년 OCI(Open Container Initiative) 표준이 이 역할을 한다. Docker, CoreOS 등이 모여 만들었다.",
        phase: "standard",
      },
      {
        title: "STEP 3 · OCI Image Specification",
        desc: "컨테이너 이미지를 어떻게 저장하고 배포할지 정의하는 표준이다. 이 규격을 따르면 어떤 도구로 만든 이미지든 어떤 레지스트리에 저장할 수 있다. Docker 이미지를 GitHub Container Registry에 올릴 수 있는 이유가 바로 이것이다.",
        phase: "image_spec",
      },
      {
        title: "STEP 4 · OCI Runtime Specification",
        desc: "컨테이너를 어떻게 실행할지 정의하는 표준이다. 파일시스템 구조, 프로세스 설정, 자원 제한 등을 규정한다. 이 규격을 따르면 어떤 런타임에서든 컨테이너를 실행할 수 있다.",
        phase: "runtime_spec",
      },
      {
        title: "STEP 5 · OCI 호환성 데모",
        desc: "docker build로 만든 이미지를 Docker, Podman, containerd(쿠버네티스), CRI-O 어디에서든 실행할 수 있다. 이미지를 만든 도구와 실행하는 도구가 달라도 된다. 이것이 OCI의 힘이다.",
        phase: "compat",
      },
      {
        title: "STEP 6 · 핵심 정리",
        desc: "OCI = 컨테이너의 USB 규격. Image Spec으로 이미지 형식을 통일하고, Runtime Spec으로 실행 방식을 통일했다. 덕분에 컨테이너 생태계의 모든 도구가 서로 호환된다.",
        phase: "summary",
      },
    ];

    /* -- 충전기 혼란 시각화 -- */
    function ChaosView() {
      const chargers = [
        { brand: "삼성", port: "Micro USB", color: "bg-blue-100 border-blue-300" },
        { brand: "LG", port: "독자 규격", color: "bg-red-100 border-red-300" },
        { brand: "소니", port: "독자 규격", color: "bg-purple-100 border-purple-300" },
        { brand: "애플", port: "Lightning", color: "bg-slate-100 border-slate-300" },
      ];
      const containers = [
        { tool: "Docker", format: "Docker 이미지", color: "bg-blue-100 border-blue-300" },
        { tool: "rkt", format: "ACI 이미지", color: "bg-orange-100 border-orange-300" },
        { tool: "LXC", format: "LXC 이미지", color: "bg-green-100 border-green-300" },
      ];
      return (
        <div className="grid grid-cols-2 gap-4 anim-fade">
          <div className="bg-white rounded-xl border border-slate-200 p-4">
            <h4 className="text-sm font-bold text-slate-700 mb-3">🔌 충전기 혼란</h4>
            <div className="space-y-2">
              {chargers.map((c, i) => (
                <div key={i} className={`flex items-center justify-between px-3 py-2 rounded-lg border ${c.color} anim-slide`} style={{animationDelay:`${i*0.1}s`}}>
                  <span className="text-sm font-medium">{c.brand}</span>
                  <span className="text-xs text-slate-500">{c.port}</span>
                </div>
              ))}
            </div>
            <div className="text-center mt-2 text-red-500 text-xs font-bold">❌ 서로 호환 안 됨</div>
          </div>
          <div className="bg-white rounded-xl border border-slate-200 p-4">
            <h4 className="text-sm font-bold text-slate-700 mb-3">📦 컨테이너 초기</h4>
            <div className="space-y-2">
              {containers.map((c, i) => (
                <div key={i} className={`flex items-center justify-between px-3 py-2 rounded-lg border ${c.color} anim-slide`} style={{animationDelay:`${i*0.1+0.3}s`}}>
                  <span className="text-sm font-medium">{c.tool}</span>
                  <span className="text-xs text-slate-500">{c.format}</span>
                </div>
              ))}
            </div>
            <div className="text-center mt-2 text-red-500 text-xs font-bold">❌ 이미지 형식이 제각각</div>
          </div>
        </div>
      );
    }

    /* -- 표준 통일 시각화 -- */
    function StandardView() {
      return (
        <div className="bg-white rounded-xl border-2 border-emerald-300 p-6 text-center anim-fade">
          <div className="grid grid-cols-2 gap-8 items-center">
            <div>
              <div className="text-4xl mb-2">🔌</div>
              <div className="font-bold text-emerald-800">USB Type-C</div>
              <div className="text-xs text-slate-500 mt-1">하나의 케이블로 모든 기기 충전</div>
            </div>
            <div>
              <div className="text-4xl mb-2">📦</div>
              <div className="font-bold text-emerald-800">OCI 표준 (2015)</div>
              <div className="text-xs text-slate-500 mt-1">하나의 규격으로 모든 컨테이너 호환</div>
            </div>
          </div>
          <div className="mt-4 bg-emerald-50 rounded-lg p-3">
            <div className="text-xs text-emerald-700 font-medium">Linux Foundation 산하 · Docker + CoreOS 등이 공동 설립</div>
          </div>
        </div>
      );
    }

    /* -- 스펙 카드 -- */
    function SpecCard({ title, icon, items, color }) {
      return (
        <div className={`bg-white rounded-xl border-2 border-${color}-300 p-4 anim-fade`}>
          <div className="text-center mb-3">
            <span className="text-3xl">{icon}</span>
            <div className={`font-bold text-${color}-800 mt-1`}>{title}</div>
          </div>
          <div className="space-y-2">
            {items.map((item, i) => (
              <div key={i} className={`bg-${color}-50 border border-${color}-200 rounded-lg px-3 py-2 text-sm anim-slide`} style={{animationDelay:`${i*0.1}s`}}>
                <span className="font-medium text-slate-700">{item.label}</span>
                <div className="text-xs text-slate-500 mt-0.5">{item.desc}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* -- 호환성 데모 -- */
    function CompatDemo() {
      const runtimes = [
        { name: "Docker", icon: "🐳", color: "border-blue-400 bg-blue-50" },
        { name: "Podman", icon: "🦭", color: "border-purple-400 bg-purple-50" },
        { name: "containerd", icon: "📦", color: "border-cyan-400 bg-cyan-50" },
        { name: "CRI-O", icon: "☸️", color: "border-orange-400 bg-orange-50" },
      ];
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 anim-fade">
          <div className="text-center mb-4">
            <div className="inline-block bg-blue-100 border-2 border-blue-400 rounded-xl px-6 py-3">
              <span className="text-2xl">🐳</span>
              <div className="text-sm font-bold text-blue-800 mt-1">docker build로 만든 이미지</div>
              <code className="text-xs text-blue-600">myapp:1.0 (OCI 형식)</code>
            </div>
          </div>
          <div className="text-center text-blue-400 text-lg mb-3">▼ 어디서든 실행 가능 ▼</div>
          <div className="grid grid-cols-4 gap-3">
            {runtimes.map((r, i) => (
              <div key={i} className={`rounded-xl border-2 p-3 text-center ${r.color} anim-spread`} style={{animationDelay:`${i*0.15}s`}}>
                <div className="text-2xl mb-1">{r.icon}</div>
                <div className="text-xs font-bold">{r.name}</div>
                <div className="text-emerald-500 text-xs mt-1 font-bold">✓ 실행 가능</div>
              </div>
            ))}
          </div>
          <div className="text-center mt-3">
            <span className="bg-emerald-100 text-emerald-700 text-xs px-4 py-1.5 rounded-full font-medium">
              OCI 표준 덕분에 빌드 도구 ≠ 실행 도구여도 OK
            </span>
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const phaseColor = data.phase === "chaos" ? "bg-red-600 border-red-700" :
                          data.phase === "summary" ? "bg-emerald-600 border-emerald-700" :
                          "bg-blue-600 border-blue-700";

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter II-1-2: OCI(Open Container Initiative) 표준</h1>
              </div>
              <p className="text-slate-500 text-sm">USB 규격 비유로 이해하는 컨테이너 표준화</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade text-white ${phaseColor}`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {data.phase === "chaos" && <ChaosView />}
            {data.phase === "standard" && <StandardView />}

            {data.phase === "image_spec" && (
              <SpecCard title="OCI Image Specification" icon="🖼️"
                color="blue"
                items={[
                  { label: "이미지 형식", desc: "레이어 구조, 매니페스트, 설정 파일 형식 정의" },
                  { label: "배포 규격", desc: "레지스트리에 어떻게 저장하고 전송할지 정의" },
                  { label: "호환 보장", desc: "Docker Hub, ghcr.io, ECR 모두 같은 형식 사용" },
                ]}
              />
            )}

            {data.phase === "runtime_spec" && (
              <SpecCard title="OCI Runtime Specification" icon="⚙️"
                color="purple"
                items={[
                  { label: "파일시스템", desc: "컨테이너의 루트 파일시스템 구조 정의" },
                  { label: "프로세스 설정", desc: "시작 명령, 환경변수, 작업 디렉토리 정의" },
                  { label: "자원 제한", desc: "CPU, 메모리, 네트워크 등 cgroups 설정" },
                ]}
              />
            )}

            {data.phase === "compat" && <CompatDemo />}

            {data.phase === "summary" && (
              <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6 anim-fade">
                <div className="text-center">
                  <div className="text-4xl mb-3">🔌</div>
                  <h3 className="text-xl font-bold text-emerald-800 mb-3">OCI = 컨테이너의 USB 규격</h3>
                  <div className="grid grid-cols-2 gap-4 max-w-md mx-auto">
                    <div className="bg-white rounded-lg p-3 border border-blue-200 anim-slide">
                      <div className="text-lg mb-1">🖼️</div>
                      <div className="text-xs font-bold text-blue-800">Image Spec</div>
                      <div className="text-[10px] text-slate-500">이미지 형식 통일</div>
                    </div>
                    <div className="bg-white rounded-lg p-3 border border-purple-200 anim-slide" style={{animationDelay:"0.1s"}}>
                      <div className="text-lg mb-1">⚙️</div>
                      <div className="text-xs font-bold text-purple-800">Runtime Spec</div>
                      <div className="text-[10px] text-slate-500">실행 방식 통일</div>
                    </div>
                  </div>
                  <p className="text-emerald-700 mt-4 text-sm">어떤 도구로 만들어도, 어떤 런타임에서든 실행된다</p>
                </div>
              </div>
            )}

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
