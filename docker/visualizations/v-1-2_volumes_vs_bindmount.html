          <div className={`text-[9px] mt-1 ${lit ? 'text-sky-700 font-semibold' : 'text-slate-400'}`}>
            {mountKind === 'bind' || mountKind === 'both'
              ? '✓ IDE로 직접 열람·편집 가능'
              : '호스트 IDE 직접 노출'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Docker volume 박스 — Docker 관리 영역의 데이터
    // ─────────────────────────────────────────────────────
    function VolumeBox({ volumeData, mountKind }) {
      const lit = volumeData === 'has-data';
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          lit ? 'bg-sky-50 border-sky-500 shadow-md' : 'bg-slate-50 border-slate-200'
        }`}>
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">💾</span>
              <span className={`text-[11px] font-bold ${lit ? 'text-sky-800' : 'text-slate-500'}`}>
                Docker Volume · pgdata
              </span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
              lit ? 'bg-sky-600 text-white' : 'bg-slate-300 text-slate-600'
            }`}>
              docker managed
            </span>
          </div>
          <div className="bg-white rounded border border-slate-200 p-1.5 font-mono text-[9px] leading-snug text-slate-700 min-h-[44px]">
            {lit ? (
              <>
                <div className="text-slate-400">/var/lib/docker/volumes/pgdata/_data</div>
                <div>📁 base/  📁 global/  📁 pg_wal/</div>
                <div className="text-sky-700 font-bold">items(name): apple ✓</div>
              </>
            ) : (
              <div className="text-slate-400 italic">(비어있음)</div>
            )}
          </div>
          <div className={`text-[9px] mt-1 ${lit ? 'text-sky-700 font-semibold' : 'text-slate-400'}`}>
            {mountKind === 'volume' || mountKind === 'both'
              ? '✓ Docker가 권한·OS 차이를 흡수'
              : 'Docker 자체 관리 영역'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 컨테이너 박스 — 마운트 종류별 다르게 표현
    // ─────────────────────────────────────────────────────
    function ContainerBox({ step }) {
      const { mountKind, containerAlive, containerHasData, restartedOnce, warning } = step;

      const mountLabel = {
        none:   { tag: 'no mount',     color: 'rose',    desc: 'R/W layer만 (휘발)' },
        bind:   { tag: 'bind mount',   color: 'sky',     desc: '호스트 폴더 ↔ 컨테이너' },
        volume: { tag: 'named volume', color: 'sky',     desc: 'Docker 볼륨 ↔ 컨테이너' },
        both:   { tag: 'bind + volume',color: 'emerald', desc: '코드(bind) + DB(volume)' },
        tmpfs:  { tag: 'tmpfs',        color: 'amber',   desc: 'RAM ↔ 컨테이너' },
      }[mountKind];

      const colorMap = {
        rose:    'bg-rose-50 border-rose-400 text-rose-800',
        sky:     'bg-sky-50 border-sky-500 text-sky-800',
        emerald: 'bg-emerald-50 border-emerald-500 text-emerald-800',
        amber:   'bg-amber-50 border-amber-400 text-amber-800',
      };
      const tagBg = {
        rose:    'bg-rose-600',
        sky:     'bg-sky-600',
        emerald: 'bg-emerald-600',
        amber:   'bg-amber-600',
      };

      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${colorMap[mountLabel.color]}`}>
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📦</span>
              <span className="text-[11px] font-bold">
                Container · postgres:16-alpine
              </span>
            </div>
            <span className={`text-[9px] ${tagBg[mountLabel.color]} text-white px-1.5 py-0.5 rounded font-mono font-bold`}>
              {mountLabel.tag}
            </span>
          </div>
          <div className="bg-white rounded border border-slate-200 p-1.5 space-y-1">
            <div className="text-[9px] font-mono text-slate-600">
              <span className="text-slate-400">mount → </span>
              <span className="font-bold">/var/lib/postgresql/data</span>
            </div>
            <div className="text-[9px] text-slate-500">
              {mountLabel.desc}
            </div>
            {containerHasData && (
              <div className="text-[9px] font-mono text-rose-700 bg-rose-50 px-1.5 py-0.5 rounded border border-rose-200">
                ⚠ 데이터가 컨테이너 R/W 레이어에만 있음 — rm 시 소실
              </div>
            )}
            {restartedOnce && (
              <div className="text-[9px] font-mono text-emerald-700 bg-emerald-50 px-1.5 py-0.5 rounded border border-emerald-200">
                ✓ docker rm → 재기동: 데이터 그대로
              </div>
            )}
          </div>
          {warning && (
            <div className="mt-1 text-[9px] bg-rose-100 border border-rose-300 text-rose-800 px-1.5 py-1 rounded font-semibold">
              ⚠ {warning}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // tmpfs(RAM) 박스 — Step 5에서만 부각
    // ─────────────────────────────────────────────────────
    function TmpfsBox({ ramData, mountKind }) {
      const lit = ramData === 'has-data';
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          lit ? 'bg-amber-50 border-amber-400 shadow-md' : 'bg-slate-50 border-dashed border-slate-300 opacity-60'
        }`}>
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">⚡</span>
              <span className={`text-[11px] font-bold ${lit ? 'text-amber-900' : 'text-slate-400'}`}>
                tmpfs · /run/secrets (RAM)
              </span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
              lit ? 'bg-amber-600 text-white' : 'bg-slate-300 text-slate-600'
            }`}>
              memory
            </span>
          </div>
          <div className="bg-white rounded border border-slate-200 p-1.5 font-mono text-[9px] leading-snug min-h-[44px]">
            {lit ? (
              <>
                <div className="text-slate-500">size=64m, 디스크 미경유</div>
                <div className="text-amber-800 font-bold">token = sk_live_xxx (휘발)</div>
                <div className="text-slate-500">find / -name token → 결과 없음</div>
              </>
            ) : (
              <div className="text-slate-400 italic">(비활성)</div>
            )}
          </div>
          <div className={`text-[9px] mt-1 ${lit ? 'text-amber-800 font-semibold' : 'text-slate-400'}`}>
            {mountKind === 'tmpfs'
              ? '✓ 컨테이너 종료 시 즉시 휘발 — 보안 자산'
              : '메모리 전용 마운트'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 결정 가이드 박스 (Step 4에서만 등장)
    // ─────────────────────────────────────────────────────
    function GuideBox() {
      const items = [
        { icon: '🛠️', label: '개발 — 소스 hot reload',    detail: 'bind mount  ./src:/app/src' },
        { icon: '🏭', label: '운영 — DB 영구 데이터',      detail: 'named volume  pgdata:/var/lib/...' },
        { icon: '🔐', label: '비밀 토큰 · 임시 캐시',      detail: 'tmpfs  --tmpfs /run/secrets' },
        { icon: '🚫', label: 'DB에 마운트 누락',           detail: '재기동 시 모든 데이터 증발' },
      ];
      return (
        <div className="rounded-lg border-2 border-emerald-400 bg-gradient-to-br from-emerald-50 to-sky-50 p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">🧭</span>
            <span className="text-[11px] font-bold text-emerald-800">의사결정 가이드 — 용도별 선택</span>
          </div>
          <div className="grid grid-cols-2 gap-1.5">
            {items.map((it) => (
              <div key={it.label} className="bg-white rounded border border-emerald-200 p-1.5">
                <div className="flex items-center gap-1">
                  <span className="text-sm">{it.icon}</span>
                  <span className="text-[10px] font-bold text-emerald-900">{it.label}</span>
                </div>
                <div className="text-[9px] text-emerald-700 font-mono mt-0.5 ml-5">{it.detail}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 호스트(파일시스템 영역)
    //   중앙: 컨테이너(마운트 종류별 변화)
    //   하단: Docker volume + tmpfs
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const showHost   = step.phase !== 'tmpfs';        // tmpfs 단계에선 호스트 비활성
      const showVolume = step.phase !== 'tmpfs' && step.phase !== 'ephemeral' && step.phase !== 'bind';
      const showTmpfs  = step.phase === 'tmpfs';

      // 화살표 색상 — 마운트 활성 여부
      const bindArrowActive = step.mountKind === 'bind' || step.mountKind === 'both';
      const volArrowActive  = step.mountKind === 'volume' || step.mountKind === 'both';
      const tmpfsArrowActive = step.mountKind === 'tmpfs';

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">💾 호스트 ↔ 컨테이너 마운트 시각화</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            {/* 호스트 박스 */}
            <HostBox hostData={step.hostData} mountKind={step.mountKind} />

            {/* bind mount 화살표 */}
            <div className="text-center">
              <div className={`inline-block text-xs font-mono ${
                bindArrowActive ? 'text-sky-600 font-bold' : 'text-slate-300'
              }`}>
                {bindArrowActive
                  ? '↕  bind mount  -v ./pgdata:/var/lib/postgresql/data'
                  : '↕  (bind mount 비활성)'}
              </div>
            </div>

            {/* 컨테이너 박스 */}
            <ContainerBox step={step} />

            {/* volume 화살표 */}
            {showVolume && (
              <div className="text-center">
                <div className={`inline-block text-xs font-mono ${
                  volArrowActive ? 'text-sky-600 font-bold' : 'text-slate-300'
                }`}>
                  {volArrowActive
                    ? '↕  volume mount  -v pgdata:/var/lib/postgresql/data'
                    : '↕  (volume mount 비활성)'}
                </div>
              </div>
            )}

            {/* volume 박스 */}
            {showVolume && (
              <VolumeBox volumeData={step.volumeData} mountKind={step.mountKind} />
            )}

            {/* tmpfs 화살표 + 박스 */}
            {showTmpfs && (
              <>
                <div className="text-center">
                  <div className={`inline-block text-xs font-mono ${
                    tmpfsArrowActive ? 'text-amber-700 font-bold' : 'text-slate-300'
                  }`}>
                    ↕  tmpfs mount  --tmpfs /run/secrets:rw,size=64m
                  </div>
                </div>
                <TmpfsBox ramData={step.ramData} mountKind={step.mountKind} />
              </>
            )}

            {/* Step 4 가이드 */}
            {step.phase === 'use-cases' && <GuideBox />}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>persistent (디스크에 남음)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>ephemeral (컨테이너와 함께 소실)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>memory (RAM, 휘발)
            </span>
            <span className="ml-auto font-mono">phase: {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 데이터 영속성 &gt; Chapter 1. 마운트 종류</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-1-2. Volume vs Bind Mount — 영속 데이터 저장</h1>
                  <p className="text-sm text-slate-500 mt-0.5">컨테이너가 사라져도 데이터는 살아남아야 한다 — bind / volume / tmpfs 의사결정</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: 컨테이너만(휘발) → bind(개발 hot reload) → volume(운영 DB) → tmpfs(메모리·비밀). 핵심 질문은 <strong>"이 데이터가 컨테이너보다 오래 살아야 하나?"</strong> 다음(V-1-3)에서는 네트워크 마운트 격인 컨테이너 네트워크 모드를 본다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['volume', 'bind mount', 'tmpfs', 'docker volume', '-v', '--tmpfs', 'persistent data', 'POSTGRES_PASSWORD'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
