<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker Chapter V-1-2 — 볼륨 vs bind mount vs tmpfs</title>

  <!-- Tailwind CSS Play CDN: 학습 자료용 -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (development) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel Standalone 7.x: JSX 실시간 변환 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    Docker Chapter V-1-2 — 볼륨 vs bind mount vs tmpfs
    ─────────────────────────────────────────────────────────────
    학습 목표 : 3종 마운트 타입(Volume / Bind / tmpfs)의 차이를
               컨테이너 rm 전·후 데이터 생존 여부로 비교 체험.
    사양     : ../docs/design/sprint1_visualization_spec.md
    진실원   : ../docs/design/crossref.md
    조작법   : "자동 실행" 버튼으로 재생, 이전/다음으로 수동 전환.
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // -----------------------------------------
    // 1. Docker 명령어 (코드 뷰어용)
    // -----------------------------------------
    const DOCKER_CODE = [
      "# 1. 컨테이너 실행 (3종 마운트)",
      "# Volume:",
      "docker run -d -v pgdata:/var/lib/postgresql/data postgres:16-alpine",
      "# Bind mount:",
      "docker run -d -v ./data:/var/lib/postgresql/data postgres:16-alpine",
      "# tmpfs:",
      "docker run -d --tmpfs /var/lib/postgresql/data postgres:16-alpine",
      "",
      "# 2. 컨테이너 삭제",
      "docker rm -f <container>",
      "",
      "# 3. 새 컨테이너로 재부착",
      "docker run -d -v pgdata:/var/lib/postgresql/data postgres:16-alpine",
      "",
      "# 4. 데이터 확인",
      "docker exec -it <new> psql -c 'SELECT * FROM items;'",
    ];

    // -----------------------------------------
    // 2. 시뮬레이션 스텝 정의 (6 STEPS)
    // -----------------------------------------
    const STEPS = [
      {
        title: "STEP 1: 3종 마운트 타입 소개",
        desc: "컨테이너에 데이터를 저장하는 세 가지 방식을 나란히 놓고 비교합니다. Volume(Docker 관리), Bind(호스트 경로 직결), tmpfs(메모리). 각 방식은 '컨테이너가 사라진 뒤 데이터가 어디에 남는가'로 구분됩니다.",
        volumeCol:  { container: 'idle',    storage: 'idle',       data: 'empty' },
        bindCol:    { container: 'idle',    storage: 'idle',       data: 'empty' },
        tmpfsCol:   { container: 'idle',    storage: 'idle',       data: 'empty' },
        codeLine: null,
        badge: "Volume · Bind · tmpfs"
      },
      {
        title: "STEP 2: 컨테이너 실행 + 데이터 쓰기",
        desc: "3종 모두 컨테이너를 띄우고 각자의 마운트에 데이터를 씁니다. Volume은 Docker가 관리하는 영역에, Bind는 호스트의 지정 경로에, tmpfs는 컨테이너의 RAM에 저장됩니다.",
        volumeCol:  { container: 'running', storage: 'active',     data: 'written' },
        bindCol:    { container: 'running', storage: 'active',     data: 'written' },
        tmpfsCol:   { container: 'running', storage: 'active',     data: 'written' },
        codeLine: 2,
        badge: "docker run -v pgdata:/data  /  -v ./host:/data  /  --tmpfs /data"
      },
      {
        title: "STEP 3: 컨테이너 삭제 (docker rm)",
        desc: "'docker compose down' 또는 'docker rm -f' 로 컨테이너를 지웁니다. 컨테이너의 읽기-쓰기 레이어는 사라지지만, 마운트된 데이터의 운명은 마운트 타입에 따라 다릅니다.",
        volumeCol:  { container: 'removed', storage: 'persisted',  data: 'survives' },
        bindCol:    { container: 'removed', storage: 'persisted',  data: 'survives' },
        tmpfsCol:   { container: 'removed', storage: 'gone',       data: 'lost' },
        codeLine: 9,
        badge: "docker compose down"
      },
      {
        title: "STEP 4: 새 컨테이너로 재기동",
        desc: "다시 'docker compose up' 또는 'docker run' 으로 새 컨테이너를 띄웁니다. 이전 컨테이너와는 다른 컨테이너지만, 같은 마운트를 연결할 수 있습니다.",
        volumeCol:  { container: 'new',     storage: 'reattached', data: 'survives' },
        bindCol:    { container: 'new',     storage: 'reattached', data: 'survives' },
        tmpfsCol:   { container: 'new',     storage: 'active',     data: 'empty' },
        codeLine: 12,
        badge: "docker compose up -d"
      },
      {
        title: "STEP 5: 데이터 생존 확인",
        desc: "각 컬럼에서 데이터를 다시 읽어봅니다. Volume·Bind는 이전 데이터 그대로, tmpfs는 빈 상태입니다. 이것이 'named volume은 외장 하드' 비유의 핵심입니다.",
        volumeCol:  { container: 'new',     storage: 'reattached', data: 'read-ok' },
        bindCol:    { container: 'new',     storage: 'reattached', data: 'read-ok' },
        tmpfsCol:   { container: 'new',     storage: 'active',     data: 'read-empty' },
        codeLine: 15,
        badge: "SELECT · cat · ls"
      },
      {
        title: "STEP 6: 용도별 선택 가이드",
        desc: "Volume은 DB·영구 상태, Bind는 개발 소스 라이브 동기화, tmpfs는 비밀 토큰·임시 캐시에 적합합니다. 헷갈릴 때는 '데이터가 컨테이너보다 오래 살아야 하는가'를 먼저 묻습니다.",
        volumeCol:  { container: 'new',     storage: 'reattached', data: 'labeled-db' },
        bindCol:    { container: 'new',     storage: 'reattached', data: 'labeled-src' },
        tmpfsCol:   { container: 'new',     storage: 'active',     data: 'labeled-secret' },
        codeLine: null,
        badge: "Volume → DB · Bind → Dev · tmpfs → Secret"
      }
    ];

    // -----------------------------------------
    // 3. 상수: 마운트 타입 메타데이터
    // -----------------------------------------
    const MOUNT_META = {
      volume: { label: 'Volume',      icon: '💾', storageName: 'Docker 관리 영역', color: 'blue' },
      bind:   { label: 'Bind Mount',  icon: '📂', storageName: '호스트 폴더',       color: 'emerald' },
      tmpfs:  { label: 'tmpfs',        icon: '⚡', storageName: 'RAM (메모리)',      color: 'amber' },
    };

    // -----------------------------------------
    // 4. 구문 강조 헬퍼 (index.html 패턴 재사용)
    // -----------------------------------------
    const DOCKER_KEYWORDS = new Set([
      'docker', 'run', 'rm', 'exec', 'compose', 'up', 'down',
      '-d', '-v', '-f', '-it', '--tmpfs', '-c', '-p'
    ]);

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line;
      let commentPart = '';

      if (commentIdx !== -1) {
        codePart = line.slice(0, commentIdx);
        commentPart = line.slice(commentIdx);
      }

      if (!codePart.trim() && commentPart) {
        return <span className="text-slate-500 italic">{commentPart}</span>;
      }

      const tokens = codePart.split(/(\s+)/g);
      const highlighted = tokens.map((token, i) => {
        if (DOCKER_KEYWORDS.has(token)) {
          return <span key={i} className="text-yellow-300 font-bold">{token}</span>;
        }
        if (/^-/.test(token) && token.length <= 3) {
          return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        }
        if (/^\/[\w/.:-]+$/.test(token)) {
          return <span key={i} className="text-emerald-400">{token}</span>;
        }
        if (token.includes(':') && !token.startsWith('#')) {
          return <span key={i} className="text-orange-300">{token}</span>;
        }
        return <span key={i} className="text-slate-200">{token}</span>;
      });

      return (
        <>
          {highlighted}
          {commentPart && <span className="text-slate-500 italic">{commentPart}</span>}
        </>
      );
    };

    // -----------------------------------------
    // 5. 상태별 스타일 헬퍼
    // -----------------------------------------
    const getContainerClass = (state) => {
      const base = "px-3 py-2 rounded-lg border-2 text-center text-xs font-bold transition-all duration-700";
      switch (state) {
        case 'running':
          return `${base} bg-blue-100 border-blue-500 ring-2 ring-blue-300 text-blue-900`;
        case 'removed':
          return `${base} bg-rose-50 border-rose-400 text-rose-600 line-through opacity-60`;
        case 'new':
          return `${base} bg-sky-100 border-sky-500 text-sky-800`;
        default: // idle
          return `${base} bg-white border-slate-200 text-slate-400`;
      }
    };

    const getStorageClass = (state) => {
      const base = "px-3 py-2 rounded-lg border-2 text-center text-xs font-bold transition-all duration-700";
      switch (state) {
        case 'active':
          return `${base} bg-blue-100 border-blue-500 text-blue-900`;
        case 'persisted':
        case 'reattached':
          return `${base} bg-emerald-50 border-emerald-500 text-emerald-700`;
        case 'gone':
          return `${base} bg-rose-50 border-rose-400 text-rose-600 opacity-60`;
        default:
          return `${base} bg-white border-slate-200 text-slate-400`;
      }
    };

    const getDataClass = (state) => {
      const base = "px-2 py-1.5 rounded-md border text-center text-[11px] font-semibold transition-all duration-700";
      switch (state) {
        case 'written':
          return `${base} bg-blue-50 border-blue-300 text-blue-800`;
        case 'survives':
        case 'read-ok':
          return `${base} bg-emerald-50 border-emerald-400 text-emerald-800`;
        case 'lost':
        case 'read-empty':
          return `${base} bg-rose-50 border-rose-300 text-rose-700`;
        case 'labeled-db':
          return `${base} bg-blue-100 border-blue-400 text-blue-900`;
        case 'labeled-src':
          return `${base} bg-emerald-100 border-emerald-400 text-emerald-900`;
        case 'labeled-secret':
          return `${base} bg-amber-100 border-amber-400 text-amber-900`;
        default: // empty
          return `${base} bg-slate-50 border-slate-200 text-slate-400`;
      }
    };

    const getDataLabel = (state) => {
      switch (state) {
        case 'empty':       return '(비어있음)';
        case 'written':     return 'INSERT 완료';
        case 'survives':    return '데이터 유지';
        case 'lost':        return '데이터 소실';
        case 'read-ok':     return 'SELECT OK ✓';
        case 'read-empty':  return 'SELECT 비어있음 ✗';
        case 'labeled-db':  return 'DB · 영구 상태';
        case 'labeled-src': return '소스 · 라이브 동기화';
        case 'labeled-secret': return '비밀 · 임시 캐시';
        default:            return '';
      }
    };

    const getArrowColor = (storageState) => {
      if (storageState === 'persisted' || storageState === 'reattached') return 'text-emerald-500';
      if (storageState === 'active') return 'text-blue-500';
      if (storageState === 'gone') return 'text-rose-400';
      return 'text-slate-300';
    };

    // -----------------------------------------
    // 6. MountColumn 컴포넌트
    // -----------------------------------------
    function MountColumn({ type, data }) {
      const meta = MOUNT_META[type];
      const containerLabel = data.container === 'removed' ? '컨테이너 (삭제됨)'
        : data.container === 'new' ? '컨테이너 (신규)'
        : data.container === 'running' ? '컨테이너 (실행 중)'
        : '컨테이너';

      const storageLabel = data.storage === 'reattached'
        ? `${meta.storageName} (재연결)`
        : meta.storageName;

      return (
        <div className="flex flex-col items-center space-y-2">
          {/* 컬럼 헤더 */}
          <div className={`text-xs font-bold uppercase tracking-wider px-3 py-1 rounded-full border
            ${type === 'volume' ? 'bg-blue-50 border-blue-300 text-blue-700' : ''}
            ${type === 'bind'   ? 'bg-emerald-50 border-emerald-300 text-emerald-700' : ''}
            ${type === 'tmpfs'  ? 'bg-amber-50 border-amber-300 text-amber-700' : ''}
          `}>
            {meta.icon} {meta.label}
          </div>

          {/* 컨테이너 노드 */}
          <div className={getContainerClass(data.container)} style={{minWidth: '120px'}}>
            {containerLabel}
          </div>

          {/* 화살표 */}
          <div className={`text-lg font-bold ${getArrowColor(data.storage)}`}>
            {data.storage === 'gone' ? '✗' : '↕'}
          </div>

          {/* 스토리지 노드 */}
          <div className={getStorageClass(data.storage)} style={{minWidth: '120px'}}>
            {storageLabel}
          </div>

          {/* 데이터 블롭 */}
          <div className={getDataClass(data.data)} style={{minWidth: '120px'}}>
            {getDataLabel(data.data)}
          </div>
        </div>
      );
    }

    // -----------------------------------------
    // 7. 메인 앱 컴포넌트
    // -----------------------------------------
    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3200);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">

            {/* 헤더 */}
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <a href="./index.html" className="text-sm text-blue-600 hover:underline">← 시각화 목록</a>
              </div>
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-2xl font-bold text-slate-800">볼륨 vs bind mount vs tmpfs</h1>
              </div>
              <p className="text-slate-600">
                <b>컨테이너를 삭제</b>하면 데이터는 어떻게 될까요? <b>Volume</b>(외장 하드) · <b>Bind Mount</b>(창고 직결) · <b>tmpfs</b>(화이트보드) 3종 마운트 타입의 데이터 생존 여부를 6단계로 비교합니다.
              </p>
            </header>

            {/* 현재 단계 설명 */}
            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 flex flex-col justify-center min-h-[110px]" aria-live="polite">
              <h3 className="text-xs font-bold text-blue-200 mb-1 uppercase tracking-wider">{stepData.title}</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 좌우 레이아웃 */}
            <div className="grid grid-cols-1 lg:grid-cols-[2fr_1fr] gap-6 items-stretch">

              {/* 왼쪽: 3컬럼 다이어그램 */}
              <div className="flex flex-col space-y-4">

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 min-h-[340px]">
                  {/* 3컬럼 레이아웃 */}
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 justify-items-center">
                    <MountColumn type="volume" data={stepData.volumeCol} />
                    <MountColumn type="bind"   data={stepData.bindCol} />
                    <MountColumn type="tmpfs"  data={stepData.tmpfsCol} />
                  </div>
                </div>

                {/* 현재 단계 배지 */}
                <div className="bg-slate-800 text-emerald-400 font-mono text-xs p-4 rounded-xl">
                  <div className="text-slate-400 mb-1">현재 단계:</div>
                  <div className="text-yellow-300 font-bold">{stepData.badge}</div>
                </div>

                {/* 컨트롤 바 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying ? (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                      ) : (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                      )}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                    Step: {currentStepIdx + 1} / {STEPS.length}
                  </div>
                </div>
              </div>

              {/* 오른쪽: 코드 뷰어 */}
              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-slate-900 flex flex-col">
                  <div className="px-4 py-2 bg-slate-800 border-b border-slate-700 flex items-center gap-2">
                    <div className="w-3 h-3 rounded-full bg-red-500"></div>
                    <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div className="w-3 h-3 rounded-full bg-green-500"></div>
                    <span className="text-slate-400 text-xs ml-2 font-mono">docker CLI</span>
                  </div>
                  <div className="p-5 overflow-y-auto flex-1 text-sm font-mono text-slate-300 scroll-smooth leading-relaxed">
                    {DOCKER_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div
                          key={idx}
                          className={`flex px-2 py-0.5 rounded transition-colors ${isActive ? 'bg-blue-900/60 text-white font-bold border-l-4 border-blue-400 shadow-inner' : 'border-l-4 border-transparent'}`}
                        >
                          <span className="text-slate-600 select-none mr-4 w-6 text-right inline-block shrink-0 tabular-nums">{idx + 1}</span>
                          <span className="whitespace-pre">{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // -----------------------------------------
    // 8. 마운트
    // -----------------------------------------
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
