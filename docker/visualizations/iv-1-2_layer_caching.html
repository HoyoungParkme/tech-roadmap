      {
        title: 'Step 2. 코드 1줄 수정 → 변경 이후 layer 만 재빌드',
        desc: 'main.py 한 줄만 고치고 다시 build 를 돌리면 위 5 개 layer (FROM, WORKDIR, apt, COPY requirements.txt, pip install) 가 모두 CACHED 로 표시된다. 캐시 hit 의 3 조건 (이전 layer hit + 명령어 텍스트 동일 + 입력 파일 체크섬 동일) 을 통과하기 때문. miss 는 정확히 COPY . . 부터 시작된다.',
        layers: CACHE_HIT_LAYERS,
        totalSecs: 1,
        compareBars: null,
        warning: null,
        activeFile: 'cacheHit',
        files: ['slow', 'cacheHit'],
      },
      {
        title: 'Step 3. 안티패턴 — COPY . . 를 먼저 두면 캐시 무효화',
        desc: 'COPY . . 를 pip install 앞에 두는 순간 캐시 전략이 무너진다. 소스가 한 줄 바뀌면 COPY . . 의 체크섬이 달라지고, "이전 layer 가 hit 여야 한다" 조건이 깨져 그 뒤 pip install 도 매번 75 초를 다시 쓴다. 빌드 1 회당 1 초였던 작업이 76 초로 늘어난다.',
        layers: BAD_ORDER_LAYERS,
        totalSecs: 76,
        compareBars: [
          { label: '좋은 순서 (재참고)', secs: 1, color: 'sky' },
          { label: '나쁜 순서 (현재)',   secs: 76, color: 'red' },
        ],
        warning: '소스 한 줄 변경 = pip install 매번 재실행 = 빌드 76× 느림',
        activeFile: 'badOrder',
        files: ['cacheHit', 'badOrder'],
      },
      {
        title: 'Step 4. 모범 — 의존성 먼저, 코드 나중',
        desc: '"안 변하는 것 위에, 자주 변하는 것 아래에" 황금 규칙을 적용한다. requirements.txt 만 먼저 복사하고 pip install 을 끝낸 뒤, 소스(COPY . .) 를 가장 마지막에 둔다. 코드가 바뀌어도 requirements.txt 는 그대로이므로 pip install layer 가 hit 유지. 이 한 줄 순서 차이로 76× 차이가 난다.',
        layers: GOOD_ORDER_LAYERS,
        totalSecs: 1,
        compareBars: [
          { label: '나쁜 순서 (직전 step)', secs: 76, color: 'red' },
          { label: '좋은 순서 (현재)',     secs: 1,  color: 'sky' },
        ],
        warning: null,
        activeFile: 'goodOrder',
        files: ['badOrder', 'goodOrder'],
      },
      {
        title: 'Step 5. BuildKit + cache mount — 캐시 미스도 빠르게',
        desc: 'requirements.txt 가 진짜로 바뀌어 pip install layer 가 miss 가 되더라도, BuildKit 의 --mount=type=cache 로 wheel 다운로드 결과를 빌드 간에 공유하면 75 초 → 3 초. CI 노드에서 layer 캐시가 통째로 날아가도 mount cache 는 살아남아, 팀 전체 빌드 속도가 안정적으로 빨라진다.',
        layers: BUILDKIT_LAYERS,
        totalSecs: 4,
        compareBars: [
          { label: '캐시 없음 (Step 1)',         secs: 106, color: 'slate' },
          { label: '좋은 순서 hit (Step 4)',     secs: 1,   color: 'sky' },
          { label: 'BuildKit miss (현재)',       secs: 4,   color: 'sky' },
        ],
        warning: null,
        activeFile: 'buildkit',
        files: ['goodOrder', 'buildkit'],
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측: 레이어 박스 한 줄
    //   status: 'hit'(sky) / 'miss'(red) / 'first'(amber)
    // ─────────────────────────────────────────────────────
    function LayerRow({ layer, idx }) {
      const palette = {
        hit:   { bg: 'bg-sky-50',    border: 'border-sky-400',    badge: 'bg-sky-600',    text: 'text-sky-900',    label: 'CACHED',  icon: '✓' },
        miss:  { bg: 'bg-red-50',    border: 'border-red-400',    badge: 'bg-red-600',    text: 'text-red-900',    label: 'rebuild', icon: '↻' },
        first: { bg: 'bg-amber-50',  border: 'border-amber-400',  badge: 'bg-amber-600',  text: 'text-amber-900',  label: 'first',   icon: '+' },
      }[layer.status];

      return (
        <div className={`rounded-lg border-2 ${palette.border} ${palette.bg} px-2.5 py-1.5 transition-all duration-500`}>
          <div className="flex items-center gap-2">
            <span className={`w-5 h-5 ${palette.badge} text-white text-[10px] font-bold rounded flex items-center justify-center flex-shrink-0`}>
              {idx + 1}
            </span>
            <div className="flex-1 min-w-0">
              <div className={`font-mono text-[10px] ${palette.text} font-semibold truncate`} title={layer.line}>
                {layer.line}
              </div>
              <div className="text-[9px] text-slate-500 leading-tight">
                {layer.label} · <span className="font-mono">{layer.size}</span>
              </div>
            </div>
            <div className="flex flex-col items-end gap-0.5 flex-shrink-0">
              <span className={`${palette.badge} text-white text-[8px] font-mono font-bold px-1.5 py-0.5 rounded`}>
                {palette.icon} {palette.label}
              </span>
              {layer.secs > 0 && (
                <span className="text-[8px] font-mono text-slate-600">{layer.secs}s</span>
              )}
              {layer.secs === 0 && layer.status === 'hit' && (
                <span className="text-[8px] font-mono text-sky-600">0s</span>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: 빌드 시간 막대
    //   compareBars 가 있으면 비교 막대 여러 개, 없으면 단일 막대
    // ─────────────────────────────────────────────────────
    function BuildTimeBar({ totalSecs, compareBars }) {
      // 막대 max — 가장 큰 값 기준 (최소 30s)
      const bars = compareBars && compareBars.length > 0
        ? compareBars
        : [{ label: '빌드 시간', secs: totalSecs, color: 'sky' }];
      const max = Math.max(30, ...bars.map(b => b.secs));

      const colorMap = {
        sky:   { fill: 'bg-sky-500',   text: 'text-sky-700',   bg: 'bg-sky-100' },
        red:   { fill: 'bg-red-500',   text: 'text-red-700',   bg: 'bg-red-100' },
        slate: { fill: 'bg-slate-500', text: 'text-slate-700', bg: 'bg-slate-100' },
      };

      return (
        <div className="rounded-lg border-2 border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">⏱️</span>
              <span className="text-[11px] font-bold text-slate-700">빌드 시간</span>
            </div>
            <span className="text-[9px] font-mono text-slate-500">총 {totalSecs}s</span>
          </div>
          <div className="space-y-1.5">
            {bars.map((bar, i) => {
              const pct = Math.max(2, (bar.secs / max) * 100);
              const c = colorMap[bar.color] || colorMap.sky;
              return (
                <div key={i}>
                  <div className="flex items-center justify-between text-[9px] mb-0.5">
                    <span className={`font-semibold ${c.text}`}>{bar.label}</span>
                    <span className="font-mono text-slate-600">{bar.secs}s</span>
                  </div>
                  <div className={`w-full ${c.bg} rounded-full h-3 overflow-hidden`}>
                    <div
                      className={`${c.fill} h-3 rounded-full transition-all duration-700 flex items-center justify-end pr-1.5`}
                      style={{ width: `${pct}%` }}
                    >
                      {pct > 15 && <span className="text-[8px] text-white font-bold font-mono">{bar.secs}s</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — Dockerfile 라인별 layer + 빌드 시간 막대
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      // 캐시 hit/miss/first 카운트
      const counts = step.layers.reduce(
        (acc, l) => { acc[l.status] = (acc[l.status] || 0) + 1; return acc; },
        {}
      );

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🧊 Dockerfile Layer Stack</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 카운트 요약 */}
          <div className="flex flex-wrap gap-1.5 mb-3">
            {counts.hit > 0 && (
              <span className="text-[9px] bg-sky-100 text-sky-800 px-2 py-0.5 rounded font-mono font-bold">
                ✓ CACHED × {counts.hit}
              </span>
            )}
            {counts.miss > 0 && (
              <span className="text-[9px] bg-red-100 text-red-800 px-2 py-0.5 rounded font-mono font-bold">
                ↻ rebuild × {counts.miss}
              </span>
            )}
            {counts.first > 0 && (
              <span className="text-[9px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded font-mono font-bold">
                + first × {counts.first}
              </span>
            )}
            <span className="text-[9px] text-slate-500 font-mono ml-auto">
              {step.layers.length} layers
            </span>
          </div>

          {/* layer 스택 */}
          <div className="space-y-1.5 mb-3">
            {step.layers.map((layer, i) => (
              <LayerRow key={i} layer={layer} idx={i} />
            ))}
          </div>

          {/* 경고 */}
          {step.warning && (
            <div className="bg-red-50 border-2 border-red-300 rounded-lg p-2 mb-3 flex items-start gap-2">
              <span className="text-base">⚠️</span>
              <span className="text-[10px] text-red-800 font-semibold leading-tight">{step.warning}</span>
            </div>
          )}

          {/* 빌드 시간 막대 */}
          <BuildTimeBar totalSecs={step.totalSecs} compareBars={step.compareBars} />

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>cache hit
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-red-500"></span>cache miss
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>first build
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 CodeViewer — 파일 탭 + highlight.js
    //   files: 활성 파일 키 배열, activeFile: 현재 활성
    // ─────────────────────────────────────────────────────
    function CodeViewer({ files, activeFile, onSelectFile, stepIdx, total }) {
      const code = FILES[activeFile];
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 줄 */}
          <div className="bg-[#21252b] px-3 py-1.5 flex items-center gap-1 border-b border-slate-700 overflow-x-auto">
            <div className="flex gap-1.5 mr-2 flex-shrink-0">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            {files.map((key) => {
              const f = FILES[key];
              const isActive = key === activeFile;
              return (
                <button
                  key={key}
                  onClick={() => onSelectFile(key)}
                  className={`text-[10px] font-mono px-2.5 py-1 rounded-t transition flex-shrink-0 ${
                    isActive
                      ? 'bg-[#282c34] text-sky-300 border-t border-l border-r border-slate-600 border-b-0'
                      : 'bg-[#21252b] text-slate-500 hover:text-slate-300'
                  }`}
                >
                  {f.filename}
                </button>
              );
            })}
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase flex-shrink-0">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태, 자동재생, 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [activeFileOverride, setActiveFileOverride] = useState(null);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];
      // step 이 바뀌면 override 초기화
      useEffect(() => { setActiveFileOverride(null); }, [stepIdx]);

      const activeFile = activeFileOverride || step.activeFile;

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. 빌드 최적화 &gt; Chapter 1. 캐싱</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-1-2. 레이어 캐싱과 빌드 최적화</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Dockerfile 명령어 순서가 빌드 속도를 결정한다 — 76× 차이를 5단계로 본다</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                files={step.files}
                activeFile={activeFile}
                onSelectFile={setActiveFileOverride}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: 캐시 hit 의 3 조건 (이전 layer hit + 명령어 동일 + 입력 체크섬 동일) 을 알면 Dockerfile 순서가 자명해진다. 안 변하는 것 위에, 자주 변하는 것 아래에. 그 위에 BuildKit cache mount 를 얹으면 캐시 미스도 빠르게 처리된다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['layer cache', 'docker build', 'cache hit', 'cache miss', 'COPY order', 'pip install', 'BuildKit', 'cache mount', '.dockerignore'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./iv-1-1_dockerfile_basics.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; IV-1-1 Dockerfile 기초</a>
              <a href="./iv-1-3_multistage_build.html" className="text-sky-700 hover:text-sky-900 font-medium">IV-1-3 멀티 스테이지 빌드 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
