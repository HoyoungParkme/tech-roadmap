  <!--
    III-1-2. Hello World — docker run hello-world 흐름
    학습 목표: docker run 한 줄로 일어나는 5단계 라이프사이클을
              CLI → Daemon → Registry → Image → Container 흐름으로 이해한다.
    핵심 비유: "주문 → 재고 확인 → 본사 발주 → 입고 → 조립/판매" 5단계 식당 운영
    패턴: fastapi v1 — 좌(LiveDataPane: 컴포넌트 흐름 + 출력 박스) / 우(VSCode CodeViewer)
    색상: docker sky
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 컴포넌트 흐름 정의
    //   docker run hello-world 가 통과하는 5개 컴포넌트
    //   각 step 마다 active 단계가 이동하며 통신 화살표가 표시됨
    //   nodes: user → cli → daemon → registry → image → container
    // ─────────────────────────────────────────────────────

      { key: 'user',      label: '사용자',       icon: '🧑‍💻', sub: 'Terminal' },
      { key: 'cli',       label: 'Docker CLI',  icon: '⌨️',  sub: 'docker 명령' },
      { key: 'daemon',    label: 'Docker Daemon', icon: '⚙️',  sub: 'dockerd' },
      { key: 'registry',  label: 'Registry',    icon: '☁️',   sub: 'Docker Hub' },
      { key: 'image',     label: 'Image',       icon: '📀',   sub: 'hello-world:latest' },
      { key: 'container', label: 'Container',   icon: '📦',   sub: '/hello 프로세스' },
    ];

    // ─────────────────────────────────────────────────────
    // 5 STEPS — 단계별 화면 데이터
    //   active     : 현재 활성 노드 키
    //   nodeStates : 각 노드의 상태 (idle / active / done / fail)

    //   output     : 우측 출력 박스에 표시되는 메시지 (이번 단계 결과)
    //   code       : 우측 CodeViewer 에 표시되는 파일 (filename, lang, lines, highlight)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. docker run hello-world — 명령 입력',

        active: 'cli',

        arrows: [

        ],
        output: {

        active: 'image',
        nodeStates: {
          user: 'done', cli: 'done', daemon: 'active',
          registry: 'done', image: 'active', container: 'idle',
        },
        arrows: [
          { from: 'registry', to: 'daemon', label: 'blob' },
          { from: 'daemon', to: 'image', label: 'extract' },
        ],
        output: {
          tone: 'success',

        nodeStates: {
          user: 'done', cli: 'done', daemon: 'done',
          registry: 'done', image: 'done', container: 'active',
        },
        arrows: [
          { from: 'image', to: 'container', label: 'create' },
          { from: 'daemon', to: 'container', label: 'start /hello' },
        ],
        output: {
          tone: 'running',
          title: '컨테이너 실행 중',
          lines: [
            'CONTAINER ID   IMAGE         COMMAND    STATUS',
            'a3b7c9d1f2e4   hello-world   "/hello"   Up 1 second',
            '  ↓ namespace + cgroup 격리 프로세스',

          ],
        },

          lang: 'bash',

            '',
            '# 컨테이너의 정체 — Linux 격리 기능 모음',

            '',
            '# 컨테이너 == 가상머신이 아니다',

            '#   container: 호스트 커널 공유, 프로세스만 격리 (수 MB · ms)',
          ],
          highlight: [1, 5, 6, 7, 9, 10, 11, 13, 15, 16, 17, 18, 19, 20, 25, 26, 27, 28],
        },
      },
      {

        active: 'user',
        nodeStates: {
          user: 'active', cli: 'done', daemon: 'done',
          registry: 'done', image: 'done', container: 'done',
        },
        arrows: [
          { from: 'container', to: 'daemon', label: 'stdout' },
          { from: 'daemon', to: 'cli', label: 'stream' },
          { from: 'cli', to: 'user', label: 'print' },
        ],
        output: {
          tone: 'success',

    // ─────────────────────────────────────────────────────
    // 좌측 위: 컴포넌트 흐름 그래프
    //   6 노드를 가로 2행 3열에 배치:
    //     [user]   →   [CLI]    →  [Daemon]
    //                                 ↓
    //     [container] ← [image]  ← [Registry]
    //   step.nodeStates 에 따라 활성/완료/대기 색상이 변한다
    //   step.arrows 에 등록된 경로는 굵은 sky 색 강조
    // ─────────────────────────────────────────────────────
    function FlowGraph({ step }) {
      // 6 노드 → grid 6칸 (2행 3열)
      // 0: user      | 1: cli       | 2: daemon
      // 3: container | 4: image     | 5: registry
      const layout = [
        ['user', 'cli', 'daemon'],
        ['container', 'image', 'registry'],
      ];

      const colorOf = (state) => {
        if (state === 'active') return 'border-sky-500 bg-sky-100 ring-2 ring-sky-300 ring-offset-1 shadow-md';
        if (state === 'done')   return 'border-sky-300 bg-sky-50 text-slate-600';
        if (state === 'fail')   return 'border-red-400 bg-red-50';
        return 'border-slate-200 bg-slate-50 text-slate-400';
      };

      const isArrowOn = (from, to) =>
        step.arrows.some((a) => a.from === from && a.to === to);

      const arrowLabel = (from, to) => {
        const found = step.arrows.find((a) => a.from === from && a.to === to);
        return found ? found.label : null;
      };

      return (
        <div className="bg-white rounded-lg border-2 border-sky-200 p-3">
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🐳</span>
              <span className="text-[11px] font-bold text-sky-800">docker run hello-world — 컴포넌트 흐름</span>
            </div>
            <span className="text-[9px] bg-sky-100 text-sky-700 px-1.5 py-0.5 rounded font-mono">
              active: {step.active}
            </span>
          </div>

          {/* 노드 그리드 */}
          <div className="space-y-2">
            {/* 1행: user → cli → daemon */}
            <div className="grid grid-cols-[1fr_auto_1fr_auto_1fr] items-center gap-1">
              <NodeCard def={NODE_DEFS.find(n => n.key === 'user')}     state={step.nodeStates.user}     colorOf={colorOf} />
              <Arrow horizontal active={isArrowOn('user', 'cli')}        label={arrowLabel('user', 'cli')} />
              <NodeCard def={NODE_DEFS.find(n => n.key === 'cli')}       state={step.nodeStates.cli}      colorOf={colorOf} />
              <Arrow horizontal active={isArrowOn('cli', 'daemon')}     label={arrowLabel('cli', 'daemon')} />
              <NodeCard def={NODE_DEFS.find(n => n.key === 'daemon')}    state={step.nodeStates.daemon}   colorOf={colorOf} />
            </div>

            {/* 1행 → 2행 세로 화살표 (daemon → registry) */}
            <div className="grid grid-cols-[1fr_auto_1fr_auto_1fr] items-center gap-1">
              <div></div><div></div>
              <Arrow vertical active={isArrowOn('cli', 'user') || isArrowOn('daemon', 'cli')} label={arrowLabel('daemon', 'cli') || arrowLabel('cli', 'user')} reverse />
              <div></div>
              <Arrow vertical active={isArrowOn('daemon', 'registry') || isArrowOn('registry', 'daemon')} label={arrowLabel('daemon', 'registry') || arrowLabel('registry', 'daemon')} reverse={isArrowOn('registry', 'daemon')} />
            </div>

            {/* 2행: container ← image ← registry */}
            <div className="grid grid-cols-[1fr_auto_1fr_auto_1fr] items-center gap-1">
              <NodeCard def={NODE_DEFS.find(n => n.key === 'container')} state={step.nodeStates.container} colorOf={colorOf} />
              <Arrow horizontal active={isArrowOn('image', 'container') || isArrowOn('daemon', 'container')} label={arrowLabel('image', 'container') || arrowLabel('daemon', 'container')} reverse />
              <NodeCard def={NODE_DEFS.find(n => n.key === 'image')}     state={step.nodeStates.image}     colorOf={colorOf} />
              <Arrow horizontal active={isArrowOn('daemon', 'image') || isArrowOn('registry', 'daemon')}  label={arrowLabel('daemon', 'image')} reverse />
              <NodeCard def={NODE_DEFS.find(n => n.key === 'registry')}  state={step.nodeStates.registry}  colorOf={colorOf} />
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 노드 카드 — FlowGraph 안의 단일 컴포넌트 박스
    // ─────────────────────────────────────────────────────
    function NodeCard({ def, state, colorOf }) {
      return (
        <div className={`rounded-lg border-2 p-2 text-center transition-all duration-500 ${colorOf(state)}`}>
          <div className="text-lg leading-none mb-0.5">{def.icon}</div>
          <div className="text-[10px] font-bold leading-tight">{def.label}</div>
          <div className="text-[8px] font-mono text-slate-500 mt-0.5 leading-tight">{def.sub}</div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 화살표 — 활성 시 sky, 비활성 시 slate
    // ─────────────────────────────────────────────────────
    function Arrow({ horizontal, vertical, active, label, reverse }) {
      if (horizontal) {
        return (
          <div className="flex flex-col items-center min-w-[28px]">
            <div className={`text-base leading-none ${active ? 'text-sky-500 font-bold animate-pulse' : 'text-slate-300'}`}>
              {reverse ? '←' : '→'}
            </div>
            {label && active && (
              <div className="text-[8px] font-mono text-sky-600 leading-tight mt-0.5 whitespace-nowrap">
                {label}
              </div>
            )}
          </div>
        );
      }
      if (vertical) {
        return (
          <div className="flex items-center justify-center">
            <div className={`text-base leading-none ${active ? 'text-sky-500 font-bold animate-pulse' : 'text-slate-200'}`}>
              {reverse ? '↑' : '↓'}
            </div>
          </div>
        );
      }
      return null;
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: 출력 박스
    //   각 단계의 결과를 터미널 스타일 박스로 표시
    //   tone: neutral / warning / success / running
    // ─────────────────────────────────────────────────────
    function OutputBox({ output }) {
      const toneColor = {
        neutral: { bg: 'bg-slate-50', border: 'border-slate-300', title: 'text-slate-700', dot: 'bg-slate-500' },
        warning: { bg: 'bg-amber-50', border: 'border-amber-300', title: 'text-amber-800', dot: 'bg-amber-500' },
        success: { bg: 'bg-emerald-50', border: 'border-emerald-300', title: 'text-emerald-800', dot: 'bg-emerald-500' },
        running: { bg: 'bg-sky-50', border: 'border-sky-300', title: 'text-sky-800', dot: 'bg-sky-500 animate-pulse' },
      }[output.tone] || { bg: 'bg-slate-50', border: 'border-slate-300', title: 'text-slate-700', dot: 'bg-slate-500' };

      return (
        <div className={`${toneColor.bg} border-2 ${toneColor.border} rounded-lg p-3`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className={`w-2 h-2 rounded-full ${toneColor.dot}`}></span>
              <span className={`text-[11px] font-bold ${toneColor.title}`}>{output.title}</span>
            </div>
            <span className="text-[9px] text-slate-400 font-mono uppercase">stdout</span>
          </div>
          <div className="bg-gray-900 rounded p-2 font-mono text-[10px] leading-snug">
            {output.lines.map((line, i) => (
              <div
                key={i}
                className={
                  line.startsWith('$') ? 'text-emerald-400' :
                  line.startsWith('Hello') || line.includes('Pull complete') || line.includes('Downloaded') ? 'text-sky-300 font-bold' :
                  line.includes('Unable') ? 'text-amber-400' :
                  line.includes('Exit') ? 'text-rose-400' :
                  line.startsWith('  ↓') ? 'text-slate-500' :
                  'text-slate-300'
                }
              >
                {line || ' '}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: FlowGraph (6 노드 흐름)
    //   하단: OutputBox (이번 단계의 stdout 결과)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🐳 Docker 흐름 — CLI · Daemon · Registry · Image · Container</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <FlowGraph step={step} />
            <OutputBox output={step.output} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-200"></span>done
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-300"></span>idle
            </span>
            <span className="flex items-center gap-1 ml-auto font-mono text-sky-600">
              {STEPS.findIndex(s => s.title === step.title) + 1} / {STEPS.length}
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    //   filename 탭 + 윈도우 dot + 라인 번호 + 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    //   - stepIdx 상태 + 자동재생(3000ms) + 키보드(←/→) + 4 버튼
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="./index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Docker 시작 &gt; Chapter 1. 첫 컨테이너</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-1-2. Hello World — docker run hello-world 의 5단계</h1>
                  <p className="text-sm text-slate-500 mt-0.5">CLI → Daemon → Registry → Image → Container 흐름을 5 단계로 추적</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>docker run = pull + create + start</strong>. CLI는 Daemon 의존하고, Daemon이 Registry/Image/Container 를 모두 다룬다. 다음(III-1-3)에서는 <strong>docker ps · docker images</strong> 로 컨테이너·이미지 상태 확인을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['docker run', 'CLI/Daemon', 'Registry', 'Image Layer', 'Container', 'pull/create/start', 'overlay2', 'namespace/cgroup'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./iii-1-1_docker_install.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; III-1-1 Docker 설치</a>
              <a href="./iii-1-3_docker_ps_images.html" className="text-sky-700 hover:text-sky-900 font-medium">III-1-3 docker ps · images &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
