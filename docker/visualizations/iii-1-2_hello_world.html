<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — Hello World 컨테이너</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes slideDown { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }
    @keyframes moveRight { from{left:0%;} to{left:80%;} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-down { animation: slideDown 0.4s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── STEPS ── */
    const STEPS = [
      {
        title: "STEP 1 · docker run hello-world 입력",
        desc: "터미널에 'docker run hello-world'를 입력한다. 이 한 줄의 명령어 안에 Docker의 핵심 동작이 모두 담겨 있다. Docker는 이 명령을 받으면 내부에서 3단계를 자동으로 실행한다.",
        phase: "command",
        diagram: { local: "idle", hub: "idle", container: "idle" },
        terminalLines: [
          { prompt: "$", cmd: "docker run hello-world", type: "input" },
        ],
      },
      {
        title: "STEP 2 · 로컬 이미지 확인 — 없다!",
        desc: "Docker는 먼저 로컬 캐시에 'hello-world' 이미지가 있는지 확인한다. 처음 실행하면 로컬에 없으므로 'Unable to find image locally'라는 메시지가 출력된다.",
        phase: "check_local",
        diagram: { local: "searching", hub: "idle", container: "idle" },
        terminalLines: [
          { prompt: "$", cmd: "docker run hello-world", type: "input" },
          { text: "Unable to find image 'hello-world:latest' locally", type: "warning" },
        ],
      },
      {
        title: "STEP 3 · Docker Hub에서 이미지 Pull",
        desc: "로컬에 이미지가 없으면 Docker Hub(인터넷 이미지 저장소)에서 자동으로 내려받는다. 이것이 'pull' 과정이다. hello-world 이미지는 13.3kB밖에 안 되므로 순식간에 완료된다.",
        phase: "pulling",
        diagram: { local: "receiving", hub: "sending", container: "idle" },
        terminalLines: [
          { prompt: "$", cmd: "docker run hello-world", type: "input" },
          { text: "Unable to find image 'hello-world:latest' locally", type: "warning" },
          { text: "latest: Pulling from library/hello-world", type: "output" },
          { text: "719385e32844: Pull complete", type: "success" },
          { text: "Digest: sha256:d211f485f2dd1dee407a80973c8f129f00d54604...", type: "output" },
          { text: "Status: Downloaded newer image for hello-world:latest", type: "success" },
        ],
      },
      {
        title: "STEP 4 · 컨테이너 생성 & 실행",
        desc: "이미지를 받았으면 Docker는 이미지로부터 컨테이너를 생성하고, 컨테이너 안의 프로그램(/hello)을 실행한다. docker run = pull + create + start를 한 번에 하는 명령이다.",
        phase: "running",
        diagram: { local: "ready", hub: "idle", container: "running" },
        terminalLines: [
          { text: "", type: "output" },
          { text: "Hello from Docker!", type: "success" },
          { text: "This message shows that your installation appears to be", type: "output" },
          { text: "working correctly.", type: "output" },
        ],
      },
      {
        title: "STEP 5 · 컨테이너 종료 (Exited)",
        desc: "hello-world 컨테이너는 메시지를 출력한 뒤 바로 종료된다. 프로그램이 끝나면 컨테이너도 끝난다. 종료된 컨테이너는 'docker ps -a'로 확인할 수 있다. --rm 옵션을 쓰면 종료 후 자동 삭제된다.",
        phase: "exited",
        diagram: { local: "cached", hub: "idle", container: "exited" },
        terminalLines: [
          { prompt: "$", cmd: "docker ps -a", type: "input" },
          { text: "CONTAINER ID   IMAGE         STATUS                     NAMES", type: "output" },
          { text: "a3b7c9d1f2e4   hello-world   Exited (0) 3 seconds ago   happy_darwin", type: "output" },
        ],
      },
      {
        title: "STEP 6 · 두 번째 실행 — 캐시 활용",
        desc: "같은 명령을 다시 실행하면 이미 로컬에 이미지가 있으므로 pull 과정을 건너뛴다. 즉시 컨테이너가 생성되고 실행된다. 이것이 이미지 레이어 캐시의 효과다.",
        phase: "cached_run",
        diagram: { local: "cached", hub: "idle", container: "running" },
        terminalLines: [
          { prompt: "$", cmd: "docker run hello-world", type: "input" },
          { text: "", type: "output" },
          { text: "Hello from Docker!", type: "success" },
          { text: "This message shows that your installation appears to be", type: "output" },
          { text: "working correctly.", type: "output" },
          { text: "", type: "output" },
          { text: "💡 pull 과정 없이 즉시 실행됨! (로컬 캐시 사용)", type: "success" },
        ],
      },
    ];

    /* ── 다이어그램 ── */
    function FlowDiagram({ diagram, step }) {
      const statusColor = (status) => {
        switch(status) {
          case "searching": return "border-yellow-400 bg-yellow-50";
          case "receiving": case "sending": return "border-blue-400 bg-blue-50";
          case "running": return "border-emerald-400 bg-emerald-50";
          case "exited": return "border-red-300 bg-red-50";
          case "cached": case "ready": return "border-emerald-400 bg-emerald-50";
          default: return "border-slate-200 bg-slate-50";
        }
      };
      const statusText = (key, status) => {
        const map = {
          local: { idle: "대기", searching: "🔍 이미지 검색 중...", receiving: "📥 이미지 수신 중...", ready: "✓ 이미지 준비 완료", cached: "✓ 이미지 캐시됨" },
          hub: { idle: "대기", sending: "📤 이미지 전송 중..." },
          container: { idle: "대기", running: "🟢 실행 중", exited: "🔴 종료됨 (Exit 0)" },
        };
        return map[key]?.[status] || "대기";
      };

      const showArrow = diagram.hub === "sending";

      return (
        <div key={step} className="bg-white rounded-xl border border-slate-200 p-5 anim-fade">
          <h4 className="text-sm font-bold text-slate-600 mb-4">Docker 동작 흐름</h4>
          <div className="flex items-center justify-between gap-2">
            {/* 로컬 */}
            <div className={`flex-1 rounded-xl border-2 p-4 text-center transition-all duration-500 ${statusColor(diagram.local)}`}>
              <div className="text-2xl mb-1">💻</div>
              <div className="font-bold text-sm mb-1">로컬 이미지 캐시</div>
              <div className="text-xs text-slate-600">{statusText("local", diagram.local)}</div>
            </div>

            {/* 화살표 */}
            <div className="flex flex-col items-center px-2">
              {showArrow ? (
                <div className="anim-pulse text-2xl text-blue-500">⬅ 📦</div>
              ) : (
                <div className="text-slate-300 text-xl">⟷</div>
              )}
            </div>

            {/* Docker Hub */}
            <div className={`flex-1 rounded-xl border-2 p-4 text-center transition-all duration-500 ${statusColor(diagram.hub)}`}>
              <div className="text-2xl mb-1">☁️</div>
              <div className="font-bold text-sm mb-1">Docker Hub</div>
              <div className="text-xs text-slate-600">{statusText("hub", diagram.hub)}</div>
            </div>

            {/* 화살표 */}
            <div className="px-2 text-slate-300 text-xl">→</div>

            {/* 컨테이너 */}
            <div className={`flex-1 rounded-xl border-2 p-4 text-center transition-all duration-500 ${statusColor(diagram.container)}`}>
              <div className="text-2xl mb-1">📦</div>
              <div className="font-bold text-sm mb-1">컨테이너</div>
              <div className="text-xs text-slate-600">{statusText("container", diagram.container)}</div>
            </div>
          </div>
        </div>
      );
    }

    /* ── 터미널 ── */
    function Terminal({ lines, step }) {
      return (
        <div className="bg-gray-900 rounded-xl p-4 font-mono text-sm overflow-x-auto">
          <div className="flex gap-1.5 mb-3">
            <div className="w-3 h-3 rounded-full bg-red-500"></div>
            <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div className="w-3 h-3 rounded-full bg-green-500"></div>
          </div>
          {lines.map((line, i) => (
            <div key={`${step}-${i}`} className="anim-slide" style={{ animationDelay: `${i * 0.15}s`, opacity: 0 }}>
              {line.type === "input" ? (
                <div className="text-gray-300 mb-1">
                  <span className="text-green-400">{line.prompt} </span>
                  <span className="text-white">{line.cmd}</span>
                </div>
              ) : line.type === "warning" ? (
                <div className="text-yellow-400 mb-0.5">{line.text}</div>
              ) : (
                <div className={`mb-0.5 ${line.type === "success" ? "text-emerald-400" : "text-gray-400"}`}>
                  {line.text}
                </div>
              )}
            </div>
          ))}
        </div>
      );
    }

    /* ── 메인 앱 ── */
    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const bgColor =
        data.phase === "exited" ? "bg-red-600 border-red-700 text-white" :
        data.phase === "running" || data.phase === "cached_run" ? "bg-emerald-600 border-emerald-700 text-white" :
        data.phase === "check_local" ? "bg-yellow-600 border-yellow-700 text-white" :
        "bg-blue-600 border-blue-700 text-white";

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter III-1-2: Hello World 컨테이너</h1>
              </div>
              <p className="text-slate-500 text-sm">docker run hello-world 실행 과정을 단계별로 시뮬레이션합니다. 이미지 pull → 컨테이너 생성 → 실행 → 종료의 전체 라이프사이클을 확인하세요.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${bgColor}`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            <FlowDiagram diagram={data.diagram} step={step} />

            <Terminal lines={data.terminalLines} step={step} />

            {/* docker run 분해 설명 */}
            {data.phase === "running" && (
              <div className="bg-gradient-to-r from-blue-50 to-emerald-50 border-2 border-blue-200 rounded-xl p-5 anim-fade">
                <h4 className="font-bold text-blue-800 mb-3">docker run = 3개 명령의 단축키</h4>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                  {[
                    { cmd: "docker pull", desc: "이미지 내려받기", icon: "📥" },
                    { cmd: "docker create", desc: "컨테이너 생성", icon: "📦" },
                    { cmd: "docker start", desc: "컨테이너 실행", icon: "▶️" },
                  ].map((item, i) => (
                    <div key={i} className="bg-white rounded-lg p-3 border border-blue-100 text-center anim-slide" style={{animationDelay: `${i*0.15}s`}}>
                      <div className="text-2xl mb-1">{item.icon}</div>
                      <div className="font-mono text-sm font-bold text-blue-700">{item.cmd}</div>
                      <div className="text-xs text-slate-600 mt-1">{item.desc}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {data.phase === "cached_run" && (
              <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-5 anim-fade text-center">
                <div className="text-3xl mb-2">⚡</div>
                <h4 className="font-bold text-emerald-800 mb-2">이미지 캐시의 효과</h4>
                <div className="flex justify-center gap-6 text-sm">
                  <div className="bg-red-50 border border-red-200 rounded-lg px-4 py-2">
                    <div className="text-red-600 font-bold">첫 번째 실행</div>
                    <div className="text-red-500 text-xs">pull + create + start</div>
                  </div>
                  <div className="flex items-center text-xl">→</div>
                  <div className="bg-emerald-50 border border-emerald-200 rounded-lg px-4 py-2">
                    <div className="text-emerald-600 font-bold">두 번째 실행</div>
                    <div className="text-emerald-500 text-xs">create + start (pull 건너뜀)</div>
                  </div>
                </div>
              </div>
            )}

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
