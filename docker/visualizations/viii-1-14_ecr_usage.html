    핵심 비유: 사내 우편함 — Docker Hub(공개 게시판) 대신 회사 전용 사물함(ECR)
              열쇠는 사원증(IAM)에 박아두면 비밀번호 없이도 동료가 찾아갈 수 있다.
    패턴: fastapi v1 — 좌(LiveDataPane: 로컬 → ECR → EC2 흐름) / 우(VSCode CodeViewer)
    색상: docker sky
  -->

              <span className="text-base">☁️</span>
              <span className={`text-[11px] font-bold ${active ? 'text-sky-800' : 'text-slate-500'}`}>
                AWS ECR (private)
              </span>
            </div>
            {lifecycleOn && (
              <span className="text-[9px] px-1.5 py-0.5 rounded font-mono font-bold bg-amber-500 text-white animate-pulse">
                lifecycle ON
              </span>
            )}
          </div>

          <div className="bg-white rounded border border-slate-200 p-1.5 font-mono text-[9px] leading-snug">
            <div className="text-slate-500 mb-0.5">
              <span className="text-slate-400">repositoryUri:</span>
            </div>
            <div className={`${repoExists ? 'text-sky-700' : 'text-slate-300'} break-all leading-tight`}>
              {repoExists
                ? `${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/${REPO_NAME}`
                : '(아직 없음)'}
            </div>
          </div>

          {/* 이미지 목록 */}
          <div className="mt-2">
            <div className="text-[9px] text-slate-500 mb-1 flex items-center justify-between">
              <span>📦 images ({imagesInRepo.length})</span>
              {expiredTags.length > 0 && (
                <span className="text-[8px] text-rose-600 font-bold">
                  -{expiredTags.length} expired
                </span>
              )}
            </div>
            {imagesInRepo.length === 0 ? (
              <div className="text-[9px] text-slate-400 italic px-1">(empty)</div>
            ) : (
              <div className="grid grid-cols-3 gap-1">
                {imagesInRepo.map((tag) => {
                  const expired = expiredTags.includes(tag);
                  return (
                    <div
                      key={tag}
                      className={`text-[8px] font-mono rounded px-1 py-0.5 text-center border transition-all duration-500 ${
                        expired
                          ? 'bg-rose-50 border-rose-300 text-rose-500 line-through'
                          : 'bg-sky-100 border-sky-300 text-sky-800'
                      }`}
                    >
                      {tag}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 — EC2 / ECS 박스
    //   iamAttached 면 IAM 역할 배지, 아니면 "no role"
    //   pulledOnEc2 가 있으면 컨테이너 실행 카드 표시
    // ─────────────────────────────────────────────────────
    function Ec2Box({ active, iamAttached, pulledOnEc2 }) {
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          active ? 'bg-sky-50 border-sky-400 shadow-md' : 'bg-slate-50 border-slate-200'
        }`}>
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🖥️</span>
              <span className={`text-[11px] font-bold ${active ? 'text-sky-800' : 'text-slate-500'}`}>
                EC2 / ECS Task
              </span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
              iamAttached ? 'bg-violet-600 text-white' : 'bg-slate-300 text-slate-600'
            }`}>
              {iamAttached ? 'IAM role ✓' : 'no role'}
            </span>
          </div>

          <div className="bg-white rounded border border-slate-200 p-1.5 font-mono text-[9px] leading-snug text-slate-700 space-y-0.5">
            <div className={iamAttached ? 'text-violet-700' : 'text-slate-400'}>
              <span className="text-sky-600">role:</span>{' '}
              {iamAttached ? 'ec2-ecr-readonly' : '—'}
            </div>
            <div className={iamAttached ? 'text-violet-700' : 'text-slate-400'}>
              <span className="text-sky-600">policy:</span>{' '}
              {iamAttached ? 'AmazonEC2ContainerRegistryReadOnly' : '—'}
            </div>
          </div>

          {/* 풀 받은 이미지 / 컨테이너 */}
          <div className="mt-2">
            {pulledOnEc2 ? (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded p-1.5">
                <div className="flex items-center justify-between text-[9px]">
                  <span className="font-bold text-emerald-800">🐳 container</span>
                  <span className="text-[8px] bg-emerald-600 text-white px-1 rounded font-mono font-bold">
                    Up ✓
                  </span>
                </div>
                <div className="text-[8px] font-mono text-emerald-700 mt-0.5 leading-tight break-all">
                  demo-app:{pulledOnEc2}
                </div>
                <div className="text-[8px] text-emerald-600 mt-0.5">
                  :80 → :8000 listening
                </div>
              </div>
            ) : (
              <div className="bg-slate-50 border border-dashed border-slate-300 rounded p-1.5 text-[9px] text-slate-400 text-center">
                아직 pull 받지 않음
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 가운데 화살표 — push / pull 방향 시각화
    //   flowDir === 'push' : 로컬 → ECR (오른쪽)
    //   flowDir === 'pull' : ECR → EC2 (오른쪽)
    //   둘 다 좌우 배치라 ↘/↗ 보다 → 가 직관적
    // ─────────────────────────────────────────────────────
    function FlowArrow({ from, to, flowDir, label, sub }) {
      const active = flowDir != null;
      return (
        <div className="flex flex-col items-center justify-center px-1">
          <div className={`text-[10px] font-mono font-bold mb-0.5 ${active ? 'text-sky-700' : 'text-slate-300'}`}>
            {label}
          </div>
          <div className={`text-2xl ${active ? 'text-sky-500' : 'text-slate-300'}`}>
            →
          </div>
          <div className={`text-[8px] font-mono ${active ? 'text-sky-600' : 'text-slate-300'} mt-0.5`}>
            {sub}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단:  [로컬] → [ECR] → [EC2]  3박스 가로 배치
    //   하단:  단계 요약 + 범례
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 로컬 → ECR → EC2 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 3 박스 + 화살표 — 작은 화면에서는 세로로 쌓이도록 wrap */}
          <div className="grid grid-cols-[1fr_auto_1fr] gap-2 items-stretch">
            <LocalBox active={step.localActive} loggedIn={step.loggedIn} />
            <FlowArrow
              flowDir={step.flowDir === 'push' ? 'push' : null}
              label={step.flowDir === 'push' ? 'push' : ''}
              sub={step.flowDir === 'push' ? 'docker push' : ''}
            />
            <EcrBox
              active={step.ecrActive}
              repoExists={step.repoExists}
              imagesInRepo={step.imagesInRepo}
              expiredTags={step.expiredTags}
              lifecycleOn={step.lifecycleOn}
            />
          </div>

          {/* ECR → EC2 화살표 + EC2 박스 */}
          <div className="grid grid-cols-[1fr_auto_1fr] gap-2 items-stretch mt-2">
            <div className="rounded-lg border-2 border-dashed border-slate-200 bg-slate-50/50 p-2 flex items-center justify-center text-[9px] text-slate-400 font-mono">
              {step.phase === 'lifecycle'
                ? '🧹 매일 00:00 UTC 자동 청소'
                : step.phase === 'create'
                  ? '🔧 IMMUTABLE + scanOnPush'
                  : step.phase === 'login'
                    ? '🔑 12시간 임시 토큰'
                    : step.phase === 'push'
                      ? '🏷️ tag → push 변경분만'
                      : '🛡️ IAM 임시 자격증명'}
            </div>
            <FlowArrow
              flowDir={step.flowDir === 'pull' ? 'pull' : null}
              label={step.flowDir === 'pull' ? 'pull' : ''}
              sub={step.flowDir === 'pull' ? 'docker pull' : ''}
            />
            <Ec2Box
              active={step.ec2Active}
              iamAttached={step.iamAttached}
              pulledOnEc2={step.pulledOnEc2}
            />
          </div>

          {/* 단계 요약 패널 */}
          <div className="mt-3 bg-sky-50 border border-sky-200 rounded-lg p-2.5">
            <div className="flex items-center gap-2 text-[10px] font-mono">
              <span className="bg-sky-600 text-white px-1.5 py-0.5 rounded font-bold">
                phase: {step.phase}
              </span>
              <span className="text-slate-600">
                images in ECR: <strong className="text-sky-700">{step.imagesInRepo.length}</strong>
              </span>
              {step.expiredTags.length > 0 && (
                <span className="text-rose-600">
                  · expired: <strong>{step.expiredTags.length}</strong>
                </span>
              )}
            </div>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-2 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded border border-slate-300 bg-white"></span>idle
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-violet-500"></span>IAM
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>lifecycle
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>expired
            </span>
            <span className="ml-auto font-mono">region: {REGION}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일 탭(전체 5개), 윈도우 dot, 라인 번호, 강조 라인
    //   현재 step 의 파일명을 active 탭으로 보여준다
    // ─────────────────────────────────────────────────────
    const FILE_TABS = [
      'create-repo.sh',
      'login.sh',
      'tag-push.sh',
      'iam-pull.sh',
      'lifecycle.json',
    ];

    function CodeViewer({ code, stepIdx, total, onTab }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-3 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5 mr-2">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <div className="flex gap-0.5 overflow-x-auto flex-1">
              {FILE_TABS.map((name, i) => {
                const activeTab = i === stepIdx;
                return (
                  <button
                    key={name}
                    onClick={() => onTab && onTab(i)}
                    className={`px-2 py-1 text-[10px] font-mono rounded-t transition whitespace-nowrap ${
                      activeTab
                        ? 'bg-[#282c34] text-sky-300 border-t border-l border-r border-slate-700'
                        : 'text-slate-500 hover:text-slate-300'
                    }`}
                  >
                    {name}
                  </button>
                );
              })}
            </div>
            <span className="text-[10px] text-slate-500 font-mono uppercase ml-2 flex-shrink-0">
              {code.lang}
            </span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    //   탭 클릭 시 해당 step 으로 점프
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      const handleTab = (i) => {
        setStepIdx(i);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VIII-1-14</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VIII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VIII. Docker on Cloud &gt; Chapter 1. AWS</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-1-14. ECR 활용 — 사내 전용 이미지 레지스트리</h1>
                  <p className="text-sm text-slate-500 mt-0.5">로컬 빌드 → ECR push → EC2 pull(IAM) → lifecycle 자동 청소까지 5단계로 끝낸다</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                code={step.code}
                stepIdx={stepIdx}
                total={STEPS.length}
                onTab={handleTab}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>create → login → push → pull(IAM) → lifecycle</strong> — 이 5단계가 ECR 운용 전부다. 다음(VIII-1-15)에서는 ECS / Fargate 로 컨테이너를 진짜 띄워본다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['ECR', 'create-repository', 'get-login-password', 'docker push', 'docker pull', 'IAM role', 'ReadOnly', 'lifecycle policy', 'IMMUTABLE', 'scanOnPush'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./viii-1-13_aws_ecs_basics.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; VIII-1-13 ECS 기본</a>
              <a href="./viii-1-15_aws_fargate.html" className="text-sky-700 hover:text-sky-900 font-medium">VIII-1-15 Fargate &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
