<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — ECR 사용</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes moveRight { 0%{transform:translateX(0);opacity:1;} 50%{transform:translateX(50px);opacity:0.5;} 100%{transform:translateX(100px);opacity:0;} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · Docker Hub vs ECR — 왜 ECR인가",
        desc: "Docker Hub는 기본 공개 저장소라 내부 이미지를 올리기에 부적합하다. ECR은 AWS 계정 안의 비공개 레지스트리로, EC2/ECS와 자연스럽게 연동되고 같은 리전 내 네트워크 비용이 무료다.",
        phase: "compare",
      },
      {
        title: "STEP 2 · ECR 리포지토리 생성",
        desc: "aws ecr create-repository --repository-name demo-app 명령으로 프라이빗 리포지토리를 생성한다. 응답에서 repositoryUri 값을 메모해둔다. 이후 docker tag와 docker push에 사용한다.",
        phase: "create_repo",
      },
      {
        title: "STEP 3 · ECR 로그인 + 이미지 푸시",
        desc: "aws ecr get-login-password로 임시 토큰(12시간 유효)을 받아 docker login에 전달한다. 로컬에서 빌드한 이미지에 ECR URI 태그를 추가하고 docker push로 업로드한다.",
        phase: "push",
      },
      {
        title: "STEP 4 · EC2에서 이미지 풀 — IAM 역할",
        desc: "EC2에 AmazonEC2ContainerRegistryReadOnly IAM 역할을 연결하면, 자격 증명 파일 없이 ECR에서 이미지를 풀할 수 있다. 최소 권한 원칙: 운영 서버는 ReadOnly, 빌드 서버는 PowerUser.",
        phase: "pull",
      },
      {
        title: "STEP 5 · 이미지 수명 주기 정책",
        desc: "이미지를 계속 푸시하면 ECR 저장 비용이 누적된다. 수명 주기 정책으로 '최근 10개 이미지만 유지'처럼 설정하면 오래된 이미지를 자동 삭제하여 비용을 절감한다.",
        phase: "lifecycle",
      },
      {
        title: "STEP 6 · ECR 전체 흐름 완성",
        desc: "로컬에서 이미지 빌드 → ECR에 태그 + 푸시 → EC2에서 IAM 역할로 인증 후 풀 → 컨테이너 실행. 같은 AWS 리전 내에서 모든 전송이 무료이고 보안이 보장된다.",
        phase: "complete",
      },
    ];

    function CompareView() {
      const items = [
        { field: "기본 공개 여부", hub: "공개 (Public)", ecr: "비공개 (Private)" },
        { field: "인증 방식", hub: "사용자 계정", ecr: "AWS IAM" },
        { field: "AWS 서비스 연동", hub: "별도 설정 필요", ecr: "자동 연동" },
        { field: "이미지 스캔", hub: "유료", ecr: "기본 스캔 무료" },
        { field: "네트워크 비용", hub: "전송 비용 발생", ecr: "같은 리전 무료" },
      ];
      return (
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden anim-fade">
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-slate-100">
                <th className="p-3 text-left text-slate-600">항목</th>
                <th className="p-3 text-center text-slate-600">Docker Hub</th>
                <th className="p-3 text-center text-blue-700 font-bold">AWS ECR</th>
              </tr>
            </thead>
            <tbody>
              {items.map((r, i) => (
                <tr key={i} className="border-t border-slate-100 anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                  <td className="p-3 font-medium text-slate-700">{r.field}</td>
                  <td className="p-3 text-center text-slate-500">{r.hub}</td>
                  <td className="p-3 text-center text-blue-700 font-bold">{r.ecr}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function CreateRepoView() {
      return (
        <div className="space-y-4 anim-fade">
          <div className="bg-gray-900 rounded-xl p-5 font-mono text-sm">
            <div className="flex items-center gap-2 mb-3">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-green-500"></div>
              <span className="text-gray-400 text-xs ml-2">Terminal (로컬)</span>
            </div>
            <div className="text-green-300">$ aws ecr create-repository \</div>
            <div className="text-green-300 ml-4">--repository-name demo-app \</div>
            <div className="text-green-300 ml-4">--region ap-northeast-2</div>
          </div>
          <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-5">
            <h4 className="font-bold text-blue-800 mb-3">응답 (JSON)</h4>
            <div className="bg-white rounded-lg p-4 font-mono text-xs space-y-1">
              <div className="text-slate-400">{"{"}</div>
              <div className="ml-4"><span className="text-blue-600">"repositoryName"</span>: <span className="text-green-600">"demo-app"</span>,</div>
              <div className="ml-4 bg-yellow-100 px-1 rounded"><span className="text-blue-600">"repositoryUri"</span>: <span className="text-green-600">"123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/demo-app"</span></div>
              <div className="text-slate-400">{"}"}</div>
            </div>
            <p className="text-xs text-blue-600 mt-2 font-bold">repositoryUri를 메모! docker tag와 docker push에 사용합니다.</p>
          </div>
        </div>
      );
    }

    function PushView() {
      const commands = [
        { cmd: "aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin <ECR_URI>", desc: "ECR 로그인 (12시간 유효 토큰)", icon: "🔑" },
        { cmd: "docker build -t demo-app:latest .", desc: "로컬에서 이미지 빌드", icon: "🔨" },
        { cmd: "docker tag demo-app:latest 123456789012.dkr.ecr.../demo-app:v1.0.0", desc: "ECR URI 형식으로 태그 추가", icon: "🏷️" },
        { cmd: "docker push 123456789012.dkr.ecr.../demo-app:v1.0.0", desc: "ECR에 이미지 푸시", icon: "📤" },
      ];
      return (
        <div className="bg-gray-900 rounded-xl p-5 anim-fade">
          <div className="flex items-center gap-2 mb-4">
            <div className="w-3 h-3 rounded-full bg-red-500"></div>
            <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div className="w-3 h-3 rounded-full bg-green-500"></div>
            <span className="text-gray-400 text-xs ml-2">Terminal (로컬)</span>
          </div>
          <div className="space-y-4">
            {commands.map((c, i) => (
              <div key={i} className="anim-slide" style={{animationDelay:`${i*0.2}s`}}>
                <div className="flex items-center gap-3">
                  <span className="text-xl">{c.icon}</span>
                  <code className="text-green-400 font-mono text-xs break-all">$ {c.cmd}</code>
                </div>
                <p className="text-gray-500 text-xs ml-10 mt-1">{c.desc}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function PullView() {
      return (
        <div className="space-y-4 anim-fade">
          <div className="bg-white rounded-xl border-2 border-purple-200 p-5">
            <h4 className="font-bold text-purple-800 mb-3">IAM 역할 설정 흐름</h4>
            <div className="space-y-3">
              {[
                { step: "1", text: "IAM → 역할 만들기 → AWS 서비스 → EC2", icon: "👤" },
                { step: "2", text: "정책 연결: AmazonEC2ContainerRegistryReadOnly", icon: "📋" },
                { step: "3", text: "EC2 인스턴스 → 보안 → IAM 역할 수정 → 역할 연결", icon: "🔗" },
              ].map((s, i) => (
                <div key={i} className="flex items-center gap-3 p-3 bg-purple-50 rounded-lg anim-slide" style={{animationDelay:`${i*0.15}s`}}>
                  <span className="w-8 h-8 bg-purple-200 rounded-full flex items-center justify-center text-purple-700 font-bold text-sm">{s.step}</span>
                  <span className="text-xl">{s.icon}</span>
                  <span className="text-sm">{s.text}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="bg-gray-900 rounded-xl p-5 font-mono text-sm">
            <div className="text-gray-400 mb-2"># EC2에서 (IAM 역할 덕분에 자격 증명 불필요)</div>
            <div className="text-green-300">$ aws ecr get-login-password | docker login ...</div>
            <div className="text-cyan-300 mt-1">Login Succeeded</div>
            <div className="text-green-300 mt-2">$ docker pull 123456789012.dkr.ecr.../demo-app:latest</div>
            <div className="text-white mt-1">latest: Pulling from demo-app ... Pull complete</div>
          </div>
          <div className="bg-amber-50 border border-amber-200 rounded-xl p-3">
            <p className="text-xs text-amber-700"><strong>최소 권한 원칙:</strong> 운영 서버 → ReadOnly, 빌드 서버(CI) → PowerUser(push 포함)</p>
          </div>
        </div>
      );
    }

    function LifecycleView() {
      return (
        <div className="space-y-4 anim-fade">
          <div className="bg-white rounded-xl border-2 border-blue-200 p-5">
            <h4 className="font-bold text-blue-800 mb-3">수명 주기 정책 예시: 최근 10개만 유지</h4>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <div className="bg-gray-900 rounded-lg p-3 font-mono text-xs text-green-300">
                  <div>{"{"}</div>
                  <div className="ml-2">"rules": [{"{"}</div>
                  <div className="ml-4">"description": "최근 10개만 유지",</div>
                  <div className="ml-4">"selection": {"{"}</div>
                  <div className="ml-6 text-yellow-300">"countNumber": 10</div>
                  <div className="ml-4">{"}"},</div>
                  <div className="ml-4">"action": {"{"} "type": "expire" {"}"}</div>
                  <div className="ml-2">{"}"}]</div>
                  <div>{"}"}</div>
                </div>
              </div>
              <div className="space-y-2">
                <div className="text-sm font-bold text-slate-700 mb-2">이미지 보관 상태:</div>
                {["v1.0.0", "v1.0.1", "v1.0.2", "...", "v1.0.9 (최신)"].map((v, i) => (
                  <div key={i} className={`flex items-center justify-between px-3 py-1.5 rounded-lg text-xs ${
                    v === "v1.0.0" ? 'bg-red-100 text-red-600 line-through' : 'bg-green-100 text-green-700'
                  } anim-slide`} style={{animationDelay:`${i*0.1}s`}}>
                    <span>{v}</span>
                    <span>{v === "v1.0.0" ? '자동 삭제' : '유지'}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function CompleteView() {
      const flow = [
        { label: "로컬 빌드", icon: "💻", desc: "docker build" },
        { label: "태그 추가", icon: "🏷️", desc: "docker tag" },
        { label: "ECR 푸시", icon: "📤", desc: "docker push" },
        { label: "EC2 풀", icon: "📥", desc: "docker pull" },
        { label: "실행", icon: "🚀", desc: "docker run" },
      ];
      return (
        <div className="space-y-4 anim-fade">
          <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6">
            <div className="text-center mb-4">
              <div className="text-4xl mb-3">🎉</div>
              <h3 className="text-xl font-bold text-emerald-800">ECR 전체 흐름 완성!</h3>
            </div>
            <div className="flex items-center justify-between">
              {flow.map((f, i) => (
                <React.Fragment key={i}>
                  <div className="flex flex-col items-center anim-slide" style={{animationDelay:`${i*0.15}s`}}>
                    <span className="text-2xl mb-1">{f.icon}</span>
                    <span className="text-xs font-bold">{f.label}</span>
                    <span className="text-xs text-slate-500">{f.desc}</span>
                  </div>
                  {i < flow.length - 1 && <div className="text-blue-400 font-bold">→</div>}
                </React.Fragment>
              ))}
            </div>
          </div>
          <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 text-center">
            <p className="text-sm text-blue-700">같은 AWS 리전 내 EC2 ↔ ECR 전송은 <strong>네트워크 비용 무료!</strong></p>
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const renderVisual = () => {
        switch(data.phase) {
          case "compare": return <CompareView />;
          case "create_repo": return <CreateRepoView />;
          case "push": return <PushView />;
          case "pull": return <PullView />;
          case "lifecycle": return <LifecycleView />;
          case "complete": return <CompleteView />;
          default: return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VIII-1-14: ECR(Elastic Container Registry) 사용</h1>
              </div>
              <p className="text-slate-500 text-sm">ECR 레포 생성 → 로그인 → 이미지 푸시 → EC2에서 풀 전체 흐름을 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "complete" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "pull" ? "bg-purple-600 border-purple-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            <div key={`visual-${step}`}>{renderVisual()}</div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
