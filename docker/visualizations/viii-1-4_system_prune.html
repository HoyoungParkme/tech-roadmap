    // ─────────────────────────────────────────────────────
    function DiskBar({ cat, sizeGB, reclaimGB, focused }) {
      const usedPct = (sizeGB / MAX_GB) * 100;
      const reclaimPct = (reclaimGB / MAX_GB) * 100;
      const reclaimRatio = sizeGB > 0 ? Math.round((reclaimGB / sizeGB) * 100) : 0;
      return (
        <div
          className={`rounded-lg border-2 p-2.5 transition-all duration-500 ${
            focused ? 'bg-sky-50 border-sky-400 shadow-md' : 'bg-white border-slate-200'
          }`}
        >
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">{cat.icon}</span>
              <span className={`text-[11px] font-bold ${focused ? 'text-sky-800' : 'text-slate-700'}`}>
                {cat.label}
              </span>
            </div>
            <div className="text-right">
              <div className={`text-[11px] font-mono font-bold ${focused ? 'text-sky-700' : 'text-slate-700'}`}>
                {sizeGB.toFixed(2)} GB
              </div>
              {reclaimGB > 0 && (
                <div className="text-[9px] font-mono text-amber-600">
                  회수 {reclaimGB.toFixed(2)} ({reclaimRatio}%)
                </div>
              )}
            </div>
          </div>

          {/* 막대 */}
          <div className="relative h-4 bg-slate-100 rounded-full overflow-hidden">
            {/* 전체 사용량 */}
            <div
              className={`absolute left-0 top-0 h-full transition-all duration-700 ease-out ${
                focused ? 'bg-sky-500' : 'bg-slate-400'
              }`}
              style={{ width: `${Math.max(usedPct, sizeGB > 0 ? 1 : 0)}%` }}
            />
            {/* 회수 가능 영역 (사용량 막대 안에 amber 줄무늬) */}
            {reclaimGB > 0 && (
              <div
                className="absolute right-0 top-0 h-full bg-amber-400 transition-all duration-700 ease-out"
                style={{
                  left: `${usedPct - reclaimPct}%`,
                  width: `${reclaimPct}%`,
                }}
                title={`회수 가능: ${reclaimGB.toFixed(2)} GB`}
              />
            )}
          </div>

          <div className="text-[9px] text-slate-500 mt-1 leading-tight">{cat.desc}</div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — 디스크 사용량 막대 4개 + 총합 + 직전 단계 회수 효과
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const total =
        step.disk.images + step.disk.containers + step.disk.volumes + step.disk.cache;
      const reclaimable =
        step.reclaim.images +
        step.reclaim.containers +
        step.reclaim.volumes +
        step.reclaim.cache;

      const alertColor = {
        danger: 'bg-rose-50 border-rose-300 text-rose-800',
        info: 'bg-sky-50 border-sky-300 text-sky-800',
        success: 'bg-emerald-50 border-emerald-300 text-emerald-800',
      }[step.alert] || 'bg-slate-50 border-slate-200 text-slate-600';

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">💽 /var/lib/docker 디스크 사용량</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 상단 alert */}
          <div className={`rounded-lg border-2 p-2 mb-3 text-[12px] font-semibold ${alertColor}`}>
            {step.alertText}
          </div>

          {/* 총합 카드 */}
          <div className="grid grid-cols-3 gap-2 mb-3">
            <div className="rounded-lg border-2 border-slate-300 bg-slate-50 p-2 text-center">
              <div className="text-[9px] text-slate-500 font-bold uppercase">현재 사용</div>
              <div className="text-lg font-mono font-bold text-slate-700">
                {total.toFixed(2)}
                <span className="text-[10px] ml-1 text-slate-500">GB</span>
              </div>
            </div>
            <div className="rounded-lg border-2 border-amber-300 bg-amber-50 p-2 text-center">
              <div className="text-[9px] text-amber-700 font-bold uppercase">회수 가능</div>
              <div className="text-lg font-mono font-bold text-amber-700">
                {reclaimable.toFixed(2)}
                <span className="text-[10px] ml-1">GB</span>
              </div>
            </div>
            <div
              className={`rounded-lg border-2 p-2 text-center transition-all duration-500 ${
                step.reclaimed > 0
                  ? 'border-emerald-400 bg-emerald-50'
                  : 'border-slate-200 bg-slate-50 opacity-60'
              }`}
            >
              <div
                className={`text-[9px] font-bold uppercase ${
                  step.reclaimed > 0 ? 'text-emerald-700' : 'text-slate-400'
                }`}
              >
                이번 단계 회수
              </div>
              <div
                className={`text-lg font-mono font-bold ${
                  step.reclaimed > 0 ? 'text-emerald-700' : 'text-slate-400'
                }`}
              >
                {step.reclaimed > 0 ? `−${step.reclaimed.toFixed(2)}` : '0.00'}
                <span className="text-[10px] ml-1">GB</span>
              </div>
            </div>
          </div>

          {/* 카테고리별 막대 */}
          <div className="space-y-2">
            {CATEGORIES.map((cat) => (
              <DiskBar
                key={cat.key}
                cat={cat}
                sizeGB={step.disk[cat.key]}
                reclaimGB={step.reclaim[cat.key]}
                focused={step.focus.includes(cat.key)}
              />
            ))}
          </div>

          {/* 단계별 누적 정리 효과 — 작은 진행 막대 */}
          <div className="mt-3 pt-3 border-t border-slate-100">
            <div className="flex items-center justify-between text-[10px] text-slate-500 mb-1">
              <span className="font-semibold">5단계 누적 회수</span>
              <span className="font-mono">{(4.70 - total).toFixed(2)} / 4.15 GB</span>
            </div>
            <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
              <div
                className="h-full bg-gradient-to-r from-sky-400 to-emerald-500 transition-all duration-700"
                style={{ width: `${Math.min(((4.70 - total) / 4.15) * 100, 100)}%` }}
              />
            </div>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>focused
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-400"></span>used
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-400"></span>reclaimable
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>reclaimed
            </span>
            <span className="ml-auto font-mono">phase: {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, sky 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 ←/→
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VIII-1-4</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VIII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VIII. 운영 &gt; Chapter 1. 디스크 관리</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-1-4. system prune — 디스크 정리 한 방</h1>
                  <p className="text-sm text-slate-500 mt-0.5">df 측정 → container/image prune 좁게 → system prune -a --volumes 전체 정리까지 5단계</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: <strong>df</strong>(측정) → <strong>container prune</strong>(안전) → <strong>image prune -a</strong>(강력) → <strong>system prune -a --volumes</strong>(전체) — 운영서버에서는 <strong>--volumes</strong>를 신중히, 개인 머신은 한 줄로 끝낸다. 다음(VIII-1-5)에서는 자동 정리 cron / 디스크 모니터링을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['system df', 'container prune', 'image prune -a', 'system prune', '--volumes', 'dangling', 'reclaimable', 'BuildKit cache', 'until filter'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./viii-1-3_logs_inspect.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; VIII-1-3 logs / inspect</a>
              <a href="./viii-1-5_disk_monitoring.html" className="text-sky-700 hover:text-sky-900 font-medium">VIII-1-5 디스크 모니터링 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
