<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — system prune과 디스크 관리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes shrink { from{transform:scaleY(1);} to{transform:scaleY(0);} }
    @keyframes grow { from{width:0%;} to{width:100%;} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · 디스크가 부족하다!",
        desc: "Docker를 계속 사용하다 보면 중지된 컨테이너, 댕글링 이미지, 미사용 볼륨, 빌드 캐시가 쌓인다. docker system df로 현황을 파악하는 것이 첫 번째 단계다.",
        phase: "problem",
        disk: { images: 2.45, containers: 0.15, volumes: 1.2, cache: 0.51, reclaimable: 3.28 },
      },
      {
        title: "STEP 2 · docker system df — 현황 파악",
        desc: "이미지 2.45GB 중 1.82GB 회수 가능, 컨테이너 156MB 중 134MB 회수 가능, 볼륨 1.2GB 중 800MB 회수 가능, 빌드 캐시 512MB 전부 회수 가능. RECLAIMABLE이 정리 가능한 용량이다.",
        phase: "df",
        disk: { images: 2.45, containers: 0.15, volumes: 1.2, cache: 0.51, reclaimable: 3.28 },
      },
      {
        title: "STEP 3 · docker system prune — 기본 정리",
        desc: "중지된 컨테이너 + 미사용 네트워크 + 댕글링 이미지 + 빌드 캐시를 한 번에 삭제한다. 실행 중인 컨테이너와 연결된 이미지, 그리고 볼륨은 건드리지 않는다. 안전한 기본 정리다.",
        phase: "prune",
        disk: { images: 0.63, containers: 0.02, volumes: 1.2, cache: 0.0, reclaimable: 0.4 },
      },
      {
        title: "STEP 4 · docker system prune -a — 강력 정리",
        desc: "-a를 추가하면 댕글링 이미지뿐 아니라 실행 중인 컨테이너에서 사용하지 않는 모든 이미지도 삭제된다. 다음에 필요할 때 다시 pull해야 한다. 신중하게 사용한다.",
        phase: "prune_a",
        disk: { images: 0.12, containers: 0.02, volumes: 1.2, cache: 0.0, reclaimable: 0.0 },
      },
      {
        title: "STEP 5 · 개별 prune vs 전체 prune",
        desc: "container prune, image prune, volume prune, network prune, builder prune으로 특정 항목만 선택 정리할 수 있다. volume prune은 DB 데이터가 삭제될 수 있어 가장 주의가 필요하다.",
        phase: "individual",
        disk: { images: 0.12, containers: 0.02, volumes: 1.2, cache: 0.0, reclaimable: 0.0 },
      },
      {
        title: "STEP 6 · 안전한 정리 플로차트",
        desc: "디스크 부족 → system df로 확인 → 빌드 캐시 많으면 builder prune → 중지된 컨테이너 많으면 container prune → 댕글링 이미지 많으면 image prune → 볼륨은 ls로 확인 후 개별 rm.",
        phase: "flowchart",
        disk: { images: 0.12, containers: 0.02, volumes: 0.4, cache: 0.0, reclaimable: 0.0 },
      },
    ];

    function DiskBar({ label, sizeGB, maxGB, color, reclaimPercent, phase }) {
      const widthPercent = (sizeGB / maxGB) * 100;
      const colorMap = {
        blue: { bg: "bg-blue-500", light: "bg-blue-100", text: "text-blue-700", border: "border-blue-200" },
        amber: { bg: "bg-amber-500", light: "bg-amber-100", text: "text-amber-700", border: "border-amber-200" },
        green: { bg: "bg-green-500", light: "bg-green-100", text: "text-green-700", border: "border-green-200" },
        purple: { bg: "bg-purple-500", light: "bg-purple-100", text: "text-purple-700", border: "border-purple-200" },
      };
      const c = colorMap[color];
      return (
        <div className={`${c.light} border ${c.border} rounded-lg p-3 anim-fade`}>
          <div className="flex justify-between items-center mb-2">
            <span className={`font-bold text-sm ${c.text}`}>{label}</span>
            <span className={`font-mono text-sm ${c.text}`}>{sizeGB.toFixed(2)} GB</span>
          </div>
          <div className="bg-white rounded-full h-4 overflow-hidden">
            <div className={`${c.bg} h-full rounded-full transition-all duration-1000 ease-out`} style={{ width: `${Math.max(widthPercent, 2)}%` }}></div>
          </div>
          {reclaimPercent > 0 && (
            <div className="text-xs text-slate-500 mt-1">회수 가능: {reclaimPercent}%</div>
          )}
        </div>
      );
    }

    function PruneTable() {
      const rows = [
        { cmd: "container prune", target: "중지된 컨테이너", danger: "낮음", color: "green" },
        { cmd: "image prune", target: "댕글링 이미지 (<none>)", danger: "낮음", color: "green" },
        { cmd: "image prune -a", target: "미사용 모든 이미지", danger: "높음", color: "amber" },
        { cmd: "volume prune", target: "미사용 볼륨 (데이터 포함!)", danger: "매우 높음", color: "red" },
        { cmd: "network prune", target: "미사용 네트워크", danger: "낮음", color: "green" },
        { cmd: "system prune", target: "컨테이너+네트워크+댕글링+캐시", danger: "중간", color: "amber" },
        { cmd: "system prune -a", target: "+ 모든 미사용 이미지", danger: "높음", color: "amber" },
        { cmd: "system prune -a --volumes", target: "+ 볼륨 포함", danger: "매우 높음", color: "red" },
      ];
      const dangerColor = { "낮음": "bg-green-100 text-green-700", "중간": "bg-amber-100 text-amber-700", "높음": "bg-orange-100 text-orange-700", "매우 높음": "bg-red-100 text-red-700" };
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 overflow-x-auto anim-fade">
          <h4 className="font-bold text-slate-700 mb-3">개별 prune 명령 비교</h4>
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-slate-50">
                <th className="text-left px-3 py-2 font-bold text-slate-600">명령</th>
                <th className="text-left px-3 py-2 font-bold text-slate-600">삭제 대상</th>
                <th className="text-left px-3 py-2 font-bold text-slate-600">주의 수준</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => (
                <tr key={i} className="border-t border-slate-100 anim-slide" style={{animationDelay:`${i*0.05}s`}}>
                  <td className="px-3 py-2 font-mono text-blue-600 text-xs">{r.cmd}</td>
                  <td className="px-3 py-2 text-slate-700">{r.target}</td>
                  <td className="px-3 py-2"><span className={`px-2 py-0.5 rounded text-xs font-bold ${dangerColor[r.danger]}`}>{r.danger}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function FlowChart() {
      const steps = [
        { icon: "💾", label: "디스크 부족", sub: "docker system df -v", color: "red" },
        { icon: "🔨", label: "빌드 캐시", sub: "builder prune", color: "purple" },
        { icon: "📦", label: "중지된 컨테이너", sub: "container prune", color: "blue" },
        { icon: "🖼️", label: "댕글링 이미지", sub: "image prune", color: "amber" },
        { icon: "💿", label: "볼륨 (주의!)", sub: "volume ls → rm", color: "red" },
      ];
      return (
        <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6 anim-fade">
          <h3 className="text-lg font-bold text-emerald-800 mb-4 text-center">안전한 디스크 정리 순서</h3>
          <div className="flex flex-wrap items-center justify-center gap-2 md:gap-3">
            {steps.map((s, i) => (
              <React.Fragment key={i}>
                <div className={`bg-white border-2 border-${s.color}-300 rounded-xl p-3 text-center min-w-[100px] anim-slide`} style={{animationDelay:`${i*0.15}s`}}>
                  <div className="text-2xl mb-1">{s.icon}</div>
                  <div className={`text-xs font-bold text-${s.color}-800`}>{s.label}</div>
                  <div className="text-xs text-slate-500 mt-1 font-mono">{s.sub}</div>
                </div>
                {i < steps.length - 1 && <div className="text-slate-400 font-bold">→</div>}
              </React.Fragment>
            ))}
          </div>
          <div className="mt-4 bg-red-50 border border-red-200 rounded-lg p-3 text-center">
            <span className="text-red-600 text-sm font-bold">⚠ volume prune은 DB 데이터가 삭제될 수 있다. 반드시 volume ls로 확인 후 개별 rm!</span>
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4500);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const totalUsed = data.disk.images + data.disk.containers + data.disk.volumes + data.disk.cache;
      const maxGB = 4.5;

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VIII-1-4: system prune과 디스크 관리</h1>
              </div>
              <p className="text-slate-500 text-sm">Docker가 차지하는 디스크 공간을 파악하고 안전하게 정리하는 과정을 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "flowchart" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "problem" ? "bg-red-600 border-red-700 text-white" :
              data.phase === "prune_a" ? "bg-orange-600 border-orange-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 디스크 사용량 시각화 */}
            <div key={`disk-${step}`} className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
              <div className="flex justify-between items-center mb-4">
                <h4 className="font-bold text-slate-700">Docker 디스크 사용량</h4>
                <span className="font-mono text-sm text-slate-500">총 {totalUsed.toFixed(2)} GB</span>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                <DiskBar label="이미지 (Images)" sizeGB={data.disk.images} maxGB={maxGB} color="blue" reclaimPercent={data.phase === "df" ? 74 : 0} />
                <DiskBar label="컨테이너 (Containers)" sizeGB={data.disk.containers} maxGB={maxGB} color="green" reclaimPercent={data.phase === "df" ? 86 : 0} />
                <DiskBar label="볼륨 (Volumes)" sizeGB={data.disk.volumes} maxGB={maxGB} color="amber" reclaimPercent={data.phase === "df" ? 66 : 0} />
                <DiskBar label="빌드 캐시 (Build Cache)" sizeGB={data.disk.cache} maxGB={maxGB} color="purple" reclaimPercent={data.phase === "df" ? 100 : 0} />
              </div>
            </div>

            {/* 정리 효과 표시 */}
            {(data.phase === "prune" || data.phase === "prune_a") && (
              <div className={`border-2 rounded-xl p-4 text-center anim-fade ${
                data.phase === "prune_a" ? "bg-orange-50 border-orange-300" : "bg-emerald-50 border-emerald-300"
              }`}>
                <span className={`font-bold text-lg ${data.phase === "prune_a" ? "text-orange-700" : "text-emerald-700"}`}>
                  {data.phase === "prune" ? "✅ system prune 완료 — 볼륨은 유지됨" : "⚠ system prune -a 완료 — 미사용 이미지까지 삭제됨"}
                </span>
                <p className={`text-sm mt-1 ${data.phase === "prune_a" ? "text-orange-600" : "text-emerald-600"}`}>
                  {data.phase === "prune" ? "회수된 공간: 약 2.5GB" : "회수된 공간: 약 3.0GB (이미지 재다운로드 필요)"}
                </p>
              </div>
            )}

            {/* 개별 prune 테이블 */}
            {data.phase === "individual" && <PruneTable />}

            {/* 플로차트 */}
            {data.phase === "flowchart" && <FlowChart />}

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
