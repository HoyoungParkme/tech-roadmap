<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — 언제 Docker를 선택하나</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes scaleIn { from{opacity:0;transform:scale(0.9);} to{opacity:1;transform:scale(1);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-scale { animation: scaleIn 0.4s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · 전동 드릴 비유",
        desc: "나사 하나를 박는데 전동 드릴을 꺼내면 오히려 느리다. 배터리 충전, 비트 장착, 토크 조절... 나사 하나에 5분. 드라이버면 30초다. Docker도 마찬가지 — 강력하지만 모든 상황에 맞지는 않다.",
        phase: "intro",
      },
      {
        title: "STEP 2 · Docker가 빛나는 상황",
        desc: "팀 환경 통일, CI/CD 파이프라인, 마이크로서비스, 레거시 이전 — 이런 상황에서 Docker는 진가를 발휘한다. 복잡도를 줄이고 재현성을 높인다.",
        phase: "good",
      },
      {
        title: "STEP 3 · Docker가 과잉인 상황",
        desc: "혼자 스크립트 돌리기, 팀 전원 같은 환경, 배포 빈도 낮은 단순 서비스 — Docker 없이도 충분히 해결되는 문제에 Docker를 쓰면 오히려 관리 비용이 늘어난다.",
        phase: "bad",
      },
      {
        title: "STEP 4 · 의사결정 플로우차트",
        desc: "4가지 질문에 답하면 Docker가 필요한지 판단할 수 있다. 하나라도 '예'라면 Docker 도입을 고려하고, 모두 '아니오'라면 Docker 없이 시작해도 된다.",
        phase: "flowchart",
      },
      {
        title: "STEP 5 · 핵심 정리",
        desc: "도구는 문제를 해결하기 위해 존재한다. Docker가 목적이 되어서는 안 된다. '우리 팀에 Docker가 필요한가?'를 먼저 묻고, 필요하다면 도입하는 것이 좋은 엔지니어링이다.",
        phase: "summary",
      },
    ];

    /* -- 전동 드릴 비유 -- */
    function DrillIntro() {
      return (
        <div className="grid grid-cols-2 gap-4 anim-fade">
          <div className="bg-white rounded-xl border-2 border-emerald-300 p-5 text-center">
            <div className="text-4xl mb-2">🪛</div>
            <div className="font-bold text-emerald-800">드라이버</div>
            <div className="text-sm text-slate-600 mt-2">나사 1개 → 30초</div>
            <div className="mt-3 bg-emerald-50 rounded-lg p-2">
              <div className="text-xs text-emerald-700 font-medium">단순한 문제에 단순한 도구</div>
            </div>
          </div>
          <div className="bg-white rounded-xl border-2 border-orange-300 p-5 text-center">
            <div className="text-4xl mb-2">🔧</div>
            <div className="font-bold text-orange-800">전동 드릴</div>
            <div className="text-sm text-slate-600 mt-2">나사 1개 → 5분 (세팅 포함)</div>
            <div className="mt-3 bg-orange-50 rounded-lg p-2">
              <div className="text-xs text-orange-700 font-medium">대량 작업에 강력한 도구</div>
            </div>
          </div>
        </div>
      );
    }

    /* -- 적합한 상황 -- */
    function GoodScenarios() {
      const scenarios = [
        { icon: "👥", title: "팀 환경 통일", desc: "개발자 5명이 각자 다른 OS 사용. 신규 합류 시 환경 세팅에 하루 소요.", result: "docker compose up 한 줄로 해결", color: "border-emerald-300 bg-emerald-50" },
        { icon: "🔄", title: "CI/CD 파이프라인", desc: "코드 push마다 자동 테스트. 테스트 환경이 항상 동일해야 함.", result: "Docker 이미지로 테스트 환경 고정", color: "border-blue-300 bg-blue-50" },
        { icon: "🧩", title: "마이크로서비스", desc: "사용자·결제·알림 서비스를 각 팀이 독립 개발·배포.", result: "각 서비스를 컨테이너로 독립 배포", color: "border-purple-300 bg-purple-50" },
        { icon: "🏚️", title: "레거시 이전", desc: "오래된 앱을 클라우드로 이전. 정확한 실행 환경을 보존해야 함.", result: "Docker 이미지로 환경 그대로 패키징", color: "border-cyan-300 bg-cyan-50" },
      ];
      return (
        <div className="grid grid-cols-2 gap-3 anim-fade">
          {scenarios.map((s, i) => (
            <div key={i} className={`rounded-xl border-2 p-4 ${s.color} anim-scale`} style={{animationDelay:`${i*0.1}s`}}>
              <div className="flex items-center gap-2 mb-2">
                <span className="text-2xl">{s.icon}</span>
                <span className="font-bold text-sm">{s.title}</span>
              </div>
              <div className="text-xs text-slate-600 mb-2">{s.desc}</div>
              <div className="bg-white rounded-lg px-3 py-1.5 text-xs text-emerald-700 font-medium">✓ {s.result}</div>
            </div>
          ))}
        </div>
      );
    }

    /* -- 과잉 상황 -- */
    function BadScenarios() {
      const scenarios = [
        { icon: "👤", title: "혼자 스크립트 실행", desc: "매일 돌리는 Python 스크립트 1개. 라이브러리 충돌 없음.", better: "python script.py로 충분" },
        { icon: "💻", title: "동일 환경 팀", desc: "3명 모두 같은 맥북, 같은 Python 버전 사용.", better: "requirements.txt로 충분" },
        { icon: "📅", title: "배포 빈도 낮은 서비스", desc: "월 1회 배포. 정적 웹사이트 1개.", better: "FTP 또는 Netlify로 충분" },
      ];
      return (
        <div className="space-y-3 anim-fade">
          {scenarios.map((s, i) => (
            <div key={i} className="bg-white rounded-xl border-2 border-red-200 p-4 anim-slide" style={{animationDelay:`${i*0.12}s`}}>
              <div className="flex items-center gap-3">
                <span className="text-2xl">{s.icon}</span>
                <div className="flex-1">
                  <div className="font-bold text-sm text-slate-800">{s.title}</div>
                  <div className="text-xs text-slate-500 mt-0.5">{s.desc}</div>
                </div>
                <div className="bg-yellow-50 border border-yellow-200 rounded-lg px-3 py-1.5">
                  <div className="text-xs text-yellow-700 font-medium">💡 {s.better}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    /* -- 의사결정 플로우차트 -- */
    function Flowchart() {
      const questions = [
        { q: "팀원이 2명 이상이고 서로 다른 OS를 쓰는가?", yes: "Docker 고려", no: "다음 질문" },
        { q: "CI/CD에서 재현 가능한 테스트 환경이 필요한가?", yes: "Docker 고려", no: "다음 질문" },
        { q: "서비스가 2개 이상이고 독립 배포가 필요한가?", yes: "Docker 고려", no: "다음 질문" },
        { q: "배포 빈도가 주 1회 이상인가?", yes: "Docker 고려", no: "Docker 없이 시작" },
      ];
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 anim-fade">
          <h4 className="font-bold text-sm text-slate-700 mb-4 text-center">🤔 Docker 필요한가? — 4가지 질문</h4>
          <div className="space-y-3">
            {questions.map((q, i) => (
              <div key={i} className="anim-slide" style={{animationDelay:`${i*0.15}s`}}>
                <div className="bg-blue-50 border border-blue-200 rounded-lg p-3">
                  <div className="flex items-start gap-2">
                    <span className="bg-blue-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold flex-shrink-0 mt-0.5">Q{i+1}</span>
                    <div className="flex-1">
                      <div className="text-sm font-medium text-slate-800">{q.q}</div>
                      <div className="flex gap-3 mt-2">
                        <span className="bg-emerald-100 text-emerald-700 text-xs px-3 py-1 rounded-full font-medium">예 → {q.yes}</span>
                        <span className="bg-slate-100 text-slate-600 text-xs px-3 py-1 rounded-full font-medium">아니오 → {q.no}</span>
                      </div>
                    </div>
                  </div>
                </div>
                {i < questions.length - 1 && <div className="text-center text-slate-300 text-sm mt-1">▼</div>}
              </div>
            ))}
          </div>
          <div className="mt-4 bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-center">
            <span className="text-xs text-emerald-700 font-medium">하나라도 "예"라면 Docker 도입을 적극 검토</span>
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const phaseColor = data.phase === "bad" ? "bg-red-600 border-red-700" :
                          data.phase === "summary" ? "bg-emerald-600 border-emerald-700" :
                          "bg-blue-600 border-blue-700";

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter II-1-4: 언제 Docker를 선택하나</h1>
              </div>
              <p className="text-slate-500 text-sm">Docker가 빛나는 상황과 과잉인 상황을 구분합니다</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade text-white ${phaseColor}`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {data.phase === "intro" && <DrillIntro />}
            {data.phase === "good" && <GoodScenarios />}
            {data.phase === "bad" && <BadScenarios />}
            {data.phase === "flowchart" && <Flowchart />}

            {data.phase === "summary" && (
              <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6 anim-fade">
                <div className="text-center">
                  <div className="text-4xl mb-3">🎯</div>
                  <h3 className="text-xl font-bold text-emerald-800 mb-3">도구는 목적이 아니다</h3>
                  <div className="grid grid-cols-2 gap-4 max-w-md mx-auto">
                    <div className="bg-white rounded-lg p-3 border border-emerald-200 anim-slide">
                      <div className="text-lg mb-1">✅</div>
                      <div className="text-xs font-bold text-emerald-800">Docker가 필요할 때</div>
                      <div className="text-[10px] text-slate-500 mt-1">팀·CI/CD·MSA·이전</div>
                    </div>
                    <div className="bg-white rounded-lg p-3 border border-red-200 anim-slide" style={{animationDelay:"0.1s"}}>
                      <div className="text-lg mb-1">⏸️</div>
                      <div className="text-xs font-bold text-red-800">Docker 없이 시작</div>
                      <div className="text-[10px] text-slate-500 mt-1">혼자·동일환경·단순</div>
                    </div>
                  </div>
                  <p className="text-emerald-700 mt-4 text-sm">"우리 팀에 Docker가 필요한가?" 먼저 묻자</p>
                </div>
              </div>
            )}

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
