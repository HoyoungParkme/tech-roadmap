                    <span className={`text-[10px] font-bold ${titleTone}`}>{s.title}</span>
                  </div>
                  <span className={`text-[8px] px-1.5 py-0.5 rounded font-bold ${badgeTone}`}>
                    {isGood ? '적합' : '부적합'}
                  </span>
                </div>
                <div className="text-[9px] text-slate-600 leading-snug mb-1">
                  <span className="font-bold text-slate-700">상황:</span> {s.situation}
                </div>
                <div className="text-[9px] text-slate-600 leading-snug mb-1">
                  <span className="font-bold text-slate-700">왜:</span> {s.why}
                </div>
                <div
                  className={`text-[9px] leading-snug px-1.5 py-1 rounded ${
                    isGood ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'
                  }`}
                >
                  → {s.outcome}
                </div>
                {active && (
                  <div className="mt-1.5 flex justify-end">
                    <span
                      className={`text-[8px] font-mono font-bold px-1.5 py-0.5 rounded ${
                        isGood ? 'bg-emerald-700 text-white' : 'bg-rose-700 text-white'
                      }`}
                    >
                      📊 {s.metric}
                    </span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 단계별 인사이트 배너 — 좌측 패널 상단 보조
    //   tag 색상으로 INSIGHT / CAUTION / DECIDE 구분
    // ─────────────────────────────────────────────────────
    function InsightBanner({ stepIdx }) {
      const insight = STEP_INSIGHTS[stepIdx];
      const tone = insight.tag === 'CAUTION'
        ? 'bg-rose-50 border-rose-300 text-rose-800'
        : insight.tag === 'DECIDE'
        ? 'bg-sky-50 border-sky-300 text-sky-800'
        : 'bg-emerald-50 border-emerald-300 text-emerald-800';
      const badgeTone = insight.tag === 'CAUTION'
        ? 'bg-rose-600 text-white'
        : insight.tag === 'DECIDE'
        ? 'bg-sky-600 text-white'
        : 'bg-emerald-600 text-white';
      return (
        <div className={`rounded-lg border-2 p-2 flex items-center gap-2 ${tone}`}>
          <span className={`text-[8px] font-bold px-1.5 py-0.5 rounded ${badgeTone}`}>
            {insight.tag}
          </span>
          <span className="text-[10px] font-medium leading-snug flex-1">{insight.text}</span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: 의사결정 트리 — Step 5 에서만 표시
    //   질문 4 개 + yes/no 분기 시각화
    // ─────────────────────────────────────────────────────
    function DecisionTree() {
      return (
        <div className="bg-sky-50 border-2 border-sky-300 rounded-lg p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">🌳</span>
            <span className="text-[11px] font-bold text-sky-800">의사결정 트리 — 4 가지 질문</span>
          </div>
          <div className="space-y-1.5">
            {DECISION_TREE.map((q, i) => {
              const isLast = i === DECISION_TREE.length - 1;
              const yesTone = isLast ? 'bg-rose-100 text-rose-800 border-rose-300' : 'bg-emerald-100 text-emerald-800 border-emerald-300';
              return (
                <div key={i}>
                  <div className="bg-white rounded border border-sky-200 p-2">
                    <div className="flex items-start gap-1.5">
                      <span className="bg-sky-500 text-white text-[9px] w-5 h-5 rounded-full flex items-center justify-center font-bold flex-shrink-0">
                        Q{i + 1}
                      </span>
                      <div className="flex-1">
                        <div className="text-[10px] font-medium text-slate-800 leading-tight mb-1">{q.q}</div>
                        <div className="flex gap-1.5 flex-wrap">
                          <span className={`text-[9px] px-1.5 py-0.5 rounded border font-medium ${yesTone}`}>
                            yes → {q.yes}
                          </span>
                          <span className="text-[9px] px-1.5 py-0.5 rounded border border-slate-200 bg-slate-50 text-slate-600 font-medium">
                            no → {q.no}
                          </span>
                        </div>
                      </div>
                    </div>
                  </div>
                  {!isLast && <div className="text-center text-sky-300 text-[10px] leading-3 mt-0.5">▼</div>}
                </div>
              );
            })}
          </div>
          <div className="mt-2 bg-white rounded border-2 border-dashed border-sky-300 p-2 text-center">
            <span className="text-[10px] text-sky-800 font-bold">
              하나라도 yes → Docker 도입 검토 · 모두 no → Docker 없이 시작
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 패널 — LiveDataPane
    //   상단: 시나리오 카드 / 하단: 결정 트리(마지막 step)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step, stepIdx }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🐳 Docker 도입 시나리오 매트릭스</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <InsightBanner stepIdx={stepIdx} />
            <ScenarioGrid activeIds={step.activeIds} />
            {step.showTree && <DecisionTree />}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>적합 (Docker 도입)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>부적합 (네이티브 우선)
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-sky-500"></span>의사결정
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 라인 번호 + 강조
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="./index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-4</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. Docker 생태계 &gt; Chapter 1. 도구·표준·시점</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-1-4. 언제 Docker를 선택하나 — 적합 vs 부적합</h1>
                  <p className="text-sm text-slate-500 mt-0.5">전동 드릴 비유 — 강력하지만 모든 상황에 맞지 않다</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: Docker 는 <strong>팀 / CI / 분할</strong>에 강하고 <strong>GUI / 저지연 / GPU heavy</strong>에 약하다. 4 가지 질문 트리로 도입 여부를 객관적으로 결정하자. 다음(III-1-1)에서는 실제 설치와 동작 확인을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Microservices', 'CI/CD', 'compose.yml', 'GUI 부적합', 'GPU 네이티브', '의사결정 트리'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./ii-1-3_registry.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; II-1-3 Registry</a>
              <a href="./iii-1-1_docker_install.html" className="text-sky-700 hover:text-sky-900 font-medium">III-1-1 Docker 설치 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
