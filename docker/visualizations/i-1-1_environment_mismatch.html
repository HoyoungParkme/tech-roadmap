        highlight: [9, 10, 11, 12, 13, 14, 31, 32, 33, 34, 35, 36, 37],
      },
    };

    // ─────────────────────────────────────────────────────
    // EnvCard — 환경 박스 (좌측 LiveDataPane 내부)
    //   props: envKey, env, isActive, result, error
    // ─────────────────────────────────────────────────────
    function EnvCard({ envKey, env, isActive, result, error }) {
      const isFail    = result === 'fail';
      const isSuccess = result === 'success';

      const borderClass = !isActive
        ? 'border-slate-200 bg-slate-50 opacity-50'
        : isFail
        ? 'border-red-400 bg-red-50 anim-bad'
        : isSuccess
        ? 'border-sky-400 bg-sky-50 shadow-md'
        : 'border-sky-300 bg-white';

      return (
        <div className={`rounded-xl border-2 p-3 transition-all duration-500 ${borderClass}`}>
          {/* 헤더 */}
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">{env.icon}</span>
            <div className="flex-1 min-w-0">
              <div className="font-bold text-sm text-slate-800 truncate">{env.label}</div>
              <div className="text-[10px] text-slate-500 leading-tight">{env.role}</div>
            </div>
            {isActive && isSuccess && (
              <span className="text-[10px] font-bold px-2 py-0.5 rounded bg-sky-600 text-white">OK</span>
            )}
            {isActive && isFail && (
              <span className="text-[10px] font-bold px-2 py-0.5 rounded bg-red-600 text-white animate-pulse">FAIL</span>
            )}
          </div>

          {/* 스펙 표 */}
          <div className="space-y-0.5 text-[10px] font-mono">
            {Object.entries(env.spec).map(([k, v]) => (
              <div key={k} className="flex justify-between gap-2 px-2 py-0.5 rounded bg-white/60">
                <span className="text-slate-500">{k}</span>
                <span className="text-slate-800 font-bold truncate">{v}</span>
              </div>
            ))}
          </div>

          {/* 에러 메시지 */}
          {isActive && isFail && error && (
            <div className="mt-2 p-2 rounded bg-red-100 border border-red-300 anim-shake">
              <div className="text-[10px] font-bold text-red-700 mb-1">⚠ 실행 실패</div>
              <pre className="text-[10px] text-red-800 font-mono whitespace-pre-wrap leading-tight">
                {error}
              </pre>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // MatrixTable — Step 4/5 비교 표
    // ─────────────────────────────────────────────────────
    function MatrixTable() {
      const rows = [
        { key: 'os',       label: 'OS',       devMac: 'macOS 14',  colWin: 'Windows 11', prodUbuntu: 'Ubuntu 20' },
        { key: 'python',   label: 'Python',   devMac: '3.11.8',    colWin: '3.10.4',     prodUbuntu: '3.9.5' },
        { key: 'flask',    label: 'Flask',    devMac: '3.0.2',     colWin: '2.0.3',      prodUbuntu: '미설치' },
        { key: 'requests', label: 'requests', devMac: '2.31.0',    colWin: '2.28.0',     prodUbuntu: '미설치' },
        { key: 'libssl',   label: 'OpenSSL',  devMac: '3.2',       colWin: 'Schannel',   prodUbuntu: '1.1.1' },
        { key: 'envvar',   label: '.env',     devMac: '있음',      colWin: '없음',       prodUbuntu: '없음' },
      ];
      return (
        <div className="mt-3 rounded-lg border border-sky-300 bg-gradient-to-br from-sky-50 to-sky-100 p-3 anim-fade">
          <div className="text-xs font-bold text-sky-800 mb-2 flex items-center gap-1">
            <span>📊</span><span>환경 매트릭스 — 모두 다르다</span>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-[10px] font-mono border-collapse">
              <thead>
                <tr className="bg-sky-200 text-sky-900">
                  <th className="px-2 py-1 text-left">항목</th>
                  <th className="px-2 py-1 text-left">개발자 PC</th>
                  <th className="px-2 py-1 text-left">동료 PC</th>
                  <th className="px-2 py-1 text-left">운영 서버</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r) => (
                  <tr key={r.key} className="border-t border-sky-200 bg-white/50">
                    <td className="px-2 py-1 font-bold text-slate-700">{r.label}</td>
                    <td className="px-2 py-1 text-slate-700">{r.devMac}</td>
                    <td className="px-2 py-1 text-red-600">{r.colWin}</td>
                    <td className="px-2 py-1 text-red-600">{r.prodUbuntu}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // DockerHint — Step 5 의 Docker 예고 박스
    // ─────────────────────────────────────────────────────
    function DockerHint() {
      const items = ['OS 베이스', 'Python 3.11', 'Flask 3.0.2', 'requests 2.31', 'libssl3', '.env'];
      return (
        <div className="mt-3 rounded-lg border-2 border-sky-400 bg-gradient-to-br from-sky-100 to-sky-200 p-3 anim-fade">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">🐳</span>
            <div>
              <div className="text-sm font-bold text-sky-800">Docker 이미지 = 환경 + 코드 한 박스</div>
              <div className="text-[10px] text-sky-700">어느 머신에서 실행해도 같은 결과</div>
            </div>
          </div>
          <div className="flex flex-wrap gap-1.5">
            {items.map((it, i) => (
              <span
                key={it}
                className="bg-white text-sky-800 border border-sky-300 px-2 py-0.5 rounded-full text-[10px] font-bold anim-fade"
                style={{ animationDelay: `${i * 0.08}s` }}
              >
                ✓ {it}
              </span>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측: 3 환경 박스 + 매트릭스(조건부) + Docker 예고(조건부)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const failCount    = Object.values(step.results).filter((v) => v === 'fail').length;
      const successCount = Object.values(step.results).filter((v) => v === 'success').length;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          {/* 헤더 + 카운트 */}
          <div className="flex items-center justify-between mb-3">
            <div className="text-xs font-bold text-slate-700">🖥️ 3개 환경 — 같은 코드, 다른 결과</div>
            <div className="flex gap-1.5 text-[10px] font-mono">
              <span className="px-1.5 py-0.5 rounded bg-sky-100 text-sky-700 font-bold">
                OK {successCount}
              </span>
              <span className="px-1.5 py-0.5 rounded bg-red-100 text-red-700 font-bold">
                FAIL {failCount}
              </span>
            </div>
          </div>

          {/* 환경 카드 3개 (세로 stack) */}
          <div className="space-y-2">
            {Object.entries(ENVS).map(([key, env]) => (
              <EnvCard
                key={key}
                envKey={key}
                env={env}
                isActive={step.active.includes(key)}
                result={step.results[key]}
                error={step.errors[key]}
              />
            ))}
          </div>

          {/* 매트릭스 (Step 4, 5) */}
          {step.matrix && <MatrixTable />}

          {/* Docker 예고 (Step 5) */}
          {step.dockerHint && <DockerHint />}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // CodeViewer — VSCode 스타일 + 5 탭 + highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeTab, onTabChange, stepIdx, total }) {
      const code = CODE_BY_TAB[activeTab];
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 탭 바 */}
          <div className="bg-[#21252b] border-b border-slate-700 flex overflow-x-auto">
            {TABS.map((t) => {
              const isActive = t.key === activeTab;
              return (
                <button
                  key={t.key}
                  onClick={() => onTabChange(t.key)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition-colors ${
                    isActive
                      ? 'bg-[#282c34] text-sky-300 border-b-2 border-b-sky-400'
                      : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800/40'
                  }`}
                >
                  {t.filename}
                </button>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 4 버튼 컨트롤 + 키보드 + 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [tabOverride, setTabOverride] = useState(null); // 사용자가 탭 클릭 시 우선
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];
      const activeTab = tabOverride || step.tab;

      const handleNext = () => {
        setTabOverride(null); // 단계 이동 시 탭 자동 동기화
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => {
        setTabOverride(null);
        setStepIdx((i) => Math.max(0, i - 1));
      };
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        setTabOverride(null);
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setTabOverride(null);
        setStepIdx(0);
        setIsPlaying(false);
      };

      const handleTabChange = (tabKey) => {
        setTabOverride(tabKey);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">
                curriculum I-1-1
              </span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">
                  🐳
                </div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">
                    Part I. Docker 기초 &gt; Chapter 1. 컨테이너의 이유
                  </div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">
                    환경 차이 문제 — "내 컴에선 됐는데"
                  </h1>
                  <p className="text-sm text-slate-500 mt-0.5">
                    의존성 / OS / 시스템 라이브러리 / 환경변수 — 6 축 환경 다양성이 어떻게 배포 실패로 이어지는가
                  </p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                activeTab={activeTab}
                onTabChange={handleTabChange}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 안내 */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 다음(I-1-2)에서는 <strong>가상화 vs 컨테이너</strong> — 왜 Docker 가 가볍고 빠른지
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./i-1-2_virtualization_vs_container.html" className="text-sky-700 hover:text-sky-900 font-medium">
                I-1-2 가상화 vs 컨테이너 &rarr;
              </a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
