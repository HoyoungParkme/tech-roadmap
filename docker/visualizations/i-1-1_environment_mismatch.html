<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — 환경 불일치</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-shake { animation: shake 0.4s ease-in-out; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── 환경 데이터 ── */
    const ENVS = {
      myPC:   { label: "내 노트북", icon: "💻", os: "macOS 14", python: "3.11.4", flask: "2.3.0", requests: "2.31.0", libpq: "설치됨", envVar: "설정됨" },
      server: { label: "운영 서버", icon: "🖥️", os: "Ubuntu 22.04", python: "3.9.7", flask: "2.0.3", requests: "2.31.0", libpq: "미설치", envVar: "미설정" },
      team:   { label: "팀원 PC",   icon: "👨‍💻", os: "Windows 11", python: "3.10.12", flask: "2.3.0", requests: "2.28.0", libpq: "설치됨", envVar: "설정됨" },
    };

    const FIELDS = [
      { key: "os",       label: "운영체제",    icon: "🖥️" },
      { key: "python",   label: "Python 버전", icon: "🐍" },
      { key: "flask",    label: "Flask 버전",  icon: "📦" },
      { key: "requests", label: "Requests",    icon: "📦" },
      { key: "libpq",    label: "시스템 라이브러리 (libpq)", icon: "⚙️" },
      { key: "envVar",   label: "환경 변수 (.env)", icon: "🔑" },
    ];

    /* ── STEPS ── */
    const STEPS = [
      {
        title: "STEP 1 · 코드 완성! 배포 준비",
        desc: "개발자가 내 노트북에서 Flask 웹 서비스를 완성했다. 모든 테스트가 통과한다. requirements.txt도 작성했다. 이제 운영 서버에 배포하면 된다.",
        phase: "ready",
        highlight: ["myPC"],
        conflictFields: [],
      },
      {
        title: "STEP 2 · 서버 배포 — 에러 발생!",
        desc: "운영 서버에 배포했더니 바로 에러가 난다. 'ModuleNotFoundError', 'libpq 라이브러리를 찾을 수 없습니다'. 내 노트북에서는 잘 됐는데?",
        phase: "deploy_fail",
        highlight: ["myPC", "server"],
        conflictFields: ["python", "flask", "libpq", "envVar"],
      },
      {
        title: "STEP 3 · 원인 분석: 버전 차이",
        desc: "Python 3.11 vs 3.9 — 문법 호환성 문제 발생. Flask 2.3 vs 2.0 — API가 변경되어 코드가 깨짐. 같은 requirements.txt여도 Python 자체 버전이 다르면 동작이 달라진다.",
        phase: "version_diff",
        highlight: ["myPC", "server"],
        conflictFields: ["python", "flask"],
      },
      {
        title: "STEP 4 · 원인 분석: 시스템 의존성",
        desc: "libpq는 PostgreSQL 접속에 필요한 시스템 라이브러리다. 내 노트북에는 Postgres.app이 설치하면서 함께 깔렸지만, 서버에는 없다. requirements.txt는 시스템 라이브러리를 관리하지 못한다.",
        phase: "system_dep",
        highlight: ["myPC", "server"],
        conflictFields: ["libpq"],
      },
      {
        title: "STEP 5 · 팀원도 다르다 — 환경 드리프트",
        desc: "6개월이 지나면 팀원마다 환경이 달라진다. 팀원은 Requests 2.28을 쓰고 있어서 내가 쓴 새 기능이 동작하지 않는다. 이것을 '환경 드리프트'라고 부른다.",
        phase: "drift",
        highlight: ["myPC", "server", "team"],
        conflictFields: ["os", "python", "flask", "requests", "libpq", "envVar"],
      },
      {
        title: "STEP 6 · Docker의 해결책",
        desc: "Docker는 코드 + Python + 라이브러리 + 시스템 도구 + 설정을 통째로 이미지에 담는다. 어느 서버에서 실행하든 동일한 환경이 보장된다. 'Works on my machine' 문제가 사라진다.",
        phase: "docker_solve",
        highlight: [],
        conflictFields: [],
      },
    ];

    /* ── 환경 카드 컴포넌트 ── */
    function EnvCard({ envKey, env, isActive, conflictFields, phase }) {
      const isDocker = phase === "docker_solve";
      return (
        <div className={`rounded-xl border-2 p-4 transition-all duration-500 ${
          isDocker ? "border-emerald-400 bg-emerald-50 shadow-lg" :
          isActive ? "border-blue-400 bg-white shadow-lg scale-[1.02]" : "border-slate-200 bg-slate-50 opacity-50 scale-95"
        }`}>
          <div className="text-center mb-3">
            <span className="text-3xl">{env.icon}</span>
            <div className="font-bold text-sm mt-1">{env.label}</div>
          </div>
          <div className="space-y-2">
            {FIELDS.map((field, i) => {
              const val = isDocker ? (envKey === "myPC" ? env[field.key] : env[field.key]) : env[field.key];
              const isConflict = conflictFields.includes(field.key) && isActive;
              const dockerVal = { os:"Ubuntu 22.04 (고정)", python:"3.11.4 (고정)", flask:"2.3.0 (고정)", requests:"2.31.0 (고정)", libpq:"포함됨 ✓", envVar:"포함됨 ✓" };
              const displayVal = isDocker ? dockerVal[field.key] : val;
              const isFixed = isDocker;

              return (
                <div key={field.key} className={`flex items-center justify-between text-xs px-2 py-1.5 rounded-lg transition-all duration-300 ${
                  isFixed ? "bg-emerald-100 border border-emerald-300" :
                  isConflict ? "bg-red-50 border border-red-300 anim-shake" : "bg-slate-100 border border-transparent"
                }`}>
                  <span className="text-slate-500 flex items-center gap-1">
                    <span>{field.icon}</span>
                    <span className="hidden sm:inline">{field.label}</span>
                  </span>
                  <span className={`font-mono font-bold ${
                    isFixed ? "text-emerald-700" :
                    isConflict ? "text-red-600" : "text-slate-700"
                  }`}>
                    {isConflict && !isFixed && "⚠ "}{displayVal}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* ── 메인 앱 ── */
    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);

      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 3000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter I-1-1: "내 노트북에선 되는데 서버에선 안 돼요"</h1>
              </div>
              <p className="text-slate-500 text-sm">환경 불일치가 왜 발생하는지, Docker가 이를 어떻게 해결하는지 단계별로 시뮬레이션합니다.</p>
            </header>

            {/* 현재 단계 설명 */}
            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "docker_solve" ? "bg-emerald-600 border-emerald-700 text-white" :
              data.phase === "deploy_fail" ? "bg-red-600 border-red-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 환경 비교 시각화 */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              {Object.entries(ENVS).map(([key, env]) => (
                <EnvCard
                  key={`${key}-${step}`}
                  envKey={key}
                  env={env}
                  isActive={data.highlight.includes(key)}
                  conflictFields={data.highlight.includes(key) ? data.conflictFields : []}
                  phase={data.phase}
                />
              ))}
            </div>

            {/* Docker 해결책 시각화 */}
            {data.phase === "docker_solve" && (
              <div className="bg-gradient-to-r from-emerald-50 to-blue-50 border-2 border-emerald-300 rounded-xl p-6 anim-fade">
                <div className="text-center">
                  <div className="text-4xl mb-3">📦</div>
                  <h3 className="text-xl font-bold text-emerald-800 mb-2">Docker 이미지 = 코드 + 환경 통째로 포장</h3>
                  <div className="flex flex-wrap justify-center gap-2 mt-4">
                    {["Python 3.11.4", "Flask 2.3.0", "Requests 2.31.0", "libpq ✓", ".env ✓", "Ubuntu 22.04"].map((item, i) => (
                      <span key={i} className="bg-emerald-200 text-emerald-800 px-3 py-1.5 rounded-full text-sm font-medium anim-slide" style={{animationDelay:`${i*0.1}s`}}>
                        {item}
                      </span>
                    ))}
                  </div>
                  <p className="text-emerald-700 mt-4 text-sm">어떤 서버에서 실행해도 동일한 결과를 보장</p>
                </div>
              </div>
            )}

            {/* 충돌 카운터 */}
            {data.conflictFields.length > 0 && (
              <div className="bg-red-50 border border-red-200 rounded-xl p-4 text-center anim-fade">
                <span className="text-red-600 font-bold text-lg">⚠ 환경 불일치 {data.conflictFields.length}건 감지</span>
                <div className="flex justify-center gap-2 mt-2">
                  {data.conflictFields.map(f => {
                    const field = FIELDS.find(ff => ff.key === f);
                    return <span key={f} className="bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-medium">{field?.label}</span>;
                  })}
                </div>
              </div>
            )}

            {/* 프로그레스 + 컨트롤 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              {/* 프로그레스 바 */}
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              {/* 버튼 */}
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
