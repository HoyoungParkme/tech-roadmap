<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — 로그 수집과 docker logs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes flowDown { from{opacity:0;transform:translateY(-10px);} to{opacity:1;transform:translateY(0);} }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-flow { animation: flowDown 0.4s ease-out forwards; }
    .anim-blink { animation: blink 1s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const LOG_LINES = [
      { time: "12:00:01", level: "INFO", msg: "서버 시작됨 — port 8000", color: "text-green-400" },
      { time: "12:00:05", level: "INFO", msg: "GET /items 200 OK (12ms)", color: "text-blue-400" },
      { time: "12:00:08", level: "WARN", msg: "DB 연결 풀 70% 사용중", color: "text-yellow-400" },
      { time: "12:00:12", level: "ERROR", msg: "POST /items 500 — psycopg.OperationalError", color: "text-red-400" },
      { time: "12:00:15", level: "INFO", msg: "GET /health 200 OK (2ms)", color: "text-blue-400" },
      { time: "12:00:18", level: "DEBUG", msg: "쿼리 실행: SELECT * FROM items LIMIT 50", color: "text-slate-400" },
    ];

    const STEPS = [
      {
        title: "STEP 1 · stdout/stderr가 로그의 핵심",
        desc: "컨테이너는 프로세스가 종료되면 내부 상태를 잃는다. 앱이 stdout/stderr로 출력한 내용만 Docker가 캡처한다. 파일에 로그를 쓰면 docker logs로 볼 수 없고, 컨테이너가 죽으면 사라진다.",
        phase: "stdout",
        showLogs: false, showDriver: false, showLimit: false,
      },
      {
        title: "STEP 2 · docker logs 명령 실습",
        desc: "docker logs -f myapp으로 실시간 스트리밍. --tail 50으로 마지막 50줄. --since 10m으로 최근 10분. docker compose logs -f api db로 여러 서비스를 한 화면에서 본다.",
        phase: "commands",
        showLogs: true, showDriver: false, showLimit: false,
      },
      {
        title: "STEP 3 · json-file 로그 드라이버",
        desc: "Docker 기본 로그 드라이버는 json-file이다. 로그를 호스트 디스크(/var/lib/docker/containers/)에 JSON 형식으로 저장한다. docker logs 명령이 동작하는 드라이버다.",
        phase: "driver",
        showLogs: true, showDriver: true, showLimit: false,
      },
      {
        title: "STEP 4 · 로그 용량 제한 (max-size / max-file)",
        desc: "json-file은 기본적으로 용량 제한이 없다! 활발히 로그를 찍는 서비스가 디스크를 가득 채울 수 있다. max-size: 10m, max-file: 3으로 최대 30MB만 유지하도록 제한한다.",
        phase: "limit",
        showLogs: true, showDriver: true, showLimit: true,
      },
      {
        title: "STEP 5 · 중앙 수집: fluentd / Loki",
        desc: "서버가 여러 대가 되면 docker logs만으로는 부족하다. fluentd→Elasticsearch→Kibana(EFK) 또는 Promtail→Loki→Grafana 스택으로 모든 컨테이너 로그를 한 대시보드에서 검색할 수 있다.",
        phase: "central",
        showLogs: true, showDriver: true, showLimit: false,
      },
      {
        title: "STEP 6 · 로그 레벨 전략",
        desc: "개발: LOG_LEVEL=debug (상세 로그). 프로덕션: LOG_LEVEL=warning (필수만). 프로덕션에서 DEBUG를 켜두면 성능 저하와 디스크 낭비가 동시에 발생한다.",
        phase: "level",
        showLogs: true, showDriver: false, showLimit: false,
      },
    ];

    function LogTerminal({ lines, filter }) {
      const filtered = filter ? lines.filter(l => l.level !== "DEBUG") : lines;
      return (
        <div className="bg-slate-900 rounded-lg p-4 font-mono text-xs overflow-x-auto">
          <div className="text-slate-500 mb-2">$ docker logs -f api</div>
          {filtered.map((line, i) => (
            <div key={i} className={`${line.color} anim-flow`} style={{ animationDelay: `${i * 0.15}s` }}>
              <span className="text-slate-600">[{line.time}]</span> <span className="font-bold">{line.level.padEnd(5)}</span> {line.msg}
            </div>
          ))}
          <div className="text-slate-600 mt-1 anim-blink">_</div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4500);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter VI-1-5: 로그 수집과 docker logs</h1>
              </div>
              <p className="text-slate-500 text-sm">컨테이너 로그 흐름(stdout → docker logs → 파일 → 중앙 수집)을 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "central" ? "bg-indigo-600 border-indigo-700 text-white" :
              data.phase === "limit" ? "bg-red-600 border-red-700 text-white" :
              data.phase === "level" ? "bg-emerald-600 border-emerald-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 로그 흐름 시각화 */}
            <div key={`vis-${step}`} className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 anim-fade">

              {/* stdout 흐름도 */}
              {data.phase === "stdout" && (
                <div className="flex items-center justify-center gap-3 flex-wrap">
                  {[
                    { icon: "⚡", label: "앱 (FastAPI)", desc: "print() / logging" },
                    { icon: "→", label: "", desc: "" },
                    { icon: "📺", label: "stdout/stderr", desc: "표준 출력" },
                    { icon: "→", label: "", desc: "" },
                    { icon: "🐳", label: "Docker 엔진", desc: "캡처 & 저장" },
                    { icon: "→", label: "", desc: "" },
                    { icon: "📋", label: "docker logs", desc: "명령으로 조회" },
                  ].map((item, i) => (
                    item.label === "" ? (
                      <div key={i} className="text-2xl text-blue-400 anim-slide" style={{animationDelay: `${i * 0.1}s`}}>→</div>
                    ) : (
                      <div key={i} className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-center anim-slide" style={{animationDelay: `${i * 0.1}s`}}>
                        <div className="text-2xl">{item.icon}</div>
                        <div className="font-bold text-blue-800 text-xs mt-1">{item.label}</div>
                        <div className="text-xs text-slate-500">{item.desc}</div>
                      </div>
                    )
                  ))}
                </div>
              )}

              {/* 로그 터미널 */}
              {data.showLogs && (
                <LogTerminal lines={LOG_LINES} filter={data.phase === "level"} />
              )}

              {/* 로그 드라이버 비교 */}
              {data.showDriver && (
                <div className="mt-4 grid grid-cols-2 md:grid-cols-3 gap-3">
                  {[
                    { name: "json-file", desc: "호스트 디스크 (기본값)", support: "docker logs 가능", active: true },
                    { name: "syslog", desc: "OS syslog 데몬", support: "docker logs 불가", active: false },
                    { name: "fluentd", desc: "중앙 수집기", support: "docker logs 불가", active: data.phase === "central" },
                    { name: "loki", desc: "Grafana Loki", support: "docker logs 불가", active: data.phase === "central" },
                    { name: "journald", desc: "systemd journal", support: "docker logs 가능", active: false },
                    { name: "none", desc: "로그 비활성화", support: "출력 없음", active: false },
                  ].map((d, i) => (
                    <div key={i} className={`rounded-lg border p-2.5 text-center text-xs transition-all duration-300 ${
                      d.active ? "border-blue-300 bg-blue-50 shadow-sm" : "border-slate-200 bg-slate-50"
                    }`}>
                      <div className={`font-bold ${d.active ? "text-blue-700" : "text-slate-600"}`}>{d.name}</div>
                      <div className="text-slate-500 mt-0.5">{d.desc}</div>
                      <div className={`mt-1 ${d.support.includes("가능") ? "text-green-600" : "text-red-500"}`}>{d.support}</div>
                    </div>
                  ))}
                </div>
              )}

              {/* 용량 제한 시각화 */}
              {data.showLimit && (
                <div className="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className="bg-red-50 border border-red-200 rounded-lg p-4">
                    <div className="font-bold text-red-700 text-sm mb-2">제한 없음 (기본값)</div>
                    <div className="flex gap-1">
                      {[...Array(10)].map((_, i) => (
                        <div key={i} className="flex-1 h-6 bg-red-300 rounded-sm" />
                      ))}
                    </div>
                    <div className="text-xs text-red-600 mt-2">로그 무한 증가 → 디스크 풀 장애!</div>
                  </div>
                  <div className="bg-green-50 border border-green-200 rounded-lg p-4">
                    <div className="font-bold text-green-700 text-sm mb-2">max-size: 10m, max-file: 3</div>
                    <div className="flex gap-1">
                      {[...Array(3)].map((_, i) => (
                        <div key={i} className="flex-1 h-6 bg-green-400 rounded-sm" />
                      ))}
                      {[...Array(7)].map((_, i) => (
                        <div key={i} className="flex-1 h-6 bg-slate-200 rounded-sm" />
                      ))}
                    </div>
                    <div className="text-xs text-green-600 mt-2">최대 30MB만 유지 (로테이션)</div>
                  </div>
                </div>
              )}

              {/* 중앙 수집 아키텍처 */}
              {data.phase === "central" && (
                <div className="mt-4 bg-indigo-50 border border-indigo-200 rounded-lg p-4">
                  <div className="text-center font-bold text-indigo-700 text-sm mb-3">중앙 로그 수집 아키텍처</div>
                  <div className="flex items-center justify-center gap-2 flex-wrap text-xs">
                    {[
                      { label: "컨테이너들", icon: "🐳" },
                      { label: "→", icon: "" },
                      { label: "Fluentd / Promtail", icon: "📡" },
                      { label: "→", icon: "" },
                      { label: "ES / Loki", icon: "🗄️" },
                      { label: "→", icon: "" },
                      { label: "Kibana / Grafana", icon: "📊" },
                    ].map((item, i) => (
                      item.icon === "" ? (
                        <span key={i} className="text-indigo-400 text-lg">→</span>
                      ) : (
                        <div key={i} className="bg-white border border-indigo-200 rounded px-3 py-2 text-center anim-slide" style={{animationDelay: `${i * 0.1}s`}}>
                          <div className="text-lg">{item.icon}</div>
                          <div className="text-indigo-700 font-medium">{item.label}</div>
                        </div>
                      )
                    ))}
                  </div>
                </div>
              )}

              {/* 로그 레벨 비교 */}
              {data.phase === "level" && (
                <div className="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
                    <div className="font-bold text-amber-700 text-sm">🔧 개발: LOG_LEVEL=debug</div>
                    <div className="text-xs text-amber-600 mt-1">모든 로그 출력 (DEBUG 포함 6줄)</div>
                  </div>
                  <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3">
                    <div className="font-bold text-emerald-700 text-sm">🏭 프로덕션: LOG_LEVEL=warning</div>
                    <div className="text-xs text-emerald-600 mt-1">WARN+ERROR만 출력 (불필요한 로그 제거)</div>
                  </div>
                </div>
              )}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
