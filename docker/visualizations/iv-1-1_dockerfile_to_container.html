<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — Dockerfile에서 컨테이너까지</title>

  <!-- Tailwind CSS Play CDN: 학습 자료용. 프로덕션에서는 PostCSS 빌드를 권장. -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (development 버전: 학습용이므로 에러 메시지 상세 버전 사용) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel Standalone 7.x: 브라우저에서 JSX를 실시간 변환 (Fragment shorthand `<>` 지원) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    Docker Chapter IV-1 — Dockerfile에서 실행 중인 컨테이너까지
    ─────────────────────────────────────────────────────────────
    학습 목표 : Dockerfile 작성 → docker build(레이어 캐싱) → Image 생성(읽기 전용)
               → docker run → Container 실행(프로세스+파일시스템+네트워크) → 포트 매핑
               까지 6단계 흐름을 단계별로 체험한다.
    조작법   : "자동 실행" 버튼으로 재생, 이전/다음 버튼으로 수동 전환.
    확장 방법 : 새 챕터를 추가할 때는 STEPS / DOCKER_CODE / 헤더 텍스트만 교체하면 된다.
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // -----------------------------------------
    // 1. 교육용 Dockerfile + 명령어 (혼합)
    // -----------------------------------------
    const DOCKER_CODE = [
      "# 1. Dockerfile",
      "FROM python:3.11-slim",
      "WORKDIR /app",
      "COPY requirements.txt .",
      "RUN pip install -r requirements.txt",
      "COPY . .",
      "ENV PORT=8000",
      "EXPOSE 8000",
      'CMD ["uvicorn", "main:app", "--host", "0.0.0.0"]',
      "",
      "# 2. 이미지 빌드",
      "# docker build -t myapp .",
      "",
      "# 3. 컨테이너 실행",
      "# docker run -d -p 8000:8000 myapp",
    ];

    // -----------------------------------------
    // 2. 시뮬레이션 스텝 정의 (6 STEPS)
    // -----------------------------------------
    const STEPS = [
      {
        codeLine: 0,
        title: "STEP 1: Dockerfile 작성",
        desc: "[Dockerfile 작성] Dockerfile은 이미지를 만드는 설계도입니다. FROM(베이스 이미지)부터 CMD(실행 명령)까지, 각 줄이 레이어(층) 하나를 만듭니다. 레시피를 한 번 잘 써두면, 어느 서버에서든 똑같은 환경이 만들어집니다.",
        phaseState: 'dockerfile',
        dockerfileState: 'active',
        buildState: 'idle',
        imageState: 'idle',
        runState: 'idle',
        containerState: 'idle',
        networkState: 'idle',
        badge: "FROM · WORKDIR · COPY · RUN · CMD",
        infoObj: { FROM: "python:3.11-slim", WORKDIR: "/app", CMD: "uvicorn" }
      },
      {
        codeLine: 11,
        title: "STEP 2: docker build (레이어 캐싱)",
        desc: "[docker build] 'docker build -t myapp .' 명령을 실행하면 Docker는 Dockerfile을 한 줄씩 읽어 레이어를 쌓아 올립니다. 이미 빌드된 레이어는 캐시를 재사용하므로, requirements.txt가 바뀌지 않았다면 pip install 단계는 재실행하지 않습니다.",
        phaseState: 'build',
        dockerfileState: 'done',
        buildState: 'active',
        imageState: 'idle',
        runState: 'idle',
        containerState: 'idle',
        networkState: 'idle',
        badge: "docker build -t myapp .",
        infoObj: { 레이어1: "FROM (캐시 HIT)", 레이어2: "COPY req... (캐시 HIT)", 레이어3: "RUN pip... (재실행)", 레이어4: "COPY . ." }
      },
      {
        codeLine: 1,
        title: "STEP 3: Image 생성 (읽기 전용)",
        desc: "[Image 생성] 빌드가 끝나면 '이미지(Image)'가 만들어집니다. 이미지는 읽기 전용 스냅샷입니다. USB 드라이브에 담긴 OS 설치 파일처럼, 그 자체로는 실행되지 않습니다. docker images 명령으로 목록을 확인할 수 있습니다.",
        phaseState: 'image',
        dockerfileState: 'done',
        buildState: 'done',
        imageState: 'active',
        runState: 'idle',
        containerState: 'idle',
        networkState: 'idle',
        badge: "myapp:latest (읽기 전용)",
        infoObj: { 이미지명: "myapp", 태그: "latest", 크기: "~180MB", 상태: "읽기 전용" }
      },
      {
        codeLine: 14,
        title: "STEP 4: docker run",
        desc: "[docker run] 'docker run -d -p 8000:8000 myapp' 명령은 이미지를 기반으로 컨테이너를 만들고 실행합니다. -d는 백그라운드 실행, -p 8000:8000은 호스트 포트 8000을 컨테이너 내부 포트 8000에 연결합니다. 이미지 위에 얇은 읽기-쓰기 레이어가 추가됩니다.",
        phaseState: 'run',
        dockerfileState: 'done',
        buildState: 'done',
        imageState: 'done',
        runState: 'active',
        containerState: 'idle',
        networkState: 'idle',
        badge: "docker run -d -p 8000:8000",
        infoObj: { 옵션_d: "백그라운드 실행", 옵션_p: "8000:8000 포트 매핑", 기반이미지: "myapp:latest" }
      },
      {
        codeLine: 8,
        title: "STEP 5: Container 실행 중",
        desc: "[Container 실행] 이제 컨테이너가 살아있는 프로세스로 동작합니다. 컨테이너 내부에는 격리된 파일시스템(/app), 독립된 네트워크 인터페이스, 그리고 uvicorn 웹 서버 프로세스가 함께 돌아갑니다. 호스트 운영체제와는 완전히 분리된 샌드박스입니다.",
        phaseState: 'container',
        dockerfileState: 'done',
        buildState: 'done',
        imageState: 'done',
        runState: 'done',
        containerState: 'active',
        networkState: 'idle',
        badge: "uvicorn main:app --host 0.0.0.0",
        infoObj: { 프로세스: "uvicorn", 파일시스템: "/app (격리)", 네트워크: "컨테이너 내부 IP" }
      },
      {
        codeLine: 7,
        title: "STEP 6: 포트 매핑 → 호스트 접근",
        desc: "[포트 매핑] -p 8000:8000 옵션 덕분에 호스트(내 노트북)의 8000번 포트로 들어온 요청이 컨테이너 내부 8000번 포트로 전달됩니다. 브라우저에서 http://localhost:8000 으로 접속하면 컨테이너 안의 uvicorn이 응답합니다. 컨테이너는 내부에서 EXPOSE 8000으로 포트를 열어두었습니다.",
        phaseState: 'network',
        dockerfileState: 'done',
        buildState: 'done',
        imageState: 'done',
        runState: 'done',
        containerState: 'done',
        networkState: 'active',
        badge: "http://localhost:8000",
        infoObj: { 호스트포트: "8000", 컨테이너포트: "8000", 접속주소: "localhost:8000" }
      }
    ];

    // -----------------------------------------
    // 3. 구문 강조(Syntax Highlighting) 헬퍼
    // -----------------------------------------
    // Docker 키워드: Dockerfile 명령어 + shell 명령어 핵심 토큰
    const DOCKERFILE_KEYWORDS = new Set([
      'FROM', 'WORKDIR', 'COPY', 'RUN', 'CMD', 'ENV', 'EXPOSE',
      'docker', 'build', 'run', '-p', '-t', '-d', '/app'
    ]);
    const STRING_TOKENS = new Set(['"', "'", '.']);
    const PATH_PATTERN = /^\/[\w/.:-]*$/;
    const FLAG_PATTERN = /^-[a-zA-Z]$/;

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line;
      let commentPart = '';

      if (commentIdx !== -1) {
        codePart = line.slice(0, commentIdx);
        commentPart = line.slice(commentIdx);
      }

      if (!codePart.trim() && commentPart) {
        return <span className="text-slate-500 italic">{commentPart}</span>;
      }

      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|=|'|")/g);

      const highlightedTokens = tokens.map((token, i) => {
        if (DOCKERFILE_KEYWORDS.has(token)) {
          return <span key={i} className="text-yellow-300 font-bold">{token}</span>;
        }
        if (FLAG_PATTERN.test(token)) {
          return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        }
        if (PATH_PATTERN.test(token) && token.length > 1) {
          return <span key={i} className="text-emerald-400">{token}</span>;
        }
        if (token.trim() !== '' && !isNaN(token)) {
          return <span key={i} className="text-orange-300">{token}</span>;
        }
        if (STRING_TOKENS.has(token)) {
          return <span key={i} className="text-emerald-400">{token}</span>;
        }
        return <span key={i} className="text-slate-200">{token}</span>;
      });

      return (
        <>
          {highlightedTokens}
          {commentPart && <span className="text-slate-500 italic">{commentPart}</span>}
        </>
      );
    };

    // -----------------------------------------
    // 4. 상태별 스타일 헬퍼
    // -----------------------------------------
    const getNodeClass = (state, base) => {
      if (state === 'active') {
        return `${base} bg-blue-100 border-blue-500 ring-2 ring-blue-300 shadow-lg scale-105 transition-all duration-500 text-blue-900`;
      }
      if (state === 'done') {
        return `${base} bg-slate-100 border-emerald-500 text-emerald-700 transition-all duration-500`;
      }
      return `${base} bg-white border-slate-200 text-slate-400 transition-all duration-500`;
    };

    const getArrowClass = (fromState) => {
      if (fromState === 'done' || fromState === 'active') {
        return "text-emerald-500 font-bold text-lg";
      }
      return "text-slate-300 text-lg";
    };

    // -----------------------------------------
    // 5. 메인 앱 컴포넌트
    // -----------------------------------------
    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 2800);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">

            {/* 헤더 */}
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-2xl font-bold text-slate-800">Docker: Dockerfile에서 컨테이너까지</h1>
              </div>
              <p className="text-slate-600">
                <b>Dockerfile 작성</b>부터 <b>docker build</b>(레이어 캐싱) → <b>Image 생성</b>(읽기 전용) → <b>docker run</b> → <b>Container 실행</b>(프로세스+파일시스템+네트워크) → <b>포트 매핑</b>으로 호스트에서 접근까지, 6단계 흐름을 시뮬레이션합니다.
              </p>
            </header>

            {/* 현재 단계 설명 */}
            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 flex flex-col justify-center min-h-[110px]">
              <h3 className="text-xs font-bold text-blue-200 mb-1 uppercase tracking-wider">{stepData.title}</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 좌우 레이아웃 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">

              {/* 왼쪽: 파이프라인 다이어그램 */}
              <div className="flex flex-col space-y-4">

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 flex flex-col justify-between min-h-[420px]">

                  {/* 파이프라인 흐름: Dockerfile → build → Image → run → Container → Network */}

                  {/* Dockerfile */}
                  <div className="flex justify-center">
                    <div className={getNodeClass(stepData.dockerfileState, "w-56 px-4 py-3 rounded-xl border-2 font-bold text-center")}>
                      <div className="text-xs uppercase tracking-widest opacity-60 mb-1">Dockerfile</div>
                      <div className="text-sm">FROM · WORKDIR · COPY · RUN · CMD</div>
                    </div>
                  </div>

                  {/* 화살표 + build 라벨 */}
                  <div className="flex flex-col items-center py-1">
                    <span className={getArrowClass(stepData.dockerfileState)}>↓</span>
                    <div className={`text-xs font-mono px-3 py-0.5 rounded-full border mt-0.5 ${stepData.buildState === 'active' ? 'bg-blue-50 border-blue-400 text-blue-700 font-bold' : 'bg-slate-50 border-slate-200 text-slate-400'}`}>
                      docker build -t myapp .
                    </div>
                  </div>

                  {/* Image */}
                  <div className="flex justify-center">
                    <div className={getNodeClass(stepData.imageState, "w-56 px-4 py-3 rounded-xl border-2 font-bold text-center")}>
                      <div className="text-xs uppercase tracking-widest opacity-60 mb-1">Image (읽기 전용)</div>
                      <div className="text-sm">myapp:latest</div>
                      {stepData.imageState === 'active' && (
                        <div className="mt-1 text-[10px] bg-blue-200 text-blue-800 px-2 py-0.5 rounded-full">레이어 스택 고정</div>
                      )}
                    </div>
                  </div>

                  {/* 화살표 + run 라벨 */}
                  <div className="flex flex-col items-center py-1">
                    <span className={getArrowClass(stepData.imageState)}>↓</span>
                    <div className={`text-xs font-mono px-3 py-0.5 rounded-full border mt-0.5 ${stepData.runState === 'active' ? 'bg-blue-50 border-blue-400 text-blue-700 font-bold' : 'bg-slate-50 border-slate-200 text-slate-400'}`}>
                      docker run -d -p 8000:8000 myapp
                    </div>
                  </div>

                  {/* Container */}
                  <div className="flex justify-center">
                    <div className={getNodeClass(stepData.containerState, "w-64 px-4 py-4 rounded-xl border-2 font-bold text-center")}>
                      <div className="text-xs uppercase tracking-widest opacity-60 mb-2">Container (실행 중)</div>
                      <div className="flex justify-around text-xs">
                        <div className="text-center">
                          <div className="opacity-50 mb-0.5">Process</div>
                          <div>uvicorn</div>
                        </div>
                        <div className="text-center">
                          <div className="opacity-50 mb-0.5">FS</div>
                          <div>/app</div>
                        </div>
                        <div className="text-center">
                          <div className="opacity-50 mb-0.5">Net</div>
                          <div>eth0</div>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* 화살표 + 포트 매핑 라벨 */}
                  <div className="flex flex-col items-center py-1">
                    <span className={getArrowClass(stepData.containerState)}>↓</span>
                    <div className={`text-xs font-mono px-3 py-0.5 rounded-full border mt-0.5 ${stepData.networkState === 'active' ? 'bg-blue-50 border-blue-400 text-blue-700 font-bold' : 'bg-slate-50 border-slate-200 text-slate-400'}`}>
                      포트 매핑: Host:8000 → Container:8000
                    </div>
                  </div>

                  {/* Host */}
                  <div className="flex justify-center">
                    <div className={getNodeClass(stepData.networkState, "w-56 px-4 py-3 rounded-xl border-2 font-bold text-center")}>
                      <div className="text-xs uppercase tracking-widest opacity-60 mb-1">Host (브라우저)</div>
                      <div className="text-sm">http://localhost:8000</div>
                      {stepData.networkState === 'active' && (
                        <div className="mt-1 text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full">200 OK</div>
                      )}
                    </div>
                  </div>

                </div>

                {/* 현재 단계 배지 + 정보 패킷 */}
                <div className="bg-slate-800 text-emerald-400 font-mono text-xs p-4 rounded-xl">
                  <div className="text-slate-400 mb-1">현재 단계:</div>
                  <div className="text-yellow-300 font-bold mb-2">{stepData.badge}</div>
                  {Object.entries(stepData.infoObj).map(([k, v]) => (
                    <div key={k} className="flex gap-2">
                      <span className="text-slate-400">{k}:</span>
                      <span className="text-emerald-300">{v}</span>
                    </div>
                  ))}
                </div>

                {/* 컨트롤 바 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying ? (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                      ) : (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                      )}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                    Step: {currentStepIdx + 1} / {STEPS.length}
                  </div>
                </div>
              </div>

              {/* 오른쪽: 코드 뷰어 */}
              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-slate-900 flex flex-col">
                  <div className="px-4 py-2 bg-slate-800 border-b border-slate-700 flex items-center gap-2">
                    <div className="w-3 h-3 rounded-full bg-red-500"></div>
                    <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div className="w-3 h-3 rounded-full bg-green-500"></div>
                    <span className="text-slate-400 text-xs ml-2 font-mono">Dockerfile  |  docker CLI</span>
                  </div>
                  <div className="p-5 overflow-y-auto flex-1 text-sm font-mono text-slate-300 scroll-smooth leading-relaxed">
                    {DOCKER_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div
                          key={idx}
                          className={`flex px-2 py-0.5 rounded transition-colors ${isActive ? 'bg-blue-900/60 text-white font-bold border-l-4 border-blue-400 shadow-inner' : 'border-l-4 border-transparent'}`}
                        >
                          <span className="text-slate-600 select-none mr-4 w-6 text-right inline-block shrink-0 tabular-nums">{idx + 1}</span>
                          <span className="whitespace-pre">{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                  {/* 레이어 캐시 힌트 (STEP 2에서만 표시) */}
                  {stepData.phaseState === 'build' && (
                    <div className="px-4 py-3 bg-yellow-900/40 border-t border-yellow-700/50 text-xs font-mono">
                      <div className="text-yellow-400 font-bold mb-1">레이어 캐시 동작</div>
                      <div className="text-slate-300 space-y-0.5">
                        <div><span className="text-green-400">CACHED</span> Step 1/5 : FROM python:3.11-slim</div>
                        <div><span className="text-green-400">CACHED</span> Step 2/5 : WORKDIR /app</div>
                        <div><span className="text-green-400">CACHED</span> Step 3/5 : COPY requirements.txt .</div>
                        <div><span className="text-yellow-300">RUN    </span> Step 4/5 : pip install -r requirements.txt</div>
                        <div><span className="text-yellow-300">RUN    </span> Step 5/5 : COPY . .</div>
                        <div className="mt-1 text-slate-400">Successfully built a1b2c3d4e5f6</div>
                        <div className="text-slate-400">Successfully tagged myapp:latest</div>
                      </div>
                    </div>
                  )}
                </div>
              </div>

            </div>

            {/* ─────────────────────────────────────── */}
            {/* 3단계 독자 렌즈 박스 (입문/주니어/실무자) */}
            {/* ─────────────────────────────────────── */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">

              {/* 입문 렌즈 */}
              <div className="bg-green-50 border border-green-200 rounded-xl p-5">
                <div className="flex items-center gap-2 mb-3">
                  <span className="bg-green-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">입문</span>
                  <span className="text-green-700 font-bold text-sm">★☆☆</span>
                </div>
                <h4 className="font-bold text-green-800 mb-2 text-sm">요리 레시피로 이해하기</h4>
                <ul className="text-sm text-green-900 space-y-2">
                  <li><b>비유:</b> <b>Dockerfile</b>은 요리 레시피다. 재료(FROM)를 고르고, 조리대(WORKDIR)를 정하고, 재료를 올려놓고(COPY), 조리하고(RUN), 완성 요리를 내는 방법(CMD)을 적어둔 것이다.</li>
                  <li><b>체감 예시:</b> <b>Image</b>는 냉동 완성 요리, <b>Container</b>는 전자레인지에 돌려 접시에 담은 1인분이다. 같은 냉동 요리(Image)로 몇 인분이든 만들 수 있다.</li>
                  <li><b>주의:</b> Container를 삭제(docker rm)해도 Image는 남아있다. 냉동 요리를 버리려면 docker rmi를 써야 한다.</li>
                </ul>
              </div>

              {/* 주니어 렌즈 */}
              <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-5">
                <div className="flex items-center gap-2 mb-3">
                  <span className="bg-yellow-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">주니어</span>
                  <span className="text-yellow-700 font-bold text-sm">★★☆</span>
                </div>
                <h4 className="font-bold text-yellow-800 mb-2 text-sm">빌드 캐시와 디버깅</h4>
                <ul className="text-sm text-yellow-900 space-y-2">
                  <li><b>명령:</b> <code className="bg-yellow-100 px-1 rounded text-xs">docker build --no-cache -t myapp .</code>로 캐시 없이 풀 빌드할 수 있다. 의존성 문제가 의심되면 이 옵션을 먼저 시도해라.</li>
                  <li><b>흔한 함정:</b> <code className="bg-yellow-100 px-1 rounded text-xs">COPY . .</code>을 requirements.txt보다 먼저 쓰면 소스 한 줄만 바꿔도 pip install이 다시 실행된다. 순서가 캐시 효율을 결정한다.</li>
                  <li><b>체크리스트:</b> 컨테이너가 안 뜨면 <code className="bg-yellow-100 px-1 rounded text-xs">docker logs &lt;컨테이너&gt;</code>로 에러를 확인하고, <code className="bg-yellow-100 px-1 rounded text-xs">docker exec -it &lt;컨테이너&gt; /bin/sh</code>로 셸에 들어가 직접 확인해라.</li>
                </ul>
              </div>

              {/* 실무자 렌즈 */}
              <div className="bg-purple-50 border border-purple-200 rounded-xl p-5">
                <div className="flex items-center gap-2 mb-3">
                  <span className="bg-purple-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">실무자</span>
                  <span className="text-purple-700 font-bold text-sm">★★★</span>
                </div>
                <h4 className="font-bold text-purple-800 mb-2 text-sm">CI/CD와 프로덕션</h4>
                <ul className="text-sm text-purple-900 space-y-2">
                  <li><b>프로덕션:</b> CI/CD 파이프라인에서 <code className="bg-purple-100 px-1 rounded text-xs">docker build</code>를 자동 실행하고, 빌드된 이미지를 레지스트리(Docker Hub, ECR, GCR)에 push한다. 태그에 커밋 해시를 넣으면 롤백이 쉽다.</li>
                  <li><b>보안:</b> <code className="bg-purple-100 px-1 rounded text-xs">trivy image myapp:latest</code>로 이미지 취약점을 스캔한다. CI에서 자동으로 돌리면 취약한 이미지가 프로덕션에 올라가는 것을 방지할 수 있다.</li>
                  <li><b>최적화:</b> Multi-stage 빌드(IV-1-3)로 빌드 도구를 최종 이미지에서 제거하면 크기가 수백 MB 줄어든다. slim/alpine 베이스 이미지도 고려해라.</li>
                </ul>
              </div>

            </div>

          </div>
        </div>
      );
    }

    // -----------------------------------------
    // 6. 마운트
    // -----------------------------------------
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
