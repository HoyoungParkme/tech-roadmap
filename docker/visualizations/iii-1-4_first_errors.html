<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — 처음 만나는 에러</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-shake { animation: shake 0.5s ease-in-out; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── STEPS ── */
    const STEPS = [
      {
        title: "STEP 1 · 에러는 기계가 보내는 메시지다",
        desc: "Docker를 처음 쓸 때 에러가 나면 당황스럽다. 하지만 에러 메시지는 '무엇이 문제인지'를 기계가 영어로 설명해 주는 것이다. 가장 자주 만나는 에러 4가지를 알아보자.",
        phase: "intro",
        errorType: null,
      },
      {
        title: "STEP 2 · Cannot connect to the Docker daemon",
        desc: "Docker 데몬(백그라운드 프로세스)이 실행되지 않은 상태다. 자동차 시동을 걸지 않고 악셀을 밟은 것과 같다.",
        phase: "error",
        errorType: "daemon",
        errorMsg: [
          "docker: Cannot connect to the Docker daemon",
          "at unix:///var/run/docker.sock.",
          "Is the docker daemon running?",
        ],
        cause: "Docker Desktop이 실행되지 않았거나, Linux에서 Docker 서비스가 시작되지 않은 상태",
        solutions: [
          { os: "Windows / Mac", fix: "시스템 트레이에서 Docker Desktop 아이콘 클릭 → 시작" },
          { os: "Linux", fix: "sudo systemctl start docker 실행" },
        ],
        verify: "docker version → Client와 Server 모두 출력되면 해결",
      },
      {
        title: "STEP 3 · port is already allocated",
        desc: "호스트(내 컴퓨터)의 포트를 이미 다른 프로세스가 사용하고 있어서 Docker가 같은 포트를 쓸 수 없다.",
        phase: "error",
        errorType: "port",
        errorMsg: [
          "Error response from daemon:",
          "driver failed programming external connectivity",
          "Bind for 0.0.0.0:8080 failed:",
          "port is already allocated",
        ],
        cause: "호스트의 8080 포트를 이미 다른 프로세스(또는 다른 Docker 컨테이너)가 사용 중",
        solutions: [
          { os: "방법 1", fix: "다른 포트로 변경: docker run -d -p 8081:80 nginx" },
          { os: "방법 2", fix: "기존 프로세스 확인: lsof -i :8080 (Mac/Linux) 또는 netstat -ano | findstr :8080 (Windows)" },
        ],
        verify: "docker ps | grep 8080 → 이미 실행 중인 컨테이너가 있는지 확인",
      },
      {
        title: "STEP 4 · pull access denied (이미지 이름 오타)",
        desc: "이미지 이름을 잘못 입력하면 Docker Hub에서 찾을 수 없다. 오타가 가장 흔한 원인이다!",
        phase: "error",
        errorType: "image",
        errorMsg: [
          "Unable to find image 'myngix:latest' locally",
          "docker: Error response from daemon:",
          "pull access denied for myngix,",
          "repository does not exist",
          "or may require 'docker login'",
        ],
        cause: "'myngix'는 'nginx'의 오타. 존재하지 않는 이미지를 pull하려고 시도",
        solutions: [
          { os: "방법 1", fix: "이미지 이름 오타 확인: nginx (O) vs myngix (X) vs ngnix (X)" },
          { os: "방법 2", fix: "hub.docker.com에서 정확한 이미지 이름 검색" },
          { os: "비공개 이미지", fix: "docker login 후 다시 시도" },
        ],
        verify: "docker pull nginx → 정상적으로 이미지가 내려받아지면 해결",
      },
      {
        title: "STEP 5 · No space left on device",
        desc: "Docker 이미지, 컨테이너, 볼륨, 빌드 캐시가 쌓여서 디스크가 꽉 찼다. docker system prune으로 정리하자.",
        phase: "error",
        errorType: "space",
        errorMsg: [
          "write /var/lib/docker/tmp/...:",
          "no space left on device",
        ],
        cause: "Docker가 저장하는 이미지·컨테이너·볼륨·빌드 캐시가 디스크를 가득 채움",
        solutions: [
          { os: "현황 확인", fix: "docker system df → 디스크 사용량 확인" },
          { os: "일반 정리", fix: "docker system prune → 미사용 리소스 삭제" },
          { os: "공격적 정리", fix: "docker system prune -a --volumes (주의: 볼륨 데이터 손실 가능)" },
        ],
        verify: "docker system df → RECLAIMABLE 컬럼에서 회수 가능한 용량 확인",
      },
      {
        title: "STEP 6 · 에러 메시지 읽는 법 정리",
        desc: "에러가 길게 나와도 겁내지 않아도 된다. 마지막 줄을 먼저 읽고, 'Error:', 'failed:', 'denied:' 키워드를 찾고, 메시지를 그대로 복사해서 검색하면 대부분 해결된다.",
        phase: "summary",
        errorType: null,
      },
    ];

    /* ── 에러 카드 ── */
    function ErrorDisplay({ data, step }) {
      if (!data.errorType) return null;

      const iconMap = { daemon: "🔌", port: "🔗", image: "📛", space: "💾" };

      return (
        <div key={step} className="space-y-4 anim-fade">
          {/* 에러 메시지 */}
          <div className="bg-gray-900 rounded-xl p-4 font-mono text-sm">
            <div className="flex gap-1.5 mb-3">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-green-500"></div>
            </div>
            {data.errorMsg.map((line, i) => (
              <div key={i} className="text-red-400 anim-slide" style={{ animationDelay: `${i * 0.12}s`, opacity: 0 }}>
                {line}
              </div>
            ))}
          </div>

          {/* 원인 */}
          <div className="bg-red-50 border border-red-200 rounded-xl p-4 anim-shake">
            <div className="flex items-center gap-2 mb-2">
              <span className="text-2xl">{iconMap[data.errorType]}</span>
              <span className="font-bold text-red-700 text-sm">원인</span>
            </div>
            <p className="text-red-600 text-sm">{data.cause}</p>
          </div>

          {/* 해결 방법 */}
          <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4">
            <h4 className="font-bold text-emerald-700 text-sm mb-3">해결 방법</h4>
            <div className="space-y-2">
              {data.solutions.map((sol, i) => (
                <div key={i} className="flex items-start gap-3 bg-white rounded-lg p-3 border border-emerald-100 anim-slide" style={{ animationDelay: `${(i+3) * 0.12}s`, opacity: 0 }}>
                  <span className="bg-emerald-200 text-emerald-800 px-2 py-0.5 rounded text-xs font-bold whitespace-nowrap">{sol.os}</span>
                  <span className="text-sm text-slate-700 font-mono">{sol.fix}</span>
                </div>
              ))}
            </div>
          </div>

          {/* 확인 */}
          <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-sm">
            <span className="font-bold text-blue-700">확인: </span>
            <span className="text-blue-600 font-mono">{data.verify}</span>
          </div>
        </div>
      );
    }

    /* ── 요약 카드 ── */
    function SummaryCards({ step }) {
      const tips = [
        { num: "1", text: "마지막 줄을 먼저 읽는다", detail: "실제 에러 원인이 대부분 마지막에 있다" },
        { num: "2", text: "'Error:', 'failed:', 'denied:' 키워드를 찾는다", detail: "핵심 원인이 이 키워드 근처에 있다" },
        { num: "3", text: "에러 메시지를 그대로 복사해서 검색한다", detail: "StackOverflow, GitHub Issues에서 해결책을 찾을 수 있다" },
      ];

      const errors = [
        { name: "Cannot connect to Docker daemon", fix: "Docker Desktop 시작", color: "bg-blue-100 text-blue-800" },
        { name: "port is already allocated", fix: "포트 변경 또는 기존 프로세스 종료", color: "bg-purple-100 text-purple-800" },
        { name: "pull access denied", fix: "이미지 이름 오타 확인", color: "bg-amber-100 text-amber-800" },
        { name: "No space left on device", fix: "docker system prune 실행", color: "bg-red-100 text-red-800" },
      ];

      return (
        <div className="space-y-4 anim-fade">
          {/* 에러 읽기 3단계 */}
          <div className="bg-gradient-to-r from-blue-50 to-emerald-50 border-2 border-blue-200 rounded-xl p-5">
            <h4 className="font-bold text-blue-800 mb-3">에러 메시지 읽는 3단계</h4>
            <div className="space-y-2">
              {tips.map((tip, i) => (
                <div key={i} className="flex items-start gap-3 anim-slide" style={{ animationDelay: `${i * 0.15}s`, opacity: 0 }}>
                  <div className="w-7 h-7 bg-blue-600 text-white rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0">{tip.num}</div>
                  <div>
                    <div className="font-bold text-sm text-slate-800">{tip.text}</div>
                    <div className="text-xs text-slate-500">{tip.detail}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* 에러 요약 */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {errors.map((err, i) => (
              <div key={i} className="bg-white rounded-xl border border-slate-200 p-4 anim-slide" style={{ animationDelay: `${(i+3) * 0.1}s`, opacity: 0 }}>
                <div className={`inline-block px-2 py-1 rounded text-xs font-bold mb-2 ${err.color}`}>{err.name}</div>
                <div className="text-sm text-slate-600">→ {err.fix}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ── 인트로 ── */
    function IntroPanel() {
      return (
        <div className="bg-gradient-to-r from-amber-50 to-red-50 border-2 border-amber-200 rounded-xl p-6 anim-fade text-center">
          <div className="text-4xl mb-3">⚠️</div>
          <h3 className="text-xl font-bold text-amber-800 mb-3">Docker 초보자가 가장 자주 만나는 에러 4가지</h3>
          <div className="flex flex-wrap justify-center gap-3 mt-4">
            {[
              { icon: "🔌", label: "Docker daemon 연결 불가" },
              { icon: "🔗", label: "포트 충돌" },
              { icon: "📛", label: "이미지 이름 오타" },
              { icon: "💾", label: "디스크 공간 부족" },
            ].map((item, i) => (
              <div key={i} className="bg-white rounded-lg px-4 py-3 border border-amber-200 anim-slide" style={{animationDelay:`${i*0.12}s`, opacity: 0}}>
                <div className="text-2xl mb-1">{item.icon}</div>
                <div className="text-xs font-medium text-slate-700">{item.label}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ── 메인 앱 ── */
    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 5000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const bgColor =
        data.phase === "summary" ? "bg-emerald-600 border-emerald-700 text-white" :
        data.phase === "error" ? "bg-red-600 border-red-700 text-white" :
        "bg-blue-600 border-blue-700 text-white";

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter III-1-4: 처음 만나는 에러</h1>
              </div>
              <p className="text-slate-500 text-sm">Docker 초보자가 자주 만나는 에러 4가지의 원인과 해결법을 시뮬레이션합니다.</p>
            </header>

            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${bgColor}`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {data.phase === "intro" && <IntroPanel />}
            {data.phase === "error" && <ErrorDisplay data={data} step={step} />}
            {data.phase === "summary" && <SummaryCards step={step} />}

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
