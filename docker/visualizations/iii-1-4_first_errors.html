            '#   2) docker logs <id>        (마지막 에러 확인)',
            '#   3) docker inspect <id>     (ExitCode 확인)',
            '#   4) docker events           (외부 요인 확인)',
          ],
          highlight: [6, 7, 8, 9, 15, 19, 20, 21, 33, 37, 41, 42, 43, 44],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 위: 터미널 에러 메시지 박스
    //   command 입력 → message 라인별 색상 (err 빨강 / hint 주황 / ok 초록)
    // ─────────────────────────────────────────────────────
    function ErrorTerminal({ step }) {
      return (
        <div className="bg-[#0f172a] rounded-lg border-2 border-slate-700 overflow-hidden">
          <div className="bg-[#1e293b] px-3 py-1.5 flex items-center gap-2">
            <div className="flex gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-red-500"></span>
              <span className="w-2.5 h-2.5 rounded-full bg-yellow-500"></span>
              <span className="w-2.5 h-2.5 rounded-full bg-green-500"></span>
            </div>
            <span className="text-[10px] text-slate-400 font-mono ml-1">terminal</span>
            <span className="ml-auto text-[9px] bg-sky-700 text-sky-100 px-1.5 py-0.5 rounded font-mono">
              {step.errorTag}
            </span>
          </div>
          <div className="p-3 font-mono text-xs leading-relaxed">
            <div className="text-sky-300 mb-1.5">{step.command}</div>
            {step.message.map((line, i) => {
              const tone =
                line.kind === 'err' ? 'text-red-400' :
                line.kind === 'hint' ? 'text-amber-300' :
                'text-emerald-300';
              return (
                <div key={i} className={`${tone} pl-2`}>{line.text}</div>
              );
            })}
            <div className="text-slate-500 mt-1.5 text-[10px]">$ <span className="anim-blink">▊</span></div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중간: 진단 카드 (증상 + 근본 원인)
    // ─────────────────────────────────────────────────────
    function DiagnosisCard({ step }) {
      return (
        <div className="bg-rose-50 border-2 border-rose-200 rounded-lg p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">{step.errorIcon}</span>
            <span className="text-[11px] font-bold text-rose-700 uppercase tracking-wider">진단</span>
          </div>
          <div className="space-y-1.5">
            <div className="bg-white rounded border border-rose-100 p-2">
              <div className="text-[9px] font-bold text-rose-600 mb-0.5">증상</div>
              <div className="text-[11px] text-slate-700 leading-snug">{step.diagnosis.symptom}</div>
            </div>
            <div className="bg-white rounded border border-rose-100 p-2">
              <div className="text-[9px] font-bold text-rose-600 mb-0.5">근본 원인</div>
              <div className="text-[11px] text-slate-700 leading-snug">{step.diagnosis.rootCause}</div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: 해결 방법 카드 + 검증
    //   tone: primary(파랑) / sub(회색) / danger(주황)
    // ─────────────────────────────────────────────────────
    function SolutionCard({ step }) {
      const toneMap = {
        primary: 'bg-sky-100 text-sky-800 border-sky-300',
        sub: 'bg-slate-100 text-slate-700 border-slate-300',
        danger: 'bg-orange-100 text-orange-800 border-orange-300',
      };
      return (
        <div className="bg-sky-50 border-2 border-sky-200 rounded-lg p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">🛠️</span>
            <span className="text-[11px] font-bold text-sky-800 uppercase tracking-wider">해결 방법</span>
          </div>
          <div className="space-y-1.5">
            {step.solutions.map((sol, i) => (
              <div key={i} className="bg-white rounded border border-sky-100 p-2">
                <div className="flex items-start gap-2">
                  <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded border whitespace-nowrap flex-shrink-0 ${toneMap[sol.tone] || toneMap.sub}`}>
                    {sol.os}
                  </span>
                  <code className="text-[11px] text-slate-700 font-mono leading-snug break-all">{sol.cmd}</code>
                </div>
              </div>
            ))}
          </div>

          <div className="mt-2 pt-2 border-t border-sky-200">
            <div className="flex items-start gap-1.5">
              <span className="text-emerald-600 font-bold text-[10px] mt-0.5">✓ 검증</span>
              <span className="text-[11px] text-slate-700 leading-snug">{step.verify}</span>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 에러 터미널 / 중간: 진단 / 하단: 해결 카드
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🩺 에러 진단 차트</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <ErrorTerminal step={step} />
            <DiagnosisCard step={step} />
            <SolutionCard step={step} />
          </div>

          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-red-400"></span>error line
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-400"></span>hint line
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>solution
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>verify
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-sky-500/15 border-l-2 border-sky-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 4 버튼 + 키보드 ←/→ + 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-4</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Docker 실전 &gt; Chapter 1. 첫걸음</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-1-4. 처음 만나는 에러 — 데몬 · 포트 · 이미지 · 권한 · 디버깅</h1>
                  <p className="text-sm text-slate-500 mt-0.5">의사의 진료 차트 — 증상(에러) → 진단(원인) → 처방(해결) → 검증</p>
                </div>
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {stepIdx === STEPS.length - 1 && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-sm text-sky-900">
                💡 정리: 에러 메시지는 <strong>마지막 줄부터</strong> 읽고, <strong>logs · inspect · events</strong> 셋이 디버깅 3종 세트다. 다음(III-1-5)에서는 Dockerfile 작성을 다룬다.
              </div>
            )}

            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            <div className="flex flex-wrap gap-2 justify-center">
              {['daemon', 'port-conflict', 'image-pull', 'permission', 'docker-logs', 'docker-inspect', 'docker-events'].map((kw) => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-xs font-medium border border-sky-200">
                  {kw}
                </span>
              ))}
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./iii-1-3_basic_commands.html" className="text-sky-700 hover:text-sky-900 font-medium">&larr; III-1-3 기본 명령어</a>
              <a href="./iii-1-5_dockerfile_basics.html" className="text-sky-700 hover:text-sky-900 font-medium">III-1-5 Dockerfile &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
