<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습 — 컨테이너 네트워크</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }
    @keyframes pingPong { 0%{transform:translateX(0);} 50%{transform:translateX(20px);} 100%{transform:translateX(0);} }
    @keyframes dataFlow { 0%{left:0%;opacity:0;} 20%{opacity:1;} 80%{opacity:1;} 100%{left:90%;opacity:0;} }
    .anim-fade { animation: fadeIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .anim-slide { animation: slideRight 0.5s ease-out forwards; }
    .anim-ping { animation: pingPong 2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: "STEP 1 · Docker 네트워크가 필요한 이유",
        desc: "실전 앱은 웹 서버, DB, 캐시 등 여러 컨테이너가 함께 동작한다. 컨테이너끼리 어떻게 통신하게 만들 것인지를 결정하는 것이 Docker 네트워크다. Docker는 설치 시 bridge, host, none 세 가지 기본 네트워크를 생성한다.",
        phase: "intro",
        networkMode: null,
      },
      {
        title: "STEP 2 · bridge 네트워크 (기본값)",
        desc: "가상 스위치(docker0)를 만들어 컨테이너끼리 통신하게 한다. 외부와 연결하려면 -p 포트 매핑이 필요하다. 로컬 개발, 단일 호스트 다중 컨테이너에 사용한다.",
        phase: "bridge",
        networkMode: "bridge",
      },
      {
        title: "STEP 3 · 사용자 정의 bridge와 DNS",
        desc: "기본 bridge는 IP로만 통신 가능하지만, docker network create로 만든 사용자 정의 bridge는 컨테이너 이름으로 통신할 수 있다. Docker가 내부 DNS를 운영하기 때문이다. Compose를 쓰면 자동으로 생성된다.",
        phase: "custom_bridge",
        networkMode: "custom_bridge",
      },
      {
        title: "STEP 4 · host 네트워크",
        desc: "컨테이너가 호스트 네트워크 스택을 그대로 사용한다. 포트 매핑이 필요 없고 네트워크 오버헤드가 없어 성능이 가장 좋다. 단, 격리가 전혀 없다. Linux에서만 완전히 동작한다.",
        phase: "host",
        networkMode: "host",
      },
      {
        title: "STEP 5 · none 네트워크",
        desc: "컨테이너에 루프백(lo) 인터페이스만 남기고 외부 네트워크를 완전히 차단한다. 외부와 통신이 필요 없는 배치 작업이나 보안상 완전 격리가 필요한 경우에 사용한다.",
        phase: "none",
        networkMode: "none",
      },
      {
        title: "STEP 6 · 네트워크 모드 비교 정리",
        desc: "bridge는 격리 + 포트 매핑, host는 성능 우선 + 격리 없음, none은 완전 차단. 실무에서는 사용자 정의 bridge 네트워크를 만들어 컨테이너 이름(DNS)으로 통신하는 것이 표준이다.",
        phase: "summary",
        networkMode: null,
      },
    ];

    /* ── 네트워크 다이어그램 컴포넌트 ── */
    function NetworkDiagram({ mode }) {
      if (mode === "bridge") {
        return (
          <div className="bg-white rounded-xl border-2 border-blue-200 p-6 anim-fade">
            <div className="text-center text-sm font-bold text-slate-600 mb-4">bridge 네트워크 (docker0)</div>
            {/* 호스트 */}
            <div className="border-2 border-slate-300 rounded-xl p-4 bg-slate-50">
              <div className="text-xs font-bold text-slate-500 mb-3">🖥️ 호스트 머신</div>
              <div className="flex items-center justify-center mb-3">
                <div className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">외부 요청 → localhost:8080</div>
                <div className="mx-2 text-blue-400">→</div>
                <div className="text-xs bg-blue-200 text-blue-800 px-2 py-1 rounded font-mono">-p 8080:80</div>
              </div>
              {/* 가상 스위치 */}
              <div className="bg-blue-100 border border-blue-300 rounded-lg p-3 mb-3">
                <div className="text-xs font-bold text-blue-700 text-center mb-2">🔀 가상 스위치 (docker0 bridge)</div>
                <div className="flex justify-center gap-4">
                  <div className="bg-white border-2 border-blue-400 rounded-lg p-3 text-center shadow-sm">
                    <div className="text-2xl mb-1">🌐</div>
                    <div className="text-xs font-bold">nginx</div>
                    <div className="text-xs text-slate-500 font-mono">172.17.0.2:80</div>
                  </div>
                  <div className="flex items-center">
                    <div className="text-blue-400 anim-ping">↔</div>
                  </div>
                  <div className="bg-white border-2 border-blue-400 rounded-lg p-3 text-center shadow-sm">
                    <div className="text-2xl mb-1">🗄️</div>
                    <div className="text-xs font-bold">postgres</div>
                    <div className="text-xs text-slate-500 font-mono">172.17.0.3:5432</div>
                  </div>
                </div>
              </div>
              <div className="text-center text-xs text-slate-500">컨테이너끼리는 IP로 통신 가능, 외부는 -p 포트 매핑 필요</div>
            </div>
          </div>
        );
      }

      if (mode === "custom_bridge") {
        return (
          <div className="bg-white rounded-xl border-2 border-emerald-200 p-6 anim-fade">
            <div className="text-center text-sm font-bold text-slate-600 mb-4">사용자 정의 bridge 네트워크 (mynet)</div>
            <div className="border-2 border-slate-300 rounded-xl p-4 bg-slate-50">
              <div className="text-xs font-bold text-slate-500 mb-3">🖥️ 호스트 머신</div>
              <div className="bg-emerald-100 border border-emerald-300 rounded-lg p-3 mb-3">
                <div className="text-xs font-bold text-emerald-700 text-center mb-2">🔀 사용자 정의 bridge + 🔍 내장 DNS</div>
                <div className="flex justify-center gap-4">
                  <div className="bg-white border-2 border-emerald-400 rounded-lg p-3 text-center shadow-sm">
                    <div className="text-2xl mb-1">🌐</div>
                    <div className="text-xs font-bold">web</div>
                    <div className="text-xs text-slate-500 font-mono">172.20.0.3</div>
                  </div>
                  <div className="flex flex-col items-center justify-center">
                    <div className="text-emerald-500 anim-ping font-bold">↔</div>
                    <div className="text-xs text-emerald-600 font-bold">ping db ✓</div>
                  </div>
                  <div className="bg-white border-2 border-emerald-400 rounded-lg p-3 text-center shadow-sm">
                    <div className="text-2xl mb-1">🗄️</div>
                    <div className="text-xs font-bold">db</div>
                    <div className="text-xs text-slate-500 font-mono">172.20.0.2</div>
                  </div>
                </div>
              </div>
              <div className="bg-emerald-50 rounded-lg p-2 text-center">
                <span className="text-xs text-emerald-700 font-medium">컨테이너 이름으로 통신 가능! postgresql://db:5432/demo</span>
              </div>
            </div>
          </div>
        );
      }

      if (mode === "host") {
        return (
          <div className="bg-white rounded-xl border-2 border-amber-200 p-6 anim-fade">
            <div className="text-center text-sm font-bold text-slate-600 mb-4">host 네트워크</div>
            <div className="border-2 border-amber-300 rounded-xl p-4 bg-amber-50">
              <div className="text-xs font-bold text-amber-700 mb-3">🖥️ 호스트 머신 (네트워크 공유)</div>
              <div className="flex justify-center gap-6 mb-3">
                <div className="bg-white border-2 border-amber-400 rounded-lg p-3 text-center shadow-sm">
                  <div className="text-2xl mb-1">🌐</div>
                  <div className="text-xs font-bold">nginx 컨테이너</div>
                  <div className="text-xs text-amber-600 font-mono">호스트:80 직접 사용</div>
                </div>
                <div className="bg-white border-2 border-amber-400 rounded-lg p-3 text-center shadow-sm">
                  <div className="text-2xl mb-1">📊</div>
                  <div className="text-xs font-bold">monitoring 컨테이너</div>
                  <div className="text-xs text-amber-600 font-mono">호스트:9090 직접 사용</div>
                </div>
              </div>
              <div className="flex justify-center gap-3 text-xs">
                <span className="bg-amber-200 text-amber-800 px-2 py-1 rounded">✓ 포트 매핑 불필요</span>
                <span className="bg-amber-200 text-amber-800 px-2 py-1 rounded">✓ 성능 최고</span>
                <span className="bg-red-200 text-red-800 px-2 py-1 rounded">✗ 격리 없음</span>
              </div>
            </div>
          </div>
        );
      }

      if (mode === "none") {
        return (
          <div className="bg-white rounded-xl border-2 border-slate-300 p-6 anim-fade">
            <div className="text-center text-sm font-bold text-slate-600 mb-4">none 네트워크</div>
            <div className="border-2 border-slate-400 rounded-xl p-4 bg-slate-100">
              <div className="text-xs font-bold text-slate-500 mb-3">🖥️ 호스트 머신</div>
              <div className="flex justify-center mb-3">
                <div className="bg-white border-2 border-slate-400 rounded-lg p-4 text-center shadow-sm relative">
                  <div className="text-3xl mb-1">🔒</div>
                  <div className="text-xs font-bold">batch-job 컨테이너</div>
                  <div className="text-xs text-slate-500 font-mono mt-1">lo (127.0.0.1) 만 존재</div>
                  <div className="absolute -right-8 top-1/2 -translate-y-1/2 text-red-500 text-lg">✗</div>
                </div>
                <div className="flex flex-col items-center justify-center ml-10 opacity-30">
                  <div className="text-2xl">🌍</div>
                  <div className="text-xs text-slate-400">외부 네트워크</div>
                  <div className="text-xs text-red-400">접근 불가</div>
                </div>
              </div>
              <div className="bg-slate-200 rounded-lg p-2 text-center">
                <code className="text-xs text-slate-600">ping 8.8.8.8 → "no network"</code>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    /* ── 메인 앱 ── */
    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const timerRef = useRef(null);
      const data = STEPS[step];

      useEffect(() => {
        if (isPlaying && step < STEPS.length - 1) {
          timerRef.current = setTimeout(() => setStep(s => s + 1), 4000);
        } else if (step >= STEPS.length - 1) setIsPlaying(false);
        return () => clearTimeout(timerRef.current);
      }, [isPlaying, step]);

      const go = (d) => { setStep(s => Math.max(0, Math.min(STEPS.length - 1, s + d))); setIsPlaying(false); };

      const compareData = [
        { driver: "bridge", feature: "가상 스위치", port: "필요 (-p)", isolation: "있음", use: "로컬 개발", color: "bg-blue-100 border-blue-300" },
        { driver: "host", feature: "호스트 네트워크 공유", port: "불필요", isolation: "없음", use: "성능 우선", color: "bg-amber-100 border-amber-300" },
        { driver: "none", feature: "네트워크 차단", port: "없음", isolation: "완전 격리", use: "배치/보안", color: "bg-slate-100 border-slate-300" },
      ];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">D</div>
                <h1 className="text-xl font-bold text-slate-800">Chapter V-1-1: 컨테이너 네트워크 (bridge / host / none)</h1>
              </div>
              <p className="text-slate-500 text-sm">세 가지 네트워크 모드의 동작 방식을 시각적으로 비교합니다.</p>
            </header>

            {/* 현재 단계 설명 */}
            <div key={step} className={`p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center anim-fade ${
              data.phase === "none" ? "bg-slate-600 border-slate-700 text-white" :
              data.phase === "host" ? "bg-amber-600 border-amber-700 text-white" :
              data.phase === "summary" ? "bg-emerald-600 border-emerald-700 text-white" :
              "bg-blue-600 border-blue-700 text-white"
            }`}>
              <h3 className="text-xs font-bold opacity-70 mb-1 uppercase tracking-wider">{data.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 시각화 영역 */}
            {data.phase === "intro" && (
              <div key="intro" className="anim-fade">
                <div className="bg-white rounded-xl border border-slate-200 p-5">
                  <div className="text-center mb-4">
                    <code className="bg-slate-100 text-slate-700 px-3 py-1 rounded text-sm">docker network ls</code>
                  </div>
                  <div className="bg-slate-900 rounded-lg p-4 font-mono text-sm text-slate-300">
                    <div className="text-slate-500">NETWORK ID     NAME      DRIVER    SCOPE</div>
                    <div className="text-blue-300">a1b2c3d4e5f6   bridge    bridge    local</div>
                    <div className="text-amber-300">b2c3d4e5f6a1   host      host      local</div>
                    <div className="text-slate-400">c3d4e5f6a1b2   none      null      local</div>
                  </div>
                  <div className="flex justify-center gap-3 mt-4">
                    <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded text-sm">bridge (기본값)</span>
                    <span className="bg-amber-100 text-amber-700 px-3 py-1 rounded text-sm">host</span>
                    <span className="bg-slate-200 text-slate-700 px-3 py-1 rounded text-sm">none</span>
                  </div>
                </div>
              </div>
            )}

            {data.networkMode && <NetworkDiagram mode={data.networkMode} />}

            {data.phase === "summary" && (
              <div key="summary" className="space-y-4 anim-fade">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  {compareData.map((d, i) => (
                    <div key={i} className={`rounded-xl border-2 p-4 ${d.color} anim-slide`} style={{ animationDelay: `${i * 0.15}s` }}>
                      <div className="font-bold text-lg mb-2">{d.driver}</div>
                      <div className="space-y-1 text-sm">
                        <div><span className="text-slate-500">특징:</span> {d.feature}</div>
                        <div><span className="text-slate-500">포트 매핑:</span> {d.port}</div>
                        <div><span className="text-slate-500">격리:</span> {d.isolation}</div>
                        <div><span className="text-slate-500">용도:</span> {d.use}</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4 text-center">
                  <span className="text-emerald-700 font-bold">실무 권장: 사용자 정의 bridge 네트워크 + 컨테이너 이름(DNS) 통신</span>
                </div>
              </div>
            )}

            {/* 프로그레스 + 컨트롤 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex gap-1.5 mb-4">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStep(i); setIsPlaying(false); }}
                    className={`flex-1 h-2 rounded-full transition-all duration-300 ${i <= step ? 'bg-blue-500' : 'bg-slate-200'} ${i === step ? 'scale-y-150' : ''}`} />
                ))}
              </div>
              <div className="flex items-center justify-center gap-3">
                <button onClick={() => go(-1)} disabled={step === 0}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">← 이전</button>
                <button onClick={() => { if (step >= STEPS.length - 1) { setStep(0); } setIsPlaying(p => !p); }}
                  className={`px-5 py-2 rounded-lg text-sm font-medium transition shadow-sm ${isPlaying ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                  {isPlaying ? '⏸ 정지' : '▶ 자동 실행'}
                </button>
                <button onClick={() => go(1)} disabled={step === STEPS.length - 1}
                  className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-30 text-sm font-medium transition">다음 →</button>
                <span className="text-xs text-slate-400 ml-2">Step {step + 1} / {STEPS.length}</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
