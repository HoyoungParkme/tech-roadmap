# 예제 VIII-1-8: MySQL + Redis + MongoDB 동시 실행
# 학습 시나리오: 3개 DB를 하나의 Compose로 관리하며, 각 DB의 패턴 차이를 체험한다
# 포트: 3306 (MySQL), 6379 (Redis), 27017 (MongoDB)

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-demo}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init/mysql.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongopass}
      MONGO_INITDB_DATABASE: demo
    volumes:
      - mongo_data:/data/db
      - ./init/mongo.js:/docker-entrypoint-initdb.d/01_init.js:ro
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "${MONGO_USERNAME:-root}", "-p", "${MONGO_PASSWORD:-mongopass}", "--authenticationDatabase", "admin"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  mysql_data:
  redis_data:
  mongo_data:
