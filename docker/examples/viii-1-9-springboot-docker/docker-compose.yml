# 예제 VIII-1-9: Spring Boot 앱 Docker화
# 학습 시나리오: Multi-stage 빌드로 Spring Boot를 Docker 이미지로 만든다
# 포트: 8080 (호스트) → 8080 (컨테이너)

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
