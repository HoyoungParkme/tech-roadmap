# 예제 VIII-1-5: MySQL을 Docker로 실행하기
# 학습 시나리오: up → 테이블 생성 → INSERT → down → up → 데이터 생존 확인
# 포트: 3306 (호스트) → 3306 (컨테이너)

services:
  db:
    image: mysql:8.0
    env_file: .env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
