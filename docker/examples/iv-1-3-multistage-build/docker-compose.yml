# Multi-stage 빌드 학습용 Compose 파일
# 두 서비스를 빌드하여 이미지 크기를 비교한다.
#
# 사용법:
#   docker compose build
#   docker images | grep multistage
#
# 실행:
#   docker compose up -d
#   curl http://localhost:${PORT:-8000}/

services:
  # Multi-stage 빌드 (slim 이미지)
  app-multi:
    build:
      context: .
      dockerfile: Dockerfile
    image: multistage-demo:multi
    ports:
      - "${PORT:-8000}:8000"

  # 단일 스테이지 빌드 (full 이미지) — 크기 비교용
  app-single:
    build:
      context: .
      dockerfile: Dockerfile.single
    image: multistage-demo:single
    # 포트 충돌 방지: 8001로 매핑
    ports:
      - "${PORT_SINGLE:-8001}:8000"
