# 예제 VIII-1-7: MongoDB를 Docker로 실행하기
# 학습 시나리오: up → insertOne → down → up → 데이터 생존 확인
# 포트: 27017 (호스트) → 27017 (컨테이너)

services:
  db:
    image: mongo:7
    env_file: .env
    volumes:
      - mongo_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/01_init.js:ro
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "${MONGO_INITDB_ROOT_USERNAME}", "-p", "${MONGO_INITDB_ROOT_PASSWORD}", "--authenticationDatabase", "admin"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  mongo_data:
