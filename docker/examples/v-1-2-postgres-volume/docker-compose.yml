# 예제 V-1-2: Postgres named volume 영구화
# 학습 시나리오: up → INSERT → down → up → 데이터 생존 확인
# 단일 진실원: ../../docs/design/crossref.md §2

services:
  db:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"

volumes:
  pgdata:
