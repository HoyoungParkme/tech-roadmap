# 예제 VIII-1-10: Node.js (Express) 앱 Docker화
# 포트: 3000 (호스트) → 3000 (컨테이너)

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
