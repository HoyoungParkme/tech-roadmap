# 예제 VIII-1-6: Redis를 Docker로 실행하기
# 학습 시나리오: up → SET/GET → down → up → 데이터 생존 확인 (appendonly)
# 포트: 6379 (호스트) → 6379 (컨테이너)

services:
  cache:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
