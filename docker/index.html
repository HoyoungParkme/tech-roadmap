<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 완전 정복 — 인터랙티브 학습</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .anim-fade { animation: fadeIn 0.3s ease-out forwards; }
    .sidebar-item:hover { background:#f1f5f9; }
    .sidebar-item.active { background:#eff6ff; color:#2563eb; font-weight:700; border-right:3px solid #2563eb; }
    ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
    .group-header { user-select:none; }
  </style>
</head>
<body class="bg-slate-100 h-screen overflow-hidden">
  <div id="root" class="h-full"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const PARTS = [
      { group:"Part I. 왜 컨테이너인가", color:"emerald", icon:"🌱", items:[
        {id:"i-1-1",file:"i-1-1_environment_mismatch.html",label:"I-1 환경 불일치"},
        {id:"i-1-2",file:"i-1-2_vm_vs_container.html",label:"I-2 VM vs 컨테이너"},
        {id:"i-1-3",file:"i-1-3_environment_consistency.html",label:"I-3 환경 일관성"},
        {id:"i-1-4",file:"i-1-4_docker_benefits.html",label:"I-4 Docker의 효과"},
      ]},
      { group:"Part II. 컨테이너 생태계", color:"emerald", icon:"🌍", items:[
        {id:"ii-1-1",file:"ii-1-1_container_tools.html",label:"II-1 Docker, Podman, LXC"},
        {id:"ii-1-2",file:"ii-1-2_oci_standard.html",label:"II-2 OCI 표준"},
        {id:"ii-1-3",file:"ii-1-3_registry.html",label:"II-3 Docker Hub"},
        {id:"ii-1-4",file:"ii-1-4_when_to_use_docker.html",label:"II-4 언제 Docker를"},
      ]},
      { group:"Part III. 첫 컨테이너 실행", color:"blue", icon:"🚀", items:[
        {id:"iii-1-1",file:"iii-1-1_docker_install.html",label:"III-1 Docker 설치"},
        {id:"iii-1-2",file:"iii-1-2_hello_world.html",label:"III-2 Hello World"},
        {id:"iii-1-3",file:"iii-1-3_docker_ps_images.html",label:"III-3 상태 확인"},
        {id:"iii-1-4",file:"iii-1-4_first_errors.html",label:"III-4 첫 에러"},
      ]},
      { group:"Part IV. 이미지·Dockerfile", color:"blue", icon:"📦", items:[
        {id:"iv-1-1",file:"iv-1-1_dockerfile_to_container.html",label:"IV-1 Dockerfile→컨테이너"},
        {id:"iv-1-2",file:"iv-1-2_layer_caching.html",label:"IV-2 레이어 캐싱"},
        {id:"iv-1-3",file:"iv-1-3_multistage_build.html",label:"IV-3 멀티 스테이지"},
      ]},
      { group:"Part V. 네트워크·볼륨·Compose", color:"purple", icon:"🔗", items:[
        {id:"v-1-1",file:"v-1-1_container_network.html",label:"V-1 네트워크"},
        {id:"v-1-2",file:"v-1-2_volumes_vs_bindmount.html",label:"V-2 볼륨·바인드 마운트"},
        {id:"v-1-3",file:"v-1-3_compose_basics.html",label:"V-3 Compose 기초"},
        {id:"v-1-4",file:"v-1-4_compose_multicontainer.html",label:"V-4 다중 컨테이너"},
        {id:"v-1-5",file:"v-1-5_compose_network.html",label:"V-5 네트워크 정의"},
        {id:"v-1-6",file:"v-1-6_volume_backup.html",label:"V-6 볼륨 백업"},
      ]},
      { group:"Part VI. 실전 다중 컨테이너", color:"amber", icon:"⚙️", items:[
        {id:"vi-1-1",file:"vi-1-1_three_tier_app.html",label:"VI-1 3티어 구성"},
        {id:"vi-1-2",file:"vi-1-2_env_management.html",label:"VI-2 환경변수·.env"},
        {id:"vi-1-3",file:"vi-1-3_healthcheck_timing.html",label:"VI-3 헬스체크"},
        {id:"vi-1-4",file:"vi-1-4_dev_vs_prod.html",label:"VI-4 개발 vs 프로덕션"},
        {id:"vi-1-5",file:"vi-1-5_log_collection.html",label:"VI-5 로그 수집"},
        {id:"vi-1-6",file:"vi-1-6_resource_limits.html",label:"VI-6 리소스 제한"},
      ]},
      { group:"Part VII. 레지스트리·프로덕션", color:"rose", icon:"🏭", items:[
        {id:"vii-1-1",file:"vii-1-1_registry_usage.html",label:"VII-1 레지스트리"},
        {id:"vii-1-2",file:"vii-1-2_tagging_strategy.html",label:"VII-2 태깅 전략"},
        {id:"vii-1-3",file:"vii-1-3_security.html",label:"VII-3 보안"},
        {id:"vii-1-4",file:"vii-1-4_cicd_docker.html",label:"VII-4 CI/CD"},
      ]},
      { group:"Part VIII. 실전 워크숍", color:"rose", icon:"🛠️", items:[
        {id:"viii-1-1",file:"viii-1-1_docker_run_options.html",label:"VIII-1 docker run"},
        {id:"viii-1-2",file:"viii-1-2_exec_cp_attach.html",label:"VIII-2 exec, cp, attach"},
        {id:"viii-1-3",file:"viii-1-3_logs_inspect_stats.html",label:"VIII-3 logs, inspect"},
        {id:"viii-1-4",file:"viii-1-4_system_prune.html",label:"VIII-4 system prune"},
        {id:"viii-1-5",file:"viii-1-5_mysql_docker.html",label:"VIII-5 MySQL"},
        {id:"viii-1-6",file:"viii-1-6_redis_docker.html",label:"VIII-6 Redis"},
        {id:"viii-1-7",file:"viii-1-7_mongodb_docker.html",label:"VIII-7 MongoDB"},
        {id:"viii-1-8",file:"viii-1-8_db_comparison.html",label:"VIII-8 DB 3종"},
        {id:"viii-1-9",file:"viii-1-9_spring_boot_docker.html",label:"VIII-9 Spring Boot"},
        {id:"viii-1-10",file:"viii-1-10_nodejs_docker.html",label:"VIII-10 Node.js"},
        {id:"viii-1-11",file:"viii-1-11_nextjs_docker.html",label:"VIII-11 Next.js"},
        {id:"viii-1-12",file:"viii-1-12_nginx_static.html",label:"VIII-12 HTML+Nginx"},
        {id:"viii-1-13",file:"viii-1-13_ec2_docker.html",label:"VIII-13 EC2+Docker"},
        {id:"viii-1-14",file:"viii-1-14_ecr_usage.html",label:"VIII-14 ECR"},
        {id:"viii-1-15",file:"viii-1-15_ec2_compose_deploy.html",label:"VIII-15 EC2 배포"},
        {id:"viii-1-16",file:"viii-1-16_deploy_automation.html",label:"VIII-16 배포 자동화"},
      ]},
    ];

    const TOTAL = PARTS.reduce((s, p) => s + p.items.length, 0);

    function App() {
      const [active, setActive] = useState(null);
      const [collapsed, setCollapsed] = useState({});

      const toggleGroup = useCallback((group) => {
        setCollapsed(prev => ({...prev, [group]: !prev[group]}));
      }, []);

      const currentIndex = active ? PARTS.flatMap(p=>p.items).findIndex(i=>i.id===active) : -1;
      const allItems = PARTS.flatMap(p=>p.items);
      const goPrev = () => { if(currentIndex > 0) setActive(allItems[currentIndex-1].id); };
      const goNext = () => { if(currentIndex < allItems.length-1) setActive(allItems[currentIndex+1].id); };
      const activeItem = active ? allItems.find(i=>i.id===active) : null;

      return (
        <div className="flex h-full">
          {/* 사이드바 */}
          <aside className="w-72 bg-white border-r border-slate-200 flex flex-col flex-shrink-0">
            {/* 헤더 */}
            <div className="p-4 border-b border-slate-200">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-lg font-bold text-lg">D</div>
                <div>
                  <h1 className="text-sm font-bold text-slate-800 leading-tight">Docker 완전 정복</h1>
                  <p className="text-[10px] text-slate-400">인터랙티브 시각화 학습</p>
                </div>
              </div>
              <div className="mt-3 bg-slate-100 rounded-full h-1.5">
                <div className="bg-blue-500 h-1.5 rounded-full transition-all" style={{width: active ? `${((currentIndex+1)/TOTAL)*100}%` : '0%'}} />
              </div>
              <div className="text-[10px] text-slate-400 mt-1 text-right">
                {active ? `${currentIndex+1} / ${TOTAL}` : `${TOTAL}개 Chapter`}
              </div>
            </div>

            {/* 네비게이션 */}
            <nav className="flex-1 overflow-y-auto py-2">
              {PARTS.map((part) => (
                <div key={part.group}>
                  <button onClick={() => toggleGroup(part.group)}
                    className="group-header w-full flex items-center justify-between px-4 py-2 text-xs font-bold text-slate-500 hover:text-slate-700 hover:bg-slate-50 transition">
                    <span className="flex items-center gap-1.5">
                      <span>{part.icon}</span>
                      <span>{part.group}</span>
                    </span>
                    <span className="text-[10px] text-slate-300">{collapsed[part.group] ? '▶' : '▼'}</span>
                  </button>
                  {!collapsed[part.group] && (
                    <div>
                      {part.items.map((item) => (
                        <button key={item.id} onClick={() => setActive(item.id)}
                          className={`sidebar-item w-full text-left px-6 py-1.5 text-xs text-slate-600 transition ${active === item.id ? 'active' : ''}`}>
                          {item.label}
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              ))}
            </nav>
          </aside>

          {/* 메인 컨텐츠 */}
          <main className="flex-1 flex flex-col bg-slate-100">
            {active && activeItem ? (
              <>
                {/* 상단 네비 바 */}
                <div className="bg-white border-b border-slate-200 px-4 py-2 flex items-center justify-between flex-shrink-0">
                  <button onClick={goPrev} disabled={currentIndex <= 0}
                    className="px-3 py-1 text-xs bg-slate-100 hover:bg-slate-200 rounded-lg disabled:opacity-30 transition">← 이전</button>
                  <span className="text-sm font-medium text-slate-700">{activeItem.label}</span>
                  <button onClick={goNext} disabled={currentIndex >= allItems.length - 1}
                    className="px-3 py-1 text-xs bg-slate-100 hover:bg-slate-200 rounded-lg disabled:opacity-30 transition">다음 →</button>
                </div>
                {/* iframe */}
                <div className="flex-1 anim-fade" key={active}>
                  <iframe src={`visualizations/${activeItem.file}`}
                    className="w-full h-full border-0"
                    title={activeItem.label} />
                </div>
              </>
            ) : (
              /* 홈 화면 */
              <div className="flex-1 flex items-center justify-center p-8">
                <div className="text-center max-w-xl anim-fade">
                  <div className="text-6xl mb-6">🐳</div>
                  <h2 className="text-3xl font-bold text-slate-800 mb-3">Docker 완전 정복</h2>
                  <p className="text-slate-500 mb-6">입문부터 배포까지 — 47개 인터랙티브 시각화로 배우는 Docker</p>
                  <div className="grid grid-cols-4 gap-3 mb-8">
                    {PARTS.map((p, i) => (
                      <button key={i} onClick={() => { setActive(p.items[0].id); }}
                        className="bg-white rounded-xl p-3 border border-slate-200 hover:border-blue-400 hover:shadow-md transition text-center">
                        <div className="text-2xl mb-1">{p.icon}</div>
                        <div className="text-[10px] font-medium text-slate-600 leading-tight">{p.group.replace(/Part \w+\. /,'')}</div>
                        <div className="text-[10px] text-slate-400 mt-1">{p.items.length}개</div>
                      </button>
                    ))}
                  </div>
                  <button onClick={() => setActive("i-1-1")}
                    className="bg-blue-600 text-white px-8 py-3 rounded-xl font-medium hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                    Part I부터 시작하기 →
                  </button>
                  <p className="text-xs text-slate-400 mt-4">왼쪽 사이드바에서 원하는 Chapter를 선택하세요</p>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
