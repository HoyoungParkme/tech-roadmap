<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 인터랙티브 학습</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const SECTIONS = [
      {
        part: 'I', label: 'Part I. 왜 컨테이너인가', color: 'bg-emerald-600',
        items: [
          { id: 'I-1-1', title: '환경 불일치', file: './visualizations/i-1-1_environment_mismatch.html' },
          { id: 'I-1-2', title: 'VM vs 컨테이너', file: './visualizations/i-1-2_vm_vs_container.html' },
          { id: 'I-1-3', title: '환경 일관성', file: './visualizations/i-1-3_environment_consistency.html' },
          { id: 'I-1-4', title: 'Docker의 효과', file: './visualizations/i-1-4_docker_benefits.html' },
        ],
      },
      {
        part: 'II', label: 'Part II. 컨테이너 생태계', color: 'bg-teal-600',
        items: [
          { id: 'II-1-1', title: 'Docker, Podman, LXC', file: './visualizations/ii-1-1_container_tools.html' },
          { id: 'II-1-2', title: 'OCI 표준', file: './visualizations/ii-1-2_oci_standard.html' },
          { id: 'II-1-3', title: 'Docker Hub', file: './visualizations/ii-1-3_registry.html' },
          { id: 'II-1-4', title: '언제 Docker를', file: './visualizations/ii-1-4_when_to_use_docker.html' },
        ],
      },
      {
        part: 'III', label: 'Part III. 첫 컨테이너 실행', color: 'bg-sky-600',
        items: [
          { id: 'III-1-1', title: 'Docker 설치', file: './visualizations/iii-1-1_docker_install.html' },
          { id: 'III-1-2', title: 'Hello World', file: './visualizations/iii-1-2_hello_world.html' },
          { id: 'III-1-3', title: '상태 확인', file: './visualizations/iii-1-3_docker_ps_images.html' },
          { id: 'III-1-4', title: '첫 에러', file: './visualizations/iii-1-4_first_errors.html' },
        ],
      },
      {
        part: 'IV', label: 'Part IV. 이미지·Dockerfile', color: 'bg-blue-600',
        items: [
          { id: 'IV-1-1', title: 'Dockerfile→컨테이너', file: './visualizations/iv-1-1_dockerfile_to_container.html' },
          { id: 'IV-1-2', title: '레이어 캐싱', file: './visualizations/iv-1-2_layer_caching.html' },
          { id: 'IV-1-3', title: '멀티 스테이지', file: './visualizations/iv-1-3_multistage_build.html' },
        ],
      },
      {
        part: 'V', label: 'Part V. 네트워크·볼륨·Compose', color: 'bg-indigo-600',
        items: [
          { id: 'V-1-1', title: '네트워크', file: './visualizations/v-1-1_container_network.html' },
          { id: 'V-1-2', title: '볼륨·바인드 마운트', file: './visualizations/v-1-2_volumes_vs_bindmount.html' },
          { id: 'V-1-3', title: 'Compose 기초', file: './visualizations/v-1-3_compose_basics.html' },
          { id: 'V-1-4', title: '다중 컨테이너', file: './visualizations/v-1-4_compose_multicontainer.html' },
          { id: 'V-1-5', title: '네트워크 정의', file: './visualizations/v-1-5_compose_network.html' },
          { id: 'V-1-6', title: '볼륨 백업', file: './visualizations/v-1-6_volume_backup.html' },
        ],
      },
      {
        part: 'VI', label: 'Part VI. 실전 다중 컨테이너', color: 'bg-violet-600',
        items: [
          { id: 'VI-1-1', title: '3티어 구성', file: './visualizations/vi-1-1_three_tier_app.html' },
          { id: 'VI-1-2', title: '환경변수·.env', file: './visualizations/vi-1-2_env_management.html' },
          { id: 'VI-1-3', title: '헬스체크', file: './visualizations/vi-1-3_healthcheck_timing.html' },
          { id: 'VI-1-4', title: '개발 vs 프로덕션', file: './visualizations/vi-1-4_dev_vs_prod.html' },
          { id: 'VI-1-5', title: '로그 수집', file: './visualizations/vi-1-5_log_collection.html' },
          { id: 'VI-1-6', title: '리소스 제한', file: './visualizations/vi-1-6_resource_limits.html' },
        ],
      },
      {
        part: 'VII', label: 'Part VII. 레지스트리·프로덕션', color: 'bg-amber-600',
        items: [
          { id: 'VII-1-1', title: '레지스트리', file: './visualizations/vii-1-1_registry_usage.html' },
          { id: 'VII-1-2', title: '태깅 전략', file: './visualizations/vii-1-2_tagging_strategy.html' },
          { id: 'VII-1-3', title: '보안', file: './visualizations/vii-1-3_security.html' },
          { id: 'VII-1-4', title: 'CI/CD', file: './visualizations/vii-1-4_cicd_docker.html' },
        ],
      },
      {
        part: 'VIII', label: 'Part VIII. 실전 워크숍', color: 'bg-rose-600',
        items: [
          { id: 'VIII-1-1', title: 'docker run', file: './visualizations/viii-1-1_docker_run_options.html' },
          { id: 'VIII-1-2', title: 'exec, cp, attach', file: './visualizations/viii-1-2_exec_cp_attach.html' },
          { id: 'VIII-1-3', title: 'logs, inspect', file: './visualizations/viii-1-3_logs_inspect_stats.html' },
          { id: 'VIII-1-4', title: 'system prune', file: './visualizations/viii-1-4_system_prune.html' },
          { id: 'VIII-1-5', title: 'MySQL', file: './visualizations/viii-1-5_mysql_docker.html' },
          { id: 'VIII-1-6', title: 'Redis', file: './visualizations/viii-1-6_redis_docker.html' },
          { id: 'VIII-1-7', title: 'MongoDB', file: './visualizations/viii-1-7_mongodb_docker.html' },
          { id: 'VIII-1-8', title: 'DB 3종', file: './visualizations/viii-1-8_db_comparison.html' },
          { id: 'VIII-1-9', title: 'Spring Boot', file: './visualizations/viii-1-9_spring_boot_docker.html' },
          { id: 'VIII-1-10', title: 'Node.js', file: './visualizations/viii-1-10_nodejs_docker.html' },
          { id: 'VIII-1-11', title: 'Next.js', file: './visualizations/viii-1-11_nextjs_docker.html' },
          { id: 'VIII-1-12', title: 'HTML+Nginx', file: './visualizations/viii-1-12_nginx_static.html' },
          { id: 'VIII-1-13', title: 'EC2+Docker', file: './visualizations/viii-1-13_ec2_docker.html' },
          { id: 'VIII-1-14', title: 'ECR', file: './visualizations/viii-1-14_ecr_usage.html' },
          { id: 'VIII-1-15', title: 'EC2 배포', file: './visualizations/viii-1-15_ec2_compose_deploy.html' },
          { id: 'VIII-1-16', title: '배포 자동화', file: './visualizations/viii-1-16_deploy_automation.html' },
        ],
      },
    ];

    const TOTAL = SECTIONS.reduce((sum, s) => sum + s.items.length, 0);

    const PART_BG = {
      I: 'hover:bg-emerald-50', II: 'hover:bg-teal-50', III: 'hover:bg-sky-50', IV: 'hover:bg-blue-50',
      V: 'hover:bg-indigo-50', VI: 'hover:bg-violet-50', VII: 'hover:bg-amber-50', VIII: 'hover:bg-rose-50',
    };

    const PART_ACTIVE = {
      I: 'bg-emerald-100 text-emerald-800 font-bold', II: 'bg-teal-100 text-teal-800 font-bold',
      III: 'bg-sky-100 text-sky-800 font-bold', IV: 'bg-blue-100 text-blue-800 font-bold',
      V: 'bg-indigo-100 text-indigo-800 font-bold', VI: 'bg-violet-100 text-violet-800 font-bold',
      VII: 'bg-amber-100 text-amber-800 font-bold', VIII: 'bg-rose-100 text-rose-800 font-bold',
    };

    function findItemById(id) {
      for (const section of SECTIONS) {
        const found = section.items.find(item => item.id === id);
        if (found) return { ...found, part: section.part };
      }
      return null;
    }

    function App() {
      const [activeId, setActiveId] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [expandedParts, setExpandedParts] = useState(
        { I: true, II: true, III: true, IV: true, V: true, VI: true, VII: true, VIII: true }
      );

      const activeItem = activeId ? findItemById(activeId) : null;

      const navigate = useCallback((id) => {
        setActiveId(id);
        window.location.hash = id;
        if (window.innerWidth < 1024) setSidebarOpen(false);
      }, []);

      useEffect(() => {
        const hash = window.location.hash.slice(1);
        if (hash && findItemById(hash)) setActiveId(hash);
        const onHash = () => {
          const h = window.location.hash.slice(1);
          if (h && findItemById(h)) setActiveId(h);
        };
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const togglePart = (part) => {
        setExpandedParts(prev => ({ ...prev, [part]: !prev[part] }));
      };

      return (
        <div className="h-full flex bg-slate-100">

          {sidebarOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-30 z-30 lg:hidden" onClick={() => setSidebarOpen(false)} />
          )}

          <aside className={`
            fixed lg:static z-40 h-full w-72 bg-white border-r border-slate-200 flex flex-col
            transition-transform duration-200
            ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0 lg:w-72'}
          `}>
            <div className="p-4 border-b border-slate-200 shrink-0">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-lg font-bold text-sm">D</div>
                <div>
                  <div className="font-bold text-slate-800 text-sm">Docker 학습</div>
                  <div className="text-[11px] text-slate-500">{TOTAL}개 시각화</div>
                </div>
              </div>
            </div>

            <nav className="flex-1 overflow-y-auto p-2">
              {SECTIONS.map((section) => (
                <div key={section.part} className="mb-1">
                  <button
                    onClick={() => togglePart(section.part)}
                    className="w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left hover:bg-slate-50 transition"
                  >
                    <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold ${section.color}`}>
                      {section.part}
                    </span>
                    <span className="text-xs font-bold text-slate-700 flex-1 truncate">{section.label}</span>
                    <span className="text-[10px] text-slate-400">{section.items.length}</span>
                    <span className={`text-slate-400 text-xs transition-transform ${expandedParts[section.part] ? 'rotate-90' : ''}`}>&#9654;</span>
                  </button>

                  {expandedParts[section.part] && (
                    <div className="ml-4 border-l border-slate-100 pl-2 space-y-0.5">
                      {section.items.map((item) => {
                        const isActive = activeId === item.id;
                        return (
                          <button
                            key={item.id}
                            onClick={() => navigate(item.id)}
                            className={`w-full text-left px-2 py-1.5 rounded-md text-xs transition-all truncate
                              ${isActive ? PART_ACTIVE[section.part] : `text-slate-600 ${PART_BG[section.part]}`}
                            `}
                          >
                            <span className="font-mono text-[10px] opacity-60 mr-1">{item.id}</span>
                            {item.title}
                          </button>
                        );
                      })}
                    </div>
                  )}
                </div>
              ))}
            </nav>

            <div className="p-3 border-t border-slate-200 shrink-0 text-[10px] text-slate-400 text-center">
              React + Tailwind + Babel CDN
            </div>
          </aside>

          <main className="flex-1 flex flex-col min-w-0">
            <div className="h-12 bg-white border-b border-slate-200 flex items-center px-4 shrink-0 gap-3">
              <button
                onClick={() => setSidebarOpen(prev => !prev)}
                className="lg:hidden p-1.5 rounded-md hover:bg-slate-100 text-slate-600"
                aria-label="사이드바 토글"
              >
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                  <path fillRule="evenodd" d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z" />
                </svg>
              </button>

              {activeItem ? (
                <div className="flex items-center gap-2 min-w-0">
                  <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold shrink-0 ${
                    SECTIONS.find(s => s.part === activeItem.part)?.color || 'bg-slate-600'
                  }`}>{activeItem.part}</span>
                  <span className="font-mono text-xs text-slate-500 shrink-0">{activeItem.id}</span>
                  <span className="text-sm font-bold text-slate-800 truncate">{activeItem.title}</span>
                </div>
              ) : (
                <span className="text-sm text-slate-500">시각화를 선택하세요</span>
              )}
            </div>

            {activeItem ? (
              <iframe
                key={activeItem.id}
                src={activeItem.file}
                className="flex-1 w-full border-0"
                title={activeItem.title}
              />
            ) : (
              <div className="flex-1 flex items-center justify-center p-8">
                <div className="text-center max-w-md">
                  <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl font-bold">D</div>
                  <h2 className="text-2xl font-bold text-slate-800 mb-3">Docker 인터랙티브 학습</h2>
                  <p className="text-slate-600 mb-6 leading-relaxed">
                    왼쪽 사이드바에서 시각화를 선택하세요.<br/>
                    Part I부터 순서대로 보거나, 관심 있는 주제를 바로 클릭할 수 있습니다.
                  </p>
                  <div className="grid grid-cols-4 gap-2 mb-6">
                    {SECTIONS.map(s => (
                      <div key={s.part} className="text-center">
                        <div className={`w-8 h-8 rounded-lg text-white text-xs flex items-center justify-center font-bold mx-auto mb-1 ${s.color}`}>{s.part}</div>
                        <div className="text-[10px] text-slate-500">{s.items.length}개</div>
                      </div>
                    ))}
                  </div>
                  <p className="text-xs text-slate-400">총 {TOTAL}개 시각화 | React + Tailwind CDN | 빌드 도구 없음</p>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
