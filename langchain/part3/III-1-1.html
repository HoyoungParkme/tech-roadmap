            '#    }',
            '',
            '# ─── 정리 ───',
            '#  ① chain 한 개 → 단순 작업',
            '#  ② chain | chain → 직선 파이프라인 (LCEL)',
            '#  ③ assign 누적 → 다변수 실전 파이프라인',
            '#  대부분의 데이터 가공 LLM 워크로드는 이 패턴으로 풀린다.',
          ],
          highlight: [1, 2, 11, 12, 13, 14, 15, 17, 19, 20, 21, 22, 23, 24, 25, 27, 28, 29, 30, 31, 32, 33, 35, 36, 37, 38, 39, 40, 41, 43, 44, 45, 46, 47, 48, 51, 52, 53],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 위: 조립 라인 — chain 박스 좌→우 직렬
    //   step.chains 배열을 받아 가로로 배치 + 화살표
    //   activeIdx 까지의 박스는 emerald 채움, 그 다음은 옅게
    // ─────────────────────────────────────────────────────
    function AssemblyLine({ chains, activeIdx, variant }) {
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🏭</span>
              <span className="text-[11px] font-bold text-emerald-800">조립 라인 (chain 직렬)</span>
            </div>
            <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">
              {variant === 'single'    ? '1 chain' :
               variant === 'lcel'      ? 'chain | chain' :
               variant === 'legacy'    ? 'SequentialChain' :
               variant === 'mapping'   ? 'assign 누적' :
                                          '실전 3단'}
            </span>
          </div>

          {/* 가로 직렬 박스 */}
          <div className="flex flex-wrap items-stretch gap-1 justify-center">
            {chains.map((c, idx) => {
              const isActive = idx <= activeIdx;
              const isCurrent = idx === activeIdx;
              let frame = isActive
                ? 'bg-emerald-50 border-emerald-400 text-emerald-900'
                : 'bg-white border-slate-200 text-slate-400 opacity-60';
              if (isCurrent) frame += ' ring-2 ring-emerald-400 shadow-md scale-105';
              return (
                <React.Fragment key={c.id}>
                  <div
                    className={`flex flex-col items-center justify-center rounded-lg border-2 px-2 py-2 min-w-[100px] transition-all duration-500 ${frame}`}
                  >
                    <span className="text-2xl mb-0.5">{c.icon}</span>
                    <span className="text-[10px] font-bold leading-tight">{c.label}</span>
                    <div className="text-[8px] font-mono mt-1 leading-tight text-center">
                      <div className="text-blue-600">in: {c.varIn}</div>
                      <div className="text-emerald-600">out: {c.varOut}</div>
                    </div>
                    {isCurrent && (
                      <span className="text-[8px] mt-0.5 bg-emerald-600 text-white px-1 rounded font-bold animate-pulse">
                        RUN
                      </span>
                    )}
                  </div>
                  {idx < chains.length - 1 && (
                    <div className={`flex items-center text-base font-bold ${isActive ? 'text-emerald-500' : 'text-slate-300'}`}>
                      ▶
                    </div>
                  )}
                </React.Fragment>
              );
            })}
          </div>

          {/* 입출력 라벨 */}
          <div className="flex justify-between text-[9px] text-slate-500 mt-2 px-1 font-mono">
            <span>입력: <span className="text-blue-700 font-bold">{chains[0]?.input}</span></span>
            <span>최종 출력: <span className="text-emerald-700 font-bold">{chains[chains.length - 1]?.output}</span></span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: 데이터 흐름 박스
    //   flow 배열을 단계별로 누적해 보여준다.
    //   variant 에 따라 색상 변화.
    // ─────────────────────────────────────────────────────
    function DataFlow({ flow, variant, note }) {
      const colorMap = {
        single:    { bg: 'bg-emerald-50', border: 'border-emerald-300', label: 'text-emerald-800' },
        lcel:      { bg: 'bg-emerald-50', border: 'border-emerald-300', label: 'text-emerald-800' },
        legacy:    { bg: 'bg-amber-50',   border: 'border-amber-300',   label: 'text-amber-800' },
        mapping:   { bg: 'bg-purple-50',  border: 'border-purple-300',  label: 'text-purple-800' },
        realworld: { bg: 'bg-blue-50',    border: 'border-blue-300',    label: 'text-blue-800' },
      };
      const c = colorMap[variant] || colorMap.single;
      return (
        <div className={`${c.bg} border-2 ${c.border} rounded-lg p-3`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🔄</span>
              <span className={`text-[11px] font-bold ${c.label}`}>데이터 흐름</span>
            </div>
            <span className={`text-[9px] ${c.label} font-mono`}>{flow.length} 단계</span>
          </div>

          <div className="space-y-1.5">
            {flow.map((f, i) => {
              const isLast = i === flow.length - 1;
              return (
                <div key={i} className="flex items-start gap-2">
                  <span className={`text-[9px] font-mono font-bold w-20 flex-shrink-0 ${isLast ? 'text-emerald-700' : 'text-slate-500'} pt-0.5`}>
                    {f.label}
                  </span>
                  <div className={`flex-1 px-2 py-1 rounded text-[10px] font-mono leading-snug border ${
                    isLast
                      ? 'bg-emerald-600 text-white border-emerald-700 font-bold'
                      : 'bg-white text-slate-700 border-slate-200'
                  }`}>
                    {f.value}
                  </div>
                </div>
              );
            })}
          </div>

          {note && (
            <div className={`text-[9px] mt-2 pt-2 border-t border-dashed ${c.border} ${c.label}`}>
              💡 {note}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 조립 라인 / 하단: 데이터 흐름
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🏭 SequentialChain 조립 라인</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <AssemblyLine chains={step.chains} activeIdx={step.activeIdx} variant={step.variant} />
            <DataFlow flow={step.flow} variant={step.variant} note={step.note} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>active chain
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-300"></span>대기 chain
            </span>
            <span className="flex items-center gap-1">
              <span className="text-emerald-500 font-bold">▶</span>데이터 흐름
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-blue-500"></span>최종 결과
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 체인 패턴 &gt; Chapter 1. 기본 체인</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-1-1. SequentialChain — 여러 chain 을 순차 실행</h1>
                  <p className="text-sm text-slate-500 mt-0.5">공장 조립 라인 — 작업자 1명에서 시작해 라인이 점점 길어진다</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: 단순한 직선 파이프라인은 <strong>chain | chain</strong>, 다변수 누적은 <strong>RunnablePassthrough.assign</strong>, 변수명 추적이 필요한 디버깅 환경은 <strong>SequentialChain</strong>. 다음(III-1-2)에서는 분기·라우팅을 다루는 <strong>RouterChain</strong>으로 넘어간다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['SequentialChain', 'LCEL', 'RunnableSequence', 'RunnablePassthrough', 'assign', 'PydanticOutputParser'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../part2/II-2-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; II-2-2 Retrievers</a>
              <a href="./III-1-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">III-1-2 RouterChain &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
