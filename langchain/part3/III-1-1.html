<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — III-1-1. SequentialChain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CHAIN_STEPS_DATA = [
      { id: 'translate', icon: '🌐', label: '번역 체인', input: '영어 리뷰', output: '한국어 리뷰', color: 'bg-orange-100 border-orange-300 text-orange-800' },
      { id: 'summarize', icon: '📝', label: '요약 체인', input: '한국어 리뷰', output: '한 줄 요약', color: 'bg-amber-100 border-amber-300 text-amber-800' },
      { id: 'sentiment', icon: '😊', label: '감성 분석', input: '한 줄 요약', output: '긍정/부정', color: 'bg-emerald-100 border-emerald-300 text-emerald-800' },
    ];

    const STEPS = [
      {
        desc: "[공장 조립 라인] 1번 작업자가 부품 A를 만들고, 2번이 A를 받아서 B를 만들고, 3번이 B를 받아서 완성품을 만듭니다. SequentialChain은 이 조립 라인입니다.",
        activeChain: -1,
        data: null,
        code: [
          { line: '# SequentialChain = 순차 실행', highlight: false },
          { line: '# 앞 체인의 출력 → 다음 체인의 입력', highlight: true },
          { line: '', highlight: false },
          { line: '# 조립 라인:', highlight: false },
          { line: '# [번역] → [요약] → [감성분석]', highlight: true },
          { line: '#  영어      한국어     한줄요약    긍정/부정', highlight: false },
        ],
      },
      {
        desc: "[1단계: 번역] 영어 리뷰 \"This product is amazing, fast delivery!\"가 번역 체인을 통과합니다. 출력: \"이 제품은 놀랍고, 배송이 빠릅니다!\"",
        activeChain: 0,
        data: { input: 'This product is amazing, fast delivery!', current: '이 제품은 놀랍고, 배송이 빠릅니다!' },
        code: [
          { line: 'from langchain_core.prompts import ChatPromptTemplate', highlight: false },
          { line: 'from langchain_openai import ChatOpenAI', highlight: false },
          { line: '', highlight: false },
          { line: '# 1단계: 번역 체인', highlight: false },
          { line: 'translate_prompt = ChatPromptTemplate.from_template(', highlight: true },
          { line: '    "다음 영어 리뷰를 한국어로 번역해줘: {review}"', highlight: true },
          { line: ')', highlight: true },
          { line: 'translate_chain = translate_prompt | model | parser', highlight: true },
        ],
      },
      {
        desc: "[2단계: 요약] 번역된 한국어 리뷰가 요약 체인으로 전달됩니다. 출력: \"제품 품질과 배송 속도 모두 만족\"",
        activeChain: 1,
        data: { input: '이 제품은 놀랍고, 배송이 빠릅니다!', current: '제품 품질과 배송 속도 모두 만족' },
        code: [
          { line: '# 2단계: 요약 체인', highlight: false },
          { line: 'summarize_prompt = ChatPromptTemplate.from_template(', highlight: true },
          { line: '    "다음 리뷰를 한 줄로 요약해줘: {translated}"', highlight: true },
          { line: ')', highlight: true },
          { line: 'summarize_chain = summarize_prompt | model | parser', highlight: true },
        ],
      },
      {
        desc: "[3단계: 감성 분석] 요약된 텍스트가 감성 분석 체인으로 전달됩니다. 출력: \"긍정 (신뢰도: 95%)\" — 조립 라인의 최종 완성품입니다.",
        activeChain: 2,
        data: { input: '제품 품질과 배송 속도 모두 만족', current: '긍정 (신뢰도: 95%)' },
        code: [
          { line: '# 3단계: 감성 분석 체인', highlight: false },
          { line: 'sentiment_prompt = ChatPromptTemplate.from_template(', highlight: true },
          { line: '    "다음 요약의 감성을 분석해줘: {summary}"', highlight: true },
          { line: ')', highlight: true },
          { line: 'sentiment_chain = sentiment_prompt | model | parser', highlight: true },
        ],
      },
      {
        desc: "[전체 연결] LCEL의 파이프(|)로 세 체인을 하나로 연결합니다. invoke 한 번이면 번역 → 요약 → 감성분석이 자동으로 순차 실행됩니다.",
        activeChain: 3,
        data: null,
        code: [
          { line: '# 전체 Sequential Chain (LCEL)', highlight: false },
          { line: '', highlight: false },
          { line: 'full_chain = (', highlight: true },
          { line: '    translate_chain', highlight: true },
          { line: '    | summarize_chain', highlight: true },
          { line: '    | sentiment_chain', highlight: true },
          { line: ')', highlight: true },
          { line: '', highlight: false },
          { line: 'result = full_chain.invoke({"review": "This product is..."})', highlight: false },
          { line: '# → "긍정 (신뢰도: 95%)"', highlight: false },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium"><span aria-hidden="true">&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 체인 패턴 &gt; Chapter 1. 기본 체인</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-1-1. SequentialChain</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>공장 조립 라인</b> — 1번이 부품 A를, 2번이 B를, 3번이 완성품을. 각 단계의 출력이 다음 단계의 입력이 됩니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">SequentialChain 흐름</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                {/* 체인 파이프라인 */}
                <div className="space-y-3">
                  {CHAIN_STEPS_DATA.map((cs, idx) => (
                    <div key={cs.id} className="relative">
                      <div className={`flex items-center gap-3 p-4 rounded-xl border-2 transition-all duration-500 ${
                        idx <= stepData.activeChain ? cs.color + ' scale-[1.02] shadow-md' :
                        idx === stepData.activeChain + 1 && stepData.activeChain >= 0 ? 'bg-white border-slate-200 opacity-70' :
                        'bg-white border-slate-100 opacity-40'
                      }`}>
                        <span className="text-2xl">{cs.icon}</span>
                        <div className="flex-1">
                          <div className="font-bold text-sm">{cs.label}</div>
                          <div className="text-xs mt-0.5 flex gap-2">
                            <span className="opacity-70">{cs.input}</span>
                            <span>→</span>
                            <span className="font-medium">{cs.output}</span>
                          </div>
                        </div>
                      </div>
                      {idx < CHAIN_STEPS_DATA.length - 1 && (
                        <div className="text-center text-orange-400 text-lg py-1">↓</div>
                      )}
                    </div>
                  ))}
                </div>

                {/* 현재 데이터 흐름 */}
                {stepData.data && (
                  <div className="bg-orange-50 border border-orange-200 rounded-lg p-3 space-y-2">
                    <div className="text-xs"><span className="font-bold text-slate-500">입력:</span> <span className="text-slate-600">{stepData.data.input}</span></div>
                    <div className="text-xs"><span className="font-bold text-orange-600">출력:</span> <span className="text-orange-800 font-medium">{stepData.data.current}</span></div>
                  </div>
                )}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (<div key={i} className={l.highlight ? 'bg-orange-900/40 -mx-4 px-4' : ''}>{l.line || '\u00A0'}</div>))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['SequentialChain', 'RunnableSequence', '파이프라인'].map(kw => (<span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="../part2/II-2-2.html" className="text-orange-600 hover:text-orange-800 font-medium">&larr; II-2-2. Retrievers</a>
              <a href="./III-1-2.html" className="text-orange-600 hover:text-orange-800 font-medium">III-1-2. RouterChain &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
