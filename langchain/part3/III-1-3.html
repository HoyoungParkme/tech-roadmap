  <!--
    III-1-3. ConversationChain — 대화 이력 자동 관리 (Memory)
    학습 목표: LLM이 stateless라는 한계를 메모리 종류별로 어떻게 보완하는지를
              5단계 메시지 흐름으로 이해한다.
    핵심 비유: 단골 카페 바리스타의 4가지 노트 — 없음 / 다 적기 / 최근만 / 요약 / 인덱스(RAG)
    패턴: fastapi v1 — 좌(LiveDataPane: 대화 박스 + 메모리 박스) / 우(VSCode CodeViewer)
    색상: langchain emerald
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 5턴 대화 시나리오 — 단골 카페 주문 흐름
    //   각 턴에 user(고객) → ai(바리스타)
    //   step에 따라 일부 turn은 보이고/잘리고/요약됨/검색됨
    // ─────────────────────────────────────────────────────
    const FULL_TURNS = [
      { n: 1, user: '아메리카노 한 잔 주세요', ai: '네, 따뜻한 아메리카노 한 잔 준비하겠습니다!' },
      { n: 2, user: '제 이름은 박서연이에요', ai: '박서연님, 반갑습니다. 멤버십에 등록해 드릴까요?' },
      { n: 3, user: '오늘은 디카페인으로 부탁해요', ai: '네, 디카페인 아메리카노로 변경하겠습니다.' },
      { n: 4, user: '아까 그거 아이스로 바꿔주세요', ai: '아이스 디카페인 아메리카노로 준비하겠습니다.' },
      { n: 5, user: '제 이름 기억하세요?', ai: '박서연님이시죠. 다음에도 같은 메뉴로 드릴까요?' },
    ];

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의
    //   memoryType  : 'none' | 'buffer' | 'window' | 'summary' | 'vector'
    //   turns       : 화면에 보이는 turn 배열 [{ n, user, ai, state }]
    //                 state: 'visible' | 'dropped' | 'summarized' | 'recalled'
    //   memoryBox   : 메모리 박스 표시 데이터
    //   userInput   : 현재 사용자 질문 (메모리 사용 여부 강조)
    //   aiAnswer    : 응답 결과
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. 메모리 없음 — 매 호출마다 처음부터',
        desc: '바리스타가 매번 처음 본 손님처럼 응대한다. LLM 한 대만 호출하면 stateless라 이전 대화가 사라진다. 5턴째 "제 이름 기억하세요?" → "처음 뵙는데요?" 같은 황당한 답이 나온다. ConversationChain이 풀려는 문제가 이것이다.',
        memoryType: 'none',
        turns: [
          { n: 5, user: '제 이름 기억하세요?', ai: '죄송합니다. 처음 뵙는데요? (이전 대화 없음)', state: 'fail' },
        ],
        memoryBox: { kind: 'none' },
        code: {
          lang: 'python',
          filename: 'no-memory.py',
          lines: [
            '# Step 1. 메모리 없는 기본 LLM — 매 호출이 독립',
            'from langchain_openai import ChatOpenAI',
            '',
            'llm = ChatOpenAI(model="gpt-4o-mini")',
            '',
            '# 1턴: 정상',
            'llm.invoke("아메리카노 한 잔 주세요")',
            '#  → "네, 따뜻한 아메리카노 준비하겠습니다."',
            '',
            '# 2턴: 이름 알려줌',
            'llm.invoke("제 이름은 박서연이에요")',
            '#  → "반갑습니다, 박서연님."',
            '',
            '# 5턴: 이름 기억하는지 물어보면?',
            'llm.invoke("제 이름 기억하세요?")',
            '#  → "처음 뵙는데요?" 😱  (실패)',
            '',
            '# ─── 왜? ───',
            '#  LLM API는 stateless 다.',
            '#  각 호출은 완전히 독립이고 이전 호출을 모른다.',
            '#  서버 측에서 history를 누적해 함께 보내야',
            '#  "대화"가 성립한다 — 그게 Memory 의 역할.',
            '',
            '# 다음 단계: ConversationBufferMemory 로 history 누적',
          ],
          highlight: [1, 4, 7, 11, 14, 15, 18, 19, 20, 21, 23],
        },
      },
      {
        title: 'Step 2. ConversationBufferMemory — 모든 history 누적',
        desc: '가장 단순한 메모리. 모든 턴(human + ai)을 그대로 prompt 앞에 붙여 LLM에 보낸다. 바리스타가 노트에 모든 주문을 한 줄도 빼놓지 않고 적는다. 5턴 모두 정확히 기억하지만, 대화가 길어질수록 토큰이 무한히 늘어난다는 한계가 있다.',
        memoryType: 'buffer',
        turns: FULL_TURNS.map((t) => ({ ...t, state: 'visible' })),
        memoryBox: {
          kind: 'buffer',
          slots: FULL_TURNS.map((t) => ({ n: t.n, user: t.user, ai: t.ai })),
          tokens: 184,
        },
        code: {
          lang: 'python',
          filename: 'buffer.py',
          lines: [
            '# Step 2. ConversationBufferMemory — 전체 history 그대로 누적',
            'from langchain.memory import ConversationBufferMemory',
            'from langchain.chains import ConversationChain',
            'from langchain_openai import ChatOpenAI',
            '',
            '# 1) 메모리 인스턴스 — 모든 턴을 그대로 보관',
            'memory = ConversationBufferMemory(',
            '    return_messages=True,',
            '    memory_key="chat_history",',
            ')',
            '',
            '# 2) ConversationChain 에 결합',
            'chain = ConversationChain(',
            '    llm=ChatOpenAI(model="gpt-4o-mini"),',
            '    memory=memory,',
            '    verbose=True,',
            ')',
            '',
            '# 3) 5턴 대화 — 매 호출 후 memory 가 자동 업데이트',
            'chain.invoke({"input": "아메리카노 한 잔 주세요"})',
            'chain.invoke({"input": "제 이름은 박서연이에요"})',
            'chain.invoke({"input": "오늘은 디카페인으로 부탁해요"})',
            'chain.invoke({"input": "아까 그거 아이스로 바꿔주세요"})',
            'chain.invoke({"input": "제 이름 기억하세요?"})',
            '#  → "박서연님이시죠." ✓ (전부 기억함)',
            '',
            '# memory.chat_memory.messages 안에는',
            '#   [HumanMessage, AIMessage, HumanMessage, AIMessage, ...] 가',
            '#   5턴분 (총 10개) 모두 들어있다.',
            '',
            '# ⚠ 한계: 대화가 길어지면 토큰이 선형으로 증가 → 비용 폭증',
          ],
          highlight: [1, 2, 6, 7, 8, 9, 12, 13, 14, 15, 16, 19, 20, 21, 22, 23, 24, 30],
        },
      },
      {
        title: 'Step 3. BufferWindowMemory — 최근 N개 turn만',
        desc: 'Buffer의 토큰 폭증을 막는 첫 번째 방법. 최근 N턴만 keep하고 오래된 건 버린다. k=2로 두면 1·2·3턴은 잘려나가 회색 처리되고 4·5턴만 prompt에 들어간다. 빠르고 싸지만, 잘린 1·2턴(이름)이 필요할 때는 답하지 못한다.',
        memoryType: 'window',
        turns: FULL_TURNS.map((t) => ({
          ...t,
          state: t.n <= 3 ? 'dropped' : 'visible',
        })),
        memoryBox: {
          kind: 'window',
          k: 2,
          slots: FULL_TURNS.filter((t) => t.n > 3).map((t) => ({ n: t.n, user: t.user, ai: t.ai })),
          dropped: FULL_TURNS.filter((t) => t.n <= 3).length,
          tokens: 78,
        },
        code: {
          lang: 'python',
          filename: 'window.py',
          lines: [
            '# Step 3. ConversationBufferWindowMemory — 최근 k 턴만 유지',
            'from langchain.memory import ConversationBufferWindowMemory',
            'from langchain.chains import ConversationChain',
            'from langchain_openai import ChatOpenAI',
            '',
            '# 1) k=2 → 최근 2턴(=Human/AI 쌍 2개)만 keep',
            'memory = ConversationBufferWindowMemory(',
            '    k=2,',
            '    return_messages=True,',
            '    memory_key="chat_history",',
            ')',
            '',
            'chain = ConversationChain(',
            '    llm=ChatOpenAI(model="gpt-4o-mini"),',
            '    memory=memory,',
            ')',
            '',
            '# 5턴 진행 후 memory 안 상태',
            '#   ✗ 1턴 (아메리카노 주문)         — 잘려나감',
            '#   ✗ 2턴 (제 이름은 박서연)        — 잘려나감',
            '#   ✗ 3턴 (디카페인으로)            — 잘려나감',
            '#   ✓ 4턴 (아까 그거 아이스로)      — 유지',
            '#   ✓ 5턴 (이름 기억하세요?)        — 유지',
            '',
            'chain.invoke({"input": "제 이름 기억하세요?"})',
            '#  → "죄송해요, 이름은 못 들었는데..." 😢',
            '#     이름은 2턴에 있었는데 잘려나가서 답 못함',
            '',
            '# ⚖ trade-off: 토큰 일정(저렴) vs 오래된 정보 유실',
            '# 적합 케이스: FAQ · 짧은 1회성 상담 · 토큰 비용 민감 서비스',
          ],
          highlight: [1, 2, 6, 7, 8, 9, 10, 11, 13, 14, 15, 19, 20, 21, 22, 23, 26, 27, 30, 31],
        },
      },
      {
        title: 'Step 4. SummaryMemory — 오래된 history 요약',
        desc: 'Window는 잘리면 끝이다. Summary는 오래된 턴을 LLM에게 한 줄 요약으로 압축해 보관한다. 1·2·3턴은 "박서연 고객, 디카페인 아메리카노 주문" 한 줄로 줄고, 최근 4·5턴은 원문 그대로. 토큰을 아끼면서도 "이름"같은 핵심 정보가 살아남는다.',
        memoryType: 'summary',
        turns: FULL_TURNS.map((t) => ({
          ...t,
          state: t.n <= 3 ? 'summarized' : 'visible',
        })),
        memoryBox: {
          kind: 'summary',
          summary: '박서연 고객이 아메리카노를 주문, 디카페인으로 변경 요청. 멤버십 안내함.',
          recentSlots: FULL_TURNS.filter((t) => t.n > 3).map((t) => ({ n: t.n, user: t.user, ai: t.ai })),
          tokensOriginal: 110,
          tokensSummary: 32,
        },
        code: {
          lang: 'python',
          filename: 'summary.py',
          lines: [
            '# Step 4. ConversationSummaryBufferMemory — 오래된 부분은 요약',
            'from langchain.memory import ConversationSummaryBufferMemory',
            'from langchain.chains import ConversationChain',
            'from langchain_openai import ChatOpenAI',
            '',
            'llm = ChatOpenAI(model="gpt-4o-mini")',
            '',
            '# max_token_limit 초과분은 LLM 으로 요약 → "summary" 슬롯에 누적',
            'memory = ConversationSummaryBufferMemory(',
            '    llm=llm,',
            '    max_token_limit=80,    # 80 토큰 넘으면 앞쪽부터 요약',
            '    return_messages=True,',
            '    memory_key="chat_history",',
            ')',
            '',
            'chain = ConversationChain(llm=llm, memory=memory)',
            '',
            '# 5턴 진행 후 memory 안 상태',
            '#   📝 summary  : "박서연 고객이 아메리카노를 주문,',
            '#                  디카페인으로 변경 요청. 멤버십 안내함."',
            '#                  ← 1·2·3턴 압축 (110 토큰 → 32 토큰)',
            '#   💬 buffer   : 4턴 원문 (아이스로 변경)',
            '#                 5턴 원문 (이름 기억?)',
            '',
            'chain.invoke({"input": "제 이름 기억하세요?"})',
            '#  → "박서연님이시죠. 같은 메뉴로 준비할까요?" ✓',
            '#     summary 안에 "박서연" 키워드가 살아있어서 정답!',
            '',
            '# 💡 trade-off: 요약 비용(LLM 1회 추가 호출) vs 토큰 절약',
            '#               긴 대화 챗봇 / 상담봇 / 학습용 튜터 적합',
          ],
          highlight: [1, 2, 8, 9, 10, 11, 12, 13, 14, 19, 20, 21, 22, 23, 26, 27, 28],
        },
      },
      {
        title: 'Step 5. VectorStoreMemory — RAG로 관련 history 회수',
        desc: '대화가 수백 턴이 되면 요약도 길어진다. VectorStore 메모리는 모든 turn을 임베딩으로 저장한 뒤, 현재 질문과 의미적으로 가장 가까운 turn만 top-k로 회수한다. "이름?" 질문엔 2턴 "박서연이에요"만 검색되어 prompt에 들어간다 — 길이 무관, 관련 정보만.',
        memoryType: 'vector',
        turns: FULL_TURNS.map((t) => ({
          ...t,
          state: t.n === 2 ? 'recalled' : 'stored',
        })),
        memoryBox: {
          kind: 'vector',
          query: '제 이름 기억하세요?',
          recalled: [
            { n: 2, score: 0.91, text: '박서연이에요 → 반갑습니다, 박서연님' },
            { n: 5, score: 0.74, text: '이름 기억하세요? (현재 질의)' },
          ],
          totalStored: 5,
        },
        code: {
          lang: 'python',
          filename: 'vector-memory.py',
          lines: [
            '# Step 5. VectorStoreRetrieverMemory — RAG 기반 메모리',
            'from langchain.memory import VectorStoreRetrieverMemory',
            'from langchain_community.vectorstores import FAISS',
            'from langchain_openai import OpenAIEmbeddings, ChatOpenAI',
            '',
            '# 1) 임베딩 모델 + 빈 벡터스토어',
            'embeddings = OpenAIEmbeddings(model="text-embedding-3-small")',
            'vectorstore = FAISS.from_texts(["init"], embeddings)',
            '',
            '# 2) Retriever 로 감싸기 — 질의당 top-k 개만 회수',
            'retriever = vectorstore.as_retriever(',
            '    search_kwargs={"k": 2},',
            ')',
            '',
            '# 3) VectorStoreRetrieverMemory 생성',
            'memory = VectorStoreRetrieverMemory(',
            '    retriever=retriever,',
            '    memory_key="chat_history",',
            ')',
            '',
            '# 4) 대화 진행 — save_context 가 매 턴을 임베딩해 저장',
            'memory.save_context(',
            '    {"input": "제 이름은 박서연이에요"},',
            '    {"output": "반갑습니다, 박서연님."},',
            ')',
            '# … 5턴 동안 모두 저장됨',
            '',
            '# 5) 질의 — 의미적으로 가까운 턴만 검색',
            'memory.load_memory_variables({"prompt": "제 이름 기억하세요?"})',
            '#  → top-2 검색 결과:',
            '#       (score 0.91) "박서연이에요 → 반갑습니다, 박서연님"',
            '#       (score 0.74) "이름 기억하세요?"',
            '#  → 이 2건만 prompt 에 포함되어 LLM 이 정확히 답변',
            '',
            '# ✨ 장점: 대화 100턴이어도 prompt 토큰은 항상 일정',
            '#         (관련 정보만 골라쓰는 RAG 패턴)',
            '# 적합: 장기 사용자 대화 봇 · CRM · 개인비서',
          ],
          highlight: [1, 2, 3, 4, 7, 8, 11, 12, 13, 16, 17, 18, 22, 23, 24, 25, 29, 30, 31, 32, 33, 36, 37],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 위: 대화 박스 — 5턴 시나리오 시각화
    //   step의 turns 배열을 받아 각 turn을 상태별로 표시
    //   - visible    : 정상 (emerald 채움)
    //   - dropped    : 회색 + line-through (Step 3 window에서 잘림)
    //   - summarized : 보라 점선 (Step 4 summary로 압축됨)
    //   - recalled   : 파랑 굵은 테두리 (Step 5 vector RAG로 회수)
    //   - stored     : 옅은 회색 (Step 5 저장됐지만 회수 안됨)
    //   - fail       : 빨강 (Step 1)
    // ─────────────────────────────────────────────────────
    function ConversationBox({ turns, memoryType }) {
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">☕</span>
              <span className="text-[11px] font-bold text-emerald-800">단골 카페 대화 (5턴)</span>
            </div>
            <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">
              {memoryType === 'none' ? 'no-memory' :
               memoryType === 'buffer' ? 'buffer' :
               memoryType === 'window' ? 'window k=2' :
               memoryType === 'summary' ? 'summary+buf' :
               'vector+RAG'}
            </span>
          </div>
          <div className="space-y-1.5">
            {turns.map((t) => {
              let frame = '';
              let userClass = 'bg-slate-600 text-white';
              let aiClass = 'bg-white text-emerald-900 border border-emerald-300';
              let badge = null;
              if (t.state === 'dropped') {
                frame = 'opacity-40';
                userClass = 'bg-slate-300 text-slate-500 line-through';
                aiClass = 'bg-slate-100 text-slate-400 border border-slate-200 line-through';
                badge = <span className="text-[8px] bg-slate-400 text-white px-1 rounded font-bold">DROPPED</span>;
              } else if (t.state === 'summarized') {
                frame = '';
                userClass = 'bg-purple-200 text-purple-800 border border-dashed border-purple-400';
                aiClass = 'bg-purple-50 text-purple-700 border border-dashed border-purple-300 italic';
                badge = <span className="text-[8px] bg-purple-500 text-white px-1 rounded font-bold">SUMMARIZED</span>;
              } else if (t.state === 'recalled') {
                frame = '';
                userClass = 'bg-blue-600 text-white ring-2 ring-blue-300';
                aiClass = 'bg-blue-50 text-blue-900 border-2 border-blue-400 font-medium';
                badge = <span className="text-[8px] bg-blue-600 text-white px-1 rounded font-bold animate-pulse">RECALLED</span>;
              } else if (t.state === 'stored') {
                frame = 'opacity-60';
                userClass = 'bg-slate-400 text-white';
                aiClass = 'bg-white text-slate-600 border border-slate-200';
                badge = <span className="text-[8px] bg-slate-500 text-white px-1 rounded font-bold">stored</span>;
              } else if (t.state === 'fail') {
                userClass = 'bg-slate-600 text-white';
                aiClass = 'bg-red-100 text-red-800 border border-red-300 font-bold';
                badge = <span className="text-[8px] bg-red-600 text-white px-1 rounded font-bold animate-pulse">FAIL</span>;
              }
              return (
                <div key={t.n} className={`p-1.5 rounded border border-slate-100 ${frame} transition-all duration-500`}>
                  <div className="flex items-center gap-1 mb-0.5">
                    <span className="text-[9px] font-mono font-bold text-slate-500 w-5">#{t.n}</span>
                    {badge}
                  </div>
                  <div className="space-y-1 ml-5">
                    <div className="flex justify-end">
                      <div className={`max-w-[85%] px-2 py-0.5 rounded text-[10px] leading-tight ${userClass}`}>
                        {t.user}
                      </div>
                    </div>
                    <div className="flex justify-start">
                      <div className={`max-w-[88%] px-2 py-0.5 rounded text-[10px] leading-tight ${aiClass}`}>
                        {t.ai}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: 메모리 박스 — kind 별로 다른 시각화
    //   - none    : 빈 박스 + 경고
    //   - buffer  : 모든 turn 누적 + 토큰 카운터
    //   - window  : 최근 k turn만 + dropped 카운트
    //   - summary : 요약 박스(보라) + 최근 buffer(emerald) + 토큰 비교
    //   - vector  : 검색 쿼리 + recalled 결과 + score
    // ─────────────────────────────────────────────────────
    function MemoryBox({ box }) {
      if (box.kind === 'none') {
        return (
          <div className="bg-red-50 border-2 border-dashed border-red-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">🚫</span>
              <span className="text-[11px] font-bold text-red-700">Memory: 없음 (stateless)</span>
            </div>
            <div className="bg-white rounded border border-red-200 p-2 text-center">
              <div className="text-[10px] text-red-600 font-mono italic">chat_history = ∅</div>
              <div className="text-[9px] text-red-500 mt-1">매 호출 후 즉시 휘발 — 다음 턴이 이전을 모른다</div>
            </div>
          </div>
        );
      }

      if (box.kind === 'buffer') {
        return (
          <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">📒</span>
                <span className="text-[11px] font-bold text-emerald-800">ConversationBufferMemory</span>
              </div>
              <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                {box.tokens} tok
              </span>
            </div>
            <div className="bg-white rounded border border-emerald-200 p-2 max-h-40 overflow-y-auto">
              <div className="text-[9px] font-bold text-emerald-700 mb-1 uppercase tracking-wider">chat_history (전체 누적)</div>
              <div className="space-y-1">
                {box.slots.map((s) => (
                  <div key={s.n} className="text-[9px] font-mono leading-snug">
                    <div className="text-blue-700">[#{s.n}] H: {s.user}</div>
                    <div className="text-emerald-700 ml-3">A: {s.ai}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="text-[9px] text-emerald-700 mt-1.5">
              ⚠ 길어질수록 토큰 선형 증가 → 비용·지연 폭증
            </div>
          </div>
        );
      }

      if (box.kind === 'window') {
        return (
          <div className="bg-amber-50 border-2 border-amber-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">🪟</span>
                <span className="text-[11px] font-bold text-amber-800">BufferWindowMemory (k={box.k})</span>
              </div>
              <span className="text-[9px] bg-amber-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                {box.tokens} tok
              </span>
            </div>
            <div className="bg-white rounded border border-amber-200 p-2">
              <div className="text-[9px] font-bold text-amber-700 mb-1 uppercase tracking-wider">최근 {box.k} 턴만 keep</div>
              <div className="space-y-1">
                {box.slots.map((s) => (
                  <div key={s.n} className="text-[9px] font-mono leading-snug">
                    <div className="text-blue-700">[#{s.n}] H: {s.user}</div>
                    <div className="text-emerald-700 ml-3">A: {s.ai}</div>
                  </div>
                ))}
              </div>
              <div className="border-t border-dashed border-amber-200 mt-2 pt-1.5 text-[9px] text-amber-700 font-mono">
                ✗ {box.dropped}턴 폐기 (1·2·3턴 = 이름·디카페인 정보 유실)
              </div>
            </div>
          </div>
        );
      }

      if (box.kind === 'summary') {
        return (
          <div className="bg-purple-50 border-2 border-purple-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">📝</span>
                <span className="text-[11px] font-bold text-purple-800">SummaryBufferMemory</span>
              </div>
              <span className="text-[9px] bg-purple-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                {box.tokensOriginal}→{box.tokensSummary} tok
              </span>
            </div>

            {/* 요약 슬롯 */}
            <div className="bg-white rounded border-2 border-dashed border-purple-300 p-2 mb-2">
              <div className="text-[9px] font-bold text-purple-700 mb-1 uppercase tracking-wider">📌 summary (1·2·3턴 압축)</div>
              <div className="text-[10px] text-purple-900 italic leading-snug">"{box.summary}"</div>
            </div>

            {/* 최근 turn buffer */}
            <div className="bg-white rounded border border-emerald-200 p-2">
              <div className="text-[9px] font-bold text-emerald-700 mb-1 uppercase tracking-wider">💬 recent buffer (4·5턴 원문)</div>
              <div className="space-y-1">
                {box.recentSlots.map((s) => (
                  <div key={s.n} className="text-[9px] font-mono leading-snug">
                    <div className="text-blue-700">[#{s.n}] H: {s.user}</div>
                    <div className="text-emerald-700 ml-3">A: {s.ai}</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="text-[9px] text-purple-700 mt-1.5">
              ✓ 요약 70%↓ + 핵심 키워드("박서연") 살아남음
            </div>
          </div>
        );
      }

      if (box.kind === 'vector') {
        return (
          <div className="bg-blue-50 border-2 border-blue-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">🔍</span>
                <span className="text-[11px] font-bold text-blue-800">VectorStoreRetrieverMemory</span>
              </div>
              <span className="text-[9px] bg-blue-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                {box.totalStored} stored
              </span>
            </div>

            {/* 쿼리 */}
            <div className="bg-white rounded border border-blue-200 p-2 mb-2">
              <div className="text-[9px] font-bold text-blue-700 mb-0.5 uppercase tracking-wider">query (현재 질문)</div>
              <div className="text-[10px] text-blue-900 font-mono">"{box.query}"</div>
            </div>

            {/* 화살표 */}
            <div className="text-center text-blue-500 text-[10px] font-mono mb-1">↓ embedding · top-k=2 검색 ↓</div>

            {/* 회수 결과 */}
            <div className="bg-white rounded border-2 border-blue-400 p-2">
              <div className="text-[9px] font-bold text-blue-700 mb-1 uppercase tracking-wider">recalled (의미 유사도 순)</div>
              <div className="space-y-1">
                {box.recalled.map((r, i) => (
                  <div key={i} className="flex items-center gap-1.5 text-[9px] font-mono">
                    <span className="bg-blue-600 text-white px-1 py-0.5 rounded font-bold w-12 text-center">
                      {r.score.toFixed(2)}
                    </span>
                    <span className="text-blue-900 flex-1 leading-tight">[#{r.n}] {r.text}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="text-[9px] text-blue-700 mt-1.5">
              ✨ 100턴이어도 prompt 토큰 일정 — 관련 turn 만 골라씀
            </div>
          </div>
        );
      }

      return null;
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 대화 박스 / 하단: 메모리 박스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">☕ 단골 카페 — Memory 4종 비교</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <ConversationBox turns={step.turns} memoryType={step.memoryType} />
            <MemoryBox box={step.memoryBox} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>visible
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-400"></span>dropped
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-purple-500"></span>summarized
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-blue-500"></span>recalled (RAG)
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-red-500"></span>fail
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 체인 패턴 &gt; Chapter 1. 기본 체인</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-1-3. ConversationChain — 대화 이력 자동 관리 (Memory)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">단골 카페 바리스타의 4가지 노트 — Buffer · Window · Summary · Vector</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: 짧은 대화는 <strong>Buffer</strong>, 비용 민감하면 <strong>Window</strong>, 긴 대화는 <strong>Summary</strong>, 장기 기억은 <strong>Vector</strong>. 다음(III-2-1)에서는 외부 문서 검색 RAG Chain을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['ConversationChain', 'BufferMemory', 'WindowMemory', 'SummaryMemory', 'VectorStoreMemory', 'chat_history'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-1-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; III-1-2 RouterChain</a>
              <a href="./III-2-1.html" className="text-emerald-700 hover:text-emerald-900 font-medium">III-2-1 RAG Chain &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
