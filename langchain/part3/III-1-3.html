<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — III-1-3. ConversationChain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const MEMORY_SLOTS = [
      { id: 'slot1', human: '아메리카노 주세요', ai: '네, 아메리카노 준비하겠습니다!' },
      { id: 'slot2', human: '아까 그거 아이스로 바꿔주세요', ai: '아메리카노를 아이스로 변경하겠습니다!' },
    ];

    const STEPS = [
      {
        desc: "[메모리 없는 LLM] 매번 새 대화처럼 처리합니다. \"아까 커피 시켰는데요\" → \"무슨 커피요?\" — 대화 맥락을 전혀 기억하지 못합니다.",
        memoryVisible: false,
        memorySlots: 0,
        highlight: 'no-memory',
        code: [
          { line: '# 메모리 없는 기본 LLM', highlight: false },
          { line: 'llm = ChatOpenAI()', highlight: false },
          { line: '', highlight: false },
          { line: '# 매번 독립적인 호출', highlight: true },
          { line: 'llm.invoke("아메리카노 주세요")     # → OK', highlight: true },
          { line: 'llm.invoke("아까 그거 아이스로")     # → "무슨 커피요?"', highlight: true },
          { line: '', highlight: false },
          { line: '# LLM은 이전 대화를 기억하지 못한다!', highlight: false },
        ],
      },
      {
        desc: "[ConversationBufferMemory] chat_history에 모든 대화를 그대로 저장합니다. 단골 카페 바리스타가 주문을 노트에 적어두는 것과 같습니다.",
        memoryVisible: true,
        memorySlots: 0,
        highlight: 'buffer',
        code: [
          { line: 'from langchain.memory import ConversationBufferMemory', highlight: true },
          { line: '', highlight: false },
          { line: '# 메모리 생성 — 모든 대화를 저장', highlight: false },
          { line: 'memory = ConversationBufferMemory(', highlight: true },
          { line: '    return_messages=True,', highlight: true },
          { line: '    memory_key="chat_history"', highlight: true },
          { line: ')', highlight: true },
          { line: '', highlight: false },
          { line: '# chat_history: [] (아직 비어있음)', highlight: false },
        ],
      },
      {
        desc: "[대화 1턴] \"아메리카노 주세요\" → LLM 응답 후 메모리에 저장됩니다. 바리스타가 노트에 \"아메리카노\"를 적어둡니다.",
        memoryVisible: true,
        memorySlots: 1,
        highlight: 'turn1',
        code: [
          { line: '# 대화 1턴', highlight: false },
          { line: 'chain.invoke({"input": "아메리카노 주세요"})', highlight: true },
          { line: '', highlight: false },
          { line: '# 메모리에 자동 저장됨', highlight: false },
          { line: '# chat_history: [', highlight: true },
          { line: '#   HumanMessage("아메리카노 주세요"),', highlight: true },
          { line: '#   AIMessage("네, 아메리카노 준비하겠습니다!")', highlight: true },
          { line: '# ]', highlight: true },
        ],
      },
      {
        desc: "[대화 2턴] \"아까 그거 아이스로 바꿔주세요\" → 메모리에서 \"아메리카노\"를 찾아서 맥락을 이해합니다. 바리스타가 노트를 보고 \"아, 아메리카노를 아이스로요!\"",
        memoryVisible: true,
        memorySlots: 2,
        highlight: 'turn2',
        code: [
          { line: '# 대화 2턴 — 메모리 덕분에 맥락 이해', highlight: false },
          { line: 'chain.invoke({"input": "아까 그거 아이스로 바꿔주세요"})', highlight: true },
          { line: '', highlight: false },
          { line: '# 프롬프트에 자동 주입되는 내용:', highlight: false },
          { line: '# [이전 대화] 아메리카노 주세요 → 네, 준비하겠습니다!', highlight: true },
          { line: '# [현재 질문] 아까 그거 아이스로 바꿔주세요', highlight: true },
          { line: '', highlight: false },
          { line: '# → "아메리카노를 아이스로 변경하겠습니다!"', highlight: false },
        ],
      },
      {
        desc: "[ConversationSummaryMemory] 대화가 길어지면 전체를 저장하는 대신 요약해서 저장합니다. 바리스타가 \"이 손님은 아메리카노 단골, 아이스 선호\"라고 메모하는 것. 토큰을 절약합니다.",
        memoryVisible: true,
        memorySlots: 2,
        highlight: 'summary',
        code: [
          { line: 'from langchain.memory import ConversationSummaryMemory', highlight: true },
          { line: '', highlight: false },
          { line: '# 요약 메모리 — 대화를 요약해서 저장', highlight: false },
          { line: 'memory = ConversationSummaryMemory(', highlight: true },
          { line: '    llm=ChatOpenAI(),', highlight: true },
          { line: '    return_messages=True', highlight: true },
          { line: ')', highlight: true },
          { line: '', highlight: false },
          { line: '# Buffer: 모든 대화 원문 저장 (토큰 많이 사용)', highlight: false },
          { line: '# Summary: "고객이 아메리카노를 주문 후', highlight: true },
          { line: '#           아이스로 변경 요청함" (토큰 절약)', highlight: true },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium"><span aria-hidden="true">&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 체인 패턴 &gt; Chapter 1. 기본 체인</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-1-3. ConversationChain</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>단골 카페</b> — 바리스타가 "오늘도 아메리카노요?"라고 기억하는 것. 대화 이력을 유지하는 ConversationChain의 메모리 동작을 이해합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">ConversationChain 흐름</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                {/* 메모리 없는 상태 */}
                {stepData.highlight === 'no-memory' && (
                  <div className="space-y-3">
                    <div className="bg-red-50 border-2 border-red-200 rounded-xl p-4">
                      <div className="font-bold text-sm text-red-700 mb-2">메모리 없는 LLM</div>
                      <div className="space-y-2 text-xs">
                        <div className="flex items-center gap-2"><span className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded">Human</span> 아메리카노 주세요</div>
                        <div className="flex items-center gap-2"><span className="bg-green-100 text-green-700 px-2 py-0.5 rounded">AI</span> 네, 준비하겠습니다!</div>
                        <div className="border-t border-red-200 my-1"></div>
                        <div className="flex items-center gap-2"><span className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded">Human</span> 아까 그거 아이스로 바꿔주세요</div>
                        <div className="flex items-center gap-2"><span className="bg-red-100 text-red-700 px-2 py-0.5 rounded font-bold">AI</span> <span className="text-red-600 font-bold">무슨 커피요? 🤷</span></div>
                      </div>
                    </div>
                  </div>
                )}

                {/* 메모리 시각화 */}
                {stepData.memoryVisible && (
                  <div className="space-y-3">
                    <div className="font-bold text-sm text-slate-700 flex items-center gap-2">
                      <span className="text-lg">🧠</span>
                      {stepData.highlight === 'summary' ? 'ConversationSummaryMemory' : 'ConversationBufferMemory'}
                    </div>
                    <div className="bg-orange-50 border-2 border-orange-200 rounded-xl p-4">
                      <div className="text-xs font-bold text-orange-600 mb-2">chat_history</div>
                      {stepData.memorySlots === 0 && (
                        <div className="text-xs text-slate-400 italic">[ ] (비어있음)</div>
                      )}
                      {stepData.memorySlots >= 1 && stepData.highlight !== 'summary' && (
                        <div className="space-y-2">
                          {MEMORY_SLOTS.slice(0, stepData.memorySlots).map(function(slot, idx) {
                            return (
                              <div key={slot.id} className={"p-2 rounded-lg border transition-all duration-500 " + (idx === stepData.memorySlots - 1 ? "bg-orange-100 border-orange-300 scale-[1.02] shadow-sm" : "bg-white border-slate-200")}>
                                <div className="flex items-center gap-2 text-xs"><span className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded">Human</span> {slot.human}</div>
                                <div className="flex items-center gap-2 text-xs mt-1"><span className="bg-green-100 text-green-700 px-2 py-0.5 rounded">AI</span> {slot.ai}</div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                      {stepData.highlight === 'summary' && (
                        <div className="space-y-2">
                          <div className="p-2 rounded-lg border bg-amber-50 border-amber-300">
                            <div className="text-xs font-bold text-amber-700 mb-1">요약된 메모리</div>
                            <div className="text-xs text-amber-800">"고객이 아메리카노를 주문한 후 아이스로 변경 요청함. 아이스 아메리카노 선호 고객."</div>
                          </div>
                          <div className="text-xs text-slate-500 flex items-center gap-1">
                            <span>✅ 토큰 절약:</span>
                            <span className="line-through text-red-400">원문 48 토큰</span>
                            <span>→</span>
                            <span className="text-green-600 font-bold">요약 22 토큰</span>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map(function(l, i) { return (<div key={i} className={l.highlight ? 'bg-orange-900/40 -mx-4 px-4' : ''}>{l.line || '\u00A0'}</div>); })}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['ConversationBufferMemory', 'ConversationSummaryMemory', 'chat_history'].map(function(kw) { return (<span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>); })}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./III-1-2.html" className="text-orange-600 hover:text-orange-800 font-medium">&larr; III-1-2. RouterChain</a>
              <a href="./III-2-1.html" className="text-orange-600 hover:text-orange-800 font-medium">III-2-1. RAG Chain &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
