<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — III-2-3. Agent + Tools Chain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const REACT_LOOP = [
      { id: 'think', icon: '🧠', label: 'Thought', detail: 'LLM이 어떤 도구를 쓸지 판단' },
      { id: 'act', icon: '🔧', label: 'Action', detail: '도구를 호출하고 실행' },
      { id: 'observe', icon: '👀', label: 'Observation', detail: '도구 실행 결과를 확인' },
      { id: 'answer', icon: '💬', label: 'Answer', detail: '최종 답변 반환' },
    ];

    const STEPS = [
      {
        desc: "[Agent 개념] LLM이 스스로 어떤 도구를 사용할지 판단합니다. 체인은 고정된 경로를 따르지만, Agent는 상황에 따라 다른 도구를 선택합니다. ai-agent 프로젝트에서 배운 ReAct 패턴의 LangChain 구현입니다.",
        phase: 'concept',
        loopIdx: -1,
        code: [
          { line: '# Agent = LLM이 도구 사용을 스스로 결정', highlight: true },
          { line: '', highlight: false },
          { line: '# Chain: 질문 → 번역 → 요약 (고정 경로)', highlight: false },
          { line: '# Agent: 질문 → LLM 판단 → 적절한 도구 선택', highlight: true },
          { line: '', highlight: false },
          { line: '# ReAct 패턴:', highlight: false },
          { line: '# Thought → Action → Observation → (반복)', highlight: true },
          { line: '# → 최종 Answer', highlight: true },
        ],
      },
      {
        desc: "[@tool 데코레이터] 파이썬 함수를 @tool 데코레이터로 감싸면 LangChain 도구로 등록됩니다. 함수의 docstring이 도구 설명이 되어, LLM이 언제 이 도구를 쓸지 판단하는 데 사용됩니다.",
        phase: 'tool',
        loopIdx: -1,
        code: [
          { line: 'from langchain_core.tools import tool', highlight: false },
          { line: '', highlight: false },
          { line: '@tool', highlight: true },
          { line: 'def weather_tool(city: str) -> str:', highlight: true },
          { line: '    """도시의 현재 날씨를 조회합니다."""', highlight: true },
          { line: '    # API 호출 로직', highlight: false },
          { line: '    return "맑음 24°C"', highlight: true },
          { line: '', highlight: false },
          { line: '@tool', highlight: true },
          { line: 'def search_tool(query: str) -> str:', highlight: true },
          { line: '    """웹에서 정보를 검색합니다."""', highlight: true },
          { line: '    return "검색 결과..."', highlight: true },
        ],
      },
      {
        desc: "[Agent 생성] create_react_agent()로 ReAct 패턴의 Agent를 생성합니다. LLM과 도구 목록을 전달하면, LLM이 도구를 선택하고 실행하는 Agent가 만들어집니다.",
        phase: 'create',
        loopIdx: -1,
        code: [
          { line: 'from langchain_openai import ChatOpenAI', highlight: false },
          { line: 'from langgraph.prebuilt import create_react_agent', highlight: true },
          { line: '', highlight: false },
          { line: '# LLM + 도구 목록으로 Agent 생성', highlight: false },
          { line: 'llm = ChatOpenAI(model="gpt-4o")', highlight: false },
          { line: 'tools = [weather_tool, search_tool]', highlight: true },
          { line: '', highlight: false },
          { line: 'agent = create_react_agent(', highlight: true },
          { line: '    model=llm,', highlight: true },
          { line: '    tools=tools', highlight: true },
          { line: ')', highlight: true },
        ],
      },
      {
        desc: "[실행 루프] 질문 → LLM 판단(Thought) → 도구 호출(Action) → 결과 확인(Observation) → 추가 판단이 필요하면 반복, 아니면 최종 답변. ReAct 루프입니다.",
        phase: 'loop',
        loopIdx: 0,
        code: [
          { line: '# ReAct 실행 루프', highlight: false },
          { line: '', highlight: false },
          { line: '# 1. Thought: "날씨를 물어보네, weather_tool 써야겠다"', highlight: true },
          { line: '# 2. Action:  weather_tool("서울") 호출', highlight: true },
          { line: '# 3. Observation: "맑음 24°C" 결과 확인', highlight: true },
          { line: '# 4. Thought: "충분한 정보다, 답변하자"', highlight: false },
          { line: '# 5. Answer: 최종 답변 반환', highlight: false },
          { line: '', highlight: false },
          { line: '# 필요하면 2-3 반복 (여러 도구 연속 사용)', highlight: false },
        ],
      },
      {
        desc: "[도구 호출 예시] \"서울 날씨 알려줘\" → Agent가 weather_tool을 선택 → weather_tool(\"서울\") 호출 → \"맑음 24°C\" 결과를 LLM에 전달 → 자연스러운 답변 생성.",
        phase: 'example',
        loopIdx: 2,
        code: [
          { line: '# 실행 예시', highlight: false },
          { line: 'result = agent.invoke(', highlight: true },
          { line: '    {"messages": [("human", "서울 날씨 알려줘")]}', highlight: true },
          { line: ')', highlight: true },
          { line: '', highlight: false },
          { line: '# 내부 동작:', highlight: false },
          { line: '# Thought: 날씨 질문 → weather_tool 사용', highlight: false },
          { line: '# Action: weather_tool("서울")', highlight: true },
          { line: '# Observation: "맑음 24°C"', highlight: true },
          { line: '# Answer: "서울은 현재 맑고 기온은 24°C입니다."', highlight: false },
        ],
      },
      {
        desc: "[AgentExecutor] ReAct 루프를 자동으로 관리하고, 최대 반복 횟수 제한, 에러 처리, 최종 답변 반환까지 담당합니다. create_react_agent가 이 모든 것을 내장하고 있습니다.",
        phase: 'executor',
        loopIdx: 3,
        code: [
          { line: '# create_react_agent는 AgentExecutor 역할 내장', highlight: true },
          { line: '', highlight: false },
          { line: 'agent = create_react_agent(', highlight: false },
          { line: '    model=llm,', highlight: false },
          { line: '    tools=tools', highlight: false },
          { line: ')', highlight: false },
          { line: '', highlight: false },
          { line: '# 자동 관리 기능:', highlight: false },
          { line: '# - ReAct 루프 자동 실행', highlight: true },
          { line: '# - 최대 반복 횟수 제한', highlight: true },
          { line: '# - 에러 발생 시 재시도', highlight: true },
          { line: '# - 최종 답변 반환', highlight: true },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium"><span aria-hidden="true">&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 체인 패턴 &gt; Chapter 2. 고급 체인</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-2-3. Agent + Tools Chain</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>ReAct + Tool Use</b> — ai-agent 프로젝트에서 배운 패턴을 LangChain으로 구현합니다. LLM이 도구를 선택하고 사용하는 Agent 체인입니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">Agent + Tools Chain 흐름</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                {/* Agent 개념 */}
                {stepData.phase === 'concept' && (
                  <div className="space-y-3">
                    <div className="grid grid-cols-2 gap-3">
                      <div className="bg-slate-50 border border-slate-200 rounded-xl p-4">
                        <div className="font-bold text-sm text-slate-500 mb-2">Chain (고정 경로)</div>
                        <div className="space-y-1 text-xs">
                          <div className="bg-slate-100 rounded p-1.5 text-center">번역</div>
                          <div className="text-center text-slate-300">↓</div>
                          <div className="bg-slate-100 rounded p-1.5 text-center">요약</div>
                          <div className="text-center text-slate-300">↓</div>
                          <div className="bg-slate-100 rounded p-1.5 text-center">감성분석</div>
                        </div>
                      </div>
                      <div className="bg-orange-50 border-2 border-orange-300 rounded-xl p-4">
                        <div className="font-bold text-sm text-orange-700 mb-2">Agent (동적 선택)</div>
                        <div className="space-y-1 text-xs">
                          <div className="bg-orange-100 rounded p-1.5 text-center text-orange-700 font-bold">LLM 판단</div>
                          <div className="text-center text-orange-300">↓</div>
                          <div className="flex gap-1">
                            <div className="bg-orange-200 rounded p-1 text-center flex-1 text-orange-800">날씨</div>
                            <div className="bg-orange-200 rounded p-1 text-center flex-1 text-orange-800">검색</div>
                            <div className="bg-orange-200 rounded p-1 text-center flex-1 text-orange-800">계산</div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* 도구 등록 */}
                {stepData.phase === 'tool' && (
                  <div className="space-y-3">
                    <div className="text-xs font-bold text-slate-700 flex items-center gap-2">
                      <span className="text-lg">🧰</span> 등록된 도구 목록
                    </div>
                    <div className="space-y-2">
                      <div className="bg-orange-50 border-2 border-orange-200 rounded-xl p-4">
                        <div className="flex items-center gap-2 mb-1">
                          <span className="bg-orange-600 text-white text-xs px-2 py-0.5 rounded font-mono">@tool</span>
                          <span className="font-bold text-sm text-orange-800">weather_tool</span>
                        </div>
                        <div className="text-xs text-slate-600">"도시의 현재 날씨를 조회합니다."</div>
                        <div className="text-xs text-slate-400 mt-1">Args: city (str) → Returns: str</div>
                      </div>
                      <div className="bg-orange-50 border-2 border-orange-200 rounded-xl p-4">
                        <div className="flex items-center gap-2 mb-1">
                          <span className="bg-orange-600 text-white text-xs px-2 py-0.5 rounded font-mono">@tool</span>
                          <span className="font-bold text-sm text-orange-800">search_tool</span>
                        </div>
                        <div className="text-xs text-slate-600">"웹에서 정보를 검색합니다."</div>
                        <div className="text-xs text-slate-400 mt-1">Args: query (str) → Returns: str</div>
                      </div>
                    </div>
                  </div>
                )}

                {/* Agent 생성 */}
                {stepData.phase === 'create' && (
                  <div className="space-y-3">
                    <div className="text-xs font-bold text-slate-700 flex items-center gap-2">
                      <span className="text-lg">🤖</span> Agent 구성 요소
                    </div>
                    <div className="bg-orange-50 border-2 border-orange-200 rounded-xl p-4 space-y-3">
                      <div className="flex items-center gap-3 p-2 bg-white rounded-lg border border-orange-100">
                        <span className="text-xl">🧠</span>
                        <div>
                          <div className="font-bold text-xs text-slate-700">LLM (GPT-4o)</div>
                          <div className="text-xs text-slate-500">판단과 답변을 담당</div>
                        </div>
                      </div>
                      <div className="text-center text-orange-300">+</div>
                      <div className="flex items-center gap-3 p-2 bg-white rounded-lg border border-orange-100">
                        <span className="text-xl">🔧</span>
                        <div>
                          <div className="font-bold text-xs text-slate-700">Tools [weather, search]</div>
                          <div className="text-xs text-slate-500">실행할 수 있는 도구들</div>
                        </div>
                      </div>
                      <div className="text-center text-orange-300">↓</div>
                      <div className="flex items-center gap-3 p-3 bg-orange-100 rounded-lg border-2 border-orange-300 shadow-sm">
                        <span className="text-xl">⚡</span>
                        <div>
                          <div className="font-bold text-sm text-orange-800">ReAct Agent</div>
                          <div className="text-xs text-orange-600">create_react_agent()</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* ReAct 루프 */}
                {(stepData.phase === 'loop' || stepData.phase === 'example' || stepData.phase === 'executor') && (
                  <div className="space-y-3">
                    <div className="text-xs font-bold text-slate-700 flex items-center gap-2">
                      <span className="text-lg">🔄</span> ReAct 실행 루프
                    </div>
                    <div className="space-y-2">
                      {REACT_LOOP.map(function(step, idx) {
                        var isActive = idx <= stepData.loopIdx;
                        var isCurrent = idx === stepData.loopIdx;
                        return (
                          <div key={step.id} className="relative">
                            <div className={"flex items-center gap-3 p-3 rounded-xl border-2 transition-all duration-500 " + (
                              isCurrent ? 'bg-orange-100 border-orange-300 text-orange-800 scale-[1.02] shadow-md' :
                              isActive ? 'bg-orange-50 border-orange-200 text-orange-700' :
                              'bg-white border-slate-100 opacity-40'
                            )}>
                              <span className="text-xl">{step.icon}</span>
                              <div className="flex-1">
                                <div className="font-bold text-sm">{step.label}</div>
                                <div className="text-xs mt-0.5 opacity-70">{step.detail}</div>
                              </div>
                            </div>
                            {idx < REACT_LOOP.length - 1 && (
                              <div className="text-center text-orange-400 text-lg py-0.5">↓</div>
                            )}
                          </div>
                        );
                      })}
                    </div>

                    {/* 예시 실행 결과 */}
                    {stepData.phase === 'example' && (
                      <div className="bg-orange-50 border border-orange-200 rounded-lg p-3 space-y-1">
                        <div className="text-xs"><span className="font-bold text-slate-500">질문:</span> <span className="text-slate-600">"서울 날씨 알려줘"</span></div>
                        <div className="text-xs"><span className="font-bold text-orange-600">도구:</span> <span className="font-mono text-orange-800">weather_tool("서울")</span></div>
                        <div className="text-xs"><span className="font-bold text-green-600">결과:</span> <span className="text-green-800">"맑음 24°C"</span></div>
                        <div className="text-xs"><span className="font-bold text-blue-600">답변:</span> <span className="text-blue-800">"서울은 현재 맑고 기온은 24°C입니다."</span></div>
                      </div>
                    )}

                    {/* Executor 기능 */}
                    {stepData.phase === 'executor' && (
                      <div className="bg-green-50 border border-green-200 rounded-lg p-3">
                        <div className="text-xs font-bold text-green-700 mb-2">AgentExecutor 자동 관리</div>
                        <div className="space-y-1 text-xs text-green-800">
                          <div className="flex items-center gap-1">✅ ReAct 루프 자동 실행</div>
                          <div className="flex items-center gap-1">✅ 최대 반복 횟수 제한</div>
                          <div className="flex items-center gap-1">✅ 에러 발생 시 재시도</div>
                          <div className="flex items-center gap-1">✅ 최종 답변 자동 반환</div>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map(function(l, i) { return (<div key={i} className={l.highlight ? 'bg-orange-900/40 -mx-4 px-4' : ''}>{l.line || '\u00A0'}</div>); })}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['create_react_agent', 'AgentExecutor', 'Tool', '@tool 데코레이터'].map(function(kw) { return (<span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>); })}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./III-2-2.html" className="text-orange-600 hover:text-orange-800 font-medium">&larr; III-2-2. MapReduce Chain</a>
              <a href="../part4/IV-1-1.html" className="text-orange-600 hover:text-orange-800 font-medium">IV-1-1. 왜 LangGraph인가 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
