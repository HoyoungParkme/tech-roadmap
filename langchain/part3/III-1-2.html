<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — III-1-2. RouterChain</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    III-1-2. RouterChain — input에 따라 적절한 chain 선택
    학습 목표: 단일 범용 chain의 한계를 도메인별 chain + Router로 어떻게 극복하는지를
              5단계 흐름으로 이해한다.
    핵심 비유: 콜센터 ARS — "수학은 1번, 역사는 2번, 코드는 3번"
    패턴: fastapi v1 — 좌(LiveDataPane: 입력→Router→분기→도메인 chain) / 우(VSCode CodeViewer)
    색상: langchain emerald
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 도메인 정의 — math / history / code 3종 + default
    //   Router LLM이 input을 보고 이 중 하나를 선택한다.
    // ─────────────────────────────────────────────────────
    const DOMAINS = [
      {
        id: 'math',
        icon: '🧮',
        label: '수학 전문가',
        topic: 'math',
        keyword: '수학',
        promptHint: '단계별 수식 풀이 + 검산',
      },
      {
        id: 'history',
        icon: '📜',
        label: '역사 전문가',
        topic: 'history',
        keyword: '역사',
        promptHint: '시대 배경 + 인과관계 서술',
      },
      {
        id: 'code',
        icon: '💻',
        label: '코드 전문가',
        topic: 'code',
        keyword: '코드',
        promptHint: '예제 코드 + Big-O 분석',
      },
    ];

    // 도메인별 샘플 입력/응답 — 시각화 시뮬용
    const SAMPLE_QUERY = '이차방정식 x² - 5x + 6 = 0의 해를 구해줘';
    const SAMPLE_ANSWER_GENERIC = '음... x² - 5x + 6 = 0이면, 어... 인수분해? 그냥 외우는 게 좋아요.';
    const SAMPLE_ANSWER_MATH = '인수분해: (x-2)(x-3) = 0 → x=2 또는 x=3. 검산: 2²-5·2+6 = 0 ✓, 3²-5·3+6 = 0 ✓';

    // ─────────────────────────────────────────────────────
    // 5단계 STEPS 정의
    //   각 step은 dataState로 좌측 시각화를 제어:
    //     phase       : 'single' | 'domains' | 'classify' | 'branch' | 'fallback'
    //     query       : 입력 텍스트
    //     classified  : Router가 분류한 topic ('math'/'history'/'code'/'other')
    //     activeId    : 활성화된 도메인 id (UI 강조용)
    //     answer      : 최종 응답 텍스트
    //     hasFallback : default chain 사용 여부
    // ─────────────────────────────────────────────────────
    const STEPS = [
      // ─── Step 1: 단일 chain의 한계 ─────────────────────
      {
        title: 'Step 1. 단일 chain — 만능 프롬프트의 한계',
        desc:
          '하나의 범용 prompt로 수학·역사·코드 질문을 모두 받으면 어떻게 될까. ' +
          '"이차방정식 풀어줘"에 두루뭉실 답하고, "조선 건국"에는 코드 톤으로 답한다. ' +
          '도메인 전문성이 희석되어 정답률이 떨어진다 — RouterChain이 풀려는 문제다.',
        phase: 'single',
        query: SAMPLE_QUERY,
        classified: null,
        activeId: null,
        answer: SAMPLE_ANSWER_GENERIC,
        hasFallback: false,
        code: {
          lang: 'python',
          filename: 'single-bad.py',
          lines: [
            '# Step 1. 단일 만능 chain — 도메인 전문성 부족',
            'from langchain_openai import ChatOpenAI',
            'from langchain_core.prompts import ChatPromptTemplate',
            'from langchain_core.output_parsers import StrOutputParser',
            '',
            '# 하나의 범용 프롬프트로 모든 질문 처리',
            'generic_prompt = ChatPromptTemplate.from_template(',
            '    "다음 질문에 답하세요: {question}"',
            ')',
            'chain = generic_prompt | ChatOpenAI() | StrOutputParser()',
            '',
            '# 수학',
            'chain.invoke({"question": "x² - 5x + 6 = 0 풀어줘"})',
            '#  → "음… 인수분해? 그냥 외우세요." 😢 (단계·검산 X)',
            '',
            '# 역사',
            'chain.invoke({"question": "조선 건국 배경?"})',
            '#  → "1392년 이성계가…" 😢 (배경·인과 빈약)',
            '',
            '# 코드',
            'chain.invoke({"question": "이진탐색 구현?"})',
            '#  → "while 루프 쓰세요" 😢 (코드 X, Big-O X)',
            '',
            '# ─── 왜? ───',
            '#  1개 프롬프트로 모든 도메인을 커버하려다',
            '#  어느 도메인도 깊이 못 다룬다.',
            '#  → 도메인별 전문 프롬프트 + 분류기가 필요.',
          ],
          highlight: [1, 6, 7, 8, 10, 12, 13, 14, 16, 17, 18, 20, 21, 22],
        },
      },

      // ─── Step 2: 도메인별 chain 분리 ────────────────────
      {
        title: 'Step 2. 도메인별 chain — 전문 prompt 3종 분리',
        desc:
          '수학·역사·코드 각각 전문 prompt를 만든다. 수학 chain은 "단계별 풀이+검산"을, ' +
          '역사 chain은 "시대 배경+인과관계"를, 코드 chain은 "예제+Big-O"를 강제한다. ' +
          '문제는 — 입력이 들어왔을 때 어느 chain을 호출할지 누가 정하느냐.',
        phase: 'domains',
        query: null,
        classified: null,
        activeId: null,
        answer: null,
        hasFallback: false,
        code: {
          lang: 'python',
          filename: 'domain-chains.py',
          lines: [
            '# Step 2. 도메인별 전문 chain 3종',
            'from langchain_openai import ChatOpenAI',
            'from langchain_core.prompts import ChatPromptTemplate',
            'from langchain_core.output_parsers import StrOutputParser',
            '',
            'llm = ChatOpenAI(model="gpt-4o-mini")',
            'parser = StrOutputParser()',
            '',
            '# 1) 수학 전문 — 단계 풀이 + 검산',
            'math_prompt = ChatPromptTemplate.from_template(',
            '    "너는 수학 전문가다. 단계별 풀이 + 검산.\\n질문: {question}"',
            ')',
            'math_chain = math_prompt | llm | parser',
            '',
            '# 2) 역사 전문 — 시대 배경 + 인과관계',
            'history_prompt = ChatPromptTemplate.from_template(',
            '    "너는 역사 전문가다. 배경·인과 중심.\\n질문: {question}"',
            ')',
            'history_chain = history_prompt | llm | parser',
            '',
            '# 3) 코드 전문 — 예제 코드 + Big-O',
            'code_prompt = ChatPromptTemplate.from_template(',
            '    "너는 코드 전문가다. 예제 + 복잡도 분석.\\n질문: {question}"',
            ')',
            'code_chain = code_prompt | llm | parser',
            '',
            '# ⚠ 남은 문제: 어느 chain 을 호출할지 누가 정하나?',
            '#   → 다음 단계에서 "Router" 가 등장한다.',
          ],
          highlight: [8, 9, 10, 11, 12, 14, 15, 16, 17, 18, 20, 21, 22, 23, 24],
        },
      },

      // ─── Step 3: Router LLM 분류 ───────────────────────
      {
        title: 'Step 3. Router LLM — 입력을 도메인 토픽으로 분류',
        desc:
          '작은 분류 LLM이 입력을 보고 "math/history/code" 중 하나의 토픽 라벨을 뽑는다. ' +
          '"x² - 5x + 6 = 0" → topic="math". 이 분류 결과는 다음 단계의 RunnableBranch가 ' +
          '어느 chain으로 보낼지 결정하는 입력이 된다.',
        phase: 'classify',
        query: SAMPLE_QUERY,
        classified: 'math',
        activeId: 'math', // 분류만 됨, 아직 분기 전이지만 강조 표시
        classifyOnly: true,
        answer: null,
        hasFallback: false,
        code: {
          lang: 'python',
          filename: 'router-llm.py',
          lines: [
            '# Step 3. Router LLM — 입력 → 도메인 토픽 라벨',
            'from langchain_openai import ChatOpenAI',
            'from langchain_core.prompts import ChatPromptTemplate',
            'from langchain_core.output_parsers import StrOutputParser',
            '',
            '# 1) 분류 전용 프롬프트',
            'classify_prompt = ChatPromptTemplate.from_template("""',
            '질문이 어떤 도메인인지 라벨 하나만 출력.',
            '가능한 라벨: math, history, code',
            '질문: {question}',
            '라벨:',
            '""")',
            '',
            '# 2) 분류 chain — 비용 절감 위해 작은 모델 사용',
            'classify_chain = (',
            '    classify_prompt',
            '    | ChatOpenAI(model="gpt-4o-mini", temperature=0)',
            '    | StrOutputParser()',
            ')',
            '',
            '# 3) 동작 확인',
            'classify_chain.invoke({"question": "x² - 5x + 6 = 0"})  # → "math"',
            'classify_chain.invoke({"question": "조선 건국 배경?"})  # → "history"',
            'classify_chain.invoke({"question": "이진탐색 구현?"})    # → "code"',
            '',
            '# 💡 라벨 문자열이 다음 단계 RunnableBranch 의',
            '#    조건문(lambda x: "math" in x["topic"]) 입력이 된다.',
          ],
          highlight: [5, 6, 7, 8, 9, 10, 11, 13, 14, 15, 16, 17, 18, 21, 22, 23],
        },
      },

      // ─── Step 4: RunnableBranch (LCEL) ─────────────────
      {
        title: 'Step 4. RunnableBranch — 토픽으로 chain 분기 (LCEL)',
        desc:
          'classify가 뱉은 topic 라벨을 RunnableBranch가 받아 — math면 math_chain, history면 ' +
          'history_chain, code면 code_chain으로 보낸다. 활성 분기는 emerald, 비활성은 ' +
          '회색이 된다. 한 번의 invoke로 분류부터 응답까지 자동.',
        phase: 'branch',
        query: SAMPLE_QUERY,
        classified: 'math',
        activeId: 'math',
        answer: SAMPLE_ANSWER_MATH,
        hasFallback: false,
        code: {
          lang: 'python',
          filename: 'runnable-branch.py',
          lines: [
            '# Step 4. RunnableBranch — LCEL 조건부 분기',
            'from langchain_core.runnables import RunnableBranch, RunnablePassthrough',
            '',
            '# 1) 3-way 분기 — (조건, runnable) 튜플을 위에서부터 검사',
            'branch = RunnableBranch(',
            '    (lambda x: "math"    in x["topic"].lower(), math_chain),',
            '    (lambda x: "history" in x["topic"].lower(), history_chain),',
            '    (lambda x: "code"    in x["topic"].lower(), code_chain),',
            '    math_chain,  # default — 다음 step 에서 교체',
            ')',
            '',
            '# 2) 분류 + 분기를 LCEL 파이프로 연결',
            'router_chain = (',
            '    {"topic": classify_chain, "question": RunnablePassthrough()}',
            '    | branch',
            ')',
            '',
            '# 3) 호출',
            'router_chain.invoke("x² - 5x + 6 = 0 풀어줘")',
            '#  ① classify_chain  → "math"',
            '#  ② branch           → math_chain 선택 (첫 매칭)',
            '#  ③ math_chain       → 단계 풀이 + 검산',
            '#  → "(x-2)(x-3)=0 → x=2 or x=3, 검산 OK" ✓',
            '',
            '# ✨ 한 번의 invoke 로 분류·라우팅·응답 자동 처리',
            '# ⚠ 분류 라벨이 "philosophy" 같은 미정의 값이면?',
          ],
          highlight: [1, 2, 4, 5, 6, 7, 8, 9, 12, 13, 14, 15, 18, 19, 20, 21, 22, 23],
        },
      },

      // ─── Step 5: Fallback (default chain) ──────────────
      {
        title: 'Step 5. Fallback — 미분류는 default chain으로',
        desc:
          'Router가 "philosophy" 같은 정의 안 된 라벨을 뱉어도 시스템은 죽지 않아야 한다. ' +
          'RunnableBranch의 마지막 인자가 default — 어느 조건도 매칭 안 되면 자동 호출된다. ' +
          'default_chain은 "그 도메인은 다루지 않습니다, 일반 답변을 드리면…"으로 graceful degrade.',
        phase: 'fallback',
        query: '인생의 의미는 무엇인가?',
        classified: 'other',
        activeId: 'default',
        answer:
          '죄송하지만 수학·역사·코드 도메인에 특화되어 있어요. 일반적인 답변을 드리면…',
        hasFallback: true,
        code: {
          lang: 'python',
          filename: 'fallback.py',
          lines: [
            '# Step 5. Fallback — default_chain 으로 graceful degrade',
            'from langchain_core.prompts import ChatPromptTemplate',
            'from langchain_core.runnables import RunnableBranch',
            '',
            '# 1) 기본 응답용 default chain',
            'default_prompt = ChatPromptTemplate.from_template("""',
            '너는 일반 비서다. 수학·역사·코드 도메인이 아닐 때 호출된다.',
            '"전문 도메인이 아닙니다"라고 알린 뒤 일반 답변을 짧게.',
            '질문: {question}',
            '""")',
            'default_chain = default_prompt | llm | parser',
            '',
            '# 2) RunnableBranch 마지막 인자 = default',
            'branch = RunnableBranch(',
            '    (lambda x: "math"    in x["topic"].lower(), math_chain),',
            '    (lambda x: "history" in x["topic"].lower(), history_chain),',
            '    (lambda x: "code"    in x["topic"].lower(), code_chain),',
            '    default_chain,   # ⬅ 매칭 실패 시 여기로',
            ')',
            'router_chain = (',
            '    {"topic": classify_chain, "question": RunnablePassthrough()}',
            '    | branch',
            ')',
            '',
            '# 3) 미분류 입력',
            'router_chain.invoke("인생의 의미는?")',
            '#  ① classify_chain → "philosophy"',
            '#  ② math/history/code 람다 모두 false',
            '#  ③ default_chain 호출 → graceful 응답 ✓',
            '',
            '# ─── 정리 ───',
            '# • Router = 분류기 + 도메인 chain N개 + default',
            '# • 새 도메인은 (lambda, chain) 한 줄 추가',
            '# • 도메인 prompt 깊어 정답률 ↑, default 로 unknown 도 안전',
          ],
          highlight: [4, 5, 6, 7, 8, 9, 10, 12, 13, 14, 15, 16, 17, 18, 24, 25, 26, 27, 28, 30, 31, 32, 33],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 위: 입력 박스 — 사용자 query 표시
    //   query가 null이면 "입력 대기" placeholder
    // ─────────────────────────────────────────────────────
    function InputBox({ query, classified }) {
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📞</span>
              <span className="text-[11px] font-bold text-emerald-800">사용자 입력</span>
            </div>
            <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">
              question
            </span>
          </div>
          {query ? (
            <div className="bg-amber-50 border border-amber-200 rounded p-2">
              <div className="text-[11px] text-amber-900 font-medium leading-snug">"{query}"</div>
              {classified && (
                <div className="mt-1.5 flex items-center gap-1.5">
                  <span className="text-[9px] text-slate-500 font-mono">topic =</span>
                  <span
                    className={`text-[10px] px-1.5 py-0.5 rounded font-bold font-mono ${
                      classified === 'other'
                        ? 'bg-slate-500 text-white'
                        : 'bg-emerald-600 text-white'
                    }`}
                  >
                    "{classified}"
                  </span>
                </div>
              )}
            </div>
          ) : (
            <div className="bg-slate-50 border border-dashed border-slate-300 rounded p-2 text-center">
              <div className="text-[10px] text-slate-400 italic">(입력 대기)</div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중간: Router 박스 — 분류기 LLM 시각화
    //   phase에 따라 상태가 달라짐:
    //     'single'   → Router 없음 (회색)
    //     'domains'  → Router 없음 (회색)
    //     'classify' → 분류 진행 (emerald 글로우)
    //     'branch'   → 분기 완료 (emerald 채움)
    //     'fallback' → other 분류 (slate)
    // ─────────────────────────────────────────────────────
    function RouterBox({ phase, classified }) {
      const isActive = phase === 'classify' || phase === 'branch' || phase === 'fallback';
      const isDisabled = phase === 'single' || phase === 'domains';

      return (
        <div
          className={`rounded-lg border-2 p-3 transition-all duration-500 ${
            isDisabled
              ? 'bg-slate-50 border-dashed border-slate-300'
              : phase === 'fallback'
              ? 'bg-slate-100 border-slate-400'
              : 'bg-emerald-50 border-emerald-400 shadow-md'
          }`}
        >
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-1.5">
              <span className="text-base">{isDisabled ? '⊘' : '🔀'}</span>
              <span
                className={`text-[11px] font-bold ${
                  isDisabled ? 'text-slate-400' : 'text-emerald-800'
                }`}
              >
                {isDisabled ? 'Router 없음' : 'Router LLM (classify_chain)'}
              </span>
            </div>
            {isActive && (
              <span
                className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
                  phase === 'fallback'
                    ? 'bg-slate-500 text-white'
                    : 'bg-emerald-600 text-white animate-pulse'
                }`}
              >
                {phase === 'classify'
                  ? 'classifying…'
                  : phase === 'fallback'
                  ? 'unknown'
                  : 'classified'}
              </span>
            )}
          </div>
          {isActive && (
            <div className="mt-2 bg-white rounded border border-emerald-200 p-1.5">
              <div className="text-[9px] font-mono text-slate-600 leading-tight">
                <span className="text-emerald-700">prompt</span>
                <span className="text-slate-400"> → </span>
                <span className="text-emerald-700">gpt-4o-mini</span>
                <span className="text-slate-400"> → </span>
                <span
                  className={`font-bold ${
                    classified === 'other' ? 'text-slate-700' : 'text-emerald-700'
                  }`}
                >
                  "{classified}"
                </span>
              </div>
            </div>
          )}
          {isDisabled && (
            <div className="mt-1 text-[9px] text-slate-500 italic">
              (단일 chain 또는 분기 전 — 분류 단계 없음)
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: 도메인 chain 박스 — 3종 + default
    //   각 박스 상태:
    //     활성    : emerald 채움 + 글로우
    //     비활성  : 회색 흐림
    //     비표시  : phase==='single'일 때 default만 hidden
    // ─────────────────────────────────────────────────────
    function DomainChains({ phase, activeId, hasFallback, classifyOnly }) {
      // single 단계에서는 도메인 분리도 없음 → 단일 만능 chain만
      if (phase === 'single') {
        return (
          <div className="bg-red-50 border-2 border-dashed border-red-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">⚠</span>
              <span className="text-[11px] font-bold text-red-700">단일 만능 chain</span>
            </div>
            <div className="bg-white rounded border border-red-200 p-2">
              <div className="flex items-center gap-2">
                <span className="text-2xl">🌫️</span>
                <div className="flex-1">
                  <div className="text-[10px] font-bold text-red-800">generic_chain</div>
                  <div className="text-[9px] text-red-600">모든 도메인 두루뭉실 처리 — 정답률 ↓</div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // 도메인 분리 후 (Step 2~5)
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🎯</span>
              <span className="text-[11px] font-bold text-emerald-800">도메인 chain</span>
            </div>
            <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">
              RunnableBranch
            </span>
          </div>

          <div className="space-y-1.5">
            {DOMAINS.map((d) => {
              const isActive = activeId === d.id;
              // domains phase에서는 모두 동등(회색-아닌-기본)
              const isDomainsPhase = phase === 'domains';
              const isOther = activeId && !isActive && !isDomainsPhase;
              return (
                <div
                  key={d.id}
                  className={`flex items-center gap-2 p-2 rounded-md border-2 transition-all duration-500 ${
                    isActive
                      ? classifyOnly
                        ? 'bg-emerald-50 border-emerald-300 ring-2 ring-emerald-200'
                        : 'bg-emerald-100 border-emerald-500 ring-2 ring-emerald-300 scale-[1.02] shadow-md'
                      : isOther
                      ? 'bg-slate-50 border-slate-200 opacity-40'
                      : 'bg-white border-slate-200'
                  }`}
                >
                  <span className="text-xl">{d.icon}</span>
                  <div className="flex-1 min-w-0">
                    <div
                      className={`text-[11px] font-bold ${
                        isActive ? 'text-emerald-800' : 'text-slate-700'
                      }`}
                    >
                      {d.label}{' '}
                      <span className="font-mono text-[9px] text-slate-500">
                        ({d.id}_chain)
                      </span>
                    </div>
                    <div className="text-[9px] text-slate-500 truncate">{d.promptHint}</div>
                  </div>
                  {isActive && (
                    <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold animate-pulse flex-shrink-0">
                      {classifyOnly ? 'matched' : '▶ active'}
                    </span>
                  )}
                  {isOther && (
                    <span className="text-[9px] text-slate-400 font-mono flex-shrink-0">skip</span>
                  )}
                </div>
              );
            })}

            {/* default chain — Step 5에서만 활성 */}
            {(phase === 'fallback' || phase === 'branch') && (
              <div
                className={`flex items-center gap-2 p-2 rounded-md border-2 transition-all duration-500 border-dashed ${
                  activeId === 'default'
                    ? 'bg-slate-100 border-slate-500 ring-2 ring-slate-300 scale-[1.02] shadow-md'
                    : 'bg-slate-50 border-slate-300 opacity-60'
                }`}
              >
                <span className="text-xl">🤷</span>
                <div className="flex-1 min-w-0">
                  <div
                    className={`text-[11px] font-bold ${
                      activeId === 'default' ? 'text-slate-800' : 'text-slate-600'
                    }`}
                  >
                    기본 응답{' '}
                    <span className="font-mono text-[9px] text-slate-500">(default_chain)</span>
                  </div>
                  <div className="text-[9px] text-slate-500 truncate">
                    어떤 도메인도 매칭 안 될 때 (fallback)
                  </div>
                </div>
                {activeId === 'default' && (
                  <span className="text-[9px] bg-slate-700 text-white px-1.5 py-0.5 rounded font-mono font-bold animate-pulse flex-shrink-0">
                    ▶ fallback
                  </span>
                )}
                {activeId !== 'default' && hasFallback === false && (
                  <span className="text-[9px] text-slate-400 font-mono flex-shrink-0">
                    standby
                  </span>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 맨 아래: 응답 박스
    //   answer가 있을 때만 표시
    // ─────────────────────────────────────────────────────
    function AnswerBox({ answer, phase }) {
      if (!answer) return null;
      const isFail = phase === 'single';
      const isFallback = phase === 'fallback';
      return (
        <div
          className={`rounded-lg border-2 p-3 ${
            isFail
              ? 'bg-red-50 border-red-300'
              : isFallback
              ? 'bg-slate-100 border-slate-400'
              : 'bg-emerald-100 border-emerald-400'
          }`}
        >
          <div className="flex items-center justify-between mb-1">
            <div className="flex items-center gap-1.5">
              <span className="text-base">{isFail ? '😢' : isFallback ? '🤷' : '✅'}</span>
              <span
                className={`text-[11px] font-bold ${
                  isFail ? 'text-red-700' : isFallback ? 'text-slate-700' : 'text-emerald-800'
                }`}
              >
                {isFail ? '응답 (품질 낮음)' : isFallback ? '응답 (default)' : '응답 (전문 chain)'}
              </span>
            </div>
            <span
              className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
                isFail
                  ? 'bg-red-600 text-white'
                  : isFallback
                  ? 'bg-slate-600 text-white'
                  : 'bg-emerald-600 text-white'
              }`}
            >
              {isFail ? 'low quality' : isFallback ? 'graceful' : 'specialized ✓'}
            </span>
          </div>
          <div
            className={`text-[11px] leading-snug ${
              isFail ? 'text-red-900' : isFallback ? 'text-slate-800' : 'text-emerald-900'
            }`}
          >
            "{answer}"
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체 조립
    //   InputBox → 화살표 → RouterBox → 화살표 → DomainChains → AnswerBox
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📞 콜센터 ARS — RouterChain 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            <InputBox query={step.query} classified={step.classified} />

            {/* 입력 → Router 화살표 */}
            <div className="text-center text-emerald-500 text-[11px] font-mono leading-none">↓</div>

            <RouterBox phase={step.phase} classified={step.classified} />

            {/* Router → 분기 화살표 */}
            <div className="text-center text-emerald-500 text-[11px] font-mono leading-none">↓</div>

            <DomainChains
              phase={step.phase}
              activeId={step.activeId}
              hasFallback={step.hasFallback}
              classifyOnly={step.classifyOnly}
            />

            {step.answer && (
              <>
                <div className="text-center text-emerald-500 text-[11px] font-mono leading-none">↓</div>
                <AnswerBox answer={step.answer} phase={step.phase} />
              </>
            )}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>active 분기
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-400 opacity-50"></span>skip
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-600"></span>fallback
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-red-500"></span>품질 미달
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화 + 라인번호 + highlight 강조
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">
              {code.lang}
            </span>
          </div>

          {/* hljs 토큰화 hidden */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>
              {code.lines.join('\n')}
            </code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>
              Step {stepIdx + 1} / {total}
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 체인 패턴 &gt; Chapter 1. 기본 체인</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-1-2. RouterChain — 입력에 따라 적절한 chain 선택</h1>
                  <p className="text-sm text-slate-500 mt-0.5">콜센터 ARS — 분류기 LLM + 도메인별 전문 chain + fallback</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: <strong>분류기 LLM</strong>이 토픽 라벨을 뽑고,
                <strong> RunnableBranch</strong>가 도메인별 전문 chain으로 보낸다. 미정의 입력은
                <strong> default_chain</strong>이 받아 graceful degrade. 다음(III-1-3)에서는 대화
                이력을 자동으로 관리하는 <strong>ConversationChain</strong>을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]">
                {isPlaying ? '⏸ 정지' : stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생'}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['RouterChain', 'RunnableBranch', 'classify_chain', 'domain_chain', 'fallback', 'LCEL'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">{kw}</span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-1-1.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; III-1-1 SequentialChain</a>
              <a href="./III-1-3.html" className="text-emerald-700 hover:text-emerald-900 font-medium">III-1-3 ConversationChain &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
