<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — III-1-2. RouterChain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ROUTES = [
      { id: 'product', icon: '📦', label: '제품 문의', key: '1번', color: 'bg-blue-100 border-blue-300 text-blue-800', prompt: '제품 스펙과 특징을 안내합니다' },
      { id: 'delivery', icon: '🚚', label: '배송 문의', key: '2번', color: 'bg-green-100 border-green-300 text-green-800', prompt: '배송 상태와 예상 일정을 안내합니다' },
      { id: 'refund', icon: '💰', label: '환불 문의', key: '3번', color: 'bg-red-100 border-red-300 text-red-800', prompt: '환불 절차와 조건을 안내합니다' },
    ];

    const STEPS = [
      {
        desc: "[콜센터 ARS] \"제품 문의는 1번, 배송 문의는 2번, 환불은 3번\" — RouterChain은 이 ARS 시스템입니다. 입력을 분류해서 적절한 처리기로 보냅니다.",
        activeRoute: -1,
        query: null,
        code: [
          { line: '# RouterChain = 조건부 분기', highlight: false },
          { line: '# 입력을 분류 → 적절한 체인으로 라우팅', highlight: true },
          { line: '', highlight: false },
          { line: '# 콜센터 ARS처럼:', highlight: false },
          { line: '# "제품 문의" → 제품 전문 체인', highlight: false },
          { line: '# "배송 문의" → 배송 전문 체인', highlight: false },
          { line: '# "환불 문의" → 환불 전문 체인', highlight: false },
        ],
      },
      {
        desc: "[분류 단계] 사용자가 \"주문한 물건이 아직 안 왔어요\"라고 입력합니다. Router가 이 질문을 분석해서 \"배송 문의\"로 분류합니다.",
        activeRoute: -1,
        query: '주문한 물건이 아직 안 왔어요',
        classification: '배송 문의',
        code: [
          { line: 'from langchain_core.runnables import RunnableBranch', highlight: false },
          { line: '', highlight: false },
          { line: '# 먼저 입력을 분류하는 체인', highlight: false },
          { line: 'classify_chain = classify_prompt | model | parser', highlight: true },
          { line: '', highlight: false },
          { line: '# "주문한 물건이 아직 안 왔어요"', highlight: false },
          { line: '# → 분류 결과: "배송 문의"', highlight: true },
        ],
      },
      {
        desc: "[라우팅] 분류 결과 \"배송 문의\"에 따라 배송 전문 체인이 선택됩니다. 제품 체인과 환불 체인은 건너뜁니다.",
        activeRoute: 1,
        query: '주문한 물건이 아직 안 왔어요',
        classification: '배송 문의',
        code: [
          { line: '# RunnableBranch로 분기', highlight: false },
          { line: 'branch = RunnableBranch(', highlight: true },
          { line: '    (lambda x: "제품" in x["topic"], product_chain),', highlight: true },
          { line: '    (lambda x: "배송" in x["topic"], delivery_chain),', highlight: true },
          { line: '    (lambda x: "환불" in x["topic"], refund_chain),', highlight: true },
          { line: '    default_chain,  # 기본 처리', highlight: true },
          { line: ')', highlight: true },
        ],
      },
      {
        desc: "[전문 처리] 배송 전문 체인이 응답을 생성합니다. \"주문번호를 확인한 결과, 현재 배송 중이며 내일 도착 예정입니다.\" — 분야별 전문 프롬프트가 정확한 답을 만듭니다.",
        activeRoute: 1,
        query: '주문한 물건이 아직 안 왔어요',
        answer: '주문번호를 확인한 결과, 현재 배송 중이며 내일 도착 예정입니다.',
        code: [
          { line: '# 배송 전문 체인이 응답 생성', highlight: false },
          { line: 'delivery_prompt = ChatPromptTemplate.from_template(', highlight: true },
          { line: '    """너는 배송 상담 전문가다.', highlight: true },
          { line: '    고객 문의: {question}', highlight: true },
          { line: '    배송 상태와 예상 일정을 안내해줘."""', highlight: true },
          { line: ')', highlight: true },
          { line: 'delivery_chain = delivery_prompt | model | parser', highlight: false },
        ],
      },
      {
        desc: "[전체 구조] classify → route → 전문 체인. 하나의 범용 프롬프트보다 분야별 전문 프롬프트가 더 정확한 답변을 만듭니다. 실전에서 자주 사용하는 패턴입니다.",
        activeRoute: -1,
        query: null,
        code: [
          { line: '# 전체 Router Chain', highlight: false },
          { line: '', highlight: false },
          { line: 'router_chain = (', highlight: true },
          { line: '    {"topic": classify_chain, "question": RunnablePassthrough()}', highlight: true },
          { line: '    | branch', highlight: true },
          { line: ')', highlight: true },
          { line: '', highlight: false },
          { line: '# 사용', highlight: false },
          { line: 'result = router_chain.invoke("물건이 안 왔어요")', highlight: false },
          { line: '# → 자동으로 배송 체인이 처리!', highlight: false },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium"><span aria-hidden="true">&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 체인 패턴 &gt; Chapter 1. 기본 체인</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-1-2. RouterChain</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>콜센터 ARS</b> — "제품 문의는 1번, 배송 문의는 2번, 환불은 3번". 입력을 분류해서 적절한 처리기로 보냅니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">RouterChain 흐름</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                {stepData.query && (
                  <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
                    <div className="text-xs font-bold text-amber-600 mb-1">고객 문의</div>
                    <div className="text-sm font-medium text-amber-800">"{stepData.query}"</div>
                    {stepData.classification && (
                      <div className="mt-2 text-xs text-orange-600 font-bold">→ 분류: {stepData.classification}</div>
                    )}
                  </div>
                )}

                <div className="space-y-2">
                  {ROUTES.map((route, idx) => (
                    <div key={route.id} className={`flex items-center gap-3 p-3 rounded-xl border-2 transition-all duration-500 ${
                      idx === stepData.activeRoute ? route.color + ' scale-[1.02] shadow-md ring-2 ring-orange-200' :
                      stepData.activeRoute >= 0 && idx !== stepData.activeRoute ? 'bg-white border-slate-100 opacity-30' :
                      'bg-white border-slate-200'
                    }`}>
                      <span className="text-2xl">{route.icon}</span>
                      <div className="flex-1">
                        <div className="font-bold text-sm">{route.key}: {route.label}</div>
                        <div className="text-xs mt-0.5 opacity-75">{route.prompt}</div>
                      </div>
                    </div>
                  ))}
                </div>

                {stepData.answer && (
                  <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3">
                    <div className="text-xs font-bold text-emerald-600 mb-1">응답</div>
                    <div className="text-sm text-emerald-800">{stepData.answer}</div>
                  </div>
                )}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (<div key={i} className={l.highlight ? 'bg-orange-900/40 -mx-4 px-4' : ''}>{l.line || '\u00A0'}</div>))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['RouterChain', 'RunnableBranch', '조건부 분기'].map(kw => (<span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./III-1-1.html" className="text-orange-600 hover:text-orange-800 font-medium">&larr; III-1-1. SequentialChain</a>
              <a href="./III-1-3.html" className="text-orange-600 hover:text-orange-800 font-medium">III-1-3. ConversationChain &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
