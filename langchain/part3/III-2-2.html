<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — III-2-2. MapReduce Chain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CHUNKS = [
      { id: 'c1', label: 'Chunk 1', pages: 'p.1-20', summary: '제품 개요와 시장 분석' },
      { id: 'c2', label: 'Chunk 2', pages: 'p.21-40', summary: '경쟁사 비교 및 차별점' },
      { id: 'c3', label: 'Chunk 3', pages: 'p.41-60', summary: '기술 아키텍처 설명' },
      { id: 'c4', label: 'Chunk 4', pages: 'p.61-80', summary: '수익 모델과 가격 전략' },
      { id: 'c5', label: 'Chunk 5', pages: 'p.81-100', summary: '로드맵 및 향후 계획' },
    ];

    const STEPS = [
      {
        desc: "[문제] 100페이지 문서를 한번에 요약할 수 없습니다. LLM의 토큰 제한 때문입니다. 10개 챕터를 혼자 다 읽고 요약하는 건 불가능한 것과 같습니다.",
        phase: 'problem',
        activeChunks: [],
        code: [
          { line: '# 문제: 긴 문서는 한번에 처리 불가', highlight: false },
          { line: 'long_document = "..." # 100페이지, 50000 토큰', highlight: true },
          { line: '', highlight: false },
          { line: '# LLM 토큰 제한:', highlight: false },
          { line: '# GPT-4: ~128K 토큰 (그래도 품질 저하)', highlight: true },
          { line: '# 실제로는 8K~16K가 최적 성능 구간', highlight: true },
          { line: '', highlight: false },
          { line: '# 해결: 단체 과제처럼 나눠서 처리!', highlight: false },
          { line: '# Map(분담) → Reduce(종합)', highlight: false },
        ],
      },
      {
        desc: "[Map 단계] 문서를 5개 청크로 나누고, 각 청크를 개별적으로 요약합니다. 단체 과제에서 5명이 20페이지씩 나눠 읽는 것과 같습니다. 병렬 처리가 가능합니다!",
        phase: 'map',
        activeChunks: ['c1', 'c2', 'c3', 'c4', 'c5'],
        code: [
          { line: 'from langchain.text_splitter import RecursiveCharacterTextSplitter', highlight: false },
          { line: '', highlight: false },
          { line: '# 1. 문서를 청크로 분할', highlight: false },
          { line: 'splitter = RecursiveCharacterTextSplitter(', highlight: true },
          { line: '    chunk_size=2000, chunk_overlap=200', highlight: true },
          { line: ')', highlight: true },
          { line: 'chunks = splitter.split_documents([document])', highlight: true },
          { line: '', highlight: false },
          { line: '# 2. Map: 각 청크를 개별 요약 (병렬 가능)', highlight: false },
          { line: 'map_prompt = "다음 내용을 요약해줘: {text}"', highlight: true },
        ],
      },
      {
        desc: "[각 요약 결과] 각 청크에서 개별 요약이 생성됩니다. Chunk1 → \"제품 개요와 시장 분석\", Chunk2 → \"경쟁사 비교 및 차별점\", ... 팀원 각자가 자기 파트의 요약을 완성한 상태입니다.",
        phase: 'map-result',
        activeChunks: ['c1', 'c2', 'c3', 'c4', 'c5'],
        code: [
          { line: '# Map 결과 — 각 청크의 개별 요약', highlight: false },
          { line: 'map_chain = map_prompt | llm | parser', highlight: true },
          { line: '', highlight: false },
          { line: '# 각 청크 → 개별 요약 (병렬 실행)', highlight: false },
          { line: 'summaries = map_chain.batch(chunks)  # 병렬!', highlight: true },
          { line: '', highlight: false },
          { line: '# summaries = [', highlight: false },
          { line: '#   "제품 개요와 시장 분석",', highlight: false },
          { line: '#   "경쟁사 비교 및 차별점",', highlight: false },
          { line: '#   "기술 아키텍처 설명",', highlight: false },
          { line: '#   "수익 모델과 가격 전략",', highlight: false },
          { line: '#   "로드맵 및 향후 계획"', highlight: false },
          { line: '# ]', highlight: false },
        ],
      },
      {
        desc: "[Reduce 단계] 모든 개별 요약을 합쳐서 최종 종합 요약을 생성합니다. 팀장이 팀원들의 요약을 모아서 하나의 최종 보고서를 작성하는 것입니다.",
        phase: 'reduce',
        activeChunks: [],
        code: [
          { line: '# Reduce: 개별 요약들을 종합', highlight: false },
          { line: 'reduce_prompt = ChatPromptTemplate.from_template("""', highlight: true },
          { line: '다음 요약들을 종합하여 최종 요약을 작성해줘:', highlight: true },
          { line: '', highlight: false },
          { line: '{summaries}', highlight: true },
          { line: '""")', highlight: true },
          { line: '', highlight: false },
          { line: 'reduce_chain = reduce_prompt | llm | parser', highlight: true },
          { line: '', highlight: false },
          { line: '# 모든 요약을 합쳐서 최종 종합', highlight: false },
          { line: 'final = reduce_chain.invoke({"summaries": summaries})', highlight: true },
        ],
      },
      {
        desc: "[전체 흐름] 문서 → 분할 → Map(개별 요약) → Reduce(종합) → 최종 요약. 100페이지 문서도 효율적으로 처리할 수 있습니다. 비용과 속도 모두 최적화됩니다.",
        phase: 'full',
        activeChunks: ['c1', 'c2', 'c3', 'c4', 'c5'],
        code: [
          { line: '# 전체 MapReduce 흐름', highlight: false },
          { line: '', highlight: false },
          { line: '# 1. 분할', highlight: false },
          { line: 'chunks = splitter.split_documents([document])', highlight: true },
          { line: '', highlight: false },
          { line: '# 2. Map (병렬 요약)', highlight: false },
          { line: 'summaries = map_chain.batch(chunks)', highlight: true },
          { line: '', highlight: false },
          { line: '# 3. Reduce (종합)', highlight: false },
          { line: 'final = reduce_chain.invoke({"summaries": summaries})', highlight: true },
          { line: '', highlight: false },
          { line: '# → "이 문서는 신제품 사업 계획서로,', highlight: false },
          { line: '#     시장 분석, 기술 설계, 수익 모델을', highlight: false },
          { line: '#     포괄적으로 다루고 있습니다..."', highlight: false },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium"><span aria-hidden="true">&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 체인 패턴 &gt; Chapter 2. 고급 체인</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-2-2. MapReduce Chain</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>단체 과제</b> — 10개 챕터를 5명이 2개씩 나눠 요약(Map)하고, 한 명이 전체를 종합(Reduce)합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">MapReduce Chain 흐름</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                {/* 문제 상태 */}
                {stepData.phase === 'problem' && (
                  <div className="space-y-3">
                    <div className="bg-red-50 border-2 border-red-200 rounded-xl p-4 text-center">
                      <div className="text-4xl mb-2">📄</div>
                      <div className="font-bold text-red-700 text-sm">100페이지 문서</div>
                      <div className="text-xs text-red-500 mt-1">~50,000 토큰 — LLM 한번에 처리 불가!</div>
                      <div className="mt-3 text-red-400 text-2xl">✕</div>
                    </div>
                  </div>
                )}

                {/* Map 단계 */}
                {(stepData.phase === 'map' || stepData.phase === 'map-result') && (
                  <div className="space-y-3">
                    <div className="text-xs font-bold text-slate-700 flex items-center gap-2">
                      <span className="text-lg">🗂️</span> Map 단계 — 나눠서 요약
                    </div>
                    <div className="grid grid-cols-1 gap-2">
                      {CHUNKS.map(function(chunk) {
                        var isActive = stepData.activeChunks.indexOf(chunk.id) >= 0;
                        return (
                          <div key={chunk.id} className={"flex items-center gap-3 p-3 rounded-lg border-2 transition-all duration-500 " + (isActive ? "bg-orange-50 border-orange-300 scale-[1.01] shadow-sm" : "bg-white border-slate-100 opacity-40")}>
                            <span className="text-sm font-mono bg-orange-100 text-orange-700 px-2 py-0.5 rounded">{chunk.pages}</span>
                            <div className="flex-1">
                              <div className="font-bold text-xs text-slate-700">{chunk.label}</div>
                              {stepData.phase === 'map-result' && isActive && (
                                <div className="text-xs text-orange-600 mt-0.5">→ "{chunk.summary}"</div>
                              )}
                            </div>
                            {stepData.phase === 'map-result' && isActive && (
                              <span className="text-green-500 text-sm">✓</span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Reduce 단계 */}
                {stepData.phase === 'reduce' && (
                  <div className="space-y-3">
                    <div className="text-xs font-bold text-slate-700 flex items-center gap-2">
                      <span className="text-lg">🔄</span> Reduce 단계 — 종합
                    </div>
                    <div className="bg-orange-50 border-2 border-orange-200 rounded-xl p-4">
                      <div className="space-y-1 mb-3">
                        {CHUNKS.map(function(chunk) {
                          return (
                            <div key={chunk.id} className="text-xs text-slate-600 flex items-center gap-2">
                              <span className="text-orange-400">→</span> {chunk.summary}
                            </div>
                          );
                        })}
                      </div>
                      <div className="border-t-2 border-orange-300 pt-3">
                        <div className="text-center text-orange-500 text-lg mb-2">⬇ 종합</div>
                        <div className="bg-white border border-orange-200 rounded-lg p-3 text-xs text-orange-800 font-medium">
                          "이 문서는 신제품 사업 계획서로, 시장 분석부터 기술 설계, 수익 모델, 향후 로드맵까지 포괄적으로 다루고 있습니다."
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* 전체 흐름 */}
                {stepData.phase === 'full' && (
                  <div className="space-y-3">
                    <div className="text-xs font-bold text-slate-700 flex items-center gap-2">
                      <span className="text-lg">🔗</span> 전체 MapReduce 흐름
                    </div>
                    <div className="space-y-2">
                      <div className="bg-slate-100 border border-slate-200 rounded-lg p-3 text-center">
                        <div className="text-sm font-bold text-slate-700">📄 100페이지 문서</div>
                      </div>
                      <div className="text-center text-orange-400 text-lg">⬇ 분할</div>
                      <div className="grid grid-cols-5 gap-1">
                        {CHUNKS.map(function(chunk) {
                          return (
                            <div key={chunk.id} className="bg-orange-100 border border-orange-200 rounded p-1 text-center text-xs text-orange-700 font-medium">{chunk.label}</div>
                          );
                        })}
                      </div>
                      <div className="text-center text-orange-400 text-lg">⬇ Map (병렬 요약)</div>
                      <div className="grid grid-cols-5 gap-1">
                        {CHUNKS.map(function(chunk) {
                          return (
                            <div key={chunk.id} className="bg-amber-100 border border-amber-200 rounded p-1 text-center text-xs text-amber-700">요약{chunk.id.slice(-1)}</div>
                          );
                        })}
                      </div>
                      <div className="text-center text-orange-400 text-lg">⬇ Reduce (종합)</div>
                      <div className="bg-green-100 border border-green-300 rounded-lg p-3 text-center">
                        <div className="text-sm font-bold text-green-700">📋 최종 종합 요약</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map(function(l, i) { return (<div key={i} className={l.highlight ? 'bg-orange-900/40 -mx-4 px-4' : ''}>{l.line || '\u00A0'}</div>); })}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['MapReduce', 'map_chain', 'reduce_chain', '병렬 처리'].map(function(kw) { return (<span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>); })}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./III-2-1.html" className="text-orange-600 hover:text-orange-800 font-medium">&larr; III-2-1. RAG Chain</a>
              <a href="./III-2-3.html" className="text-orange-600 hover:text-orange-800 font-medium">III-2-3. Agent + Tools Chain &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
