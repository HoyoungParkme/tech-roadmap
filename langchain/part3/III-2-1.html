<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — III-2-1. RAG Chain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const RAG_PIPELINE = [
      { id: 'question', icon: '❓', label: '질문 입력', detail: '사용자 질문' },
      { id: 'retriever', icon: '🔍', label: 'Retriever 검색', detail: 'Vector Store에서 검색' },
      { id: 'prompt', icon: '📋', label: '프롬프트 조합', detail: 'context + question' },
      { id: 'llm', icon: '🤖', label: 'LLM 답변', detail: '검색 기반 정확한 답변' },
    ];

    const STEPS = [
      {
        desc: "[LLM의 한계] LLM은 학습 데이터에 없는 내용은 모르거나 할루시네이션(그럴듯한 거짓말)을 합니다. 클로즈드 북 시험에서 모르는 문제가 나온 것과 같습니다.",
        activeStage: -1,
        docs: null,
        code: [
          { line: '# LLM의 한계 — 학습 데이터에 없으면?', highlight: false },
          { line: 'llm.invoke("우리 회사 휴가 정책이 뭐야?")', highlight: true },
          { line: '', highlight: false },
          { line: '# → "일반적으로 회사의 휴가 정책은..."  (할루시네이션!)', highlight: true },
          { line: '# LLM은 우리 회사 내부 문서를 모른다', highlight: false },
          { line: '', highlight: false },
          { line: '# 해결책: 오픈북 시험처럼', highlight: false },
          { line: '# 교과서(외부 문서)를 펼쳐보고 답하게 하자!', highlight: false },
        ],
      },
      {
        desc: "[RAG 개념] Retrieval-Augmented Generation. 외부 문서에서 관련 정보를 찾아(Retrieval) LLM에 전달하여 답변을 생성(Augmented Generation)합니다. 오픈북 시험입니다.",
        activeStage: -1,
        docs: null,
        code: [
          { line: '# RAG = Retrieval-Augmented Generation', highlight: true },
          { line: '#', highlight: false },
          { line: '# R: Retrieval  — 관련 문서 검색', highlight: true },
          { line: '# A: Augmented  — 검색 결과로 보강', highlight: true },
          { line: '# G: Generation — LLM이 답변 생성', highlight: true },
          { line: '', highlight: false },
          { line: '# 오픈북 시험:', highlight: false },
          { line: '# 1. 문제를 읽고 (질문)', highlight: false },
          { line: '# 2. 교과서에서 관련 내용을 찾고 (Retrieval)', highlight: false },
          { line: '# 3. 찾은 내용 기반으로 답안 작성 (Generation)', highlight: false },
        ],
      },
      {
        desc: "[질문 입력] 사용자가 \"우리 회사 휴가 정책이 뭐야?\"라고 질문합니다. 이 질문이 RAG 파이프라인의 시작점입니다.",
        activeStage: 0,
        docs: null,
        code: [
          { line: 'from langchain_openai import ChatOpenAI, OpenAIEmbeddings', highlight: false },
          { line: 'from langchain_community.vectorstores import FAISS', highlight: false },
          { line: 'from langchain.chains import create_retrieval_chain', highlight: true },
          { line: '', highlight: false },
          { line: '# 사용자 질문', highlight: false },
          { line: 'question = "우리 회사 휴가 정책이 뭐야?"', highlight: true },
        ],
      },
      {
        desc: "[Retriever 검색] Vector Store에서 질문과 유사한 문서 3개를 찾습니다. 교과서에서 관련 페이지를 펼치는 단계입니다.",
        activeStage: 1,
        docs: [
          { title: '휴가정책.pdf p.3', score: '0.92', text: '연차 15일, 반차 사용 가능' },
          { title: '휴가정책.pdf p.7', score: '0.87', text: '입사 1년 미만은 월 1일 발생' },
          { title: '복리후생.pdf p.2', score: '0.71', text: '리프레시 휴가 3일 별도 부여' },
        ],
        code: [
          { line: '# Vector Store에서 Retriever 생성', highlight: false },
          { line: 'vectorstore = FAISS.from_documents(docs, embeddings)', highlight: false },
          { line: 'retriever = vectorstore.as_retriever(', highlight: true },
          { line: '    search_kwargs={"k": 3}  # 상위 3개 문서', highlight: true },
          { line: ')', highlight: true },
          { line: '', highlight: false },
          { line: '# 질문과 유사한 문서 검색', highlight: false },
          { line: 'retrieved_docs = retriever.invoke(question)', highlight: true },
        ],
      },
      {
        desc: "[프롬프트 조합] 검색된 문서(context)와 질문(question)을 합쳐서 프롬프트를 생성합니다. \"이 자료를 참고해서 답해줘\"라고 교과서를 LLM에게 건네는 것입니다.",
        activeStage: 2,
        docs: null,
        code: [
          { line: 'from langchain_core.prompts import ChatPromptTemplate', highlight: false },
          { line: '', highlight: false },
          { line: '# context + question을 합치는 프롬프트', highlight: false },
          { line: 'prompt = ChatPromptTemplate.from_template("""', highlight: true },
          { line: '다음 context를 참고하여 질문에 답하세요.', highlight: true },
          { line: '답을 모르면 모른다고 하세요.', highlight: true },
          { line: '', highlight: false },
          { line: 'context: {context}', highlight: true },
          { line: '질문: {input}', highlight: true },
          { line: '""")', highlight: true },
        ],
      },
      {
        desc: "[LLM 답변] 검색된 문서를 기반으로 정확한 답변을 생성합니다. 출처도 함께 표시하여 신뢰성을 높입니다. 더 이상 할루시네이션이 아닌, 근거 있는 답변입니다.",
        activeStage: 3,
        docs: null,
        code: [
          { line: 'from langchain.chains.combine_documents import (', highlight: false },
          { line: '    create_stuff_documents_chain', highlight: false },
          { line: ')', highlight: false },
          { line: '', highlight: false },
          { line: '# 문서 결합 체인 + 검색 체인 조합', highlight: false },
          { line: 'doc_chain = create_stuff_documents_chain(llm, prompt)', highlight: true },
          { line: 'rag_chain = create_retrieval_chain(retriever, doc_chain)', highlight: true },
          { line: '', highlight: false },
          { line: 'result = rag_chain.invoke({"input": question})', highlight: true },
          { line: '# → "연차 15일이며, 반차 사용이 가능합니다.', highlight: false },
          { line: '#     입사 1년 미만은 월 1일씩 발생합니다."', highlight: false },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium"><span aria-hidden="true">&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 체인 패턴 &gt; Chapter 2. 고급 체인</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-2-1. RAG Chain</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>오픈북 시험</b> — 시험 중에 교과서를 펼쳐보고(Retrieval) 답을 작성합니다(Generation). 검색 + 생성을 결합한 RAG 체인입니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">RAG Chain 흐름</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                {/* RAG 파이프라인 */}
                <div className="space-y-3">
                  {RAG_PIPELINE.map(function(stage, idx) {
                    return (
                      <div key={stage.id} className="relative">
                        <div className={"flex items-center gap-3 p-4 rounded-xl border-2 transition-all duration-500 " + (
                          idx === stepData.activeStage ? 'bg-orange-100 border-orange-300 text-orange-800 scale-[1.02] shadow-md' :
                          idx < stepData.activeStage ? 'bg-orange-50 border-orange-200 text-orange-700' :
                          'bg-white border-slate-100 opacity-40'
                        )}>
                          <span className="text-2xl">{stage.icon}</span>
                          <div className="flex-1">
                            <div className="font-bold text-sm">{stage.label}</div>
                            <div className="text-xs mt-0.5 opacity-70">{stage.detail}</div>
                          </div>
                        </div>
                        {idx < RAG_PIPELINE.length - 1 && (
                          <div className="text-center text-orange-400 text-lg py-1">↓</div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* 검색된 문서 */}
                {stepData.docs && (
                  <div className="bg-orange-50 border border-orange-200 rounded-lg p-3 space-y-2">
                    <div className="text-xs font-bold text-orange-600 mb-1">검색된 문서 (상위 3개)</div>
                    {stepData.docs.map(function(doc, idx) {
                      return (
                        <div key={idx} className="bg-white border border-orange-100 rounded-lg p-2 text-xs">
                          <div className="flex justify-between items-center mb-1">
                            <span className="font-bold text-slate-700">{doc.title}</span>
                            <span className="text-orange-600 font-mono">유사도: {doc.score}</span>
                          </div>
                          <div className="text-slate-600">{doc.text}</div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* 최종 답변 */}
                {stepData.activeStage === 3 && (
                  <div className="bg-green-50 border border-green-200 rounded-lg p-3">
                    <div className="text-xs font-bold text-green-600 mb-1">LLM 답변 (근거 기반)</div>
                    <div className="text-xs text-green-800">"연차 15일이며, 반차 사용이 가능합니다. 입사 1년 미만은 월 1일씩 발생합니다. 또한 리프레시 휴가 3일이 별도 부여됩니다."</div>
                    <div className="text-xs text-slate-500 mt-2">출처: 휴가정책.pdf, 복리후생.pdf</div>
                  </div>
                )}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map(function(l, i) { return (<div key={i} className={l.highlight ? 'bg-orange-900/40 -mx-4 px-4' : ''}>{l.line || '\u00A0'}</div>); })}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['RAG', 'create_retrieval_chain', 'context', 'stuff_documents_chain'].map(function(kw) { return (<span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>); })}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./III-1-3.html" className="text-orange-600 hover:text-orange-800 font-medium">&larr; III-1-3. ConversationChain</a>
              <a href="./III-2-2.html" className="text-orange-600 hover:text-orange-800 font-medium">III-2-2. MapReduce Chain &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
