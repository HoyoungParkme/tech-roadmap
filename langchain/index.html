<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain + LangGraph 인터랙티브 학습</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <style>html, body, #root { height: 100%; margin: 0; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const SECTIONS = [
      { part: 'I', label: 'Part I. LangChain이란', color: 'bg-indigo-600', items: [
        { id: 'I-1-1', title: 'LLM 직접 호출 vs LangChain', file: './part1/I-1-1.html' },
        { id: 'I-1-2', title: 'LangChain 아키텍처', file: './part1/I-1-2.html' },
        { id: 'I-1-3', title: 'LCEL 파이프', file: './part1/I-1-3.html' },
        { id: 'I-2-1', title: 'PromptTemplate', file: './part1/I-2-1.html' },
        { id: 'I-2-2', title: 'OutputParser', file: './part1/I-2-2.html' },
      ]},
      { part: 'II', label: 'Part II. 컴포넌트', color: 'bg-cyan-600', items: [
        { id: 'II-1-1', title: 'Document Loaders', file: './part2/II-1-1.html' },
        { id: 'II-1-2', title: 'Text Splitters', file: './part2/II-1-2.html' },
        { id: 'II-1-3', title: 'Embeddings', file: './part2/II-1-3.html' },
        { id: 'II-2-1', title: 'Vector Stores', file: './part2/II-2-1.html' },
        { id: 'II-2-2', title: 'Retrievers', file: './part2/II-2-2.html' },
      ]},
      { part: 'III', label: 'Part III. 체인 패턴', color: 'bg-orange-600', items: [
        { id: 'III-1-1', title: 'SequentialChain', file: './part3/III-1-1.html' },
        { id: 'III-1-2', title: 'RouterChain', file: './part3/III-1-2.html' },
        { id: 'III-1-3', title: 'ConversationChain', file: './part3/III-1-3.html' },
        { id: 'III-2-1', title: 'RAG Chain', file: './part3/III-2-1.html' },
        { id: 'III-2-2', title: 'MapReduce Chain', file: './part3/III-2-2.html' },
        { id: 'III-2-3', title: 'Agent + Tools Chain', file: './part3/III-2-3.html' },
      ]},
      { part: 'IV', label: 'Part IV. LangGraph', color: 'bg-purple-600', items: [
        { id: 'IV-1-1', title: '왜 LangGraph인가', file: './part4/IV-1-1.html' },
        { id: 'IV-1-2', title: 'StateGraph 기본', file: './part4/IV-1-2.html' },
        { id: 'IV-1-3', title: 'Node, Edge, Conditional', file: './part4/IV-1-3.html' },
        { id: 'IV-2-1', title: 'ReAct Agent (LangGraph)', file: './part4/IV-2-1.html' },
        { id: 'IV-2-2', title: 'Human-in-the-Loop', file: './part4/IV-2-2.html' },
        { id: 'IV-2-3', title: 'Multi-Agent Supervisor', file: './part4/IV-2-3.html' },
      ]},
      { part: 'V', label: 'Part V. LangSmith & 평가', color: 'bg-teal-600', items: [
        { id: 'V-1-1', title: '트레이싱과 디버깅', file: './part5/V-1-1.html' },
        { id: 'V-1-2', title: '프롬프트 관리', file: './part5/V-1-2.html' },
        { id: 'V-2-1', title: 'LLM-as-Judge', file: './part5/V-2-1.html' },
        { id: 'V-2-2', title: '자동 평가 파이프라인', file: './part5/V-2-2.html' },
      ]},
      { part: 'VI', label: 'Part VI. 실전 프로젝트', color: 'bg-rose-600', items: [
        { id: 'VI-1-1', title: 'RAG 챗봇', file: './part6/VI-1-1.html' },
        { id: 'VI-1-2', title: '코드 리뷰 Agent', file: './part6/VI-1-2.html' },
        { id: 'VI-1-3', title: 'Multi-Agent 워크플로우', file: './part6/VI-1-3.html' },
      ]},
    ];
    const TOTAL = SECTIONS.reduce((s, sec) => s + sec.items.length, 0);
    const PART_BG = { I:'hover:bg-indigo-50', II:'hover:bg-cyan-50', III:'hover:bg-orange-50', IV:'hover:bg-purple-50', V:'hover:bg-teal-50', VI:'hover:bg-rose-50' };
    const PART_ACTIVE = { I:'bg-indigo-100 text-indigo-800 font-bold', II:'bg-cyan-100 text-cyan-800 font-bold', III:'bg-orange-100 text-orange-800 font-bold', IV:'bg-purple-100 text-purple-800 font-bold', V:'bg-teal-100 text-teal-800 font-bold', VI:'bg-rose-100 text-rose-800 font-bold' };

    function findItemById(id) { for (const s of SECTIONS) { const f = s.items.find(i => i.id === id); if (f) return {...f, part: s.part}; } return null; }

    /**
     * GiscusPanel — 마인드맵의 vanilla JS giscus 패널을 React로 재현.
     */
    function GiscusPanel({ term }) {
      const [open, setOpen] = React.useState(false);
      const [width, setWidth] = React.useState(() => Math.min(480, Math.round(window.innerWidth * 0.9)));
      const bodyRef = React.useRef(null);
      const loadedRef = React.useRef(false);

      React.useEffect(() => {
        if (!open || loadedRef.current || !bodyRef.current) return;
        const s = document.createElement('script');
        s.src = 'https://giscus.app/client.js';
        s.async = true;
        s.crossOrigin = 'anonymous';
        s.setAttribute('data-repo', 'HoyoungParkme/tech-roadmap');
        s.setAttribute('data-repo-id', 'R_kgDOSIZCtg');
        s.setAttribute('data-category', 'General');
        s.setAttribute('data-category-id', 'DIC_kwDOSIZCts4C7lgx');
        s.setAttribute('data-mapping', 'specific');
        s.setAttribute('data-term', term);
        s.setAttribute('data-strict', '0');
        s.setAttribute('data-reactions-enabled', '1');
        s.setAttribute('data-emit-metadata', '0');
        s.setAttribute('data-input-position', 'bottom');
        s.setAttribute('data-theme', 'light');
        s.setAttribute('data-lang', 'ko');
        bodyRef.current.appendChild(s);
        loadedRef.current = true;
      }, [open, term]);

      const onResizeStart = (e) => {
        e.preventDefault();
        const startX = e.clientX;
        const startW = width;
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;cursor:ew-resize;';
        document.body.appendChild(overlay);
        const onMove = (ev) => {
          const newW = Math.max(320, Math.min(window.innerWidth * 0.9, startW + (startX - ev.clientX)));
          setWidth(newW);
        };
        const onUp = () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          overlay.remove();
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      };

      const buttonRight = open ? Math.min(width, window.innerWidth - 40) + 'px' : 0;

      return (
        <React.Fragment>
          <button
            onClick={() => setOpen(o => !o)}
            aria-expanded={open}
            aria-label={open ? '댓글 패널 닫기' : '댓글 패널 열기'}
            style={{ position: 'fixed', top: '40%', right: buttonRight, zIndex: 51, writingMode: 'vertical-rl', transition: 'right 0.25s ease' }}
            className="bg-slate-800 text-white px-2 py-3 rounded-l-lg text-sm font-medium shadow-md hover:bg-slate-700"
          >
            💬 {open ? '닫기' : '댓글'}
          </button>
          <div
            role="complementary"
            aria-label="댓글 패널"
            style={{ position: 'fixed', top: 0, right: 0, height: '100vh', width: width + 'px', transform: open ? 'translateX(0)' : 'translateX(100%)', transition: 'transform 0.25s ease', zIndex: 50, background: '#fff', boxShadow: '-4px 0 12px rgba(0,0,0,0.08)' }}
          >
            <div onMouseDown={onResizeStart} style={{ position: 'absolute', left: '-4px', top: 0, width: '8px', height: '100%', cursor: 'ew-resize', zIndex: 52 }} aria-hidden="true" />
            <div className="border-b border-slate-200 px-4 py-3 flex items-center justify-between">
              <span className="font-bold text-slate-800">💬 댓글 / 질문</span>
              <button onClick={() => setOpen(false)} aria-label="댓글 패널 닫기" className="text-slate-500 hover:text-slate-800 px-2">✕</button>
            </div>
            <div ref={bodyRef} className="p-4 overflow-y-auto" style={{ height: 'calc(100vh - 56px)' }} />
          </div>
        </React.Fragment>
      );
    }

    function App() {
      const [activeId, setActiveId] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [expandedParts, setExpandedParts] = useState({I:true,II:true,III:true,IV:true,V:true,VI:true});
      const activeItem = activeId ? findItemById(activeId) : null;
      const navigate = useCallback((id) => { setActiveId(id); window.location.hash = id; if (window.innerWidth < 1024) setSidebarOpen(false); }, []);
      useEffect(() => { const h = window.location.hash.slice(1); if (h && findItemById(h)) setActiveId(h); const onHash = () => { const hh = window.location.hash.slice(1); if (hh && findItemById(hh)) setActiveId(hh); }; window.addEventListener('hashchange', onHash); return () => window.removeEventListener('hashchange', onHash); }, []);

      return (
        <React.Fragment>
        <div className="h-full flex bg-slate-100">
          {sidebarOpen && <div className="fixed inset-0 bg-black bg-opacity-30 z-30 lg:hidden" onClick={() => setSidebarOpen(false)} />}
          <aside className={`fixed lg:static z-40 h-full w-72 bg-white border-r border-slate-200 flex flex-col transition-transform duration-200 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0 lg:w-72'}`}>
            <div className="p-4 border-b border-slate-200 shrink-0">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-indigo-600 text-white flex items-center justify-center rounded-lg font-bold text-sm">LC</div>
                <div><div className="font-bold text-slate-800 text-sm">LangChain 학습</div><div className="text-[11px] text-slate-500">{TOTAL}개 시각화</div></div>
              </div>
            </div>
            <nav className="flex-1 overflow-y-auto p-2">
              {SECTIONS.map(s => (
                <div key={s.part} className="mb-1">
                  <button onClick={() => setExpandedParts(p => ({...p,[s.part]:!p[s.part]}))} className="w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left hover:bg-slate-50 transition">
                    <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold ${s.color}`}>{s.part}</span>
                    <span className="text-xs font-bold text-slate-700 flex-1 truncate">{s.label}</span>
                    <span className="text-[10px] text-slate-400">{s.items.length}</span>
                    <span className={`text-slate-400 text-xs transition-transform ${expandedParts[s.part] ? 'rotate-90' : ''}`}>&#9654;</span>
                  </button>
                  {expandedParts[s.part] && <div className="ml-4 border-l border-slate-100 pl-2 space-y-0.5">
                    {s.items.map(item => <button key={item.id} onClick={() => navigate(item.id)} className={`w-full text-left px-2 py-1.5 rounded-md text-xs transition-all truncate ${activeId === item.id ? PART_ACTIVE[s.part] : `text-slate-600 ${PART_BG[s.part]}`}`}><span className="font-mono text-[10px] opacity-60 mr-1">{item.id}</span>{item.title}</button>)}
                  </div>}
                </div>
              ))}
            </nav>
            <div className="p-3 border-t border-slate-200 shrink-0 text-[10px] text-slate-400 text-center">React + Tailwind + Babel CDN</div>
          </aside>
          <main className="flex-1 flex flex-col min-w-0">
            <div className="h-12 bg-white border-b border-slate-200 flex items-center px-4 shrink-0 gap-3">
              <button onClick={() => setSidebarOpen(p => !p)} className="lg:hidden p-1.5 rounded-md hover:bg-slate-100 text-slate-600"><svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z"/></svg></button>
              {activeItem ? <div className="flex items-center gap-2 min-w-0"><span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold shrink-0 ${SECTIONS.find(s=>s.part===activeItem.part)?.color}`}>{activeItem.part}</span><span className="font-mono text-xs text-slate-500 shrink-0">{activeItem.id}</span><span className="text-sm font-bold text-slate-800 truncate">{activeItem.title}</span></div> : <span className="text-sm text-slate-500">시각화를 선택하세요</span>}
            </div>
            {activeItem ? <iframe key={activeItem.id} src={activeItem.file} className="flex-1 w-full border-0" title={activeItem.title} /> : (
              <div className="flex-1 flex items-center justify-center p-8"><div className="text-center max-w-md">
                <div className="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl font-bold">LC</div>
                <h2 className="text-2xl font-bold text-slate-800 mb-3">LangChain + LangGraph 학습</h2>
                <p className="text-slate-600 mb-6 leading-relaxed">왼쪽 사이드바에서 시각화를 선택하세요.<br/>Part I부터 순서대로 보거나, 관심 있는 주제를 바로 클릭할 수 있습니다.</p>
                <div className="grid grid-cols-6 gap-2 mb-6">{SECTIONS.map(s => <div key={s.part} className="text-center"><div className={`w-8 h-8 rounded-lg text-white text-xs flex items-center justify-center font-bold mx-auto mb-1 ${s.color}`}>{s.part}</div><div className="text-[10px] text-slate-500">{s.items.length}개</div></div>)}</div>
                <p className="text-xs text-slate-400">총 {TOTAL}개 시각화 | React + Tailwind CDN</p>
              </div></div>
            )}
          </main>
        </div>
        <GiscusPanel term="langchain" />
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
