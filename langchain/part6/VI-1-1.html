<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — VI-1-1. RAG 챗봇 (문서 Q&A)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PIPELINE_STEPS_DATA = [
      { id: 'load', icon: '📄', label: 'PDF 로드 + 분할', input: 'PDF 파일', output: '텍스트 청크', color: 'bg-rose-100 border-rose-300 text-rose-800' },
      { id: 'embed', icon: '🔢', label: 'Embedding', input: '텍스트 청크', output: '벡터', color: 'bg-pink-100 border-pink-300 text-pink-800' },
      { id: 'store', icon: '🗄️', label: 'Vector Store', input: '벡터', output: '검색 인덱스', color: 'bg-fuchsia-100 border-fuchsia-300 text-fuchsia-800' },
      { id: 'retrieve', icon: '🔍', label: 'Retriever + RAG Chain', input: '질문', output: '관련 문서 + 답변', color: 'bg-purple-100 border-purple-300 text-purple-800' },
    ];

    const STEPS = [
      {
        desc: "[전체 아키텍처] 회사 매뉴얼 PDF를 업로드하면, 문서를 청크로 분할 → 임베딩 → Vector Store 저장 → 질문 시 관련 청크를 검색해 LLM이 답변합니다. 이것이 RAG(Retrieval-Augmented Generation)입니다.",
        activeChain: -1,
        data: null,
        code: [
          { line: '# RAG 챗봇 전체 흐름', highlight: false },
          { line: '# PDF → 청크 → 임베딩 → Vector Store', highlight: true },
          { line: '#   → 질문 → Retriever → LLM → 답변', highlight: true },
          { line: '', highlight: false },
          { line: '# 핵심: LLM이 모르는 회사 내부 문서를', highlight: false },
          { line: '# "검색"해서 컨텍스트로 제공하는 패턴', highlight: false },
        ],
      },
      {
        desc: "[1단계: PDF 로드 + 분할] PyPDFLoader로 PDF를 읽고, RecursiveCharacterTextSplitter로 500자 단위 청크로 분할합니다. 청크 간 50자 겹침(overlap)으로 문맥 유실을 방지합니다.",
        activeChain: 0,
        data: { input: 'company_manual.pdf (42페이지)', current: '청크 128개 (각 500자, overlap 50자)' },
        code: [
          { line: 'from langchain_community.document_loaders import PyPDFLoader', highlight: false },
          { line: 'from langchain.text_splitter import RecursiveCharacterTextSplitter', highlight: false },
          { line: '', highlight: false },
          { line: '# PDF 로드', highlight: false },
          { line: 'loader = PyPDFLoader("company_manual.pdf")', highlight: true },
          { line: 'pages = loader.load()', highlight: true },
          { line: '', highlight: false },
          { line: '# 청크 분할', highlight: false },
          { line: 'splitter = RecursiveCharacterTextSplitter(', highlight: true },
          { line: '    chunk_size=500, chunk_overlap=50', highlight: true },
          { line: ')', highlight: true },
          { line: 'chunks = splitter.split_documents(pages)', highlight: true },
        ],
      },
      {
        desc: "[2단계: Embedding + Vector Store] 각 청크를 OpenAI Embedding 모델로 벡터화하고, Chroma Vector Store에 저장합니다. 벡터는 텍스트의 의미를 숫자 배열로 표현한 것입니다.",
        activeChain: 1,
        data: { input: '청크 128개', current: '1536차원 벡터 128개 → Chroma DB 저장' },
        code: [
          { line: 'from langchain_openai import OpenAIEmbeddings', highlight: false },
          { line: 'from langchain_community.vectorstores import Chroma', highlight: false },
          { line: '', highlight: false },
          { line: '# 임베딩 모델', highlight: false },
          { line: 'embeddings = OpenAIEmbeddings()', highlight: true },
          { line: '', highlight: false },
          { line: '# Vector Store에 저장', highlight: false },
          { line: 'vectorstore = Chroma.from_documents(', highlight: true },
          { line: '    documents=chunks,', highlight: true },
          { line: '    embedding=embeddings,', highlight: true },
          { line: '    persist_directory="./chroma_db"', highlight: true },
          { line: ')', highlight: true },
        ],
      },
      {
        desc: "[3단계: Retriever + RAG Chain] Vector Store에서 Retriever를 만들고, 프롬프트 + LLM과 결합하여 RAG Chain을 구성합니다. 질문이 들어오면 관련 청크를 검색 → 컨텍스트로 전달 → 답변 생성.",
        activeChain: 2,
        data: { input: 'Retriever (상위 3개 검색)', current: 'RAG Chain 구성 완료' },
        code: [
          { line: 'from langchain_openai import ChatOpenAI', highlight: false },
          { line: 'from langchain_core.prompts import ChatPromptTemplate', highlight: false },
          { line: 'from langchain_core.runnables import RunnablePassthrough', highlight: false },
          { line: '', highlight: false },
          { line: '# Retriever 생성', highlight: false },
          { line: 'retriever = vectorstore.as_retriever(search_kwargs={"k": 3})', highlight: true },
          { line: '', highlight: false },
          { line: '# RAG 프롬프트', highlight: false },
          { line: 'prompt = ChatPromptTemplate.from_template(', highlight: true },
          { line: '    "컨텍스트를 참고하여 답변해줘:\\n{context}\\n\\n질문: {question}"', highlight: true },
          { line: ')', highlight: true },
        ],
      },
      {
        desc: "[4단계: 질문 → 답변] 직원이 \"연차 신청 방법이 뭐야?\"라고 질문하면, Retriever가 관련 청크 3개를 검색하고 LLM이 해당 내용을 바탕으로 정확한 답변을 생성합니다.",
        activeChain: 3,
        data: { input: '질문: "연차 신청 방법이 뭐야?"', current: '답변: "HR 포털 → 근태관리 → 연차신청 메뉴에서..."' },
        code: [
          { line: '# RAG Chain 조합', highlight: false },
          { line: 'rag_chain = (', highlight: true },
          { line: '    {"context": retriever, "question": RunnablePassthrough()}', highlight: true },
          { line: '    | prompt', highlight: true },
          { line: '    | ChatOpenAI(model="gpt-4o-mini")', highlight: true },
          { line: '    | StrOutputParser()', highlight: true },
          { line: ')', highlight: true },
          { line: '', highlight: false },
          { line: '# 실행', highlight: false },
          { line: 'answer = rag_chain.invoke("연차 신청 방법이 뭐야?")', highlight: false },
          { line: '# → "HR 포털 → 근태관리 → 연차신청..."', highlight: false },
        ],
      },
      {
        desc: "[5단계: 출처 표시 + 개선] 답변과 함께 출처(페이지 번호, 섹션)를 표시하면 신뢰도가 높아집니다. 개선 방향: 대화 히스토리 추가, 멀티턴 지원, 재랭킹(Reranker) 도입.",
        activeChain: 3,
        data: { input: '답변 + 출처 문서', current: '출처: 매뉴얼 p.15 "근태관리 규정" 섹션' },
        code: [
          { line: '# 출처 포함 RAG Chain', highlight: false },
          { line: 'from langchain_core.runnables import RunnableParallel', highlight: false },
          { line: '', highlight: false },
          { line: 'rag_with_source = RunnableParallel(', highlight: true },
          { line: '    answer=rag_chain,', highlight: true },
          { line: '    sources=retriever,  # 검색된 문서도 반환', highlight: true },
          { line: ')', highlight: true },
          { line: '', highlight: false },
          { line: '# 개선 방향:', highlight: false },
          { line: '# 1. ConversationBufferMemory로 멀티턴', highlight: false },
          { line: '# 2. Cohere Reranker로 검색 정확도 향상', highlight: false },
          { line: '# 3. HyDE(가설 문서 임베딩) 적용', highlight: false },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-rose-700 hover:text-rose-900 font-medium"><span aria-hidden="true">&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. 실전 프로젝트 &gt; Chapter 1. 프로젝트</div>
                  <h1 className="text-2xl font-bold text-slate-800">VI-1-1. RAG 챗봇 (문서 Q&A)</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>회사 매뉴얼 PDF</b>를 올리면 직원이 질문할 수 있는 챗봇 — PDF를 청크로 분할하고, 임베딩하여 Vector Store에 저장한 뒤, 질문에 맞는 문서를 검색해 답변합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-rose-700 border-rose-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">RAG 챗봇 구축 흐름</h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                <div className="space-y-3">
                  {PIPELINE_STEPS_DATA.map((cs, idx) => (
                    <div key={cs.id} className="relative">
                      <div className={`flex items-center gap-3 p-4 rounded-xl border-2 transition-all duration-500 ${
                        idx <= stepData.activeChain ? cs.color + ' scale-[1.02] shadow-md' :
                        idx === stepData.activeChain + 1 && stepData.activeChain >= 0 ? 'bg-white border-slate-200 opacity-70' :
                        'bg-white border-slate-100 opacity-40'
                      }`}>
                        <span className="text-2xl">{cs.icon}</span>
                        <div className="flex-1">
                          <div className="font-bold text-sm">{cs.label}</div>
                          <div className="text-xs mt-0.5 flex gap-2">
                            <span className="opacity-70">{cs.input}</span>
                            <span>→</span>
                            <span className="font-medium">{cs.output}</span>
                          </div>
                        </div>
                      </div>
                      {idx < PIPELINE_STEPS_DATA.length - 1 && (
                        <div className="text-center text-rose-400 text-lg py-1">↓</div>
                      )}
                    </div>
                  ))}
                </div>

                {stepData.data && (
                  <div className="bg-rose-50 border border-rose-200 rounded-lg p-3 space-y-2">
                    <div className="text-xs"><span className="font-bold text-slate-500">입력:</span> <span className="text-slate-600">{stepData.data.input}</span></div>
                    <div className="text-xs"><span className="font-bold text-rose-600">출력:</span> <span className="text-rose-800 font-medium">{stepData.data.current}</span></div>
                  </div>
                )}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (<div key={i} className={l.highlight ? 'bg-rose-900/40 -mx-4 px-4' : ''}>{l.line || '\u00A0'}</div>))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['PDF', '청크', '임베딩', 'Vector Store', 'RAG Chain', '답변'].map(kw => (<span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-sm font-medium border border-rose-200">{kw}</span>))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-rose-600 hover:bg-rose-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="../part5/V-2-2.html" className="text-rose-600 hover:text-rose-800 font-medium">&larr; V-2-2</a>
              <a href="./VI-1-2.html" className="text-rose-600 hover:text-rose-800 font-medium">VI-1-2. 코드 리뷰 Agent &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
