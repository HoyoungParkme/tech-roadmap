  <div id="root"></div>

  <!--
    VI-1-1. RAG 챗봇 (문서 Q&A) — 종합 프로젝트
    학습 목표: 회사 매뉴얼 PDF를 올리면 직원이 자연어로 질문할 수 있는
              문서 Q&A 챗봇을 5단계 파이프라인으로 만든다.
    핵심 비유: 신입사원에게 두꺼운 사규집을 통째로 외우게 하지 않고,
              "필요할 때 사규집을 찾아보고 답하라"고 시키는 것 — 그게 RAG.
    5 STEPS: Ingest → Store → Retrieve → Generate → Chat UI
    패턴: fastapi v1 — 좌(파이프라인 + 챗봇 mock) / 우(VSCode CodeViewer)
    색상: langchain emerald
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 공통 도메인 데이터 — 단계 누적 시 그대로 재사용
    // ─────────────────────────────────────────────────────
    const INGEST = {
      pdfName: 'company_manual.pdf',
      pdfPages: 42,
      chunks: 128,
      chunkSize: 500,
      overlap: 50,
      sample: [
        { id: 'c-007', page: 4, text: '연차 신청은 HR 포털 > 근태관리 > 연차신청 메뉴에서 진행한다. 승인권자는 직속 팀장…' },
        { id: 'c-018', page: 9, text: '재택근무는 주 2회까지 신청 가능하며, 사전에 팀장 승인을 받아야 한다. 사외 VPN…' },
        { id: 'c-042', page: 21, text: '경조사 휴가는 본인 결혼 5일, 부모/배우자 사망 5일, 형제자매 결혼 1일이 부여된다…' },
      ],
    };
    const STORE = {
      chunks: 128, vectors: 128, dim: 1536, dbName: 'chroma_db',
      model: 'text-embedding-3-small',
      sample: [
        { id: 'c-007', vec: [0.013, -0.082, 0.144, '…', 0.025] },
        { id: 'c-018', vec: [-0.041, 0.117, -0.063, '…', 0.091] },
        { id: 'c-042', vec: [0.085, 0.024, -0.156, '…', -0.011] },
      ],
    };
    const RETRIEVE = {
      query: '연차 신청 어떻게 해?', k: 3,
      retrieved: [
        { id: 'c-007', page: 4, score: 0.89, text: '연차 신청은 HR 포털 > 근태관리 > 연차신청 메뉴…' },
        { id: 'c-042', page: 21, score: 0.71, text: '경조사 휴가는 본인 결혼 5일…' },
        { id: 'c-018', page: 9, score: 0.58, text: '재택근무는 주 2회까지…' },
      ],
    };
    const GENERATE = {
      context: [
        { id: 'c-007', page: 4, text: '연차 신청은 HR 포털 > 근태관리 > 연차신청 메뉴…' },
        { id: 'c-042', page: 21, text: '경조사 휴가는 본인 결혼 5일…' },
        { id: 'c-018', page: 9, text: '재택근무는 주 2회까지…' },
      ],
      model: 'gpt-4o-mini',
      answer: 'HR 포털 > 근태관리 > 연차신청 메뉴에서 신청하시면 됩니다. 승인권자는 직속 팀장입니다.',

    };
    const CHAT = {
      messages: [
        { role: 'user', text: '연차 신청 어떻게 해?' },
        { role: 'assistant',
          text: 'HR 포털 > 근태관리 > 연차신청 메뉴에서 신청하시면 됩니다. 승인권자는 직속 팀장이고, 5일 이상 연속 사용 시 부서장 추가 승인이 필요합니다.',
          sources: [{ page: 4, label: '근태관리 규정 (p.4)' }, { page: 5, label: '근태관리 규정 (p.5)' }] },
        { role: 'user', text: '재택은 며칠까지 돼?' },
        { role: 'assistant',
          text: '재택근무는 주 2회까지 신청 가능하며, 사전에 팀장 승인이 필요합니다. 보안 정책상 사외 VPN 접속 시 2단계 인증을 사용해야 합니다.',
          sources: [{ page: 9, label: '재택근무 규정 (p.9)' }] },
      ],
    };

    // ─────────────────────────────────────────────────────
    // 5단계 STEPS — 각 step 은 활성 stage 만 채우고 이전 단계는 누적
    //   pipelineStage : 0~4 (어느 단계가 활성)
    //   ingest/store/retrieve/generate/chat : 누적 데이터 (null=아직)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Ingest — PDF 로드 + 청크 분할',
        desc: 'PyPDFLoader 로 회사 매뉴얼 PDF(42페이지)를 읽고, RecursiveCharacterTextSplitter 로 500자 단위 청크로 분할한다. 청크 간 50자 overlap 으로 문맥 유실을 방지. 결과: 128개 청크. 신입사원이 사규집을 "찾기 좋게" 색인 카드로 자르는 단계다.',
        pipelineStage: 0,
        ingest: INGEST, store: null, retrieve: null, generate: null, chat: null,
        code: {
          lang: 'python',
          filename: 'ingest.py',
          lines: [
            '# Step 1. Ingest — PDF 로드 + 청크 분할',
            'from langchain_community.document_loaders import PyPDFLoader',
            'from langchain.text_splitter import RecursiveCharacterTextSplitter',
            '',
            '# 1) PDF 로드 — 페이지별 Document 객체로 변환',
            'loader = PyPDFLoader("company_manual.pdf")',
            'pages = loader.load()',
            'print(len(pages))',
            '#  → 42  (회사 매뉴얼 42 페이지)',
            '',
            '# 2) 청크 분할기 — 500자 + overlap 50자',
            '#    overlap 이 있어야 청크 경계에 걸친 문맥이 끊기지 않는다',
            'splitter = RecursiveCharacterTextSplitter(',
            '    chunk_size=500,',
            '    chunk_overlap=50,',
            '    separators=["\\n\\n", "\\n", ". ", " "],',
            ')',
            '',
            '# 3) 분할 실행',
            'chunks = splitter.split_documents(pages)',
            'print(len(chunks))',
            '#  → 128  (42 페이지 → 128 개 청크)',
            '',
            '# 4) 청크 1개 미리보기',
            'print(chunks[7].page_content[:80])',
            '#  → "연차 신청은 HR 포털 > 근태관리 > 연차신청 메뉴에서…"',
            'print(chunks[7].metadata)',
            '#  → {"source": "company_manual.pdf", "page": 4}',
            '',
            '# ⚠ 청크 크기는 trade-off:',
            '#   너무 작으면 — 문맥 부족',
            '#   너무 크면   — 검색 정확도↓ + 토큰 비용↑',
            '#   500자 ± 50 overlap 이 매뉴얼/사규에 가장 무난한 default',
          ],
          highlight: [1, 2, 5, 6, 7, 12, 13, 14, 15, 16, 19, 20],
        },
      },
      {
        title: 'Step 2. Store — Embedding + Chroma 저장',
        desc: '각 청크를 OpenAI text-embedding-3-small 로 벡터화(1536차원)하고 Chroma 벡터 DB 에 저장한다. 임베딩은 텍스트의 "의미"를 숫자 벡터로 표현하는 것 — 비슷한 의미는 가까운 좌표에 모인다. 128 청크 → 128 벡터, 디스크에 영속화되어 다음 실행 때 재계산 불필요.',
        pipelineStage: 1,
        ingest: { ...INGEST, sample: null }, store: STORE,
        retrieve: null, generate: null, chat: null,
        code: {
          lang: 'python',
          filename: 'store.py',
          lines: [
            '# Step 2. Store — Embedding + Chroma 벡터 DB 저장',
            'from langchain_openai import OpenAIEmbeddings',
            'from langchain_community.vectorstores import Chroma',
            '',
            '# 1) 임베딩 모델 — 1536차원 벡터 생성',
            'embeddings = OpenAIEmbeddings(',
            '    model="text-embedding-3-small",',
            ')',
            '',
            '# 2) Chroma 벡터 스토어 생성 + 청크 저장',
            '#    persist_directory 지정 시 디스크에 영속화',
            'vectorstore = Chroma.from_documents(',
            '    documents=chunks,',
            '    embedding=embeddings,',
            '    persist_directory="./chroma_db",',
            ')',
            '',
            '# 3) 내부 동작:',
            '#    for chunk in chunks:',
            '#        vec = embeddings.embed_query(chunk.page_content)',
            '#        chroma.add(id=chunk.id, vector=vec, metadata=chunk.metadata)',
            '',
            '# 4) 저장 결과',
            'print(vectorstore._collection.count())',
            '#  → 128  (청크 1:1 매칭)',
            '',
            '# 5) 다음 실행 시 재로드 — 임베딩 재계산 불필요',
            'vectorstore = Chroma(',
            '    persist_directory="./chroma_db",',
            '    embedding_function=embeddings,',
            ')',
            '',
            '# ✨ 핵심: 의미가 비슷한 청크는 벡터 공간에서 가깝다',
            '#         "연차" ≈ "휴가" 도 의미적으로 가까움 → 검색 가능',
            '',
            '# 💰 비용 메모: text-embedding-3-small ≈ $0.02 / 1M tokens',
            '#              42 페이지 매뉴얼 1회 임베딩 ≈ $0.001 미만',
          ],
          highlight: [1, 2, 5, 6, 7, 11, 12, 13, 14, 15, 23, 24, 25, 28, 29, 30, 31],
        },
      },
      {
        title: 'Step 3. Retrieve — Retriever 생성 + 유사도 검색',
        desc: 'vectorstore.as_retriever(k=3) 로 검색기를 만든다. 직원이 "연차 신청 어떻게 해?" 라고 묻는 순간 — 질문도 임베딩 → 코사인 유사도로 가까운 청크 top-3 회수. 이 단계는 LLM 호출 없이 순수 벡터 검색이다 (싸고 빠름).',
        pipelineStage: 2,
        ingest: { ...INGEST, sample: null },
        store: { ...STORE, sample: null },
        retrieve: RETRIEVE, generate: null, chat: null,
        code: {
          lang: 'python',
          filename: 'retriever.py',
          lines: [
            '# Step 3. Retrieve — Retriever 로 유사 청크 top-k 검색',
            'from langchain_community.vectorstores import Chroma',
            'from langchain_openai import OpenAIEmbeddings',
            '',
            'embeddings = OpenAIEmbeddings(model="text-embedding-3-small")',
            'vectorstore = Chroma(',
            '    persist_directory="./chroma_db",',
            '    embedding_function=embeddings,',
            ')',
            '',
            '# 1) Retriever 만들기 — top-3 결과 회수',
            'retriever = vectorstore.as_retriever(',
            '    search_type="similarity",',
            '    search_kwargs={"k": 3},',
            ')',
            '',
            '# 2) 검색 실행 (LLM 호출 X — 순수 벡터 검색)',
            'docs = retriever.invoke("연차 신청 어떻게 해?")',
            'for d in docs:',
            '    print(d.metadata["page"], d.page_content[:40])',
            '',
            '#  → 4   "연차 신청은 HR 포털 > 근태관리 > 연차신청…"',
            '#  → 21  "경조사 휴가는 본인 결혼 5일…"',
            '#  → 9   "재택근무는 주 2회까지 신청 가능…"',
            '',
            '# 3) 내부 동작:',
            '#    q_vec = embeddings.embed_query("연차 신청 어떻게 해?")',
            '#    chroma.search(q_vec, top_k=3, metric="cosine")',
            '#    → [(c-007, 0.89), (c-042, 0.71), (c-018, 0.58)]',
            '',
            '# 💡 search_type 옵션',
            '#    "similarity"            — 코사인 유사도 (default)',
            '#    "mmr"                   — 다양성↑ (중복 청크 회피)',
            '#    "similarity_score_threshold" — 임계치 미만은 제외',
            '',
            '# ⚙ k 값 trade-off',
            '#    k=1     — 정확하지만 컨텍스트 부족',
            '#    k=3~5   — 가장 무난',
            '#    k=10+   — 노이즈↑ + 토큰 비용↑',
          ],
          highlight: [1, 2, 5, 6, 7, 8, 11, 12, 13, 14, 17, 18, 19, 20],
        },
      },
      {
        title: 'Step 4. Generate — RAG Chain 으로 답변 생성',
        desc: 'LCEL 로 4-stage 체인을 조립한다: {context: retriever, question: passthrough} | prompt | model | parser. 검색된 청크 3개를 prompt 의 {context} 자리에 붙이고 GPT-4o-mini 가 답변을 만든다. LLM 은 매뉴얼을 외운 게 아니라 — 검색된 컨텍스트만 읽고 답한다 (= 환각 억제).',
        pipelineStage: 3,
        ingest: { ...INGEST, sample: null },
        store: { ...STORE, sample: null },
        retrieve: RETRIEVE, generate: GENERATE, chat: null,
        code: {
          lang: 'python',
          filename: 'rag-chain.py',
          lines: [
            '# Step 4. Generate — LCEL 로 RAG Chain 조립 + 답변 생성',
            'from langchain_openai import ChatOpenAI',
            'from langchain_core.prompts import ChatPromptTemplate',
            'from langchain_core.runnables import RunnablePassthrough',
            'from langchain_core.output_parsers import StrOutputParser',
            '',
            '# 1) 프롬프트 — {context} 자리에 검색된 청크가 들어간다',
            'prompt = ChatPromptTemplate.from_template("""',
            '아래 회사 매뉴얼 컨텍스트만 참고해서 답해.',
            '없는 내용은 "매뉴얼에 없습니다" 라고 답할 것.',
            '',
            '컨텍스트:',
            '{context}',
            '',
            '질문: {question}',
            '답변:',
            '""")',
            '',
            '# 2) docs → str 헬퍼 (검색 결과를 컨텍스트 문자열로)',
            'def format_docs(docs):',
            '    return "\\n\\n".join(d.page_content for d in docs)',
            '',
            'model = ChatOpenAI(model="gpt-4o-mini", temperature=0)',
            '',
            '# 3) LCEL — RAG 체인 4-stage',
            'rag_chain = (',
            '    {',
            '        "context": retriever | format_docs,',
            '        "question": RunnablePassthrough(),',
            '    }',
            '    | prompt',
            '    | model',
            '    | StrOutputParser()',
            ')',
            '',
            '# 4) 실행',
            'answer = rag_chain.invoke("연차 신청 어떻게 해?")',
            'print(answer)',
            '#  → "HR 포털 > 근태관리 > 연차신청 메뉴에서 신청하시면',
            '#     됩니다. 승인권자는 직속 팀장입니다."',
            '',
            '# ✨ 환각 억제 메커니즘',
            '#    - LLM 이 매뉴얼을 외운 게 아님',
            '#    - 검색된 컨텍스트만 읽고 답함',
            '#    - 컨텍스트 밖 질문은 "매뉴얼에 없습니다" 응답 유도',
          ],
          highlight: [1, 2, 3, 4, 5, 7, 8, 9, 10, 11, 12, 13, 14, 15, 25, 26, 27, 28, 29, 30, 31, 32, 33, 36, 37, 38],
        },
      },
      {

        pipelineStage: 4,
        ingest: { ...INGEST, sample: null },
        store: { ...STORE, sample: null },
        retrieve: RETRIEVE, generate: GENERATE, chat: CHAT,
        code: {
          lang: 'python',
          filename: 'chatbot-ui.py',
          lines: [
            '# Step 5. Chat UI — Gradio 로 사용자 챗봇 인터페이스',
            'import gradio as gr',
            'from langchain_core.runnables import RunnableParallel',
            '',
            '# 1) 답변 + 출처 동시 반환 — RunnableParallel',
            'rag_with_sources = RunnableParallel(',
            '    answer=rag_chain,',
            '    sources=retriever,   # 검색된 원본 docs 도 함께',
            ')',
            '',
            '# 2) Gradio ChatInterface 핸들러',
            'def chat_fn(message, history):',
            '    result = rag_with_sources.invoke(message)',

            '    pages = sorted({d.metadata["page"] for d in result["sources"]})',

            '    return answer + cite',
            '',
            '# 3) UI 띄우기',
            'demo = gr.ChatInterface(',

            '    description="회사 매뉴얼 기반 자연어 Q&A — 출처 포함",',
            '    examples=["연차 신청 어떻게 해?", "재택은 며칠까지 돼?"],',
            ')',
            '',
            'if __name__ == "__main__":',
            '    demo.launch(server_name="0.0.0.0", server_port=7860)',
            '',
            '# ─── 운영 단계 개선 로드맵 ───',

            '# 3) Cohere Reranker 도입 → 검색 정확도↑',
            '# 4) 출처 클릭 시 PDF 페이지 미리보기 모달',

    //   stage 가 활성/누적/이후 인지에 따라 색상 변화

    const PIPELINE = [

    // PipelineBar — 5-stage 진행 바 (active=강 emerald, done=옅, pending=회색)

        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">

                : isDone
                ? 'bg-emerald-100 border-emerald-300 text-emerald-800'
                : 'bg-slate-50 border-slate-200 text-slate-400';
              return (
                <React.Fragment key={p.id}>
                  <div className={`flex-1 rounded-lg border-2 p-1.5 transition-all duration-500 ${cls}`}>
                    <div className="text-center">
                      <div className="text-base leading-none">{p.icon}</div>

                    <span className={`text-xs font-mono ${i < stage ? 'text-emerald-500' : 'text-slate-300'}`}>→</span>

      );
    }

    // GenerateBox — Step 4: prompt 조립 + 답변 + 인용 출처

    // LiveDataPane — 상단 PipelineBar + 본체(현 stage 박스 active)

    // CodeViewer — VSCode 스타일 highlight.js
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div key={i} className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''}`}>
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">{i + 1}</span>
                      <span className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1" dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }} />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // App 메인
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VI-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. 실전 프로젝트 &gt; Chapter 1. 프로젝트</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VI-1-1. RAG 챗봇 (문서 Q&A)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">사내 매뉴얼 PDF → 청크 → 벡터 DB → 검색 → LLM 답변 → Gradio UI (5-stage 종합 프로젝트)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: <strong>Ingest → Store → Retrieve → Generate → Chat UI</strong> 5-stage 가 RAG 챗봇의 표준 청사진. LangChain LCEL 로 각 단계를 ` | ` 로 합성해 한 줄로 끝낸다. 다음(VI-1-2)에서는 코드 리뷰 Agent 로 — Tool 호출이 추가된 RAG + Agent 패턴을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['PyPDFLoader', 'TextSplitter', 'OpenAIEmbeddings', 'Chroma', 'Retriever', 'RAG Chain', 'LCEL', 'Gradio', '인용 출처'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../part5/V-2-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; V-2-2 LangSmith</a>
              <a href="./VI-1-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">VI-1-2 코드 리뷰 Agent &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
