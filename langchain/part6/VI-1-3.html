          <div className="flex justify-center mb-2">
            <div className={`px-3 py-2 rounded-lg border-2 transition-all duration-500 ${
              step.activeAgent >= 0 || step.completed.length > 0 || step.graphBuilt
                ? 'bg-emerald-700 border-emerald-800 text-white shadow-md scale-105'
                : 'bg-slate-100 border-slate-300 text-slate-500'
            }`}>
              <div className="flex items-center gap-2">
                <span className="text-lg">👔</span>
                <div>
                  <div className="text-[10px] font-bold leading-tight">Supervisor (PM)</div>
                  <div className="text-[8px] opacity-80 leading-tight">라우팅 + 결과 통합</div>
                </div>
              </div>
            </div>
          </div>

          {/* 분기 화살표 */}
          <div className="flex justify-around text-emerald-400 text-base mb-1">
            {AGENTS.map((a) => (
              <span key={a.id} className={isActive(AGENTS.indexOf(a)) ? 'text-emerald-600 font-bold animate-bounce' : ''}>
                ↓
              </span>
            ))}
          </div>

          {/* 4 Agent 박스 grid */}
          <div className="grid grid-cols-4 gap-1.5">
            {AGENTS.map((a, idx) => {
              const active = isActive(idx);
              const done = isDone(idx);
              let cls = 'bg-white border-slate-200 text-slate-500 opacity-60';
              if (active) cls = 'bg-emerald-500 border-emerald-700 text-white ring-2 ring-emerald-300 scale-110 shadow-lg';
              else if (done) cls = 'bg-emerald-100 border-emerald-400 text-emerald-900';
              return (
                <div key={a.id} className={`p-1.5 rounded-lg border-2 transition-all duration-500 ${cls}`}>
                  <div className="flex items-center gap-1 mb-0.5">
                    <span className="text-base">{a.emoji}</span>
                    {done && !active && <span className="text-[8px] bg-emerald-600 text-white px-1 rounded font-bold">✓</span>}
                    {active && <span className="text-[8px] bg-yellow-400 text-emerald-900 px-1 rounded font-bold animate-pulse">RUN</span>}
                  </div>
                  <div className="text-[9px] font-bold leading-tight">{a.label}</div>
                  <div className="text-[7px] opacity-80 leading-tight mt-0.5">{a.role}</div>
                  <div className="text-[7px] mt-1 font-mono opacity-70">
                    {a.tools.map((t) => '·' + t).join(' ')}
                  </div>
                </div>
              );
            })}
          </div>

          {/* 종료 표시 (Step 5) */}
          {step.celebration && (
            <div className="mt-2 text-center text-[10px] text-emerald-700 font-bold animate-pulse">
              ↓ END (final_report 반환) ↓
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중간: 메시지 흐름 — Hand-off 메시지 리스트
    //   from / to / text 표시
    //   user, supervisor, agent, system 4종
    // ─────────────────────────────────────────────────────
    function MessageFlow({ messages, scenario, agentDefs, graphBuilt, report, celebration }) {
      // Step 1 — 시나리오 카드
      if (scenario) {
        return (
          <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">📋</span>
              <span className="text-[11px] font-bold text-emerald-800">시나리오 입력</span>
            </div>
            <div className="bg-white rounded border border-emerald-200 p-2 mb-2">
              <div className="text-[9px] font-bold text-emerald-700 mb-0.5 uppercase tracking-wider">topic</div>
              <div className="text-[11px] text-emerald-900 font-medium">"{scenario.topic}"</div>
            </div>
            <div className="bg-white rounded border border-emerald-200 p-2 mb-2">
              <div className="text-[9px] font-bold text-emerald-700 mb-1 uppercase tracking-wider">예정 단계 (4)</div>
              <div className="flex flex-wrap gap-1">
                {scenario.steps.map((s, i) => (
                  <span key={i} className="text-[9px] bg-emerald-100 text-emerald-800 px-1.5 py-0.5 rounded font-mono">
                    {i + 1}. {s}
                  </span>
                ))}
              </div>
            </div>
            <div className="bg-amber-50 border border-amber-200 rounded p-1.5">
              <div className="text-[9px] text-amber-800 font-medium">⚠ 단일 Agent 한계</div>
              <div className="text-[9px] text-amber-700 mt-0.5">{scenario.why}</div>
            </div>
          </div>
        );
      }

      // Step 2 — Agent 정의 결과
      if (agentDefs) {
        return (
          <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">🛠️</span>
              <span className="text-[11px] font-bold text-emerald-800">Agent 정의 완료</span>
            </div>
            <div className="space-y-1">
              {agentDefs.map((d) => {
                const a = AGENTS[d.idx];
                return (
                  <div key={d.idx} className="bg-white rounded border border-emerald-200 p-1.5 flex items-center gap-2">
                    <span className="text-base">{a.emoji}</span>
                    <div className="flex-1">
                      <div className="text-[10px] font-bold text-emerald-900">{a.label}_agent(state)</div>
                      <div className="text-[8px] text-slate-600">{a.role}</div>
                    </div>
                    <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-bold">
                      ✓ defined
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      // Step 3 — Graph 빌드 결과
      if (graphBuilt) {
        return (
          <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">🔗</span>
              <span className="text-[11px] font-bold text-emerald-800">StateGraph 컴파일 완료</span>
            </div>
            <div className="bg-white rounded border border-emerald-200 p-2 font-mono text-[9px] leading-relaxed">
              <div className="text-emerald-900 font-bold mb-1">graph.compile() →</div>
              <div className="text-slate-700 ml-2">nodes  : 5 (supervisor + 4 agent)</div>
              <div className="text-slate-700 ml-2">edges  : 4 (agent → supervisor) + 1 conditional</div>
              <div className="text-slate-700 ml-2">entry  : "supervisor"</div>
              <div className="text-emerald-700 ml-2 mt-1">
                ▸ supervisor → researcher → supervisor →
              </div>
              <div className="text-emerald-700 ml-4">
                analyst → supervisor → writer →
              </div>
              <div className="text-emerald-700 ml-4">
                supervisor → reviewer → supervisor → END
              </div>
            </div>
          </div>
        );
      }

      // Step 5 — 최종 보고서 + 축하 배지
      if (report) {
        return (
          <div className="space-y-2">
            <div className="bg-emerald-50 border-2 border-emerald-400 rounded-lg p-3">
              <div className="flex items-center gap-1.5 mb-2">
                <span className="text-base">📄</span>
                <span className="text-[11px] font-bold text-emerald-800">{report.title}</span>
                <span className="ml-auto text-[8px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-bold">FINAL</span>
              </div>
              <div className="bg-white rounded border border-emerald-200 p-2 max-h-32 overflow-y-auto">
                {report.sections.map((s, i) => (
                  <div key={i} className="mb-1">
                    <div className="text-[9px] font-bold text-emerald-700">{s.h}</div>
                    <div className="text-[9px] text-slate-700 leading-tight">{s.body}</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="bg-white rounded-lg border border-emerald-200 p-2">
              <div className="text-[9px] font-bold text-emerald-700 mb-1 uppercase tracking-wider">credits</div>
              <div className="space-y-0.5">
                {report.credits.map((c, i) => (
                  <div key={i} className="flex items-center gap-1.5 text-[9px]">
                    <span className="text-base">{AGENTS.find((a) => a.label === c.agent).emoji}</span>
                    <span className="font-bold text-emerald-900 w-16">{c.agent}</span>
                    <span className="text-slate-700 flex-1">{c.work}</span>
                  </div>
                ))}
              </div>
            </div>

            {celebration && (
              <div className="bg-gradient-to-r from-emerald-500 via-emerald-600 to-emerald-700 rounded-lg p-3 text-white shadow-lg border-2 border-emerald-400">
                <div className="text-center">
                  <div className="text-2xl mb-1">🎉</div>
                  <div className="text-[12px] font-bold leading-tight">langchain 29/29 fastapi 패턴 100% 통일</div>
                  <div className="text-[9px] opacity-90 mt-1 leading-tight">
                    Part I~VI · 29 자료 모두 동일 인터랙션<br />
                    좌(LiveDataPane) / 우(VSCode CodeViewer) · emerald + atom-one-dark
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // Step 4 — 메시지 흐름 (hand-off)
      return (
        <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">📨</span>
            <span className="text-[11px] font-bold text-emerald-800">Hand-off 메시지 흐름 (8 turn)</span>
          </div>
          <div className="bg-white rounded border border-emerald-200 p-2 max-h-48 overflow-y-auto space-y-0.5">
            {messages.map((m, i) => {
              const isSupervisor = m.from === 'supervisor' || m.to === 'supervisor';
              const isUser = m.from === 'user' || m.to === 'user';
              let badge = 'bg-slate-200 text-slate-700';
              if (m.from === 'supervisor') badge = 'bg-emerald-700 text-white';
              else if (m.to === 'supervisor') badge = 'bg-emerald-100 text-emerald-800';
              else if (isUser) badge = 'bg-blue-600 text-white';
              return (
                <div key={i} className="flex items-center gap-1 text-[9px] font-mono leading-snug">
                  <span className={`px-1 py-0.5 rounded font-bold w-16 text-center ${badge}`}>
                    {m.from}
                  </span>
                  <span className="text-emerald-500">→</span>
                  <span className="bg-slate-100 text-slate-700 px-1 py-0.5 rounded w-16 text-center font-bold">
                    {m.to}
                  </span>
                  <span className="text-slate-700 flex-1 truncate" title={m.text}>{m.text}</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: Multi-Agent Graph / 하단: 메시지 흐름 or 시나리오 or 보고서
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🏢 Multi-Agent 컨설팅 펌 시뮬레이션</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <MultiAgentGraph step={step} />
            <MessageFlow
              messages={step.messages}
              scenario={step.scenario}
              agentDefs={step.agentDefs}
              graphBuilt={step.graphBuilt}
              report={step.report}
              celebration={step.celebration}
            />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-200"></span>completed
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-700"></span>supervisor
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-blue-500"></span>user
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-slate-300"></span>idle
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    //   파일명 탭: scenario.md / agents.py / supervisor.py / run.py / final-report.md
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VI-1-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. 실전 프로젝트 &gt; Chapter 1. 프로젝트</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VI-1-3. Multi-Agent 워크플로우 — Researcher · Analyst · Writer · Reviewer</h1>
                  <p className="text-sm text-slate-500 mt-0.5">컨설팅 펌처럼 4명의 전문가 Agent가 Supervisor 조율 아래 보고서를 자동 작성한다</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 — 축하 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-gradient-to-r from-emerald-50 via-emerald-100 to-emerald-50 border-2 border-emerald-400 rounded-xl p-4 text-sm text-emerald-900 shadow-md">
                <div className="flex items-center gap-2 mb-1">
                  <span className="text-2xl">🎉</span>
                  <strong className="text-base">langchain 29/29 fastapi 패턴 100% 통일 완료!</strong>
                </div>
                <p className="leading-relaxed">
                  Part I (기초) → Part VI (실전 프로젝트) 까지 <strong>29개 학습 자료</strong>가 모두 fastapi v1 패턴으로 통일됐다.
                  좌측 LiveDataPane(도메인 시각화) + 우측 VSCode CodeViewer(highlight.js + atom-one-dark) +
                  emerald 색상 + 자동재생 3000ms + 키보드 컨트롤 — 일관된 학습 경험.
                </p>
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]">
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Multi-Agent', 'Supervisor', 'StateGraph', 'Hand-off', 'Researcher', 'Analyst', 'Writer', 'Reviewer', 'langgraph'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전 자료 네비 (마지막 자료 — 다음 없음) */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./VI-1-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; VI-1-2 코드 리뷰 Agent</a>
              <span className="text-emerald-700 font-bold">🎉 langchain 커리큘럼 완료 (29/29)</span>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
