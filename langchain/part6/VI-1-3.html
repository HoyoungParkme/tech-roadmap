<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — VI-1-3. Multi-Agent 워크플로우</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PIPELINE_STEPS_DATA = [
      { id: 'research', icon: '🔬', label: 'Research Agent (조사)', input: '주제', output: '조사 자료', color: 'bg-rose-100 border-rose-300 text-rose-800' },
      { id: 'writer', icon: '✍️', label: 'Writer Agent (초안)', input: '조사 자료', output: '초안 문서', color: 'bg-pink-100 border-pink-300 text-pink-800' },
      { id: 'editor', icon: '🔧', label: 'Editor Agent (교정)', input: '초안 문서', output: '교정된 문서', color: 'bg-fuchsia-100 border-fuchsia-300 text-fuchsia-800' },
      { id: 'supervisor', icon: '👔', label: 'Supervisor (통합)', input: '각 Agent 결과', output: '최종 문서', color: 'bg-purple-100 border-purple-300 text-purple-800' },
    ];

    const STEPS = [
      {
        desc: "[단일 Agent 한계] 하나의 Agent가 조사, 작성, 교정을 모두 하면 품질이 떨어집니다. 사람처럼 역할을 분담하면 — 조사 전문가, 작성자, 편집자가 협력하면 더 좋은 결과를 얻습니다.",
        activeChain: -1,
        data: null,
        code: [
          { line: '# 단일 Agent의 한계', highlight: false },
          { line: '# - 조사 + 작성 + 교정을 한 번에 시키면', highlight: false },
          { line: '#   깊이가 부족하고 품질이 불균일', highlight: false },
          { line: '', highlight: false },
          { line: '# Multi-Agent 해결책:', highlight: true },
          { line: '# Research → Writer → Editor', highlight: true },
          { line: '# 각자 전문 역할에 집중!', highlight: true },
          { line: '# Supervisor가 전체 흐름을 조율', highlight: false },
        ],
      },
      {
        desc: "[역할 분담 설계] 3개 Agent + Supervisor 구조입니다. Research Agent는 웹 검색/자료 수집, Writer Agent는 초안 작성, Editor Agent는 문법/논리 교정. Supervisor가 순서를 결정합니다.",
        activeChain: -1,
        data: null,
        code: [
          { line: 'from typing import TypedDict, Literal', highlight: false },
          { line: 'from langgraph.graph import StateGraph, END', highlight: false },
          { line: '', highlight: false },
          { line: 'class DocState(TypedDict):', highlight: true },
          { line: '    topic: str           # 주제', highlight: true },
          { line: '    research: str        # 조사 결과', highlight: true },
          { line: '    draft: str           # 초안', highlight: true },
          { line: '    final_doc: str       # 최종 문서', highlight: true },
          { line: '    next_agent: str      # 다음 실행할 Agent', highlight: true },
        ],
      },
      {
        desc: "[Research Agent] 주어진 주제에 대해 웹 검색 도구(Tavily)를 사용하여 관련 자료를 수집합니다. 핵심 정보를 요약하고 출처와 함께 State에 저장합니다.",
        activeChain: 0,
        data: { input: '주제: "2024 AI 트렌드 보고서"', current: '조사 자료 5개 수집 (출처 포함)' },
        code: [
          { line: 'from langchain_community.tools.tavily_search import TavilySearchResults', highlight: false },
          { line: 'from langchain_openai import ChatOpenAI', highlight: false },
          { line: '', highlight: false },
          { line: 'def research_agent(state: DocState) -> DocState:', highlight: false },
          { line: '    """주제에 대해 웹 검색으로 자료를 수집한다"""', highlight: false },
          { line: '    search = TavilySearchResults(max_results=5)', highlight: true },
          { line: '    results = search.invoke(state["topic"])', highlight: true },
          { line: '', highlight: false },
          { line: '    model = ChatOpenAI(model="gpt-4o-mini")', highlight: false },
          { line: '    summary = model.invoke(', highlight: false },
          { line: '        "다음 검색 결과를 요약해줘: " + str(results)', highlight: false },
          { line: '    )', highlight: false },
          { line: '    return {"research": summary.content}', highlight: false },
        ],
      },
      {
        desc: "[Writer Agent] Research Agent가 수집한 자료를 바탕으로 구조화된 초안을 작성합니다. 서론, 본론(섹션별), 결론 형식으로 문서를 구성합니다.",
        activeChain: 1,
        data: { input: '조사 자료 5개', current: '초안 문서 (서론/본론/결론, 약 2000자)' },
        code: [
          { line: 'def writer_agent(state: DocState) -> DocState:', highlight: false },
          { line: '    """조사 자료를 바탕으로 초안을 작성한다"""', highlight: false },
          { line: '    prompt = ChatPromptTemplate.from_template(', highlight: true },
          { line: '        """다음 조사 자료를 바탕으로 보고서 초안을 작성해줘.', highlight: true },
          { line: '        구조: 서론, 본론(핵심 트렌드별 섹션), 결론', highlight: true },
          { line: '        조사 자료:\\n{research}"""', highlight: true },
          { line: '    )', highlight: true },
          { line: '    model = ChatOpenAI(model="gpt-4o-mini")', highlight: false },
          { line: '    chain = prompt | model | StrOutputParser()', highlight: false },
          { line: '    draft = chain.invoke({"research": state["research"]})', highlight: false },
          { line: '    return {"draft": draft}', highlight: false },
        ],
      },
      {
        desc: "[Editor Agent] Writer Agent의 초안을 검토하고 교정합니다. 문법 오류, 논리적 비약, 중복 표현을 수정하고, 가독성을 높입니다.",
        activeChain: 2,
        data: { input: '초안 문서 (약 2000자)', current: '교정 완료: 문법 수정 3건, 논리 보완 2건' },
        code: [
          { line: 'def editor_agent(state: DocState) -> DocState:', highlight: false },
          { line: '    """초안을 교정하고 최종 문서를 만든다"""', highlight: false },
          { line: '    prompt = ChatPromptTemplate.from_template(', highlight: true },
          { line: '        """다음 초안을 교정해줘.', highlight: true },
          { line: '        - 문법 오류 수정', highlight: true },
          { line: '        - 논리적 비약 보완', highlight: true },
          { line: '        - 중복 표현 제거', highlight: true },
          { line: '        초안:\\n{draft}"""', highlight: true },
          { line: '    )', highlight: true },
          { line: '    model = ChatOpenAI(model="gpt-4o-mini")', highlight: false },
          { line: '    chain = prompt | model | StrOutputParser()', highlight: false },
          { line: '    final_doc = chain.invoke({"draft": state["draft"]})', highlight: false },
          { line: '    return {"final_doc": final_doc}', highlight: false },
        ],
      },
      {
        desc: "[Supervisor 통합] Supervisor가 전체 워크플로우를 조율합니다. Research → Writer → Editor 순서로 실행하고, 필요하면 재조사를 지시할 수도 있습니다. 최종 결과물은 완성된 보고서입니다.",
        activeChain: 3,
        data: { input: '주제: "2024 AI 트렌드 보고서"', current: '최종 보고서 완성 (조사→초안→교정 완료)' },
        code: [
          { line: '# Supervisor: 다음 실행할 Agent를 결정', highlight: false },
          { line: 'def supervisor(state: DocState) -> DocState:', highlight: false },
          { line: '    if not state.get("research"):', highlight: true },
          { line: '        return {"next_agent": "research"}', highlight: true },
          { line: '    elif not state.get("draft"):', highlight: true },
          { line: '        return {"next_agent": "writer"}', highlight: true },
          { line: '    elif not state.get("final_doc"):', highlight: true },
          { line: '        return {"next_agent": "editor"}', highlight: true },
          { line: '    return {"next_agent": "done"}', highlight: true },
          { line: '', highlight: false },
          { line: '# 그래프 구성', highlight: false },
          { line: 'graph = StateGraph(DocState)', highlight: false },
          { line: 'graph.add_node("supervisor", supervisor)', highlight: false },
          { line: 'graph.add_node("research", research_agent)', highlight: false },
          { line: 'graph.add_node("writer", writer_agent)', highlight: false },
          { line: 'graph.add_node("editor", editor_agent)', highlight: false },
          { line: '', highlight: false },
          { line: 'app = graph.compile()', highlight: false },
          { line: 'result = app.invoke({"topic": "2024 AI 트렌드"})', highlight: false },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-rose-700 hover:text-rose-900 font-medium"><span aria-hidden="true">&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. 실전 프로젝트 &gt; Chapter 1. 프로젝트</div>
                  <h1 className="text-2xl font-bold text-slate-800">VI-1-3. Multi-Agent 워크플로우</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>Research → Writer → Editor</b> — 3개 전문 Agent가 협력하여 최종 문서를 완성하는 Multi-Agent 워크플로우입니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-rose-700 border-rose-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">Multi-Agent 워크플로우 흐름</h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                <div className="space-y-3">
                  {PIPELINE_STEPS_DATA.map((cs, idx) => (
                    <div key={cs.id} className="relative">
                      <div className={`flex items-center gap-3 p-4 rounded-xl border-2 transition-all duration-500 ${
                        idx <= stepData.activeChain ? cs.color + ' scale-[1.02] shadow-md' :
                        idx === stepData.activeChain + 1 && stepData.activeChain >= 0 ? 'bg-white border-slate-200 opacity-70' :
                        'bg-white border-slate-100 opacity-40'
                      }`}>
                        <span className="text-2xl">{cs.icon}</span>
                        <div className="flex-1">
                          <div className="font-bold text-sm">{cs.label}</div>
                          <div className="text-xs mt-0.5 flex gap-2">
                            <span className="opacity-70">{cs.input}</span>
                            <span>→</span>
                            <span className="font-medium">{cs.output}</span>
                          </div>
                        </div>
                      </div>
                      {idx < PIPELINE_STEPS_DATA.length - 1 && (
                        <div className="text-center text-rose-400 text-lg py-1">↓</div>
                      )}
                    </div>
                  ))}
                </div>

                {stepData.data && (
                  <div className="bg-rose-50 border border-rose-200 rounded-lg p-3 space-y-2">
                    <div className="text-xs"><span className="font-bold text-slate-500">입력:</span> <span className="text-slate-600">{stepData.data.input}</span></div>
                    <div className="text-xs"><span className="font-bold text-rose-600">출력:</span> <span className="text-rose-800 font-medium">{stepData.data.current}</span></div>
                  </div>
                )}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (<div key={i} className={l.highlight ? 'bg-rose-900/40 -mx-4 px-4' : ''}>{l.line || '\u00A0'}</div>))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Multi-Agent', 'Supervisor', '역할 분담', '결과 종합'].map(kw => (<span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-sm font-medium border border-rose-200">{kw}</span>))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-rose-600 hover:bg-rose-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./VI-1-2.html" className="text-rose-600 hover:text-rose-800 font-medium">&larr; VI-1-2. 코드 리뷰 Agent</a>
              <span className="text-rose-600 font-bold">전체 커리큘럼 완료!</span>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
