            '소스에 시크릿이 박혀 git history 로 영구 노출. `.env` 로 분리하세요.',
            '```python',
            'import os',
            'SECRET_KEY = os.getenv("SECRET_KEY")',
            'assert SECRET_KEY, "SECRET_KEY env 누락"',
            '```',
            '',
            '### 🟡 [Medium · 스타일] bare except — 모든 예외를 삼킴',
            '**위치**: `app/auth.py:20`',
            '```python',
            '# Before',
            'except:',
            '    return {"error": "fail"}',
            '# After',
            'except jwt.PyJWTError as e:',
            '    logger.exception("jwt encode failed")',
            '    raise HTTPException(500) from e',
            '```',
            '',
            '### ⚪ [Low · 테스트] login 엔드포인트 테스트 부재',
            '**위치**: `tests/test_auth.py`',
            'pytest collected 0 items — 새 엔드포인트인데 테스트가 전혀 없습니다.',
            'TestClient 로 정상/비정상 최소 2건 추가하세요.',
            '',
            '---',
            '_review_agent v0.4 · 3 tool calls · 9.2s_',
          ],
          highlight: [2, 3, 5, 6, 7, 8, 10, 11, 13, 14, 15, 16, 19, 20, 21, 23, 24, 25, 28, 29, 32, 35, 36, 37, 40, 41, 42, 43],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측-1: PR Diff 박스
    //   stage 'diff' 단계에서만 활성 강조
    //   추가/삭제/컨텍스트 라인 색상 구분
    // ─────────────────────────────────────────────────────
    function DiffBox({ active }) {
      return (
        <div className={`bg-white rounded-lg border-2 p-3 transition-all duration-500 ${
          active ? 'border-emerald-400 shadow-md' : 'border-slate-200 opacity-90'
        }`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📥</span>
              <span className="text-[11px] font-bold text-emerald-800">PR #{PR_META.number} · {PR_META.title}</span>
            </div>
            <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">
              +{PR_META.additions} / -{PR_META.deletions} · {PR_META.files} files
            </span>
          </div>
          <div className="bg-slate-900 rounded p-2 overflow-x-auto max-h-44 text-[9px] font-mono leading-snug">
            {DIFF_LINES.map((d, i) => {
              let cls = 'text-slate-400';
              let prefix = '   ';
              if (d.type === 'add')   { cls = 'text-emerald-300 bg-emerald-900/30'; prefix = '+  '; }
              if (d.type === 'del')   { cls = 'text-red-300 bg-red-900/30';         prefix = '-  '; }
              if (d.type === 'meta')  { cls = 'text-purple-300 italic';             prefix = '   '; }
              if (d.type === 'ctx')   { cls = 'text-slate-300';                     prefix = '   '; }
              return (
                <div key={i} className={`px-1 ${cls} whitespace-pre`}>
                  <span className="text-slate-500 select-none">{d.ln ? String(d.ln).padStart(3, ' ') : '   '}</span>
                  <span className="ml-1">{prefix}</span>
                  <span>{d.text}</span>
                </div>
              );
            })}
          </div>
          <div className="text-[9px] text-slate-500 mt-1.5 font-mono">
            base: <span className="text-slate-700">{PR_META.base}</span> ← head: <span className="text-emerald-700">{PR_META.head}</span> · author {PR_META.author}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측-2: Agent 박스 (ReAct 사이클 누적)
    //   reactSteps 배열 길이만큼 thought/action/observation 카드 표출
    // ─────────────────────────────────────────────────────
    function AgentBox({ status, reactSteps }) {
      const statusBadge = {
        idle:     { label: 'idle',     cls: 'bg-slate-200 text-slate-600' },
        ready:    { label: 'ready',    cls: 'bg-amber-200 text-amber-800' },
        thinking: { label: 'thinking', cls: 'bg-emerald-600 text-white animate-pulse' },
        done:     { label: 'done ✓',   cls: 'bg-emerald-500 text-white' },
      }[status] || { label: status, cls: 'bg-slate-200 text-slate-600' };

      return (
        <div className="bg-white rounded-lg border-2 border-emerald-300 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🤖</span>
              <span className="text-[11px] font-bold text-emerald-800">ReAct Agent (LangGraph)</span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${statusBadge.cls}`}>
              {statusBadge.label}
            </span>
          </div>

          {reactSteps.length === 0 ? (
            <div className="bg-slate-50 rounded border border-dashed border-slate-300 p-2 text-center">
              <div className="text-[10px] text-slate-500 italic">
                {status === 'idle'  && '입력 대기 중 — diff 와 prompt 구성'}
                {status === 'ready' && 'graph 컴파일 완료. invoke() 대기 중…'}
              </div>
            </div>
          ) : (
            <div className="space-y-1.5 max-h-56 overflow-y-auto pr-1">
              {reactSteps.map((idx) => {
                const cyc = REACT_TIMELINE[idx];
                return (
                  <div key={idx} className="border border-emerald-200 rounded p-1.5 bg-emerald-50/40">
                    <div className="flex items-center gap-1 mb-1">
                      <span className="text-[8px] bg-emerald-700 text-white px-1 rounded font-bold">cycle #{idx + 1}</span>
                    </div>
                    <div className="space-y-1 text-[9px] leading-snug">
                      <div className="flex gap-1">
                        <span className="font-bold text-purple-700 w-14 flex-shrink-0">💭 Thought</span>
                        <span className="text-slate-700">{cyc.thought}</span>
                      </div>
                      <div className="flex gap-1">
                        <span className="font-bold text-blue-700 w-14 flex-shrink-0">⚡ Action</span>
                        <span className="font-mono text-blue-900">
                          {cyc.action.tool}(<span className="text-blue-600">"{cyc.action.input}"</span>)
                        </span>
                      </div>
                      <div className="flex gap-1">
                        <span className="font-bold text-emerald-700 w-14 flex-shrink-0">👁 Observ</span>
                        <span className="text-emerald-900 font-mono">{cyc.observation}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측-3: Tools 박스
    //   toolsActive 배열에 들어간 도구만 emerald 강조
    // ─────────────────────────────────────────────────────
    function ToolsBox({ active, stage }) {
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🧰</span>
              <span className="text-[11px] font-bold text-emerald-800">Tool Catalog (3)</span>
            </div>
            <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">
              @tool decorated
            </span>
          </div>
          <div className="grid grid-cols-3 gap-1.5">
            {TOOL_CATALOG.map((t) => {
              const isActive = active.includes(t.name);
              return (
                <div
                  key={t.name}
                  className={`rounded border-2 p-1.5 transition-all duration-500 ${
                    isActive
                      ? 'bg-emerald-50 border-emerald-400 shadow-sm'
                      : 'bg-slate-50 border-slate-200 opacity-60'
                  }`}
                >
                  <div className="flex items-center gap-1 mb-0.5">
                    <span className="text-sm">{t.icon}</span>
                    <span className={`text-[10px] font-mono font-bold ${isActive ? 'text-emerald-800' : 'text-slate-500'}`}>
                      {t.name}
                    </span>
                  </div>
                  <div className={`text-[8px] leading-tight ${isActive ? 'text-emerald-700' : 'text-slate-500'}`}>
                    {t.desc}
                  </div>
                </div>
              );
            })}
          </div>
          {stage === 'tools' && (
            <div className="text-[9px] text-emerald-700 mt-1.5">
              ✓ TOOLS = [read_file, run_tests, lint] — Agent 에 바인딩 완료
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측-4: 이슈 카드 (severity별 색상)
    //   shownIssues 배열에 들어간 이슈만 표시
    // ─────────────────────────────────────────────────────
    function IssueCards({ shown, withComments }) {
      if (shown.length === 0) {
        return (
          <div className="bg-slate-50 border-2 border-dashed border-slate-300 rounded-lg p-3 text-center">
            <div className="text-[10px] text-slate-500 italic">아직 발견된 이슈 없음 — Agent 실행 후 표시됩니다</div>
          </div>
        );
      }

      const palette = {
        critical: { bg: 'bg-red-50',     border: 'border-red-400',     pill: 'bg-red-600 text-white',     text: 'text-red-800',     dot: '🔴' },
        high:     { bg: 'bg-orange-50',  border: 'border-orange-400',  pill: 'bg-orange-600 text-white',  text: 'text-orange-800',  dot: '🟠' },
        medium:   { bg: 'bg-amber-50',   border: 'border-amber-400',   pill: 'bg-amber-600 text-white',   text: 'text-amber-800',   dot: '🟡' },
        low:      { bg: 'bg-slate-50',   border: 'border-slate-400',   pill: 'bg-slate-500 text-white',   text: 'text-slate-700',   dot: '⚪' },
      };

      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📋</span>
              <span className="text-[11px] font-bold text-emerald-800">
                {withComments ? '리뷰 코멘트 (4)' : '발견된 이슈 (4)'}
              </span>
            </div>
            <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
              {shown.length} / 4
            </span>
          </div>
          <div className="space-y-1.5">
            {ISSUES.filter((i) => shown.includes(i.id)).map((issue) => {
              const p = palette[issue.severity];
              return (
                <div key={issue.id} className={`rounded border-l-4 ${p.border} ${p.bg} p-1.5 transition-all duration-500`}>
                  <div className="flex items-center gap-1.5 mb-0.5">
                    <span className="text-[11px]">{p.dot}</span>
                    <span className={`text-[8px] font-bold uppercase px-1 py-0.5 rounded ${p.pill}`}>
                      {issue.severity}
                    </span>
                    <span className={`text-[8px] font-bold uppercase ${p.text}`}>{issue.category}</span>
                    <span className="text-[8px] font-mono text-slate-500 ml-auto">{issue.file}</span>
                  </div>
                  <div className={`text-[10px] font-bold leading-tight ${p.text}`}>{issue.title}</div>
                  {withComments && (
                    <div className="text-[9px] text-slate-700 mt-1 leading-tight">
                      <span className="font-bold text-emerald-700">→ 제안: </span>{issue.suggest}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          {withComments && (
            <div className="text-[9px] text-emerald-700 mt-1.5">
              ✓ comments.md 마크다운 생성 완료 — PyGithub 로 자동 게시 가능
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   stage 별로 활성 박스만 강조하지만 모든 박스가 누적 표시됨
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🤖 코드 리뷰 Agent — 실행 시뮬레이션</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2.5">
            <DiffBox active={step.stage === 'diff'} />
            <ToolsBox active={step.toolsActive} stage={step.stage} />
            <AgentBox status={step.agentStatus} reactSteps={step.reactSteps} />
            <IssueCards shown={step.shownIssues} withComments={step.shownComments.length > 0} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span>🔴</span>critical</span>
            <span className="flex items-center gap-1"><span>🟠</span>high</span>
            <span className="flex items-center gap-1"><span>🟡</span>medium</span>
            <span className="flex items-center gap-1"><span>⚪</span>low</span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>active stage
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VI-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. 실전 프로젝트 &gt; Chapter 1. 종합</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VI-1-2. 코드 리뷰 Agent — 종합 프로젝트</h1>
                  <p className="text-sm text-slate-500 mt-0.5">PR diff → ReAct Agent + Tools 3종 → severity별 자동 코멘트 생성</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: 코드 리뷰 Agent = <strong>ReAct 패턴</strong> + <strong>Tool 3종(read_file/run_tests/lint)</strong> + <strong>severity 라벨링</strong>. LangGraph create_react_agent 한 줄로 그래프가 완성되고, 결과는 PyGithub로 PR에 자동 게시 가능. 다음(VI-1-3)에서는 여러 Agent가 협업하는 Multi-Agent 워크플로우를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
