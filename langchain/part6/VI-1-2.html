<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — VI-1-2. 코드 리뷰 Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PIPELINE_STEPS_DATA = [
      { id: 'load', icon: '📥', label: '코드 로드 (GitHub API)', input: 'PR URL', output: '변경된 코드', color: 'bg-rose-100 border-rose-300 text-rose-800' },
      { id: 'analyze', icon: '🔍', label: '분석 Node', input: '변경된 코드', output: '버그/스타일/보안 이슈', color: 'bg-pink-100 border-pink-300 text-pink-800' },
      { id: 'review', icon: '📝', label: '리뷰 생성 Node', input: '분석 결과', output: '리뷰 코멘트', color: 'bg-fuchsia-100 border-fuchsia-300 text-fuchsia-800' },
      { id: 'graph', icon: '🔄', label: 'LangGraph 실행', input: '전체 State', output: '최종 리뷰 리포트', color: 'bg-purple-100 border-purple-300 text-purple-800' },
    ];

    const STEPS = [
      {
        desc: "[코드 리뷰 Agent 개요] GitHub PR의 변경 코드를 자동으로 읽고 → 버그, 스타일, 보안 이슈를 분석 → 리뷰 코멘트를 생성하는 Agent입니다. LangGraph로 각 단계를 Node로 구성합니다.",
        activeChain: -1,
        data: null,
        code: [
          { line: '# 코드 리뷰 Agent 아키텍처', highlight: false },
          { line: '# GitHub PR → 코드 로드 → 분석 → 리뷰 생성', highlight: true },
          { line: '', highlight: false },
          { line: '# LangGraph Node 구성:', highlight: false },
          { line: '# [load_code] → [analyze] → [generate_review]', highlight: true },
          { line: '', highlight: false },
          { line: '# 각 Node는 독립적으로 동작하며', highlight: false },
          { line: '# State를 통해 데이터를 전달합니다', highlight: false },
        ],
      },
      {
        desc: "[1단계: 코드 로드] GitHub API를 사용해 PR의 변경된 파일과 diff를 가져옵니다. requests 라이브러리로 GitHub REST API를 호출하고, 변경된 코드를 State에 저장합니다.",
        activeChain: 0,
        data: { input: 'PR #42: feat/add-user-auth', current: '변경 파일 5개, diff 320줄' },
        code: [
          { line: 'import requests', highlight: false },
          { line: 'from typing import TypedDict', highlight: false },
          { line: '', highlight: false },
          { line: 'class ReviewState(TypedDict):', highlight: true },
          { line: '    pr_url: str', highlight: true },
          { line: '    code_diff: str', highlight: true },
          { line: '    issues: list[str]', highlight: true },
          { line: '    review_comments: str', highlight: true },
          { line: '', highlight: false },
          { line: 'def load_code(state: ReviewState) -> ReviewState:', highlight: false },
          { line: '    """GitHub API로 PR diff를 가져온다"""', highlight: false },
          { line: '    headers = {"Authorization": "token <GITHUB_TOKEN>"}', highlight: false },
          { line: '    resp = requests.get(state["pr_url"], headers=headers)', highlight: false },
          { line: '    return {"code_diff": resp.text}', highlight: false },
        ],
      },
      {
        desc: "[2단계: 분석 Node] LLM이 코드 diff를 읽고 버그, 스타일 위반, 보안 취약점을 분석합니다. 구조화된 프롬프트로 카테고리별 이슈를 JSON으로 추출합니다.",
        activeChain: 1,
        data: { input: 'diff 320줄', current: '버그 2건, 스타일 3건, 보안 1건 발견' },
        code: [
          { line: 'from langchain_openai import ChatOpenAI', highlight: false },
          { line: 'from langchain_core.prompts import ChatPromptTemplate', highlight: false },
          { line: '', highlight: false },
          { line: 'def analyze_code(state: ReviewState) -> ReviewState:', highlight: false },
          { line: '    prompt = ChatPromptTemplate.from_template(', highlight: true },
          { line: '        """다음 코드 diff를 분석하고 이슈를 찾아줘.', highlight: true },
          { line: '        카테고리: 버그, 스타일, 보안', highlight: true },
          { line: '        코드:\\n{code_diff}"""', highlight: true },
          { line: '    )', highlight: true },
          { line: '    model = ChatOpenAI(model="gpt-4o-mini")', highlight: false },
          { line: '    chain = prompt | model | StrOutputParser()', highlight: false },
          { line: '    issues = chain.invoke({"code_diff": state["code_diff"]})', highlight: false },
          { line: '    return {"issues": issues.split("\\n")}', highlight: false },
        ],
      },
      {
        desc: "[3단계: 리뷰 생성 Node] 분석된 이슈 목록을 바탕으로, 개발자 친화적인 리뷰 코멘트를 생성합니다. 각 이슈에 대해 문제점, 제안, 코드 예시를 포함합니다.",
        activeChain: 2,
        data: { input: '이슈 6건 (버그 2, 스타일 3, 보안 1)', current: '리뷰 코멘트 6개 생성 완료' },
        code: [
          { line: 'def generate_review(state: ReviewState) -> ReviewState:', highlight: false },
          { line: '    prompt = ChatPromptTemplate.from_template(', highlight: true },
          { line: '        """다음 이슈들에 대해 리뷰 코멘트를 작성해줘.', highlight: true },
          { line: '        각 코멘트에 문제점, 제안, 수정 예시를 포함.', highlight: true },
          { line: '        이슈 목록:\\n{issues}"""', highlight: true },
          { line: '    )', highlight: true },
          { line: '    model = ChatOpenAI(model="gpt-4o-mini")', highlight: false },
          { line: '    chain = prompt | model | StrOutputParser()', highlight: false },
          { line: '    issues_text = "\\n".join(state["issues"])', highlight: false },
          { line: '    comments = chain.invoke({"issues": issues_text})', highlight: false },
          { line: '    return {"review_comments": comments}', highlight: false },
        ],
      },
      {
        desc: "[4단계: LangGraph 그래프 구조] StateGraph로 3개 Node를 연결합니다. load_code → analyze_code → generate_review 순서로 실행되며, 각 Node는 State를 공유합니다.",
        activeChain: 3,
        data: null,
        code: [
          { line: 'from langgraph.graph import StateGraph, END', highlight: false },
          { line: '', highlight: false },
          { line: '# 그래프 생성', highlight: false },
          { line: 'graph = StateGraph(ReviewState)', highlight: true },
          { line: '', highlight: false },
          { line: '# Node 추가', highlight: false },
          { line: 'graph.add_node("load_code", load_code)', highlight: true },
          { line: 'graph.add_node("analyze_code", analyze_code)', highlight: true },
          { line: 'graph.add_node("generate_review", generate_review)', highlight: true },
          { line: '', highlight: false },
          { line: '# Edge 연결', highlight: false },
          { line: 'graph.set_entry_point("load_code")', highlight: false },
          { line: 'graph.add_edge("load_code", "analyze_code")', highlight: false },
          { line: 'graph.add_edge("analyze_code", "generate_review")', highlight: false },
          { line: 'graph.add_edge("generate_review", END)', highlight: false },
        ],
      },
      {
        desc: "[5단계: 실행 결과] 그래프를 컴파일하고 PR URL을 넣으면, 자동으로 코드를 읽고 → 분석 → 리뷰 코멘트까지 생성합니다. 실제 GitHub에 코멘트를 달 수도 있습니다.",
        activeChain: 3,
        data: { input: 'PR #42 실행', current: '리뷰 완료: 버그 2건(Critical), 보안 1건(High)' },
        code: [
          { line: '# 컴파일 및 실행', highlight: false },
          { line: 'app = graph.compile()', highlight: true },
          { line: '', highlight: false },
          { line: 'result = app.invoke({', highlight: true },
          { line: '    "pr_url": "https://api.github.com/repos/.../pulls/42",', highlight: true },
          { line: '    "code_diff": "",', highlight: true },
          { line: '    "issues": [],', highlight: true },
          { line: '    "review_comments": ""', highlight: true },
          { line: '})', highlight: true },
          { line: '', highlight: false },
          { line: 'print(result["review_comments"])', highlight: false },
          { line: '# → "1. [Bug] SQL Injection 위험: ..."', highlight: false },
          { line: '# → "2. [Style] 함수명 snake_case 위반: ..."', highlight: false },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-rose-700 hover:text-rose-900 font-medium"><span aria-hidden="true">&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. 실전 프로젝트 &gt; Chapter 1. 프로젝트</div>
                  <h1 className="text-2xl font-bold text-slate-800">VI-1-2. 코드 리뷰 Agent</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>GitHub PR 코드</b>를 읽고 버그/개선점을 분석하여 리뷰 코멘트를 자동 생성하는 LangGraph Agent입니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-rose-700 border-rose-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">코드 리뷰 Agent 흐름</h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                <div className="space-y-3">
                  {PIPELINE_STEPS_DATA.map((cs, idx) => (
                    <div key={cs.id} className="relative">
                      <div className={`flex items-center gap-3 p-4 rounded-xl border-2 transition-all duration-500 ${
                        idx <= stepData.activeChain ? cs.color + ' scale-[1.02] shadow-md' :
                        idx === stepData.activeChain + 1 && stepData.activeChain >= 0 ? 'bg-white border-slate-200 opacity-70' :
                        'bg-white border-slate-100 opacity-40'
                      }`}>
                        <span className="text-2xl">{cs.icon}</span>
                        <div className="flex-1">
                          <div className="font-bold text-sm">{cs.label}</div>
                          <div className="text-xs mt-0.5 flex gap-2">
                            <span className="opacity-70">{cs.input}</span>
                            <span>→</span>
                            <span className="font-medium">{cs.output}</span>
                          </div>
                        </div>
                      </div>
                      {idx < PIPELINE_STEPS_DATA.length - 1 && (
                        <div className="text-center text-rose-400 text-lg py-1">↓</div>
                      )}
                    </div>
                  ))}
                </div>

                {stepData.data && (
                  <div className="bg-rose-50 border border-rose-200 rounded-lg p-3 space-y-2">
                    <div className="text-xs"><span className="font-bold text-slate-500">입력:</span> <span className="text-slate-600">{stepData.data.input}</span></div>
                    <div className="text-xs"><span className="font-bold text-rose-600">출력:</span> <span className="text-rose-800 font-medium">{stepData.data.current}</span></div>
                  </div>
                )}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (<div key={i} className={l.highlight ? 'bg-rose-900/40 -mx-4 px-4' : ''}>{l.line || '\u00A0'}</div>))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['코드 분석', '리뷰 생성', 'LangGraph Agent', '도구 연동'].map(kw => (<span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-sm font-medium border border-rose-200">{kw}</span>))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-rose-600 hover:bg-rose-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./VI-1-1.html" className="text-rose-600 hover:text-rose-800 font-medium">&larr; VI-1-1. RAG 챗봇</a>
              <a href="./VI-1-3.html" className="text-rose-600 hover:text-rose-800 font-medium">VI-1-3. Multi-Agent 워크플로우 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
