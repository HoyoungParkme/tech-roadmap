<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain н•ҷмҠө вҖ” VI-1-2. мҪ”л“ң лҰ¬л·° Agent</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>рҹ“ҡ</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PIPELINE_STEPS_DATA = [
      { id: 'load', icon: 'рҹ“Ҙ', label: 'мҪ”л“ң лЎңл“ң (GitHub API)', input: 'PR URL', output: 'ліҖкІҪлҗң мҪ”л“ң', color: 'bg-rose-100 border-rose-300 text-rose-800' },
      { id: 'analyze', icon: 'рҹ”Қ', label: 'л¶„м„қ Node', input: 'ліҖкІҪлҗң мҪ”л“ң', output: 'лІ„к·ё/мҠӨнғҖмқј/ліҙм•Ҳ мқҙмҠҲ', color: 'bg-pink-100 border-pink-300 text-pink-800' },
      { id: 'review', icon: 'рҹ“қ', label: 'лҰ¬л·° мғқм„ұ Node', input: 'л¶„м„қ кІ°кіј', output: 'лҰ¬л·° мҪ”л©ҳнҠё', color: 'bg-fuchsia-100 border-fuchsia-300 text-fuchsia-800' },
      { id: 'graph', icon: 'рҹ”„', label: 'LangGraph мӢӨн–ү', input: 'м „мІҙ State', output: 'мөңмў… лҰ¬л·° лҰ¬нҸ¬нҠё', color: 'bg-purple-100 border-purple-300 text-purple-800' },
    ];

    const STEPS = [
      {
        desc: "[мҪ”л“ң лҰ¬л·° Agent к°ңмҡ”] GitHub PRмқҳ ліҖкІҪ мҪ”л“ңлҘј мһҗлҸҷмңјлЎң мқҪкі  вҶ’ лІ„к·ё, мҠӨнғҖмқј, ліҙм•Ҳ мқҙмҠҲлҘј л¶„м„қ вҶ’ лҰ¬л·° мҪ”л©ҳнҠёлҘј мғқм„ұн•ҳлҠ” Agentмһ…лӢҲлӢӨ. LangGraphлЎң к°Ғ лӢЁкі„лҘј NodeлЎң кө¬м„ұн•©лӢҲлӢӨ.",
        activeChain: -1,
        data: null,
        code: [
          { line: '# мҪ”л“ң лҰ¬л·° Agent м•„нӮӨн…ҚмІҳ', highlight: false },
          { line: '# GitHub PR вҶ’ мҪ”л“ң лЎңл“ң вҶ’ л¶„м„қ вҶ’ лҰ¬л·° мғқм„ұ', highlight: true },
          { line: '', highlight: false },
          { line: '# LangGraph Node кө¬м„ұ:', highlight: false },
          { line: '# [load_code] вҶ’ [analyze] вҶ’ [generate_review]', highlight: true },
          { line: '', highlight: false },
          { line: '# к°Ғ NodeлҠ” лҸ…лҰҪм ҒмңјлЎң лҸҷмһ‘н•ҳл©°', highlight: false },
          { line: '# StateлҘј нҶөн•ҙ лҚ°мқҙн„°лҘј м „лӢ¬н•©лӢҲлӢӨ', highlight: false },
        ],
      },
      {
        desc: "[1лӢЁкі„: мҪ”л“ң лЎңл“ң] GitHub APIлҘј мӮ¬мҡ©н•ҙ PRмқҳ ліҖкІҪлҗң нҢҢмқјкіј diffлҘј к°Җм ёмҳөлӢҲлӢӨ. requests лқјмқҙлёҢлҹ¬лҰ¬лЎң GitHub REST APIлҘј нҳём¶ңн•ҳкі , ліҖкІҪлҗң мҪ”л“ңлҘј Stateм—җ м ҖмһҘн•©лӢҲлӢӨ.",
        activeChain: 0,
        data: { input: 'PR #42: feat/add-user-auth', current: 'ліҖкІҪ нҢҢмқј 5к°ң, diff 320мӨ„' },
        code: [
          { line: 'import requests', highlight: false },
          { line: 'from typing import TypedDict', highlight: false },
          { line: '', highlight: false },
          { line: 'class ReviewState(TypedDict):', highlight: true },
          { line: '    pr_url: str', highlight: true },
          { line: '    code_diff: str', highlight: true },
          { line: '    issues: list[str]', highlight: true },
          { line: '    review_comments: str', highlight: true },
          { line: '', highlight: false },
          { line: 'def load_code(state: ReviewState) -> ReviewState:', highlight: false },
          { line: '    """GitHub APIлЎң PR diffлҘј к°Җм ёмҳЁлӢӨ"""', highlight: false },
          { line: '    headers = {"Authorization": "token <GITHUB_TOKEN>"}', highlight: false },
          { line: '    resp = requests.get(state["pr_url"], headers=headers)', highlight: false },
          { line: '    return {"code_diff": resp.text}', highlight: false },
        ],
      },
      {
        desc: "[2лӢЁкі„: л¶„м„қ Node] LLMмқҙ мҪ”л“ң diffлҘј мқҪкі  лІ„к·ё, мҠӨнғҖмқј мң„л°ҳ, ліҙм•Ҳ м·Ём•Ҫм җмқ„ л¶„м„қн•©лӢҲлӢӨ. кө¬мЎ°нҷ”лҗң н”„лЎ¬н”„нҠёлЎң м№ҙн…Ңкі лҰ¬лі„ мқҙмҠҲлҘј JSONмңјлЎң м¶”м¶ңн•©лӢҲлӢӨ.",
        activeChain: 1,
        data: { input: 'diff 320мӨ„', current: 'лІ„к·ё 2кұҙ, мҠӨнғҖмқј 3кұҙ, ліҙм•Ҳ 1кұҙ л°ңкІ¬' },
        code: [
          { line: 'from langchain_openai import ChatOpenAI', highlight: false },
          { line: 'from langchain_core.prompts import ChatPromptTemplate', highlight: false },
          { line: '', highlight: false },
          { line: 'def analyze_code(state: ReviewState) -> ReviewState:', highlight: false },
          { line: '    prompt = ChatPromptTemplate.from_template(', highlight: true },
          { line: '        """лӢӨмқҢ мҪ”л“ң diffлҘј л¶„м„қн•ҳкі  мқҙмҠҲлҘј м°ҫм•„мӨҳ.', highlight: true },
          { line: '        м№ҙн…Ңкі лҰ¬: лІ„к·ё, мҠӨнғҖмқј, ліҙм•Ҳ', highlight: true },
          { line: '        мҪ”л“ң:\\n{code_diff}"""', highlight: true },
          { line: '    )', highlight: true },
          { line: '    model = ChatOpenAI(model="gpt-4o-mini")', highlight: false },
          { line: '    chain = prompt | model | StrOutputParser()', highlight: false },
          { line: '    issues = chain.invoke({"code_diff": state["code_diff"]})', highlight: false },
          { line: '    return {"issues": issues.split("\\n")}', highlight: false },
        ],
      },
      {
        desc: "[3лӢЁкі„: лҰ¬л·° мғқм„ұ Node] л¶„м„қлҗң мқҙмҠҲ лӘ©лЎқмқ„ л°”нғ•мңјлЎң, к°ңл°ңмһҗ м№ңнҷ”м Ғмқё лҰ¬л·° мҪ”л©ҳнҠёлҘј мғқм„ұн•©лӢҲлӢӨ. к°Ғ мқҙмҠҲм—җ лҢҖн•ҙ л¬ём ңм җ, м ңм•Ҳ, мҪ”л“ң мҳҲмӢңлҘј нҸ¬н•Ён•©лӢҲлӢӨ.",
        activeChain: 2,
        data: { input: 'мқҙмҠҲ 6кұҙ (лІ„к·ё 2, мҠӨнғҖмқј 3, ліҙм•Ҳ 1)', current: 'лҰ¬л·° мҪ”л©ҳнҠё 6к°ң мғқм„ұ мҷ„лЈҢ' },
        code: [
          { line: 'def generate_review(state: ReviewState) -> ReviewState:', highlight: false },
          { line: '    prompt = ChatPromptTemplate.from_template(', highlight: true },
          { line: '        """лӢӨмқҢ мқҙмҠҲл“Өм—җ лҢҖн•ҙ лҰ¬л·° мҪ”л©ҳнҠёлҘј мһ‘м„ұн•ҙмӨҳ.', highlight: true },
          { line: '        к°Ғ мҪ”л©ҳнҠём—җ л¬ём ңм җ, м ңм•Ҳ, мҲҳм • мҳҲмӢңлҘј нҸ¬н•Ё.', highlight: true },
          { line: '        мқҙмҠҲ лӘ©лЎқ:\\n{issues}"""', highlight: true },
          { line: '    )', highlight: true },
          { line: '    model = ChatOpenAI(model="gpt-4o-mini")', highlight: false },
          { line: '    chain = prompt | model | StrOutputParser()', highlight: false },
          { line: '    issues_text = "\\n".join(state["issues"])', highlight: false },
          { line: '    comments = chain.invoke({"issues": issues_text})', highlight: false },
          { line: '    return {"review_comments": comments}', highlight: false },
        ],
      },
      {
        desc: "[4лӢЁкі„: LangGraph к·ёлһҳн”„ кө¬мЎ°] StateGraphлЎң 3к°ң NodeлҘј м—°кІ°н•©лӢҲлӢӨ. load_code вҶ’ analyze_code вҶ’ generate_review мҲңм„ңлЎң мӢӨн–үлҗҳл©°, к°Ғ NodeлҠ” StateлҘј кіөмң н•©лӢҲлӢӨ.",
        activeChain: 3,
        data: null,
        code: [
          { line: 'from langgraph.graph import StateGraph, END', highlight: false },
          { line: '', highlight: false },
          { line: '# к·ёлһҳн”„ мғқм„ұ', highlight: false },
          { line: 'graph = StateGraph(ReviewState)', highlight: true },
          { line: '', highlight: false },
          { line: '# Node м¶”к°Җ', highlight: false },
          { line: 'graph.add_node("load_code", load_code)', highlight: true },
          { line: 'graph.add_node("analyze_code", analyze_code)', highlight: true },
          { line: 'graph.add_node("generate_review", generate_review)', highlight: true },
          { line: '', highlight: false },
          { line: '# Edge м—°кІ°', highlight: false },
          { line: 'graph.set_entry_point("load_code")', highlight: false },
          { line: 'graph.add_edge("load_code", "analyze_code")', highlight: false },
          { line: 'graph.add_edge("analyze_code", "generate_review")', highlight: false },
          { line: 'graph.add_edge("generate_review", END)', highlight: false },
        ],
      },
      {
        desc: "[5лӢЁкі„: мӢӨн–ү кІ°кіј] к·ёлһҳн”„лҘј м»ҙнҢҢмқјн•ҳкі  PR URLмқ„ л„Јмңјл©ҙ, мһҗлҸҷмңјлЎң мҪ”л“ңлҘј мқҪкі  вҶ’ л¶„м„қ вҶ’ лҰ¬л·° мҪ”л©ҳнҠёк№Ңм§Җ мғқм„ұн•©лӢҲлӢӨ. мӢӨм ң GitHubм—җ мҪ”л©ҳнҠёлҘј лӢ¬ мҲҳлҸ„ мһҲмҠөлӢҲлӢӨ.",
        activeChain: 3,
        data: { input: 'PR #42 мӢӨн–ү', current: 'лҰ¬л·° мҷ„лЈҢ: лІ„к·ё 2кұҙ(Critical), ліҙм•Ҳ 1кұҙ(High)' },
        code: [
          { line: '# м»ҙнҢҢмқј л°Ҹ мӢӨн–ү', highlight: false },
          { line: 'app = graph.compile()', highlight: true },
          { line: '', highlight: false },
          { line: 'result = app.invoke({', highlight: true },
          { line: '    "pr_url": "https://api.github.com/repos/.../pulls/42",', highlight: true },
          { line: '    "code_diff": "",', highlight: true },
          { line: '    "issues": [],', highlight: true },
          { line: '    "review_comments": ""', highlight: true },
          { line: '})', highlight: true },
          { line: '', highlight: false },
          { line: 'print(result["review_comments"])', highlight: false },
          { line: '# вҶ’ "1. [Bug] SQL Injection мң„н—ҳ: ..."', highlight: false },
          { line: '# вҶ’ "2. [Style] н•ЁмҲҳлӘ… snake_case мң„л°ҳ: ..."', highlight: false },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-rose-700 hover:text-rose-900 font-medium"><span aria-hidden="true">&larr;</span> н—ҲлёҢлЎң лҸҢм•„к°Җкё°</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. мӢӨм „ н”„лЎңм қнҠё &gt; Chapter 1. н”„лЎңм қнҠё</div>
                  <h1 className="text-2xl font-bold text-slate-800">VI-1-2. мҪ”л“ң лҰ¬л·° Agent</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>GitHub PR мҪ”л“ң</b>лҘј мқҪкі  лІ„к·ё/к°ңм„ м җмқ„ л¶„м„қн•ҳм—¬ лҰ¬л·° мҪ”л©ҳнҠёлҘј мһҗлҸҷ мғқм„ұн•ҳлҠ” LangGraph Agentмһ…лӢҲлӢӨ.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-rose-700 border-rose-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">мҪ”л“ң лҰ¬л·° Agent нқҗлҰ„</h3>
                <span className="text-xs text-rose-200">нӮӨліҙл“ң &larr;/&rarr;лЎң лӢЁкі„ мқҙлҸҷ</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                <div className="space-y-3">
                  {PIPELINE_STEPS_DATA.map((cs, idx) => (
                    <div key={cs.id} className="relative">
                      <div className={`flex items-center gap-3 p-4 rounded-xl border-2 transition-all duration-500 ${
                        idx <= stepData.activeChain ? cs.color + ' scale-[1.02] shadow-md' :
                        idx === stepData.activeChain + 1 && stepData.activeChain >= 0 ? 'bg-white border-slate-200 opacity-70' :
                        'bg-white border-slate-100 opacity-40'
                      }`}>
                        <span className="text-2xl">{cs.icon}</span>
                        <div className="flex-1">
                          <div className="font-bold text-sm">{cs.label}</div>
                          <div className="text-xs mt-0.5 flex gap-2">
                            <span className="opacity-70">{cs.input}</span>
                            <span>вҶ’</span>
                            <span className="font-medium">{cs.output}</span>
                          </div>
                        </div>
                      </div>
                      {idx < PIPELINE_STEPS_DATA.length - 1 && (
                        <div className="text-center text-rose-400 text-lg py-1">вҶ“</div>
                      )}
                    </div>
                  ))}
                </div>

                {stepData.data && (
                  <div className="bg-rose-50 border border-rose-200 rounded-lg p-3 space-y-2">
                    <div className="text-xs"><span className="font-bold text-slate-500">мһ…л Ҙ:</span> <span className="text-slate-600">{stepData.data.input}</span></div>
                    <div className="text-xs"><span className="font-bold text-rose-600">м¶ңл Ҙ:</span> <span className="text-rose-800 font-medium">{stepData.data.current}</span></div>
                  </div>
                )}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">мҪ”л“ң</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (<div key={i} className={l.highlight ? 'bg-rose-900/40 -mx-4 px-4' : ''}>{l.line || '\u00A0'}</div>))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['мҪ”л“ң л¶„м„қ', 'лҰ¬л·° мғқм„ұ', 'LangGraph Agent', 'лҸ„кө¬ м—°лҸҷ'].map(kw => (<span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-sm font-medium border border-rose-200">{kw}</span>))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="мқҙм „ лӢЁкі„" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying ? 'м •м§Җ' : 'мһҗлҸҷ мӢӨн–ү'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-rose-600 hover:bg-rose-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> м •м§Җ</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> мһҗлҸҷ мӢӨн–ү</>)}
                </button>
                <button aria-label="лӢӨмқҢ лӢЁкі„" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./VI-1-1.html" className="text-rose-600 hover:text-rose-800 font-medium">&larr; VI-1-1. RAG мұ—лҙҮ</a>
              <a href="./VI-1-3.html" className="text-rose-600 hover:text-rose-800 font-medium">VI-1-3. Multi-Agent мӣҢнҒ¬н”ҢлЎңмҡ° &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
