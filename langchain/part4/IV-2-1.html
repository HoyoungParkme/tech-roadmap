  <!--
    IV-2-1. ReAct Agent (LangGraph 버전 — create_react_agent)
    학습 목표: 수동 그래프 구성의 복잡함 → create_react_agent 한 줄로 단축되는 과정과
              메시지 흐름(AIMessage with tool_calls → ToolMessage → AIMessage)을 5단계로 이해한다.
    핵심 비유: ReAct cycle = Agent ↔ Tools ↔ LLM 의 round-trip 메시지 패스
    패턴: fastapi v1 — 좌(LiveDataPane: Agent/Tools/LLM 박스 + 메시지 박스) / 우(VSCode CodeViewer)
    색상: emerald (langchain 계열)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 시나리오: "서울과 도쿄의 날씨를 비교해줘"
    //   메시지 흐름이 5단계 동안 누적되며 Agent ↔ Tools ↔ LLM 패스 시각화
    //   메시지 타입: human / ai-thinking / ai-toolcall / tool / ai-final
    // ─────────────────────────────────────────────────────

    const STEPS = [
      // ─────────────────────────────────────────────────────
      // Step 1. 수동 ReAct — StateGraph 직접 구성 (복잡)
      // ─────────────────────────────────────────────────────
      {
        title: 'Step 1. 수동 ReAct — StateGraph 직접 구성',
        desc: '도구를 가진 Agent를 그래프로 직접 짜면 노드 2개(agent/tools), 분기 함수 1개(should_continue), 엣지 3개를 연결해야 한다. 코드는 명시적이지만 보일러플레이트가 많고, 메시지 누적·MessagesState·tool_calls 파싱 같은 디테일을 직접 챙겨야 한다.',
        mode: 'manual',
        cycleStage: 0,        // 아직 실행 전 — 그래프 구조만
        agentBox: { state: 'idle', label: 'agent_node' },
        toolsBox: { state: 'idle', label: 'tool_node' },
        llmBox:   { state: 'idle', label: 'ChatOpenAI(gpt-4o-mini)' },
        edges: ['START→agent', 'agent⇢branch', 'branch→tools', 'tools→agent', 'branch→END'],
        messages: [],
        code: {
          lang: 'python',
          filename: 'manual-react.py',
          lines: [
            '# Step 1. 수동 ReAct — 그래프를 직접 짠다',
            'from langgraph.graph import StateGraph, END, MessagesState',
            'from langgraph.prebuilt import ToolNode',
            'from langchain_openai import ChatOpenAI',
            'from langchain_core.tools import tool',
            '',
            '# 1) 도구 정의',
            '@tool',
            'def get_weather(city: str) -> str:',
            '    """도시의 현재 날씨를 가져온다."""',
            '    db = {"서울": "25도, 맑음", "도쿄": "22도, 흐림"}',
            '    return db.get(city, "정보 없음")',
            '',
            'tools = [get_weather]',
            'model = ChatOpenAI(model="gpt-4o-mini").bind_tools(tools)',
            '',
            '# 2) agent 노드 — LLM 호출 (생각/행동 결정)',
            'def agent_node(state: MessagesState):',
            '    response = model.invoke(state["messages"])',
            '    return {"messages": [response]}',
            '',
            '# 3) 분기 함수 — tool_calls 있으면 도구 실행, 없으면 종료',
            'def should_continue(state: MessagesState):',
            '    last = state["messages"][-1]',
            '    if last.tool_calls:',
            '        return "tools"',
            '    return END',
            '',
            '# 4) 그래프 조립 — 노드 2 + 엣지 3 + 분기 1',
            'graph = StateGraph(MessagesState)',
            'graph.add_node("agent", agent_node)',
            'graph.add_node("tools", ToolNode(tools))',
            'graph.set_entry_point("agent")',
            'graph.add_conditional_edges(',
            '    "agent", should_continue, {"tools": "tools", END: END},',
            ')',
            'graph.add_edge("tools", "agent")',
            'app = graph.compile()',
            '',
            '# ⚠ 보일러플레이트가 많고 디테일 누락 위험이 있다.',

        },
      },

      // ─────────────────────────────────────────────────────

      // ─────────────────────────────────────────────────────
      {
        title: 'Step 3. agent.invoke — 질문 한 번 → 도구 자동 호출',
        desc: '"서울과 도쿄의 날씨를 비교해줘" 한 마디면 Agent가 알아서 get_weather를 두 번 호출하고 비교한다. 사용자가 직접 도구 호출 지시를 안 해도 LLM이 도구 시그니처를 보고 필요한 인자를 채워 ReAct cycle을 자동 진행한다.',
        mode: 'auto',
        cycleStage: 1,
        agentBox: { state: 'active', label: 'agent (running)' },
        toolsBox: { state: 'pending', label: 'ToolNode (대기)' },
        llmBox:   { state: 'active', label: 'gpt-4o-mini' },
        edges: ['START→agent (질문 수신)'],
        messages: [
          { role: 'human', text: '서울과 도쿄의 날씨를 비교해줘' },
          { role: 'ai-thinking', text: '두 도시 날씨를 검색해야겠다. get_weather 도구를 호출하자.' },

        code: {
          lang: 'python',
          filename: 'invoke.py',
          lines: [
            '# Step 3. invoke — 사용자 질문을 한 번에 처리',

            '# Step 2 에서 만든 agent 사용',
            'result = agent.invoke({',
            '    "messages": [',
            '        HumanMessage("서울과 도쿄의 날씨를 비교해줘"),',
            '    ]',
            '})',
            '',
            '# result["messages"] 안에는 ReAct cycle 의',
            '# 모든 메시지가 순서대로 누적되어 들어있다.',
            '#',
            '# 사용자는 "도구 호출하라"고 시키지 않았다.',

        desc: '내부 메시지 시퀀스를 펼쳐 본다. (1) HumanMessage → (2) AIMessage with tool_calls (서울) → (3) ToolMessage 결과 → (4) AIMessage with tool_calls (도쿄) → (5) ToolMessage 결과 → (6) 최종 AIMessage. tool_call_id 로 요청과 응답이 짝지어진다.',

          { role: 'ai-toolcall', text: 'get_weather(city="도쿄")', meta: 'tool_call_id=call_b2' },
          { role: 'tool', text: '"22도, 흐림"', meta: 'tool_call_id=call_b2' },
          { role: 'ai-final', text: '서울 25도 맑음 / 도쿄 22도 흐림. 서울이 3도 더 따뜻하고 맑습니다.' },
        ],
        code: {
          lang: 'python',
          filename: 'messages-trace.py',
          lines: [
            '# Step 4. 메시지 객체 흐름 — round-trip 패턴',
            'from langchain_core.messages import (',
            '    HumanMessage, AIMessage, ToolMessage,',

            'result = agent.invoke({',
            '    "messages": [HumanMessage("서울과 도쿄의 날씨를 비교해줘")],',

            '# result["messages"] 펼쳐보기:',

        mode: 'stream',
        cycleStage: 3,
        agentBox: { state: 'streaming', label: 'agent (yield)' },
        toolsBox: { state: 'streaming', label: 'tools (yield)' },
        llmBox:   { state: 'streaming', label: 'gpt-4o-mini' },
        edges: ['stream chunks → 콘솔/UI'],
        messages: [
          { role: 'human', text: '서울과 도쿄의 날씨를 비교해줘' },
          { role: 'ai-toolcall', text: 'get_weather("서울")', meta: 'chunk #1 (agent)' },
          { role: 'tool', text: '"25도, 맑음"', meta: 'chunk #2 (tools)' },
          { role: 'ai-toolcall', text: 'get_weather("도쿄")', meta: 'chunk #3 (agent)' },
          { role: 'tool', text: '"22도, 흐림"', meta: 'chunk #4 (tools)' },
          { role: 'ai-final', text: '서울이 3도 더 따뜻하고 맑습니다.', meta: 'chunk #5 (agent)' },

        code: {
          lang: 'python',
          filename: 'stream-debug.py',
          lines: [
            '# Step 5. agent.stream — 노드별 chunk 를 실시간 관찰',

    // ─────────────────────────────────────────────────────
    // 좌측 위: ReAct cycle 다이어그램
    //   Agent ↔ Tools ↔ LLM 3개 박스 + cycleStage 에 따라
    //   화살표/펄스 애니메이션
    // ─────────────────────────────────────────────────────
    function ReactCycleDiagram({ step }) {
      const boxClass = (state) => {
        if (state === 'idle') return 'bg-slate-100 border-slate-300 text-slate-500';
        if (state === 'ready') return 'bg-emerald-50 border-emerald-300 text-emerald-800';
        if (state === 'pending') return 'bg-amber-50 border-amber-300 text-amber-700';
        if (state === 'active') return 'bg-emerald-100 border-emerald-500 text-emerald-900 ring-2 ring-emerald-300 ring-offset-1';
        if (state === 'streaming') return 'bg-emerald-100 border-emerald-500 text-emerald-900 animate-pulse';
        return 'bg-white border-slate-300';
      };

      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🔄</span>
              <span className="text-[11px] font-bold text-emerald-800">ReAct Cycle (Agent ↔ Tools ↔ LLM)</span>
            </div>
            <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">
              mode: {step.mode}
            </span>
          </div>

          <div className="grid grid-cols-3 gap-2 mb-2">
            {/* Agent 박스 */}
            <div className={`rounded-lg border-2 p-2 transition-all duration-500 ${boxClass(step.agentBox.state)}`}>
              <div className="text-[9px] font-bold uppercase tracking-wider mb-1">🤖 Agent</div>
              <div className="text-[10px] font-mono leading-tight break-words">{step.agentBox.label}</div>
              <div className="text-[8px] mt-1 opacity-70">state={step.agentBox.state}</div>
            </div>

            {/* Tools 박스 */}
            <div className={`rounded-lg border-2 p-2 transition-all duration-500 ${boxClass(step.toolsBox.state)}`}>
              <div className="text-[9px] font-bold uppercase tracking-wider mb-1">🔧 Tools</div>
              <div className="text-[10px] font-mono leading-tight break-words">{step.toolsBox.label}</div>
              <div className="text-[8px] mt-1 opacity-70">state={step.toolsBox.state}</div>
            </div>

            {/* LLM 박스 */}
            <div className={`rounded-lg border-2 p-2 transition-all duration-500 ${boxClass(step.llmBox.state)}`}>
              <div className="text-[9px] font-bold uppercase tracking-wider mb-1">🧠 LLM</div>
              <div className="text-[10px] font-mono leading-tight break-words">{step.llmBox.label}</div>
              <div className="text-[8px] mt-1 opacity-70">state={step.llmBox.state}</div>
            </div>
          </div>

          {/* 엣지 / 단계 정보 */}
          <div className="bg-slate-50 rounded border border-slate-200 p-1.5">
            <div className="text-[9px] font-bold text-slate-600 uppercase tracking-wider mb-0.5">Edges / cycle stage = {step.cycleStage}</div>
            <div className="flex flex-wrap gap-1">
              {step.edges.map((e, i) => (
                <span key={i} className="text-[9px] font-mono bg-white border border-slate-200 px-1.5 py-0.5 rounded text-slate-700">
                  {e}
                </span>
              ))}
            </div>
          </div>

          {/* cycle stage 진행 바 */}
          <div className="mt-2 flex items-center gap-1">
            <span className="text-[9px] text-slate-500 font-mono">cycle</span>
            {[0, 1, 2, 3].map((i) => (
              <div
                key={i}
                className={`flex-1 h-1.5 rounded ${i <= step.cycleStage ? 'bg-emerald-500' : 'bg-slate-200'} transition-all duration-500`}
              />
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: 메시지 박스 — role별 색상
    //   - human       : 파랑
    //   - ai-thinking : 회색 + italic (생각 표시)
    //   - ai-toolcall : 보라 (도구 호출 요청)
    //   - tool        : 노랑 (도구 실행 결과)
    //   - ai-final    : 에메랄드 (최종 답변)
    // ─────────────────────────────────────────────────────
    function MessageBox({ messages, mode }) {
      if (!messages || messages.length === 0) {
        return (
          <div className="bg-slate-50 border-2 border-dashed border-slate-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-1.5">
              <span className="text-base">💬</span>
              <span className="text-[11px] font-bold text-slate-700">Messages — 아직 비어 있음</span>
            </div>
            <div className="text-[10px] text-slate-500 italic text-center py-3">
              그래프 구조만 정의된 상태. invoke 호출 전.
            </div>
          </div>
        );
      }

      const styleByRole = (role) => {
        switch (role) {
          case 'human':
            return {
              wrap: 'bg-blue-50 border-blue-300',
              badge: 'bg-blue-600 text-white',
              label: 'HumanMessage',
              icon: '👤',
            };
          case 'ai-thinking':
            return {
              wrap: 'bg-slate-100 border-slate-300 italic',
              badge: 'bg-slate-500 text-white',
              label: 'AIMessage (thinking)',
              icon: '💭',
            };
          case 'ai-toolcall':
            return {
              wrap: 'bg-purple-50 border-purple-300',
              badge: 'bg-purple-600 text-white',
              label: 'AIMessage (tool_calls)',
              icon: '🔧',
            };
          case 'tool':
            return {
              wrap: 'bg-amber-50 border-amber-300',
              badge: 'bg-amber-600 text-white',
              label: 'ToolMessage',
              icon: '📦',
            };
          case 'ai-final':
            return {
              wrap: 'bg-emerald-50 border-emerald-400 ring-1 ring-emerald-200',
              badge: 'bg-emerald-600 text-white',
              label: 'AIMessage (final)',
              icon: '✅',
            };
          default:
            return {
              wrap: 'bg-white border-slate-200',
              badge: 'bg-slate-400 text-white',
              label: role,
              icon: '•',
            };
        }
      };

      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">💬</span>
              <span className="text-[11px] font-bold text-emerald-800">Messages — round-trip 시퀀스</span>
            </div>
            <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">
              {messages.length} msgs
            </span>
          </div>

          <div className="space-y-1.5 max-h-72 overflow-y-auto pr-1">
            {messages.map((m, i) => {
              const s = styleByRole(m.role);
              return (
                <div
                  key={i}
                  className={`p-1.5 rounded border ${s.wrap} transition-all duration-500`}
                >
                  <div className="flex items-center gap-1.5 mb-0.5">
                    <span className="text-[10px]">{s.icon}</span>
                    <span className={`text-[8px] px-1.5 py-0.5 rounded font-bold ${s.badge}`}>
                      [{i}] {s.label}
                    </span>
                    {m.meta && (
                      <span className="text-[8px] text-slate-500 font-mono ml-auto">
                        {m.meta}
                      </span>
                    )}
                  </div>
                  <div className="text-[10px] font-mono leading-tight pl-4 text-slate-800 break-words">
                    {m.text}
                  </div>
                </div>
              );
            })}
          </div>

          {mode === 'stream' && (
            <div className="text-[9px] text-emerald-700 mt-2 font-mono">
              ▶ stream_mode="updates" — 위 메시지가 chunk 단위로 yield 됨
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: ReAct cycle 다이어그램 / 하단: 메시지 박스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🤖 ReAct Agent — 수동 그래프 → 한 줄 → 메시지 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <ReactCycleDiagram step={step} />
            <MessageBox messages={step.messages} mode={step.mode} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-blue-500"></span>Human
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-400"></span>AI thinking
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-purple-500"></span>AI tool_calls
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>Tool result
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>AI final
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. LangGraph &gt; Chapter 2. LangGraph 실전</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-2-1. ReAct Agent (LangGraph) — create_react_agent</h1>
                  <p className="text-sm text-slate-500 mt-0.5">수동 그래프 → 한 줄 prebuilt → 메시지 흐름 → 스트리밍 디버깅</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: <strong>create_react_agent(model, tools)</strong> 한 줄로 Step 1의 모든 보일러플레이트를 대체하고, <strong>agent.invoke / agent.stream</strong> 으로 사용·디버깅한다. 다음(IV-2-2)에서는 실행 중 사람의 승인을 끼워넣는 Human-in-the-Loop 패턴을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['create_react_agent', 'StateGraph', 'ToolNode', 'MessagesState', 'tool_calls', 'agent.invoke', 'agent.stream'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-1-3.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; IV-1-3 Conditional Edge</a>
              <a href="./IV-2-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">IV-2-2 Human-in-the-Loop &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
