<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — IV-2-1. ReAct Agent (LangGraph 버전)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "[ReAct 복습] ReAct = Reasoning + Acting. LLM이 생각(Thought)하고, 행동(Action: 도구 호출)하고, 관찰(Observation: 결과 확인)을 반복합니다. 이 루프를 LangGraph StateGraph로 구현합니다.",
        visual: 'recap',
        code: [
          { line: '# ReAct 패턴 복습', highlight: false },
          { line: '#', highlight: false },
          { line: '# 1. Thought  → LLM이 생각', highlight: true },
          { line: '# 2. Action   → 도구 호출', highlight: true },
          { line: '# 3. Observation → 결과 확인', highlight: true },
          { line: '# 4. 반복 or 최종 답변', highlight: false },
          { line: '', highlight: false },
          { line: '# LangGraph로 이 루프를 그래프로!', highlight: false },
        ],
      },
      {
        desc: "[agent_node] agent_node는 LLM을 호출하는 함수입니다. State에서 messages를 꺼내 LLM에 전달하고, 응답을 다시 State에 추가합니다. LLM이 도구 호출 여부를 결정합니다.",
        visual: 'agent',
        code: [
          { line: 'from langchain_openai import ChatOpenAI', highlight: false },
          { line: '', highlight: false },
          { line: 'model = ChatOpenAI(model="gpt-4o-mini")', highlight: false },
          { line: 'model_with_tools = model.bind_tools(tools)', highlight: true },
          { line: '', highlight: false },
          { line: 'def agent_node(state):', highlight: true },
          { line: '    """LLM 호출 → 생각 + 행동 결정"""', highlight: false },
          { line: '    response = model_with_tools.invoke(', highlight: true },
          { line: '        state["messages"]', highlight: true },
          { line: '    )', highlight: true },
          { line: '    return {"messages": [response]}', highlight: false },
        ],
      },
      {
        desc: "[tool_node] tool_node는 LLM이 요청한 도구를 실제로 실행합니다. LangGraph의 ToolNode를 사용하면 자동으로 도구를 찾아 실행하고 결과를 State에 추가합니다.",
        visual: 'tool',
        code: [
          { line: 'from langgraph.prebuilt import ToolNode', highlight: true },
          { line: '', highlight: false },
          { line: '# 도구 정의', highlight: false },
          { line: 'tools = [search_tool, calculator_tool]', highlight: false },
          { line: '', highlight: false },
          { line: '# ToolNode: 도구 자동 실행', highlight: false },
          { line: 'tool_node = ToolNode(tools)', highlight: true },
          { line: '', highlight: false },
          { line: '# LLM의 tool_calls를 보고', highlight: false },
          { line: '# 해당 도구를 찾아 실행하고', highlight: false },
          { line: '# ToolMessage로 결과 반환', highlight: false },
        ],
      },
      {
        desc: "[should_continue 분기] agent_node 실행 후, LLM 응답에 tool_calls가 있으면 tool_node로, 없으면 END로 분기합니다. 이것이 ReAct 루프의 핵심입니다.",
        visual: 'branch',
        code: [
          { line: '# 분기 함수: 루프 vs 종료', highlight: false },
          { line: '', highlight: false },
          { line: 'def should_continue(state):', highlight: true },
          { line: '    last = state["messages"][-1]', highlight: true },
          { line: '', highlight: false },
          { line: '    # tool_calls 있으면 → 도구 실행', highlight: false },
          { line: '    if hasattr(last, "tool_calls") and last.tool_calls:', highlight: true },
          { line: '        return "tools"', highlight: true },
          { line: '', highlight: false },
          { line: '    # 없으면 → 최종 답변으로 종료', highlight: false },
          { line: '    return "end"', highlight: true },
        ],
      },
      {
        desc: "[루프 실행] 전체 흐름: agent → (도구 필요?) → tool → agent → (도구 필요?) → END. tool_node 실행 후 다시 agent_node로 돌아와서 결과를 확인합니다. 충분하면 최종 답변.",
        visual: 'loop',
        code: [
          { line: '# 실행 흐름 예시', highlight: false },
          { line: '# "서울과 부산의 날씨를 비교해줘"', highlight: false },
          { line: '', highlight: false },
          { line: '# 1) agent: "두 도시 날씨를 검색해야겠다"', highlight: true },
          { line: '#    → tool_calls: [search("서울 날씨")]', highlight: false },
          { line: '# 2) tool: "서울 25도, 맑음"', highlight: true },
          { line: '# 3) agent: "부산도 검색해야겠다"', highlight: true },
          { line: '#    → tool_calls: [search("부산 날씨")]', highlight: false },
          { line: '# 4) tool: "부산 22도, 흐림"', highlight: true },
          { line: '# 5) agent: "비교 완료" → END', highlight: true },
        ],
      },
      {
        desc: "[최종 코드] create_react_agent를 사용하면 위 과정을 한 줄로 만들 수 있습니다. 내부적으로 agent_node, tool_node, should_continue가 모두 포함된 StateGraph를 생성합니다.",
        visual: 'final',
        code: [
          { line: '# 방법 1: 수동 구성', highlight: false },
          { line: 'graph = StateGraph(AgentState)', highlight: false },
          { line: 'graph.add_node("agent", agent_node)', highlight: false },
          { line: 'graph.add_node("tools", tool_node)', highlight: false },
          { line: 'graph.set_entry_point("agent")', highlight: false },
          { line: 'graph.add_conditional_edges("agent", should_continue,', highlight: false },
          { line: '    {"tools": "tools", "end": END})', highlight: false },
          { line: 'graph.add_edge("tools", "agent")', highlight: false },
          { line: '', highlight: false },
          { line: '# 방법 2: 한 줄 (prebuilt)', highlight: true },
          { line: 'from langgraph.prebuilt import create_react_agent', highlight: true },
          { line: 'app = create_react_agent(model, tools)', highlight: true },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      const renderVisual = () => {
        if (stepData.visual === 'recap') {
          return (
            <div className="space-y-3">
              <div className="text-sm font-bold text-slate-500 mb-1">ReAct 패턴</div>
              {[
                { icon: '💭', label: 'Thought', desc: 'LLM이 상황을 분석', color: 'bg-purple-50 border-purple-200' },
                { icon: '🔧', label: 'Action', desc: '도구 호출 결정', color: 'bg-amber-50 border-amber-200' },
                { icon: '👁️', label: 'Observation', desc: '도구 결과 확인', color: 'bg-green-50 border-green-200' },
              ].map((item, i) => (
                <div key={item.label}>
                  <div className={"flex items-center gap-3 p-3 rounded-lg border " + item.color}>
                    <span className="text-xl">{item.icon}</span>
                    <div><div className="font-bold text-sm">{item.label}</div><div className="text-xs text-slate-500">{item.desc}</div></div>
                  </div>
                  {i < 2 && <div className="text-center text-purple-300 text-sm">↓</div>}
                </div>
              ))}
              <div className="text-center text-purple-400 text-xs">↩ 반복</div>
            </div>
          );
        }
        if (stepData.visual === 'agent') {
          return (
            <div className="flex flex-col items-center gap-3">
              <div className="text-sm font-bold text-slate-500 mb-1">agent_node</div>
              <div className="w-full p-4 rounded-xl bg-purple-50 border-2 border-purple-300">
                <div className="font-bold text-purple-700 mb-2">agent_node(state)</div>
                <div className="space-y-2 text-xs">
                  <div className="flex items-center gap-2"><span className="bg-purple-200 text-purple-800 px-2 py-0.5 rounded">1</span> state["messages"] 가져오기</div>
                  <div className="flex items-center gap-2"><span className="bg-purple-200 text-purple-800 px-2 py-0.5 rounded">2</span> LLM.invoke(messages)</div>
                  <div className="flex items-center gap-2"><span className="bg-purple-200 text-purple-800 px-2 py-0.5 rounded">3</span> 응답을 messages에 추가</div>
                </div>
              </div>
              <div className="text-xs text-slate-500">LLM이 tool_calls 포함 여부를 결정</div>
            </div>
          );
        }
        if (stepData.visual === 'tool') {
          return (
            <div className="flex flex-col items-center gap-3">
              <div className="text-sm font-bold text-slate-500 mb-1">tool_node (ToolNode)</div>
              <div className="w-full p-4 rounded-xl bg-amber-50 border-2 border-amber-300">
                <div className="font-bold text-amber-700 mb-2">ToolNode(tools)</div>
                <div className="space-y-2 text-xs">
                  <div className="flex items-center gap-2"><span className="bg-amber-200 text-amber-800 px-2 py-0.5 rounded">1</span> tool_calls 파싱</div>
                  <div className="flex items-center gap-2"><span className="bg-amber-200 text-amber-800 px-2 py-0.5 rounded">2</span> 해당 도구 찾기</div>
                  <div className="flex items-center gap-2"><span className="bg-amber-200 text-amber-800 px-2 py-0.5 rounded">3</span> 도구 실행</div>
                  <div className="flex items-center gap-2"><span className="bg-amber-200 text-amber-800 px-2 py-0.5 rounded">4</span> ToolMessage 반환</div>
                </div>
              </div>
            </div>
          );
        }
        if (stepData.visual === 'branch') {
          return (
            <div className="flex flex-col items-center gap-2">
              <div className="text-sm font-bold text-slate-500 mb-1">should_continue 분기</div>
              <div className="w-28 h-10 rounded-xl bg-purple-600 text-white flex items-center justify-center font-bold text-sm">agent</div>
              <div className="text-purple-500 font-bold text-xs">tool_calls 있나?</div>
              <div className="flex gap-8">
                <div className="text-center">
                  <div className="text-xs text-green-600 mb-1">있음</div>
                  <div className="w-24 h-10 rounded-xl bg-amber-100 border-2 border-amber-300 flex items-center justify-center font-bold text-sm text-amber-700">tools</div>
                  <div className="text-purple-400 text-xs mt-1">↩ agent로</div>
                </div>
                <div className="text-center">
                  <div className="text-xs text-red-600 mb-1">없음</div>
                  <div className="w-24 h-10 rounded-xl bg-red-500 text-white flex items-center justify-center font-bold text-sm">END</div>
                </div>
              </div>
            </div>
          );
        }
        if (stepData.visual === 'loop') {
          return (
            <div className="space-y-2">
              <div className="text-sm font-bold text-slate-500 mb-1">실행 흐름 (날씨 비교)</div>
              {[
                { step: '1', node: 'agent', text: '"검색 필요"', color: 'bg-purple-50 border-purple-200' },
                { step: '2', node: 'tool', text: '서울 25도', color: 'bg-amber-50 border-amber-200' },
                { step: '3', node: 'agent', text: '"부산도 필요"', color: 'bg-purple-50 border-purple-200' },
                { step: '4', node: 'tool', text: '부산 22도', color: 'bg-amber-50 border-amber-200' },
                { step: '5', node: 'END', text: '비교 답변', color: 'bg-red-50 border-red-200' },
              ].map((item) => (
                <div key={item.step} className={"flex items-center gap-2 p-2 rounded-lg border text-xs " + item.color}>
                  <span className="font-bold text-slate-500">{item.step}</span>
                  <span className="font-bold">{item.node}</span>
                  <span className="text-slate-500">{item.text}</span>
                </div>
              ))}
            </div>
          );
        }
        if (stepData.visual === 'final') {
          return (
            <div className="space-y-4">
              <div className="text-sm font-bold text-slate-500 mb-1">두 가지 방법</div>
              <div className="p-3 rounded-lg bg-slate-100 border border-slate-200">
                <div className="font-bold text-xs text-slate-600 mb-1">방법 1: 수동 구성</div>
                <div className="text-xs text-slate-500">StateGraph + add_node + add_conditional_edges</div>
                <div className="text-xs text-slate-400 mt-1">세부 제어 가능, 커스터마이징 자유</div>
              </div>
              <div className="p-3 rounded-lg bg-purple-50 border-2 border-purple-300">
                <div className="font-bold text-xs text-purple-700 mb-1">방법 2: create_react_agent (추천)</div>
                <div className="text-xs text-purple-600">한 줄로 ReAct Agent 생성</div>
                <div className="text-xs text-purple-400 mt-1">내부적으로 동일한 그래프 구성</div>
              </div>
            </div>
          );
        }
        return null;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-purple-700 hover:text-purple-900 font-medium"><span aria-hidden="true">&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. LangGraph &gt; Chapter 2. LangGraph 실전</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-2-1. ReAct Agent (LangGraph 버전)</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>ReAct를 그래프로</b> — Thought-Action-Observation 루프를 StateGraph의 agent/tool 노드와 조건 분기로 구현합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-purple-700 border-purple-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">ReAct Agent</h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderVisual()}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (<div key={i} className={l.highlight ? 'bg-purple-900/40 -mx-4 px-4' : ''}>{l.line || '\u00A0'}</div>))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['create_react_agent', 'ToolNode', 'agent loop'].map(kw => (<span key={kw} className="bg-purple-50 text-purple-700 px-3 py-1 rounded-full text-sm font-medium border border-purple-200">{kw}</span>))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-purple-600 hover:bg-purple-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./IV-1-3.html" className="text-purple-600 hover:text-purple-800 font-medium">&larr; IV-1-3. Conditional Edge</a>
              <a href="./IV-2-2.html" className="text-purple-600 hover:text-purple-800 font-medium">IV-2-2. Human-in-the-Loop &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
