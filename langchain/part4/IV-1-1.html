<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — IV-1-1. 왜 LangGraph인가</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "[일직선 도로 vs 교차로 도시] Chain은 A→B→C 일직선 도로입니다. 하지만 현실 문제는 교차로가 있는 도시처럼 조건에 따라 다른 길로 가야 합니다. LangGraph는 이 교차로를 만들어줍니다.",
        visual: 'intro',
        code: [
          { line: '# Chain의 한계', highlight: false },
          { line: '# A → B → C (일직선만 가능)', highlight: true },
          { line: '', highlight: false },
          { line: '# 현실 문제:', highlight: false },
          { line: '# "질문이 단순하면 바로 답변,', highlight: false },
          { line: '#  복잡하면 검색 후 답변"', highlight: false },
          { line: '# → 조건 분기가 필요!', highlight: true },
        ],
      },
      {
        desc: "[Graph 개념] Graph는 Node(동작)와 Edge(연결)로 구성됩니다. Chain처럼 순서가 고정되지 않고, Edge를 자유롭게 연결할 수 있습니다. 마치 지도 위의 교차로처럼요.",
        visual: 'graph',
        code: [
          { line: 'from langgraph.graph import StateGraph', highlight: true },
          { line: '', highlight: false },
          { line: '# Graph = Node + Edge', highlight: false },
          { line: '# Node: 각 동작 (함수)', highlight: true },
          { line: '# Edge: Node 간 연결', highlight: true },
          { line: '', highlight: false },
          { line: '# Chain: A → B → C (고정)', highlight: false },
          { line: '# Graph: A → B or C (선택 가능)', highlight: false },
        ],
      },
      {
        desc: "[조건 분기] Conditional Edge를 사용하면 상태에 따라 다른 Node로 이동합니다. 예: 질문 유형이 '단순'이면 바로 답변, '복잡'이면 검색 노드로 분기합니다.",
        visual: 'conditional',
        code: [
          { line: '# 조건 분기 (Conditional Edge)', highlight: false },
          { line: '', highlight: false },
          { line: 'def route_question(state):', highlight: true },
          { line: '    if state["question_type"] == "simple":', highlight: true },
          { line: '        return "direct_answer"', highlight: true },
          { line: '    else:', highlight: true },
          { line: '        return "search_first"', highlight: true },
          { line: '', highlight: false },
          { line: '# Chain으로는 이 분기가 불가능!', highlight: false },
        ],
      },
      {
        desc: "[루프 가능] LangGraph는 루프도 지원합니다. Agent가 도구를 호출하고, 결과를 확인하고, 충분하지 않으면 다시 도구를 호출하는 반복이 가능합니다.",
        visual: 'loop',
        code: [
          { line: '# 루프 (Chain에서는 불가능)', highlight: false },
          { line: '', highlight: false },
          { line: '# Agent 패턴:', highlight: false },
          { line: '# 생각 → 도구 호출 → 관찰 → 생각 → ...', highlight: true },
          { line: '', highlight: false },
          { line: 'def should_continue(state):', highlight: true },
          { line: '    if state["need_more_info"]:', highlight: true },
          { line: '        return "call_tool"  # 다시 돌아감', highlight: true },
          { line: '    return "finish"', highlight: false },
        ],
      },
      {
        desc: "[Chain vs Graph 요약] Chain은 단순한 순차 처리에 적합합니다. Graph는 조건 분기, 루프, 복잡한 Agent 워크플로우에 적합합니다. LangGraph = LangChain의 진화입니다.",
        visual: 'summary',
        code: [
          { line: '# Chain vs Graph 비교', highlight: false },
          { line: '', highlight: false },
          { line: '# Chain (LCEL)', highlight: false },
          { line: '#   ✅ 단순 파이프라인', highlight: false },
          { line: '#   ❌ 조건 분기 어려움', highlight: false },
          { line: '#   ❌ 루프 불가', highlight: false },
          { line: '', highlight: false },
          { line: '# Graph (LangGraph)', highlight: true },
          { line: '#   ✅ 조건 분기 자유', highlight: true },
          { line: '#   ✅ 루프 가능', highlight: true },
          { line: '#   ✅ 상태 관리 내장', highlight: true },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      const renderVisual = () => {
        if (stepData.visual === 'intro') {
          return (
            <div className="space-y-4">
              <div className="text-sm font-bold text-slate-500 mb-2">Chain (일직선 도로)</div>
              <div className="flex items-center gap-2 justify-center">
                {['A', 'B', 'C'].map((n, i) => (
                  <React.Fragment key={n}>
                    <div className="w-12 h-12 rounded-lg bg-slate-200 border-2 border-slate-300 flex items-center justify-center font-bold text-slate-600">{n}</div>
                    {i < 2 && <span className="text-slate-400 text-lg">→</span>}
                  </React.Fragment>
                ))}
              </div>
              <div className="text-sm font-bold text-purple-600 mt-4 mb-2">Graph (교차로 도시)</div>
              <div className="flex flex-col items-center gap-1">
                <div className="w-12 h-12 rounded-lg bg-purple-100 border-2 border-purple-300 flex items-center justify-center font-bold text-purple-700">A</div>
                <div className="text-purple-400">↙ ↘</div>
                <div className="flex gap-8">
                  <div className="w-12 h-12 rounded-lg bg-purple-100 border-2 border-purple-300 flex items-center justify-center font-bold text-purple-700">B</div>
                  <div className="w-12 h-12 rounded-lg bg-purple-100 border-2 border-purple-300 flex items-center justify-center font-bold text-purple-700">C</div>
                </div>
              </div>
            </div>
          );
        }
        if (stepData.visual === 'graph') {
          return (
            <div className="space-y-3">
              <div className="flex items-center gap-3 p-3 rounded-lg bg-purple-50 border border-purple-200">
                <span className="text-2xl">🔵</span>
                <div><div className="font-bold text-sm text-purple-700">Node</div><div className="text-xs text-slate-600">각 동작을 수행하는 함수</div></div>
              </div>
              <div className="flex items-center gap-3 p-3 rounded-lg bg-purple-50 border border-purple-200">
                <span className="text-2xl">➡️</span>
                <div><div className="font-bold text-sm text-purple-700">Edge</div><div className="text-xs text-slate-600">Node 간의 연결 (이동 경로)</div></div>
              </div>
              <div className="flex items-center gap-3 p-3 rounded-lg bg-purple-50 border border-purple-200">
                <span className="text-2xl">🔀</span>
                <div><div className="font-bold text-sm text-purple-700">Conditional Edge</div><div className="text-xs text-slate-600">조건에 따라 다른 Node로 분기</div></div>
              </div>
            </div>
          );
        }
        if (stepData.visual === 'conditional') {
          return (
            <div className="flex flex-col items-center gap-2">
              <div className="w-28 h-10 rounded-lg bg-purple-600 text-white flex items-center justify-center font-bold text-sm">질문 분석</div>
              <div className="text-purple-400 font-bold">조건 분기</div>
              <div className="flex gap-6">
                <div className="text-center">
                  <div className="text-xs text-slate-500 mb-1">단순</div>
                  <div className="w-24 h-10 rounded-lg bg-green-100 border-2 border-green-300 flex items-center justify-center font-bold text-sm text-green-700">바로 답변</div>
                </div>
                <div className="text-center">
                  <div className="text-xs text-slate-500 mb-1">복잡</div>
                  <div className="w-24 h-10 rounded-lg bg-amber-100 border-2 border-amber-300 flex items-center justify-center font-bold text-sm text-amber-700">검색 후 답변</div>
                </div>
              </div>
            </div>
          );
        }
        if (stepData.visual === 'loop') {
          return (
            <div className="flex flex-col items-center gap-2">
              <div className="w-28 h-10 rounded-lg bg-purple-600 text-white flex items-center justify-center font-bold text-sm">Agent 생각</div>
              <span className="text-purple-400">↓</span>
              <div className="w-28 h-10 rounded-lg bg-purple-100 border-2 border-purple-300 flex items-center justify-center font-bold text-sm text-purple-700">도구 호출</div>
              <span className="text-purple-400">↓</span>
              <div className="w-28 h-10 rounded-lg bg-purple-100 border-2 border-purple-300 flex items-center justify-center font-bold text-sm text-purple-700">결과 관찰</div>
              <div className="flex items-center gap-2 text-sm text-purple-500">
                <span>↩ 부족하면 다시 위로</span>
              </div>
            </div>
          );
        }
        if (stepData.visual === 'summary') {
          return (
            <div className="space-y-3">
              <div className="p-3 rounded-lg bg-slate-100 border border-slate-200">
                <div className="font-bold text-sm text-slate-600 mb-1">Chain (LCEL)</div>
                <div className="text-xs text-slate-500">순차 처리 전용 · 단순한 파이프라인</div>
                <div className="flex gap-1 mt-2">{['A','→','B','→','C'].map((t,i) => <span key={i} className="text-slate-400 text-sm font-mono">{t}</span>)}</div>
              </div>
              <div className="p-3 rounded-lg bg-purple-50 border border-purple-200">
                <div className="font-bold text-sm text-purple-700 mb-1">Graph (LangGraph) ⭐</div>
                <div className="text-xs text-purple-600">분기 + 루프 + 상태 관리</div>
                <div className="flex gap-1 mt-2 text-sm font-mono text-purple-500">A → B ↔ C → END</div>
              </div>
            </div>
          );
        }
        return null;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-purple-700 hover:text-purple-900 font-medium"><span aria-hidden="true">&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. LangGraph &gt; Chapter 1. LangGraph 개요</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-1-1. 왜 LangGraph인가</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>일직선 도로 vs 교차로 도시</b> — Chain은 일직선 도로, Graph는 교차로가 있는 도시입니다. 조건 분기와 루프가 필요할 때 LangGraph를 사용합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-purple-700 border-purple-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">왜 LangGraph인가</h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderVisual()}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (<div key={i} className={l.highlight ? 'bg-purple-900/40 -mx-4 px-4' : ''}>{l.line || '\u00A0'}</div>))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['StateGraph', '조건 분기', '루프', '비선형'].map(kw => (<span key={kw} className="bg-purple-50 text-purple-700 px-3 py-1 rounded-full text-sm font-medium border border-purple-200">{kw}</span>))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-purple-600 hover:bg-purple-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="../part3/III-2-3.html" className="text-purple-600 hover:text-purple-800 font-medium">&larr; III-2-3</a>
              <a href="./IV-1-2.html" className="text-purple-600 hover:text-purple-800 font-medium">IV-1-2. StateGraph 기본 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
