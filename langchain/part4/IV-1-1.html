            '| 가시화 | 텍스트                | draw_mermaid() 한 줄            |',
            '',
            '## Chain이 더 좋은 케이스',
            '',
            '- prompt | llm | parser 한 줄 파이프라인',
            '- 요약 / 분류 / 임베딩 같은 stateless 변환',
            '- 단순 RAG: retriever | prompt | llm | parser',
            '- → 짧고 읽기 좋은 LCEL이 정답',
            '',
            '## LangGraph가 더 좋은 케이스',
            '',
            '- ReAct Agent (생각 ↔ 도구 ↔ 관찰 루프)',
            '- 재시도 / 백오프 / 폴백 정책',
            '- Human-in-the-loop 승인 워크플로우',
            '- Multi-agent / Planner-Executor',
            '- Self-correcting RAG (검색 → 검증 → 재검색)',
            '',
            '## 같이 쓴다',
            '',
            'LangGraph는 LangChain을 대체하지 않는다.',
            '한 노드 안에서 prompt | llm | parser LCEL 체인을 그대로 호출하고,',
            '그 노드들을 그래프 위에 배치하는 구조.',
            '',
            '```python',
            'def plan_node(state):',
            '    chain = plan_prompt | llm | StrOutputParser()',
            '    return {"plan": chain.invoke(state)}',
            '```',
            '',
            '## 다음 단계',
            '',
            '- IV-1-2 StateGraph 기본 (State / 노드 / 엣지 깊게)',
            '- IV-2-x Agent 패턴 (ReAct / ToolNode / interrupt)',
            '- IV-3-x 실전 RAG + LangGraph',
          ],
          highlight: [3, 5, 6, 7, 8, 9, 10, 13, 15, 16, 17, 18, 21, 23, 24, 25, 26, 27, 30, 32, 33],
        },
      },
    ];

    // ChainDiagram — 직선 노드 + (선택) 막힘 표시
    function ChainDiagram({ state, compact }) {
      if (!state) return null;
      return (
        <div className={`bg-slate-50 rounded-lg border-2 border-slate-200 ${compact ? 'p-2' : 'p-3'}`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🛣️</span>
              <span className="text-[11px] font-bold text-slate-700">Chain — 일직선 도로</span>
            </div>
            <span className="text-[9px] bg-slate-300 text-slate-700 px-1.5 py-0.5 rounded font-mono">LCEL `|`</span>
          </div>
          <div className="flex items-center justify-center gap-1.5 py-2">
            {state.nodes.map((n, i) => (
              <React.Fragment key={n.id}>
                <div
                  className={`flex flex-col items-center justify-center rounded-lg border-2 transition-all duration-500 ${
                    n.active ? 'bg-emerald-100 border-emerald-400 text-emerald-800' : 'bg-slate-100 border-slate-300 text-slate-500'
                  }`}
                  style={{ width: compact ? 60 : 72, height: compact ? 48 : 56 }}
                >
                  <span className="text-base leading-none">{n.icon}</span>
                  <span className="text-[10px] font-bold mt-0.5">{n.label}</span>
                </div>
                {i < state.nodes.length - 1 && <span className="text-emerald-500 text-xl font-bold">→</span>}
              </React.Fragment>
            ))}
          </div>
          {state.blocked && (
            <div className="mt-2 bg-red-50 border border-red-300 rounded p-1.5">
              <div className="flex items-center gap-1.5 text-[10px] text-red-700 font-mono">
                <span className="text-sm">🚫</span>
                <span><b>{state.blocked.from}</b> ← <b>{state.blocked.toward}</b> : {state.blocked.reason}</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    // GraphDiagram — SVG로 노드/엣지 (분기·루프 표현)
    function GraphDiagram({ state, compact }) {
      if (!state) return null;
      const width = compact ? 520 : 660;
      const height = compact ? 220 : 240;
      const findNode = (id) => state.nodes.find((n) => n.id === id);
      const edgePath = (e) => {
        const a = findNode(e.from); const b = findNode(e.to);
        if (!a || !b) return '';
        if (e.from === e.to) {
          return `M ${a.x + 30} ${a.y - 5} C ${a.x + 70} ${a.y - 50}, ${a.x + 10} ${a.y - 50}, ${a.x + 30} ${a.y - 5}`;
        }
        const mx = (a.x + b.x) / 2; const my = (a.y + b.y) / 2;
        return `M ${a.x + 30} ${a.y} Q ${mx} ${my} ${b.x - 5} ${b.y}`;
      };

      return (
        <div className={`bg-emerald-50 rounded-lg border-2 border-emerald-300 ${compact ? 'p-2' : 'p-3'}`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🕸️</span>
              <span className="text-[11px] font-bold text-emerald-800">LangGraph — 교차로 도시</span>
            </div>
            <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono">StateGraph</span>
          </div>

          <div className="bg-white rounded border border-emerald-200 overflow-hidden">
            <svg viewBox={`0 0 ${width} ${height}`} className="w-full" style={{ maxHeight: compact ? 180 : 220 }}>
              <defs>
                <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                  <path d="M0,0 L10,5 L0,10 z" fill="#059669" />
                </marker>
                <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                  <path d="M0,0 L10,5 L0,10 z" fill="#d97706" />
                </marker>
                <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                  <path d="M0,0 L10,5 L0,10 z" fill="#2563eb" />
                </marker>
              </defs>

              {state.edges.map((e, i) => {
                const stroke = e.type === 'conditional' ? '#d97706' : e.type === 'loop' ? '#2563eb' : '#059669';
                const marker = e.type === 'conditional' ? 'url(#arrow-amber)' : e.type === 'loop' ? 'url(#arrow-blue)' : 'url(#arrow-emerald)';
                const dash = e.type === 'conditional' ? '5 3' : e.type === 'loop' ? '3 3' : 'none';
                const a = findNode(e.from); const b = findNode(e.to);
                if (!a || !b) return null;
                let lx = (a.x + b.x) / 2;
                let ly = (a.y + b.y) / 2 - 8;
                if (e.from === e.to) { lx = a.x + 30; ly = a.y - 45; }
                return (
                  <g key={i}>
                    <path d={edgePath(e)} fill="none" stroke={stroke} strokeWidth={e.active ? 2 : 1} strokeDasharray={dash} markerEnd={marker} opacity={e.active ? 1 : 0.4} />
                    {e.label && (
                      <g>
                        <rect x={lx - 22} y={ly - 8} width={44} height={14} rx={3} fill="white" stroke={stroke} strokeWidth="0.5" />
                        <text x={lx} y={ly + 2} fontSize="9" fontFamily="monospace" textAnchor="middle" fill={stroke} fontWeight="bold">{e.label}</text>
                      </g>
                    )}
                  </g>
                );
              })}

              {state.nodes.map((n) => {
                const isTerm = n.type === 'terminal';
                return (
                  <g key={n.id}>
                    {isTerm
                      ? <circle cx={n.x + 12} cy={n.y} r="14" fill="#1f2937" stroke="#0f172a" strokeWidth="1.5" />
                      : <rect x={n.x - 10} y={n.y - 16} rx="6" ry="6" width="80" height="32" fill="#ecfdf5" stroke="#059669" strokeWidth="1.5" />
                    }
                    <text x={isTerm ? n.x + 12 : n.x + 30} y={n.y + (isTerm ? 4 : 0)} fontSize={isTerm ? 11 : 10} fontFamily="monospace" textAnchor="middle" fill={isTerm ? 'white' : '#065f46'} fontWeight="bold">
                      {isTerm ? n.label : `${n.icon} ${n.label}`}
                    </text>
                  </g>
                );
              })}
            </svg>
          </div>

          {state.state && (
            <div className="mt-2 bg-white rounded border border-emerald-200 p-2">
              <div className="text-[9px] font-bold text-emerald-700 mb-1 uppercase tracking-wider">State (TypedDict)</div>
              <div className="space-y-0.5">
                {Object.entries(state.state).map(([k, v]) => (
                  <div key={k} className="text-[10px] font-mono leading-tight">
                    <span className="text-slate-500">{k}</span>
                    <span className="text-slate-400">: </span>
                    <span className="text-emerald-700">"{v}"</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="flex flex-wrap gap-2 mt-2 text-[9px] text-slate-600">
            <span className="flex items-center gap-1"><svg width="20" height="6"><line x1="0" y1="3" x2="20" y2="3" stroke="#059669" strokeWidth="2"/></svg>normal</span>
            <span className="flex items-center gap-1"><svg width="20" height="6"><line x1="0" y1="3" x2="20" y2="3" stroke="#d97706" strokeWidth="2" strokeDasharray="3 2"/></svg>conditional</span>
            <span className="flex items-center gap-1"><svg width="20" height="6"><line x1="0" y1="3" x2="20" y2="3" stroke="#2563eb" strokeWidth="2" strokeDasharray="2 2"/></svg>loop</span>
          </div>
        </div>
      );
    }

    // ScenarioBox — step별 시나리오 (limit/cyclic/intro/branch/compare)
    function ScenarioBox({ scenario }) {
      if (!scenario) return null;

      if (scenario.kind === 'limit') {
        return (
          <div className="bg-red-50 border-2 border-red-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">⚠️</span>
              <span className="text-[11px] font-bold text-red-700">Chain으로 표현 안되는 워크플로우</span>
            </div>
            <ul className="space-y-1.5">
              {scenario.bullets.map((b, i) => (
                <li key={i} className="text-[11px] text-red-800 font-mono leading-tight bg-white rounded border border-red-200 p-1.5">{b}</li>
              ))}
            </ul>
          </div>
        );
      }

      if (scenario.kind === 'cyclic') {
        const colorMap = {
          emerald: { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-800', chip: 'bg-emerald-600' },
          amber: { bg: 'bg-amber-50', border: 'border-amber-300', text: 'text-amber-800', chip: 'bg-amber-600' },
          blue: { bg: 'bg-blue-50', border: 'border-blue-300', text: 'text-blue-800', chip: 'bg-blue-600' },
        };
        return (
          <div className="space-y-2">
            <div className="text-[11px] font-bold text-slate-700 mb-1">실무에서 사이클이 필요한 3가지 패턴</div>
            {scenario.cards.map((c, i) => {
              const cm = colorMap[c.color];
              return (
                <div key={i} className={`${cm.bg} ${cm.border} border-2 rounded-lg p-2`}>
                  <div className="flex items-center gap-1.5 mb-1.5">
                    <span className="text-base">{c.icon}</span>
                    <span className={`text-[11px] font-bold ${cm.text}`}>{c.title}</span>
                  </div>
                  <div className="flex items-center gap-1 mb-1.5 flex-wrap">
                    {c.flow.map((f, j) => (
                      <React.Fragment key={j}>
                        <span className={`${cm.chip} text-white text-[9px] font-mono font-bold px-1.5 py-0.5 rounded`}>{f}</span>
                        {j < c.flow.length - 1 && <span className="text-slate-400 text-xs">→</span>}
                      </React.Fragment>
                    ))}
                  </div>
                  <div className={`text-[10px] ${cm.text} font-mono italic`}>↻ {c.loopBack}</div>
                </div>
              );
            })}
          </div>
        );
      }

      if (scenario.kind === 'intro') {
        return (
          <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">🛠️</span>
              <span className="text-[11px] font-bold text-emerald-800">StateGraph 4단계 빌드</span>
            </div>
            <ol className="space-y-1.5">
              {scenario.steps.map((s) => (
                <li key={s.num} className="flex items-start gap-2 bg-white rounded border border-emerald-200 p-1.5">
                  <span className="bg-emerald-600 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full flex-shrink-0">{s.num}</span>
                  <span className="text-[10px] text-emerald-900 leading-snug">{s.text}</span>
                </li>
              ))}
            </ol>
          </div>
        );
      }

      if (scenario.kind === 'branch') {
        return (
          <div className="bg-amber-50 border-2 border-amber-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">🔀</span>
                <span className="text-[11px] font-bold text-amber-800">조건부 엣지 — 라우터 함수</span>
              </div>
              <span className="text-[9px] bg-amber-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">active: {scenario.activeRoute}</span>
            </div>
            <div className="space-y-1.5">
              {scenario.branches.map((b, i) => {
                const isActive = scenario.activeRoute === b.cond.split('"')[1];
                return (
                  <div key={i} className={`bg-white rounded border-2 p-2 transition-all ${isActive ? 'border-amber-500 shadow-md' : 'border-slate-200 opacity-60'}`}>
                    <div className="flex items-center gap-1.5">
                      <span className="text-base">{b.icon}</span>
                      <code className="text-[9px] bg-slate-100 px-1 py-0.5 rounded text-slate-700 font-mono">{b.cond}</code>
                      <span className="text-slate-400 text-xs">→</span>
                      <span className="text-[10px] font-bold text-amber-700 font-mono">{b.target}</span>
                    </div>
                    <div className="text-[9px] text-slate-600 mt-0.5 ml-6">{b.desc}</div>
                  </div>
                );
              })}
            </div>
            <div className="mt-2 bg-blue-50 border border-blue-300 rounded p-1.5">
              <div className="text-[10px] text-blue-800 font-mono"><span className="font-bold">🔁 루프:</span> {scenario.loopHint}</div>
            </div>
          </div>
        );
      }

      if (scenario.kind === 'compare') {
        return (
          <div className="bg-white rounded-lg border-2 border-slate-300 overflow-hidden">
            <div className="bg-slate-100 px-2 py-1.5 border-b border-slate-300">
              <span className="text-[11px] font-bold text-slate-700">📊 Chain vs Graph 7 항목 비교</span>
            </div>
            <table className="w-full text-[10px]">
              <thead className="bg-slate-50">
                <tr>
                  <th className="px-1.5 py-1 text-left font-bold text-slate-600 border-b border-slate-200">항목</th>
                  <th className="px-1.5 py-1 text-left font-bold text-slate-600 border-b border-slate-200">Chain</th>
                  <th className="px-1.5 py-1 text-left font-bold text-emerald-700 border-b border-slate-200">LangGraph</th>
                </tr>
              </thead>
              <tbody>
                {scenario.rows.map((r, i) => (
                  <tr key={i} className="border-b border-slate-100">
                    <td className="px-1.5 py-1 font-bold text-slate-700">{r.feature}</td>
                    <td className={`px-1.5 py-1 ${r.winner === 'chain' ? 'text-emerald-700 font-bold bg-emerald-50' : 'text-slate-500'}`}>{r.chain}</td>
                    <td className={`px-1.5 py-1 ${r.winner === 'graph' ? 'text-emerald-700 font-bold bg-emerald-50' : 'text-slate-500'}`}>{r.graph}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      }
      return null;
    }

    // LiveDataPane — 좌측 패널 전체
    function LiveDataPane({ step, stepIdx }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🛣️ Chain (직선) vs 🕸️ LangGraph (그래프)</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>
          <div className="space-y-3">
            {stepIdx === 0 && (<><ChainDiagram state={step.chainState} /><ScenarioBox scenario={step.scenario} /></>)}
            {stepIdx === 1 && <ScenarioBox scenario={step.scenario} />}
            {stepIdx === 2 && (<><GraphDiagram state={step.graphState} /><ScenarioBox scenario={step.scenario} /></>)}
            {stepIdx === 3 && (<><GraphDiagram state={step.graphState} /><ScenarioBox scenario={step.scenario} /></>)}
            {stepIdx === 4 && (
              <>
                <div className="grid grid-cols-1 gap-2">
                  <ChainDiagram state={step.chainState} compact />
                  <GraphDiagram state={step.graphState} compact />
                </div>
                <ScenarioBox scenario={step.scenario} />
              </>
            )}
          </div>
        </div>
      );
    }

    // VSCode 스타일 CodeViewer — highlight.js
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          setRenderedLines(codeRef.current.innerHTML.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>
          <pre className="hidden"><code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code></pre>
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div key={i} className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''}`}>
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">{i + 1}</span>
                      <span className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1" dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }} />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // App 메인
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);
      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) { setIsPlaying(false); return i; }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };
      const handleReset = () => { setStepIdx(0); setIsPlaying(false); };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-1</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. LangGraph &gt; Chapter 1. LangGraph 개요</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-1-1. 왜 LangGraph인가</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Chain 한계 → Graph 기반 워크플로우 (분기·루프·승인)</p>
                </div>
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: 단순 파이프라인은 <strong>Chain (LCEL)</strong>, 분기·루프·승인이 필요하면 <strong>LangGraph</strong>. 같이 쓴다 — 노드 안에서 LCEL 체인을 호출하는 게 실전 패턴이다. 다음(IV-1-2)에서는 <strong>StateGraph</strong>의 State·노드·엣지를 깊게 다룬다.
              </div>
            )}

            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">Step {stepIdx + 1} / {STEPS.length} · {step.title}</h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로" className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]">
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계" className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <div className="flex flex-wrap gap-2 justify-center">
              {['StateGraph', 'add_node', 'add_conditional_edges', 'TypedDict State', '루프', '분기', 'Human-in-the-loop', 'LCEL'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">{kw}</span>
              ))}
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="../part3/III-2-3.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; III-2-3</a>
              <a href="./IV-1-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">IV-1-2. StateGraph 기본 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
