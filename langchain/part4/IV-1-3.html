<body>
  <div id="root"></div>

  <!--
    IV-1-3. Node, Edge, Conditional Edge — LangGraph 그래프 구성 5요소
    학습 목표: LangGraph 그래프의 핵심 5개 요소(Node/Edge/Conditional Edge/Loop/END)를
              SVG 다이어그램으로 시각화하며, 단계마다 그래프가 점진적으로 완성되도록 한다.
    핵심 비유: 지하철 노선도 — 역(Node), 직통 노선(Edge), 환승역(Conditional), 순환선(Loop), 종착역(END)
    패턴: fastapi v1 — 좌(LiveDataPane: SVG Graph) / 우(VSCode CodeViewer with 파일 탭)
    색상: emerald
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 5단계 그래프 구성 시나리오
    //   Step 1: Node — 함수가 state 받아 변경된 state 반환
    //   Step 2: Edge — 직선 연결 add_edge("a", "b")
    //   Step 3: Conditional Edge — 마름모 분기 (router 함수)
    //   Step 4: Loop — tool → agent로 돌아가는 곡선 화살표
    //   Step 5: END — 종료 노드 (이중 원)
    // ─────────────────────────────────────────────────────

    // 그래프 노드의 좌표 (SVG 460×420 기준)
    const POS = {
      START:  { x: 230, y:  40, label: 'START',  shape: 'pill',    color: 'slate' },
      agent:  { x: 230, y: 130, label: 'agent',  shape: 'rect',    color: 'emerald' },
      router: { x: 230, y: 220, label: 'route?', shape: 'diamond', color: 'amber' },
      tool:   { x:  90, y: 310, label: 'tool',   shape: 'rect',    color: 'sky' },
      END:    { x: 370, y: 310, label: 'END',    shape: 'double',  color: 'rose' },
    };

    const STEPS = [
      {
        title: 'Step 1. Node — 함수가 State를 변경',
        desc: 'Node는 LangGraph의 가장 기본 단위다. State(dict)를 받아 일부를 변경한 dict를 반환하는 일반 Python 함수다. 비유하면 지하철의 "역"으로, 승객(State)이 도착하면 무언가(메시지 추가, 카운트 증가)를 처리해 다음 역으로 보낸다. add_node(이름, 함수)로 등록.',
        nodes: ['agent'],
        edges: [],
        active: { node: 'agent', edge: null },
        explain: {
          title: '🔹 Node = State를 받아 State를 반환하는 함수',
          bullets: [
            '입력: 현재 State (dict)',
            '출력: 변경된 State (병합됨)',
            'add_node("이름", 함수)로 그래프에 등록',
          ],
        },
        code: {
          lang: 'python',
          filename: 'node.py',
          lines: [
            '# Step 1. Node — State를 변경하는 함수',
            'from typing import TypedDict, Annotated',
            'from operator import add',
            'from langgraph.graph import StateGraph',
            '',
            '# 1) State 스키마 정의',
            'class AgentState(TypedDict):',
            '    messages: Annotated[list, add]   # 누적되는 메시지',
            '    count: int                        # 호출 횟수',
            '',
            '# 2) Node 함수 — State 받아 변경된 State 반환',
            'def call_agent(state: AgentState) -> dict:',
            '    """LLM 호출 결과를 messages 에 추가."""',
            '    new_msg = {"role": "ai", "content": "안녕하세요"}',
            '    return {',
            '        "messages": [new_msg],     # add 로 누적됨',
            '        "count": state["count"] + 1,',
            '    }',
            '',
            '# 3) StateGraph 에 Node 등록',
            'graph = StateGraph(AgentState)',
            'graph.add_node("agent", call_agent)',
            '',
            '# 💡 핵심: Node는 그냥 Python 함수다.',
            '#    LLM, DB 조회, API 호출 등 무엇이든 가능.',
            '#    return 한 dict 가 State 에 자동 병합된다.',
          ],
          highlight: [7, 8, 9, 12, 13, 14, 15, 16, 17, 18, 22, 23],
        },
      },
      {
        title: 'Step 2. Edge — 노드 간 직접 연결',
        desc: 'Node 만 있으면 흐름이 없다. Edge 가 노드를 잇는 "직통 노선"이다. add_edge("a", "b")는 a 가 끝나면 무조건 b 로 간다는 뜻. 분기 없는 단순 연결. START 노드에서 진입점(set_entry_point) 으로 첫 노드를 지정하는 것도 본질은 Edge 다.',
        nodes: ['START', 'agent'],
        edges: [{ from: 'START', to: 'agent', kind: 'direct' }],
        active: { node: null, edge: 'START->agent' },
        explain: {
          title: '🔹 Edge = "끝나면 무조건 다음 노드"',
          bullets: [
            'add_edge("출발", "도착") — 분기 없음',
            'set_entry_point(이름) = START → 이름 Edge',
            '단순 파이프라인 흐름에 사용',
          ],
        },
        code: {
          lang: 'python',
          filename: 'edge.py',
          lines: [
            '# Step 2. Edge — 노드 간 직통 연결',
            'from langgraph.graph import StateGraph, START',
            '',
            'graph = StateGraph(AgentState)',
            'graph.add_node("agent", call_agent)',
            'graph.add_node("save", save_log)',
            '',
            '# 1) Entry Point — 그래프 시작점 지정',
            'graph.set_entry_point("agent")',
            '#   ↳ 내부적으로: add_edge(START, "agent") 와 동일',
            '',
            '# 2) 일반 Edge — 분기 없는 직통',
            'graph.add_edge("agent", "save")',
            '#   ↳ "agent" 끝나면 무조건 "save" 실행',
            '',
            '# 다이어그램으로 보면:',
            '#',
            '#   START ──▶ agent ──▶ save',
            '#',
            '# 비유: 지하철 직통 노선',
            '#   - 분기 없음, 환승 없음',
            '#   - 출발 노드 종료 = 도착 노드 시작',
            '',
            '# ⚠ 주의: 같은 출발에서 add_edge 와 add_conditional_edges 를',
            '#         동시에 쓰면 안 된다 (둘 중 하나만).',
          ],
          highlight: [1, 8, 9, 12, 13, 17, 18, 19],
        },
      },
      {
        title: 'Step 3. Conditional Edge — 함수가 다음 노드 결정',
        desc: '실제 Agent 는 "도구가 필요한가?" 를 매번 판단해야 한다. add_conditional_edges 는 라우팅 함수가 State 를 보고 문자열을 반환하면, 그 문자열에 매핑된 노드로 분기시킨다. 다이어그램의 "마름모"가 분기점. agent 가 LLM 호출 결과로 tool_calls 가 있으면 tool 로, 없으면 END 로 보낸다.',
        nodes: ['START', 'agent', 'router', 'tool', 'END'],
        edges: [
          { from: 'START', to: 'agent', kind: 'direct' },
          { from: 'agent', to: 'router', kind: 'direct-implicit' },
          { from: 'router', to: 'tool', kind: 'cond', label: '"continue"' },
          { from: 'router', to: 'END', kind: 'cond', label: '"end"' },
        ],
        active: { node: 'router', edge: null },
        explain: {
          title: '🔹 Conditional Edge = State 기반 분기',
          bullets: [
            'router 함수: state → 문자열',
            '문자열 → 노드 매핑 dict 로 분기',
            '다이어그램에서 ◇ 마름모로 표현',
          ],
        },
        code: {
          lang: 'python',
          filename: 'conditional-edge.py',
          lines: [
            '# Step 3. Conditional Edge — State 보고 분기',
            'from langgraph.graph import StateGraph, START, END',
            '',
            '# 1) 라우팅 함수 — State 받아 "키" 반환',
            'def should_continue(state: AgentState) -> str:',
            '    """tool_calls 있으면 continue, 없으면 end."""',
            '    last_msg = state["messages"][-1]',
            '    if last_msg.get("tool_calls"):',
            '        return "continue"',
            '    return "end"',
            '',
            'graph = StateGraph(AgentState)',
            'graph.add_node("agent", call_agent)',
            'graph.add_node("tool",  call_tool)',
            'graph.set_entry_point("agent")',
            '',
            '# 2) Conditional Edge 등록',
            'graph.add_conditional_edges(',
            '    "agent",            # 출발 노드',
            '    should_continue,    # 라우팅 함수',
            '    {                   # 키 → 노드 매핑',
            '        "continue": "tool",',
            '        "end":      END,',
            '    },',
            ')',
            '',
            '# 다이어그램:',
            '#                ┌── "continue" ──▶ tool',
            '#   agent ──▶ ◇ ─┤',
            '#                └── "end"      ──▶ END',
            '',
            '# 💡 라우팅 함수는 LLM 이 아닌 일반 코드.',
            '#    if/else, switch 같은 단순 분기가 가장 흔하다.',
          ],
          highlight: [4, 5, 6, 7, 8, 9, 10, 17, 18, 19, 20, 21, 22, 23, 24, 25],
        },
      },
      {
        title: 'Step 4. Loop — 같은 노드로 다시 돌아오는 사이클',
        desc: 'Agent 는 한 번에 끝나지 않는다. 도구를 쓰고 → 결과 보고 → 또 도구가 필요한지 판단 → 반복. tool 노드에서 다시 agent 로 돌아가는 Edge 를 만들면 사이클(loop) 이 생긴다. add_edge("tool", "agent") 한 줄. ReAct 패턴의 핵심이며, LangGraph 가 LCEL 보다 강력한 이유가 바로 이 cycle 지원이다.',
        nodes: ['START', 'agent', 'router', 'tool', 'END'],
        edges: [
          { from: 'START', to: 'agent', kind: 'direct' },
          { from: 'agent', to: 'router', kind: 'direct-implicit' },
          { from: 'router', to: 'tool', kind: 'cond', label: '"continue"' },
          { from: 'router', to: 'END', kind: 'cond', label: '"end"' },
          { from: 'tool', to: 'agent', kind: 'loop', label: '루프' },
        ],
        active: { node: 'tool', edge: 'tool->agent' },
        explain: {
          title: '🔹 Loop = 직전 노드로 되돌아가는 Edge',
          bullets: [
            'tool → agent 로 add_edge 하면 사이클',
            'ReAct: 생각 → 행동 → 관찰 반복',
            'LCEL 은 단방향, LangGraph 는 cycle 가능',
          ],
        },
        code: {
          lang: 'python',
          filename: 'loop.py',
          lines: [
            '# Step 4. Loop — 같은 노드로 돌아오는 사이클',
            'from langgraph.graph import StateGraph, START, END',
            '',
            'graph = StateGraph(AgentState)',
            'graph.add_node("agent", call_agent)',
            'graph.add_node("tool",  call_tool)',
            'graph.set_entry_point("agent")',
            '',
            'graph.add_conditional_edges(',
            '    "agent", should_continue,',
            '    {"continue": "tool", "end": END},',
            ')',
            '',
            '# ⭐ 핵심: tool → agent 로 되돌아가는 Edge',
            'graph.add_edge("tool", "agent")',
            '#   ↳ 도구 실행 후 다시 agent 가 판단',
            '#   ↳ 또 도구 필요? → tool → agent → … 반복',
            '#   ↳ 끝났다? → "end" 반환 → END',
            '',
            '# 실행 흐름 예시 (질문: "서울 날씨 알려줘"):',
            '#',
            '#   1회차: agent → "continue" → tool (날씨 API)',
            '#                                  ↓',
            '#   2회차: agent ◀──────────── (loop)',
            '#          → "end" → END (최종 답변)',
            '',
            '# 💡 LCEL 은 RunnableSequence — 단방향 파이프.',
            '#    LangGraph 는 그래프 — cycle 자유롭게 가능.',
            '#    ReAct, Reflection, Planner 같은 패턴이 여기서 나옴.',
            '',
            '# ⚠ 무한 루프 방지: recursion_limit (기본 25) 자동 적용',
            'app = graph.compile()',
            'app.invoke({"messages": []}, {"recursion_limit": 10})',
          ],
          highlight: [14, 15, 16, 17, 18, 30, 31, 32],
        },
      },
      {
        title: 'Step 5. END — 그래프 종료 지점',
        desc: 'END 는 "종착역"을 나타내는 특수 상수다. 어떤 경로로든 그래프는 반드시 END 에 도달해야 실행이 끝난다. 다이어그램의 이중 원이 종료. 일반 Edge 로도(add_edge("save", END)), Conditional Edge 매핑으로도({"end": END}) 연결할 수 있다. compile() 후 invoke 하면 START 부터 END 까지 흘러가며 최종 State 를 반환.',
        nodes: ['START', 'agent', 'router', 'tool', 'END'],
        edges: [
          { from: 'START', to: 'agent', kind: 'direct' },
          { from: 'agent', to: 'router', kind: 'direct-implicit' },
          { from: 'router', to: 'tool', kind: 'cond', label: '"continue"' },
          { from: 'router', to: 'END', kind: 'cond', label: '"end"' },
          { from: 'tool', to: 'agent', kind: 'loop', label: '루프' },
        ],
        active: { node: 'END', edge: 'router->END' },
        explain: {
          title: '🔹 END = 종착역 (필수 도달)',
          bullets: [
            'from langgraph.graph import END',
            '모든 경로는 결국 END 로 수렴해야 함',
            'compile() → invoke() 하면 최종 State 반환',
          ],
        },
        code: {
          lang: 'python',
          filename: 'end.py',
          lines: [
            '# Step 5. END — 그래프 종료 지점',
            'from langgraph.graph import StateGraph, START, END',
            '',
            '# END 는 LangGraph 에서 import 하는 특수 상수',
            '# (실체는 문자열 "__end__")',
            '',
            '# 1) 일반 Edge 로 END 연결',
            'graph.add_edge("save", END)',
            '#   ↳ "save" 끝나면 무조건 종료',
            '',
            '# 2) Conditional Edge 매핑으로 END 연결',
            'graph.add_conditional_edges(',
            '    "agent", should_continue,',
            '    {',
            '        "continue": "tool",',
            '        "end":      END,    # ← 이쪽이 종료',
            '    },',
            ')',
            '',
            '# ─── 전체 그래프 ───',
            '#',
            '#   START ──▶ agent ──◇ should_continue',
            '#               ▲       │',
            '#               │       ├── "continue" ─▶ tool ─┐',
            '#               └───────┴──────────── (loop) ◀──┘',
            '#                       │',
            '#                       └── "end" ─▶ END ◎',
            '',
            '# 3) 컴파일 후 실행',
            'app = graph.compile()',
            'final_state = app.invoke({"messages": [user_msg]})',
            '#   ↳ START 에서 시작 → END 도달 시 final_state 반환',
            '',
            '# 💡 정리:',
            '#   - Node    : State 변경 함수',
            '#   - Edge    : 직통 연결',
            '#   - Cond.   : State 보고 분기',
            '#   - Loop    : 사이클 (cycle 지원)',
            '#   - END     : 종착점 (필수)',
          ],
          highlight: [2, 4, 7, 8, 11, 12, 13, 14, 15, 16, 17, 28, 29, 30],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // SVG 그래프 다이어그램
    //   nodes: 표시할 노드 ID 배열
    //   edges: { from, to, kind, label? } 배열
    //     kind: 'direct' | 'direct-implicit' | 'cond' | 'loop'
    //   active: { node, edge } — 강조할 요소
    // ─────────────────────────────────────────────────────
    const NODE_COLORS = {
      slate:   { bg: '#e2e8f0', border: '#94a3b8', text: '#334155' },
      emerald: { bg: '#d1fae5', border: '#10b981', text: '#065f46' },
      amber:   { bg: '#fef3c7', border: '#f59e0b', text: '#92400e' },
      sky:     { bg: '#e0f2fe', border: '#0ea5e9', text: '#075985' },
      rose:    { bg: '#ffe4e6', border: '#f43f5e', text: '#9f1239' },
    };

    function NodeShape({ id, active }) {
      const p = POS[id];
      const c = NODE_COLORS[p.color];
      const stroke = active ? '#10b981' : c.border;
      const strokeWidth = active ? 3.5 : 2;
      const filter = active ? 'url(#glow)' : null;

      if (p.shape === 'diamond') {
        const size = 44;
        const points = `${p.x},${p.y - size} ${p.x + size + 10},${p.y} ${p.x},${p.y + size} ${p.x - size - 10},${p.y}`;
        return (
          <g filter={filter}>
            <polygon points={points} fill={c.bg} stroke={stroke} strokeWidth={strokeWidth} />
            <text x={p.x} y={p.y + 5} textAnchor="middle" fontSize="13" fontWeight="700" fill={c.text}>{p.label}</text>
          </g>
        );
      }
      if (p.shape === 'pill') {
        return (
          <g filter={filter}>
            <rect x={p.x - 45} y={p.y - 16} width="90" height="32" rx="16" fill={c.bg} stroke={stroke} strokeWidth={strokeWidth} />
            <text x={p.x} y={p.y + 5} textAnchor="middle" fontSize="13" fontWeight="700" fill={c.text}>{p.label}</text>
          </g>
        );
      }
      if (p.shape === 'double') {
        return (
          <g filter={filter}>
            <circle cx={p.x} cy={p.y} r="34" fill={c.bg} stroke={stroke} strokeWidth={strokeWidth} />
            <circle cx={p.x} cy={p.y} r="27" fill="none" stroke={stroke} strokeWidth={strokeWidth - 0.5} />
            <text x={p.x} y={p.y + 5} textAnchor="middle" fontSize="13" fontWeight="800" fill={c.text}>{p.label}</text>
          </g>
        );
      }
      // rect
      return (
        <g filter={filter}>
          <rect x={p.x - 50} y={p.y - 22} width="100" height="44" rx="10" fill={c.bg} stroke={stroke} strokeWidth={strokeWidth} />
          <text x={p.x} y={p.y + 5} textAnchor="middle" fontSize="14" fontWeight="700" fill={c.text}>{p.label}</text>
        </g>
      );
    }

    // 두 노드의 외곽까지 라인 끝점을 잘라주는 헬퍼 (간단히 중심으로 처리)
    function edgeEndpoints(fromId, toId) {
      const a = POS[fromId];
      const b = POS[toId];
      // diamond/pill/rect 외곽까지 단순 보정
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const ux = dx / dist;
      const uy = dy / dist;

      const radiusFor = (id) => {
        const p = POS[id];
        if (p.shape === 'diamond') return 50;
        if (p.shape === 'double') return 36;
        if (p.shape === 'pill') return 22;
        return 24; // rect
      };

      const ra = radiusFor(fromId);
      const rb = radiusFor(toId);

      return {
        x1: a.x + ux * ra,
        y1: a.y + uy * ra,
        x2: b.x - ux * rb,
        y2: b.y - uy * rb,
      };
    }

    function EdgePath({ edge, active }) {
      const { from, to, kind, label } = edge;
      const isActive = active === `${from}->${to}`;

      const stroke = isActive ? '#10b981' : (kind === 'cond' ? '#f59e0b' : kind === 'loop' ? '#0ea5e9' : '#64748b');
      const strokeWidth = isActive ? 3 : 2;
      const dash = kind === 'cond' ? '5 4' : null;
      const filter = isActive ? 'url(#glow)' : null;

      // Loop edge — 곡선으로 (tool → agent)
      if (kind === 'loop') {
        const a = POS[from];
        const b = POS[to];
        // 좌측으로 크게 휘는 베지어
        const cx = -50;
        const path = `M ${a.x - 30} ${a.y - 5} C ${cx} ${a.y - 30}, ${cx} ${b.y + 30}, ${b.x - 50} ${b.y + 5}`;
        return (
          <g filter={filter}>
            <path d={path} fill="none" stroke={stroke} strokeWidth={strokeWidth} markerEnd={`url(#arrow-${isActive ? 'active' : 'sky'})`} className={isActive ? 'edge-flow' : ''} strokeDasharray={isActive ? '6 4' : null} />
            {label && (
              <text x={cx - 5} y={(a.y + b.y) / 2} textAnchor="middle" fontSize="11" fontWeight="700" fill={stroke}>{label}</text>
            )}
          </g>
        );
      }

      const { x1, y1, x2, y2 } = edgeEndpoints(from, to);
      const midX = (x1 + x2) / 2;
      const midY = (y1 + y2) / 2;

      const markerId = isActive ? 'arrow-active' : (kind === 'cond' ? 'arrow-amber' : 'arrow-slate');

      return (
        <g filter={filter}>
          <line
            x1={x1} y1={y1} x2={x2} y2={y2}
            stroke={stroke} strokeWidth={strokeWidth}
            strokeDasharray={dash}
            markerEnd={`url(#${markerId})`}
            className={isActive ? 'edge-flow' : ''}
          />
          {label && (
            <g>
              <rect x={midX - 30} y={midY - 9} width="60" height="16" rx="3" fill="white" stroke={stroke} strokeWidth="1" />
              <text x={midX} y={midY + 3} textAnchor="middle" fontSize="10" fontWeight="700" fill={stroke}>{label}</text>
            </g>
          )}
        </g>
      );
    }

    function GraphDiagram({ step }) {
      const { nodes, edges, active } = step;

      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🚇</span>
              <span className="text-[11px] font-bold text-emerald-800">LangGraph 노선도 — 단계별 구성</span>
            </div>
            <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">
              nodes: {nodes.length} · edges: {edges.length}
            </span>
          </div>

          <svg viewBox="0 0 460 380" className="w-full" style={{ maxHeight: '420px' }}>
            <defs>
              {/* 글로우 필터 */}
              <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="blur" />
                <feMerge>
                  <feMergeNode in="blur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>

              {/* 화살표 마커 */}
              <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
              </marker>
              <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" />
              </marker>
              <marker id="arrow-sky" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5e9" />
              </marker>
              <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
              </marker>

              {/* 그리드 배경 패턴 */}
              <pattern id="gridPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
                <circle cx="1" cy="1" r="0.7" fill="#e2e8f0" />
              </pattern>
            </defs>

            {/* 그리드 배경 */}
            <rect x="0" y="0" width="460" height="380" fill="url(#gridPattern)" opacity="0.4" />

            {/* Edges 먼저 (노드 뒤에 깔림) */}
            {edges.map((e, i) => (
              <EdgePath key={i} edge={e} active={active.edge} />
            ))}

            {/* Nodes */}
            {nodes.map((id) => (
              <g key={id} className={active.node === id ? 'glow-active' : ''}>
                <NodeShape id={id} active={active.node === id} />
              </g>
            ))}
          </svg>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-1 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="inline-block w-4 h-0.5 bg-slate-500"></span>direct edge
            </span>
            <span className="flex items-center gap-1">
              <span className="inline-block w-4 h-0.5 bg-amber-500" style={{ borderTop: '1.5px dashed #f59e0b', height: 0 }}></span>conditional
            </span>
            <span className="flex items-center gap-1">
              <span className="inline-block w-4 h-0.5 bg-sky-500"></span>loop
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="inline-block w-2.5 h-2.5 rounded-full bg-emerald-500 glow-active"></span>active
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측: GraphDiagram + 단계별 설명 박스
    // ─────────────────────────────────────────────────────
    function ExplainBox({ explain }) {
      return (
        <div className="bg-emerald-50 border-2 border-emerald-200 rounded-lg p-3">
          <div className="text-[11px] font-bold text-emerald-800 mb-1.5">{explain.title}</div>
          <ul className="space-y-1">
            {explain.bullets.map((b, i) => (
              <li key={i} className="text-[10px] text-emerald-900 flex items-start gap-1.5">
                <span className="text-emerald-500 mt-0.5">▸</span>
                <span className="flex-1 font-mono leading-snug">{b}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ step, stepIdx }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🚇 LangGraph 그래프 다이어그램</h2>
            <span className="text-[10px] text-slate-400 font-mono">step {stepIdx + 1}/5</span>
          </div>
          <div className="space-y-3">
            <GraphDiagram step={step} />
            <ExplainBox explain={step.explain} />
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode CodeViewer with 파일명 탭
    // ─────────────────────────────────────────────────────
    function CodeViewer({ steps, stepIdx }) {
      const code = steps[stepIdx].code;
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일명 탭 행 — 5개 파일 */}
          <div className="bg-[#21252b] flex overflow-x-auto border-b border-slate-700">
            {steps.map((s, i) => {
              const isActive = i === stepIdx;
              return (
                <div
                  key={i}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 ${
                    isActive
                      ? 'bg-[#282c34] text-emerald-300 border-t-2 border-t-emerald-400'
                      : 'bg-[#21252b] text-slate-500'
                  }`}
                >
                  {isActive && <span className="inline-block w-1.5 h-1.5 rounded-full bg-emerald-400 mr-1.5 align-middle"></span>}
                  {s.code.filename}
                </div>
              );
            })}
          </div>

          {/* hidden hljs target */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 코드 본문 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {steps.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. LangGraph &gt; Chapter 1. LangGraph 개요</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-1-3. Node, Edge, Conditional Edge</h1>
                  <p className="text-sm text-slate-500 mt-0.5">지하철 노선도로 그래프 5요소 — Node · Edge · Conditional · Loop · END</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer steps={STEPS} stepIdx={stepIdx} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: <strong>Node</strong>(상태 변경 함수) + <strong>Edge</strong>(직통) + <strong>Conditional</strong>(분기) + <strong>Loop</strong>(사이클) + <strong>END</strong>(종착). 다음(IV-2-1)에서는 이 5요소로 ReAct Agent 를 직접 만든다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['add_node', 'add_edge', 'add_conditional_edges', 'set_entry_point', 'END', 'cycle', 'recursion_limit'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-1-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; IV-1-2 StateGraph 기본</a>
              <a href="./IV-2-1.html" className="text-emerald-700 hover:text-emerald-900 font-medium">IV-2-1 ReAct Agent &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
