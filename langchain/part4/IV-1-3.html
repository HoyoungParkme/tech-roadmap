<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — IV-1-3. Node, Edge, Conditional Edge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "[지하철 노선도] 일반 Edge는 역 사이의 직통 노선입니다. A역에서 B역으로 무조건 이동합니다. add_edge('A', 'B')로 연결합니다.",
        visual: 'normal-edge',
        code: [
          { line: 'from langgraph.graph import StateGraph, END', highlight: false },
          { line: '', highlight: false },
          { line: '# 일반 Edge = 직통 노선', highlight: false },
          { line: 'graph.add_edge("node_a", "node_b")', highlight: true },
          { line: '# node_a 완료 → 무조건 node_b로 이동', highlight: false },
          { line: '', highlight: false },
          { line: 'graph.add_edge("node_b", END)', highlight: true },
          { line: '# node_b 완료 → 종료', highlight: false },
        ],
      },
      {
        desc: "[환승역] Conditional Edge는 환승역입니다. 현재 상태(어느 노선을 탈지)에 따라 다른 역으로 분기합니다. 라우팅 함수가 갈 곳을 결정합니다.",
        visual: 'conditional-edge',
        code: [
          { line: '# Conditional Edge = 환승역', highlight: false },
          { line: '# 상태에 따라 다른 노드로 분기', highlight: false },
          { line: '', highlight: false },
          { line: 'graph.add_conditional_edges(', highlight: true },
          { line: '    "agent",              # 출발 노드', highlight: true },
          { line: '    should_continue,      # 라우팅 함수', highlight: true },
          { line: '    {                     # 목적지 매핑', highlight: true },
          { line: '        "continue": "tool",', highlight: true },
          { line: '        "end": END,', highlight: true },
          { line: '    }', highlight: true },
          { line: ')', highlight: false },
        ],
      },
      {
        desc: "[라우팅 함수] should_continue 함수가 분기를 결정합니다. State를 보고 문자열을 반환하면, 그 문자열에 매핑된 Node로 이동합니다.",
        visual: 'should-continue',
        code: [
          { line: '# 라우팅 함수 (환승 안내원)', highlight: false },
          { line: '', highlight: false },
          { line: 'def should_continue(state):', highlight: true },
          { line: '    last_msg = state["messages"][-1]', highlight: true },
          { line: '', highlight: false },
          { line: '    # 도구 호출이 있으면 → 계속', highlight: false },
          { line: '    if last_msg.tool_calls:', highlight: true },
          { line: '        return "continue"', highlight: true },
          { line: '', highlight: false },
          { line: '    # 없으면 → 종료', highlight: false },
          { line: '    return "end"', highlight: true },
        ],
      },
      {
        desc: "[END 노드] END는 그래프 실행을 종료하는 특수 노드입니다. 지하철의 '종착역'과 같습니다. 모든 그래프는 반드시 END에 도달해야 합니다.",
        visual: 'end-node',
        code: [
          { line: 'from langgraph.graph import END', highlight: true },
          { line: '', highlight: false },
          { line: '# END = 종착역', highlight: false },
          { line: '# 그래프 실행이 여기서 멈춤', highlight: false },
          { line: '', highlight: false },
          { line: '# 일반 Edge로 END 연결', highlight: false },
          { line: 'graph.add_edge("final_node", END)', highlight: true },
          { line: '', highlight: false },
          { line: '# Conditional Edge로 END 연결', highlight: false },
          { line: '# should_continue에서 "end" 반환', highlight: false },
          { line: '# → {"end": END} 매핑으로 종료', highlight: true },
        ],
      },
      {
        desc: "[분기 실행 예시] Agent가 질문을 받으면 도구가 필요한지 판단합니다. 필요하면 tool 노드로, 아니면 END로 이동합니다. 도구 실행 후 다시 agent로 돌아와 판단을 반복합니다.",
        visual: 'example',
        code: [
          { line: '# 분기 실행 예시', highlight: false },
          { line: '', highlight: false },
          { line: '# 1회차: "서울 날씨 알려줘"', highlight: false },
          { line: '# agent → should_continue → "continue"', highlight: true },
          { line: '# → tool (날씨 API 호출)', highlight: true },
          { line: '', highlight: false },
          { line: '# 2회차: 도구 결과 확인', highlight: false },
          { line: '# agent → should_continue → "end"', highlight: true },
          { line: '# → END (최종 답변 반환)', highlight: true },
        ],
      },
      {
        desc: "[전체 그래프] 지하철 노선도 완성! Entry Point에서 시작해서 agent → 조건 분기 → tool(루프) 또는 END로 흘러갑니다. 이것이 LangGraph의 기본 패턴입니다.",
        visual: 'full-graph',
        code: [
          { line: '# 전체 그래프 구성', highlight: false },
          { line: '', highlight: false },
          { line: 'graph = StateGraph(AgentState)', highlight: true },
          { line: 'graph.add_node("agent", call_agent)', highlight: true },
          { line: 'graph.add_node("tool", call_tool)', highlight: true },
          { line: '', highlight: false },
          { line: 'graph.set_entry_point("agent")', highlight: true },
          { line: 'graph.add_conditional_edges("agent", should_continue,', highlight: true },
          { line: '    {"continue": "tool", "end": END})', highlight: true },
          { line: 'graph.add_edge("tool", "agent")', highlight: true },
          { line: '', highlight: false },
          { line: 'app = graph.compile()', highlight: false },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      const renderVisual = () => {
        if (stepData.visual === 'normal-edge') {
          return (
            <div className="flex flex-col items-center gap-3">
              <div className="text-sm font-bold text-slate-500 mb-1">일반 Edge (직통 노선)</div>
              <div className="w-24 h-12 rounded-xl bg-purple-100 border-2 border-purple-300 flex items-center justify-center font-bold text-purple-700">A역</div>
              <div className="flex flex-col items-center"><div className="w-0.5 h-6 bg-purple-400"></div><span className="text-purple-400 text-xs">직통</span><div className="w-0.5 h-6 bg-purple-400"></div></div>
              <div className="w-24 h-12 rounded-xl bg-purple-100 border-2 border-purple-300 flex items-center justify-center font-bold text-purple-700">B역</div>
              <div className="flex flex-col items-center"><div className="w-0.5 h-6 bg-slate-300"></div><span className="text-slate-400 text-xs">직통</span><div className="w-0.5 h-6 bg-slate-300"></div></div>
              <div className="w-24 h-12 rounded-xl bg-red-100 border-2 border-red-300 flex items-center justify-center font-bold text-red-700">종착</div>
            </div>
          );
        }
        if (stepData.visual === 'conditional-edge') {
          return (
            <div className="flex flex-col items-center gap-2">
              <div className="text-sm font-bold text-slate-500 mb-1">Conditional Edge (환승역)</div>
              <div className="w-28 h-12 rounded-xl bg-purple-600 text-white flex items-center justify-center font-bold">Agent</div>
              <div className="text-purple-500 font-bold text-sm">환승 분기</div>
              <div className="flex gap-8">
                <div className="text-center">
                  <div className="text-xs text-slate-500 mb-1">"continue"</div>
                  <div className="w-24 h-12 rounded-xl bg-amber-100 border-2 border-amber-300 flex items-center justify-center font-bold text-amber-700">Tool</div>
                </div>
                <div className="text-center">
                  <div className="text-xs text-slate-500 mb-1">"end"</div>
                  <div className="w-24 h-12 rounded-xl bg-red-100 border-2 border-red-300 flex items-center justify-center font-bold text-red-700">END</div>
                </div>
              </div>
            </div>
          );
        }
        if (stepData.visual === 'should-continue') {
          return (
            <div className="space-y-3">
              <div className="text-sm font-bold text-slate-500 mb-1">라우팅 함수 (환승 안내원)</div>
              <div className="p-3 rounded-lg bg-purple-50 border border-purple-200">
                <div className="font-bold text-sm text-purple-700 mb-2">should_continue(state)</div>
                <div className="flex items-center gap-2 text-xs mb-2">
                  <span className="bg-purple-200 text-purple-800 px-2 py-0.5 rounded">State 확인</span>
                  <span>→</span>
                  <span className="bg-purple-200 text-purple-800 px-2 py-0.5 rounded">문자열 반환</span>
                </div>
              </div>
              <div className="flex gap-3">
                <div className="flex-1 p-2 rounded-lg bg-amber-50 border border-amber-200 text-center">
                  <div className="text-xs font-bold text-amber-700">tool_calls 있음</div>
                  <div className="text-xs text-amber-600 mt-1">→ "continue"</div>
                </div>
                <div className="flex-1 p-2 rounded-lg bg-red-50 border border-red-200 text-center">
                  <div className="text-xs font-bold text-red-700">tool_calls 없음</div>
                  <div className="text-xs text-red-600 mt-1">→ "end"</div>
                </div>
              </div>
            </div>
          );
        }
        if (stepData.visual === 'end-node') {
          return (
            <div className="flex flex-col items-center gap-3">
              <div className="text-sm font-bold text-slate-500 mb-1">END = 종착역</div>
              <div className="flex gap-4">
                <div className="flex flex-col items-center gap-2">
                  <div className="w-20 h-10 rounded-lg bg-purple-100 border-2 border-purple-300 flex items-center justify-center font-bold text-sm text-purple-700">Node</div>
                  <span className="text-purple-400">↓</span>
                  <div className="w-20 h-10 rounded-lg bg-red-500 text-white flex items-center justify-center font-bold text-sm">END</div>
                  <div className="text-xs text-slate-500">직통 연결</div>
                </div>
                <div className="flex flex-col items-center gap-2">
                  <div className="w-20 h-10 rounded-lg bg-purple-600 text-white flex items-center justify-center font-bold text-sm">Agent</div>
                  <span className="text-purple-400 text-xs">조건 분기</span>
                  <div className="w-20 h-10 rounded-lg bg-red-500 text-white flex items-center justify-center font-bold text-sm">END</div>
                  <div className="text-xs text-slate-500">조건부 종료</div>
                </div>
              </div>
            </div>
          );
        }
        if (stepData.visual === 'example') {
          return (
            <div className="space-y-3">
              <div className="text-sm font-bold text-slate-500 mb-1">분기 실행 흐름</div>
              <div className="p-3 rounded-lg bg-purple-50 border border-purple-200">
                <div className="font-bold text-xs text-purple-600 mb-2">1회차: 도구 필요</div>
                <div className="flex items-center gap-1 text-xs">
                  <span className="bg-purple-200 text-purple-800 px-2 py-0.5 rounded">agent</span>
                  <span>→</span>
                  <span className="bg-amber-200 text-amber-800 px-2 py-0.5 rounded">"continue"</span>
                  <span>→</span>
                  <span className="bg-amber-200 text-amber-800 px-2 py-0.5 rounded">tool</span>
                </div>
              </div>
              <div className="p-3 rounded-lg bg-green-50 border border-green-200">
                <div className="font-bold text-xs text-green-600 mb-2">2회차: 충분함</div>
                <div className="flex items-center gap-1 text-xs">
                  <span className="bg-purple-200 text-purple-800 px-2 py-0.5 rounded">agent</span>
                  <span>→</span>
                  <span className="bg-red-200 text-red-800 px-2 py-0.5 rounded">"end"</span>
                  <span>→</span>
                  <span className="bg-red-200 text-red-800 px-2 py-0.5 rounded">END</span>
                </div>
              </div>
            </div>
          );
        }
        if (stepData.visual === 'full-graph') {
          return (
            <div className="flex flex-col items-center gap-2">
              <div className="text-sm font-bold text-slate-500 mb-1">전체 노선도</div>
              <div className="w-24 h-8 rounded bg-green-500 text-white flex items-center justify-center font-bold text-xs">START</div>
              <span className="text-slate-400">↓</span>
              <div className="w-28 h-10 rounded-xl bg-purple-600 text-white flex items-center justify-center font-bold text-sm">agent</div>
              <div className="text-purple-500 font-bold text-xs">should_continue</div>
              <div className="flex gap-8">
                <div className="text-center">
                  <div className="text-xs text-amber-600 mb-1">"continue"</div>
                  <div className="w-20 h-10 rounded-xl bg-amber-100 border-2 border-amber-300 flex items-center justify-center font-bold text-sm text-amber-700">tool</div>
                  <div className="text-purple-400 text-xs mt-1">↩ agent로</div>
                </div>
                <div className="text-center">
                  <div className="text-xs text-red-600 mb-1">"end"</div>
                  <div className="w-20 h-10 rounded-xl bg-red-500 text-white flex items-center justify-center font-bold text-sm">END</div>
                </div>
              </div>
            </div>
          );
        }
        return null;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-purple-700 hover:text-purple-900 font-medium"><span aria-hidden="true">&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. LangGraph &gt; Chapter 1. LangGraph 개요</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-1-3. Node, Edge, Conditional Edge</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>지하철 노선도</b> — 일반 Edge는 직통 노선, Conditional Edge는 환승역에서 분기 결정. END는 종착역입니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-purple-700 border-purple-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">Node, Edge, Conditional Edge</h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderVisual()}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (<div key={i} className={l.highlight ? 'bg-purple-900/40 -mx-4 px-4' : ''}>{l.line || '\u00A0'}</div>))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['add_conditional_edges', 'END', 'should_continue'].map(kw => (<span key={kw} className="bg-purple-50 text-purple-700 px-3 py-1 rounded-full text-sm font-medium border border-purple-200">{kw}</span>))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-purple-600 hover:bg-purple-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./IV-1-2.html" className="text-purple-600 hover:text-purple-800 font-medium">&larr; IV-1-2. StateGraph 기본</a>
              <a href="./IV-2-1.html" className="text-purple-600 hover:text-purple-800 font-medium">IV-2-1. ReAct Agent &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
