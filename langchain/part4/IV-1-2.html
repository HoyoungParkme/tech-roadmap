<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — IV-1-2. StateGraph 기본 개념</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "[보드게임] StateGraph는 보드게임과 같습니다. State는 게임판의 현재 상태, Node는 플레이어가 도착하는 칸(행동), Edge는 칸 사이의 이동 경로입니다.",
        visual: 'intro',
        code: [
          { line: '# StateGraph = 보드게임', highlight: false },
          { line: '#', highlight: false },
          { line: '# State  = 게임판 상태 (점수, 위치 등)', highlight: true },
          { line: '# Node   = 칸 (행동을 수행)', highlight: true },
          { line: '# Edge   = 이동 경로', highlight: true },
          { line: '# compile = 게임 시작 준비', highlight: false },
        ],
      },
      {
        desc: "[1단계: State 정의] TypedDict로 그래프가 공유할 상태를 정의합니다. 모든 Node가 이 상태를 읽고 수정합니다. 보드게임의 '게임판 상태표'와 같습니다.",
        visual: 'state',
        code: [
          { line: 'from typing import TypedDict', highlight: false },
          { line: 'from langgraph.graph import StateGraph', highlight: false },
          { line: '', highlight: false },
          { line: '# 1단계: State 정의 (게임판 상태)', highlight: false },
          { line: 'class AgentState(TypedDict):', highlight: true },
          { line: '    messages: list     # 대화 기록', highlight: true },
          { line: '    next_action: str   # 다음 행동', highlight: true },
        ],
      },
      {
        desc: "[2단계: Node 추가] add_node로 각 동작을 등록합니다. 각 Node는 State를 받아서 수정된 State를 반환하는 함수입니다. 보드게임에서 '칸에 도착하면 할 일'을 정의하는 것입니다.",
        visual: 'node',
        code: [
          { line: '# 2단계: Node 추가 (칸 정의)', highlight: false },
          { line: '', highlight: false },
          { line: 'def greeting(state):', highlight: true },
          { line: '    return {"messages": state["messages"] + ["안녕하세요!"]}', highlight: true },
          { line: '', highlight: false },
          { line: 'def farewell(state):', highlight: true },
          { line: '    return {"messages": state["messages"] + ["안녕히가세요!"]}', highlight: true },
          { line: '', highlight: false },
          { line: 'graph = StateGraph(AgentState)', highlight: false },
          { line: 'graph.add_node("greeting", greeting)', highlight: false },
          { line: 'graph.add_node("farewell", farewell)', highlight: false },
        ],
      },
      {
        desc: "[3단계: Edge 연결] add_edge로 Node 간 이동 경로를 설정합니다. set_entry_point로 시작 Node를 지정합니다. 보드게임에서 '이 칸 다음에 어디로 이동하는지' 정하는 것입니다.",
        visual: 'edge',
        code: [
          { line: 'from langgraph.graph import END', highlight: false },
          { line: '', highlight: false },
          { line: '# 3단계: Edge 연결 (이동 경로)', highlight: false },
          { line: 'graph.set_entry_point("greeting")', highlight: true },
          { line: 'graph.add_edge("greeting", "farewell")', highlight: true },
          { line: 'graph.add_edge("farewell", END)', highlight: true },
          { line: '', highlight: false },
          { line: '# greeting → farewell → END', highlight: false },
        ],
      },
      {
        desc: "[4단계: compile] compile()을 호출하면 그래프가 실행 가능한 상태가 됩니다. 보드게임의 '게임 시작 준비 완료'와 같습니다. 이제 invoke로 실행할 수 있습니다.",
        visual: 'compile',
        code: [
          { line: '# 4단계: compile (게임 시작 준비)', highlight: false },
          { line: 'app = graph.compile()', highlight: true },
          { line: '', highlight: false },
          { line: '# compile 후에야 invoke 가능', highlight: false },
          { line: '# → Runnable 객체가 됨', highlight: false },
        ],
      },
      {
        desc: "[5단계: 실행] invoke()로 초기 상태를 넣고 실행합니다. 그래프가 entry_point부터 END까지 자동으로 흘러갑니다. 보드게임에서 '주사위를 던져 게임 시작'하는 것입니다.",
        visual: 'run',
        code: [
          { line: '# 5단계: 실행 (게임 시작!)', highlight: false },
          { line: '', highlight: false },
          { line: 'result = app.invoke({', highlight: true },
          { line: '    "messages": [],', highlight: true },
          { line: '    "next_action": ""', highlight: true },
          { line: '})', highlight: true },
          { line: '', highlight: false },
          { line: 'print(result["messages"])', highlight: false },
          { line: '# ["안녕하세요!", "안녕히가세요!"]', highlight: false },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      const buildSteps = [
        { id: 'state', label: 'State 정의', icon: '📋', done: currentStepIdx >= 1 },
        { id: 'node', label: 'Node 추가', icon: '🔵', done: currentStepIdx >= 2 },
        { id: 'edge', label: 'Edge 연결', icon: '➡️', done: currentStepIdx >= 3 },
        { id: 'compile', label: 'compile()', icon: '⚙️', done: currentStepIdx >= 4 },
        { id: 'run', label: 'invoke()', icon: '🚀', done: currentStepIdx >= 5 },
      ];

      const renderVisual = () => {
        return (
          <div className="space-y-3">
            <div className="text-sm font-bold text-slate-500 mb-2">StateGraph 구축 과정</div>
            {buildSteps.map((s, i) => (
              <div key={s.id} className="relative">
                <div className={`flex items-center gap-3 p-3 rounded-lg border-2 transition-all duration-500 ${
                  buildSteps[i].done && currentStepIdx === i + 1 ? 'bg-purple-100 border-purple-300 text-purple-800 scale-[1.02] shadow-md' :
                  buildSteps[i].done ? 'bg-purple-50 border-purple-200 text-purple-700' :
                  'bg-white border-slate-100 opacity-40'
                }`}>
                  <span className="text-xl">{s.icon}</span>
                  <div className="font-bold text-sm">{s.label}</div>
                  {s.done && <span className="ml-auto text-green-500 text-sm">&#10003;</span>}
                </div>
                {i < buildSteps.length - 1 && <div className="text-center text-purple-300 text-lg py-0.5">↓</div>}
              </div>
            ))}
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-purple-700 hover:text-purple-900 font-medium"><span aria-hidden="true">&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. LangGraph &gt; Chapter 1. LangGraph 개요</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-1-2. StateGraph 기본 개념</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>보드게임</b> — State는 게임판 상태, Node는 칸(행동), Edge는 이동 경로. compile하면 게임 시작 준비 완료!</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-purple-700 border-purple-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">StateGraph 기본</h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderVisual()}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (<div key={i} className={l.highlight ? 'bg-purple-900/40 -mx-4 px-4' : ''}>{l.line || '\u00A0'}</div>))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['TypedDict State', 'add_node', 'add_edge', 'compile'].map(kw => (<span key={kw} className="bg-purple-50 text-purple-700 px-3 py-1 rounded-full text-sm font-medium border border-purple-200">{kw}</span>))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-purple-600 hover:bg-purple-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./IV-1-1.html" className="text-purple-600 hover:text-purple-800 font-medium">&larr; IV-1-1. 왜 LangGraph인가</a>
              <a href="./IV-1-3.html" className="text-purple-600 hover:text-purple-800 font-medium">IV-1-3. Node, Edge, Conditional Edge &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
