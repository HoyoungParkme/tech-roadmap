    핵심 비유: 화이트보드 + 포스트잇
      State = 공유 화이트보드, Node = 포스트잇 붙이는 사람,
      Edge = 다음 사람에게 패스하는 화살표, reducer = 기존 메모를
      덮어쓸지(default) / 이어 붙일지(add_messages)를 결정하는 규칙.
    패턴: fastapi v1 — 좌(State 박스 + Graph 다이어그램) / 우(VSCode CodeViewer)
    색상: langchain emerald
  -->

          <div className="bg-slate-900 rounded p-2 font-mono text-[9px] leading-relaxed">
            <div className="text-slate-500 text-[8px] uppercase tracking-wider mb-0.5">
              current state {running === 'done' && <span className="text-emerald-400 ml-1">(완료)</span>}
            </div>
            <div className="text-slate-300">
              <span className="text-slate-500">{'{'}</span>
            </div>
            <div className="text-slate-300 ml-3">
              <span className="text-emerald-400">"messages"</span>
              <span className="text-slate-500">: </span>
              {dictView.messages.length === 0 ? (
                <span className="text-slate-500">[]</span>
              ) : (
                <span className="text-slate-300">
                  [
                  {dictView.messages.map((m, i) => (
                    <span key={i}>
                      {i > 0 && ', '}
                      <span className={m.kind === 'human' ? 'text-blue-300' : 'text-amber-300'}>
                        {m.kind === 'human' ? 'Human' : 'AI'}("{m.text}")
                      </span>
                    </span>
                  ))}
                  ]
                </span>
              )}
              <span className="text-slate-500">,</span>
            </div>
            <div className="text-slate-300 ml-3">
              <span className="text-emerald-400">"turn"</span>
              <span className="text-slate-500">: </span>
              <span className="text-yellow-300">{dictView.turn}</span>
            </div>
            <div className="text-slate-300">
              <span className="text-slate-500">{'}'}</span>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: Graph 다이어그램
    //   - 등록된 노드를 박스로 표시
    //   - edge가 추가되면 화살표로 연결
    //   - 실행되면 traversed 강조 + executed 체크
    // ─────────────────────────────────────────────────────
    function GraphBox({ nodes, edges, compiled, running }) {
      const hasNodes = nodes.length > 0;
      const hasEdges = edges.length > 0;

      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🕸️</span>
              <span className="text-[11px] font-bold text-emerald-800">StateGraph</span>
            </div>
            <span
              className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
                running === 'done'
                  ? 'bg-emerald-600 text-white'
                  : compiled
                  ? 'bg-emerald-100 text-emerald-700'
                  : 'bg-slate-100 text-slate-500'
              }`}
            >
              {running === 'done' ? 'invoked ✓' : compiled ? 'compiled' : hasEdges ? 'wiring' : hasNodes ? 'nodes only' : 'empty'}
            </span>
          </div>

          {!hasNodes ? (
            <div className="bg-slate-50 border-2 border-dashed border-slate-200 rounded p-3 text-center">
              <div className="text-[10px] text-slate-400 italic">아직 노드 없음</div>
              <div className="text-[9px] text-slate-400 mt-1">add_node() 를 호출하면 여기에 표시됨</div>
            </div>
          ) : (
            <div className="space-y-1">
              {/* START */}
              <NodePill
                label="START"
                kind="terminal"
                active={edges.some((e) => e.from === 'START' && e.traversed)}
                showArrow={hasEdges}
                arrowTraversed={edges.some((e) => e.from === 'START' && e.traversed)}
                arrowVisible={edges.some((e) => e.from === 'START')}
              />

              {/* 노드 */}
              {nodes.map((n, i) => {
                const incomingEdge = edges.find((e) => e.to === n.id);
                const outgoingEdge = edges.find((e) => e.from === n.id);
                return (
                  <React.Fragment key={n.id}>
                    <NodePill
                      label={n.label}
                      desc={n.desc}
                      kind="node"
                      active={n.executed}
                      isEntry={n.isEntry}
                      showArrow={!!outgoingEdge}
                      arrowTraversed={outgoingEdge && outgoingEdge.traversed}
                      arrowVisible={!!outgoingEdge}
                    />
                  </React.Fragment>
                );
              })}

              {/* END */}
              {edges.some((e) => e.to === 'END') && (
                <NodePill
                  label="END"
                  kind="terminal"
                  active={edges.some((e) => e.to === 'END' && e.traversed)}
                  showArrow={false}
                />
              )}
            </div>
          )}

          {/* 실행 trace */}
          {running === 'done' && (
            <div className="mt-2 bg-emerald-50 border border-emerald-200 rounded p-2">
              <div className="text-[9px] font-bold text-emerald-700 uppercase tracking-wider mb-0.5">
                ▶ invoke trace
              </div>
              <div className="text-[9px] font-mono text-emerald-900 leading-snug">
                START → user_say → ai_reply → END
                <span className="text-emerald-600 ml-1">(2 steps)</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 그래프 노드 한 칸 — 박스 + 화살표
    // ─────────────────────────────────────────────────────
    function NodePill({ label, desc, kind, active, isEntry, showArrow, arrowTraversed, arrowVisible }) {
      const isTerminal = kind === 'terminal';
      let boxClass = '';
      if (isTerminal) {
        boxClass = active
          ? 'bg-slate-700 text-white border-slate-700 shadow-md'
          : 'bg-slate-100 text-slate-500 border-slate-200';
      } else {
        boxClass = active
          ? 'bg-emerald-500 text-white border-emerald-600 shadow-md scale-[1.02]'
          : 'bg-white text-emerald-800 border-emerald-300';
      }

      return (
        <div>
          <div
            className={`flex items-center gap-2 px-3 py-1.5 rounded border-2 transition-all duration-500 ${boxClass}`}
          >
            {!isTerminal && <span className="text-xs">●</span>}
            <span className={`font-mono font-bold ${isTerminal ? 'text-[10px]' : 'text-[11px]'}`}>
              {label}
            </span>
            {isEntry && (
              <span className="text-[8px] bg-yellow-300 text-yellow-900 px-1 rounded font-bold">
                entry
              </span>
            )}
            {desc && <span className="text-[9px] opacity-80 ml-auto truncate">{desc}</span>}
            {active && !isTerminal && (
              <span className="text-[9px] ml-1">✓</span>
            )}
          </div>
          {showArrow && arrowVisible && (
            <div className="flex justify-center py-0.5">
              <span
                className={`text-base font-bold transition-colors duration-500 ${
                  arrowTraversed ? 'text-emerald-600' : 'text-slate-300'
                }`}
              >
                ↓
              </span>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 (State 박스 + Graph 박스)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🧱 StateGraph 빌드 시각화</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <StateBox
              fields={step.stateFields}
              dictView={step.stateDictView}
              annotated={step.stateAnnotated}
              running={step.running}
            />
            <GraphBox
              nodes={step.graphNodes}
              edges={step.graphEdges}
              compiled={step.compiled}
              running={step.running}
            />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>active / executed
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-200"></span>registered
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-300"></span>idle
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-yellow-300"></span>entry point
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. LangGraph &gt; Chapter 1. LangGraph 개요</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-1-2. StateGraph 기본 개념 — TypedDict / Annotated reducer</h1>
                  <p className="text-sm text-slate-500 mt-0.5">화이트보드 + 포스트잇 — State 정의부터 reducer · add_node · add_edge · compile · invoke 까지</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: <strong>TypedDict</strong> 로 스키마 → <strong>Annotated[T, reducer]</strong> 로 합치는 규칙 → <strong>add_node</strong>·<strong>add_edge</strong> 로 흐름 → <strong>compile</strong>·<strong>invoke</strong> 로 실행. 다음(IV-1-3)에서는 <strong>add_conditional_edges</strong> 로 LLM 응답에 따라 분기하는 진짜 Agent 그래프를 만든다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['StateGraph', 'TypedDict', 'Annotated', 'add_messages', 'add_node', 'add_edge', 'compile', 'invoke'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-1-1.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; IV-1-1. 왜 LangGraph인가</a>
              <a href="./IV-1-3.html" className="text-emerald-700 hover:text-emerald-900 font-medium">IV-1-3. Node, Edge, Conditional Edge &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
