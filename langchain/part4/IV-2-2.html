            '',
            '# ── 옵션 1. 그냥 종료 ──',
            '# invoke 를 더 호출하지 않으면 끝',
            '# checkpoint 는 남지만 도구는 영원히 실행 안 됨',
            '',
            '# ── 옵션 2. agent 에 "거부됨" 알리고 안전 분기 ──',
            'from langchain_core.messages import ToolMessage',
            '',
            '# 1) 도구 결과 자리에 "거부" ToolMessage 주입',
            'snapshot = app.get_state(config)',
            'pending  = snapshot.values["messages"][-1]',
            'tool_id  = pending.tool_calls[0]["id"]',
            '',
            'rejected_msg = ToolMessage(',
            '    content="rejected by human — not executed",',
            '    tool_call_id=tool_id,',
            ')',
            '',
            'app.update_state(',
            '    config,',
            '    {"messages": [rejected_msg]},',
            '    as_node="tools",   # tools 가 응답한 것처럼 기록',
            ')',
            '',
            '# 2) 재개 — agent 가 거부 메시지를 보고 후속 판단',
            'result = app.invoke(None, config)',
            'print(result["messages"][-1].content)',
            '#  → "본인 확인이 필요합니다. 고객센터로 연락 바랍니다."',
            '',
            '# ── 정리: Human-in-the-Loop 5단계 ──',
            '#  1) 자율 실행 (위험)',
            '#  2) interrupt_before 로 위험 노드 직전 정지',
            '#  3) get_state 로 사람이 검토',
            '#  4) invoke(None) / update_state 로 승인 재개',
            '#  5) ToolMessage 거부 또는 종료',
            '#',
            '# 적합: DELETE/DROP/결제/메일, 규제 산업, 사내 승인',
          ],
          highlight: [3, 4, 5, 6, 8, 9, 11, 12, 13, 14, 16, 17, 18, 19, 21, 22, 23, 24, 25, 27, 28, 29, 30],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 위: Graph 다이어그램
    //   START → agent → tools → END (수직)
    //   각 노드는 phase 색상, paused 노드는 pause-blink
    //   화살표 위에 흐름 점(running 일 때)
    // ─────────────────────────────────────────────────────
    function NodeBox({ node }) {
      const palette = {
        slate:   { idle: 'bg-slate-100 text-slate-500 border-slate-200', done: 'bg-slate-200 text-slate-700 border-slate-300', running: 'bg-slate-200 text-slate-700 border-slate-300' },
        emerald: { idle: 'bg-emerald-50 text-emerald-700 border-emerald-200', done: 'bg-emerald-100 text-emerald-800 border-emerald-400', running: 'bg-emerald-500 text-white border-emerald-700 ring-4 ring-emerald-200' },
        amber:   { idle: 'bg-amber-50 text-amber-700 border-amber-200', paused: 'bg-amber-200 text-amber-900 border-amber-500 pause-blink' },
        red:     { idle: 'bg-red-50 text-red-700 border-red-200', running: 'bg-red-500 text-white border-red-700 ring-4 ring-red-200', rejected: 'bg-red-50 text-red-400 border-red-300 line-through opacity-60' },
      };
      const phaseKey = node.phase === 'paused' ? 'paused' : node.phase === 'running' ? 'running' : node.phase === 'rejected' ? 'rejected' : node.phase === 'done' ? 'done' : 'idle';
      const cls = (palette[node.color] && palette[node.color][phaseKey]) || palette.slate.idle;
      const isStartEnd = node.id === 'START' || node.id === 'END';
      const sizeCls = isStartEnd ? 'w-20 h-9 rounded-full text-[11px]' : 'w-32 h-12 rounded-lg text-sm';
      const badgeBase = 'absolute -top-2 -right-2 text-white text-[9px] font-bold px-1 py-0.5 rounded shadow';
      return (
        <div className={`${sizeCls} ${cls} border-2 flex items-center justify-center font-bold transition-all duration-500 relative`}>
          {node.label}
          {node.phase === 'paused'   && <span className={`${badgeBase} bg-amber-500`}>⏸ PAUSE</span>}
          {node.phase === 'rejected' && <span className={`${badgeBase} bg-red-600 pop-in`}>✗ REJECT</span>}
          {node.phase === 'running' && node.color === 'emerald' && <span className={`${badgeBase} bg-emerald-700`}>▶ RUN</span>}
        </div>
      );
    }

    function ArrowDown({ active, paused }) {
      // active: 흐름 점 / paused: 멈춤 표시
      return (
        <div className="relative h-7 w-1">
          <div className={`absolute inset-x-0 top-0 bottom-0 border-l-2 ${paused ? 'border-amber-400 border-dashed' : 'border-slate-300'}`} />
          {active && <div className="absolute -left-1 w-3 h-3 rounded-full bg-emerald-500 flow-dot shadow"></div>}
          {paused && <div className="absolute -left-2 top-1/2 -translate-y-1/2 text-[10px] font-bold text-amber-700 whitespace-nowrap pl-3">⏸ checkpoint 저장 후 정지</div>}
        </div>
      );
    }

    function GraphDiagram({ nodes, pauseAt, stepIdx }) {
      // edge active 판정 — 두 끝 노드의 phase 보고 결정
      const phaseOf = (id) => nodes.find(n => n.id === id)?.phase;
      const isEdgeActive = (from, to) => {
        const a = phaseOf(from), b = phaseOf(to);
        return a === 'done' && (b === 'running' || b === 'paused');
      };
      const isEdgePaused = (to) => pauseAt === to;

      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🏭</span>
              <span className="text-[11px] font-bold text-emerald-800">LangGraph 흐름</span>
            </div>
            <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">
              step {stepIdx + 1}/5
            </span>
          </div>

          <div className="flex flex-col items-center py-2">
            <NodeBox node={nodes[0]} />
            <ArrowDown active={isEdgeActive('START', 'agent')} paused={false} />
            <NodeBox node={nodes[1]} />
            <ArrowDown active={isEdgeActive('agent', 'tools')} paused={isEdgePaused('tools')} />
            <NodeBox node={nodes[2]} />
            <ArrowDown active={isEdgeActive('tools', 'END')} paused={false} />
            <NodeBox node={nodes[3]} />
          </div>

          <div className="mt-2 pt-2 border-t border-slate-100 flex flex-wrap gap-2 text-[9px] text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-emerald-500"></span>running</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-amber-400"></span>paused</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-red-500"></span>danger/rejected</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-slate-300"></span>idle/done</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중간: Human 박스 — kind 별 다른 시각화
    //   absent     : 사람 미개입 (Step 1 빨간 경고)
    //   waiting    : 사람 대기 중 (Step 2 회색 hourglass)
    //   inspecting : 사람이 검토 중 (Step 3 도구 카드 + 경고)
    //   approved   : 승인 누름 (Step 4 초록 체크)
    //   rejected   : 거부 누름 (Step 5 빨간 X + 사유)
    // ─────────────────────────────────────────────────────
    function HumanBox({ box }) {
      if (box.kind === 'absent') {
        return (
          <div className="bg-red-50 border-2 border-dashed border-red-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2"><span className="text-base grayscale opacity-50">👤</span><span className="text-[11px] font-bold text-red-700">Human: 미개입</span></div>
            <div className="bg-white rounded border border-red-200 p-2 text-center">
              <div className="text-[10px] text-red-700 font-bold">⚠ {box.warning}</div>
              <div className="text-[9px] text-red-500 mt-1">위험 액션도 그대로 통과</div>
            </div>
          </div>
        );
      }
      if (box.kind === 'waiting') {
        return (
          <div className="bg-amber-50 border-2 border-amber-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2"><span className="text-base">👤</span><span className="text-[11px] font-bold text-amber-800">Human: 대기 중</span><span className="ml-auto text-[10px] text-amber-700 animate-pulse">⏳ pending…</span></div>
            <div className="bg-white rounded border border-amber-200 p-2 text-center">
              <div className="text-[10px] text-amber-700">{box.message}</div>
              <div className="text-[9px] text-amber-500 mt-1 font-mono">graph.invoke 가 return 됨 — 블로킹 X</div>
            </div>
          </div>
        );
      }
      if (box.kind === 'inspecting') {
        return (
          <div className="bg-blue-50 border-2 border-blue-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2"><span className="text-base">🔍</span><span className="text-[11px] font-bold text-blue-800">Human: 검토 중</span><span className="ml-auto text-[9px] bg-blue-600 text-white px-1.5 py-0.5 rounded font-mono">inspect</span></div>
            <div className="bg-white rounded border-2 border-blue-300 p-2 mb-2">
              <div className="text-[9px] font-bold text-blue-700 uppercase tracking-wider mb-1">pending tool call</div>
              <div className="font-mono text-[10px]">
                <div className="text-blue-900"><span className="text-slate-500">name:</span> "{box.inspect.toolName}"</div>
                <div className="text-blue-900"><span className="text-slate-500">args:</span> {JSON.stringify(box.inspect.args)}</div>
                <div className="text-red-700 font-bold mt-1"><span className="text-slate-500">risk:</span> {box.inspect.risk}</div>
              </div>
            </div>
            <div className="flex gap-2">
              <button disabled className="flex-1 px-2 py-1.5 rounded bg-emerald-500 text-white text-[10px] font-bold opacity-90 cursor-default">✓ 승인</button>
              <button disabled className="flex-1 px-2 py-1.5 rounded bg-red-500 text-white text-[10px] font-bold opacity-90 cursor-default">✗ 거부</button>
            </div>
          </div>
        );
      }
      if (box.kind === 'approved') {
        return (
          <div className="bg-emerald-50 border-2 border-emerald-400 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2"><span className="text-base">👤</span><span className="text-[11px] font-bold text-emerald-800">Human: 승인</span><svg className="check-in ml-auto" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#059669" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 13l4 4L19 7"></path></svg></div>
            <div className="bg-white rounded border border-emerald-200 p-2">
              <div className="flex items-center gap-2 mb-1.5"><span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">{box.decision}</span><span className="text-[10px] text-emerald-700">→ invoke(None, config) 으로 재개</span></div>
              <div className="text-[9px] font-mono text-slate-600 mt-1.5">patched args: <span className="text-emerald-700">{JSON.stringify(box.patched)}</span></div>
              <div className="text-[9px] text-emerald-700 mt-1">tools 노드 실행 → DELETE 진짜 수행</div>
            </div>
          </div>
        );
      }
      if (box.kind === 'rejected') {
        return (
          <div className="bg-red-50 border-2 border-red-400 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2"><span className="text-base">👤</span><span className="text-[11px] font-bold text-red-800">Human: 거부</span><span className="ml-auto inline-flex items-center justify-center w-5 h-5 rounded-full bg-red-600 text-white text-xs font-bold pop-in">✗</span></div>
            <div className="bg-white rounded border border-red-200 p-2">
              <div className="flex items-center gap-2 mb-1.5"><span className="text-[9px] bg-red-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">{box.decision}</span><span className="text-[10px] text-red-700">→ ToolMessage("rejected") 주입 후 분기</span></div>
              <div className="text-[9px] text-red-700 italic mt-1">사유: {box.reason}</div>
              <div className="text-[9px] text-red-700 mt-1 font-bold">✓ DELETE 는 실행되지 않음</div>
            </div>
          </div>
        );
      }
      return null;
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: state Snapshot — messages 배열 시각화
    //   threadId + checkpoint 표시 + 메시지별 role 색상
    // ─────────────────────────────────────────────────────
    function StateSnapshot({ snapshot }) {
      return (
        <div className="bg-slate-50 border border-slate-200 rounded-lg p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5"><span className="text-base">💾</span><span className="text-[11px] font-bold text-slate-700">graph state (checkpoint)</span></div>
            <span className="text-[9px] bg-slate-700 text-white px-1.5 py-0.5 rounded font-mono">thread_id: {snapshot.threadId}</span>
          </div>
          <div className="bg-white rounded border border-slate-200 p-2 max-h-44 overflow-y-auto">
            <div className="text-[9px] font-bold text-slate-500 mb-1 uppercase tracking-wider">messages</div>
            <div className="space-y-1.5">
              {snapshot.messages.map((m, i) => {
                let cls = 'bg-slate-100 text-slate-700 border-slate-200', roleCls = 'bg-slate-500 text-white';
                if (m.role === 'user') { cls = 'bg-blue-50 text-blue-900 border-blue-200'; roleCls = 'bg-blue-600 text-white'; }
                if (m.role === 'ai')   { cls = 'bg-emerald-50 text-emerald-900 border-emerald-200'; roleCls = 'bg-emerald-600 text-white'; }
                if (m.role === 'tool' && m.success) { cls = 'bg-emerald-100 text-emerald-900 border-emerald-300 font-bold'; roleCls = 'bg-emerald-700 text-white'; }
                if (m.role === 'tool' && m.danger)  { cls = 'bg-red-100 text-red-900 border-red-300 font-bold'; roleCls = 'bg-red-700 text-white'; }
                if (m.role === 'tool' && m.rejected){ cls = 'bg-red-50 text-red-700 border-red-300 italic line-through'; roleCls = 'bg-red-600 text-white'; }
                if (m.role === 'ai' && m.safe)      { cls = 'bg-amber-50 text-amber-900 border-amber-300'; roleCls = 'bg-amber-600 text-white'; }
                return (
                  <div key={i} className={`p-1.5 rounded border ${cls}`}>
                    <div className="flex items-center gap-1.5 mb-0.5"><span className={`text-[8px] px-1 py-0.5 rounded font-bold uppercase ${roleCls}`}>{m.role}</span>{m.toolCall && <span className="text-[8px] bg-purple-600 text-white px-1 rounded font-mono">tool_call</span>}</div>
                    <div className="text-[10px] leading-tight">{m.text}</div>
                    {m.toolCall && <div className="text-[9px] font-mono mt-0.5 bg-purple-50 border border-purple-200 rounded px-1.5 py-0.5 text-purple-900">{m.toolCall.name}({JSON.stringify(m.toolCall.args)})</div>}
                  </div>
                );
              })}
            </div>
          </div>
          {snapshot.checkpoint && <div className="mt-1.5 text-[9px] font-mono text-emerald-600">{snapshot.checkpoint}</div>}
          {snapshot.inspecting && <div className="mt-1 text-[9px] text-blue-700 font-bold">↑ 사람이 마지막 AIMessage.tool_calls 를 읽는 중</div>}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체 (Graph + Human + State)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step, stepIdx }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🏭 공장 품질 검사 게이트</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <GraphDiagram nodes={step.nodes} pauseAt={step.pauseAt} stepIdx={stepIdx} />
            <HumanBox box={step.humanBox} />
            <StateSnapshot snapshot={step.stateSnapshot} />
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 5 파일명 탭
    //   상단 탭에 5개 파일명 (auto-risky / interrupt-before / inspect-state /
    //                         update-state / reject) — 현재 step 활성화
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, onTabClick }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      const TAB_FILES = [
        'auto-risky.py',
        'interrupt-before.py',
        'inspect-state.py',
        'update-state.py',
        'reject.py',
      ];

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">VSCode · IV-2-2</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 5 파일명 탭 (클릭하면 해당 step 으로 이동) */}
          <div className="bg-[#1e2127] flex border-b border-slate-700 overflow-x-auto">
            {TAB_FILES.map((f, i) => {
              const active = i === stepIdx;
              return (
                <button
                  key={f}
                  onClick={() => onTabClick(i)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                    active
                      ? 'bg-[#282c34] text-emerald-300 border-t-2 border-t-emerald-400 -mt-px'
                      : 'text-slate-500 hover:text-slate-300 hover:bg-[#262b33]'
                  }`}
                >
                  {f}
                </button>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[42rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.filename} · {code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. LangGraph &gt; Chapter 2. LangGraph 실전</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-2-2. Human-in-the-Loop — interrupt + 사람 승인</h1>
                  <p className="text-sm text-slate-500 mt-0.5">공장 품질 검사 게이트 — 위험 노드 직전에 멈추고 사람이 OK/NG 누른다</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} onTabClick={setStepIdx} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: <strong>interrupt_before</strong> + <strong>checkpointer</strong> 조합으로 위험 액션 직전에 멈추고, <strong>get_state</strong>로 검토, <strong>invoke(None)</strong> / <strong>update_state</strong>로 승인·수정·거부를 분기한다. 다음(IV-2-3)에서는 Multi-Agent Supervisor를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로" className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]">{isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}</button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계" className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['interrupt_before', 'checkpointer', 'MemorySaver', 'get_state', 'update_state', 'invoke(None)', 'ToolMessage', 'thread_id'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">{kw}</span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-2-1.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; IV-2-1 ReAct Agent</a>
              <a href="./IV-2-3.html" className="text-emerald-700 hover:text-emerald-900 font-medium">IV-2-3 Multi-Agent Supervisor &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
