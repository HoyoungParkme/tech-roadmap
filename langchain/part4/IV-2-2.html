<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — IV-2-2. Human-in-the-Loop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "[공장 자동 라인의 위험] Agent가 모든 것을 자동으로 실행하면 위험합니다. 이메일 발송, 결제, 데이터 삭제 같은 작업을 LLM이 마음대로 실행하면 큰 문제가 됩니다.",
        visual: 'danger',
        code: [
          { line: '# 자동 실행의 위험', highlight: false },
          { line: '', highlight: false },
          { line: '# Agent가 스스로 판단하면...', highlight: false },
          { line: '# "이 메일을 삭제하겠습니다" → 실행!', highlight: true },
          { line: '# "결제를 진행하겠습니다" → 실행!', highlight: true },
          { line: '# "파일을 삭제하겠습니다" → 실행!', highlight: true },
          { line: '', highlight: false },
          { line: '# 사람의 확인 없이 위험한 작업 수행', highlight: false },
          { line: '# → Human-in-the-Loop 필요!', highlight: false },
        ],
      },
      {
        desc: "[품질 검사원] interrupt_before는 특정 노드 실행 전에 그래프를 멈추는 설정입니다. 공장 품질 검사원이 '이 단계 전에 검사합니다'라고 멈추는 것과 같습니다.",
        visual: 'interrupt',
        code: [
          { line: '# interrupt_before: 특정 노드 전에 중단', highlight: false },
          { line: '', highlight: false },
          { line: 'from langgraph.checkpoint.memory import (', highlight: false },
          { line: '    MemorySaver', highlight: false },
          { line: ')', highlight: false },
          { line: '', highlight: false },
          { line: 'checkpointer = MemorySaver()', highlight: true },
          { line: '', highlight: false },
          { line: 'app = graph.compile(', highlight: true },
          { line: '    checkpointer=checkpointer,', highlight: true },
          { line: '    interrupt_before=["tools"]  # 도구 실행 전 중단', highlight: true },
          { line: ')', highlight: true },
        ],
      },
      {
        desc: "[실행 → 중단] invoke를 호출하면 agent 노드까지 실행되고, tools 노드 직전에 멈춥니다. 이 시점에 사람이 어떤 도구를 호출하려는지 확인할 수 있습니다.",
        visual: 'pause',
        code: [
          { line: '# 실행 → tools 노드 전에 중단', highlight: false },
          { line: '', highlight: false },
          { line: 'config = {"configurable": {"thread_id": "1"}}', highlight: true },
          { line: '', highlight: false },
          { line: 'result = app.invoke(', highlight: true },
          { line: '    {"messages": [("user", "이메일 삭제해줘")]},', highlight: true },
          { line: '    config', highlight: true },
          { line: ')', highlight: true },
          { line: '', highlight: false },
          { line: '# → agent 실행 후, tools 실행 전 중단', highlight: false },
          { line: '# → 사람이 확인할 시간!', highlight: false },
        ],
      },
      {
        desc: "[사람 승인] 중단된 상태에서 사람이 도구 호출 내용을 확인합니다. '이메일 삭제'를 정말 실행할지 판단합니다. 승인하면 계속, 거부하면 취소합니다.",
        visual: 'approve',
        code: [
          { line: '# 사람이 확인', highlight: false },
          { line: '', highlight: false },
          { line: '# 현재 상태 확인', highlight: false },
          { line: 'state = app.get_state(config)', highlight: true },
          { line: 'pending = state.values["messages"][-1]', highlight: true },
          { line: '', highlight: false },
          { line: '# 도구 호출 내용 출력', highlight: false },
          { line: 'print(pending.tool_calls)', highlight: true },
          { line: '# [{"name": "delete_email", "args": {...}}]', highlight: false },
          { line: '', highlight: false },
          { line: '# 사람: "이 작업을 승인할까요?" → Yes/No', highlight: false },
        ],
      },
      {
        desc: "[재개] 사람이 승인하면 None을 전달하여 중단된 지점부터 이어서 실행합니다. checkpoint 덕분에 상태가 보존되어 정확히 멈춘 곳에서 다시 시작합니다.",
        visual: 'resume',
        code: [
          { line: '# 승인 → 재개 (resume)', highlight: false },
          { line: '', highlight: false },
          { line: '# 승인: 중단된 지점부터 계속 실행', highlight: false },
          { line: 'result = app.invoke(None, config)', highlight: true },
          { line: '# → tools 노드 실행 → agent → END', highlight: false },
          { line: '', highlight: false },
          { line: '# 거부: 상태 수정 후 다른 경로로', highlight: false },
          { line: 'app.update_state(', highlight: true },
          { line: '    config,', highlight: true },
          { line: '    {"messages": [("user", "취소해줘")]}', highlight: true },
          { line: ')', highlight: true },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      const renderVisual = () => {
        if (stepData.visual === 'danger') {
          return (
            <div className="space-y-3">
              <div className="text-sm font-bold text-slate-500 mb-1">자동 실행의 위험</div>
              {[
                { icon: '📧', label: '이메일 삭제', risk: '높음', color: 'bg-red-50 border-red-300' },
                { icon: '💳', label: '결제 진행', risk: '매우 높음', color: 'bg-red-50 border-red-300' },
                { icon: '🗑️', label: '파일 삭제', risk: '높음', color: 'bg-red-50 border-red-300' },
              ].map((item) => (
                <div key={item.label} className={"flex items-center gap-3 p-3 rounded-lg border-2 " + item.color}>
                  <span className="text-xl">{item.icon}</span>
                  <div className="flex-1"><div className="font-bold text-sm text-red-700">{item.label}</div></div>
                  <span className="text-xs bg-red-200 text-red-800 px-2 py-0.5 rounded">위험: {item.risk}</span>
                </div>
              ))}
              <div className="text-center text-sm text-red-600 font-bold mt-2">사람 확인 없이 실행하면 위험!</div>
            </div>
          );
        }
        if (stepData.visual === 'interrupt') {
          return (
            <div className="flex flex-col items-center gap-2">
              <div className="text-sm font-bold text-slate-500 mb-1">interrupt_before (품질 검사)</div>
              <div className="w-24 h-10 rounded-lg bg-green-500 text-white flex items-center justify-center font-bold text-xs">START</div>
              <span className="text-slate-400">↓</span>
              <div className="w-28 h-10 rounded-xl bg-purple-600 text-white flex items-center justify-center font-bold text-sm">agent</div>
              <span className="text-slate-400">↓</span>
              <div className="w-full p-2 rounded-lg bg-yellow-100 border-2 border-yellow-400 text-center">
                <div className="text-yellow-800 font-bold text-sm">⏸ 여기서 중단!</div>
                <div className="text-yellow-700 text-xs">사람이 확인하는 시간</div>
              </div>
              <span className="text-slate-400">↓</span>
              <div className="w-28 h-10 rounded-xl bg-amber-100 border-2 border-amber-300 flex items-center justify-center font-bold text-sm text-amber-700">tools</div>
            </div>
          );
        }
        if (stepData.visual === 'pause') {
          return (
            <div className="space-y-3">
              <div className="text-sm font-bold text-slate-500 mb-1">실행 흐름</div>
              <div className="flex items-center gap-2 p-2 rounded-lg bg-green-50 border border-green-200 text-xs">
                <span className="bg-green-200 text-green-800 px-2 py-0.5 rounded font-bold">1</span>
                <span>agent 노드 실행 완료</span>
                <span className="ml-auto text-green-600">&#10003;</span>
              </div>
              <div className="flex items-center gap-2 p-2 rounded-lg bg-yellow-50 border-2 border-yellow-300 text-xs">
                <span className="bg-yellow-200 text-yellow-800 px-2 py-0.5 rounded font-bold">2</span>
                <span className="font-bold text-yellow-800">tools 노드 진입 전 — 중단!</span>
                <span className="ml-auto text-yellow-600">⏸</span>
              </div>
              <div className="flex items-center gap-2 p-2 rounded-lg bg-slate-50 border border-slate-200 text-xs opacity-40">
                <span className="bg-slate-200 text-slate-500 px-2 py-0.5 rounded font-bold">3</span>
                <span>tools 노드 (대기 중)</span>
              </div>
              <div className="p-2 rounded-lg bg-purple-50 border border-purple-200 text-xs text-purple-700">
                checkpoint에 현재 상태 저장됨
              </div>
            </div>
          );
        }
        if (stepData.visual === 'approve') {
          return (
            <div className="space-y-3">
              <div className="text-sm font-bold text-slate-500 mb-1">사람의 확인</div>
              <div className="p-3 rounded-lg bg-slate-100 border border-slate-200">
                <div className="text-xs font-bold text-slate-600 mb-2">도구 호출 요청:</div>
                <div className="bg-white p-2 rounded border text-xs font-mono">
                  <div>name: "delete_email"</div>
                  <div>args: {"{"} id: "mail_123" {"}"}</div>
                </div>
              </div>
              <div className="flex gap-3">
                <div className="flex-1 p-3 rounded-lg bg-green-50 border-2 border-green-300 text-center cursor-pointer hover:bg-green-100 transition">
                  <div className="font-bold text-green-700 text-sm">&#10003; 승인</div>
                  <div className="text-xs text-green-600 mt-1">계속 실행</div>
                </div>
                <div className="flex-1 p-3 rounded-lg bg-red-50 border-2 border-red-300 text-center cursor-pointer hover:bg-red-100 transition">
                  <div className="font-bold text-red-700 text-sm">&#10007; 거부</div>
                  <div className="text-xs text-red-600 mt-1">취소/수정</div>
                </div>
              </div>
            </div>
          );
        }
        if (stepData.visual === 'resume') {
          return (
            <div className="space-y-3">
              <div className="text-sm font-bold text-slate-500 mb-1">재개 (Resume)</div>
              <div className="p-3 rounded-lg bg-green-50 border border-green-200">
                <div className="font-bold text-xs text-green-700 mb-2">승인한 경우</div>
                <div className="flex items-center gap-1 text-xs">
                  <span className="bg-yellow-200 text-yellow-800 px-2 py-0.5 rounded">중단점</span>
                  <span>→</span>
                  <span className="bg-amber-200 text-amber-800 px-2 py-0.5 rounded">tools</span>
                  <span>→</span>
                  <span className="bg-purple-200 text-purple-800 px-2 py-0.5 rounded">agent</span>
                  <span>→</span>
                  <span className="bg-red-200 text-red-800 px-2 py-0.5 rounded">END</span>
                </div>
              </div>
              <div className="p-3 rounded-lg bg-red-50 border border-red-200">
                <div className="font-bold text-xs text-red-700 mb-2">거부한 경우</div>
                <div className="flex items-center gap-1 text-xs">
                  <span className="bg-yellow-200 text-yellow-800 px-2 py-0.5 rounded">중단점</span>
                  <span>→</span>
                  <span className="bg-slate-200 text-slate-800 px-2 py-0.5 rounded">상태 수정</span>
                  <span>→</span>
                  <span className="bg-purple-200 text-purple-800 px-2 py-0.5 rounded">다른 경로</span>
                </div>
              </div>
            </div>
          );
        }
        return null;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-purple-700 hover:text-purple-900 font-medium"><span aria-hidden="true">&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. LangGraph &gt; Chapter 2. LangGraph 실전</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-2-2. Human-in-the-Loop</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>공장 품질 검사</b> — 자동 라인에서 위험한 단계 전에 검사원(사람)이 확인하고 승인합니다. interrupt_before로 구현합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-purple-700 border-purple-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">Human-in-the-Loop</h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderVisual()}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (<div key={i} className={l.highlight ? 'bg-purple-900/40 -mx-4 px-4' : ''}>{l.line || '\u00A0'}</div>))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['interrupt_before', 'checkpoint', 'resume'].map(kw => (<span key={kw} className="bg-purple-50 text-purple-700 px-3 py-1 rounded-full text-sm font-medium border border-purple-200">{kw}</span>))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-purple-600 hover:bg-purple-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./IV-2-1.html" className="text-purple-600 hover:text-purple-800 font-medium">&larr; IV-2-1. ReAct Agent</a>
              <a href="./IV-2-3.html" className="text-purple-600 hover:text-purple-800 font-medium">IV-2-3. Multi-Agent Supervisor &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
