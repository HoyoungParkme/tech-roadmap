<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — IV-2-3. Multi-Agent Supervisor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "[단일 Agent의 한계] 하나의 Agent에게 모든 작업을 맡기면, 프롬프트가 너무 길어지고, 도구가 많아지고, 역할이 모호해집니다. 마치 한 사람이 개발+디자인+기획을 동시에 하는 것과 같습니다.",
        visual: 'single-limit',
        code: [
          { line: '# 단일 Agent의 문제', highlight: false },
          { line: '', highlight: false },
          { line: '# 하나의 Agent에 모든 것을 맡기면:', highlight: false },
          { line: '# - 프롬프트가 너무 길어짐', highlight: true },
          { line: '# - 도구가 20개 이상 → 선택 어려움', highlight: true },
          { line: '# - 역할이 모호 → 품질 저하', highlight: true },
          { line: '', highlight: false },
          { line: '# 해결: 역할별 전문 Agent + Supervisor', highlight: false },
        ],
      },
      {
        desc: "[프로젝트 매니저] Supervisor는 PM입니다. 사용자 요청을 받으면, 어떤 Sub-agent에게 일을 맡길지 결정합니다. Research Agent, Coding Agent, Review Agent 등 전문가에게 업무를 분배합니다.",
        visual: 'supervisor',
        code: [
          { line: '# Supervisor = 프로젝트 매니저', highlight: false },
          { line: '', highlight: false },
          { line: '# 사용자 요청 → Supervisor가 판단', highlight: true },
          { line: '# → "이건 조사가 필요하니 Research에게"', highlight: false },
          { line: '# → "코드 작성은 Coding에게"', highlight: false },
          { line: '# → "검토는 Review에게"', highlight: false },
          { line: '', highlight: false },
          { line: '# 각 Agent는 자기 전문 분야만 담당', highlight: true },
        ],
      },
      {
        desc: "[Sub-agent 정의] 각 Sub-agent는 독립적인 ReAct Agent입니다. 자신만의 프롬프트, 도구, 역할을 가집니다. Supervisor가 호출하면 작업을 수행하고 결과를 반환합니다.",
        visual: 'sub-agents',
        code: [
          { line: '# Sub-agent 정의', highlight: false },
          { line: '', highlight: false },
          { line: '# Research Agent', highlight: false },
          { line: 'research_agent = create_react_agent(', highlight: true },
          { line: '    model,', highlight: true },
          { line: '    tools=[search_tool, wiki_tool],', highlight: true },
          { line: '    prompt="당신은 조사 전문가입니다..."', highlight: true },
          { line: ')', highlight: true },
          { line: '', highlight: false },
          { line: '# Coding Agent', highlight: false },
          { line: 'coding_agent = create_react_agent(', highlight: false },
          { line: '    model,', highlight: false },
          { line: '    tools=[code_tool, run_tool],', highlight: false },
          { line: '    prompt="당신은 코딩 전문가입니다..."', highlight: false },
          { line: ')', highlight: false },
        ],
      },
      {
        desc: "[Supervisor 라우팅] Supervisor 노드는 LLM을 사용해 다음에 어떤 Agent를 호출할지 결정합니다. 선택지는 각 Sub-agent 이름 또는 FINISH입니다. Conditional Edge로 분기합니다.",
        visual: 'routing',
        code: [
          { line: '# Supervisor 라우팅 로직', highlight: false },
          { line: '', highlight: false },
          { line: 'members = ["researcher", "coder", "reviewer"]', highlight: true },
          { line: 'options = members + ["FINISH"]', highlight: true },
          { line: '', highlight: false },
          { line: 'def supervisor_node(state):', highlight: true },
          { line: '    """다음 Agent를 결정"""', highlight: false },
          { line: '    response = model.invoke([', highlight: true },
          { line: '        ("system", "당신은 PM입니다. "', highlight: false },
          { line: '         "다음 작업자를 선택하세요: "', highlight: false },
          { line: '         + str(options)),', highlight: false },
          { line: '        *state["messages"]', highlight: false },
          { line: '    ])', highlight: false },
          { line: '    return {"next": response.content}', highlight: true },
        ],
      },
      {
        desc: "[실행 흐름] 사용자가 '이 API를 조사하고 코드를 작성해줘'라고 요청하면: Supervisor → Research Agent(조사) → Supervisor → Coding Agent(코딩) → Supervisor → FINISH 순으로 실행됩니다.",
        visual: 'flow',
        code: [
          { line: '# 실행 흐름 예시', highlight: false },
          { line: '# "이 API를 조사하고 코드를 작성해줘"', highlight: false },
          { line: '', highlight: false },
          { line: '# 1) Supervisor → "researcher"', highlight: true },
          { line: '# 2) Research Agent: API 문서 조사', highlight: true },
          { line: '# 3) Supervisor → "coder"', highlight: true },
          { line: '# 4) Coding Agent: 코드 작성', highlight: true },
          { line: '# 5) Supervisor → "FINISH"', highlight: true },
          { line: '# 6) 최종 결과 반환', highlight: false },
        ],
      },
      {
        desc: "[전체 구성] StateGraph에 supervisor + 각 sub-agent를 Node로 등록합니다. Supervisor에서 Conditional Edge로 분기하고, 각 Agent 완료 후 다시 Supervisor로 돌아옵니다. FINISH이면 END.",
        visual: 'full',
        code: [
          { line: '# 전체 Multi-Agent Graph', highlight: false },
          { line: '', highlight: false },
          { line: 'graph = StateGraph(State)', highlight: true },
          { line: 'graph.add_node("supervisor", supervisor_node)', highlight: true },
          { line: 'graph.add_node("researcher", research_node)', highlight: true },
          { line: 'graph.add_node("coder", coding_node)', highlight: true },
          { line: 'graph.add_node("reviewer", review_node)', highlight: true },
          { line: '', highlight: false },
          { line: 'graph.set_entry_point("supervisor")', highlight: false },
          { line: 'graph.add_conditional_edges("supervisor",', highlight: false },
          { line: '    route_fn,', highlight: false },
          { line: '    {"researcher":"researcher", "coder":"coder",', highlight: false },
          { line: '     "reviewer":"reviewer", "FINISH": END})', highlight: false },
          { line: '', highlight: false },
          { line: 'for m in members:', highlight: false },
          { line: '    graph.add_edge(m, "supervisor")', highlight: false },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      const renderVisual = () => {
        if (stepData.visual === 'single-limit') {
          return (
            <div className="space-y-3">
              <div className="text-sm font-bold text-slate-500 mb-1">단일 Agent의 한계</div>
              <div className="p-4 rounded-xl bg-red-50 border-2 border-red-300">
                <div className="font-bold text-red-700 text-center mb-3">Agent 1명이 모두 담당</div>
                <div className="flex flex-wrap gap-1 justify-center">
                  {['검색', '코딩', '분석', '번역', '요약', '계산', '이메일', '문서작성'].map(t => (
                    <span key={t} className="bg-red-200 text-red-800 px-2 py-0.5 rounded text-xs">{t}</span>
                  ))}
                </div>
                <div className="text-xs text-red-600 text-center mt-2">도구 과다 + 역할 모호 + 품질 저하</div>
              </div>
            </div>
          );
        }
        if (stepData.visual === 'supervisor') {
          return (
            <div className="flex flex-col items-center gap-3">
              <div className="text-sm font-bold text-slate-500 mb-1">Supervisor (PM)</div>
              <div className="w-32 h-12 rounded-xl bg-purple-600 text-white flex items-center justify-center font-bold">Supervisor</div>
              <div className="text-purple-400 text-xs">업무 분배</div>
              <div className="flex gap-3">
                {[
                  { name: 'Research', icon: '🔍', color: 'bg-blue-100 border-blue-300 text-blue-700' },
                  { name: 'Coding', icon: '💻', color: 'bg-green-100 border-green-300 text-green-700' },
                  { name: 'Review', icon: '📋', color: 'bg-amber-100 border-amber-300 text-amber-700' },
                ].map(a => (
                  <div key={a.name} className={"w-20 p-2 rounded-lg border-2 text-center " + a.color}>
                    <div className="text-lg">{a.icon}</div>
                    <div className="text-xs font-bold">{a.name}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        }
        if (stepData.visual === 'sub-agents') {
          return (
            <div className="space-y-3">
              <div className="text-sm font-bold text-slate-500 mb-1">Sub-agents (전문가)</div>
              {[
                { name: 'Research Agent', tools: 'search, wiki', desc: '정보 조사 전문', color: 'bg-blue-50 border-blue-200' },
                { name: 'Coding Agent', tools: 'code_exec, file_write', desc: '코드 작성 전문', color: 'bg-green-50 border-green-200' },
                { name: 'Review Agent', tools: 'lint, test_run', desc: '코드 검토 전문', color: 'bg-amber-50 border-amber-200' },
              ].map(a => (
                <div key={a.name} className={"p-3 rounded-lg border " + a.color}>
                  <div className="font-bold text-sm">{a.name}</div>
                  <div className="text-xs text-slate-500 mt-1">도구: {a.tools}</div>
                  <div className="text-xs text-slate-400">{a.desc}</div>
                </div>
              ))}
            </div>
          );
        }
        if (stepData.visual === 'routing') {
          return (
            <div className="flex flex-col items-center gap-2">
              <div className="text-sm font-bold text-slate-500 mb-1">Supervisor 라우팅</div>
              <div className="w-32 h-10 rounded-xl bg-purple-600 text-white flex items-center justify-center font-bold text-sm">Supervisor</div>
              <div className="text-purple-500 font-bold text-xs">LLM이 다음 Agent 결정</div>
              <div className="flex flex-wrap gap-2 justify-center">
                {[
                  { label: 'researcher', color: 'bg-blue-100 border-blue-300 text-blue-700' },
                  { label: 'coder', color: 'bg-green-100 border-green-300 text-green-700' },
                  { label: 'reviewer', color: 'bg-amber-100 border-amber-300 text-amber-700' },
                  { label: 'FINISH', color: 'bg-red-100 border-red-300 text-red-700' },
                ].map(o => (
                  <div key={o.label} className={"px-3 py-2 rounded-lg border-2 font-bold text-xs " + o.color}>{o.label}</div>
                ))}
              </div>
            </div>
          );
        }
        if (stepData.visual === 'flow') {
          return (
            <div className="space-y-2">
              <div className="text-sm font-bold text-slate-500 mb-1">실행 흐름</div>
              {[
                { step: '1', node: 'Supervisor', text: '"researcher에게"', color: 'bg-purple-50 border-purple-200' },
                { step: '2', node: 'Research', text: 'API 문서 조사', color: 'bg-blue-50 border-blue-200' },
                { step: '3', node: 'Supervisor', text: '"coder에게"', color: 'bg-purple-50 border-purple-200' },
                { step: '4', node: 'Coding', text: '코드 작성', color: 'bg-green-50 border-green-200' },
                { step: '5', node: 'Supervisor', text: '"FINISH"', color: 'bg-purple-50 border-purple-200' },
                { step: '6', node: 'END', text: '최종 결과', color: 'bg-red-50 border-red-200' },
              ].map(item => (
                <div key={item.step} className={"flex items-center gap-2 p-2 rounded-lg border text-xs " + item.color}>
                  <span className="font-bold text-slate-500 w-4">{item.step}</span>
                  <span className="font-bold w-20">{item.node}</span>
                  <span className="text-slate-500">{item.text}</span>
                </div>
              ))}
            </div>
          );
        }
        if (stepData.visual === 'full') {
          return (
            <div className="flex flex-col items-center gap-2">
              <div className="text-sm font-bold text-slate-500 mb-1">전체 그래프</div>
              <div className="w-24 h-8 rounded bg-green-500 text-white flex items-center justify-center font-bold text-xs">START</div>
              <span className="text-slate-400">↓</span>
              <div className="w-32 h-10 rounded-xl bg-purple-600 text-white flex items-center justify-center font-bold text-sm">Supervisor</div>
              <div className="text-purple-400 text-xs">조건 분기</div>
              <div className="flex gap-2">
                {[
                  { label: 'Research', color: 'bg-blue-100 border-blue-300 text-blue-700' },
                  { label: 'Coding', color: 'bg-green-100 border-green-300 text-green-700' },
                  { label: 'Review', color: 'bg-amber-100 border-amber-300 text-amber-700' },
                  { label: 'END', color: 'bg-red-500 text-white border-red-500' },
                ].map(n => (
                  <div key={n.label} className={"w-16 h-9 rounded-lg border-2 flex items-center justify-center font-bold text-xs " + n.color}>{n.label}</div>
                ))}
              </div>
              <div className="text-purple-400 text-xs">↩ 완료 후 Supervisor로 복귀</div>
            </div>
          );
        }
        return null;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-purple-700 hover:text-purple-900 font-medium"><span aria-hidden="true">&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. LangGraph &gt; Chapter 2. LangGraph 실전</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-2-3. Multi-Agent Supervisor</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>프로젝트 매니저</b> — PM(Supervisor)이 Research/Coding/Review Agent에게 업무를 분배하고, 결과를 종합합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-purple-700 border-purple-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">Multi-Agent Supervisor</h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderVisual()}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (<div key={i} className={l.highlight ? 'bg-purple-900/40 -mx-4 px-4' : ''}>{l.line || '\u00A0'}</div>))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Supervisor', 'sub-graph', '역할 분담', '라우팅'].map(kw => (<span key={kw} className="bg-purple-50 text-purple-700 px-3 py-1 rounded-full text-sm font-medium border border-purple-200">{kw}</span>))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-purple-600 hover:bg-purple-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./IV-2-2.html" className="text-purple-600 hover:text-purple-800 font-medium">&larr; IV-2-2. Human-in-the-Loop</a>
              <span className="text-purple-600 font-medium">Part IV 완료! <a href="../part5/V-1-1.html" className="underline hover:text-purple-800">Part V &rarr;</a></span>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
