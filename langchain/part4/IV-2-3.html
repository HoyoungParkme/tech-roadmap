            {mode === 'graph' && (
              <div className="absolute top-2 left-1/2 -translate-x-1/2">
                <div className="text-[9px] bg-slate-700 text-white px-2 py-0.5 rounded font-mono">START</div>
              </div>
            )}

            {/* END 라벨 (finish 단계) */}
            {finished && (
              <div className="absolute top-2 right-3">
                <div className="text-[9px] bg-emerald-600 text-white px-2 py-0.5 rounded font-mono font-bold animate-pulse">END</div>
              </div>
            )}

            {/* SVG 엣지 (graph 모드 only) */}
            {mode === 'graph' && (
              <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 400 280" preserveAspectRatio="none">
                <defs>
                  <marker id="arrow-em" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
                    <path d="M0,0 L8,4 L0,8 z" fill="#10b981" />
                  </marker>
                  <marker id="arrow-em-back" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
                    <path d="M0,0 L8,4 L0,8 z" fill="#34d399" />
                  </marker>
                  <marker id="arrow-end" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
                    <path d="M0,0 L8,4 L0,8 z" fill="#059669" />
                  </marker>
                </defs>

                {/* START → Supervisor */}
                <line x1="200" y1="20" x2="200" y2="100" stroke="#10b981" strokeWidth="2" markerEnd="url(#arrow-em)" />

                {/* Supervisor → 3 sub-agents (분기) */}
                <line x1="170" y1="160" x2="80"  y2="220" stroke={active==='researcher'?'#10b981':'#a7f3d0'} strokeWidth={active==='researcher'?'3':'1.5'} strokeDasharray={active==='researcher'?'0':'4 3'} markerEnd="url(#arrow-em)" />
                <line x1="200" y1="170" x2="200" y2="220" stroke={active==='coder'     ?'#10b981':'#a7f3d0'} strokeWidth={active==='coder'     ?'3':'1.5'} strokeDasharray={active==='coder'     ?'0':'4 3'} markerEnd="url(#arrow-em)" />
                <line x1="230" y1="160" x2="320" y2="220" stroke={active==='writer'    ?'#10b981':'#a7f3d0'} strokeWidth={active==='writer'    ?'3':'1.5'} strokeDasharray={active==='writer'    ?'0':'4 3'} markerEnd="url(#arrow-em)" />

                {/* sub-agents → Supervisor (복귀) — 곡선 */}
                <path d="M 80 220 Q 40 180 170 145"  stroke="#34d399" strokeWidth="1.5" strokeDasharray="3 3" fill="none" markerEnd="url(#arrow-em-back)" />
                <path d="M 200 220 Q 260 195 220 165" stroke="#34d399" strokeWidth="1.5" strokeDasharray="3 3" fill="none" markerEnd="url(#arrow-em-back)" />
                <path d="M 320 220 Q 360 180 230 145" stroke="#34d399" strokeWidth="1.5" strokeDasharray="3 3" fill="none" markerEnd="url(#arrow-em-back)" />

                {/* Supervisor → END (FINISH 단계) */}
                {finished && (
                  <line x1="240" y1="120" x2="370" y2="30" stroke="#059669" strokeWidth="3" markerEnd="url(#arrow-end)" />
                )}
              </svg>
            )}

            {/* split-with-supervisor 모드: 위에서 아래로 단방향 점선 */}
            {mode === 'split-with-supervisor' && (
              <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 400 280" preserveAspectRatio="none">
                <line x1="170" y1="160" x2="80"  y2="220" stroke="#10b981" strokeWidth="2" strokeDasharray="4 3" />
                <line x1="200" y1="170" x2="200" y2="220" stroke="#a7f3d0" strokeWidth="1.5" strokeDasharray="4 3" />
                <line x1="230" y1="160" x2="320" y2="220" stroke="#a7f3d0" strokeWidth="1.5" strokeDasharray="4 3" />
              </svg>
            )}

            {/* Supervisor 박스 — split, split-with-supervisor, graph 에서 표시 */}
            {(mode === 'split-with-supervisor' || mode === 'graph') && (
              <div
                className={`absolute left-1/2 top-[100px] -translate-x-1/2 px-4 py-2 rounded-xl shadow-md transition-all ${
                  supActive
                    ? 'bg-emerald-600 text-white ring-4 ring-emerald-300 animate-pulse'
                    : 'bg-white border-2 border-emerald-400 text-emerald-800'
                }`}
              >
                <div className="text-center font-bold text-sm">🧭 Supervisor</div>
                <div className={`text-[9px] text-center mt-0.5 ${supActive ? 'text-emerald-100' : 'text-emerald-600'}`}>
                  PM (라우팅 LLM)
                </div>
              </div>
            )}

            {/* split 모드: supervisor 자리에 placeholder */}
            {mode === 'split' && (
              <div className="absolute left-1/2 top-[100px] -translate-x-1/2 px-4 py-2 rounded-xl border-2 border-dashed border-slate-300 text-slate-400">
                <div className="text-center font-bold text-sm">? Supervisor</div>
                <div className="text-[9px] text-center mt-0.5">아직 없음 — 누가 호출?</div>
              </div>
            )}

            {/* 3개 sub-agents (위성) */}
            <div className="absolute bottom-3 left-0 right-0 flex justify-around px-3">
              {AGENTS.map((a) => {
                const isActive = active === a.id;
                return (
                  <div
                    key={a.id}
                    className={`px-2.5 py-1.5 rounded-lg shadow transition-all ${
                      isActive
                        ? 'bg-emerald-500 text-white ring-4 ring-emerald-200 animate-pulse scale-110'
                        : 'bg-white border-2 border-slate-300 text-slate-700'
                    }`}
                  >
                    <div className="text-center text-base leading-none mb-0.5">{a.icon}</div>
                    <div className={`text-[10px] font-bold text-center ${isActive ? 'text-white' : 'text-slate-700'}`}>
                      {a.label}
                    </div>
                    <div className={`text-[8px] text-center font-mono ${isActive ? 'text-emerald-100' : 'text-slate-400'}`}>
                      {a.tools.split(',')[0]}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* 토폴로지 캡션 */}
          <div className="text-[9px] text-slate-500 text-center font-mono">
            {mode === 'split' && '— sub-agent 정의됨, edge 없음 —'}
            {mode === 'split-with-supervisor' && '— Supervisor 라우팅 결정 (한 방향) —'}
            {mode === 'graph' && (finished
              ? '— Supervisor → END (FINISH) —'
              : '— Supervisor ↔ N agents 양방향 loop —')}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: 메시지 흐름 큐 (state.messages 시뮬레이션)
    //   user / agent(supervisor·researcher·coder·writer) / note 구분
    //   from 별 색상 — Supervisor=emerald, sub-agents=각자 색
    // ─────────────────────────────────────────────────────
    function MessageFlow({ messages }) {
      const palette = {
        user:       { bg: 'bg-slate-700',     fg: 'text-white',         label: 'user',       icon: '👤' },
        supervisor: { bg: 'bg-emerald-600',   fg: 'text-white',         label: 'supervisor', icon: '🧭' },
        researcher: { bg: 'bg-blue-500',      fg: 'text-white',         label: 'researcher', icon: '🔍' },
        coder:      { bg: 'bg-amber-500',     fg: 'text-white',         label: 'coder',      icon: '💻' },
        writer:     { bg: 'bg-purple-500',    fg: 'text-white',         label: 'writer',     icon: '✍️' },
        mono:       { bg: 'bg-red-500',       fg: 'text-white',         label: 'mono_agent', icon: '🤖' },
      };

      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📨</span>
              <span className="text-[11px] font-bold text-emerald-800">state.messages (공용 메모)</span>
            </div>
            <span className="text-[9px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-mono">
              {messages.length} msgs
            </span>
          </div>

          <div className="space-y-1.5 max-h-[260px] overflow-y-auto pr-1">
            {messages.map((m, i) => {
              if (m.kind === 'note') {
                return (
                  <div key={i} className="text-[10px] text-slate-500 italic px-2 py-1 bg-slate-50 rounded border border-dashed border-slate-200 text-center">
                    {m.text}
                  </div>
                );
              }
              if (m.kind === 'user') {
                const p = palette.user;
                return (
                  <div key={i} className="flex justify-end">
                    <div className={`max-w-[88%] ${p.bg} ${p.fg} rounded-lg px-2.5 py-1.5 shadow`}>
                      <div className="flex items-center gap-1 mb-0.5">
                        <span className="text-[10px]">{p.icon}</span>
                        <span className="text-[8px] font-mono uppercase tracking-wider opacity-80">{p.label}</span>
                      </div>
                      <div className="text-[10px] leading-snug">{m.text}</div>
                    </div>
                  </div>
                );
              }
              // agent 메시지
              const p = palette[m.from] || palette.mono;
              const pulseClass = m.done ? 'animate-pulse ring-4 ring-emerald-300' : '';
              const warnClass  = m.warn ? 'border-2 border-red-400' : '';
              return (
                <div key={i} className="flex justify-start">
                  <div className={`max-w-[88%] ${p.bg} ${p.fg} rounded-lg px-2.5 py-1.5 shadow ${pulseClass} ${warnClass}`}>
                    <div className="flex items-center gap-1 mb-0.5">
                      <span className="text-[10px]">{p.icon}</span>
                      <span className="text-[8px] font-mono uppercase tracking-wider opacity-90">{p.label}</span>
                      {m.done && <span className="text-[8px] bg-white text-emerald-700 px-1 rounded font-bold ml-1">DONE</span>}
                    </div>
                    <div className="text-[10px] leading-snug">{m.text}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: Graph 다이어그램 / 하단: state.messages 흐름
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🧭 Supervisor + Sub-agents — Graph & 메시지 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <GraphDiagram step={step} />
            <MessageFlow messages={step.messages} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-600"></span>Supervisor
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-blue-500"></span>Researcher
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>Coder
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-purple-500"></span>Writer
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-700"></span>User
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-red-500"></span>warning
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js (atom-one-dark)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일 탭 (5개) — 현재 step의 filename 강조 */}
          <div className="bg-[#1e2127] px-2 pt-1 flex gap-0.5 border-b border-slate-700 overflow-x-auto">
            {STEPS.map((s, i) => {
              const isCurrent = i === stepIdx;
              return (
                <div
                  key={s.code.filename}
                  className={`text-[10px] font-mono px-2.5 py-1 rounded-t border-t border-l border-r whitespace-nowrap ${
                    isCurrent
                      ? 'bg-[#282c34] border-slate-600 text-emerald-300 font-bold'
                      : 'bg-[#1e2127] border-transparent text-slate-500'
                  }`}
                >
                  {s.code.filename}
                </div>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-2-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. LangGraph &gt; Chapter 2. LangGraph 실전</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-2-3. Multi-Agent Supervisor — PM과 3명의 전문가</h1>
                  <p className="text-sm text-slate-500 mt-0.5">단일 만능 Agent → Supervisor가 Researcher / Coder / Writer를 라우팅</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: <strong>Supervisor</strong> 는 도구 없이 "다음 누구?"만 답하는 라우터 LLM, <strong>Sub-agent</strong> 는 자기 도구만 가진 ReAct 전문가. 그래프는 <strong>Supervisor 중앙 별 모양 loop</strong>, <strong>FINISH</strong> 가 종료 신호. 도구 12개 한 Agent보다 도구 2개 Agent 3개가 훨씬 강하다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Multi-Agent', 'Supervisor', 'StateGraph', 'conditional_edges', 'create_react_agent', 'FINISH', 'role-split'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-2-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; IV-2-2 Human-in-the-Loop</a>
              <a href="../part5/V-1-1.html" className="text-emerald-700 hover:text-emerald-900 font-medium">Part V &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
