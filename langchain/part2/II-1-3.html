<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — II-1-3. Embeddings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-1-3. Embeddings
    학습 목표: 텍스트를 벡터로 변환하는 원리와 유사도 검색의 기본을 설명할 수 있다.
    템플릿: 순차형 (Type B) — 좌표 찍기 비유.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const WORDS = [
      { text: '왕', x: 30, y: 25, color: 'bg-indigo-500' },
      { text: '여왕', x: 35, y: 20, color: 'bg-indigo-400' },
      { text: '왕자', x: 28, y: 30, color: 'bg-indigo-300' },
      { text: '사과', x: 75, y: 70, color: 'bg-red-500' },
      { text: '바나나', x: 80, y: 65, color: 'bg-yellow-500' },
      { text: '오렌지', x: 70, y: 75, color: 'bg-orange-500' },
    ];

    const STEPS = [
      {
        desc: "[텍스트와 숫자] 컴퓨터는 텍스트를 직접 비교할 수 없습니다. \"왕\"과 \"여왕\"이 비슷하다는 것을 어떻게 알까요? 텍스트를 숫자 배열(벡터)로 바꾸면 수학적으로 비교할 수 있습니다.",
        showMap: false,
        showVector: false,
        showSimilarity: false,
        code: [
          { line: '# 텍스트를 직접 비교?', highlight: false },
          { line: '"왕" == "여왕"  # False — 글자가 다르니까', highlight: false },
          { line: '', highlight: false },
          { line: '# 하지만 의미는 비슷하다!', highlight: true },
          { line: '# → 텍스트를 숫자(벡터)로 변환하면', highlight: true },
          { line: '#    의미적 유사도를 계산할 수 있다', highlight: true },
        ],
      },
      {
        desc: "[벡터 변환] Embedding 모델이 텍스트를 고차원 벡터(숫자 배열)로 변환합니다. \"왕\" → [0.23, -0.45, 0.78, ...] 이런 식으로 수백~수천 차원의 좌표가 됩니다.",
        showMap: false,
        showVector: true,
        showSimilarity: false,
        vectors: [
          { text: '왕', vec: '[0.23, -0.45, 0.78, ...]' },
          { text: '여왕', vec: '[0.25, -0.42, 0.81, ...]' },
          { text: '사과', vec: '[-0.67, 0.12, -0.34, ...]' },
        ],
        code: [
          { line: 'from langchain_openai import OpenAIEmbeddings', highlight: false },
          { line: '', highlight: false },
          { line: 'embeddings = OpenAIEmbeddings()', highlight: true },
          { line: '', highlight: false },
          { line: 'vec = embeddings.embed_query("왕")', highlight: true },
          { line: '# → [0.23, -0.45, 0.78, ...] (1536차원)', highlight: false },
          { line: '', highlight: false },
          { line: 'vecs = embeddings.embed_documents(["왕", "여왕", "사과"])', highlight: false },
        ],
      },
      {
        desc: "[벡터 공간] 의미가 비슷한 단어는 벡터 공간에서 가까이 위치합니다. \"왕\", \"여왕\", \"왕자\"는 한 곳에 모이고, \"사과\", \"바나나\", \"오렌지\"는 다른 곳에 모입니다.",
        showMap: true,
        showVector: false,
        showSimilarity: false,
        code: [
          { line: '# 벡터 공간에서의 위치 (2D 시각화)', highlight: false },
          { line: '', highlight: false },
          { line: '# 왕족 그룹    ←→    과일 그룹', highlight: true },
          { line: '# 왕, 여왕, 왕자      사과, 바나나, 오렌지', highlight: true },
          { line: '', highlight: false },
          { line: '# 같은 의미 그룹은 가까이 모인다!', highlight: false },
        ],
      },
      {
        desc: "[코사인 유사도] 두 벡터 사이의 각도로 유사도를 측정합니다. 1.0에 가까울수록 유사하고, 0에 가까울수록 무관합니다. \"왕\"↔\"여왕\" = 0.95, \"왕\"↔\"사과\" = 0.12.",
        showMap: true,
        showVector: false,
        showSimilarity: true,
        similarities: [
          { a: '왕', b: '여왕', score: 0.95, label: '매우 유사', color: 'text-emerald-600' },
          { a: '왕', b: '왕자', score: 0.89, label: '유사', color: 'text-cyan-600' },
          { a: '사과', b: '바나나', score: 0.87, label: '유사', color: 'text-cyan-600' },
          { a: '왕', b: '사과', score: 0.12, label: '무관', color: 'text-red-500' },
        ],
        code: [
          { line: 'from numpy import dot', highlight: false },
          { line: 'from numpy.linalg import norm', highlight: false },
          { line: '', highlight: false },
          { line: 'def cosine_similarity(a, b):', highlight: true },
          { line: '    return dot(a, b) / (norm(a) * norm(b))', highlight: true },
          { line: '', highlight: false },
          { line: '# "왕" ↔ "여왕" → 0.95 (매우 유사)', highlight: false },
          { line: '# "왕" ↔ "사과" → 0.12 (무관)', highlight: false },
        ],
      },
      {
        desc: "[실전 활용] Embedding은 RAG의 핵심입니다. 사용자 질문을 벡터로 변환하고, 저장된 문서 벡터와 유사도를 비교해서 관련 문서를 찾습니다. 다음 단계인 Vector Store가 이 벡터를 저장합니다.",
        showMap: false,
        showVector: false,
        showSimilarity: false,
        code: [
          { line: '# Embedding의 실전 활용 흐름', highlight: false },
          { line: '', highlight: false },
          { line: '# 1. 문서를 벡터로 변환해서 저장', highlight: true },
          { line: 'doc_vecs = embeddings.embed_documents(chunks)', highlight: false },
          { line: '', highlight: false },
          { line: '# 2. 질문도 벡터로 변환', highlight: true },
          { line: 'q_vec = embeddings.embed_query("AI Agent란?")', highlight: false },
          { line: '', highlight: false },
          { line: '# 3. 유사도 비교 → 관련 문서 찾기', highlight: true },
          { line: '# → 이것이 Vector Store + Retriever의 역할!', highlight: false },
        ],
        pipeline: [
          { step: '문서', icon: '📄', arrow: true },
          { step: 'Embedding', icon: '🔢', arrow: true },
          { step: 'Vector Store', icon: '🗄️', arrow: true },
          { step: '유사도 검색', icon: '🔍', arrow: false },
        ],
      },
    ];

    function VectorMap({ words }) {
      return (
        <div className="relative bg-slate-50 border border-slate-200 rounded-xl h-64 overflow-hidden">
          <div className="absolute top-2 left-2 text-xs text-slate-400">벡터 공간 (2D 시각화)</div>
          {words.map((w, i) => (
            <div
              key={i}
              className={`absolute flex items-center justify-center px-2 py-1 rounded-full text-white text-xs font-bold shadow-md transition-all duration-500 ${w.color}`}
              style={{ left: `${w.x}%`, top: `${w.y}%`, transform: 'translate(-50%, -50%)' }}
            >
              {w.text}
            </div>
          ))}
          {/* 그룹 표시 */}
          <div className="absolute left-[15%] top-[10%] w-[30%] h-[35%] border-2 border-dashed border-indigo-300 rounded-2xl opacity-50" />
          <div className="absolute left-[55%] top-[50%] w-[35%] h-[35%] border-2 border-dashed border-red-300 rounded-2xl opacity-50" />
          <div className="absolute left-[18%] top-[48%] text-xs text-indigo-400 font-medium">왕족</div>
          <div className="absolute left-[60%] top-[88%] text-xs text-red-400 font-medium">과일</div>
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">

            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-cyan-700 hover:text-cyan-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 컴포넌트 &gt; Chapter 1. 문서 처리</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-1-3. Embeddings</h1>
                </div>
              </div>
              <p className="text-slate-600">
                <b>좌표 찍기</b>와 같습니다. "왕"과 "여왕"은 가까운 좌표에, "왕"과 "사과"는 먼 좌표에 찍힙니다.
              </p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-cyan-700 border-cyan-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">Embeddings 동작</h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                {stepData.showMap && <VectorMap words={WORDS} />}

                {stepData.showVector && stepData.vectors && (
                  <div className="space-y-2">
                    <div className="text-xs font-bold text-cyan-600 uppercase tracking-wider">벡터 변환 결과</div>
                    {stepData.vectors.map((v, i) => (
                      <div key={i} className="flex items-center gap-3 bg-slate-50 border border-slate-200 rounded-lg p-3">
                        <span className="font-bold text-sm text-cyan-700 w-12">"{v.text}"</span>
                        <span className="text-slate-400">→</span>
                        <code className="text-xs text-slate-600 font-mono">{v.vec}</code>
                      </div>
                    ))}
                  </div>
                )}

                {stepData.showSimilarity && stepData.similarities && (
                  <div className="space-y-2">
                    <div className="text-xs font-bold text-cyan-600 uppercase tracking-wider">코사인 유사도</div>
                    {stepData.similarities.map((s, i) => (
                      <div key={i} className="flex items-center justify-between bg-slate-50 border border-slate-200 rounded-lg p-3">
                        <span className="text-sm">"{s.a}" ↔ "{s.b}"</span>
                        <div className="flex items-center gap-2">
                          <div className="w-24 bg-slate-200 rounded-full h-2">
                            <div className="bg-cyan-500 h-2 rounded-full" style={{ width: `${s.score * 100}%` }} />
                          </div>
                          <span className={`font-bold text-sm ${s.color}`}>{s.score}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {stepData.pipeline && (
                  <div className="flex items-center justify-center gap-1 flex-wrap">
                    {stepData.pipeline.map((p, i) => (
                      <React.Fragment key={i}>
                        <div className="flex flex-col items-center bg-cyan-50 border border-cyan-200 rounded-lg px-3 py-2">
                          <span className="text-2xl">{p.icon}</span>
                          <span className="text-xs font-bold text-cyan-700 mt-1">{p.step}</span>
                        </div>
                        {p.arrow && <span className="text-cyan-400 text-xl">→</span>}
                      </React.Fragment>
                    ))}
                  </div>
                )}

                {!stepData.showMap && !stepData.showVector && !stepData.showSimilarity && !stepData.pipeline && (
                  <div className="flex items-center justify-center h-40 text-slate-400 text-sm">
                    다음 단계에서 벡터를 시각화합니다
                  </div>
                )}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (
                    <div key={i} className={l.highlight ? 'bg-cyan-900/40 -mx-4 px-4' : ''}>
                      {l.line || '\u00A0'}
                    </div>
                  ))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Embedding', '벡터', '코사인 유사도', 'OpenAIEmbeddings'].map(kw => (
                <span key={kw} className="bg-cyan-50 text-cyan-700 px-3 py-1 rounded-full text-sm font-medium border border-cyan-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-cyan-600 hover:bg-cyan-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./II-1-2.html" className="text-cyan-600 hover:text-cyan-800 font-medium">&larr; II-1-2. Text Splitters</a>
              <a href="./II-2-1.html" className="text-cyan-600 hover:text-cyan-800 font-medium">II-2-1. Vector Stores &rarr;</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
