<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — II-2-1. Vector Stores</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-2-1. Vector Stores
    학습 목표: 벡터를 저장하고 유사도 검색하는 Vector Store의 동작 원리를 설명할 수 있다.
    템플릿: 순차형 (Type B) — 도서관 서가 비유.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STORED_DOCS = [
      { id: 1, text: 'AI Agent는 자율적으로 판단하고 행동한다', topic: 'AI', score: null },
      { id: 2, text: 'LangChain은 LLM 앱 개발 프레임워크다', topic: 'LangChain', score: null },
      { id: 3, text: 'RAG는 검색 + 생성을 결합한 기법이다', topic: 'AI', score: null },
      { id: 4, text: 'FastAPI는 파이썬 웹 프레임워크다', topic: '웹', score: null },
      { id: 5, text: 'Docker는 컨테이너 기반 가상화 도구다', topic: '인프라', score: null },
    ];

    const STEPS = [
      {
        desc: "[도서관 서가] 벡터를 저장하는 것은 도서관 서가에 책을 꽂는 것과 같습니다. 주제별로 정리해두면, 비슷한 주제의 책을 빠르게 찾을 수 있습니다.",
        phase: 'intro',
        docs: [],
        query: null,
        results: null,
        code: [
          { line: '# Vector Store = 벡터 전용 저장소', highlight: false },
          { line: '# 도서관 서가처럼 벡터를 정리해서 저장', highlight: false },
          { line: '', highlight: false },
          { line: '# 주요 Vector Store:', highlight: true },
          { line: '#   FAISS    — Facebook, 로컬, 무료', highlight: true },
          { line: '#   Chroma   — 경량, 로컬, 무료', highlight: true },
          { line: '#   pgvector — PostgreSQL 확장', highlight: true },
          { line: '#   Pinecone — 클라우드, 유료', highlight: false },
        ],
      },
      {
        desc: "[벡터 저장] 문서를 Embedding으로 벡터화한 후, Vector Store에 저장합니다. from_documents() 하나로 변환 + 저장이 동시에 됩니다.",
        phase: 'store',
        docs: STORED_DOCS,
        query: null,
        results: null,
        code: [
          { line: 'from langchain_community.vectorstores import FAISS', highlight: false },
          { line: 'from langchain_openai import OpenAIEmbeddings', highlight: false },
          { line: '', highlight: false },
          { line: '# 문서 → 벡터 변환 + 저장 (한 줄!)', highlight: false },
          { line: 'vectorstore = FAISS.from_documents(', highlight: true },
          { line: '    documents=chunks,', highlight: true },
          { line: '    embedding=OpenAIEmbeddings()', highlight: true },
          { line: ')', highlight: true },
        ],
      },
      {
        desc: "[인덱싱] Vector Store는 내부적으로 인덱스를 구축합니다. FAISS는 IVF(역색인) 방식으로 벡터를 클러스터링해서, 검색 시 전체를 순회하지 않고 관련 클러스터만 탐색합니다.",
        phase: 'index',
        docs: STORED_DOCS,
        query: null,
        results: null,
        clusters: [
          { name: 'AI 클러스터', ids: [1, 3], color: 'bg-indigo-50 border-indigo-200' },
          { name: 'LangChain 클러스터', ids: [2], color: 'bg-cyan-50 border-cyan-200' },
          { name: '기타 클러스터', ids: [4, 5], color: 'bg-slate-50 border-slate-200' },
        ],
        code: [
          { line: '# FAISS 내부 동작:', highlight: false },
          { line: '#', highlight: false },
          { line: '# 1. 벡터를 클러스터링 (IVF)', highlight: true },
          { line: '#    AI 관련 → 클러스터 A', highlight: false },
          { line: '#    웹 관련 → 클러스터 B', highlight: false },
          { line: '#', highlight: false },
          { line: '# 2. 검색 시 관련 클러스터만 탐색', highlight: true },
          { line: '#    → 전체 순회 대비 10~100배 빠름', highlight: false },
        ],
      },
      {
        desc: "[유사도 검색] similarity_search()로 질문과 가장 유사한 문서를 찾습니다. \"AI Agent가 뭐야?\"라고 물으면, 벡터 유사도가 가장 높은 문서부터 반환합니다.",
        phase: 'search',
        docs: STORED_DOCS,
        query: 'AI Agent가 뭐야?',
        results: [
          { id: 1, text: 'AI Agent는 자율적으로 판단하고 행동한다', score: 0.94 },
          { id: 3, text: 'RAG는 검색 + 생성을 결합한 기법이다', score: 0.78 },
          { id: 2, text: 'LangChain은 LLM 앱 개발 프레임워크다', score: 0.65 },
        ],
        code: [
          { line: '# 유사도 검색', highlight: false },
          { line: 'results = vectorstore.similarity_search(', highlight: true },
          { line: '    query="AI Agent가 뭐야?",', highlight: true },
          { line: '    k=3  # 상위 3개', highlight: true },
          { line: ')', highlight: true },
          { line: '', highlight: false },
          { line: '# results[0].page_content', highlight: false },
          { line: '# → "AI Agent는 자율적으로 판단하고 행동한다"', highlight: false },
        ],
      },
      {
        desc: "[결과 + 점수] similarity_search_with_score()를 쓰면 유사도 점수도 함께 받을 수 있습니다. 점수를 기반으로 임계값(threshold)을 설정해서 관련 없는 문서를 걸러낼 수 있습니다.",
        phase: 'score',
        docs: [],
        query: 'AI Agent가 뭐야?',
        results: [
          { id: 1, text: 'AI Agent는 자율적으로 판단하고 행동한다', score: 0.94, pass: true },
          { id: 3, text: 'RAG는 검색 + 생성을 결합한 기법이다', score: 0.78, pass: true },
          { id: 2, text: 'LangChain은 LLM 앱 개발 프레임워크다', score: 0.65, pass: false },
        ],
        code: [
          { line: '# 점수 포함 검색', highlight: false },
          { line: 'results = vectorstore.similarity_search_with_score(', highlight: true },
          { line: '    query="AI Agent가 뭐야?", k=3', highlight: true },
          { line: ')', highlight: true },
          { line: '', highlight: false },
          { line: 'for doc, score in results:', highlight: false },
          { line: '    if score > 0.7:  # 임계값', highlight: true },
          { line: '        print(f"[{score:.2f}] {doc.page_content}")', highlight: false },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">

            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-cyan-700 hover:text-cyan-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 컴포넌트 &gt; Chapter 2. 저장과 검색</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-2-1. Vector Stores</h1>
                </div>
              </div>
              <p className="text-slate-600">
                <b>도서관 서가</b>와 같습니다. 책(벡터)을 주제별로 정리해두면, 비슷한 주제의 책을 빠르게 찾을 수 있습니다.
              </p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-cyan-700 border-cyan-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">Vector Stores 동작</h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                {/* 저장된 문서 */}
                {stepData.docs.length > 0 && (
                  <div className="space-y-2">
                    <div className="text-xs font-bold text-cyan-600 uppercase tracking-wider">저장된 문서 (벡터화)</div>
                    {stepData.docs.map(doc => (
                      <div key={doc.id} className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs">
                        <span className="bg-cyan-100 text-cyan-700 px-2 py-0.5 rounded font-bold">#{doc.id}</span>
                        <span className="text-slate-600 flex-1">{doc.text}</span>
                        <span className="bg-slate-100 text-slate-500 px-2 py-0.5 rounded">{doc.topic}</span>
                      </div>
                    ))}
                  </div>
                )}

                {/* 클러스터 시각화 */}
                {stepData.clusters && (
                  <div className="space-y-2">
                    <div className="text-xs font-bold text-cyan-600 uppercase tracking-wider">인덱스 클러스터</div>
                    {stepData.clusters.map((cl, i) => (
                      <div key={i} className={`p-3 rounded-lg border ${cl.color}`}>
                        <div className="font-bold text-xs mb-1">{cl.name}</div>
                        <div className="flex gap-1">
                          {cl.ids.map(id => (
                            <span key={id} className="bg-white px-2 py-0.5 rounded border text-xs font-mono">#{id}</span>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {/* 검색 쿼리 + 결과 */}
                {stepData.query && (
                  <div className="space-y-3">
                    <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
                      <div className="text-xs font-bold text-amber-600 mb-1">검색 질문</div>
                      <div className="text-sm font-medium text-amber-800">"{stepData.query}"</div>
                    </div>

                    {stepData.results && (
                      <>
                        <div className="text-center text-cyan-500">↓ similarity_search</div>
                        <div className="space-y-2">
                          {stepData.results.map((r, i) => (
                            <div key={i} className={`flex items-center gap-2 p-3 rounded-lg border-2 transition-all ${
                              r.pass === false ? 'bg-red-50 border-red-200 opacity-50' :
                              i === 0 ? 'bg-cyan-50 border-cyan-300 ring-2 ring-cyan-100' :
                              'bg-white border-slate-200'
                            }`}>
                              <span className="font-bold text-sm text-cyan-700 w-6">{i + 1}</span>
                              <span className="text-xs text-slate-600 flex-1">{r.text}</span>
                              {r.score && (
                                <span className={`font-bold text-xs px-2 py-0.5 rounded ${
                                  r.score >= 0.8 ? 'bg-emerald-100 text-emerald-700' :
                                  r.score >= 0.7 ? 'bg-cyan-100 text-cyan-700' :
                                  'bg-red-100 text-red-600'
                                }`}>{r.score}</span>
                              )}
                            </div>
                          ))}
                        </div>
                      </>
                    )}
                  </div>
                )}

                {stepData.phase === 'intro' && (
                  <div className="flex items-center justify-center h-32 text-slate-400 text-sm">
                    다음 단계에서 벡터를 저장합니다
                  </div>
                )}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (
                    <div key={i} className={l.highlight ? 'bg-cyan-900/40 -mx-4 px-4' : ''}>
                      {l.line || '\u00A0'}
                    </div>
                  ))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['FAISS', 'Chroma', 'pgvector', 'similarity_search', 'add_documents'].map(kw => (
                <span key={kw} className="bg-cyan-50 text-cyan-700 px-3 py-1 rounded-full text-sm font-medium border border-cyan-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-cyan-600 hover:bg-cyan-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./II-1-3.html" className="text-cyan-600 hover:text-cyan-800 font-medium">&larr; II-1-3. Embeddings</a>
              <a href="./II-2-2.html" className="text-cyan-600 hover:text-cyan-800 font-medium">II-2-2. Retrievers &rarr;</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
