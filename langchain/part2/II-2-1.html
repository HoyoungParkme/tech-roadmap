              вңЁ л№„мҰҲлӢҲмҠӨ мҪ”л“ңлҠ” н•ң мӨ„лҸ„ м•Ҳ л°”лҖҗлӢӨ вҖ” fastapi Depends В· Settings нҢЁн„ҙкіј лҸҷмқј
            </div>
          </div>
        );
      }

      // Step 1В·2В·3 вҖ” нҷңм„ұ store м•ҲлӮҙ + кІҖмғү лҚ°лӘЁ
      const storeName = step.active;
      const labelMap = {
        chroma:   { color: 'emerald', icon: 'рҹҹў', name: 'Chroma',   one: 'pip install langchain-chroma',                msg: 'н•ң мӨ„ from_documents() вҖ” мһҗлҸҷ мҳҒмҶҚнҷ”' },
        faiss:    { color: 'sky',     icon: 'рҹ”ө', name: 'FAISS',    one: 'pip install faiss-cpu langchain-community',   msg: 'мқёл©”лӘЁлҰ¬ / save_local() лЎң л””мҠӨнҒ¬ м ҖмһҘ' },
        pgvector: { color: 'purple',  icon: 'рҹҹЈ', name: 'pgvector', one: 'pip install langchain-postgres psycopg',     msg: 'CREATE EXTENSION vector вҖ” Postgres нҶөн•©' },
      };
      const m = labelMap[storeName];
      const color = m.color;
      const palette = {
        emerald: { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-800', accent: 'text-emerald-700', chip: 'bg-emerald-600' },
        sky:     { bg: 'bg-sky-50',     border: 'border-sky-300',     text: 'text-sky-800',     accent: 'text-sky-700',     chip: 'bg-sky-600' },
        purple:  { bg: 'bg-purple-50',  border: 'border-purple-300',  text: 'text-purple-800',  accent: 'text-purple-700',  chip: 'bg-purple-600' },
      }[color];

      return (
        <div className={`${palette.bg} ${palette.border} border-2 rounded-lg p-3`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">{m.icon}</span>
              <span className={`text-[11px] font-bold ${palette.text}`}>{m.name} нҷңм„ұ вҖ” лҚ°лӘЁ кІҖмғү</span>
            </div>
            <span className={`text-[9px] ${palette.chip} text-white font-mono px-1.5 py-0.5 rounded`}>step {STEPS.indexOf(step) + 1}/5</span>
          </div>

          {/* м„Өм№ҳ 1мӨ„ */}
          <div className="bg-slate-900 rounded p-2 mb-2">
            <div className={`text-[9px] font-bold ${palette.accent} mb-0.5 uppercase tracking-wider`}>install</div>
            <div className="text-[10px] font-mono text-emerald-300">$ {m.one}</div>
          </div>

          {/* кІҖмғү лҚ°лӘЁ вҖ” кіөнҶө мқён„°нҺҳмқҙмҠӨ к°•мЎ° */}
          <div className="bg-white rounded border border-slate-200 p-2 mb-1.5">
            <div className={`text-[9px] font-bold ${palette.accent} mb-1 uppercase tracking-wider`}>к°ҷмқҖ л©”м„ңл“ң, к°ҷмқҖ кІ°кіј</div>
            <div className="text-[10px] font-mono leading-snug space-y-0.5">
              <div className="text-amber-700">в–ё query: "AI Agentк°Җ лӯҗм•ј?"</div>
              <div className="text-slate-700">в–ё store.similarity_search(query, k=2)</div>
              <div className={`${palette.accent} pl-3`}>вҶі #1 AI AgentлҠ” мһҗмңЁм ҒмңјлЎң нҢҗлӢЁн•ҳкі  н–үлҸҷн•ңлӢӨ <span className="bg-emerald-100 text-emerald-700 px-1 rounded">0.94</span></div>
              <div className={`${palette.accent} pl-3`}>вҶі #3 RAGлҠ” кІҖмғү + мғқм„ұмқ„ кІ°н•©н•ң кё°лІ•мқҙлӢӨ <span className="bg-emerald-100 text-emerald-700 px-1 rounded">0.78</span></div>
            </div>
          </div>

          <div className={`text-[9px] ${palette.accent}`}>вңЁ {m.msg}</div>
        </div>
      );
    }

    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // LiveDataPane вҖ” мўҢмёЎ нҢЁл„җ м „мІҙ
    //   мғҒлӢЁ: 3 Store л°•мҠӨ (Chroma В· FAISS В· pgvector)
    //   н•ҳлӢЁ: нҷңм„ұ store м•ҲлӮҙ / кіөнҶө мқён„°нҺҳмқҙмҠӨ / ENV көҗмІҙ
    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">рҹ“ҡ 3 Vector Stores вҖ” к°ҷмқҖ мқён„°нҺҳмқҙмҠӨ</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 3 store л°•мҠӨ (мҲҳм§Ғ мҠӨнғқ) */}
          <div className="space-y-2 mb-3">
            {step.stores.map((s) => (
              <StoreCard key={s.name} store={s} />
            ))}
          </div>

          {/* лӢЁкі„лі„ лӢӨмқҙм–ҙк·ёлһЁ / м•ҲлӮҙ */}
          <BottomPane step={step} />

          {/* лІ”лЎҖ */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>Chroma (лЎңм»¬)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>FAISS (мқёл©”лӘЁлҰ¬)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-purple-500"></span>pgvector (Postgres)
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-slate-800"></span>VectorStore м¶”мғҒ
            </span>
          </div>
        </div>
      );
    }

    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // VSCode мҠӨнғҖмқј CodeViewer вҖ” highlight.js
    //   нҢҢмқјлӘ… нғӯ + лқјмқё лІҲнҳё + к°•мЎ° лқјмқё (emerald)
    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* мңҲлҸ„мҡ° dot + нҢҢмқј нғӯ */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs нҶ нҒ°нҷ”мҡ© hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* мӢӨм ң л ҢлҚ”л§Ғ вҖ” лқјмқё лІҲнҳё + к°•мЎ° лқјмқё */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* н‘ён„° */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // App л©”мқё
    //   - мһҗлҸҷмһ¬мғқ 3000ms
    //   - нӮӨліҙл“ң вҶҗ/вҶ’
    //   - 4 лІ„нҠј (мІҳмқҢ/мқҙм „/мһ¬мғқ/лӢӨмқҢ)
    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* мғҒлӢЁ л„Өл№„ */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; н—ҲлёҢлЎң</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-2-1</span>
            </nav>

            {/* н—ӨлҚ” */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. м»ҙнҸ¬л„ҢнҠё &gt; Chapter 2. м ҖмһҘкіј кІҖмғү</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-2-1. Vector Stores вҖ” Chroma В· FAISS В· pgvector</h1>
                  <p className="text-sm text-slate-500 mt-0.5">3к°Җм§Җ wrapper, к°ҷмқҖ мқён„°нҺҳмқҙмҠӨ вҖ” нҷҳкІҪм—җ л”°лқј storeл§Ң к°Ҳм•„лҒјмҡ°лҠ” нҢЁн„ҙ</p>
                </div>
              </div>
            </header>

            {/* мўҢ/мҡ° 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* л§Ҳм§Җл§ү лӢЁкі„ alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                рҹ’Ў м •лҰ¬: devлҠ” <strong>Chroma</strong>, testлҠ” <strong>FAISS</strong>, prodлҠ” <strong>pgvector</strong>. м¶”мғҒмқҙ к°ҷмңјлӢҲ л№„мҰҲлӢҲмҠӨ мҪ”л“ңлҠ” к·ёлҢҖлЎң вҖ” fastapiмқҳ Depends В· Settings нҢЁн„ҙкіј лҸҷмқј. лӢӨмқҢ(II-2-2)м—җм„ңлҠ” мқҙ storeл“Өмқ„ <strong>Retriever</strong>лЎң м¶”мғҒнҷ”н•ҙ Chainм—җ кІ°н•©н•ҳлҠ” л°©лІ•мқ„ лӢӨлЈ¬лӢӨ.
              </div>
            )}

            {/* м„ӨлӘ… нҢЁл„җ */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} В· {step.title}
                </h3>
                <span className="text-xs text-emerald-200">нӮӨліҙл“ң &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* м»ЁнҠёлЎӨ 4 лІ„нҠј */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="мІҳмқҢмңјлЎң"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                мІҳмқҢ
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="мқҙм „ лӢЁкі„"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; мқҙм „
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? 'мһҗлҸҷ мһ¬мғқ м •м§Җ' : 'мһҗлҸҷ мһ¬мғқ мӢңмһ‘'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? 'вҸё м •м§Җ' : (stepIdx >= STEPS.length - 1 ? 'вҶ» лӢӨмӢңліҙкё°' : 'в–¶ мһҗлҸҷмһ¬мғқ')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="лӢӨмқҢ лӢЁкі„"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                лӢӨмқҢ &rarr;
              </button>
            </div>

            {/* нӮӨмӣҢл“ң нғңк·ё */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Chroma', 'FAISS', 'pgvector', 'VectorStore', 'from_documents', 'similarity_search', 'as_retriever'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* мқҙм „/лӢӨмқҢ мһҗлЈҢ л„Өл№„ */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-1-3.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; II-1-3 Embeddings</a>
              <a href="./II-2-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">II-2-2 Retrievers &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
