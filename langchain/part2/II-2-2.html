<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — II-2-2. Retrievers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-2-2. Retrievers
    학습 목표: Retriever 인터페이스와 다양한 검색 전략을 설명할 수 있다.
    템플릿: 순차형 (Type B) — 사서 비유.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "[사서의 역할] 도서관에서 \"AI Agent에 대해 알려줘\"라고 하면 사서가 관련 책을 찾아줍니다. Retriever는 이 사서 역할입니다. Vector Store의 검색 기능을 표준 인터페이스로 감싸줍니다.",
        phase: 'intro',
        code: [
          { line: '# Retriever = 검색 전용 인터페이스', highlight: false },
          { line: '# Vector Store를 직접 사용하는 대신,', highlight: false },
          { line: '# Retriever로 감싸서 체인에 연결한다', highlight: false },
          { line: '', highlight: false },
          { line: '# 왜? LCEL 체인과 호환되기 때문!', highlight: true },
          { line: '# chain = retriever | prompt | model | parser', highlight: true },
        ],
      },
      {
        desc: "[Retriever 생성] Vector Store의 as_retriever() 메서드 하나로 Retriever를 만듭니다. search_kwargs로 반환할 문서 수(k)를 설정합니다.",
        phase: 'create',
        code: [
          { line: '# Vector Store → Retriever 변환', highlight: false },
          { line: 'retriever = vectorstore.as_retriever(', highlight: true },
          { line: '    search_kwargs={"k": 3}  # 상위 3개', highlight: true },
          { line: ')', highlight: true },
          { line: '', highlight: false },
          { line: '# invoke로 검색', highlight: false },
          { line: 'docs = retriever.invoke("AI Agent란?")', highlight: true },
          { line: '# → [Document, Document, Document]', highlight: false },
        ],
      },
      {
        desc: "[검색 실행] retriever.invoke()에 질문을 넣으면 관련 문서 리스트가 반환됩니다. Vector Store의 similarity_search와 같은 결과이지만, LCEL 체인에 바로 연결할 수 있습니다.",
        phase: 'search',
        query: 'AI Agent란?',
        results: [
          { text: 'AI Agent는 자율적으로 판단하고 행동한다', score: 0.94, rank: 1 },
          { text: 'RAG는 검색 + 생성을 결합한 기법이다', score: 0.78, rank: 2 },
          { text: 'LangChain은 LLM 앱 개발 프레임워크다', score: 0.65, rank: 3 },
        ],
        code: [
          { line: 'docs = retriever.invoke("AI Agent란?")', highlight: true },
          { line: '', highlight: false },
          { line: 'for doc in docs:', highlight: false },
          { line: '    print(doc.page_content)', highlight: false },
          { line: '    print(doc.metadata)', highlight: false },
          { line: '', highlight: false },
          { line: '# 결과: 유사도 순으로 Document 리스트 반환', highlight: false },
        ],
      },
      {
        desc: "[MMR 검색] similarity만으로는 비슷한 문서만 반복될 수 있습니다. MMR(Maximum Marginal Relevance)은 유사하면서도 다양한 문서를 선택합니다. 관련성 + 다양성의 균형!",
        phase: 'mmr',
        code: [
          { line: '# MMR: 관련성 + 다양성의 균형', highlight: false },
          { line: '', highlight: false },
          { line: 'retriever = vectorstore.as_retriever(', highlight: true },
          { line: '    search_type="mmr",  # ← MMR 검색!', highlight: true },
          { line: '    search_kwargs={', highlight: true },
          { line: '        "k": 3,', highlight: true },
          { line: '        "fetch_k": 10,  # 후보 10개에서 3개 선택', highlight: true },
          { line: '    }', highlight: true },
          { line: ')', highlight: false },
        ],
        comparison: [
          { type: 'Similarity', icon: '🎯', desc: '가장 유사한 순서대로', pros: '정확도 높음', cons: '내용 중복 가능' },
          { type: 'MMR', icon: '🎨', desc: '유사하면서도 다양하게', pros: '다양한 관점', cons: '약간의 정확도 트레이드오프' },
        ],
      },
      {
        desc: "[체인 연결] Retriever의 진짜 가치는 LCEL 체인에 연결할 때 빛납니다. retriever → prompt → model → parser — 이것이 RAG의 기본 구조입니다. Part III에서 자세히 다룹니다.",
        phase: 'chain',
        code: [
          { line: '# Retriever → LCEL 체인 연결', highlight: false },
          { line: '', highlight: false },
          { line: 'from langchain_core.runnables import RunnablePassthrough', highlight: false },
          { line: '', highlight: false },
          { line: 'rag_chain = (', highlight: true },
          { line: '    {"context": retriever, "question": RunnablePassthrough()}', highlight: true },
          { line: '    | prompt', highlight: true },
          { line: '    | model', highlight: true },
          { line: '    | parser', highlight: true },
          { line: ')', highlight: true },
          { line: '', highlight: false },
          { line: 'answer = rag_chain.invoke("AI Agent란?")', highlight: false },
          { line: '# → 검색된 문서 기반으로 답변 생성!', highlight: false },
        ],
        pipeline: [
          { step: '질문', icon: '❓' },
          { step: 'Retriever', icon: '📚' },
          { step: 'Prompt', icon: '📝' },
          { step: 'LLM', icon: '🤖' },
          { step: '답변', icon: '✅' },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">

            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-cyan-700 hover:text-cyan-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 컴포넌트 &gt; Chapter 2. 저장과 검색</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-2-2. Retrievers</h1>
                </div>
              </div>
              <p className="text-slate-600">
                <b>사서</b>와 같습니다. "AI Agent에 대해 알려줘"라고 하면 관련 책을 여러 권 찾아줍니다.
              </p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-cyan-700 border-cyan-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">Retrievers 동작</h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                {/* 검색 쿼리 + 결과 */}
                {stepData.query && (
                  <div className="space-y-3">
                    <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
                      <div className="text-xs font-bold text-amber-600 mb-1">질문</div>
                      <div className="text-sm font-medium text-amber-800">"{stepData.query}"</div>
                    </div>

                    {stepData.results && (
                      <>
                        <div className="text-center text-cyan-500">↓ retriever.invoke()</div>
                        <div className="space-y-2">
                          {stepData.results.map((r, i) => (
                            <div key={i} className={`flex items-center gap-2 p-3 rounded-lg border ${
                              i === 0 ? 'bg-cyan-50 border-cyan-300' : 'bg-white border-slate-200'
                            }`}>
                              <span className="bg-cyan-100 text-cyan-700 px-2 py-0.5 rounded font-bold text-xs">#{r.rank}</span>
                              <span className="text-xs text-slate-600 flex-1">{r.text}</span>
                              <span className={`font-bold text-xs ${r.score >= 0.8 ? 'text-emerald-600' : 'text-slate-500'}`}>{r.score}</span>
                            </div>
                          ))}
                        </div>
                      </>
                    )}
                  </div>
                )}

                {/* MMR 비교 */}
                {stepData.comparison && (
                  <div className="space-y-3">
                    <div className="text-xs font-bold text-cyan-600 uppercase tracking-wider">검색 전략 비교</div>
                    {stepData.comparison.map((c, i) => (
                      <div key={i} className="bg-slate-50 border border-slate-200 rounded-lg p-4">
                        <div className="flex items-center gap-2 mb-2">
                          <span className="text-xl">{c.icon}</span>
                          <span className="font-bold text-sm">{c.type}</span>
                        </div>
                        <div className="text-xs text-slate-600 mb-2">{c.desc}</div>
                        <div className="flex gap-3 text-xs">
                          <span className="text-emerald-600">+ {c.pros}</span>
                          <span className="text-red-500">- {c.cons}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {/* RAG 파이프라인 */}
                {stepData.pipeline && (
                  <div>
                    <div className="text-xs font-bold text-cyan-600 uppercase tracking-wider mb-3">RAG 파이프라인</div>
                    <div className="flex items-center justify-center gap-1 flex-wrap">
                      {stepData.pipeline.map((p, i) => (
                        <React.Fragment key={i}>
                          <div className="flex flex-col items-center bg-cyan-50 border border-cyan-200 rounded-lg px-3 py-2">
                            <span className="text-xl">{p.icon}</span>
                            <span className="text-xs font-bold text-cyan-700 mt-1">{p.step}</span>
                          </div>
                          {i < stepData.pipeline.length - 1 && <span className="text-cyan-400 text-lg">→</span>}
                        </React.Fragment>
                      ))}
                    </div>
                  </div>
                )}

                {stepData.phase === 'intro' || stepData.phase === 'create' ? (
                  <div className="flex items-center justify-center h-32">
                    <div className="text-center">
                      <div className="text-4xl mb-2">📚</div>
                      <div className="text-sm text-slate-500">
                        {stepData.phase === 'intro' ? 'Retriever = 검색 전용 사서' : 'as_retriever()로 변환 완료'}
                      </div>
                    </div>
                  </div>
                ) : null}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (
                    <div key={i} className={l.highlight ? 'bg-cyan-900/40 -mx-4 px-4' : ''}>
                      {l.line || '\u00A0'}
                    </div>
                  ))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['BaseRetriever', 'VectorStoreRetriever', 'MMR', 'similarity threshold'].map(kw => (
                <span key={kw} className="bg-cyan-50 text-cyan-700 px-3 py-1 rounded-full text-sm font-medium border border-cyan-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-cyan-600 hover:bg-cyan-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./II-2-1.html" className="text-cyan-600 hover:text-cyan-800 font-medium">&larr; II-2-1. Vector Stores</a>
              <a href="../part3/III-1-1.html" className="text-cyan-600 hover:text-cyan-800 font-medium">III-1-1. SequentialChain &rarr;</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
