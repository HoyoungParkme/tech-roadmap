    function SourceBoard({ activeSrc }) {
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">

              {activeSrc.length} / {ALL_SOURCES.length} active
            </span>
          </div>
          <div className="grid grid-cols-2 gap-2">
            {ALL_SOURCES.map((src) => {
              const active = activeSrc.includes(src.key);
              const c = COLOR[src.color];
              const cls = active
                ? `${c.bg} ${c.border} ${c.text}`
                : 'bg-slate-50 border-slate-200 text-slate-300';
              return (
                <div
                  key={src.key}
                  className={`flex items-center gap-2 p-2 rounded-lg border-2 transition-all duration-500 ${cls} ${active ? '' : 'opacity-40'}`}

                  <span className="text-xl">{src.icon}</span>
                  <div className="min-w-0 flex-1">

                    <span className="text-[9px] bg-emerald-600 text-white px-1 rounded font-bold animate-pulse">●</span>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────

      const c = COLOR[loader.color];
      return (
        <div className="flex flex-col items-center">
          {/* 위쪽 화살표 */}
          <div className="text-emerald-400 text-lg leading-none -mt-1">↓</div>
          <div className={`w-full rounded-lg border-2 ${c.border} ${c.bg} p-2.5 shadow-sm`}>
            <div className="flex items-center gap-2">
              <span className="text-2xl">{loader.icon}</span>
              <div className="flex-1 min-w-0">
                <div className={`font-bold text-xs ${c.text}`}>{loader.name}</div>
                <div className="text-[10px] text-slate-600 truncate">{loader.accent}</div>
              </div>
              <span className="text-[9px] bg-white text-slate-500 px-1.5 py-0.5 rounded border border-slate-200 font-mono">
                load()
              </span>
            </div>
            {note && (
              <div className="text-[9px] text-slate-500 mt-1.5 pt-1.5 border-t border-dashed border-slate-200 font-mono">
                {note}
              </div>
            )}
          </div>
          {/* 아래쪽 화살표 */}
          <div className="text-emerald-400 text-lg leading-none">↓</div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: Document 결과 리스트
    //   page_content 미리보기 + metadata key/value
    // ─────────────────────────────────────────────────────
    function DocumentList({ docs }) {
      return (
        <div className="bg-emerald-50 rounded-lg border-2 border-emerald-300 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📦</span>
              <span className="text-[11px] font-bold text-emerald-800">
                Document[] (page_content + metadata)
              </span>
            </div>
            <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
              len = {docs.length}
            </span>
          </div>
          <div className="space-y-1.5 max-h-72 overflow-y-auto pr-1">
            {docs.map((d) => (
              <div
                key={d.idx}
                className="bg-white rounded border border-emerald-200 p-2 shadow-sm"
              >
                <div className="flex items-center gap-1.5 mb-1">
                  <span className="text-[9px] bg-emerald-700 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                    docs[{d.idx}]
                  </span>
                  <span className="text-[9px] text-emerald-600 font-mono">Document</span>
                </div>
                <div className="space-y-1">
                  <div className="bg-slate-50 rounded px-1.5 py-1 border border-slate-100">
                    <span className="text-[9px] font-mono font-bold text-emerald-700">page_content:</span>
                    <span className="text-[10px] text-slate-700 ml-1 font-mono whitespace-pre-line leading-tight">
                      "{d.page_content.length > 60 ? d.page_content.slice(0, 60) + '…' : d.page_content}"
                    </span>
                  </div>
                  <div className="bg-blue-50/60 rounded px-1.5 py-1 border border-blue-100">
                    <span className="text-[9px] font-mono font-bold text-blue-700">metadata:</span>
                    <div className="ml-1 mt-0.5 flex flex-wrap gap-1">
                      {Object.entries(d.metadata).map(([k, v]) => (
                        <span
                          key={k}
                          className="text-[9px] font-mono bg-white text-blue-800 px-1 py-0.5 rounded border border-blue-200"
                        >
                          {k}: <span className="text-blue-900 font-bold">{String(v)}</span>
                        </span>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   소스 → Loader → Document 의 흐름을 한 화면에 시각화
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📮 우체부 — 다양한 원본 → Document 통일</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            <SourceBoard activeSrc={step.activeSrc} />
            <LoaderBox loader={step.loader} note={step.note} />
            <DocumentList docs={step.docs} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>active source
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-300"></span>idle
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-blue-400"></span>metadata
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-emerald-700"></span>Document[i]
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 기반
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 4 버튼 컨트롤 + 키보드 + 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 컴포넌트 &gt; Chapter 1. 문서 처리</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-1-1. Document Loaders — PDF · Web · CSV · Markdown · Directory</h1>
                  <p className="text-sm text-slate-500 mt-0.5">우체부의 5가지 가방 — 어떤 형식이든 결국 동일한 Document(page_content + metadata)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: PDF/Web/CSV/MD 어떤 원본이든 <strong>Document(page_content+metadata)</strong>로 통일된다. 이 표준화 덕분에 다음 단계 <strong>TextSplitter → Embedding → VectorStore</strong>가 형식과 무관하게 흐른다. 다음(II-1-2)에서는 이 Document 들을 의미 단위로 자르는 Text Splitter를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Document', 'page_content', 'metadata', 'PyPDFLoader', 'WebBaseLoader', 'CSVLoader', 'UnstructuredMarkdownLoader', 'DirectoryLoader'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../part1/I-2-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; I-2-2 OutputParser</a>
              <a href="./II-1-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">II-1-2 Text Splitters &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
