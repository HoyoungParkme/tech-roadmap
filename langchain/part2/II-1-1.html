<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain н•ҷмҠө вҖ” II-1-1. Document Loaders</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>рҹ“ҡ</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-1-1. Document Loaders
    н•ҷмҠө лӘ©н‘ң: лӢӨм–‘н•ң нҳ•мӢқмқҳ л¬ём„ңлҘј LangChain Document к°қмІҙлЎң лЎңл“ңн•  мҲҳ мһҲлӢӨ.
    н…ңн”ҢлҰҝ: мҲңм°Ёнҳ• (Type B) вҖ” мҡ°мІҙл¶Җ л№„мң .
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SOURCES = [
      { type: 'PDF', icon: 'рҹ“„', color: 'bg-red-50 border-red-200 text-red-700', loader: 'PyPDFLoader' },
      { type: 'Web', icon: 'рҹҢҗ', color: 'bg-blue-50 border-blue-200 text-blue-700', loader: 'WebBaseLoader' },
      { type: 'CSV', icon: 'рҹ“Ҡ', color: 'bg-green-50 border-green-200 text-green-700', loader: 'CSVLoader' },
      { type: 'JSON', icon: 'рҹ“Ӣ', color: 'bg-amber-50 border-amber-200 text-amber-700', loader: 'JSONLoader' },
    ];

    const STEPS = [
      {
        desc: "[лӢӨм–‘н•ң мҶҢмҠӨ] лҚ°мқҙн„°лҠ” PDF, мӣ№нҺҳмқҙм§Җ, CSV, JSON л“ұ лӢӨм–‘н•ң нҳ•мӢқмңјлЎң мЎҙмһ¬н•©лӢҲлӢӨ. мҡ°мІҙл¶Җк°Җ лҙүнҲ¬, мҶҢнҸ¬, л“ұкё° л“ұ лӢӨм–‘н•ң нҳ•нғңмқҳ нҺём§ҖлҘј мҲҳкұ°н•ҳл“Ҝ, Document Loaderк°Җ мқҙл“Өмқ„ мҲҳм§‘н•©лӢҲлӢӨ.",
        activeSources: [0, 1, 2, 3],
        showLoader: false,
        showDocument: false,
        code: [
          { line: '# лҚ°мқҙн„°лҠ” м—¬лҹ¬ нҳ•мӢқмңјлЎң мЎҙмһ¬н•ңлӢӨ', highlight: false },
          { line: '# PDF, мӣ№нҺҳмқҙм§Җ, CSV, JSON, DB...', highlight: false },
          { line: '', highlight: false },
          { line: '# к°Ғ нҳ•мӢқл§ҲлӢӨ м „мҡ© Loaderк°Җ мһҲлӢӨ:', highlight: true },
          { line: '# PyPDFLoader, WebBaseLoader,', highlight: true },
          { line: '# CSVLoader, JSONLoader, ...', highlight: true },
        ],
      },
      {
        desc: "[PyPDFLoader] PDF нҢҢмқјмқ„ нҺҳмқҙм§Җлі„лЎң л¶„лҰ¬н•ҙм„ң лЎңл“ңн•©лӢҲлӢӨ. к°Ғ нҺҳмқҙм§Җк°Җ н•ҳлӮҳмқҳ Documentк°Җ лҗҳкі , нҺҳмқҙм§Җ лІҲнҳёк°Җ metadataм—җ мһҗлҸҷ кё°лЎқлҗ©лӢҲлӢӨ.",
        activeSources: [0],
        showLoader: true,
        showDocument: false,
        loaderName: 'PyPDFLoader',
        code: [
          { line: 'from langchain_community.document_loaders import PyPDFLoader', highlight: false },
          { line: '', highlight: false },
          { line: 'loader = PyPDFLoader("report.pdf")', highlight: true },
          { line: 'docs = loader.load()', highlight: true },
          { line: '', highlight: false },
          { line: '# docs[0].page_content вҶ’ "1мһҘ м„ңлЎ ..."', highlight: false },
          { line: '# docs[0].metadata вҶ’ {"source": "report.pdf", "page": 0}', highlight: false },
        ],
      },
      {
        desc: "[WebBaseLoader] мӣ№нҺҳмқҙм§Җмқҳ HTMLмқ„ нҢҢмӢұн•ҙм„ң н…ҚмҠӨнҠёлҘј м¶”м¶ңн•©лӢҲлӢӨ. BeautifulSoupлҘј лӮҙл¶Җм ҒмңјлЎң мӮ¬мҡ©н•ҳл©°, URLмқҙ metadataм—җ кё°лЎқлҗ©лӢҲлӢӨ.",
        activeSources: [1],
        showLoader: true,
        showDocument: false,
        loaderName: 'WebBaseLoader',
        code: [
          { line: 'from langchain_community.document_loaders import WebBaseLoader', highlight: false },
          { line: '', highlight: false },
          { line: 'loader = WebBaseLoader("https://example.com/article")', highlight: true },
          { line: 'docs = loader.load()', highlight: true },
          { line: '', highlight: false },
          { line: '# docs[0].page_content вҶ’ "кё°мӮ¬ ліёл¬ё н…ҚмҠӨнҠё..."', highlight: false },
          { line: '# docs[0].metadata вҶ’ {"source": "https://...", "title": "..."}', highlight: false },
        ],
      },
      {
        desc: "[Document нҶөмқј] м–ҙл–Ө LoaderлҘј м“°л“  кІ°кіјлҠ” лҸҷмқјн•ң Document к°қмІҙмһ…лӢҲлӢӨ. page_content(н…ҚмҠӨнҠё)мҷҖ metadata(м¶ңмІҳ м •ліҙ) вҖ” мқҙ н‘ңмӨҖ м–‘мӢқ лҚ•л¶„м—җ мқҙнӣ„ мІҳлҰ¬к°Җ нҶөмқјлҗ©лӢҲлӢӨ.",
        activeSources: [0, 1, 2, 3],
        showLoader: true,
        showDocument: true,
        loaderName: 'лӘЁл“  Loader',
        code: [
          { line: '# м–ҙл–Ө Loaderл“  кІ°кіјлҠ” к°ҷмқҖ кө¬мЎ°!', highlight: false },
          { line: '', highlight: false },
          { line: 'class Document:', highlight: true },
          { line: '    page_content: str   # н…ҚмҠӨнҠё лӮҙмҡ©', highlight: true },
          { line: '    metadata: dict      # м¶ңмІҳ м •ліҙ', highlight: true },
          { line: '', highlight: false },
          { line: '# PDFл“  мӣ№мқҙл“  вҶ’ DocumentлЎң нҶөмқј', highlight: false },
          { line: '# вҶ’ мқҙнӣ„ Text Splitter, Embeddingм—җ л°”лЎң м—°кІ°', highlight: false },
        ],
      },
      {
        desc: "[metadataмқҳ к°Җм№ҳ] metadataлҠ” лӢЁмҲңн•ң л¶Җк°Җ м •ліҙк°Җ м•„лӢҷлӢҲлӢӨ. лӮҳмӨ‘м—җ RAGм—җм„ң \"м¶ңмІҳк°Җ м–ҙл””м•ј?\"лқјкі  л¬јмқ„ л•Ң, metadataк°Җ лӢөмқ„ мӨҚлӢҲлӢӨ. source, page, title л“ұмқҙ м¶”м Ғм„ұмқ„ ліҙмһҘн•©лӢҲлӢӨ.",
        activeSources: [],
        showLoader: false,
        showDocument: true,
        loaderName: null,
        code: [
          { line: '# metadata нҷңмҡ© мҳҲмӢң', highlight: false },
          { line: '', highlight: false },
          { line: 'for doc in docs:', highlight: false },
          { line: '    print(f"м¶ңмІҳ: {doc.metadata[\'source\']}")', highlight: true },
          { line: '    print(f"нҺҳмқҙм§Җ: {doc.metadata.get(\'page\', \'N/A\')}")', highlight: true },
          { line: '    print(f"лӮҙмҡ© лҜёлҰ¬ліҙкё°: {doc.page_content[:50]}...")', highlight: false },
          { line: '', highlight: false },
          { line: '# вҶ’ RAG лӢөліҖм—җ "м¶ңмІҳ: report.pdf p.3" н‘ңмӢң к°ҖлҠҘ', highlight: false },
        ],
        metadataExamples: [
          { source: 'report.pdf', page: 0, preview: '1мһҘ м„ңлЎ : мқҙ ліҙкі м„ңлҠ”...' },
          { source: 'https://example.com', page: null, preview: 'мөңмӢ  AI нҠёл Ңл“ңлҠ”...' },
          { source: 'data.csv', page: null, preview: 'мқҙлҰ„,лӮҳмқҙ,м§Ғм—…,...' },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">

            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-cyan-700 hover:text-cyan-900 font-medium">
                <span aria-hidden="true">&larr;</span> н—ҲлёҢлЎң лҸҢм•„к°Җкё°
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. м»ҙнҸ¬л„ҢнҠё &gt; Chapter 1. л¬ём„ң мІҳлҰ¬</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-1-1. Document Loaders</h1>
                </div>
              </div>
              <p className="text-slate-600">
                <b>мҡ°мІҙл¶Җ</b>к°Җ лӢӨм–‘н•ң нҳ•нғңмқҳ нҺём§ҖлҘј мҲҳкұ°н•ҙм„ң н‘ңмӨҖ м–‘мӢқмңјлЎң м •лҰ¬н•ҳл“Ҝ, Document Loaderк°Җ PDF, HTML, CSVлҘј <b>Document</b> к°қмІҙлЎң нҶөмқјн•©лӢҲлӢӨ.
              </p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-cyan-700 border-cyan-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">Document Loaders лҸҷмһ‘</h3>
                <span className="text-xs text-cyan-200">нӮӨліҙл“ң &larr;/&rarr;лЎң лӢЁкі„ мқҙлҸҷ</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

              {/* мҷјмӘҪ: мӢңк°Ғнҷ” */}
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                {/* мҶҢмҠӨ м№ҙл“ң */}
                {stepData.activeSources.length > 0 && (
                  <div>
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">лҚ°мқҙн„° мҶҢмҠӨ</div>
                    <div className="grid grid-cols-2 gap-2">
                      {SOURCES.filter((_, i) => stepData.activeSources.includes(i)).map(src => (
                        <div key={src.type} className={`flex items-center gap-2 p-3 rounded-lg border ${src.color}`}>
                          <span className="text-2xl">{src.icon}</span>
                          <div>
                            <div className="font-bold text-sm">{src.type}</div>
                            <div className="text-xs opacity-75">{src.loader}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* нҷ”мӮҙн‘ң */}
                {stepData.showLoader && <div className="text-center text-cyan-500 text-xl">вҶ“ {stepData.loaderName}</div>}

                {/* Document кІ°кіј */}
                {stepData.showDocument && (
                  <div className="bg-cyan-50 border border-cyan-200 rounded-lg p-4">
                    <div className="text-xs font-bold text-cyan-700 mb-2">Document к°қмІҙ</div>
                    <div className="space-y-2">
                      <div className="bg-white rounded p-2 border border-cyan-100">
                        <span className="text-xs font-mono text-cyan-600">page_content:</span>
                        <span className="text-xs text-slate-600 ml-1">"н…ҚмҠӨнҠё лӮҙмҡ©мқҙ м—¬кё°м—җ..."</span>
                      </div>
                      <div className="bg-white rounded p-2 border border-cyan-100">
                        <span className="text-xs font-mono text-cyan-600">metadata:</span>
                        <span className="text-xs text-slate-600 ml-1">{`{"source": "...", "page": 0}`}</span>
                      </div>
                    </div>
                  </div>
                )}

                {/* metadata мҳҲмӢң (л§Ҳм§Җл§ү лӢЁкі„) */}
                {stepData.metadataExamples && (
                  <div className="space-y-2">
                    <div className="text-xs font-bold text-cyan-600 uppercase tracking-wider">metadata м¶”м Ғ мҳҲмӢң</div>
                    {stepData.metadataExamples.map((ex, i) => (
                      <div key={i} className="bg-slate-50 rounded-lg border border-slate-200 p-3 text-xs">
                        <div className="font-mono text-cyan-700">source: "{ex.source}" {ex.page !== null && `| page: ${ex.page}`}</div>
                        <div className="text-slate-500 mt-1">вҶ’ {ex.preview}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* мҳӨлҘёмӘҪ: мҪ”л“ң */}
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">мҪ”л“ң</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (
                    <div key={i} className={l.highlight ? 'bg-cyan-900/40 -mx-4 px-4' : ''}>
                      {l.line || '\u00A0'}
                    </div>
                  ))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Document', 'page_content', 'metadata', 'PyPDFLoader', 'WebBaseLoader'].map(kw => (
                <span key={kw} className="bg-cyan-50 text-cyan-700 px-3 py-1 rounded-full text-sm font-medium border border-cyan-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="мқҙм „ лӢЁкі„" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? 'м •м§Җ' : 'мһҗлҸҷ мӢӨн–ү'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-cyan-600 hover:bg-cyan-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> м •м§Җ</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> мһҗлҸҷ мӢӨн–ү</>
                  )}
                </button>
                <button aria-label="лӢӨмқҢ лӢЁкі„" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="../part1/I-2-2.html" className="text-cyan-600 hover:text-cyan-800 font-medium">&larr; I-2-2. OutputParser</a>
              <a href="./II-1-2.html" className="text-cyan-600 hover:text-cyan-800 font-medium">II-1-2. Text Splitters &rarr;</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
