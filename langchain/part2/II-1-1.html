<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — II-1-1. Document Loaders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-1-1. Document Loaders
    학습 목표: 다양한 형식의 문서를 LangChain Document 객체로 로드할 수 있다.
    템플릿: 순차형 (Type B) — 우체부 비유.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SOURCES = [
      { type: 'PDF', icon: '📄', color: 'bg-red-50 border-red-200 text-red-700', loader: 'PyPDFLoader' },
      { type: 'Web', icon: '🌐', color: 'bg-blue-50 border-blue-200 text-blue-700', loader: 'WebBaseLoader' },
      { type: 'CSV', icon: '📊', color: 'bg-green-50 border-green-200 text-green-700', loader: 'CSVLoader' },
      { type: 'JSON', icon: '📋', color: 'bg-amber-50 border-amber-200 text-amber-700', loader: 'JSONLoader' },
    ];

    const STEPS = [
      {
        desc: "[다양한 소스] 데이터는 PDF, 웹페이지, CSV, JSON 등 다양한 형식으로 존재합니다. 우체부가 봉투, 소포, 등기 등 다양한 형태의 편지를 수거하듯, Document Loader가 이들을 수집합니다.",
        activeSources: [0, 1, 2, 3],
        showLoader: false,
        showDocument: false,
        code: [
          { line: '# 데이터는 여러 형식으로 존재한다', highlight: false },
          { line: '# PDF, 웹페이지, CSV, JSON, DB...', highlight: false },
          { line: '', highlight: false },
          { line: '# 각 형식마다 전용 Loader가 있다:', highlight: true },
          { line: '# PyPDFLoader, WebBaseLoader,', highlight: true },
          { line: '# CSVLoader, JSONLoader, ...', highlight: true },
        ],
      },
      {
        desc: "[PyPDFLoader] PDF 파일을 페이지별로 분리해서 로드합니다. 각 페이지가 하나의 Document가 되고, 페이지 번호가 metadata에 자동 기록됩니다.",
        activeSources: [0],
        showLoader: true,
        showDocument: false,
        loaderName: 'PyPDFLoader',
        code: [
          { line: 'from langchain_community.document_loaders import PyPDFLoader', highlight: false },
          { line: '', highlight: false },
          { line: 'loader = PyPDFLoader("report.pdf")', highlight: true },
          { line: 'docs = loader.load()', highlight: true },
          { line: '', highlight: false },
          { line: '# docs[0].page_content → "1장 서론..."', highlight: false },
          { line: '# docs[0].metadata → {"source": "report.pdf", "page": 0}', highlight: false },
        ],
      },
      {
        desc: "[WebBaseLoader] 웹페이지의 HTML을 파싱해서 텍스트를 추출합니다. BeautifulSoup를 내부적으로 사용하며, URL이 metadata에 기록됩니다.",
        activeSources: [1],
        showLoader: true,
        showDocument: false,
        loaderName: 'WebBaseLoader',
        code: [
          { line: 'from langchain_community.document_loaders import WebBaseLoader', highlight: false },
          { line: '', highlight: false },
          { line: 'loader = WebBaseLoader("https://example.com/article")', highlight: true },
          { line: 'docs = loader.load()', highlight: true },
          { line: '', highlight: false },
          { line: '# docs[0].page_content → "기사 본문 텍스트..."', highlight: false },
          { line: '# docs[0].metadata → {"source": "https://...", "title": "..."}', highlight: false },
        ],
      },
      {
        desc: "[Document 통일] 어떤 Loader를 쓰든 결과는 동일한 Document 객체입니다. page_content(텍스트)와 metadata(출처 정보) — 이 표준 양식 덕분에 이후 처리가 통일됩니다.",
        activeSources: [0, 1, 2, 3],
        showLoader: true,
        showDocument: true,
        loaderName: '모든 Loader',
        code: [
          { line: '# 어떤 Loader든 결과는 같은 구조!', highlight: false },
          { line: '', highlight: false },
          { line: 'class Document:', highlight: true },
          { line: '    page_content: str   # 텍스트 내용', highlight: true },
          { line: '    metadata: dict      # 출처 정보', highlight: true },
          { line: '', highlight: false },
          { line: '# PDF든 웹이든 → Document로 통일', highlight: false },
          { line: '# → 이후 Text Splitter, Embedding에 바로 연결', highlight: false },
        ],
      },
      {
        desc: "[metadata의 가치] metadata는 단순한 부가 정보가 아닙니다. 나중에 RAG에서 \"출처가 어디야?\"라고 물을 때, metadata가 답을 줍니다. source, page, title 등이 추적성을 보장합니다.",
        activeSources: [],
        showLoader: false,
        showDocument: true,
        loaderName: null,
        code: [
          { line: '# metadata 활용 예시', highlight: false },
          { line: '', highlight: false },
          { line: 'for doc in docs:', highlight: false },
          { line: '    print(f"출처: {doc.metadata[\'source\']}")', highlight: true },
          { line: '    print(f"페이지: {doc.metadata.get(\'page\', \'N/A\')}")', highlight: true },
          { line: '    print(f"내용 미리보기: {doc.page_content[:50]}...")', highlight: false },
          { line: '', highlight: false },
          { line: '# → RAG 답변에 "출처: report.pdf p.3" 표시 가능', highlight: false },
        ],
        metadataExamples: [
          { source: 'report.pdf', page: 0, preview: '1장 서론: 이 보고서는...' },
          { source: 'https://example.com', page: null, preview: '최신 AI 트렌드는...' },
          { source: 'data.csv', page: null, preview: '이름,나이,직업,...' },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">

            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-cyan-700 hover:text-cyan-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 컴포넌트 &gt; Chapter 1. 문서 처리</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-1-1. Document Loaders</h1>
                </div>
              </div>
              <p className="text-slate-600">
                <b>우체부</b>가 다양한 형태의 편지를 수거해서 표준 양식으로 정리하듯, Document Loader가 PDF, HTML, CSV를 <b>Document</b> 객체로 통일합니다.
              </p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-cyan-700 border-cyan-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">Document Loaders 동작</h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">

              {/* 왼쪽: 시각화 */}
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                {/* 소스 카드 */}
                {stepData.activeSources.length > 0 && (
                  <div>
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">데이터 소스</div>
                    <div className="grid grid-cols-2 gap-2">
                      {SOURCES.filter((_, i) => stepData.activeSources.includes(i)).map(src => (
                        <div key={src.type} className={`flex items-center gap-2 p-3 rounded-lg border ${src.color}`}>
                          <span className="text-2xl">{src.icon}</span>
                          <div>
                            <div className="font-bold text-sm">{src.type}</div>
                            <div className="text-xs opacity-75">{src.loader}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* 화살표 */}
                {stepData.showLoader && <div className="text-center text-cyan-500 text-xl">↓ {stepData.loaderName}</div>}

                {/* Document 결과 */}
                {stepData.showDocument && (
                  <div className="bg-cyan-50 border border-cyan-200 rounded-lg p-4">
                    <div className="text-xs font-bold text-cyan-700 mb-2">Document 객체</div>
                    <div className="space-y-2">
                      <div className="bg-white rounded p-2 border border-cyan-100">
                        <span className="text-xs font-mono text-cyan-600">page_content:</span>
                        <span className="text-xs text-slate-600 ml-1">"텍스트 내용이 여기에..."</span>
                      </div>
                      <div className="bg-white rounded p-2 border border-cyan-100">
                        <span className="text-xs font-mono text-cyan-600">metadata:</span>
                        <span className="text-xs text-slate-600 ml-1">{`{"source": "...", "page": 0}`}</span>
                      </div>
                    </div>
                  </div>
                )}

                {/* metadata 예시 (마지막 단계) */}
                {stepData.metadataExamples && (
                  <div className="space-y-2">
                    <div className="text-xs font-bold text-cyan-600 uppercase tracking-wider">metadata 추적 예시</div>
                    {stepData.metadataExamples.map((ex, i) => (
                      <div key={i} className="bg-slate-50 rounded-lg border border-slate-200 p-3 text-xs">
                        <div className="font-mono text-cyan-700">source: "{ex.source}" {ex.page !== null && `| page: ${ex.page}`}</div>
                        <div className="text-slate-500 mt-1">→ {ex.preview}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* 오른쪽: 코드 */}
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (
                    <div key={i} className={l.highlight ? 'bg-cyan-900/40 -mx-4 px-4' : ''}>
                      {l.line || '\u00A0'}
                    </div>
                  ))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Document', 'page_content', 'metadata', 'PyPDFLoader', 'WebBaseLoader'].map(kw => (
                <span key={kw} className="bg-cyan-50 text-cyan-700 px-3 py-1 rounded-full text-sm font-medium border border-cyan-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-cyan-600 hover:bg-cyan-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="../part1/I-2-2.html" className="text-cyan-600 hover:text-cyan-800 font-medium">&larr; I-2-2. OutputParser</a>
              <a href="./II-1-2.html" className="text-cyan-600 hover:text-cyan-800 font-medium">II-1-2. Text Splitters &rarr;</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
