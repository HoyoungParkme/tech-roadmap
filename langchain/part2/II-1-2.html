            'for c in chunks:',
            '    print(c)',
            '',
            '# 결과:',
            '#   "인공지능(AI)은 인간의 학습, 추론,"   (20 tok)',
            '#   "지각 능력을 컴퓨터로 구현한 기술이다."  (19 tok)',
            '#   ...',
            '',
            '# 3) 임베딩 모델 한계 대응',
            '#   text-embedding-3-small : 8191 토큰',
            '#   chunk_size 를 토큰 단위로 두면 안전한 마진 가능',
            '',
            '# 4) Recursive + Token 조합 (실전 best)',
            'from langchain.text_splitter import RecursiveCharacterTextSplitter',
            'splitter = RecursiveCharacterTextSplitter.from_tiktoken_encoder(',
            '    encoding_name="cl100k_base",',
            '    chunk_size=500,',
            '    chunk_overlap=50,',
            ')',
            '#  → 의미 단위 분할 + 토큰 정확도 둘 다 잡는다',
          ],
          highlight: [1, 4, 5, 6, 7, 8, 14, 15, 24, 25, 26, 28, 29, 30, 31, 32, 33, 34, 35],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 위: 청크 시각화 박스
    //   - splitterType 에 따라 다른 형태로 청크 표시
    //   - whole    : 회색 큰 박스 1개 (분할 안 됨)
    //   - normal   : emerald 박스 N개 (단순 청크)
    //   - segments : overlap 영역만 진한 emerald (Step 4)
    // ─────────────────────────────────────────────────────
    function ChunkBox({ chunks, splitterType, params }) {
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📄</span>
              <span className="text-[11px] font-bold text-emerald-800">긴 텍스트 → 청크 분할</span>
            </div>
            <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">
              {splitterType === 'none' ? 'no-split' :
               splitterType === 'char' ? 'CharacterSplitter' :
               splitterType === 'recursive' ? 'RecursiveSplitter' :
               splitterType === 'overlap' ? 'overlap=10' :
               'TokenSplitter'}
            </span>
          </div>

          {/* whole: 분할 안 함 */}
          {splitterType === 'none' && (
            <div className="bg-slate-100 border-2 border-dashed border-slate-400 rounded p-2 relative">
              <div className="absolute -top-2 -right-2 bg-red-500 text-white text-[8px] font-bold px-1.5 py-0.5 rounded shadow animate-pulse">
                ⚠ 통째로
              </div>
              <div className="text-[10px] text-slate-700 leading-snug">{chunks[0].text}</div>
              <div className="mt-2 pt-1.5 border-t border-dashed border-slate-300 flex items-center justify-between text-[9px] text-red-600 font-mono">
                <span>length = {chunks[0].text.length} 자</span>
                <span className="font-bold">→ context 한계 위험</span>
              </div>
            </div>
          )}

          {/* normal: 단순 청크들 */}
          {(splitterType === 'char' || splitterType === 'recursive' || splitterType === 'token') && (
            <div className="space-y-1.5 max-h-72 overflow-y-auto pr-1">
              {chunks.map((c) => (
                <div
                  key={c.id}
                  className="bg-emerald-50 border border-emerald-300 rounded p-1.5 transition-all duration-500"
                >
                  <div className="flex items-center gap-1.5 mb-0.5">
                    <span className="text-[8px] bg-emerald-600 text-white font-bold px-1.5 py-0.5 rounded font-mono">
                      chunk[{c.id}]
                    </span>
                    <span className="text-[9px] text-emerald-700 font-mono">
                      {splitterType === 'token' ? `${c.tokens} tok` : `${c.text.length} 자`}
                    </span>
                  </div>
                  <div className="text-[10px] text-emerald-900 leading-tight font-mono">{c.text}</div>
                </div>
              ))}
            </div>
          )}

          {/* segments: overlap 시각화 (Step 4) */}
          {splitterType === 'overlap' && (
            <div className="space-y-1.5 max-h-72 overflow-y-auto pr-1">
              {chunks.map((c) => (
                <div
                  key={c.id}
                  className="bg-emerald-50 border border-emerald-300 rounded p-1.5 transition-all duration-500"
                >
                  <div className="flex items-center gap-1.5 mb-0.5">
                    <span className="text-[8px] bg-emerald-600 text-white font-bold px-1.5 py-0.5 rounded font-mono">
                      chunk[{c.id}]
                    </span>
                    <span className="text-[9px] text-emerald-700 font-mono">
                      {c.segments.reduce((s, seg) => s + seg.text.length, 0)} 자
                    </span>
                  </div>
                  <div className="text-[10px] leading-tight font-mono">
                    {c.segments.map((seg, i) => (
                      <span
                        key={i}
                        className={
                          seg.overlap
                            ? 'bg-emerald-400 text-white px-0.5 rounded font-bold'
                            : 'text-emerald-900'
                        }
                        title={seg.overlap ? `overlap ${seg.side}` : 'unique'}
                      >
                        {seg.text}
                      </span>
                    ))}
                  </div>
                </div>
              ))}
              <div className="text-[9px] text-emerald-700 mt-1 pt-1 border-t border-dashed border-emerald-200 font-mono">
                <span className="bg-emerald-400 text-white px-1 rounded mr-1">overlap</span>
                같은 텍스트가 양쪽 청크에 동시에 존재 — 문맥 다리
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: 분할 통계 박스
    //   chunk_size / chunk_overlap / 총 청크 수 / 평균 길이 / 메타 표시
    //   splitterType 별로 추가 패널 (separators 우선순위 / 토큰 인코딩 등)
    // ─────────────────────────────────────────────────────
    function StatsBox({ params, stats, splitterType }) {
      return (
        <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📊</span>
              <span className="text-[11px] font-bold text-emerald-800">Splitter 설정 + 결과</span>
            </div>
            {stats.warning && (
              <span className="text-[9px] bg-red-500 text-white px-1.5 py-0.5 rounded font-mono font-bold animate-pulse">
                ⚠ {stats.warning}
              </span>
            )}
          </div>

          {/* 파라미터 카드 */}
          {params ? (
            <div className="grid grid-cols-2 gap-2 mb-2">
              <div className="bg-white rounded border border-emerald-200 p-2 text-center">
                <div className="text-[9px] font-bold text-emerald-700 uppercase">chunk_size</div>
                <div className="text-lg font-bold text-emerald-900 font-mono">{params.chunk_size}</div>
                <div className="text-[8px] text-emerald-600 font-mono">
                  {splitterType === 'token' ? 'tokens' : 'chars'}
                </div>
              </div>
              <div className="bg-white rounded border border-emerald-200 p-2 text-center">
                <div className="text-[9px] font-bold text-emerald-700 uppercase">chunk_overlap</div>
                <div className={`text-lg font-bold font-mono ${params.chunk_overlap > 0 ? 'text-amber-700' : 'text-slate-400'}`}>
                  {params.chunk_overlap}
                </div>
                <div className="text-[8px] text-emerald-600 font-mono">
                  {params.chunk_overlap > 0 ? '문맥 다리 ON' : '겹침 없음'}
                </div>
              </div>
            </div>
          ) : (
            <div className="bg-white rounded border-2 border-dashed border-red-300 p-2 text-center mb-2">
              <div className="text-[10px] text-red-700 font-mono italic">splitter = None (분할 안 함)</div>
              <div className="text-[9px] text-red-500 mt-0.5">→ 100% 그대로 LLM 에 투입</div>
            </div>
          )}

          {/* separators 우선순위 (Recursive / overlap 단계) */}
          {params && params.separators && (
            <div className="bg-white rounded border border-emerald-200 p-2 mb-2">
              <div className="text-[9px] font-bold text-emerald-700 mb-1 uppercase tracking-wider">
                separators (우선순위)
              </div>
              <div className="flex gap-1 flex-wrap">
                {params.separators.map((sep, i) => (
                  <div
                    key={i}
                    className="flex items-center gap-1 text-[9px] font-mono"
                  >
                    <span className="bg-emerald-600 text-white px-1 py-0.5 rounded font-bold">
                      {i + 1}
                    </span>
                    <span className="bg-emerald-100 text-emerald-800 px-1.5 py-0.5 rounded">
                      {sep}
                    </span>
                    {i < params.separators.length - 1 && (
                      <span className="text-emerald-400">→</span>
                    )}
                  </div>
                ))}
              </div>
              <div className="text-[8px] text-emerald-600 mt-1 font-mono">
                위에서 아래로 시도 — 문단 → 줄 → 단어 → 글자
              </div>
            </div>
          )}

          {/* 단일 separator (Char 단계) */}
          {params && params.separator && !params.separators && (
            <div className="bg-white rounded border border-emerald-200 p-2 mb-2">
              <div className="text-[9px] font-bold text-emerald-700 mb-1 uppercase tracking-wider">
                separator (단일)
              </div>
              <div className="text-[10px] font-mono text-emerald-900">
                <span className="bg-emerald-100 text-emerald-800 px-1.5 py-0.5 rounded">{params.separator}</span>
                <span className="ml-2 text-emerald-600 text-[9px]">← 이 한 가지로만 자른다</span>
              </div>
            </div>
          )}

          {/* tiktoken 인코딩 (Token 단계) */}
          {params && params.encoding && (
            <div className="bg-white rounded border border-emerald-200 p-2 mb-2">
              <div className="text-[9px] font-bold text-emerald-700 mb-1 uppercase tracking-wider">
                encoding (tiktoken)
              </div>
              <div className="text-[10px] font-mono text-emerald-900">
                <span className="bg-emerald-100 text-emerald-800 px-1.5 py-0.5 rounded">{params.encoding}</span>
                <span className="ml-2 text-emerald-600 text-[9px]">GPT-4 / 3.5 호환</span>
              </div>
            </div>
          )}

          {/* 결과 통계 */}
          <div className="bg-white rounded border-2 border-emerald-300 p-2">
            <div className="text-[9px] font-bold text-emerald-700 mb-1 uppercase tracking-wider">결과</div>
            <div className="grid grid-cols-3 gap-1 text-center">
              <div>
                <div className="text-[8px] text-emerald-600 font-mono uppercase">total</div>
                <div className="text-base font-bold text-emerald-900 font-mono">{stats.total}</div>
                <div className="text-[8px] text-emerald-500">청크</div>
              </div>
              <div>
                <div className="text-[8px] text-emerald-600 font-mono uppercase">avg</div>
                <div className="text-base font-bold text-emerald-900 font-mono">{stats.avgLen}</div>
                <div className="text-[8px] text-emerald-500">{stats.unit || '자'} / 청크</div>
              </div>
              <div>
                <div className="text-[8px] text-emerald-600 font-mono uppercase">total len</div>
                <div className="text-base font-bold text-emerald-900 font-mono">{stats.totalLen}</div>
                <div className="text-[8px] text-emerald-500">{stats.unit || '자'}</div>
              </div>
            </div>
            {stats.note && (
              <div className="text-[9px] text-emerald-700 mt-1.5 pt-1 border-t border-dashed border-emerald-200 font-mono italic">
                {stats.note}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 청크 박스 / 하단: 통계 박스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 백과사전 — Text Splitter 5종 비교</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <ChunkBox chunks={step.chunks} splitterType={step.splitterType} params={step.params} />
            <StatsBox params={step.params} stats={step.stats} splitterType={step.splitterType} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-300 border border-emerald-500"></span>chunk
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-400"></span>overlap
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-300 border border-dashed border-slate-500"></span>분할 안 함
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-red-500"></span>위험
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    //   - hidden <pre>로 hljs 토큰화
    //   - 라인별 div 분리해서 강조 라인에 emerald 테두리
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 컴포넌트 &gt; Chapter 1. 문서 처리</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-1-2. Text Splitters — 긴 문서를 청크로 분할</h1>
                  <p className="text-sm text-slate-500 mt-0.5">백과사전을 챕터·문단·문장 단위로 자르는 5가지 방법 — Char · Recursive · Overlap · Token</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: 단순 분할은 <strong>CharacterSplitter</strong>, 의미 보존은 <strong>RecursiveCharacterSplitter</strong>(default), 문맥 보존은 <strong>chunk_overlap</strong>, 정확한 토큰 관리는 <strong>TokenSplitter</strong>. 다음(II-1-3)에서는 분할된 청크를 벡터로 바꾸는 Embeddings 를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['CharacterTextSplitter', 'RecursiveCharacterTextSplitter', 'TokenTextSplitter', 'chunk_size', 'chunk_overlap', 'separators', 'tiktoken'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-1-1.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; II-1-1 Document Loaders</a>
              <a href="./II-1-3.html" className="text-emerald-700 hover:text-emerald-900 font-medium">II-1-3 Embeddings &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
