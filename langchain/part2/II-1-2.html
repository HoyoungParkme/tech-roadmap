<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — II-1-2. Text Splitters</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-1-2. Text Splitters
    학습 목표: 긴 문서를 적절한 크기의 청크로 분할하는 전략을 설명할 수 있다.
    템플릿: 순차형 (Type B) — 백과사전 비유.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const FULL_TEXT = "인공지능(AI)은 인간의 학습, 추론, 지각 능력을 컴퓨터로 구현한 기술이다. 머신러닝은 AI의 하위 분야로, 데이터에서 패턴을 학습한다. 딥러닝은 머신러닝의 하위 분야로, 신경망을 사용한다. 최근 대규모 언어 모델(LLM)이 등장하면서 자연어 처리 분야에 혁신이 일어났다.";

    const STEPS = [
      {
        desc: "[긴 문서의 문제] LLM은 한 번에 처리할 수 있는 텍스트 길이에 제한이 있습니다. 두꺼운 백과사전을 통째로 읽을 수 없듯이, 긴 문서를 적절한 크기로 나눠야 합니다.",
        chunks: [{ text: FULL_TEXT, color: 'bg-slate-100 border-slate-300' }],
        params: null,
        code: [
          { line: '# 문제: 긴 문서를 LLM에 통째로 넣을 수 없다', highlight: false },
          { line: '# GPT-4: ~128K 토큰, 하지만 긴 문서는 비용 + 정확도 ↓', highlight: false },
          { line: '', highlight: false },
          { line: '# 해결: 적절한 크기로 나눈다 (Chunking)', highlight: true },
          { line: '# Text Splitter가 이 역할을 한다', highlight: true },
        ],
      },
      {
        desc: "[chunk_size] 각 조각의 최대 크기를 정합니다. chunk_size=50이면 약 50자씩 나눕니다. 너무 작으면 맥락이 끊기고, 너무 크면 LLM에 부담이 됩니다.",
        chunks: [
          { text: '인공지능(AI)은 인간의 학습, 추론, 지각 능력을 컴퓨터로 구현한 기술이다.', color: 'bg-cyan-50 border-cyan-300' },
          { text: '머신러닝은 AI의 하위 분야로, 데이터에서 패턴을 학습한다.', color: 'bg-teal-50 border-teal-300' },
          { text: '딥러닝은 머신러닝의 하위 분야로, 신경망을 사용한다.', color: 'bg-emerald-50 border-emerald-300' },
          { text: '최근 대규모 언어 모델(LLM)이 등장하면서 자연어 처리 분야에 혁신이 일어났다.', color: 'bg-green-50 border-green-300' },
        ],
        params: { chunk_size: 50, chunk_overlap: 0 },
        code: [
          { line: 'from langchain.text_splitter import RecursiveCharacterTextSplitter', highlight: false },
          { line: '', highlight: false },
          { line: 'splitter = RecursiveCharacterTextSplitter(', highlight: true },
          { line: '    chunk_size=50,      # 조각 최대 크기', highlight: true },
          { line: '    chunk_overlap=0,     # 겹침 없음', highlight: true },
          { line: ')', highlight: true },
        ],
      },
      {
        desc: "[chunk_overlap] 조각 사이에 겹치는 영역을 둡니다. overlap=10이면 이전 조각의 끝 10자가 다음 조각 앞에 반복됩니다. 문맥이 끊기는 것을 방지합니다.",
        chunks: [
          { text: '인공지능(AI)은 인간의 학습, 추론, 지각 능력을 컴퓨터로 구현한 기술이다.', color: 'bg-cyan-50 border-cyan-300', overlap: null },
          { text: '구현한 기술이다. 머신러닝은 AI의 하위 분야로, 데이터에서 패턴을 학습한다.', color: 'bg-teal-50 border-teal-300', overlap: '구현한 기술이다.' },
          { text: '패턴을 학습한다. 딥러닝은 머신러닝의 하위 분야로, 신경망을 사용한다.', color: 'bg-emerald-50 border-emerald-300', overlap: '패턴을 학습한다.' },
          { text: '신경망을 사용한다. 최근 대규모 언어 모델(LLM)이 등장하면서 혁신이 일어났다.', color: 'bg-green-50 border-green-300', overlap: '신경망을 사용한다.' },
        ],
        params: { chunk_size: 50, chunk_overlap: 10 },
        code: [
          { line: 'splitter = RecursiveCharacterTextSplitter(', highlight: false },
          { line: '    chunk_size=50,', highlight: false },
          { line: '    chunk_overlap=10,   # ← 10자 겹침!', highlight: true },
          { line: ')', highlight: false },
          { line: '', highlight: false },
          { line: '# 겹침 영역이 문맥 연결을 보장한다', highlight: true },
          { line: '# "...구현한 기술이다." + "구현한 기술이다. 머신러닝은..."', highlight: false },
        ],
      },
      {
        desc: "[분할 실행] splitter.split_documents()로 Document 리스트를 청크로 분할합니다. 각 청크도 Document 객체이며, 원본의 metadata를 그대로 가집니다.",
        chunks: [
          { text: 'Chunk 1: "인공지능(AI)은 인간의 학습..."', color: 'bg-cyan-50 border-cyan-300' },
          { text: 'Chunk 2: "머신러닝은 AI의 하위 분야..."', color: 'bg-teal-50 border-teal-300' },
          { text: 'Chunk 3: "딥러닝은 머신러닝의..."', color: 'bg-emerald-50 border-emerald-300' },
          { text: 'Chunk 4: "최근 대규모 언어 모델..."', color: 'bg-green-50 border-green-300' },
        ],
        params: null,
        code: [
          { line: '# Document 리스트를 분할', highlight: false },
          { line: 'chunks = splitter.split_documents(docs)', highlight: true },
          { line: '', highlight: false },
          { line: 'print(len(chunks))  # 예: 4개 청크', highlight: false },
          { line: '', highlight: false },
          { line: '# 각 청크도 Document 객체', highlight: false },
          { line: 'chunks[0].page_content  # "인공지능(AI)은..."', highlight: false },
          { line: 'chunks[0].metadata      # {"source": "report.pdf"}', highlight: true },
        ],
      },
      {
        desc: "[의미 보존이 핵심] Recursive가 붙은 이유: 먼저 \\n\\n(문단)으로 나누고, 안 되면 \\n(줄바꿈), 그래도 안 되면 공백, 최후엔 글자 단위로 나눕니다. 의미 단위를 최대한 보존합니다.",
        chunks: [],
        params: null,
        code: [
          { line: '# RecursiveCharacterTextSplitter 분할 순서:', highlight: false },
          { line: '#', highlight: false },
          { line: '# 1단계: "\\n\\n" (문단) 으로 나눈다', highlight: true },
          { line: '# 2단계: "\\n" (줄바꿈) 으로 나눈다', highlight: true },
          { line: '# 3단계: " " (공백) 으로 나눈다', highlight: true },
          { line: '# 4단계: "" (글자) 으로 나눈다', highlight: true },
          { line: '', highlight: false },
          { line: '# → 의미 단위를 최대한 유지하면서 분할!', highlight: false },
        ],
        splitOrder: [
          { sep: '\\n\\n', label: '문단', priority: '1순위', color: 'bg-cyan-100 text-cyan-800' },
          { sep: '\\n', label: '줄바꿈', priority: '2순위', color: 'bg-teal-100 text-teal-800' },
          { sep: '" "', label: '공백', priority: '3순위', color: 'bg-emerald-100 text-emerald-800' },
          { sep: '""', label: '글자', priority: '최후', color: 'bg-amber-100 text-amber-800' },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">

            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-cyan-700 hover:text-cyan-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 컴포넌트 &gt; Chapter 1. 문서 처리</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-1-2. Text Splitters</h1>
                </div>
              </div>
              <p className="text-slate-600">
                두꺼운 <b>백과사전</b>을 한 번에 읽을 수 없습니다. 챕터별, 문단별로 나눠서 필요한 부분만 찾아 읽습니다.
              </p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-cyan-700 border-cyan-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">Text Splitters 동작</h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                {/* 파라미터 표시 */}
                {stepData.params && (
                  <div className="flex gap-3">
                    <div className="flex-1 bg-cyan-50 border border-cyan-200 rounded-lg p-3 text-center">
                      <div className="text-xs font-bold text-cyan-600">chunk_size</div>
                      <div className="text-2xl font-bold text-cyan-800">{stepData.params.chunk_size}</div>
                    </div>
                    <div className="flex-1 bg-teal-50 border border-teal-200 rounded-lg p-3 text-center">
                      <div className="text-xs font-bold text-teal-600">chunk_overlap</div>
                      <div className="text-2xl font-bold text-teal-800">{stepData.params.chunk_overlap}</div>
                    </div>
                  </div>
                )}

                {/* 청크 시각화 */}
                {stepData.chunks.length > 0 && (
                  <div className="space-y-2">
                    {stepData.chunks.map((chunk, i) => (
                      <div key={i} className={`p-3 rounded-lg border-2 text-sm ${chunk.color} transition-all duration-300`}>
                        {chunk.overlap && (
                          <span className="bg-yellow-200 text-yellow-800 text-xs px-1 rounded mr-1">{chunk.overlap}</span>
                        )}
                        {chunk.text}
                      </div>
                    ))}
                  </div>
                )}

                {/* 분할 순서 (마지막 단계) */}
                {stepData.splitOrder && (
                  <div className="space-y-2">
                    <div className="text-xs font-bold text-cyan-600 uppercase tracking-wider">분할 우선순위</div>
                    {stepData.splitOrder.map((item, i) => (
                      <div key={i} className={`flex items-center justify-between p-3 rounded-lg ${item.color}`}>
                        <div className="flex items-center gap-2">
                          <span className="font-bold text-sm">{item.priority}</span>
                          <span className="font-mono text-sm">{item.sep}</span>
                        </div>
                        <span className="text-sm">{item.label}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (
                    <div key={i} className={l.highlight ? 'bg-cyan-900/40 -mx-4 px-4' : ''}>
                      {l.line || '\u00A0'}
                    </div>
                  ))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['RecursiveCharacterTextSplitter', 'chunk_size', 'chunk_overlap', '의미 보존'].map(kw => (
                <span key={kw} className="bg-cyan-50 text-cyan-700 px-3 py-1 rounded-full text-sm font-medium border border-cyan-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-cyan-600 hover:bg-cyan-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./II-1-1.html" className="text-cyan-600 hover:text-cyan-800 font-medium">&larr; II-1-1. Document Loaders</a>
              <a href="./II-1-3.html" className="text-cyan-600 hover:text-cyan-800 font-medium">II-1-3. Embeddings &rarr;</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
