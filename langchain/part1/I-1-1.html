<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — I-1-1. LLM 직접 호출 vs LangChain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-1-1. LLM 직접 호출 vs LangChain
    학습 목표: LLM 직접 호출의 문제점과 LangChain이 해결하는 것을 설명할 수 있다.
    템플릿: 개념형 (Type A) — 좌우 비교 다이어그램.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "[사용자 요청] \"상품 리뷰를 요약해줘\"라는 요청이 들어왔습니다. 직접 호출과 LangChain이 이 요청을 어떻게 처리하는지 비교해봅시다.",
        direct: {
          state: 'start',
          code: [],
          result: null,
        },
        langchain: {
          state: 'start',
          code: [],
          result: null,
        },
      },
      {
        desc: "[직접 호출의 현실] API 키 설정, 헤더 구성, 요청 본문 작성, HTTP 호출, 에러 처리, 응답 파싱... 반복 코드가 한가득입니다.",
        direct: {
          state: 'coding',
          code: [
            { line: 'import requests, json', highlight: false },
            { line: '', highlight: false },
            { line: 'url = "https://api.openai.com/v1/chat/completions"', highlight: true },
            { line: 'headers = {', highlight: true },
            { line: '    "Authorization": f"Bearer {API_KEY}",', highlight: true },
            { line: '    "Content-Type": "application/json"', highlight: true },
            { line: '}', highlight: true },
            { line: 'body = {', highlight: true },
            { line: '    "model": "gpt-4",', highlight: true },
            { line: '    "messages": [{"role":"user",', highlight: true },
            { line: '      "content": "이 리뷰를 요약해줘: ..."}]', highlight: true },
            { line: '}', highlight: true },
            { line: 'resp = requests.post(url, headers=headers,', highlight: false },
            { line: '                     json=body)', highlight: false },
            { line: 'data = resp.json()', highlight: false },
            { line: 'answer = data["choices"][0]["message"]["content"]', highlight: false },
          ],
          result: null,
        },
        langchain: {
          state: 'waiting',
          code: [],
          result: null,
        },
      },
      {
        desc: "[LangChain의 간결함] 같은 작업을 LangChain으로 하면? 프롬프트 템플릿 + 모델 + 파서를 파이프(|)로 연결하면 끝!",
        direct: {
          state: 'done',
          code: [
            { line: 'import requests, json', highlight: false },
            { line: '# ... (16줄의 설정 코드)', highlight: false },
            { line: 'resp = requests.post(url, headers=headers,', highlight: false },
            { line: '                     json=body)', highlight: false },
            { line: 'data = resp.json()', highlight: false },
            { line: 'answer = data["choices"][0]["message"]["content"]', highlight: false },
          ],
          result: null,
        },
        langchain: {
          state: 'coding',
          code: [
            { line: 'from langchain_openai import ChatOpenAI', highlight: false },
            { line: 'from langchain_core.prompts import ChatPromptTemplate', highlight: false },
            { line: 'from langchain_core.output_parsers import StrOutputParser', highlight: false },
            { line: '', highlight: false },
            { line: 'prompt = ChatPromptTemplate.from_template(', highlight: true },
            { line: '    "이 리뷰를 요약해줘: {review}")', highlight: true },
            { line: 'model = ChatOpenAI(model="gpt-4")', highlight: true },
            { line: 'parser = StrOutputParser()', highlight: true },
            { line: '', highlight: false },
            { line: 'chain = prompt | model | parser', highlight: true },
            { line: 'answer = chain.invoke({"review": "..."})', highlight: true },
          ],
          result: null,
        },
      },
      {
        desc: "[실행 결과 비교] 두 방식 모두 같은 결과를 냅니다. 하지만 직접 호출은 16줄, LangChain은 6줄. 프롬프트를 바꾸고 싶으면? 직접 호출은 body를 수정, LangChain은 템플릿만 교체.",
        direct: {
          state: 'result',
          code: [],
          result: { text: '"이 제품은 가성비가 좋고 배송이 빠르며, 품질도 만족스럽다는 의견이 많습니다."', lines: 16, issues: ['API 키 하드코딩 위험', '에러 처리 누락', '프롬프트 재사용 불가'] },
        },
        langchain: {
          state: 'result',
          code: [],
          result: { text: '"이 제품은 가성비가 좋고 배송이 빠르며, 품질도 만족스럽다는 의견이 많습니다."', lines: 6, benefits: ['프롬프트 재사용 가능', '자동 에러 처리', '스트리밍/배치 지원'] },
        },
      },
      {
        desc: "[핵심 차이] 직접 호출은 \"직접 요리\" — 재료 손질부터 설거지까지 다 해야 합니다. LangChain은 \"밀키트\" — 재료가 손질되어 있고, 순서대로 넣으면 요리가 완성됩니다.",
        direct: {
          state: 'summary',
          code: [],
          result: null,
        },
        langchain: {
          state: 'summary',
          code: [],
          result: null,
        },
      },
    ];

    function CodeBlock({ lines }) {
      return (
        <pre className="bg-slate-900 text-slate-100 p-4 rounded-lg text-xs leading-relaxed overflow-x-auto font-mono">
          {lines.map((l, i) => (
            <div key={i} className={l.highlight ? 'bg-yellow-900/30 -mx-4 px-4' : ''}>
              {l.line || '\u00A0'}
            </div>
          ))}
        </pre>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const isSummary = stepData.direct.state === 'summary';

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">

            {/* 허브 네비게이션 */}
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-indigo-700 hover:text-indigo-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. LangChain이란 &gt; Chapter 1. LangChain 개요</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-1-1. LLM 직접 호출 vs LangChain</h1>
                </div>
              </div>
              <p className="text-slate-600">
                직접 요리하면 재료 손질부터 설거지까지 다 해야 합니다. LangChain은 <b>밀키트</b> — 순서대로 넣으면 요리가 완성됩니다.
              </p>
            </header>

            {/* 현재 단계 설명 */}
            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-indigo-700 border-indigo-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">직접 호출 vs LangChain 비교</h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 좌우 비교 다이어그램 */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

              {/* 직접 호출 (왼쪽) */}
              <div className={`bg-white rounded-xl shadow-sm border-2 p-5 transition-all duration-300 ${isSummary ? 'border-red-200' : 'border-slate-200'}`}>
                <div className="flex items-center gap-2 mb-4">
                  <div className="w-8 h-8 bg-gray-500 text-white flex items-center justify-center rounded-lg text-lg">🍳</div>
                  <div>
                    <div className="font-bold text-slate-800">직접 호출</div>
                    <div className="text-xs text-slate-500">requests + 수동 파싱</div>
                  </div>
                </div>

                {isSummary ? (
                  <div className="space-y-3">
                    <div className="bg-red-50 border border-red-200 rounded-lg p-4 text-center">
                      <div className="text-4xl mb-2">🍳</div>
                      <div className="font-bold text-red-700 text-lg">직접 요리</div>
                      <div className="text-sm text-red-600 mt-1">재료 손질부터 설거지까지</div>
                    </div>
                    <ul className="text-sm text-slate-600 space-y-1">
                      <li>❌ 반복 코드 (매번 헤더, 바디 구성)</li>
                      <li>❌ 에러 처리 직접 구현</li>
                      <li>❌ 프롬프트 재사용 어려움</li>
                    </ul>
                  </div>
                ) : stepData.direct.state === 'result' ? (
                  <div className="space-y-3">
                    <div className="bg-gray-50 border border-gray-200 rounded-lg p-3">
                      <div className="text-xs font-bold text-gray-500 mb-1">결과</div>
                      <div className="text-sm text-slate-700">{stepData.direct.result.text}</div>
                    </div>
                    <div className="text-sm text-slate-600">
                      <div className="font-medium mb-1">코드 줄 수: <span className="text-red-600 font-bold">{stepData.direct.result.lines}줄</span></div>
                      {stepData.direct.result.issues.map((issue, i) => (
                        <div key={i} className="text-red-500 text-xs">⚠️ {issue}</div>
                      ))}
                    </div>
                  </div>
                ) : stepData.direct.code.length > 0 ? (
                  <CodeBlock lines={stepData.direct.code} />
                ) : (
                  <div className="flex items-center justify-center h-40 text-slate-400 text-sm">
                    {stepData.direct.state === 'start' ? '요청 대기 중...' : '직접 호출 완료'}
                  </div>
                )}
              </div>

              {/* LangChain (오른쪽) */}
              <div className={`bg-white rounded-xl shadow-sm border-2 p-5 transition-all duration-300 ${isSummary ? 'border-indigo-300' : stepData.langchain.state === 'coding' || stepData.langchain.state === 'result' ? 'border-indigo-200 ring-2 ring-indigo-100' : 'border-slate-200'}`}>
                <div className="flex items-center gap-2 mb-4">
                  <div className="w-8 h-8 bg-indigo-600 text-white flex items-center justify-center rounded-lg text-lg">📦</div>
                  <div>
                    <div className="font-bold text-slate-800">LangChain</div>
                    <div className="text-xs text-slate-500">prompt | model | parser</div>
                  </div>
                </div>

                {isSummary ? (
                  <div className="space-y-3">
                    <div className="bg-indigo-50 border border-indigo-200 rounded-lg p-4 text-center">
                      <div className="text-4xl mb-2">📦</div>
                      <div className="font-bold text-indigo-700 text-lg">밀키트</div>
                      <div className="text-sm text-indigo-600 mt-1">순서대로 넣으면 완성</div>
                    </div>
                    <ul className="text-sm text-slate-600 space-y-1">
                      <li>✅ 컴포넌트 조합 (프롬프트, 모델, 파서)</li>
                      <li>✅ 자동 에러 처리 + 재시도</li>
                      <li>✅ 프롬프트 재사용 + 체이닝</li>
                    </ul>
                  </div>
                ) : stepData.langchain.state === 'result' ? (
                  <div className="space-y-3">
                    <div className="bg-indigo-50 border border-indigo-200 rounded-lg p-3">
                      <div className="text-xs font-bold text-indigo-500 mb-1">결과</div>
                      <div className="text-sm text-slate-700">{stepData.langchain.result.text}</div>
                    </div>
                    <div className="text-sm text-slate-600">
                      <div className="font-medium mb-1">코드 줄 수: <span className="text-indigo-600 font-bold">{stepData.langchain.result.lines}줄</span></div>
                      {stepData.langchain.result.benefits.map((b, i) => (
                        <div key={i} className="text-indigo-600 text-xs">✅ {b}</div>
                      ))}
                    </div>
                  </div>
                ) : stepData.langchain.code.length > 0 ? (
                  <CodeBlock lines={stepData.langchain.code} />
                ) : (
                  <div className="flex items-center justify-center h-40 text-slate-400 text-sm">
                    {stepData.langchain.state === 'waiting' ? 'LangChain 방식은 다음 단계에서...' : '요청 대기 중...'}
                  </div>
                )}
              </div>
            </div>

            {/* 핵심 키워드 */}
            <div className="flex flex-wrap gap-2">
              {['LangChain', '프레임워크', '반복 코드 제거', '컴포넌트 조합'].map(kw => (
                <span key={kw} className="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-sm font-medium border border-indigo-200">{kw}</span>
              ))}
            </div>

            {/* 컨트롤 바 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-indigo-600 hover:bg-indigo-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            {/* 다음 섹션 네비게이션 */}
            <div className="text-sm text-slate-500 text-right">
              다음: <a href="./I-1-2.html" className="text-indigo-600 hover:text-indigo-800 font-medium">I-1-2. LangChain 아키텍처 전체 지도 &rarr;</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
