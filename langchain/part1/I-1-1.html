        },
        bar: { left: 47, right: 8, max: 50 },
        verdict: '단일 호출 70% 감소, 누적 변형 합계 83% 감소. 진짜 이득은 "한 객체 = 다양한 호출 방식".',
        code: {
          lang: 'markdown',
          filename: 'compare.md',
          lines: [
            '# I-1-1. 정리 — 직접 호출 vs LangChain',
            '',
            '## 1. 라인 수 비교',
            '',
            '| 시나리오                  | 직접 호출 | LangChain |',
            '|---------------------------|-----------|-----------|',
            '| 단일 호출 (1건)           |    17줄   |     5줄   |',
            '| 벤더 교체 (OpenAI→Claude) |    12줄   |     1줄   |',
            '| 배치 100건 처리           |    10줄   |     1줄   |',
            '| 토큰 스트리밍             |     8줄   |     1줄   |',
            '| **합계**                  |  **47줄** |   **8줄** |',
            '',
            '## 2. 진짜 차이는 "라인 수"가 아니다',
            '',
            '- 직접 호출: 변형마다 새 코드 → 유지보수 N벌',
            '- LangChain: 같은 `chain` 객체에 메서드만 다르게',
            '  - `.invoke / .batch / .stream / .ainvoke`',
            '',
            '## 3. 컴포넌트 재사용',
            '',
            '`prompt | model | parser` ← 각 자리 독립 교체',
            '',
            '- prompt 교체 → 같은 모델/파서로 새 작업',
            '- model  교체 → A/B 테스트 (gpt vs claude)',
            '- parser 교체 → JSON / Pydantic 출력',
            '',
            '## 4. 핵심 비유',
            '',
            '> 직접 호출 = 직접 요리 (재료 손질~설거지)',
            '> LangChain = 밀키트 (순서대로 넣으면 완성)',
            '',
            '## 5. 다음 단계 — I-1-2. LangChain 아키텍처 지도',
          ],
          highlight: [3, 5, 6, 7, 8, 9, 10, 11, 14, 15, 16, 17, 20, 22, 24, 25, 26],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측: 코드 박스 한 짝 (직접 호출 / LangChain)
    //   accent: red(문제) / emerald(좋음) / amber(주의) / slate(대기)
    // ─────────────────────────────────────────────────────
    const ACCENT = {
      red:     { border: 'border-red-300',     bg: 'bg-red-50',     title: 'text-red-800',     tag: 'bg-red-100 text-red-700',     code: 'bg-red-900/95 text-red-50' },
      emerald: { border: 'border-emerald-300', bg: 'bg-emerald-50', title: 'text-emerald-800', tag: 'bg-emerald-100 text-emerald-700', code: 'bg-emerald-900/95 text-emerald-50' },
      amber:   { border: 'border-amber-300',   bg: 'bg-amber-50',   title: 'text-amber-800',   tag: 'bg-amber-100 text-amber-700',   code: 'bg-amber-900/95 text-amber-50' },
      slate:   { border: 'border-slate-300',   bg: 'bg-slate-50',   title: 'text-slate-700',   tag: 'bg-slate-100 text-slate-600',   code: 'bg-slate-800 text-slate-200' },
    };

    function MiniCodeBox({ box }) {
      const a = ACCENT[box.accent] || ACCENT.slate;

      // 빈 박스 (Step 1의 우측)
      if (box.empty) {
        return (
          <div className={`${a.bg} border-2 border-dashed ${a.border} rounded-lg p-3 flex flex-col items-center justify-center min-h-[14rem]`}>
            <div className="text-3xl mb-1.5 opacity-60">{box.icon}</div>
            <div className={`text-[11px] font-bold ${a.title}`}>{box.label}</div>
            <div className="text-[10px] text-slate-500 mt-1 italic">{box.empty}</div>
          </div>
        );
      }

      // Step 5 요약 표 박스
      if (box.summaryRows) {
        return (
          <div className={`${a.bg} border-2 ${a.border} rounded-lg p-3`}>
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">{box.icon}</span>
                <span className={`text-[11px] font-bold ${a.title}`}>{box.label}</span>
              </div>
              <span className={`text-[9px] ${a.tag} px-1.5 py-0.5 rounded font-mono`}>
                {box.tag}
              </span>
            </div>
            <table className="w-full text-[10px] font-mono">
              <tbody>
                {box.summaryRows.map((r, i) => (
                  <tr
                    key={i}
                    className={`${r.total ? 'border-t-2 ' + a.border + ' font-bold' : 'border-b border-slate-100'}`}
                  >
                    <td className="py-1 pl-1 text-slate-700">{r.what}</td>
                    <td className={`py-1 pr-1 text-right ${r.total ? a.title : 'text-slate-600'}`}>
                      {r.n}줄
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div className="border-t border-slate-200 mt-2 pt-1.5 text-[9px] space-y-0.5">
              {(box.issues || []).map((s, i) => (
                <div key={i} className="text-red-600">⚠ {s}</div>
              ))}
              {(box.benefits || []).map((s, i) => (
                <div key={i} className="text-emerald-700">✓ {s}</div>
              ))}
            </div>
          </div>
        );
      }

      // 일반 코드 박스 (Step 1~4)
      return (
        <div className={`${a.bg} border-2 ${a.border} rounded-lg p-3`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">{box.icon}</span>
              <span className={`text-[11px] font-bold ${a.title}`}>{box.label}</span>
            </div>
            <span className={`text-[9px] ${a.tag} px-1.5 py-0.5 rounded font-mono`}>
              {box.tag}
            </span>
          </div>
          <pre className={`${a.code} rounded text-[10px] leading-snug p-2 overflow-x-auto font-mono`}>
            {(box.lines || []).map((l, i) => (
              <div key={i}>{l || ' '}</div>
            ))}
          </pre>
          <div className="border-t border-slate-200 mt-2 pt-1.5 text-[9px] space-y-0.5">
            <div className={`font-mono ${a.title}`}>
              <span className="opacity-70">코드 줄 수:</span>{' '}
              <span className="font-bold">{box.lineCount}줄</span>
            </div>
            {(box.issues || []).map((s, i) => (
              <div key={i} className="text-red-600">⚠ {s}</div>
            ))}
            {(box.benefits || []).map((s, i) => (
              <div key={i} className="text-emerald-700">✓ {s}</div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 라인 수 비교 막대 — 좌(red) vs 우(emerald)
    // ─────────────────────────────────────────────────────
    function LineBar({ bar }) {
      const max = bar.max || Math.max(bar.left, bar.right, 1);
      const lw = (bar.left  / max) * 100;
      const rw = (bar.right / max) * 100;
      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <span className="text-[11px] font-bold text-slate-700">📏 코드 줄 수 비교</span>
            <span className="text-[9px] text-slate-400 font-mono">
              직접 {bar.left}줄  ·  LangChain {bar.right}줄
            </span>
          </div>

          {/* 좌: 직접 */}
          <div className="mb-2">
            <div className="flex items-center gap-1 mb-0.5">
              <span className="text-[9px] font-mono w-16 text-red-700 font-bold">직접 호출</span>
              <span className="text-[9px] text-slate-500">{bar.left}줄</span>
            </div>
            <div className="h-3.5 bg-slate-100 rounded-full overflow-hidden">
              <div
                className="h-full bg-gradient-to-r from-red-400 to-red-600 transition-all duration-700 flex items-center justify-end pr-1.5"
                style={{ width: `${lw}%` }}
              >
                {lw > 18 && (
                  <span className="text-[8px] text-white font-bold font-mono">{bar.left}</span>
                )}
              </div>
            </div>
          </div>

          {/* 우: LangChain */}
          <div>
            <div className="flex items-center gap-1 mb-0.5">
              <span className="text-[9px] font-mono w-16 text-emerald-700 font-bold">LangChain</span>
              <span className="text-[9px] text-slate-500">{bar.right}줄</span>
            </div>
            <div className="h-3.5 bg-slate-100 rounded-full overflow-hidden">
              <div
                className="h-full bg-gradient-to-r from-emerald-400 to-emerald-600 transition-all duration-700 flex items-center justify-end pr-1.5"
                style={{ width: `${rw}%` }}
              >
                {rw > 14 && bar.right > 0 && (
                  <span className="text-[8px] text-white font-bold font-mono">{bar.right}</span>
                )}
              </div>
            </div>
          </div>

          {bar.right > 0 && bar.left > 0 && (
            <div className="mt-2 text-center text-[10px] font-mono">
              <span className="bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded font-bold">
                {Math.round((1 - bar.right / bar.left) * 100)}% 감소
              </span>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 패널 전체 — LiveDataPane
    //   상단 2단: 직접 호출 박스 / LangChain 박스
    //   하단    : 라인 수 막대 비교
    //   푸터    : 한 줄 결론 (노란 띠)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🍳 직접 요리 vs 📦 밀키트</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 좌/우 코드 박스 */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
            <MiniCodeBox box={step.leftBox} />
            <MiniCodeBox box={step.rightBox} />
          </div>

          {/* 라인 수 막대 */}
          <LineBar bar={step.bar} />

          {/* 한 줄 결론 */}
          <div className="mt-3 bg-amber-50 border-l-4 border-amber-400 p-2 rounded-r">
            <div className="text-[10px] font-bold text-amber-700 mb-0.5 uppercase tracking-wider">verdict</div>
            <div className="text-[11px] text-amber-900 leading-snug">{step.verdict}</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측: VSCode 스타일 CodeViewer — highlight.js
    //   filename 탭 5종 (direct.py / openai-vs-anthropic.py /
    //                    langchain.py / lcel.py / compare.md)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일 탭 미니 (현재 step 의 파일 강조) */}
          <div className="bg-[#1c1f24] px-3 pt-1.5 flex items-center gap-1 border-b border-slate-700 overflow-x-auto">
            {STEPS.map((s, i) => (
              <div
                key={i}
                className={`px-2 py-1 text-[10px] font-mono rounded-t whitespace-nowrap ${
                  i === stepIdx
                    ? 'bg-[#282c34] text-emerald-300 border-t border-l border-r border-slate-700'
                    : 'text-slate-500'
                }`}
              >
                {s.code.filename}
              </div>
            ))}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. LangChain이란 &gt; Chapter 1. LangChain 개요</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">I-1-1. LLM 직접 호출 vs LangChain</h1>
                  <p className="text-sm text-slate-500 mt-0.5">직접 요리 vs 밀키트 — 30줄 boilerplate가 5줄 파이프 체인이 되기까지</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: 라인 수 감소(70%↓)는 결과일 뿐, 진짜 이득은 <strong>같은 chain 객체</strong>에 invoke/batch/stream/ainvoke 가 모두 붙는다는 점이다. 다음(I-1-2)에서는 LangChain 전체 아키텍처 지도를 본다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['LangChain', 'ChatOpenAI', 'ChatAnthropic', 'LCEL', 'PromptTemplate', 'OutputParser', 'Runnable', '컴포넌트 조합'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브</a>
              <a href="./I-1-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">I-1-2 LangChain 아키텍처 지도 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
