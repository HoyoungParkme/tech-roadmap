    // ─────────────────────────────────────────────────────
    // 좌측 위: Raw Text 박스 — LLM 원본 출력
    //   parserState 에 따라 색상 변화 (fail → red, 정상 → slate)
    // ─────────────────────────────────────────────────────
    function RawTextBox({ raw, parserState }) {
      const isFail = parserState === 'fail';
      const labelColor = isFail ? 'text-red-600' : 'text-slate-600';
      const borderColor = isFail ? 'border-red-300' : 'border-slate-300';
      const bgColor = isFail ? 'bg-red-50' : 'bg-slate-50';
      const textColor = isFail ? 'text-red-900' : 'text-slate-800';

      return (
        <div className={`bg-white rounded-lg border-2 ${borderColor} p-3`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📨</span>
              <span className={`text-[11px] font-bold ${labelColor}`}>{raw.label}</span>
            </div>
            <span className="text-[9px] bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded font-mono">
              raw text
            </span>
          </div>
          <pre className={`${bgColor} rounded border ${borderColor} p-2 text-[10px] ${textColor} font-mono whitespace-pre-wrap leading-snug max-h-44 overflow-y-auto`}>
            {raw.text}
          </pre>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 가운데: Parser 박스 — 색상별 강조
    //   color: 'red' | 'emerald' | 'purple' | 'amber' | 'blue'
    // ─────────────────────────────────────────────────────
    function ParserBox({ parser }) {
      const colorMap = {
        red: { border: 'border-red-300', bg: 'bg-red-50', text: 'text-red-700', dot: 'bg-red-400' },
        emerald: { border: 'border-emerald-400', bg: 'bg-emerald-50', text: 'text-emerald-800', dot: 'bg-emerald-500' },
        purple: { border: 'border-purple-400', bg: 'bg-purple-50', text: 'text-purple-800', dot: 'bg-purple-500' },
        amber: { border: 'border-amber-400', bg: 'bg-amber-50', text: 'text-amber-800', dot: 'bg-amber-500' },
        blue: { border: 'border-blue-400', bg: 'bg-blue-50', text: 'text-blue-800', dot: 'bg-blue-500' },
      };
      const c = colorMap[parser.color] || colorMap.emerald;

      return (
        <div className="flex flex-col items-center gap-1">
          <div className="text-slate-400 text-sm font-mono">↓</div>
          <div className={`w-full ${c.bg} border-2 ${c.border} rounded-lg px-3 py-2 shadow-sm`}>
            <div className="flex items-center gap-2">
              <span className="text-2xl">{parser.icon}</span>
              <div className="flex-1">
                <div className={`text-[12px] font-bold ${c.text} font-mono leading-tight`}>{parser.name}</div>
                <div className={`text-[9px] ${c.text} opacity-80 mt-0.5`}>{parser.note}</div>
              </div>
              <span className={`w-2 h-2 rounded-full ${c.dot} animate-pulse`}></span>
            </div>
          </div>
          <div className="text-slate-400 text-sm font-mono">↓</div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: Parsed 박스 — 구조화 결과
    //   kind 별 다른 시각화
    //   - string : 회색 텍스트 + 경고
    //   - dict   : key/value 표
    //   - object : Pydantic 필드 표 + 타입 컬럼 + ✓ 마크
    // ─────────────────────────────────────────────────────
    function ParsedBox({ parsed, parserState }) {
      // string (실패 케이스)
      if (parsed.kind === 'string') {
        return (
          <div className="bg-white rounded-lg border-2 border-red-300 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">⚠️</span>
                <span className="text-[11px] font-bold text-red-700">파싱 결과 — string 그대로</span>
              </div>
              <span className="text-[9px] bg-red-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                type: str
              </span>
            </div>
            <div className="bg-slate-50 rounded border border-slate-200 p-2 mb-2">
              <div className="text-[10px] text-slate-700 font-mono">{parsed.value}</div>
            </div>
            <pre className="bg-red-50 border border-red-200 rounded p-2 text-[9px] text-red-700 font-mono whitespace-pre-wrap leading-snug">
              {parsed.warning}
            </pre>
          </div>
        );
      }

      // dict (Step 2 — JsonOutputParser)
      if (parsed.kind === 'dict') {
        const entries = Object.entries(parsed.value);
        return (
          <div className="bg-white rounded-lg border-2 border-emerald-400 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">✅</span>
                <span className="text-[11px] font-bold text-emerald-800">파싱 결과 — Python dict</span>
              </div>
              <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                type: dict
              </span>
            </div>
            <div className="bg-emerald-50 rounded border border-emerald-200 p-2">
              <div className="text-[9px] font-bold text-emerald-700 mb-1.5 uppercase tracking-wider">key / value</div>
              <div className="space-y-1">
                {entries.map(([k, v]) => (
                  <div key={k} className="flex items-start gap-2 text-[10px] font-mono leading-snug">
                    <span className="text-blue-700 font-bold w-14 flex-shrink-0">"{k}"</span>
                    <span className="text-slate-400">:</span>
                    <span className="text-emerald-900 flex-1 break-all">
                      {Array.isArray(v) ? `[${v.map(s => `"${s}"`).join(', ')}]` : (typeof v === 'string' ? `"${v}"` : String(v))}
                    </span>
                  </div>
                ))}
              </div>
            </div>
            <div className="text-[9px] text-emerald-700 mt-1.5">
              ✓ data["name"] · data["pros"][0] 즉시 사용 가능 — 단 타입 검증은 없음
            </div>
          </div>
        );
      }

      // object (Step 3, 4, 5 — Pydantic)
      if (parsed.kind === 'object') {
        const colorMap = {
          pydantic: { border: 'border-purple-400', bg: 'bg-purple-50', text: 'text-purple-800', tag: 'bg-purple-600' },
          fmt: { border: 'border-amber-400', bg: 'bg-amber-50', text: 'text-amber-800', tag: 'bg-amber-600' },
          structured: { border: 'border-blue-400', bg: 'bg-blue-50', text: 'text-blue-800', tag: 'bg-blue-600' },
        };
        const c = colorMap[parserState] || colorMap.pydantic;

        return (
          <div className={`bg-white rounded-lg border-2 ${c.border} p-3`}>
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">🛡️</span>
                <span className={`text-[11px] font-bold ${c.text}`}>파싱 결과 — {parsed.className} 인스턴스</span>
              </div>
              <span className={`text-[9px] ${c.tag} text-white px-1.5 py-0.5 rounded font-mono font-bold`}>
                type validated
              </span>
            </div>
            <div className={`${c.bg} rounded border ${c.border.replace('400', '200')} p-2`}>
              <div className={`text-[9px] font-bold ${c.text} mb-1.5 uppercase tracking-wider flex items-center gap-1.5`}>
                <span>field</span>
                <span className="opacity-50">/</span>
                <span>value</span>
                <span className="opacity-50">/</span>
                <span>type ✓</span>
              </div>
              <div className="space-y-1">
                {parsed.fields.map((f) => (
                  <div key={f.key} className="grid grid-cols-12 gap-1 text-[10px] font-mono leading-snug items-center">
                    <span className="col-span-3 text-blue-700 font-bold truncate">.{f.key}</span>
                    <span className={`col-span-6 ${c.text} break-all`}>{f.value}</span>
                    <span className="col-span-2 text-[8px] bg-white border border-slate-200 rounded px-1 py-0.5 text-slate-600 text-center font-mono truncate">
                      {f.type}
                    </span>
                    <span className="col-span-1 text-emerald-600 text-center font-bold">{f.ok ? '✓' : '✗'}</span>
                  </div>
                ))}
              </div>
            </div>
            {parsed.note && (
              <div className={`text-[9px] ${c.text} mt-1.5`}>
                ✨ {parsed.note}
              </div>
            )}
          </div>
        );
      }

      return null;
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   raw → parser → parsed 의 3-stage flow 시각화
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🛂 세관 검사관 — LLM raw → 구조화 객체</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-1">
            <RawTextBox raw={step.raw} parserState={step.parserState} />
            <ParserBox parser={step.parser} />
            <ParsedBox parsed={step.parsed} parserState={step.parserState} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-red-500"></span>fail (raw)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>dict
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-purple-500"></span>pydantic
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>format_inst
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-blue-500"></span>structured
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. LangChain이란 &gt; Chapter 2. 핵심 컴포넌트</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">I-2-2. OutputParser — JSON / Pydantic / List 구조화 출력</h1>
                  <p className="text-sm text-slate-500 mt-0.5">세관 검사관 5단계 — raw text → JSON dict → Pydantic 객체 → format_instructions → with_structured_output()</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: 자유 텍스트는 <strong>raw</strong>, dict 면 충분하면 <strong>JsonOutputParser</strong>, 타입 안전이 필요하면 <strong>PydanticOutputParser</strong>, 신규 코드는 <strong>with_structured_output()</strong>. 다음(II-1-1)에서는 외부 문서를 LLM 에 넣는 Document Loader 를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['OutputParser', 'JsonOutputParser', 'PydanticOutputParser', 'BaseModel', 'format_instructions', 'with_structured_output'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-2-1.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; I-2-1 PromptTemplate</a>
              <a href="../part2/II-1-1.html" className="text-emerald-700 hover:text-emerald-900 font-medium">II-1-1 Document Loaders &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
