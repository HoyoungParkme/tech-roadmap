<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — I-2-2. OutputParser</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-2-2. OutputParser
    학습 목표: LLM 출력을 구조화된 데이터(JSON, 리스트 등)로 변환할 수 있다.
    템플릿: 순차형 (Type B) — 세관 검사관 비유.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "[LLM 출력의 문제] LLM은 자유 텍스트를 출력합니다. \"파이썬은 좋은 언어입니다...\" 이런 텍스트를 코드에서 바로 쓸 수 있을까요? JSON이나 구조화된 데이터가 필요합니다.",
        phase: 'raw',
        rawText: 'Python은 1991년 귀도 반 로섬이 만든 범용 프로그래밍 언어입니다.\n장점: 읽기 쉬움, 풍부한 라이브러리, 다양한 분야에서 활용\n단점: 실행 속도가 느림, GIL 제한',
        parsed: null,
        parserType: null,
        code: [
          { line: '# LLM은 자유 텍스트를 출력한다', highlight: false },
          { line: 'response = model.invoke("파이썬에 대해 알려줘")', highlight: false },
          { line: '', highlight: false },
          { line: '# response.content:', highlight: false },
          { line: '# "Python은 1991년 귀도 반 로섬이 만든..."', highlight: true },
          { line: '#  ↑ 자유 텍스트 — 구조화 안 됨!', highlight: true },
        ],
      },
      {
        desc: "[StrOutputParser] 가장 단순한 파서. AIMessage 객체에서 content 문자열만 깔끔하게 추출합니다. 세관에서 포장(AIMessage)을 벗기고 내용물(text)만 꺼내는 것.",
        phase: 'str',
        rawText: 'AIMessage(content="Python은 1991년 귀도 반 로섬이 만든...")',
        parsed: '"Python은 1991년 귀도 반 로섬이 만든 범용 프로그래밍 언어입니다."',
        parserType: { name: 'StrOutputParser', icon: '📋', desc: '문자열만 추출' },
        code: [
          { line: 'from langchain_core.output_parsers import StrOutputParser', highlight: false },
          { line: '', highlight: false },
          { line: 'parser = StrOutputParser()', highlight: true },
          { line: '', highlight: false },
          { line: '# AIMessage → 순수 문자열', highlight: false },
          { line: 'text = parser.invoke(ai_message)', highlight: true },
          { line: '# → "Python은 1991년 귀도 반 로섬이 만든..."', highlight: false },
        ],
      },
      {
        desc: "[JsonOutputParser] LLM에게 JSON 형식으로 답하라고 요청하고, 응답을 파이썬 딕셔너리로 변환합니다. 세관 검사관이 내용물을 정해진 규격 상자에 다시 담는 것.",
        phase: 'json',
        rawText: '```json\n{"name": "Python", "year": 1991,\n "pros": ["읽기 쉬움", "풍부한 라이브러리"],\n "cons": ["실행 속도 느림"]}\n```',
        parsed: '{\n  "name": "Python",\n  "year": 1991,\n  "pros": ["읽기 쉬움", "풍부한 라이브러리"],\n  "cons": ["실행 속도 느림"]\n}',
        parserType: { name: 'JsonOutputParser', icon: '📦', desc: 'JSON → dict 변환' },
        code: [
          { line: 'from langchain_core.output_parsers import JsonOutputParser', highlight: false },
          { line: '', highlight: false },
          { line: 'parser = JsonOutputParser()', highlight: true },
          { line: '', highlight: false },
          { line: '# LLM이 JSON으로 답하면 → dict로 파싱', highlight: false },
          { line: 'data = parser.invoke(ai_message)', highlight: true },
          { line: '# → {"name": "Python", "year": 1991, ...}', highlight: false },
          { line: 'print(data["name"])  # "Python"', highlight: false },
        ],
      },
      {
        desc: "[PydanticOutputParser] 가장 강력한 파서. Pydantic 모델로 스키마를 정의하면, LLM 출력을 타입이 검증된 객체로 변환합니다. 세관에서 X-ray까지 쏘는 것.",
        phase: 'pydantic',
        rawText: '{"name": "Python", "year": 1991, "pros": [...]}',
        parsed: 'LanguageInfo(\n  name="Python",      # str ✅\n  year=1991,          # int ✅\n  pros=["읽기 쉬움", ...],  # List[str] ✅\n  cons=["속도 느림"]  # List[str] ✅\n)',
        parserType: { name: 'PydanticOutputParser', icon: '🛡️', desc: '타입 검증 + 객체 변환' },
        code: [
          { line: 'from langchain_core.output_parsers import PydanticOutputParser', highlight: false },
          { line: 'from pydantic import BaseModel', highlight: false },
          { line: '', highlight: false },
          { line: 'class LanguageInfo(BaseModel):', highlight: true },
          { line: '    name: str', highlight: true },
          { line: '    year: int', highlight: true },
          { line: '    pros: list[str]', highlight: true },
          { line: '    cons: list[str]', highlight: true },
          { line: '', highlight: false },
          { line: 'parser = PydanticOutputParser(', highlight: false },
          { line: '    pydantic_object=LanguageInfo)', highlight: false },
          { line: 'result = parser.invoke(ai_message)', highlight: false },
          { line: '# → LanguageInfo(name="Python", ...)', highlight: false },
        ],
      },
      {
        desc: "[정리] OutputParser는 세관 검사관입니다. StrOutputParser(포장만 벗기기) → JsonOutputParser(규격 상자에 담기) → PydanticOutputParser(X-ray 검증까지). 용도에 맞게 선택하세요.",
        phase: 'summary',
        rawText: null,
        parsed: null,
        parserType: null,
        code: [
          { line: '# 체인에서 파서 사용 (LCEL)', highlight: false },
          { line: '', highlight: false },
          { line: '# 간단한 텍스트 응답', highlight: false },
          { line: 'chain1 = prompt | model | StrOutputParser()', highlight: true },
          { line: '', highlight: false },
          { line: '# JSON 응답', highlight: false },
          { line: 'chain2 = prompt | model | JsonOutputParser()', highlight: true },
          { line: '', highlight: false },
          { line: '# 타입 검증된 객체', highlight: false },
          { line: 'chain3 = prompt | model | PydanticOutputParser(...)', highlight: true },
        ],
        parsers: [
          { name: 'StrOutputParser', icon: '📋', desc: '문자열 추출', level: '기본', color: 'bg-emerald-50 border-emerald-200 text-emerald-800' },
          { name: 'JsonOutputParser', icon: '📦', desc: 'dict 변환', level: '중급', color: 'bg-blue-50 border-blue-200 text-blue-800' },
          { name: 'PydanticOutputParser', icon: '🛡️', desc: '타입 검증', level: '고급', color: 'bg-purple-50 border-purple-200 text-purple-800' },
        ],
      },
    ];

    function ConversionVisual({ rawText, parsed, parserType }) {
      return (
        <div className="space-y-3">
          {rawText && (
            <div>
              <div className="text-xs font-medium text-red-500 mb-1">LLM 출력 (자유 텍스트)</div>
              <pre className="bg-red-50 border border-red-200 rounded-lg p-3 text-xs text-red-800 whitespace-pre-wrap font-mono">{rawText}</pre>
            </div>
          )}

          {parserType && (
            <div className="flex items-center justify-center gap-2 py-2">
              <span className="text-xl">↓</span>
              <div className={`flex items-center gap-2 px-4 py-2 rounded-xl border-2 bg-indigo-50 border-indigo-300 shadow-sm`}>
                <span className="text-xl">{parserType.icon}</span>
                <div>
                  <div className="font-bold text-sm text-indigo-800">{parserType.name}</div>
                  <div className="text-xs text-indigo-600">{parserType.desc}</div>
                </div>
              </div>
              <span className="text-xl">↓</span>
            </div>
          )}

          {parsed && (
            <div>
              <div className="text-xs font-medium text-emerald-600 mb-1">파싱된 결과 (구조화 데이터)</div>
              <pre className="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-xs text-emerald-800 whitespace-pre-wrap font-mono">{parsed}</pre>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">

            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-indigo-700 hover:text-indigo-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. LangChain이란 &gt; Chapter 2. 핵심 컴포넌트</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-2-2. OutputParser</h1>
                </div>
              </div>
              <p className="text-slate-600">
                LLM은 자유 텍스트를 출력합니다. OutputParser는 <b>세관 검사관</b> — 텍스트를 JSON, 리스트, Pydantic 객체로 변환합니다.
              </p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-indigo-700 border-indigo-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">OutputParser 동작</h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">

              {/* 왼쪽: 시각화 */}
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {stepData.phase === 'summary' ? (
                  <div>
                    <div className="text-xs font-bold text-indigo-600 uppercase tracking-wider mb-4">OutputParser 종류 비교</div>
                    <div className="space-y-3">
                      {stepData.parsers.map((p, i) => (
                        <div key={i} className={`flex items-center gap-3 p-4 rounded-xl border-2 ${p.color}`}>
                          <span className="text-3xl">{p.icon}</span>
                          <div className="flex-1">
                            <div className="font-bold text-sm">{p.name}</div>
                            <div className="text-xs mt-0.5">{p.desc}</div>
                          </div>
                          <span className="text-xs font-medium px-2 py-1 rounded-full bg-white/60 border">{p.level}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : (
                  <ConversionVisual
                    rawText={stepData.rawText}
                    parsed={stepData.parsed}
                    parserType={stepData.parserType}
                  />
                )}
              </div>

              {/* 오른쪽: 코드 */}
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (
                    <div key={i} className={l.highlight ? 'bg-indigo-900/40 -mx-4 px-4' : ''}>
                      {l.line || '\u00A0'}
                    </div>
                  ))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['StrOutputParser', 'JsonOutputParser', 'PydanticOutputParser'].map(kw => (
                <span key={kw} className="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-sm font-medium border border-indigo-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-indigo-600 hover:bg-indigo-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./I-2-1.html" className="text-indigo-600 hover:text-indigo-800 font-medium">&larr; I-2-1. PromptTemplate</a>
              <a href="../part2/II-1-1.html" className="text-indigo-600 hover:text-indigo-800 font-medium">II-1-1. Document Loaders &rarr;</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
