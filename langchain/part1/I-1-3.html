  <!--
    I-1-3. LCEL (LangChain Expression Language) — `prompt | model | output_parser`
    학습 목표: LCEL 파이프(|)로 체인을 구성하고, invoke / stream / async / batch 4가지 실행 모드를 이해한다.
    핵심 비유: Unix 파이프 — 앞 단계의 출력이 다음 단계의 입력
    패턴: fastapi v1 — 좌(LiveDataPane: 5노드 흐름 다이어그램 + 데이터 변환) / 우(VSCode CodeViewer)
    색상: langchain emerald
    Steps:
      1) basic        — prompt | model | parser
      2) parallel     — RunnableParallel · RunnableLambda
      3) stream       — chain.stream(...)
      4) async        — chain.ainvoke(...)
      5) batch        — chain.batch([...])
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 흐름 다이어그램 노드 — input → prompt → model → parser → output
    //   각 step의 activeNodes 가 어느 노드를 emerald glow로 활성화할지 결정
    // ─────────────────────────────────────────────────────
    const FLOW_NODES = [
      { id: 'input',  icon: '📨', label: 'input',  sub: 'dict' },
      { id: 'prompt', icon: '📝', label: 'prompt', sub: 'PromptTemplate' },
      { id: 'model',  icon: '🤖', label: 'model',  sub: 'ChatOpenAI' },
      { id: 'parser', icon: '🔍', label: 'parser', sub: 'StrOutputParser' },
      { id: 'output', icon: '📤', label: 'output', sub: 'str' },
    ];

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의
    //   activeNodes : 활성화되는 노드 id 배열 (emerald glow + 진한 색)
    //   flowEdges   : 흐르는 화살표 인덱스 (0=input→prompt, 1=prompt→model, ...)
    //   transforms  : 각 노드 사이 데이터 변환 시각화 [{ from, to, value }]
    //   mode        : 'invoke' | 'parallel' | 'stream' | 'async' | 'batch'
    //   modeBox     : 실행 모드별 사이드 박스 (스트림 chunk / async 동시 / batch 표 등)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      // ─── Step 1. 기본 ─────────────────────────────────
      {
        title: 'Step 1. 기본 — prompt | model | output_parser',
        desc: 'LCEL의 핵심은 Unix 파이프(|)다. prompt | model | parser 로 세 컴포넌트를 연결하면, 앞 단계의 출력이 다음 단계의 입력으로 자동 흘러간다. invoke({"topic": "파이썬"}) 한 번이면 dict → ChatPromptValue → AIMessage → str 까지 한 번에 흐른다.',
        mode: 'invoke',
        activeNodes: ['input', 'prompt', 'model', 'parser', 'output'],
        flowEdges: [0, 1, 2, 3],
        transforms: [
          { from: 'input',  to: 'prompt', value: '{"topic": "파이썬"}', kind: 'dict' },
          { from: 'prompt', to: 'model',  value: 'ChatPromptValue(HumanMessage("파이썬에 대해..."))', kind: 'prompt' },
          { from: 'model',  to: 'parser', value: 'AIMessage(content="파이썬은 읽기 쉬운...")', kind: 'message' },
          { from: 'parser', to: 'output', value: '"파이썬은 읽기 쉬운 범용 프로그래밍 언어다."', kind: 'str' },
        ],
        modeBox: {
          kind: 'invoke',
          input: '{"topic": "파이썬"}',
          output: '"파이썬은 읽기 쉬운 범용 프로그래밍 언어다."',
          latencyMs: 820,
        },
        code: {
          lang: 'python',
          filename: 'basic.py',
          lines: [
            '# Step 1. 기본 LCEL 체인 — prompt | model | output_parser',
            'from langchain_core.prompts import ChatPromptTemplate',
            'from langchain_core.output_parsers import StrOutputParser',
            'from langchain_openai import ChatOpenAI',
            '',
            '# 1) 컴포넌트 3개 정의',
            'prompt = ChatPromptTemplate.from_template(',
            '    "{topic}에 대해 한 줄로 설명해줘"',
            ')',
            'model = ChatOpenAI(model="gpt-4o-mini")',
            'parser = StrOutputParser()',
            '',
            '# 2) | 파이프로 체인 조립 — Unix 파이프와 같은 개념',
            '#    앞 단계 출력 → 뒷 단계 입력으로 자동 전달',
            'chain = prompt | model | parser',
            '',
            '# 3) invoke — 단건 동기 실행',
            'result = chain.invoke({"topic": "파이썬"})',
            '#  → "파이썬은 읽기 쉬운 범용 프로그래밍 언어다."',
            '',
            '# ─── 흐름 ───',
            '#   dict → ChatPromptValue → AIMessage → str',
            '',
            '# 모든 LCEL 컴포넌트는 Runnable 인터페이스를 구현 →',
            '# invoke / stream / batch / ainvoke 4 메서드를 무료로 얻는다.',
          ],
          highlight: [1, 2, 3, 6, 7, 8, 9, 10, 13, 14, 17, 18],
        },
      },

      // ─── Step 2. 확장 ─────────────────────────────────
      {
        title: 'Step 2. 확장 — RunnableParallel · RunnableLambda',
        desc: 'LCEL은 단순 파이프를 넘어 분기·병합·변환까지 표현한다. RunnableParallel 은 같은 입력을 여러 체인에 동시에 흘려 dict 로 합치고, RunnableLambda 는 임의의 파이썬 함수를 체인에 끼워 넣는다. "한 토픽 → 요약 + 키워드 + 길이" 같은 멀티 출력에 자주 쓴다.',
        mode: 'parallel',
        activeNodes: ['input', 'prompt', 'model', 'parser', 'output'],
        flowEdges: [0, 1, 2, 3],
        transforms: [
          { from: 'input',  to: 'prompt', value: '{"topic": "파이썬"}', kind: 'dict' },
          { from: 'prompt', to: 'model',  value: 'RunnableParallel(summary, keyword, length)', kind: 'parallel' },
          { from: 'model',  to: 'parser', value: '3개 체인 동시 실행', kind: 'parallel' },
          { from: 'parser', to: 'output', value: '{summary: "...", keyword: [...], length: 3}', kind: 'dict' },
        ],
        modeBox: {
          kind: 'parallel',
          branches: [
            { name: 'summary', desc: 'prompt | model | parser', out: '"파이썬은 읽기 쉬운..."' },
            { name: 'keyword', desc: 'prompt2 | model | jsonParser', out: '["프로그래밍", "범용", "쉬움"]' },
            { name: 'length',  desc: 'RunnableLambda(len)', out: '5' },
          ],
        },
        code: {
          lang: 'python',
          filename: 'parallel.py',
          lines: [
            '# Step 2. RunnableParallel · RunnableLambda — 분기/병합/변환',
            'from langchain_core.runnables import RunnableParallel, RunnableLambda',
            'from langchain_core.prompts import ChatPromptTemplate',
            'from langchain_core.output_parsers import StrOutputParser, JsonOutputParser',
            'from langchain_openai import ChatOpenAI',
            '',
            'model = ChatOpenAI(model="gpt-4o-mini")',
            '',
            '# 1) 같은 입력을 받는 작은 체인 2개',
            'summary_chain = (',
            '    ChatPromptTemplate.from_template("{topic} 한 줄 설명")',
            '    | model | StrOutputParser()',
            ')',
            'keyword_chain = (',
            '    ChatPromptTemplate.from_template("{topic} 핵심 키워드 3개를 JSON 배열로만.")',
            '    | model | JsonOutputParser()',
            ')',
            '',
            '# 2) RunnableLambda — 파이썬 함수도 체인에 꽂는다',
            'length_chain = RunnableLambda(lambda x: len(x["topic"]))',
            '',
            '# 3) RunnableParallel — 입력 1개를 3 체인에 분기 → dict 로 병합',
            'multi = RunnableParallel(',
            '    summary=summary_chain,',
            '    keyword=keyword_chain,',
            '    length=length_chain,',
            ')',
            '',
            'result = multi.invoke({"topic": "파이썬"})',
            '#  → {"summary": "파이썬은 ...",',
            '#      "keyword": ["프로그래밍", "범용", "쉬움"],',
            '#      "length":   3}',
            '',
            '# ✨ 3개 체인이 병렬 실행 → 가장 느린 한 체인의 시간만 소요',
          ],
          highlight: [1, 9, 10, 11, 12, 13, 14, 15, 16, 19, 20, 22, 23, 24, 25, 26, 28],
        },
      },

      // ─── Step 3. Streaming ────────────────────────────
      {
        title: 'Step 3. Streaming — chain.stream()',
        desc: 'invoke 는 응답이 다 끝날 때까지 기다린다. stream 은 토큰이 생기는 대로 chunk 단위로 즉시 yield 한다. 사용자에게 "타자치는 듯한" UX를 줄 수 있고, 첫 토큰까지의 체감 지연(TTFT)이 1/10로 줄어든다. 모든 LCEL 체인은 자동으로 stream 을 지원한다.',
        mode: 'stream',
        activeNodes: ['input', 'prompt', 'model', 'parser', 'output'],
        flowEdges: [0, 1, 2, 3],
        transforms: [
          { from: 'input',  to: 'prompt', value: '{"topic": "파이썬"}', kind: 'dict' },
          { from: 'prompt', to: 'model',  value: 'ChatPromptValue(...)', kind: 'prompt' },
          { from: 'model',  to: 'parser', value: '◐ chunk #1  ◐ chunk #2  ◐ chunk #3 …', kind: 'chunks' },
          { from: 'parser', to: 'output', value: 'yield "파"  yield "이썬은"  yield " 읽기" …', kind: 'stream' },
        ],
        modeBox: {
          kind: 'stream',
          chunks: ['파', '이썬은', ' 읽기', ' 쉬운', ' 범용', ' 프로그래밍', ' 언어다.'],
          ttftMs: 95,
          totalMs: 820,
        },
        code: {
          lang: 'python',
          filename: 'stream.py',
          lines: [
            '# Step 3. Streaming — chain.stream() 으로 토큰 실시간 yield',
            'from langchain_core.prompts import ChatPromptTemplate',
            'from langchain_core.output_parsers import StrOutputParser',
            'from langchain_openai import ChatOpenAI',
            '',
            'chain = (',
            '    ChatPromptTemplate.from_template("{topic}에 대해 한 줄로 설명해줘")',
            '    | ChatOpenAI(model="gpt-4o-mini")',
            '    | StrOutputParser()',
            ')',
            '',
            '# 1) stream — 제너레이터 반환, chunk 단위로 yield',
            'for chunk in chain.stream({"topic": "파이썬"}):',
            '    print(chunk, end="", flush=True)',
            '#  → 파|이썬은| 읽기| 쉬운| 범용| 프로그래밍| 언어다.',
            '#    (실시간으로 타자치듯 출력)',
            '',
            '# ✨ TTFT (Time To First Token)',
            '#   invoke : 820ms (모든 토큰 생성 대기)',
            '#   stream :  95ms (첫 토큰 즉시) — 체감 지연 1/10',
            '',
            '# 💡 활용: 챗봇 UI · 라이브 코드 생성 · 긴 글 작성',
            '',
            '# ⚠ 주의: JSON 등 한번에 모아야 하는 후처리는 stream 효과 ↓',
            '#         → JsonOutputParser 같은 streaming-aware 파서 사용',
          ],
          highlight: [1, 6, 7, 8, 9, 10, 12, 13, 14, 18, 19, 20],
        },
      },

      // ─── Step 4. Async ────────────────────────────────
      {
        title: 'Step 4. Async — chain.ainvoke()',
        desc: '동기 invoke 는 LLM 응답이 올 때까지 스레드를 막는다. ainvoke 는 await 키워드로 코루틴을 반환하므로, asyncio.gather 로 여러 호출을 동시에 띄울 수 있다. FastAPI 핸들러나 동시 사용자가 많은 서비스에서 처리량을 N배로 끌어올린다.',
        mode: 'async',
        activeNodes: ['input', 'prompt', 'model', 'parser', 'output'],
        flowEdges: [0, 1, 2, 3],
        transforms: [
          { from: 'input',  to: 'prompt', value: '[t1, t2, t3]  # 3 topics', kind: 'list' },
          { from: 'prompt', to: 'model',  value: 'await asyncio.gather(*ainvoke)', kind: 'async' },
          { from: 'model',  to: 'parser', value: '동시 await — IO 대기 공유', kind: 'async' },
          { from: 'parser', to: 'output', value: '[r1, r2, r3]  # 동시 반환', kind: 'list' },
        ],
        modeBox: {
          kind: 'async',
          tasks: [
            { name: 'task #1: 파이썬', t0: 0,   t1: 820 },
            { name: 'task #2: 자바',   t0: 5,   t1: 760 },
            { name: 'task #3: Go',    t0: 10,  t1: 880 },
          ],
          syncTotalMs: 2460,
          asyncTotalMs: 880,
        },
        code: {
          lang: 'python',
          filename: 'async.py',
          lines: [
            '# Step 4. Async — chain.ainvoke() 로 코루틴 반환',
            'import asyncio',
            'from langchain_core.prompts import ChatPromptTemplate',
            'from langchain_core.output_parsers import StrOutputParser',
            'from langchain_openai import ChatOpenAI',
            '',
            'chain = (',
            '    ChatPromptTemplate.from_template("{topic}에 대해 한 줄로 설명해줘")',
            '    | ChatOpenAI(model="gpt-4o-mini")',
            '    | StrOutputParser()',
            ')',
            '',
            '# 1) 단건 async',
            'async def one(topic: str) -> str:',
            '    return await chain.ainvoke({"topic": topic})',
            '',
            '# 2) 여러 호출을 동시에 — asyncio.gather',
            'async def main() -> list[str]:',
            '    topics = ["파이썬", "자바", "Go"]',
            '    return await asyncio.gather(',
            '        *[chain.ainvoke({"topic": t}) for t in topics],',
            '    )',
            '',
            'results = asyncio.run(main())',
            '#  → ["파이썬은 ...", "자바는 ...", "Go는 ..."]',
            '',
            '# ─── 처리량 비교 (3건, 각 ~820ms) ───',
            '#   동기 invoke 직렬 : 820 × 3 = 2460ms',
            '#   async ainvoke   : max(...) ≈ 880ms  → 2.8× throughput',
            '',
            '# 💡 활용: FastAPI async 엔드포인트 · 동시 사용자 100+ 챗봇',
            '#         · RAG 의 retrieve / rerank / generate 병렬 실행',
            '# ⚠ I/O 바운드만 빨라짐 — CPU 바운드는 process pool 필요',
          ],
          highlight: [1, 7, 8, 9, 10, 11, 13, 14, 16, 17, 18, 19, 20, 21, 23],
        },
      },

      // ─── Step 5. Batch ────────────────────────────────
      {
        title: 'Step 5. Batch — chain.batch([...])',
        desc: 'batch 는 여러 입력을 한 번에 모아 처리한다. 내부적으로 thread/asyncio로 자동 병렬화 되며, max_concurrency 로 동시 호출 수를 제어한다. 평가 데이터셋·대량 임베딩·일괄 분류 같은 오프라인 잡에 가장 적합한 실행 모드다.',
        mode: 'batch',
        activeNodes: ['input', 'prompt', 'model', 'parser', 'output'],
        flowEdges: [0, 1, 2, 3],
        transforms: [
          { from: 'input',  to: 'prompt', value: '[t1, t2, t3, t4, t5]  # 5 topics', kind: 'list' },
          { from: 'prompt', to: 'model',  value: '5개 입력 → prompt 5번', kind: 'batch' },
          { from: 'model',  to: 'parser', value: 'max_concurrency=3 (3씩 묶어 호출)', kind: 'batch' },
          { from: 'parser', to: 'output', value: '[r1..r5]  # 입력 순서 보장', kind: 'list' },
        ],
        modeBox: {
          kind: 'batch',
          rows: [
            { idx: 0, topic: '파이썬', status: 'done', out: '"파이썬은 읽기 쉬운..."' },
            { idx: 1, topic: '자바',   status: 'done', out: '"자바는 객체지향..."' },
            { idx: 2, topic: 'Go',    status: 'done', out: '"Go는 동시성..."' },
            { idx: 3, topic: 'Rust',  status: 'run',  out: '◐ generating...' },
            { idx: 4, topic: 'TS',    status: 'wait', out: '⌛ queued' },
          ],
          maxConcurrency: 3,
          totalMs: 1640,
        },
        code: {
          lang: 'python',
          filename: 'batch.py',
          lines: [
            '# Step 5. Batch — chain.batch() 로 일괄 처리',
            'from langchain_core.prompts import ChatPromptTemplate',
            'from langchain_core.output_parsers import StrOutputParser',
            'from langchain_core.runnables import RunnableConfig',
            'from langchain_openai import ChatOpenAI',
            '',
            'chain = (',
            '    ChatPromptTemplate.from_template("{topic}에 대해 한 줄로 설명해줘")',
            '    | ChatOpenAI(model="gpt-4o-mini")',
            '    | StrOutputParser()',
            ')',
            '',
            '# 1) batch — 입력 list 를 한번에 처리, 결과도 list (순서 보장)',
            'inputs = [',
            '    {"topic": t}',
            '    for t in ["파이썬", "자바", "Go", "Rust", "TypeScript"]',
            ']',
            'results = chain.batch(inputs)',
            '#  → ["파이썬은 ...", "자바는 ...", "Go는 ...", "Rust는 ...", "TS는 ..."]',
            '',
            '# 2) max_concurrency — 동시 호출 수 제한 (rate-limit 보호)',
            'results = chain.batch(',
            '    inputs,',
            '    config=RunnableConfig(max_concurrency=3),',
            ')',
            '# → 한번에 최대 3건만 동시 호출, 나머지는 큐 대기',
            '',
            '# 3) abatch — async 버전',
            '#    results = await chain.abatch(inputs)',
            '',
            '# ─── 5건 처리 시간 비교 (각 ~820ms) ───',
            '#   직렬 invoke ×5     : 4100ms',
            '#   batch (concurr 3)  : 1640ms  (2 그룹)',
            '#   batch (concurr 5)  :  820ms  (모두 동시)',
            '',
            '# 💡 활용: 평가 데이터셋 채점 · 임베딩 / 분류 대량 처리',
            '#         · LangSmith dataset evaluation',
            '# ⚠ rate-limit 주의 → max_concurrency 로 보호',
          ],
          highlight: [1, 7, 8, 9, 10, 11, 13, 14, 15, 16, 17, 18, 21, 22, 23, 24, 25],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // FlowDiagram — 5노드 흐름 다이어그램 (좌측 상단)
    //   activeNodes 에 들어있는 노드 id 만 emerald glow
    //   flowEdges 인덱스의 화살표만 흐르는 점 애니메이션
    // ─────────────────────────────────────────────────────
    function FlowDiagram({ activeNodes, flowEdges, mode }) {
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🔗</span>
              <span className="text-[11px] font-bold text-emerald-800">LCEL Pipeline · prompt | model | parser</span>
            </div>
            <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono uppercase font-bold">
              {mode}
            </span>
          </div>

          <div className="flex items-stretch gap-1 overflow-x-auto pb-1">
            {FLOW_NODES.map((node, idx) => {
              const isActive = activeNodes.includes(node.id);
              return (
                <React.Fragment key={node.id}>
                  <div
                    className={`flex flex-col items-center justify-center px-2 py-2 rounded-lg border-2 transition-all duration-500 min-w-[70px] ${
                      isActive
                        ? 'bg-emerald-50 border-emerald-500 emerald-glow scale-105'
                        : 'bg-slate-50 border-slate-200 opacity-50'
                    }`}
                  >
                    <span className="text-xl mb-0.5">{node.icon}</span>
                    <span className={`text-[10px] font-bold ${isActive ? 'text-emerald-800' : 'text-slate-500'}`}>
                      {node.label}
                    </span>
                    <span className={`text-[8px] font-mono mt-0.5 ${isActive ? 'text-emerald-600' : 'text-slate-400'}`}>
                      {node.sub}
                    </span>
                  </div>
                  {idx < FLOW_NODES.length - 1 && (
                    <div className="flex flex-col items-center justify-center w-6 relative">
                      <div className={`text-base font-bold transition-colors ${
                        flowEdges.includes(idx) ? 'text-emerald-500' : 'text-slate-300'
                      }`}>
                        |
                      </div>
                      {flowEdges.includes(idx) && (
                        <div className="absolute w-1.5 h-1.5 rounded-full bg-emerald-400 flow-dot"
                             style={{ animationDelay: `${idx * 0.15}s` }} />
                      )}
                    </div>
                  )}
                </React.Fragment>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // TransformStrip — 노드 사이 데이터 변환 시각화
    //   각 transform 을 input → arrow → output 형태로 표시
    // ─────────────────────────────────────────────────────
    function TransformStrip({ transforms }) {
      const kindColor = {
        dict:     'bg-amber-50 border-amber-300 text-amber-900',
        prompt:   'bg-orange-50 border-orange-300 text-orange-900',
        message:  'bg-indigo-50 border-indigo-300 text-indigo-900',
        str:      'bg-emerald-50 border-emerald-300 text-emerald-900',
        list:     'bg-sky-50 border-sky-300 text-sky-900',
        chunks:   'bg-fuchsia-50 border-fuchsia-300 text-fuchsia-900',
        stream:   'bg-fuchsia-50 border-fuchsia-300 text-fuchsia-900',
        parallel: 'bg-purple-50 border-purple-300 text-purple-900',
        async:    'bg-cyan-50 border-cyan-300 text-cyan-900',
        batch:    'bg-teal-50 border-teal-300 text-teal-900',
      };
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">🔄</span>
            <span className="text-[11px] font-bold text-emerald-800">데이터 변환 — 노드 사이 흐름</span>
          </div>
          <div className="space-y-1.5">
            {transforms.map((t, i) => (
              <div key={i} className="flex items-center gap-1.5 text-[10px]">
                <span className="font-mono font-bold text-slate-500 w-12 text-right shrink-0">
                  {t.from}
                </span>
                <span className="text-emerald-500 font-bold">→</span>
                <span className="font-mono font-bold text-slate-500 w-14 shrink-0">
                  {t.to}
                </span>
                <pre className={`flex-1 px-2 py-1 rounded border text-[9px] font-mono whitespace-pre leading-tight ${
                  kindColor[t.kind] || 'bg-slate-50 border-slate-200 text-slate-700'
                }`}>{t.value}</pre>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // ModeBox — 실행 모드별 결과 박스
    //   invoke / parallel / stream / async / batch 5종
    // ─────────────────────────────────────────────────────
    function ModeBox({ box }) {
      if (box.kind === 'invoke') {
        return (
          <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">⚡</span>
                <span className="text-[11px] font-bold text-emerald-800">chain.invoke() — 단건 동기</span>
              </div>
              <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                {box.latencyMs}ms
              </span>
            </div>
            <div className="bg-white rounded border border-emerald-200 p-2 mb-1.5">
              <div className="text-[9px] font-bold text-amber-700 mb-0.5 uppercase tracking-wider">input</div>
              <div className="text-[10px] font-mono text-slate-800">{box.input}</div>
            </div>
            <div className="text-center text-emerald-500 text-[10px] font-mono mb-1">↓ chain ↓</div>
            <div className="bg-white rounded border-2 border-emerald-400 p-2">
              <div className="text-[9px] font-bold text-emerald-700 mb-0.5 uppercase tracking-wider">output</div>
              <div className="text-[10px] font-mono text-emerald-900">{box.output}</div>
            </div>
          </div>
        );
      }

      if (box.kind === 'parallel') {
        return (
          <div className="bg-purple-50 border-2 border-purple-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">🌿</span>
              <span className="text-[11px] font-bold text-purple-800">RunnableParallel — 분기 → dict 병합</span>
            </div>
            <div className="space-y-1.5">
              {box.branches.map((b, i) => (
                <div key={i} className="bg-white rounded border-2 border-purple-200 p-2">
                  <div className="flex items-center gap-1.5 mb-0.5">
                    <span className="text-[9px] bg-purple-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                      {b.name}
                    </span>
                    <span className="text-[9px] font-mono text-purple-600">{b.desc}</span>
                  </div>
                  <div className="text-[10px] font-mono text-slate-800 ml-1">
                    → {b.out}
                  </div>
                </div>
              ))}
            </div>
            <div className="text-[9px] text-purple-700 mt-1.5">
              ✨ 3개 체인이 동시 실행 → 가장 느린 한 개의 시간만 소요
            </div>
          </div>
        );
      }

      if (box.kind === 'stream') {
        return (
          <div className="bg-fuchsia-50 border-2 border-fuchsia-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">📡</span>
                <span className="text-[11px] font-bold text-fuchsia-800">chain.stream() — token chunk yield</span>
              </div>
              <span className="text-[9px] bg-fuchsia-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                TTFT {box.ttftMs}ms
              </span>
            </div>
            <div className="bg-white rounded border border-fuchsia-200 p-2 mb-1.5">
              <div className="text-[9px] font-bold text-fuchsia-700 mb-1 uppercase tracking-wider">실시간 chunk 흐름</div>
              <div className="flex flex-wrap gap-1">
                {box.chunks.map((c, i) => (
                  <span
                    key={i}
                    className="text-[10px] font-mono bg-fuchsia-100 border border-fuchsia-300 px-1.5 py-0.5 rounded text-fuchsia-900"
                    style={{ animationDelay: `${i * 0.1}s` }}
                  >
                    {c}
                  </span>
                ))}
                <span className="text-fuchsia-500 text-[11px] font-bold animate-pulse">▌</span>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-1.5 text-[9px]">
              <div className="bg-white rounded border border-slate-200 p-1.5">
                <div className="text-slate-500">invoke</div>
                <div className="font-mono font-bold text-slate-700">{box.totalMs}ms (대기)</div>
              </div>
              <div className="bg-white rounded border border-fuchsia-300 p-1.5">
                <div className="text-fuchsia-700">stream TTFT</div>
                <div className="font-mono font-bold text-fuchsia-800">{box.ttftMs}ms (즉시)</div>
              </div>
            </div>
          </div>
        );
      }

      if (box.kind === 'async') {
        return (
          <div className="bg-cyan-50 border-2 border-cyan-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">🚀</span>
                <span className="text-[11px] font-bold text-cyan-800">asyncio.gather(*ainvoke) — 동시 await</span>
              </div>
              <span className="text-[9px] bg-cyan-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                ×{(box.syncTotalMs / box.asyncTotalMs).toFixed(1)} faster
              </span>
            </div>
            <div className="bg-white rounded border border-cyan-200 p-2 mb-1.5">
              <div className="text-[9px] font-bold text-cyan-700 mb-1 uppercase tracking-wider">3개 task 타임라인</div>
              <div className="space-y-1">
                {box.tasks.map((t, i) => (
                  <div key={i} className="flex items-center gap-1.5">
                    <span className="text-[9px] font-mono text-cyan-700 w-24 shrink-0">{t.name}</span>
                    <div className="flex-1 h-3 bg-slate-100 rounded relative overflow-hidden">
                      <div
                        className="absolute top-0 h-3 bg-cyan-400 rounded"
                        style={{ left: `${(t.t0 / 1000) * 100}%`, width: `${((t.t1 - t.t0) / 1000) * 100}%` }}
                      />
                    </div>
                    <span className="text-[9px] font-mono text-cyan-700 w-12 text-right">{t.t1 - t.t0}ms</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="grid grid-cols-2 gap-1.5 text-[9px]">
              <div className="bg-white rounded border border-slate-200 p-1.5">
                <div className="text-slate-500">동기 직렬</div>
                <div className="font-mono font-bold text-slate-700">{box.syncTotalMs}ms</div>
              </div>
              <div className="bg-white rounded border border-cyan-300 p-1.5">
                <div className="text-cyan-700">async 동시</div>
                <div className="font-mono font-bold text-cyan-800">{box.asyncTotalMs}ms</div>
              </div>
            </div>
          </div>
        );
      }

      if (box.kind === 'batch') {
        return (
          <div className="bg-teal-50 border-2 border-teal-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">📦</span>
                <span className="text-[11px] font-bold text-teal-800">chain.batch() — 일괄 처리</span>
              </div>
              <span className="text-[9px] bg-teal-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                concurr={box.maxConcurrency} · {box.totalMs}ms
              </span>
            </div>
            <div className="bg-white rounded border border-teal-200 overflow-hidden">
              <div className="grid grid-cols-12 gap-1 px-2 py-1 bg-teal-100 text-[9px] font-bold text-teal-800 uppercase tracking-wider">
                <div className="col-span-1">#</div>
                <div className="col-span-3">topic</div>
                <div className="col-span-2">status</div>
                <div className="col-span-6">output</div>
              </div>
              {box.rows.map((r) => {
                const statusColor =
                  r.status === 'done' ? 'bg-emerald-500 text-white' :
                  r.status === 'run'  ? 'bg-amber-500 text-white animate-pulse' :
                  'bg-slate-300 text-slate-600';
                return (
                  <div key={r.idx} className="grid grid-cols-12 gap-1 px-2 py-1 border-t border-teal-100 text-[9px] font-mono items-center">
                    <div className="col-span-1 text-slate-500">{r.idx}</div>
                    <div className="col-span-3 text-teal-800 font-bold">{r.topic}</div>
                    <div className="col-span-2">
                      <span className={`px-1.5 py-0.5 rounded font-bold uppercase ${statusColor}`}>
                        {r.status}
                      </span>
                    </div>
                    <div className="col-span-6 text-slate-700 truncate">{r.out}</div>
                  </div>
                );
              })}
            </div>
            <div className="text-[9px] text-teal-700 mt-1.5">
              ✨ 평가 데이터셋 / 임베딩 / 분류 등 오프라인 잡에 최적
            </div>
          </div>
        );
      }

      return null;
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체 (3 박스 스택)
    //   1) 흐름 다이어그램
    //   2) 데이터 변환 strip
    //   3) 실행 모드별 결과 박스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🔗 LCEL — 5단계 실행 모드</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <FlowDiagram activeNodes={step.activeNodes} flowEdges={step.flowEdges} mode={step.mode} />
            <TransformStrip transforms={step.transforms} />
            <ModeBox box={step.modeBox} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>invoke
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-purple-500"></span>parallel
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-fuchsia-500"></span>stream
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-cyan-500"></span>async
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-teal-500"></span>batch
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 파일명 탭
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, allFiles }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 (5 파일) */}
          <div className="bg-[#21252b] px-3 pt-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5 mr-1 pb-2">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <div className="flex items-end gap-0.5 overflow-x-auto flex-1">
              {allFiles.map((f, i) => (
                <div
                  key={f}
                  className={`px-3 py-1.5 text-[10px] font-mono rounded-t-md whitespace-nowrap transition ${
                    i === stepIdx
                      ? 'bg-[#282c34] text-emerald-300 border-t-2 border-emerald-400'
                      : 'bg-[#1c1f24] text-slate-500 hover:text-slate-300'
                  }`}
                >
                  {f}
                </div>
              ))}
            </div>
            <span className="text-[10px] text-slate-500 font-mono uppercase pb-2">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];
      const allFiles = STEPS.map((s) => s.code.filename);

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. LangChain이란 &gt; Chapter 1. LangChain 개요</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">I-1-3. LCEL — `prompt | model | output_parser`</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Unix 파이프 문법 + 4가지 실행 모드 (invoke · stream · async · batch)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} allFiles={allFiles} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: LCEL 한 번 만든 체인은 <strong>invoke / stream / ainvoke / batch</strong> 4 메서드를 자동으로 얻는다.
                다음(I-2-1)에서는 PromptTemplate 설계 패턴을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['LCEL', '|', 'Runnable', 'invoke', 'stream', 'ainvoke', 'batch', 'RunnableParallel', 'RunnableLambda'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-1-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; I-1-2 LangChain 아키텍처 지도</a>
              <a href="./I-2-1.html" className="text-emerald-700 hover:text-emerald-900 font-medium">I-2-1 PromptTemplate &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
