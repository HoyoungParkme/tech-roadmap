<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — I-1-3. LCEL (LangChain Expression Language)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-1-3. LCEL (LangChain Expression Language)
    학습 목표: LCEL의 파이프(|) 문법으로 체인을 구성할 수 있다.
    템플릿: 코드형 (Type B) — 파이프 흐름 + 코드 블록.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PIPE_STAGES = [
      { id: 'prompt', icon: '📝', label: 'PromptTemplate', color: 'bg-amber-100 border-amber-400 text-amber-800' },
      { id: 'model',  icon: '🤖', label: 'ChatOpenAI',     color: 'bg-indigo-100 border-indigo-400 text-indigo-800' },
      { id: 'parser', icon: '🔍', label: 'StrOutputParser', color: 'bg-emerald-100 border-emerald-400 text-emerald-800' },
    ];

    const STEPS = [
      {
        desc: "[파이프 개념] Unix의 파이프(|)처럼, LCEL은 컴포넌트를 | 로 연결합니다. 앞 단계의 출력이 다음 단계의 입력이 됩니다. ls | grep .py | wc -l 처럼요.",
        activeStage: -1,
        code: [
          { line: '# Unix 파이프와 같은 개념', highlight: false },
          { line: '# ls | grep .py | wc -l', highlight: false },
          { line: '#  ↓       ↓       ↓', highlight: false },
          { line: '# 출력 → 입력 → 출력 → 입력 → 출력', highlight: false },
          { line: '', highlight: false },
          { line: '# LCEL도 똑같이 동작합니다:', highlight: false },
          { line: '# prompt | model | parser', highlight: true },
          { line: '#   ↓       ↓       ↓', highlight: false },
          { line: '# 프롬프트 → LLM → 파싱된 결과', highlight: false },
        ],
        dataFlow: null,
      },
      {
        desc: "[1단계: prompt] PromptTemplate을 정의합니다. {topic}이라는 변수 슬롯이 있고, invoke 시 실제 값으로 채워집니다.",
        activeStage: 0,
        code: [
          { line: 'from langchain_core.prompts import ChatPromptTemplate', highlight: false },
          { line: '', highlight: false },
          { line: 'prompt = ChatPromptTemplate.from_template(', highlight: true },
          { line: '    "{topic}에 대해 한 줄로 설명해줘"', highlight: true },
          { line: ')', highlight: true },
          { line: '', highlight: false },
          { line: '# prompt.invoke({"topic": "파이썬"})', highlight: false },
          { line: '# → ChatPromptValue(messages=[...])  ', highlight: false },
        ],
        dataFlow: { input: '{"topic": "파이썬"}', output: 'ChatPromptValue(\n  messages=[\n    HumanMessage("파이썬에 대해 한 줄로 설명해줘")\n  ]\n)' },
      },
      {
        desc: "[2단계: model] ChatOpenAI 모델을 생성합니다. prompt의 출력(ChatPromptValue)이 자동으로 model의 입력이 됩니다.",
        activeStage: 1,
        code: [
          { line: 'from langchain_openai import ChatOpenAI', highlight: false },
          { line: '', highlight: false },
          { line: 'model = ChatOpenAI(model="gpt-4")', highlight: true },
          { line: '', highlight: false },
          { line: '# model.invoke(ChatPromptValue(...))', highlight: false },
          { line: '# → AIMessage("파이썬은 읽기 쉽고...")', highlight: false },
        ],
        dataFlow: { input: 'ChatPromptValue(\n  messages=[HumanMessage("파이썬에 대해...")]\n)', output: 'AIMessage(\n  content="파이썬은 읽기 쉽고 배우기 쉬운\n  범용 프로그래밍 언어입니다."\n)' },
      },
      {
        desc: "[3단계: parser] StrOutputParser가 AIMessage에서 content 문자열만 추출합니다. 최종 결과는 깔끔한 문자열입니다.",
        activeStage: 2,
        code: [
          { line: 'from langchain_core.output_parsers import StrOutputParser', highlight: false },
          { line: '', highlight: false },
          { line: 'parser = StrOutputParser()', highlight: true },
          { line: '', highlight: false },
          { line: '# parser.invoke(AIMessage(...))', highlight: false },
          { line: '# → "파이썬은 읽기 쉽고 배우기 쉬운..."', highlight: false },
        ],
        dataFlow: { input: 'AIMessage(\n  content="파이썬은 읽기 쉽고..."\n)', output: '"파이썬은 읽기 쉽고 배우기 쉬운\n범용 프로그래밍 언어입니다."' },
      },
      {
        desc: "[전체 체인] prompt | model | parser — 세 줄로 완성! invoke, stream, batch 메서드로 다양하게 실행할 수 있습니다.",
        activeStage: 3,
        code: [
          { line: '# 전체 체인 조립', highlight: false },
          { line: 'chain = prompt | model | parser', highlight: true },
          { line: '', highlight: false },
          { line: '# 단건 실행', highlight: false },
          { line: 'result = chain.invoke({"topic": "파이썬"})', highlight: true },
          { line: '# → "파이썬은 읽기 쉽고..."', highlight: false },
          { line: '', highlight: false },
          { line: '# 스트리밍 실행', highlight: false },
          { line: 'for chunk in chain.stream({"topic": "파이썬"}):', highlight: false },
          { line: '    print(chunk, end="")', highlight: false },
          { line: '', highlight: false },
          { line: '# 배치 실행', highlight: false },
          { line: 'results = chain.batch([', highlight: false },
          { line: '    {"topic": "파이썬"},', highlight: false },
          { line: '    {"topic": "자바"},', highlight: false },
          { line: '])', highlight: false },
        ],
        dataFlow: { input: '{"topic": "파이썬"}', output: '"파이썬은 읽기 쉽고 배우기 쉬운\n범용 프로그래밍 언어입니다."' },
      },
    ];

    function PipelineVisual({ activeStage }) {
      return (
        <div className="flex items-center justify-center gap-2 flex-wrap">
          {PIPE_STAGES.map((stage, idx) => (
            <React.Fragment key={stage.id}>
              <div className={`flex items-center gap-2 px-4 py-3 rounded-xl border-2 transition-all duration-500 ${
                idx <= activeStage ? stage.color + ' scale-105 shadow-md' : 'bg-white border-slate-100 opacity-50'
              }`}>
                <span className="text-2xl">{stage.icon}</span>
                <span className="font-bold text-sm">{stage.label}</span>
              </div>
              {idx < PIPE_STAGES.length - 1 && (
                <div className={`text-2xl font-bold transition-all duration-300 ${idx < activeStage ? 'text-indigo-500' : 'text-slate-300'}`}>|</div>
              )}
            </React.Fragment>
          ))}
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">

            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-indigo-700 hover:text-indigo-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. LangChain이란 &gt; Chapter 1. LangChain 개요</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-1-3. LCEL (LangChain Expression Language)</h1>
                </div>
              </div>
              <p className="text-slate-600">
                Unix의 <b>파이프(|)</b> 처럼, <code className="bg-indigo-50 px-1 rounded text-indigo-700">prompt | model | parser</code>로 체인을 만듭니다.
              </p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-indigo-700 border-indigo-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">LCEL 파이프 흐름</h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 파이프라인 시각화 */}
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <PipelineVisual activeStage={stepData.activeStage} />
            </div>

            {/* 코드 + 데이터 흐름 */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

              {/* 코드 블록 */}
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (
                    <div key={i} className={l.highlight ? 'bg-indigo-900/40 -mx-4 px-4' : ''}>
                      {l.line || '\u00A0'}
                    </div>
                  ))}
                </pre>
              </div>

              {/* 데이터 흐름 */}
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">데이터 흐름</div>
                {stepData.dataFlow ? (
                  <div className="space-y-3">
                    <div>
                      <div className="text-xs font-medium text-slate-500 mb-1">입력</div>
                      <pre className="bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs text-slate-700 whitespace-pre-wrap font-mono">{stepData.dataFlow.input}</pre>
                    </div>
                    <div className="text-center text-indigo-500 text-xl">↓</div>
                    <div>
                      <div className="text-xs font-medium text-indigo-600 mb-1">출력</div>
                      <pre className="bg-indigo-50 border border-indigo-200 rounded-lg p-3 text-xs text-indigo-800 whitespace-pre-wrap font-mono">{stepData.dataFlow.output}</pre>
                    </div>
                  </div>
                ) : (
                  <div className="flex items-center justify-center h-48 bg-white rounded-xl border border-slate-200 text-slate-400 text-sm">
                    파이프 개념을 먼저 이해해봅시다
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['LCEL', '파이프(|)', 'Runnable', 'invoke', 'stream', 'batch'].map(kw => (
                <span key={kw} className="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-sm font-medium border border-indigo-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-indigo-600 hover:bg-indigo-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./I-1-2.html" className="text-indigo-600 hover:text-indigo-800 font-medium">&larr; I-1-2. LangChain 아키텍처 전체 지도</a>
              <a href="./I-2-1.html" className="text-indigo-600 hover:text-indigo-800 font-medium">I-2-1. PromptTemplate &rarr;</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
