            '',
            '# 질의에 가까운 문서 회수',
            'related = retriever.invoke("연차 며칠?")',
            '#  → [Document("사내 휴가 규정: 연차 15일"), ...]',
            '',
            '# ─── (2) Memory — 대화 history 보관 ───',
            'chat_history = [',
            '    HumanMessage("회사 휴가 규정 알려줘"),',
            '    AIMessage("연차는 15일입니다."),',
            ']  # ← 이전 턴들을 직접 누적 (LCEL 권장 방식)',
            '',
            '# ─── (3) Chain 에 둘 다 끼워넣기 ───',
            'prompt = ChatPromptTemplate.from_messages([',
            '    ("system", "다음 컨텍스트를 참고해 답하라:\\n{context}"),',
            '    MessagesPlaceholder("history"),    # ← Memory 슬롯',
            '    ("human", "{question}"),',
            '])',
            '',
            'llm = ChatOpenAI(model="gpt-4o-mini")',
            '',
            '# context 자리에 retriever 결과를 자동 주입',
            'chain = (',
            '    {',
            '        "context":  lambda x: retriever.invoke(x["question"]),',
            '        "history":  lambda x: x["history"],',
            '        "question": lambda x: x["question"],',
            '    }',
            '    | prompt | llm',
            ')',
            '',
            '# 호출 — 단기 기억(history) + 장기 지식(retriever) 동시 사용',
            'chain.invoke({',
            '    "question": "그럼 출장비는?",',
            '    "history":  chat_history,',
            '})',
            '#  → "출장비 한도는 일 5만원입니다." (둘 다 활용해 정확히 답)',
            '',
            '# ─── 종합 ───',
            '#  Models    : LLM 추상화         (Step 1)',
            '#  Prompts   : 변수 슬롯 양식      (Step 2)',
            '#  Parsers   : 응답 → 구조 데이터  (Step 3)',
            '#  Chains    : LCEL 합성 파이프    (Step 4)',
            '#  Agents    : Tool 선택 루프      (Step 5)',
            '#  Memory    : 대화 history       ← 단기',
            '#  Retrievers: 외부 문서 검색      ← 장기',
            '#  → 7개 부서가 모이면 "AI 공장" 한 채가 완성',
          ],
          highlight: [1, 8, 9, 10, 11, 12, 18, 19, 20, 21, 24, 25, 26, 27, 28, 33, 34, 35, 36, 37, 38, 39, 43, 44, 45, 46],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — 7-컴포넌트 박스 다이어그램
    //   상단 4개: Models / Prompts / Parsers / Chains  (생산 라인 본체)
    //   하단 3개: Agents / Memory / Retrievers         (지원 부서)
    //   active 컴포넌트는 emerald glow + 굵은 테두리, support 는 옅은 emerald
    // ─────────────────────────────────────────────────────
    function ComponentBox({ comp, active, support }) {
      let cls = 'bg-white border-slate-200 text-slate-500';
      let glow = '';
      let badge = null;
      if (active) {
        cls = 'bg-emerald-50 border-emerald-500 text-emerald-900';
        glow = 'shadow-[0_0_20px_rgba(16,185,129,0.5)] ring-2 ring-emerald-300';
        badge = <span className="absolute -top-2 -right-2 bg-emerald-600 text-white text-[8px] font-bold px-1.5 py-0.5 rounded-full animate-pulse">ACTIVE</span>;
      } else if (support) {
        cls = 'bg-emerald-50/60 border-emerald-300 text-emerald-700';
        glow = 'shadow-sm';
      }
      return (
        <div className={`relative rounded-lg border-2 p-2.5 transition-all duration-500 ${cls} ${glow}`}>
          {badge}
          <div className="flex items-center gap-1.5 mb-1">
            <span className="text-lg">{comp.icon}</span>
            <span className="text-[11px] font-bold">{comp.label}</span>
          </div>
          <div className={`text-[9px] leading-tight ${active ? 'text-emerald-800' : support ? 'text-emerald-600' : 'text-slate-500'}`}>
            {comp.role}
          </div>
        </div>
      );
    }

    function ArchitectureDiagram({ activeId, supportIds }) {
      const top = COMPONENTS.slice(0, 4);   // models, prompts, parsers, chains
      const bot = COMPONENTS.slice(4);      // agents, memory, retrievers
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-2.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🏭</span>
              <span className="text-[11px] font-bold text-emerald-800">LangChain 7-컴포넌트 아키텍처</span>
            </div>
            <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">factory map</span>
          </div>

          {/* 상단 4 박스 — Models | Prompts | Parsers | Chains (생산 라인) */}
          <div className="text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">생산 라인 (Pipeline)</div>
          <div className="grid grid-cols-4 gap-2 mb-2">
            {top.map((c) => (
              <ComponentBox
                key={c.id}
                comp={c}
                active={activeId === c.id}
                support={supportIds.includes(c.id)}
              />
            ))}
          </div>

          {/* 흐름 화살표 */}
          <div className="flex items-center justify-center gap-1 text-emerald-400 text-[10px] font-mono mb-2">
            <span>Models</span>
            <span>·</span>
            <span>Prompts</span>
            <span>→</span>
            <span>Parsers</span>
            <span>→</span>
            <span className="font-bold text-emerald-700">Chains 으로 합성</span>
          </div>

          {/* 하단 3 박스 — Agents | Memory | Retrievers (지원 부서) */}
          <div className="text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1.5 mt-3">고급 부서 (Advanced)</div>
          <div className="grid grid-cols-3 gap-2">
            {bot.map((c) => (
              <ComponentBox
                key={c.id}
                comp={c}
                active={activeId === c.id}
                support={supportIds.includes(c.id)}
              />
            ))}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-200"></span>supporting
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-200"></span>idle
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 데이터 흐름 박스 — input/output 예시
    // ─────────────────────────────────────────────────────
    function DataFlowBox({ data, activeLabel }) {
      return (
        <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🔄</span>
              <span className="text-[11px] font-bold text-emerald-800">데이터 흐름 — {activeLabel}</span>
            </div>
            <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono">I/O</span>
          </div>

          <div className="bg-white rounded border border-emerald-200 p-2 mb-2">
            <div className="text-[9px] font-bold text-emerald-700 mb-1 uppercase tracking-wider">📥 input</div>
            <div className="text-[10px] font-mono text-slate-700 whitespace-pre-wrap break-words leading-snug">{data.input}</div>
          </div>

          <div className="text-center text-emerald-500 text-[10px] font-mono mb-1">↓ {activeLabel} 처리 ↓</div>

          <div className="bg-white rounded border-2 border-emerald-400 p-2 mb-1.5">
            <div className="text-[9px] font-bold text-emerald-700 mb-1 uppercase tracking-wider">📤 output</div>
            <div className="text-[10px] font-mono text-emerald-900 whitespace-pre-wrap break-words leading-snug">{data.output}</div>
          </div>

          <div className="text-[9px] text-emerald-700 italic">💡 {data.note}</div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체 (다이어그램 + 데이터 흐름)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const activeComp = COMPONENTS.find((c) => c.id === step.active);
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🏭 AI 공장 — 7 컴포넌트 상태</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>
          <div className="space-y-3">
            <ArchitectureDiagram activeId={step.active} supportIds={step.support} />
            <DataFlowBox data={step.data} activeLabel={activeComp ? activeComp.label : ''} />
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 파일 탭 + 라인 번호
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 4 버튼 + 키보드 + 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. LangChain이란 &gt; Chapter 1. LangChain 개요</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">I-1-2. LangChain 아키텍처 전체 지도</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Models · Prompts · OutputParsers · Chains · Agents · Memory · Retrievers — 7개 부서가 모인 AI 공장</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: <strong>Models</strong>·<strong>Prompts</strong>·<strong>Parsers</strong>가 부품, <strong>Chains</strong>가 조립 라인, <strong>Agents</strong>가 Tool 라우팅, <strong>Memory</strong>·<strong>Retrievers</strong>가 단/장기 지식. 다음(I-1-3)에서는 LCEL 파이프 흐름을 깊게 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Models', 'Prompts', 'OutputParsers', 'Chains', 'Agents', 'Memory', 'Retrievers', 'LCEL'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-1-1.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; I-1-1. LLM 직접 호출 vs LangChain</a>
              <a href="./I-1-3.html" className="text-emerald-700 hover:text-emerald-900 font-medium">I-1-3. LCEL 파이프 흐름 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
