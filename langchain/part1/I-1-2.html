<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — I-1-2. LangChain 아키텍처 전체 지도</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-1-2. LangChain 아키텍처 전체 지도
    학습 목표: LangChain의 핵심 모듈(Model, Prompt, Chain, Memory, Agent)을 구분할 수 있다.
    템플릿: 순차형 (Type B) — 공장 생산 라인 다이어그램.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const MODULES = [
      { id: 'input',   icon: '📥', label: '입력 (Input)',         desc: '사용자의 질문이나 데이터가 들어온다', color: 'bg-slate-100 border-slate-300 text-slate-700' },
      { id: 'prompt',  icon: '📝', label: 'Prompt',              desc: '질문을 LLM이 이해하기 좋은 형태로 가공', color: 'bg-amber-50 border-amber-300 text-amber-800' },
      { id: 'model',   icon: '🤖', label: 'Model (LLM)',         desc: '가공된 프롬프트를 AI 모델에 전달', color: 'bg-indigo-50 border-indigo-300 text-indigo-800' },
      { id: 'parser',  icon: '🔍', label: 'Output Parser',       desc: 'AI 응답을 구조화된 데이터로 변환', color: 'bg-emerald-50 border-emerald-300 text-emerald-800' },
      { id: 'chain',   icon: '🔗', label: 'Chain',               desc: '위 단계들을 하나의 파이프라인으로 연결', color: 'bg-purple-50 border-purple-300 text-purple-800' },
    ];

    const SUPPORT_MODULES = [
      { id: 'memory',    icon: '🧠', label: 'Memory',    desc: '대화 이력을 기억해서 맥락 유지' },
      { id: 'agent',     icon: '🤝', label: 'Agents',    desc: 'LLM이 도구를 선택하고 실행' },
      { id: 'callback',  icon: '📡', label: 'Callbacks',  desc: '각 단계의 실행을 모니터링' },
    ];

    const STEPS = [
      {
        desc: "[원재료 투입] 사용자의 질문이 공장에 들어옵니다. \"파이썬에서 리스트와 튜플의 차이는?\" — 아직 가공되지 않은 원재료입니다.",
        activeModule: 0,
        showSupport: false,
        example: { input: '파이썬에서 리스트와 튜플의 차이는?', output: null },
      },
      {
        desc: "[가공 단계] PromptTemplate이 원재료를 가공합니다. 시스템 메시지를 추가하고, 변수를 주입하고, LLM이 잘 이해할 수 있는 형태로 만듭니다.",
        activeModule: 1,
        showSupport: false,
        example: { input: '파이썬에서 리스트와 튜플의 차이는?', output: 'System: 너는 친절한 파이썬 선생님이다.\nHuman: 파이썬에서 리스트와 튜플의 차이는?' },
      },
      {
        desc: "[기계 가동] 가공된 프롬프트가 LLM(GPT-4, Claude 등)에 전달됩니다. AI 모델이 답변을 생성합니다.",
        activeModule: 2,
        showSupport: false,
        example: { input: 'System: 너는 친절한 파이썬 선생님이다.\nHuman: 파이썬에서 리스트와 튜플의 차이는?', output: '리스트는 변경 가능(mutable)하고 대괄호[]를 사용합니다.\n튜플은 변경 불가(immutable)하고 소괄호()를 사용합니다...' },
      },
      {
        desc: "[검수 단계] OutputParser가 AI의 자유 텍스트 응답을 JSON, 리스트 등 구조화된 데이터로 변환합니다. 세관 검사관처럼 형식을 맞춥니다.",
        activeModule: 3,
        showSupport: false,
        example: { input: '리스트는 변경 가능(mutable)하고...', output: '{ "mutable": "리스트", "immutable": "튜플", "syntax": ["[]", "()"] }' },
      },
      {
        desc: "[조립 완성] Chain이 모든 단계를 하나의 파이프라인으로 연결합니다. Memory(기억), Agents(도구 사용), Callbacks(모니터링)이 이 파이프라인을 지원합니다.",
        activeModule: 4,
        showSupport: true,
        example: { input: 'chain = prompt | model | parser', output: 'chain.invoke({"question": "..."})  →  구조화된 답변' },
      },
    ];

    function ModuleCard({ mod, active, idx }) {
      return (
        <div className={`relative flex items-center gap-3 p-4 rounded-xl border-2 transition-all duration-500 ${active ? mod.color + ' scale-105 shadow-md' : 'bg-white border-slate-100 opacity-60'}`}>
          <div className="text-3xl">{mod.icon}</div>
          <div className="flex-1">
            <div className="font-bold text-sm">{mod.label}</div>
            <div className="text-xs mt-0.5 opacity-80">{mod.desc}</div>
          </div>
          {idx < MODULES.length - 1 && (
            <div className="absolute -bottom-6 left-1/2 transform -translate-x-1/2 text-indigo-400 text-xl">↓</div>
          )}
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">

            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-indigo-700 hover:text-indigo-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. LangChain이란 &gt; Chapter 1. LangChain 개요</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-1-2. LangChain 아키텍처 전체 지도</h1>
                </div>
              </div>
              <p className="text-slate-600">
                공장의 <b>생산 라인</b>을 상상해보세요. 원재료(입력) → 가공(Prompt) → 기계(Model) → 검수(Parser) → 포장(Chain).
              </p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-indigo-700 border-indigo-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">생산 라인 흐름</h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 메인 콘텐츠: 모듈 파이프라인 + 예시 */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">

              {/* 왼쪽: 모듈 다이어그램 */}
              <div className="space-y-8">
                {MODULES.map((mod, idx) => (
                  <ModuleCard key={mod.id} mod={mod} active={idx <= stepData.activeModule} idx={idx} />
                ))}

                {/* 지원 모듈 */}
                {stepData.showSupport && (
                  <div className="mt-4 p-4 bg-slate-50 rounded-xl border border-dashed border-slate-300">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">지원 모듈</div>
                    <div className="grid grid-cols-3 gap-2">
                      {SUPPORT_MODULES.map(sm => (
                        <div key={sm.id} className="bg-white rounded-lg border border-slate-200 p-3 text-center">
                          <div className="text-2xl mb-1">{sm.icon}</div>
                          <div className="text-xs font-bold text-slate-700">{sm.label}</div>
                          <div className="text-xs text-slate-500 mt-1">{sm.desc}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              {/* 오른쪽: 데이터 흐름 예시 */}
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-indigo-600 uppercase tracking-wider mb-4">데이터 흐름 예시</div>

                {stepData.example.input && (
                  <div className="mb-4">
                    <div className="text-xs font-medium text-slate-500 mb-1">입력</div>
                    <pre className="bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm text-slate-700 whitespace-pre-wrap font-mono">{stepData.example.input}</pre>
                  </div>
                )}

                {stepData.example.output && (
                  <div>
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-indigo-500">↓</span>
                      <div className="text-xs font-medium text-indigo-600">{MODULES[stepData.activeModule].label} 처리 결과</div>
                    </div>
                    <pre className="bg-indigo-50 border border-indigo-200 rounded-lg p-3 text-sm text-indigo-800 whitespace-pre-wrap font-mono">{stepData.example.output}</pre>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Model I/O', 'Chains', 'Memory', 'Agents', 'Callbacks'].map(kw => (
                <span key={kw} className="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-sm font-medium border border-indigo-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-indigo-600 hover:bg-indigo-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./I-1-1.html" className="text-indigo-600 hover:text-indigo-800 font-medium">&larr; I-1-1. LLM 직접 호출 vs LangChain</a>
              <a href="./I-1-3.html" className="text-indigo-600 hover:text-indigo-800 font-medium">I-1-3. LCEL 파이프 흐름 &rarr;</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
