  -->

    // ─────────────────────────────────────────────────────
    // 색상 매핑 — 변수별 다른 톤
    // ─────────────────────────────────────────────────────
    const COLOR_MAP = {
      amber:  'text-amber-700  bg-amber-100  border-amber-300',
      sky:    'text-sky-700    bg-sky-100    border-sky-300',
      violet: 'text-violet-700 bg-violet-100 border-violet-300',
    };
    const SLOT_COLOR_MAP = {
      amber:  'bg-amber-200/70  text-amber-900  border border-amber-400',
      sky:    'bg-sky-200/70    text-sky-900    border border-sky-400',
      violet: 'bg-violet-200/70 text-violet-900 border border-violet-400',
    };

    // ─────────────────────────────────────────────────────
    // 좌측 시각화: 템플릿 박스 — {변수} 자리에 emerald 배경 + 변수별 색상
    //   slot 안의 {name} 부분은 변수 색상으로 강조,
    //   변수 값이 있으면 그 색으로 채워서 표시
    // ─────────────────────────────────────────────────────
    function TemplateBox({ template, variables, rendered, label = 'template' }) {
      // {var} 토큰 단위로 split — 변수면 색상칩으로
      const tokens = template.split(/(\{[^}]+\})/);
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📝</span>
              <span className="text-[11px] font-bold text-emerald-800">{label}</span>
            </div>
            <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">
              raw
            </span>
          </div>
          <div className="bg-slate-50 border border-slate-200 rounded-md p-2.5 font-mono text-[11px] leading-relaxed">
            {tokens.map((tok, i) => {
              const m = tok.match(/^\{(.+)\}$/);
              if (m) {
                const v = variables.find((x) => x.name === m[1]);
                const color = v ? SLOT_COLOR_MAP[v.color] : 'bg-slate-200';
                return (
                  <span key={i} className={`px-1 py-0.5 rounded font-bold ${color} mx-0.5`}>
                    {tok}
                  </span>
                );
              }
              return <span key={i} className="text-slate-700">{tok}</span>;
            })}
          </div>
          {rendered && (
            <>
              <div className="text-center text-emerald-500 text-[10px] mt-2 mb-1">↓ invoke / format ↓</div>
              <div className="bg-emerald-50 border border-emerald-300 rounded-md p-2.5 font-mono text-[11px] leading-relaxed text-emerald-900">
                {rendered}
              </div>
            </>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 입력 변수 카드 — 변수 이름 / 값 / 빈칸 표시
    // ─────────────────────────────────────────────────────
    function VariableCards({ variables }) {
      if (!variables || variables.length === 0) return null;
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">🔑</span>
            <span className="text-[11px] font-bold text-emerald-800">입력 변수 (invoke 인자)</span>
          </div>
          <div className="flex flex-wrap gap-2">
            {variables.map((v) => (
              <div key={v.name} className={`flex items-center gap-1.5 px-2 py-1 rounded-md border ${COLOR_MAP[v.color]}`}>
                <span className="font-mono text-[10px] font-bold">{`{${v.name}}`}</span>
                <span className="text-slate-400">→</span>
                {v.value
                  ? <span className="font-medium text-[11px]">"{v.value}"</span>
                  : <span className="text-[10px] opacity-60 italic">빈칸</span>}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 1: f-string 시각화 — 양식이 코드에 박혀있다는 점 강조
    // ─────────────────────────────────────────────────────
    function FStringView({ data }) {
      return (
        <div className="space-y-3">
          <div className="bg-white rounded-lg border-2 border-red-200 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">⚠️</span>
                <span className="text-[11px] font-bold text-red-700">f-string 방식 (한계)</span>
              </div>
              <span className="text-[9px] bg-red-100 text-red-700 px-1.5 py-0.5 rounded font-mono">code-bound</span>
            </div>
            <div className="bg-slate-50 border border-slate-200 rounded-md p-2.5 font-mono text-[11px] leading-relaxed">
              <span className="text-purple-600">f"</span>
              {data.template.replace(/^f"|"$/g, '').split(/(\{[^}]+\})/).map((tok, i) => {
                const m = tok.match(/^\{(.+)\}$/);
                if (m) {
                  const v = data.variables.find((x) => x.name === m[1]);
                  const color = v ? SLOT_COLOR_MAP[v.color] : 'bg-slate-200';
                  return (
                    <span key={i} className={`px-1 py-0.5 rounded font-bold ${color} mx-0.5`}>
                      {tok}
                    </span>
                  );
                }
                return <span key={i} className="text-slate-700">{tok}</span>;
              })}
              <span className="text-purple-600">"</span>
            </div>
            <div className="mt-2 text-[10px] text-red-700 bg-red-50 border border-red-200 rounded px-2 py-1">
              ⚠ {data.warning}
            </div>
          </div>

          <VariableCards variables={data.variables} />

          <div className="bg-emerald-50 border border-emerald-200 rounded-md p-2.5 text-[11px] text-emerald-900 font-mono">
            결과: {data.rendered}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 2: PromptTemplate 시각화
    // ─────────────────────────────────────────────────────
    function PromptView({ data }) {
      return (
        <div className="space-y-3">
          <TemplateBox template={data.template} variables={data.variables} rendered={data.rendered} label="PromptTemplate" />
          <VariableCards variables={data.variables} />
          <div className="bg-white rounded-md border border-emerald-200 p-2 text-[10px] font-mono text-emerald-800">
            <span className="font-bold">input_variables</span> = [
            {data.inputVariables.map((v, i) => (
              <span key={v}>
                <span className="text-amber-700">'{v}'</span>
                {i < data.inputVariables.length - 1 ? ', ' : ''}
              </span>
            ))}]
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 3: ChatPromptTemplate 시각화 — system/human 메시지 박스
    // ─────────────────────────────────────────────────────
    function ChatView({ data }) {
      return (
        <div className="space-y-3">
          <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">💬</span>
                <span className="text-[11px] font-bold text-emerald-800">ChatPromptTemplate</span>
              </div>
              <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">
                from_messages
              </span>
            </div>
            <div className="space-y-2">
              {data.chatMessages.map((msg, i) => {
                const tokens = msg.templateText.split(/(\{[^}]+\})/);
                const isSys = msg.role === 'system';
                return (
                  <div key={i} className={`p-2 rounded-md border ${isSys ? 'bg-slate-50 border-slate-300' : 'bg-emerald-50 border-emerald-300'}`}>
                    <div className="flex items-center gap-1.5 mb-1">
                      <span className="text-sm">{msg.icon}</span>
                      <span className={`text-[9px] font-bold uppercase tracking-wider ${isSys ? 'text-slate-600' : 'text-emerald-700'}`}>{msg.role}</span>
                    </div>
                    <div className="font-mono text-[11px] leading-snug mb-1.5">
                      {tokens.map((tok, j) => {
                        const m = tok.match(/^\{(.+)\}$/);
                        if (m) {
                          const v = data.variables.find((x) => x.name === m[1]);
                          const color = v ? SLOT_COLOR_MAP[v.color] : 'bg-slate-200';
                          return <span key={j} className={`px-1 py-0.5 rounded font-bold ${color} mx-0.5`}>{tok}</span>;
                        }
                        return <span key={j} className="text-slate-700">{tok}</span>;
                      })}
                    </div>
                    <div className="text-center text-emerald-500 text-[9px]">↓</div>
                    <div className={`font-mono text-[11px] mt-1 px-2 py-1 rounded ${isSys ? 'bg-slate-700 text-slate-100' : 'bg-emerald-700 text-emerald-50'}`}>
                      {msg.renderedText}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          <VariableCards variables={data.variables} />
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 4: Few-shot 시각화 — prefix / 예시 리스트 / suffix
    // ─────────────────────────────────────────────────────
    function FewShotView({ data }) {
      return (
        <div className="space-y-3">
          <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">📚</span>
                <span className="text-[11px] font-bold text-emerald-800">FewShotPromptTemplate</span>
              </div>
              <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">
                {data.examples.length} examples
              </span>
            </div>

            {/* prefix */}
            <div className="bg-amber-50 border border-amber-300 rounded-md p-2 mb-2">
              <div className="text-[9px] font-bold text-amber-700 uppercase mb-0.5">prefix</div>
              <div className="font-mono text-[11px] text-amber-900">{data.prefix}</div>
            </div>

            {/* 예시 리스트 — 자동 삽입됨 */}
            <div className="bg-sky-50 border border-sky-300 rounded-md p-2 mb-2">
              <div className="text-[9px] font-bold text-sky-700 uppercase mb-1">examples (자동 삽입)</div>
              <div className="space-y-1">
                {data.examples.map((ex, i) => (
                  <div key={i} className="font-mono text-[10px] bg-white rounded border border-sky-200 px-1.5 py-1">
                    <div className="text-slate-700">입력: <span className="font-bold">{ex.input}</span></div>
                    <div className="text-slate-700">출력: <span className="font-bold text-sky-800">{ex.output}</span></div>
                  </div>
                ))}
              </div>
            </div>

            {/* suffix — 변수 슬롯 강조 */}
            <div className="bg-violet-50 border border-violet-300 rounded-md p-2">
              <div className="text-[9px] font-bold text-violet-700 uppercase mb-0.5">suffix</div>
              <div className="font-mono text-[11px] text-violet-900 whitespace-pre-line">
                {data.suffixTemplate.split(/(\{[^}]+\})/).map((tok, i) => {
                  const m = tok.match(/^\{(.+)\}$/);
                  if (m) {
                    const v = data.variables.find((x) => x.name === m[1]);
                    const color = v ? SLOT_COLOR_MAP[v.color] : 'bg-slate-200';
                    return (
                      <span key={i} className={`px-1 py-0.5 rounded font-bold ${color} mx-0.5`}>
                        {tok}
                      </span>
                    );
                  }
                  return <span key={i}>{tok}</span>;
                })}
              </div>
              <div className="text-center text-emerald-500 text-[9px] mt-1">↓</div>
              <div className="font-mono text-[11px] text-emerald-900 whitespace-pre-line bg-emerald-50 border border-emerald-200 rounded px-2 py-1 mt-1">
                {data.renderedSuffix}
              </div>
            </div>
          </div>

          <VariableCards variables={data.variables} />
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 5: MessagesPlaceholder 시각화
    // ─────────────────────────────────────────────────────
    function PlaceholderView({ data }) {
      return (
        <div className="space-y-3">
          <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">📨</span>
                <span className="text-[11px] font-bold text-emerald-800">ChatPromptTemplate + MessagesPlaceholder</span>
              </div>
              <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">
                dynamic-history
              </span>
            </div>

            {/* system */}
            <div className="bg-slate-50 border border-slate-300 rounded-md p-2 mb-1.5">
              <div className="text-[9px] font-bold text-slate-600 uppercase mb-0.5">⚙️ system</div>
              <div className="font-mono text-[10px] text-slate-700">{data.systemText}</div>
            </div>

            {/* MessagesPlaceholder("history") — 동적으로 history 배열이 들어감 */}
            <div className="bg-violet-50 border-2 border-dashed border-violet-400 rounded-md p-2 mb-1.5">
              <div className="flex items-center justify-between mb-1">
                <div className="text-[9px] font-bold text-violet-700 uppercase">
                  📌 MessagesPlaceholder("history")
                </div>
                <span className="text-[8px] bg-violet-600 text-white px-1 py-0.5 rounded font-mono font-bold">
                  N msgs
                </span>
              </div>
              <div className="space-y-1">
                {data.history.map((msg, i) => (
                  <div key={i} className={`flex items-start gap-1.5 px-1.5 py-1 rounded text-[10px] bg-white border ${msg.role === 'human' ? 'border-sky-200' : 'border-emerald-200'}`}>
                    <span>{msg.icon}</span>
                    <div className="flex-1">
                      <div className={`text-[8px] font-bold uppercase ${msg.role === 'human' ? 'text-sky-700' : 'text-emerald-700'}`}>
                        {msg.role === 'human' ? 'HumanMessage' : 'AIMessage'}
                      </div>
                      <div className="text-slate-700 font-mono">{msg.text}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* 최종 human input */}
            <div className="bg-sky-50 border border-sky-300 rounded-md p-2">
              <div className="text-[9px] font-bold text-sky-700 uppercase mb-0.5">👤 human (현재 input)</div>
              <div className="font-mono text-[11px] text-sky-900">{data.finalInput}</div>
            </div>
          </div>

          <VariableCards variables={data.variables} />
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — kind에 따라 적절한 뷰 선택
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const data = step.dataState;
      let view = null;
      if (data.kind === 'fstring')      view = <FStringView   data={data} />;
      else if (data.kind === 'prompt')      view = <PromptView    data={data} />;
      else if (data.kind === 'chat')        view = <ChatView      data={data} />;
      else if (data.kind === 'fewshot')     view = <FewShotView   data={data} />;
      else if (data.kind === 'placeholder') view = <PlaceholderView data={data} />;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📝 PromptTemplate — 양식 → 렌더</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>
          {view}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-amber-400"></span>변수 1</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-sky-400"></span>변수 2</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-violet-400"></span>placeholder</span>
            <span className="flex items-center gap-1 ml-auto"><span className="w-2 h-2 rounded bg-emerald-500"></span>rendered</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 11.9.0
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. LangChain이란 &gt; Chapter 2. 핵심 컴포넌트</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">I-2-1. PromptTemplate — 변수 치환 / Chat / Few-shot / Placeholder</h1>
                  <p className="text-sm text-slate-500 mt-0.5">편지 양식의 진화 — f-string에서 동적 history 주입까지 5단계</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: <strong>f-string</strong>(코드에 박힘) → <strong>PromptTemplate</strong>(양식 분리) → <strong>ChatPromptTemplate</strong>(역할 분리) → <strong>FewShot</strong>(예시 자동 삽입) → <strong>MessagesPlaceholder</strong>(history 동적 주입). 다음(I-2-2)에서는 모델 출력을 구조화하는 OutputParser를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]">
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['PromptTemplate', 'ChatPromptTemplate', 'FewShotPromptTemplate', 'MessagesPlaceholder', 'input_variables', 'invoke'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-1-3.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; I-1-3. LCEL 파이프 흐름</a>
              <a href="./I-2-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">I-2-2. OutputParser &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
