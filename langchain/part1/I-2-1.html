<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — I-2-1. PromptTemplate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-2-1. PromptTemplate
    학습 목표: PromptTemplate으로 재사용 가능한 프롬프트를 만들 수 있다.
    템플릿: 순차형 (Type B) — 편지 양식 비유.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "[템플릿 정의] 편지 양식처럼, 변수 슬롯({topic})을 가진 프롬프트 틀을 만듭니다. 같은 양식에 다른 값만 넣으면 다양한 프롬프트가 완성됩니다.",
        template: '{topic}에 대해 {style}으로 설명해줘',
        variables: [
          { name: 'topic', value: null, color: 'text-amber-600 bg-amber-50 border-amber-200' },
          { name: 'style', value: null, color: 'text-blue-600 bg-blue-50 border-blue-200' },
        ],
        result: null,
        code: [
          { line: 'from langchain_core.prompts import PromptTemplate', highlight: false },
          { line: '', highlight: false },
          { line: 'template = PromptTemplate.from_template(', highlight: true },
          { line: '    "{topic}에 대해 {style}으로 설명해줘"', highlight: true },
          { line: ')', highlight: true },
        ],
      },
      {
        desc: "[변수 확인] input_variables로 어떤 변수가 필요한지 확인합니다. {topic}과 {style} — 두 개의 빈칸이 있습니다.",
        template: '{topic}에 대해 {style}으로 설명해줘',
        variables: [
          { name: 'topic', value: null, color: 'text-amber-600 bg-amber-50 border-amber-200', highlight: true },
          { name: 'style', value: null, color: 'text-blue-600 bg-blue-50 border-blue-200', highlight: true },
        ],
        result: null,
        code: [
          { line: 'print(template.input_variables)', highlight: true },
          { line: "# → ['topic', 'style']", highlight: true },
          { line: '', highlight: false },
          { line: '# 빈칸이 2개: topic, style', highlight: false },
          { line: '# 이 변수들에 값을 넣어야 프롬프트 완성', highlight: false },
        ],
      },
      {
        desc: "[값 주입] invoke에 딕셔너리로 변수 값을 전달합니다. {topic}은 \"파이썬\", {style}은 \"초등학생도 이해하게\"로 채워집니다.",
        template: '{topic}에 대해 {style}으로 설명해줘',
        variables: [
          { name: 'topic', value: '파이썬', color: 'text-amber-600 bg-amber-50 border-amber-200' },
          { name: 'style', value: '초등학생도 이해하게', color: 'text-blue-600 bg-blue-50 border-blue-200' },
        ],
        result: '파이썬에 대해 초등학생도 이해하게으로 설명해줘',
        code: [
          { line: 'result = template.invoke({', highlight: true },
          { line: '    "topic": "파이썬",', highlight: true },
          { line: '    "style": "초등학생도 이해하게"', highlight: true },
          { line: '})', highlight: true },
          { line: '', highlight: false },
          { line: '# → "파이썬에 대해 초등학생도 이해하게으로 설명해줘"', highlight: false },
        ],
      },
      {
        desc: "[재사용] 같은 템플릿에 다른 값을 넣으면 전혀 다른 프롬프트가 됩니다. 양식 하나로 수백 개의 프롬프트를 만들 수 있습니다.",
        template: '{topic}에 대해 {style}으로 설명해줘',
        variables: [
          { name: 'topic', value: 'Docker', color: 'text-amber-600 bg-amber-50 border-amber-200' },
          { name: 'style', value: '비유를 들어서', color: 'text-blue-600 bg-blue-50 border-blue-200' },
        ],
        result: 'Docker에 대해 비유를 들어서으로 설명해줘',
        code: [
          { line: '# 같은 템플릿, 다른 값!', highlight: false },
          { line: 'result2 = template.invoke({', highlight: true },
          { line: '    "topic": "Docker",', highlight: true },
          { line: '    "style": "비유를 들어서"', highlight: true },
          { line: '})', highlight: true },
          { line: '# → "Docker에 대해 비유를 들어서으로 설명해줘"', highlight: false },
        ],
      },
      {
        desc: "[ChatPromptTemplate] 실전에서는 System/Human 메시지를 분리하는 ChatPromptTemplate을 더 많이 씁니다. 역할별로 프롬프트를 구조화합니다.",
        template: null,
        variables: [],
        result: null,
        code: [
          { line: 'from langchain_core.prompts import ChatPromptTemplate', highlight: false },
          { line: '', highlight: false },
          { line: 'chat_prompt = ChatPromptTemplate.from_messages([', highlight: true },
          { line: '    ("system", "너는 {role} 전문가다."),', highlight: true },
          { line: '    ("human", "{question}"),', highlight: true },
          { line: '])', highlight: true },
          { line: '', highlight: false },
          { line: 'result = chat_prompt.invoke({', highlight: false },
          { line: '    "role": "파이썬",', highlight: false },
          { line: '    "question": "리스트 컴프리헨션이 뭐야?"', highlight: false },
          { line: '})', highlight: false },
          { line: '# → SystemMessage + HumanMessage', highlight: false },
        ],
        chatMessages: [
          { role: 'system', text: '너는 파이썬 전문가다.', icon: '⚙️' },
          { role: 'human', text: '리스트 컴프리헨션이 뭐야?', icon: '👤' },
        ],
      },
    ];

    function TemplateVisual({ template, variables, result }) {
      if (!template) return null;

      let rendered = template;
      variables.forEach(v => {
        if (v.value) {
          rendered = rendered.replace(`{${v.name}}`, v.value);
        }
      });

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
          <div className="text-xs font-bold text-indigo-600 uppercase tracking-wider mb-4">편지 양식 (PromptTemplate)</div>

          {/* 템플릿 원본 */}
          <div className="mb-4">
            <div className="text-xs text-slate-500 mb-1">양식 (template)</div>
            <div className="bg-slate-50 border border-slate-200 rounded-lg p-3 font-mono text-sm">
              {template.split(/(\{[^}]+\})/).map((part, i) => {
                const match = part.match(/^\{(.+)\}$/);
                if (match) {
                  const variable = variables.find(v => v.name === match[1]);
                  return (
                    <span key={i} className={`px-1 py-0.5 rounded border font-bold ${variable?.color || 'text-slate-500 bg-slate-100 border-slate-300'}`}>
                      {part}
                    </span>
                  );
                }
                return <span key={i}>{part}</span>;
              })}
            </div>
          </div>

          {/* 변수 슬롯 */}
          <div className="flex flex-wrap gap-3 mb-4">
            {variables.map(v => (
              <div key={v.name} className={`flex items-center gap-2 px-3 py-2 rounded-lg border ${v.color} ${v.highlight ? 'ring-2 ring-offset-1 ring-indigo-300 animate-pulse' : ''}`}>
                <span className="font-bold text-xs">{`{${v.name}}`}</span>
                {v.value ? (
                  <><span className="text-slate-400">→</span><span className="font-medium text-sm">"{v.value}"</span></>
                ) : (
                  <span className="text-xs opacity-60">빈칸</span>
                )}
              </div>
            ))}
          </div>

          {/* 완성된 프롬프트 */}
          {result && (
            <div>
              <div className="text-xs text-indigo-600 font-medium mb-1">완성된 프롬프트 ↓</div>
              <div className="bg-indigo-50 border border-indigo-200 rounded-lg p-3 text-sm text-indigo-800 font-medium">
                {result}
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">

            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-indigo-700 hover:text-indigo-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. LangChain이란 &gt; Chapter 2. 핵심 컴포넌트</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-2-1. PromptTemplate</h1>
                </div>
              </div>
              <p className="text-slate-600">
                <b>편지 양식</b>과 같습니다. "Dear <code className="bg-indigo-50 px-1 rounded text-indigo-700">{'{name}'}</code>, ..."에서 {'{name}'}만 바꾸면 됩니다.
              </p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-indigo-700 border-indigo-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">PromptTemplate 동작</h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

              {/* 왼쪽: 시각화 */}
              <div>
                {stepData.template ? (
                  <TemplateVisual
                    template={stepData.template}
                    variables={stepData.variables}
                    result={stepData.result}
                  />
                ) : stepData.chatMessages ? (
                  <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                    <div className="text-xs font-bold text-indigo-600 uppercase tracking-wider mb-4">ChatPromptTemplate 결과</div>
                    <div className="space-y-3">
                      {stepData.chatMessages.map((msg, i) => (
                        <div key={i} className={`flex items-start gap-3 p-3 rounded-lg ${
                          msg.role === 'system' ? 'bg-slate-50 border border-slate-200' : 'bg-indigo-50 border border-indigo-200'
                        }`}>
                          <span className="text-xl">{msg.icon}</span>
                          <div>
                            <div className="text-xs font-bold uppercase text-slate-500">{msg.role}</div>
                            <div className="text-sm mt-1">{msg.text}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : null}
              </div>

              {/* 오른쪽: 코드 */}
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (
                    <div key={i} className={l.highlight ? 'bg-indigo-900/40 -mx-4 px-4' : ''}>
                      {l.line || '\u00A0'}
                    </div>
                  ))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['PromptTemplate', 'ChatPromptTemplate', '변수 바인딩', 'format'].map(kw => (
                <span key={kw} className="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-sm font-medium border border-indigo-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-indigo-600 hover:bg-indigo-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./I-1-3.html" className="text-indigo-600 hover:text-indigo-800 font-medium">&larr; I-1-3. LCEL 파이프 흐름</a>
              <a href="./I-2-2.html" className="text-indigo-600 hover:text-indigo-800 font-medium">I-2-2. OutputParser &rarr;</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
