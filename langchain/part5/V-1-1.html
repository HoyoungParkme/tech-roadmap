    // 좌측 위: LangSmith UI mock — Trace 헤더 + 트리
    //   각 노드는 state에 따라 다르게 렌더된다.
    // ─────────────────────────────────────────────────────
    function TraceTree({ nodes, summary, debugMode }) {
      // node id → FULL_TREE 메타 매핑
      const meta = Object.fromEntries(FULL_TREE.map((n) => [n.id, n]));

      // 헤더 상태 색
      let headerTone = 'bg-slate-100 border-slate-300 text-slate-700';
      let headerLabel = 'no trace';
      if (debugMode === 'verbose') { headerTone = 'bg-amber-50 border-amber-300 text-amber-800'; headerLabel = 'stdout only'; }
      else if (debugMode === 'connect') { headerTone = 'bg-emerald-50 border-emerald-300 text-emerald-800'; headerLabel = 'LangSmith ● connected'; }
      else if (debugMode === 'trace') { headerTone = 'bg-emerald-50 border-emerald-400 text-emerald-900'; headerLabel = 'LangSmith ● analyzed'; }
      else if (debugMode === 'error') { headerTone = 'bg-red-50 border-red-300 text-red-800'; headerLabel = 'LangSmith ● FAILED'; }

      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          {/* LangSmith UI 헤더 mock */}
          <div className={`rounded-md border px-2.5 py-1.5 mb-2 flex items-center justify-between ${headerTone}`}>
            <div className="flex items-center gap-1.5">
              <span className="text-base">🔬</span>
              <span className="text-[11px] font-bold">smith.langchain.com / rag-chatbot</span>
            </div>
            <span className="text-[9px] font-mono">{headerLabel}</span>
          </div>

          {/* 요약 카드 — connect 이후만 */}
          {(debugMode === 'connect' || debugMode === 'trace' || debugMode === 'error') && (() => {
            const isErr = debugMode === 'error';
            const isFull = debugMode === 'trace';
            const wrap = isErr ? 'bg-red-50 border-red-200' : 'bg-emerald-50 border-emerald-200';
            const txt = isErr ? 'text-red-700' : 'text-emerald-700';
            const cards = [
              ['duration', isFull ? '1,432ms' : isErr ? '412ms' : '—'],
              ['tokens',   isFull ? '610'     : isErr ? '18'    : '—'],
              ['cost',     isFull ? '$0.0021' : isErr ? '$0.00002' : '—'],
            ];
            return (
              <div className="grid grid-cols-3 gap-1.5 mb-2">
                {cards.map(([k, v]) => (
                  <div key={k} className={`rounded border p-1.5 text-center ${wrap}`}>
                    <div className="text-[9px] text-slate-500 uppercase tracking-wider">{k}</div>
                    <div className={`text-sm font-bold font-mono ${txt}`}>{v}</div>
                  </div>
                ))}
              </div>
            );
          })()}

          {/* 트리 */}
          <div className="bg-slate-50 rounded border border-slate-200 p-2 space-y-1">
            <div className="text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1">Run tree</div>
            {nodes.map((node) => {
              const m = meta[node.id];
              const indent = m.depth * 16;

              // state 별 스타일
              let row = 'bg-white border-slate-200';
              let nameClass = 'text-slate-700';
              let durLabel = '—';
              let extra = null;
              let stateBadge = null;

              if (node.state === 'hidden') {
                row = 'bg-slate-100 border-slate-200 opacity-50 border-dashed';
                nameClass = 'text-slate-400';
                stateBadge = <span className="text-[8px] bg-slate-300 text-white px-1 rounded">hidden</span>;
              } else if (node.state === 'visible-out') {
                row = 'bg-white border-slate-300';
                nameClass = 'text-slate-700 font-bold';
                stateBadge = <span className="text-[8px] bg-slate-500 text-white px-1 rounded">output only</span>;
              } else if (node.state === 'log') {
                row = 'bg-amber-50 border-amber-300';
                nameClass = 'text-amber-900';
                stateBadge = <span className="text-[8px] bg-amber-500 text-white px-1 rounded font-mono">stdout</span>;
              } else if (node.state === 'trace-skel') {
                row = 'bg-emerald-50 border-emerald-200';
                nameClass = 'text-emerald-900';
                stateBadge = <span className="text-[8px] bg-emerald-500 text-white px-1 rounded">traced</span>;
              } else if (node.state === 'trace-full') {
                row = 'bg-emerald-50 border-emerald-300';
                nameClass = 'text-emerald-900 font-medium';
                durLabel = `${m.durationMs.toLocaleString()}ms`;
                const pct = Math.round((m.durationMs / 1432) * 100);
                extra = (
                  <div className="text-[8px] font-mono text-emerald-700 flex gap-2 mt-0.5 ml-6">
                    <span>{m.tokensIn + m.tokensOut} tok</span>
                    <span>${m.costUsd.toFixed(5)}</span>
                    {m.depth === 1 && <span className="text-emerald-600">{pct}%</span>}
                  </div>
                );
              } else if (node.state === 'error') {
                row = 'bg-red-100 border-red-400 ring-2 ring-red-300';
                nameClass = 'text-red-900 font-bold';
                durLabel = '220ms ✗';
                stateBadge = <span className="text-[8px] bg-red-600 text-white px-1 rounded font-bold animate-pulse">FAILED</span>;
                extra = (
                  <div className="text-[9px] font-mono text-red-700 ml-6 mt-1 bg-white border border-red-200 rounded px-1.5 py-1">
                    <div className="font-bold">RateLimitError</div>
                    <div className="opacity-80 leading-tight">Rate limit reached for gpt-4o-mini …</div>
                  </div>
                );
              } else if (node.state === 'error-parent') {
                row = 'bg-red-50 border-red-300';
                nameClass = 'text-red-900 font-bold';
                durLabel = '412ms ✗';
                stateBadge = <span className="text-[8px] bg-red-500 text-white px-1 rounded font-bold">trace failed</span>;
              } else if (node.state === 'skipped') {
                row = 'bg-slate-100 border-slate-200 opacity-60 border-dashed';
                nameClass = 'text-slate-500 line-through';
                stateBadge = <span className="text-[8px] bg-slate-400 text-white px-1 rounded">skipped</span>;
              }

              return (
                <div key={node.id} className={`rounded border ${row} px-2 py-1 transition-all duration-500`} style={{ marginLeft: indent }}>
                  <div className="flex items-center gap-1.5">
                    {m.depth === 1 && <span className="text-slate-400 text-[10px] font-mono">└─</span>}
                    <span className="text-sm">{m.icon}</span>
                    <span className={`text-[10px] font-mono ${nameClass} flex-1 truncate`}>{m.name}</span>
                    {stateBadge}
                    <span className="text-[9px] font-mono font-bold text-slate-600 w-16 text-right">{durLabel}</span>
                  </div>
                  {extra}
                </div>
              );
            })}
          </div>

          {/* run id (connect 이후) */}
          {(debugMode === 'connect' || debugMode === 'trace' || debugMode === 'error') && summary && summary.runId && (
            <div className="mt-2 text-[9px] font-mono text-slate-500 flex justify-between">
              <span>run_id = <span className="text-emerald-700">{summary.runId}</span></span>
              <span>project = <span className="text-emerald-700">rag-chatbot</span></span>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 아래: 디버그 출력 (verbose 콘솔 또는 alert)
    // ─────────────────────────────────────────────────────
    function DebugOutput({ step }) {
      const { verboseLog, alert, summary } = step;

      return (
        <div className="space-y-2">
          {/* verbose 콘솔 (Step 2) */}
          {verboseLog && (
            <div className="bg-slate-900 rounded-lg border-2 border-amber-300 overflow-hidden">
              <div className="bg-slate-800 px-2.5 py-1 flex items-center gap-1.5 border-b border-slate-700">
                <span className="text-base">💻</span>
                <span className="text-[11px] font-bold text-amber-300 font-mono">stdout (verbose=True)</span>
              </div>
              <div className="p-2 max-h-44 overflow-y-auto font-mono text-[10px] leading-snug">
                {verboseLog.map((l, i) => {
                  let cls = 'text-slate-300';
                  if (l.level === 'enter') cls = 'text-amber-300 font-bold';
                  if (l.level === 'exit') cls = 'text-emerald-400';
                  if (l.level === 'data') cls = 'text-slate-400';
                  return <div key={i} className={cls}>{l.text}</div>;
                })}
              </div>
            </div>
          )}

          {/* 최종 출력 카드 (verbose 없을 때) */}
          {!verboseLog && summary && summary.finalOutput && (
            <div className="bg-emerald-50 border-2 border-emerald-200 rounded-lg p-2.5">
              <div className="text-[9px] font-bold text-emerald-700 uppercase tracking-wider mb-1">final output</div>
              <div className="text-[11px] font-mono text-emerald-900 leading-snug">{summary.finalOutput}</div>
            </div>
          )}
          {!verboseLog && summary && summary.finalOutput === null && (
            <div className="bg-red-50 border-2 border-red-300 rounded-lg p-2.5">
              <div className="text-[9px] font-bold text-red-700 uppercase tracking-wider mb-1">final output</div>
              <div className="text-[11px] font-mono text-red-700 italic">— (raised {summary.errorType})</div>
            </div>
          )}

          {/* alert 박스 */}
          {alert && (() => {
            const tone = alert.tone;
            const wrap = tone === 'red' ? 'bg-red-50 border-red-300' : tone === 'amber' ? 'bg-amber-50 border-amber-300' : 'bg-emerald-50 border-emerald-300';
            const title = tone === 'red' ? 'text-red-800' : tone === 'amber' ? 'text-amber-800' : 'text-emerald-800';
            const body = tone === 'red' ? 'text-red-700' : tone === 'amber' ? 'text-amber-700' : 'text-emerald-700';
            return (
              <div className={`rounded-lg border-2 p-2.5 ${wrap}`}>
                <div className={`text-[11px] font-bold mb-0.5 ${title}`}>{alert.title}</div>
                <div className={`text-[10px] leading-snug ${body}`}>{alert.body}</div>
              </div>
            );
          })()}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🔬 LangSmith Trace UI</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <TraceTree
              nodes={step.nodes}
              summary={step.summary}
              debugMode={step.debugMode}
            />
            <DebugOutput step={step} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-300"></span>hidden
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-400"></span>stdout
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>traced
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-red-500"></span>failed
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-slate-400"></span>skipped
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일명 탭 바 — 5개 step 표시 */}
          <div className="bg-[#1e2227] px-2 py-1 flex items-center gap-1 border-b border-slate-700 overflow-x-auto">
            {STEPS.map((s, i) => (
              <span
                key={i}
                className={`text-[10px] font-mono px-2 py-0.5 rounded whitespace-nowrap ${
                  i === stepIdx
                    ? 'bg-emerald-500/20 text-emerald-300 border border-emerald-500/40'
                    : 'text-slate-500'
                }`}
              >
                {s.code.filename}
              </span>
            ))}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. LangSmith &amp; 평가 &gt; Chapter 1. LangSmith</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-1-1. 트레이싱과 디버깅 — LangSmith trace + callback handlers</h1>
                  <p className="text-sm text-slate-500 mt-0.5">블랙박스 → verbose 로그 → LangSmith trace UI 5단계 발전</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: 개발 초반은 <strong>verbose</strong>로 충분, 운영은 <strong>LangSmith</strong>가 표준. 환경변수 4줄로 trace 트리·token·cost·error를 자동 수집한다. 다음(V-1-2)에서는 LangSmith Hub 기반 프롬프트 관리를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              {(() => {
                const sec = "px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition";
                return (
                  <>
                    <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로" className={sec}>처음</button>
                    <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계" className={sec}>&larr; 이전</button>
                    <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]">
                      {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
                    </button>
                    <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계" className={sec}>다음 &rarr;</button>
                  </>
                );
              })()}
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['LangSmith', 'trace', 'Run', 'verbose', 'callback handler', 'token', 'cost', 'error'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../part4/IV-2-3.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; IV-2-3</a>
              <a href="./V-1-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">V-1-2. 프롬프트 관리 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
