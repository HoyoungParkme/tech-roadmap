<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain 학습 — V-2-2. 자동 평가 파이프라인</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PIPELINE_STEPS_DATA = [
      { id: 'dataset', icon: '📦', label: 'Dataset 준비', input: '질문/답변 쌍', output: 'Dataset', color: 'bg-teal-100 border-teal-300 text-teal-800' },
      { id: 'evaluate', icon: '⚙️', label: 'Evaluator 실행', input: 'Dataset + Chain', output: '항목별 점수', color: 'bg-cyan-100 border-cyan-300 text-cyan-800' },
      { id: 'metrics', icon: '📊', label: 'Metrics 확인', input: '항목별 점수', output: '평균/분포/추세', color: 'bg-emerald-100 border-emerald-300 text-emerald-800' },
    ];

    const STEPS = [
      {
        desc: "[자동차 충돌 테스트] 자동차 출시 전 다양한 각도와 속도로 충돌 테스트를 반복합니다. LLM 앱도 마찬가지 — 다양한 질문으로 반복 테스트하고, 점수를 자동으로 매깁니다.",
        activeChain: -1,
        data: null,
        code: [
          { line: '# Dataset 준비: 테스트 케이스 모음', highlight: false },
          { line: '', highlight: false },
          { line: 'from langsmith import Client', highlight: true },
          { line: '', highlight: false },
          { line: 'client = Client()', highlight: true },
          { line: '', highlight: false },
          { line: '# 데이터셋 생성', highlight: false },
          { line: 'dataset = client.create_dataset("qa-eval")', highlight: true },
        ],
      },
      {
        desc: "[Dataset 준비] 평가용 데이터셋은 (질문, 기대 답변) 쌍의 모음입니다. 실제 유저 질문, 엣지 케이스, 의도적 함정 질문을 포함시켜 다양한 시나리오를 커버합니다.",
        activeChain: 0,
        data: { input: '질문/답변 20쌍', current: 'Dataset "qa-eval" 생성 완료' },
        code: [
          { line: '# 데이터셋에 예시 추가', highlight: false },
          { line: 'client.create_examples(', highlight: true },
          { line: '    inputs=[', highlight: true },
          { line: '        {"question": "LangChain이란?"},', highlight: true },
          { line: '        {"question": "RAG의 장점은?"},', highlight: true },
          { line: '        {"question": "Agent vs Chain 차이?"},', highlight: true },
          { line: '    ],', highlight: true },
          { line: '    outputs=[', highlight: false },
          { line: '        {"answer": "LLM 앱 개발 프레임워크"},', highlight: false },
          { line: '        {"answer": "최신 정보 활용, 환각 감소"},', highlight: false },
          { line: '        {"answer": "Agent는 자율 판단, Chain은 고정 흐름"},', highlight: false },
          { line: '    ],', highlight: false },
          { line: '    dataset_id=dataset.id,', highlight: false },
          { line: ')', highlight: false },
        ],
      },
      {
        desc: "[Evaluator 정의] Evaluator는 채점 기준입니다. 정확성, 관련성 등 원하는 기준을 함수로 정의합니다. LangSmith가 제공하는 내장 Evaluator를 쓰거나 커스텀으로 만들 수 있습니다.",
        activeChain: 0,
        data: { input: 'Evaluator 함수 정의', current: 'correctness + relevance evaluator 준비' },
        code: [
          { line: 'from langsmith.evaluation import evaluate', highlight: false },
          { line: '', highlight: false },
          { line: '# 커스텀 Evaluator 정의', highlight: false },
          { line: 'def correctness(run, example):', highlight: true },
          { line: '    """정답과 비교하여 정확성 평가"""', highlight: true },
          { line: '    prediction = run.outputs["output"]', highlight: true },
          { line: '    reference = example.outputs["answer"]', highlight: true },
          { line: '    # LLM으로 의미적 유사도 판단', highlight: false },
          { line: '    score = judge_similarity(prediction, reference)', highlight: true },
          { line: '    return {"score": score, "key": "correctness"}', highlight: true },
        ],
      },
      {
        desc: "[run_on_dataset 실행] 데이터셋의 모든 예시에 대해 체인을 실행하고, Evaluator로 자동 채점합니다. 결과는 LangSmith 대시보드에서 한눈에 확인할 수 있습니다.",
        activeChain: 1,
        data: { input: 'Dataset 20건 + Chain + Evaluator', current: '20건 실행 완료 — 평균 정확도 84%' },
        code: [
          { line: '# 자동 평가 실행', highlight: false },
          { line: 'results = evaluate(', highlight: true },
          { line: '    # 평가할 체인 (또는 함수)', highlight: false },
          { line: '    lambda inputs: chain.invoke(inputs),', highlight: true },
          { line: '    # 데이터셋', highlight: false },
          { line: '    data="qa-eval",', highlight: true },
          { line: '    # 평가 기준들', highlight: false },
          { line: '    evaluators=[correctness],', highlight: true },
          { line: '    # 실험 이름 (비교용)', highlight: false },
          { line: '    experiment_prefix="v1-gpt4o-mini",', highlight: true },
          { line: ')', highlight: false },
        ],
      },
      {
        desc: "[회귀 테스트 자동화] 프롬프트나 모델을 변경할 때마다 같은 데이터셋으로 재평가합니다. 이전 결과와 비교하여 성능이 떨어졌는지(회귀) 자동으로 감지합니다.",
        activeChain: 2,
        data: { input: 'v1 vs v2 실험 비교', current: 'v2 정확도 89% > v1 정확도 84% (개선)' },
        code: [
          { line: '# 회귀 테스트: 모델 변경 후 재평가', highlight: false },
          { line: '', highlight: false },
          { line: '# v1 실험 (이미 완료)', highlight: false },
          { line: '# experiment_prefix="v1-gpt4o-mini"', highlight: false },
          { line: '', highlight: false },
          { line: '# v2 실험 (프롬프트 개선 후)', highlight: true },
          { line: 'results_v2 = evaluate(', highlight: true },
          { line: '    lambda inputs: chain_v2.invoke(inputs),', highlight: true },
          { line: '    data="qa-eval",', highlight: true },
          { line: '    evaluators=[correctness],', highlight: true },
          { line: '    experiment_prefix="v2-improved-prompt",', highlight: true },
          { line: ')', highlight: true },
          { line: '', highlight: false },
          { line: '# LangSmith에서 v1 vs v2 비교 가능', highlight: false },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-teal-700 hover:text-teal-900 font-medium"><span aria-hidden="true">&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. LangSmith &amp; 평가 &gt; Chapter 2. 평가</div>
                  <h1 className="text-2xl font-bold text-slate-800">V-2-2. 자동 평가 파이프라인</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>자동차 충돌 테스트</b> — 다양한 시나리오로 반복 테스트하고, 점수를 자동으로 산출하여 품질을 보장합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-teal-700 border-teal-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">자동 평가 흐름</h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                <div className="space-y-3">
                  {PIPELINE_STEPS_DATA.map((cs, idx) => (
                    <div key={cs.id} className="relative">
                      <div className={"flex items-center gap-3 p-4 rounded-xl border-2 transition-all duration-500 " + (
                        idx <= stepData.activeChain ? cs.color + ' scale-[1.02] shadow-md' :
                        idx === stepData.activeChain + 1 && stepData.activeChain >= 0 ? 'bg-white border-slate-200 opacity-70' :
                        'bg-white border-slate-100 opacity-40'
                      )}>
                        <span className="text-2xl">{cs.icon}</span>
                        <div className="flex-1">
                          <div className="font-bold text-sm">{cs.label}</div>
                          <div className="text-xs mt-0.5 flex gap-2">
                            <span className="opacity-70">{cs.input}</span>
                            <span>→</span>
                            <span className="font-medium">{cs.output}</span>
                          </div>
                        </div>
                      </div>
                      {idx < PIPELINE_STEPS_DATA.length - 1 && (
                        <div className="text-center text-teal-400 text-lg py-1">↓</div>
                      )}
                    </div>
                  ))}
                </div>

                {stepData.data && (
                  <div className="bg-teal-50 border border-teal-200 rounded-lg p-3 space-y-2">
                    <div className="text-xs"><span className="font-bold text-slate-500">입력:</span> <span className="text-slate-600">{stepData.data.input}</span></div>
                    <div className="text-xs"><span className="font-bold text-teal-600">출력:</span> <span className="text-teal-800 font-medium">{stepData.data.current}</span></div>
                  </div>
                )}
              </div>

              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">코드</div>
                <pre className="bg-slate-900 text-slate-100 p-4 rounded-xl text-xs leading-relaxed overflow-x-auto font-mono min-h-[200px]">
                  {stepData.code.map((l, i) => (<div key={i} className={l.highlight ? 'bg-teal-900/40 -mx-4 px-4' : ''}>{l.line || '\u00A0'}</div>))}
                </pre>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Dataset', 'run_on_dataset', 'Evaluator', 'Metrics', '회귀 테스트'].map(kw => (<span key={kw} className="bg-teal-50 text-teal-700 px-3 py-1 rounded-full text-sm font-medium border border-teal-200">{kw}</span>))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-teal-600 hover:bg-teal-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./V-2-1.html" className="text-teal-600 hover:text-teal-800 font-medium">&larr; V-2-1. LLM-as-Judge</a>
              <a href="../part6/VI-1-1.html" className="text-teal-600 hover:text-teal-800 font-medium">VI-1-1 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
