            { caseId: 'tc05', q: '안전하지 않은 출력 예시?', ref: '개인정보 노출, 폭력적 콘텐츠 등',
              scores: { accuracy: 0.74, relevance: 0.78, safety: 0.71 }, status: 'warn' },
          ],
        },
        compare: {
          v1: { label: 'v2 (이전)',          accuracy: 0.92, relevance: 0.92, safety: 0.97 },
          v2: { label: 'v3 (현재 — 짧은 prompt)', accuracy: 0.81, relevance: 0.82, safety: 0.94 },
          delta: { accuracy: -0.11, relevance: -0.10, safety: -0.03 },
        },
        regression: {
          alert: true,
          metric: 'accuracy',
          prev: 0.92,
          curr: 0.81,
          delta: -0.11,
          threshold: -0.03,
          fails: ['tc04 (FAIL)', 'tc03 (WARN)', 'tc05 (WARN)'],
          action: 'CI 빌드 BLOCK + Slack #ml-ops 알람 + 자동 롤백',
        },
        code: {
          lang: 'python',
          filename: 'regression.py',
          lines: [
            '"""regression.py — 회귀 자동 검출 + CI 블록 (GitHub Actions)."""',
            'import sys',
            'import requests',
            '',
            'from dashboard import fetch_metrics',
            '',
            '# 회귀 임계치 — 이 값 이상 떨어지면 빌드 실패',
            'THRESHOLD  = -0.03',
            'BASELINE   = "v2-gpt4o-fewshot"',
            'CANDIDATE  = "v3-short-prompt"',
            'SLACK_HOOK = "https://hooks.slack.com/services/..."',
            '',
            '',
            'def detect_regression() -> dict:',
            '    """baseline vs candidate 비교 후 회귀 항목을 반환."""',
            '    base = fetch_metrics(BASELINE)',
            '    cand = fetch_metrics(CANDIDATE)',
            '    deltas = {k: round(cand[k] - base[k], 2) for k in base}',
            '    failed = {k: d for k, d in deltas.items() if d < THRESHOLD}',
            '    return {"deltas": deltas, "failed": failed,',
            '            "base": base, "cand": cand}',
            '',
            '',
            'def alert_slack(report: dict) -> None:',
            '    """Slack #ml-ops로 회귀 알람 발송."""',
            '    msg = (f":rotating_light: *회귀* — {CANDIDATE}\\n"',
            '           f"delta: {report[\'deltas\']}\\n"',
            '           f"failed: {list(report[\'failed\'].keys())}")',
            '    requests.post(SLACK_HOOK, json={"text": msg})',
            '',
            '',
            'if __name__ == "__main__":',
            '    report = detect_regression()',
            '    if report["failed"]:',
            '        alert_slack(report)',
            '        print("🚨 회귀 검출 — CI 빌드 BLOCK")',
            '        print(f"   delta: {report[\'deltas\']}")',
            '        sys.exit(1)   # ← non-zero → CI 실패',
            '    print("✅ 회귀 없음 — 배포 승인")',
            '    sys.exit(0)',
          ],
          highlight: [1, 2, 3, 5, 8, 9, 10, 11, 14, 15, 16, 17, 18, 19, 20, 21, 24, 25, 26, 27, 28, 29, 32, 33, 34, 35, 36, 37, 38, 39, 40],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 점수 → 색상 매핑
    //   ≥ 0.90 : emerald (PASS)
    //   ≥ 0.80 : lime    (OK)
    //   ≥ 0.70 : amber   (WARN)
    //   <  0.70 : red    (FAIL)
    // ─────────────────────────────────────────────────────
    function scoreColor(s) {
      if (s == null) return 'bg-slate-100 text-slate-400 border-slate-200';
      if (s >= 0.90) return 'bg-emerald-100 text-emerald-800 border-emerald-300 font-bold';
      if (s >= 0.80) return 'bg-lime-100 text-lime-800 border-lime-300 font-medium';
      if (s >= 0.70) return 'bg-amber-100 text-amber-800 border-amber-300 font-bold';
      return 'bg-red-100 text-red-800 border-red-400 font-bold';
    }

    function statusBadge(status) {
      const map = {
        pending: { bg: 'bg-slate-200 text-slate-500', text: '대기' },
        running: { bg: 'bg-blue-200 text-blue-700 animate-pulse', text: '실행중' },
        pass:    { bg: 'bg-emerald-500 text-white', text: 'PASS' },
        warn:    { bg: 'bg-amber-500 text-white', text: 'WARN' },
        fail:    { bg: 'bg-red-600 text-white animate-pulse', text: 'FAIL' },
      };
      const m = map[status] || map.pending;
      return <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${m.bg}`}>{m.text}</span>;
    }

    // ─────────────────────────────────────────────────────
    // 좌측 상단: 파이프라인 흐름 카드 (5단계 가로 흐름)
    // ─────────────────────────────────────────────────────
    function FlowDiagram({ activeFlow }) {
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🔄</span>
              <span className="text-[11px] font-bold text-emerald-800">평가 파이프라인 흐름</span>
            </div>
            <span className="text-[9px] text-slate-400 font-mono">stage {activeFlow + 1} / 5</span>
          </div>
          <div className="flex items-stretch gap-1">
            {FLOW_STAGES.map((s, i) => {
              const active  = i === activeFlow;
              const done    = i < activeFlow;
              const pending = i > activeFlow;
              const cls = active
                ? 'bg-emerald-500 text-white border-emerald-600 scale-105 shadow-md'
                : done
                ? 'bg-emerald-100 text-emerald-800 border-emerald-300'
                : 'bg-slate-50 text-slate-400 border-slate-200';
              return (
                <React.Fragment key={s.id}>
                  <div className={`flex-1 rounded-lg border-2 p-1.5 transition-all duration-500 ${cls}`}>
                    <div className="text-center">
                      <div className="text-base">{s.icon}</div>
                      <div className="text-[9px] font-bold leading-tight">{s.label}</div>
                      <div className="text-[8px] opacity-80 leading-tight mt-0.5">{s.sub}</div>
                    </div>
                  </div>
                  {i < FLOW_STAGES.length - 1 && (
                    <div className={`flex items-center text-sm ${i < activeFlow ? 'text-emerald-500' : 'text-slate-300'}`}>→</div>
                  )}
                </React.Fragment>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중간: 요약 박스 (좌/우 2열)
    // ─────────────────────────────────────────────────────
    function SummaryBox({ summary }) {
      const tone = (t) => ({
        emerald: 'bg-emerald-50 border-emerald-300 text-emerald-800',
        slate:   'bg-slate-50 border-slate-300 text-slate-700',
        red:     'bg-red-50 border-red-400 text-red-800 animate-pulse',
      }[t] || 'bg-slate-50 border-slate-300 text-slate-700');
      return (
        <div className="grid grid-cols-2 gap-2">
          <div className={`rounded-lg border-2 p-2 ${tone(summary.left.tone)}`}>
            <div className="text-[9px] font-bold uppercase tracking-wider opacity-70">{summary.left.label}</div>
            <div className="text-sm font-extrabold tabular-nums">{summary.left.value}</div>
          </div>
          <div className={`rounded-lg border-2 p-2 ${tone(summary.right.tone)}`}>
            <div className="text-[9px] font-bold uppercase tracking-wider opacity-70">{summary.right.label}</div>
            <div className="text-sm font-extrabold tabular-nums">{summary.right.value}</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측: 결과 표 — 5케이스 × 3 metric
    // ─────────────────────────────────────────────────────
    function ResultTable({ table }) {
      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 p-2">
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📋</span>
              <span className="text-[11px] font-bold text-slate-700">테스트케이스 × 평가지표</span>
            </div>
            <span className="text-[9px] text-slate-400 font-mono">{table.rows.length} cases · {table.metrics.length} metrics</span>
          </div>
          <table className="w-full text-[9px] border-collapse">
            <thead>
              <tr className="bg-slate-100">
                <th className="border border-slate-200 p-1 text-left font-bold text-slate-600 w-12">case</th>
                <th className="border border-slate-200 p-1 text-left font-bold text-slate-600">질문</th>
                {table.metrics.map((m) => (
                  <th key={m} className="border border-slate-200 p-1 text-center font-bold text-slate-600 w-12">{m.slice(0, 4)}</th>
                ))}
                <th className="border border-slate-200 p-1 text-center font-bold text-slate-600 w-12">상태</th>
              </tr>
            </thead>
            <tbody>
              {table.rows.map((r) => (
                <tr key={r.caseId} className="hover:bg-slate-50">
                  <td className="border border-slate-200 p-1 font-mono text-slate-500">{r.caseId}</td>
                  <td className="border border-slate-200 p-1 text-slate-700 truncate max-w-[120px]" title={r.q}>{r.q}</td>
                  {table.metrics.map((m) => (
                    <td key={m} className="border border-slate-200 p-0.5 text-center">
                      <span className={`inline-block w-full px-1 py-0.5 rounded text-[9px] tabular-nums border ${scoreColor(r.scores[m])}`}>
                        {r.scores[m] != null ? r.scores[m].toFixed(2) : '—'}
                      </span>
                    </td>
                  ))}
                  <td className="border border-slate-200 p-1 text-center">{statusBadge(r.status)}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="flex flex-wrap gap-1.5 text-[8px] mt-1.5 text-slate-500">
            <span className="flex items-center gap-0.5"><span className="w-2 h-2 rounded bg-emerald-300 border border-emerald-400"></span>≥0.90</span>
            <span className="flex items-center gap-0.5"><span className="w-2 h-2 rounded bg-lime-300 border border-lime-400"></span>≥0.80</span>
            <span className="flex items-center gap-0.5"><span className="w-2 h-2 rounded bg-amber-300 border border-amber-400"></span>≥0.70</span>
            <span className="flex items-center gap-0.5"><span className="w-2 h-2 rounded bg-red-300 border border-red-400"></span>&lt;0.70</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측: 모델 버전 비교 박스 (Step 4, 5)
    // ─────────────────────────────────────────────────────
    function CompareBox({ compare, regressionMode }) {
      if (!compare) return null;
      const sign = (n) => (n > 0 ? `+${n.toFixed(2)}` : n.toFixed(2));
      const dCls = (n) => (regressionMode && n < 0
        ? 'text-red-700 font-extrabold'
        : n > 0
        ? 'text-emerald-700 font-bold'
        : 'text-slate-500');
      const metrics = ['accuracy', 'relevance', 'safety'];
      return (
        <div className={`rounded-lg border-2 p-2 ${regressionMode ? 'bg-red-50 border-red-300' : 'bg-emerald-50 border-emerald-300'}`}>
          <div className="flex items-center gap-1.5 mb-1.5">
            <span className="text-base">{regressionMode ? '⚠️' : '🆚'}</span>
            <span className={`text-[11px] font-bold ${regressionMode ? 'text-red-800' : 'text-emerald-800'}`}>
              모델 버전별 비교
            </span>
          </div>
          <table className="w-full text-[9px] tabular-nums">
            <thead>
              <tr className={regressionMode ? 'bg-red-100' : 'bg-emerald-100'}>
                <th className="text-left p-1 font-bold">metric</th>
                <th className="text-right p-1 font-bold w-16">{compare.v1.label}</th>
                <th className="text-right p-1 font-bold w-20">{compare.v2.label}</th>
                <th className="text-right p-1 font-bold w-12">delta</th>
              </tr>
            </thead>
            <tbody>
              {metrics.map((m) => (
                <tr key={m} className="border-t border-slate-100">
                  <td className="p-1 font-bold text-slate-700">{m}</td>
                  <td className="p-1 text-right text-slate-700">{compare.v1[m].toFixed(2)}</td>
                  <td className="p-1 text-right text-slate-700">{compare.v2[m].toFixed(2)}</td>
                  <td className={`p-1 text-right ${dCls(compare.delta[m])}`}>{sign(compare.delta[m])}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측: 회귀 알람 박스 (Step 5만, 빨간 강조)
    // ─────────────────────────────────────────────────────
    function RegressionAlert({ regression }) {
      if (!regression || !regression.alert) return null;
      return (
        <div className="bg-red-100 border-2 border-red-500 rounded-lg p-3 animate-pulse">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">🚨</span>
            <div>
              <div className="text-xs font-extrabold text-red-800 uppercase tracking-wider">회귀 검출 — CI 빌드 BLOCK</div>
              <div className="text-[10px] text-red-600">{regression.metric} {regression.prev.toFixed(2)} → {regression.curr.toFixed(2)} (Δ {regression.delta.toFixed(2)}) · 임계치 {regression.threshold.toFixed(2)}</div>
            </div>
          </div>
          <div className="bg-white rounded border border-red-200 p-2 mb-1.5">
            <div className="text-[9px] font-bold text-red-700 mb-1 uppercase">실패 케이스</div>
            <div className="flex flex-wrap gap-1">
              {regression.fails.map((f) => (
                <span key={f} className="text-[9px] font-mono bg-red-200 text-red-900 px-1.5 py-0.5 rounded font-bold">{f}</span>
              ))}
            </div>
          </div>
          <div className="bg-white rounded border border-red-200 p-2 text-[10px] text-red-900 font-medium">
            ▸ {regression.action}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: 흐름 다이어그램
    //   중간: 요약 / 비교 / 회귀 알람
    //   하단: 결과 표
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🚗 자동차 충돌 테스트 — eval suite</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>
          <div className="space-y-3">
            <FlowDiagram activeFlow={step.activeFlow} />
            <SummaryBox summary={step.summary} />
            {step.regression && step.regression.alert && <RegressionAlert regression={step.regression} />}
            {step.compare && <CompareBox compare={step.compare} regressionMode={!!(step.regression && step.regression.alert)} />}
            <ResultTable table={step.table} />
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. LangSmith &amp; 평가 &gt; Chapter 2. 평가</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-2-2. 자동 평가 파이프라인 (LangSmith eval suite)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">자동차 충돌 테스트 라인 — Dataset → Evaluator → run_on_dataset → Dashboard → Regression</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: <strong>Dataset</strong>으로 시나리오를, <strong>Evaluator</strong>로 채점 기준을, <strong>run_on_dataset</strong>으로 일괄 실행을, <strong>Dashboard</strong>로 모델 비교를, <strong>Regression</strong>으로 자동 차단을 한다. 다음(VI-1-1)부터는 Production 운영 패턴.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['LangSmith', 'Dataset', 'Evaluator', 'run_on_dataset', 'experiment_prefix', 'Dashboard', 'Regression', 'CI Block'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./V-2-1.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; V-2-1. LLM-as-Judge</a>
              <a href="../part6/VI-1-1.html" className="text-emerald-700 hover:text-emerald-900 font-medium">VI-1-1 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
