    function AnswerBox({ answer }) {
      const stateBadge = {
        pending: { color: 'bg-slate-400 text-white', label: 'PENDING', icon: '⏳' },
        judging: { color: 'bg-emerald-600 text-white animate-pulse', label: 'JUDGING…', icon: '⚖️' },
        scored: { color: 'bg-emerald-700 text-white', label: 'SCORED', icon: '✓' },
      }[answer.state] || { color: 'bg-slate-400 text-white', label: '-', icon: '·' };

      const verdictBadge = answer.verdict === 'win'
        ? <span className="text-[9px] bg-yellow-500 text-yellow-900 px-1.5 py-0.5 rounded font-bold">🏆 WIN</span>
        : answer.verdict === 'lose'
        ? <span className="text-[9px] bg-slate-300 text-slate-600 px-1.5 py-0.5 rounded font-bold">LOSE</span>
        : null;

      return (
        <div className={`bg-white rounded-lg border-2 ${
          answer.verdict === 'win' ? 'border-yellow-400 shadow-md' :
          answer.verdict === 'lose' ? 'border-slate-300 opacity-70' :
          'border-emerald-200'
        } p-3 transition-all duration-500`}>
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="bg-emerald-100 text-emerald-800 text-[10px] font-bold px-1.5 py-0.5 rounded font-mono">
                답변 {answer.id}
              </span>
              <span className="text-[9px] text-slate-500 font-mono">{answer.model}</span>
            </div>
            <div className="flex items-center gap-1">
              {verdictBadge}
              <span className={`text-[8px] ${stateBadge.color} px-1.5 py-0.5 rounded font-bold`}>
                {stateBadge.icon} {stateBadge.label}
              </span>
            </div>
          </div>
          <div className="text-[11px] text-slate-700 leading-snug bg-slate-50 rounded p-2 border border-slate-100">
            {answer.text}
          </div>
          <div className="flex justify-between items-center mt-1.5">
            <span className="text-[9px] text-slate-400 font-mono">{answer.tokens} tokens</span>
            {answer.scores && (
              <div className="flex gap-1">
                {Object.entries(answer.scores).map(([k, v]) => (
                  <span key={k} className="text-[8px] bg-emerald-50 text-emerald-700 border border-emerald-200 px-1 rounded font-mono">
                    {k.slice(0, 4)}:{v}
                  </span>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    function JudgeBox({ judge }) {
      if (judge.kind === 'human') {
        return (
          <div className="bg-amber-50 border-2 border-dashed border-amber-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-1.5">
              <span className="text-base">👤</span>
              <span className="text-[11px] font-bold text-amber-800">Human Evaluator</span>
              <span className="ml-auto text-[9px] bg-amber-600 text-white px-1.5 py-0.5 rounded font-mono">slow · expensive</span>
            </div>
            <div className="text-[10px] text-amber-900 leading-snug">
              사람이 답변을 직접 읽고 1~5점으로 채점한다. 정확하지만 느리고 비싸며 평가자마다 기준이 흔들린다.
            </div>
          </div>
        );
      }

      if (judge.kind === 'judge-active') {
        return (
          <div className="bg-emerald-50 border-2 border-emerald-400 rounded-lg p-3 shadow-md">
            <div className="flex items-center gap-1.5 mb-1.5">
              <span className="text-base animate-pulse">⚖️</span>
              <span className="text-[11px] font-bold text-emerald-800">Judge LLM</span>
              <span className="ml-auto text-[9px] bg-emerald-700 text-white px-1.5 py-0.5 rounded font-mono">{judge.model}</span>
            </div>
            <div className="bg-white rounded border border-emerald-200 p-2">
              <div className="text-[9px] font-bold text-emerald-700 mb-0.5 uppercase tracking-wider">judge prompt</div>
              <div className="text-[10px] text-emerald-900 italic leading-snug">"{judge.prompt}"</div>
            </div>
            <div className="text-center text-emerald-500 text-[12px] font-mono mt-1.5">↓ 평가 중 ↓</div>
          </div>
        );
      }

      if (judge.kind === 'judge-bias') {
        return (
          <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3">
            <div className="flex items-center gap-1.5 mb-1.5">
              <span className="text-base">⚠️</span>
              <span className="text-[11px] font-bold text-rose-800">Judge LLM (편향 주의)</span>
              <span className="ml-auto text-[9px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-mono">{judge.model}</span>
            </div>
            <div className="bg-white rounded border border-rose-200 p-2 text-[10px] text-rose-900 leading-snug">
              {judge.warning}
            </div>
          </div>
        );
      }

      return null;
    }

    function VerdictBox({ verdict }) {
      if (verdict.kind === 'human-cost') {
        return (
          <div className="bg-white rounded-lg border-2 border-amber-300 p-3">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">📊</span>
              <span className="text-[11px] font-bold text-amber-800">Human vs LLM Judge — 비용·속도 비교</span>
            </div>
            <div className="space-y-1.5">
              {verdict.rows.map((r) => (
                <div key={r.label} className="flex items-center gap-2 text-[10px]">
                  <span className="w-5 text-center">{r.icon}</span>
                  <span className="w-20 font-bold text-slate-700">{r.label}</span>
                  <span className="flex-1 bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded font-mono text-center">
                    👤 {r.human}
                  </span>
                  <span className="flex-1 bg-emerald-100 text-emerald-800 px-1.5 py-0.5 rounded font-mono text-center font-bold">
                    🤖 {r.llm}
                  </span>
                </div>
              ))}
            </div>
            <div className="text-[9px] text-slate-500 mt-2 italic">
              💡 LLM Judge 는 속도·비용·일관성에서 압도적. 단 정확도는 사람 검증 필요.
            </div>
          </div>
        );
      }

      if (verdict.kind === 'single-score') {
        return (
          <div className="bg-white rounded-lg border-2 border-emerald-400 p-3 shadow-md">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">🎯</span>
              <span className="text-[11px] font-bold text-emerald-800">단일 점수 판정</span>
              <span className="ml-auto text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">target = {verdict.target}</span>
            </div>
            <div className="flex items-center justify-center gap-3 py-2">
              <div className="text-center">
                <div className="text-3xl font-bold text-emerald-700">{verdict.score}</div>
                <div className="text-[9px] text-emerald-600 font-mono">/ 5</div>
              </div>
              <div className="flex-1 text-[10px] text-slate-700 bg-emerald-50 rounded p-2 border border-emerald-200">
                {verdict.rationale}
              </div>
            </div>
            <div className="flex gap-0.5 mt-1">
              {[1, 2, 3, 4, 5].map((n) => (
                <div key={n} className={`h-2 flex-1 rounded ${
                  n <= verdict.score ? 'bg-emerald-500' : 'bg-slate-200'
                }`}></div>
              ))}
            </div>
            <div className="text-[9px] text-slate-500 mt-1 italic">
              ⚠ 단일 점수는 거칠다 — 다음 단계에서 항목별로 쪼갠다
            </div>
          </div>
        );
      }

      if (verdict.kind === 'criteria-scores') {
        return (
          <div className="bg-white rounded-lg border-2 border-emerald-400 p-3 shadow-md">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">📊</span>
                <span className="text-[11px] font-bold text-emerald-800">기준별 점수카드</span>
              </div>
              <span className="text-[10px] bg-emerald-700 text-white px-2 py-0.5 rounded font-mono font-bold">
                총 {verdict.total}/{verdict.maxTotal}
              </span>
            </div>
            <div className="space-y-2">
              {verdict.scores.map((s) => (
                <div key={s.key} className="bg-emerald-50 rounded p-2 border border-emerald-200">
                  <div className="flex items-center justify-between mb-1">
                    <div className="flex items-center gap-1.5">
                      <span className="text-sm">{s.icon}</span>
                      <span className="text-[11px] font-bold text-emerald-900">{s.label}</span>
                    </div>
                    <span className="text-[11px] font-mono font-bold text-emerald-700">
                      {s.value} / {s.max}
                    </span>
                  </div>
                  <div className="flex gap-0.5 mb-1">
                    {Array.from({ length: s.max }).map((_, i) => (
                      <div key={i} className={`h-1.5 flex-1 rounded ${
                        i < s.value ? 'bg-emerald-500' : 'bg-emerald-100'
                      }`}></div>
                    ))}
                  </div>
                  <div className="text-[9px] text-slate-600 italic">{s.note}</div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      if (verdict.kind === 'pairwise') {
        return (
          <div className="bg-white rounded-lg border-2 border-yellow-400 p-3 shadow-md">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">🥊</span>
              <span className="text-[11px] font-bold text-yellow-800">Pairwise Verdict</span>
              <span className="ml-auto text-[10px] bg-yellow-500 text-yellow-900 px-2 py-0.5 rounded font-mono font-bold">
                winner = {verdict.winner}
              </span>
            </div>
            <div className="grid grid-cols-2 gap-2 mb-2">
              <div className={`rounded p-2 border-2 ${
                verdict.winner === 'A' ? 'bg-yellow-50 border-yellow-400' : 'bg-slate-50 border-slate-200 opacity-60'
              }`}>
                <div className="flex items-center justify-between mb-1">
                  <span className="text-[10px] font-bold text-slate-700">{verdict.a.label}</span>
                  {verdict.winner === 'A' && <span className="text-sm">🏆</span>}
                </div>
                <div className="text-2xl font-bold text-slate-800 text-center">{verdict.a.score}</div>
                <div className="text-[8px] text-slate-500 text-center font-mono">/ 15 점</div>
              </div>
              <div className={`rounded p-2 border-2 ${
                verdict.winner === 'B' ? 'bg-yellow-50 border-yellow-400' : 'bg-slate-50 border-slate-200 opacity-60'
              }`}>
                <div className="flex items-center justify-between mb-1">
                  <span className="text-[10px] font-bold text-slate-700">{verdict.b.label}</span>
                  {verdict.winner === 'B' && <span className="text-sm">🏆</span>}
                </div>
                <div className="text-2xl font-bold text-slate-800 text-center">{verdict.b.score}</div>
                <div className="text-[8px] text-slate-500 text-center font-mono">/ 15 점</div>
              </div>
            </div>
            <div className="bg-yellow-50 rounded p-2 border border-yellow-200">
              <div className="text-[9px] font-bold text-yellow-800 mb-0.5 uppercase tracking-wider">rationale</div>
              <div className="text-[10px] text-slate-700 italic leading-snug">{verdict.rationale}</div>
            </div>
          </div>
        );
      }

      if (verdict.kind === 'bias-chart') {
        const maxDelta = Math.max(...verdict.biases.map((b) => b.delta));
        return (
          <div className="bg-white rounded-lg border-2 border-rose-300 p-3 shadow-sm">
            <div className="flex items-center gap-1.5 mb-2">
              <span className="text-base">📉</span>
              <span className="text-[11px] font-bold text-rose-800">Judge 편향 (점수 보정량)</span>
            </div>
            <div className="space-y-1.5 mb-3">
              {verdict.biases.map((b) => (
                <div key={b.label}>
                  <div className="flex items-center gap-2 text-[10px] mb-0.5">
                    <span className="w-4">{b.icon}</span>
                    <span className="font-bold text-rose-900 flex-1">{b.label}</span>
                    <span className="font-mono font-bold text-rose-700">+{b.delta.toFixed(1)}</span>
                  </div>
                  <div className="bg-rose-100 rounded h-2 overflow-hidden ml-6">
                    <div
                      className="bg-rose-500 h-full rounded transition-all duration-700"
                      style={{ width: `${(b.delta / maxDelta) * 100}%` }}
                    ></div>
                  </div>
                  <div className="text-[8px] text-slate-500 ml-6 italic">{b.note}</div>
                </div>
              ))}
            </div>
            <div className="border-t border-rose-100 pt-2">
              <div className="text-[9px] font-bold text-emerald-700 mb-1 uppercase tracking-wider">완화 전략</div>
              <div className="space-y-0.5">
                {verdict.mitigation.map((m, i) => (
                  <div key={i} className="text-[10px] text-emerald-800 flex items-start gap-1.5">
                    <span>{m.icon}</span>
                    <span className="flex-1 leading-snug">{m.text}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    // LiveDataPane — 좌측 패널 (질문 → 답안 → Judge → Verdict)
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">⚖️ LLM-as-Judge — 학생이 학생을 채점</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 질문 */}
          <div className="bg-slate-50 rounded-lg border border-slate-200 p-2 mb-3">
            <div className="text-[9px] font-bold text-slate-500 mb-0.5 uppercase tracking-wider">📝 평가 대상 질문</div>
            <div className="text-[11px] text-slate-700 italic leading-snug">"{SAMPLE_QUESTION}"</div>
          </div>

          {/* 답안 박스 (1~2개) */}
          <div className="space-y-2 mb-3">
            {step.answers.map((a) => (
              <AnswerBox key={a.id} answer={a} />
            ))}
          </div>

          {/* 화살표 */}
          <div className="text-center text-emerald-500 text-[14px] font-mono mb-2">↓</div>

          {/* Judge LLM */}
          <div className="mb-3">
            <JudgeBox judge={step.judge} />
          </div>

          {/* 화살표 */}
          <div className="text-center text-emerald-500 text-[14px] font-mono mb-2">↓</div>

          {/* Verdict */}
          <VerdictBox verdict={step.verdict} />

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-400"></span>pending
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500 animate-pulse"></span>judging
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-700"></span>scored
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-yellow-400"></span>winner
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-rose-500"></span>bias
            </span>
          </div>
        </div>
      );
    }

    // VSCode 스타일 CodeViewer (highlight.js)
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. LangSmith &amp; 평가 &gt; Chapter 2. 평가</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-2-1. LLM-as-Judge — LLM이 다른 LLM을 평가</h1>
                  <p className="text-sm text-slate-500 mt-0.5">학생이 학생을 채점 — Human · Judge · Criteria · Pairwise · Bias</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: 사람 평가는 비싸고, LLM Judge는 빠르지만 편향이 있다. 실무 베스트 프랙티스 — <strong>Pairwise + 위치 swap + 다중 Judge + 인간 5% 검증</strong>. 다음(V-2-2)에서는 자동 평가 파이프라인으로 묶어본다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['LLM-as-Judge', 'Human-Eval', 'Faithfulness', 'Relevance', 'Helpfulness', 'Pairwise', 'Self-bias', 'Position-bias'].map((kw) => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./V-1-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; V-1-2 프롬프트 관리</a>
              <a href="./V-2-2.html" className="text-emerald-700 hover:text-emerald-900 font-medium">V-2-2 자동 평가 파이프라인 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
