              <div className="flex items-center gap-3 text-[9px] text-slate-600">
                <span className="flex items-center gap-1">
                  <span className="text-emerald-600 font-bold">{box.downloads.toLocaleString()}</span>
                  <span>downloads</span>
                </span>
                <span className="flex items-center gap-1">
                  <span className="text-amber-500">★</span>
                  <span className="font-bold">{box.stars}</span>
                </span>
              </div>
            </div>
            <div className="text-[9px] text-emerald-700 mt-1.5">
              ✓ 검증된 외부 프롬프트를 한 줄로 가져옴
            </div>
          </div>
        );
      }
      if (box.kind === 'push') {
        return (
          <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">⬆️</span>
                <span className="text-[11px] font-bold text-emerald-800">LangSmith Hub — push</span>
              </div>
              <span className="text-[9px] bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono font-bold animate-pulse">
                NEW {box.newVersion}
              </span>
            </div>
            <div className="bg-white rounded border border-emerald-200 p-2">
              <div className="text-[10px] font-mono text-emerald-900 mb-1.5">📦 {box.name}</div>
              <div className="text-[9px] text-emerald-700 font-mono leading-tight">
                {box.diff}
              </div>
            </div>
            <div className="text-[9px] text-emerald-700 mt-1.5">
              ✓ 새 버전 commit — 작성자/시간/diff 자동 기록
            </div>
          </div>
        );
      }
      if (box.kind === 'abtest') {
        return (
          <div className="bg-amber-50 border-2 border-amber-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">⚖️</span>
                <span className="text-[11px] font-bold text-amber-800">A/B Evaluation</span>
              </div>
              <span className="text-[9px] bg-amber-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                dataset · {box.datasetSize}건
              </span>
            </div>
            <div className="bg-white rounded border border-amber-200 p-2">
              <div className="text-[10px] font-mono text-amber-900 mb-1.5">📊 {box.name}</div>
              <div className="text-[9px] text-amber-700 leading-tight">
                <span className="font-bold">winner: </span>
                <span className="bg-emerald-600 text-white px-1.5 py-0.5 rounded font-mono">{box.winner}</span>
              </div>
            </div>
            <div className="text-[9px] text-amber-700 mt-1.5">
              ✓ 감 아닌 데이터로 결정 — 4가지 지표 비교
            </div>
          </div>
        );
      }
      if (box.kind === 'collab') {
        const tagColors = {
          production: 'bg-emerald-600',
          staging: 'bg-amber-500',
          experimental: 'bg-slate-500',
        };
        return (
          <div className="bg-blue-50 border-2 border-blue-300 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5">
                <span className="text-base">👥</span>
                <span className="text-[11px] font-bold text-blue-800">Team Hub — Tags</span>
              </div>
              <span className="text-[9px] bg-blue-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                role-based
              </span>
            </div>
            <div className="bg-white rounded border border-blue-200 p-2">
              <div className="text-[10px] font-mono text-blue-900 mb-1.5">📦 {box.name}</div>
              <div className="flex flex-wrap gap-1">
                {box.tags.map((t) => (
                  <span key={t} className={`text-[9px] text-white px-1.5 py-0.5 rounded font-mono font-bold ${tagColors[t] || 'bg-slate-500'}`}>
                    {t}
                  </span>
                ))}
              </div>
            </div>
            <div className="text-[9px] text-blue-700 mt-1.5">
              ✓ 태그로 환경 분리, 비코더도 직접 편집
            </div>
          </div>
        );
      }
      return null;
    }

    // ─────────────────────────────────────────────────────
    // 버전 트리 — Git tree 같이 v1 → v2 → v3 시각화
    //   status: orphan | old | pulled | new | losing | winning
    //           tagged-prod | tagged-stg | review
    // ─────────────────────────────────────────────────────
    function VersionTree({ tree, stage }) {
      const styleMap = {
        orphan: { dot: 'bg-red-400', line: 'border-red-300 border-dashed', label: 'bg-red-100 text-red-700', badge: '???' },
        old: { dot: 'bg-slate-300', line: 'border-slate-300', label: 'bg-slate-100 text-slate-600', badge: 'old' },
        pulled: { dot: 'bg-emerald-500', line: 'border-emerald-400', label: 'bg-emerald-100 text-emerald-800 ring-2 ring-emerald-300', badge: 'PULLED' },
        new: { dot: 'bg-emerald-600', line: 'border-emerald-500', label: 'bg-emerald-100 text-emerald-800 ring-2 ring-emerald-400', badge: 'NEW' },
        losing: { dot: 'bg-amber-400', line: 'border-amber-300', label: 'bg-amber-100 text-amber-800', badge: 'B' },
        winning: { dot: 'bg-emerald-600', line: 'border-emerald-500', label: 'bg-emerald-100 text-emerald-900 ring-2 ring-emerald-400', badge: 'WINNER' },
        'tagged-prod': { dot: 'bg-emerald-600', line: 'border-emerald-500', label: 'bg-emerald-100 text-emerald-900 ring-2 ring-emerald-400', badge: 'production' },
        'tagged-stg': { dot: 'bg-amber-500', line: 'border-amber-400', label: 'bg-amber-100 text-amber-800', badge: 'staging' },
        review: { dot: 'bg-blue-500', line: 'border-blue-400 border-dashed', label: 'bg-blue-100 text-blue-800', badge: 'review' },
      };
      const headerLabel =
        stage === 'hardcoded' ? '폴더 안 파일들 (Git 외부)' :
        stage === 'pull' ? 'rlm/rag-prompt 버전 트리' :
        stage === 'push' ? 'my-org/qa-prompt 버전 트리' :
        stage === 'abtest' ? 'A/B 후보 버전' :
        '태그 부여 + 리뷰 중';

      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🌳</span>
              <span className="text-[11px] font-bold text-emerald-800">{headerLabel}</span>
            </div>
            <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-mono">
              {tree.length} entries
            </span>
          </div>
          <div className="relative pl-2">
            {tree.map((node, idx) => {
              const s = styleMap[node.status] || styleMap.old;
              const isLast = idx === tree.length - 1;
              return (
                <div key={node.ver} className="flex items-start gap-2 relative">
                  <div className="flex flex-col items-center pt-1">
                    <div className={`w-3 h-3 rounded-full ${s.dot} ring-2 ring-white shadow z-10 transition-all duration-500`}></div>
                    {!isLast && (
                      <div className={`w-0 flex-1 border-l-2 ${s.line} min-h-[28px]`}></div>
                    )}
                  </div>
                  <div className="flex-1 pb-3">
                    <div className="flex items-center gap-1.5 mb-0.5">
                      <span className={`text-[10px] px-1.5 py-0.5 rounded font-mono font-bold ${s.label}`}>
                        {node.ver}
                      </span>
                      <span className="text-[8px] bg-slate-700 text-white px-1 py-0.5 rounded font-bold uppercase">
                        {s.badge}
                      </span>
                      <span className="text-[9px] text-slate-500 font-mono ml-auto">@{node.author}</span>
                    </div>
                    <div className="text-[10px] text-slate-700 leading-tight">{node.msg}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // A/B 결과 막대 그래프 (Step 4)
    //   각 metric마다 v2/v3 막대 옆으로 그림
    //   lowerIsBetter면 색깔 반전
    // ─────────────────────────────────────────────────────
    function AbChart({ chart }) {
      return (
        <div className="bg-white rounded-lg border-2 border-amber-300 p-3">
          <div className="flex items-center gap-1.5 mb-3">
            <span className="text-base">📊</span>
            <span className="text-[11px] font-bold text-amber-800">v2 vs v3 — 4 지표 비교</span>
          </div>
          <div className="space-y-2.5">
            {chart.metrics.map((m) => {
              const v2Pct = (m.v2 / m.max) * 100;
              const v3Pct = (m.v3 / m.max) * 100;
              const v3Better = m.lowerIsBetter ? m.v3 < m.v2 : m.v3 > m.v2;
              const v2Color = v3Better ? 'bg-amber-300' : 'bg-emerald-500';
              const v3Color = v3Better ? 'bg-emerald-500' : 'bg-amber-300';
              return (
                <div key={m.name}>
                  <div className="flex items-center justify-between text-[10px] font-bold text-slate-700 mb-1">
                    <span>{m.name}</span>
                    <span className="text-[9px] text-slate-500 font-mono">
                      {v3Better ? 'v3 ✓' : 'v2 ✓'}
                    </span>
                  </div>
                  <div className="space-y-1">
                    <div className="flex items-center gap-1.5">
                      <span className="text-[9px] font-mono text-slate-500 w-5">v2</span>
                      <div className="flex-1 bg-slate-100 rounded h-3 overflow-hidden relative">
                        <div className={`h-full ${v2Color} transition-all duration-700`} style={{ width: `${v2Pct}%` }}></div>
                      </div>
                      <span className="text-[9px] font-mono text-slate-700 w-12 text-right">{m.v2}{m.unit}</span>
                    </div>
                    <div className="flex items-center gap-1.5">
                      <span className="text-[9px] font-mono text-slate-500 w-5">v3</span>
                      <div className="flex-1 bg-slate-100 rounded h-3 overflow-hidden relative">
                        <div className={`h-full ${v3Color} transition-all duration-700`} style={{ width: `${v3Pct}%` }}></div>
                      </div>
                      <span className="text-[9px] font-mono text-slate-700 w-12 text-right">{m.v3}{m.unit}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          <div className="text-[9px] text-amber-700 mt-2.5 pt-2 border-t border-amber-200">
            ✨ 4지표 중 3개 v3 우세 → v3 채택, latest 태그 부여
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 협업 멤버 카드 (Step 5)
    // ─────────────────────────────────────────────────────
    function CollabBox({ collab }) {
      return (
        <div className="bg-white rounded-lg border-2 border-blue-300 p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">🤝</span>
            <span className="text-[11px] font-bold text-blue-800">팀 멤버별 작업</span>
          </div>
          <div className="grid grid-cols-2 gap-1.5">
            {collab.members.map((m) => (
              <div key={m.name} className="bg-blue-50 rounded p-1.5 border border-blue-200">
                <div className="flex items-center gap-1 mb-0.5">
                  <span className="text-sm">{m.emoji}</span>
                  <span className="text-[10px] font-bold text-blue-900">{m.name}</span>
                  <span className="text-[8px] bg-blue-600 text-white px-1 rounded font-bold">{m.role}</span>
                </div>
                <div className="text-[9px] text-blue-700 font-mono leading-tight">{m.action}</div>
              </div>
            ))}
          </div>
          <div className="text-[9px] text-blue-700 mt-2 pt-1.5 border-t border-blue-100">
            ✨ 코드 배포 0회로 프롬프트 갱신, 30초 롤백
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   Hub 박스 + 버전 트리 (+ 단계별 추가 박스)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🌳 LangSmith Hub — 버전 관리 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <HubBox box={step.hubBox} />
            <VersionTree tree={step.tree} stage={step.stage} />
            {step.abChart && <AbChart chart={step.abChart} />}
            {step.collab && <CollabBox collab={step.collab} />}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>active/winner
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-300"></span>old
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-400"></span>compare
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-blue-500"></span>review
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2 h-2 rounded bg-red-400"></span>orphan
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-emerald-500/15 border-l-2 border-emerald-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-emerald-700 hover:text-emerald-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. LangSmith &amp; 평가 &gt; Chapter 1. LangSmith</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-1-2. 프롬프트 관리 — LangSmith Hub</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Git for 프롬프트 — pull · push · 버전 비교 · 팀 협업</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-sm text-emerald-900">
                💡 정리: 프롬프트는 코드와 분리해 <strong>Hub</strong>에서 관리. <strong>pull/push</strong>로 버전 commit, <strong>A/B 평가</strong>로 데이터 기반 결정, <strong>태그·역할 분리</strong>로 비코더도 안전하게 편집. 다음(V-2-1)에서는 LLM-as-Judge 자동 평가를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
