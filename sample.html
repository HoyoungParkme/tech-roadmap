<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이론과 실무가 결합된 통합 기술 로드맵 (손그림 Ver.)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        body {
            font-family: 'Nanum Pen Script', cursive;
            margin: 0;
            overflow: hidden;
            background-color: #fdfdfc;
            background-image: 
                linear-gradient(#e4e4e7 1px, transparent 1px),
                linear-gradient(90deg, #e4e4e7 1px, transparent 1px);
            background-size: 30px 30px;
            color: #333;
        }

        header {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border-bottom: 2px solid #333;
            border-bottom-style: dashed;
        }

        #canvas-container {
            width: 100vw;
            height: calc(100vh - 80px);
            cursor: grab;
        }
        
        #canvas-container:active {
            cursor: grabbing;
        }

        .text-outline {
            text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff,
                         -2px 0 0 #fff, 2px 0 0 #fff, 0 -2px 0 #fff, 0 2px 0 #fff;
        }

        .btn-sketch {
            background: transparent;
            border: 2px solid #333;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            padding: 8px 16px;
            font-family: 'Nanum Pen Script', cursive;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 2px 2px 0px #333;
        }
        
        .btn-sketch:hover {
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #333;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="h-20 flex items-center justify-between px-8 z-10 shrink-0">
        <div>
            <h1 class="text-3xl text-gray-900 flex items-center gap-3" style="text-shadow: 2px 2px 0px rgba(0,0,0,0.1);">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 20h.01"/><path d="M7 20v-4"/><path d="M12 20v-8"/><path d="M17 20V8"/><path d="M22 4v16"/>
                </svg>
                기술 노트 X 실제 아키텍처 통합 로드맵
            </h1>
            <p class="text-gray-600 text-xl mt-1">중앙의 '실제 데이터 흐름'을 중심으로, 주변의 '기술 노트 이론'들이 어떻게 적용되는지 확인해보세요!</p>
        </div>
        <button id="reset-btn" class="btn-sketch hover:bg-yellow-100">
            전체 한눈에 보기 🎯
        </button>
    </header>

    <main class="flex-1 relative">
        <div id="canvas-container"></div>
    </main>

    <script>
        const container = document.getElementById("canvas-container");
        let width = container.clientWidth;
        let height = container.clientHeight;

        const zoom = d3.zoom()
            .scaleExtent([0.1, 3])
            .on("zoom", (event) => {
                svgGroup.attr("transform", event.transform);
            });

        const svg = d3.select("#canvas-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .call(zoom);

        const defs = svg.append("defs");
        
        defs.append("filter")
            .attr("id", "rough-pen")
            .attr("x", "-20%")
            .attr("y", "-20%")
            .attr("width", "140%")
            .attr("height", "140%")
            .html(`
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
            `);

        // 일반 화살표 머리
        defs.append("marker")
            .attr("id", "arrowhead")
            .attr("viewBox", "-0 -5 10 10")
            .attr("refX", 8)
            .attr("refY", 0)
            .attr("orient", "auto")
            .attr("markerWidth", 8)
            .attr("markerHeight", 8)
            .append("path")
            .attr("d", "M 0,-5 L 10 ,0 L 0,5")
            .attr("fill", "#4b5563")
            .style("stroke", "none");

        // 매핑용(점선) 화살표 머리 (이론 -> 실무 연결용)
        defs.append("marker")
            .attr("id", "arrowhead-red")
            .attr("viewBox", "-0 -5 10 10")
            .attr("refX", 8)
            .attr("refY", 0)
            .attr("orient", "auto")
            .attr("markerWidth", 8)
            .attr("markerHeight", 8)
            .append("path")
            .attr("d", "M 0,-5 L 10 ,0 L 0,5")
            .attr("fill", "#ef4444")
            .style("stroke", "none");

        const svgGroup = svg.append("g");

        function drawBox(g, x, y, w, h, title, lines, bgColor, rotation = 0) {
            const boxGroup = g.append('g')
                .attr('transform', `translate(${x}, ${y}) rotate(${rotation})`);
            
            boxGroup.append('rect')
                .attr('x', -8).attr('y', 8)
                .attr('width', w).attr('height', h)
                .attr('fill', bgColor).attr('opacity', 0.6)
                .attr('filter', 'url(#rough-pen)');

            boxGroup.append('rect')
                .attr('x', 0).attr('y', 0)
                .attr('width', w).attr('height', h)
                .attr('fill', '#fff')
                .attr('stroke', '#333').attr('stroke-width', 2.5)
                .attr('filter', 'url(#rough-pen)');

            boxGroup.append('text')
                .attr('x', w / 2).attr('y', 35)
                .attr('text-anchor', 'middle')
                .style('font-size', '28px').style('font-weight', 'bold')
                .attr('class', 'text-outline')
                .text(title);

            let currentY = 75;
            lines.forEach((line) => {
                if (line === '---') {
                    boxGroup.append('path')
                        .attr('d', `M 20 ${currentY - 10} L ${w - 20} ${currentY - 10}`)
                        .attr('stroke', '#9ca3af').attr('stroke-width', 1.5)
                        .attr('stroke-dasharray', '4,4')
                        .attr('filter', 'url(#rough-pen)');
                    currentY += 10;
                    return;
                }
                const isSub = line.startsWith('   -');
                boxGroup.append('text')
                    .attr('x', isSub ? 35 : 20)
                    .attr('y', currentY)
                    .style('font-size', isSub ? '20px' : '23px')
                    .style('fill', isSub ? '#4b5563' : '#111')
                    .text(line);
                currentY += 26;
            });
            return boxGroup;
        }

        // 브라우저 아이콘
        function drawBrowser(g, x, y, title) {
            const grp = g.append('g').attr('transform', `translate(${x}, ${y})`).attr('filter', 'url(#rough-pen)');
            grp.append('rect').attr('x', -70).attr('y', -60).attr('width', 140).attr('height', 120).attr('fill', '#fff').attr('stroke', '#111').attr('stroke-width', 3);
            grp.append('rect').attr('x', -70).attr('y', -60).attr('width', 140).attr('height', 25).attr('fill', '#e5e7eb').attr('stroke', '#111').attr('stroke-width', 3);
            grp.append('rect').attr('x', -50).attr('y', -52).attr('width', 100).attr('height', 10).attr('fill', '#fff').attr('stroke', '#111').attr('stroke-width', 1.5);
            grp.append('text').attr('x', 0).attr('y', 20).attr('text-anchor', 'middle').style('font-size', '28px').style('font-weight', 'bold').text(title);
            grp.append('text').attr('x', 0).attr('y', 45).attr('text-anchor', 'middle').style('font-size', '20px').style('fill', '#4b5563').text("(Web Browser)");
        }

        // 모바일 폰 아이콘
        function drawPhone(g, x, y, title) {
            const grp = g.append('g').attr('transform', `translate(${x}, ${y})`).attr('filter', 'url(#rough-pen)');
            grp.append('rect').attr('x', -50).attr('y', -80).attr('width', 100).attr('height', 160).attr('rx', 15).attr('fill', '#fff').attr('stroke', '#111').attr('stroke-width', 3);
            grp.append('circle').attr('cx', 0).attr('cy', 60).attr('r', 8).attr('stroke', '#111').attr('stroke-width', 2).attr('fill', 'none');
            grp.append('rect').attr('x', -40).attr('y', -60).attr('width', 80).attr('height', 100).attr('fill', '#f3f4f6').attr('stroke', '#111').attr('stroke-width', 1.5);
            grp.append('text').attr('x', 0).attr('y', -5).attr('text-anchor', 'middle').style('font-size', '28px').style('font-weight', 'bold').text(title);
            grp.append('text').attr('x', 0).attr('y', 20).attr('text-anchor', 'middle').style('font-size', '20px').style('fill', '#4b5563').text("(iOS/Android)");
        }

        // 데이터베이스 아이콘 (원기둥)
        function drawDatabase(g, x, y, title, subtitle) {
            const w = 120, h = 140, ry = 20;
            const grp = g.append('g').attr('transform', `translate(${x}, ${y})`).attr('filter', 'url(#rough-pen)');
            grp.append('path').attr('d', `M ${-w/2} ${-h/2+ry} L ${-w/2} ${h/2-ry} A ${w/2} ${ry} 0 0 0 ${w/2} ${h/2-ry} L ${w/2} ${-h/2+ry} Z`).attr('fill', '#fff').attr('stroke', '#111').attr('stroke-width', 3);
            grp.append('path').attr('d', `M ${-w/2} 0 A ${w/2} ${ry} 0 0 0 ${w/2} 0`).attr('fill', 'none').attr('stroke', '#111').attr('stroke-width', 3);
            grp.append('ellipse').attr('cx', 0).attr('cy', -h/2+ry).attr('rx', w/2).attr('ry', ry).attr('fill', '#fff').attr('stroke', '#111').attr('stroke-width', 3);
            
            grp.append('text').attr('x', 0).attr('y', 40).attr('text-anchor', 'middle').style('font-size', '28px').style('font-weight', 'bold').text(title);
            grp.append('text').attr('x', 0).attr('y', 65).attr('text-anchor', 'middle').style('font-size', '20px').style('fill', '#4b5563').text(subtitle);
        }

        // 서버 문서 아이콘
        function drawServerBox(g, x, y, title, type) {
            const grp = g.append('g').attr('transform', `translate(${x}, ${y})`).attr('filter', 'url(#rough-pen)');
            grp.append('rect').attr('x', -80).attr('y', -70).attr('width', 160).attr('height', 140).attr('fill', '#fff').attr('stroke', '#111').attr('stroke-width', 3);
            grp.append('line').attr('x1', -60).attr('y1', -40).attr('x2', -40).attr('y2', -40).attr('stroke', '#111').attr('stroke-width', 3);
            grp.append('line').attr('x1', -60).attr('y1', -20).attr('x2', -40).attr('y2', -20).attr('stroke', '#111').attr('stroke-width', 3);
            grp.append('line').attr('x1', -60).attr('y1', 0).attr('x2', -40).attr('y2', 0).attr('stroke', '#111').attr('stroke-width', 3);
            
            grp.append('rect').attr('x', -20).attr('y', -45).attr('width', 80).attr('height', 60).attr('fill', 'none').attr('stroke', '#111').attr('stroke-width', 2);
            
            grp.append('text').attr('x', 0).attr('y', 45).attr('text-anchor', 'middle').style('font-size', '28px').style('font-weight', 'bold').text(title);
            grp.append('text').attr('x', 0).attr('y', 65).attr('text-anchor', 'middle').style('font-size', '20px').style('fill', '#4b5563').text(type);
        }

        function drawArrow(g, x1, y1, x2, y2, labelTop, labelBottom) {
            const grp = g.append('g').attr('filter', 'url(#rough-pen)');
            grp.append("line").attr("x1", x1).attr("y1", y1).attr("x2", x2).attr("y2", y2)
                .attr("stroke", "#111").attr("stroke-width", 3).attr("marker-end", "url(#arrowhead)");
            
            const mx = (x1 + x2) / 2;
            const my = (y1 + y2) / 2;
            
            if (labelTop) {
                grp.append('text').attr('x', mx).attr('y', my - 10).attr('text-anchor', 'middle')
                    .style('font-size', '24px').style('font-weight', 'bold').attr('class', 'text-outline').text(labelTop);
            }
            if (labelBottom) {
                grp.append('text').attr('x', mx).attr('y', my + 25).attr('text-anchor', 'middle')
                    .style('font-size', '20px').style('fill', '#4b5563').attr('class', 'text-outline').text(labelBottom);
            }
        }

        // 이론 -> 실무 매핑용 붉은 점선 화살표
        function drawMappingArrow(g, x1, y1, x2, y2, bendX, bendY) {
            g.append("path")
                .attr("d", `M ${x1} ${y1} Q ${bendX} ${bendY} ${x2} ${y2}`)
                .attr("stroke", "#ef4444").attr("stroke-width", 2.5) // 빨간색
                .attr("stroke-dasharray", "8,8") // 점선
                .attr("fill", "none")
                .attr("marker-end", "url(#arrowhead-red)")
                .attr("filter", "url(#rough-pen)")
                .attr("opacity", 0.7);
        }


        // ==========================================
        // 1. 코어 아키텍처 (중앙 통신 흐름) 그리기
        // ==========================================
        const coreG = svgGroup.append('g');
        
        // 배경 클라우드/인프라 (제10장 영역)
        coreG.append('rect')
            .attr('x', 1400).attr('y', 300).attr('width', 900).attr('height', 600)
            .attr('rx', 30).attr('fill', '#f8fafc').attr('stroke', '#94a3b8').attr('stroke-width', 2).attr('stroke-dasharray', '10,10')
            .attr('filter', 'url(#rough-pen)');
        coreG.append('text').attr('x', 1850).attr('y', 340).attr('text-anchor', 'middle')
            .style('font-size', '32px').style('font-weight', 'bold').style('fill', '#64748b').text("☁️ Server Infrastructure (AWS / GCP / Docker)");

        // Client (X: 600)
        drawBrowser(coreG, 600, 450, "Web");
        drawPhone(coreG, 600, 750, "App");
        coreG.append('text').attr('x', 600).attr('y', 330).attr('text-anchor', 'middle')
            .style('font-size', '36px').style('font-weight', 'bold').text("Frontend (Client)");

        // Server (X: 1600)
        drawServerBox(coreG, 1600, 450, "Web Server", "Apache/Nginx (Static)");
        drawServerBox(coreG, 1600, 750, "WAS", "Spring / Django (Dynamic)");
        coreG.append('text').attr('x', 1600).attr('y', 390).attr('text-anchor', 'middle')
            .style('font-size', '36px').style('font-weight', 'bold').text("Backend (Server)");

        // Database (X: 2100)
        drawDatabase(coreG, 2100, 750, "Database", "MySQL / Oracle");
        
        // Network Arrows (HTTP / API)
        // Web -> Web Server
        drawArrow(coreG, 700, 430, 1480, 430, "요청 (HTTP/HTTPS)", "URL 입력 후 엔터");
        drawArrow(coreG, 1480, 470, 700, 470, "응답 (HTML/CSS/JS)", "정적 파일 제공");
        
        // App -> WAS
        drawArrow(coreG, 680, 730, 1480, 730, "API 요청 (GET/POST/PUT)", "HTTP / HTTPS");
        drawArrow(coreG, 1480, 770, 680, 770, "응답 (JSON / XML)", "데이터 송수신");

        // WAS -> DB
        drawArrow(coreG, 1700, 730, 2000, 730, "SQL <CRUD>", "");
        drawArrow(coreG, 2000, 770, 1700, 770, "Query 결과", "");


        // ==========================================
        // 2. 기술 노트 이론 박스 그리기 (주변부)
        // ==========================================
        const theoryG = svgGroup.append('g');

        // [제1장 & 2장] 소프트웨어 기초 (Top Left)
        drawBox(theoryG, 100, 150, 320, 200, "제1~2장. SW 개론", [
            "• 개발이란? (전공/비전공)",
            "• 프론트엔드 vs 백엔드",
            "• 앱 종류 (웹/네이티브/하이브리드)"
        ], "#fecaca", -2); // 빨강

        // [제3장] 언어 및 프레임워크 (Bottom Left)
        drawBox(theoryG, 100, 900, 340, 250, "제3장. 언어 및 프레임워크", [
            "• 프론트엔드 (JavaScript/React)",
            "• 모바일 (Java/Kotlin/Swift/Flutter)",
            "---",
            "• 백엔드 (Python/Java/Spring)",
            "• 기초 시스템 (C/C++)"
        ], "#fef08a", 1); // 노랑

        // [제8장] 네트워크 기술 (Top Middle)
        drawBox(theoryG, 950, 80, 340, 220, "제8장. 네트워크 기술", [
            "• DNS, IP, Port",
            "• TCP/IP, 라우터, 스위치",
            "• HTTP 통신 (요청/응답)",
            "• 동기(Sync) vs 비동기(Async)"
        ], "#ddd6fe", -1); // 보라

        // [제6장] 컴퓨터 구조 & OS (Bottom Middle)
        drawBox(theoryG, 1300, 1050, 320, 240, "제6장. 컴퓨터 구조 및 OS", [
            "• 컴퓨터 내부 (CPU/디스크/커널)",
            "• 메모리 계층 (캐시/주메모리)",
            "• 프로세스 vs 스레드",
            "• 멀티스레딩 (서버 동시처리)"
        ], "#bae6fd", 2); // 파랑

        // [제4장 & 7장] 필수 지식 & API, 보안 (Middle Left/Center)
        drawBox(theoryG, 900, 950, 300, 220, "제4/7장. 필수지식 & API", [
            "• 자료구조 / 알고리즘",
            "• 객체지향 (OOP)",
            "• RESTful API 설계",
            "• 세션/쿠키/JWT (보안)"
        ], "#fbcfe8", -1); // 분홍

        // [제7장] 데이터베이스 (Bottom Right)
        drawBox(theoryG, 2200, 950, 280, 180, "제6장(DB). 데이터베이스", [
            "• RDBMS (테이블/컬럼/레코드)",
            "• NoSQL (Redis)",
            "• ORM (SQLAlchemy)"
        ], "#fed7aa", 1); // 주황

        // [제5장 & 9장] 아키텍처 및 공학 (Top Right)
        drawBox(theoryG, 2000, 80, 320, 200, "제5/9장. 아키텍처 & 공학", [
            "• 소프트웨어 공학 (애자일/테스트)",
            "• 시스템 아키텍처 (스타벅스 비유)",
            "• MSA (마이크로서비스)",
            "• C/S 구조 완벽 이해"
        ], "#bbf7d0", -1); // 초록

        // [제10장] 클라우드 및 배포 (Far Right)
        drawBox(theoryG, 2450, 450, 300, 220, "제10장. 클라우드 & 데브옵스", [
            "• IaaS / PaaS / SaaS",
            "• 컨테이너 (Docker/K8s)",
            "• 서버리스 (Serverless)",
            "• CI/CD 파이프라인 (Git)"
        ], "#99f6e4", 2); // 민트


        // ==========================================
        // 3. 맵핑 화살표 (이론이 실무 어디에 쓰이는가?)
        // ==========================================
        
        // 1~2장(개론) -> 프론트/백 전체 지칭
        drawMappingArrow(svgGroup, 420, 250, 600, 350, 500, 250);
        drawMappingArrow(svgGroup, 420, 200, 1600, 350, 1000, 100);

        // 3장(언어) -> 웹/앱 (프론트)
        drawMappingArrow(svgGroup, 250, 900, 550, 800, 350, 850); // 모바일 언어 -> App
        drawMappingArrow(svgGroup, 250, 900, 550, 500, 250, 650); // JS -> Web
        
        // 3장(언어) -> WAS (백엔드)
        drawMappingArrow(svgGroup, 440, 1020, 1550, 820, 1000, 1100); // 백엔드 언어 -> WAS

        // 8장(네트워크) -> HTTP 화살표들
        drawMappingArrow(svgGroup, 1120, 300, 1120, 410, 1150, 350); // -> Web 요청
        drawMappingArrow(svgGroup, 1120, 300, 1120, 710, 1250, 500); // -> API 요청

        // 6장(OS/컴퓨터구조) -> WAS (서버가 어떻게 돌아가는가)
        drawMappingArrow(svgGroup, 1450, 1050, 1600, 830, 1600, 1000); 

        // 4/7장(API/필수) -> API 화살표 및 WAS
        drawMappingArrow(svgGroup, 1050, 950, 1150, 780, 1150, 900); // -> API 요청 규격
        
        // 6장(DB) -> Database 원기둥
        drawMappingArrow(svgGroup, 2300, 950, 2150, 830, 2300, 850); 

        // 5/9장(아키텍처) -> 서버/DB 구조 전체
        drawMappingArrow(svgGroup, 2150, 280, 2100, 650, 2200, 450); // -> DB설계
        drawMappingArrow(svgGroup, 2050, 280, 1650, 380, 1800, 300); // -> 서버 아키텍처

        // 10장(클라우드) -> 인프라 박스
        drawMappingArrow(svgGroup, 2450, 550, 2320, 550, 2400, 550); 


        // ==========================================
        // 4. 화면 정렬 및 리사이즈
        // ==========================================
        function centerCanvas() {
            // 맵 전체 크기 추정 (X: 0 ~ 2800, Y: 0 ~ 1400)
            const mapWidth = 2800;
            const mapHeight = 1400;
            
            const scale = Math.min(width / mapWidth, height / mapHeight) * 0.9;
            const tx = (width - mapWidth * scale) / 2 + 50; 
            const ty = (height - mapHeight * scale) / 2 + 50;

            const initialTransform = d3.zoomIdentity.translate(tx, ty).scale(scale);
            svg.transition().duration(1000).call(zoom.transform, initialTransform);
        }
        
        centerCanvas();

        document.getElementById('reset-btn').addEventListener('click', centerCanvas);

        window.addEventListener('resize', () => {
            width = container.clientWidth;
            height = container.clientHeight;
            svg.attr("width", width).attr("height", height);
        });

    </script>
</body>
</html>
