        { d: 1, label: 'index.tsx',     icon: '📄', tip: '→ /' },
        { d: 1, label: 'about.tsx',     icon: '📄', tip: '→ /about' },
        { d: 1, label: 'blog/',         icon: '📁' },
        { d: 2, label: 'index.tsx',     icon: '📄', tip: '→ /blog' },
        { d: 2, label: '[slug].tsx',    icon: '📄', tip: '→ /blog/:slug' },
        { d: 1, label: 'api/',          icon: '📁' },
        { d: 2, label: 'hello.ts',      icon: '📄', tip: '→ /api/hello' },
      ];
      const appTree = [
        { d: 0, label: 'app/', icon: '📁' },
        { d: 1, label: 'layout.tsx',    icon: '🟦', tip: '루트 레이아웃' },
        { d: 1, label: 'page.tsx',      icon: '🟢', tip: '→ /' },
        { d: 1, label: 'loading.tsx',   icon: '🟡', tip: 'Suspense fallback' },
        { d: 1, label: 'error.tsx',     icon: '🔴', tip: 'Error Boundary' },
        { d: 1, label: 'about/',        icon: '📁' },
        { d: 2, label: 'page.tsx',      icon: '🟢', tip: '→ /about' },
        { d: 1, label: 'blog/',         icon: '📁' },
        { d: 2, label: 'layout.tsx',    icon: '🟦', tip: '/blog/* 공통' },
        { d: 2, label: 'page.tsx',      icon: '🟢', tip: '→ /blog' },
        { d: 2, label: '[slug]/',       icon: '📁' },
        { d: 3, label: 'page.tsx',      icon: '🟢', tip: '→ /blog/:slug' },
        { d: 1, label: 'api/',          icon: '📁' },
        { d: 2, label: 'hello/',        icon: '📁' },
        { d: 3, label: 'route.ts',      icon: '🟣', tip: 'Route Handler' },
      ];
      const tree = router === 'pages' ? pagesTree : appTree;
      return (
        <div className="rounded-lg bg-zinc-50 border border-zinc-200 p-3 font-mono text-[11px]">
          <div className="text-[10px] text-zinc-500 mb-1.5">📂 폴더 구조</div>
          {tree.map((node, i) => (
            <div key={i} className="flex items-center gap-1.5 py-0.5" style={{ paddingLeft: `${node.d * 14}px` }}>
              <span>{node.icon}</span>
              <span className="text-zinc-800">{node.label}</span>
              {node.tip && <span className="text-zinc-500 text-[10px] ml-1">— {node.tip}</span>}
            </div>
          ))}
        </div>
      );
    }

    function InfoRow({ label, value, accent }) {
      return (
        <div className="flex items-start gap-2 py-1 border-b border-zinc-100 last:border-0">
          <span className="text-[10px] text-zinc-500 w-20 flex-shrink-0">{label}</span>
          <span className={`text-xs font-mono ${accent ? 'text-emerald-700 font-bold' : 'text-zinc-800'}`}>{value}</span>
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-zinc-400 bg-white p-3">
          <div className="text-sm font-bold text-zinc-900 mb-2">📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-zinc-500 border-b border-zinc-200">
                <th className="py-1 pr-2">항목</th><th className="py-1 pr-2">Pages</th><th className="py-1 pr-2">App</th><th className="py-1">변화</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-zinc-100">
                  <td className="py-1 pr-2 font-medium text-zinc-800">{r.metric}</td>
                  <td className="py-1 pr-2 text-rose-700 font-mono">{r.before}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono">{r.after}</td>
                  <td className="py-1 text-zinc-900 font-bold">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.warn;
      return (
        <div className="rounded-xl border border-zinc-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-zinc-900">두 라우터 비교</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <div className="rounded-lg bg-zinc-100 border border-zinc-300 p-2 mb-2">
            <InfoRow label="라우터" value={state.router === 'pages' ? 'Pages Router' : 'App Router'} accent={state.router === 'app'} />
            <InfoRow label="버전" value={state.version} />
            <InfoRow label="컴포넌트" value={state.components} />
            <InfoRow label="데이터" value={state.data} />
            <InfoRow label="레이아웃" value={state.layout} />
            <InfoRow label="Streaming" value={state.streaming} accent={state.streaming === '✓'} />
          </div>

          <FolderTree router={state.router} />

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-zinc-900 bg-zinc-100 border border-zinc-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-zinc-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-zinc-900 border-b border-zinc-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-zinc-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-zinc-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-zinc-500/25 border-l-2 border-zinc-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-zinc-900 border-t border-zinc-700 flex items-center justify-between text-[10px] text-zinc-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-zinc-50 to-neutral-100 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-black text-white font-bold text-xl">▲</span>
              <div>
                <h1 className="text-2xl font-bold text-zinc-900">Chapter I-2-2. App Router vs Pages Router</h1>
                <p className="text-sm text-zinc-700/80">pages/ → app/ — 폴더, 데이터, 레이아웃이 어떻게 달라졌나</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-zinc-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-black' : 'bg-zinc-200'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-black text-zinc-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-zinc-200/90 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} className="px-3 py-1.5 text-xs rounded border border-zinc-300 bg-white text-zinc-800 hover:bg-zinc-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-zinc-300 bg-white text-zinc-800 hover:bg-zinc-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-zinc-900 text-white' : 'bg-black text-white hover:bg-zinc-800'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-zinc-300 bg-white text-zinc-800 hover:bg-zinc-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-zinc-600 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-zinc-400 bg-white px-4 py-3 text-sm text-zinc-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                App Router = Next 13+ 표준. 폴더=라우트, layout.tsx 자동 중첩, 기본 Server Component, 데이터를 컴포넌트 안에서 await. Pages Router 도 유지보수되지만 새 기능은 App 전용. 신규는 무조건 App.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['App Router', 'Pages Router', 'layout.tsx', 'Server Components', 'use client', 'Migration'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-zinc-100 text-zinc-800 border border-zinc-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-zinc-700">
              <a href="./I-2-1.html" className="underline hover:no-underline">← 이전: I-2-1 설치 + 첫 페이지</a>
              <a href="../part2/II-1-1.html" className="underline hover:no-underline">다음: II-1-1 File-based Routing →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
