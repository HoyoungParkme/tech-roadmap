<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — IV-2-1. Streaming SQL (ksqlDB / Flink SQL)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    IV-2-1. Streaming SQL (ksqlDB / Flink SQL)
    학습 목표: 끊임없이 흐르는 stream 위에서 SQL window 쿼리로 실시간 집계
    핵심 비유: "흐르는 강에 그물 던지기" — 시간 window 로 잘라서 그물 안에 들어온 것만 집계
    구조: 4단계 (unbounded / window / watermark / cep)
    패턴: mlops IV-1-1 — 좌(LiveDataPane Streaming 시각화) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // STEPS — 단계별 시뮬레이션 데이터
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Unbounded — 끝이 없는 stream',
        desc: '배치 SQL은 "끝이 있는 테이블"을 한 번에 읽지만, Streaming SQL은 끝이 없는 stream 위에서 동작한다. Kafka topic을 CREATE STREAM 으로 선언하면 이후 INSERT 되는 모든 메시지가 자동으로 들어온다. event time 축은 무한히 흐른다.',
        focus: 'unbounded',
        // unbounded: kafka topic → stream 흐름 + event time 축
        events: [
          { id: 'e1', t: 5,  page: '/home', late: false },
          { id: 'e2', t: 18, page: '/cart', late: false },
          { id: 'e3', t: 32, page: '/home', late: false },
          { id: 'e4', t: 47, page: '/buy',  late: false },
          { id: 'e5', t: 62, page: '/home', late: false },
          { id: 'e6', t: 78, page: '/cart', late: false },
        ],
        windows: [],
        watermark: null,
        latePoint: null,
        cepMatch: null,
        code: {
          lang: 'yaml',
          filename: 'create-stream.sql',
          lines: [
            '-- ksqlDB: Kafka topic을 stream으로 선언',
            'CREATE STREAM clicks (',
            '  user_id   BIGINT,',
            '  page      STRING,',
            '  ts        TIMESTAMP',
            ') WITH (',
            '  KAFKA_TOPIC  = \'clicks\',',
            '  VALUE_FORMAT = \'JSON\',',
            '  TIMESTAMP    = \'ts\'',
            ');',
            '',
            '-- Flink SQL: 동일 개념, DDL 형식',
            'CREATE TABLE clicks (',
            '  user_id BIGINT,',
            '  page    STRING,',
            '  ts      TIMESTAMP(3),',
            '  WATERMARK FOR ts AS ts - INTERVAL \'5\' SECOND',
            ') WITH (',
            '  \'connector\' = \'kafka\',',
            '  \'topic\'     = \'clicks\',',
            '  \'format\'    = \'json\'',
            ');',
            '',
            '-- 핵심 차이: 배치 vs 스트리밍',
            '-- 배치: 끝있는 table, 1회 실행 → 결과 1개',
            '-- 스트림: 끝없는 stream, 계속 실행 → 결과 stream',
          ],
          highlight: [2, 13, 17],
        },
      },
      {
        title: 'Step 2. Window — Tumble / Hop / Session',
        desc: '끝이 없는 stream을 시간으로 잘라야 집계가 가능. TUMBLE은 겹치지 않는 고정 구간(1분/1분/1분), HOP은 겹치는 슬라이딩(5분 window 1분마다), SESSION은 활동 간격으로 자동 묶음. "그물의 모양"이 다르다.',
        focus: 'window',
        events: [
          { id: 'e1', t: 5,  page: '/home', late: false },
          { id: 'e2', t: 18, page: '/cart', late: false },
          { id: 'e3', t: 32, page: '/home', late: false },
          { id: 'e4', t: 47, page: '/buy',  late: false },
          { id: 'e5', t: 62, page: '/home', late: false },
          { id: 'e6', t: 78, page: '/cart', late: false },
        ],
        // 3가지 window 비교 — 1분(60s) tumble 기준
        windows: [
          { kind: 'tumble',  start: 0,  end: 60, count: 4, label: '[0~1분) count=4' },
          { kind: 'tumble',  start: 60, end: 90, count: 2, label: '[1~1.5분) count=2' },
          { kind: 'hop',     start: 0,  end: 60, count: 4, label: 'HOP 5min slide 1min' },
          { kind: 'session', start: 5,  end: 78, count: 6, label: 'SESSION (idle 30s)' },
        ],
        watermark: null,
        latePoint: null,
        cepMatch: null,
        code: {
          lang: 'yaml',
          filename: 'window-queries.sql',
          lines: [
            '-- 1) TUMBLE: 겹치지 않는 고정 구간 (가장 일반)',
            'SELECT',
            '  TUMBLE_START(ts, INTERVAL \'1\' MINUTE) AS win_start,',
            '  page,',
            '  COUNT(*) AS clicks',
            'FROM clicks',
            'GROUP BY TUMBLE(ts, INTERVAL \'1\' MINUTE), page;',
            '-- [10:00-10:01) /home  142',
            '-- [10:01-10:02) /home  158',
            '',
            '-- 2) HOP: 슬라이딩 window (겹침)',
            'SELECT',
            '  HOP_START(ts, INTERVAL \'1\' MINUTE, INTERVAL \'5\' MINUTE) AS win_start,',
            '  COUNT(*) AS clicks_5min',
            'FROM clicks',
            'GROUP BY HOP(ts, INTERVAL \'1\' MINUTE, INTERVAL \'5\' MINUTE);',
            '-- 1분마다 "지난 5분" 합 → 부드러운 추세선',
            '',
            '-- 3) SESSION: 활동 간격으로 자동 그룹',
            'SELECT user_id,',
            '  SESSION_START(ts, INTERVAL \'30\' MINUTE) AS s_start,',
            '  COUNT(*) AS page_views',
            'FROM clicks',
            'GROUP BY SESSION(ts, INTERVAL \'30\' MINUTE), user_id;',
            '',
            '-- 비유: 그물 모양',
            '-- TUMBLE  = 1분짜리 그물 차례차례',
            '-- HOP     = 5분짜리 그물 1분마다 겹쳐서',
            '-- SESSION = 무리 지나갈 때까지 기다렸다 닫기',
          ],
          highlight: [1, 11, 19],
        },
      },
      {
        title: 'Step 3. Watermark — late event 처리',
        desc: '네트워크 지연으로 ts=58초 이벤트가 t=70초에 도착할 수 있다. Watermark는 "이 시각 이전 이벤트는 더 안 올 거다"라는 약속. 5초 grace 후 window를 닫고 결과 emit. 이후 도착하는 이벤트는 late event 처리 (버림 또는 side output).',
        focus: 'watermark',
        events: [
          { id: 'e1', t: 5,  page: '/home', late: false },
          { id: 'e2', t: 18, page: '/cart', late: false },
          { id: 'e3', t: 32, page: '/home', late: false },
          { id: 'e4', t: 47, page: '/buy',  late: false },
          { id: 'e5', t: 58, page: '/home', late: false },
          { id: 'e6', t: 78, page: '/cart', late: false },
        ],
        windows: [
          { kind: 'tumble', start: 0,  end: 60, count: 5, label: '[0~60s) closed', closed: true },
        ],
        watermark: 65,   // watermark line at t=65 (= max event 60 - 5s grace ... 시각화 단순화)
        latePoint: 55,   // ts=55, 도착시간이 watermark 이후 → late
        cepMatch: null,
        code: {
          lang: 'yaml',
          filename: 'watermark.sql',
          lines: [
            '-- Flink SQL: WATERMARK 선언 (DDL 안에)',
            'CREATE TABLE clicks (',
            '  user_id BIGINT,',
            '  page    STRING,',
            '  ts      TIMESTAMP(3),',
            '  WATERMARK FOR ts AS ts - INTERVAL \'5\' SECOND',
            ') WITH ( \'connector\' = \'kafka\', ... );',
            '',
            '-- 의미',
            '-- "ts보다 5초 늦게까지는 도착할 수 있다"',
            '-- watermark = max(ts) - 5s',
            '-- watermark가 window 끝을 지나면 → window 닫고 emit',
            '',
            '-- 동작 예시: TUMBLE 1분 [10:00~10:01)',
            '-- 도착시각    이벤트 ts   watermark   상태',
            '-- 10:00:55    10:00:50    10:00:45    채우는 중',
            '-- 10:01:04    10:00:59    10:00:54    아직 미마감',
            '-- 10:01:10    10:01:05    10:01:00    → window 닫고 emit',
            '-- 10:01:12    10:00:58    (late!)     이미 닫힘',
            '',
            '-- late event 처리',
            '-- 1) 버림 (기본)',
            '-- 2) side output 으로 별도 처리',
            '-- 3) ALLOWED LATENESS — window 더 오래 열어둠',
            '',
            '-- 트레이드오프',
            '-- watermark 짧게 → 빠름, late 많아짐',
            '-- watermark 길게 → 늦음, 정확도 ↑',
          ],
          highlight: [6, 18, 19],
        },
      },
      {
        title: 'Step 4. CEP — MATCH_RECOGNIZE 패턴 매칭',
        desc: 'Complex Event Processing — stream 안에서 "결제 → 환불" 같은 시퀀스 패턴을 정규식처럼 찾는다. Flink SQL의 MATCH_RECOGNIZE 는 PARTITION BY user_id 로 묶고 ORDER BY ts 로 정렬한 뒤 PATTERN (PAY REFUND) 매칭. 사기 탐지 / 클릭 퍼널 / 이탈 분석에 쓴다.',
        focus: 'cep',
        events: [
          { id: 'e1', t: 5,  page: 'PAY:1.2M',    late: false, kind: 'pay' },
          { id: 'e2', t: 18, page: '/cart',       late: false },
          { id: 'e3', t: 32, page: 'REFUND:1.2M', late: false, kind: 'refund' },
          { id: 'e4', t: 47, page: '/buy',        late: false },
          { id: 'e5', t: 62, page: '/home',       late: false },
          { id: 'e6', t: 78, page: '/cart',       late: false },
        ],
        windows: [],
        watermark: null,
        latePoint: null,
        cepMatch: { fromId: 'e1', toId: 'e3', label: 'PAY → REFUND 매칭!' },
        code: {
          lang: 'yaml',
          filename: 'match-recognize.sql',
          lines: [
            '-- Flink SQL: MATCH_RECOGNIZE',
            '-- 시나리오: 결제 → 환불 시퀀스 패턴 탐지',
            '',
            'SELECT *',
            'FROM payments',
            'MATCH_RECOGNIZE (',
            '  PARTITION BY user_id',
            '  ORDER BY ts',
            '  MEASURES',
            '    PAY.ts        AS pay_ts,',
            '    REFUND.ts     AS refund_ts,',
            '    PAY.amount    AS pay_amt,',
            '    REFUND.amount AS refund_amt',
            '  ONE ROW PER MATCH',
            '  AFTER MATCH SKIP PAST LAST ROW',
            '  PATTERN (PAY REFUND)',
            '  WITHIN INTERVAL \'30\' MINUTE',
            '  DEFINE',
            '    PAY    AS PAY.kind = \'payment\',',
            '    REFUND AS REFUND.kind = \'refund\'',
            '         AND REFUND.amount = PAY.amount',
            ');',
            '-- user_id=42, pay_ts=10:01:00 amt=1.2M',
            '--            refund_ts=10:03:30 amt=1.2M',
            '-- → 의심 거래 alert',
            '',
            '-- 패턴 문법 (정규식 유사)',
            '-- A B          A 다음 B',
            '-- A B+         A 다음 B 1번 이상',
            '-- A B* C       A 다음 B 0번 이상, C',
            '',
            '-- 활용 예',
            '-- 사기:  login_fail{3,} → success → transfer',
            '-- 퍼널:  view → cart → checkout → purchase',
            '-- IoT:   normal → high → critical',
            '',
            '-- ksqlDB는 MATCH_RECOGNIZE 없음 — JOIN 으로 흉내',
          ],
          highlight: [6, 16, 19, 20],
        },
      },
    ];

    // 4 단계 미니카드 (focus 강조)
    const STREAM_STAGES = [
      { key: 'unbounded', emoji: '🌊', name: 'Unbounded', note: '끊임없는 stream' },
      { key: 'window',    emoji: '⏰', name: 'Window',    note: 'Tumble/Hop/Session' },
      { key: 'watermark', emoji: '💧', name: 'Watermark', note: 'late event 처리' },
      { key: 'cep',       emoji: '🎯', name: 'CEP',       note: 'pattern matching' },
    ];

    // yaml → SQL label override
    const LANG_LABEL = { yaml: 'SQL', python: 'Python', shell: 'Bash' };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Streaming 시각화 (event time 축)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const { focus, events, windows, watermark, latePoint, cepMatch } = step;
      const T_MAX = 90; // event time 축 0~90s
      const tToPct = (t) => (t / T_MAX) * 100;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🌊 흐르는 강 (Streaming)</h2>
            <span className="text-[10px] text-slate-400 font-mono">event time · live</span>
          </div>

          {/* 4 단계 카드 */}
          <div className="grid grid-cols-4 gap-2 mb-4">
            {STREAM_STAGES.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-2 text-center transition-all duration-300 ${isActive ? 'bg-teal-100 border-2 border-teal-500 scale-105 shadow' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-xl">{s.emoji}</div>
                  <div className="text-[11px] font-bold text-slate-800 mt-0.5">{s.name}</div>
                  <div className="text-[9px] text-slate-500">{s.note}</div>
                </div>
              );
            })}
          </div>

          {/* Kafka topic → stream 흐름 (Step 1만 강조) */}
          <div className="mb-3 flex items-center gap-2 text-xs">
            <span className={`px-2 py-1 rounded font-mono ${focus === 'unbounded' ? 'bg-teal-100 text-teal-800 border border-teal-400' : 'bg-slate-100 text-slate-600 border border-slate-200'}`}>
              📦 Kafka topic: clicks
            </span>
            <span className="text-slate-400">→</span>
            <span className={`px-2 py-1 rounded font-mono ${focus === 'unbounded' ? 'bg-teal-100 text-teal-800 border border-teal-400' : 'bg-slate-100 text-slate-600 border border-slate-200'}`}>
              CREATE STREAM
            </span>
            <span className="text-slate-400">→</span>
            <span className="text-teal-600 font-mono text-[11px]">∞</span>
          </div>

          {/* event time 축 + 이벤트 + window + watermark + cep match */}
          <div className="relative bg-slate-50 border border-slate-200 rounded-lg p-3 pt-6 pb-10" style={{ minHeight: '180px' }}>

            {/* 윈도우 영역 (Step 2 / 3) */}
            {windows.map((w, i) => {
              const left  = tToPct(w.start);
              const width = tToPct(w.end - w.start);
              const yOffset = w.kind === 'tumble' ? 8 : w.kind === 'hop' ? 38 : 68;
              const bg = w.kind === 'tumble'
                ? (w.closed ? 'bg-teal-200/70 border-teal-500' : 'bg-teal-100/60 border-teal-400')
                : w.kind === 'hop'
                  ? 'bg-cyan-100/60 border-cyan-400'
                  : 'bg-emerald-100/60 border-emerald-400';
              return (
                <div
                  key={i}
                  className={`absolute border-2 border-dashed rounded ${bg}`}
                  style={{ left: `${left}%`, width: `${width}%`, top: `${yOffset}px`, height: '24px' }}
                  title={w.label}
                >
                  <span className="text-[9px] font-bold text-slate-700 px-1">{w.label}</span>
                </div>
              );
            })}

            {/* event time 축 (가로선) */}
            <div className="absolute left-0 right-0 border-t-2 border-slate-400" style={{ top: '120px' }}></div>

            {/* 축 눈금 */}
            {[0, 30, 60, 90].map((tick) => (
              <div key={tick} className="absolute" style={{ left: `${tToPct(tick)}%`, top: '120px' }}>
                <div className="w-0.5 h-2 bg-slate-400"></div>
                <div className="text-[9px] text-slate-500 mt-0.5">{tick}s</div>
              </div>
            ))}

            {/* watermark line (Step 3) */}
            {watermark !== null && (
              <div
                className="absolute border-l-2 border-red-500"
                style={{ left: `${tToPct(watermark)}%`, top: '4px', height: '120px' }}
                aria-hidden="true"
              >
                <span className="absolute -top-1 -translate-x-1/2 text-[9px] font-bold text-red-600 bg-red-50 px-1 rounded whitespace-nowrap">
                  💧 watermark
                </span>
              </div>
            )}

            {/* events (둥근 점) */}
            {events.map((ev) => {
              const isLate = latePoint !== null && ev.t === latePoint;
              const isCepStart = cepMatch && ev.id === cepMatch.fromId;
              const isCepEnd   = cepMatch && ev.id === cepMatch.toId;
              const cepEv      = isCepStart || isCepEnd;
              const color = cepEv
                ? (isCepStart ? 'bg-purple-500 border-purple-700' : 'bg-pink-500 border-pink-700')
                : isLate
                  ? 'bg-red-500 border-red-700 animate-pulse'
                  : 'bg-teal-500 border-teal-700';
              return (
                <div
                  key={ev.id}
                  className={`absolute rounded-full border-2 ${color} flex items-center justify-center text-white text-[8px] font-bold transition-all duration-500`}
                  style={{ left: `calc(${tToPct(ev.t)}% - 8px)`, top: '112px', width: '16px', height: '16px' }}
                  title={`ts=${ev.t}s ${ev.page}`}
                >
                  •
                  <span className={`absolute top-5 -translate-x-1/2 left-1/2 text-[9px] whitespace-nowrap ${cepEv ? 'text-purple-700 font-bold' : isLate ? 'text-red-700 font-bold' : 'text-slate-600'}`}>
                    {ev.page}
                  </span>
                </div>
              );
            })}

            {/* late 이벤트 추가 표시 (도착시간이 watermark 이후) */}
            {latePoint !== null && watermark !== null && (
              <div
                className="absolute"
                style={{ left: `calc(${tToPct(watermark + 8)}% - 8px)`, top: '140px' }}
              >
                <div className="text-[9px] font-bold text-red-600 bg-red-50 px-1.5 py-0.5 rounded border border-red-300 animate-pulse">
                  ⚠ late! ts={latePoint}s 도착 → 버림
                </div>
              </div>
            )}

            {/* CEP 매칭 화살표 */}
            {cepMatch && (() => {
              const from = events.find((e) => e.id === cepMatch.fromId);
              const to   = events.find((e) => e.id === cepMatch.toId);
              if (!from || !to) return null;
              const fLeft = tToPct(from.t);
              const tLeft = tToPct(to.t);
              return (
                <>
                  <div
                    className="absolute border-t-2 border-purple-500"
                    style={{ left: `${fLeft}%`, width: `${tLeft - fLeft}%`, top: '108px' }}
                  ></div>
                  <div
                    className="absolute"
                    style={{ left: `${(fLeft + tLeft) / 2}%`, top: '90px' }}
                  >
                    <div className="text-[9px] font-bold text-purple-700 bg-purple-50 px-1.5 py-0.5 rounded border border-purple-400 -translate-x-1/2">
                      🎯 {cepMatch.label}
                    </div>
                  </div>
                </>
              );
            })()}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-teal-500"></span>이벤트</span>
            {focus === 'window' && (
              <>
                <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-teal-200 border border-teal-500"></span>TUMBLE</span>
                <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-cyan-200 border border-cyan-500"></span>HOP</span>
                <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-200 border border-emerald-500"></span>SESSION</span>
              </>
            )}
            {focus === 'watermark' && (
              <>
                <span className="flex items-center gap-1"><span className="w-0.5 h-3 bg-red-500"></span>watermark line</span>
                <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-red-500"></span>late event</span>
              </>
            )}
            {focus === 'cep' && (
              <>
                <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-purple-500"></span>PAY</span>
                <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-pink-500"></span>REFUND</span>
              </>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js (yaml→SQL label)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      const langLabel = LANG_LABEL[code.lang] || code.lang.toUpperCase();

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-teal-300 font-mono uppercase font-bold">{langLabel}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-teal-500/10 border-l-2 border-teal-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-teal-700 hover:text-teal-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. 스트리밍 &amp; 실시간 &gt; Chapter 2. Streaming SQL</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Streaming SQL (ksqlDB / Flink SQL)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">흐르는 강에 그물 던지기 — Unbounded / Window / Watermark / CEP</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 text-sm text-teal-900">
                💡 다음(IV-2-2)에서는 <strong>Lambda vs Kappa</strong> 아키텍처
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./IV-2-2.html" className="text-teal-700 hover:text-teal-900 font-medium">IV-2-2 Lambda vs Kappa &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
