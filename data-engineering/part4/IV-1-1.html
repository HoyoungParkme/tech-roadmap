<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering — Airflow ML/DE DAG</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-1-1. Airflow ML/DE DAG
    학습 목표: 워크플로우 오케스트레이션 — 각 task 가 의존성으로 연결되는 DE DAG
    핵심 비유: "공장 작업 순서표" — sensor → ETL → DW load 의 정해진 순서
    구조: 4단계 (Sensor / Extract / Transform / Load)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Sensor — "원료 도착 확인"',
        desc: 'S3KeySensor / ExternalTaskSensor 로 어제 raw 파일이 S3 에 떨어졌는지, 업스트림 DAG 가 끝났는지 감지. 도착해야 다음 task 시작 → 빈 데이터로 ETL 돌아 DW 가 망가지는 사고 방지. mode="reschedule" 로 worker slot 안 잡아둠.',
        block: {
          kind: 'python',
          code: `# Sensor — 원료(파일) 도착 대기
from airflow.decorators import dag
from airflow.providers.amazon.aws.sensors.s3 import S3KeySensor
from airflow.sensors.external_task import ExternalTaskSensor
from datetime import datetime, timedelta

@dag(
    dag_id="sales_etl_daily",
    schedule="0 2 * * *",                  # 매일 02:00
    start_date=datetime(2026, 1, 1),
    catchup=False,
    default_args={"retries": 2, "retry_delay": timedelta(minutes=5)},
)
def sales_etl():

    # 1. 어제 raw 파일이 S3 에 도착했나?
    wait_file = S3KeySensor(
        task_id="wait_for_raw",
        bucket_name="sales-raw-prod",
        bucket_key="orders/{{ ds }}/orders.parquet",
        aws_conn_id="aws_default",
        poke_interval=60,                  # 1분마다 확인
        timeout=60 * 60 * 3,               # 3시간 안 오면 fail
        mode="reschedule",                 # worker slot 점유 안 함
    )

    # 2. 업스트림 ingestion DAG 가 끝났나?
    wait_upstream = ExternalTaskSensor(
        task_id="wait_for_ingest",
        external_dag_id="cdc_to_lake",
        external_task_id="export_done",
        execution_delta=timedelta(0),
        mode="reschedule",
    )

    # 강점 - 데이터 안 오면 ETL 자동 skip + 알람
    # 강점 - 새벽에 사람 깰 일 없음

sales_etl()`,
        },
        focus: 'sensor',
      },
      {
        title: 'Step 2. Extract — "원료 창고에서 꺼내오기"',
        desc: '@task decorator + PostgresHook 으로 OLTP DB 에서 어제 변경분만 incremental 추출. TaskFlow API 가 출력 dict 를 다음 task 입력으로 자동 전달. 큰 테이블은 chunked 로 나눠서 메모리 보호.',
        block: {
          kind: 'python',
          code: `# Extract task — DB/API 에서 raw 가져오기
from airflow.decorators import task
from airflow.providers.postgres.hooks.postgres import PostgresHook

@task
def extract_orders(ds: str) -> dict:
    """ds(실행 날짜) 기준 어제 변경분만 incremental 추출"""
    hook = PostgresHook(postgres_conn_id="oltp_prod")
    sql = """
        SELECT order_id, user_id, amount, created_at
        FROM   orders
        WHERE  updated_at >= %(ds)s::date
          AND  updated_at <  %(ds)s::date + interval '1 day'
    """
    df = hook.get_pandas_df(sql, parameters={"ds": ds})

    # raw 를 staging 영역에 parquet 으로 저장
    out_path = f"s3://lake-staging/orders/{ds}/raw.parquet"
    df.to_parquet(out_path, compression="snappy")

    return {
        "rows": len(df),
        "path": out_path,
        "ds": ds,
    }

# 의존성 — TaskFlow 가 자동 처리
raw_meta = extract_orders()
# 강점 - watermark(updated_at) 기반 incremental → 재실행 안전
# 강점 - parquet + snappy → 다음 단계가 빠르게 읽음`,
        },
        focus: 'extract',
      },
      {
        title: 'Step 3. Transform — "조립 라인에서 가공"',
        desc: 'BashOperator 로 dbt run 호출 → SQL 기반 변환을 모델 단위로 실행. dbt test 까지 같이 돌려 not_null / unique / 외래키 검증을 자동화. 큰 변환은 SparkSubmitOperator 로 EMR/Databricks 에 위임.',
        block: {
          kind: 'python',
          code: `# Transform task — dbt run + 검증
from airflow.operators.bash import BashOperator
from airflow.providers.apache.spark.operators.spark_submit \\
    import SparkSubmitOperator

# 1. dbt run — staging → mart 모델 빌드
dbt_run = BashOperator(
    task_id="dbt_run",
    bash_command=(
        "cd /opt/dbt/sales && "
        "dbt run --select tag:daily --vars '{ds: {{ ds }}}'"
    ),
    env={"DBT_PROFILES_DIR": "/opt/dbt/profiles"},
)

# 2. dbt test — not_null / unique / 외래키 검증
dbt_test = BashOperator(
    task_id="dbt_test",
    bash_command=(
        "cd /opt/dbt/sales && "
        "dbt test --select tag:daily"
    ),
)

# 3. 큰 집계는 Spark 로 위임 (옵션)
spark_agg = SparkSubmitOperator(
    task_id="spark_aggregate",
    application="s3://jobs/sales_daily_agg.py",
    conn_id="spark_emr",
    application_args=["--ds", "{{ ds }}"],
    executor_memory="4g",
    num_executors=10,
)

# 의존성 - dbt_run >> dbt_test >> spark_agg
# 강점 - dbt test 실패 시 다음 단계(load) 자동 차단
# 한계 - dbt 는 SQL 기반 → 행단위 복잡 로직은 Spark 가 유리`,
        },
        focus: 'transform',
      },
      {
        title: 'Step 4. Load — "DW 적재 + 출하 알림"',
        desc: 'SnowflakeOperator 로 mart 테이블을 DW 에 MERGE → row count / null 비율 검증 → Slack 으로 출하 알림. 검증 실패 시 BranchPythonOperator 로 rollback task 분기. 다운스트림 BI 대시보드가 안전하게 갱신.',
        block: {
          kind: 'python',
          code: `# Load task — DW MERGE + 검증 + Slack
from airflow.providers.snowflake.operators.snowflake \\
    import SnowflakeOperator
from airflow.providers.slack.operators.slack import SlackAPIPostOperator

# 1. mart → DW MERGE (idempotent)
load_dw = SnowflakeOperator(
    task_id="load_to_dw",
    snowflake_conn_id="snowflake_prod",
    sql="""
        MERGE INTO analytics.fact_orders tgt
        USING staging.orders_{{ ds_nodash }} src
        ON  tgt.order_id = src.order_id
        WHEN MATCHED THEN UPDATE SET
            amount = src.amount, updated_at = src.updated_at
        WHEN NOT MATCHED THEN INSERT (order_id, user_id, amount, created_at)
            VALUES (src.order_id, src.user_id, src.amount, src.created_at);
    """,
)

# 2. 적재 검증 — row count / null 비율
@task
def validate_load(ds: str) -> dict:
    """적재 결과 sanity check"""
    hook = SnowflakeHook(snowflake_conn_id="snowflake_prod")
    rows = hook.get_first(
        "SELECT COUNT(*) FROM analytics.fact_orders "
        "WHERE created_at::date = %(ds)s::date",
        parameters={"ds": ds},
    )[0]
    if rows < 100:                          # 임계 미달
        raise ValueError(f"row count too low - {rows}")
    return {"rows": rows, "ds": ds}

# 3. Slack 알림 — 출하 보고
notify = SlackAPIPostOperator(
    task_id="notify_slack",
    channel="#data-loads",
    text=(
        "📦 fact_orders {{ ds }} loaded "
        "({{ ti.xcom_pull(task_ids='validate_load')['rows'] }} rows)"
    ),
)

# DAG 의존성 (TaskFlow 자동 연결)
# wait_file >> wait_upstream >> extract_orders
# >> dbt_run >> dbt_test >> spark_agg
# >> load_dw >> validate_load >> notify_slack`,
        },
        focus: 'load',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const AIRFLOW_DAG = [
      { key: 'sensor',    emoji: '👁️', name: 'Sensor',    note: '파일 도착 대기' },
      { key: 'extract',   emoji: '📥', name: 'Extract',   note: 'DB/API → raw' },
      { key: 'transform', emoji: '🔄', name: 'Transform', note: 'dbt / Spark' },
      { key: 'load',      emoji: '📤', name: 'Load',      note: 'DW 적재 + 검증' },
    ];

    function DAGCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🏭 공장 작업 순서표 (Airflow DE DAG)</div>
          <div className="grid grid-cols-4 gap-2">
            {AIRFLOW_DAG.map((t) => {
              const isActive = focus === t.key;
              return (
                <div
                  key={t.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-teal-100 border-2 border-teal-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{t.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{t.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{t.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Airflow ML/DE DAG</h1>
                <p className="text-sm text-slate-500 mt-1">공장 작업 순서표 — Sensor / Extract / Transform / Load</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <DAGCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'load' && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 mb-6 text-xs text-teal-900">
                💡 다음(IV-1-2)에서는 Kafka — 우체국 분류 비유
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
