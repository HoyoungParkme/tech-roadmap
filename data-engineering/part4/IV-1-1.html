<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering — IV-1-1. Airflow ML/DE DAG</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    IV-1-1. Airflow ML/DE DAG
    학습 목표: 5-task DAG (sensor → extract → transform → load → notify)를 시각적으로 이해
    핵심 비유: 공장 작업 순서표 — 원료 도착 감지 → 추출 → 가공 → DW 적재 → 알림
    패턴: fastapi v1 패턴 — 좌(LiveDataPane DAG 그래프) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // DAG 5 task 메타 (sensor → extract → transform → load → notify)
    // ─────────────────────────────────────────────────────
    const DAG_TASKS = [
      { key: 'sensor',    emoji: '👁️', name: 'wait_for_raw',  type: 'S3KeySensor' },
      { key: 'extract',   emoji: '📥', name: 'extract_orders', type: 'PostgresHook' },
      { key: 'transform', emoji: '🔄', name: 'transform',     type: 'dbt + Spark' },
      { key: 'load',      emoji: '📤', name: 'load_to_dw',    type: 'SnowflakeOp' },
      { key: 'notify',    emoji: '📣', name: 'notify_slack',  type: 'SlackOp' },
    ];

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (5-task DAG 시뮬레이션)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Sensor — "원료 도착 감지" (poke 진행)',
        desc: 'S3KeySensor가 매 60초마다 S3에 어제 raw 파일이 떨어졌는지 poke. mode="reschedule"로 worker slot 안 잡고 대기. 도착해야 다음 task 시작 → 빈 데이터로 ETL 돌아 DW 망가지는 사고 방지.',
        taskStates: {
          sensor:    { state: 'running', meta: 'poke #7 / 7m elapsed' },
          extract:   { state: 'pending', meta: 'queued' },
          transform: { state: 'pending', meta: 'queued' },
          load:      { state: 'pending', meta: 'queued' },
          notify:    { state: 'pending', meta: 'queued' },
        },
        pokeCount: 7,
        showStaging: false,
        showTransform: false,
        showLoad: false,
        showDone: false,
        code: {
          lang: 'python',
          filename: 'dag_sensor.py',
          lines: [
            '# Step 1. Sensor — 원료(파일) 도착 대기',
            'from airflow.decorators import dag',
            'from airflow.providers.amazon.aws.sensors.s3 import S3KeySensor',
            'from datetime import datetime, timedelta',
            '',
            '@dag(',
            '    dag_id="sales_etl_daily",',
            '    schedule="0 2 * * *",                  # 매일 02:00',
            '    start_date=datetime(2026, 1, 1),',
            '    catchup=False,',
            '    default_args={"retries": 2, "retry_delay": timedelta(minutes=5)},',
            ')',
            'def sales_etl():',
            '',
            '    # 어제 raw 파일이 S3 에 도착했나?',
            '    wait_file = S3KeySensor(',
            '        task_id="wait_for_raw",',
            '        bucket_name="sales-raw-prod",',
            '        bucket_key="orders/{{ ds }}/orders.parquet",',
            '        aws_conn_id="aws_default",',
            '        poke_interval=60,                  # 1분마다 확인',
            '        timeout=60 * 60 * 3,               # 3시간 안 오면 fail',
            '        mode="reschedule",                 # worker slot 점유 안 함',
            '    )',
            '',
            '    # 강점 - 데이터 안 오면 ETL 자동 skip + 알람',
            '    # 강점 - 새벽에 사람 깰 일 없음',
          ],
          highlight: [16, 21, 22, 23],
        },
      },
      {
        title: 'Step 2. Extract — "PostgresHook → S3 staging (1.2M rows)"',
        desc: 'PostgresHook이 OLTP DB에서 어제 변경분만 incremental SELECT. 1,200,000 rows 추출 → S3 staging에 parquet+snappy로 저장. TaskFlow가 결과 dict를 다음 task에 자동 전달.',
        taskStates: {
          sensor:    { state: 'done',    meta: '✓ file detected' },
          extract:   { state: 'running', meta: '1,200,000 rows → S3' },
          transform: { state: 'pending', meta: 'queued' },
          load:      { state: 'pending', meta: 'queued' },
          notify:    { state: 'pending', meta: 'queued' },
        },
        pokeCount: null,
        showStaging: true,
        showTransform: false,
        showLoad: false,
        showDone: false,
        code: {
          lang: 'python',
          filename: 'dag_extract.py',
          lines: [
            '# Step 2. Extract — PostgresHook 으로 OLTP 추출',
            'from airflow.decorators import task',
            'from airflow.providers.postgres.hooks.postgres import PostgresHook',
            '',
            '@task',
            'def extract_orders(ds: str) -> dict:',
            '    """ds(실행 날짜) 기준 어제 변경분만 incremental 추출"""',
            '    hook = PostgresHook(postgres_conn_id="oltp_prod")',
            '    sql = """',
            '        SELECT order_id, user_id, amount, created_at',
            '        FROM   orders',
            '        WHERE  updated_at >= %(ds)s::date',
            '          AND  updated_at <  %(ds)s::date + interval \'1 day\'',
            '    """',
            '    df = hook.get_pandas_df(sql, parameters={"ds": ds})',
            '',
            '    # raw 를 staging 영역에 parquet 으로 저장',
            '    out_path = f"s3://lake-staging/orders/{ds}/raw.parquet"',
            '    df.to_parquet(out_path, compression="snappy")',
            '',
            '    return {',
            '        "rows": len(df),                  # 1,200,000',
            '        "path": out_path,',
            '        "ds": ds,',
            '    }',
            '',
            '# 강점 - watermark(updated_at) 기반 incremental → 재실행 안전',
            '# 강점 - parquet + snappy → 다음 단계가 빠르게 읽음',
          ],
          highlight: [8, 15, 19, 22],
        },
      },
      {
        title: 'Step 3. Transform — "dbt run + Spark job 병렬 가공"',
        desc: 'dbt run 으로 staging → mart SQL 변환을 모델 단위 실행, 동시에 SparkSubmitOperator로 큰 집계를 EMR에 위임 (병렬). dbt test가 not_null/unique 검증을 자동화 → 실패 시 다음 단계 자동 차단.',
        taskStates: {
          sensor:    { state: 'done',    meta: '✓' },
          extract:   { state: 'done',    meta: '✓ 1.2M rows' },
          transform: { state: 'running', meta: 'dbt + Spark 병렬' },
          load:      { state: 'pending', meta: 'queued' },
          notify:    { state: 'pending', meta: 'queued' },
        },
        pokeCount: null,
        showStaging: true,
        showTransform: true,
        showLoad: false,
        showDone: false,
        code: {
          lang: 'python',
          filename: 'dag_transform.py',
          lines: [
            '# Step 3. Transform — dbt run + Spark job 병렬',
            'from airflow.operators.bash import BashOperator',
            'from airflow.providers.apache.spark.operators.spark_submit \\',
            '    import SparkSubmitOperator',
            '',
            '# dbt run — staging → mart 모델 빌드',
            'dbt_run = BashOperator(',
            '    task_id="dbt_run",',
            '    bash_command=(',
            '        "cd /opt/dbt/sales && "',
            '        "dbt run --select tag:daily --vars \'{ds: {{ ds }}}\'"',
            '    ),',
            '    env={"DBT_PROFILES_DIR": "/opt/dbt/profiles"},',
            ')',
            '',
            '# dbt test — not_null / unique 검증',
            'dbt_test = BashOperator(',
            '    task_id="dbt_test",',
            '    bash_command="cd /opt/dbt/sales && dbt test --select tag:daily",',
            ')',
            '',
            '# 큰 집계는 Spark 로 위임 (병렬)',
            'spark_agg = SparkSubmitOperator(',
            '    task_id="spark_aggregate",',
            '    application="s3://jobs/sales_daily_agg.py",',
            '    conn_id="spark_emr",',
            '    application_args=["--ds", "{{ ds }}"],',
            '    executor_memory="4g",',
            '    num_executors=10,',
            ')',
            '',
            '# 의존성 - extract >> [dbt_run, spark_agg] >> dbt_test',
            '# 강점 - 두 엔진이 동시에 돌아 wall-time 단축',
          ],
          highlight: [7, 17, 23, 32],
        },
      },
      {
        title: 'Step 4. Load + Notify — "MERGE → Slack (5 task 완료 ✓)"',
        desc: 'SnowflakeOperator로 mart → DW 테이블에 MERGE (idempotent, 재실행 안전). 검증 통과 후 SlackAPIPostOperator로 #data-loads 채널에 출하 보고. 5 task 모두 완료 — DAG run success.',
        taskStates: {
          sensor:    { state: 'done', meta: '✓' },
          extract:   { state: 'done', meta: '✓' },
          transform: { state: 'done', meta: '✓' },
          load:      { state: 'done', meta: '✓ MERGE OK' },
          notify:    { state: 'done', meta: '✓ Slack sent' },
        },
        pokeCount: null,
        showStaging: true,
        showTransform: true,
        showLoad: true,
        showDone: true,
        code: {
          lang: 'python',
          filename: 'dag_load_notify.py',
          lines: [
            '# Step 4. Load + Notify — DW MERGE + Slack 출하 알림',
            'from airflow.providers.snowflake.operators.snowflake \\',
            '    import SnowflakeOperator',
            'from airflow.providers.slack.operators.slack \\',
            '    import SlackAPIPostOperator',
            '',
            '# mart → DW MERGE (idempotent)',
            'load_dw = SnowflakeOperator(',
            '    task_id="load_to_dw",',
            '    snowflake_conn_id="snowflake_prod",',
            '    sql="""',
            '        MERGE INTO analytics.fact_orders tgt',
            '        USING staging.orders_{{ ds_nodash }} src',
            '        ON  tgt.order_id = src.order_id',
            '        WHEN MATCHED THEN UPDATE SET',
            '            amount = src.amount, updated_at = src.updated_at',
            '        WHEN NOT MATCHED THEN INSERT',
            '            (order_id, user_id, amount, created_at)',
            '        VALUES',
            '            (src.order_id, src.user_id, src.amount, src.created_at);',
            '    """,',
            ')',
            '',
            '# Slack 알림 — 출하 보고',
            'notify = SlackAPIPostOperator(',
            '    task_id="notify_slack",',
            '    channel="#data-loads",',
            '    text=(',
            '        "📦 fact_orders {{ ds }} loaded "',
            '        "({{ ti.xcom_pull(task_ids=\'extract_orders\')[\'rows\'] }} rows)"',
            '    ),',
            ')',
            '',
            '# 의존성 - dbt_test >> load_dw >> notify',
            '# 5 task 완료 - DAG run success ✓',
          ],
          highlight: [8, 12, 25, 36],
        },
      },
    ];

    // 정적 Tailwind 클래스 (purge 안전)
    const TASK_STATE_STYLE = {
      pending: { card: 'bg-slate-100 border-slate-300', icon: 'text-slate-400', badge: 'bg-slate-200 text-slate-500', label: '대기', dot: 'bg-slate-300' },
      running: { card: 'bg-teal-50 border-teal-400',    icon: 'text-teal-700',  badge: 'bg-teal-100 text-teal-700',  label: '진행중', dot: 'bg-teal-500 animate-pulse' },
      done:    { card: 'bg-emerald-50 border-emerald-400', icon: 'text-emerald-700', badge: 'bg-emerald-100 text-emerald-700', label: '완료 ✓', dot: 'bg-emerald-500' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 5-task DAG 그래프
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ stepData }) {
      const { taskStates, pokeCount, showStaging, showTransform, showLoad, showDone } = stepData;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🏭 공장 작업 순서표 (Airflow DE DAG)</h2>
            <span className="text-[10px] text-slate-400 font-mono">5-task pipeline · live</span>
          </div>

          {/* DAG 그래프: 5 task 가로 흐름 */}
          <div className="flex items-stretch gap-1.5 mb-4">
            {DAG_TASKS.map((t, i) => {
              const s = taskStates[t.key];
              const style = TASK_STATE_STYLE[s.state];
              return (
                <React.Fragment key={t.key}>
                  <div className={`flex-1 rounded-lg border-2 p-2 transition-all duration-500 ${style.card}`}>
                    <div className="flex items-center gap-1 mb-1">
                      <span className={`w-1.5 h-1.5 rounded-full ${style.dot}`}></span>
                      <span className="text-base">{t.emoji}</span>
                    </div>
                    <div className="text-[10px] font-bold text-slate-700 truncate">{t.name}</div>
                    <div className="text-[9px] text-slate-500 truncate">{t.type}</div>
                    <div className={`text-[9px] font-mono mt-1 px-1 py-0.5 rounded ${style.badge}`}>
                      {style.label}
                    </div>
                  </div>
                  {i < DAG_TASKS.length - 1 && (
                    <div className="flex items-center text-slate-400 text-xs px-0.5" aria-hidden="true">
                      →
                    </div>
                  )}
                </React.Fragment>
              );
            })}
          </div>

          {/* task별 상세 panel */}
          <div className="space-y-2">
            {/* Step 1 — Sensor poke 카운터 */}
            {taskStates.sensor.state === 'running' && pokeCount != null && (
              <div className="rounded-lg bg-teal-50 border border-teal-200 p-3">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-xs font-bold text-teal-800">👁️ S3KeySensor · waiting</span>
                  <span className="text-[10px] font-mono text-teal-700">poke_interval=60s</span>
                </div>
                <div className="text-[11px] font-mono text-teal-900 mb-2">
                  s3://sales-raw-prod/orders/2026-05-06/orders.parquet
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-[10px] text-teal-700">poke 시도</span>
                  <div className="flex-1 bg-teal-100 rounded-full h-2 overflow-hidden">
                    <div
                      className="bg-teal-500 h-full transition-all duration-700"
                      style={{ width: `${Math.min(pokeCount / 12 * 100, 100)}%` }}
                    />
                  </div>
                  <span className="text-[10px] font-bold text-teal-800 tabular-nums">#{pokeCount}/12</span>
                </div>
                <div className="text-[10px] text-teal-600 mt-1">mode=reschedule (worker slot 점유 안 함)</div>
              </div>
            )}

            {/* Step 2 — Extract / S3 staging */}
            {showStaging && (
              <div className={`rounded-lg border p-3 ${taskStates.extract.state === 'running' ? 'bg-teal-50 border-teal-200' : 'bg-slate-50 border-slate-200'}`}>
                <div className="flex items-center justify-between mb-1">
                  <span className="text-xs font-bold text-slate-800">📥 PostgresHook → S3 staging</span>
                  <span className={`text-[10px] font-mono px-1.5 py-0.5 rounded ${taskStates.extract.state === 'done' ? 'bg-emerald-100 text-emerald-700' : 'bg-teal-100 text-teal-700'}`}>
                    {taskStates.extract.state === 'done' ? '✓ done' : 'extracting'}
                  </span>
                </div>
                <div className="grid grid-cols-2 gap-2 text-[11px]">
                  <div className="bg-white rounded p-1.5 border border-slate-200">
                    <div className="text-slate-500 text-[9px]">SOURCE (oltp_prod)</div>
                    <div className="font-mono text-slate-800">orders</div>
                  </div>
                  <div className="bg-white rounded p-1.5 border border-slate-200">
                    <div className="text-slate-500 text-[9px]">TARGET (S3)</div>
                    <div className="font-mono text-slate-800">raw.parquet</div>
                  </div>
                </div>
                <div className="flex items-baseline gap-1 mt-2">
                  <span className="text-xl font-extrabold text-teal-700 tabular-nums">1,200,000</span>
                  <span className="text-[10px] text-teal-700">rows · snappy</span>
                </div>
              </div>
            )}

            {/* Step 3 — Transform: dbt + Spark 병렬 */}
            {showTransform && (
              <div className={`rounded-lg border p-3 ${taskStates.transform.state === 'running' ? 'bg-teal-50 border-teal-200' : 'bg-slate-50 border-slate-200'}`}>
                <div className="flex items-center justify-between mb-2">
                  <span className="text-xs font-bold text-slate-800">🔄 Transform — dbt + Spark 병렬</span>
                  <span className={`text-[10px] font-mono px-1.5 py-0.5 rounded ${taskStates.transform.state === 'done' ? 'bg-emerald-100 text-emerald-700' : 'bg-teal-100 text-teal-700'}`}>
                    {taskStates.transform.state === 'done' ? '✓ done' : 'running'}
                  </span>
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <div className="bg-white rounded p-2 border border-teal-200">
                    <div className="flex items-center gap-1 mb-1">
                      <span className="w-1.5 h-1.5 rounded-full bg-teal-500"></span>
                      <span className="text-[10px] font-bold text-slate-700">dbt run</span>
                    </div>
                    <div className="text-[10px] text-slate-600">staging → mart 모델 빌드</div>
                    <div className="text-[10px] text-slate-500 font-mono mt-0.5">tag:daily · 14 models</div>
                  </div>
                  <div className="bg-white rounded p-2 border border-teal-200">
                    <div className="flex items-center gap-1 mb-1">
                      <span className="w-1.5 h-1.5 rounded-full bg-teal-500"></span>
                      <span className="text-[10px] font-bold text-slate-700">Spark job</span>
                    </div>
                    <div className="text-[10px] text-slate-600">큰 집계 EMR 위임</div>
                    <div className="text-[10px] text-slate-500 font-mono mt-0.5">10 executors · 4g</div>
                  </div>
                </div>
              </div>
            )}

            {/* Step 4 — Load: Snowflake MERGE + Slack */}
            {showLoad && (
              <div className="rounded-lg bg-emerald-50 border border-emerald-300 p-3">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-xs font-bold text-emerald-800">📤 Snowflake MERGE + 📣 Slack</span>
                  <span className="text-[10px] font-mono px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-700">✓ done</span>
                </div>
                <div className="text-[11px] font-mono text-emerald-900 bg-white rounded p-1.5 border border-emerald-200 mb-2">
                  MERGE INTO analytics.fact_orders ... ✓ 1,200,000 rows
                </div>
                <div className="text-[11px] font-mono text-emerald-900 bg-white rounded p-1.5 border border-emerald-200">
                  📦 #data-loads · "fact_orders 2026-05-06 loaded (1,200,000 rows)"
                </div>
              </div>
            )}

            {/* Step 4 완료 알림 */}
            {showDone && (
              <div className="rounded-lg bg-teal-600 text-white p-3 text-center">
                <div className="text-sm font-bold">🎉 5 task 완료 — DAG run success</div>
                <div className="text-[11px] text-teal-100 mt-0.5 font-mono">sensor → extract → transform → load → notify ✓</div>
              </div>
            )}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-slate-300"></span>대기</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-teal-500"></span>진행중</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>완료</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js (python)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-teal-500/10 border-l-2 border-teal-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-teal-700 hover:text-teal-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. 워크플로우 오케스트레이션 &gt; Chapter 1. Airflow DAG</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Airflow ML/DE DAG</h1>
                  <p className="text-sm text-slate-500 mt-0.5">공장 작업 순서표 — Sensor / Extract / Transform / Load / Notify (5 task)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane stepData={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 text-sm text-teal-900">
                💡 다음(IV-1-2)에서는 <strong>Kafka 개론</strong>
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./IV-1-2.html" className="text-teal-700 hover:text-teal-900 font-medium">IV-1-2 Kafka 개론 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
