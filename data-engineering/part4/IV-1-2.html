<body>
  <div id="root"></div>

  <!--
    IV-1-2. Kafka — 분산 메시지 큐
    학습 목표: Topic / Partition / Consumer Group / Exactly-Once 4 핵심 개념 이해
    핵심 비유: 우체국 분류 — 토픽=수신함, 파티션=칸막이, consumer group=배달부 팀
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: Kafka 클러스터 시각화) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (Kafka 클러스터 시각화)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Topic — "수신함 만들기" (replication 3 으로 안전하게)',
        desc: '토픽은 메시지가 모이는 논리적 채널. "orders 토픽" 하나를 만들면 broker 3대에 똑같이 복제(replication-factor=3)된다 — 1대가 죽어도 데이터 손실 없음. 우체국에 "1번 수신함은 주문" 칸을 나누고, 사본을 다른 지점에도 두는 구조.',
        focus: 'topic',
        viz: {
          topicName: 'orders',
          replicationFactor: 3,
          partitions: [
            { id: 0, offset: 0, key: '', highlight: false },
          ],
          brokers: [
            { id: 1, isLeader: true,  alive: true },
            { id: 2, isLeader: false, alive: true },
            { id: 3, isLeader: false, alive: true },
          ],
          consumers: [],
          showProducer: false,
          showIdempotent: false,
          showTransaction: false,
        },
        code: {
          lang: 'shell',
          filename: 'create-topic.sh',
          lines: [
            '# 토픽 생성 — "orders" 라는 수신함 만들기 (replication 3)',
            'kafka-topics.sh --create \\',
            '  --bootstrap-server kafka:9092 \\',
            '  --topic orders \\',
            '  --partitions 1 \\',
            '  --replication-factor 3',
            '',
            '# 토픽 목록 확인',
            'kafka-topics.sh --bootstrap-server kafka:9092 --list',
            '# orders',
            '# payments',
            '# user-events',
            '',
            '# 토픽 상세 — broker 3대에 사본 배치',
            'kafka-topics.sh --bootstrap-server kafka:9092 \\',
            '  --describe --topic orders',
            '# Topic: orders  PartitionCount: 1  ReplicationFactor: 3',
            '#   Partition: 0  Leader: 1  Replicas: 1,2,3  Isr: 1,2,3',
            '',
            '# 메시지 한 번 보내보기 (Producer CLI)',
            'echo \'{"order_id":1,"amount":1000}\' | \\',
            '  kafka-console-producer.sh --bootstrap-server kafka:9092 --topic orders',
          ],
          highlight: [3, 4, 5, 6, 17],
        },
      },
      {
        title: 'Step 2. Partition — "칸막이 6개로 병렬 처리" (key 라우팅)',
        desc: '파티션은 토픽을 쪼갠 물리 단위. 6개로 나누면 6배 병렬 처리. 각 파티션은 append-only log — offset 으로 위치 기록. 같은 key(order_id)는 항상 같은 파티션 → 순서 보장. key 없으면 round-robin 으로 분산.',
        focus: 'partition',
        viz: {
          topicName: 'orders',
          replicationFactor: 3,
          partitions: [
            { id: 0, offset: 12,  key: 'order_42',  highlight: true  },
            { id: 1, offset: 8,   key: 'order_17',  highlight: false },
            { id: 2, offset: 15,  key: 'order_88',  highlight: false },
            { id: 3, offset: 9,   key: 'order_3',   highlight: false },
            { id: 4, offset: 11,  key: 'order_55',  highlight: false },
            { id: 5, offset: 7,   key: 'order_21',  highlight: false },
          ],
          brokers: [
            { id: 1, isLeader: true,  alive: true },
            { id: 2, isLeader: true,  alive: true },
            { id: 3, isLeader: true,  alive: true },
          ],
          consumers: [],
          showProducer: true,
          showIdempotent: false,
          showTransaction: false,
        },
        code: {
          lang: 'shell',
          filename: 'partition-config.sh',
          lines: [
            '# 운영용 토픽 — partition 6개 + replication 3',
            'kafka-topics.sh --create \\',
            '  --bootstrap-server kafka:9092 \\',
            '  --topic orders \\',
            '  --partitions 6 \\',
            '  --replication-factor 3 \\',
            '  --config min.insync.replicas=2 \\',
            '  --config retention.ms=604800000   # 7일 보관',
            '',
            '# 파티션 분배 확인 — broker 3대에 균등 분산',
            'kafka-topics.sh --bootstrap-server kafka:9092 \\',
            '  --describe --topic orders',
            '# Partition: 0  Leader: 1  Replicas: 1,2,3  Isr: 1,2,3',
            '# Partition: 1  Leader: 2  Replicas: 2,3,1  Isr: 2,3,1',
            '# Partition: 2  Leader: 3  Replicas: 3,1,2  Isr: 3,1,2',
            '# ... (6개)',
            '',
            '# key=order_id 로 보내면 같은 주문은 같은 파티션 → 순서 보장',
            '# key 없으면 round-robin (순서 보장 X, 처리량 최대)',
            '# 파티션은 늘리기만 가능, 줄이기 불가 — 처음부터 여유있게',
          ],
          highlight: [5, 6, 7, 18, 19],
        },
      },
      {
        title: 'Step 3. Consumer Group — "배달부 팀" (병렬 분담)',
        desc: '같은 group_id 의 Consumer 들은 한 팀이 되어 파티션을 나눠 읽는다. 파티션 6 + Consumer 3 → 1명당 2파티션. group_id 다르면 별개 팀 (fan-out, 같은 메시지 각자 처리). offset 은 "어디까지 읽었나" 체크포인트.',
        focus: 'consumer',
        viz: {
          topicName: 'orders',
          replicationFactor: 3,
          partitions: [
            { id: 0, offset: 12, key: 'order_42', highlight: false, owner: 'C1' },
            { id: 1, offset: 8,  key: 'order_17', highlight: false, owner: 'C1' },
            { id: 2, offset: 15, key: 'order_88', highlight: false, owner: 'C2' },
            { id: 3, offset: 9,  key: 'order_3',  highlight: false, owner: 'C2' },
            { id: 4, offset: 11, key: 'order_55', highlight: false, owner: 'C3' },
            { id: 5, offset: 7,  key: 'order_21', highlight: false, owner: 'C3' },
          ],
          brokers: [
            { id: 1, isLeader: true, alive: true },
            { id: 2, isLeader: true, alive: true },
            { id: 3, isLeader: true, alive: true },
          ],
          consumers: [
            { id: 'C1', label: 'Consumer-1', owns: [0, 1], color: 'teal' },
            { id: 'C2', label: 'Consumer-2', owns: [2, 3], color: 'cyan' },
            { id: 'C3', label: 'Consumer-3', owns: [4, 5], color: 'sky' },
          ],
          showProducer: true,
          showIdempotent: false,
          showTransaction: false,
        },
        code: {
          lang: 'python',
          filename: 'consumer.py',
          lines: [
            '# Consumer Group 예시 (kafka-python)',
            'from kafka import KafkaConsumer',
            'import json',
            '',
            'consumer = KafkaConsumer(',
            '    "orders",',
            '    bootstrap_servers=["kafka:9092"],',
            '    group_id="order-processor",        # 같은 group_id = 한 팀',
            '    auto_offset_reset="earliest",      # 처음 붙을 때: earliest/latest',
            '    enable_auto_commit=False,          # 수동 커밋 (안전한 처리)',
            '    value_deserializer=lambda m: json.loads(m.decode()),',
            ')',
            '',
            'for msg in consumer:',
            '    # msg.partition / msg.offset 로 어느 칸 몇 번째인지 확인',
            '    print(f"p={msg.partition} off={msg.offset} val={msg.value}")',
            '    try:',
            '        process_order(msg.value)              # 비즈니스 로직',
            '        consumer.commit()                     # 처리 완료 후 offset 저장',
            '    except Exception:',
            '        # 커밋 안 하면 재시작 시 다시 읽힘 (at-least-once)',
            '        raise',
            '',
            '# 같은 group_id 로 Consumer 3개 → 파티션 6개를 2개씩 분담',
            '# 다른 group_id 면 같은 메시지를 각자 처리 (fan-out)',
            '# Consumer > Partition 이면 초과분은 idle (놀고 있음)',
          ],
          highlight: [8, 10, 19, 24, 25],
        },
      },
      {
        title: 'Step 4. Exactly-Once — "정확히 한 번" (Idempotent + Transaction)',
        desc: '기본은 at-least-once (중복 가능). 결제처럼 중복이 치명적이면 Exactly-Once. enable.idempotence=true → Producer ID + 시퀀스로 재전송도 중복 저장 안 됨. transaction 으로 read-process-write 전체를 원자적으로 묶어 정확히 한 번 처리.',
        focus: 'exactly_once',
        viz: {
          topicName: 'orders',
          replicationFactor: 3,
          partitions: [
            { id: 0, offset: 13, key: 'order_42', highlight: false, owner: 'C1' },
            { id: 1, offset: 8,  key: 'order_17', highlight: false, owner: 'C1' },
            { id: 2, offset: 15, key: 'order_88', highlight: false, owner: 'C2' },
            { id: 3, offset: 9,  key: 'order_3',  highlight: false, owner: 'C2' },
            { id: 4, offset: 11, key: 'order_55', highlight: false, owner: 'C3' },
            { id: 5, offset: 7,  key: 'order_21', highlight: false, owner: 'C3' },
          ],
          brokers: [
            { id: 1, isLeader: true, alive: true },
            { id: 2, isLeader: true, alive: true },
            { id: 3, isLeader: true, alive: true },
          ],
          consumers: [
            { id: 'C1', label: 'Consumer-1', owns: [0, 1], color: 'teal' },
            { id: 'C2', label: 'Consumer-2', owns: [2, 3], color: 'cyan' },
            { id: 'C3', label: 'Consumer-3', owns: [4, 5], color: 'sky' },
          ],
          showProducer: true,
          showIdempotent: true,
          showTransaction: true,
        },
        code: {
          lang: 'python',
          filename: 'exactly_once.py',
          lines: [
            '# Idempotent Producer — 재전송해도 중복 없음',
            'from kafka import KafkaProducer',
            'import json',
            '',
            'producer = KafkaProducer(',
            '    bootstrap_servers=["kafka:9092"],',
            '    enable_idempotence=True,           # Producer ID + 시퀀스로 중복 제거',
            '    acks="all",                        # 모든 ISR 복제 확인 후 ack',
            '    retries=10,                        # 네트워크 오류 시 재시도',
            '    max_in_flight_requests_per_connection=5,',
            '    value_serializer=lambda v: json.dumps(v).encode(),',
            ')',
            'producer.send("orders", {"order_id": 1, "amount": 1000})',
            'producer.flush()',
            '',
            '# Kafka Streams — read-process-write 전체를 트랜잭션으로 (Java)',
            '"""',
            'Properties props = new Properties();',
            'props.put(StreamsConfig.PROCESSING_GUARANTEE_CONFIG,',
            '          StreamsConfig.EXACTLY_ONCE_V2);   // 정확히 한 번 보장',
            'props.put(StreamsConfig.APPLICATION_ID_CONFIG, "order-aggregator");',
            '',
            'StreamsBuilder b = new StreamsBuilder();',
            'b.stream("orders").groupByKey().aggregate(...)',
            ' .toStream().to("orders-summary");   // 입력 commit + 출력 send 가 원자적',
            '"""',
            '',
            '# Exactly-Once 비용: throughput 약간 감소 (트랜잭션 오버헤드)',
            '# 결제/재고만 켜고, 로그/메트릭은 at-least-once 로 충분',
          ],
          highlight: [7, 8, 19, 20, 25],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 4 핵심 개념 카드 메타
    // ─────────────────────────────────────────────────────
    const CONCEPT_META = [
      { key: 'topic',        emoji: '📬', name: 'Topic',          sub: '수신함' },
      { key: 'partition',    emoji: '🗂️', name: 'Partition',      sub: '칸막이 (병렬)' },
      { key: 'consumer',     emoji: '👥', name: 'Consumer Group', sub: '배달부 팀' },
      { key: 'exactly_once', emoji: '🎯', name: 'Exactly-Once',   sub: '정확히 한 번' },
    ];

    const CONSUMER_COLOR = {
      teal: { bg: 'bg-teal-100', border: 'border-teal-400', text: 'text-teal-800', dot: 'bg-teal-500' },
      cyan: { bg: 'bg-cyan-100', border: 'border-cyan-400', text: 'text-cyan-800', dot: 'bg-cyan-500' },
      sky:  { bg: 'bg-sky-100',  border: 'border-sky-400',  text: 'text-sky-800',  dot: 'bg-sky-500' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Kafka 클러스터 시각화
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ viz, focus }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">📬 Kafka 클러스터 (우체국 분류)</h2>
            <span className="text-[10px] text-slate-400 font-mono">cluster · live</span>
          </div>

          {/* 4 핵심 개념 카드 */}
          <div className="grid grid-cols-4 gap-2 mb-4">
            {CONCEPT_META.map((c) => {
              const isActive = focus === c.key;
              return (
                <div
                  key={c.key}
                  className={`rounded-lg p-2 text-center transition-all duration-300 ${isActive ? 'bg-teal-100 border-2 border-teal-400 scale-105 shadow' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-xl">{c.emoji}</div>
                  <div className={`text-[11px] font-bold mt-0.5 ${isActive ? 'text-teal-800' : 'text-slate-700'}`}>{c.name}</div>
                  <div className="text-[9px] text-slate-500 mt-0.5">{c.sub}</div>
                </div>
              );
            })}
          </div>

          {/* Producer 박스 (Step 2~) */}
          {viz.showProducer && (
            <div className="mb-3 flex items-center justify-center">
              <div className={`rounded-lg px-3 py-2 border-2 transition-all duration-500 ${viz.showIdempotent ? 'bg-emerald-50 border-emerald-400' : 'bg-slate-50 border-slate-300'}`}>
                <div className="flex items-center gap-2">
                  <span className="text-lg">📨</span>
                  <div>
                    <div className="text-xs font-bold text-slate-800">Producer</div>
                    <div className="text-[9px] text-slate-500 font-mono">
                      {viz.showIdempotent ? 'idempotent · acks=all' : 'key → partition'}
                    </div>
                  </div>
                  {viz.showIdempotent && (
                    <span className="text-[9px] bg-emerald-200 text-emerald-800 font-bold px-1.5 py-0.5 rounded">PID+SEQ</span>
                  )}
                </div>
              </div>
              <span className="text-slate-400 mx-2">↓</span>
            </div>
          )}

          {/* Topic 박스 + Partition */}
          <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${focus === 'topic' || focus === 'partition' ? 'bg-teal-50 border-teal-400' : 'bg-slate-50 border-slate-300'}`}>
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-2">
                <span className="text-base">📦</span>
                <span className="text-xs font-bold text-slate-800">Topic: <code className="font-mono text-teal-700">{viz.topicName}</code></span>
              </div>
              <span className="text-[10px] bg-teal-100 text-teal-800 font-mono font-bold px-1.5 py-0.5 rounded">
                replication × {viz.replicationFactor}
              </span>
            </div>

            {/* Partition 칸막이 */}
            <div className={`grid gap-1.5 ${viz.partitions.length === 1 ? 'grid-cols-1' : 'grid-cols-6'}`}>
              {viz.partitions.map((p) => {
                const consumer = viz.consumers.find((c) => c.id === p.owner);
                const consumerColor = consumer ? CONSUMER_COLOR[consumer.color] : null;
                return (
                  <div
                    key={p.id}
                    className={`rounded border-2 p-1.5 text-center transition-all duration-500 ${p.highlight ? 'bg-yellow-100 border-yellow-500 scale-110' : consumerColor ? `${consumerColor.bg} ${consumerColor.border}` : 'bg-white border-slate-300'}`}
                  >
                    <div className="text-[9px] text-slate-500 font-mono">P{p.id}</div>
                    <div className="text-[11px] font-bold tabular-nums text-slate-800">
                      off={p.offset}
                    </div>
                    {viz.partitions.length <= 6 && p.key && (
                      <div className="text-[8px] text-slate-500 font-mono truncate">{p.key}</div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Broker 표시 */}
            <div className="flex items-center gap-1.5 mt-3 pt-2 border-t border-slate-200">
              <span className="text-[10px] text-slate-500 font-mono mr-1">brokers:</span>
              {viz.brokers.map((b) => (
                <span
                  key={b.id}
                  className={`text-[10px] font-mono font-bold px-1.5 py-0.5 rounded border ${b.isLeader ? 'bg-teal-100 border-teal-400 text-teal-800' : 'bg-slate-100 border-slate-300 text-slate-600'}`}
                  title={b.isLeader ? 'Leader' : 'Follower'}
                >
                  {b.isLeader ? '★' : ''}B{b.id}
                </span>
              ))}
              <span className="text-[9px] text-slate-400 ml-auto">★ Leader</span>
            </div>
          </div>

          {/* Consumer Group 박스 (Step 3~) */}
          {viz.consumers.length > 0 && (
            <div className="mt-3">
              <div className="flex justify-center mb-2">
                <span className="text-slate-400">↓</span>
              </div>
              <div className="rounded-lg border-2 border-teal-400 bg-teal-50 p-3">
                <div className="text-[10px] font-bold text-teal-800 mb-2">
                  Consumer Group: <code className="font-mono">order-processor</code>
                </div>
                <div className="grid grid-cols-3 gap-2">
                  {viz.consumers.map((c) => {
                    const col = CONSUMER_COLOR[c.color];
                    return (
                      <div
                        key={c.id}
                        className={`rounded border-2 p-2 text-center ${col.bg} ${col.border}`}
                      >
                        <div className="flex items-center justify-center gap-1">
                          <span className={`w-2 h-2 rounded-full ${col.dot}`}></span>
                          <span className={`text-[11px] font-bold ${col.text}`}>{c.label}</span>
                        </div>
                        <div className="text-[9px] text-slate-600 font-mono mt-1">
                          P{c.owns.join(' · P')}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {/* Transaction / Exactly-Once 박스 (Step 4) */}
          {viz.showTransaction && (
            <div className="mt-3 p-3 rounded-lg bg-emerald-50 border-2 border-emerald-400">
              <div className="flex items-center gap-2 text-emerald-800 font-bold text-sm">
                <span className="text-lg">🎯</span>
                <span>Exactly-Once Delivery</span>
              </div>
              <div className="text-[11px] text-emerald-900 mt-1 font-mono">
                read → process → write 가 트랜잭션으로 원자적 (EXACTLY_ONCE_V2)
              </div>
              <div className="flex items-center gap-2 mt-2 text-[10px] text-emerald-800">
                <span className="bg-emerald-200 px-1.5 py-0.5 rounded font-bold">idempotent</span>
                <span>+</span>
                <span className="bg-emerald-200 px-1.5 py-0.5 rounded font-bold">transaction</span>
                <span>=</span>
                <span className="bg-emerald-300 px-1.5 py-0.5 rounded font-bold">정확히 1번</span>
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-teal-100 border border-teal-400"></span>Topic/Cluster</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-yellow-100 border border-yellow-500"></span>routing</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-100 border border-emerald-400"></span>exactly-once</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code (innerHTML 추출) */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-teal-500/10 border-l-2 border-teal-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 — 단계 번호 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-teal-700 hover:text-teal-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. 스트리밍 &gt; Chapter 1. Kafka 기초</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Kafka — 분산 메시지 큐</h1>
                  <p className="text-sm text-slate-500 mt-0.5">우체국 분류 — Topic / Partition / Consumer Group / Exactly-Once</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane viz={step.viz} focus={step.focus} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 text-sm text-teal-900">
                💡 다음(IV-2-1)에서는 <strong>Streaming SQL</strong> — 흐르는 강에 그물 던지기
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; IV-1-1</a>
              <a href="./IV-2-1.html" className="text-teal-700 hover:text-teal-900 font-medium">IV-2-1 Streaming SQL &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
