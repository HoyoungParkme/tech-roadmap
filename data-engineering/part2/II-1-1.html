<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — Data Warehouse 개론</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    II-1-1. Data Warehouse 개론
    학습 목표: 운영 DB와 다른 분석 전용 DB의 핵심 개념(컬럼 저장/파티셔닝/모델링)을 이해한다.
    핵심 비유: "분석 전용 대형 도서관" — 책장은 컬럼 단위로 정리, 시대별로 구역(파티션) 분리
    구조: 4단계 (정의 / 컬럼 저장 / 파티셔닝 / Kimball vs Inmon)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. DW 정의 — Bill Inmon의 4대 특성',
        desc: 'Data Warehouse는 "의사결정을 위해 통합된 분석 전용 DB"다. Bill Inmon이 1990년에 정의한 4대 특성: subject-oriented(주제 지향), integrated(통합), time-variant(시변), non-volatile(비휘발). 운영 DB(OLTP)와는 목적도 구조도 다르다.',
        block: {
          kind: 'shell',
          code: `# Bill Inmon의 4대 특성 (1990)

  ┌──────────────────┬──────────────────────────────────────────┐
  │ 특성             │ 의미                                     │
  ├──────────────────┼──────────────────────────────────────────┤
  │ Subject-oriented │ 주제 단위 (고객/매출/상품) — 업무 단위 X │
  │ Integrated       │ 여러 소스 통합 (CRM+ERP+Web) — 표준화    │
  │ Time-variant     │ 시간 축이 핵심 (snapshot, 이력 보존)     │
  │ Non-volatile     │ append-only, UPDATE/DELETE 거의 없음     │
  └──────────────────┴──────────────────────────────────────────┘

# OLTP (운영 DB) vs OLAP (DW) 비교
  ┌──────────┬──────────────────────┬──────────────────────────┐
  │ 구분     │ OLTP (MySQL)         │ OLAP (BigQuery/Snowflake)│
  ├──────────┼──────────────────────┼──────────────────────────┤
  │ 목적     │ 트랜잭션 (주문/결제) │ 분석 쿼리 (집계/리포트)  │
  │ 단위 작업│ 단건 row insert/upd  │ 수백만 row 집계 SELECT   │
  │ 저장     │ row 기반             │ column 기반              │
  │ 정규화   │ 3NF (중복 최소)      │ Star Schema (조인 최소)  │
  │ 데이터량 │ GB ~ 수 TB           │ TB ~ PB                  │
  └──────────┴──────────────────────┴──────────────────────────┘

# 한 줄 요약
# OLTP = "지금 이 주문 처리해" / OLAP = "지난 1년 매출 분석해"`,
        },
        focus: 'definition',
      },
      {
        title: 'Step 2. 컬럼 저장 — "한 컬럼만 읽어도 된다"',
        desc: 'OLTP의 row-oriented는 한 row의 전체 컬럼을 디스크에 연속 배치한다. 반면 column-oriented는 같은 컬럼 값을 연속 배치한다. SUM(amount) 같은 분석 쿼리는 amount 컬럼만 읽으면 끝 — I/O가 100배 줄고, 같은 타입이 연속이라 압축률도 5~10배.',
        block: {
          kind: 'shell',
          code: `# 같은 테이블을 두 방식으로 저장

  orders 테이블
  ┌────┬──────┬────────┬──────────┐
  │ id │ user │ amount │ date     │
  ├────┼──────┼────────┼──────────┤
  │ 1  │ A    │ 100    │ 2026-01  │
  │ 2  │ B    │ 200    │ 2026-01  │
  │ 3  │ A    │ 150    │ 2026-02  │
  └────┴──────┴────────┴──────────┘

# Row-oriented (MySQL 디스크 저장)
  [1, A, 100, 2026-01] [2, B, 200, 2026-01] [3, A, 150, 2026-02]
   └──── row 1 ────┘   └──── row 2 ────┘   └──── row 3 ────┘
  → SELECT SUM(amount): 모든 컬럼 다 읽어야 함 (낭비)

# Column-oriented (BigQuery/Parquet 디스크 저장)
  id:     [1, 2, 3]              ← 정수 압축 효율 ↑
  user:   [A, B, A]              ← dictionary 인코딩 → [0,1,0]
  amount: [100, 200, 150]        ← 한 컬럼만 읽어 SUM
  date:   [2026-01, 2026-01, 2026-02]  ← run-length encoding

# 분석 쿼리
$ SELECT SUM(amount) FROM orders;
# row store: 4 컬럼 × 1억 row 모두 스캔 → 수십 GB I/O
# column store: amount 컬럼만 스캔 → 수백 MB I/O (100배 ↓)
# + 같은 타입 연속 → gzip/zstd로 5~10배 압축`,
        },
        focus: 'column_store',
      },
      {
        title: 'Step 3. 파티셔닝 — "필요한 구역만 본다"',
        desc: '날짜/지역 같은 키로 테이블을 물리적으로 쪼갠다. WHERE date >= "2026-01-01" 쿼리는 해당 파티션만 스캔 → 99% 데이터 건너뜀(partition pruning). 추가로 클러스터링은 파티션 안에서 자주 같이 쓰이는 컬럼(user_id 등)으로 정렬해 한 번 더 좁힌다.',
        block: {
          kind: 'yaml',
          code: `# BigQuery — 파티션 + 클러스터링 테이블 생성
CREATE TABLE analytics.orders (
  order_id    INT64,
  user_id     STRING,
  amount      NUMERIC,
  category    STRING,
  order_date  DATE
)
PARTITION BY order_date                  # 날짜별 물리 분할
CLUSTER BY user_id, category;            # 파티션 내부 정렬

---
# 파티션 구조 (개념)
  analytics.orders/
  ├── _PARTITION=2026-01-01/  ← 이 디렉터리만 스캔
  ├── _PARTITION=2026-01-02/
  ├── _PARTITION=2026-01-03/
  └── _PARTITION=2026-05-06/

---
# 쿼리 — partition pruning 작동
SELECT user_id, SUM(amount) AS total
FROM analytics.orders
WHERE order_date BETWEEN '2026-05-01' AND '2026-05-06'   # ← 6일치만
  AND category = 'electronics'                           # ← cluster 활용
GROUP BY user_id;

# 효과
# - 파티션 없을 때:  전체 1년치(365 파티션) 스캔 → 비용 X
# - 파티션 적용 시:  6/365 = 1.6% 만 스캔 → 비용 60배 절감
# - 클러스터까지:    category 정렬로 또 좁힘
#
# 주의: WHERE 절에 partition column을 안 쓰면 효과 없음!`,
        },
        focus: 'partition',
      },
      {
        title: 'Step 4. Kimball vs Inmon — 모델링 철학 두 갈래',
        desc: 'DW를 어떻게 설계할까에 대한 두 거장의 입장. Kimball은 "부서별 분석 마트(Star Schema)부터 빠르게", Inmon은 "전사 통합 정규화 모델(EDW) 먼저, 그 위에 마트". 클라우드 DW 시대에는 빠른 가치 창출이 중요해 Kimball이 우세하지만 대기업 마스터 데이터에는 여전히 Inmon이 쓰인다.',
        block: {
          kind: 'shell',
          code: `# Kimball vs Inmon — 한 페이지 요약

  ┌──────────────┬─────────────────────────┬──────────────────────────┐
  │              │ Kimball (Bottom-Up)     │ Inmon (Top-Down)         │
  ├──────────────┼─────────────────────────┼──────────────────────────┤
  │ 시작점       │ 부서 Data Mart          │ 전사 EDW (정규화)        │
  │ 모델링       │ Star Schema (비정규화)  │ 3NF 정규화               │
  │ 마트 위치    │ DW 자체가 마트 모음     │ EDW에서 파생             │
  │ 시작 속도    │ 빠름 (수 주)            │ 느림 (수 개월~년)        │
  │ 일관성       │ Conformed Dimensions로  │ 처음부터 단일 진실       │
  │              │ 마트 간 정합 유지       │                          │
  │ 변경 유연성  │ 마트 단위 빠른 변경     │ 전사 영향 → 신중         │
  │ 적합한 곳    │ 스타트업/SaaS/빠른 분석 │ 금융/대기업/규제 산업    │
  └──────────────┴─────────────────────────┴──────────────────────────┘

# 시각적 차이
# Kimball:
#   [Sales Mart]  [Marketing Mart]  [Finance Mart]
#         ↑              ↑                ↑
#         └─ Conformed Dim (Customer, Date 공유) ─┘
#
# Inmon:
#   Source → Staging → EDW (3NF, 단일 진실) → Marts → BI
#                       ↑ 여기 만드는 데 6~12개월

# 현대 (2020년대 클라우드 DW)
# - BigQuery/Snowflake/Redshift 시대 → 스토리지 저렴, 컴퓨팅 분리
# - "빠른 가치"를 위해 Kimball이 사실상 표준
# - dbt + Star Schema가 90%
# - 단, 기업 마스터 데이터(MDM)는 Inmon식 통합 여전히 유효
# - Data Vault(Linstedt)는 두 학파의 절충안으로 부상 중`,
        },
        focus: 'kimball_inmon',
      },
    ];

    const KIND_STYLE = {
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      python: { label: 'Python', textColor: '#86efac' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const DW = [
      { key: 'definition',    emoji: '📚', name: '정의',          note: 'Inmon 4대 특성' },
      { key: 'column_store',  emoji: '🧱', name: '컬럼 저장',     note: '한 컬럼만 스캔' },
      { key: 'partition',     emoji: '🪟', name: '파티셔닝',      note: '시간/카테고리 분할' },
      { key: 'kimball_inmon', emoji: '🏗️', name: 'Kimball/Inmon', note: '모델링 철학' },
    ];

    function DWCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🏛️ 분석 도서관 (Data Warehouse)</div>
          <div className="grid grid-cols-4 gap-2">
            {DW.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-teal-100 border-2 border-teal-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Data Warehouse 개론</h1>
                <p className="text-sm text-slate-500 mt-1">분석 전용 대형 도서관 — 컬럼 저장 + 파티셔닝 + 분석 모델링</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <DWCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'kimball_inmon' && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 mb-6 text-xs text-teal-900">
                💡 다음(II-1-2)에서는 Star Schema — 차원 모델링 (Fact/Dimension 분리, Conformed Dimensions)
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
