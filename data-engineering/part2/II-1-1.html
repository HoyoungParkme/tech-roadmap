<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">

</head>
<body>
  <div id="root"></div>

  <!--
    II-1-1. Data Warehouse 개론
    학습 목표: DW가 OLTP와 어떻게 다른지(컬럼 저장 / 파티셔닝 / 모델링)를 이해한다.
    핵심 비유: 분석 전용 도서관 — 컬럼 단위 책장 + 시대별 구역(파티션)
    구조: 4단계 (definition / column_store / partition / kimball_inmon)
    패턴: 좌(LiveDataPane: DW 구조 시각화) / 우(VSCode CodeViewer: SQL DDL)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (DW 구조 시각화)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        key: 'definition',
        title: 'Step 1. DW 정의 — 분석용 거대 저장소 (10TB)',
        desc: 'Data Warehouse는 "의사결정을 위해 통합된 분석 전용 DB"다. OLTP(MySQL)는 단건 트랜잭션용 GB, OLAP(BigQuery/Snowflake)는 수억 row 집계용 TB~PB. 같은 데이터를 다른 목적으로 다시 저장한다.',
        viz: 'definition',
        code: {
          lang: 'sql',
          filename: 'oltp_vs_olap.sql',
          lines: [
            '-- OLTP (MySQL) — 운영 DB, 단건 트랜잭션',
            'CREATE TABLE orders (',
            '  order_id   BIGINT PRIMARY KEY,',
            '  user_id    BIGINT NOT NULL,',
            '  amount     DECIMAL(10,2),',
            '  created_at TIMESTAMP',
            ') ENGINE = InnoDB;  -- row 기반, 3NF, GB',
            '',
            '-- 자주 도는 쿼리: 단건 INSERT/UPDATE',
            'INSERT INTO orders VALUES (1001, 42, 19900, NOW());',
            'UPDATE orders SET amount = 18000 WHERE order_id = 1001;',
            '',
            '-- ─────────────────────────────────────────',
            '-- OLAP (BigQuery) — DW, 분석 쿼리',
            'CREATE TABLE dw.fact_orders (',
            '  order_id   INT64,',
            '  user_id    INT64,',
            '  amount     NUMERIC,',
            '  created_at TIMESTAMP',
            ');  -- column 기반, append-only, 10TB',
            '',
            '-- 자주 도는 쿼리: 수억 row 집계',
            'SELECT DATE(created_at) AS d, SUM(amount)',
            'FROM dw.fact_orders',
            'GROUP BY d ORDER BY d;',
          ],
          highlight: [7, 20, 23, 24, 25],
        },
      },
      {
        key: 'column_store',
        title: 'Step 2. 컬럼 저장 — 동일 데이터를 100x 빠르게 스캔',
        desc: 'OLTP는 row 단위 저장(한 row 전체를 디스크에 묶음). OLAP는 column 단위 저장(같은 컬럼만 한 곳에 모음). 집계 쿼리는 보통 1~3 컬럼만 읽는다 — column store는 필요한 컬럼만 디스크에서 읽어 100배 빠르다.',
        viz: 'column_store',
        code: {
          lang: 'sql',
          filename: 'column_store.sql',
          lines: [
            '-- 같은 5 row, 4 컬럼 데이터를 두 방식으로 저장',
            '',
            '-- [Row store / OLTP] — row 통째로 묶음',
            '-- block#1: (1, 42, 199, "2024-01-01")',
            '-- block#2: (2, 43, 250, "2024-01-02")',
            '-- block#3: (3, 42, 180, "2024-01-03")',
            '-- → SUM(amount) 쿼리도 4 컬럼 모두 디스크에서 읽음',
            '',
            '-- [Column store / OLAP] — 같은 컬럼만 모음',
            '-- col[order_id] : [1, 2, 3, 4, 5]',
            '-- col[user_id]  : [42, 43, 42, 44, 45]',
            '-- col[amount]   : [199, 250, 180, 320, 90]',
            '-- col[created]  : ["2024-01-01", ...]',
            '-- → SUM(amount) 쿼리는 amount 컬럼만 읽음 (1/4)',
            '',
            '-- + 같은 컬럼 = 같은 타입 → 압축률 폭증 (10:1)',
            '-- 결과: 디스크 IO 100x ↓, 쿼리 100x ↑',
            '',
            'SELECT SUM(amount)         -- 1 컬럼만 스캔',
            'FROM dw.fact_orders',
            'WHERE created_at >= "2024-01-01";',
          ],
          highlight: [9, 10, 11, 12, 13, 14, 17],
        },
      },
      {
        key: 'partition',
        title: 'Step 3. 파티셔닝 — 스캔 범위 좁히기 (10TB → 10GB)',
        desc: '10TB 테이블을 통째로 스캔하면 비싸다. year/month로 쪼개 두면(파티션) WHERE date 조건으로 1/1000 만 읽는다. BigQuery는 partition 미사용 쿼리에 비용 경고를 띄울 정도로 기본 패턴이다.',
        viz: 'partition',
        code: {
          lang: 'sql',
          filename: 'partition.sql',
          lines: [
            '-- BigQuery: created_at의 month 단위 파티션',
            'CREATE TABLE dw.fact_orders (',
            '  order_id   INT64,',
            '  user_id    INT64,',
            '  amount     NUMERIC,',
            '  created_at TIMESTAMP',
            ')',
            'PARTITION BY DATE_TRUNC(created_at, MONTH)',
            'CLUSTER BY user_id;  -- 보조 정렬 키',
            '',
            '-- ❌ 파티션 미사용 — 10TB 전체 스캔',
            'SELECT SUM(amount) FROM dw.fact_orders;',
            '-- → 10TB processed, $50',
            '',
            '-- ✅ 파티션 pruning — 1개 파티션 (10GB)만 스캔',
            'SELECT SUM(amount) FROM dw.fact_orders',
            'WHERE created_at >= "2024-03-01"',
            '  AND created_at <  "2024-04-01";',
            '-- → 10GB processed, $0.05 (1000x 절감)',
            '',
            '-- 핵심: WHERE 절이 partition 컬럼을 직접 참조해야',
            '-- 옵티마이저가 파티션 pruning 적용한다.',
          ],
          highlight: [8, 9, 15, 16, 17, 18, 19],
        },
      },
      {
        key: 'kimball_inmon',
        title: 'Step 4. Kimball vs Inmon — 모델링 두 학파',
        desc: 'Kimball은 분석 친화적 비정규(Star Schema: dim+fact, 조인 최소). Inmon은 전사 정규화(3NF, 무결성 우선) 후 그 위에 dim/fact를 만든다. 실무는 보통 Kimball 우선 — 조인이 줄어 BI 툴이 빠르다.',
        viz: 'kimball_inmon',
        code: {
          lang: 'sql',
          filename: 'kimball_vs_inmon.sql',
          lines: [
            '-- [Kimball] Star Schema — 비정규, dim + fact',
            'CREATE TABLE dw.dim_user (',
            '  user_id    INT64 PRIMARY KEY,',
            '  user_name  STRING,',
            '  city       STRING,   -- 중복 OK (조인 최소)',
            '  signup_dt  DATE',
            ');',
            'CREATE TABLE dw.fact_orders (',
            '  order_id    INT64,',
            '  user_id     INT64,   -- → dim_user',
            '  product_id  INT64,   -- → dim_product',
            '  date_id     DATE,    -- → dim_date',
            '  amount      NUMERIC',
            ') PARTITION BY date_id;',
            '',
            '-- ─────────────────────────────────────────',
            '-- [Inmon] 3NF Enterprise DW — 정규화 우선',
            'CREATE TABLE edw.user      (user_id PK, name);',
            'CREATE TABLE edw.user_addr (user_id FK, city);',
            'CREATE TABLE edw.user_signup(user_id FK, signup_dt);',
            '-- 조인 많음 → 무결성 강함, 분석 쿼리는 느림',
            '-- 그 위에 마트(dim/fact)를 다시 만든다.',
            '',
            '-- 실무 선택: Kimball 우선 (BI 툴 친화적)',
            '-- 단, 마스터 데이터 모순이 잦으면 Inmon 검토',
          ],
          highlight: [1, 8, 14, 17, 24],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // LiveDataPane — DW 구조 시각화 (단계별 4가지 view)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ stepKey }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm min-h-[28rem]">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🏛️ Data Warehouse 구조</h2>
            <span className="text-[10px] text-slate-400 font-mono">analytics · OLAP</span>
          </div>

          {stepKey === 'definition' && <DefinitionView />}
          {stepKey === 'column_store' && <ColumnStoreView />}
          {stepKey === 'partition' && <PartitionView />}
          {stepKey === 'kimball_inmon' && <KimballInmonView />}
        </div>
      );
    }

    // ─── Step 1. 거대 저장소 ───────────────────────────────
    function DefinitionView() {
      return (
        <div className="space-y-4">
          {/* DW 박스 */}
          <div className="rounded-xl border-2 border-teal-400 bg-gradient-to-br from-teal-50 to-cyan-50 p-5 text-center">
            <div className="text-3xl mb-1">🏛️</div>
            <div className="text-base font-extrabold text-teal-800">Data Warehouse</div>
            <div className="text-[11px] text-teal-700">분석 전용 거대 저장소</div>
            <div className="mt-3 inline-block px-4 py-1.5 rounded-lg bg-teal-600 text-white text-xs font-bold">
              💾 10 TB
            </div>
            <div className="text-[10px] text-slate-500 mt-2 font-mono">
              append-only · column store · partition
            </div>
          </div>

          {/* OLTP vs OLAP 비교 */}
          <div className="grid grid-cols-2 gap-3 text-xs">
            <div className="rounded-lg border-2 border-slate-300 bg-slate-50 p-3">
              <div className="font-bold text-slate-700 mb-1.5">🛒 OLTP (MySQL)</div>
              <ul className="space-y-1 text-slate-600 text-[11px]">
                <li>• 단건 트랜잭션</li>
                <li>• row 저장</li>
                <li>• 3NF 정규화</li>
                <li>• GB ~ 수 TB</li>
              </ul>
            </div>
            <div className="rounded-lg border-2 border-teal-400 bg-teal-50 p-3">
              <div className="font-bold text-teal-800 mb-1.5">📊 OLAP (DW)</div>
              <ul className="space-y-1 text-teal-700 text-[11px]">
                <li>• 수억 row 집계</li>
                <li>• <strong>column 저장</strong></li>
                <li>• Star Schema</li>
                <li>• <strong>TB ~ PB</strong></li>
              </ul>
            </div>
          </div>

          {/* 화살표 */}
          <div className="text-center text-[11px] text-slate-500 font-mono">
            운영 DB → ETL/ELT → DW (같은 데이터, 다른 목적)
          </div>
        </div>
      );
    }

    // ─── Step 2. row vs column ────────────────────────────
    function ColumnStoreView() {
      const headers = ['order_id', 'user_id', 'amount', 'created_at'];
      const rows = [
        [1, 42, 199, '2024-01-01'],
        [2, 43, 250, '2024-01-02'],
        [3, 42, 180, '2024-01-03'],
      ];
      return (
        <div className="space-y-4">
          {/* Row store */}
          <div className="rounded-lg border-2 border-slate-300 bg-slate-50 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="text-xs font-bold text-slate-700">📦 Row store (OLTP)</div>
              <span className="text-[10px] font-mono text-slate-500">row 통째로 묶음</span>
            </div>
            <div className="space-y-1 font-mono text-[10px]">
              {rows.map((r, i) => (
                <div key={i} className="flex gap-1">
                  {r.map((c, j) => (
                    <span key={j} className="px-2 py-0.5 rounded bg-slate-200 text-slate-700 flex-1 text-center">
                      {c}
                    </span>
                  ))}
                </div>
              ))}
            </div>
            <div className="text-[10px] text-slate-500 mt-2">
              SUM(amount) 시 4 컬럼 전부 읽음
            </div>
          </div>

          {/* Column store */}
          <div className="rounded-lg border-2 border-teal-400 bg-teal-50 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="text-xs font-bold text-teal-800">🗂️ Column store (OLAP)</div>
              <span className="text-[10px] font-mono text-teal-600">컬럼별 분리 저장</span>
            </div>
            <div className="space-y-1 font-mono text-[10px]">
              {headers.map((h, i) => {
                const col = rows.map((r) => r[i]);
                const isTarget = h === 'amount';
                return (
                  <div key={h} className={`flex items-center gap-2 px-2 py-1 rounded ${isTarget ? 'bg-teal-200 ring-2 ring-teal-500' : 'bg-teal-100/60'}`}>
                    <span className={`w-20 text-[10px] ${isTarget ? 'text-teal-900 font-bold' : 'text-teal-700'}`}>{h}</span>
                    <span className={`flex-1 ${isTarget ? 'text-teal-900 font-bold' : 'text-teal-700'}`}>
                      [{col.join(', ')}]

                  </div>
                );
              })}
            </div>
            <div className="text-[10px] text-teal-700 mt-2">
              SUM(amount) 시 <strong>amount 컬럼만</strong> 읽음 → 1/4 IO + 압축 10x
            </div>
          </div>

          {/* 결과 */}
          <div className="rounded-lg bg-cyan-50 border border-cyan-300 p-2 text-center">
            <div className="text-xs text-cyan-800 font-bold">
              ⚡ 동일 데이터 · 100배 빠른 스캔
            </div>
          </div>
        </div>
      );
    }

    // ─── Step 3. partition ────────────────────────────────
    function PartitionView() {
      const partitions = ['2024-01', '2024-02', '2024-03', '2024-04', '2024-05'];
      const target = '2024-03';
      return (
        <div className="space-y-4">
          {/* 단일 거대 테이블 */}
          <div className="rounded-lg border-2 border-slate-300 bg-slate-50 p-3">
            <div className="text-xs font-bold text-slate-700 mb-2">❌ 파티션 없음 — 통째로 스캔</div>
            <div className="rounded-md bg-slate-300 text-slate-700 text-center py-3 font-mono text-xs">
              fact_orders · 10 TB
            </div>
            <div className="text-[10px] text-red-600 mt-2 font-mono">
              SUM(amount) → 10 TB processed · $50
            </div>
          </div>

          {/* 화살표 */}
          <div className="text-center text-[11px] text-slate-500 font-mono">
            ↓ PARTITION BY MONTH(created_at)
          </div>

          {/* 파티션 테이블 */}
          <div className="rounded-lg border-2 border-teal-400 bg-teal-50 p-3">
            <div className="text-xs font-bold text-teal-800 mb-2">
              ✅ Month 파티션 — pruning으로 1조각만 읽음
            </div>
            <div className="grid grid-cols-5 gap-1 text-[10px] font-mono">
              {partitions.map((p) => {
                const isHit = p === target;
                return (
                  <div
                    key={p}
                    className={`text-center py-3 rounded ${
                      isHit

                    }`}
                  >
                    {p}
                    <div className="text-[9px] mt-0.5 opacity-80">
                      {isHit ? '10 GB ✓' : '10 GB'}
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="text-[10px] text-teal-700 mt-2 font-mono">
              WHERE created_at &gt;= "2024-03-01" → 1 파티션만 스캔
            </div>
          </div>

          {/* 결과 */}
          <div className="rounded-lg bg-cyan-50 border border-cyan-300 p-2 text-center">
            <div className="text-xs text-cyan-800 font-bold">
              📉 10 TB → 10 GB · 1000배 비용 절감
            </div>
          </div>
        </div>
      );
    }

    // ─── Step 4. Kimball vs Inmon ─────────────────────────
    function KimballInmonView() {
      const rows = [
        ['철학',     'dim/fact 비정규',     '전사 3NF 정규화'],
        ['스키마',   'Star Schema',          'Snowflake / 3NF EDW'],
        ['조인 수',  '적음 (1~2단)',         '많음 (다단)'],
        ['BI 친화',  '⭐⭐⭐⭐⭐',                '⭐⭐'],
        ['무결성',   '⭐⭐',                  '⭐⭐⭐⭐⭐'],
        ['초기 비용','낮음 (빠른 시작)',     '높음 (전사 모델링)'],
        ['실무 선택','대부분 ✅',             '마스터 데이터 모순 시'],
      ];
      return (
        <div className="space-y-4">
          {/* 헤더 카드 */}
          <div className="grid grid-cols-2 gap-3">
            <div className="rounded-lg border-2 border-teal-400 bg-teal-50 p-3 text-center">
              <div className="text-2xl">⭐</div>
              <div className="text-sm font-extrabold text-teal-800">Kimball</div>
              <div className="text-[10px] text-teal-600 font-mono">dim + fact (비정규)</div>
            </div>
            <div className="rounded-lg border-2 border-slate-400 bg-slate-50 p-3 text-center">
              <div className="text-2xl">🏢</div>
              <div className="text-sm font-extrabold text-slate-700">Inmon</div>
              <div className="text-[10px] text-slate-600 font-mono">3NF EDW (정규화)</div>
            </div>
          </div>

          {/* 비교 표 */}
          <div className="rounded-lg border border-slate-200 overflow-hidden text-[11px]">
            <div className="grid grid-cols-3 bg-slate-100 font-bold text-slate-700">
              <div className="px-2 py-1.5">항목</div>
              <div className="px-2 py-1.5 border-l border-slate-200 text-teal-800">Kimball</div>
              <div className="px-2 py-1.5 border-l border-slate-200">Inmon</div>
            </div>
            {rows.map(([k, a, b], i) => (
              <div
                key={k}
                className={`grid grid-cols-3 ${i % 2 === 0 ? 'bg-white' : 'bg-slate-50'}`}
              >
                <div className="px-2 py-1.5 font-medium text-slate-700">{k}</div>
                <div className="px-2 py-1.5 border-l border-slate-200 text-teal-700">{a}</div>
                <div className="px-2 py-1.5 border-l border-slate-200 text-slate-600">{b}</div>
              </div>
            ))}
          </div>

          {/* 결론 */}
          <div className="rounded-lg bg-cyan-50 border border-cyan-300 p-2 text-center">
            <div className="text-xs text-cyan-800 font-bold">
              💡 실무 기본값: Kimball Star Schema
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-teal-500/10 border-l-2 border-teal-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-teal-700 hover:text-teal-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 분석 저장소 &gt; Chapter 1. Data Warehouse</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Data Warehouse 개론</h1>
                  <p className="text-sm text-slate-500 mt-0.5">분석 전용 도서관 — 컬럼 저장 + 파티션 + Kimball/Inmon</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane stepKey={step.key} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 text-sm text-teal-900">
                💡 다음(II-1-2)에서는 <strong>Star Schema</strong> — dim/fact 모델링을 직접 그려본다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./II-1-2.html" className="text-teal-700 hover:text-teal-900 font-medium">II-1-2 Star Schema &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
