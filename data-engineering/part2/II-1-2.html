<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — II-1-2. Star Schema 차원 모델링</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-1-2. Star Schema 차원 모델링
    학습 목표: Fact 테이블 + 5 Dimension 으로 별 모양 DW 스키마를 설계한다.
    핵심 비유: "별 모양" — 중앙 Fact + 주변 Dimension 5개. 분석 쿼리 빠르고 BI 친화.
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: Star Schema ERD SVG) / 우(VSCode CodeViewer: SQL JOIN)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 5 Dimension 위치 (별 5각 — 중심 fact 기준)
    // ─────────────────────────────────────────────────────
    const FACT = { x: 300, y: 200, w: 150, h: 90, name: 'fact_sales', kind: 'fact' };

    const DIMS = [
      { id: 'date',      x: 300, y: 30,  w: 130, h: 70, name: 'dim_date',      label: '📅 날짜',    fk: 'date_id' },
      { id: 'product',   x: 510, y: 110, w: 130, h: 70, name: 'dim_product',   label: '📦 상품',    fk: 'product_id' },
      { id: 'customer',  x: 510, y: 290, w: 130, h: 70, name: 'dim_customer',  label: '👤 고객',    fk: 'customer_id' },
      { id: 'store',     x: 90,  y: 290, w: 130, h: 70, name: 'dim_store',     label: '🏬 매장',    fk: 'store_id' },
      { id: 'promotion', x: 90,  y: 110, w: 130, h: 70, name: 'dim_promotion', label: '🎁 프로모션', fk: 'promotion_id' },
    ];

    // Snowflake 분기: dim_product → dim_category 정규화
    const SNOWFLAKE_NODE = {
      id: 'category', x: 670, y: 30, w: 110, h: 60, name: 'dim_category', label: '🏷️ 카테고리',
    };

    // ─────────────────────────────────────────────────────
    // 단계별 시뮬레이션 데이터
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Fact 테이블 — 측정값 (1 row = 1 거래)',
        desc: 'Fact 테이블은 비즈니스 이벤트의 측정값을 저장한다. order_id (영수증) + amount (금액) + 여러 FK (date_id / product_id 등). 한 거래 = 한 행. 길고 좁은 테이블 (수천만~수십억 rows). INSERT 만, UPDATE 없음.',
        focus: 'fact',
        showFact: true,
        showDims: false,
        showFKLines: false,
        showSnowflake: false,
        code: {
          lang: 'sql',
          filename: 'fact_sales.sql',
          lines: [
            '-- fact_sales — 매출 Fact 테이블',
            '-- grain: 1 row = 1 거래 라인 아이템',
            '',
            'CREATE TABLE fact_sales (',
            '    -- Degenerate Dimension (영수증 번호)',
            '    order_id      VARCHAR(20),',
            '',
            '    -- Foreign Keys (Dimension 연결)',
            '    date_id       INT,',
            '    product_id    INT,',
            '    customer_id   INT,',
            '    store_id      INT,',
            '    promotion_id  INT,',
            '',
            '    -- Measures (분석 대상 숫자값)',
            '    quantity      INT,',
            '    unit_price    DECIMAL(10,2),',
            '    amount        DECIMAL(12,2),  -- = quantity * unit_price',
            '    discount      DECIMAL(10,2),',
            '    net_amount    DECIMAL(12,2)',
            ');',
            '',
            '-- 특징',
            '-- - row 가 매우 많음 (수천만~수십억)',
            '-- - column 은 적음 (FK + measure)',
            '-- - INSERT 만, UPDATE 거의 없음 (이벤트 누적)',
          ],
          highlight: [4, 5, 17, 18],
        },
      },
      {
        title: 'Step 2. Dimension — 5 분석 축 (date / product / customer / store / promotion)',
        desc: 'Dimension 은 "어떤 관점으로 자를까"를 담는 분석 축. Surrogate key (자체 PK)로 자연키와 분리 — SCD Type 2 이력 관리 가능. row 적고 (수천~수십만) column 많음. 5개 축이 등장 — 별의 꼭짓점.',
        focus: 'dimension',
        showFact: true,
        showDims: true,
        showFKLines: false,
        showSnowflake: false,
        code: {
          lang: 'sql',
          filename: 'dim_product.sql',
          lines: [
            '-- dim_product — 상품 Dimension',
            '-- grain: 1 row = 1 상품 버전 (SCD Type 2)',
            '',
            'CREATE TABLE dim_product (',
            '    -- Surrogate Key (자체 PK, 의미 없음)',
            '    product_id     INT PRIMARY KEY,',
            '',
            '    -- Natural Key (원본 시스템 ID)',
            '    product_sku    VARCHAR(20),',
            '',
            '    -- 펼친 속성 (정규화 X — JOIN 줄이기)',
            '    product_name   VARCHAR(100),',
            '    category       VARCHAR(50),    -- "전자제품"',
            '    subcategory    VARCHAR(50),    -- "스마트폰"',
            '    brand          VARCHAR(50),    -- "Samsung"',
            '    department     VARCHAR(50),    -- "모바일"',
            '',
            '    -- SCD Type 2 (이력 관리)',
            '    valid_from     DATE,',
            '    valid_to       DATE,',
            '    is_current     BOOLEAN',
            ');',
            '',
            '-- 왜 Surrogate Key 인가?',
            '-- - 자연키(SKU) 가 바뀌어도 Fact 가 안 깨짐',
            '-- - INT 가 VARCHAR 보다 JOIN 빠름',
          ],
          highlight: [5, 6, 18, 19, 20],
        },
      },
      {
        title: 'Step 3. Star Schema — 모든 Dim 이 Fact 로 화살표 (별 모양 완성)',
        desc: '5 Dimension 이 모두 Fact 의 FK 로 연결된다 — 단방향, 1 hop JOIN. BI 툴이 자동 인식하고, 분석가도 직관적으로 쿼리 가능. SUM(amount) GROUP BY category 같은 분석이 한 번의 JOIN 으로 끝난다.',
        focus: 'star',
        showFact: true,
        showDims: true,
        showFKLines: true,
        showSnowflake: false,
        code: {
          lang: 'sql',
          filename: 'star_query.sql',
          lines: [
            '-- 분석 쿼리 — "2026년 카테고리별 매출 Top 5"',
            '-- Star Schema: Fact 1번 + Dim 여러 번 (단방향 JOIN)',
            '',
            'SELECT',
            '    d.year,',
            '    p.category,',
            '    SUM(f.amount)        AS total_sales,',
            '    SUM(f.quantity)      AS total_qty,',
            '    COUNT(DISTINCT f.customer_id) AS unique_customers',
            'FROM fact_sales f',
            'JOIN dim_date     d ON f.date_id     = d.date_id',
            'JOIN dim_product  p ON f.product_id  = p.product_id',
            'JOIN dim_customer c ON f.customer_id = c.customer_id',
            'JOIN dim_store    s ON f.store_id    = s.store_id',
            'WHERE d.year = 2026',
            '  AND c.country = \'KR\'',
            '  AND s.region = \'서울\'',
            'GROUP BY d.year, p.category',
            'ORDER BY total_sales DESC',
            'LIMIT 5;',
            '',
            '-- 장점',
            '-- - 직관적: "별" 모양 → BI 툴 자동 인식',
            '-- - 빠름: 단방향 JOIN, dim 작아서 broadcast 가능',
            '-- - 분석가 친화: fact 1개 + 몇 dim 만 알면 됨',
          ],
          highlight: [10, 11, 12, 13, 14],
        },
      },
      {
        title: 'Step 4. Snowflake Schema — Dim 도 정규화 (product → category 분리)',
        desc: 'Snowflake 는 Dim 을 정규화로 더 쪼갠 형태 (dim_product → dim_category 분리). 저장공간은 줄지만 JOIN 이 늘어 쿼리가 느려지고 복잡해진다. 분석 DW 에서는 Star 가 표준 — 디스크보다 분석 시간이 비싸기 때문.',
        focus: 'snowflake',
        showFact: true,
        showDims: true,
        showFKLines: true,
        showSnowflake: true,
        code: {
          lang: 'sql',
          filename: 'snowflake_query.sql',
          lines: [
            '-- Snowflake Schema — dim_product 가 정규화로 쪼개짐',
            '-- dim_product → dim_category → dim_department (chain)',
            '',
            '-- 같은 분석을 Snowflake 로 작성하면 JOIN 이 더 늘어남',
            'SELECT',
            '    d.year,',
            '    c.category_name,        -- 별도 dim_category 에서',
            '    SUM(f.amount) AS total_sales',
            'FROM fact_sales f',
            'JOIN dim_date     d ON f.date_id     = d.date_id',
            'JOIN dim_product  p ON f.product_id  = p.product_id',
            'JOIN dim_category c ON p.category_id = c.category_id  -- chain JOIN',
            'WHERE d.year = 2026',
            'GROUP BY d.year, c.category_name',
            'ORDER BY total_sales DESC;',
            '',
            '-- Star vs Snowflake 비교',
            '-- ┌────────────────┬──────────┬──────────────┐',
            '-- │ 항목           │ Star     │ Snowflake    │',
            '-- ├────────────────┼──────────┼──────────────┤',
            '-- │ JOIN 개수      │ 적음     │ 많음 (chain) │',
            '-- │ 쿼리 속도      │ 빠름 ⚡  │ 느림         │',
            '-- │ 저장 공간      │ 큼       │ 작음         │',
            '-- │ BI 툴 호환     │ 자동 ⭐  │ 수동 설정    │',
            '-- └────────────────┴──────────┴──────────────┘',
            '-- 결론: 디스크는 싸고 분석 시간은 비싸다 → Star 가 표준',
          ],
          highlight: [11, 12],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Star Schema ERD (SVG)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">⭐ Star Schema ERD</h2>
            <span className="text-[10px] text-slate-400 font-mono">
              {step.focus === 'fact' && 'Fact only'}
              {step.focus === 'dimension' && '5 Dimensions'}
              {step.focus === 'star' && 'Star (1 hop)'}
              {step.focus === 'snowflake' && 'Snowflake (chain)'}
            </span>
          </div>

          <svg viewBox="0 0 800 380" className="w-full" style={{ minHeight: '320px' }}>
            {/* FK 화살표 (Step 3+) */}
            {step.showFKLines && DIMS.map((d) => {
              const x1 = d.x + d.w / 2;
              const y1 = d.y + d.h / 2;
              const x2 = FACT.x + FACT.w / 2;
              const y2 = FACT.y + FACT.h / 2;
              return (
                <g key={`line-${d.id}`}>
                  <line
                    x1={x1} y1={y1} x2={x2} y2={y2}
                    stroke="#0d9488" strokeWidth="2.5" strokeDasharray="4 3"
                    className="animate-pulse"
                    opacity="0.7"
                  />
                  {/* 1:N 마커 */}
                  <circle cx={x1} cy={y1} r="4" fill="#0d9488" />
                  <text
                    x={(x1 + x2) / 2} y={(y1 + y2) / 2 - 4}
                    fill="#0f766e" fontSize="9" fontFamily="monospace"
                    textAnchor="middle"
                  >
                    1 : N
                  </text>
                </g>
              );
            })}

            {/* Snowflake chain — dim_product → dim_category */}
            {step.showSnowflake && (
              <>
                <line
                  x1={DIMS[1].x + DIMS[1].w}
                  y1={DIMS[1].y + DIMS[1].h / 2}
                  x2={SNOWFLAKE_NODE.x}
                  y2={SNOWFLAKE_NODE.y + SNOWFLAKE_NODE.h / 2}
                  stroke="#dc2626" strokeWidth="2.5" strokeDasharray="6 3"
                  className="animate-pulse"
                />
                <text
                  x={(DIMS[1].x + DIMS[1].w + SNOWFLAKE_NODE.x) / 2}
                  y={DIMS[1].y + 30}
                  fill="#b91c1c" fontSize="10" fontFamily="monospace"
                  textAnchor="middle" fontWeight="bold"
                >
                  ❄ chain JOIN
                </text>

                {/* dim_category 박스 */}
                <g>
                  <rect
                    x={SNOWFLAKE_NODE.x} y={SNOWFLAKE_NODE.y}
                    width={SNOWFLAKE_NODE.w} height={SNOWFLAKE_NODE.h}
                    rx="8"
                    fill="#fef2f2" stroke="#dc2626" strokeWidth="2"
                    className="animate-pulse"
                  />
                  <text
                    x={SNOWFLAKE_NODE.x + SNOWFLAKE_NODE.w / 2}
                    y={SNOWFLAKE_NODE.y + 22}
                    textAnchor="middle" fontSize="11" fontWeight="bold" fill="#7f1d1d"
                  >
                    {SNOWFLAKE_NODE.label}
                  </text>
                  <text
                    x={SNOWFLAKE_NODE.x + SNOWFLAKE_NODE.w / 2}
                    y={SNOWFLAKE_NODE.y + 38}
                    textAnchor="middle" fontSize="9" fontFamily="monospace" fill="#991b1b"
                  >
                    {SNOWFLAKE_NODE.name}
                  </text>
                  <text
                    x={SNOWFLAKE_NODE.x + SNOWFLAKE_NODE.w / 2}
                    y={SNOWFLAKE_NODE.y + 52}
                    textAnchor="middle" fontSize="8" fill="#b91c1c"
                  >
                    category_id (PK)
                  </text>
                </g>
              </>
            )}

            {/* Fact 테이블 (중앙) */}
            {step.showFact && (
              <g>
                <rect
                  x={FACT.x} y={FACT.y} width={FACT.w} height={FACT.h}
                  rx="10"
                  fill={step.focus === 'fact' ? '#ccfbf1' : '#f0fdfa'}
                  stroke="#0d9488"
                  strokeWidth={step.focus === 'fact' ? '4' : '2.5'}
                  className={step.focus === 'fact' ? 'animate-pulse' : ''}
                />
                <text
                  x={FACT.x + FACT.w / 2} y={FACT.y + 22}
                  textAnchor="middle" fontSize="13" fontWeight="bold" fill="#134e4a"
                >
                  📊 {FACT.name}
                </text>
                <text
                  x={FACT.x + FACT.w / 2} y={FACT.y + 40}
                  textAnchor="middle" fontSize="9" fontFamily="monospace" fill="#115e59"
                >
                  order_id · amount
                </text>
                <text
                  x={FACT.x + FACT.w / 2} y={FACT.y + 54}
                  textAnchor="middle" fontSize="8" fontFamily="monospace" fill="#0f766e"
                >
                  date_id · product_id
                </text>
                <text
                  x={FACT.x + FACT.w / 2} y={FACT.y + 68}
                  textAnchor="middle" fontSize="8" fontFamily="monospace" fill="#0f766e"
                >
                  customer_id · store_id
                </text>
                <text
                  x={FACT.x + FACT.w / 2} y={FACT.y + 82}
                  textAnchor="middle" fontSize="8" fill="#14b8a6" fontWeight="bold"
                >
                  FACT
                </text>
              </g>
            )}

            {/* 5 Dimension (Step 2+) */}
            {step.showDims && DIMS.map((d, i) => {
              const isProductSnow = step.showSnowflake && d.id === 'product';
              return (
                <g key={d.id} style={{ animation: `fadeIn 0.5s ease-in ${i * 0.1}s both` }}>
                  <rect
                    x={d.x} y={d.y} width={d.w} height={d.h}
                    rx="8"
                    fill={step.focus === 'dimension' ? '#ccfbf1' : '#f0fdfa'}
                    stroke={isProductSnow ? '#dc2626' : '#14b8a6'}
                    strokeWidth={isProductSnow ? '3' : '2'}
                  />
                  <text
                    x={d.x + d.w / 2} y={d.y + 22}
                    textAnchor="middle" fontSize="11" fontWeight="bold" fill="#134e4a"
                  >
                    {d.label}
                  </text>
                  <text
                    x={d.x + d.w / 2} y={d.y + 38}
                    textAnchor="middle" fontSize="9" fontFamily="monospace" fill="#115e59"
                  >
                    {d.name}
                  </text>
                  <text
                    x={d.x + d.w / 2} y={d.y + 54}
                    textAnchor="middle" fontSize="8" fontFamily="monospace" fill="#0f766e"
                  >
                    {d.fk} (PK)
                  </text>
                </g>
              );
            })}

            {/* 빈 상태 메시지 */}
            {!step.showDims && step.focus === 'fact' && (
              <text
                x="400" y="340"
                textAnchor="middle" fontSize="11" fill="#94a3b8" fontStyle="italic"
              >
                ↑ Fact 테이블 — 측정값 (amount/quantity) + FK 만 보유
              </text>
            )}
          </svg>

          {/* 범례 + 단계 설명 */}
          <div className="mt-3 pt-3 border-t border-slate-100">
            <div className="flex flex-wrap gap-3 text-[10px] text-slate-500">
              <span className="flex items-center gap-1">
                <span className="w-3 h-3 rounded bg-teal-100 border-2 border-teal-600"></span> Fact
              </span>
              <span className="flex items-center gap-1">
                <span className="w-3 h-3 rounded bg-teal-50 border-2 border-teal-400"></span> Dimension
              </span>
              {step.showFKLines && (
                <span className="flex items-center gap-1">
                  <span className="w-4 h-0.5 bg-teal-600"></span> FK (1:N)
                </span>
              )}
              {step.showSnowflake && (
                <span className="flex items-center gap-1">
                  <span className="w-4 h-0.5 bg-red-600"></span> chain (snowflake)
                </span>
              )}
            </div>
          </div>

          {/* Step 별 요약 */}
          <div className="mt-3 p-3 rounded-lg bg-teal-50 border border-teal-200 text-xs text-teal-900">
            {step.focus === 'fact' && (
              <span><strong>Fact</strong> = 비즈니스 이벤트 기록. row 매우 많음, column 적음 (FK + measure).</span>
            )}
            {step.focus === 'dimension' && (
              <span><strong>5 Dimension</strong> 등장 — date / product / customer / store / promotion. 별의 꼭짓점.</span>
            )}
            {step.focus === 'star' && (
              <span><strong>Star Schema 완성</strong> ⭐ — 5 Dim 이 모두 Fact 로 단방향 화살표. 분석 쿼리 1 hop.</span>
            )}
            {step.focus === 'snowflake' && (
              <span><strong>Snowflake</strong> ❄ — dim_product 가 dim_category 로 정규화. JOIN chain → 쿼리 느려짐.</span>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-teal-500/15 border-l-2 border-teal-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-teal-700 hover:text-teal-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 데이터 모델링 &gt; Chapter 1. 차원 모델링</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Star Schema 차원 모델링</h1>
                  <p className="text-sm text-slate-500 mt-0.5">별 모양 — Fact 1개 + Dimension 5개 (date/product/customer/store/promotion)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 text-sm text-teal-900">
                💡 다음(II-2-1)에서는 <strong>Snowflake/BigQuery/Redshift 비교</strong>
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; II-1-1</a>
              <a href="./II-2-1.html" className="text-teal-700 hover:text-teal-900 font-medium">II-2-1 DW 비교 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</body>
</html>
