<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-2-1. 3대 클라우드 DW (Snowflake / BigQuery / Redshift)
    학습 목표: 3대 클라우드 DW를 4 차원(확장성/비용/ML/운영)으로 비교해 상황에 맞게 고른다.
    핵심 비유: "3대 DW 비교표" — 멀티 클라우드 vs 서버리스 vs AWS 통합
    패턴: 좌(LiveDataPane: 3 DW 박스 + 4차원 점수 매트릭스) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 (3 DW 박스 강조 + 4 차원 점수)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Snowflake — "멀티 클라우드 + 컴퓨트 격리"',
        desc: 'AWS / GCP / Azure 어디서든 동일한 경험. storage와 compute가 완전히 분리되어 가상 웨어하우스(XS/S/M/L/XL)를 워크로드별로 따로 돌린다. auto-suspend로 idle 시 즉시 과금 정지, auto-scaling으로 동시성 폭주 시 클러스터 자동 확장.',
        focus: 'snowflake',
        scores: {
          snowflake: { scalability: 5, cost: 4, ml: 3, ops: 4 },
          bigquery:  { scalability: 0, cost: 0, ml: 0, ops: 0 },
          redshift:  { scalability: 0, cost: 0, ml: 0, ops: 0 },
        },
        showMatrix: false,
        code: {
          lang: 'yaml',
          filename: 'snowflake-warehouses.yml',
          lines: [
            '# Snowflake — 가상 웨어하우스 분리 + auto-scaling',
            'account: myorg-account.snowflakecomputing.com',
            'cloud: AWS                      # AWS / GCP / Azure 선택',
            'region: ap-northeast-2',
            '',
            '# Virtual Warehouse (compute) — storage와 분리',
            'warehouses:',
            '  - name: ETL_WH',
            '    size: LARGE                 # XS / S / M / L / XL / 2XL',
            '    auto_suspend: 60            # 60초 idle → 자동 정지 (과금 0)',
            '    auto_resume: true',
            '    min_cluster_count: 1',
            '    max_cluster_count: 3        # 동시성 → auto-scale',
            '',
            '  - name: BI_WH',
            '    size: SMALL                 # BI 팀 전용 — ETL과 격리',
            '    auto_suspend: 300',
            '',
            '# 같은 storage, 다른 compute → 워크로드 격리',
            '# 시간당 과금: LARGE = 8 credits/h, SMALL = 2 credits/h',
            '#',
            '# 강점',
            '# - Multi-cloud (AWS/GCP/Azure 동일 동작)',
            '# - Storage / Compute 완전 분리 → 각자 스케일',
            '# - Time Travel (90일 과거 복구) + Zero-copy Cloning',
          ],
          highlight: [8, 9, 10, 13, 16],
        },
      },
      {
        title: 'Step 2. BigQuery — "완전 서버리스 + slot + ML.PREDICT"',
        desc: '클러스터/노드 개념 자체가 없다. 진짜 서버리스 — 쿼리 던지면 GCP가 알아서 slot(연산 단위)을 할당. on-demand는 스캔 TB로, flat-rate는 slot 예약으로 과금. SQL 안에서 ML.PREDICT로 학습 모델을 바로 호출 — DW와 ML이 한 몸.',
        focus: 'bigquery',
        scores: {
          snowflake: { scalability: 5, cost: 4, ml: 3, ops: 4 },
          bigquery:  { scalability: 5, cost: 4, ml: 5, ops: 5 },
          redshift:  { scalability: 0, cost: 0, ml: 0, ops: 0 },
        },
        showMatrix: false,
        code: {
          lang: 'sql',
          filename: 'bigquery-ml.sql',
          lines: [
            '-- BigQuery — serverless + slot + ML.PREDICT 통합',
            '-- 1) 파티션 + 클러스터링으로 스캔 비용 최소화',
            'CREATE TABLE analytics.events (',
            '  event_time TIMESTAMP,',
            '  user_id    STRING,',
            '  event_name STRING,',
            '  properties ARRAY<STRUCT<k STRING, v STRING>>  -- nested',
            ')',
            'PARTITION BY DATE(event_time)        -- 일자별 파티션',
            'CLUSTER BY user_id, event_name;       -- 자주 필터하는 컬럼',
            '',
            '-- 2) SQL 안에서 모델 학습 (BigQuery ML)',
            'CREATE MODEL analytics.churn_model',
            'OPTIONS(model_type=\'logistic_reg\', input_label_cols=[\'churned\']) AS',
            'SELECT * FROM analytics.user_features;',
            '',
            '-- 3) ML.PREDICT — 추론도 SQL 한 줄',
            'SELECT user_id,',
            '       predicted_churned_probs[OFFSET(0)].prob AS p_churn',
            'FROM ML.PREDICT(MODEL analytics.churn_model,',
            '                (SELECT * FROM analytics.user_features))',
            'WHERE p_churn > 0.7;',
            '',
            '-- 과금: on-demand $6.25/TB scanned  |  flat-rate slot 예약',
            '-- 강점: 인프라 0, 무한 스토리지, GA4/Looker/Vertex 통합',
          ],
          highlight: [9, 10, 13, 14, 18, 19, 20, 21],
        },
      },
      {
        title: 'Step 3. Redshift — "AWS 네이티브 + RA3 + Spectrum (S3 직접 쿼리)"',
        desc: 'AWS 풀스택과 자연 통합. provisioned cluster이지만 RA3 노드부터는 managed storage(S3)로 분리되어 부분적 elastic resize 가능. Spectrum으로 S3 데이터를 외부 테이블처럼 직접 쿼리 — ETL 없이 DW 안에서 join.',
        focus: 'redshift',
        scores: {
          snowflake: { scalability: 5, cost: 4, ml: 3, ops: 4 },
          bigquery:  { scalability: 5, cost: 4, ml: 5, ops: 5 },
          redshift:  { scalability: 4, cost: 3, ml: 4, ops: 3 },
        },
        showMatrix: false,
        code: {
          lang: 'sql',
          filename: 'redshift-spectrum.sql',
          lines: [
            '-- Redshift — provisioned RA3 cluster + Spectrum',
            '-- 1) 클러스터: ra3.4xlarge × 4 nodes (managed storage 분리)',
            '--    aws redshift create-cluster --node-type ra3.4xlarge \\',
            '--      --number-of-nodes 4 --cluster-identifier analytics-prod',
            '',
            '-- 2) 내부 테이블 — DISTKEY / SORTKEY 가 핵심',
            'CREATE TABLE sales.orders (',
            '  order_id   BIGINT,',
            '  user_id    BIGINT,',
            '  order_date DATE,',
            '  amount     NUMERIC(12,2)',
            ')',
            'DISTKEY (user_id)        -- 노드 간 분산 (조인 성능)',
            'SORTKEY (order_date);    -- 정렬 키 (범위 스캔 빠름)',
            '',
            '-- 3) Spectrum — S3 데이터를 외부 테이블로 직접 쿼리',
            'CREATE EXTERNAL SCHEMA spectrum_logs',
            'FROM DATA CATALOG DATABASE \'logs_db\'',
            'IAM_ROLE \'arn:aws:iam::123:role/RedshiftSpectrum\';',
            '',
            '-- 4) 내부 + S3 외부를 한 번에 JOIN (ETL 불필요)',
            'SELECT o.user_id, COUNT(l.event_id) AS clicks',
            'FROM sales.orders o',
            'JOIN spectrum_logs.click_events l   -- ← S3 Parquet',
            '  ON o.user_id = l.user_id',
            'WHERE o.order_date >= \'2026-05-01\'',
            'GROUP BY o.user_id;',
            '',
            '-- 강점: S3/Aurora/Glue/SageMaker AWS 풀스택 자연 통합',
          ],
          highlight: [13, 14, 17, 18, 19, 24, 25],
        },
      },
      {
        title: 'Step 4. 4 차원 점수 — "내 상황에 어떤 DW?"',
        desc: '확장성 / 비용 모델 / ML 통합 / 운영 복잡도 4 차원으로 비교. "멀티 클라우드 + 워크로드 격리" → Snowflake. "GCP 중심 + 운영 0 + DW 안에서 ML" → BigQuery. "AWS 풀스택 + S3 직접 쿼리" → Redshift. 정답은 없고 상황이 답.',
        focus: 'choose',
        scores: {
          snowflake: { scalability: 5, cost: 4, ml: 3, ops: 4 },
          bigquery:  { scalability: 5, cost: 4, ml: 5, ops: 5 },
          redshift:  { scalability: 4, cost: 3, ml: 4, ops: 3 },
        },
        showMatrix: true,
        code: {
          lang: 'shell',
          filename: 'decision-matrix.sh',
          lines: [
            '# ── 4 차원 비교 매트릭스 ─────────────────────────',
            '#                  확장성  비용모델  ML통합  운영복잡도',
            '# Snowflake          5      4         3        4',
            '# BigQuery           5      4         5        5',
            '# Redshift           4      3         4        3',
            '#  (높을수록 우수, 운영복잡도는 "낮을수록 좋음"을 점수화)',
            '',
            '# ── 의사결정 가이드 ─────────────────────────────',
            '"멀티 클라우드 (AWS+GCP+Azure)"        → Snowflake',
            '"워크로드 격리 (ETL vs BI 따로 과금)"   → Snowflake',
            '"클라우드 자유롭게 옮기고 싶다"         → Snowflake',
            '',
            '"GCP 중심 (GA4 / Looker / Vertex)"     → BigQuery',
            '"인프라 운영 0 — 완전 서버리스"         → BigQuery',
            '"DW 안에서 ML.PREDICT 쓰고 싶다"        → BigQuery',
            '',
            '"AWS 풀스택 (S3 / Aurora / Glue)"      → Redshift',
            '"S3 데이터 직접 쿼리 (Spectrum)"       → Redshift',
            '"기존 AWS 청구서에 통합되길 원함"       → Redshift',
            '',
            '# ── 과금 모델 차이 ──────────────────────────────',
            '# Snowflake : 시간당 (virtual warehouse 가동 시간)',
            '# BigQuery  : 쿼리당 (스캔 TB) 또는 slot 예약',
            '# Redshift  : 노드당 시간 (RA3 + managed storage)',
            '',
            '# 한 줄 요약',
            '# Snowflake : "멀티 클라우드 + storage/compute 분리"',
            '# BigQuery  : "완전 서버리스 + GCP 생태계 + ML 내장"',
            '# Redshift  : "AWS 네이티브 + S3 깊은 통합"',
          ],
          highlight: [3, 4, 5],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 3 DW 메타 정보
    // ─────────────────────────────────────────────────────
    const DW_META = [
      {
        key: 'snowflake',
        emoji: '❄️',
        name: 'Snowflake',
        tagline: '멀티 클라우드',
        bullets: ['XS/S/M/L 가상 웨어하우스', 'auto-suspend / auto-scale', 'Storage·Compute 분리'],
      },
      {
        key: 'bigquery',
        emoji: '🟦',
        name: 'BigQuery',
        tagline: 'Google 서버리스',
        bullets: ['클러스터 개념 0 (서버리스)', 'slot 기반 과금', 'ML.PREDICT 내장'],
      },
      {
        key: 'redshift',
        emoji: '🟧',
        name: 'Redshift',
        tagline: 'AWS 통합',
        bullets: ['RA3 provisioned cluster', 'Spectrum (S3 직접 쿼리)', 'AWS 풀스택 결합'],
      },
    ];

    // 4 차원 메타
    const DIMENSION_META = [
      { key: 'scalability', label: '확장성',     emoji: '📈' },
      { key: 'cost',        label: '비용 모델',   emoji: '💰' },
      { key: 'ml',          label: 'ML 통합',    emoji: '🤖' },
      { key: 'ops',         label: '운영 복잡도', emoji: '🛠️' },
    ];

    // 정적 Tailwind 클래스 (purge 안전) — DW 박스 색상
    const DW_STYLE = {
      snowflake: {
        active: 'bg-cyan-50 border-cyan-400 ring-2 ring-cyan-300',
        idle:   'bg-slate-50 border-slate-200',
        accent: 'text-cyan-700',
        badge:  'bg-cyan-100 text-cyan-700',
      },
      bigquery: {
        active: 'bg-blue-50 border-blue-400 ring-2 ring-blue-300',
        idle:   'bg-slate-50 border-slate-200',
        accent: 'text-blue-700',
        badge:  'bg-blue-100 text-blue-700',
      },
      redshift: {
        active: 'bg-orange-50 border-orange-400 ring-2 ring-orange-300',
        idle:   'bg-slate-50 border-slate-200',
        accent: 'text-orange-700',
        badge:  'bg-orange-100 text-orange-700',
      },
    };

    // 점수 → 채움 칸 (1~5)
    function ScoreBar({ score }) {
      return (
        <div className="flex gap-0.5">
          {[1, 2, 3, 4, 5].map((n) => (
            <span
              key={n}
              className={`w-3 h-2 rounded-sm transition-colors duration-500 ${
                n <= score ? 'bg-teal-500' : 'bg-slate-200'
              }`}
              aria-hidden="true"
            />
          ))}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 3 DW 박스 + 4 차원 매트릭스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ focus, scores, showMatrix }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🏢 3대 클라우드 DW 비교</h2>
            <span className="text-[10px] text-slate-400 font-mono">Snowflake · BigQuery · Redshift</span>
          </div>

          {/* 3 DW 박스 */}
          <div className="grid grid-cols-3 gap-3 mb-4">
            {DW_META.map((dw) => {
              const isActive = focus === dw.key;
              const style = DW_STYLE[dw.key];
              return (
                <div
                  key={dw.key}
                  className={`rounded-lg border-2 p-3 transition-all duration-500 ${
                    isActive ? style.active + ' scale-105' : style.idle
                  }`}
                >
                  <div className="flex items-center gap-1.5 mb-1">
                    <span className="text-xl" aria-hidden="true">{dw.emoji}</span>
                    <div>
                      <div className={`text-xs font-bold ${isActive ? style.accent : 'text-slate-700'}`}>
                        {dw.name}
                      </div>
                      <div className="text-[10px] text-slate-500">{dw.tagline}</div>
                    </div>
                  </div>
                  <ul className="text-[10px] text-slate-600 space-y-0.5 mt-2">
                    {dw.bullets.map((b, i) => (
                      <li key={i} className="leading-snug">· {b}</li>
                    ))}
                  </ul>
                  {isActive && (
                    <div className={`text-[10px] font-bold mt-2 px-1.5 py-0.5 rounded inline-block ${style.badge}`}>
                      ▶ 강조
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* 4 차원 점수 매트릭스 */}
          <div className="rounded-lg border border-slate-200 overflow-hidden">
            <div className="bg-slate-50 px-3 py-2 text-[11px] font-bold text-slate-700 border-b border-slate-200 flex items-center justify-between">
              <span>📊 4 차원 점수 (1~5)</span>
              {showMatrix && (
                <span className="text-[10px] text-teal-700 font-mono animate-pulse">★ 최종 비교</span>
              )}
            </div>
            <table className="w-full text-xs">
              <thead className="bg-slate-50 text-slate-500">
                <tr>
                  <th className="text-left px-3 py-1.5 font-medium w-24">차원</th>
                  {DW_META.map((dw) => (
                    <th key={dw.key} className="text-left px-2 py-1.5 font-medium">
                      <span className="mr-1">{dw.emoji}</span>{dw.name}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {DIMENSION_META.map((dim) => (
                  <tr key={dim.key} className="border-t border-slate-100">
                    <td className="px-3 py-2 text-slate-700">
                      <span className="mr-1">{dim.emoji}</span>{dim.label}
                    </td>
                    {DW_META.map((dw) => {
                      const score = scores[dw.key]?.[dim.key] ?? 0;
                      return (
                        <td key={dw.key} className="px-2 py-2">
                          <div className="flex items-center gap-1.5">
                            <ScoreBar score={score} />
                            <span className="tabular-nums text-[11px] text-slate-600 font-mono">
                              {score === 0 ? '-' : score}
                            </span>
                          </div>
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-teal-500"></span>점수 채움
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-slate-200"></span>점수 빈칸
            </span>
            <span className="ml-auto text-slate-400">
              운영복잡도는 "낮을수록 좋음"을 점수화
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-teal-500/10 border-l-2 border-teal-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-teal-700 hover:text-teal-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 데이터 웨어하우스 &gt; Chapter 2. 클라우드 DW 비교</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">3대 클라우드 DW (Snowflake / BigQuery / Redshift)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">멀티 클라우드 / 서버리스 / AWS 통합 — 4 차원으로 골라보기</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                focus={step.focus}
                scores={step.scores}
                showMatrix={step.showMatrix}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 text-sm text-teal-900">
                💡 다음(II-2-2)에서는 <strong>Slowly Changing Dimensions</strong>
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./II-2-2.html" className="text-teal-700 hover:text-teal-900 font-medium">II-2-2 Slowly Changing Dimensions &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
