<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — 3대 클라우드 DW (Snowflake / BigQuery / Redshift)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    II-2-1. 3대 클라우드 DW (Snowflake / BigQuery / Redshift)
    학습 목표: 클라우드 데이터 웨어하우스 3대 비교 — 어떤 상황에 어떤 DW를 고를까
    핵심 비유: "3대 DW" — 멀티 클라우드(Snowflake), 서버리스(BigQuery), AWS 통합(Redshift)
    구조: 4단계 (Snowflake / BigQuery / Redshift / 선택 가이드)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Snowflake — "멀티 클라우드의 강자"',
        desc: 'AWS / GCP / Azure 어디서든 같은 경험으로 동작. storage와 compute가 완전히 분리되어 있어 각자 독립 스케일. virtual warehouse(컴퓨트 클러스터)는 시간당 과금 — 안 쓰면 자동 정지(auto-suspend). 동일 데이터에 여러 워크로드를 격리해 돌릴 수 있음.',
        block: {
          kind: 'yaml',
          code: `# Snowflake setup — virtual warehouse 사이즈
account: myorg-account.snowflakecomputing.com
cloud: AWS                      # AWS / GCP / Azure 선택 가능
region: ap-northeast-2

# Database & Schema
database: ANALYTICS
schema:   SALES

# Virtual Warehouse (compute) — storage와 분리
warehouses:
  - name: ETL_WH
    size: LARGE                 # XS / S / M / L / XL / 2XL ...
    auto_suspend: 60            # 60초 idle → 자동 정지 (과금 정지)
    auto_resume: true
    min_cluster_count: 1
    max_cluster_count: 3        # 멀티 클러스터 (concurrency 처리)

  - name: BI_WH
    size: SMALL                 # BI 팀 전용 — ETL과 격리
    auto_suspend: 300

# 같은 storage, 다른 compute → 워크로드 격리
# 시간당 과금: LARGE = 8 credits/hour, SMALL = 2 credits/hour

# 강점
- Multi-cloud (AWS/GCP/Azure 동일 동작)
- Storage / Compute 완전 분리 → 각자 스케일
- Time Travel (90일까지 과거 데이터 복구)
- Zero-copy Cloning (DB 복제 0초, 스토리지 0)`,
        },
        focus: 'snowflake',
      },
      {
        title: 'Step 2. BigQuery — "Google의 완전 서버리스"',
        desc: '클러스터/노드 개념 자체가 없음 — 진짜 서버리스. 스토리지는 사실상 무한, 쿼리는 스캔한 TB 단위로 과금(on-demand) 또는 slot 예약(flat-rate). standard SQL + ARRAY/STRUCT 같은 nested 타입 강력. GCP 생태계(GA4, Looker)와 자연 통합.',
        block: {
          kind: 'yaml',
          code: `# BigQuery — partition + cluster로 비용/성능 최적화
project: my-gcp-project
dataset: analytics
location: asia-northeast3       # 서울 리전

# 테이블 생성 — 파티셔닝 + 클러스터링 필수
table: events
schema:
  - { name: event_time,  type: TIMESTAMP }
  - { name: user_id,     type: STRING }
  - { name: event_name,  type: STRING }
  - { name: properties,  type: RECORD, mode: REPEATED }   # nested STRUCT

partitioning:
  field: event_time
  type:  DAY                    # 일자별 파티션 → 스캔 범위 축소

clustering:
  fields: [user_id, event_name] # 자주 필터하는 컬럼

# 쿼리 — 파티션 안 쓰면 풀스캔 (비용 폭탄)
sql: |
  SELECT user_id, COUNT(*) AS cnt
  FROM analytics.events
  WHERE event_time BETWEEN '2026-05-01' AND '2026-05-06'   # ← 파티션 필터
    AND event_name = 'purchase'
  GROUP BY user_id

# 과금 모델
pricing:
  on_demand: "$6.25 per TB scanned"   # 스캔량 기반
  flat_rate: "slot 예약 (월 정액)"     # 안정적 워크로드

# 강점
- 완전 서버리스 (인프라 0)
- 무한 스토리지, 자동 압축
- standard SQL + ARRAY/STRUCT
- GA4 / Looker / Vertex AI와 네이티브 통합`,
        },
        focus: 'bigquery',
      },
      {
        title: 'Step 3. Redshift — "AWS 네이티브 통합 강자"',
        desc: 'AWS 안에서 S3 / Glue / Aurora / RDS와 깊이 연결. Spectrum으로 S3의 데이터를 직접 쿼리. RA3 노드 기반 클러스터(managed storage 분리). Aurora zero-ETL 같은 신기능 추가 중. AWS를 깊이 쓰는 조직에 가장 자연스러움.',
        block: {
          kind: 'yaml',
          code: `# Redshift — RA3 클러스터 + S3 통합 (Spectrum + UNLOAD)
cluster:
  name: analytics-prod
  node_type: ra3.4xlarge        # RA3 = managed storage 분리
  number_of_nodes: 4
  region: ap-northeast-2

# 테이블 생성 — DISTKEY / SORTKEY가 핵심
ddl: |
  CREATE TABLE sales.orders (
    order_id     BIGINT,
    user_id      BIGINT,
    order_date   DATE,
    amount       NUMERIC(12,2)
  )
  DISTKEY (user_id)             -- 노드 간 분산 키 (조인 성능)
  SORTKEY (order_date);         -- 정렬 키 (범위 스캔 빠름)

# Spectrum — S3 데이터를 외부 테이블로 직접 쿼리
external_schema: |
  CREATE EXTERNAL SCHEMA spectrum_logs
  FROM DATA CATALOG
  DATABASE 'logs_db'
  IAM_ROLE 'arn:aws:iam::123:role/RedshiftSpectrum';

# UNLOAD — 결과를 S3로 내보내기 (Parquet 권장)
unload: |
  UNLOAD ('SELECT * FROM sales.orders WHERE order_date >= ''2026-05-01''')
  TO 's3://my-bucket/exports/orders_'
  IAM_ROLE 'arn:aws:iam::123:role/RedshiftS3'
  FORMAT AS PARQUET
  PARTITION BY (order_date);

# AWS 시너지
integrations:
  - S3 (Spectrum 외부 테이블)
  - Aurora / RDS (zero-ETL)
  - Glue (데이터 카탈로그)
  - QuickSight (BI)
  - SageMaker (ML 직접 호출)

# 강점: AWS 풀스택과 자연 통합, 기존 AWS 비용 모델 재사용`,
        },
        focus: 'redshift',
      },
      {
        title: 'Step 4. 선택 가이드 — "내 상황에 어떤 DW?"',
        desc: '"멀티 클라우드 / AWS 외 클라우드 사용" → Snowflake. "GCP 중심 + 운영 부담 0 원함" → BigQuery. "AWS 깊게 사용 중 + S3 데이터 통합" → Redshift. 워크로드 격리, 과금 모델, 생태계 결합도가 결정 포인트.',
        block: {
          kind: 'shell',
          code: `# 의사결정 매트릭스
질문                                    → 답
────────────────────────────────────────────────────
"멀티 클라우드 (AWS+GCP+Azure)"         → Snowflake
"클라우드를 자유롭게 옮기고 싶다"        → Snowflake
"워크로드 격리 (ETL vs BI 분리 과금)"    → Snowflake

"GCP 중심 (GA4, Looker, Vertex)"        → BigQuery
"인프라 운영 0 — 완전 서버리스"          → BigQuery
"쿼리 단위 과금이 더 유리한 패턴"        → BigQuery

"AWS 풀스택 (S3, Aurora, Glue)"         → Redshift
"S3 데이터 직접 쿼리 (Spectrum)"        → Redshift
"기존 AWS 청구서에 통합되길 원함"        → Redshift

# 과금 모델 차이
Snowflake : 시간당 (virtual warehouse 가동 시간)
BigQuery  : 쿼리당 (스캔 TB) 또는 slot 예약
Redshift  : 노드당 시간 (RA3 + managed storage)

# 한 줄 요약
Snowflake : "멀티 클라우드 + storage/compute 분리"
BigQuery  : "완전 서버리스 + GCP 생태계"
Redshift  : "AWS 네이티브 + S3 깊은 통합"

# 다음(II-2-2)에서는 Slowly Changing Dimensions (SCD)`,
        },
        focus: 'choose',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const DW_PRODUCTS = [
      { key: 'snowflake', emoji: '❄️', name: 'Snowflake', note: '멀티 클라우드' },
      { key: 'bigquery',  emoji: '🟦', name: 'BigQuery',  note: 'Google 서버리스' },
      { key: 'redshift',  emoji: '🟧', name: 'Redshift',  note: 'AWS 통합' },
      { key: 'choose',    emoji: '🎯', name: '선택',       note: '어느 걸' },
    ];

    function DWProductCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🏢 3대 DW (Snowflake/BigQuery/Redshift)</div>
          <div className="grid grid-cols-4 gap-2">
            {DW_PRODUCTS.map((p) => {
              const isActive = focus === p.key;
              return (
                <div
                  key={p.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-teal-100 border-2 border-teal-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{p.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{p.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{p.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">3대 클라우드 DW (Snowflake / BigQuery / Redshift)</h1>
                <p className="text-sm text-slate-500 mt-1">멀티 클라우드 / 서버리스 / AWS 통합 — 내 상황에 맞는 DW 고르기</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <DWProductCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'choose' && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 mb-6 text-xs text-teal-900">
                💡 다음(II-2-2)에서는 Slowly Changing Dimensions
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
