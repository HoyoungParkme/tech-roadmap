<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — Slowly Changing Dimensions (SCD)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>👔</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    II-2-2. Slowly Changing Dimensions (SCD)
    학습 목표: Dimension 값이 바뀔 때 어떻게 추적할까 — Type 1/2/3 비교
    핵심 비유: "직원 부서 변경 추적" — 덮어쓰기 / 이력 보관 / 이전값 1개
    구조: 4단계 (Type 1 / Type 2 / Type 3 / 선택 기준)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Type 1 — "그냥 덮어쓴다"',
        desc: 'Alice의 부서가 마케팅 → 영업으로 바뀌면 dim_employee 행을 그대로 UPDATE. 이력은 사라진다. 가장 단순하고 빠르지만 "과거 분석" 불가능. 오타 수정처럼 이력이 의미 없는 변경에만 적합.',
        block: {
          kind: 'yaml',
          code: `# Type 1 — 덮어쓰기 (이력 없음)
dim_employee:
  emp_id: 1001
  name:  Alice
  dept:  마케팅      # ← 변경 전

# Alice 부서 이동 발생
UPDATE dim_employee
SET    dept = '영업'
WHERE  emp_id = 1001;

dim_employee:
  emp_id: 1001
  name:  Alice
  dept:  영업        # ← 덮어쓰기 끝, 마케팅 흔적 없음

# 장점
# - 스키마 단순 (한 줄로 끝)
# - 쿼리 빠름 (조인 조건 단순)

# 한계
# - "Alice가 마케팅이었던 시절 매출"은 영원히 모름
# - fact 테이블이 과거 시점 분석에 쓰이면 왜곡됨

# 언제 OK?
# - 오타/표기 수정 (Aliec → Alice)
# - 이력이 비즈니스 의미가 전혀 없는 속성 (이메일 등)`,
        },
        focus: 'scd_type1',
      },
      {
        title: 'Step 2. Type 2 — "행을 새로 추가하고 유효 기간 표시"',
        desc: '변경이 발생하면 기존 행은 end_date를 채우고 is_current=false. 새 행을 INSERT하면서 effective_start=오늘, is_current=true. fact는 "사실 발생 시점에 유효하던 dim row"와 join. 이력 분석의 표준 — 가장 많이 쓴다.',
        block: {
          kind: 'yaml',
          code: `# Type 2 — 이력 보관 (effective_start/end + is_current)
dim_employee (변경 전):
  - surrogate_key: 5001
    emp_id: 1001
    name:  Alice
    dept:  마케팅
    effective_start: 2024-01-01
    effective_end:   9999-12-31
    is_current: true

# 2026-05-06 부서 이동 발생 → 2단계 처리
# 1) 기존 행 마감
UPDATE dim_employee
SET    effective_end = '2026-05-05',
       is_current    = false
WHERE  emp_id = 1001 AND is_current = true;

# 2) 새 행 추가 (새 surrogate key)
INSERT INTO dim_employee VALUES
(5102, 1001, 'Alice', '영업',
 '2026-05-06', '9999-12-31', true);

# fact 테이블 join — 사실 발생 시점에 유효한 row
SELECT f.amount, d.dept
FROM   fact_sales f
JOIN   dim_employee d
  ON   f.emp_id = d.emp_id
 AND   f.sale_date BETWEEN d.effective_start
                       AND d.effective_end;

# 강점: "2025년 마케팅 매출"이 정확히 추적됨
# 비용: 행 수 증가, 쿼리 조건 복잡`,
        },
        focus: 'scd_type2',
      },
      {
        title: 'Step 3. Type 3 — "이전 값 컬럼 1개만 들고 다님"',
        desc: 'current_dept 옆에 previous_dept 컬럼을 추가. 직전 1단계만 추적 가능. "한 번 이동" 비교가 핵심인 도메인(영업 → 신규 부서 후 첫 6개월 성과 등)에 쓴다. 그 이전 이력은 없다.',
        block: {
          kind: 'yaml',
          code: `# Type 3 — 이전값 1개만 보관
ALTER TABLE dim_employee
  ADD COLUMN previous_dept VARCHAR(50),
  ADD COLUMN dept_changed_at DATE;

dim_employee (변경 전):
  emp_id: 1001
  current_dept:    마케팅
  previous_dept:   NULL
  dept_changed_at: NULL

# 부서 이동 시 — 1행만 UPDATE
UPDATE dim_employee
SET    previous_dept   = current_dept,    # 마케팅 → previous로
       current_dept    = '영업',
       dept_changed_at = '2026-05-06'
WHERE  emp_id = 1001;

dim_employee (변경 후):
  emp_id: 1001
  current_dept:    영업
  previous_dept:   마케팅
  dept_changed_at: 2026-05-06

# 강점
# - 행 수 그대로, 쿼리 단순
# - "직전 부서와 비교" 분석 빠름

# 한계
# - 2번 이동하면 첫 부서는 사라짐 (마케팅 → 영업 → 기획)
# - 시간별 분석 불가 (effective 기간 없음)`,
        },
        focus: 'scd_type3',
      },
      {
        title: 'Step 4. 어느 걸 쓸까 — 의사결정 표',
        desc: '"이력 자체가 필요한가"가 1차 기준. 시간별 분석/감사 요건이 있으면 Type 2 표준. 이력 의미 없으면 Type 1. "직전 1번만" 비교가 핵심이면 Type 3. 실무에서는 dim 테이블마다 따로 결정 (한 dim도 컬럼별로 Type 섞어 쓸 수 있다).',
        block: {
          kind: 'shell',
          code: `# SCD 선택 의사결정 표
질문                                       → 답
─────────────────────────────────────────────────
이력이 분석/감사에 필요한가?              → 아니오 → Type 1
시간별 추세 분석이 필요한가? (월별 매출)  → 예 → Type 2
"직전 한 번"만 비교하면 충분한가?         → 예 → Type 3
법적 감사 로그 요건 (금융/의료)?          → 예 → Type 2 (표준)
오타/표기 수정 같은 단순 정정?            → 예 → Type 1

# 도메인별 추천
도메인                       권장 SCD
─────────────────────────────────────
직원 부서 (HR 분석)          Type 2 (이력 분석 필수)
이메일 주소 (오타 수정)      Type 1 (이력 무의미)
고객 등급 직전 비교          Type 3 (한 단계만)
상품 카테고리 (재분류)        Type 2 (과거 매출 보존)
주소 (배송 추적)             Type 2 (배송 시점 주소)
표기 오류 정정               Type 1 (덮어쓰기)

# 실무 팁 — 한 테이블 내 컬럼별 다른 Type
dim_customer:
  name           → Type 1 (오타 정정)
  segment        → Type 2 (마케팅 분석용)
  previous_grade → Type 3 (직전 등급 비교)

# 변경 빈도 고려
# - 자주 바뀌는 속성을 Type 2로 두면 행 수 폭증
# - "Rapidly Changing Dimension"은 별도 테이블로 분리 검토

# 다음(III-1-1)에서는 Data Lake — 원본 보관 창고`,
        },
        focus: 'which',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const SCD_TYPES = [
      { key: 'scd_type1', emoji: '🔄', name: 'Type 1', note: '덮어쓰기' },
      { key: 'scd_type2', emoji: '📚', name: 'Type 2', note: '이력 보관' },
      { key: 'scd_type3', emoji: '↩️', name: 'Type 3', note: '이전값 1개' },
      { key: 'which',     emoji: '🎯', name: '선택',   note: '어느 걸' },
    ];

    function SCDCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">👔 직원 부서 변경 (SCD)</div>
          <div className="grid grid-cols-4 gap-2">
            {SCD_TYPES.map((t) => {
              const isActive = focus === t.key;
              return (
                <div
                  key={t.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-teal-100 border-2 border-teal-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{t.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{t.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{t.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Slowly Changing Dimensions (SCD)</h1>
                <p className="text-sm text-slate-500 mt-1">직원 부서 변경 — Type 1 / Type 2 / Type 3 / 선택</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <SCDCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'which' && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 mb-6 text-xs text-teal-900">
                💡 다음(III-1-1)에서는 Data Lake — 원본 보관 창고
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
