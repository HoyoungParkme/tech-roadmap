<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — II-2-2. Slowly Changing Dimensions (SCD)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>👔</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-2-2. Slowly Changing Dimensions (SCD)
    학습 목표: dim 테이블의 값이 바뀔 때 4가지 처리 방식(Type 1/2/3/비교)을 이해하고 사용 사례별로 선택할 수 있다.
    핵심 비유: "직원 부서 변경 추적" — 같은 emp_id에 대해 부서 변경 사건이 발생했을 때 dim 테이블이 어떻게 변하나
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: 직원 dim 표 시각화) / 우(VSCode CodeViewer: SQL UPDATE/INSERT)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (직원 부서 변경 시뮬레이션 — 같은 emp_id=1001 Alice)
    // ─────────────────────────────────────────────────────
    // 시나리오: Alice (emp_id=1001) 부서가 마케팅 → 영업 으로 변경됨
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Type 1 — "그냥 덮어쓴다"',
        desc: 'Alice의 부서가 마케팅 → 영업으로 바뀌면 dim_employee 행을 그대로 UPDATE. 이력은 사라진다. 가장 단순하고 빠르지만 "과거 분석"이 불가능. 오타 수정처럼 이력이 의미 없는 변경에만 적합.',
        focus: 'type1',
        table: {
          // type1 — 컬럼 단순, 1행만 (덮어쓰기)
          columns: ['emp_id', 'name', 'dept'],
          rows: [
            { cells: ['1001', 'Alice', '영업'], state: 'updated', note: '← 덮어씀 (마케팅 흔적 ✗)' },
          ],
          changeBefore: '마케팅',
          changeAfter:  '영업',
          historyDepth: '0 단계',
          storage:      '1 row',
          queryComplex: '단순 (조인 X)',
        },
        showAlert: false,
        code: {
          lang: 'sql',
          filename: 'scd_type1.sql',
          lines: [
            '-- Type 1: 그냥 덮어쓰기 (이력 X)',
            '',
            '-- 변경 전 dim_employee',
            '-- emp_id=1001, name=Alice, dept=마케팅',
            '',
            'UPDATE dim_employee',
            'SET    dept = \'영업\'',
            'WHERE  emp_id = 1001;',
            '',
            '-- 변경 후 dim_employee',
            '-- emp_id=1001, name=Alice, dept=영업',
            '-- → "Alice가 마케팅이었던 시절"은 영원히 모름',
            '',
            '-- 장점: 스키마/쿼리 단순, 빠름',
            '-- 한계: 과거 시점 분석 불가 (fact 조인 시 왜곡)',
            '-- 적합: 오타 수정 (Aliec → Alice), 이메일 등',
          ],
          highlight: [6, 7, 8],
        },
      },
      {
        title: 'Step 2. Type 2 — "행을 새로 추가하고 유효 기간 표시"',
        desc: '변경이 발생하면 기존 행은 valid_to를 채우고 is_current=false. 새 행을 INSERT하면서 valid_from=오늘, is_current=true. fact는 "사실 발생 시점에 유효하던 dim row"와 join. 이력 분석의 표준 — 가장 많이 쓴다.',
        focus: 'type2',
        table: {
          columns: ['sk', 'emp_id', 'name', 'dept', 'valid_from', 'valid_to', 'is_current'],
          rows: [
            { cells: ['5001', '1001', 'Alice', '마케팅', '2024-01-01', '2026-05-05', 'false'], state: 'closed',  note: '← 마감된 과거 행' },
            { cells: ['5102', '1001', 'Alice', '영업',   '2026-05-06', '9999-12-31', 'true'],  state: 'current', note: '← 새로 INSERT (현재 행)' },
          ],
          changeBefore: '1행 (마케팅, 현재)',
          changeAfter:  '2행 (마케팅 마감 + 영업 현재)',
          historyDepth: '무제한',
          storage:      'N rows (변경마다 +1)',
          queryComplex: 'BETWEEN valid_from/to 조인',
        },
        showAlert: false,
        code: {
          lang: 'sql',
          filename: 'scd_type2.sql',
          lines: [
            '-- Type 2: 이력 보관 (valid_from/valid_to + is_current)',
            '',
            '-- 1) 기존 행 마감',
            'UPDATE dim_employee',
            'SET    valid_to    = \'2026-05-05\',',
            '       is_current  = false',
            'WHERE  emp_id = 1001 AND is_current = true;',
            '',
            '-- 2) 새 행 추가 (새 surrogate key)',
            'INSERT INTO dim_employee',
            '  (sk, emp_id, name, dept, valid_from, valid_to, is_current)',
            'VALUES',
            '  (5102, 1001, \'Alice\', \'영업\',',
            '   \'2026-05-06\', \'9999-12-31\', true);',
            '',
            '-- fact 조인: 사실 발생 시점에 유효한 dim row',
            'SELECT f.amount, d.dept',
            'FROM   fact_sales f',
            'JOIN   dim_employee d',
            '  ON   f.emp_id = d.emp_id',
            ' AND   f.sale_date BETWEEN d.valid_from AND d.valid_to;',
            '',
            '-- 강점: "2025년 마케팅 매출"이 정확히 추적됨',
            '-- 비용: 행 수 증가, 쿼리 조건 복잡',
          ],
          highlight: [3, 4, 5, 6, 7, 9, 10, 11, 12, 13, 14, 21],
        },
      },
      {
        title: 'Step 3. Type 3 — "이전 값 컬럼 1개만 들고 다님"',
        desc: 'current_dept 옆에 previous_dept 컬럼을 추가. 직전 1단계만 추적 가능. "한 번 이동" 비교가 핵심인 도메인(영업 → 신규 부서 후 첫 6개월 성과 등)에 쓴다. 그 이전 이력은 없다.',
        focus: 'type3',
        table: {
          columns: ['emp_id', 'name', 'current_dept', 'previous_dept', 'changed_at'],
          rows: [
            { cells: ['1001', 'Alice', '영업', '마케팅', '2026-05-06'], state: 'pivoted', note: '← 1행만 UPDATE (직전 1단계 보존)' },
          ],
          changeBefore: 'current=마케팅 / previous=NULL',
          changeAfter:  'current=영업 / previous=마케팅',
          historyDepth: '1 단계 (직전만)',
          storage:      '1 row + 컬럼 +2',
          queryComplex: '단순 (조인 X)',
        },
        showAlert: false,
        code: {
          lang: 'sql',
          filename: 'scd_type3.sql',
          lines: [
            '-- Type 3: 이전값 1개만 보관 (current + previous)',
            '',
            'ALTER TABLE dim_employee',
            '  ADD COLUMN previous_dept    VARCHAR(50),',
            '  ADD COLUMN dept_changed_at  DATE;',
            '',
            '-- 변경 전: current=마케팅, previous=NULL',
            '',
            '-- 부서 이동 시 — 1행만 UPDATE',
            'UPDATE dim_employee',
            'SET    previous_dept   = current_dept,    -- 마케팅 → previous',
            '       current_dept    = \'영업\',',
            '       dept_changed_at = \'2026-05-06\'',
            'WHERE  emp_id = 1001;',
            '',
            '-- 변경 후: current=영업, previous=마케팅',
            '',
            '-- 강점: 행 수 그대로, 쿼리 단순',
            '--      "직전 부서와 비교" 분석 빠름',
            '-- 한계: 2번 이동하면 첫 부서 사라짐',
            '--      (마케팅 → 영업 → 기획)',
            '--      시간별 분석 불가 (effective 기간 없음)',
          ],
          highlight: [10, 11, 12, 13, 14],
        },
      },
      {
        title: 'Step 4. 어느 걸 쓸까 — 4 type 비교',
        desc: '"이력 자체가 필요한가"가 1차 기준. 시간별 분석/감사 요건이 있으면 Type 2 표준. 이력 의미 없으면 Type 1. "직전 1번만" 비교가 핵심이면 Type 3. Type 0(불변)은 생일처럼 절대 안 바뀌는 속성. 한 dim 안에서도 컬럼별로 Type을 섞어 쓸 수 있다.',
        focus: 'which',
        // Step 4는 비교 표 모드 — table.rows 대신 별도 compare 사용
        compare: {
          columns: ['Type', '저장', '쿼리 복잡도', '이력 깊이', '사용 사례'],
          rows: [
            { type: 'Type 0', emoji: '🔒', cells: ['Type 0 · 불변', '1 row',  '단순',           '— (안 바뀜)', '생일, 가입일, SSN'] },
            { type: 'Type 1', emoji: '🔄', cells: ['Type 1 · 덮어쓰기', '1 row', '단순',          '0',          '오타 수정, 이메일'] },
            { type: 'Type 2', emoji: '📚', cells: ['Type 2 · 이력 보관', 'N rows', 'BETWEEN 조인', '무제한',     '직원 부서, 고객 등급, 주소'] },
            { type: 'Type 3', emoji: '↩️', cells: ['Type 3 · 이전값 1', '1 row + 컬럼 +N', '단순',  '1 단계',     '직전 등급 비교, 첫 부임 비교'] },
          ],
        },
        showAlert: true,
        code: {
          lang: 'yaml',
          filename: 'scd_decision_guide.yml',
          lines: [
            '# SCD 선택 의사결정 가이드',
            '',
            'questions:',
            '  - q: "이 속성은 한 번 정해지면 절대 안 바뀌나?"',
            '    yes: Type 0   # 생일, SSN, 가입일',
            '  - q: "이력이 분석/감사에 필요한가?"',
            '    no:  Type 1   # 오타, 이메일',
            '  - q: "시간별 추세 분석이 필요한가? (월별 매출)"',
            '    yes: Type 2   # 표준 — 가장 많이 씀',
            '  - q: "직전 한 번만 비교하면 충분한가?"',
            '    yes: Type 3   # 직전 등급, 첫 부임 비교',
            '  - q: "법적 감사 로그 (금융/의료)?"',
            '    yes: Type 2   # 시점별 추적 필수',
            '',
            'domain_recommendations:',
            '  직원 부서 (HR 분석):       Type 2',
            '  이메일 주소 (오타 수정):   Type 1',
            '  고객 등급 직전 비교:       Type 3',
            '  상품 카테고리 (재분류):    Type 2',
            '  주소 (배송 시점 추적):     Type 2',
            '  생년월일 / SSN:            Type 0',
            '',
            '# 실무 팁 — 한 테이블 안에서 컬럼별 다른 Type',
            'dim_customer:',
            '  name           : Type 1   # 오타 정정',
            '  segment        : Type 2   # 마케팅 분석용',
            '  previous_grade : Type 3   # 직전 등급 비교',
            '  birth_date     : Type 0   # 안 바뀜',
            '',
            '# 변경 빈도 고려',
            '# - 자주 바뀌는 속성을 Type 2로 두면 행 수 폭증',
            '# - "Rapidly Changing Dimension"은 별도 테이블로 분리',
          ],
          highlight: [4, 6, 8, 10, 12],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // SCD Type 메타 (좌측 상단 카드 4개)
    // ─────────────────────────────────────────────────────
    const TYPE_META = [
      { key: 'type1',  emoji: '🔄', name: 'Type 1', sub: '덮어쓰기' },
      { key: 'type2',  emoji: '📚', name: 'Type 2', sub: '이력 보관' },
      { key: 'type3',  emoji: '↩️', name: 'Type 3', sub: '이전값 1' },
      { key: 'which',  emoji: '🎯', name: '비교',   sub: '선택 가이드' },
    ];

    // 행 상태별 스타일
    const ROW_STYLE = {
      current:  'bg-teal-50 border-l-4 border-teal-500 text-teal-900',
      closed:   'bg-slate-100 border-l-4 border-slate-400 text-slate-500 line-through',
      updated:  'bg-amber-50 border-l-4 border-amber-500 text-amber-900',
      pivoted:  'bg-indigo-50 border-l-4 border-indigo-500 text-indigo-900',
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 직원 dim 표 시각화
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const focus = step.focus;
      const isCompare = focus === 'which';

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">👔 dim_employee 변화</h2>
            <span className="text-[10px] text-slate-400 font-mono">SCD · live table</span>
          </div>

          {/* 상단 Type 카드 4개 — 현재 focus 강조 */}
          <div className="grid grid-cols-4 gap-2 mb-4">
            {TYPE_META.map((t) => {
              const isActive = focus === t.key;
              return (
                <div
                  key={t.key}
                  className={`rounded-lg p-2 text-center transition-all duration-300 ${
                    isActive
                      ? 'bg-teal-100 border-2 border-teal-500 scale-105 shadow'
                      : 'bg-slate-50 border border-slate-200'
                  }`}
                >
                  <div className="text-xl">{t.emoji}</div>
                  <div className={`text-[11px] font-bold mt-0.5 ${isActive ? 'text-teal-800' : 'text-slate-700'}`}>{t.name}</div>
                  <div className="text-[9px] text-slate-500 mt-0.5">{t.sub}</div>
                </div>
              );
            })}
          </div>

          {/* 시나리오 박스 (Type 1~3 일 때) */}
          {!isCompare && (
            <div className="bg-teal-50 border border-teal-200 rounded-lg p-2.5 mb-3 text-[11px]">
              <div className="font-bold text-teal-800 mb-1">🎬 시나리오</div>
              <div className="text-teal-900">
                Alice (emp_id=1001) 부서가 <span className="font-mono bg-white px-1 rounded">마케팅</span>
                {' → '}
                <span className="font-mono bg-white px-1 rounded">영업</span> 으로 변경 (2026-05-06)
              </div>
            </div>
          )}

          {/* Type 1~3 — dim 테이블 표 */}
          {!isCompare && step.table && (
            <>
              <div className="overflow-x-auto rounded-lg border border-slate-200">
                <table className="w-full text-[11px] font-mono">
                  <thead>
                    <tr className="bg-slate-700 text-white">
                      {step.table.columns.map((c) => (
                        <th key={c} className="px-2 py-1.5 text-left font-bold whitespace-nowrap">{c}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {step.table.rows.map((r, idx) => (
                      <tr key={idx} className={`${ROW_STYLE[r.state] || ''} transition-all duration-500`}>
                        {r.cells.map((cell, ci) => (
                          <td key={ci} className="px-2 py-1.5 whitespace-nowrap">{cell}</td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              {/* 행 별 노트 */}
              <div className="mt-2 space-y-0.5">
                {step.table.rows.map((r, idx) => (
                  <div key={idx} className="text-[10px] text-slate-500 font-mono">
                    row {idx + 1}: <span className={r.state === 'closed' ? 'text-slate-400' : 'text-teal-700'}>{r.note}</span>
                  </div>
                ))}
              </div>

              {/* 메트릭 4종 */}
              <div className="grid grid-cols-2 gap-2 mt-4">
                <div className="bg-slate-50 rounded-md p-2 border border-slate-200">
                  <div className="text-[9px] text-slate-500 uppercase">저장</div>
                  <div className="text-xs font-bold text-slate-800 mt-0.5">{step.table.storage}</div>
                </div>
                <div className="bg-slate-50 rounded-md p-2 border border-slate-200">
                  <div className="text-[9px] text-slate-500 uppercase">쿼리 복잡도</div>
                  <div className="text-xs font-bold text-slate-800 mt-0.5">{step.table.queryComplex}</div>
                </div>
                <div className="bg-slate-50 rounded-md p-2 border border-slate-200">
                  <div className="text-[9px] text-slate-500 uppercase">이력 깊이</div>
                  <div className="text-xs font-bold text-slate-800 mt-0.5">{step.table.historyDepth}</div>
                </div>
                <div className="bg-slate-50 rounded-md p-2 border border-slate-200">
                  <div className="text-[9px] text-slate-500 uppercase">변화</div>
                  <div className="text-[10px] font-bold text-slate-800 mt-0.5 leading-tight">
                    <span className="text-slate-500">{step.table.changeBefore}</span><br/>
                    <span className="text-teal-700">→ {step.table.changeAfter}</span>
                  </div>
                </div>
              </div>
            </>
          )}

          {/* Step 4 — 4 type 비교 표 */}
          {isCompare && step.compare && (
            <div className="overflow-x-auto rounded-lg border border-slate-200">
              <table className="w-full text-[11px]">
                <thead>
                  <tr className="bg-slate-700 text-white">
                    {step.compare.columns.map((c) => (
                      <th key={c} className="px-2 py-1.5 text-left font-bold whitespace-nowrap">{c}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {step.compare.rows.map((r, idx) => (
                    <tr key={idx} className="border-b border-slate-100 hover:bg-teal-50 transition-colors">
                      <td className="px-2 py-2 font-bold text-teal-800 whitespace-nowrap">
                        <span className="mr-1">{r.emoji}</span>{r.cells[0]}
                      </td>
                      <td className="px-2 py-2 font-mono text-slate-700">{r.cells[1]}</td>
                      <td className="px-2 py-2 font-mono text-slate-700">{r.cells[2]}</td>
                      <td className="px-2 py-2 font-mono text-slate-700">{r.cells[3]}</td>
                      <td className="px-2 py-2 text-slate-600">{r.cells[4]}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* 마지막 alert */}
          {step.showAlert && (
            <div className="mt-4 p-3 rounded-lg bg-teal-50 border-2 border-teal-400">
              <div className="flex items-center gap-2 text-teal-800 font-bold text-sm">
                <span className="text-lg">💡</span>
                <span>Part II 완성. 다음(III-1-1)에서는 Data Lake</span>
              </div>
              <div className="text-[11px] text-teal-700 mt-1 font-mono">
                원본 보관 창고 — 정형 + 비정형, 스키마 온 리드
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-teal-500"></span>현재 행</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-400"></span>마감된 과거</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-amber-500"></span>덮어씀</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-indigo-500"></span>이전값 보존</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-teal-500/10 border-l-2 border-teal-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-teal-700 hover:text-teal-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 데이터 모델링 &gt; Chapter 2. 차원 변경 추적</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Slowly Changing Dimensions (SCD)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">직원 부서 변경 추적 — Type 1 (덮어쓰기) / Type 2 (이력) / Type 3 (이전값 1) / 비교</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; II-2-1 Star Schema</a>
              <a href="../part3/III-1-1.html" className="text-teal-700 hover:text-teal-900 font-medium">III-1-1 Data Lake &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
