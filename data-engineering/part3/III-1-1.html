<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — III-1-1. Data Lake</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>💧</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    III-1-1. Data Lake — 원본 그대로의 거대 저장소
    학습 목표: 정형/반정형/비정형을 schema-on-read로 담는 Lake 구조를
               Parquet, Hive partition, Glue Catalog 4단계로 이해한다.
    핵심 비유: "물 저장소(거대 창고)" — 모든 형태 데이터를 일단 그대로 담는다.
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: Lake 구조 시각화) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (Data Lake 4단계)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Definition — 원본 그대로, schema-on-read',
        desc: 'S3/GCS/ADLS 같은 오브젝트 스토리지에 JSON·CSV·Parquet·이미지·로그까지 형식 가리지 않고 그대로 쌓는다. DW와 달리 적재 시점에 스키마를 강제하지 않고(schema-on-read), 읽을 때 해석한다. 미래 어떤 분석이 필요할지 모를 때 일단 다 담아두는 "거대 창고" 전략.',
        focus: 'definition',
        bucket: {
          name: 's3://company-lake/',
          files: [
            { name: 'raw/events/2026/05/06/events-00.json.gz', kind: 'json', sizeLabel: '120 MB', tag: '반정형' },
            { name: 'raw/orders/2026/05/06/orders.csv',         kind: 'csv',  sizeLabel: '1.2 GB', tag: '정형' },
            { name: 'raw/images/products/sku-1234.png',         kind: 'png',  sizeLabel: '3.4 MB', tag: '비정형' },
            { name: 'raw/logs/nginx/2026-05-06/access.log',     kind: 'log',  sizeLabel: '480 MB', tag: '비정형' },
            { name: 'curated/sales/year=2026/.../part-0.parquet', kind: 'parquet', sizeLabel: '240 MB', tag: '컬럼' },
          ],
        },
        compare: null,
        partitions: null,
        catalog: null,
        code: {
          lang: 'shell',
          filename: 's3-list.sh',
          lines: [
            '# S3 버킷 디렉터리 — 형식 가리지 않고 다 담는다',
            '$ aws s3 ls s3://company-lake/ --recursive',
            'raw/events/2026/05/06/events-00.json.gz       # 반정형 (이벤트 로그)',
            'raw/orders/2026/05/06/orders.csv              # 정형 (CSV 덤프)',
            'raw/images/products/sku-1234.png              # 비정형 (이미지)',
            'raw/logs/nginx/2026-05-06/access.log          # 비정형 (텍스트)',
            'curated/sales/year=2026/month=05/part-0.parquet  # 가공 후 컬럼 형식',
            '',
            '# schema-on-write (DW)  vs  schema-on-read (Lake)',
            '#  DW   : 적재 전에 테이블 정의 → 안 맞으면 거부',
            '#  Lake : 일단 저장 → 읽을 때 (Spark/Athena) 스키마 적용',
            '#  → 비정형/탐색적 분석/ML 학습 데이터에 강함',
          ],
          highlight: [3, 4, 5, 6, 7],
        },
      },
      {
        title: 'Step 2. Parquet — 컬럼 형식 + Snappy 압축',
        desc: '같은 데이터를 CSV 대신 Parquet로 저장하면 컬럼 단위로 묶고 Snappy로 압축해서 보통 5배 작아진다. Spark/Presto/Athena가 필요한 컬럼만 읽기 때문에 스캔량이 10배 가까이 줄어든다. Lake 위에서 분석 비용을 줄이는 사실상 표준 포맷.',
        focus: 'parquet',
        bucket: null,
        compare: {
          row: {
            label: 'Row 기반 (CSV)',
            sizeLabel: '1.2 GB',
            sizePct: 100,
            scanLabel: '전체 라인 파싱',
            scanPct: 100,
            cols: [
              ['1,sku-1', '2026-05-06', '49.9'],
              ['2,sku-2', '2026-05-06', '120.0'],
              ['3,sku-3', '2026-05-06', '15.5'],
              ['4,sku-4', '2026-05-06', '88.0'],
            ],
          },
          columnar: {
            label: 'Columnar (Parquet)',
            sizeLabel: '240 MB',
            sizePct: 20,
            scanLabel: '필요 컬럼만 (2/3)',
            scanPct: 10,
            cols: [
              { name: 'order_id',   values: ['1', '2', '3', '4'], picked: true },
              { name: 'order_date', values: ['2026-05-06', '...', '...', '...'], picked: false },
              { name: 'amount',     values: ['49.9', '120.0', '15.5', '88.0'], picked: true },
            ],
          },
        },
        partitions: null,
        catalog: null,
        code: {
          lang: 'python',
          filename: 'csv_to_parquet.py',
          lines: [
            '# pandas + pyarrow로 CSV → Parquet 변환',
            'import pandas as pd',
            'import pyarrow.parquet as pq',
            '',
            '# 원본 CSV (raw zone)',
            'df = pd.read_csv("s3://company-lake/raw/orders/2026/05/06/orders.csv")',
            '# 1.2 GB, 컬럼 20개',
            '',
            '# Parquet로 다시 쓰기 (curated zone)',
            'df.to_parquet(',
            '    "s3://company-lake/curated/orders/year=2026/month=05/day=06/part-0.parquet",',
            '    engine="pyarrow",',
            '    compression="snappy",   # 빠르고 합리적',
            '    index=False,',
            ')',
            '# → 약 240 MB (5x 작아짐)',
            '',
            '# 분석은 컬럼만 골라 읽음 — 스캔량 10x ↓',
            'tbl = pq.read_table(',
            '    "s3://company-lake/curated/orders/year=2026/month=05/day=06/part-0.parquet",',
            '    columns=["order_id", "amount"],   # 필요한 2개만',
            ')',
            '# CSV였다면 전체 라인 파싱 필수, Parquet은 해당 컬럼 chunk만 읽음',
          ],
          highlight: [10, 11, 12, 13, 19, 20, 21],
        },
      },
      {
        title: 'Step 3. Partition — 디렉터리가 곧 파티션 컬럼 (Hive)',
        desc: '`year=2026/month=05/day=07/` 형태로 폴더를 나누면 Spark/Athena가 디렉터리 이름을 그대로 파티션 컬럼으로 인식한다. `WHERE year=2026 AND month=05`만 줘도 해당 폴더만 스캔해서 비용·시간이 크게 줄어든다. Hive 표준 레이아웃이라 거의 모든 쿼리 엔진이 그대로 알아본다.',
        focus: 'partition',
        bucket: null,
        compare: null,
        partitions: {
          base: 's3://company-lake/curated/sales/',
          tree: [
            { path: 'year=2024/month=12/day=31/part-0.parquet', highlight: false },
            { path: 'year=2025/month=01/day=01/part-0.parquet', highlight: false },
            { path: '...',                                       highlight: false, ellipsis: true },
            { path: 'year=2026/month=05/day=06/part-0.parquet', highlight: false },
            { path: 'year=2026/month=05/day=07/part-0.parquet', highlight: true },
          ],
          query: 'WHERE year=2026 AND month=5 AND day=7',
          pruned: '700 폴더 중 1개만 스캔 → 비용 1/700',
        },
        catalog: null,
        code: {
          lang: 'shell',
          filename: 'partition.sh',
          lines: [
            '# Hive 스타일 파티션 레이아웃',
            '$ aws s3 ls s3://company-lake/curated/sales/ --recursive',
            'curated/sales/year=2024/month=12/day=31/part-0.parquet',
            'curated/sales/year=2025/month=01/day=01/part-0.parquet',
            '...',
            'curated/sales/year=2026/month=05/day=06/part-0.parquet',
            'curated/sales/year=2026/month=05/day=07/part-0.parquet',
            '',
            '# 파티션 컬럼은 "디렉터리 이름"이고 파일 안에는 없다 (중복 제거)',
            '# year, month, day는 폴더명에서 자동 인식',
            '',
            '# Athena 쿼리 — 파티션으로 스캔량 ↓',
            'SELECT product_id, SUM(amount)',
            'FROM   sales',
            'WHERE  year = 2026 AND month = 5 AND day = 7   -- ← partition pruning',
            'GROUP  BY product_id;',
            '# 전체 2년치 중 2026-05-07 폴더만 읽음 → 비용 1/700',
            '',
            '# 주의: 파티션 너무 잘게 쪼개면 small-file 문제',
            '# 보통 day 단위, 트래픽 적으면 month 단위까지가 무난',
          ],
          highlight: [13, 14, 15, 16, 17],
        },
      },
      {
        title: 'Step 4. Catalog — Glue / Hive Metastore',
        desc: 'Lake 자체는 그냥 파일 더미라, "어떤 폴더가 어떤 테이블이고 스키마는 뭔지" 알려주는 메타 저장소가 필요하다. AWS Glue Data Catalog 또는 Hive Metastore가 그 역할. 한번 등록해두면 Athena, Spark, Presto, Trino가 모두 같은 테이블 정의로 표준 SQL을 쏠 수 있다.',
        focus: 'catalog',
        bucket: null,
        compare: null,
        partitions: null,
        catalog: {
          db: 'analytics',
          table: 'sales',
          location: 's3://company-lake/curated/sales/',
          format: 'PARQUET',
          schema: [
            { name: 'order_id',   type: 'bigint', kind: 'col' },
            { name: 'product_id', type: 'string', kind: 'col' },
            { name: 'amount',     type: 'double', kind: 'col' },
            { name: 'year',       type: 'int',    kind: 'part' },
            { name: 'month',      type: 'int',    kind: 'part' },
            { name: 'day',        type: 'int',    kind: 'part' },
          ],
          engines: ['Athena', 'Spark', 'Presto', 'Trino'],
        },
        code: {
          lang: 'yaml',
          filename: 'glue-table.yml',
          lines: [
            '# AWS Glue 테이블 정의 (CloudFormation 스니펫)',
            'Resources:',
            '  SalesTable:',
            '    Type: AWS::Glue::Table',
            '    Properties:',
            '      DatabaseName: analytics',
            '      TableInput:',
            '        Name: sales',
            '        TableType: EXTERNAL_TABLE',
            '        Parameters:',
            '          classification: parquet',
            '          projection.enabled: "true"',
            '        StorageDescriptor:',
            '          Location: s3://company-lake/curated/sales/',
            '          InputFormat:  org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat',
            '          OutputFormat: org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat',
            '          SerdeInfo:',
            '            SerializationLibrary: org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe',
            '          Columns:',
            '            - { Name: order_id,   Type: bigint }',
            '            - { Name: product_id, Type: string }',
            '            - { Name: amount,     Type: double }',
            '        # 디렉터리에서 받아오는 파티션 키',
            '        PartitionKeys:',
            '          - { Name: year,  Type: int }',
            '          - { Name: month, Type: int }',
            '          - { Name: day,   Type: int }',
            '',
            '# 등록 후 Athena/Spark/Trino 어디서나',
            '#   SELECT * FROM analytics.sales WHERE year=2026 AND month=5;',
            '# 동일 메타로 동작 → 엔진 갈아끼워도 쿼리 그대로',
          ],
          highlight: [13, 19, 20, 21, 24, 25, 26, 27],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 파일 종류별 스타일
    // ─────────────────────────────────────────────────────
    const FILE_STYLE = {
      json:    { emoji: '📄', color: 'bg-amber-50 border-amber-300 text-amber-800',     ext: '.json' },
      csv:     { emoji: '📊', color: 'bg-emerald-50 border-emerald-300 text-emerald-800', ext: '.csv' },
      png:     { emoji: '🖼️', color: 'bg-pink-50 border-pink-300 text-pink-800',         ext: '.png' },
      log:     { emoji: '📜', color: 'bg-slate-50 border-slate-300 text-slate-700',      ext: '.log' },
      parquet: { emoji: '📦', color: 'bg-teal-50 border-teal-400 text-teal-800',         ext: '.parquet' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Data Lake 구조 시각화 (단계별 분기)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const { focus } = step;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">💧 Data Lake 구조</h2>
            <span className="text-[10px] text-slate-400 font-mono">live · {focus}</span>
          </div>

          {/* 4단계 진행 인디케이터 */}
          <div className="grid grid-cols-4 gap-2 mb-4">
            {[
              { key: 'definition', emoji: '💧', name: '정의' },
              { key: 'parquet',    emoji: '📦', name: 'Parquet' },
              { key: 'partition',  emoji: '🗂️', name: 'Partition' },
              { key: 'catalog',    emoji: '📋', name: 'Catalog' },
            ].map((s) => {
              const active = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-2 text-center transition-all duration-300 ${
                    active
                      ? 'bg-teal-100 border-2 border-teal-500 scale-105 shadow-sm'
                      : 'bg-slate-50 border border-slate-200'
                  }`}
                >
                  <div className="text-lg" aria-hidden="true">{s.emoji}</div>
                  <div className={`text-[11px] font-bold mt-0.5 ${active ? 'text-teal-800' : 'text-slate-500'}`}>{s.name}</div>
                </div>
              );
            })}
          </div>

          {/* Step 1: S3/GCS 버킷 + 자유로운 schema 파일 리스트 */}
          {focus === 'definition' && (
            <div className="rounded-lg border-2 border-teal-300 bg-teal-50/40 p-3">
              <div className="flex items-center gap-2 mb-3 pb-2 border-b border-teal-200">
                <span className="text-xl" aria-hidden="true">🪣</span>
                <span className="font-mono text-xs font-bold text-teal-900">{step.bucket.name}</span>
                <span className="ml-auto text-[10px] text-teal-700 bg-teal-100 px-1.5 py-0.5 rounded">S3 / GCS / ADLS</span>
              </div>
              <div className="space-y-1.5">
                {step.bucket.files.map((f, i) => {
                  const fs = FILE_STYLE[f.kind];
                  return (
                    <div
                      key={i}
                      className={`flex items-center gap-2 px-2.5 py-1.5 rounded border ${fs.color}`}
                    >
                      <span aria-hidden="true">{fs.emoji}</span>
                      <span className="font-mono text-[11px] flex-1 truncate">{f.name}</span>
                      <span className="text-[10px] font-bold whitespace-nowrap">{f.sizeLabel}</span>
                      <span className="text-[10px] bg-white/60 px-1.5 py-0.5 rounded font-mono">{f.tag}</span>
                    </div>
                  );
                })}
              </div>
              <div className="mt-3 pt-2 border-t border-teal-200 text-[11px] text-teal-800">
                <strong>schema-on-read</strong> — 적재 시 스키마 강제 X. 읽을 때(Spark/Athena) 해석.
              </div>
            </div>
          )}

          {/* Step 2: row vs columnar Parquet 비교 */}
          {focus === 'parquet' && (
            <div className="space-y-3">
              {/* Row 기반 */}
              <div className="rounded-lg border-2 border-slate-300 bg-slate-50 p-3">
                <div className="flex items-center justify-between mb-2">
                  <div className="text-xs font-bold text-slate-700">📄 {step.compare.row.label}</div>
                  <div className="text-[10px] font-mono text-slate-500">{step.compare.row.sizeLabel}</div>
                </div>
                <div className="space-y-1">
                  {step.compare.row.cols.map((row, i) => (
                    <div key={i} className="flex gap-1 text-[10px] font-mono">
                      {row.map((cell, j) => (
                        <span key={j} className="bg-slate-200 text-slate-700 px-1.5 py-0.5 rounded flex-1 text-center truncate">
                          {cell}
                        </span>
                      ))}
                    </div>
                  ))}
                </div>
                <div className="text-[10px] text-slate-600 mt-2">한 줄에 모든 컬럼 — 스캔 시 전체 파싱</div>
              </div>

              {/* Columnar */}
              <div className="rounded-lg border-2 border-teal-400 bg-teal-50 p-3">
                <div className="flex items-center justify-between mb-2">
                  <div className="text-xs font-bold text-teal-800">📦 {step.compare.columnar.label}</div>
                  <div className="text-[10px] font-mono text-teal-700">{step.compare.columnar.sizeLabel} <span className="font-bold">(5x ↓)</span></div>
                </div>
                <div className="grid grid-cols-3 gap-1.5">
                  {step.compare.columnar.cols.map((col, i) => (
                    <div
                      key={i}
                      className={`rounded p-1.5 ${col.picked ? 'bg-teal-200 ring-2 ring-teal-500' : 'bg-slate-100 opacity-50'}`}
                    >
                      <div className={`text-[10px] font-bold mb-1 ${col.picked ? 'text-teal-900' : 'text-slate-500'}`}>
                        {col.name} {col.picked ? '✓' : ''}
                      </div>
                      {col.values.map((v, j) => (
                        <div key={j} className="text-[10px] font-mono text-slate-700 truncate">{v}</div>
                      ))}
                    </div>
                  ))}
                </div>
                <div className="text-[10px] text-teal-800 mt-2 font-bold">
                  필요 컬럼만 chunk 단위 읽기 — 스캔량 10x ↓
                </div>
              </div>

              {/* 비교 게이지 */}
              <div className="bg-white border border-slate-200 rounded-lg p-3 space-y-2">
                <div className="flex items-center gap-2">
                  <span className="text-[10px] w-20 text-right text-slate-600 font-bold">크기 (CSV)</span>
                  <div className="flex-1 bg-slate-100 rounded-full h-3 overflow-hidden">
                    <div className="bg-slate-400 h-full" style={{ width: '100%' }} />
                  </div>
                  <span className="text-[10px] w-12 text-slate-600 font-bold tabular-nums">1.2 GB</span>
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-[10px] w-20 text-right text-teal-700 font-bold">크기 (Parquet)</span>
                  <div className="flex-1 bg-slate-100 rounded-full h-3 overflow-hidden">
                    <div className="bg-teal-500 h-full transition-all duration-700" style={{ width: '20%' }} />
                  </div>
                  <span className="text-[10px] w-12 text-teal-700 font-bold tabular-nums">240 MB</span>
                </div>
                <div className="flex items-center gap-2 pt-1 border-t border-slate-100">
                  <span className="text-[10px] w-20 text-right text-slate-600 font-bold">스캔 (CSV)</span>
                  <div className="flex-1 bg-slate-100 rounded-full h-3 overflow-hidden">
                    <div className="bg-slate-400 h-full" style={{ width: '100%' }} />
                  </div>
                  <span className="text-[10px] w-12 text-slate-600 font-bold tabular-nums">1.0x</span>
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-[10px] w-20 text-right text-teal-700 font-bold">스캔 (Parquet)</span>
                  <div className="flex-1 bg-slate-100 rounded-full h-3 overflow-hidden">
                    <div className="bg-teal-500 h-full transition-all duration-700" style={{ width: '10%' }} />
                  </div>
                  <span className="text-[10px] w-12 text-teal-700 font-bold tabular-nums">10x ↓</span>
                </div>
              </div>
            </div>
          )}

          {/* Step 3: Hive partition 디렉터리 + pruning */}
          {focus === 'partition' && (
            <div className="space-y-3">
              <div className="rounded-lg border-2 border-teal-300 bg-teal-50/40 p-3">
                <div className="flex items-center gap-2 mb-2 pb-2 border-b border-teal-200">
                  <span aria-hidden="true">🪣</span>
                  <span className="font-mono text-[11px] font-bold text-teal-900">{step.partitions.base}</span>
                </div>
                <div className="space-y-1 font-mono text-[11px]">
                  {step.partitions.tree.map((node, i) => (
                    <div
                      key={i}
                      className={`flex items-center gap-2 px-2 py-1 rounded ${
                        node.highlight
                          ? 'bg-teal-200 border border-teal-500 text-teal-900 font-bold'
                          : node.ellipsis
                          ? 'text-slate-400'
                          : 'bg-white border border-slate-200 text-slate-700'
                      }`}
                    >
                      <span className="text-slate-400">{node.highlight ? '▶' : '└'}</span>
                      <span className="truncate">{node.path}</span>
                      {node.highlight && <span className="ml-auto text-[10px] bg-teal-600 text-white px-1.5 py-0.5 rounded">SCAN</span>}
                    </div>
                  ))}
                </div>
              </div>

              <div className="bg-slate-900 rounded-lg p-3">
                <div className="text-[10px] text-slate-400 mb-1 font-mono">Athena query</div>
                <div className="font-mono text-[11px] text-emerald-300">
                  SELECT * FROM sales <span className="text-fuchsia-300">{step.partitions.query}</span>
                </div>
                <div className="text-[10px] text-yellow-300 mt-2 font-mono">
                  ⚡ partition pruning: {step.partitions.pruned}
                </div>
              </div>

              <div className="bg-white border border-slate-200 rounded-lg p-2 text-[10px] text-slate-600">
                <strong className="text-slate-800">Hive 표준 레이아웃</strong> — `key=value` 폴더명을 모든 쿼리 엔진이 자동 인식 (파티션 컬럼)
              </div>
            </div>
          )}

          {/* Step 4: Glue/Hive Metastore 메타 표 */}
          {focus === 'catalog' && (
            <div className="space-y-3">
              <div className="rounded-lg border-2 border-teal-400 bg-teal-50 p-3">
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-xl" aria-hidden="true">📋</span>
                  <div>
                    <div className="text-[10px] text-teal-700 font-mono">AWS Glue Data Catalog</div>
                    <div className="font-mono text-sm font-bold text-teal-900">
                      {step.catalog.db}.{step.catalog.table}
                    </div>
                  </div>
                  <span className="ml-auto text-[10px] bg-teal-600 text-white px-2 py-0.5 rounded font-mono">
                    {step.catalog.format}
                  </span>
                </div>

                <div className="bg-white rounded border border-teal-200 p-2 mb-2">
                  <div className="text-[10px] text-slate-500 mb-0.5">Location</div>
                  <div className="font-mono text-[11px] text-slate-800 truncate">{step.catalog.location}</div>
                </div>

                {/* schema 표 */}
                <div className="bg-white rounded border border-teal-200 overflow-hidden">
                  <div className="grid grid-cols-3 bg-slate-100 text-[10px] font-bold text-slate-600 px-2 py-1">
                    <span>Name</span>
                    <span>Type</span>
                    <span className="text-right">Kind</span>
                  </div>
                  {step.catalog.schema.map((col, i) => (
                    <div
                      key={i}
                      className={`grid grid-cols-3 text-[11px] px-2 py-1 font-mono border-t border-slate-100 ${
                        col.kind === 'part' ? 'bg-amber-50 text-amber-900' : 'text-slate-700'
                      }`}
                    >
                      <span>{col.name}</span>
                      <span className="text-slate-500">{col.type}</span>
                      <span className="text-right">
                        <span className={`text-[10px] px-1.5 py-0.5 rounded ${
                          col.kind === 'part' ? 'bg-amber-200 text-amber-900' : 'bg-slate-100 text-slate-600'
                        }`}>
                          {col.kind === 'part' ? 'partition' : 'column'}
                        </span>
                      </span>
                    </div>
                  ))}
                </div>
              </div>

              {/* 호환 엔진 */}
              <div className="bg-white border border-slate-200 rounded-lg p-3">
                <div className="text-[10px] text-slate-500 mb-2 font-bold">↓ 동일 메타 → 모든 엔진 표준 SQL</div>
                <div className="flex flex-wrap gap-2">
                  {step.catalog.engines.map((e) => (
                    <span key={e} className="text-[11px] bg-teal-100 text-teal-800 border border-teal-300 px-2 py-1 rounded font-mono font-bold">
                      {e}
                    </span>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-teal-500/15 border-l-2 border-teal-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-teal-700 hover:text-teal-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Data Engineering &gt; Chapter 1. 분석 저장소</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Data Lake</h1>
                  <p className="text-sm text-slate-500 mt-0.5">물 저장소 — 정형/반정형/비정형을 원본 그대로 담는 거대 창고 (schema-on-read)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 text-sm text-teal-900">
                💡 다음(III-1-2)에서는 <strong>Lakehouse</strong> — DW + Lake 통합 (ACID 트랜잭션 + 컬럼 형식)
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./III-1-2.html" className="text-teal-700 hover:text-teal-900 font-medium">III-1-2 Lakehouse &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
