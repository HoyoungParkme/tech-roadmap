<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — Lakehouse (Delta · Iceberg · Hudi)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    III-1-2. Lakehouse (Delta Lake / Iceberg / Hudi) — DW와 Lake 통합
    학습 목표: 순수 Data Lake의 한계를 극복한 Lakehouse 3대장 비교 — Delta / Iceberg / Hudi
    핵심 비유: "도서관 + 물저장소 통합 매장" — Lake의 저장 효율 + DW의 ACID/스키마/시간여행
    구조: 4단계 (motivation / Delta / Iceberg / Hudi)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 동기 — "순수 Lake는 왜 부족했나"',
        desc: 'S3에 Parquet만 쌓아두면 싸고 자유롭다. 그런데 동시에 두 잡이 같은 파일을 쓰면 깨지고, 컬럼을 추가하려면 전체 재작성이고, "어제 밤 11시 시점"으로 되돌릴 수도 없다. Lakehouse는 Lake 위에 트랜잭션 로그를 얹어 ACID·스키마 진화·시간여행을 추가했다.',
        block: {
          kind: 'shell',
          code: `# 순수 Data Lake의 한계 (Parquet on S3)
# ─────────────────────────────────────────────────────────
# 한계                            상황 예시
# ─────────────────────────────────────────────────────────
# 동시 쓰기 충돌                  Spark 잡 2개가 같은 파티션 write
#                                 → 일부 파일 누락/깨짐
# 스키마 변경 어려움              컬럼 추가 시 전체 재작성 필요
#                                 (Parquet footer 스키마 고정)
# ACID 트랜잭션 X                 INSERT 도중 잡 실패 → 부분 데이터 잔존
#                                 (롤백 수단 없음)
# UPDATE / DELETE 비싸다          한 행 수정에도 파일 통째 재작성
# Time travel X                   "어제 22:00 스냅샷" 복원 불가
# 파일 너무 많음 (small files)    리스팅/오픈 비용 폭증
# ─────────────────────────────────────────────────────────

# Lakehouse가 해결하는 방식 — "Parquet + 트랜잭션 로그"
#
#   기존 Lake:       data/part-0001.parquet, part-0002.parquet, ...
#   Lakehouse:       data/part-0001.parquet  (실제 데이터)
#                  + _delta_log/ 또는 metadata/  (어떤 파일이 현재 유효한지)
#
# 로그가 "현재 테이블의 정의"를 결정 → ACID/시간여행/스키마 진화 가능

# 3대장 비교 한 줄
# Delta Lake : Databricks 발 — Spark 친화 + MERGE INTO 강력
# Iceberg    : Netflix 발  — 다중 엔진(Spark/Trino/Flink) + 스키마 진화 최강
# Hudi       : Uber 발     — row-level upsert + incremental query (CDC 친화)`,
        },
        focus: 'motivation',
      },
      {
        title: 'Step 2. Delta Lake — "Databricks 표준"',
        desc: 'Parquet 데이터 옆에 _delta_log 폴더에 JSON 트랜잭션 로그를 쌓는다. 각 커밋이 0001.json, 0002.json … 식으로 추가되며 "현재 어떤 파일이 살아있는지"가 결정된다. Spark와의 통합이 가장 매끄럽고 MERGE INTO 한 문장으로 SCD/upsert가 깔끔하다.',
        block: {
          kind: 'yaml',
          code: `# Delta Lake — 디렉터리 구조
# ─────────────────────────────────────────────────────────
# s3://lake/orders/
#   ├── _delta_log/
#   │     ├── 00000000000000000000.json   ← 첫 커밋 (스키마 + 추가 파일)
#   │     ├── 00000000000000000001.json   ← 두 번째 커밋 (UPDATE)
#   │     └── _last_checkpoint            ← parquet 체크포인트
#   ├── part-00000-xxx.snappy.parquet
#   └── part-00001-yyy.snappy.parquet

# 트랜잭션 로그 한 줄 예시 (00000...001.json)
# { "add":    { "path": "part-00002-...parquet", "size": 1024, "stats": "..." } }
# { "remove": { "path": "part-00001-...parquet", "deletionTimestamp": ... } }

# Spark에서 사용
spark.sql("""
  CREATE TABLE orders (
    order_id BIGINT, user_id BIGINT, amount DOUBLE, status STRING, ts TIMESTAMP
  ) USING DELTA
  PARTITIONED BY (DATE(ts))
  LOCATION 's3://lake/orders/'
""")

# MERGE INTO — 핵심 강점 (upsert/SCD 한 문장)
spark.sql("""
  MERGE INTO orders AS t
  USING staging_orders AS s
    ON t.order_id = s.order_id
  WHEN MATCHED AND s.status <> t.status
    THEN UPDATE SET status = s.status, ts = s.ts
  WHEN NOT MATCHED
    THEN INSERT (order_id, user_id, amount, status, ts)
         VALUES (s.order_id, s.user_id, s.amount, s.status, s.ts)
""")

# Time Travel — "어제 22:00 시점"으로 조회
spark.read.format("delta") \\
     .option("timestampAsOf", "2026-05-05 22:00:00") \\
     .load("s3://lake/orders/")

# 강점: Spark 통합 1등, MERGE 강력, Databricks 풀스택
# 한계: 비-Spark 엔진 지원은 후발 (Trino/Flink 커넥터 있지만 Iceberg보다 약함)`,
        },
        focus: 'delta',
      },
      {
        title: 'Step 3. Iceberg — "Netflix 발, 다중 엔진 표준"',
        desc: 'metadata.json → manifest list → manifest file → data file 의 트리 구조로 스냅샷을 관리한다. 컬럼 추가/삭제/이름 변경, 파티션 전략 변경(partition evolution)이 데이터 재작성 없이 가능. Spark / Trino / Flink / Snowflake 등 다중 엔진 지원이 가장 강해 "오픈 표준"으로 자리잡는 중.',
        block: {
          kind: 'yaml',
          code: `# Iceberg — metadata 트리 구조
# ─────────────────────────────────────────────────────────
# s3://lake/orders/
#   ├── metadata/
#   │     ├── v1.metadata.json        ← 테이블 스키마 + 현재 스냅샷 포인터
#   │     ├── v2.metadata.json
#   │     ├── snap-1234-...avro       ← manifest list (스냅샷별)
#   │     └── manifest-...avro        ← 어떤 data file이 어느 파티션인지
#   └── data/
#         ├── orders-00000.parquet
#         └── orders-00001.parquet
#
# 핵심: "metadata가 곧 테이블 정의" — 디렉터리 listing 안 함 (성능 안정)

# Spark에서 테이블 생성
CREATE TABLE catalog.db.orders (
  order_id BIGINT, user_id BIGINT, amount DOUBLE, ts TIMESTAMP
) USING iceberg
PARTITIONED BY (days(ts));

# Schema Evolution — 컬럼 추가/이름 변경/삭제, 데이터 재작성 X
ALTER TABLE catalog.db.orders ADD COLUMN currency STRING;
ALTER TABLE catalog.db.orders RENAME COLUMN amount TO amount_usd;
ALTER TABLE catalog.db.orders DROP COLUMN status;

# Partition Evolution — 파티션 전략 변경도 무재작성
ALTER TABLE catalog.db.orders
  REPLACE PARTITION FIELD days(ts) WITH hours(ts);
# 과거 데이터는 days로, 신규 데이터는 hours로 — 쿼리는 자동 처리

# Time Travel — 스냅샷 ID 또는 타임스탬프
SELECT * FROM catalog.db.orders VERSION AS OF 1234567890;
SELECT * FROM catalog.db.orders TIMESTAMP AS OF '2026-05-05 22:00:00';

# 다중 엔진에서 동일 테이블 읽기/쓰기
# - Spark, Trino, Flink, Presto, Snowflake, BigQuery (외부 테이블)
# - 카탈로그: Hive Metastore, AWS Glue, Nessie, REST Catalog

# 강점: 스키마/파티션 진화 최강, 엔진 중립 (오픈 표준)
# 한계: 카탈로그 구성 학습 곡선, MERGE는 Delta보다 늦게 성숙`,
        },
        focus: 'iceberg',
      },
      {
        title: 'Step 4. Hudi — "Uber 발, CDC/upsert 친화"',
        desc: 'Uber가 실시간 차량/주문 데이터를 위해 만든 — 행 단위 upsert와 incremental query("마지막 커밋 이후 바뀐 행만")가 1급 시민. 두 저장 모드: COW(Copy-on-Write, 읽기 빠름)와 MOR(Merge-on-Read, 쓰기 빠름). Kafka/Debezium CDC를 Lake로 흘려보낼 때 가장 자연스럽다.',
        block: {
          kind: 'yaml',
          code: `# Hudi — 두 가지 저장 모드
# ─────────────────────────────────────────────────────────
# COW (Copy-on-Write)              MOR (Merge-on-Read)
# ─────────────────────────────────────────────────────────
# upsert 시 Parquet 파일 재작성    Parquet 베이스 + Avro delta log
# 읽기:  단순 (Parquet만)          읽기:  base + delta 머지
# 쓰기:  느림 (재작성 비용)        쓰기:  빠름 (append만)
# 적합:  분석/배치 위주             적합:  스트리밍/CDC 위주
# ─────────────────────────────────────────────────────────

# Spark에서 Hudi 테이블 쓰기 — upsert 1급 시민
df.write.format("hudi") \\
  .option("hoodie.table.name", "orders") \\
  .option("hoodie.datasource.write.table.type", "MERGE_ON_READ") \\
  .option("hoodie.datasource.write.recordkey.field", "order_id") \\
  .option("hoodie.datasource.write.precombine.field", "ts") \\
  .option("hoodie.datasource.write.operation", "upsert") \\
  .option("hoodie.datasource.write.partitionpath.field", "dt") \\
  .mode("append") \\
  .save("s3://lake/orders_hudi/")

# Incremental Query — "마지막 커밋 이후 바뀐 행만"
spark.read.format("hudi") \\
     .option("hoodie.datasource.query.type", "incremental") \\
     .option("hoodie.datasource.read.begin.instanttime", "20260505220000") \\
     .load("s3://lake/orders_hudi/") \\
     .createOrReplaceTempView("changes")

# → 다운스트림 ETL이 "변경분"만 처리 (CDC 파이프라인의 핵심)

# Kafka → Hudi 흐름 (DeltaStreamer)
# Kafka(Debezium) ─▶ Hudi DeltaStreamer ─▶ s3://lake/orders_hudi/ (MOR)
#                                       └▶ 다운스트림: incremental read

# 강점: row-level upsert, incremental query, CDC 친화
# 한계: 운영 옵션 복잡 (튜닝 파라미터 多), 생태계는 Delta/Iceberg보다 작음`,
        },
        focus: 'hudi',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const LAKEHOUSE = [
      { key: 'motivation', emoji: '🎯', name: '동기',    note: 'Lake 한계' },
      { key: 'delta',      emoji: '🧊', name: 'Delta',   note: 'Databricks' },
      { key: 'iceberg',    emoji: '🔱', name: 'Iceberg', note: 'Netflix' },
      { key: 'hudi',       emoji: '🌪️', name: 'Hudi',    note: 'Uber' },
    ];

    function LakehouseCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🏛️ Lakehouse (Delta · Iceberg · Hudi)</div>
          <div className="grid grid-cols-4 gap-2">
            {LAKEHOUSE.map((t) => {
              const isActive = focus === t.key;
              return (
                <div
                  key={t.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-teal-100 border-2 border-teal-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{t.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{t.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{t.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Lakehouse (Delta · Iceberg · Hudi)</h1>
                <p className="text-sm text-slate-500 mt-1">도서관 + 물저장소 통합 매장 — Lake의 저장 효율 + DW의 ACID/스키마/시간여행</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <LakehouseCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'hudi' && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 mb-6 text-xs text-teal-900">
                💡 Part III 완성. Data Engineering Phase B (10/20). Part IV 통합/Streaming + Part V 거버넌스 후속 sprint
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
