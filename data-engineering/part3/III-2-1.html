<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — III-2-1. Apache Spark</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>⚡</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    III-2-1. Apache Spark — 분산 요리사
    학습 목표: Driver/Executor 모델, partition 기반 병렬 실행, DataFrame + Catalyst,
              Adaptive Query Execution / Broadcast Join 까지 이어지는 분산 처리 흐름을 이해한다.
    핵심 비유: "분산 주방" — Driver(주방장) 1명이 4명의 보조 요리사(Executor)에게 일을 쪼개 분배.
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: Spark 클러스터 시각화) / 우(VSCode CodeViewer · python pyspark)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (Spark 클러스터 시뮬레이션)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Driver — 주방장 (SparkSession + DAG 빌드)',
        desc: 'Driver는 클러스터의 마스터. SparkSession을 만들고 사용자의 코드를 받아 논리 실행 계획(DAG)을 빌드한다. 직접 데이터를 처리하지 않고 작업을 stage/task로 쪼개 Executor에게 분배·조율한다. action 호출 전까지는 lazy — DAG만 메모리에 쌓인다.',
        focus: 'driver',
        driverState: 'active',
        executors: [
          { id: 'E1', tasks: 0, partition: null, state: 'idle' },
          { id: 'E2', tasks: 0, partition: null, state: 'idle' },
          { id: 'E3', tasks: 0, partition: null, state: 'idle' },
          { id: 'E4', tasks: 0, partition: null, state: 'idle' },
        ],
        dag: ['read.parquet', 'filter', 'groupBy', 'sum', 'write'],
        showDataFrameTable: false,
        showOptimizer: false,
        showAQE: false,
        showBroadcast: false,
        code: {
          lang: 'python',
          filename: 'driver_session.py',
          lines: [
            '# Driver — SparkSession 생성 + DAG 빌드',
            'from pyspark.sql import SparkSession',
            '',
            '# 클러스터 진입점 (Driver 프로세스에서 실행)',
            'spark = (',
            '    SparkSession.builder',
            '    .appName("orders-daily")',
            '    .master("yarn")                          # yarn / k8s / spark://...',
            '    .config("spark.executor.instances", 4)   # 워커 4대',
            '    .config("spark.executor.cores", 4)',
            '    .config("spark.executor.memory", "8g")',
            '    .getOrCreate()',
            ')',
            '',
            '# 아래 transformation은 "계획"만 만든다 — 실제 실행 X (lazy)',
            'df = spark.read.parquet("s3://lake/orders/")',
            'daily = (',
            '    df.filter("year = 2026")',
            '      .groupBy("day")',
            '      .sum("amount")',
            ')',
            '# 여기까지는 DAG 빌드만 — Driver 메모리에 plan 저장',
            '# action 호출 시 stage로 쪼개 Executor에 전송',
            'daily.write.parquet("s3://lake/curated/daily/")  # ← 실제 실행',
          ],
          highlight: [5, 9, 16, 23],
        },
      },
      {
        title: 'Step 2. Executor — 보조 요리사 (partition 분산 실행)',
        desc: 'Executor는 워커 노드의 JVM 프로세스. Driver가 보낸 task를 실제로 처리한다. 4 GB 데이터가 4 partition(1 GB × 4)으로 쪼개지면 Executor 4대에 task 1개씩 분산. partition = 병렬 단위. shuffle은 Executor 사이의 네트워크 이동이라 비싸다.',
        focus: 'executor',
        driverState: 'dispatching',
        executors: [
          { id: 'E1', tasks: 1, partition: 'P1 · 1GB', state: 'running' },
          { id: 'E2', tasks: 1, partition: 'P2 · 1GB', state: 'running' },
          { id: 'E3', tasks: 1, partition: 'P3 · 1GB', state: 'running' },
          { id: 'E4', tasks: 1, partition: 'P4 · 1GB', state: 'running' },
        ],
        dag: ['read.parquet', 'filter', 'groupBy', 'sum', 'write'],
        showDataFrameTable: false,
        showOptimizer: false,
        showAQE: false,
        showBroadcast: false,
        code: {
          lang: 'python',
          filename: 'executor_run.py',
          lines: [
            '# Executor 동작 — partition 단위 병렬 처리',
            '# (Driver에서 본 코드, 실제 task는 Executor 4대에서 실행)',
            '',
            'df = spark.read.parquet("s3://lake/orders/")',
            '# 4 GB 파일이 4 partition (1 GB × 4) → 4 task 생성',
            'print(df.rdd.getNumPartitions())   # 4',
            '',
            '# narrow transformation — partition 안에서만 (shuffle X, 빠름)',
            'df2 = df.filter("amount > 100").select("order_id", "amount")',
            '',
            '# wide transformation — shuffle 발생 (Executor 간 네트워크 이동)',
            'df3 = df2.groupBy("user_id").sum("amount")',
            '# - groupBy/join/distinct 는 같은 키끼리 모이려면 shuffle 필수',
            '# - shuffle은 비싸다: 디스크 쓰기 + 네트워크 + 디스크 읽기',
            '',
            '# 캐시 — 자주 쓰는 중간 결과는 메모리에 (Executor 메모리 사용)',
            'df3.cache()',
            'df3.count()             # 첫 action 시 캐시 적재',
            'df3.filter(...).show()  # 캐시에서 즉시 읽음',
          ],
          highlight: [4, 5, 9, 12],
        },
      },
      {
        title: 'Step 3. DataFrame — 분산 테이블 + Catalyst 최적화',
        desc: 'DataFrame은 partition으로 쪼개진 분산 테이블. SQL과 거의 1:1로 매핑된다. Catalyst Optimizer가 논리 계획을 자동으로 재작성 — predicate pushdown, column pruning, join reorder. 사용자는 SQL스럽게 쓰면 엔진이 알아서 효율적인 물리 계획으로 바꿔준다.',
        focus: 'dataframe',
        driverState: 'active',
        executors: [
          { id: 'E1', tasks: 1, partition: 'P1 · user_id 0-9', state: 'running' },
          { id: 'E2', tasks: 1, partition: 'P2 · user_id 10-19', state: 'running' },
          { id: 'E3', tasks: 1, partition: 'P3 · user_id 20-29', state: 'running' },
          { id: 'E4', tasks: 1, partition: 'P4 · user_id 30-39', state: 'running' },
        ],
        dag: ['read.parquet', 'filter', 'join', 'select', 'write'],
        showDataFrameTable: true,
        showOptimizer: true,
        showAQE: false,
        showBroadcast: false,
        code: {
          lang: 'python',
          filename: 'dataframe_catalyst.py',
          lines: [
            '# DataFrame API + Catalyst 자동 최적화',
            'from pyspark.sql import functions as F',
            '',
            'orders = spark.read.parquet("s3://lake/orders/")  # 컬럼 50개',
            'users  = spark.read.parquet("s3://lake/users/")',
            '',
            '# 사용자가 쓴 코드 (논리 계획)',
            'result = (',
            '    orders.join(users, "user_id")',
            '          .filter(F.col("amount") > 100)',
            '          .select("user_id", "amount", "country")',
            ')',
            '',
            '# Catalyst가 자동으로 다시 쓴 물리 계획',
            '#  1) Predicate pushdown : filter(amount>100)을 join 이전으로',
            '#  2) Column pruning     : Parquet에서 user_id/amount/country만 읽음',
            '#  3) Join reorder       : 작은 쪽을 build side로',
            '',
            'result.explain(mode="formatted")',
            '# == Physical Plan ==',
            '# *(2) Project [user_id, amount, country]',
            '# +- *(2) BroadcastHashJoin [user_id], [user_id], Inner',
            '#    :- *(1) Filter (amount > 100)',
            '#    :  +- FileScan parquet [user_id,amount]',
            '#    :     PushedFilters: [GreaterThan(amount,100)]',
            '#    +- BroadcastExchange',
            '#       +- FileScan parquet [user_id,country]',
          ],
          highlight: [9, 10, 11, 15, 16, 17],
        },
      },
      {
        title: 'Step 4. Optimization — AQE + Broadcast Join',
        desc: 'Adaptive Query Execution(AQE)은 stage 결과 통계를 보고 다음 stage를 런타임에 다시 짠다. 작은 partition들을 자동으로 합치고(coalesce), skew는 분할. 작은 dim 테이블(50 MB)은 broadcast join으로 모든 Executor에 복제 — shuffle 없이 local join으로 처리한다.',
        focus: 'optimization',
        driverState: 'active',
        executors: [
          { id: 'E1', tasks: 1, partition: 'merged P1+P2 · 1.5GB', state: 'running', broadcast: true },
          { id: 'E2', tasks: 1, partition: 'P3 · 1GB',              state: 'running', broadcast: true },
          { id: 'E3', tasks: 1, partition: 'P4 · 1GB',              state: 'running', broadcast: true },
          { id: 'E4', tasks: 0, partition: null,                    state: 'idle',    broadcast: true },
        ],
        dag: ['read.parquet', 'filter', 'broadcast join', 'coalesce', 'write'],
        showDataFrameTable: false,
        showOptimizer: false,
        showAQE: true,
        showBroadcast: true,
        code: {
          lang: 'python',
          filename: 'aqe_broadcast.py',
          lines: [
            '# 1) AQE — 런타임 자동 최적화 (Spark 3.0+)',
            'spark.conf.set("spark.sql.adaptive.enabled", True)',
            'spark.conf.set("spark.sql.adaptive.coalescePartitions.enabled", True)',
            'spark.conf.set("spark.sql.adaptive.skewJoin.enabled", True)',
            '# - shuffle 후 작은 partition들을 자동으로 합침 (small-file 방지)',
            '# - skew 감지 시 큰 partition을 자동 분할',
            '',
            '# 2) Broadcast Join — 작은 테이블은 모든 Executor에 복제 (shuffle X)',
            'from pyspark.sql.functions import broadcast',
            'big   = spark.read.parquet("s3://lake/events/")    # 1 TB',
            'small = spark.read.parquet("s3://lake/dim_user/")  # 50 MB',
            '',
            'joined = big.join(broadcast(small), "user_id")',
            '# - small을 모든 Executor로 복제 → shuffle 없이 local join',
            '# - 보통 10MB~100MB 이하 테이블에 효과적',
            '',
            '# 3) Repartition — partition 수 조정',
            'df = spark.read.parquet("s3://lake/raw/")',
            '# - partition 너무 많음 → task overhead, small file',
            '# - 너무 적음 → Executor 메모리 부족, 병렬도 ↓',
            '',
            'df = df.repartition(200, "user_id")  # shuffle 후 200개로 (key 기반)',
            'df = df.coalesce(50)                 # shuffle 없이 줄이기 (write 직전)',
          ],
          highlight: [2, 3, 4, 13, 22, 23],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 정적 Tailwind 클래스 (purge 안전)
    // ─────────────────────────────────────────────────────
    const EXEC_STATE = {
      idle:    { card: 'bg-slate-50 border-slate-300',  badge: 'bg-slate-200 text-slate-500',  label: '대기' },
      running: { card: 'bg-teal-50 border-teal-400',    badge: 'bg-teal-100 text-teal-700',    label: '실행' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Spark 클러스터 시각화
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const driverActive   = step.driverState !== 'idle';
      const driverDispatch = step.driverState === 'dispatching';

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">👨‍🍳 Spark 분산 주방</h2>
            <span className="text-[10px] text-slate-400 font-mono">cluster · live</span>
          </div>

          {/* Driver 노드 */}
          <div className="mb-4">
            <div
              className={`rounded-lg border-2 p-3 transition-all duration-500 ${
                step.focus === 'driver'
                  ? 'bg-teal-100 border-teal-500 shadow-md scale-[1.02]'
                  : driverActive ? 'bg-teal-50 border-teal-300' : 'bg-slate-50 border-slate-300'
              }`}
            >
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <span className="text-xl" aria-hidden="true">👨‍🍳</span>
                  <div>
                    <div className="text-xs font-bold text-slate-800">Driver (Master)</div>
                    <div className="text-[10px] text-slate-500">SparkSession · DAG 스케줄러</div>
                  </div>
                </div>
                <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${
                  driverDispatch ? 'bg-amber-100 text-amber-700' : driverActive ? 'bg-teal-100 text-teal-700' : 'bg-slate-200 text-slate-500'
                }`}>
                  {driverDispatch ? '📤 task 분배중' : driverActive ? '✅ active' : 'idle'}
                </span>
              </div>

              {/* DAG 빌드 */}
              <div className="mt-3 pt-3 border-t border-teal-200">
                <div className="text-[10px] text-slate-500 mb-1.5">DAG · 논리 실행 계획</div>
                <div className="flex items-center gap-1 flex-wrap">
                  {step.dag.map((node, i) => (
                    <React.Fragment key={i}>
                      <span className="text-[10px] font-mono bg-white border border-teal-300 text-teal-700 px-1.5 py-0.5 rounded">
                        {node}
                      </span>
                      {i < step.dag.length - 1 && (
                        <span className="text-teal-400 text-[10px]" aria-hidden="true">→</span>
                      )}
                    </React.Fragment>
                  ))}
                </div>
              </div>
            </div>

            {/* 분배 화살표 */}
            {driverDispatch && (
              <div className="flex justify-center my-1">
                <span className="text-amber-500 text-xl animate-bounce" aria-hidden="true">↓</span>
              </div>
            )}
          </div>

          {/* Executor 노드 4대 */}
          <div>
            <div className="text-[10px] text-slate-500 mb-2">Executors (Workers · 4대)</div>
            <div className="grid grid-cols-2 gap-2">
              {step.executors.map((ex) => {
                const style = EXEC_STATE[ex.state];
                const isActive = step.focus === 'executor' && ex.state === 'running';
                return (
                  <div
                    key={ex.id}
                    className={`rounded-lg border-2 p-2.5 transition-all duration-500 ${style.card} ${isActive ? 'scale-[1.02]' : ''}`}
                  >
                    <div className="flex items-center justify-between mb-1">
                      <div className="flex items-center gap-1">
                        <span aria-hidden="true">👷</span>
                        <span className="text-xs font-bold text-slate-700">{ex.id}</span>
                      </div>
                      <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${style.badge}`}>
                        {style.label}
                      </span>
                    </div>
                    <div className="text-[10px] text-slate-600 font-mono min-h-[1.1em]">
                      {ex.partition || '— task 없음 —'}
                    </div>
                    <div className="text-[10px] text-slate-500 mt-0.5">
                      tasks: <span className="font-bold tabular-nums">{ex.tasks}</span>
                      {ex.broadcast && step.showBroadcast && (
                        <span className="ml-1.5 text-fuchsia-600">📦 small dim 복제</span>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* DataFrame partition 표 (Step 3) */}
          {step.showDataFrameTable && (
            <div className="mt-4 pt-3 border-t border-slate-100">
              <div className="text-[10px] text-slate-500 mb-1.5">📊 DataFrame · 4 partition</div>
              <div className="border border-slate-200 rounded-lg overflow-hidden text-[10px] font-mono">
                <div className="grid grid-cols-3 bg-slate-100 text-slate-600 font-bold">
                  <div className="px-2 py-1 border-r border-slate-200">partition</div>
                  <div className="px-2 py-1 border-r border-slate-200">user_id</div>
                  <div className="px-2 py-1">rows</div>
                </div>
                {[
                  { p: 'P1', u: '0-9',   r: '250K' },
                  { p: 'P2', u: '10-19', r: '240K' },
                  { p: 'P3', u: '20-29', r: '260K' },
                  { p: 'P4', u: '30-39', r: '250K' },
                ].map((row) => (
                  <div key={row.p} className="grid grid-cols-3 border-t border-slate-100 text-slate-700">
                    <div className="px-2 py-1 border-r border-slate-200">{row.p}</div>
                    <div className="px-2 py-1 border-r border-slate-200">{row.u}</div>
                    <div className="px-2 py-1 tabular-nums">{row.r}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Catalyst Optimizer 트리 (Step 3) */}
          {step.showOptimizer && (
            <div className="mt-3 p-3 rounded-lg bg-teal-50 border border-teal-300">
              <div className="text-[10px] font-bold text-teal-800 mb-2">🌳 Catalyst Optimizer</div>
              <div className="font-mono text-[10px] text-teal-900 leading-tight">
                <div>📜 논리 계획</div>
                <div className="pl-3 text-slate-500">join → filter → select</div>
                <div className="my-1 text-teal-600">↓ 자동 재작성</div>
                <div>⚙️ 물리 계획</div>
                <div className="pl-3 text-teal-700">• Predicate pushdown</div>
                <div className="pl-3 text-teal-700">• Column pruning</div>
                <div className="pl-3 text-teal-700">• BroadcastHashJoin</div>
              </div>
            </div>
          )}

          {/* AQE 박스 (Step 4) */}
          {step.showAQE && (
            <div className="mt-4 pt-3 border-t border-slate-100">
              <div className="p-3 rounded-lg bg-teal-50 border-2 border-teal-400">
                <div className="text-[11px] font-bold text-teal-800 mb-2">⚡ Adaptive Query Execution</div>
                <div className="text-[10px] text-teal-900 space-y-1">
                  <div className="flex items-center gap-2">
                    <span className="font-mono bg-white border border-teal-300 px-1 rounded">P1 · 0.2GB</span>
                    <span>+</span>
                    <span className="font-mono bg-white border border-teal-300 px-1 rounded">P2 · 0.3GB</span>
                    <span className="text-teal-600">→</span>
                    <span className="font-mono bg-teal-200 border border-teal-500 px-1 rounded font-bold">merged · 0.5GB</span>
                  </div>
                  <div className="text-teal-700">작은 partition 자동 합치기 (coalescePartitions)</div>
                </div>
              </div>
            </div>
          )}

          {/* Broadcast Join 박스 (Step 4) */}
          {step.showBroadcast && (
            <div className="mt-3 p-3 rounded-lg bg-fuchsia-50 border-2 border-fuchsia-300">
              <div className="text-[11px] font-bold text-fuchsia-800 mb-2">📦 Broadcast Join</div>
              <div className="text-[10px] text-fuchsia-900 leading-relaxed">
                <span className="font-mono bg-white border border-fuchsia-300 px-1 rounded">dim_user · 50MB</span>
                <span className="text-fuchsia-600"> → 모든 Executor에 복제 → shuffle 없이 local join</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-teal-500/10 border-l-2 border-teal-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-teal-700 hover:text-teal-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 데이터 처리 &gt; Chapter 2. 분산 처리</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Apache Spark</h1>
                  <p className="text-sm text-slate-500 mt-0.5">분산 요리사 — Driver(주방장) 1명이 Executor(보조) 4명에게 task를 분배 · DAG / partition / Catalyst / AQE</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 text-sm text-teal-900">
                💡 다음(III-2-2)에서는 <strong>dbt</strong> — SQL 빌드 시스템
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./III-2-2.html" className="text-teal-700 hover:text-teal-900 font-medium">III-2-2 dbt &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
