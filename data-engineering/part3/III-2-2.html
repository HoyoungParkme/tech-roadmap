<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — dbt (Data Build Tool)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    III-2-2. dbt (Data Build Tool) — SQL 전용 빌드 시스템
    학습 목표: SQL만으로 데이터 transformation + test + 문서 + lineage를 구축
    핵심 비유: "SQL 빌드 시스템" — Make/Maven처럼 SQL 모델 간 의존성을 관리
    구조: 4단계 (model / test / docs / lineage)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Model — SELECT 쿼리 + materialization',
        desc: 'dbt model = 한 개의 SELECT 쿼리. `{{ ref() }}`로 다른 모델을 참조하면 dbt가 의존성 그래프를 자동 추출해 올바른 순서로 빌드한다. materialization(view/table/incremental)으로 결과 형태를 결정한다.',
        block: {
          kind: 'yaml',
          label: 'dbt SQL',
          code: `-- models/marts/fact_orders.sql
{{ config(
    materialized='incremental',
    unique_key='order_id',
    on_schema_change='append_new_columns'
) }}

SELECT
    o.order_id,
    o.customer_id,
    c.country,
    o.amount,
    o.created_at
FROM {{ ref('stg_orders') }} o          -- ← 다른 모델 참조 (DAG 자동 생성)
LEFT JOIN {{ ref('dim_customers') }} c  -- ← {{ ref() }} = 의존성 선언
    ON o.customer_id = c.customer_id

{% if is_incremental() %}
  WHERE o.created_at > (SELECT MAX(created_at) FROM {{ this }})
{% endif %}

# 빌드 명령
$ dbt run --select fact_orders+      # fact_orders와 그 하위 모두 빌드
$ dbt run --select tag:daily         # 태그 단위 실행

# materialization 종류
view         : 뷰 (가벼움, 매번 재계산)
table        : 테이블 (전체 재생성)
incremental  : 증분 (새 데이터만 append/merge)
ephemeral    : CTE로 인라인 (저장 안 함)`,
        },
        focus: 'model',
      },
      {
        title: 'Step 2. Test — schema/unique/not_null/relationships',
        desc: '`schema.yml`에 컬럼별 test를 선언하면 `dbt test`가 자동 검증 SQL을 만들어 실행한다. 데이터 품질 게이트를 코드로 관리 — PR에 dbt test가 실패하면 머지 차단.',
        block: {
          kind: 'yaml',
          code: `# models/marts/schema.yml
version: 2

models:
  - name: fact_orders
    description: "주문 팩트 — 고객/국가 정보 조인 완료"
    columns:
      - name: order_id
        description: "주문 고유 ID"
        tests:
          - unique           # ← 중복 없음
          - not_null         # ← NULL 없음
      - name: customer_id
        tests:
          - not_null
          - relationships:   # ← 외래키 무결성
              to: ref('dim_customers')
              field: customer_id
      - name: amount
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"   # ← 음수 금지
      - name: country
        tests:
          - accepted_values:
              values: ['KR', 'US', 'JP', 'CN']

# 실행 — 실패하면 exit code 1
$ dbt test --select fact_orders
17:02:11  Running 8 tests
17:02:14  PASS unique_fact_orders_order_id ........ [PASS in 1.2s]
17:02:14  FAIL not_null_fact_orders_customer_id ... [FAIL 3 rows]

# 커스텀 test도 SQL로 작성 가능 (tests/ 디렉터리)`,
        },
        focus: 'test',
      },
      {
        title: 'Step 3. Docs — 자동 생성 + DAG 시각화',
        desc: '`dbt docs generate` 한 번이면 모든 모델/컬럼/test/lineage가 정적 사이트로 빌드된다. description은 `schema.yml`에 작성하고, DAG는 dbt가 `{{ ref() }}` 그래프로 자동 그린다.',
        block: {
          kind: 'shell',
          code: `# 1. 문서 메타 빌드 (manifest.json + catalog.json)
$ dbt docs generate
17:10:01  Building catalog
17:10:14  Catalog written to target/catalog.json

# 2. 정적 사이트 서빙 (포트 8080)
$ dbt docs serve
Serving docs at http://localhost:8080

# 자동 생성되는 것들
├─ 모델 목록 (description, columns, types)
├─ 컬럼별 test 결과
├─ source freshness (외부 소스 신선도)
├─ Lineage Graph (DAG 시각화)
│   stg_orders ──┐
│                ├──> fact_orders ──> mart_revenue
│   dim_customers┘
└─ SQL 코드 (compiled + raw)

# CI에 통합 — S3에 정적 사이트로 배포
$ aws s3 sync target/ s3://my-dbt-docs/ --delete
→ 팀 전체가 항상 최신 문서를 볼 수 있음

# Tip: schema.yml의 description을 잘 써두면
#      docs 사이트가 그대로 데이터 카탈로그가 됨`,
        },
        focus: 'docs',
      },
      {
        title: 'Step 4. Lineage — column-level 추적 + impact analysis',
        desc: '`{{ ref() }}` 기반의 모델 lineage는 기본 제공. column-level lineage는 dbt Cloud / dbt-osmosis / SQLMesh로 확장 — "이 컬럼을 바꾸면 어디까지 영향?"을 PR 단계에서 확인.',
        block: {
          kind: 'shell',
          code: `# 1. 모델 lineage — 의존 관계 조회
$ dbt ls --select +fact_orders+      # 상위/하위 모두
source:raw.orders
model.stg_orders
model.dim_customers
model.fact_orders          ← 기준 모델
model.mart_revenue
model.mart_customer_ltv

# 2. Impact analysis — "이 모델 바꾸면 누가 깨지나?"
$ dbt ls --select fact_orders+ --resource-type model
fact_orders → mart_revenue, mart_customer_ltv  (2개 영향)

# 3. Column-level lineage (dbt Cloud / dbt-osmosis)
$ dbt-osmosis yaml refactor --target prod
[INFO] fact_orders.amount
       ← stg_orders.amount
       → mart_revenue.total_amount
       → mart_customer_ltv.lifetime_value

# 4. CI에서 변경분만 빌드 (state 비교)
$ dbt run --select state:modified+ --state ./prod-manifest
→ 변경된 모델 + 그 하위만 재빌드 (CI 시간 단축)

# 실무 효과
- 데이터 변경 시 영향 범위 사전 파악
- 컬럼 폐기(deprecate) 결정 근거
- BI 대시보드까지 연결되는 풀 lineage`,
        },
        focus: 'lineage',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python',  textColor: '#86efac' },
      shell:  { label: 'Bash',    textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',    textColor: '#fde68a' },
    };

    const DBT = [
      { key: 'model',   emoji: '📝', name: 'Model',   note: 'SELECT + materialization' },
      { key: 'test',    emoji: '✅', name: 'Test',    note: 'unique / not_null' },
      { key: 'docs',    emoji: '📚', name: 'Docs',    note: '자동 생성 + DAG' },
      { key: 'lineage', emoji: '🧬', name: 'Lineage', note: 'column-level 추적' },
    ];

    function DbtCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🛠️ SQL 빌드 시스템 (dbt)</div>
          <div className="grid grid-cols-4 gap-2">
            {DBT.map((t) => {
              const isActive = focus === t.key;
              return (
                <div
                  key={t.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-teal-100 border-2 border-teal-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{t.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{t.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{t.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];
      const labelText = step.block.label || blockStyle.label;

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">dbt (Data Build Tool)</h1>
                <p className="text-sm text-slate-500 mt-1">SQL 빌드 시스템 — model / test / docs / lineage</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <DbtCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{labelText}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'lineage' && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 mb-6 text-xs text-teal-900">
                💡 다음(IV-1-1)에서는 Airflow ML/DE DAG
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
