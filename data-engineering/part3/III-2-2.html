<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — III-2-2. dbt (Data Build Tool)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    III-2-2. dbt (Data Build Tool) — SQL 빌드 시스템
    학습 목표: SQL만으로 데이터 transformation + test + 문서 + lineage를 구축
    핵심 비유: "SQL 빌드 시스템" — Make/Maven처럼 SQL 모델 간 의존성을 관리
    패턴: 좌(LiveDataPane — dbt 프로젝트 시각화) / 우(VSCode CodeViewer)
    구조: 4단계 (model / test / docs / lineage)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // models/ 디렉터리 트리 (Step 1) — materialized 옵션 표기
    // ─────────────────────────────────────────────────────
    const MODEL_TREE = [
      { path: 'models/',                       kind: 'dir' },
      { path: '├─ staging/',                   kind: 'dir' },
      { path: '│  ├─ stg_orders.sql',          kind: 'file', mat: 'view' },
      { path: '│  └─ stg_customers.sql',       kind: 'file', mat: 'view' },
      { path: '├─ marts/',                     kind: 'dir' },
      { path: '│  ├─ dim_customers.sql',       kind: 'file', mat: 'table' },
      { path: '│  ├─ fact_orders.sql',         kind: 'file', mat: 'incremental', focus: true },
      { path: '│  ├─ mart_revenue.sql',        kind: 'file', mat: 'table' },
      { path: '│  └─ mart_customer_ltv.sql',   kind: 'file', mat: 'table' },
      { path: '└─ schema.yml',                 kind: 'yml' },
    ];

    // 색상 매핑 (materialized 종류별)
    const MAT_STYLE = {
      view:        { label: 'view',        cls: 'bg-sky-100 text-sky-700 border-sky-300' },
      table:       { label: 'table',       cls: 'bg-emerald-100 text-emerald-700 border-emerald-300' },
      incremental: { label: 'incremental', cls: 'bg-teal-100 text-teal-800 border-teal-400' },
      ephemeral:   { label: 'ephemeral',   cls: 'bg-slate-100 text-slate-600 border-slate-300' },
    };

    // ─────────────────────────────────────────────────────
    // Step 2 — schema.yml 테스트 결과 (PASS 8 + FAIL 1)
    // ─────────────────────────────────────────────────────
    const TEST_RESULTS = [
      { name: 'unique_fact_orders_order_id',                 status: 'PASS', t: 1.2 },
      { name: 'not_null_fact_orders_order_id',               status: 'PASS', t: 0.9 },
      { name: 'not_null_fact_orders_customer_id',            status: 'FAIL', t: 1.4, rows: 3 },
      { name: 'relationships_fact_orders_customer_id',       status: 'PASS', t: 2.1 },
      { name: 'expression_is_true_fact_orders_amount',       status: 'PASS', t: 0.7 },
      { name: 'accepted_values_fact_orders_country',         status: 'PASS', t: 0.8 },
      { name: 'unique_dim_customers_customer_id',            status: 'PASS', t: 0.6 },
      { name: 'not_null_dim_customers_customer_id',          status: 'PASS', t: 0.5 },
      { name: 'not_null_stg_orders_order_id',                status: 'PASS', t: 0.4 },
    ];

    // ─────────────────────────────────────────────────────
    // Step 3 — DAG 노드 그래프 (dbt docs 자동 생성)
    // 좌→우 layered 그래프, x/y는 % 좌표
    // ─────────────────────────────────────────────────────
    const DAG_NODES = [
      { id: 'src_raw_orders',    label: 'raw.orders',    type: 'source', x: 6,  y: 30 },
      { id: 'src_raw_customers', label: 'raw.customers', type: 'source', x: 6,  y: 70 },
      { id: 'stg_orders',        label: 'stg_orders',    type: 'view',   x: 30, y: 30 },
      { id: 'stg_customers',     label: 'stg_customers', type: 'view',   x: 30, y: 70 },
      { id: 'dim_customers',     label: 'dim_customers', type: 'table',  x: 54, y: 70 },
      { id: 'fact_orders',       label: 'fact_orders',   type: 'incremental', x: 54, y: 30, focus: true },
      { id: 'mart_revenue',      label: 'mart_revenue',  type: 'table',  x: 80, y: 20 },
      { id: 'mart_customer_ltv', label: 'mart_ltv',      type: 'table',  x: 80, y: 50 },
    ];
    const DAG_EDGES = [
      ['src_raw_orders',    'stg_orders'],
      ['src_raw_customers', 'stg_customers'],
      ['stg_customers',     'dim_customers'],
      ['stg_orders',        'fact_orders'],
      ['dim_customers',     'fact_orders'],
      ['fact_orders',       'mart_revenue'],
      ['fact_orders',       'mart_customer_ltv'],
    ];

    // 노드 type별 색상
    const NODE_STYLE = {
      source:      { fill: '#e2e8f0', stroke: '#94a3b8', text: '#334155' },
      view:        { fill: '#e0f2fe', stroke: '#38bdf8', text: '#0369a1' },
      table:       { fill: '#d1fae5', stroke: '#10b981', text: '#065f46' },
      incremental: { fill: '#ccfbf1', stroke: '#14b8a6', text: '#115e59' },
    };

    // ─────────────────────────────────────────────────────
    // Step 4 — column-level lineage (변경 영향 분석)
    // fact_orders.amount를 변경하면 downstream 5 model 영향
    // ─────────────────────────────────────────────────────
    const LINEAGE_IMPACT = {
      changedColumn: 'fact_orders.amount',
      upstream: [
        { model: 'stg_orders',     column: 'amount',     note: '원본 금액' },
      ],
      downstream: [
        { model: 'mart_revenue',         column: 'total_amount',     note: '주간 매출 집계',          impact: 'high' },
        { model: 'mart_customer_ltv',    column: 'lifetime_value',   note: '고객 생애 가치',          impact: 'high' },
        { model: 'mart_daily_kpi',       column: 'gmv',              note: '일별 GMV',                impact: 'med' },
        { model: 'mart_country_revenue', column: 'country_revenue',  note: '국가별 매출',             impact: 'med' },
        { model: 'mart_top_customers',   column: 'top_amount',       note: 'BI 대시보드 (Tableau)',   impact: 'low' },
      ],
    };

    // ─────────────────────────────────────────────────────
    // STEPS — 4 단계
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Model — SELECT 쿼리 + materialization',
        desc: 'dbt model = 한 개의 SELECT 쿼리. `{{ ref() }}`로 다른 모델을 참조하면 dbt가 의존성 그래프를 자동 추출해 올바른 순서로 빌드한다. materialization(view/table/incremental)으로 결과 형태를 결정한다.',
        focus: 'model',
        code: {
          lang: 'sql',
          filename: 'models/marts/fact_orders.sql',
          lines: [
            '-- models/marts/fact_orders.sql',
            "{{ config(",
            "    materialized='incremental',",
            "    unique_key='order_id',",
            "    on_schema_change='append_new_columns'",
            ") }}",
            '',
            'SELECT',
            '    o.order_id,',
            '    o.customer_id,',
            '    c.country,',
            '    o.amount,',
            '    o.created_at',
            "FROM {{ ref('stg_orders') }} o          -- 다른 모델 참조 (DAG 자동 생성)",
            "LEFT JOIN {{ ref('dim_customers') }} c  -- {{ ref() }} = 의존성 선언",
            '    ON o.customer_id = c.customer_id',
            '',
            '{% if is_incremental() %}',
            '  WHERE o.created_at > (SELECT MAX(created_at) FROM {{ this }})',
            '{% endif %}',
            '',
            '-- 빌드 명령',
            '-- $ dbt run --select fact_orders+   (fact_orders와 그 하위 모두)',
            '-- $ dbt run --select tag:daily      (태그 단위)',
            '',
            '-- materialization 종류',
            '--  view        : 뷰 (가벼움, 매번 재계산)',
            '--  table       : 테이블 (전체 재생성)',
            '--  incremental : 증분 (새 데이터만 append/merge)',
            '--  ephemeral   : CTE 인라인 (저장 안 함)',
          ],
          highlight: [2, 3, 4, 5, 6, 14, 15, 18, 19, 20],
        },
      },
      {
        title: 'Step 2. Test — schema.yml로 데이터 품질 게이트',
        desc: '`schema.yml`에 컬럼별 test를 선언하면 `dbt test`가 자동 검증 SQL을 만들어 실행한다. 9개 중 8개 PASS / 1개 FAIL — `customer_id`에 NULL 3행. CI에서 exit 1로 머지 차단.',
        focus: 'test',
        code: {
          lang: 'yaml',
          filename: 'models/marts/schema.yml',
          lines: [
            '# models/marts/schema.yml',
            'version: 2',
            '',
            'models:',
            '  - name: fact_orders',
            '    description: "주문 팩트 — 고객/국가 정보 조인 완료"',
            '    columns:',
            '      - name: order_id',
            '        description: "주문 고유 ID"',
            '        tests:',
            '          - unique           # 중복 없음',
            '          - not_null         # NULL 없음',
            '      - name: customer_id',
            '        tests:',
            '          - not_null         # ← FAIL (NULL 3행)',
            '          - relationships:   # 외래키 무결성',
            "              to: ref('dim_customers')",
            '              field: customer_id',
            '      - name: amount',
            '        tests:',
            '          - dbt_utils.expression_is_true:',
            '              expression: ">= 0"   # 음수 금지',
            '      - name: country',
            '        tests:',
            '          - accepted_values:',
            "              values: ['KR', 'US', 'JP', 'CN']",
            '',
            '# 실행 — 실패하면 exit code 1',
            '# $ dbt test --select fact_orders',
            '# 17:02:11  Running 9 tests',
            '# 17:02:14  PASS unique_fact_orders_order_id ........ [PASS in 1.2s]',
            '# 17:02:14  FAIL not_null_fact_orders_customer_id ... [FAIL 3 rows]',
          ],
          highlight: [13, 14, 15, 30, 32],
        },
      },
      {
        title: 'Step 3. Docs — 자동 생성 + DAG 시각화',
        desc: '`dbt docs generate` 한 번이면 모든 모델/컬럼/test/lineage가 정적 사이트로 빌드된다. `{{ ref() }}` 그래프를 dbt가 자동으로 노드 그래프로 그린다 — 좌측 DAG에서 source → staging → marts 흐름 확인.',
        focus: 'docs',
        code: {
          lang: 'shell',
          filename: 'dbt-docs.sh',
          lines: [
            '# 1. 문서 메타 빌드 (manifest.json + catalog.json)',
            '$ dbt docs generate',
            '17:10:01  Building catalog',
            '17:10:14  Catalog written to target/catalog.json',
            '',
            '# 2. 정적 사이트 서빙 (포트 8080)',
            '$ dbt docs serve',
            'Serving docs at http://localhost:8080',
            '',
            '# 자동 생성되는 것들',
            '#  ├─ 모델 목록 (description, columns, types)',
            '#  ├─ 컬럼별 test 결과',
            '#  ├─ source freshness (외부 소스 신선도)',
            '#  ├─ Lineage Graph (DAG 시각화)',
            '#  │   raw.orders ──> stg_orders ──┐',
            '#  │                                ├─> fact_orders ──> mart_*',
            '#  │   raw.customers ──> stg_cust ──┘',
            '#  └─ SQL 코드 (compiled + raw)',
            '',
            '# CI에 통합 — S3에 정적 사이트로 배포',
            '$ aws s3 sync target/ s3://my-dbt-docs/ --delete',
            '# → 팀 전체가 항상 최신 문서를 볼 수 있음',
            '',
            '# Tip: schema.yml의 description을 잘 써두면',
            '#      docs 사이트가 그대로 데이터 카탈로그가 됨',
          ],
          highlight: [2, 7, 14, 21],
        },
      },
      {
        title: 'Step 4. Lineage — column-level 추적 + 변경 영향 분석',
        desc: '`fact_orders.amount` 컬럼을 변경하면 어디까지 영향? — downstream 5 model이 영향을 받는다. dbt-osmosis / dbt Cloud로 column-level lineage를 PR 단계에서 확인해 데이터 변경 사고를 예방한다.',
        focus: 'lineage',
        code: {
          lang: 'shell',
          filename: 'lineage.sh',
          lines: [
            '# 1. 모델 lineage — 의존 관계 조회',
            '$ dbt ls --select +fact_orders+      # 상위/하위 모두',
            'source:raw.orders',
            'model.stg_orders',
            'model.dim_customers',
            'model.fact_orders          ← 기준 모델',
            'model.mart_revenue',
            'model.mart_customer_ltv',
            'model.mart_daily_kpi',
            'model.mart_country_revenue',
            'model.mart_top_customers',
            '',
            '# 2. Impact analysis — "이 컬럼 바꾸면 누가 깨지나?"',
            '$ dbt-osmosis yaml refactor --target prod',
            '[INFO] fact_orders.amount',
            '       ← stg_orders.amount',
            '       → mart_revenue.total_amount',
            '       → mart_customer_ltv.lifetime_value',
            '       → mart_daily_kpi.gmv',
            '       → mart_country_revenue.country_revenue',
            '       → mart_top_customers.top_amount',
            '',
            '# 3. CI에서 변경분만 빌드 (state 비교)',
            '$ dbt run --select state:modified+ --state ./prod-manifest',
            '# → 변경된 모델 + 그 하위만 재빌드 (CI 시간 단축)',
            '',
            '# 실무 효과',
            '#  - 데이터 변경 시 영향 범위 사전 파악',
            '#  - 컬럼 폐기(deprecate) 결정 근거',
            '#  - BI 대시보드까지 연결되는 풀 lineage',
          ],
          highlight: [13, 14, 15, 16, 17, 18, 19, 20, 21],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 단계별 dbt 프로젝트 시각화
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ focus }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🛠️ dbt 프로젝트 (analytics/)</h2>
            <span className="text-[10px] text-slate-400 font-mono">
              {focus === 'model'   && 'models/ tree'}
              {focus === 'test'    && 'dbt test results'}
              {focus === 'docs'    && 'auto-generated DAG'}
              {focus === 'lineage' && 'column-level impact'}
            </span>
          </div>

          {focus === 'model'   && <ModelTreeView />}
          {focus === 'test'    && <TestResultsView />}
          {focus === 'docs'    && <DagGraphView />}
          {focus === 'lineage' && <LineageImpactView />}
        </div>
      );
    }

    // ── Step 1: models/ tree + materialized 배지 ──
    function ModelTreeView() {
      return (
        <div>
          <div className="bg-slate-900 rounded-lg p-3 font-mono text-xs leading-6">
            {MODEL_TREE.map((row, i) => {
              const isFocus = row.focus;
              return (
                <div
                  key={i}
                  className={`flex items-center justify-between px-2 rounded ${isFocus ? 'bg-teal-900/40 border-l-2 border-teal-400' : ''}`}
                >
                  <span className={
                    row.kind === 'dir' ? 'text-sky-300' :
                    row.kind === 'yml' ? 'text-amber-300' :
                    isFocus ? 'text-teal-200 font-bold' : 'text-slate-200'
                  }>
                    {row.path}
                  </span>
                  {row.mat && (
                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded border ${MAT_STYLE[row.mat].cls}`}>
                      {MAT_STYLE[row.mat].label}
                    </span>
                  )}
                </div>
              );
            })}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-3 text-slate-600">
            <span className="flex items-center gap-1">
              <span className="px-1.5 py-0.5 rounded border bg-sky-100 text-sky-700 border-sky-300">view</span>
              매번 재계산
            </span>
            <span className="flex items-center gap-1">
              <span className="px-1.5 py-0.5 rounded border bg-emerald-100 text-emerald-700 border-emerald-300">table</span>
              전체 재생성
            </span>
            <span className="flex items-center gap-1">
              <span className="px-1.5 py-0.5 rounded border bg-teal-100 text-teal-800 border-teal-400">incremental</span>
              증분 빌드
            </span>
          </div>

          <div className="mt-3 p-2 rounded bg-teal-50 border border-teal-200 text-xs text-teal-900">
            💡 <strong>fact_orders.sql</strong> = 주 모델. <code>{'{{ ref() }}'}</code>로 stg_orders + dim_customers 참조 → DAG 자동 생성
          </div>
        </div>
      );
    }

    // ── Step 2: dbt test 결과 (PASS 8 + FAIL 1) ──
    function TestResultsView() {
      const passed = TEST_RESULTS.filter((r) => r.status === 'PASS').length;
      const failed = TEST_RESULTS.filter((r) => r.status === 'FAIL').length;
      return (
        <div>
          {/* 요약 배너 */}
          <div className="grid grid-cols-3 gap-2 mb-3">
            <div className="rounded-lg p-2 bg-emerald-50 border-2 border-emerald-300 text-center">
              <div className="text-xs text-emerald-700 font-bold">PASS</div>
              <div className="text-2xl font-extrabold text-emerald-700 tabular-nums">{passed}</div>
            </div>
            <div className="rounded-lg p-2 bg-red-50 border-2 border-red-400 text-center animate-pulse">
              <div className="text-xs text-red-700 font-bold">FAIL</div>
              <div className="text-2xl font-extrabold text-red-700 tabular-nums">{failed}</div>
            </div>
            <div className="rounded-lg p-2 bg-slate-50 border-2 border-slate-300 text-center">
              <div className="text-xs text-slate-700 font-bold">총 테스트</div>
              <div className="text-2xl font-extrabold text-slate-700 tabular-nums">{TEST_RESULTS.length}</div>
            </div>
          </div>

          {/* 결과 리스트 */}
          <div className="bg-slate-900 rounded-lg p-3 font-mono text-[11px] leading-5 max-h-72 overflow-auto">
            <div className="text-slate-400 mb-1">$ dbt test --select fact_orders dim_customers stg_orders</div>
            <div className="text-slate-500 mb-2">17:02:11  Running {TEST_RESULTS.length} tests</div>
            {TEST_RESULTS.map((r, i) => {
              const isFail = r.status === 'FAIL';
              return (
                <div
                  key={i}
                  className={`flex items-center justify-between px-2 py-0.5 rounded ${isFail ? 'bg-red-900/40 text-red-300' : 'text-emerald-300'}`}
                >
                  <span>
                    <span className={`font-bold mr-2 ${isFail ? 'text-red-400' : 'text-emerald-400'}`}>
                      {r.status}
                    </span>
                    <span className="text-slate-200">{r.name}</span>
                  </span>
                  <span className={`text-[10px] ${isFail ? 'text-red-400 font-bold' : 'text-slate-500'}`}>
                    {isFail ? `${r.rows} rows · ${r.t}s` : `${r.t}s`}
                  </span>
                </div>
              );
            })}
            <div className="mt-2 pt-2 border-t border-slate-700 text-red-400 font-bold">
              Done. PASS={passed} FAIL={failed} · exit code 1 (CI 머지 차단)
            </div>
          </div>

          <div className="mt-3 p-2 rounded bg-red-50 border border-red-300 text-xs text-red-900">
            🚨 <strong>not_null_fact_orders_customer_id</strong> 실패 — customer_id에 NULL 3행 발견. PR 머지 차단됨.
          </div>
        </div>
      );
    }

    // ── Step 3: DAG 노드 그래프 ──
    function DagGraphView() {
      const nodeById = Object.fromEntries(DAG_NODES.map((n) => [n.id, n]));
      return (
        <div>
          <div className="relative bg-slate-50 border border-slate-200 rounded-lg overflow-hidden" style={{ height: '290px' }}>
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="absolute inset-0 w-full h-full">
              <defs>
                <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
                  <path d="M 0 0 L 10 5 L 0 10 z" fill="#14b8a6" />
                </marker>
              </defs>
              {DAG_EDGES.map(([from, to], i) => {
                const a = nodeById[from], b = nodeById[to];
                return (
                  <line
                    key={i}
                    x1={a.x + 8} y1={a.y}
                    x2={b.x - 8} y2={b.y}
                    stroke="#14b8a6"
                    strokeWidth="0.4"
                    markerEnd="url(#arrow)"
                    opacity="0.7"
                  />
                );
              })}
            </svg>

            {DAG_NODES.map((n) => {
              const s = NODE_STYLE[n.type];
              return (
                <div
                  key={n.id}
                  className={`absolute -translate-x-1/2 -translate-y-1/2 rounded-md border-2 px-2 py-1 text-[10px] font-mono font-bold shadow-sm transition-all ${n.focus ? 'ring-2 ring-teal-400 ring-offset-1 scale-110' : ''}`}
                  style={{
                    left: `${n.x}%`,
                    top: `${n.y}%`,
                    backgroundColor: s.fill,
                    borderColor: s.stroke,
                    color: s.text,
                    minWidth: '70px',
                    textAlign: 'center',
                  }}
                >
                  {n.label}
                </div>
              );
            })}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-3 text-slate-600">
            <span className="flex items-center gap-1">
              <span className="w-3 h-3 rounded border" style={{ background: NODE_STYLE.source.fill, borderColor: NODE_STYLE.source.stroke }}></span>
              source (외부 raw)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-3 rounded border" style={{ background: NODE_STYLE.view.fill, borderColor: NODE_STYLE.view.stroke }}></span>
              view (staging)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-3 rounded border" style={{ background: NODE_STYLE.table.fill, borderColor: NODE_STYLE.table.stroke }}></span>
              table (마트)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-3 rounded border" style={{ background: NODE_STYLE.incremental.fill, borderColor: NODE_STYLE.incremental.stroke }}></span>
              incremental
            </span>
          </div>

          <div className="mt-3 p-2 rounded bg-teal-50 border border-teal-200 text-xs text-teal-900">
            💡 <code>dbt docs serve</code> → localhost:8080에서 이 그래프를 인터랙티브하게 탐색
          </div>
        </div>
      );
    }

    // ── Step 4: column-level lineage 영향 분석 ──
    function LineageImpactView() {
      const IMPACT_STYLE = {
        high: { cls: 'bg-red-50 border-red-400 text-red-800',     dot: 'bg-red-500',    label: 'HIGH' },
        med:  { cls: 'bg-amber-50 border-amber-400 text-amber-800', dot: 'bg-amber-500', label: 'MED' },
        low:  { cls: 'bg-yellow-50 border-yellow-300 text-yellow-800', dot: 'bg-yellow-400', label: 'LOW' },
      };
      return (
        <div>
          {/* 변경 컬럼 (중앙) */}
          <div className="rounded-lg bg-teal-100 border-2 border-teal-500 p-3 mb-3 text-center shadow">
            <div className="text-[10px] text-teal-700 font-bold">변경 컬럼</div>
            <div className="text-base font-mono font-extrabold text-teal-900">{LINEAGE_IMPACT.changedColumn}</div>
            <div className="text-[10px] text-teal-700 mt-0.5">type: numeric → decimal(18,2)</div>
          </div>

          <div className="grid grid-cols-2 gap-3">
            {/* upstream */}
            <div>
              <div className="text-xs font-bold text-slate-600 mb-1">↑ upstream (원본)</div>
              {LINEAGE_IMPACT.upstream.map((u, i) => (
                <div key={i} className="rounded border-2 border-slate-300 bg-slate-50 p-2 mb-1">
                  <div className="text-xs font-mono font-bold text-slate-700">{u.model}.{u.column}</div>
                  <div className="text-[10px] text-slate-500">{u.note}</div>
                </div>
              ))}
            </div>

            {/* downstream */}
            <div>
              <div className="text-xs font-bold text-red-700 mb-1">↓ downstream (영향 5개)</div>
              {LINEAGE_IMPACT.downstream.map((d, i) => {
                const s = IMPACT_STYLE[d.impact];
                return (
                  <div key={i} className={`rounded border-2 p-1.5 mb-1 ${s.cls}`}>
                    <div className="flex items-center justify-between">
                      <div className="text-[11px] font-mono font-bold">
                        {d.model}.{d.column}
                      </div>
                      <span className={`text-[9px] font-bold text-white px-1.5 rounded ${s.dot}`}>{s.label}</span>
                    </div>
                    <div className="text-[10px] opacity-75">{d.note}</div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="mt-3 p-2 rounded bg-red-50 border-2 border-red-300 text-xs text-red-900">
            🚨 PR에 <code>fact_orders.amount</code> 타입 변경 — 5 downstream model 영향. 사전 확인 필수.
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // dbt 단계 카드 (4 step pill)
    // ─────────────────────────────────────────────────────
    const STAGE_META = [
      { key: 'model',   emoji: '📝', name: 'Model',   note: 'SELECT + materialization' },
      { key: 'test',    emoji: '✅', name: 'Test',    note: 'unique / not_null' },
      { key: 'docs',    emoji: '📚', name: 'Docs',    note: '자동 생성 + DAG' },
      { key: 'lineage', emoji: '🧬', name: 'Lineage', note: 'column-level 추적' },
    ];

    function StageCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
          <div className="grid grid-cols-4 gap-2">
            {STAGE_META.map((t) => {
              const isActive = focus === t.key;
              return (
                <div
                  key={t.key}
                  className={`rounded-lg p-2 text-center transition-all ${isActive ? 'bg-teal-100 border-2 border-teal-400 scale-105 shadow' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-xl">{t.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-0.5">{t.name}</div>
                  <div className="text-[10px] text-slate-500 mt-0.5">{t.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + dbt label override
    // ─────────────────────────────────────────────────────
    // dbt label override: SQL을 'dbt SQL', YAML을 'dbt YAML' 등으로 라벨링
    const DBT_LANG_LABEL = {
      sql:   'dbt SQL',
      yaml:  'dbt YAML',
      shell: 'Bash',
    };

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-teal-400 font-mono uppercase font-bold">
              {DBT_LANG_LABEL[code.lang] || code.lang}
            </span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-teal-500/10 border-l-2 border-teal-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-teal-700 hover:text-teal-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 데이터 변환 &gt; Chapter 2. 빌드 시스템</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">dbt (Data Build Tool)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">SQL 빌드 시스템 — Model / Test / Docs / Lineage</p>
                </div>
              </div>
            </header>

            {/* 단계 카드 (4 pill) */}
            <StageCards focus={step.focus} />

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane focus={step.focus} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 text-sm text-teal-900">
                💡 Part III 완성. 다음(IV-1-1)에서는 Airflow ML/DE DAG
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; III-2-1</a>
              <a href="../../mlops/part4/IV-1-1.html" className="text-teal-700 hover:text-teal-900 font-medium">IV-1-1 Airflow ML/DE DAG &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
