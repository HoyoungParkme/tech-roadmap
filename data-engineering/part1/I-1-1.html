<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — Data Engineering이란</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-1-1. Data Engineering이란
    학습 목표: 데이터 시스템의 3 layer(OLTP 운영 / OLAP 분석 / Lake 저장)를 이해
    핵심 비유: "도서관 3개 층" — 1층 운영창고 / 2층 분석실 / 지하 장기보관
    구조: 4단계 (OLTP만 있을 때 / OLAP 분리 / Lake 추가 / 3 layer 통합)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. OLTP만 있을 때 — "분석 쿼리가 운영 DB를 죽인다"',
        desc: '운영 DB(PostgreSQL/MySQL) 한 대로 모든 일을 처리. 사용자 주문도 받고, CEO의 월간 매출 집계도 같이 돌린다. 무거운 GROUP BY 한 방에 lock이 걸리고 결제 API 응답이 30초로 늘어난다. 운영과 분석은 본질적으로 다른 일이다.',
        block: {
          kind: 'shell',
          code: `# 평일 오후 3시, 운영 PostgreSQL 한 대뿐
$ psql -h prod-db -U admin

-- 영업팀: "월간 매출 집계 좀 뽑아주세요"
SELECT product_id, SUM(amount), COUNT(*)
FROM orders
WHERE created_at >= '2026-01-01'
GROUP BY product_id;
-- 1억 행 full scan, 8분간 실행...

-- 같은 시각, 운영 트래픽
사용자 A: "결제 버튼 눌렀는데 30초째 응답 없어요"
사용자 B: "장바구니가 안 열려요"

$ SELECT pid, query, state FROM pg_stat_activity;
 12345 | INSERT INTO orders ...        | waiting    ← lock 대기
 12346 | UPDATE inventory SET stock... | waiting    ← lock 대기
 99999 | SELECT product_id, SUM(amo... | active     ← 분석 쿼리 lock 점유

# OLTP(운영) DB에서 OLAP(분석) 쿼리 = 자살골`,
        },
        focus: 'oltp_layer',
      },
      {
        title: 'Step 2. OLAP 분리 — "분석실(DW)을 따로 짓는다"',
        desc: '분석 전용 데이터 웨어하우스(Snowflake/BigQuery/Redshift)를 별도로 둔다. 야간에 Airflow ETL 잡이 운영 DB의 변경분을 DW로 복사. 영업팀의 무거운 쿼리는 DW에서 돌고, 운영 DB는 가벼운 트랜잭션만 처리. 두 시스템의 부하가 분리된다.',
        block: {
          kind: 'python',
          code: `# Airflow DAG — 야간 ETL: OLTP -> OLAP (DW)
from airflow import DAG
from airflow.operators.python import PythonOperator
from datetime import datetime
import pandas as pd
from sqlalchemy import create_engine

OLTP = create_engine("postgresql://prod-db/shop")        # 운영 DB
OLAP = create_engine("snowflake://dw/analytics")         # 분석 DW

def extract_load(**ctx):
    # 어제 변경된 주문만 뽑아서 (incremental)
    df = pd.read_sql("""
        SELECT order_id, user_id, product_id, amount, created_at
        FROM orders
        WHERE created_at >= CURRENT_DATE - INTERVAL '1 day'
    """, OLTP)
    # 분석에 적합한 형태로 적재 (컬럼 기반 저장, 압축)
    df.to_sql("fact_orders", OLAP, if_exists="append", index=False)

with DAG("daily_etl", schedule="0 2 * * *",                # 매일 새벽 2시
         start_date=datetime(2026, 1, 1), catchup=False) as dag:
    PythonOperator(task_id="orders_etl", python_callable=extract_load)

# 결과
# - 운영 DB: 트랜잭션 처리 (행 단위, 빠른 INSERT/UPDATE)
# - 분석 DW: 집계 쿼리 (열 단위, GROUP BY/SUM 빠름)
# - 두 시스템 부하 분리 -> 운영 응답 지연 사라짐`,
        },
        focus: 'analytics_layer',
      },
      {
        title: 'Step 3. Data Lake — "지하 장기보관소"',
        desc: 'DW는 정제된 데이터만 담는다. 그러나 로그/이미지/JSON 같은 원본은 모두 보관해두고 싶다. 미래에 어떤 분석을 할지 모르니까. S3 + Parquet으로 저렴하게 무한 적재 — 이게 Data Lake. DW로 가공하기 전 raw zone 역할.',
        block: {
          kind: 'yaml',
          code: `# Data Lake 구조 — S3 + Parquet (저렴한 장기 보관)

s3://company-datalake/
  raw/                        # 원본 그대로 (한 번 쓰면 불변)
    orders/
      year=2026/month=05/day=06/
        part-00000.parquet    # 컬럼 압축, 1/10 크기
        part-00001.parquet
    clickstream/
      year=2026/month=05/day=06/
        events.json.gz        # 웹 이벤트 로그 원본
    images/
      year=2026/month=05/
        product_*.jpg         # 비정형 데이터도 OK

  curated/                    # 정제된 데이터 (DW로 가기 전)
    fact_orders/
      year=2026/month=05/
        snapshot.parquet

# 특징
storage_class: STANDARD_IA      # 저렴 (GB당 $0.0125/월)
format: Parquet                 # 컬럼 기반, 분석 친화
partitioning: year/month/day    # 날짜로 분할 -> 쿼리 빠름
schema: on-read                 # 적재 시점 스키마 강제 안 함
retention: forever              # 무한 보관 (raw는 영원히)

# Athena/Trino/Spark로 직접 SQL 가능 -> "쿼리 가능한 백업"`,
        },
        focus: 'archive_layer',
      },
      {
        title: 'Step 4. 3 layer 통합 — "CDC로 흐른다"',
        desc: 'OLTP -> Lake -> DW 흐름을 CDC(Change Data Capture)로 자동화. Debezium이 운영 DB의 binlog를 읽어 Kafka로 보내고, S3에 떨어뜨리고, DW로 적재. 최근에는 Lake와 DW를 합친 Lakehouse(Delta/Iceberg) 추세 — 한 곳에서 운영 외 모두 처리.',
        block: {
          kind: 'shell',
          code: `# 3 layer 통합 흐름

  [ OLTP ]              [ Data Lake ]            [ Data Warehouse ]
  운영 DB    --CDC-->   S3 + Parquet    --ELT-->  Snowflake / BigQuery
  ──────                ────────────              ───────────────────
  PostgreSQL            raw/ (원본)               fact_orders
  MySQL                 curated/ (정제)           dim_users
  ↑                     ↑                         ↑
  결제/주문             과거 전체 (영구)          최근 2년 집계 분석
  실시간 읽기/쓰기      미래 분석 대비            BI 대시보드 / 리포트
  행 단위 (Row)         반정형 OK                 열 단위 (Columnar)
  ms 응답               분~시간 단위 batch        초~분 단위 쿼리


# Debezium CDC — 운영 DB 변경분 실시간 추출
$ docker run debezium/connect ...
  -> binlog 읽기 -> Kafka topic "orders.cdc" -> S3 sink

# 최근 추세: Lakehouse (Delta Lake / Apache Iceberg)
#   Lake의 저장 + DW의 트랜잭션/스키마 -> 한 곳에서 다 처리
#   Databricks / Snowflake Iceberg / AWS Glue

# 데이터 엔지니어의 일
#   OLTP, OLAP, Lake 3 layer 사이의 데이터 파이프라인을 설계/운영
#   배치 ETL (Airflow), 스트리밍 (Kafka/Flink), CDC (Debezium)`,
        },
        focus: 'together',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const LAYERS = [
      { key: 'oltp_layer',      emoji: '🟢', name: 'OLTP',    note: '1층 운영창고 — 즉시 입출고' },
      { key: 'analytics_layer', emoji: '📊', name: 'OLAP',    note: '2층 분석실 — 통계/집계' },
      { key: 'archive_layer',   emoji: '💧', name: 'Lake',    note: '지하 장기보관 — 원본 영구' },
      { key: 'together',        emoji: '🔁', name: '통합',    note: '3 layer가 함께 흐른다' },
    ];

    function LayerCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🏛️ 도서관 3개 층 (Data 3 Layer)</div>
          <div className="grid grid-cols-4 gap-2">
            {LAYERS.map((l) => {
              const isActive = focus === l.key;
              return (
                <div
                  key={l.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-teal-100 border-2 border-teal-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{l.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{l.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1 leading-tight">{l.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Data Engineering이란</h1>
                <p className="text-sm text-slate-500 mt-1">도서관 3개 층 — OLTP 운영 / OLAP 분석 / Lake 저장</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <LayerCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'together' && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 mb-6 text-xs text-teal-900">
                💡 다음(I-1-2)에서는 OLTP vs OLAP 본격 비교 — 편의점 vs 도서관 비유
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
