<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <title>Data Engineering 학습 — I-1-1. Data Engineering이란</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-1-1. Data Engineering이란 — 도서관 3개 층 (OLTP / OLAP / Archive)
    학습 목표: 데이터 시스템의 3 layer 흐름(OLTP → ETL → OLAP → Archive)을 이해
    핵심 비유: 도서관 3개 층 — 1층 운영창고 / 2층 분석실 / 지하 장기보관
    패턴: mlops IV-1-1 패턴 — 좌(LiveDataPane: 3-layer 도서관) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 (3-layer 도서관 시뮬레이션)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. OLTP — "1층 운영창고에서 실시간 거래"',
        desc: '운영 DB(PostgreSQL/MySQL)가 결제·주문·재고를 실시간 처리한다. 행 단위 INSERT/UPDATE 폭주 — 초당 1.2K 건. 응답은 ms 단위, 트랜잭션 단위 정합성이 생명.',
        focus: 'oltp',
        layers: {
          oltp:    { active: true,  rate: '1.2K/s', detail: 'INSERT 폭주' },
          olap:    { active: false, rate: '—',      detail: '비활성' },
          archive: { active: false, rate: '—',      detail: '비활성' },
        },
        flow: { etl: false, cdc: false },
        code: {
          lang: 'shell',
          filename: 'oltp-prod.sh',
          lines: [
            '# 1층 운영창고 — PostgreSQL 운영 DB (실시간 거래)',
            '$ psql -h prod-db -U admin shop',
            '',
            '-- 결제/주문 트랜잭션 (행 단위, ms 응답)',
            'BEGIN;',
            '  INSERT INTO orders (user_id, product_id, amount)',
            '  VALUES (42, 1001, 19900);            -- ~3ms',
            '  UPDATE inventory SET stock = stock - 1',
            '  WHERE product_id = 1001;             -- ~2ms',
            'COMMIT;',
            '',
            '-- 운영 DB 부하 (초당)',
            '#   INSERT/UPDATE  : 1,200 ops/sec',
            '#   p99 latency    : 8ms',
            '#   active conns   : 240',
            '',
            '# 특징',
            '#   - Row-oriented (행 기반) → 단건 읽기/쓰기 빠름',
            '#   - 트랜잭션 ACID → 결제 정합성 보장',
            '#   - 분석 쿼리는 절대 금지 (lock으로 운영 죽음)',
          ],
          highlight: [5, 6, 7, 8, 9, 13, 14],
        },
      },
      {
        title: 'Step 2. OLAP — "2층 분석실에서 통계/집계"',
        desc: '분석 전용 DW(Snowflake/BigQuery/Redshift)를 별도로 둔다. 야간 ETL이 OLTP 변경분을 DW로 복사. 영업팀의 무거운 GROUP BY는 DW에서 — 운영 부하 분리. 열 기반 저장으로 집계 100배 빠름.',
        focus: 'olap',
        layers: {
          oltp:    { active: true,  rate: '1.2K/s', detail: 'INSERT 폭주' },
          olap:    { active: true,  rate: '142 q/m', detail: 'GROUP BY 집계' },
          archive: { active: false, rate: '—',      detail: '비활성' },
        },
        flow: { etl: true, cdc: false },
        code: {
          lang: 'python',
          filename: 'daily_etl.py',
          lines: [
            '# 2층 분석실 — Airflow 야간 ETL (OLTP → OLAP)',
            'from airflow import DAG',
            'from airflow.operators.python import PythonOperator',
            'from datetime import datetime',
            'import pandas as pd',
            'from sqlalchemy import create_engine',
            '',
            'OLTP = create_engine("postgresql://prod-db/shop")',
            'OLAP = create_engine("snowflake://dw/analytics")',
            '',
            'def extract_load(**ctx):',
            '    # 어제 변경분만 추출 (incremental)',
            '    df = pd.read_sql("""',
            '        SELECT order_id, user_id, product_id, amount, created_at',
            '        FROM orders',
            '        WHERE created_at >= CURRENT_DATE - INTERVAL \'1 day\'',
            '    """, OLTP)',
            '    # 분석 친화 형태로 적재 (컬럼 압축)',
            '    df.to_sql("fact_orders", OLAP, if_exists="append", index=False)',
            '',
            'with DAG("daily_etl", schedule="0 2 * * *",      # 매일 새벽 2시',
            '         start_date=datetime(2026, 1, 1)) as dag:',
            '    PythonOperator(task_id="orders_etl", python_callable=extract_load)',
            '',
            '# 결과: 운영 응답 지연 사라짐 / 분석 쿼리 100배 빠름',
          ],
          highlight: [8, 9, 13, 19, 21],
        },
      },
      {
        title: 'Step 3. Archive — "지하 장기보관소 (Data Lake)"',
        desc: 'DW는 정제된 데이터만 담는다. 그러나 로그·이미지·JSON 같은 raw 원본은 모두 보관 — 미래에 어떤 분석을 할지 모르니까. S3 + Parquet으로 GB당 $0.0125/월에 무한 적재. cold storage 영구 보관.',
        focus: 'archive',
        layers: {
          oltp:    { active: true,  rate: '1.2K/s',  detail: 'INSERT 폭주' },
          olap:    { active: true,  rate: '142 q/m', detail: 'GROUP BY 집계' },
          archive: { active: true,  rate: '8.4 TB',  detail: 'cold storage' },
        },
        flow: { etl: true, cdc: false },
        code: {
          lang: 'yaml',
          filename: 'datalake-layout.yaml',
          lines: [
            '# 지하 장기보관소 — S3 + Parquet (저렴한 영구 보관)',
            's3://company-datalake/',
            '  raw/                          # 원본 그대로 (불변)',
            '    orders/',
            '      year=2026/month=05/day=06/',
            '        part-00000.parquet      # 컬럼 압축, 1/10 크기',
            '        part-00001.parquet',
            '    clickstream/',
            '      year=2026/month=05/day=06/',
            '        events.json.gz          # 웹 이벤트 로그 원본',
            '    images/',
            '      year=2026/month=05/',
            '        product_*.jpg           # 비정형 데이터도 OK',
            '',
            '  curated/                      # 정제본 (DW로 가기 전)',
            '    fact_orders/',
            '      year=2026/month=05/',
            '        snapshot.parquet',
            '',
            '# 비용/특징',
            'storage_class: STANDARD_IA      # GB당 $0.0125/월',
            'format: Parquet                 # 컬럼 기반, 분석 친화',
            'partitioning: year/month/day    # 날짜 분할 → 쿼리 빠름',
            'schema: on-read                 # 적재 시 스키마 강제 X',
            'retention: forever              # raw는 영원히 보관',
            '',
            '# Athena/Trino/Spark로 직접 SQL → "쿼리 가능한 백업"',
          ],
          highlight: [3, 6, 21, 22, 23, 25],
        },
      },
      {
        title: 'Step 4. 통합 — "CDC로 3 layer가 함께 흐른다"',
        desc: 'OLTP → Lake → DW 흐름을 CDC(Change Data Capture)로 실시간 자동화. Debezium이 binlog를 읽어 Kafka로 보내고, S3에 떨어뜨리고, DW로 적재. 데이터 엔지니어의 일 = 3 layer 사이의 파이프라인 설계/운영.',
        focus: 'together',
        layers: {
          oltp:    { active: true, rate: '1.2K/s',  detail: 'binlog 스트림' },
          olap:    { active: true, rate: '142 q/m', detail: 'BI 대시보드' },
          archive: { active: true, rate: '8.4 TB',  detail: '영구 보관' },
        },
        flow: { etl: true, cdc: true },
        code: {
          lang: 'shell',
          filename: 'cdc-pipeline.sh',
          lines: [
            '# 3 layer 통합 흐름 — CDC 실시간 파이프라인',
            '',
            '  [ OLTP ]            [ Data Lake ]           [ Data Warehouse ]',
            '  운영 DB   --CDC-->   S3 + Parquet   --ELT-->  Snowflake / BigQuery',
            '  ──────              ────────────              ───────────────────',
            '  PostgreSQL          raw/   (원본)             fact_orders',
            '  MySQL               curated/ (정제)           dim_users',
            '  ms 응답             분~시간 batch             초~분 단위 쿼리',
            '  Row 단위            반정형 OK                 Columnar',
            '',
            '# Debezium CDC — 운영 DB binlog 실시간 추출',
            '$ docker run debezium/connect ...',
            '  → binlog 읽기 → Kafka topic "orders.cdc" → S3 sink',
            '',
            '# 최근 추세: Lakehouse (Delta Lake / Apache Iceberg)',
            '#   Lake의 저장 + DW의 트랜잭션/스키마 → 한 곳에서 처리',
            '#   Databricks / Snowflake Iceberg / AWS Glue',
            '',
            '# 데이터 엔지니어의 일',
            '#   배치 ETL    : Airflow',
            '#   스트리밍   : Kafka / Flink',
            '#   CDC         : Debezium',
            '#   3 layer 사이 파이프라인 설계/운영',
          ],
          highlight: [3, 4, 11, 12, 13, 15, 16],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 3개 레이어 메타 (이름·아이콘·서브타이틀)
    // ─────────────────────────────────────────────────────
    const LAYER_META = [
      { key: 'olap',    floor: '2F',  emoji: '📊', name: 'OLAP (분석실)',     sub: 'Snowflake · BigQuery · Redshift', store: '열 기반 / 집계' },
      { key: 'oltp',    floor: '1F',  emoji: '🟢', name: 'OLTP (운영창고)',   sub: 'PostgreSQL · MySQL',              store: '행 기반 / 트랜잭션' },
      { key: 'archive', floor: 'B1',  emoji: '💧', name: 'Archive (지하)',    sub: 'S3 + Parquet · Data Lake',        store: '원본 / 영구 보관' },
    ];

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 3-layer 도서관
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ layers, flow, focus }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🏛️ 도서관 3개 층 (Data 3 Layer)</h2>
            <span className="text-[10px] text-slate-400 font-mono">3-layer · live</span>
          </div>

          {/* 3개 층 박스 — 위에서 아래로: OLAP → OLTP → Archive (도서관 비유) */}
          <div className="space-y-2">
            {LAYER_META.map((l) => {
              const d = layers[l.key];
              const active = d.active;
              const isFocus = focus === l.key;
              return (
                <div
                  key={l.key}
                  className={`relative rounded-lg border-2 p-3 transition-all duration-500 ${
                    active
                      ? `bg-teal-50 border-teal-400 ${isFocus ? 'ring-2 ring-teal-300 scale-[1.02]' : ''}`
                      : 'bg-slate-50 border-slate-200 opacity-60'
                  }`}
                >
                  <div className="flex items-center gap-3">
                    {/* 층 라벨 */}
                    <div className={`flex-shrink-0 w-12 h-12 rounded-lg flex flex-col items-center justify-center font-bold ${
                      active ? 'bg-teal-600 text-white' : 'bg-slate-300 text-slate-500'
                    }`}>
                      <div className="text-[10px] leading-none">{l.floor}</div>
                      <div className="text-xl leading-none mt-0.5">{l.emoji}</div>
                    </div>

                    {/* 본문 */}
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center justify-between gap-2">
                        <span className={`text-sm font-bold ${active ? 'text-slate-800' : 'text-slate-400'}`}>
                          {l.name}
                        </span>
                        <span className={`text-[10px] font-mono px-1.5 py-0.5 rounded ${
                          active ? 'bg-teal-100 text-teal-700' : 'bg-slate-100 text-slate-400'
                        }`}>
                          {active ? '● active' : '○ idle'}
                        </span>
                      </div>
                      <div className={`text-[11px] mt-0.5 ${active ? 'text-slate-500' : 'text-slate-400'}`}>
                        {l.sub} · {l.store}
                      </div>
                      <div className="flex items-center gap-3 mt-1.5">
                        <div className={`text-xs font-bold tabular-nums ${active ? 'text-teal-700' : 'text-slate-400'}`}>
                          📈 {d.rate}
                        </div>
                        <div className={`text-[10px] ${active ? 'text-slate-600' : 'text-slate-400'}`}>
                          {d.detail}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* ETL / CDC 화살표 흐름 */}
          <div className="mt-4 pt-3 border-t border-slate-100">
            <div className="text-[10px] font-bold text-slate-500 mb-2">데이터 흐름 (Pipeline)</div>
            <div className="flex items-center justify-between gap-2 text-[11px]">
              <div className={`flex-1 text-center px-2 py-1.5 rounded font-mono transition-all ${
                layers.oltp.active ? 'bg-teal-100 text-teal-700 border border-teal-300' : 'bg-slate-100 text-slate-400'
              }`}>
                OLTP
              </div>
              <div className={`text-base transition-all ${flow.etl ? 'text-teal-600' : 'text-slate-300'}`}>
                {flow.cdc ? '⚡' : '→'}
              </div>
              <div className={`flex-1 text-center px-2 py-1.5 rounded font-mono transition-all ${
                flow.etl ? 'bg-teal-100 text-teal-700 border border-teal-300' : 'bg-slate-100 text-slate-400'
              }`}>
                {flow.cdc ? 'CDC' : 'ETL'}
              </div>
              <div className={`text-base transition-all ${flow.etl ? 'text-teal-600' : 'text-slate-300'}`}>→</div>
              <div className={`flex-1 text-center px-2 py-1.5 rounded font-mono transition-all ${
                layers.olap.active ? 'bg-teal-100 text-teal-700 border border-teal-300' : 'bg-slate-100 text-slate-400'
              }`}>
                OLAP
              </div>
              <div className={`text-base transition-all ${layers.archive.active ? 'text-teal-600' : 'text-slate-300'}`}>→</div>
              <div className={`flex-1 text-center px-2 py-1.5 rounded font-mono transition-all ${
                layers.archive.active ? 'bg-teal-100 text-teal-700 border border-teal-300' : 'bg-slate-100 text-slate-400'
              }`}>
                Archive
              </div>
            </div>
            {flow.cdc && (
              <div className="mt-2 text-[10px] text-teal-700 font-mono text-center animate-pulse">
                ⚡ Debezium CDC · binlog → Kafka → S3 → DW (real-time)
              </div>
            )}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-teal-400"></span>활성</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-300"></span>비활성</span>
            <span className="flex items-center gap-1 ml-auto font-mono">→ ETL · ⚡ CDC</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        codeRef.current.removeAttribute('data-highlighted');
        codeRef.current.className = `language-${code.lang}`;
        codeRef.current.textContent = code.lines.join('\n');
        window.hljs.highlightElement(codeRef.current);
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-teal-500/10 border-l-2 border-teal-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-teal-700 hover:text-teal-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. 데이터 시스템 기초 &gt; Chapter 1. Data Engineering 개론</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Data Engineering이란</h1>
                  <p className="text-sm text-slate-500 mt-0.5">도서관 3개 층 — 1F OLTP 운영창고 / 2F OLAP 분석실 / B1 Archive 장기보관</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                layers={step.layers}
                flow={step.flow}
                focus={step.focus}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 text-sm text-teal-900">
                💡 다음(I-1-2)에서는 <strong>OLTP vs OLAP</strong> 본격 비교 — 편의점 vs 도서관 비유
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./I-1-2.html" className="text-teal-700 hover:text-teal-900 font-medium">I-1-2 OLTP vs OLAP &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
