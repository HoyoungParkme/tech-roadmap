<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — ETL vs ELT</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🍳</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-2-1. ETL vs ELT
    학습 목표: 변환 시점 차이 이해 (추출→변환→적재 vs 추출→적재→변환)
    핵심 비유: "미리 다듬기 vs 원본 보관 후 조리" — ETL 서버에서 변환 vs DW 안에서 변환
    구조: 4단계 (ETL / ELT / CDC 인트로 / 선택)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. ETL — 추출 후 미리 변환',
        desc: 'Airflow가 OLTP에서 데이터를 추출 → ETL 서버에서 Python/SQL로 변환 → 깔끔한 결과만 DW에 적재. 변환 비용은 ETL 서버가 부담. DW에는 이미 분석용으로 다듬어진 데이터만 들어감. "재료를 미리 다듬어 깔끔하게 냉장고에 보관".',
        block: {
          kind: 'python',
          code: `# Airflow ETL DAG (전통적 ETL)
from airflow import DAG
from airflow.operators.python import PythonOperator

def extract():
    # 1. OLTP(MySQL)에서 추출
    rows = mysql.query("SELECT * FROM orders WHERE date = yesterday")
    return rows

def transform(rows):
    # 2. ETL 서버에서 Python으로 변환
    cleaned = []
    for r in rows:
        if r["status"] != "cancelled":
            r["amount_krw"] = r["amount"] * 1300   # 환율 변환
            r["region"] = lookup_region(r["zip"])  # 조인/룩업
            cleaned.append(r)
    return cleaned

def load(cleaned):
    # 3. DW(Redshift)에 깔끔한 결과만 적재
    redshift.bulk_insert("fact_orders", cleaned)

# 특징
# - 변환 부하 → ETL 서버 (별도 컴퓨트)
# - DW에는 분석용 정제 데이터만
# - 원본은 DW에 없음 (재변환 시 다시 추출)`,
        },
        focus: 'etl',
      },
      {
        title: 'Step 2. ELT — 원본 적재 후 DW 안에서 변환',
        desc: '원본을 그대로 DW에 적재 → DW의 강력한 컴퓨트로 SQL 변환(dbt). raw 테이블이 그대로 보존되어 다른 변환 재시도 가능. Snowflake/BigQuery처럼 컴퓨트와 스토리지가 분리된 클라우드 DW에서 표준. "원본 재료를 냉장고에 그대로, 조리는 주방에서".',
        block: {
          kind: 'yaml',
          code: `# dbt model (models/marts/fact_orders.sql)
# DW(Snowflake/BigQuery) 안에서 SQL로 변환
{{ config(materialized='table') }}

WITH raw AS (
    SELECT * FROM {{ source('oltp_raw', 'orders') }}   -- 원본 그대로
    WHERE order_date = CURRENT_DATE - 1
),
cleaned AS (
    SELECT
        order_id,
        amount * 1300 AS amount_krw,
        r.region,
        order_date
    FROM raw o
    LEFT JOIN {{ ref('dim_region') }} r ON o.zip = r.zip
    WHERE o.status != 'cancelled'
)
SELECT * FROM cleaned

# 특징
# - 변환 부하 → DW 컴퓨트 (Snowflake warehouse)
# - raw 데이터 보존 → 다른 분석/재변환 가능
# - SQL만으로 변환 (분석가도 dbt로 기여 가능)`,
        },
        focus: 'elt',
      },
      {
        title: 'Step 3. CDC 인트로 — 변경된 분만 캡처',
        desc: 'ETL/ELT 모두 "어제치 전체 추출"이면 데이터 양이 클수록 비효율. CDC(Change Data Capture)는 DB의 변경 로그(binlog)에서 INSERT/UPDATE/DELETE만 캡처 → 실시간/증분 추출. Debezium이 대표. 다음 회차(I-2-2)에서 상세.',
        block: {
          kind: 'yaml',
          code: `# Debezium CDC connector (Kafka Connect)
name: orders-cdc-connector
config:
  connector.class: io.debezium.connector.mysql.MySqlConnector
  database.hostname: mysql.prod
  database.user: debezium
  database.server.id: 184054
  database.include.list: shop_db
  table.include.list: shop_db.orders
  topic.prefix: cdc
  # MySQL binlog를 읽어 Kafka 토픽으로 발행
  # cdc.shop_db.orders 토픽에 행 변경 이벤트 흐름

# 동작
# - INSERT → {op: "c", after: {...}}
# - UPDATE → {op: "u", before: {...}, after: {...}}
# - DELETE → {op: "d", before: {...}}

# 비교
# - 전체 추출(batch): 매일 1억 행 다시 가져옴
# - CDC(증분):       어제 변경된 10만 행만 가져옴
# - → 비용/지연 모두 줄어듦. 실시간 ELT의 입구.`,
        },
        focus: 'cdc_intro',
      },
      {
        title: 'Step 4. 어느 패턴을 선택? — 의사결정 매트릭스',
        desc: '클라우드 DW(Snowflake/BigQuery/Redshift)가 컴퓨트가 강력해진 후 ELT가 사실상 표준. 변환이 매우 복잡하거나 외부 DW 컴퓨트가 약하면 ETL이 유리. 둘 중 하나만이 아니라 단계별로 혼용도 가능. 핵심은 "변환 부하를 어디가 책임지는가".',
        block: {
          kind: 'shell',
          code: `# 선택 매트릭스
+--------------------------+----------+----------+
| 조건                     | ETL 유리 | ELT 유리 |
+--------------------------+----------+----------+
| 클라우드 DW (Snowflake)  |          |    O     |
| 온프레 DW, 컴퓨트 약함   |    O     |          |
| raw 데이터 재활용 필요   |          |    O     |
| 변환 로직이 매우 복잡    |    O     |          |
| 분석가가 SQL로 기여      |          |    O     |
| 데이터 거버넌스 (PII 마스킹 후 DW 진입) | O |  |
| 실시간/증분 추출 필요    |   CDC + ELT (다음 회차) |
+--------------------------+----------+----------+

# 2026 현재 표준 스택
# - Extract: Fivetran / Airbyte / Debezium(CDC)
# - Load:    Snowflake / BigQuery / Redshift
# - Transform (in DW): dbt
# → "ELT + CDC"가 새로운 기본값

# 다음 회차(I-2-2)에서 CDC를 상세히`,
        },
        focus: 'choose',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
    };

    const PATTERNS = [
      { key: 'etl',       emoji: '🔧', name: 'ETL',       note: '미리 변환' },
      { key: 'elt',       emoji: '📦', name: 'ELT',       note: '원본 적재 후 변환' },
      { key: 'cdc_intro', emoji: '🔄', name: 'CDC 인트로', note: '실시간 변경 캡처' },
      { key: 'choose',    emoji: '🎯', name: '선택',      note: '어느 패턴' },
    ];

    function PatternCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🍳 미리 다듬기 vs 원본 후 조리 (ETL vs ELT)</div>
          <div className="grid grid-cols-4 gap-2">
            {PATTERNS.map((p) => {
              const isActive = focus === p.key;
              return (
                <div
                  key={p.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-teal-100 border-2 border-teal-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{p.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{p.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{p.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">ETL vs ELT</h1>
                <p className="text-sm text-slate-500 mt-1">미리 다듬기 vs 원본 보관 후 조리 — 변환 시점의 차이</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <PatternCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'choose' && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 mb-6 text-xs text-teal-900">
                💡 다음(I-2-2)에서는 CDC 상세 — 실시간 복사기
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
