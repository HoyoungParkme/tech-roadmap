<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — I-2-1. ETL vs ELT</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🍳</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-2-1. ETL vs ELT
    학습 목표: 변환 시점의 차이를 흐름도로 이해 — 외부 worker 변환(ETL) vs DW 자체 변환(ELT) vs CDC 실시간 stream
    핵심 비유: 미리 다듬기(ETL) vs 원본 후 조리(ELT)
    패턴: fastapi v1 — 좌(LiveDataPane: 흐름도) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (4단계 — ETL / ELT / CDC / 선택)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. ETL — 추출 후 외부 worker가 변환',
        desc: 'Airflow가 OLTP에서 추출 → ETL 서버(Python/SQL worker)가 변환을 책임 → 깔끔한 결과만 DW에 적재. 변환 부하는 외부 컴퓨트가 부담. DW에는 분석용 정제 데이터만. "재료를 미리 다듬어 냉장고에".',
        flow: 'etl',
        code: {
          lang: 'python',
          filename: 'etl_dag.py',
          lines: [
            '# Airflow ETL DAG — 외부 worker에서 변환',
            'from airflow import DAG',
            'from airflow.operators.python import PythonOperator',
            '',
            'def extract():',
            '    # 1. OLTP(MySQL)에서 추출',
            '    rows = mysql.query("SELECT * FROM orders WHERE date = yesterday")',
            '    return rows',
            '',
            'def transform(rows):',
            '    # 2. ETL 서버(외부 worker)에서 Python으로 변환',
            '    cleaned = []',
            '    for r in rows:',
            '        if r["status"] != "cancelled":',
            '            r["amount_krw"] = r["amount"] * 1300   # 환율 변환',
            '            r["region"] = lookup_region(r["zip"])  # 조인/룩업',
            '            cleaned.append(r)',
            '    return cleaned',
            '',
            'def load(cleaned):',
            '    # 3. DW(Redshift)에 깔끔한 결과만 적재',
            '    redshift.bulk_insert("fact_orders", cleaned)',
            '',
            '# 특징',
            '# - 변환 부하 → ETL 서버 (별도 컴퓨트)',
            '# - DW에는 분석용 정제 데이터만',
            '# - 원본은 DW에 없음 (재변환 시 다시 추출)',
          ],
          highlight: [10, 11, 14, 15, 16],
        },
      },
      {
        title: 'Step 2. ELT — 원본 적재 후 DW 자체 SQL로 변환',
        desc: '원본을 그대로 DW에 적재 → DW 컴퓨트가 SQL(dbt)로 변환. raw 테이블 보존되어 다른 변환 재시도 가능. Snowflake/BigQuery처럼 컴퓨트와 스토리지가 분리된 클라우드 DW에서 표준. "원본을 냉장고에, 조리는 주방에서".',
        flow: 'elt',
        code: {
          lang: 'sql',
          filename: 'fact_orders.sql',
          lines: [
            '-- dbt model: models/marts/fact_orders.sql',
            '-- DW(Snowflake/BigQuery) 안에서 SQL로 변환',
            "{{ config(materialized='table') }}",
            '',
            'WITH raw AS (',
            "    SELECT * FROM {{ source('oltp_raw', 'orders') }}   -- 원본 그대로",
            '    WHERE order_date = CURRENT_DATE - 1',
            '),',
            'cleaned AS (',
            '    SELECT',
            '        order_id,',
            '        amount * 1300 AS amount_krw,',
            '        r.region,',
            '        order_date',
            '    FROM raw o',
            "    LEFT JOIN {{ ref('dim_region') }} r ON o.zip = r.zip",
            "    WHERE o.status != 'cancelled'",
            ')',
            'SELECT * FROM cleaned;',
            '',
            '-- 특징',
            '-- - 변환 부하 → DW 컴퓨트 (Snowflake warehouse)',
            '-- - raw 데이터 보존 → 다른 분석/재변환 가능',
            '-- - SQL만으로 변환 (분석가도 dbt로 기여 가능)',
          ],
          highlight: [5, 6, 9, 10, 11, 12],
        },
      },
      {
        title: 'Step 3. CDC 추가 — 실시간 stream으로 변환 위치 분리',
        desc: '"어제치 전체 추출" 대신 CDC(Change Data Capture)로 binlog의 INSERT/UPDATE/DELETE만 실시간 캡처. Debezium → Kafka → DW raw 테이블. 변환은 ELT 방식으로 DW 안에서 SQL. 실시간 + ELT가 새로운 기본값.',
        flow: 'cdc',
        code: {
          lang: 'yaml',
          filename: 'debezium-connector.yml',
          lines: [
            '# Debezium CDC connector (Kafka Connect)',
            'name: orders-cdc-connector',
            'config:',
            '  connector.class: io.debezium.connector.mysql.MySqlConnector',
            '  database.hostname: mysql.prod',
            '  database.user: debezium',
            '  database.server.id: 184054',
            '  database.include.list: shop_db',
            '  table.include.list: shop_db.orders',
            '  topic.prefix: cdc',
            '  # MySQL binlog → Kafka 토픽 cdc.shop_db.orders',
            '',
            '# 동작 — 실시간 stream',
            '# - INSERT → {op: "c", after: {...}}',
            '# - UPDATE → {op: "u", before: {...}, after: {...}}',
            '# - DELETE → {op: "d", before: {...}}',
            '',
            '# 비교',
            '# - 전체 추출(batch): 매일 1억 행 다시 가져옴',
            '# - CDC(증분):       어제 변경된 10만 행만 가져옴',
            '# - → 비용/지연 모두 줄어듦. 실시간 ELT의 입구.',
            '',
            '# 다음 회차(I-2-2)에서 CDC를 상세히',
          ],
          highlight: [4, 9, 10, 13, 14, 15, 16],
        },
      },
      {
        title: 'Step 4. 어느 패턴을 선택? — 의사결정 표',
        desc: 'volume(데이터 양), 변환 복잡도, 비용 부담 위치, 클라우드 DW 사용 여부에 따라 결정. 클라우드 DW가 컴퓨트가 강력해진 후 ELT가 사실상 표준. 변환이 매우 복잡하거나 PII 마스킹이 DW 진입 전 필요하면 ETL이 유리.',
        flow: 'choose',
        code: {
          lang: 'shell',
          filename: 'decision-matrix.txt',
          lines: [
            '# 의사결정 매트릭스 (4 기준)',
            '+-----------------------------+------------+------------+',
            '| 기준                        |  ETL 유리  |  ELT 유리  |',
            '+-----------------------------+------------+------------+',
            '| Volume (데이터 양)          | 작음~중간  |  중간~대용량 |',
            '| 변환 복잡도                 |  매우 복잡  |  SQL 가능  |',
            '| 비용 부담 위치              | ETL 서버   |  DW 컴퓨트  |',
            '| 클라우드 DW (Snowflake/BQ)  |     -      |     O      |',
            '| raw 데이터 재활용 필요      |     -      |     O      |',
            '| 분석가 SQL 기여             |     -      |     O      |',
            '| PII 마스킹 후 DW 진입       |     O      |     -      |',
            '+-----------------------------+------------+------------+',
            '',
            '# 2026 현재 표준 스택',
            '# - Extract: Fivetran / Airbyte / Debezium(CDC)',
            '# - Load:    Snowflake / BigQuery / Redshift',
            '# - Transform (in DW): dbt',
            '# → "ELT + CDC"가 새로운 기본값',
            '',
            '# 핵심: "변환 부하를 어디가 책임지는가"',
            '# 단계별 혼용도 가능 (ETL + ELT 하이브리드)',
          ],
          highlight: [5, 6, 7, 8, 14, 15, 16, 17],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // LiveDataPane — ETL/ELT/CDC 흐름도
    // ─────────────────────────────────────────────────────

    // 박스 컴포넌트 (Source / Worker / DW)
    function FlowBox({ icon, label, sub, time, color, active, dashed }) {
      const colorMap = {
        slate:  { bg: 'bg-slate-50',  border: 'border-slate-300',  text: 'text-slate-700' },
        teal:   { bg: 'bg-teal-50',   border: 'border-teal-400',   text: 'text-teal-700' },
        amber:  { bg: 'bg-amber-50',  border: 'border-amber-400',  text: 'text-amber-700' },
        sky:    { bg: 'bg-sky-50',    border: 'border-sky-400',    text: 'text-sky-700' },
        rose:   { bg: 'bg-rose-50',   border: 'border-rose-400',   text: 'text-rose-700' },
      };
      const c = colorMap[color] || colorMap.slate;
      return (
        <div className={`rounded-lg border-2 p-2.5 text-center transition-all duration-500 ${c.bg} ${c.border} ${dashed ? 'border-dashed' : ''} ${active ? 'shadow-md scale-105' : ''}`}>
          <div className="text-xl">{icon}</div>
          <div className={`text-[11px] font-bold mt-0.5 ${c.text}`}>{label}</div>
          {sub && <div className="text-[9px] text-slate-500 mt-0.5">{sub}</div>}
          {time && (
            <div className="text-[9px] font-mono mt-1 px-1 py-0.5 rounded bg-white/70 text-slate-600 inline-block">
              {time}
            </div>
          )}
        </div>
      );
    }

    // 화살표 (수평)
    function Arrow({ label }) {
      return (
        <div className="flex flex-col items-center justify-center">
          {label && <div className="text-[9px] text-slate-500 mb-0.5">{label}</div>}
          <div className="text-teal-500 text-xl leading-none">→</div>
        </div>
      );
    }

    // ETL 흐름도
    function FlowETL() {
      return (
        <div>
          <div className="text-[10px] text-slate-500 mb-2 font-mono">변환 위치: 외부 ETL worker</div>
          <div className="grid grid-cols-7 items-center gap-1">
            <FlowBox icon="🗄️" label="Source" sub="OLTP" color="slate" active />
            <Arrow label="extract" />
            <FlowBox icon="⚙️" label="Transform" sub="ETL worker" time="~5min" color="amber" active />
            <Arrow label="load" />
            <FlowBox icon="🏛️" label="DW" sub="정제 데이터만" color="teal" active />
            <div></div>
            <div></div>
          </div>
          <div className="mt-3 p-2 rounded bg-amber-50 border border-amber-200 text-[11px] text-amber-800">
            <strong>변환 부하</strong>: 외부 ETL 서버 (별도 컴퓨트). DW엔 분석용 정제본만 들어감.
          </div>
        </div>
      );
    }

    // ELT 흐름도 (DW 안에 변환 박스)
    function FlowELT() {
      return (
        <div>
          <div className="text-[10px] text-slate-500 mb-2 font-mono">변환 위치: DW 자체 SQL (dbt)</div>
          <div className="grid grid-cols-5 items-center gap-1">
            <FlowBox icon="🗄️" label="Source" sub="OLTP" color="slate" active />
            <Arrow label="load (raw)" />
            {/* DW 박스 안에 raw + transform */}
            <div className="col-span-3 rounded-lg border-2 border-teal-400 bg-teal-50 p-3 transition-all duration-500 shadow-md">
              <div className="text-[11px] font-bold text-teal-800 mb-2 flex items-center gap-1">
                <span>🏛️</span> DW (Snowflake / BigQuery)
              </div>
              <div className="grid grid-cols-3 items-center gap-1">
                <div className="rounded border-2 border-slate-300 bg-white p-2 text-center">
                  <div className="text-base">📦</div>
                  <div className="text-[10px] font-bold text-slate-700">raw</div>
                  <div className="text-[9px] text-slate-500">원본 보존</div>
                </div>
                <Arrow label="dbt SQL" />
                <div className="rounded border-2 border-teal-500 bg-teal-100 p-2 text-center">
                  <div className="text-base">✨</div>
                  <div className="text-[10px] font-bold text-teal-800">marts</div>
                  <div className="text-[9px] text-teal-700">변환 결과</div>
                </div>
              </div>
              <div className="text-[9px] font-mono mt-2 text-center text-teal-700">DW 컴퓨트가 변환 담당</div>
            </div>
          </div>
          <div className="mt-3 p-2 rounded bg-teal-50 border border-teal-200 text-[11px] text-teal-800">
            <strong>변환 부하</strong>: DW 컴퓨트 (Snowflake warehouse). raw 보존 → 재변환 가능.
          </div>
        </div>
      );
    }

    // CDC 흐름도 (실시간 stream → DW raw → DW transform)
    function FlowCDC() {
      return (
        <div>
          <div className="text-[10px] text-slate-500 mb-2 font-mono">CDC stream + ELT (변환 위치 분리)</div>
          <div className="grid grid-cols-7 items-center gap-1">
            <FlowBox icon="🗄️" label="Source" sub="binlog" color="slate" active />
            <Arrow label="CDC" />
            <FlowBox icon="🌊" label="Kafka" sub="실시간 stream" time="<1s" color="rose" active dashed />
            <Arrow label="sink" />
            {/* DW (raw + transform 묶음) */}
            <div className="col-span-3 rounded-lg border-2 border-teal-400 bg-teal-50 p-2 shadow-md">
              <div className="text-[10px] font-bold text-teal-800 mb-1.5 flex items-center gap-1">
                <span>🏛️</span> DW (변환은 SQL)
              </div>
              <div className="grid grid-cols-3 items-center gap-1">
                <div className="rounded border border-slate-300 bg-white p-1.5 text-center">
                  <div className="text-sm">📦</div>
                  <div className="text-[9px] font-bold text-slate-700">raw</div>
                </div>
                <div className="text-teal-500 text-base text-center">→</div>
                <div className="rounded border border-teal-500 bg-teal-100 p-1.5 text-center">
                  <div className="text-sm">✨</div>
                  <div className="text-[9px] font-bold text-teal-800">marts</div>
                </div>
              </div>
            </div>
          </div>
          <div className="mt-3 p-2 rounded bg-rose-50 border border-rose-200 text-[11px] text-rose-800">
            <strong>변환 위치 분리</strong>: 추출은 stream(Kafka), 변환은 DW(SQL). 배치 ELT의 실시간 진화형.
          </div>
        </div>
      );
    }

    // 의사결정 표
    function FlowChoose() {
      const ROWS = [
        { key: 'Volume',    etl: '작음~중간',   elt: '중간~대용량', winner: 'elt' },
        { key: '변환 복잡도', etl: '매우 복잡',   elt: 'SQL 가능',    winner: 'tie'  },
        { key: '비용 부담',  etl: 'ETL 서버',    elt: 'DW 컴퓨트',  winner: 'tie'  },
        { key: '클라우드 DW',etl: '약함 시',     elt: 'Snowflake/BQ', winner: 'elt' },
      ];
      return (
        <div>
          <div className="text-[10px] text-slate-500 mb-2 font-mono">4 기준 의사결정 표</div>
          <div className="rounded-lg border-2 border-slate-300 overflow-hidden">
            <div className="grid grid-cols-3 bg-slate-100 text-[10px] font-bold text-slate-700">
              <div className="px-2 py-1.5 border-r border-slate-300">기준</div>
              <div className="px-2 py-1.5 border-r border-slate-300 text-amber-700">⚙️ ETL</div>
              <div className="px-2 py-1.5 text-teal-700">📦 ELT</div>
            </div>
            {ROWS.map((r) => (
              <div key={r.key} className="grid grid-cols-3 text-[11px] border-t border-slate-200">
                <div className="px-2 py-1.5 font-bold text-slate-700 border-r border-slate-200 bg-slate-50">{r.key}</div>
                <div className={`px-2 py-1.5 border-r border-slate-200 ${r.winner === 'etl' ? 'bg-amber-50 text-amber-800 font-bold' : 'text-slate-600'}`}>
                  {r.etl}
                </div>
                <div className={`px-2 py-1.5 ${r.winner === 'elt' ? 'bg-teal-50 text-teal-800 font-bold' : 'text-slate-600'}`}>
                  {r.elt}
                </div>
              </div>
            ))}
          </div>
          <div className="mt-3 p-2 rounded bg-teal-50 border-2 border-teal-300 text-[11px] text-teal-900">
            <strong>2026 표준</strong>: ELT + CDC. 클라우드 DW + dbt + Debezium 스택이 기본값.
          </div>
        </div>
      );
    }

    function LiveDataPane({ flow }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🍳 ETL vs ELT 흐름도</h2>
            <span className="text-[10px] text-slate-400 font-mono">미리 다듬기 vs 원본 후 조리</span>
          </div>

          <div className="min-h-[260px]">
            {flow === 'etl'    && <FlowETL />}
            {flow === 'elt'    && <FlowELT />}
            {flow === 'cdc'    && <FlowCDC />}
            {flow === 'choose' && <FlowChoose />}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-300"></span>Source</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-amber-400"></span>외부 worker</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-rose-400"></span>CDC stream</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-teal-400"></span>DW (변환)</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        codeRef.current.removeAttribute('data-highlighted');
        codeRef.current.className = `language-${code.lang}`;
        codeRef.current.textContent = code.lines.join('\n');
        window.hljs.highlightElement(codeRef.current);
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-teal-500/10 border-l-2 border-teal-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-teal-700 hover:text-teal-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. 데이터 파이프라인 기초 &gt; Chapter 2. 변환 패턴</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">ETL vs ELT</h1>
                  <p className="text-sm text-slate-500 mt-0.5">미리 다듬기(ETL) vs 원본 후 조리(ELT) — 변환 위치의 차이</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane flow={step.flow} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 text-sm text-teal-900">
                💡 다음(I-2-2)에서는 <strong>CDC</strong> — 실시간 변경 캡처를 상세히 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./I-2-2.html" className="text-teal-700 hover:text-teal-900 font-medium">I-2-2 CDC 상세 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
