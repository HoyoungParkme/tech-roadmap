<body>
  <div id="root"></div>

  <!--
    I-1-2. OLTP vs OLAP — 트랜잭션 vs 분석
    학습 목표: 거래용 DB와 분석용 DB가 왜 분리되는지, row vs column 저장 방식의 차이.
    핵심 비유: "편의점 vs 도서관"
      - 편의점(OLTP): 짧고 잦은 거래. 결제 1건을 ms 단위로 처리.
      - 도서관(OLAP): 많은 데이터를 한 번에 분석. 분기 매출 같은 대량 집계.
    패턴: fastapi v1 — 좌(LiveDataPane: 두 박스 + 비교 표 + HTAP) / 우(VSCode CodeViewer)
    구조: 4단계 (oltp / olap / contrast / hybrid)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        focus: 'oltp',
        title: 'Step 1. OLTP — "편의점" (짧고 잦은 거래)',
        desc: '결제 1건, 회원가입 1건 같은 짧은 트랜잭션을 ms 단위로 처리. row 기반 저장 + 인덱스 + ACID 보장. 동시 사용자 수천 명이 각자 자기 행만 읽고 쓴다. PostgreSQL, MySQL, Oracle 같은 전통 RDBMS가 여기에 해당.',
        oltp: {
          state: 'active',
          tps: '1 건/ms',
          rowSize: '100 B / row',
          indexes: '인덱스 5개 (point lookup)',
          op: 'INSERT / UPDATE',
        },
        olap: {
          state: 'idle',
          scan: '—',
          layout: '—',
          op: '대기',
        },
        showContrast: false,
        showHybrid: false,
        code: {
          lang: 'sql',
          filename: 'oltp_checkout.sql',
          lines: [
            '-- OLTP — 편의점 계산대 한 건의 결제',
            '-- row 기반 + B-tree 인덱스 + ACID',
            '',
            'BEGIN;',
            '  -- 1) 재고 차감 (특정 행 1개)',
            '  UPDATE inventory',
            '     SET qty = qty - 1',
            '   WHERE product_id = 1234;       -- 인덱스로 1개 행 즉시 찾기',
            '',
            '  -- 2) 주문 1건 INSERT',
            '  INSERT INTO orders (user_id, product_id, amount)',
            '       VALUES (42, 1234, 3500);',
            '',
            '  -- 3) 결제 1건 INSERT',
            '  INSERT INTO payments (order_id, status)',
            '       VALUES (lastval(), \'paid\');',
            'COMMIT;',
            '-- 응답 시간: ~5ms · 100 B/row · 인덱스 5개',
            '',
            '-- 특징',
            '--  · row 기반 저장 (한 행 전체를 한 블록에)',
            '--  · B-tree 인덱스로 특정 행 즉시 찾기',
            '--  · ACID — Atomicity / Consistency / Isolation / Durability',
            '--  · 동시 트랜잭션 수천 TPS',
            '',
            '-- 대표 엔진: PostgreSQL · MySQL · Oracle · SQL Server · Aurora',
          ],
          highlight: [4, 6, 11, 15, 17],
        },
      },
      {
        focus: 'olap',
        title: 'Step 2. OLAP — "도서관" (대량 분석)',
        desc: '"지난 분기 카테고리별 매출 합계"처럼 1억 행을 한 번에 스캔/집계. column 기반 저장으로 필요한 컬럼만 읽고, 압축률이 높고, 분산 처리에 최적화. 응답은 초~분 단위지만 거대한 질문에 한 번에 답한다. BigQuery, Snowflake, Redshift, ClickHouse 등.',
        oltp: {
          state: 'idle',
          tps: '—',
          rowSize: '—',
          indexes: '—',
          op: '대기',
        },
        olap: {
          state: 'active',
          scan: '100M rows · 1.2 GB',
          layout: 'columnar (zstd / RLE)',
          op: 'GROUP BY · SUM',
        },
        showContrast: false,
        showHybrid: false,
        code: {
          lang: 'sql',
          filename: 'olap_revenue.sql',
          lines: [
            '-- OLAP — 도서관에서 분기 매출을 한 번에 집계',
            '-- column 기반 + 파티션 + 분산 워커',
            '',
            'SELECT category,',
            '       SUM(amount)             AS revenue,',
            '       COUNT(DISTINCT user_id) AS buyers',
            '  FROM warehouse.orders               -- 1억 행 fact 테이블',
            ' WHERE order_date BETWEEN \'2026-01-01\'',
            '                      AND \'2026-03-31\'',
            ' GROUP BY category',
            ' ORDER BY revenue DESC;',
            '',
            '-- 실행 통계',
            '--   scanned_rows  : 100,000,000',
            '--   scanned_bytes : 1.2 GB        (column 압축 덕에 작음)',
            '--   duration      : 3.4 s         (초 단위 OK)',
            '--   workers       : 32            (분산 스캔)',
            '',
            '-- 저장 레이아웃',
            '--   layout       : columnar    (category · amount · user_id 컬럼별)',
            '--   compression  : zstd / dict / RLE',
            '--   partition    : order_date 일자별',
            '--   cluster_by   : (category)',
            '',
            '-- 설계 원칙',
            '--   · row 단위 갱신 X — append / batch load 위주',
            '--   · 인덱스 대신 partition + clustering',
            '--   · latency보다 throughput 우선',
            '--   · 많은 row 스캔 → 적은 row 반환 (집계)',
            '',
            '-- 대표 엔진: BigQuery · Snowflake · Redshift · ClickHouse · Databricks',
          ],
          highlight: [4, 5, 6, 7, 14, 15, 20],
        },
      },
      {
        focus: 'contrast',
        title: 'Step 3. Contrast — 4 차원 비교',
        desc: '같은 SQL이 돌아가도 내부 저장/실행 모델이 완전히 다르다. latency / volume / 인덱스 / 동시성 4 차원에서 정반대 설계. OLTP에 분석 쿼리를 돌리면 락 경합, OLAP에 1건 update를 자주 하면 비효율 — 그래서 분리하고 ETL/ELT로 데이터를 옮긴다.',
        oltp: {
          state: 'compare',
          tps: '1 건/ms · 5 ms 응답',
          rowSize: '100 B / row · 수GB~TB',
          indexes: 'B-tree 5개',
          op: 'INSERT / UPDATE',
        },
        olap: {
          state: 'compare',
          scan: '100M rows · 3.4 s',
          layout: 'columnar · TB~PB',
          op: 'SELECT 집계',
        },
        showContrast: true,
        showHybrid: false,
        code: {
          lang: 'sql',
          filename: 'contrast.sql',
          lines: [
            '-- 같은 SQL, 완전히 다른 워크로드',
            '',
            '-- ① OLTP 쿼리 (편의점)',
            'SELECT * FROM orders WHERE id = 42;          -- 1행 · 인덱스 · 0.3 ms',
            '',
            '-- ② OLAP 쿼리 (도서관)',
            'SELECT category, SUM(amount)                  -- 1억 행 스캔',
            '  FROM warehouse.orders                       -- columnar · 3.4 s',
            ' WHERE order_date >= \'2026-01-01\'',
            ' GROUP BY category;',
            '',
            '-- 4 차원 비교',
            '--   ┌─────────────┬───────────────────┬──────────────────────┐',
            '--   │ 차원        │ OLTP (편의점)     │ OLAP (도서관)        │',
            '--   ├─────────────┼───────────────────┼──────────────────────┤',
            '--   │ latency     │ ms (≤5)           │ s ~ min              │',
            '--   │ volume/쿼리 │ 1 ~ 수십 행       │ 100M ~ 10B 행        │',
            '--   │ 인덱스      │ B-tree · hash     │ partition · cluster  │',
            '--   │ 동시성      │ 수천 TPS          │ 동시 쿼리 수십       │',
            '--   └─────────────┴───────────────────┴──────────────────────┘',
            '',
            '-- 왜 분리하나?',
            '--   1) 분석 쿼리 = 거대한 스캔 → OLTP에서 락 경합',
            '--   2) row ↔ column 저장은 서로의 워크로드에 비효율',
            '--   3) 비용 모델이 다름 (IOPS vs scan-byte)',
            '--   → ETL/ELT로 OLTP → OLAP로 주기적으로 흘려보낸다',
          ],
          highlight: [3, 4, 6, 7, 8, 9, 10],
        },
      },
      {
        focus: 'hybrid',
        title: 'Step 4. Hybrid (HTAP) — 한 시스템에서 둘 다',
        desc: 'Hybrid Transactional/Analytical Processing. 분리에 따른 운영 복잡도(데이터 동기화 지연, 두 벌의 스키마)를 줄이는 시도. row 저장 + column replica를 한 엔진에서 같이 운영. TiDB(TiKV+TiFlash), Snowflake Hybrid Tables, SingleStore, SAP HANA. 만능은 아니고 PB급 분석은 여전히 전용 DW가 우세.',
        oltp: {
          state: 'merged',
          tps: '1 건/ms (TiKV row)',
          rowSize: '100 B / row',
          indexes: 'B-tree',
          op: 'INSERT / UPDATE',
        },
        olap: {
          state: 'merged',
          scan: '100M rows (TiFlash col)',
          layout: 'columnar replica',
          op: 'GROUP BY · SUM',
        },
        showContrast: false,
        showHybrid: true,
        code: {
          lang: 'python',
          filename: 'htap_routing.py',
          lines: [
            '"""HTAP 예시 — TiDB (TiKV: row store + TiFlash: column store).',
            '',
            '한 SQL을 옵티마이저가 자동으로 적절한 엔진에 라우팅한다.',
            'OLTP/OLAP를 하나의 시스템에서 운영 — 별도 ETL 없음.',
            '"""',
            '',
            '# 1) 트랜잭션 — TiKV(row)로 라우팅',
            'def place_order(user_id: int, product_id: int, amount: int) -> None:',
            '    """결제 1건 — ms 단위, 강한 일관성."""',
            '    with tidb.transaction() as tx:',
            '        tx.execute(',
            '            "UPDATE inventory SET qty = qty - 1 WHERE product_id = %s",',
            '            (product_id,),',
            '        )',
            '        tx.execute(',
            '            "INSERT INTO orders (user_id, product_id, amount) "',
            '            "VALUES (%s, %s, %s)",',
            '            (user_id, product_id, amount),',
            '        )',
            '    # → TiKV(row)에서 처리, 일반 OLTP처럼 동작',
            '',
            '# 2) 분석 — TiFlash(column)로 자동 라우팅',
            'def quarterly_revenue() -> list[dict]:',
            '    """분기 매출 집계 — 옵티마이저가 TiFlash 선택."""',
            '    return tidb.query("""',
            '        SELECT category, SUM(amount) AS rev',
            '          FROM orders',
            '         WHERE order_date BETWEEN \'2026-01-01\' AND \'2026-03-31\'',
            '         GROUP BY category',
            '    """)',
            '    # → TiFlash(column replica)에서 스캔, 별도 ETL 없음',
            '',
            '# 트레이드오프',
            '#   장점: 데이터 동기화 지연 없음 (replica가 준실시간)',
            '#   단점: 운영 복잡 · PB급 분석은 전용 DW(BigQuery/Snowflake)가 더 강함',
            '#   적합: 수TB 규모 + 실시간 대시보드가 중요한 워크로드',
            '',
            '# 다른 HTAP 엔진',
            '#   CockroachDB · SingleStore (구 MemSQL) · SAP HANA · YugabyteDB',
          ],
          highlight: [8, 19, 22, 31],
        },

    // ─────────────────────────────────────────────────────

    const BOX_STYLE = {
      idle:    { card: 'bg-slate-100 border-slate-300', label: 'text-slate-400', value: 'text-slate-400', badge: 'bg-slate-200 text-slate-500', badgeText: '대기' },

      compare: { card: 'bg-cyan-50 border-cyan-400', label: 'text-cyan-700', value: 'text-cyan-800', badge: 'bg-cyan-200 text-cyan-800', badgeText: '비교' },

      { dim: 'latency',  oltp: 'ms (≤5)',         olap: 's ~ min' },
      { dim: 'volume',   oltp: '1 ~ 수십 행',     olap: '100M ~ 10B 행' },
      { dim: '인덱스',   oltp: 'B-tree · hash',   olap: 'partition · cluster' },
      { dim: '동시성',   oltp: '수천 TPS',        olap: '동시 쿼리 수십' },

    // ─────────────────────────────────────────────────────
    // LiveDataPane — OLTP vs OLAP 두 박스 + 4차원 비교 + HTAP
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const oltpStyle = BOX_STYLE[step.oltp.state];
      const olapStyle = BOX_STYLE[step.olap.state];

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🏪 편의점 vs 📚 도서관</h2>

                </div>
              </div>

              {/* row 시각화 */}

                <div className="text-[9px] text-slate-400 mb-1">row 기반 저장</div>
                <div className="flex flex-col gap-0.5">
                  {[0, 1, 2].map((i) => (
                    <div key={i} className="flex gap-0.5">
                      {[0, 1, 2, 3].map((j) => (
                        <div key={j} className={`h-1.5 flex-1 rounded-sm ${step.oltp.state === 'active' || step.oltp.state === 'merged' ? 'bg-teal-300' : 'bg-slate-200'}`} />
                      ))}
                    </div>
                  ))}

              </div>
            </div>

                <div className="flex items-center gap-1.5">
                  <span aria-hidden="true">📚</span>
                  <span className={`text-xs font-bold ${olapStyle.label}`}>OLAP — 도서관</span>

              </div>

              <div className="space-y-1.5 text-[11px]">
                <div className="flex justify-between gap-2">
                  <span className="text-slate-500">스캔량</span>
                  <span className={`font-mono font-bold ${olapStyle.value}`}>{step.olap.scan}</span>
                </div>
                <div className="flex justify-between gap-2">
                  <span className="text-slate-500">레이아웃</span>
                  <span className={`font-mono font-bold ${olapStyle.value}`}>{step.olap.layout}</span>

                <div className="flex justify-between gap-2">

            <div className="mt-4 p-3 rounded-lg bg-emerald-50 border-2 border-emerald-400">
              <div className="flex items-center gap-2 text-emerald-800 font-bold text-sm mb-2">
                <span className="text-lg">🔁</span>
                <span>HTAP — TiDB / Snowflake Hybrid</span>
              </div>
              <div className="grid grid-cols-3 items-center gap-2 text-[11px]">
                <div className="text-center bg-white rounded p-2 border border-emerald-300">
                  <div className="text-[10px] text-slate-500">TiKV (row)</div>
                  <div className="font-mono font-bold text-teal-700 mt-0.5">🏪 OLTP</div>
                </div>
                <div className="text-center text-2xl text-emerald-600 font-bold">⇄</div>
                <div className="text-center bg-white rounded p-2 border border-emerald-300">
                  <div className="text-[10px] text-slate-500">TiFlash (col)</div>
                  <div className="font-mono font-bold text-cyan-700 mt-0.5">📚 OLAP</div>
                </div>
              </div>
              <div className="text-[10px] text-emerald-700 mt-2 font-mono leading-snug">
                옵티마이저가 SQL을 자동 라우팅 · column replica 준실시간 동기화 · 별도 ETL 없음
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-300"></span>대기</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-teal-400"></span>OLTP 활성</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-cyan-400"></span>OLAP 활성</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-400"></span>HTAP 통합</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        codeRef.current.removeAttribute('data-highlighted');
        codeRef.current.className = `language-${code.lang}`;
        codeRef.current.textContent = code.lines.join('\n');
        window.hljs.highlightElement(codeRef.current);
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-teal-500/10 border-l-2 border-teal-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-teal-700 hover:text-teal-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. 데이터 시스템 기초 &gt; Chapter 1. OLTP vs OLAP</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">OLTP vs OLAP — 트랜잭션 vs 분석</h1>
                  <p className="text-sm text-slate-500 mt-0.5">편의점(짧고 잦은 거래) vs 도서관(대량 분석) — row vs column 저장의 정반대 설계</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 text-sm text-teal-900">
                💡 다음(I-2-1)에서는 <strong>ETL vs ELT</strong>
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; I-1-1</a>
              <a href="./I-2-1.html" className="text-teal-700 hover:text-teal-900 font-medium">I-2-1 ETL vs ELT &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
