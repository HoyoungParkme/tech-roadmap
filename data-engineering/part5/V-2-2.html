<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — 실전 체크리스트</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    V-2-2. 실전 체크리스트 (Data Engineering 학습 자료의 마지막)
    학습 목표: 실무 도입 시 4 축 (Storage / Pipeline / Quality / Governance) 점검표
    핵심 비유: "DE 출항 점검표" — 4 축을 출항 전 손가락으로 짚으며 확인
    구조: 4단계 (Storage / Pipeline / Quality / Governance)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Storage — "데이터 창고가 튼튼하고 분리되어 있는가" (DW + Lake + Lakehouse)',
        desc: 'OLTP / DW / Lake 3 layer 분리 + 파티셔닝 / retention 정책 + Lakehouse(Delta/Iceberg) 마이그 전략. 어떤 데이터를 어디에 얼마나 보관하는가에 대한 판단이 분명해야 한다. Part I + Part II 의 회수.',
        block: {
          kind: 'shell',
          code: `# Storage 체크리스트 (Part I + Part II)
# ───────────────────────────────────────────────
# Data Warehouse (DW)
# [ ] Snowflake / BigQuery / Redshift 중 하나 운영 중
# [ ] DW 쿼리 SLA 정의 (예: BI 대시보드 p95 < 10s)
# [ ] 컬럼 기반 저장 + 압축 활용 (Parquet / 내장 포맷)
# [ ] 비용 모니터링 (slot / credit 사용량 일일 리포트)
#
# Data Lake
# [ ] S3 / GCS / ADLS 중 하나에 raw / curated 분리
# [ ] 파티셔닝 표준 (year=/month=/day= 같은 Hive 스타일)
# [ ] storage class 정책 (hot=STANDARD, cold=GLACIER)
# [ ] retention: raw 영구 / curated 2~5 년 등 명시
#
# Lakehouse 마이그레이션
# [ ] Delta Lake / Iceberg / Hudi 도입 여부 결정
# [ ] ACID 트랜잭션 / time travel 활용 시나리오 정리
# [ ] DW <-> Lakehouse 이중 운영 시 SSOT 정의
# [ ] 스키마 진화 정책 (add column / type change 규칙)

# 합격선
# - 12 항목 중 9 개 이상 OK
# - 미충족은 risk register 기록 + 분기 내 보강`,
        },
        focus: 'storage',
      },
      {
        title: 'Step 2. Pipeline — "데이터가 안정적으로 흐르는가" (Airflow + dbt + Kafka)',
        desc: 'Airflow DAG 멱등성 + dbt test 커버리지 + Kafka exactly-once 3 축. 배치든 스트리밍이든 "다시 돌려도 같은 결과"가 나와야 운영이 가능하다. Part III + Part IV 의 회수.',
        block: {
          kind: 'shell',
          code: `# Pipeline 체크리스트 (Part III + Part IV)
# ───────────────────────────────────────────────
# Airflow (Batch ETL)
# [ ] 모든 DAG 가 idempotent (재실행 시 결과 동일)
# [ ] execution_date / data_interval 기반 incremental 처리
# [ ] DAG 의 SLA + on_failure_callback 알람 표준
# [ ] backfill 절차 문서화 + 분기마다 모의 실행
#
# dbt (Transformation)
# [ ] dbt 모델 커버리지 80% 이상에 schema test 적용
# [ ] not_null / unique / accepted_values / relationships 기본 4종
# [ ] dbt docs 자동 배포 + lineage 그래프 공유
# [ ] staging / mart 레이어 분리 + naming 규칙 표준
#
# Kafka (Streaming)
# [ ] producer idempotence + transactional writes 활성화
# [ ] consumer exactly-once (Flink / Kafka Streams) 검증
# [ ] schema registry (Avro / Protobuf) 강제 사용
# [ ] DLQ (dead-letter queue) + 재처리 절차 운영
#
# 자주 빠뜨리는 항목
# [ ] DAG / job 실행 시간 / 비용 모니터링 (월별 추적)
# [ ] partition pruning 적용 여부 점검 (full scan 금지)
# [ ] downstream 의존성 끊김 알람 (data freshness lag)
# [ ] Airflow / dbt / Kafka 코드 git 버전 관리 + PR 리뷰

# 합격선
# - 12 항목 중 10 개 이상 OK
# - "재실행해도 같은 결과" 분기마다 모의 검증`,
        },
        focus: 'pipeline',
      },
      {
        title: 'Step 3. Quality — "데이터가 신뢰할 수 있는가" (Great Expectations + SLA)',
        desc: 'Great Expectations 룰 100% 커버 + SLA 자동 알람 + freshness 모니터링 3 축. "이 숫자 믿어도 됩니까" 라는 비즈니스 질문에 자동화된 답이 있어야 한다. Part IV + Part V 의 회수.',
        block: {
          kind: 'shell',
          code: `# Quality 체크리스트 (Part IV + Part V)
# ───────────────────────────────────────────────
# Great Expectations (또는 dbt test / Soda)
# [ ] 모든 critical 테이블에 expectation suite 100% 적용
# [ ] not_null / unique / range / regex / distribution 5 종 기본
# [ ] CI 단계에서 expectation 자동 실행 (실패 시 배포 차단)
# [ ] data docs HTML 자동 배포 + 팀원 모두 접근 가능
#
# SLA / Freshness
# [ ] 모든 production 테이블에 freshness SLA 명시 (예: 24h)
# [ ] freshness lag > SLA 시 자동 알람 (Slack / PagerDuty)
# [ ] row count anomaly (Z-score / MAD) 자동 감지
# [ ] schema drift 감지 (컬럼 추가/삭제/타입 변경 알람)
#
# 운영 / 회복
# [ ] DQ 실패 시 downstream 자동 차단 (circuit breaker)
# [ ] DQ incident 발생 -> 5분 내 owner 호출 가능
# [ ] 분기마다 DQ 리뷰 미팅 (탑 5 위반 룰 점검)
# [ ] DQ 메트릭 SLO 화 (예: 99% 통과율)
#
# 자주 빠뜨리는 항목
# [ ] 테스트가 production 데이터로도 돌고 있는가
# [ ] 빈 테이블 / 0 row 도 알람 대상에 포함했는가
# [ ] reference data (코드 테이블) 동기화 점검
# [ ] PII 컬럼은 별도 strict rule (마스킹 검증)

# 합격선
# - 12 항목 중 10 개 이상 OK
# - "이 숫자 신뢰 가능한가" 5 분 내 답변 가능`,
        },
        focus: 'quality',
      },
      {
        title: 'Step 4. Governance — "누가 무엇을 왜 책임지는가" (Catalog + Lineage + Privacy)',
        desc: 'Data Catalog 100% 등록 + end-to-end lineage + GDPR / retention policy 3 축. 데이터 자산이 자동 발견 / 추적 / 규제 대응 가능해야 조직 신뢰가 쌓인다. Part V 의 회수 — 16 번째 학습 자료 마무리 🎉.',
        block: {
          kind: 'shell',
          code: `# Governance 체크리스트 (Part V)
# ───────────────────────────────────────────────
# Data Catalog
# [ ] DataHub / Amundsen / Atlas 중 하나 운영 중
# [ ] production 테이블 100% 자동 등록 (ingest job)
# [ ] 테이블 owner / steward / SLA 메타 필수 입력
# [ ] business glossary 정의 + 검색 가능
#
# Lineage
# [ ] source -> raw -> staging -> mart -> BI end-to-end 추적
# [ ] column-level lineage 활용 가능 (어떤 컬럼이 어디서)
# [ ] dbt / Airflow / Spark 자동 lineage 수집 통합
# [ ] "이 지표가 왜 이 값인가" 5 분 내 추적 가능
#
# Privacy / 규제
# [ ] PII / 민감 정보 컬럼 자동 분류 + 태깅
# [ ] GDPR 삭제 요청 (right to be forgotten) 자동화
# [ ] 마스킹 / 익명화 정책 코드화 + CI 검증
# [ ] 접근 로그 (audit log) write-once + 1 년 이상 보존
#
# Retention / 라이프사이클
# [ ] 모든 데이터셋에 retention policy (보관 기간) 명시
# [ ] 자동 archive / delete job 운영 + 분기 리뷰
# [ ] cost 모니터링: 테이블별 storage / query 비용 가시화
# [ ] decommission 절차 표준 (테이블 폐기 워크플로우)

# 합격선
# - 12 항목 중 10 개 이상 OK
# - 외부 감사 시 30 분 안에 모든 답변 제공 가능

# ───────────────────────────────────────────────
# Data Engineering 20 / 20 — 16 번째 학습 자료 완성 🎉
# Part I (4) + Part II (4) + Part III (4) + Part IV (4) + Part V (4) = 20
# 개론 / DW / DL·Lakehouse / 통합·Streaming / 거버넌스
# graphrag / k8s / mlops / observability 에 이어 100% 완성 — 학습 자료 누적 5 개
# ───────────────────────────────────────────────`,
        },
        focus: 'governance',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const CHECKLIST_AXES = [
      { key: 'storage',    emoji: '💾', name: 'Storage',    note: 'DW + Lake + Lakehouse' },
      { key: 'pipeline',   emoji: '🔄', name: 'Pipeline',   note: 'Airflow + dbt + Kafka' },
      { key: 'quality',    emoji: '✅', name: 'Quality',    note: 'GE + SLA + Fresh' },
      { key: 'governance', emoji: '📜', name: 'Governance', note: 'Catalog + Lineage' },
    ];

    function ChecklistCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🚢 DE 출항 점검표 (Data Engineering 4축)</div>
          <div className="grid grid-cols-4 gap-2">
            {CHECKLIST_AXES.map((c) => {
              const isActive = focus === c.key;
              return (
                <div
                  key={c.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-teal-100 border-2 border-teal-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{c.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{c.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{c.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">실전 체크리스트</h1>
                <p className="text-sm text-slate-500 mt-1">DE 출항 점검표 — Storage / Pipeline / Quality / Governance</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <ChecklistCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'governance' && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 mb-6 text-xs text-teal-900">
                💡 DE 학습 완료. 5번째 100% 완성 자료. graphrag/k8s/mlops/observability 다음
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
