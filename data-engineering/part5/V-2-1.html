            '',

            '',
            'def scrub(text: str) -> str:',
            '    """PII 스캔 후 정책에 따라 변환한다."""',
            '    results = analyzer.analyze(text=text, language="ko")',
            '    return anonymizer.anonymize(text=text, analyzer_results=results).text',
            '',
            '# CI 검증: production schema 의 PII 컬럼은 strict rule',
            '# 접근 로그 audit (누가 / 언제 / 어떤 컬럼 조회) → 1년 보존',

        },
      },
      {
        title: 'Step 3. Consent — "본 사람 명단" (consent_db + tag based filter)',

        code: {
          lang: 'python',
          filename: 'gdpr_erase.py',
          lines: [
            '# GDPR right to erasure — cascade pipeline',
            '# soft delete → 30일 grace → hard delete (DW + Lake + 백업)',
            'from datetime import datetime, timedelta',
            '',
            'def erase_request(user_id: str) -> dict:',
            '    """사용자 삭제 요청을 접수하고 cascade 작업을 큐잉한다."""',
            '    now = datetime.utcnow()',
            '    # 1) soft delete 즉시 (analytics 노출 차단)',
            '    db.execute(',
            '        "UPDATE users SET deleted_at = %s WHERE id = %s",',
            '        (now, user_id),',
            '    )',
            '    # 2) lineage 로 downstream 자동 탐지',

    // ─────────────────────────────────────────────────────
    // Privacy 4축 카드 메타

    const PRIVACY_AXES = [

    // ─────────────────────────────────────────────────────

    function LineageTree() {

              <div className="text-xs font-mono text-teal-900">raw.users.tier</div>

    // ─────────────────────────────────────────────────────

    const PII_USERS = [

    // ─────────────────────────────────────────────────────
    // Step 4. Right to Erase — soft → cascade → hard
    // ─────────────────────────────────────────────────────
    function EraseFlow() {
      const targets = [
        { sys: 'OLTP',      table: 'users',                 status: 'soft',    note: 'deleted_at = now()' },
        { sys: 'DW (mart)', table: 'mart.fct_orders',       status: 'queued',  note: 'lineage 자동 탐지' },
        { sys: 'DW (stg)',  table: 'stg.user_behavior',     status: 'queued',  note: 'cascade' },
        { sys: 'Lake',      table: 's3://raw/users/*',      status: 'queued',  note: 'parquet rewrite' },
        { sys: 'Backup',    table: 'glacier://users-2026-04', status: 'queued', note: 'marker file' },
      ];
      const STATUS_STYLE = {
        soft:   { color: 'bg-yellow-200 text-yellow-800', label: '⏳ soft delete' },
        queued: { color: 'bg-cyan-200 text-cyan-800',     label: '🗓 30일 대기' },
        hard:   { color: 'bg-red-300 text-red-900',       label: '🗑 hard delete' },
      };
      return (
        <div className="space-y-3">
          {/* 요청 박스 */}
          <div className="rounded-lg border-2 border-red-400 bg-red-50 p-3">
            <div className="text-[10px] font-bold text-red-700 mb-1">📨 GDPR Art.17 요청 접수</div>
            <div className="text-xs font-mono text-red-900">
              user_id = u_42 · "내 모든 기록을 삭제해 주세요"
            </div>
            <div className="text-[10px] text-red-700 mt-1">접수 시각 2026-05-07 14:23 UTC</div>
          </div>

          <div className="text-center text-teal-500 text-lg">↓ lineage_api.descendants() 자동 탐지</div>

          {/* cascade 표 */}
          <div className="rounded-lg border border-slate-300 bg-white p-2">
            <div className="text-[10px] font-bold text-slate-700 mb-1.5">cascade 대상 ({targets.length} 시스템)</div>
            <table className="w-full text-[10px]">
              <thead>
                <tr className="text-slate-600">
                  <th className="text-left pb-1">system</th>
                  <th className="text-left pb-1">target</th>
                  <th className="text-left pb-1">status</th>
                </tr>
              </thead>
              <tbody>
                {targets.map((t, i) => {
                  const s = STATUS_STYLE[t.status];
                  return (
                    <tr key={i} className="border-t border-slate-200">
                      <td className="py-1 font-bold text-slate-700">{t.sys}</td>
                      <td className="py-1 font-mono text-slate-600">{t.table}</td>
                      <td className="py-1">
                        <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${s.color}`}>{s.label}</span>
                        <div className="text-[9px] text-slate-400">{t.note}</div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* timeline */}
          <div className="rounded-lg border-2 border-teal-400 bg-teal-50 p-3">
            <div className="text-[10px] font-bold text-teal-700 mb-2">⏱ 30일 grace period</div>
            <div className="flex items-center gap-1 text-[10px] font-mono">
              <span className="px-2 py-1 rounded bg-yellow-300 text-yellow-900">D+0 soft</span>
              <span className="flex-1 h-1 bg-gradient-to-r from-yellow-300 via-cyan-300 to-red-400 rounded"></span>
              <span className="px-2 py-1 rounded bg-red-400 text-white">D+30 hard</span>
            </div>
            <div className="text-[10px] text-teal-800 mt-2">
              ✅ 완료 후 사용자에게 confirmation email · audit_log 영구 보존 (메타데이터만)
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // PrivacyCards — 4축 active 표시
    // ─────────────────────────────────────────────────────
    function PrivacyCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-3">
          <div className="text-[11px] font-bold text-slate-700 mb-2">🧬 족보 + 비밀번호 (Lineage & Privacy)</div>
          <div className="grid grid-cols-4 gap-2">
            {PRIVACY_AXES.map((c) => {
              const isActive = focus === c.key;
              return (
                <div
                  key={c.key}
                  className={`rounded-lg p-2 text-center transition-all ${isActive ? 'bg-teal-100 border-2 border-teal-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-xl">{c.emoji}</div>
                  <div className="text-[11px] font-bold text-slate-800 mt-0.5">{c.name}</div>
                  <div className="text-[9px] text-slate-500">{c.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 단계별 시각화 분기
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ focus }) {
      const TITLES = {
        lineage:        { icon: '🧬', name: 'Lineage Tree — column-level' },
        pii:            { icon: '🔒', name: 'PII Masking — Presidio + Faker' },
        consent:        { icon: '📝', name: 'Consent Filter — opt-in / opt-out' },
        right_to_erase: { icon: '🗑️', name: 'Right to Erase — cascade pipeline' },
      };
      const t = TITLES[focus];
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">{t.icon} {t.name}</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>
          {focus === 'lineage'        && <LineageTree />}
          {focus === 'pii'            && <PiiTable />}
          {focus === 'consent'        && <ConsentTable />}
          {focus === 'right_to_erase' && <EraseFlow />}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-teal-500/15 border-l-2 border-teal-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-teal-700 hover:text-teal-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Governance &amp; 출항 &gt; Chapter 2. Lineage &amp; Privacy</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Lineage &amp; Privacy</h1>
                  <p className="text-sm text-slate-500 mt-0.5">족보 + 비밀번호 — column-level 추적 + GDPR 4축 (Lineage / PII / Consent / Right to Erase)</p>
                </div>
              </div>
            </header>

            {/* 4축 카드 */}
            <PrivacyCards focus={step.focus} />

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane focus={step.focus} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 text-sm text-teal-900">
                💡 다음(V-2-2)에서는 실전 체크리스트
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생 (3s)')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            <p className="text-center text-[11px] text-slate-400">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
