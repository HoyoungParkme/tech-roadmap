<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — 데이터 품질 (Great Expectations)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    V-1-2. 데이터 품질 (Great Expectations)
    학습 목표: GE 로 expectation 정의 → validation → data docs → CI 게이트 4단계 흐름 이해
    핵심 비유: "식품 검사" — 데이터셋에 not null / 값 범위 등 expect 를 걸어 출하 전 검수
    구조: 4단계 (Expectation / Validation / Data Docs / CI)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Expectation — "검사 룰 정의" (not null / unique / range)',
        desc: 'Great Expectations 의 핵심은 expectation suite. 컬럼별로 "이 값은 not null", "0~100 범위", "unique" 같은 검사 룰을 코드로 선언한다. 식품 검사 기준표를 만들어 두는 것과 같다 — 한 번 정의하면 같은 룰을 재사용해 매일 같은 검수를 자동 반복.',
        block: {
          kind: 'python',
          code: `# pip install great-expectations
# - expectation suite 정의: 컬럼별 검사 룰
import great_expectations as gx

context = gx.get_context()
suite = context.add_or_update_expectation_suite("orders_suite")

# - not null: order_id 는 절대 비면 안 됨
suite.add_expectation(
    gx.expectations.ExpectColumnValuesToNotBeNull(column="order_id"),
)

# - unique: order_id 는 중복 금지
suite.add_expectation(
    gx.expectations.ExpectColumnValuesToBeUnique(column="order_id"),
)

# - range: amount 는 0 ~ 1,000,000 사이
suite.add_expectation(
    gx.expectations.ExpectColumnValuesToBeBetween(
        column="amount", min_value=0, max_value=1_000_000,
    ),
)

# - accepted values: status 는 정해진 값만
suite.add_expectation(
    gx.expectations.ExpectColumnValuesToBeInSet(
        column="status",
        value_set=["pending", "paid", "shipped", "cancelled"],
    ),
)

context.save_expectation_suite(suite)
# → JSON 으로 저장 (git 으로 버전 관리 가능)`,
        },
        focus: 'expectation',
      },
      {
        title: 'Step 2. Validation — "데이터에 룰 적용 + 결과" (validator.validate)',
        desc: '정의한 suite 를 실제 데이터셋에 적용하면 validation result 가 나온다. 합격 / 불합격 통계, 위반 row 샘플, 컬럼별 통과율까지 자동 산출. 식품 한 박스를 검사대 위에 올려 룰대로 통과 여부를 찍어내는 단계다.',
        block: {
          kind: 'python',
          code: `# - 데이터셋에 expectation suite 적용
import pandas as pd
import great_expectations as gx

context = gx.get_context()

# - 검사 대상 데이터 (예: 오늘자 orders 테이블)
df = pd.read_parquet("s3://lake/curated/orders/dt=2026-05-07/")

# - validator: 데이터 + suite 묶기
validator = context.sources.pandas_default.read_dataframe(df)
validator.expectation_suite_name = "orders_suite"

result = validator.validate()

# - 결과 요약
print(result.success)               # True / False
print(result.statistics)
# {
#   "evaluated_expectations": 4,
#   "successful_expectations": 3,
#   "unsuccessful_expectations": 1,
#   "success_percent": 75.0
# }

# - 실패한 expectation 만 추리기
for r in result.results:
    if not r.success:
        print(r.expectation_config.expectation_type)
        print(r.result.get("partial_unexpected_list"))
# 예: ExpectColumnValuesToBeBetween / [-1, 1500000]

# - downstream 차단: success=False 면 파이프라인 abort
if not result.success:
    raise ValueError("DQ 실패: 출하 차단")`,
        },
        focus: 'validation',
      },
      {
        title: 'Step 3. Data Docs — "검사 결과 HTML 리포트 자동" (build-docs)',
        desc: 'GE 는 validation 결과를 사람이 읽을 수 있는 HTML 리포트(Data Docs)로 자동 생성한다. 어떤 룰이 실패했는지, 위반 row 샘플은 무엇인지, 시간에 따른 통과율 변화까지 한눈에 확인. 검사 결과지를 자동 인쇄해 게시판에 붙여 두는 것과 같다.',
        block: {
          kind: 'shell',
          code: `# Data Docs HTML 자동 생성 + 호스팅
# ───────────────────────────────────────────────
# 1) 로컬에서 docs 빌드
great_expectations docs build

# → great_expectations/uncommitted/data_docs/local_site/index.html
# → 브라우저로 열면 suite / validation / 위반 샘플 확인 가능

# 2) S3 / GCS 로 자동 배포 (팀 공유용)
# great_expectations.yml
data_docs_sites:
  s3_site:
    class_name: SiteBuilder
    store_backend:
      class_name: TupleS3StoreBackend
      bucket: my-de-docs
      prefix: ge-docs/
    site_index_builder:
      class_name: DefaultSiteIndexBuilder

# 3) Airflow DAG 끝에서 자동 빌드 + 업로드
great_expectations docs build --site-name s3_site

# 4) 결과 화면 (자동 페이지)
# - Suites:        orders_suite / users_suite / events_suite
# - Validations:   2026-05-07 14:00 SUCCESS / 14:30 FAIL ...
# - 실패 클릭 시:  컬럼별 위반 row sample + 통과율 그래프

# 합격선
# - 매일 자동 빌드 + Slack 에 docs URL 공유
# - 팀원 누구나 "이 테이블 신뢰 가능?" 5 분 내 확인`,
        },
        focus: 'docs',
      },
      {
        title: 'Step 4. CI/CD — "Airflow + GE 통합 게이트" (GreatExpectationsOperator)',
        desc: 'Airflow DAG 안에 GreatExpectationsOperator 를 끼워 넣으면 변환 직후 자동 검사 → 실패 시 downstream task 차단. CI 단계에도 같은 suite 를 돌려 PR merge 전 데이터 품질 회귀를 막는다. "검사 통과한 식품만 출하 라인 진입" 의 자동 게이트.',
        block: {
          kind: 'python',
          code: `# - Airflow DAG 에 GE 게이트 통합
# pip install airflow-provider-great-expectations
from airflow import DAG
from airflow.operators.python import PythonOperator
from great_expectations_provider.operators.great_expectations import (
    GreatExpectationsOperator,
)
from datetime import datetime

with DAG(
    "orders_etl",
    start_date=datetime(2026, 5, 1),
    schedule="@daily",
    catchup=False,
) as dag:

    transform = PythonOperator(
        task_id="transform_orders",
        python_callable=lambda: print("dbt run / spark job ..."),
    )

    # - 변환 직후 GE 게이트 (실패 시 downstream 자동 차단)
    dq_gate = GreatExpectationsOperator(
        task_id="dq_gate_orders",
        data_context_root_dir="/opt/airflow/great_expectations",
        checkpoint_name="orders_checkpoint",   # suite + datasource 묶음
        fail_task_on_validation_failure=True,  # 실패 = 빨강 = 알람
    )

    publish = PythonOperator(
        task_id="publish_to_bi",
        python_callable=lambda: print("publish mart -> BI"),
    )

    transform >> dq_gate >> publish

# - 추가: GitHub Actions PR 게이트 (코드 변경 시 회귀 방지)
# .github/workflows/dq.yml 의 step
# - run: great_expectations checkpoint run orders_checkpoint
# → 실패하면 PR merge 차단`,
        },
        focus: 'ci',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const QUALITY = [
      { key: 'expectation', emoji: '📋', name: 'Expectation', note: '룰 정의 (not null / range)' },
      { key: 'validation',  emoji: '✅', name: 'Validation',  note: '데이터 적용 + 결과' },
      { key: 'docs',        emoji: '📚', name: 'Data Docs',   note: 'HTML 리포트 자동' },
      { key: 'ci',          emoji: '🔄', name: 'CI/CD',       note: 'Airflow + GE 게이트' },
    ];

    function QualityCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🥬 식품 검사 (Great Expectations)</div>
          <div className="grid grid-cols-4 gap-2">
            {QUALITY.map((q) => {
              const isActive = focus === q.key;
              return (
                <div
                  key={q.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-teal-100 border-2 border-teal-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{q.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{q.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{q.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">데이터 품질 (Great Expectations)</h1>
                <p className="text-sm text-slate-500 mt-1">식품 검사 — Expectation / Validation / Docs / CI</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <QualityCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'ci' && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 mb-6 text-xs text-teal-900">
                💡 다음(V-2-1)에서는 Lineage & Privacy — 족보 + 비밀번호
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
