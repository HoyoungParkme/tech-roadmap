<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — V-1-2. 데이터 품질 (Great Expectations)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    V-1-2. 데이터 품질 (Great Expectations)
    학습 목표: GE 4단계 흐름 — Expectation 정의 → Validation → Data Docs → CI 게이트
    핵심 비유: 식품 검사 — 출하 전 검수 라인 (룰 / 검사 / 결과지 / 자동 차단)
    패턴: fastapi v1 패턴 — 좌(LiveDataPane GE 결과 시각화) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 표준 KIND_STYLE — Sprint 63 reviewer 지적 수정
    //   yaml = #fde68a (옅은 노랑), shell = #a5f3fc (옅은 청록)
    // ─────────────────────────────────────────────────────
    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    // ─────────────────────────────────────────────────────
    // 4 expectation 룰 메타 (Step 1~2 카드)
    // ─────────────────────────────────────────────────────
    const RULE_META = [
      { key: 'not_null', emoji: '🚫', name: 'not null',  column: 'order_id', rule: 'order_id 비면 안 됨' },
      { key: 'unique',   emoji: '🔑', name: 'unique',    column: 'order_id', rule: 'order_id 중복 금지' },
      { key: 'range',    emoji: '📏', name: 'range',     column: 'amount',   rule: 'amount ∈ [0, 1,000,000]' },
      { key: 'regex',    emoji: '🔤', name: 'regex',     column: 'status',   rule: 'status ∈ {pending, paid, …}' },
    ];

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 — 4 STEPS
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Expectation — "검사 룰 정의"',
        desc: 'Great Expectations 의 핵심은 expectation suite. 컬럼별로 not null / unique / range / regex 같은 검사 룰을 코드로 선언한다. 식품 검사 기준표를 만들어 두는 것 — 한 번 정의하면 같은 룰을 매일 자동 재사용.',
        focus: 'expectation',
        rules: {
          not_null: { state: 'defined' },
          unique:   { state: 'defined' },
          range:    { state: 'defined' },
          regex:    { state: 'defined' },
        },
        showDocs: false,
        showCi: false,
        block: {
          kind: 'python',
          filename: 'suite_orders.py',
          code: [
            '# pip install great-expectations',
            '# - expectation suite 정의: 컬럼별 검사 룰',
            'import great_expectations as gx',
            '',
            'context = gx.get_context()',
            'suite = context.add_or_update_expectation_suite("orders_suite")',
            '',
            '# - not null: order_id 는 절대 비면 안 됨',
            'suite.add_expectation(',
            '    gx.expectations.ExpectColumnValuesToNotBeNull(column="order_id"),',
            ')',
            '',
            '# - unique: order_id 는 중복 금지',
            'suite.add_expectation(',
            '    gx.expectations.ExpectColumnValuesToBeUnique(column="order_id"),',
            ')',
            '',
            '# - range: amount 는 0 ~ 1,000,000 사이',
            'suite.add_expectation(',
            '    gx.expectations.ExpectColumnValuesToBeBetween(',
            '        column="amount", min_value=0, max_value=1_000_000,',
            '    ),',
            ')',
            '',
            '# - accepted values (regex 류): status 는 정해진 값만',
            'suite.add_expectation(',
            '    gx.expectations.ExpectColumnValuesToBeInSet(',
            '        column="status",',
            '        value_set=["pending", "paid", "shipped", "cancelled"],',
            '    ),',
            ')',
            '',
            'context.save_expectation_suite(suite)',
            '# → JSON 으로 저장 (git 으로 버전 관리 가능)',
          ],
          highlight: [9, 14, 20, 28],
        },
      },
      {
        title: 'Step 2. Validation — "데이터에 룰 적용 + 결과"',
        desc: '정의한 suite 를 오늘자 데이터에 적용 → validation result. 4룰 중 3개 PASS, amount range 1개 FAIL (값 -1, 1,500,000 발견). 식품 박스를 검사대 위에 올려 통과 여부를 찍어내는 단계.',
        focus: 'validation',
        rules: {
          not_null: { state: 'pass', detail: '0 / 12,403 null' },
          unique:   { state: 'pass', detail: '12,403 unique' },
          range:    { state: 'fail', detail: '2 outliers — [-1, 1,500,000]' },
          regex:    { state: 'pass', detail: 'all in value_set' },
        },
        showDocs: false,
        showCi: false,
        block: {
          kind: 'python',
          filename: 'validate_orders.py',
          code: [
            '# - 데이터셋에 expectation suite 적용',
            'import pandas as pd',
            'import great_expectations as gx',
            '',
            'context = gx.get_context()',
            '',
            '# - 검사 대상 (오늘자 orders 테이블)',
            'df = pd.read_parquet("s3://lake/curated/orders/dt=2026-05-07/")',
            '',
            '# - validator: 데이터 + suite 묶기',
            'validator = context.sources.pandas_default.read_dataframe(df)',
            'validator.expectation_suite_name = "orders_suite"',
            '',
            'result = validator.validate()',
            '',
            '# - 결과 요약',
            'print(result.success)               # False',
            'print(result.statistics)',
            '# {',
            '#   "evaluated_expectations": 4,',
            '#   "successful_expectations": 3,',
            '#   "unsuccessful_expectations": 1,',
            '#   "success_percent": 75.0',
            '# }',
            '',
            '# - 실패한 expectation 만 추리기',
            'for r in result.results:',
            '    if not r.success:',
            '        print(r.expectation_config.expectation_type)',
            '        print(r.result.get("partial_unexpected_list"))',
            '# → ExpectColumnValuesToBeBetween / [-1, 1500000]',
            '',
            '# - downstream 차단: success=False 면 파이프라인 abort',
            'if not result.success:',
            '    raise ValueError("DQ 실패: 출하 차단")',
          ],
          highlight: [14, 17, 27, 28, 33, 34],
        },
      },
      {
        title: 'Step 3. Data Docs — "검사 결과 HTML 리포트 자동"',
        desc: 'GE 는 validation 결과를 사람이 읽을 수 있는 HTML(Data Docs)로 자동 생성. 어떤 룰이 실패했는지, 위반 row 샘플, 시간별 통과율 그래프까지 한눈에. 검사 결과지를 자동 인쇄해 게시판에 붙여 두는 것.',
        focus: 'docs',
        rules: {
          not_null: { state: 'pass', detail: '0 / 12,403 null' },
          unique:   { state: 'pass', detail: '12,403 unique' },
          range:    { state: 'fail', detail: '2 outliers — [-1, 1,500,000]' },
          regex:    { state: 'pass', detail: 'all in value_set' },
        },
        showDocs: true,
        showCi: false,
        block: {
          kind: 'shell',
          filename: 'build-docs.sh',
          code: [
            '# Data Docs HTML 자동 생성 + 호스팅',
            '# ───────────────────────────────────────────────',
            '# 1) 로컬에서 docs 빌드',
            'great_expectations docs build',
            '',
            '# → great_expectations/uncommitted/data_docs/local_site/index.html',
            '# → 브라우저로 열면 suite / validation / 위반 샘플 확인 가능',
            '',
            '# 2) S3 / GCS 로 자동 배포 (팀 공유용)',
            '#    great_expectations.yml 안에 site 정의',
            'cat great_expectations.yml',
            '#  data_docs_sites:',
            '#    s3_site:',
            '#      class_name: SiteBuilder',
            '#      store_backend:',
            '#        class_name: TupleS3StoreBackend',
            '#        bucket: my-de-docs',
            '#        prefix: ge-docs/',
            '',
            '# 3) Airflow DAG 끝에서 자동 빌드 + 업로드',
            'great_expectations docs build --site-name s3_site',
            '',
            '# 4) 결과 화면 (자동 페이지)',
            '# - Suites:        orders_suite / users_suite / events_suite',
            '# - Validations:   2026-05-07 14:00 SUCCESS / 14:30 FAIL ...',
            '# - 실패 클릭 시:  컬럼별 위반 row sample + 통과율 그래프',
            '',
            '# 합격선',
            '# - 매일 자동 빌드 + Slack 에 docs URL 공유',
            '# - 팀원 누구나 "이 테이블 신뢰 가능?" 5 분 내 확인',
          ],
          highlight: [4, 21],
        },
      },
      {
        title: 'Step 4. CI/CD — "Airflow + GE 통합 게이트"',
        desc: 'Airflow DAG 안에 GreatExpectationsOperator 를 끼워 넣으면 변환 직후 자동 검사 → 실패 시 downstream 자동 abort. PR CI 에도 같은 suite 를 돌려 회귀 차단. "검사 통과한 식품만 출하 라인 진입" 의 자동 게이트.',
        focus: 'ci',
        rules: {
          not_null: { state: 'pass', detail: '0 / 12,403 null' },
          unique:   { state: 'pass', detail: '12,403 unique' },
          range:    { state: 'fail', detail: '2 outliers — [-1, 1,500,000]' },
          regex:    { state: 'pass', detail: 'all in value_set' },
        },
        showDocs: true,
        showCi: true,
        block: {
          kind: 'python',
          filename: 'orders_etl_dag.py',
          code: [
            '# - Airflow DAG 에 GE 게이트 통합',
            '# pip install airflow-provider-great-expectations',
            'from airflow import DAG',
            'from airflow.operators.python import PythonOperator',
            'from great_expectations_provider.operators.great_expectations import (',
            '    GreatExpectationsOperator,',
            ')',
            'from datetime import datetime',
            '',
            'with DAG(',
            '    "orders_etl",',
            '    start_date=datetime(2026, 5, 1),',
            '    schedule="@daily",',
            '    catchup=False,',
            ') as dag:',
            '',
            '    transform = PythonOperator(',
            '        task_id="transform_orders",',
            '        python_callable=lambda: print("dbt run / spark job ..."),',
            '    )',
            '',
            '    # - 변환 직후 GE 게이트 (실패 시 downstream 자동 차단)',
            '    dq_gate = GreatExpectationsOperator(',
            '        task_id="dq_gate_orders",',
            '        data_context_root_dir="/opt/airflow/great_expectations",',
            '        checkpoint_name="orders_checkpoint",',
            '        fail_task_on_validation_failure=True,',
            '    )',
            '',
            '    publish = PythonOperator(',
            '        task_id="publish_to_bi",',
            '        python_callable=lambda: print("publish mart -> BI"),',
            '    )',
            '',
            '    transform >> dq_gate >> publish',
            '',
            '# - 추가: GitHub Actions PR 게이트 (코드 변경 시 회귀 방지)',
            '# .github/workflows/dq.yml step',
            '# - run: great_expectations checkpoint run orders_checkpoint',
            '# → 실패하면 PR merge 차단',
          ],
          highlight: [23, 24, 25, 26, 27, 35],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 룰 카드 상태 스타일
    // ─────────────────────────────────────────────────────
    const RULE_STATE_STYLE = {
      defined: { card: 'bg-slate-50 border-slate-300', value: 'text-slate-700', badge: 'bg-slate-200 text-slate-600', label: '정의됨' },
      pass:    { card: 'bg-emerald-50 border-emerald-400', value: 'text-emerald-700', badge: 'bg-emerald-100 text-emerald-700', label: '✅ PASS' },
      fail:    { card: 'bg-red-50 border-red-500', value: 'text-red-700', badge: 'bg-red-100 text-red-700', label: '❌ FAIL' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — GE 검증 결과 시각화 (룰 4 카드 + Docs + CI 게이트)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ rules, focus, showDocs, showCi }) {
      // 통과 / 실패 카운트
      const passCount = Object.values(rules).filter((r) => r.state === 'pass').length;
      const failCount = Object.values(rules).filter((r) => r.state === 'fail').length;
      const ratePct = focus === 'expectation' ? 0 : Math.round((passCount / 4) * 100);

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🥬 식품 검사 (Great Expectations)</h2>
            <span className="text-[10px] text-slate-400 font-mono">orders_suite · live</span>
          </div>

          {/* 4 expectation 룰 카드 */}
          <div className="grid grid-cols-2 gap-3">
            {RULE_META.map((m) => {
              const r = rules[m.key];
              const style = RULE_STATE_STYLE[r.state];
              const isFail = r.state === 'fail';
              return (
                <div
                  key={m.key}
                  className={`rounded-lg border-2 p-3 transition-all duration-500 ${style.card} ${isFail ? 'animate-pulse' : ''}`}
                >
                  <div className="flex items-center justify-between mb-1">
                    <div className="flex items-center gap-1.5">
                      <span aria-hidden="true">{m.emoji}</span>
                      <span className="text-xs font-bold text-slate-700">{m.name}</span>
                    </div>
                    <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${style.badge}`}>
                      {style.label}
                    </span>
                  </div>
                  <div className={`text-[11px] font-mono ${style.value}`}>{m.column}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{m.rule}</div>
                  {r.detail && (
                    <div className={`text-[10px] mt-1.5 font-mono ${isFail ? 'text-red-600' : 'text-emerald-600'}`}>
                      → {r.detail}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* 요약 (Step 2 부터) */}
          {focus !== 'expectation' && (
            <div className="mt-4 p-3 rounded-lg bg-slate-50 border border-slate-200">
              <div className="flex items-center justify-between text-xs mb-2">
                <span className="font-bold text-slate-700">검증 결과 요약</span>
                <span className="font-mono text-slate-500">success_percent: {ratePct}%</span>
              </div>
              <div className="flex h-2 rounded-full overflow-hidden bg-slate-200">
                <div className="bg-emerald-500" style={{ width: `${(passCount / 4) * 100}%` }} />
                <div className="bg-red-500"     style={{ width: `${(failCount / 4) * 100}%` }} />
              </div>
              <div className="flex justify-between text-[10px] mt-1.5">
                <span className="text-emerald-700 font-mono">PASS {passCount}</span>
                <span className="text-red-700 font-mono">FAIL {failCount}</span>
              </div>
            </div>
          )}

          {/* Step 3 — Data Docs HTML 페이지 모방 */}
          {showDocs && (
            <div className="mt-4 rounded-lg border border-slate-300 overflow-hidden">
              <div className="bg-slate-800 text-slate-200 px-3 py-1.5 text-[10px] font-mono flex justify-between">
                <span>📄 data_docs/local_site/index.html</span>
                <span className="text-slate-400">auto-generated</span>
              </div>
              <div className="bg-white p-3">
                <div className="text-xs font-bold text-slate-700 mb-2">orders_suite — Validation history</div>
                <table className="w-full text-[10px] mb-3">
                  <thead>
                    <tr className="text-slate-500 border-b border-slate-200">
                      <th className="text-left py-1 font-medium">Run</th>
                      <th className="text-left py-1 font-medium">Status</th>
                      <th className="text-right py-1 font-medium">Pass%</th>
                    </tr>
                  </thead>
                  <tbody className="font-mono">
                    <tr className="border-b border-slate-100">
                      <td className="py-1">2026-05-05 14:00</td>
                      <td className="py-1 text-emerald-700">✅ SUCCESS</td>
                      <td className="py-1 text-right">100%</td>
                    </tr>
                    <tr className="border-b border-slate-100">
                      <td className="py-1">2026-05-06 14:00</td>
                      <td className="py-1 text-emerald-700">✅ SUCCESS</td>
                      <td className="py-1 text-right">100%</td>
                    </tr>
                    <tr className="bg-red-50">
                      <td className="py-1">2026-05-07 14:00</td>
                      <td className="py-1 text-red-700 font-bold">❌ FAIL</td>
                      <td className="py-1 text-right text-red-700 font-bold">75%</td>
                    </tr>
                  </tbody>
                </table>
                {/* 통과율 그래프 mock */}
                <div className="text-[10px] text-slate-500 mb-1">통과율 추이 (3일)</div>
                <div className="flex items-end gap-1 h-12">
                  <div className="flex-1 bg-emerald-400 rounded-t" style={{ height: '100%' }} title="100%" />
                  <div className="flex-1 bg-emerald-400 rounded-t" style={{ height: '100%' }} title="100%" />
                  <div className="flex-1 bg-red-500     rounded-t" style={{ height: '75%'  }} title="75%" />
                </div>
              </div>
            </div>
          )}

          {/* Step 4 — Airflow CI 게이트 흐름 */}
          {showCi && (
            <div className="mt-4 p-3 rounded-lg bg-teal-50 border-2 border-teal-300">
              <div className="text-xs font-bold text-teal-900 mb-2">Airflow DAG — 자동 게이트</div>
              <div className="flex items-center justify-between gap-1 text-[10px] font-mono">
                <div className="flex-1 bg-white border border-teal-300 rounded px-2 py-1.5 text-center">
                  <div className="text-slate-700">transform</div>
                  <div className="text-emerald-600">✅ done</div>
                </div>
                <span className="text-teal-700">→</span>
                <div className="flex-1 bg-red-50 border-2 border-red-500 rounded px-2 py-1.5 text-center animate-pulse">
                  <div className="text-red-800 font-bold">dq_gate</div>
                  <div className="text-red-600">❌ FAIL</div>
                </div>
                <span className="text-slate-400">→</span>
                <div className="flex-1 bg-slate-100 border border-slate-300 rounded px-2 py-1.5 text-center opacity-60">
                  <div className="text-slate-500">publish</div>
                  <div className="text-slate-400">⏸ skipped</div>
                </div>
              </div>
              <div className="text-[10px] text-teal-800 mt-2 font-mono">
                fail_task_on_validation_failure=True → downstream 자동 abort
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-300"></span>정의됨</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-400"></span>PASS</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-red-500"></span>FAIL</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.kind}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      const styleMeta = KIND_STYLE[code.kind] || KIND_STYLE.python;

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span
              className="ml-auto text-[10px] font-mono uppercase px-1.5 py-0.5 rounded"
              style={{ color: styleMeta.textColor, backgroundColor: 'rgba(255,255,255,0.06)' }}
            >
              {styleMeta.label}
            </span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.kind}`}>{code.code.join('\n')}</code>
          </pre>

          {/* 실제 라인 렌더링 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.code).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-teal-500/10 border-l-2 border-teal-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.code.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-teal-700 hover:text-teal-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 데이터 거버넌스 &gt; Chapter 1. 데이터 품질</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">데이터 품질 (Great Expectations)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">식품 검사 — Expectation / Validation / Data Docs / CI 게이트</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                rules={step.rules}
                focus={step.focus}
                showDocs={step.showDocs}
                showCi={step.showCi}
              />
              <CodeViewer code={step.block} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 text-sm text-teal-900">
                💡 다음(V-2-1)에서는 <strong>Lineage &amp; Privacy</strong> — 족보 + 비밀번호
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./V-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; V-1-1</a>
              <a href="../part5/V-2-1.html" className="text-teal-700 hover:text-teal-900 font-medium">V-2-1 Lineage &amp; Privacy &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
