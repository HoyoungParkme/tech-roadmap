<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Engineering 학습 — V-1-1. 데이터 카탈로그 (Glue / DataHub)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    V-1-1. 데이터 카탈로그 (Data Catalog — Glue / DataHub)
    학습 목표: 메타데이터 자동 등록 → 검색 → lineage → governance까지 4단계 흐름을 한눈에.
    핵심 비유: 도서관 카탈로그 + 사서 — "어떤 데이터가 어디에 있고 누구 소유인지" 검색 한 번으로.
    패턴: fastapi v1 — 좌(LiveDataPane: Data Catalog UI 모방) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // ─────────────────────────────────────────────────────
    // Step 1. Glue Crawler가 자동 등록한 100개 테이블 (mock)
    //   - 도메인/오너/PII/usage/row_count 등 메타데이터
    //   - 5개 도메인 × 20개 = 100 테이블
    // ─────────────────────────────────────────────────────
    const DOMAINS = [
      { key: 'sales',    label: 'sales',    owner: 'data-platform@co' },
      { key: 'finance',  label: 'finance',  owner: 'finance-eng@co'   },
      { key: 'product',  label: 'product',  owner: 'product-data@co'  },
      { key: 'mkt',      label: 'marketing',owner: 'mkt-data@co'      },
      { key: 'ops',      label: 'ops',      owner: 'ops-data@co'      },
    ];

    // 100개 테이블 시드 — 결정적(랜덤 아님) 생성
    const ALL_TABLES = (() => {
      const tables = [];
      const NAMES = {
        sales:   ['orders','order_items','customers','carts','refunds','coupons','reviews','wishlist','sessions','search_log','checkout','cancels','returns','payments','shipping','promo','price_log','sku_meta','channel','seo_visit'],
        finance: ['ledger','revenue_daily','tax_log','invoices','ap','ar','journals','fx_rates','budget','settle','reconcile','adjust','accruals','depreciation','wallet','payouts','refund_fin','statements','cogs','margin'],
        product: ['users','events','feature_flags','ab_assign','ab_metrics','funnel','retention','signups','login_log','profile','prefs','notif_log','onboarding','crash_log','app_perf','feature_use','search_q','recs','ratings','ttl_session'],
        mkt:     ['campaigns','adspend','impressions','clicks','attribution','utm_log','email_send','email_open','sms_log','push_log','segment','audience','creative','channel_cost','ga_session','ctr_daily','cpc_daily','funnel_mkt','retarget','consent'],
        ops:     ['inventory','stock_move','suppliers','purchase_orders','warehouse','ship_routes','sla_log','incident','asset','tickets','dispatch','fleet','fuel_log','maint','locations','staff_shift','attendance','quality','batch','iot_log'],
      };
      const PII_PROB = { sales: 0.35, finance: 0.25, product: 0.6, mkt: 0.4, ops: 0.15 };
      DOMAINS.forEach((d, di) => {
        NAMES[d.key].forEach((name, i) => {
          // 결정적 PII / row_count
          const seed = (di * 31 + i) % 100;
          const isPii = (seed / 100) < PII_PROB[d.key];
          const usage = 30 + ((seed * 7) % 70);          // 30~99 (조회 수)
          const rowCount = (seed * 1234 + 1000) * (i + 2);
          tables.push({
            name: `${d.key}.${name}`,
            domain: d.key,
            owner: d.owner,
            pii: isPii,
            usage,
            rows: rowCount,
            tier: usage > 80 ? 'gold' : usage > 50 ? 'silver' : 'bronze',
          });
        });
      });
      return tables;
    })();

    // Step 1에서 표시할 6개 샘플 (앞쪽 — sales/finance 위주)
    const STEP1_SAMPLE = [
      ALL_TABLES[0],   // sales.orders
      ALL_TABLES[2],   // sales.customers
      ALL_TABLES[20],  // finance.ledger
      ALL_TABLES[21],  // finance.revenue_daily
      ALL_TABLES[40],  // product.users
      ALL_TABLES[41],  // product.events
    ];

    // ─────────────────────────────────────────────────────
    // Step 2. 검색 결과 (5건 고정) — "customer revenue" 검색
    // ─────────────────────────────────────────────────────
    const SEARCH_RESULTS = [
      { name: 'sales.orders',          owner: 'data-platform@co', tier: 'gold',   pii: true,  score: 0.94, match: ['name','description','tags'] },
      { name: 'finance.revenue_daily', owner: 'finance-eng@co',   tier: 'gold',   pii: false, score: 0.89, match: ['name','tags'] },
      { name: 'sales.customers',       owner: 'data-platform@co', tier: 'gold',   pii: true,  score: 0.81, match: ['name','description'] },
      { name: 'finance.ledger',        owner: 'finance-eng@co',   tier: 'silver', pii: false, score: 0.72, match: ['description'] },
      { name: 'mkt.attribution',       owner: 'mkt-data@co',      tier: 'silver', pii: true,  score: 0.61, match: ['tags'] },
    ];

    // Facet 카운트 (전체 100 테이블 기준 — 시각적 일관성을 위해 고정)
    const FACETS = {
      department: [
        { key: 'sales',     count: 20 },
        { key: 'finance',   count: 20 },
        { key: 'product',   count: 20 },
        { key: 'marketing', count: 20 },
        { key: 'ops',       count: 20 },
      ],
      pii: [
        { key: 'PII 포함', count: 36 },
        { key: 'PII 없음', count: 64 },
      ],
      usage: [
        { key: '🔥 high (>80)',  count: 22 },
        { key: '⚡ mid (50~80)', count: 41 },
        { key: '🧊 low (<50)',   count: 37 },
      ],
    };

    // ─────────────────────────────────────────────────────
    // Step 3. Column-level Lineage — sales.orders.amount 중심
    //   upstream: source raw → orders.amount
    //   downstream: orders.amount → mart → dashboard
    // ─────────────────────────────────────────────────────
    const LINEAGE = {
      target: { table: 'sales.orders', column: 'amount', type: 'decimal' },
      upstream: [
        { table: 's3://raw/checkout_log', column: 'paid_amount',     transform: 'CAST→decimal' },
        { table: 's3://raw/checkout_log', column: 'currency',        transform: 'FX_CONVERT→KRW' },
      ],
      downstream: [
        { table: 'mart.daily_revenue',   column: 'total_amount', transform: 'SUM(amount)',     kind: 'table' },
        { table: 'mart.customer_ltv',    column: 'ltv',          transform: 'SUM × decay',     kind: 'table' },
        { table: 'looker:revenue-daily', column: '—',            transform: 'BI 위젯',         kind: 'dash'  },
        { table: 'looker:exec-kpi',      column: '—',            transform: 'BI 위젯',         kind: 'dash'  },
      ],
    };

    // ─────────────────────────────────────────────────────
    // Step 4. Governance — Access Policy + Glossary
    // ─────────────────────────────────────────────────────
    const POLICIES = [
      { name: 'pii-mask-customer-id',   target: 'sales.customers.customer_id', principal: 'analyst',  effect: 'ALLOW(masked)', method: 'SHA256_MASK' },
      { name: 'finance-only-revenue',   target: 'mart.daily_revenue',          principal: 'finance',  effect: 'ALLOW',         method: '—' },
      { name: 'deny-raw-pii',           target: 'tag:pii AND tier:bronze',     principal: '*',        effect: 'DENY',          method: '—' },
    ];
    const GLOSSARY = [
      { term: 'GMV',         def: 'Gross Merchandise Value — 결제 금액 합 (refund 미차감)' },
      { term: 'NMV',         def: 'Net Merchandise Value — GMV − refund − cancel' },
      { term: 'Active User', def: '최근 28일 내 1회 이상 핵심 이벤트 발생한 사용자' },
      { term: 'PII',         def: 'Personally Identifiable Information — 마스킹 또는 제한 접근 대상' },
    ];

    // ─────────────────────────────────────────────────────
    // 4단계 정의
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Metadata — Glue Crawler 자동 등록 (100 tables)',
        desc: 'S3·RDS에 흩어진 데이터셋의 schema/owner/PII 태그를 사람이 일일이 적을 수 없다. Glue Crawler가 야간 스캔으로 100개 테이블을 자동 등록 — "사서가 새 책을 매일 정리". 5개 도메인 × 20개 = 100건이 카탈로그에 올라간다.',
        focus: 'metadata',
        code: {
          lang: 'yaml',
          filename: 'glue-crawler.yaml',
          lines: [
            '# AWS Glue Crawler — 야간 자동 스캔 + 메타 추출',
            'Crawler:',
            '  Name: nightly-catalog-crawler',
            '  Role: arn:aws:iam::123:role/GlueCrawlerRole',
            '  DatabaseName: analytics_db',
            '  Targets:',
            '    S3Targets:',
            '      - Path: s3://datalake/raw/sales/',
            '      - Path: s3://datalake/raw/finance/',
            '      - Path: s3://datalake/raw/product/',
            '    JdbcTargets:',
            '      - ConnectionName: rds-prod',
            '        Path: prod/%/%',
            '  Schedule: cron(0 2 * * ? *)   # 매일 02:00 UTC',
            '  SchemaChangePolicy:',
            '    UpdateBehavior: UPDATE_IN_DATABASE',
            '',
            '# 자동으로 채워지는 메타데이터 (테이블 1건당)',
            'Table: sales.orders',
            '  Location: s3://datalake/raw/sales/orders/',
            '  Format: parquet',
            '  Columns:',
            '    - { name: order_id,    type: string,  pii: false }',
            '    - { name: customer_id, type: string,  pii: true  }   # 자동 PII',
            '    - { name: amount,      type: decimal, pii: false }',
            '  Owner: data-platform@co',
            '  Tier: gold     # 조회 수 기반 자동 등급',
            '  Tags: [domain:sales]',
            '',
            '# 결과: 5 도메인 × 20 테이블 = 100건이 카탈로그에 등록',
          ],
          highlight: [3, 14, 24, 25, 28, 30],
        },
      },
      {
        title: 'Step 2. Search — DataHub 전문 검색 + Facet 필터',
        desc: '"고객 매출 관련 테이블 어디 있지?"를 Slack에 묻지 말고 카탈로그에 묻는다. Full-text 검색 + facet (department / PII / usage)으로 좁힌다. 100개 중 매칭 5건과 점수가 즉시 반환 — DataHub REST API로 자동화도 가능.',
        focus: 'search',
        code: {
          lang: 'python',
          filename: 'search_datahub.py',
          lines: [
            '# DataHub 전문 검색 + facet 필터 호출',
            'import requests',
            '',
            'DATAHUB = "http://datahub-gms:8080"',
            '',
            'payload = {',
            '    "input": "customer revenue",     # 전문 검색 쿼리',
            '    "entity": "dataset",',
            '    "filters": [',
            '        {"field": "domain", "values": ["sales", "finance"]},',
            '        {"field": "tier",   "values": ["gold", "silver"]},',
            '        {"field": "tags",   "values": ["pii", "non-pii"]},',
            '    ],',
            '    "start": 0, "count": 5,',
            '}',
            'res = requests.post(f"{DATAHUB}/api/v2/search", json=payload).json()',
            '',
            '# 결과 — 매칭 5건 (스코어 내림차순)',
            'for hit in res["entities"]:',
            '    print(hit["name"], hit["score"], hit["matchedFields"])',
            '',
            '# sales.orders          0.94  [name, description, tags]',
            '# finance.revenue_daily 0.89  [name, tags]',
            '# sales.customers       0.81  [name, description]',
            '# finance.ledger        0.72  [description]',
            '# mkt.attribution       0.61  [tags]',
          ],
          highlight: [7, 10, 11, 12, 22, 23, 24, 25, 26],
        },
      },
      {
        title: 'Step 3. Lineage — Column-level 상·하류 추적',
        desc: '"이 컬럼 바꾸면 뭐가 깨지지?"의 답. Spark/Airflow가 OpenLineage 이벤트를 emit → 카탈로그가 그래프로 그린다. sales.orders.amount 1개 컬럼이 raw 2개에서 와서 mart 2개 + dashboard 2개로 흘러간다는 게 한눈에.',
        focus: 'lineage',
        code: {
          lang: 'yaml',
          filename: 'openlineage-event.yaml',
          lines: [
            '# OpenLineage 이벤트 (Spark / Airflow가 자동 emit)',
            'eventType: COMPLETE',
            'job:',
            '  namespace: airflow',
            '  name: daily_revenue_agg',
            'inputs:',
            '  - namespace: s3://datalake',
            '    name: raw/checkout_log',
            '    schema:',
            '      - { name: paid_amount, type: decimal }',
            '      - { name: currency,    type: string  }',
            'outputs:',
            '  - namespace: redshift://analytics',
            '    name: mart.daily_revenue',
            '    schema:',
            '      - { name: date,         type: date }',
            '      - { name: total_amount, type: decimal }',
            '    columnLineage:',
            '      total_amount:',
            '        - { input: orders.amount, transform: SUM }',
            '      date:',
            '        - { input: orders.order_ts, transform: DATE_TRUNC }',
            '',
            '# 카탈로그 UI: orders.amount 클릭 →',
            '#   ⬆ raw/checkout_log.paid_amount  (+FX_CONVERT)',
            '#   ⬇ mart.daily_revenue.total_amount  (SUM)',
            '#   ⬇ mart.customer_ltv.ltv           (SUM × decay)',
            '#   ⬇ looker:revenue-daily            (BI 위젯)',
            '#   ⬇ looker:exec-kpi                 (BI 위젯)',
            '',
            '# → "amount 타입 변경 PR"이 깨뜨릴 모든 곳을 사전 파악',
          ],
          highlight: [18, 19, 20, 24, 25, 26, 27, 28, 29],
        },
      },
      {
        title: 'Step 4. Governance — Access Policy + Glossary',
        desc: 'PII 컬럼은 마스킹, 재무팀만 접근 등 규칙을 카탈로그에 선언 (RBAC). Glossary로 GMV·NMV 같은 사내 용어를 통일 — "사서가 대출 자격을 확인하고 용어집을 비치". 정책은 코드(YAML)로 관리하고 변경 이력도 추적된다.',
        focus: 'governance',
        code: {
          lang: 'yaml',
          filename: 'datahub-policy.yaml',
          lines: [
            '# DataHub Access Policy + Glossary',
            'policies:',
            '  - name: pii-mask-customer-id',
            '    resource:',
            '      type: dataset',
            '      filter: { tag: pii }',
            '    actions: [DATA_READ_QUERY]',
            '    effect: ALLOW',
            '    transform:',
            '      column: customer_id',
            '      method: SHA256_MASK         # 평문 노출 차단',
            '    principals:',
            '      - group: analyst',
            '',
            '  - name: finance-only-revenue',
            '    resource:',
            '      filter: { name: mart.daily_revenue }',
            '    actions: [DATA_READ_QUERY]',
            '    effect: ALLOW',
            '    principals:',
            '      - group: finance',
            '',
            '  - name: deny-raw-pii',
            '    resource:',
            '      filter: { tag: pii AND tier: bronze }',
            '    actions: [DATA_READ_QUERY]',
            '    effect: DENY                   # 명시적 차단',
            '',
            'glossary:',
            '  - term: GMV',
            '    def:  "Gross Merchandise Value (refund 미차감)"',
            '  - term: NMV',
            '    def:  "Net Merchandise Value = GMV − refund − cancel"',
            '  - term: PII',
            '    def:  "개인 식별 정보 — 마스킹 또는 제한 접근"',
          ],
          highlight: [3, 11, 15, 23, 27, 30],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 Data Catalog UI 모방
    //   Step별 다른 화면 (focus로 분기)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm min-h-[28rem]">
          {/* 카탈로그 상단바 */}
          <div className="flex items-center justify-between mb-4 pb-3 border-b border-slate-200">
            <div className="flex items-center gap-2">
              <span className="text-lg">📚</span>
              <span className="text-sm font-bold text-slate-700">Data Catalog</span>
              <span className="text-[10px] bg-teal-100 text-teal-700 px-1.5 py-0.5 rounded font-mono">DataHub × Glue</span>
            </div>
            <span className="text-[10px] text-slate-400 font-mono">{step.focus} view</span>
          </div>

          {step.focus === 'metadata'   && <MetadataView />}
          {step.focus === 'search'     && <SearchView />}
          {step.focus === 'lineage'    && <LineageView />}
          {step.focus === 'governance' && <GovernanceView />}
        </div>
      );
    }

    // ── Step 1: 100 테이블 자동 등록 — 카운터 + 6건 sample 표
    function MetadataView() {
      return (
        <div>
          {/* 크롤러 진행 박스 */}
          <div className="rounded-lg border-2 border-teal-300 bg-teal-50 p-3 mb-4">
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs font-bold text-teal-800">🤖 Glue Crawler · nightly</span>
              <span className="text-[10px] text-teal-700 font-mono">cron(0 2 * * ? *)</span>
            </div>
            <div className="grid grid-cols-5 gap-2 text-center">
              {DOMAINS.map((d) => (
                <div key={d.key} className="bg-white rounded p-1.5 border border-teal-200">
                  <div className="text-[9px] text-slate-500 uppercase tracking-wide">{d.label}</div>
                  <div className="text-lg font-extrabold text-teal-700 tabular-nums">20</div>
                </div>
              ))}
            </div>
            <div className="mt-2 text-center text-xs text-teal-800">
              총 <strong className="text-base">100</strong> 테이블 자동 등록 완료
            </div>
          </div>

          {/* 테이블 sample 6건 */}
          <div className="text-[10px] text-slate-500 font-mono mb-1.5">샘플 6건 (전체 100건 중)</div>
          <div className="overflow-hidden rounded-lg border border-slate-200">
            <table className="w-full text-[11px]">
              <thead className="bg-slate-100 text-slate-600">
                <tr>
                  <th className="text-left px-2 py-1.5 font-semibold">테이블</th>
                  <th className="text-left px-2 py-1.5 font-semibold">Owner</th>
                  <th className="text-left px-2 py-1.5 font-semibold">Tier</th>
                  <th className="text-center px-2 py-1.5 font-semibold">PII</th>
                </tr>
              </thead>
              <tbody>
                {STEP1_SAMPLE.map((t, i) => (
                  <tr key={t.name} className={i % 2 ? 'bg-slate-50' : 'bg-white'}>
                    <td className="px-2 py-1.5 font-mono text-slate-700">{t.name}</td>
                    <td className="px-2 py-1.5 text-slate-500">{t.owner}</td>
                    <td className="px-2 py-1.5">
                      <span className={
                        t.tier === 'gold'   ? 'text-amber-700 font-semibold' :
                        t.tier === 'silver' ? 'text-slate-600 font-semibold' :
                                              'text-orange-700 font-semibold'
                      }>{t.tier}</span>
                    </td>
                    <td className="px-2 py-1.5 text-center">
                      {t.pii
                        ? <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-bold">PII</span>
                        : <span className="text-slate-300">—</span>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ── Step 2: 검색바 + facet + 결과 5건
    function SearchView() {
      return (
        <div>
          {/* 검색바 */}
          <div className="flex items-center gap-2 mb-3 px-3 py-2 bg-slate-100 border border-slate-300 rounded-lg">
            <span className="text-slate-400">🔍</span>
            <input
              readOnly
              value="customer revenue"
              className="flex-1 bg-transparent text-sm font-mono text-slate-700 outline-none"
            />
            <span className="text-[10px] bg-teal-600 text-white px-2 py-0.5 rounded font-bold">SEARCH</span>
          </div>

          <div className="grid grid-cols-12 gap-3">
            {/* Facet 필터 */}
            <aside className="col-span-4 text-[11px]">
              <FacetGroup title="Department" items={FACETS.department} />
              <FacetGroup title="PII" items={FACETS.pii} />
              <FacetGroup title="Usage" items={FACETS.usage} />
            </aside>

            {/* 검색 결과 */}
            <div className="col-span-8">
              <div className="text-[10px] text-slate-500 mb-1.5 font-mono">매칭 5건 (총 100 중)</div>
              <div className="space-y-1.5">
                {SEARCH_RESULTS.map((r) => (
                  <div key={r.name} className="bg-white border border-slate-200 hover:border-teal-400 rounded-lg p-2 transition">
                    <div className="flex items-center justify-between">
                      <span className="text-[11px] font-mono font-bold text-teal-700">{r.name}</span>
                      <span className="text-[9px] font-mono text-slate-400">score {r.score.toFixed(2)}</span>
                    </div>
                    <div className="flex items-center gap-1.5 mt-1 flex-wrap">
                      <span className="text-[9px] text-slate-500">👤 {r.owner}</span>
                      <span className={
                        'text-[9px] px-1 py-0.5 rounded font-semibold ' + (
                        r.tier === 'gold'   ? 'bg-amber-100 text-amber-700' :
                                              'bg-slate-200 text-slate-600')
                      }>{r.tier}</span>
                      {r.pii && <span className="text-[9px] bg-rose-100 text-rose-700 px-1 py-0.5 rounded font-bold">PII</span>}
                      <span className="text-[9px] text-slate-400 ml-auto">match: {r.match.join(', ')}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function FacetGroup({ title, items }) {
      return (
        <div className="mb-3">
          <div className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">{title}</div>
          <div className="space-y-0.5">
            {items.map((it) => (
              <label key={it.key} className="flex items-center gap-1.5 hover:bg-teal-50 rounded px-1 py-0.5 cursor-default">
                <span className="w-3 h-3 rounded border border-slate-300 bg-white"></span>
                <span className="text-slate-700 flex-1 truncate">{it.key}</span>
                <span className="text-[9px] text-slate-400 font-mono">{it.count}</span>
              </label>
            ))}
          </div>
        </div>
      );
    }

    // ── Step 3: Column-level lineage 트리
    function LineageView() {
      return (
        <div className="text-[11px]">
          {/* 중앙 컬럼 카드 */}
          <div className="text-center mb-2">
            <div className="text-[10px] text-slate-500 mb-1 font-mono">중심 컬럼</div>
            <div className="inline-block bg-teal-600 text-white rounded-lg px-4 py-2 shadow-md">
              <div className="text-[10px] font-mono opacity-80">{LINEAGE.target.table}</div>
              <div className="text-sm font-bold">{LINEAGE.target.column}</div>
              <div className="text-[9px] font-mono opacity-80">{LINEAGE.target.type}</div>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-3 mt-3">
            {/* Upstream */}
            <div>
              <div className="text-[10px] font-bold text-slate-600 uppercase mb-1.5 flex items-center gap-1">
                <span className="text-amber-600">⬆</span> Upstream (원천)
              </div>
              <div className="space-y-1.5">
                {LINEAGE.upstream.map((u, i) => (
                  <div key={i} className="bg-amber-50 border border-amber-200 rounded p-1.5">
                    <div className="font-mono text-[10px] text-slate-700">{u.table}</div>
                    <div className="font-mono text-[11px] font-bold text-amber-800">.{u.column}</div>
                    <div className="text-[9px] text-amber-700 mt-0.5">→ {u.transform}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Downstream */}
            <div>
              <div className="text-[10px] font-bold text-slate-600 uppercase mb-1.5 flex items-center gap-1">
                <span className="text-teal-600">⬇</span> Downstream (영향)
              </div>
              <div className="space-y-1.5">
                {LINEAGE.downstream.map((d, i) => (
                  <div key={i} className={`rounded p-1.5 border ${
                    d.kind === 'dash' ? 'bg-violet-50 border-violet-200' : 'bg-teal-50 border-teal-200'
                  }`}>
                    <div className="font-mono text-[10px] text-slate-700">
                      {d.kind === 'dash' ? '📊 ' : '🗄️ '}{d.table}
                    </div>
                    {d.column !== '—' && (
                      <div className="font-mono text-[11px] font-bold text-teal-800">.{d.column}</div>
                    )}
                    <div className={`text-[9px] mt-0.5 ${d.kind === 'dash' ? 'text-violet-700' : 'text-teal-700'}`}>
                      ← {d.transform}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div className="mt-3 text-[10px] text-slate-500 text-center bg-slate-50 rounded p-1.5 border border-slate-200">
            💡 <strong className="text-teal-700">amount</strong> 컬럼 변경 시 영향: mart 2건 + dashboard 2건
          </div>
        </div>
      );
    }

    // ── Step 4: 정책 + glossary 표
    function GovernanceView() {
      return (
        <div className="text-[11px]">
          {/* Access Policy */}
          <div className="mb-3">
            <div className="text-[10px] font-bold text-slate-600 uppercase mb-1.5 flex items-center gap-1">
              🛡️ Access Policy
            </div>
            <div className="rounded-lg border border-slate-200 overflow-hidden">
              <table className="w-full">
                <thead className="bg-slate-100 text-slate-600 text-[10px]">
                  <tr>
                    <th className="text-left px-2 py-1 font-semibold">Policy</th>
                    <th className="text-left px-2 py-1 font-semibold">Target</th>
                    <th className="text-left px-2 py-1 font-semibold">Effect</th>
                  </tr>
                </thead>
                <tbody>
                  {POLICIES.map((p, i) => (
                    <tr key={p.name} className={i % 2 ? 'bg-slate-50' : 'bg-white'}>
                      <td className="px-2 py-1.5 font-mono text-slate-700 text-[10px]">{p.name}</td>
                      <td className="px-2 py-1.5 font-mono text-slate-600 text-[10px]">{p.target}</td>
                      <td className="px-2 py-1.5">
                        {p.effect.startsWith('ALLOW')
                          ? <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-bold">{p.effect}</span>
                          : <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded font-bold">{p.effect}</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* Glossary */}
          <div>
            <div className="text-[10px] font-bold text-slate-600 uppercase mb-1.5 flex items-center gap-1">
              📖 Business Glossary
            </div>
            <div className="space-y-1">
              {GLOSSARY.map((g) => (
                <div key={g.term} className="bg-teal-50 border border-teal-200 rounded p-1.5 flex items-start gap-2">
                  <span className="font-bold text-teal-800 text-[11px] min-w-[60px]">{g.term}</span>
                  <span className="text-slate-700 text-[10px] flex-1">{g.def}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          setRenderedLines(codeRef.current.innerHTML.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-teal-500/10 border-l-2 border-teal-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-teal-700 hover:text-teal-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 데이터 거버넌스 &gt; Chapter 1. 데이터 카탈로그</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">데이터 카탈로그 (Glue / DataHub)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">도서관 카탈로그 + 사서 — metadata · search · lineage · governance 4단계</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-3 text-sm text-teal-900">
                💡 다음(V-1-2)에서는 <strong>데이터 품질 — Great Expectations</strong>
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./V-1-2.html" className="text-teal-700 hover:text-teal-900 font-medium">V-1-2 데이터 품질 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
